chapter1:
  rows:

    - char: queen_elizabeth
      side: left
      text:
        - "Каковы результаты анализа?"

    - char: warspite
      side: right
      text:
        - "Ваше Величество, состояние Худ продолжает постепенно ухудшаться. Если так пойдет и дальше, боюсь..."

    - char: queen_elizabeth
      side: left
      text:
        - "Но ведь оборудование было модернизировано согласно последним исследованиям..."
        - "...Неужели даже данных, предоставленных Железной Кровью и Северным Парламентом, недостаточно?"
        - "Алжири, использовавшая  чёрный куб, с легкостью прошла очистку. Даже Бисмарк, находившаяся в критическом состоянии, пошла на поправку."
        - "Почему же с Худ ничего не выходит?.. Ведь она всего лишь попала под удар энергии  чёрного куба..."

    - char: warspite
      side: right
      text:
        - "Худ была ранена Железной Кровью. Если они хотят искупить вину, то обязаны всё исправить!"

    - char: queen_elizabeth
      side: left
      text:
        - "Даже если бы это не сделала Железная Кровь, это сделали бы Сирены. Разве пример со Скапа-Флоу был недостаточно суровым?"

    - char: warspite
      side: right
      text:
        - "…… Сколько бы я ни слышала об этих «предопределенных событиях», я всё равно не могу в них до конца поверить."

    - char: queen_elizabeth
      side: left
      text:
        - "Но такова реальность. Если бы Железная Кровь в сговоре с Сиренами не раздобыла часть «сценария», мы бы все до сих пор плясали под их дудку."
        - "И хотя это крайне неприятно... и хотя они загребли себе всю выгоду..."
        - "Но в конечном итоге благодаря этому мы одержали настоящую победу... Терпеть не могу этих прагматиков, которых волнует только результат..."
        - "Разумеется... какими бы ни были причины, содеянное остается содеянным, и цену за это придется платить сполна."
        - "Что касается Худ — от образцов и данных до оборудования — Железная Кровь действительно предоставила всё, что могла."
        - "И всё равно безрезультатно... Мы всё ещё слишком мало понимаем саму суть этой силы..."
        - "Проклятье!.. Знай я, что так будет, я бы приложила все силы, чтобы уговорить Арк Ройал из Пепла пойти с нами, когда мы были в центре Северной Атлантики!"
        - "Если бы я взялась за дело всерьез, у меня было бы шанса два или три из десяти!"
        - "Мы добровольно взяли на себя стабилизацию океана NA, а она после этого бесследно исчезла..."

    - char: warspite
      side: right
      text:
        - "Вам не стоит винить себя, Ваше Величество."
        - "То, что метод лечения Бисмарк не удастся полностью применить к Худ, стало неожиданностью, которой никто из нас не мог предвидеть."
        - "К тому же в той обстановке мы никак не могли уговаривать МЕТА присоединиться к нам на глазах у других фракций."
        - "Не нужно сожалеть о том, что на самом деле было невозможно осуществить."

    - char: queen_elizabeth
      side: left
      text:
        - "Ты права, я просто... чувствую, что мы упустили шанс."
        - "Но довольно об этом."
        - "Наш основной план остается в силе. Для исследования процесса МЕТА-морфозы нам лучше всего найти союзника среди МЕТА из нашего собственного Королевского Флота, который согласится с нами сотрудничать."
        - "Как продвигается подготовка «Врат Авалона»?"

    - char: warspite
      side: right
      text:
        - "Оборудование работает исправно, но проверка координат всё ещё требует времени..."

    - char: queen_elizabeth
      side: left
      text:
        - "Сколько именно?"

    - char: warspite
      side: right
      text:
        - "...Полгода или даже год."

    - char: queen_elizabeth
      side: left
      text:
        - "Сможет ли Худ продержаться так долго?.."

    - char: warspite
      side: right
      text:
        - "Простите, Ваше Величество, я не знаю."
        - "У нас есть несколько непроверенных запасных координат. Существует вариант рискнуть и запустить систему принудительно."
        - "Однако бездумный прыжок в мир с неизвестными рисками может привести к гибели всей исследовательской группы из-за несчастного случая."
        - "Худ никогда бы не согласилась на план, который подвергает её товарищей такой опасности ради её спасения."

    - char: queen_elizabeth
      side: left
      text:
        - "Верно... Она бы ни за что не позволила такому случиться."
        - "А нельзя ли ускорить процесс проверки?"

    - char: warspite
      side: right
      text:
        - "Простите, Ваше Величество, боюсь, это невозможно. Совершить столь огромный технологический скачок для нас всё еще слишком трудно... Если форсировать события, это может привести к еще более непредсказуемым последствиям."

    - char: queen_elizabeth
      side: left
      text:
        - "Ты права... «Врата Авалона» — наша последняя надежда, и мы не можем позволить этой надежде сгореть в пламени безрассудства."
        - "Но как бы там ни было, я не допущу, чтобы Худ покинула нас у меня на глазах!"
        - "Дай мне подумать... Нужно еще подумать..."
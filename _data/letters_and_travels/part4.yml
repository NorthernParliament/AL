chapter1:
  rows:

    - text:
      - "Монарх, как обычно, совершала обход."
      - "По сравнению с пышным праздничным убранством снаружи, обстановка внутри комплекса казалась на редкость унылой и холодной."

    - char: monarch
      side: left
      text:
        - "Хм, впрочем, это вполне соответствует моему настроению."
        - "Кто бы мог подумать, что празднование прервется из-за атаки Сирен..."
        - "Совершенно не понимаю. Почему бы просто не отправить меня на передовую?"
        - "Зачем изо дня в день изнурять себя тренировками здесь и участвовать в этих бесконечных научных исследованиях..."

    - text:
      - "Проходя мимо одного из отсеков, Монарх услышала приглушенные голоса."

    - char: nop
      side: left
      text:
        - "...Но я всё никак не могу забыть воодушевленные лица девочек во время «Большой операции»..."

    - char: nop
      side: right
      text:
        - "...Частота приступов растет. Это признак того, что твоё состояние продолжает ухудшаться..."

    - char: monarch
      side: left
      text:
        - "Что?.."

    - text:
      - "Хотя из-за толстых стен звуки доносились неразборчиво и было трудно определить личности говорящих или уловить всю суть беседы, она мгновенно поняла, что происходит."

    - char: monarch
      side: left
      text:
        - "Леди Худ... Снова прибыла на лечение."

    - text:
      - "Знакомая сцена, знакомые разговоры и знакомый человек. Это был уже далеко не первый раз, когда Худ посещала это место."

    - char: monarch
      side: left
      text:
        - "Я знала, что леди Худ из-за ухудшения состояния здоровья нужно периодически приходить сюда для восстановления..."
        - "Но я и представить не могла, что всё зашло настолько далеко..."

    - text:
      - "Разговор в палате продолжался."

    - char: nop
      side: left
      text:
        - "...У нас есть несколько непроверенных запасных координат. Существует вариант рискнуть и запустить систему принудительно..."
        - "...Однако бездумный прыжок в мир с неизвестными рисками может привести к гибели всей исследовательской группы..."
        - "...Худ никогда бы не согласилась на план, который подвергает её товарищей такой опасности ради её спасения..."

    - char: nop
      side: right
      text:
        - "...Но как бы там ни было, я не допущу, чтобы Худ покинула нас у меня на глазах!"
        - "...Дай мне подумать... Нужно еще подумать..."

    - char: monarch
      side: left
      text:
        - "Ха... Значит, выход всё же есть."
        - "«Не желает подвергать опасности товарищей»?"
        - "Тогда не будет ли это идеальной работой для меня — для той, о ком мир почти не знает и кого никогда не считали полноценным товарищем?"
        - "...Как бы Королевский Флот ни относился ко мне, мои чувства к нему неизменны."
        - "Эта нерешительность, это топтание на месте — просто непозволительно..."
        - "Славу Королевского Флота спасу я, Монарх..."

    - text:
      - "Диалог в комнате еще продолжался, но Монарх, словно приняв окончательное решение, развернулась и ушла."
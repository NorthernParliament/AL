chapter1:
  rows:

    - text:
      - "Под роскошным убранством, напоминающим дворцовые залы, скрывается огромное количество приборов и кабелей."
      - "Это палата, обставленная как элитный номер люкс, и в самом центре, окруженная бесчисленным оборудованием, лежит Худ."
  
    - char: hood
      side: left
      text:
        - "Кха... Ваше Величество, вы слишком сильно переживаете."
        - "Я просто на мгновение потеряла равновесие во время перехода, ничего серьезного..."
        - "Я и так слишком сильно задержалась, а заставлять зрителей ждать — не в правилах истинной леди..."  
    - char: queen_elizabeth
      side: right
      text:
        - "Насчет мероприятия не беспокойся, я приказала объявить воздушную тревогу и отменила его."
        - "Атаки Сирен — дело обычное, так что это послужит отличным оправданием."  
    - char: hood
      side: left
      text:
        - "...Мне очень жаль, Ваше Величество."
        - "Впрочем... мне нужно лишь немного побыть в этом устройстве, и всё наладится."
        - "Я справлялась с этим столько раз, справлюсь и сейчас..."
        - "Должно быть, я просто слишком утомилась, вот и..."  
    - char: king_george_v
      side: right
      text:
        - "Больному не следует забивать голову лишними мыслями. Пожалуйста, лежи спокойно."  
    - char: hood
      side: left
      text:
        - "М-м... Но я всё никак не могу забыть воодушевленные лица девочек во время «Большой операции»..."  
    - char: king_george_v
      side: right
      text:
        - "В конце концов, это была редкая возможность снова сразиться плечом к плечу с гордостью Королевского Флота."
        - "И твоя речь в начале битвы, как и всегда, подняла боевой дух каждого."  
    - char: hood
      side: left
      text:
        - "Поэтому и в этот раз я..."  
    - char: queen_elizabeth
      side: right
      text:
        - "В этот раз — уже невозможно."
        - "Ты стала терять сознание всё чаще. Это явный признак того, что твоё состояние продолжает ухудшаться."  
    - char: king_george_v
      side: left
      text:
        - "Ваше Величество, в этот раз Худ упала прямо по пути к площади, и сопровождавший её эскорт стал свидетелем случившегося."
        - "Все очень обеспокоены... Хотя я и приказала держать всё в строгом секрете, пока мы не разберемся в ситуации."
        - "Но если Худ не станет лучше в ближайшее время, боюсь, скрывать правду долго не получится..."  
    - char: queen_elizabeth
      side: right
      text:
        - "...Значит, будем скрывать столько, сколько сможем! Придумай любые оправдания, чтобы запутать их!"  
    - char: king_george_v
      side: left
      text:
        - "Эх... Я постараюсь."  
    - char: hood
      side: right
      text:
        - "Мне очень жаль, что я доставляю вам столько хлопот."
        - "Но... Гордость Королевского Флота не может позволить себе пасть снова..."  
    - char: king_george_v
      side: left
      text:
        - "Я всё понимаю. Перестань извиняться, ведь тяжелее всего сейчас именно тебе."
        - "Я возвращаюсь, чтобы уладить последствия инцидента. А ты отдыхай и ни о чём не думай."  
    - char: hood
      side: right
      text:
        - "М-м... Хорошо."
        - "Когда мне станет лучше и я смогу вернуться к делам... я снова буду рассчитывать на вас."
        - "Я ни в коем случае не должна сдаваться. Я обязана... защитить славу Королевского Флота..."  
    - char: queen_elizabeth
      side: left
      text:
        - "Да сколько можно-то, а?!"  
    - text:
      - "Погрузившаяся в глубокий сон Худ больше ничего не ответила."  
    - char: queen_elizabeth
      side: left
      text:
        - "......"
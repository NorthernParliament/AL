chapter1:
  rows:

    - char: suffolk
      side: left
      text:
        - "Фух... Благодаря усердному труду Саффолк оформление площадки наконец-то завершено... Наверное!"

    - char: hermione
      side: right
      text:
        - "Потрясающе! Хотя пара стульев стоят криво, да и баннер над трибуной, кажется, немного перекошен..."

    - char: suffolk
      side: left
      text:
        - "А... Какая ты внимательная! ><"

    - char: hermione
      side: right
      text:
        - "Ничего страшного, оставь это другим, а сама лучше иди и подготовь угощения для VIP-зала."

    - char: suffolk
      side: left
      text:
        - "Ра-работа... задания продолжают сыпаться на меня одно за другим?!"

    - char: sheffield
      side: right
      text:
        - "Вот ты где, Саффолк."
        - "Разве Белфаст не поручила тебе встречать гостей? Почему ты здесь?"

    - char: suffolk
      side: left
      text:
        - "Ах! Я чуть не провалила задание Белфаст! Тогда я поспешу откланяться..."

    - char: hermione
      side: right
      text:
        - "Это я увидела, как Саффолк бродит снаружи без дела. Как раз не хватало рук для оформления зала, вот я и попросила её помочь..."

    - char: sheffield
      side: left
      text:
        - "Вот оно что. Подготовка проходит успешно?"

    - char: hermione
      side: right
      text:
        - "Честно говоря, масштаб мероприятия оказался великоват... Но мы должны успеть всё закончить к назначенному времени."

    - char: sheffield
      side: left
      text:
        - "Хорошая работа. Мне тоже пора возвращаться на пост."
        - "Мероприятия с участием членов королевской семьи — это всегда головная боль в плане безопасности..."

chapter2:
  rows:

    - char: renown
      side: left
      text:
        - "Когда мы были здесь в прошлый раз, всё лежало в руинах. Не ожидала, что восстановительные работы продвинутся так быстро."

    - char: repulse
      side: right
      text:
        - "К счастью или к несчастью, но, похоже, строительные бригады уже набили руку на восстановлении Скапа-Флоу~"

    - char: renown
      side: left
      text:
        - "И то верно. Главная якорная стоянка Королевского Флота раз за разом подвергается внезапным атакам... Об этом даже как-то не получается говорить с улыбкой."
        - "Теперь мы обязаны защитить её во что бы то ни стало. Мы не можем позволить, чтобы территория нашей родины снова пострадала."

    - char: repulse
      side: right
      text:
        - "М-м~ Обязательно защитим!"
        - "Но для начала давай немного взбодримся. Сегодняшний праздник устроен специально в честь возрождения Скапа-Флоу."
        - "Разве леди Худ не должна выступить здесь с речью? Если ты будешь стоять рядом с ней с таким мрачным лицом, даже солнце померкнет!"

    - char: renown
      side: left
      text:
        - "Ты права… Мы представляем здесь весь Королевский Флот, и нельзя допустить, чтобы наше незрелое поведение бросило тень на величие королевы Куин Элизабет и леди Худ!"

    - char: repulse
      side: right
      text:
        - "Опять ты превратилась из унылой девчонки в ту самую строгую сестрицу, которую я знаю. Эх~ ну, так тоже сойдет."

    - char: renown
      side: left
      text:
        - "Идем, выдвигаемся к площади!"
        - "…… Рипалс, а ты знаешь, где она находится?"

    - char: repulse
      side: right
      text:
        - "Понятия не имею! Белфаст говорила, что на пристани нас встретят, неужели про нас забыли?.."

    - char: suffolk
      side: left
      text:
        - "Простите, заставила... вас... ж-ждать!"
        - "Площадь... она в той стороне! Пожалуйста, следуйте за мной!"

chapter3:
  rows:

    - text:
      - "Над залитым солнцем Скапа-Флоу гремят залпы праздничного салюта, а по всему порту развеваются разноцветные ленты."
      - "Пройдя через горнило множества сражений, Скапа-Флоу наконец была полностью восстановлена."
      - "Нынешняя церемония проводится, чтобы отпраздновать возрождение базы и великую победу над Компилятором."
      - "По мере того как почетные гости занимают свои места, все взгляды устремляются на трибуну в центре площади."

    - char: abercrombie
      side: left
      text:
        - "Тетушка Худ что-то опаздывает..."

    - text:
      - "Когда в толпе уже начал нарастать шум, а Ринаун собралась было отправиться за кулисы, чтобы проверить, в чем дело..."

    - char: repulse
      side: left
      text:
        - "Сестра... неужели с леди Худ что-то случилось по пути сюда?.."

    - char: renown
      side: right
      text:
        - "Невозможно! Сразу после нашего прибытия я лично проверила отчеты — на маршруте всё было спокойно."

    - char: repulse
      side: left
      text:
        - "Хотя появление главного героя в самый последний момент всегда производит эффект... но сейчас она задерживается уже слишком сильно."
        - "Леди Худ определённо не из тех, кто пренебрегает пунктуальностью."
        - "Погоди... Сестра, ты заметила? Горничных на площади незаметно стало меньше."

    - char: renown
      side: right
      text:
        - "...Я всё-таки схожу за кулисы и всё проверю."

    - text:
      - "Минуты сменялись одна за другой, но главный оратор так и не подавал признаков скорого появления на трибуне."
      - "*ЗВУКИ СИРЕНЫ*"

    - char: repulse
      side: left
      text:
        - "Сестрица, это что... воздушная тревога?"

    - char: renown
      side: right
      text:
        - "Безопасность вокруг площадки должна быть безупречной, как в такой момент может произойти вражеская атака?!"

    - text:
      - "Внезапный вой сирен вдребезги разбил праздничную атмосферу, царившую в Скапа-Флоу. На площади начал нарастать хаос."

    - char: belfast
      side: left
      text:
        - "Прошу всех сохранять спокойствие, враг не нападёт сию секунду."
        - "Королевский Флот приложит все силы, чтобы обеспечить вашу безопасность. Группы палубной авиации Сирен будут полностью уничтожены ещё на подлёте."
        - "Тем не менее, в целях предосторожности, пожалуйста, следуйте за персоналом и организованно направляйтесь в укрытия."

    - char: renown
      side: right
      text:
        - "Какая оплошность... неужели мы что-то упустили, когда патрулировали маршрут?.."
        - "Белфаст, где находится противник? Мы должны немедленно выступить и устранить любую угрозу!"

    - char: belfast
      side: left
      text:
        - "Вам двоим не о чем беспокоиться, флот уже выдвинулся на перехват."
        - "Сейчас леди Кинг Джордж V формирует эскорт для сопровождения членов королевской семьи, пожалуйста, присоединяйтесь к ним."
        - "К сожалению, сегодняшнее мероприятие придётся отменить."
chapter1:
  rows:

    - char: chikuma_rad
      side: left
      text:
        - "Симакадзэ, мы уже добрались до окраин центральной зоны. Вы сейчас где?"

    - char: shimakaze
      side: right
      text:
        - " Э? Как быстро! Мы только‑только вошли во внутреннее кольцо. Вам что, больше не попадались странные ловушки?!"

    - char: chikuma_rad
      side: left
      text:
        - "Представь себе, нет."

    - char: shimakaze
      side: right
      text:
        - "Нечестно! А я столкнулась уже с третьей!"

    - char: chikuma_rad
      side: left
      text:
        - " Удачливость — это тоже часть силы. Похоже, в этой гонке победа за нами~"

    - char: shimakaze
      side: right
      text:
        - "У‑у‑у…"

    - char: chikuma_rad
      side: left
      text:
        - "Ну не расстраивайся ты так. Мы подождём вас перед входом в главные врата."

    - char: shimakaze
      side: right
      text:
        - "У‑у‑у, госпожа Тикума, вы такая добрая!"
        - "Но здесь так много врагов… Даже не знаю, когда закончится этот бой…"

    - char: chikuma_rad
      side: left
      text:
        - "С каким типом механизмов вы столкнулись на этот раз?"

    - char: shimakaze
      side: right
      text:
        - "Симакадзэ понятия не имеет! В море не происходит ничего странного, но врагов очень, очень, ну очень много! Такое чувство, будто они никогда не закончатся!"

    - char: chikuma_rad
      side: left
      text:
        - "Если это единственная аномалия, то, возможно… такое огромное количество врагов и есть особенность этого механизма."

    - char: yura_rad
      side: right
      text:
        - "…Словно монстр, который постоянно регенерирует?"

    - char: chikuma_rad
      side: left
      text:
        - "Если представить весь вражеский флот как единое целое, то это описание вполне подходит."
        - "Настоящий символ неукротимой жизненной силы~"

    - char: suruga_rad
      side: right
      text:
        - "Тикума, сейчас не время для философских размышлений…"

    - char: chikuma_rad
      side: left
      text:
        - "А я как раз обдумываю план."
        - "Раз механизм, дававший щиты врагам, смог дать их нам, то ловушки со штормовыми волнами и морем огня должны обладать похожим эффектом."
        - "Если рассматривать врагов как единый организм с высокой регенерацией, нам нужно найти способ нанести колоссальный урон всему сектору разом."

    - char: suruga_rad
      side: right
      text:
        - "Ты хочешь одновременно активировать механизмы шторма и огня, чтобы уничтожить врагов на большой площади одним махом?"
        - "Звучит логично, но кого отправить управлять пультами?"

    - char: prinz_eugen_rad
      side: left
      status: is-yellow
      text:
        - "Не волнуйтесь, подходящие кандидатуры прямо перед вами."
        - "Я уже порядком вымоталась после всех этих сражений, да и Один не может воевать бесконечно."
        - "Сейчас мы можем обойти центральную зону и выйти к Симакадзэ. Вы оставайтесь здесь на разведке, а запуск механизмов предоставьте нам двоим — мы всё равно сейчас сидим без дела."

    - char: shimakaze
      side: right
      text:
        - "Госпожа Ойген, вы просто чудо! И госпожа Один тоже! Полагаюсь на вас!"
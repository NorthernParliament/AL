chapter1:
  rows:

    - char: shimakaze
      side: left
      text:
        - "Э?! Госпожа Кацураги, наши щиты исчезли!"

    - char: katsuragi
      side: right
      text:
        - "Похоже, у «тайных сокровищ», полученных от механизмов, есть ограничение по времени. Какая жалость…"
        - "Впрочем, мы уже вошли во внутреннее кольцо. Впереди должна быть последняя зона, преграждающая нам путь."
        - "Враги по‑прежнему слабы, и пока не видно ни огненного моря, ни гигантских волн, ни прочих странностей. Мы и без щитов спокойно прорвёмся."

    - char: shimakaze
      side: left
      text:
        - "Но, госпожа Кацураги, вам не кажется, что врагов что‑то многовато?.."

    - char: katsuragi
      side: right
      text:
        - "Сколько бы ни было таких слабых противников, количество не перейдёт в качество. Смотри, я сейчас расчищу путь бомбардировщиками — это будет проще простого!"
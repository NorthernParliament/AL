chapter1:
  rows:

    - char: kaga
      side: left
      text:
        - "Сестрица, что ты думаешь о приглашении, которое прислала Железная Кровь?"

    - char: akagi
      side: right
      text:
        - "Ты об этом приглашении посетить их плавучую крепость?"
        - "Говорят, это в качестве ответного жеста за наше приглашение на фестиваль Тену Укедо… хи-хи-хи."
        - "Взаимность — это, конечно, хорошо, да и мне самой весьма интересны практические наработки Железной Крови по созданию плавучих баз."
        - "Проблема лишь в том, что время выбрано крайне неудачно."

    - char: kaga
      side: left
      text:
        - "Верно… Мы находимся в порту Дакар, далеко от дома, и в ближайшее время вернуться никак не сможем."
        - "Кто бы мог подумать, что Лазурный Путь воспользуется тем, что мы встали на ремонт, и захватит центральный сектор…!"

    - char: akagi
      side: right
      text:
        - "Да ладно, ладно~ То, что мы не успели первыми войти в центральный сектор, конечно, досадно, но это лишь небольшая неудача в нашей текущей экспедиции."
        - "Мы не вернемся назад, пока не добьемся своей цели."

    - char: kaga
      side: left
      text:
        - "Слушаюсь, сестрица. Значит, приглашение Железной Крови все-таки стоит отклонить?"

    - char: akagi
      side: right
      text:
        - "Отклонить любезное приглашение союзников было бы невежливо, так что лучше будет дать согласие."

    - char: kaga
      side: left
      text:
        - "Но ведь дипломатические визиты флота обычно входят в сферу твоих обязанностей…"

    - char: akagi
      side: right
      text:
        - "В этот раз придется отправить кого-то другого~ В конце концов, это всего лишь формальный ответный визит."
        - "Есть у вас какие-нибудь предложения по кандидатурам?"

    - char: kaga
      side: left
      text:
        - "Если ни ты, ни я поехать не можем… Как насчет Ямато?"
        - "Ямато занимает высокое положение и является флагманом Объединенного флота, так что, на мой взгляд, она вполне подходит на роль представителя."

    - char: akagi
      side: right
      text:
        - "Подходит-то она подходит, но даже слишком… Такое мелкое дело не стоит того, чтобы беспокоить саму Ямато."

    - char: kaga
      side: left
      text:
        - "Тогда, может, Мусаси? Будучи столь же благородной представительницей класса «Ямато», Мусаси своими достоинством и силой вполне способна справиться с дипломатическим визитом."

    - char: akagi
      side: right
      text:
        - "Мусаси сейчас отвечает за множество мелких дел нашей экспедиции в тылу, отвлечение её от обязанностей повлияет на наши дальнейшие действия."

    - char: yamashiro
      side: left
      text:
        - "У-у меня есть предложение! Как насчет того, чтобы отправить ветерана Микасу?!"

    - char: akagi
      side: right
      text:
        - "…Ты хоть немного подумала, прежде чем это сказать? Зачем впутывать сюда ветерана?!"
        - "Даже сейчас, находясь в отставке, она доставляет нам столько хлопот, а если дать ей официальную должность…"

    - char: yamashiro
      side: left
      text:
        - "Э-хе-хе… Тогда, может быть…"

    - char: akagi
      side: right
      text:
        - "Нагато тоже не пойдет! Ты ведь просто предлагаешь заменить одно лицо на другое ища их в новом Объединенном флоте Сакуры…"

    - char: yamashiro
      side: left
      text:
        - "А?! Откуда ты узнала, что я хотела предложить госпожу Нагато?!"

    - char: akagi
      side: right
      text:
        - "Пожалуй, тебе лучше пока помолчать…"

    - char: jintsuu
      side: left
      text:
        - "Акаги, а что ты думаешь о госпоже Синано?"
        - "Помимо высокого статуса, госпожа Синано обладает проницательностью. Возможно, эта поездка позволит ей раздобыть какие-нибудь неожиданные сведения."

    - char: akagi
      side: right
      text:
        - "Синано, значит… Сейчас она действительно отдыхает на главном острове, обязанностей у неё немного, и к тому же… Хм, пусть едет Синано..."
        - "Я распоряжусь, чтобы штаб отдал приказ, а детали выполнения поручим Мусаси."
        - "Ну а мы… хи-хи~ Пора бы уже начинать наш следующий шаг."

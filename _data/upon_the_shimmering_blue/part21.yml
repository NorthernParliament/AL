chapter1:
  rows:

    - char: prinz_eugen
      side: left
      status: is-yellow
      text:
        - "Один, ты готова?"

    - char: odin
      side: right
      status: is-yellow
      text:
        - "Оружие решающего боя — Копьё Всеотца. Зарядка завершена."
        - "Пронзи же всё… Гунгнир!"

chapter2:
  rows:

    - text:
      - "Без всякого предупреждения прямо перед Один возник массивный луч света. Проносясь над самой поверхностью воды, он устремился прямиком к далёким врагам."
      - "Ослепительный блеск луча, казалось, пронзал веки, насильно выжигая на сетчатке яркий белый свет."
      - "Ударная волна, вызванная атакой, подняла огромные волны, из‑за которых было почти невозможно удержать равновесие."
      - "Когда зрение наконец вернулось к присутствующим, от огромного флота противника, ещё недавно преграждавшего путь, не осталось и следа."

    - char: odin
      side: right
      status: is-yellow
      text:
        - "Атака завершена. Принц Ойген, прошу подтвердить результат боя."

    - char: prinz_eugen
      side: left
      status: is-yellow
      text:
        - "Результат подтверждён. Отличная работа, Один."
        - "Ну вот~ Теперь путь впереди свободен, продолжаем движение."
        - "…Э‑э, вы чего это?.."

    - char: yura
      side: right
      text:
        - "Это было похоже на торнадо Великого Тэнгу…"

    - char: suruga
      side: left
      text:
        - "Что это была за атака сейчас?.. Эта невообразимая ударная волна… Она правда была выпущена из корабельного снаряжения?!"
        - "Госпожа Один точно такая же «корабль», как и мы?!"

    - char: prinz_eugen
      side: right
      status: is-yellow
      text:
        - "Хотя в деталях есть различия, я считаю, что Один — такая же «корабль», как и мы."

    - char: chikuma
      side: left
      text:
        - "«Корабль‑прототип»… Верно?"

    - char: prinz_eugen
      side: right
      status: is-yellow
      text:
        - "А ты неплохо собираешь информацию~ Всё верно, Один — та, кого называют кораблём‑прототипом."
        - "Раз вы уже об этом знали, не стоит так удивляться."

    - char: chikuma
      side: left
      text:
        - "Одно дело — сухие данные из отчётов, и совсем другое — увидеть это воочию впервые…"
        - "Когда эти сведения долетели до нас из Африки, я ещё сомневалась, не преувеличены ли они… Теперь я вижу, что главной проблемой тех отчётов было недостаточное описание!"

    - char: prinz_eugen
      side: right
      status: is-yellow
      text:
        - "Ну‑ну, полно вам~ Враги хоть и зачищены, но механизмы всё ещё работают. Если оставить их как есть, противник может появиться снова."
        - "Один больше не сможет открыть такой огонь, так что давайте сначала разберёмся с механизмом~"
chapter1:
  rows:

    - text:
      - "После двух полных залпов барьер здания был разрушен. Похоже, здешняя печать оказалась не прочнее той, что стояла на серийных моделях."
      - "Когда дым рассеялся, перед взором присутствующих предстали…"

    - char: chikuma
      side: left
      text:
        - "Ты… Принц Ойген из Железной Крови?"

    - char: prinz_eugen
      side: right
      status: is-yellow
      text:
        - "О~ Союзники из Империи Сакуры. Не ожидала, что мы встретимся при таких обстоятельствах."
        - "Ваше спасение было очень своевременным. Я уж думала, что застряну в той странной комнате до скончания веков."

    - char: chikuma
      side: left
      text:
        - " Мы просто проходили мимо во время выполнения боевой задачи. Не думали, что случайно услышим ваши крики о помощи."
        - "А кто эта леди позади вас?"

    - char: odin
      side: right
      status: is-yellow
      text:
        - "........."

    - char: prinz_eugen
      side: left
      status: is-yellow
      text:
        - "Её зовут Один. Можете не обращать на неё внимания, считайте её моей помощницей."

    - char: odin
      side: right
      status: is-yellow
      text:
        - "........."

    - char: chikuma
      side: left
      text:
        - "Госпожа Один… весьма немногословна, ха‑ха."
        - "Как же вы двое оказались здесь заперты?"

    - char: prinz_eugen
      side: right
      status: is-yellow
      text:
        - "Хороший вопрос. И как же мы здесь оказались?.."

    - char: suruga
      side: left
      text:
        - "(Не задавай встречные вопросы о собственных делах…!)"

    - char: shimakaze_rad
      side: right
      text:
        - "Госпожа Тикума, госпожа Суруга! Мы столкнулись с новой ловушкой… Ой??"
        - "Это же госпожа Принц Ойген! Вы тоже оказались в ловушке, потому что вас заманили сюда красоты Дворца Дракона?!"

    - char: prinz_eugen
      side: left
      status: is-yellow
      text:
        - "Ах… Я вспомнила. Да, именно так всё и было."
        - "Изначально мы были флотом сопровождения, вышедшим заранее, чтобы встретить вас. Вскоре после выхода с базы мы обнаружили этот странный комплекс плавучих островов."
        - "Мы решили провести небольшую разведку, чтобы устранить потенциальные угрозы безопасности, но никак не ожидали, что окажемся в плену у этих механизмов."
        - "Если бы мы не встретили вас здесь, нам пришлось бы худо~"

    - char: suruga
      side: right
      text:
        - "(Этот непринуждённый вид… Определённо, она только что выдумала это оправдание!)"

    - char: shimakaze_rad
      side: left
      text:
        - "Ну надо же! Если бы мы по чистой случайности тоже не оказались здесь заперты, ваше положение было бы плачевным!"
        - "Но теперь всё в порядке~ Не волнуйтесь, надёжная госпожа Тикума и госпожа Суруга обязательно выведут нас из этой передряги!"

    - char: prinz_eugen
      side: right
      status: is-yellow
      text:
        - "Что ж, это отличные новости. Я просидела взаперти так долго, что у меня уже начала развиваться клаустрофобия…"

    - char: chikuma
      side: left
      text:
        - "Принц Ойген, раз вы оказались здесь раньше нас, это доказывает, что Дворец Дракона как минимум дважды погружался и всплывал."
        - "Удалось ли вам за это время собрать какие‑нибудь сведения о Дворце? Подойдёт любая информация."

    - char: prinz_eugen
      side: right
      status: is-yellow
      text:
        - "Если вкратце, я абсолютно уверена, что это механизм Сирен."
        - "Помимо флота Сирен, который мы видели по пути, само существование этой гигантской плавучей крепости служит доказательством."
        - "Железная Кровь сама занимается исследованиями плавучих крепостей, поэтому я прекрасно понимаю: сейчас ни одна фракция не обладает возможностями создать объект такого масштаба."
        - "Это лишь предположение, но я считаю, что ядро управления этой круглой крепостью находится в самой высокой башне в центре внутреннего кольца."
        - "Если мы доберёмся туда, возможно, найдём способ выбраться."

    - char: shimakaze_rad
      side: left
      text:
        - "Когда мы только вошли, таинственный голос сказал нечто похожее! Говорил про сокровища врага в центре и про путь домой!"

    - char: suruga
      side: right
      text:
        - "У меня вопрос… С учётом Принца Ойген, в этой акватории пропали уже три флота."
        - "И Железная Кровь, и Империя Сакуры наверняка уже разворачивают поисковые операции. Не будет ли надёжнее просто подождать помощи здесь?"

    - char: chikuma
      side: left
      text:
        - "Проблема в том, что у них нет информации о нашем погружении под воду вместе с Дворцом Дракона… Найти нас, просто прочёсывая поверхность моря, будет крайне сложно."

    - char: prinz_eugen
      side: right
      status: is-yellow
      text:
        - "Именно~ Если мы не взломаем механизм изнутри и не заставим Дворец Дракона всплыть, мы рискуем остаться здесь на всю жизнь."

    - char: shimakaze_rad
      side: left
      text:
        - "Госпожа Суруга! Мы сможем преодолеть нынешние трудности только собственными усилиями!"
        - "Взбодритесь! Наша соревновательная гонка по Дворцу Дракона всё ещё продолжается!"

    - char: suruga
      side: right
      text:
        - "Есть… Всем сосредоточить огонь, продолжаем зачистку!"
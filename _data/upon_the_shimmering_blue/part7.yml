chapter1:
  rows:

    - text:
      - "После продолжительной и сильной тряски Дворец Дракона наконец перестал погружаться."

    - char: chikuma
      side: left
      text:
        - "Э?! По‑погружается?! Разве не будет катастрофой, если он уйдёт под воду?!"

    - char: suruga
      side: right
      text:
        - "Хорошо, что качество барьера оказалось высоким: внутрь не просочилось ни капли воды, так что мы в относительной безопасности!"
        - "(Не было бы счастья, да несчастье помогло.)"

    - char: chikuma
      side: left
      text:
        - "Связь с внешним миром полностью оборвалась. Юра, ты думаешь, этот барьер — некая разновидность Зеркального моря?"

    - char: yura
      side: right
      text:
        - "Хм… Скорее всего, это просто обычный барьер, ничем не отличающийся от тех, что мы устанавливаем на главном острове Сакуры…"

    - char: chikuma
      side: left
      text:
        - "Никогда не слышала о барьерах, способных работать под водой. Неужели это улучшенная версия разработок Сирен… Интригует."
        - "Значит, связь прервалась просто из‑за того, что мы опустились слишком глубоко под воду."

    - char: shimakaze_rad
      side: right
      text:
        - "Госпожа Тикума, госпожа Юра, госпожа Суруга! Кто‑нибудь меня слышит?"

    - char: chikuma
      side: left
      text:
        - "На связи Тикума. Вы все в порядке?"

    - char: shimakaze_rad
      side: right
      text:
        - "Да, с нами всё хорошо! Что нам делать дальше?"

    - char: chikuma
      side: left
      text:
        - " Раз связь прервана, полагаться придётся только на себя. Раз Дворец Дракона смог опуститься, значит, должен быть способ и подняться обратно."
        - "Для начала давайте объединимся. Дворец Дракона запечатан барьером, придётся искать путь и пробираться изнутри."
        - " Хорошо хоть, разведывательные самолёты работают исправно, хотя за пределы барьера им и не вылететь…"

    - char: katsuragi_rad
      side: right
      text:
        - "Мои палубные самолёты тоже работают нормально!"

    - char: chikuma
      side: left
      text:
        - "Отлично, значит, разведывательных сил у нас предостаточно. Предлагаю назначить точку сбора в…"

    - char: mystery_voice
      side: right
      status: is-yellow
      text:
        - "«В центре»."
        - "«В центре Дворца Дракона скрыты тайны и сокровища»."
        - "«Центр Дворца Дракона откроет путь домой»."
        - "«Путник, достигший сих мест, преодолей ловушки и иди вперёд»."
        - "«Центр Дворца Дракона готовит героям заслуженную награду»."

    - char: shimakaze_rad
      side: left
      text:
        - "Понятно! Значит, собираемся в центральном секторе! Симакадзэ всё поняла!"

    - char: katsuragi_rad
      side: right
      text:
        - "Как я и предполагала, в центральном секторе действительно что‑то спрятано!"

    - char: yamakaze_rad
      side: left
      text:
        - "Экспедиция во Дворец Дракона продолжается~!"

    - char: chikuma
      side: right
      text:
        - "Вижу, у всех единое мнение… Высокое здание в центре, возможно, является башней управления всем городом — там действительно может быть способ выбраться. Тогда встретимся в центре."

    - char: suruga
      side: left
      text:
        - "(Нет, это же определённо подозрительно! В нашем канале связи только что прозвучал какой‑то сомнительный таинственный голос — вы не заметили?!)"

    - char: shimakaze_rad
      side: right
      text:
        - " Госпожа Суруга! Выпал отличный шанс! Давайте устроим соревнование: чей отряд быстрее доберётся до центра!"

    - char: suruga
      side: left
      text:
        - "Категорически нет."

    - char: shimakaze_rad
      side: right
      text:
        - "Э‑э~~~~~?!"

    - char: chikuma
      side: left
      text:
        - "Не будь такой серьёзной, Суруга. Фарватер выглядит подходящим — почему бы не устроить маленькое состязание? Если это поможет сэкономить время, мы встретимся раньше."

    - char: suruga
      side: right
      text:
        - "Раз уж ты так говоришь, то ладно… Но тогда ты берёшь командование на себя!"

    - char: chikuma
      side: left
      text:
        - "Договорились~"

    - char: shimakaze_rad
      side: right
      text:
        - "Отлично~ Тогда мой отряд — команда Симакадзэ! Всем слушать приказ: полный вперёд!"

    - char: katsuragi_rad
      side: left
      text:
        - "Полный вперёд!"

    - char: yamakaze_rad
      side: left
      text:
        - "Полный вперёд!"

    - char: umikaze_rad
      side: right
      text:
        - "По‑полный вперёд!"

    - char: chikuma
      side: left
      text:
        - "Отряд Тикумы! Все, полный вперёд~!"
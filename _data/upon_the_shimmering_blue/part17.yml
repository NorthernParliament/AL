chapter1:
  rows:

    - char: nagato_rad
      side: left
      text:
        - "Неужели даже Тикума и остальные, отправившиеся на подмогу, бесследно исчезли?! Хм… Это действительно серьёзное происшествие."

    - char: mikasa_rad
      side: right
      text:
        - "Тот Дворец Дракона и правда полностью испарился?"

    - char: shinano
      side: left
      text:
        - "Именно так. Последующая разведка не обнаружила никаких следов его существования."
        - "Ответ от Железной Крови подтверждает это — они также не зафиксировали ни одной похожей цели."

    - char: mikasa_rad
      side: right
      text:
        - "Подумать только, что с делегацией могло такое случиться… Весьма неудачное начало похода."

    - char: nagato_rad
      side: left
      text:
        - "Ты связалась с нами, потому что хочешь запросить подкрепление с главного острова?"

    - char: shinano
      side: right
      text:
        - "Вовсе нет. Раз это место зовётся Дворцом Дракона, возможно, оно лишь временно погрузилось под воду."
        - "Я верю, что Симакадзэ и остальные смогут благополучно разрешить этот кризис. Я связалась с вами, чтобы обсудить другой вопрос."
        - "Сегодня я видела сон. Сон о Командире Лазурного Пути."
        - "Проснувшись, я ознакомилась с досье Командира."
        - "Период после его вступления в войну описан очень подробно, однако всё, что касается времени до этого, — сплошное белое пятно."
        - "Учитывая эффективность нашей разведки, подобные пробелы недопустимы. Вам что‑нибудь известно об этом?"

    - char: nagato_rad
      side: left
      text:
        - "Прошу прощения… Я долгое время была запечатана в Священном Древе и не слишком осведомлена о таких вещах."

    - char: mikasa_rad
      side: right
      text:
        - "Сведения о жизни Командира до войны, говоришь… Пожалуй, я кое‑что знаю."
        - "Вы в курсе, что при штабе Лазурного Пути есть находящаяся в прямом подчинении военная академия?"

    - char: shinano
      side: left
      text:
        - "Слышала об этом из донесений, но без подробностей…"

    - char: nagato_rad
      side: right
      text:
        - "Я припоминаю. Давным‑давно я одобрила запрос на дальний поход для инспекционной группы Империи Сакуры. Но в то время это, кажется, не было военной академией?"

    - char: mikasa_rad
      side: left
      text:
        - "Да, ты не ошиблась. Тогда это ещё был Научно‑исследовательский институт Кубов Мудрости при Лазурном Пути. В основном там проводились профильные исследования и обучение специалистов для работы в этой сфере."
        - "Хоть там и было немало моментов, связанных с военными технологиями, по сути, это было просто исследовательское учреждение."
        - "В то время мы не только осматривали институт, но и провели там немало испытаний характеристик нашего снаряжения."

    - char: nagato_rad
      side: right
      text:
        - "Хм? Ты тоже была в составе той инспекционной группы?"

    - char: mikasa_rad
      side: left
      text:
        - "Скорее уж я сама её и возглавляла. Это было весьма любопытное путешествие."

    - char: nagato_rad
      side: right
      text:
        - "Прости. В то время я совершенно не уделяла внимания подобным вещам…"

    - char: mikasa_rad
      side: left
      text:
        - "Не бери в голову~ Прошлое осталось в прошлом."
        - "Помимо того официального визита, я ещё несколько раз бывала там проездом — уже после ухода в отставку."
        - "Примерно в то же время, когда исследовательский институт был преобразован в военную академию, произошло одно событие, вызвавшее тогда бурные обсуждения."
        - "Говорили, что во время плановой проверки штаб обнаружил человека с невероятно высокой совместимостью с Кубами Мудрости..."

    - char: shinano
      side: right
      text:
        - "Об этом инциденте я тоже не встречала упоминаний в документах…"

    - char: mikasa_rad
      side: left
      text:
        - "Да, и по какой‑то причине эта сенсационная новость позже просто испарилась."
        - "Когда я вспомнила об этом, то даже специально пыталась навести справки, но после изучения кипы документов начало казаться, будто моя собственная память подводит меня."
        - "Конечно, я уверена в своей памяти, так что вывод напрашивается только один — информацию о том инциденте намеренно скрыли в мировом масштабе."

    - char: nagato_rad
      side: right
      text:
        - "Ты считаешь, что эти две вещи связаны?"

    - char: mikasa_rad
      side: left
      text:
        - "Сложно сказать… Но разве это не похоже на ситуацию с прошлым Командира, записи о котором тоже были намеренно стёрты?"
        - "Тем более, у Командира в послужном списке как раз значится обучение в той самой военной академии…"

    - char: kasumi
      side: right
      text:
        - "Госпожа Синано, прошу прощения, что прерываю вас…"
        - " На связь вышла Петер Штрассер, ответственная за плавучую крепость Железной Крови. Она хочет уточнить детали стыковки флота."

    - char: shinano
      side: left
      text:
        - "Я поняла."

    - char: mikasa_rad
      side: right
      text:
        - " Что ж, иди занимайся делами — поболтать мы сможем в любое время. Благодаря «особой заботе» Акаги, мы с Нагато в последнее время на редкость свободны~"

    - char: shinano
      side: left
      text:
        - "У меня остался последний вопрос… Микаса, ты видела Командира вживую?"

    - char: mikasa_rad
      side: right
      text:
        - "Нет. В те годы, когда я активно бороздила моря, Командир ещё не ступил на поле боя~"
        - "Но ходят слухи, что сейчас он дислоцирован в порту PH «Союза Орла». Мы все находимся в одном океане, так что рано или поздно день нашей встречи настанет~"

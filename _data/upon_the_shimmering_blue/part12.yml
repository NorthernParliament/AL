chapter1:
  rows:

    - char: yura
      side: left
      text:
        - "Какие здесь красивые виды… Словно мы и правда попали во Дворец Дракона из легенды об Урасиме Таро."

    - char: chikuma
      side: right
      text:
        - "Верно. Даже на главном острове Сакуры нет настолько изысканных и масштабных комплексов плавучих зданий."
        - "Если бы госпожа Мусаси увидела этот Дворец Дракона, он бы ей наверняка очень понравился."

    - char: yura
      side: left
      text:
        - "М‑м… Да, это определённо тот тип мест, которые пришлись бы ей по душе."
        - "Только вот… В легенде об Урасиме Таро во Дворце Дракона не было никаких механизмов."
        - "Бушующие волны и штормовой ветер, созданные механизмом…"

    - char: chikuma
      side: right
      text:
        - "У тебя есть какие‑нибудь догадки?"

    - char: yura
      side: left
      text:
        - "…Мне кажется, я о чём‑то догадалась, но в то же время как будто и нет…"

    - char: chikuma
      side: right
      text:
        - "Недостаточно данных, значит… Нужно собрать больше информации."
        - " О? А вот и они~ Похоже, мои разведывательные самолёты обнаружили кое‑каких любопытных противников~"
        - "Всем внимание! Впереди наконец‑то появились механизмы, преграждающие нам путь!"

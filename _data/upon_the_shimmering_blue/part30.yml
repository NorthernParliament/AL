chapter1:
  rows:

    - char: shimakaze
      side: left
      text:
        - "А это тот самый механизм, с которым столкнулась госпожа Суруга, — он создаёт особые защитные барьеры…"
        - "Если получится его включить, все смогут лучше защитить себя в бою!"

    - char: mystery_voice
      side: right
      status: is-yellow
      text:
        - "«Следующий вопрос…»"
        - "«Кто такие товарищи, и что они значат? Это Акаги? Или Новый Объединённый флот Империи Сакуры?»"

    - char: shimakaze
      side: left
      text:
        - "Ой, госпожа Таинственный голос, вы знаете даже про госпожу Акаги и Новый Объединённый флот Империи Сакуры?!"
        - "Хм… Искры, что летят между госпожой Акаги и великой наставницей Микасой, чувствует даже Симакадзэ."
        - "Но ведь это же нормально, когда у товарищей разные мнения!"
        - "Я глупенькая и не знаю, о чём думают госпожа Акаги, госпожа Микаса и многие другие."
        - "Но я уверена: и твёрдость в убеждениях, и разногласия существуют именно потому, что им всем не всё равно!"
        - "Я считаю, что мы все — товарищи!"

    - char: mystery_voice
      side: right
      status: is-yellow
      text:
        - "«Раз так… Тайное сокровище твёрдого камня преподносится герою. Продолжай свой путь»."

    - char: shimakaze
      side: left
      text:
        - "Спасибо! Увидимся у следующего пульта управления~"
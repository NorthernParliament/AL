chapter1:
  rows:

    - text:
      - "После того как Симакадзэ прикрыли для отхода, битва продолжилась с неослабевающей яростью."

    - char: katsuragi
      side: left
      text:
        - "Оснастка этой Хакурю… Очевидно же, что она авианосец!"
        - "…Но почему при этом её мощь настолько запредельная, хотя мы с ней одного класса?!"

    - char: chikuma
      side: right
      text:
        - "Не перенапрягайся, Кацураги! Это не тот враг, с которым можно справиться в одиночку."

    - char: umikaze
      side: left
      text:
        - "Эм… Большое вам спасибо, госпожа Принц Ойген. Вы защищаете нас с Ямакадзэ с самого начала боя…"

    - char: prinz_eugen
      side: right
      status: is-yellow
      text:
        - "Пустяки. Я просто не вынесу вида раненых милых девушек."
        - "И пусть я вымотана и в плане атаки от меня сейчас мало толку, в обороне я ещё могу немного поднапрячься!"
        - "В конце концов, ситуация сейчас на грани жизни и смерти, так что мне, так или иначе, стоит приложить усилия."

    - char: suruga
      side: left
      text:
        - "(Какое ещё «поднапрячься»… На фестивале ты против Носиро совсем не так сражалась!)"
        - "(…А эта Один вообще больше ни разу не выстрелила из главного калибра. Да что не так с этими людьми из Железной Крови, у них вообще нет чувства опасности?!)"
        - "(Подождите, если так пойдёт и дальше, то я останусь единственным линкором… Получается, вся огневая мощь флота теперь только на мне?!)"

    - char: chikuma
      side: right
      text:
        - "Всем сосредоточиться на ПВО, не спешите победить."
        - "Нужно затянуть бой как можно дольше, пока Симакадзэ не активирует механизмы!"

chapter2:
  rows:

    - char: chikuma
      side: right
      text:
        - "Есть! Симакадзэ запустила первый механизм!"
        - "Вот оно что… Для врагов это означало бесконечное число, а для нас обернулось восстановлением повреждений."
        - "С такой поддержкой мы продержимся. Отличная работа, Симакадзэ!"

    - char: katsuragi
      side: left
      text:
        - "Послушай, Хакурю… Твои самолёты — это же определённо модели Империи Сакуры!"
        - "И одежда твоя очень похожа на нашу… Почему же ты заодно с Сиренами и преграждаешь нам путь?!"

    - char: hakuryuu
      side: right
      status: is-red
      text:
        - "Я с самого начала не понимаю, о каких «Сакуре» и «Сиренах» вы твердите."
        - "Сколько я себя помню, я охраняю этот Дворец Дракона. Уничтожение таких захватчиков, как вы — цель моего существования."
        - "Вижу, вы решили использовать механизмы Дворца… Хм, и вы думаете, этого достаточно, чтобы остановить меня?"
        - "Раз вы начали восстанавливаться, значит, мои атаки должны стать ещё яростнее! Ловите!"

chapter3:
  rows:

    - char: yamakaze
      side: left
      text:
        - "Барьер активирован! Бе‑бе‑бе~ Твои атаки нас больше не берут, Хакурю!"

    - char: hakuryuu
      side: right
      status: is-red
      text:
        - "Жалкие трюки."

    - char: chikuma
      side: left
      text:
        - "Судя по всему, ты не Сирена и даже не их «пешка». Почему ты так настаиваешь на битве с нами?"
        - "Обладая такими выдающимися навыками… Вместо того чтобы сражаться здесь, ты могла бы свободно бороздить бескрайние просторы океана снаружи!"

    - char: hakuryuu
      side: right
      status: is-red
      text:
        - "Излишние слова. Я — та, кто охраняет это место. Перед лицом незваных гостей это и есть моё поле боя!"
        - "Рин. Пё. То. Ся. Кай. Дзин. Рэцу. Дзай. Дзэн!"

    - char: suruga
      side: left
      text:
        - "Осторожно! Структура её оснастки меняется!"

    - char: katsuragi
      side: right
      text:
        - "Да вы‑вы‑вы шутите?! Она же авианосец! Откуда у неё эти два чудовищных орудия?!!"

    - char: suruga
      side: left
      text:
        - "Всем приготовиться, сейчас начнётся обстрел…!"

chapter4:
  rows:

    - char: umikaze
      side: left
      text:
        - "Появилось топливо, поверхность моря объята пламенем…"

    - char: yamakaze
      side: right
      text:
        - "Нам внутри щита всё нипочём, а вот Хакурю придётся несладко~"

    - char: hakuryuu
      side: left
      status: is-red
      text:
        - "Тц…"

    - char: yura
      side: right
      text:
        - "Смотрите, Хакурю наконец‑то начала маневрировать для уклонения…"

    - char: chikuma
      side: left
      text:
        - "Послушай, Хакурю, за время нашей схватки ты не заметила ничего странного? Например, в конструкции твоего вооружения…"

    - char: katsuragi
      side: right
      text:
        - " Точно! Особенно палубная авиация — ты ведь, как и я, используешь технику заклинаний‑офуда?!"

    - char: chikuma
      side: left
      text:
        - " Вдобавок к твоему странному поведению… Хакурю, ты ведь не помнишь ничего о своём прошлом, верно?"

    - char: hakuryuu
      side: right
      status: is-red
      text:
        - "Потеря памяти… Если подумать, у меня и правда нет воспоминаний о том, что было до Дворца Дракона."
        - "Но это всё равно не доказывает мою связь с этой вашей «Империей Сакуры»."
        - "Одной лишь пустой болтовнёй вы здесь не пройдёте. Покажите мне силу, достойную моего признания!"

chapter5:
  rows:

    - char: shimakaze
      side: left
      text:
        - "Я наконец‑то вернулась! Все ещё держатся?!"

    - char: suruga
      side: right
      text:
        - "Никогда не думала, что буду так рада тебя видеть, но да — благодаря этим механизмам бой стал куда более предсказуемым!"
        - "(Более того, кажется, Хакурю слабеет каждый раз, когда обращается к силе Дворца Дракона… Точь‑в‑точь как Один…)"
        - "(Чёрт бы их побрал! Они всё это знали, но и пальцем не пошевелили, чтобы помочь!)"

    - char: chikuma
      side: left
      text:
        - "Пользуйтесь преимуществом! Потерпите ещё немного, все вместе…!"

chapter6:
  rows:

    - text:
      - "КА‑БУМ!"

    - char: shimakaze
      side: left
      text:
        - "Победа за нами!"

    - char: hakuryuu
      side: right
      status: is-red
      text:
        - "Меня теснят…?! Невозможно!"
        - "Не смейте меня недооценивать! С силой Дворца Дракона, текущей во мне, и с этим клинком в руках… я раздавлю вас как букашек!"
        - "Но на всякий случай! Чисто на случай, если вам каким‑то чудом удастся победить, я сдержу свою часть сделки и позволю вам уйти!"

    - char: chikuma
      side: left
      text:
        - "А как насчёт устройства управления и «сокровища»?"

    - char: hakuryuu
      side: right
      status: is-red
      text:
        - "Я бы и не против, но… как я должна отдать вам то, чего у меня нет?"

    - char: chikuma
      side: left
      text:
        - "Всё просто. Раз ты — хозяйка Дворца Дракона… значит, мы заберём тебя."

    - char: hakuryuu
      side: right
      status: is-red
      text:
        - "Что?"
        - "Ну, неважно. Если сможете меня одолеть — забирайте что хотите."

    - char: prinz_eugen
      side: left
      status: is-yellow
      text:
        - "В таком случае, чур всё исследовательское оборудование моё~"

    - char: suruga
      side: right
      text:
        - "(Ого, как быстро слетает маска, когда речь заходит о сокровищах…)"

    - char: chikuma
      side: left
      text:
        - "Хочешь что‑нибудь добавить, Симакадзэ? Хакурю сказала, что честно исполнит условия сделки."

    - char: shimakaze
      side: right
      text:
        - "Вот оно как! В таком случае…"

chapter7:
  rows:

    - char: hakuryuu
      side: right
      status: is-red
      text:
        - "Чего же ты хочешь, мелюзга?"

    - char: shimakaze
      side: left
      text:
        - "То, чего я хочу…"
        - "Это то же самое, что предложила госпожа Тикума! Нам нужна ты, Хакурю!"
        - "И не просто как страж Дворца Дракона! Я хочу, чтобы ты вернулась с нами в Империю Сакуры и стала нашим другом!"

    - char: hakuryuu
      side: right
      status: is-red
      text:
        - "Что за глупые несбыточные мечты… Пока в моих руках этот клинок, я ни перед кем не склоню голову!"

    - char: shimakaze
      side: left
      text:
        - "Склонять голову? В этом нет нужды! Мы все станем друзьями благодаря взаимному доверию и пониманию!"

    - char: hakuryuu
      side: right
      status: is-red
      text:
        - "Доверию… и пониманию?"

    - char: shimakaze
      side: left
      text:
        - "Ты всё правильно слышала! Разве не гораздо веселее самой путешествовать и знакомиться с людьми, чем сидеть и ждать, пока они придут к тебе?"
        - "Всё всегда получается интереснее, когда мы делаем это вместе! Верно, госпожа Суруга?"

    - char: hakuryuu
      side: right
      status: is-red
      text:
        - "Обещание есть обещание. Если вы одолеете меня, я присоединюсь к вам."
        - "…То есть, предположим, что вы сможете меня одолеть!"
        - "Слушай внимательно, мелюзга. Пока я вооружена этим мечом, у вас нет ни шанса на победу!"

    - char: shimakaze
      side: left
      text:
        - "Я уже это поняла! А значит, мне нужно просто самой стать воплощением скорости и выбить этот меч у тебя из рук!"
        - "Вперёд, ребята! Госпожа Суруга!"

chapter1:
  rows:

    - char: chikuma
      side: left
      text:
        - "Согласно информации от Симакадзэ, стоит нам разрушить механизм, находящийся впереди, и печать над этой акваторией будет снята."
        - "Однако, чтобы уничтожить механизм, нужно сначала разобраться с невероятно прочными врагами, перекрывшими фарватер. А пока мы не устраним этих врагов, мы не сможем добраться до механизма, который находится позади них."
        - "Нам остаётся только концентрировать огонь и уничтожать их по одному, с трудом продвигаясь вперёд."

    - char: prinz_eugen
      side: right
      status: is-yellow
      text:
        - "Вот оно что… Эффективность, скажем прямо, так себе."

    - char: suruga
      side: left
      text:
        - "И у госпожи Принц Ойген, конечно же, есть более эффективный метод?"

    - char: prinz_eugen
      side: right
      status: is-yellow
      text:
        - "Ну, нельзя сказать, что его совсем нет~ На самом деле, пока я была в ловушке, я всё время готовилась к тому, чтобы пробить барьер."
        - "Раз уж вы меня спасли, то накопленные силы я, пожалуй, направлю на то, чтобы помочь нам выбраться из этого тупика."

    - char: chikuma
      side: left
      text:
        - "У тебя действительно есть план, как разорвать этот замкнутый круг? Пожалуйста, изложи детали."

    - char: prinz_eugen
      side: right
      status: is-yellow
      text:
        - "Чем тратить время на объяснения, я лучше сразу всё вам продемонстрирую~"
        - "Попрошу всех разойтись в стороны и освободить коридор для стрельбы Один."
        - " …Недостаточно. Ещё немного в стороны, ещё шире~"

    - char: yura
      side: left
      text:
        - "Такого расстояния хватит?.."

    - char: prinz_eugen
      side: right
      status: is-yellow
      text:
        - "Пожалуй, лучше ещё чуть подальше. Вот как Суруга, например — она выбрала отличную позицию."

    - char: suruga
      side: left
      text:
        - "Я просто держусь от тебя на таком же расстоянии, как и все остальные…!)"

    - char: chikuma
      side: right
      text:
        - "Зачем столько свободного пространства? Что именно ты задумала?.."

    - char: prinz_eugen
      side: left
      status: is-yellow
      text:
        - " Не спеши, госпожа Тикума, скоро сама всё увидишь."
        - " М‑м… На всякий случай, давайте‑ка разойдёмся ещё чуть подальше!"
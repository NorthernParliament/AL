chapter1:
  rows:

    - text:
      - "БУМ!"

    - char: yura
      side: left
      text:
        - "Эм… Кажется, в меня попали? Но я совсем не ранена…"

    - char: chikuma
      side: right
      text:
        - "Даже по меркам старых моделей огневая мощь этих врагов до нелепого слаба."
        - "Впрочем, мои атаки тоже не особо эффективны… Похоже, корпуса врагов защищены какими‑то особыми щитами."
        - "Суруга, у тебя тоже не получается?"

    - char: suruga
      side: left
      text:
        - "Урон крайне ограниченный… Эти враги невероятно крепкие!"

    - char: chikuma
      side: right
      text:
        - "Похоже, идти напролом — не лучшая идея… Я внимательно разведаю акваторию впереди и посмотрю, сможем ли мы найти путь в обход."

    - char: suruga
      side: left
      text:
        - "(Будь во главе отряда Симакадзэ, она бы наверняка выдала какую‑нибудь нелепость вроде: «Госпожа Суруга, давайте поднажмём и прорвёмся вместе!»)"
        - "(Но Тикума другая — она ценит анализ… Именно так и нужно воевать: тщательно собирать информацию, разрабатывать тактику и всё обдумывать!)"
        - "Ах~ Как же хорошо, что нами командует такая надёжная Тикума~"

    - char: chikuma
      side: right
      text:
        - "М‑м…? Суруга, ты что‑то сказала?"

    - char: suruga
      side: left
      text:
        - "(Ой, я слишком расслабилась!)"
        - "Я просто… Ну, я просто подумала, что ты очень надёжная, Тикума!"

    - char: chikuma
      side: right
      text:
        - "Ты мне льстишь~ По сравнению с тобой мне ещё во многом нужно совершенствоваться."
        - "Если хочешь, я в любой момент могу передать тебе место флагмана."

    - char: suruga
      side: left
      text:
        - "Нет‑нет, не нужно, пусть всё остаётся как есть! Не обращай внимания на детали, давай лучше искать путь вперёд!"
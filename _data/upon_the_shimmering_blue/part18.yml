chapter1:
  rows:

    - text:
      - "Сквозь непрекращающийся грохот орудий отряд Тикумы, прилагая все силы, с трудом пробивался вперёд."

    - char: yura
      side: left
      text:
        - "Суруга, это потрясающе… Даже враги, крепкие словно демоны‑черепахи, один за другим идут на дно."

    - char: chikuma
      side: right
      text:
        - "Сила новейшего линкора и правда впечатляет! Ты — настоящая элита нашей Империи Сакуры!"

    - char: suruga
      side: left
      text:
        - "Вы мне льстите… Мне ещё во многом нужно совершенствоваться."
        - "(Я сейчас умру от усталости… Умру, точно умру!)"
        - "(Ну пусть кто‑нибудь придёт и спасёт меня…)"

    - char: nop
      side: right
      status: is-yellow
      text:
        - "Э‑э‑эй~~~ Помогите кто‑нибудь! Спасите‑е‑е!"

    - char: chikuma
      side: left
      text:
        - "Слышите? Кто‑то зовёт на помощь!"

    - char: suruga
      side: right
      text:
        - "Э?! В этот раз я ничего не говорила! Честное слово, ни звука не издала!"

    - char: chikuma
      side: left
      text:
        - "…? Да я не про тебя. Прислушайся — кажется, неподалёку кто‑то кричит."
        - "Нашла! Голос доносится из того здания!"

    - char: yura
      side: right
      text:
        - "На здании видны следы барьера. Раз зовут на помощь, значит, их, скорее всего, заперли внутри каким‑то заклинанием…"

    - char: chikuma
      side: left
      text:
        - "Кто бы мог подумать, что здесь в ловушке оказался кто‑то, кроме нас."
        - "Всем перенести огонь! Готовимся к спасательной операции!"
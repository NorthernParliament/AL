chapter1:
  rows:

    - text:
      - "Симакадзэ, поддерживая высокую скорость, ловко продвигалась вперёд, используя серийные модели Сирен в качестве защиты."

    - char: shimakaze
      side: left
      text:
        - "Уклониться от гребня волны, затем рывок… И снова уклонение."
        - "Понятно… Весь секрет в чувстве ритма~ Похоже на сёрфинг с препятствиями!"

    - char: katsuragi_rad
      side: right
      text:
        - "Симакадзэ, впереди обнаружена аномальная зона, ты что-нибудь видишь?"

    - char: shimakaze
      side: left
      text:
        - "У‑ух… Вау! На островке впереди есть какое‑то светящееся здание!"

    - char: katsuragi_rad
      side: right
      text:
        - "Похоже, это и есть место, где находится механизм управления. Однако свечение — это, скорее всего, защитный барьер, так что разрушить его будет нелегко… М‑да."

    - char: shimakaze
      side: left
      text:
        - "Ничего! Симакадзэ приложит вдвое больше усилий!"

    - char: katsuragi_rad
      side: right
      text:
        - "Прежде чем прикладывать усилия, включи мозги! Такие задачи, как ни посмотри, должны выполнять тяжёлые авианосцы!"
        - "Оставь это моим палубным самолётам — и не подходи близко, пока я не закончу бомбардировку!"

    - char: shimakaze
      side: left
      text:
        - "По‑поняла! Госпожа Кацураги!"
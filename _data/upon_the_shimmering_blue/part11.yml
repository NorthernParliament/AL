chapter1:
  rows:

    - char: shimakaze_rad
      side: right
      text:
        - "…Короче говоря, всё было именно так."
        - "Вот что с нами только что приключилось, а мы уже начинаем прорыв к среднему ярусу~!"
        - "Вы там тоже будьте осторожны и поднажмите на скорость~ Симакадзэ связь закончила."

    - char: chikuma
      side: left
      text:
        - "«Занимается делами храма»… Пф. Похоже, Кацураги сгоряча наболтала эсминцам лишнего."

    - char: yura
      side: right
      text:
        - " Хотя это немного расходится с реальностью… Но Кацураги многому училась у меня в частном порядке — она очень усердна."
        - "Её знания и способности настоящие… Проблем не будет."

    - char: chikuma
      side: left
      text:
        - " Хотя в вопросах обращения с барьерами мы имеем преимущество, с точки зрения авиации мы проигрываем."
        - "Даже если действия внутри барьера ограничены, тяжёлый авианосец всё равно остаётся тяжёлым авианосцем…"
        - "Не ожидала, что отряд Симакадзэ будет двигаться так быстро — они уже преодолели ловушки и вошли в средний сектор."

    - char: suruga
      side: right
      text:
        - "Увидев такие огромные волны, можно было просто выбрать другой путь… А они пошли напролом."
        - "(Эта дурочка… Она и правда относится к гонке серьёзно. Пожалуй, тоже стоит немного поднапрячься!)"

    - char: chikuma
      side: left
      text:
        - "Не соглашусь. Отступать при виде трудностей нельзя~ Сейчас мы участвуем в гонке: если делать крюк, неизвестно, сколько времени это займёт."

    - char: suruga
      side: right
      text:
        - "Не думала, что ты действительно с таким энтузиазмом примешь участие в гонке Симакадзэ…"

    - char: chikuma
      side: left
      text:
        - "Ну, это же весело~ Если заниматься интересными делами с хорошим настроением, гораздо проще собрать интересную информацию."

    - char: suruga
      side: right
      text:
        - "(Заперты на морском дне, связь с внешним миром потеряна… Откуда у тебя берётся такое настроение?!)"

    - char: chikuma
      side: left
      text:
        - "Давайте тоже прибавим ходу. Интересно, какие ловушки ждут нас впереди~"

    - char: suruga
      side: right
      text:
        - "(И правда… Никакого энтузиазма! Да что угодно, лишь бы это поскорее закончилось…)"
chapter1:
  rows:

    - char: shimakaze
      side: left
      text:
        - "Изысканность зданий здесь ничуть не уступает внешнему кольцу, а то и превосходит его…"
        - "Госпожа Кацураги, неужели мы правда должны всё это уничтожить?"

    - char: katsuragi
      side: right
      text:
        - "Раз это ловушка, расставленная Сиренами, иного выхода у нас нет."

    - char: shimakaze
      side: left
      text:
        - "Такой прекрасный город… Жаль, что товарищи из Империи Сакуры его не увидят."
        - "Когда мы выберемся отсюда, я хочу обсудить это с госпожой Синано… Давайте возьмём здесь всё под контроль и оттащим к главному острову Сакуры!"

    - char: katsuragi
      side: right
      text:
        - "Ого, смелая затея… Но если нам это удастся, вся Империя будет смотреть на нас с благоговением, а?"
        - "Хо‑хо‑хо~ Тогда я стану «Великой госпожой Кацураги», а тебя будут звать «Великой госпожой Симакадзэ»!"

    - char: shimakaze
      side: left
      text:
        - "Э?! Госпожа Симакадзэ?! Такое обращение как‑то слишком…"

    - char: katsuragi
      side: right
      text:
        - "Хе‑хе, придёт день, и нас всех будут так величать, так что привыкай заранее~"

    - char: umikaze
      side: left
      text:
        - "Послушайте… А не случится ли так, что когда мы покинем Дворец Дракона, окажется, что снаружи прошли сотни лет, прямо как в легенде?.."

    - char: yamakaze
      side: right
      text:
        - "Да вряд ли… Здесь всё совсем не так, как в сказке. Ни тебе радушного приёма, ни роскошного пира — ничего из этого мы не видели!"

    - char: katsuragi
      side: left
      text:
        - "Ну, если считать за приём нападения врагов, то «радушная встреча» у нас всё‑таки была."
        - "Смотрите, впереди показался флот Сирен. Похоже, мы входим в новый сектор."

    - char: shimakaze
      side: right
      text:
        - "Интересно, какая хитроумная ловушка ждёт нас на этот раз!"

    - char: katsuragi
      side: left
      text:
        - "На первый взгляд ничего особенного… Наверное, достаточно, как и в прошлый раз, ударить по печати на механизме~"

    - char: shimakaze
      side: right
      text:
        - "Поняла. Симакадзэ, полный вперёд… Ой‑ой‑ой!"

    - text:
      - "Симакадзэ на полной скорости рванулась вперёд, но внезапно резко затормозила, будто наткнувшись на невидимое препятствие."

    - char: shimakaze
      side: right
      text:
        - "Уа‑а‑а‑а! Все быстро проверьте снаряжение — у кого‑то течёт топливо?!"

    - text:
      - "Впереди, на поверхности воды, которая под сиянием Дворца Дракона отливала глубокой синевой, невесть откуда появилось огромное количество плавающего мазута."

    - char: katsuragi
      side: left
      text:
        - "Утечка топлива? Да как такое возможно?!"
        - "И посмотри на количество… Оно же повсюду! Сколько бы у нас ни вытекло, столько просто не наберётся!"

    - char: yamakaze
      side: right
      text:
        - "Неужели это из серийных моделей врага течёт?!"

    - char: umikaze
      side: left
      text:
        - "Ой‑ой, на поверхности воды столько масла… Если появится открытый огонь, будет очень опасно…"

    - char: katsuragi
      side: right
      text:
        - "В общем, открывайте огонь осторожно. Если подожжём воду — нам конец!"
        - "Нет, лучше вообще не стреляйте… Просто прибавьте ходу и проскочим это место!"
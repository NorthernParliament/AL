chapter1:
  rows:

    - text:
      - "БУМ!"

    - char: suruga
      side: left
      text:
        - "Она в одиночку подавляет целый флот?! Этот враг невероятно силён!"

    - char: chikuma
      side: right
      text:
        - "Если мы сможем использовать в бою те механизмы, что встречались нам раньше, битва может стать немного легче."

    - char: suruga
      side: left
      text:
        - "И какой именно ты хочешь использовать?"

    - char: chikuma
      side: right
      text:
        - " Раз уж это решающая схватка, почему бы не попробовать активировать сразу все четыре?"

    - char: katsuragi
      side: left
      text:
        - "Ва‑а‑а~ Понятия не имею, что произойдёт, если включить всё разом, но мне тоже жутко интересно на это посмотреть!"

    - char: shimakaze
      side: right
      text:
        - "Время поджимает! Только моя скорость позволит активировать все четыре механизма в кратчайший срок. Пожалуйста, поручите это задание мне!"

    - char: suruga
      side: left
      text:
        - "Но…"

    - char: prinz_eugen
      side: right
      status: is-yellow
      text:
        - "Нужно больше доверять своим товарищам, Суруга. Симакадзэ, иди сюда, я объясню тебе ещё раз: вот так, вот эдак… и вот так…"

    - char: shimakaze
      side: left
      text:
        - "Благодарю, госпожа Принц Ойген… Теперь я всё окончательно поняла! Не волнуйтесь, предоставьте механизмы мне!"

    - char: suruga
      side: right
      text:
        - "Ладно, давай — одна нога здесь, другая там. И будь предельно осторожна."

    - char: shimakaze
      side: left
      text:
        - "Есть, Симакадзэ поняла!"
chapter1:
  rows:

    - char: katsuragi
      side: left
      text:
        - "Я полностью разведала окрестности с помощью палубной авиации — дальше движемся по этому водному пути!"

    - char: shimakaze
      side: right
      text:
        - "Госпожа Кацураги, вы так надёжны! С вами можно не бояться заблудиться — недаром вы тяжёлый авианосец!"

    - char: katsuragi
      side: left
      text:
        - " Хе‑хе~ Хотя у Тикумы тоже есть разведывательные самолёты, ей до меня, полноценного авианосца, ещё очень далеко!"

    - char: yamakaze
      side: right
      text:
        - "С врагами вокруг тоже легко справляемся: навстречу попадаются одни только устаревшие модели."
        - "О‑хо‑хо~ Ощущение, что это место заброшено, становится всё сильнее."

    - char: umikaze
      side: left
      text:
        - "Слушайте… А вам не кажется, что волны становятся всё ощутимее?"

    - char: shimakaze
      side: right
      text:
        - "Верно, я тоже это чувствую!"

    - char: katsuragi
      side: left
      text:
        - "Странно… Мы на морском дне, внутри защитного барьера — нет никаких причин для появления таких огромных волн."
        - "А, вспомнила! Тот таинственный голос что‑то говорил о «преодолении ловушек» и движении «вперёд», верно?"

    - char: shimakaze
      side: right
      text:
        - "Вот оно что! Значит, эти волны и есть ловушка? И если мы их преодолеем, то станем героями!"

    - char: yamakaze
      side: left
      text:
        - "Чувствую, как во мне разгорается азарт!"

    - char: shimakaze
      side: right
      text:
        - " И я тоже! Чувствую, что полна решимости!"

    - char: umikaze
      side: left
      text:
        - "Но при таких больших волнах… Как же мы пройдём?"

    - char: shimakaze
      side: right
      text:
        - " Нужно просто двигаться ещё быстрее!"
        - "Эти неуклюжие серийные противники нам не угроза — наоборот, они помогут нам утихомирить волны."
        - "Стоит только ловко маневрировать между ними, набирая скорость, — и мы обязательно прорвёмся!"

    - char: katsuragi
      side: left
      text:
        - "Звучит забавно~ Но это тактика только для таких юрких эсминцев, как вы. Мне с моей авиацией так не поступить."
        - "Но я обеспечу вам прикрытие с воздуха — огневую поддержку берите на себя!"

    - char: shimakaze
      side: right
      text:
        - "Большое спасибо, госпожа Кацураги!"
        - "Никакие бушующие волны не заставят меня остановиться! Симакадзэ скоро вернётся!"
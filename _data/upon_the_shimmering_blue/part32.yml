chapter1:
  rows:

    - char: mystery_voice
      side: right
      status: is-yellow
      text:
        - "«Это последний вопрос»."
        - "«Вопрос…»"
        - "«Если война закончится и наступит мир, что станет с кораблями, созданными как оружие?»"

    - char: shimakaze
      side: left
      text:
        - "Хм, я об этом как‑то никогда не задумывалась."
        - "Если наступит мир, может, я открою своё додзё или что‑то в этом роде? Мне это направление очень даже интересно~!"

    - char: mystery_voice
      side: right
      status: is-yellow
      text:
        - "«…Я спрашиваю не о тебе лично. Если сражений больше не будет, что станет с самим существованием девушек-кораблей?»"

    - char: shimakaze
      side: left
      text:
        - "Ну… Даже во время войны битвы — это далеко не всё, из чего состоит наша жизнь."
        - "Если нам больше не нужно будет сражаться, освободившееся время можно будет потратить на кучу других дел…"
        - "Разве это должно вызывать какие‑то проблемы?.."

    - char: mystery_voice
      side: right
      status: is-yellow
      text:
        - "«…В этот раз и правда попался любопытный экземпляр»."
        - "«Ну да ладно, моя задача выполнена. Дальше пусть у Ойген голова болит»."

    - char: shimakaze
      side: left
      text:
        - "А? Госпожа Таинственный голос, что вы сказали? У госпожи Принца Ойген будут какие‑то неприятности?!"

    - char: mystery_voice
      side: right
      status: is-yellow
      text:
        - "«(Ой, проговорилась…) Кхм, Симакадзэ!»"

    - char: shimakaze
      side: left
      text:
        - "Я‑я!"

    - char: mystery_voice
      side: right
      status: is-yellow
      text:
        - "«Отныне все четыре сокровища — Яростные Волны, Пламя, Твёрдый Камень и Жизненная Сила — преподнесены вам»."
        - "«Твои товарищи ведут жаркий бой. Поспеши назад и двигайся навстречу будущему!»"


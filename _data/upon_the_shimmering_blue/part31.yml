chapter1:
  rows:

    - char: shimakaze
      side: left
      text:
        - "Госпожа Таинственный голос, а вот и я~ Какой вопрос будет на этот раз?"

    - char: mystery_voice
      side: right
      status: is-yellow
      text:
        - "«Следующий вопрос…»"
        - "«К чему ты стремишься в конце пути сражений? Что для тебя значит победа?»"

    - char: shimakaze
      side: left
      text:
        - "К чему стремлюсь в конце сражений?.. Конечно же, к миру!"
        - "Смысл победы в том, чтобы вернуть мирное море и жить счастливо вместе со всеми моими товарищами!"
        - "И ради этого я просто обязана преодолеть нынешние трудности!"

    - char: mystery_voice
      side: right
      status: is-yellow
      text:
        - "«Ясно. Тайное сокровище яростного пламени преподносится герою. Продолжай свой путь»."
chapter1:
  rows:

    - char: mikasa_rad
      side: left
      text:
        - "Связь с пропавшим флотом восстановлена, найден новый товарищ и даже захвачен целый плавучий остров Сирен?"

    - char: shinano
      side: right
      text:
        - "Именно так. Состояние Дворца Дракона идеальное, и Железная Кровь выразила готовность оказать техническую поддержку для его транспортировки."

    - char: mikasa_rad
      side: left
      text:
        - "Визит ещё толком не начался, а мы уже получили столько неожиданных результатов."

    - char: nagato_rad
      side: right
      text:
        - "…Имя Хакурю… Мне всё кажется, что я его где‑то слышала."

    - char: mikasa_rad
      side: left
      text:
        - "О? А я вот совсем ничего об этом не знаю. Это какой‑то секретный проект?"

    - char: nagato_rad
      side: right
      text:
        - "Да нет, скорее… это похоже на голос, донёсшийся из ниоткуда."
        - "За то долгое время, что я была запечатана в Священном Древе, я пребывала в самом средоточии сплетения чувств и помыслов всей Империи Сакуры."
        - "И вот однажды, в какой‑то миг, промелькнуло некое присутствие, которое можно было бы назвать «Хакурю». М‑м‑м… Мне трудно описать это чувство."

    - char: shinano
      side: left
      text:
        - " Словно нечто призрачное и неосязаемое, но в то же время находящееся на расстоянии вытянутой руки — я понимаю. Порой в своих снах я испытываю то же самое."

    - char: mikasa_rad
      side: right
      text:
        - "«Чувства», значит… Ха‑ха‑ха! Вот в этом я совершенно ничего не смыслю~"
        - "Но, по крайней мере, это доказывает, что Хакурю действительно связана с нашей Империей, верно?"

    - char: nagato_rad
      side: left
      text:
        - "Да, я тоже так считаю."

    - char: mikasa_rad
      side: right
      text:
        - "Кстати, Синано, что это за талисман у тебя в руках? У него какой‑то знакомый фасон."

    - char: shinano
      side: left
      text:
        - "Этот амулет — тот самый, что я видела в своих снах… Удивительно, что вещь из сна запомнилась мне так отчётливо после пробуждения, будто она ежесекундно напоминает мне о чём‑то…"
        - "Было чувство, что когда‑нибудь он может пригодиться, поэтому я изготовила его из обломка «Ватацуми», который оставила мне Мусаси."

    - char: nagato_rad
      side: right
      text:
        - "Понятно… Словно божественное откровение. Я тебя понимаю."

    - char: mikasa_rad
      side: left
      text:
        - "А‑ха‑ха…………"

    - char: kasumi
      side: right
      text:
        - "Госпожа Синано, передовой флот официально воссоединился с эскортом Железной Крови."
        - "Оставшуюся часть пути мы проследуем под их охраной в зону визита."

    - char: shinano
      side: left
      text:
        - "Поняла. Спасибо за службу."

    - char: mikasa_rad
      side: right
      text:
        - "Что ж, кризис миновал. Желаю, чтобы твой визит прошёл с полным успехом."

    - char: nagato_rad
      side: left
      text:
        - "Да! Продолжай путь к базе Железной Крови, Синано."

    - char: shinano
      side: right
      text:
        - "Благодарю вас за добрые пожелания. Я не посрамлю имя Империи Сакуры и с честью выполню свою миссию."
chapter1:
  rows:

    - char: prinz_eugen_rad
      side: left
      status: is-yellow
      text:
        - "Всё готово. У вас там уже должно стать весело, не так ли?"

    - char: katsuragi
      side: right
      text:
        - "Да уж, это похлеще любого фестиваля фейерверков! Огромные волны вперемешку с пламенем просто испепелили всех врагов!"

    - char: shimakaze
      side: left
      text:
        - "Заодно разрушилась и печать на механизме, подкрепления противника перестали прибывать!"

    - char: prinz_eugen_rad
      side: right
      status: is-yellow
      text:
        - "Должно быть, зрелище незабываемое. Жаль, что я не увидела это своими глазами."

    - char: mystery_voice
      side: left
      status: is-yellow
      text:
        - "«Испытания внешних колец завершены. Центральная зона открывается»."
        - "«Вызовы и перемены ждут впереди. Готовы ли вы?»"

    - char: shimakaze
      side: right
      text:
        - "Само собой! Симакадзэ уже не терпится!"
        - "Госпожа Тикума, госпожа Суруга, вы тоже слышали, что сказал этот голос?!"

    - char: chikuma_rad
      side: left
      text:
        - "Слышали отчётливо. Как мы и предполагали, в центральной зоне нас ждёт сильный противник. Похоже, чтобы прорваться, придётся изрядно потрудиться."

    - char: suruga_rad
      side: right
      text:
        - "Эм… Если честно, этот таинственный голос, который следит за каждым нашим шагом, беспокоит меня куда больше, чем враги впереди…"

    - char: prinz_eugen_rad
      side: left
      status: is-yellow
      text:
        - "Кто знает, может, это просто заботливый навигатор, созданный Сиренами. Раз уж мы зашли так далеко, я думаю, лучше просто принять это как должное."

    - char: suruga_rad
      side: right
      text:
        - "(Чувство тревоги удвоилось!)"

    - char: chikuma_rad
      side: left
      text:
        - "Дальше — центральная зона… О том, что впереди, ничего не известно, так что никому не терять бдительности."
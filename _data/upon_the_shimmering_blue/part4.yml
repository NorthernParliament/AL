chapter1:
  rows:

    - text:
      - "Флот приближался, и очертания острова проступали всё чётче."
      - "Златоглавые павильоны и запутанная сеть водных путей складывались в морской город — словно гигантский дворцовый комплекс прямо посреди моря."

    - char: shimakaze
      side: left
      text:
        - "Вау, это просто невероятно!.. Госпожа Кацураги, вы только посмотрите — что это вообще такое?!"

    - char: katsuragi
      side: right
      text:
        - "Сама пока не разобралась… Но, если судить по моему анализу как авианосца, этот остров точно не природного происхождения!"

    - char: yamakaze
      side: left
      text:
        - "Ой, да он прямо как в легендах про «Дворец Дракона»!"

    - char: katsuragi
      side: right
      text:
        - "Хм… Симакадзэ, срочно свяжись с основными силами — у нас серьёзное открытие!"

    - char: shimakaze
      side: left
      text:
        - "Есть! — Госпожа Тикума, вы меня слышите?"

    - char: chikuma_rad
      side: right
      text:
        - "Тикума на связи. Что у вас там случилось?"

    - char: shimakaze
      side: left
      text:
        - "Короче, во время разведки мы наткнулись на огромный странный остров…"

chapter2:
  rows:

    - char: chikuma_rad
      side: right
      text:
        - "Я всё поняла. Госпожа Синано сейчас отдыхает, я доложу ей позже. Пожалуйста, продолжайте собирать информацию и не предпринимайте опрометчивых действий. Тикума, конец связи."

    - char: katsuragi
      side: left
      text:
        - "Чем больше просят не делать глупостей, тем сильнее прямо руки чешутся именно их и натворить!"

    - char: shimakaze
      side: right
      text:
        - "О, я вас так понимаю, госпожа Кацураги! Прямо в точку!"

    - char: katsuragi
      side: left
      text:
        - "Если мы не заглянем внутрь и толком не осмотримся, какая же это будет разведка? Разве не так?"

    - char: yamakaze
      side: right
      text:
        - "М‑м… и правда! А в таком ослепительно роскошном дворце, может, даже спрятаны какие‑то сокровища!"

    - char: umikaze
      side: left
      text:
        - "Да, точно! Такое ощущение, будто где‑то здесь зарыт настоящий клад…"

    - char: katsuragi
      side: right
      text:
        - "Вот и отлично — настал наш шанс отличиться! Раз все согласны, выдвигаемся!"

    - char: shimakaze
      side: left
      text:
        - "О‑о‑о‑о! Экспедиционная группа «Дворца Дракона», вперёд! Ура!"
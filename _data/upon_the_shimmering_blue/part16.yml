chapter1:
  rows:

    - char: katsuragi
      side: left
      text:
        - "Я так и знала, что этим всё закончится… Огонь всё‑таки вспыхнул, а‑а‑а‑а‑а‑а!!"

    - char: yamakaze
      side: right
      text:
        - "Ну, даже если мы не стреляем, враги‑то церемониться не станут…"

    - char: katsuragi
      side: left
      text:
        - "Назад… Все назад! Я не собираюсь погибать в этом пожаре!"

chapter2:
  rows:

    - char: katsuragi
      side: left
      text:
        - "Да что не так с этим Дворцом Дракона… Устраивать пожар в собственном городе — это же безумно опасно!"

    - char: shimakaze
      side: right
      text:
        - "Госпожа Кацураги, позвольте мне попробовать прорваться ещё раз!"

    - char: katsuragi
      side: left
      text:
        - "Глупая! Пламя слишком яростное! Даже с твоей скоростью от него не уклониться!"
        - "В такие моменты всё нужно оставить надёжному тяжёлому авианосцу!"
        - "Раз уж море всё равно полыхает, мне больше не нужно осторожничать. Смотрите, я покончу с тем механизмом прямой бомбардировкой!"

    - char: shimakaze
      side: right
      text:
        - "О~! Госпожа Кацураги, удачи!"

    - text:
      - "Группы палубных самолётов взмыли над густым дымом в сторону далёкого механизма, но их встретил плотный заградительный огонь, пробившийся сквозь пелену…"

    - char: shimakaze
      side: left
      text:
        - "…Все самолёты перехвачены, госпожа Кацураги!"

    - char: katsuragi
      side: right
      text:
        - " Да откуда вообще взялись эти зенитки?! Хм, нападать исподтишка — это не по‑джентльменски!"
        - "Это я расслабилась и не успела увернуться. Смотрите, я атакую снова!"

    - text:
      - "Кацураги предприняла вторую попытку, но по‑прежнему не смогла прорваться сквозь плотную сеть ПВО."

    - char: katsuragi
      side: right
      text:
        - "Фух… Это ещё не конец! Моя третья волна атак…"

    - char: shimakaze
      side: left
      text:
        - "Госпожа Кацураги, стойте! Стойте! Огненная завеса впереди совсем не похожа на то, сквозь что можно прорваться!"

    - char: katsuragi
      side: right
      text:
        - "Проклятье… Это всё из‑за ограниченного пространства внутри барьера — моим самолётам негде развернуться! Иначе я бы давно разнесла этот механизм в щепки!"

    - char: shimakaze
      side: left
      text:
        - "Наверное, мне всё‑таки стоит приложить ус…"

    - char: katsuragi
      side: right
      text:
        - "А ты сиди смирно и тихо жди, пока пламя не погаснет!"

    - char: shimakaze
      side: left
      text:
        - "Есть… Госпожа Кацураги."
chapter1:
  rows:

    - char: helena_meta_rad???
      side: right
      status: is-yellow
      text:
        - "Время поджимает. Синано, ответь на мой вопрос — что ты думаешь о Командире?"

    - char: shinano_rad
      side: left
      text:
        - "Командир?.. Интересный человек, с которым можно вести диалог."

    - char: helena_meta_rad???
      side: right
      status: is-yellow
      text:
        - "Не забудь о том, что произошло сегодня, когда проснёшься."

    - char: shinano_rad
      side: left
      text:
        - "Неужели этот сон… подходит к концу?…"

    - char: helena_meta_rad???
      side: right
      status: is-yellow
      text:
        - "Да. Сейчас я собираюсь внести некие «изменения»."
        - "Не знаю точных принципов работы твоего сновидения, но импульс от «изменений» разрушит ту хрупкую связь, что ты здесь создала."
        - "Твой сон больше не сможет продолжаться."

    - char: shinano_rad
      side: left
      text:
        - "Похоже, мне пора прощаться. Жаль… я бы хотела продолжить это чудесное путешествие…"

    - char: helena_meta_rad???
      side: right
      status: is-yellow
      text:
        - "Прости уж."
        - "Остальные, ваше текущее положение………… М-м, подтверждено. Стойте там, где стоите, ни в коем случае не двигайтесь."
        - "Три… два… один..."

    - text:
      - "БУМ!"

chapter2:
  rows:

    - char: shinano
      side: left
      text:
        - "........."

    - char: kasumi
      side: right
      text:
        - "Госпожа Синано, вы хорошо отдохнули?"

    - char: shinano
      side: left
      text:
        - "Снова долгий и невероятно реалистичный сон… Он так манит — хочется погрузиться в него ещё глубже."
        - " Касуми, собери для меня досье на Командира из Лазурного Пути."

    - char: kasumi
      side: right
      text:
        - "На того самого Командира из Лазурного Пути? Я поняла."

    - char: suruga
      side: left
      text:
        - "Госпожа Синано, планируются ли у нас боевые действия против «Союза Орла»?"

    - char: shinano
      side: right
      text:
        - "Пока я не слышала о подобных планах. Сбор данных о Командире — лишь простое любопытство."
        - "Как обстоят дела у флота?"

    - char: chikuma
      side: left
      text:
        - "Флот следует согласно плану к плавучей крепости Железной Крови, по пути мы не встретили врагов."
        - "Однако разведывательный флот обнаружил впереди искусственный плавучий остров неопределённой принадлежности."
        - "Симакадзэ в своём докладе назвала его «Дворцом Дракона». Прошу, ознакомьтесь с этим кратким отчётом."

    - char: shinano
      side: right
      text:
        - "«Дворец Дракона», значит… Я не видела подобного даже в своих снах."

    - char: chikuma
      side: left
      text:
        - " Обычно подобные «чудеса» на море Сирены скрывают в Зеркальных морях."
        - "То, что его выставили столь открыто, наводит меня на мысль: с высокой вероятностью это ловушка."

    - char: suruga
      side: right
      text:
        - "Я тоже считаю, что это проделки Сирен. Может, просто проигнорируем его?"

    - char: shinano
      side: left
      text:
        - "Нельзя. Сирены уже встревожены нашим движением, и оставлять позади ловушку, расставленную ими, слишком опасно."

    - char: chikuma
      side: right
      text:
        - "В таком случае, может, сосредоточим огонь и уничтожим его?"

    - char: shinano
      side: left
      text:
        - "Если это, как говорит Симакадзэ, роскошный морской дворец, то уничтожить его без разбора было бы немного жаль."
        - "Увы, раз это механизм Сирен, иного пути нет."
        - "Тикума, возьми подкрепление и соединись с группой Симакадзэ. И… Суруга, отправляйся вместе с ними."

    - char: suruga
      side: right
      text:
        - "Э? Я тоже?! Но тогда рядом с вами…"

    - char: shinano
      side: left
      text:
        - "Не беспокойся, я в безопасности в составе основных сил, Касуми со мной."

    - char: suruga
      side: right
      text:
        - "Есть, я поняла."
        - "(Не знаю почему, но у меня крайне дурное предчувствие…)"
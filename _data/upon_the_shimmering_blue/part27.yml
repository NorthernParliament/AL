chapter1:
  rows:

    - text:
      - "В великолепном центральном секторе царила мёртвая тишина. Поверхность воды была пуста, не было ни единого следа присутствия врага. Казалось, это не сердце поля боя, а просто тихое и живописное место."

    - char: yamakaze
      side: left
      text:
        - "Что‑то не видать сильных врагов. Может, они как раз отлучились по делам?.."

    - char: umikaze
      side: right
      text:
        - "Наверное, из‑за того, что мы тут вовсю шумим в городе… Они ушли заниматься чем‑то другим."

    - char: suruga
      side: left
      text:
        - "(Абсолютно исключено… За кого вы вообще их принимаете?!)"

    - char: katsuragi
      side: right
      text:
        - "Отлично, ловим момент. Ищем механизм, который поднимет Дворец Дракона на поверхность, и убираемся отсюда поскорее."

chapter2:
  rows:

    - text:
      - "После недолгих поисков группа обнаружила в акватории зону, запечатанную барьером."

    - char: yura
      side: left
      text:
        - "Какой красивый барьер, совсем не похож на те, что мы видели раньше…"
        - "Кажется, внутри барьера кто‑то есть…"

    - char: shimakaze
      side: right
      text:
        - "Ой? В этот раз пульт управления вроде бы снаружи. Наверное, это и есть главный выключатель Дворца Дракона!"

    - char: yura
      side: left
      text:
        - "Погоди секунду, Симакадзэ… Кажется, это…"

    - char: shimakaze
      side: right
      text:
        - "Нажимаю…"

    - text:
      - "ГРОХОТ!"
      - "Как только пульт был активирован, центральный сектор содрогнулся от короткого, но мощного толчка."

    - char: suruga
      side: left
      text:
        - "Ничего странного не произошло? Слава богу… Симакадзэ, нельзя же быть такой опрометчивой!"

    - char: shimakaze
      side: right
      text:
        - "Я нажала прежде, чем успела подумать… Тысяча извинений, госпожа Суруга!!"

    - char: yura
      side: left
      text:
        - "Всем внимание! Кажется, человек внутри барьера проснулся…"

    - char: hakuryuu???
      side: right
      status: is-red
      text:
        - "Как же хочется спать… Сколько же времени я проспала в этот раз?…"

    - char: katsuragi
      side: left
      text:
        - "Она заговорила?!"

    - char: hakuryuu???
      side: right
      status: is-red
      text:
        - "Что это за штуковина… Мешается!"

    - text:
      - "БУМ!"

    - char: katsuragi
      side: left
      text:
        - "Она разрушила барьер изнутри одним взмахом меча?!"

    - char: hakuryuu???
      side: right
      status: is-red
      text:
        - "Ах… Свежий воздух. Теперь гораздо лучше…"

    - text:
      - "Пробудившаяся из разрушенного барьера личность не стала предпринимать дальнейших атак, лишь невозмутимо оглядывая водную гладь."

    - char: chikuma
      side: left
      text:
        - "Это «пешка»?.. Но аура от неё исходит просто колоссальная."

    - char: shimakaze
      side: right
      text:
        - "Эм… Ты кто? Ты тоже застряла здесь, как и мы?"

    - char: suruga
      side: left
      text:
        - "(Она правда решила просто подойти и поздороваться?! Перед нами кто угодно, только не «застрявший» путник!)"

    - char: hakuryuu
      side: right
      status: is-red
      text:
        - "Я — Хакурю, хранительница этого глубоководного Дворца Дракона."
        - "Значит, это вы те, кто вторгся в мои владения и посмел разрушить мою печать?"

    - char: shimakaze
      side: left
      text:
        - " Ну, просто голос сказал, что если мы так сделаем, то сможем выбраться… Про‑про‑простите! Мы всё возместим!"

    - char: suruga
      side: right
      text:
        - "(Вообще‑то печать ты сама только что мечом разнесла…)"

    - char: hakuryuu
      side: left
      status: is-red
      text:
        - "Раз уж вы пробудили меня от долгого сна, полагаю, вы полны решимости и готовы к последствиям?"

    - char: shimakaze
      side: right
      text:
        - "Ре‑решимости?! Мы просто хотим уйти отсюда! Нам правда очень жаль, что мы помешали вашему отдыху!"

    - char: hakuryuu
      side: left
      status: is-red
      text:
        - "Ты… Для претендентки тебе явно не хватает боевого духа… Впрочем, неважно. Да начнётся испытание."

    - char: shimakaze
      side: right
      text:
        - "Испытание?!"

    - char: hakuryuu
      side: left
      status: is-red
      text:
        - "Хотите покинуть Дворец Дракона? Тогда вам нужно лишь пройти испытание. Защищайтесь!"

    - char: shimakaze
      side: right
      text:
        - "Ва‑а‑а‑а‑а‑а!"

    - char: chikuma
      side: left
      text:
        - "Эй, ты! Не смей нападать на Симакадзэ прямо с порога!"

    - char: hakuryuu
      side: right
      status: is-red
      text:
        - "О? Так, значит, это ты здесь за главную."

    - char: chikuma
      side: left
      text:
        - "Я — Тикума. По поручению госпожи Мусаси и госпожи Синано я возглавляю флот, исследующий этот Дворец Дракона."
        - "Под «испытанием» ты подразумеваешь победу над тобой?"

    - char: hakuryuu
      side: right
      status: is-red
      text:
        - "Именно."

    - char: chikuma
      side: left
      text:
        - "Если мы победим тебя, то сможем уйти?"

    - char: hakuryuu
      side: right
      status: is-red
      text:
        - "Верно."

    - char: chikuma
      side: left
      text:
        - "И это всё?"

    - char: hakuryuu
      side: right
      status: is-red
      text:
        - "Что именно ты пытаешься сказать?"

    - char: chikuma
      side: left
      text:
        - "Если мы победим, наша возможность покинуть это место — вещь само собой разумеющаяся. Но раз уж это «испытание», разве победителям не полагается дополнительная награда?"

    - char: hakuryuu
      side: right
      status: is-red
      text:
        - "Какая самонадеянность. Если вам и правда удастся одолеть меня, забирайте из этого города любую награду, какая приглянется."

    - char: chikuma
      side: left
      text:
        - "Вот и договорились~ А теперь позволь представить тебе новейший линкор Империи Сакуры. Сражаться с ней будет куда интереснее."
        - "Суруга~"

    - char: suruga
      side: right
      text:
        - "Есть."
        - "(Эй, эй, погодите?! Что?!)"

    - char: hakuryuu
      side: left
      status: is-red
      text:
        - "Хм~ Вид у неё и правда более боевой, чем у той мелюзги. Что ж, тогда выходи ты. Принимай удар!"

    - char: suruga
      side: right
      text:
        - "…Суруга, вступаю в бой!"
        - "(Да почему всё вечно заканчивается вот так, а‑а‑а‑а‑а‑а!)"

    - char: shimakaze
      side: left
      text:
        - "Удачи, госпожа Суруга! Мы за вас болеем!"

    - char: suruga
      side: right
      text:
        - " Не смей делать вид, будто тебя это не касается! Никто не говорил, что это дуэль один на один! А ну, все в бой!"
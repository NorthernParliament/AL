chapter1:
  rows:

    - char: shimakaze
      side: left
      text:
        - "Вот он, пульт, который заставлял врагов появляться бесконечно. Интересно, что же произойдёт после его активации…"
        - "У-у… Вблизи он и правда выглядит ужасно сложным!"
        - "Так, как там говорила госпожа Принц Ойген… М‑м‑м… Сначала нажать вот это, а потом…"

    - char: mystery_voice
      side: right
      status: is-yellow
      text:
        - "«Вопрос…»"

    - char: shimakaze
      side: left
      text:
        - "Госпожа Таинственный голос снова здесь?! Какой вопрос вы хотите задать Симакадзэ?"

    - char: mystery_voice
      side: right
      status: is-yellow
      text:
        - "«Зачем ты пришла снова? Ради чего ты прилагаешь столько усилий?»"

    - char: shimakaze
      side: left
      text:
        - "Это же просто! Потому что мои товарищи всё ещё сражаются изо всех сил. Симакадзэ старается ради своих старательных друзей!"

    - char: mystery_voice
      side: right
      status: is-yellow
      text:
        - "«Тайное сокровище регенерации преподносится герою. Продолжай свой путь»."

    - char: shimakaze
      side: left
      text:
        - "Спасибо вам, госпожа Таинственный голос!"
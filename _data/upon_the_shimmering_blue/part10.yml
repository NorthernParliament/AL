chapter1:
  rows:

    - text:
      - "БУМ!"
      - "Оглушительный грохот сотряс пространство, и барьер, окутывавший здание, был разрушен."

    - char: mystery_voice
      side: left
      status: is-yellow
      text:
        - "Испытание завершено, ярость волн утихнет — продолжайте путь."

    - text:
      - "Как только голос умолк, свет на здании погас, а штормовой ветер и гигантские волны стихли."

    - char: shimakaze
      side: left
      text:
        - "Э? Волны и правда утихли! Этот таинственный голос держит своё слово!"

    - char: yamakaze
      side: right
      text:
        - "О‑хо‑хо~ Вблизи видно, что это какая‑то странная большая платформа."

    - char: umikaze
      side: left
      text:
        - " Мы сейчас в ловушке врага, поэтому лучше не действовать слишком опрометчиво, Ямакадзэ…"

    - char: katsuragi
      side: right
      text:
        - "Верно, не приближайтесь просто так! Скорее всего, здесь ещё остались следы воздействия барьера. Короче говоря, позвольте мне всё проверить."

    - char: yamakaze
      side: left
      text:
        - "Э?! Неужели это так опасно? Ох, пронесло…"

    - char: shimakaze
      side: right
      text:
        - "Не знала, что госпожа Кацураги разбирается в барьерах."

    - char: katsuragi
      side: left
      text:
        - "Госпожа Мусаси очень занята делами, поэтому все вопросы, касающиеся храма, я беру на себя~"

    - char: shimakaze
      side: right
      text:
        - "О‑о‑о! Госпожа Кацураги, вы просто потрясающая!"

    - char: katsuragi
      side: left
      text:
        - "Естественно! Кто ещё, как не я — полноценный тяжёлый авианосец~"

    - char: shimakaze
      side: right
      text:
        - "Но почему госпожа Кацураги не носит одежду жрицы, как госпожа Юра?"

    - char: katsuragi
      side: left
      text:
        - "Потому что… Э! Юра назначена помогать мне в работе! Поэтому достаточно того, что она носит одежду жрицы — мне это ни к чему!"

    - char: yamakaze
      side: right
      text:
        - "От этого объяснения веет чем‑то подозрительным…"

    - char: katsuragi
      side: left
      text:
        - "Ничего подозрительного! Вот именно так всё и есть!"
        - "Здесь больше нет ничего интересного — давайте быстрее уйдём. Мы ведь всё ещё участвуем в гонке!"
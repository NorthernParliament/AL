chapter1:
  rows:

    - char: prinz_eugen
      side: left
      status: is-yellow
      text:
        - "Хм‑хм‑хм‑хм♪~"

    - char: z2
      side: right
      status: is-yellow
      text:
        - "У тебя отличное настроение, Ойген."

    - char: prinz_eugen
      side: left
      status: is-yellow
      text:
        - "Не ожидала, что Акаги окажется настолько щедрой. Это действительно неожиданная добыча~"

    - char: z2
      side: right
      status: is-yellow
      text:
        - "Как бы ты ни была рада, нельзя же постоянно делать остановки."
        - "Мы идём на слишком низкой скорости. Давай оставим расслабление до возвращения домой."

    - char: prinz_eugen
      side: left
      status: is-yellow
      text:
        - "Мы ведь не воры, совершившие преступление, так что незачем так спешить~"

    - char: z2
      side: right
      status: is-yellow
      text:
        - "Нет‑нет‑нет… Как ни крути, Акаги и остальные действовали слишком явно. Что, если люди в Империи Сакуры спохватятся?"
        - "Ты же сама видела: внутренняя ситуация в Империи довольно сложная, и Акаги не контролирует её полностью."

    - char: prinz_eugen
      side: left
      status: is-yellow
      text:
        - "Ну, в конечном итоге, разве наши действия косвенно не обеспечили безопасность Священного Камня? Даже если их высокопоставленные лица всё поймут, они не должны сильно разозлиться."
        - "Всё хорошо, что хорошо кончается~"

    - char: z2
      side: right
      status: is-yellow
      text:
        - "Надеюсь, флот, преградивший нам путь, окажется столь же философски настроенным, как и ты…"

    - char: prinz_eugen
      side: left
      status: is-yellow
      text:
        - "…А?"

chapter2:
  rows:

    - char: tosa
      side: left
      text:
        - "Прошу уважаемых гостей из Железной Крови остановиться."

    - char: prinz_eugen
      side: right
      status: is-yellow
      text:
        - "Ой… Ты из типа «Амаги»… нет, типа «Кага»…"
        - "А‑а~ У госпожи Акаги остались ещё какие‑то поручения? Неужели забыли приложить инструкцию по эксплуатации?"

    - char: tosa
      side: left
      text:
        - "Нет. Я здесь, чтобы передать предложение от некоего высокопоставленного лица."

    - char: prinz_eugen
      side: right
      status: is-yellow
      text:
        - "Некоего лица?.. К какой же фракции в Империи Сакуры ты всё‑таки принадлежишь?"

    - char: ikazuchi
      side: left
      text:
        - "Просим вас не нервничать. Тому лицу уже известно о том, что сделала госпожа Акаги."

    - char: inazuma
      side: right
      text:
        - "Корабли типа «Ямато» лучше всех понимают корабли типа «Ямато». Цели госпожи Акаги на фестивале и причины вашего приглашения было несложно угадать."

    - char: ikazuchi
      side: left
      text:
        - "Исходя из этого, она хочет обсудить с вами кое‑что — будущее Железной Крови и Империи Сакуры."

    - char: prinz_eugen
      side: right
      status: is-yellow
      text:
        - "Похоже, варианта «отказаться» у нас нет?"

    - char: inazuma
      side: left
      text:
        - "Ради вашего же спокойствия во время путешествия по водам Империи Сакуры, я советую всё же поговорить."

    - char: tosa
      side: right
      text:
        - "Прошу. Та госпожа ожидает вас на линии связи."

    - char: prinz_eugen
      side: left
      status: is-yellow
      text:
        - "Кажется, дела принимают ещё более интересный оборот… Хорошо, давайте поговорим~"
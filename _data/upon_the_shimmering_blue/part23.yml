chapter1:
  rows:

    - char: yamakaze
      side: left
      text:
        - " В атаку~ В атаку~ В атаку~!"

    - char: shimakaze
      side: right
      text:
        - "Госпожа Тикума и остальные просто невероятны! Теперь мы можем бить врагов, прикрываясь их же щитами!"

    - char: katsuragi
      side: left
      text:
        - "Хо‑хо~ Ближний бой — самая слабая сторона авианосцев, и этот щит как раз идеально восполняет этот пробел!"
        - "В данный момент не будет преувеличением сказать, что я — самый совершенный тяжёлый авианосец в мире!"

    - char: umikaze
      side: right
      text:
        - " И огня теперь можно не бояться… Потрясающе."

    - char: katsuragi
      side: left
      text:
        - "Наконец‑то появилось хоть какое‑то ощущение настоящего приключения. Похоже, этот Дворец Дракона тоже способен на занятные вещи~"

    - char: shimakaze
      side: right
      text:
        - "Механизм обнаружен! Госпожа Кацураги, в этот раз тоже полагаемся на вас!"

    - char: katsuragi
      side: left
      text:
        - "Проще простого~"

    - text:
      - "БАБАХ!!!"
      - "Под ударами бомбардировщиков Кацураги защитный барьер устройства быстро исчез."

    - char: shimakaze
      side: left
      text:
        - "Госпожа Кацураги, здесь такой же пульт управления!"
        - "Интересно, какое «тайное сокровище» мы получим через этот пульт? Я в предвкушении!"

    - char: yamakaze
      side: right
      text:
        - "Вот бы это было сокровище, позволяющее стать огромной~ Если Ямакадзэ станет гигантской, она сможет расплющить врага одним ударом кулака!"

    - char: umikaze
      side: left
      text:
        - "Механизм, создающий сладости и конфеты, тоже был бы неплох…"

    - char: katsuragi
      side: right
      text:
        - "От этого в бою не будет никакого толку!"

    - char: shimakaze
      side: left
      text:
        - "Еда — это тоже очень важно! На пустой желудок много не навоюешь!"
        - "Если уж выбирать сладости, то я бы хотела морковный торт~"

    - char: chikuma_rad
      side: right
      text:
        - "Симакадзэ, как продвигаются дела?"

    - char: shimakaze
      side: left
      text:
        - "Госпожа Тикума, у отряда Симакадзэ всё идёт гладко, мы уже добрались до пульта управления!"
        - "Только вот этот пульт такой сложный, Симакадзэ совершенно не понимает, что тут делать…"

    - char: prinz_eugen_rad
      side: right
      status: is-yellow
      text:
        - "Это очень просто. Я тебя научу~ Сначала вот так… потом вот эдак… и под конец вот так…"

    - char: shimakaze
      side: left
      text:
        - "Вот оно что! Вроде понятно, а вроде и нет!"

    - char: suruga_rad
      side: right
      text:
        - "Послушайте… Нам сейчас этот механизм без надобности. Будет куча проблем, если Симакадзэ что‑нибудь напутает."

    - char: prinz_eugen_rad
      side: left
      status: is-yellow
      text:
        - "Да ну, брось. Мои объяснения просты и понятны — если я повторю ещё разок, даже Симакадзэ всё поймёт."

    - char: shimakaze
      side: right
      text:
        - " Угу! Если Симакадзэ послушает ещё раз, то, вероятно, быть может, скорее всего, всё поймёт!"

    - char: suruga_rad
      side: left
      text:
        - "Пошли уже! Вперёд! У нас всё ещё гонка‑соревнование, и если ты из‑за своей возни отстанешь, я за тебя не отвечаю!"

    - char: shimakaze
      side: right
      text:
        - "А‑а, отставать нельзя! Подождите меня, госпожа Суруга!"
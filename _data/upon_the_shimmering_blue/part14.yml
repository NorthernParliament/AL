chapter1:
  rows:

    - text:
      - "Группа продвигалась по маршруту, выбранному Тикумой. Поначалу им удавалось довольно успешно обходить вражеские корабли, обладавшие слабой огневой мощью, но невероятно высокой защитой."
      - "Однако по мере продвижения плотность противника становилась всё выше. В конце концов дело дошло до того, что корабли, сцепившись друг с другом, полностью перекрыли широкий фарватер."

    - char: yura
      side: left
      text:
        - "Они словно цепь гор, выросшая прямо посреди реки…"

    - char: suruga
      side: right
      text:
        - " Это абсурд! Местные ловушки просто за гранью здравого смысла!"

    - char: chikuma
      side: left
      text:
        - "До здания управления, о котором упоминала Симакадзэ, уже рукой подать… Придётся прокладывать путь грубой силой."
        - "Суруга, теперь, пожалуйста, покажи нам свою мощь. Покажи нам силу элиты Империи Сакуры."

    - char: suruga
      side: right
      text:
        - "Без проблем. Я сделаю всё, что в моих силах."
        - "Кхм… Мы вообще‑то торопимся, так что будьте любезны — уйдите с дороги те, кто мешает!"  

    - text:
      - "БАБАХ!"

    - char: chikuma
      side: left
      text:
        - "Есть попадание! Огонь всем отрядом! Сконцентрируем залпы и будем прорываться через вражеский заслон — корабль за кораблём!" 

    - char: suruga
      side: right
      text:
        - "(…Пока мы перестреляем все эти посудины, Симакадзэ, чего доброго, уже успеет дойти до центра и вернуться обратно…)"
        - "(Неужели это расплата за мои слова о том, что мне всё равно, какая будет ловушка? Какое невезение…)"

    - char: chikuma
      side: left
      text:
        - "…Суруга?"

    - char: suruga
      side: right
      text:
        - "Ничего… Всем открыть огонь!"
chapter1:
  rows:

    - char: umikaze
      side: left
      text:
        - "Слушай… Не кажется ли тебе, что мы зашли немного далековато?"

    - char: yamakaze
      side: right
      text:
        - "Да всё нормально, здесь всё равно ни души. Смотри сама~"
        - "Э‑э‑эй!"

    - text:
      - "Ямакадзэ внезапно громко крикнула в сторону пустоты."

    - char: umikaze
      side: left
      text:
        - "Ямакадзэ! Н‑нельзя так громко — мы можем кого‑нибудь привлечь!"

    - text:
      - "…Кроме эха голоса Ямакадзэ внутри вокруг ничего не произошло."

    - char: yamakaze
      side: left
      text:
        - "Видишь? Кроме нас здесь никого нет~ Может, его уже давно забросили…"

    - char: communicator
      side: right
      text:
        - "*бип-бип*"

    - char: chikuma_rad
      side: right
      text:
        - "На связи Тикума. Я прибыла к входу во Дворец Дракона с флотом подкрепления. Доложите о вашем текущем местоположении."

    - char: shimakaze
      side: left
      text:
        - "Э?! Госпожа Тикума, госпожа Юра и госпожа Суруга тоже здесь?! Но мы ведь не запрашивали поддержку.."

    - char: chikuma_rad
      side: right
      text:
        - "Отправка флота подкрепления — это решение госпожи Синано. В одиночку вам не уничтожить Дворец Дракона."

    - char: suruga_rad
      side: left
      text:
        - "(Хотя и с нашим приходом толку мало… Как вообще уничтожить такой огромный Дворец Дракона?!)"

    - char: shimakaze
      side: right
      text:
        - "Э?! Мы должны уничтожить такой красивый Дворец Дракона?!"

    - char: suruga_rad
      side: left
      text:
        - "(Это же механизм Сирен! А ты чего ожидала — что мы его оставим?!)"

    - char: chikuma_rad
      side: right
      text:
        - "Уничтожать столь изысканный архитектурный ансамбль, конечно, жаль, но это решение принято ради безопасности мореплавания."
        - "Пока проблем не возникло, но, судя по нашему опыту, это наверняка очередной странный эксперимент Сирен…"
        - "М‑м… Вы сейчас довольно далеко от нас."

    - char: shimakaze
      side: left
      text:
        - "Просим прощения! Мы просто хотели провести разведку на внешнем периметре Дворца Дракона!"
        - "Не ожидала, что мы будем идти так долго и до сих пор не доберёмся до среднего яруса. Этот Дворец Дракона просто нелепо огромный!"

    - char: suruga_rad
      side: right
      text:
        - "(Нет… нелепо то, как ты разгуливаешь по механическому городу Сирен, будто у себя дома…)"

    - char: chikuma_rad
      side: left
      text:
        - "Верно. Чтобы полностью уничтожить этот плавучий город, простого обстрела будет недостаточно."
        - "Если бы он находился внутри Зеркального моря, уничтожение устройства стабилизации нанесло бы серьёзный ущерб внутренним объектам."
        - "Но в таких ситуациях, когда он развёрнут в обычном море, нам придётся искать другие способы разрушения своими силами."
        - " Хм… Информация важнее всего. Мы входим в город, чтобы встретиться с вами. Первым делом проведём тщательную разведку этого Дворца Дракона."

    - char: suruga_rad
      side: right
      text:
        - "(Как же хочется домой……)"

    - text:
      - "БАБАХ!"
      - "В самый разгар разговора вся конструкция Дворца Дракона внезапно и без всякого предупреждения сильно содрогнулась."

    - char: shimakaze
      side: left
      text:
        - "Уа‑а! Подводное землетрясение?!"

    - char: chikuma
      side: right
      text:
        - "Нет… Авангардный флот, немедленно эвакуируйтесь из Дворца Дракона! Весь Дворец начал уходить под воду!" 

    - char: katsuragi
      side: left
      text:
        - "Э?! По‑погружается?! Разве не будет катастрофой, если он уйдёт под воду?!"

    - char: shimakaze
      side: right
      text:
        - "Но на таком расстоянии, даже с моей скоростью, я не…" 

    - char: yura_rad
      side: left
      text:
        - "Кацураги, ты чувствуешь колебания барьера?.."

    - char: katsuragi
      side: right
      text:
        - "Барьера?! А, я нашла! Похоже, весь Дворец Дракона защищён барьером — уровень воды внутри города не поднимается~"
        - "Выходит, это у вас снаружи ситуация гораздо хуже! Если вас затянет в водоворот — всё кончено!"

    - char: chikuma_rad
      side: left
      text:
        - "Ничего не поделаешь… Всем — полный вперёд! Входим внутрь барьера Дворца Дракона, чтобы укрыться!"

    - char: suruga_rad
      side: right
      text:
        - "(Моё предчувствие сбылось!!)"
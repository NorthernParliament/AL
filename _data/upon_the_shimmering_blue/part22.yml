chapter1:
  rows:

    - char: shimakaze_rad
      side: left
      text:
        - "Госпожа Тикума! Со стороны вашего отряда только что донеслась сильная вибрация и вспыхнул ослепительный белый свет — с вами всё в порядке?!"

    - char: chikuma
      side: right
      text:
        - "Да, мы целы. Это был результат атаки флота Железной Крови, теперь мы заставили механизм прекратить работу."

    - char: katsuragi_rad
      side: left
      text:
        - " Э?! Такой невероятный шум был всего лишь атакой Железной Крови?! Невероятно."
        - "Юра‑Юра~ Слушай, я тут как раз изучила слабые места барьера и уничтожила его одним махом, сконцентрировав огонь. Скажи, ведь с таким типом барьеров лучше всего расправляться именно так?"

    - char: yura
      side: right
      text:
        - "М‑м… Если это тот тип, о котором ты говоришь… Впрочем, я не видела сам барьер, так что не могу судить…"
        - "Защитная печать внешнего контура была вдребезги разнесена одним ударом госпожи Один…"
        - "Но сам механизм цел, я собираюсь внимательно его осмотреть… Эм, госпожа Принц Ойген?.."

    - char: suruga
      side: left
      text:
        - "А ну стоять, Принц Ойген! Не смей трогать пульт управления, это же опасно!"

    - char: prinz_eugen
      side: right
      status: is-yellow
      text:
        - "Не опасно~ Совсем не опасно~ Я уже давно на «ты» с устройствами Сирен."
        - "Вероятность того, что произойдёт несчастный случай, даже до пятидесяти процентов не дотягивает."

    - char: suruga
      side: left
      text:
        - "Не смей выдавать пятидесятипроцентный шанс на успех за «безопасность»!"

    - char: prinz_eugen
      side: right
      status: is-yellow
      text:
        - "Сначала вот так… потом вот эдак… и наконец вот так… Готово!"

    - text:
      - "Как только Ойген закончила манипуляции, консоль управления загудела от запуска механизмов, и снова раздался тот же таинственный голос."

    - char: mystery_voice
      side: left
      status: is-yellow
      text:
        - "«Тайное сокровище Дворца Дракона ныне преподносится героям»."

    - char: chikuma
      side: right
      text:
        - "…Сокровище?"

    - char: shimakaze_rad
      side: left
      text:
        - "Госпожа Тикума! Госпожа Суруга!! Те щиты, о которых вы говорили, что видели их у врагов, — они появились и на нас!"

    - char: chikuma
      side: right
      text:
        - "Неужели зоны различных механизмов во Дворце Дракона взаимосвязаны?.. Стоит нам захватить одну, и она начинает работать на нас."

    - char: prinz_eugen
      side: left
      status: is-yellow
      text:
        - "Так я и думала, всё именно так, как я и предсказывала."

    - char: suruga
      side: right
      text:
        - " В твоих «предсказаниях» успех был лишь пятьдесят на пятьдесят… А если бы нам не повезло и мы провалились?"

    - char: prinz_eugen
      side: left
      status: is-yellow
      text:
        - "Ну, вероятно, механизм бы перезапустился, и нас бы снова окружила толпа врагов?.."

    - char: suruga
      side: right
      text:
        - "(Нет, я так больше не могу… Я совершенно не в силах ладить с этой опасной личностью.)"

    - char: prinz_eugen
      side: left
      status: is-yellow
      text:
        - "Ну не делай ты такое унылое лицо. Всё хорошо, что хорошо кончается~"

    - char: shimakaze_rad
      side: right
      text:
        - "Огромное спасибо, госпожа Принц Ойген! С этими щитами море огня больше не помеха нашему продвижению!"
        - "Всем держаться за мной! К следующему механизму… В атаку!"
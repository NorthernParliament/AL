chapter1:
  rows:

    - text:
      - "Под лучами солнца миниатюрная девушка ловко рассекает морскую гладь — вода отливает глубоким индиго, как бывает только в открытом океане. Её пушистые кроличьи ушки подпрыгивают в такт волнам."

    - char: shimakaze
      side: left
      text:
        - " Скорость — 41 узел, в зоне видимости всё чисто."
        - " Под водой… акул нет, фух~"
        - "(Так комфортно плыть в такую погоду… Только вот…)"

    - text:
      - "На оживлённом лице девушки вдруг набежала тень — непонятно почему."

    - char: yamakaze
      side: left
      text:
        - "Пф‑ха‑ха… Не верится, что ты реально умудрилась заблудиться! Да ещё и буквально врезалась в госпожу Синано — и даже не узнала её, когда стояла прямо перед ней!"
        - "Симакадзэ, ты просто потрясающая!"

    - char: shimakaze
      side: right
      text:
        - "Да какое там «потрясающая»!.."
        - "У‑у, как вспомню — так хочется сквозь землю провалиться…"

    - char: umikaze
      side: left
      text:
        - "Понимаю это чувство… Когда перенервничала и чуть в обморок не упала…"

    - char: katsuragi
      side: right
      text:
        - "Ха‑ха, да ладно, ничего страшного! Если мы, как авангардный флот, воспользуемся случаем и совершим какой‑нибудь подвиг, госпожа Синано точно будет смотреть на нас с восхищением!"

    - char: shimakaze
      side: left
      text:
        - "(И правда… Я так опозорилась. Надо постараться, чтобы восстановить репутацию в глазах госпожи Синано.)"
        - " Верно сказано! Пусть только попробуют появиться — хоть Сирены, хоть кто угодно!"
        - "........."
        - "Да какие там Сирены… Даже волны — и те до жути спокойные. Так мы и шанса на подвиг не дождёмся!"

    - char: yamakaze
      side: right
      text:
        - "Ха‑а, скукотища…"

    - char: umikaze
      side: left
      text:
        - "Зато какой вид! Лазурная вода, синее небо, день ясный — и морские птицы пролетают…"

    - char: shimakaze
      side: right
      text:
        - "Погоди… Откуда здесь морские птицы?!"

    - char: katsuragi
      side: left
      text:
        - "Может, прилетели с какого‑нибудь безымянного островка неподалёку?"

    - char: shimakaze
      side: right
      text:
        - "Не может быть! У меня точная карта — её предоставила госпожа Тикума, и здесь нет никаких островов!"

    - char: katsuragi
      side: left
      text:
        - "Да ладно, не бывает же птиц без островов… Подожди, сейчас разведаю!"
        - "Хм——— хм‑хм… Кто бы мог подумать, что даже у Тикумы разведданные могут быть неточными~"
        - "Симакадзэ, полный вперёд — на юго‑запад! Скоро сама увидишь остров!"

    - char: shimakaze
      side: right
      text:
        - "Э?! Там правда что‑то есть?! Ладно, предоставь это мне! Симакадзэ идёт на максимальной скорости!"
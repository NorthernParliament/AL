chapter1:
  rows:

    - char: katsuragi
      side: left
      text:
        - "Это воистину роскошная резиденция, ничуть не уступающая дому госпожи Мусаси…! Мы ведь точно пришли к госпоже Синано, верно?!"

    - char: chikuma
      side: right
      text:
        - "Да-да, ты за это переспрашивала уже пять раз."

    - char: katsuragi
      side: left
      text:
        - "Я не сомневаюсь в твоих разведданных, просто я слишком взволнована!"
        - "В конце концов, мы идем в гости к самой Синано, которая, как и я, является авианосцем! Я просто не могу дождаться~!"

    - char: chikuma
      side: right
      text:
        - "Это тоже уже пятый… ох."

    - char: shimakaze
      side: left
      text:
        - "Госпожа Кацураги, мне кажется, что даже будучи авианосцами, вы с госпожой Синано не обязательно во многом похожи."

    - char: katsuragi
      side: right
      text:
        - "Что ты этим хочешь сказать, Симакадзэ?! Ты намекаешь, что я недостойна звания авианосца? Или считаешь, что я больше подхожу на роль транспорта?!"

    - char: shimakaze
      side: left
      text:
        - "Эй! Госпожа Кацураги, вы меня не так поняли! Симакадзэ имела в виду, что у вас есть свои уникальные черты как у авианосца, и вам не нужно ни с кем себя сравнивать!"

    - char: katsuragi
      side: right
      text:
        - "Хм~ Сразу бы так и сказала."
        - "В награду за прозорливость, Симакадзэ, я предоставляю тебе честь первой подойти к резиденции госпожи Синано. Ступай, доложи о нашем прибытии."

    - char: shimakaze
      side: left
      text:
        - "Э?! Правда можно?! Симакадзэ, полный вперед к резиденции госпожи Синано!"

    - char: chikuma
      side: right
      text:
        - "Сколько бы раз я это ни видела, всё равно поражаюсь: она и правда невероятно быстрая…"

chapter2:
  rows:

    - char: katsuragi
      side: left
      text:
        - "Как же долго… Почему Симакадзэ до сих пор не вернулась? Это же просто постучать в дверь и поздороваться."

    - char: chikuma
      side: right
      text:
        - "…Кацураги, давай всё-таки просто подойдем сами."

chapter3:
  rows:

    - char: suruga
      side: left
      text:
        - "Добро пожаловать, пожалуйста, не стесняйтесь, присаживайтесь."

    - char: chikuma
      side: right
      text:
        - "Резиденция госпожи Синано… здесь так тихо и пустынно."

    - char: suruga
      side: left
      text:
        - "Может, это потому, что Носиро, Рюхо и другие сейчас на заданиях?"
        - "Впрочем, здесь и обычно немноголюдно. Раз госпожа Синано находится на отдыхе, такая тишина даже к лучшему."

    - char: chikuma
      side: right
      text:
        - "Перед отъездом госпожа Мусаси просила передать свои приветствия и пожелать госпоже Синано скорейшего выздоровления."
        - "Мы сделаем всё возможное, чтобы сопровождать её в этой миссии, и обязательно обеспечим безопасность госпожи Синано."

    - char: suruga
      side: left
      text:
        - "Полагаюсь на вас. Госпожа Синано тоже с нетерпением ждет этой операции."
        - "Официальное начало назначено через два дня, верно?"

    - char: chikuma
      side: right
      text:
        - "Да, но мы разместимся здесь уже сегодня и останемся до самого отправления вместе с госпожой Синано."

    - char: suruga
      side: left
      text:
        - "Без проблем. Позже девочки-эсминцы покажут вам устройство резиденции, чувствуйте себя как дома."

    - char: katsuragi
      side: right
      text:
        - "Скажите, а когда, когда мы сможем увидеть госпожу Синано?!"

    - char: chikuma
      side: left
      text:
        - "Кацураги, не будь такой нетерпеливой… приношу свои извинения."

    - char: suruga
      side: right
      text:
        - "Хи-хи, не нужно так стесняться. Госпожа Синано совсем не строгий человек, вы сами всё поймете, когда встретитесь с ней."
        - "Просто сейчас у госпожи Синано время отдыха. Официальная встреча назначена на вечер, госпожа Синано лично устроит банкет в вашу честь."

    - char: katsuragi
      side: left
      text:
        - "О-о-о-о! Просто замечательно!"
        - "Ах да… чуть не забыла. Суруга, ты не видела перед нашим приходом одну коротышку, которая приходила постучать в дверь?"

    - char: suruga
      side: right
      text:
        - "Не припоминаю, у вас есть и другие спутники?"

    - char: chikuma
      side: left
      text:
        - "Да… она должна была прийти сюда раньше нас, чтобы доложить о прибытии. Видимо, она заблудилась."

    - char: suruga
      side: right
      text:
        - "Резиденция госпожи Синано довольно сложна по своей структуре, посторонний здесь действительно может потеряться… Хорошо, я организую поиски."

    - char: chikuma
      side: left
      text:
        - "Большое спасибо, извини за беспокойство."

chapter4:
  rows:

    - char: shimakaze
      side: left
      text:
        - "Я просто увидела красивую птицу и сама не заметила, как пошла следом…"
        - "А когда опомнилась и попыталась вернуться по памяти… оказалось, что я только больше запуталась, да и вовсе заблудилась!"
        - "Как такое могло произойти… какой позор для Симакадзэ!"
        - "У-у… я заперта здесь, и неизвестно, когда меня найдут. Похоже, придется звать на помощь."
        - "Эй———— есть кто-нибудь———— здесь есть кто-нибудь поблизости!"

    - char: shinano???
      side: right
      status: is-blue
      text:
        - "Кхе…"

    - char: shimakaze
      side: left
      text:
        - "А! Как же хорошо, что я встретила товарища, когда уже думала, что всё кончено!"

    - char: shinano???
      side: right
      status: is-blue
      text:
        - "Что ты делаешь в кустах?"

    - char: shimakaze
      side: left
      text:
        - "Если честно, я пришла по поручению госпожи Мусаси вместе с госпожой Тикумой, чтобы нанести визит госпоже Синано."
        - "Но оглянуться не успела, как заблудилась в этой огромной резиденции… теперь я в безвыходном положении…"

    - char: shinano???
      side: right
      status: is-blue
      text:
        - "Ты никогда не видела госпожу Синано?"

    - char: shimakaze
      side: left
      text:
        - "Как ни стыдно признаться, я её ни разу не видела… Но ты только подумай, госпожи класса «Ямато» — это не те, с кем можно встретиться, когда захочешь."
        - "Особенно госпожа Синано, которая до недавнего времени всё время была на дальнем острове… И вдруг — совместное задание, прямо как во сне~"

    - char: shinano???
      side: right
      status: is-blue
      text:
        - "Сон, значит… Ты ведь, кажется, Симакадзэ?"

    - char: shimakaze
      side: left
      text:
        - "Всё верно! Я — уникальный эсминец типа «Симакадзэ», Симакадзэ!"

    - char: shinano???
      side: right
      status: is-blue
      text:
        - "Кажется, вы с Суругой в хороших отношениях?"

    - char: shimakaze
      side: left
      text:
        - "Угу! Мы с госпожой Суругой несколько раз работали вместе! Когда у меня было совсем мало боевого опыта, госпожа Суруга очень любезно мне во всем помогала!"
        - "Правда, я доставила ей немало хлопот… Интересно, что госпожа Суруга думает обо мне…"

    - char: shinano
      side: right
      text:
        - "Успокойся, вы обязательно станете подругами."

    - char: shimakaze
      side: left
      text:
        - "Правда?! А! Это несправедливо, что ты знаешь обо мне всё, а я даже не знаю твоего имени?"

    - char: shinano
      side: right
      text:
        - "Моё имя, говоришь…"

    - char: suruga
      side: left
      text:
        - "Госпожа Синано, охрана, присланная госпожой Мусаси, размещена, осталось только дождаться вечера…"
        - "…Симакадзэ?"
        - "(Не может быть, не может быть… Неужели та самая потерявшаяся коротышка, о которой говорила Тикума, — это и есть Симакадзэ! Это ведь задний двор, где отдыхает госпожа Синано, как она умудрилась забрести сюда?!)"
        - "…Что ты здесь делаешь?"

    - char: shimakaze
      side: right
      text:
        - "Госпожа Суруга! Не ожидала встретить тебя здесь! Я пришла вместе с госпожой Тикумой, но нечаянно сбилась с пути…"
        - "Ты не знаешь, где госпожа Синано? Мне нужно как можно скорее пойти поздороваться, мои товарищи меня уже ждут!"
        - "Подожди, ты только что, когда подходила, назвала имя госпожи Синано…?"
        - "У-ух… м-м…?"

    - char: shinano
      side: left
      text:
        - "......"

    - char: shimakaze
      side: right
      text:
        - "........*замирает в ступоре и отключается*"

    - char: shinano
      side: left
      text:
        - "Упала в обморок...."

    - char: suruga
      side: right
      text:
        - "(Упала в обморок?! Она что, упала в обморок прямо перед госпожой Синано?! За что мне всё это…?)"
        - "Госпожа Синано, прошу прощения за столь вопиющую невоспитанность…"

    - char: shinano
      side: left
      text:
        - "Не бери в голову. Думаю, с таким милым ребенком в спутниках это путешествие обещает быть весьма любопытным~"
chapter1:
  rows:

    - char: aquila
      side: left
      text:
        - "Встречный ветер, видимость отличная, море спокойное... Сегодня прекрасная погода для полетов палубной авиации."

    - char: vittorio_veneto
      side: right
      text:
        - "Превосходно. Подготовка к выходу завершена, Аквила?"

    - char: aquila
      side: left
      text:
        - "Всё готово, госпожа Венето. Все модули снаряжения работают в штатном режиме, авиагруппы прошли повторную проверку."

    - char: vittorio_veneto
      side: right
      text:
        - "Что ж... Тогда начнём."

    - char: aquila
      side: left
      text:
        - "Слушаюсь, госпожа Венето. Звенья истребителей, на взлёт! Завоёвываем превосходство в воздухе для нашего флота!"

    - text:
      - "Под мелодичный гул двигателей самолёты один за другим срывались с полетной палубы Аквилы, устремляясь в лазурное небо."

    - char: vittorio_veneto
      side: left
      text:
        - "Империя вложила столько сил ради этого дня... Полетная палуба, системы катапульт, самолёты..."
        - "Даже с технической поддержкой Железной Крови процесс разработки был невероятно тяжелым... Прорыв в каждом модуле ощущался так, будто мы покоряем горную вершину."
        - "У имперской гвардии была серьезная брешь в области авиации, что наглядно проявилось в прошлых сражениях с Королевским Флотом."
        - "Однако благодаря бесчисленным дням и ночам упорного труда нашего исследовательского отдела мы, наконец, восполнили этот пробел."
        - "С этого мгновения у военно-морского флота Империи появились крылья. Орел Империи будет свободно парить над Средиземным морем!"
        - "Всюду, куда дотянутся крылья орла, прострется и мощь Империи Сардиния!"
        - "В Сенате всё ещё находятся те, кто опасается, что использование авианосцев приведет к закату эры «больших пушек»."
        - "Группа безнадежно отставших от времени ископаемых... Возможно, когда-то такие опасения и имели смысл."
        - "Но сегодня, когда корабли бороздят океаны столь стремительно, и авианосцы, и линкоры являются незаменимыми элементами флота."
        - "Тактика взаимодействия флота и авиации, подобная той, что использует Королевский Флот... Теперь и мы, наконец, можем её опробовать."
        - "Нет, более того — на основе опыта Королевского Флота мы разработаем совершенно новую тактику, отвечающую стилю Империи Сардиния!"

    - text:
      - "По мере того как гул двигателей вблизи затихал, все истребители один за другим уже кружили в синеве небес."

    - char: aquila
      side: left
      text:
        - "Госпожа Венето... Вы о чём-то задумались? Если я что-то делаю не так, пожалуйста, поправьте меня в любой момент!"

    - char: vittorio_veneto
      side: right
      text:
        - "Ха-ха, ты — наш главный эксперт в воздушном бою, чему я могу тебя научить? Ты справляешься великолепно. Просто я... немного залюбовалась зрелищем."
        - "Тебе пришлось нелегко всё это время, Аквила. Но боюсь, в будущем работы станет ещё больше."

    - char: aquila
      side: left
      text:
        - "Верность Империи — мой долг как бойца гвардии. Каким бы трудным ни было задание, вы можете полностью на меня положиться."

    - char: vittorio_veneto
      side: right
      text:
        - "Прекрасно. Достойный настрой."

    - char: libeccio
      side: left
      text:
        - "Смотрите, смотрите! Самолеты в небе меняют строй!"

    - char: maestrale
      side: right
      text:
        - "Должно быть, это и называется «авиационным построением» палубной группы."

    - char: aquila
      side: left
      text:
        - "Совершенно верно, это построение! Располагая самолёты в разных формациях в зависимости от задачи, можно добиться от них максимальной эффективности."

    - char: libeccio
      side: right
      text:
        - "Как круто! А что это за строй сейчас? Я что-то не совсем понимаю..."

    - char: aquila
      side: left
      text:
        - "...А? Не понимаешь?.. У-ух, похоже, мне нужно ещё усерднее практиковаться в отработке фигур пилотажа!.."
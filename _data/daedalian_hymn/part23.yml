chapter1:
  rows:

    - text:
      - "Сражение в лабиринте продолжалось."
      - "Идентичные по составу «королевские» флоты раз за разом возникали на поворотах схожих водных путей, и имперский флот так же неумолимо сокрушал врага перед собой."
      - "И каждый раз после полного уничтожения «королевских» сил лабиринт начинал очередной цикл полной перестройки своей структуры."

    - char: torricelli
      side: left
      text:
        - "Сражаются так неистово, будто с каждой победой над тенями прошлого сияние Империи становится всё ярче..."
        - "Госпожа Венето, ваше предчувствие вас не обмануло — воодушевление остальных подозрительно зашкаливает... В этом лабиринте определенно есть скрытые механизмы, которые мы еще не обнаружили."
        - "Вы ведь помните Сирен из мифов? Тех, что завлекали путников своим пением, лишая их рассудка, пока те сами не направляли свои корабли на погибель."
        - "Возможно, Сирены и впрямь воссоздали в этом лабиринте ту самую черту своих мифических тезок, у-ху-ху..."

    - char: vittorio_veneto
      side: right
      text:
        - "Ты имеешь в виду контроль над разумом?.."

    - char: torricelli
      side: left
      text:
        - "Вряд ли это настолько радикальный механизм. Госпожа Литторио и остальные вполне способны поддерживать нормальный разговор, на лишенных рассудка они не похожи."
        - "Просто они слишком возбуждены, а их способность здраво оценивать ситуацию сильно притупилась..."
        - "Я подозреваю, что сама планировка лабиринта обладает неким суггестивным эффектом, или же Сирены встроили в эти стены устройства, способные влиять на эмоциональный фон..."

    - char: vittorio_veneto
      side: right
      text:
        - "Если так, то почему это не подействовало на нас с тобой?.."

    - char: torricelli
      side: left
      text:
        - "Наверное, даже самым мощным технологиям Сирен не под силу вызвать эмоциональный всплеск у такого человека, как я... у-ху-ху..."

    - char: vittorio_veneto
      side: right
      text:
        - "Ха-ха... Получается, моя нерешительность достигла таких масштабов, что её не могут пробить даже уловки Сирен?.."
        - "Нельзя оставлять всё как есть. Нужно найти способ первым же делом привести Литторио в чувство!.."
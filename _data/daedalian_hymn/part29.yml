chapter1:
  rows:

    - char: vittorio_veneto
      side: left
      text:
        - "Ну что же, «Минотавр», мы пришли в твой лабиринт, чтобы сразить тебя."
        - "Судя по оснащению, перед нами Тестер Сирен. Высокоранговые антропоморфные Сирены обычно управляют Зеркальными морями. Если мы покончим с тобой, проблема Сирен в этом регионе будет решена!"

    - char: tester???
      side: right
      status: is-red
      text:
        - "...Расхождений с расчётами не выявлено."
        - "Даже при такой реконструкции не возникло никаких непредвиденных отклонений."

    - char: vittorio_veneto
      side: left
      text:
        - "В каком-то смысле мы должны поблагодарить тебя за твои механизмы — они помогли нам окончательно выйти из тени прошлого."
        - "Отныне Империя Сардиния будет держать курс к истинному величию. Что же до тебя — твоё время истекло!"

    - char: tester???
      side: right
      status: is-red
      text:
        - "Среда изолирована, реконструкция сценария неполная, контактов с «переменной» не зафиксировано..."
        - "Почему в прошлый раз возникли изменения, а в этот нет ... в чём же отличие ... не удаётся прийти к обоснованному выводу."

    - char: vittorio_veneto
      side: left
      text:
        - "Эй, Тестер, ты вообще меня слушаешь?!"

    - char: tester???
      side: right
      status: is-red
      text:
        - "Необходимы дополнительные тесты, текущие результаты суммируются для последующего анализа..."

    - char: duca_degli_abruzzi
      side: left
      text:
        - "Никакой реакции на наши слова. Говорили, что с антропоморфными Сиренами можно вести нормальный диалог. Неужели разведданные ошибочны?"

    - char: aquila
      side: right
      text:
        - "Может, это какой-то сбой... Или у Тестер просто такой характер — игнорировать окружающих?.."

    - char: vittorio_veneto
      side: left
      text:
        - "Не знаю... Я тоже впервые вижу Тестер вживую..."

    - char: libeccio
      side: right
      text:
        - "Будем бить?.. Раз уж выяснили, кто виноват, давайте просто нападём!"

    - char: maestrale
      side: left
      text:
        - "Нападать в такой ситуации как-то... не совсем благородно. Нет ощущения начала честного боя... Странное чувство."

    - char: duca_degli_abruzzi
      side: right
      text:
        - "Согласна. Если мы сейчас откроем огонь, это будет выглядеть как подлый удар в спину... В духе того, что так любит делать Королевский Флот."

    - char: torricelli
      side: left
      text:
        - "Если она и впрямь не может двигаться из-за поломки, пожалуйста, постарайтесь сохранить детали целыми, чтобы я могла их открутить, у-ху-ху..."

    - char: tester???
      side: right
      status: is-red
      text:
        - "...Сводка данных завершена. Подготовка главных калибров к залпу..."

    - char: nicoloso_da_recco
      side: left
      text:
        - "Уа-а-а! Огромные пушки Тестер, кажется, сейчас выстрелят!"

    - char: torricelli
      side: right
      text:
        - "Тц, значит, не сломалась. Как жаль...."

    - char: vittorio_veneto
      side: left
      text:
        - "Ну, зато теперь мы можем атаковать в полную силу без всяких угрызений совести! Всем кораблям — приготовиться к залпу! Сойдёмся в честном бою, Тестер!"
chapter1:
  rows:

    - char: aquila
      side: left
      text:
        - "Оказавшись здесь на самом деле, невольно кожей чувствуешь ту же мрачную и давящую атмосферу, что описывалась в мифах о Кносском лабиринте..."
        - "Куда ни глянь — повсюду возвышаются стены, но при этом водные каналы между ними настолько огромны, что места для маневров целого флота здесь более чем достаточно..."
        - "Как вы думаете... Сирены напали на наш флот с искусством не потому ли, что сами заинтересовались прекрасным?"

    - char: libeccio
      side: right
      text:
        - "Ну, сеять повсюду страх — это чуть ли не единственный талант Сирен~ Не думаю, что им нужно специально этому учиться."

    - char: vittorio_veneto
      side: left
      text:
        - "Я тоже сомневаюсь. Хотя им и впрямь не помешало бы приобщиться к искусству..."
        - "За все эти годы логика модернизации флота Сирен сводилась лишь к грубому нагромождению пушек и оборудования... Даже мне, как их противнику, на это больно смотреть."
        - "А их самолёты? Это же просто связка орудийных стволов с набором громоздких деталей... Где они только набрались такой эстетики!"

    - char: aquila
      side: right
      text:
        - "С этой точки зрения в них действительно нет ни капли артистизма... И всё же само название «Сирены» впервые родилось именно здесь, в Эгейском море."
        - "Если бы они совсем ничего не понимали, вряд ли стали бы называть себя так, верно?.."

    - char: vittorio_veneto
      side: left
      text:
        - "Похоже, в этом вопросе Аквила придерживается теории «самоназвания»... А ты, Абруцци, что думаешь?"
        - "Как по-твоему: имя «Сирены» — это информация, которую мы получили от них самих, или же это кодовое имя, которое мы дали им сами?"

    - char: duca_degli_abruzzi
      side: right
      text:
        - "...Если рассуждать логически, я считаю, что «Сирены» — это лишь прозвище, которое люди прошлого дали внезапно появившемуся могущественному врагу."

    - char: littorio
      side: left
      text:
        - "Значит, Абруцци у нас сторонница теории «кодового имени»~"

    - char: aquila
      side: right
      text:
        - "Но если это так, то почему Сирены сами называют себя так же, как и мы?"

    - char: duca_degli_abruzzi
      side: left
      text:
        - "Хм... Это и впрямь не вяжется. Значит, «Сирены» — это всё-таки их самоназвание, а мы просто переняли эти сведения?"

    - char: littorio
      side: right
      text:
        - "Но тогда почему Сирены изначально выбрали себе имя, взятое из нашей культуры и искусства?"

    - char: duca_degli_abruzzi
      side: left
      text:
        - "...Прошу прощения, госпожа Литторио, моих познаний недостаточно, чтобы ответить на этот вопрос."

    - char: littorio
      side: right
      text:
        - "Ха-ха-ха, не бери в голову! Если бы ты ответила на этот вопрос с ходу, мне пришлось бы немедленно выписать тебе рекомендательное письмо на обучение в Высшую исследовательскую академию Империи."

    - char: aquila
      side: left
      text:
        - "Госпожа Венето, госпожа Литторио, вы упомянули сторонников «самоназвания» и «кодового имени»... Неужели даже в Сенате нет окончательного ответа на этот вопрос?"

    - char: littorio
      side: right
      text:
        - "Да какой там Сенат! Боюсь, сейчас вообще никто в мире не знает ответа."

    - char: vittorio_veneto
      side: left
      text:
        - "Это старая дилемма... Хотя мы сражаемся с Сиренами уже столько лет, ключевых сведений об их истинной природе у нас катастрофически мало."
        - "А когда мы пытаемся изучать те крохи информации, что у нас есть, мы раз за разом приходим к несовместимым и даже противоречащим друг другу выводам."

    - char: littorio
      side: right
      text:
        - "Помнится, как раз перед тем, как Империя покинула «Лазурный путь», командование с большим энтузиазмом затеяло очередной раунд исследований происхождения Сирен?"

    - char: vittorio_veneto
      side: left
      text:
        - "Да... Но итог был прежним: никаких полезных заключений. Любая попытка докопаться до сути Сирен неизбежно заканчивается именно так."

    - char: nicoloso_da_recco
      side: right
      text:
        - "Мне кажется, по крайней мере... мифические Сирены были куда приятнее нынешних!"
        - "Те Сирены всего лишь завлекали путников своим пением, а не нападали первыми, сея разрушения повсюду, как эти!.."

    - char: aquila
      side: left
      text:
        - "Существует теория, что существа из древних мифов на самом деле были преувеличенным образом различных наемных отрядов прошлого. Например, отряда наемников под названием «Сирены»."

    - char: nicoloso_da_recco
      side: right
      text:
        - "...Э?! Если это всего лишь наемники, то в этом совсем нет романтики!"

    - char: vittorio_veneto
      side: left
      text:
        - "Полулюди-полумонстры из далеких легенд или, возможно, реально существовавший отряд наемников — что из этого тебе кажется более подходящим?"

    - char: nicoloso_da_recco
      side: right
      text:
        - "Если в качестве реального противника, то, конечно, лучше обычные наемники..."
        - "Но с точки зрения искусства и воображения, полулюди-монстры определенно куда романтичнее~!"
        - "И вообще, раз уж перед нами сейчас стоят целые орды нечеловеческих Сирен, кто может гарантировать, что существа из мифов не существовали на самом деле?"
chapter1:
  rows:

    - char: maestrale
      side: left
      text:
        - "...Возможно, если не уничтожать этот флот-приманку, лабиринт не будет меняться."
        - "Может, попробуем обойти его? Есть ведь мнение, что через лабиринт ведет не одна-единственная дорога..."

    - char: nicoloso_da_recco
      side: right
      text:
        - "М-м... Если не искать кратчайший путь, то дорог действительно много, но есть ключевые участки, через которые проходят абсолютно все маршруты."
        - "И этот флот впереди, кажется, перекрыл как раз такое ключевое место..."

    - char: maestrale
      side: left
      text:
        - "...Значит, обойти не получится."

    - char: libeccio
      side: right
      text:
        - "Но если мы продолжим движение, лабиринт снова изменится... Даже герой, победивший Минотавра, не сталкивался с такой сложной задачей!"

    - char: duca_degli_abruzzi
      side: left
      text:
        - "Герой прошлого, Тесей, смог покинуть лабиринт после победы над чудовищем лишь благодаря нити, которую взял с собой при входе."
        - "Для нас выйти из лабиринта так же просто, но повернуть назад, не достигнув цели, было бы трусливым бегством..."

    - char: littorio
      side: right
      text:
        - "Верно. Отступление — не вариант. И дело не только в приказах или чести Империи, мы не можем отступить просто потому, что наши товарищи всё еще заперты здесь."

    - char: vittorio_veneto
      side: left
      text:
        - "У истории о Кносском лабиринте есть и другое продолжение... о его создателе Дедале."

    - char: aquila
      side: right
      text:
        - "Дедал... Вы имеете в виду крылья, которые он использовал, чтобы спастись?"

    - char: vittorio_veneto
      side: left
      text:
        - "Именно! В этой истории был и другой способ покинуть лабиринт — крылья тоже могут нам помочь!"

    - char: aquila
      side: right
      text:
        - "Я всё время использовала свои самолеты для разведки... Но пока лабиринт постоянно меняется, этот метод не приносит плодов..."

    - char: vittorio_veneto
      side: left
      text:
        - "Потому что крылья нужны не для того, чтобы указывать дорогу... они должны помочь нам покинуть это место напрямую."

    - char: littorio
      side: right
      text:
        - "Кажется, у тебя появилась интересная идея... Ты хочешь сказать, нам стоит пересесть на самолеты и десантироваться прямо в центр лабиринта?"

    - char: nicoloso_da_recco
      side: left
      text:
        - "Э?! А такое вообще возможно?!"

    - char: torricelli
      side: right
      text:
        - "Крайне опасно, возможно лишь теоретически..."
        - "Наши самолеты не предназначены для перевозки людей. Чтобы это реализовать, нам пришлось бы деактивировать оснастку, как-то закрепиться снаружи фюзеляжа и лететь на сверхмалой скорости и высоте..."
        - "Без специальной подготовки такой трюк не выполнить. Тем более на поле боя — одно попадание Сирен, и нам конец, у-ху-ху..."

    - char: vittorio_veneto
      side: left
      text:
        - "Да и Аквила, как авианосец, и наши серийные корабли не смогут преодолеть лабиринт таким способом, верно?"
        - "Я, конечно, это понимаю. Под «крыльями» я подразумеваю не физические плоскости самолета, а крылья нашего духа."

    - char: duca_degli_abruzzi
      side: right
      text:
        - "...Крылья духа?"

    - char: vittorio_veneto
      side: left
      text:
        - "Наши души всё это время оставались заперты в лабиринте прошлых поражений, мы так и не вышли из него по-настоящему."
        - "Мало просто признать это, нужно, боюсь, принять всё до самого конца."
        - "Если мы не освободим свой разум, мы и физически останемся пленниками этого места... Я думаю, в этом и заключается коварство лабиринта Сирен — и в этом же ключ к его разгадке."

    - char: duca_degli_abruzzi
      side: right
      text:
        - "Звучит как-то туманно и метафизически... Но это вполне в духе загадочного стиля работы Сирен."

    - char: littorio
      side: left
      text:
        - "Искренне принять, значит... Я поняла!"
        - "Эй вы, Сирены на той стороне! Не знаю, понимаете ли вы человеческую речь, но в такой ситуации я не стану привередничать по поводу качества аудитории."
        - "Слушайте же из своих тёмных углов эту великолепную речь под названием «Раскаяние» от меня, самой Литторио!"

chapter2:
  rows:

    - text:
      - "Полчаса спустя..."

    - char: littorio
      side: left
      text:
        - "Ни лабиринт, ни враги не изменились... Как же так! Неужели моё раскаяние было недостаточно глубоким?!"

    - char: vittorio_veneto
      side: right
      text:
        - "Не сработало?.. Похоже, стоит развить эту мысль в более научном ключе."

    - char: torricelli
      side: left
      text:
        - "Раз... уничтожение этой «королевской» эскадры является необходимым условием для перестройки лабиринта, значит, нам нужно прорваться сквозь них, не уничтожая их."

    - char: vittorio_veneto
      side: right
      text:
        - "А ведь и правда! Мы так сосредоточились на самом лабиринте, что снова упустили из виду саму сущность Сирен!"

    - char: duca_degli_abruzzi
      side: left
      text:
        - "Что ты имеешь в виду?.. Разве мы не сражались с флотами Сирен всё это время?"

    - char: vittorio_veneto
      side: right
      text:
        - "Не с теми, что перед нами, а с теми — из легенд, что завлекали моряков пением. Ранее Сирены использовали неизвестное нам устройство, чтобы сбить нас с толку, и это воздействие, боюсь, до сих пор не исчезло."

    - char: aquila
      side: left
      text:
        - "...Вот оно что! В мифах моряки заливали уши воском и привязывали себя к мачтам, чтобы любой ценой проплыть мимо, не поддавшись смертельной ловушке Сирен."
        - "Значит, нам нужно проделать нечто подобное, чтобы миновать опасную зону впереди!"

    - char: littorio
      side: right
      text:
        - "Нам придётся широко открыть глаза и во всех деталях воскресить в памяти картины того поражения... Провести по-настоящему полное «очное знакомство» с прошлым, как физически, так и духовно..."

    - char: vittorio_veneto
      side: left
      text:
        - "Разумеется. Но даже имея крылья, нельзя забываться и повторять судьбу Икара."
        - "Будет скверно, если мы позволим сценам прошлого полностью воплотиться в реальности... Когда мы прорвёмся сквозь этот механизм, нам ещё предстоит уничтожить немало настоящих Сирен."

    - char: torricelli
      side: right
      text:
        - "Критерий срабатывания — уничтожен флот-приманка или нет, а не то, насколько сильно нас побьют. Думаю, достаточно будет просто сделать вид..."

    - char: littorio
      side: left
      text:
        - "Ладно... Тогда так и поступим! Всем игнорировать «королевский» флот «Пешек» впереди! Полный вперёд!"
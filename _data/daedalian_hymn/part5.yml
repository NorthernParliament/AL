chapter1:
  rows:

    - char: nicoloso_da_recco
      side: left
      text:
        - "Ой?!! Поступил сигнал бедствия! Неподалеку на торговый флот напали Сирены!"

    - char: duca_degli_abruzzi
      side: right
      text:
        - "Как раз вовремя — сэкономим время на поисках."
        - "Торричелли, немедленно прикажи всем гражданским судам в округе отойти в сторону. С врагами мы разберемся сами."

    - char: torricelli
      side: left
      text:
        - "Будет сделано..."

    - char: littorio
      side: right
      text:
        - "Ах, подожди минутку. Обязательно уточни всем судам поблизости, что защиту им обеспечивает именно военно-морской флот Империи Сардиния!"

    - char: torricelli
      side: left
      text:
        - "Слушаюсь, слушаюсь..."

    - char: littorio
      side: right
      text:
        - "Ха-ха-ха! Гвардия Империи Сардиния, к бою! Построение — встретить врага!"
chapter1:
  rows:

    - char: duca_degli_abruzzi
      side: left
      text:
        - "Все вражеские корабли потоплены, бой окончен."

    - char: littorio
      side: right
      text:
        - "Ха-ха, в каком-то смысле нам даже повезло. Наш авианосец только-только вступил в строй, а Сирены так «щедро» подбрасывают нам столько пушечного мяса, помогая оттачивать тактику."

    - char: aquila
      side: left
      text:
        - "Я буду дорожить каждой возможностью отточить навыки управления самолётами! Пожалуйста, и впредь поручайте мне любые боевые задачи!"

    - char: littorio
      side: right
      text:
        - "Не волнуйся, бесчисленные Сирены, затаившиеся в этих водах, — твои законные цели для охоты."

    - char: duca_degli_abruzzi
      side: left
      text:
        - "Какая это уже по счёту победа? Я уже сбилась со счёта."
        - "Пусть лабиринт снова изменился, но мы неуклонно продвигаемся к самому сердцу Эгейского моря. Уверена, именно там находится центр лабиринта."

    - char: nicoloso_da_recco
      side: right
      text:
        - "Сколько бы раз он ни перестраивался, я всегда проложу для всех верный путь!"

    - char: libeccio
      side: left
      text:
        - "Я тоже буду сражаться изо всех сил и уничтожу ещё больше врагов!"

    - char: maestrale
      side: right
      text:
        - "Я... я тоже."

    - char: littorio
      side: left
      text:
        - "Хм, Сирены пытаются раз за разом подсовывать нам «Пешек» Королевского Флота, чтобы напомнить о былых неудачах, но, кажется, добились прямо противоположного эффекта."
        - "Сегодняшние триумфы доказали: Империя окончательно вышла из тени поражений. Каждая новая победа делает величие Империи всё ярче!"

    - char: vittorio_veneto
      side: right
      text:
        - "..Литторио, тебе не кажется, что ты чересчур воодушевлена?"

    - char: littorio
      side: left
      text:
        - "Разве? Я ничего такого не чувствую... Но если и так, то, должно быть, я просто тронута той мощью, которую Империя демонстрирует в каждом бою!"

    - char: vittorio_veneto
      side: right
      text:
        - "У меня нехорошее предчувствие, Литторио... Эти слабые противники явно расставлены Сиренами намеренно. У них определённо есть какой-то замысел..."

    - char: littorio
      side: left
      text:
        - "Ну и пусть! Какой бы враг ни появился, мы просто сокрушим его огнём наших орудий... нет, теперь ещё и нашей палубной авиацией~!"
        - "Флот, вперёд! Впереди нас ждёт очередная победа!"

    - char: all
      side: right
      text:
        - "ЕСТЬ!!!"
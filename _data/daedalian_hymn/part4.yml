chapter1:
  rows:

    - char: nicoloso_da_recco
      side: left
      text:
        - "Литторио, я слышала, что эти произведения искусства прибыли из Константинополя? Что это за город такой? Я там ещё ни разу не была!"

    - char: littorio
      side: right
      text:
        - "О, если рассказывать об этом городе всерьёз, не хватит и дня, и ночи. Но раз уж тебе так интересно, я кратко познакомлю тебя с ним~"

    - char: torricelli
      side: left
      text:
        - "(Не к добру... Вопрос да Рекко нажал на какой-то странный переключатель у Литторио)."

    - char: duca_degli_abruzzi
      side: right
      text:
        - "(...А? О чём ты?)"

    - char: littorio
      side: left
      text:
        - "Константинополь... Этот город изначально задумывался как новая столица Ромула. Наречённый Новым Римом, он символизировал начало очередной блистательной эпохи Империи."
        - "Вечный город, Великий град, Священный город, колыбель культуры и истории, драгоценный камень в имперском венце, жемчужина Мраморного моря..."
        - "За тысячу лет этому городу было даровано столько титулов, сколько звёзд на небе."
        - "И, соответственно, у него есть бесчисленное множество имён, воспеваемых в веках: Константинополь, Константинополис, Миклагард, Костантинийе..."

    - char: torricelli
      side: right
      text:
        - "Стамбул."

    - char: littorio
      side: left
      text:
        - "...?"

    - char: torricelli
      side: right
      text:
        - "Литторио, ты пропустила одно имя. У этого города есть ещё и название Стамбул."

    - char: littorio
      side: left
      text:
        - "*Игнорирует*"
        - "В общем, все эти титулы вместе с самим городом запечатлели бесчисленные моменты триумфа Империи, её расцвет и её закат."

    - char: nicoloso_da_recco
      side: right
      text:
        - "Ва-а-а... Как здорово! Это действительно великий город!"

    - char: littorio
      side: left
      text:
        - "Именно так, именно так~"

    - char: duca_degli_abruzzi
      side: right
      text:
        - "Вот только этот город больше не находится под нашим контролем..."

    - char: littorio
      side: left
      text:
        - "Да, былого величия Ромула, чьи владения превращали Средиземное море во внутреннее озеро, больше нет."
        - "Но даже закатные лучи, оставленные Империей, всё ещё сияют нестерпимо ярко."
        - "Как наследница Ромула, Империя Сардиния неизбежно вернёт былое величие и возродит имперский блеск. Средиземное море навсегда останется морем Сардинии."

    - char: duca_degli_abruzzi
      side: right
      text:
        - "Легко сказать... Но чтобы иметь будущее, нужно смотреть в настоящее."
        - "То, что Сенат в разгар войны печется о закупке предметов искусства из Константинополя... У нас ведь полно направлений, где эти средства сейчас нужнее..."

    - char: littorio
      side: left
      text:
        - "Ну-ну, не будь так сурова. Искусство — неотъемлемая часть жизни~ И хотя момент выбран не самый удачный, их можно понять."

    - char: torricelli
      side: right
      text:
        - "К тому же, под видом «произведений искусства» можно провезти кое-что скрытно от глаз других фракций..."

    - char: nicoloso_da_recco
      side: left
      text:
        - "А-а, Торричелли снова появилась! Прямо как ассасин!"

    - char: torricelli
      side: right
      text:
        - "Я просто была под водой... Сегодня слишком палящее солнце. Под прямыми лучами я просто растаю."

    - char: nicoloso_da_recco
      side: left
      text:
        - "Э? Да сегодня же отличная погода! От солнышка никто не тает!"

    - char: torricelli
      side: right
      text:
        - "Нет, я растаю... Я всплыла лишь для того, чтобы доложить: впереди показался остров Крит."

    - char: nicoloso_da_recco
      side: left
      text:
        - "О-о-о! Крит! Тот самый Крит, где находится легендарный Лабиринт?!"

    - char: torricelli
      side: right
      text:
        - "Есть такая легенда, но королевский дворец на острове давно превратился в руины, а существование лабиринта так и не подтвердилось. Этот остров мало чем отличается от других в Эгейском море."

    - char: nicoloso_da_recco
      side: left
      text:
        - "Знаешь, Торричелли, тебе не хватает романтики! Одной мысли о событиях, что здесь происходили, достаточно, чтобы прийти в восторг! К тому же, раз там руины, значит, могут быть и сокровища!"
        - "Не сиди постоянно под водой, выбирайся на поверхность полюбоваться прекрасными видами!"

    - char: torricelli
      side: right
      text:
        - "Я же сказала, я растаю... И вообще, ты же вроде мореплаватель, а не пират..."

    - char: nicoloso_da_recco
      side: left
      text:
        - "Да не растаешь ты! Ну честное слово... Разве не романтично — найти в плавании несметные сокровища и вернуться домой с полными трюмами!"

    - char: torricelli
      side: right
      text:
        - "Да-да, конечно... Что ж, позвольте мне снова погрузиться."
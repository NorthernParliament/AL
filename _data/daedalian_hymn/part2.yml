chapter1:
  rows:

    - char: littorio
      side: left
      text:
        - "«Выяснить судьбу флота, пропавшего в Эгейском море. По возможности вернуть утраченные „произведения искусства“ или, по крайней мере, заставить Сирен заплатить по счетам», — таково послание от Сената."

    - char: vittorio_veneto
      side: right
      text:
        - "Транспортный флот Сената, шедший из Константинополя, бесследно исчез... Это действительно серьезное происшествие."
        - "Погоди, Литторио... Неужели это именно тот флот, что перевозил наш груз?!"

    - char: littorio
      side: left
      text:
        - "К сожалению, именно он... Помимо множества бесценных произведений искусства, приобретенных Сенатом, там находились и наши вещи."

    - char: vittorio_veneto
      side: right
      text:
        - "...А что с Винченцо, которая их сопровождала?!"

    - char: littorio
      side: left
      text:
        - "Пропала вместе с флотом... Мы ведь специально поручили Винченцо охрану, опасаясь рисков. Кто же знал, что весь флот вместе с ней растворится в Эгейском море без следа."

    - char: vittorio_veneto
      side: right
      text:
        - "... Знай я это заранее, я бы настояла на своём и отправила больше кораблей эскорта."

    - char: littorio
      side: left
      text:
        - "Не вини себя, ты не виновата. Если бы мы ввязались в бесконечные споры с Сенатом, флот бы уже отправился в обратный путь ещё до того, как мы пришли бы к соглашению."
        - "К тому же, учитывая таинственность этого исчезновения, даже большее число кораблей вряд ли бы изменило результат."

    - char: vittorio_veneto
      side: right
      text:
        - "Пожалуй... Когда это случилось?"

    - char: littorio
      side: left
      text:
        - "Вчера рано утром. Получив известие, Сенат первым же делом решил поручить поиски в районе исчезновения авиации, а не нам."

    - char: vittorio_veneto
      side: right
      text:
        - "...................."

    - char: littorio
      side: left
      text:
        - "Ну, не злись, не злись~ После того как ВВС целый день проискали безрезультатно, они в итоге всё равно пришли к нам."
        - "Поскольку сообщений о нападениях в Эгейском море в последнее время становится всё больше, Сенат предполагает, что активность Сирен начала расти."

    - char: vittorio_veneto
      side: right
      text:
        - "Это и так очевидно... Хоть Акаги и кажется нетерпеливой, её интуиция весьма остра. Активность Сирен в Средиземном море достигла того уровня, когда игнорировать её больше нельзя."
        - "Нужно немедленно организовать поисково-спасательную операцию! Винченцо — девочка смышлёная, мы ещё должны успеть."
        - "Но это происшествие кажется мне странным... Эгейское море не такое уж большое, и судоходство там довольно оживленное. То, что авиация искала их целый день и ничего не нашла, означает, что это не простое отклонение от курса..."
        - "...Неужели это Зеркальное море?"

    - char: littorio
      side: left
      text:
        - "Если это и впрямь Зеркальное море, то нам крупно повезло~ Глядишь, потянем за ниточку и отыщем скрытую базу Сирен, которую так долго искали."

    - char: vittorio_veneto
      side: right
      text:
        - "Было бы замечательно... Нельзя позволять Сиренам и дальше бесчинствовать в саду Империи. Пора положить конец этой затянувшейся игре в кошки-мышки."

    - char: littorio
      side: left
      text:
        - "Ну что, тогда действуем как обычно? Ты остаёшься в тылу в качестве опоры, а я принимаю командование на передовой — устроим блистательную спасательную операцию?"

    - char: vittorio_veneto
      side: right
      text:
        - "Хм, дай-ка подумать... Со времен инцидента в Базилике отношения между Королевским Флотом и Доминионом Виши остаются весьма напряженными. Даже сейчас на Мальте дислоцировано огромное количество кораблей."
        - "Раз уж соглашение о прекращении огня подписано, давай уведомим Королевский Флот о нашем маршруте, чтобы избежать недопонимания."

    - char: littorio
      side: left
      text:
        - "Ха-ха~ Я знала, что ты об этом забеспокоишься, поэтому отправила уведомление ещё по пути сюда!"
        - "Я даже хотела пригласить леди Илластриес присоединиться к нам, но, к сожалению, получила решительный отказ."

    - char: vittorio_veneto
      side: right
      text:
        - "Твоя решительность поражает... Но в нынешней ситуации было бы чудом, если бы они согласились. Будь осторожнее, а то снова угодишь в ловушку Королевского Флота."

    - char: littorio
      side: left
      text:
        - "О, не беспокойтесь, госпожа Венето! Я уже не та наивная Литторио, что была в прошлом~"

    - char: vittorio_veneto
      side: right
      text:
        - "Прошу прощения, не могла бы ты поподробнее объяснить, что значит «наивная Литторио»?"

    - char: littorio
      side: left
      text:
        - "А... Ха-ха-ха... В общем, с уведомлениями я закончила! Ты уже определилась с планом действий?"

    - char: vittorio_veneto
      side: right
      text:
        - "Да... Я решила. Чтобы продемонстрировать амбиции Империи Сардиния и нашу способность поддерживать порядок в Средиземном море, мы обязаны победить. В этот раз я лично возглавлю основные силы флота Империи вместе с тобой."
        - "Однако всё произошло слишком внезапно. Мне нужно завершить кое-какие дела, да и Аквиле требуются финальные приготовления. Ты примешь командование авангардом."

    - char: littorio
      side: left
      text:
        - "Без проблем, я выступлю первой. В конце концов, Эгейское море совсем рядом — прогуляться туда всё равно что пройтись по собственному саду."
        - "Какое же великолепное зрелище явит гвардия Империи, впервые идя в бой при поддержке авианосца... Я в предвкушении!"
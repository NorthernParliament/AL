chapter1:
  rows:

    - char: nicoloso_da_recco
      side: left
      text:
        - "Всем приготовиться к повороту в левое ответвление впереди! Согласно разведданным госпожи Аквилы, нам нужно двигаться в ту сторону~!"

    - char: vittorio_veneto
      side: right
      text:
        - "Благодаря парящему в небе орлу и нашему выдающемуся навигатору, преодоление лабиринта — лишь вопрос времени, пусть это и займет чуть больше сил, чем хотелось бы."

    - char: aquila
      side: left
      text:
        - "Госпожа Венето, в зоне впереди обнаружено несколько флотов Сирен! Похоже, они намерены окружить нас сразу после того, как мы свернем в проход!"
        - "Модели... Хм?.. Это совершенно новые типы врагов, я таких раньше не видела!"

    - char: duca_degli_abruzzi
      side: right
      text:
        - "Новые модели Сирен?!"

    - char: littorio
      side: left
      text:
        - "Ого~ Красные, как свежая кровь, и сияющие, словно чистое золото... Какое... страстное дизайнерское решение!"

    - char: duca_degli_abruzzi
      side: right
      text:
        - "Вооружение на борту противника визуально не изменилось. Возможно, это новые модификации, а возможно — лишь особая раскраска..."

    - char: vittorio_veneto
      side: left
      text:
        - "...Использование основных цветов Ромула мгновенно приковывает взгляд. Не ожидала от Сирен столь эффектного дизайна."

    - char: littorio
      side: right
      text:
        - "Хм~ Мне тоже по душе! Когда-то Империя под такими же золотыми и красными знаменами с орлами сокрушала врагов одного за другим!"
        - "Использовать подобный дизайн для серийных моделей Сирен — это не только расточительство, но и неслыханная дерзость. Сирены, эти разрушители цивилизаций, не имеют права на подобные украшения!"

    - char: vittorio_veneto
      side: left
      text:
        - "Верно. Давайте же ответим им огнем..."

    - char: littorio
      side: right
      text:
        - "Но, разумеется, мы — совсем другое дело~ У нас хоть и нет знамен с орлами, зато теперь есть настоящий орел, парящий в поднебесье."
        - "Как законным наследникам Ромула, никому, кроме нас, Империи Сардиния, эта расцветка не подходит лучше~!"
        - "Что скажете, девочки? Как вернемся, разработаем такой же стиль для серийных кораблей нашего имперского флота?"

    - char: vittorio_veneto
      side: left
      text:
        - "Литторио... Столь вызывающая раскраска превратит серийные корабли в идеальные мишени посреди моря..."

    - char: duca_degli_abruzzi
      side: right
      text:
        - "Да уж, это всё равно что написать на борту: «Стрелять сюда»."

    - char: aquila
      side: left
      text:
        - "Я тоже думаю, что это немного... Для палубной авиации корабли с такой окраской будут куда заметнее обычных целей, их выберут для удара в первую очередь..."

    - char: torricelli
      side: right
      text:
        - "Для обнаружения и атаки с подводной лодки это тоже работает, у-ху-ху..."

    - char: littorio
      side: left
      text:
        - "Но разве притягивать к себе огонь — это, с другой стороны, не значит быть ослепительно великолепным?"
        - "Это будет флот, чей вид издалека будет повергать врага в трепет, флот — символ несокрушимой мощи имперских ВМС."
        - "И что с того, что это явная мишень? Пока мы крепко держим под контролем небо и глубины Средиземного моря, вражеские самолеты и субмарины нам не страшны!"

    - char: vittorio_veneto
      side: right
      text:
        - "Литторио... Я, пожалуй, зафиксирую это крайне «инновационное» предложение. Но детали мы давай-ка детально и серьезно обсудим уже после возвращения............"
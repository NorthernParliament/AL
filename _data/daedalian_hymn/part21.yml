chapter1:
  rows:

    - char: aquila
      side: left
      text:
        - "М-м... Впереди снова обнаружен флот «Пешек» Королевского Флота. Состав и масштаб... точно такие же, как и в прошлый раз!"

    - char: nicoloso_da_recco
      side: right
      text:
        - "А? Точно такие же?.."

    - char: libeccio
      side: left
      text:
        - "«С таким уровнем мы справимся, сколько бы их ни прислали» — неужели Сирены прислушались к твоему совету?"

    - char: nicoloso_da_recco
      side: right
      text:
        - "Э-э-эй?! Неужели?! Это всё я виновата, не надо было болтать лишнего..."

    - char: maestrale
      side: left
      text:
        - "...Не бери в голову. Либеччио просто шутит."

    - char: nicoloso_da_recco
      side: right
      text:
        - "Хе-хе-хе~ Но если Сирены и впрямь слушают мои советы... тогда пусть примут и следующий!"
        - "Сирены-и-и-и! А ну живо уберите этот дурацкий лабиринт!"

    - text:
      - "........."

    - char: nicoloso_da_recco
      side: right
      text:
        - "Никакой реакции. Эхе~"

    - char: duca_degli_abruzzi
      side: left
      text:
        - "Хм, сколько бы данных они ни собирали, Сирены, очевидно, так ничего и не поняли. Против нынешнего имперского флота подобные трюки бесполезны, сколько бы раз они их ни повторяли!"
        - "Мы никогда не повторим своих ошибок и тем более не позволим кошмарам прошлого сковать нас."

    - char: littorio
      side: right
      text:
        - "Верно сказано! Всем приготовиться, не сдерживайтесь — огонь из всех орудий! Сокрушим врага!"
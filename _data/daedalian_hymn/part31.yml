  rows:

    - text:
      - "БАБАХ!!!"

    - char: tester???
      side: right
      status: is-red
      text:
        - "Мощность «Песни Сирен» скорректирована до 70% ———— Пора завершать этот эксперимент."

chapter2:
  rows:

    - char: duca_degli_abruzzi
      side: left
      text:
        - "Госпожа Венето, ситуация скверная. Сама Тестер не представляет большой угрозы, но мощные помехи критически снизили нашу боеспособность."
        - "Если не уничтожить передатчик помех, флот понесет тяжелые потери в затяжном бою."

    - char: aquila
      side: right
      text:
        - "Я изо всех сил пытаюсь обнаружить источник помех, но пока не вижу ни одной подозрительной цели!"

    - char: vittorio_veneto
      side: left
      text:
        - "Зона слишком обширна. Устройство может быть спрятано за силовыми барьерами, под водой или даже внутри того гигантского оснащения Тестер..."
        - "Будь у нас возможность найти и уничтожить этот передатчик, мы бы заодно покончили и с самой Тестер..."

    - char: littorio
      side: right
      text:
        - "Нам нужна подавляющая огневая мощь... И не одного авианосца, а пяти или даже десяти..."

    - char: aquila
      side: left
      text:
        - "Может, запросить поддержку авиации?.. Если они полетят вдоль нашего маршрута входа, то смогут прорваться в Зеркальное море!"

    - char: littorio
      side: right
      text:
        - "Авиация... На Пелопоннесе действительно немало наших авиабаз, но просить помощи у ВВС..."

    - char: aquila
      side: left
      text:
        - "...А как насчет Железной Крови? У них поблизости тоже должно быть много аэродромов..."

    - char: littorio
      side: right
      text:
        - "Тоже не пойдет... Если мы сейчас позовем на помощь Железную Кровь, неизвестно, сколько наших интересов они потребуют взамен в будущем..."

    - char: vittorio_veneto
      side: left
      text:
        - "Литторио, сейчас не время печься о престиже. Если это принесет победу, какая разница, если мы разделим часть триумфа с авиацией?"
        - "Я приняла решение. Мы запросим поддержку у ВВС."

    - char: littorio
      side: right
      text:
        - "Раз ты так решила, я не возражаю. Хотя авиаторы вполне могут сделать вид, что ничего не заметили... Ну да ладно, попытка не пытка."
        - "Аквила, немедленно отправь свои лучшие истребители на прорыв из Зеркального моря к штабу ВВС на Пелопоннесе. Приведи нам подкрепление!"

    - char: aquila
      side: left
      text:
        - "Есть! Хотя, кажется, в этом больше нет нужды...! Огромная авиагруппа быстро приближается с юго-запада!"
        - "С северо-запада тоже! Госпожа Венето, госпожа Литторио, наша авиаподдержка уже в пути!"

    - char: littorio
      side: right
      text:
        - "Странно... Это же Зеркальное море, связь с внешним миром отрезана. Как авиация вошла сюда? И как они смогли так точно нас найти?.."
        - "ВВС, с которыми мы вечно не в ладах, вдруг сами организовали поддержку такого масштаба... Откуда такая аномальная исполнительность?.."

    - char: vittorio_veneto
      side: left
      text:
        - "У меня тоже нет догадок... Но подмога пришла как нельзя кстати. Теперь победа точно будет за нами."
        - "Главное, чтобы эти стервятники не отбомбились и по нам заодно... Всем кораблям — немедленно разорвать дистанцию с флотом Тестер! Сейчас начнется массированный авиаудар!"
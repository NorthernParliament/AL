chapter1:
  rows:

    - char: aquila
      side: left
      text:
        - "Госпожа Венето, то, что впереди... что это такое?.."

    - char: vittorio_veneto
      side: right
      text:
        - "...Зрелище куда более грандиозное, чем в любых донесениях. Так вот как выглядят погодные аномалии в Зеркальном море."

    - text:
      - "К северу от Крита, прямо посреди бескрайнего неба, из ниоткуда возникла преграда, похожая на стену."
      - "Впрочем, при ближайшем рассмотрении становилось ясно, что слово «стена» крайне неточно описывает представшую картину."
      - "От самого Крита в сторону Эгейского моря всё пространство, где раньше была лишь водная гладь, теперь заполняли бесчисленные величественные стены, возникшие словно из воздуха."

    - char: libeccio
      side: left
      text:
        - "Ва-а-а-а! Это... это просто невероятно!"
        - "Неужели эти стены прямо посреди моря — лабиринт?! Тот самый легендарный Лабиринт из мифов, воссозданный наяву?!"

    - char: maestrale
      side: right
      text:
        - "Лабиринт Кносса... И воссоздан он в манере куда более гротескной и масштабной, чем в самих мифах. Технологии Сирен, как и всегда, поражают воображение..."

    - char: vittorio_veneto
      side: left
      text:
        - "Возможно, этот лабиринт — лишь иллюзия или фата-моргана, призванная запутать нас... Аквила, направь самолеты к внешним стенам лабиринта для разведки."
        - "Остальным — немедленно проверить состояние электронных приборов и тщательно осмотреть окрестности."

    - char: all
      side: right
      text:
        - "Есть!"
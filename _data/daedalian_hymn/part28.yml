chapter1:
  rows:

    - char: aquila
      side: left
      text:
        - "Впереди обнаружен флот, ведущий бой с Сиренами! Примерно полтора десятка транспортных судов, несколько серийных моделей и... два корабля!"

    - char: duca_degli_abruzzi
      side: right
      text:
        - "Должно быть, это та самая пропавшая флотилия с произведениями искусства, которую мы так долго искали. Но два корабля... разве в эскорте был кто-то, кроме Винченцо?"

    - char: aquila
      side: left
      text:
        - "М-м... Судя по внешнему виду, второй корабль — эсминец Северного Парламента. Кто именно — разобрать не могу..."

    - char: vittorio_veneto
      side: right
      text:
        - "Представители Северного Парламента редко показываются за пределами своих баз и почти не участвуют в совместных операциях. Неудивительно, что ты её не узнала."
        - "Вопрос в том, что эсминец Северного Парламента делает здесь, да ещё и в компании нашего транспорта с артефактами..."
        - "Что по остальной обстановке? Каковы силы противника?"

    - char: aquila
      side: left
      text:
        - "Их немного. Двух эсминцев при поддержке серийных кораблей должно хватить, чтобы отбиться."
        - "Однако... Между их курсом и нашим лежит огромная область, затянутая морским туманом. Я не могу провести там эффективную разведку."

    - char: duca_degli_abruzzi
      side: right
      text:
        - "Ха, похоже, это и есть центральная часть лабиринта."
        - "Обитель кровожадного Минотавра из легенд... Интересно, какой «сюрприз» Сирены спрятали в этом тумане."

    - char: vittorio_veneto
      side: left
      text:
        - "Будет опасно, если Винченцо войдёт туда раньше нас. Аквила, найди способ предупредить их, чтобы они сбавили ход. Остальным кораблям — приготовиться к решающему сражению."
        - "Очистим центр лабиринта, пробьём путь для воссоединения и выполним цель нашей операции!"
chapter1:
  rows:

    - char: duca_degli_abruzzi
      side: left
      text:
        - "Судя по результатам последнего столкновения, этот отряд Сирен действительно не получил никакого усиления огневой мощи."
        - "Они и впрямь просто сменили раскраску на эту вызывающую спецливрею..."

    - char: aquila
      side: right
      text:
        - "Всем внимание! Впереди обнаружен ещё один флот... Состав участников... Королевский Флот?!"
        - "Госпожа Венето, в рядах флота впереди я вижу силуэты серийных кораблей Королевства!"

    - char: vittorio_veneto
      side: left
      text:
        - "Исключено. Королевский Флот сейчас базируется на Мальте. Они никак не могли опередить нас и оказаться здесь."

    - char: littorio
      side: right
      text:
        - "А может быть это..."

    - char: vittorio_veneto
      side: left
      text:
        - "И не надейся, Литторио. Илластриес не стала бы поднимать весь флот по тревоге только ради того, чтобы устроить тебе сюрприз."

    - char: littorio
      side: right
      text:
        - "Ха-ха, и то верно~ Тогда ответ очевиден: перед нами «Пешки» Сирен, имитирующие Королевский Флот."

    - char: vittorio_veneto
      side: left
      text:
        - "Аквила, ты можешь разобрать конкретный состав этой эскадры «Пешек»?"

    - char: aquila
      side: right
      text:
        - "У этого флота нет авиационного прикрытия, я подлечу поближе, чтобы рассмотреть..."
        - "М-м... Я вижу Илластриес, Уорспайт, Формидебл... А также несколько королевских крейсеров и эсминцев!"

    - char: duca_degli_abruzzi
      side: left
      text:
        - "Всё знакомые лица... Сначала Сирены с помощью особой раскраски заставили нас вспомнить о величайшем триумфе Империи, а теперь используют эти «Пешки», чтобы напомнить о моментах, которые мы предпочли бы забыть?"

    - char: vittorio_veneto
      side: right
      text:
        - "Это их излюбленный прием..."

    - char: littorio
      side: left
      text:
        - "Хм, если Сирены рассчитывали на это, то их ждет разочарование!"
        - "Те неудачи были лишь временной оплошностью. Империя Сардиния давно оставила те темные времена позади."
        - "Сейчас время созидать будущее! Неужели мы дрогнем перед жалкими призраками прошлого?"
        - "Вот только... Эх..."
        - "Даже будучи «Пешками», леди Илластриес и леди Формидебл всё так же очаровательны... Моё сердце обливается кровью от мысли, что придется собственноручно уничтожать эти прекрасные подделки~"

    - char: vittorio_veneto
      side: right
      text:
        - "...Королевские авианосцы целиком на совести Литторио. Торричелли — жди момента для внезапной атаки на Уорспайт. Аквила — сначала обеспечь превосходство в воздухе, и только потом поддерживай нас по морским целям."
        - "Остальным кораблям — огонь по готовности! Покажем бесстыдным Сиренам мощь имперской гвардии!"
chapter1:
  rows:

    - char: duca_degli_abruzzi
      side: left
      text:
        - "Вражеский флот уничтожен, бой окончен. Что по потерям?"

    - char: maestrale
      side: right
      text:
        - "Лишь пара царапин, повреждения флота незначительны."

    - char: duca_degli_abruzzi
      side: left
      text:
        - "Ха... Если бы с настоящим Королевским Флотом было так же легко совладать."
        - "Как бы Сирены ни пытались подражать нам, на выходе всё равно получаются лишь низкопробные подделки."
        - "Они совершенно не понимают нашей чести, блеска и наследия."
        - "После горьких поражений Империя бросила все силы на прорыв в области авиации, а мы все прошли через изнурительные тренировки ночного боя."
        - "Даже если бы сюда явился настоящий Королевский Флот, у нас есть всё, чтобы победить. Что уж говорить об этих «Пешках»."

    - char: nicoloso_da_recco
      side: right
      text:
        - "Это точно! С таким уровнем мы справимся, сколько бы их ни прислали... Ой?!!! С-стены лабиринта... они начали меняться?!?"

    - char: libeccio
      side: left
      text:
        - "Вы шутите? Как такое вообще возможно...?!"

    - text:
      - "Пока отряд, расслабившись после скоротечного боя, подсчитывал трофеи, высящиеся вокруг стены лабиринта без предупреждения пришли в движение."
      - "Казавшиеся массивными преграды рассыпались на бесчисленные сегменты и начали бесшумно и стремительно перестраиваться."
      - "Всего за несколько секунд гигантский лабиринт, занимающий большую часть акватории, полностью изменил свою структуру."

    - char: nicoloso_da_recco
      side: left
      text:
        - "У-у-у... Весь проложенный маршрут теперь бесполезен... Ну как же так..."

    - char: maestrale
      side: right
      text:
        - "Изначально, благодаря самолетам-разведчикам госпожи Аквилы, даже самый запутанный лабиринт не мог нас остановить."
        - "Но если лабиринт способен меняться сам по себе, то любая разведка теряет смысл..."

    - char: torricelli
      side: left
      text:
        - "У-ху-ху... Неужели всё именно так?"
        - "Мы идем по лабиринту уже довольно долго. У Сирен была масса возможностей помешать нам, меняя проходы, но они этого не делали."
        - "У такой резкой трансформации определенно есть условия. Либо сработал какой-то механизм, либо требуется время на перезарядку..."

    - char: vittorio_veneto
      side: right
      text:
        - "То есть ты хочешь сказать, что до следующей смены у нас достаточно времени, чтобы проложить новый путь и продвинуться вглубь?"

    - char: torricelli
      side: left
      text:
        - "У-ху-ху... Я полагаю именно так."

    - char: libeccio
      side: right
      text:
        - "Тогда наша задача предельно проста! Да Рекко, не вешай нос! В этот раз давай проложим курс вместе!"

    - char: maestrale
      side: left
      text:
        - "Неудачи в море — обычное дело, навигатор не должен сдаваться из-за такого пустяка... Раз лабиринт изменился, мы просто изменим наш маршрут вслед за ним."

    - char: nicoloso_da_recco
      side: right
      text:
        - "...Либеччио, Маэстрале~ Точно! Вы правы, это всего лишь маленькая заминка в великом походе!"
        - "Госпожа Аквила, просто проведите быструю разведку, а остальное предоставьте нам!"

    - char: aquila
      side: left
      text:
        - "Поняла! Даже самому сложному лабиринту не укрыться от взора с небес... Разведчики, на взлет!"
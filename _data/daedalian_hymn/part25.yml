chapter1:
  rows:

    - char: aquila
      side: left
      text:
        - "Всем внимание! Впереди снова показался знакомый маршрут и флот «Пешек» Королевства..."

    - char: nicoloso_da_recco
      side: right
      text:
        - "Хм... Значит, нам снова нужно идти в атаку!"

    - char: duca_degli_abruzzi
      side: left
      text:
        - "Погодите. Пока мы были во власти эмоций, мы действительно упустили много деталей..."
        - "Посмотрите внимательнее: этот флот «Пешек», кажется, совсем не намерен нападать."

    - char: aquila
      side: right
      text:
        - "И правда... Они не движутся в нашу сторону, и нет никаких признаков того, что их орудия нацелены на нас."

    - char: libeccio
      side: left
      text:
        - "Такое ощущение, будто они просто стоят и ждут нас впереди!.."

    - char: maestrale
      side: right
      text:
        - "Ждут нас? Чтобы что... чтобы мы их уничтожили?"

    - char: vittorio_veneto
      side: left
      text:
        - "А после того, как флот «Пешек» будет полностью разгромлен, лабиринт снова перестроится, и мы окажемся в новом цикле..."

    - char: littorio
      side: right
      text:
        - "Кто бы мог подумать, что всё устроено именно так... Похоже, нам во что бы то ни стало нужно найти способ разорвать этот замкнутый круг."
chapter1:
  rows:

    - char: libeccio
      side: left
      text:
        - "Странно... С самого начала боя системы вооружения как-то барахлят."

    - char: maestrale
      side: right
      text:
        - "С электроникой тоже беда..! Поблизости какая-то странная помеха, но диагностика не находит неисправностей!"

    - char: torricelli
      side: left
      text:
        - "Неужели это та самая «Песнь Сирен», которую они так долго скрывали..."

    - char: nicoloso_da_recco
      side: right
      text:
        - "Песнь? Я вообще ничего не слышу!"

    - char: torricelli
      side: left
      text:
        - "У-ху-ху... Очередная причудливая настройка Сирен. Возможно, эта «песня» транслируется в электромагнитном диапазоне, потому мы её и не слышим."
        - "Поняв, что больше не могут влиять на наши эмоции, они сменили режим, чтобы глушить оборудование. Жуткое устройство..."

    - char: vittorio_veneto
      side: right
      text:
        - "Столкнуться с Сиренами, которые, изображая Сирен, используют «Песнь Сирен»... Отличная тема для несмешной шутки на банкете..."

    - char: vincenzo_gioberti
      side: left
      text:
        - "Госпожа Венето, госпожа Литторио! ДиБи официально возвращается в строй!"

    - char: littorio
      side: right
      text:
        - "О~! Ты как раз вовремя, нам сейчас очень нужны люди. Не пострадала за эти дни?"

    - char: vincenzo_gioberti
      side: left
      text:
        - "Ни единой царапинки! И все транспортные суда в целости и сохранности. Я приложила все-все-все силы, чтобы обеспечить безопасность каждого корабля!"
        - "Вот только мы всё кружили и кружили в этом лабиринте, я уже не знала, на сколько нас ещё хватит... Какое счастье, что вы наконец пришли..!"

    - char: littorio
      side: right
      text:
        - "Раз уж ты попала в беду, как я, Литторио, могла оставить тебя без помощи~"
        - "Едва узнав о потере связи, мы тут же организовали спасательную операцию и, как видишь, прибыли, чтобы забрать тебя домой~"
        - "Кстати говоря, кто эта прекрасная леди рядом с тобой?"

    - char: stremitelny
      side: left
      status: is-yellow
      text:
        - "Всем привет! Я Стремительный, эсминец типа «Гневный» из Северного Парламента. В данный момент я нахожусь с дипломатической миссией в Империи Сардиния!"
        - "Не ожидала, что вскоре после встречи с Винченцо мы застрянем в этом тумане... Проклятые Сирены! А ведь это важное поручение лично от Советского Союза!"

    - char: vittorio_veneto
      side: right
      text:
        - "Посланница с Севера, задание от самого Советского Союза... Какой неожиданный поворот событий."
        - "обычных обстоятельствах мы бы устроили пышный пир в вашу честь, но сейчас, как видите, мы завершаем зачистку Зеркального моря."
        - "Вы можете понаблюдать за битвой из тыла, а когда всё закончится, мы сопроводим вас прямиком в Рим, столицу Империи."

    - char: stremitelny
      side: left
      status: is-yellow
      text:
        - "Ну уж нет! Вы тут с Сиренами деретесь, а я буду сзади отсиживаться?"
        - "Не волнуйтесь, прежде чем стать дипломатом, я всё-таки боец Северного Парламента. Бить Сирен — это по моей части!"
        - "Если вы не против, давайте сражаться плечом к плечу!"
chapter1:
  rows:

    - char: duca_degli_abruzzi
      side: left
      text:
        - "Госпожа Венето, мы в очередной раз сокрушили возникший перед нами «королевский» флот."

    - char: aquila
      side: right
      text:
        - "Чувствую, что мои навыки управления самолётами становятся всё совершеннее. Скоро я смогу сойтись в честном бою с леди из Королевского Флота!"

    - char: vittorio_veneto
      side: left
      text:
        - "Да, вы все отлично справляетесь..."

    - char: littorio
      side: right
      text:
        - "Отчего ты так мрачна, Венето? Неужели ты всё ещё не довольна нашими успехами?"

    - char: vittorio_veneto
      side: left
      text:
        - "...Успехами? Ты называешь успехом бесконечное уничтожение «Пешек» в этом вечно меняющемся лабиринте?"
        - "Открой глаза и посмотри вокруг, Литторио! Ты целиком и полностью угодила в ловушку Сирен!"

    - char: littorio
      side: right
      text:
        - "Ха? О чём ты? Кроме обломков вражеских кораблей вокруг, я не чувствую никаких ловушек!"
        - "Сейчас — время триумфа Империи, и этот триумф куётся под нашим с тобой началом!"
        - "Неужели ты не чувствуешь, Венето? Под нашим руководством Империя идёт прямым курсом к возрождению!"

    - char: vittorio_veneto
      side: left
      text:
        - "Разве возрождение Империи — это то, чего можно достичь победой в одной стычке? Неужели цель, к которой мы стремимся, так легко достижима?"

    - char: littorio
      side: right
      text:
        - "Конечно нет! Нам нужна не одна победа, а целая череда непрерывных триумфов!"
        - "Мы терпели, когда Королевский Флот ограничивал наши интересы в Африке. Мы терпели, когда Железная Кровь пыталась вмешаться в дела Средиземноморья. И ради чего?"
        - "Ради нашей твёрдой веры в то, что всё утраченное мы вскоре вернём своими руками!"
        - "И разве сейчас не идеальный момент для начала? ВМС Империи уже не те, что прежде, — слава Сардинии пишется нашими руками!"

    - char: vittorio_veneto
      side: left
      text:
        - "...Ты так и не оправилась от прошлых поражений, Литторио."

    - char: littorio
      side: right
      text:
        - "Что ты такое говоришь? Я давно оставила их позади и уже шагнула в новое будущее, разве нет!"

    - char: vittorio_veneto
      side: left
      text:
        - "Нет, не оставила."
        - "...Впрочем, я и сама вряд ли имею право на такие слова. Ни ты, ни я, ни кто-либо из нас — на самом деле вся Империя так и не оправилась."
        - "Мы лишь старательно закрываем на всё глаза и самовольно пытаемся шагать в «новое будущее»..."
        - "Всё это время мы даже не пытались честно взглянуть на проблемы, скрытые за нашими неудачами."
        - "Всё наше так называемое «осмысление» свелось к тому, что мы списали поражения на устаревшее оборудование, нехватку подготовки и бесстыдство Королевского Флота."
        - "Но где-то в глубине души мы все знаем: это не так. По крайней мере, всё не так просто."
        - "Разве я не права, Литторио? И ты, Абруцци?"

    - char: duca_degli_abruzzi
      side: right
      text:
        - "Я........................"

    - char: vittorio_veneto
      side: left
      text:
        - "Литторио, ты бываешь безрассудной, но ты никогда не бываешь слепой. Что до тебя, Абруцци, ты — хладнокровный и опытный воин."
        - "Но даже мы, такие, какими мы являемся, из-за простой уловки Сирен погрузились в беспрецедентный хаос..."
        - "Раз за разом подсовывать нам призраков прошлого, раз за разом подталкивать нас к победам, приносящим лишь мимолётную разрядку, чтобы в итоге довести нас до безумия и заставить навсегда сгинуть в этом лабиринте..."
        - "Вот что Сирены на самом деле делают с нами при помощи этого места."
        - "Сирены безошибочно нащупали слабости, глубоко запрятанные в наших сердцах. С помощью невидимых механизмов они едва не довели элитный флот Империи до саморазрушения."
        - "...Сирены вовсе не «ничего не знают» о нас. Напротив, они знают нас слишком хорошо."
        - "Настолько хорошо, что в своих действиях они сразу переходят к сути, отбрасывая элементарную деликатность. Именно поэтому у нас возникла иллюзия, будто они ничего не понимают."
        - "Разве от этого не становится по-настоящему жутко?"

    - char: littorio
      side: right
      text:
        - "........................"
        - "Прости, Венето... Кажется, я и впрямь сегодня была чересчур взвинчена."

    - char: duca_degli_abruzzi
      side: left
      text:
        - "...Я тоже как-то незаметно для себя... поддалась этому безумию... Без сомнения, это моё упущение как офицера."

    - char: aquila
      side: right
      text:
        - "Тысяча извинений, госпожа Венето! Мне ещё не хватает зрелости..."

    - char: nicoloso_da_recco
      side: left
      text:
        - "Я, навигатор, и умудрилась потерять ориентацию... С-супер-извините!!!"

    - char: libeccio
      side: right
      text:
        - "А, я тоже..."

    - char: vittorio_veneto
      side: left
      text:
        - "Ха-ха... Ну полно вам, мы же не на собрании по самокритике, а вокруг нас всё ещё полно врагов, которые только и ждут ошибки."
        - "Наше положение всё ещё незавидное, но, по крайней мере, теперь все успокоились. Давайте вместе подумаем над планом действий!"
chapter1:
  rows:

    - text:
      - "Под сокрушительными ударами колоссальной авиагруппы, в которую, казалось, входили все самолеты Пелопоннеса, «Песнь» Сирен быстро затихла в морских просторах."
      - "Лишившись средств подавления, Тестер не продержалась долго и окончательно исчезла в морской пучине."
      - "Вслед за затихающим гулом улетающих самолетов Великий лабиринт начал терять очертания и вскоре, подобно истинному миражу, растаял в дымке между небом и землей."

    - char: vincenzo_gioberti
      side: left
      text:
        - "Вот видишь, видишь! Я же говорила, флот нашей Империи Сардиния — очень сильный!"

    - char: stremitelny
      side: right
      status: is-yellow
      text:
        - "М-м~ Флот и впрямь бодрый, одолеть Тестер в прямом столкновении — это впечатляет!"
        - "Но и наш флот не промах. Если выпадет шанс заглянуть в Северный Парламент, я обязательно устрою тебе отличную экскурсию!"

    - char: vincenzo_gioberti
      side: left
      text:
        - "Правда?! Тогда договорились~!"

    - char: aquila
      side: right
      text:
        - "Хи-хи, как замечательно, что вы обе сохранили такой запал после непрерывных сражений."

    - char: duca_degli_abruzzi
      side: left
      text:
        - "Госпожа Венето, подсчёты завершены. Кроме потери почти сорока процентов серийных кораблей, других утрат нет. Все транспортные суда в полной сохранности."

    - char: vittorio_veneto
      side: right
      text:
        - "Сорок процентов серийных... Что ж, главное, что груз Сената и наше достояние не пострадали."
        - "Все проявили себя в этой операции блестяще. Особенно ты, Аквила. Твои «орлы» сыграли решающую роль. Твоё мастерство было настолько отточенным, что трудно поверить, будто ты впервые на поле боя~"

    - char: aquila
      side: left
      text:
        - "Благодарю за похвалу, госпожа Венето! В этом бою я глубоко осознала важность палубной авиации и увидела свои слабые места."
        - "По возвращении я продолжу усердные тренировки... Чтобы поскорее стать выдающимся авианосцем, не уступающим типу «Илластриес» Королевского Флота!"

    - char: vittorio_veneto
      side: right
      text:
        - "Что ж, буду ждать этого с нетерпением. Настанет день, когда всё Средиземноморье станет охотничьими угодьями, где орлы Империи смогут парить свободно..."
        - "Перед выходом в море я и представить не могла, что поиски пропавшей флотилии обернутся такими перипетиями..."
        - "Осязаемый лабиринт-мираж, окраска Сирен в стиле Ромула, бесконечные повторения «королевских» флотов и, наконец, победа над могучей Тестер плечом к плечу с авиацией."
        - "Опасная крепость Сирен стерта с лица земли, эшелон с искусством спасен, и к нам даже присоединилась посланница Северного Парламента."
        - "Благодаря этой битве имперский флот наконец покинул лабиринт, сковывавший наши сердца..."

    - char: littorio
      side: left
      text:
        - "Столь эпическая и великая победа достойна того, чтобы по ней написали оперу и ставили её во всех главных театрах, не так ли~?"
        - "Ах, кстати, Венето, ты уже сообщила Сенату о полном успехе операции? Какая там реакция~?"

    - char: vittorio_veneto
      side: right
      text:
        - ".....Никак. Не могу связаться."

    - char: littorio
      side: left
      text:
        - "...Не можешь связаться? С кем, с Сенатом?"

    - char: vittorio_veneto
      side: right
      text:
        - "Да. Сразу после боя я попыталась выйти на связь, но сигнал не проходит. Неужели там что-то случилось?"

    - char: littorio
      side: left
      text:
        - "Да ну, брось~! Сенат находится в самом сердце Империи, в Риме. Не переживай, наверняка просто временный сбой, попробуй чуть позже~"

    - char: vittorio_veneto
      side: right
      text:
        - "Пожалуй, ты права~ Все закончили подготовку? Давайте выстроимся в походный порядок для триумфального возвращения. В Риме нас ждет грандиозное празднование!"
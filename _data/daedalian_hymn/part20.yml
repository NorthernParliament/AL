chapter1:
  rows:

    - char: vittorio_veneto
      side: left
      text:
        - "Железная Кровь... Особенно та её часть, что под началом Фридрих дер Гроссе, явно имеет какие-то скрытые тесные связи с Сиренами. Ты ведь тоже это чувствуешь, Литторио?"

    - char: littorio
      side: right
      text:
        - "Согласна, между Железной Кровью и Сиренами действительно витает некое труднообъяснимое чувство~ Ты хочешь спросить, знают ли они об истинных целях этих экспериментов?"

    - char: vittorio_veneto
      side: left
      text:
        - "Впрочем, забудь... Не бери в голову, это я просто к слову."
        - "Если подумать, до сих пор не было ни одного донесения о том, что Железная Кровь и Сирены сражались плечом к плечу. Напротив, недавно они устроили знатную заварушку прямо в крепости Железной Крови..."
        - "Возможно, на мои суждения просто влияет эта аура таинственности, исходящая от Фридрих..."

    - char: littorio
      side: right
      text:
        - "Излишняя нерешительность — твой недостаток, Венето. Я ведь сказала, что заметила те же признаки. Отношения между Железной Кровью и Сиренами точно нельзя списать на простое «заблуждение»."
        - "Вместо того чтобы в одиночку ломать голову над сомнениями, куда мудрее выбрать подходящий момент и задать вопрос нужному человеку."

    - char: vittorio_veneto
      side: left
      text:
        - "Да как можно спрашивать о таких вещах, когда на кону доверие союзников и государственные тайны..."
        - "...Литторио! В тот день, когда я легла на обратный курс, ты осталась сопровождать Фридрих... Ты ведь не спросила её об этом напрямую?!"

    - char: littorio
      side: right
      text:
        - "Ну что ты, даже я не настолько безрассудна. Я лишь слегка намекнула на эту тему~"

    - char: vittorio_veneto
      side: left
      text:
        - "*прикладывает ладонь к лицу* Эх... Ладно. И что же ответила Фридрих?"

    - char: littorio
      side: right
      text:
        - "Она мастерски и изящно сменила тему."

    - char: vittorio_veneto
      side: left
      text:
        - "Предсказуемый результат... Хотя за одну только смелость поднять такой разговор я тобой «искренне восхищена»."

    - char: littorio
      side: right
      text:
        - "Благодарю за похвалу~ В тот день она казалась в исключительно хорошем настроении, грех было упускать такую возможность."

    - char: vittorio_veneto
      side: left
      text:
        - "О чём ещё вы говорили?"

    - char: littorio
      side: right
      text:
        - "Обсудили и кое-что другое. Например, она спрашивала, интересно ли мне восстановить былое величие Империи или получить контроль над Сенатом..."
        - "Возрождение славы Империи меня, безусловно, интригует, а вот лезть в политический водоворот Сената — увольте~"

    - char: vittorio_veneto
      side: left
      text:
        - "Фридрих всегда умеет так непринужденно вворачивать в разговор опасные темы..."

    - char: littorio
      side: right
      text:
        - "Это точно, но я от всего отшутилась! После этого она с самым беззаботным видом отправилась в Рим — сказала, что ей вдруг захотелось устроить себе небольшой отпуск..."

    - char: vittorio_veneto
      side: left
      text:
        - "Пусть путь впереди тернист, но возрождение величия Империи — это задача, которую мы должны выполнить своими силами. Здесь нет места вмешательству Железной Крови."
        - "Сначала обеспечим стабильность на наших территориях, затем вернем контроль над ключевыми островами, проливами и каналами. Мы добьемся того, чтобы торговля в Средиземном море процветала, как и прежде..."

    - char: littorio
      side: right
      text:
        - "Нет, она должна процветать еще больше! Тогда Рим станет истинным сердцем Средиземноморья, а само море и земли вокруг него превратятся в цветущий сад под защитой Империи, далекий от ужасов войны."
        - "Возможно, нынешняя Империя сейчас подобна нам — пробирается сквозь извилистые коридоры запутанного лабиринта..."
        - "И если мы сможем успешно выйти из него, это станет добрым знамением того, что и Империя преодолеет все трудности. Наш успех сегодня станет началом великого возрождения."
        - "Вперед, воины Сардинии! С орлом, указывающим нам путь в небесах, мы больше не заблудимся, как бы ни менялся этот лабиринт!"
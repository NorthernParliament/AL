chapter1:
  rows:

    - char: libeccio
      side: left
      text:
        - "Ох... Наконец-то даже в шумном банкетном зале стало совсем пусто и тихо..."

    - char: maestrale
      side: right
      text:
        - "У любого пиршества есть конец, не расстраивайся так."

    - char: libeccio
      side: left
      text:
        - "Эх... Было бы так здорово, если бы представители Королевского Флота и Империи Сакуры тоже смогли прийти, как планировалось! Мы же так старались, всё готовили! И еды было столько вкусной!"

    - char: nicoloso_da_recco
      side: right
      text:
        - "Это точно! Будь я на их месте, ни за что бы не ушла! Пропустить такой роскошный банкет — просто преступление!"

    - char: libeccio
      side: left
      text:
        - "Знаете, мне кажется, Фридрих дер Гроссе из Железной Крови оказалась куда более снисходительной и величественной, чем о ней говорят."

    - char: nicoloso_da_recco
      side: right
      text:
        - "Ага, она совсем не такая страшная, как в легендах! Хоть от неё и веет аурой истинного лидера, она всё время улыбалась, а её манеры и речь просто безупречны!"

    - char: vittorio_veneto
      side: left
      text:
        - "Совершенно верно. Она — выдающийся дипломат и лидер, ни в чём не уступающий Бисмарк."

    - char: nicoloso_da_recco
      side: right
      text:
        - "Госпожа Венето, с возвращением! Вы, должно быть, очень устали."

    - char: vittorio_veneto
      side: left
      text:
        - "Ха-ха, по сравнению с Литторио, которой предстоит сопровождать их дальше, я лишь немного проводила флот Железной Крови в прибрежных водах. Так что я совсем не устала."

    - char: maestrale
      side: right
      text:
        - "Фридрих дер Гроссе уже возвращается в Железную Кровь?"

    - char: vittorio_veneto
      side: left
      text:
        - "Нет, она сказала, что внезапно захотела посетить Рим, а заодно обсудить кое-какие вопросы с Сенатом."

    - char: maestrale
      side: right
      text:
        - "Это... незапланированная поездка?"

    - char: vittorio_veneto
      side: left
      text:
        - "Похоже на то. Весьма своенравная личность."

    - char: maestrale
      side: right
      text:
        - "Железная Кровь вот-вот должна начать совместную операцию с Империей Сакуры... Не будет ли проблем из-за такой беспечности?"

    - char: nicoloso_da_recco
      side: left
      text:
        - "Да разве это плохо? Возникает чувство, будто весь мир стал спокойнее после вступления в силу соглашения о прекращении огня. Эх, вот бы сейчас отправиться в кругосветное путешествие!"

    - char: maestrale
      side: right
      text:
        - "Насколько я помню, действие этого соглашения ограничивается только сектором океана NA..."

    - char: nicoloso_da_recco
      side: left
      text:
        - "ДА?! Серьёзно?.. Погоди, а как же наше Средиземное море?!"

    - char: vittorio_veneto
      side: right
      text:
        - "Не волнуйся, Средиземное море тоже входит в зону действия протоколов... Ах, одну минуту."
        - "Что случилось, Литторио? Возникли какие-то проблемы с флотом Железной Крови?"

    - char: littorio_rad
      side: left
      text:
        - "С ними всё в порядке, а вот у нас возникла непредвиденная ситуация..."
        - "Я переслала тебе данные, подробности обсудим лично. Я уже на обратном пути, подожди меня немного в конференц-зале."

    - char: vittorio_veneto
      side: right
      text:
        - "Поняла. Прошу прощения, девочки, похоже, появились срочные дела, требующие моего внимания."

    - char: libeccio
      side: left
      text:
        - "Есть! Мы закончим здесь с уборкой, так что не волнуйтесь, госпожа Венето, занимайтесь делами!"

chapter2:
  rows:

    - char: nicoloso_da_recco
      side: left
      text:
        - "Маэстрале, Маэстрале! Как думаешь, что там стряслось?"

    - char: maestrale
      side: right
      text:
        - "Не знаю. Но, возможно... твои планы на дальнее плавание осуществятся гораздо быстрее, чем ты думаешь..."
chapter1:
  rows:

    - char: libeccio
      side: left
      text:
        - "Странно... Такое чувство, что мы здесь уже проходили..."

    - char: maestrale
      side: right
      text:
        - "В лабиринте всё устроено одинаково, так что подобные иллюзии — это нормально."
        - "Настоящий Кносский лабиринт и был смертельной ловушкой, состоящей из бесчисленных одинаковых развилок... Говорят, даже сам создатель чуть в нём не заблудился."

    - char: torricelli
      side: left
      text:
        - "Вот только тот лабиринт не умел менять свою структуру, а этот... у-ху-ху..."

    - char: nicoloso_da_recco
      side: right
      text:
        - "И какой Сиренам прок от того, что они заперли нас тут и заставляют блуждать по коридорам?.."

    - char: duca_degli_abruzzi
      side: left
      text:
        - "Согласно документам, Сирены одержимы разного рода наблюдениями и экспериментами. Сражаясь с нами, они попутно собирают все возможные данные."
        - "Вероятно, ситуация, в которой мы оказались, — тоже часть одного из их сценариев."

    - char: aquila
      side: right
      text:
        - "Это их чувство превосходства просто невыносимо... Будто неважно, победим мы или проиграем — они в любом случае достигнут какой-то своей цели."

    - char: duca_degli_abruzzi
      side: left
      text:
        - "В каком-то смысле, «победа при любом раскладе»..."

    - char: torricelli
      side: right
      text:
        - "С точки зрения науки, эксперименты обычно проводятся для проверки гипотез."
        - "Исследователь сначала выдвигает теорию, а затем ставит опыт, чтобы подтвердить её или опровергнуть."
        - "После бесчисленных попыток... возможно, однажды они получат тот самый идеальный результат, который докажет их правоту..."
        - "Мне и впрямь любопытно, какую же теорию эти Сирены пытаются подтвердить своим экспериментом, у-ху-ху..."

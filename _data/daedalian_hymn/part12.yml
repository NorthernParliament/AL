chapter1:
  rows:

    - char: torricelli
      side: left
      text:
        - "У-ху-ху... Госпожа Венето обнаружена..."

    - char: vittorio_veneto
      side: right
      text:
        - "Торричелли! Ах! Ты же была в составе авангарда вместе с Литторио!"
        - "Где Литторио?! Что с флотом?! ...Вы в порядке? Есть раненые?!"

    - char: torricelli
      side: left
      text:
        - "Не... не стоит беспокоиться... Госпожа Венето, с нами всё хорошо."
        - "Хоть мы и столкнулись с небольшими отрядами Сирен после входа в Зеркальное море, враг был уничтожен."
        - "Что же до госпожи Литторио... можно сказать, что она сейчас в... просто превосходном расположении духа."
        - "Такой «не вписывающейся в общую атмосферу» персоне, как я, лучше пораньше удалиться в одиночестве, у-ху-ху..."

    - char: libeccio
      side: right
      text:
        - "Эм... А что значит «не вписывающаяся в атмосферу»?"

    - char: maestrale
      side: left
      text:
        - "...Кажется, я примерно понимаю, о чём она."

    - char: vittorio_veneto
      side: right
      text:
        - "Вероятно, речь о привычном стиле Литторио..."

    - char: torricelli
      side: left
      text:
        - "Сейчас флот стоит на якоре у входа в канал Великого Лабиринта для передышки. Пожалуйста, следуйте за мной..."
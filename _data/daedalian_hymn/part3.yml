chapter1:
  rows:

    - char: littorio
      side: left
      text:
        - "Ах... Эгейское море, колыбель античной цивилизации! Каждый раз, оказываясь здесь, я чувствую невероятное умиротворение."

    - char: duca_degli_abruzzi
      side: right
      text:
        - "Да, хотя климат здесь бывает капризным, сегодня, несомненно, прекрасный день."
        - "Множество проходящих мимо флотов создают картину истинной жизни и процветания. Всё-таки мирное Средиземное море — самое прекрасное зрелище."

    - char: nicoloso_da_recco
      side: left
      text:
        - "...Решено! Эгейское море обязательно станет первой остановкой в моём будущем кругосветном путешествии!"

    - char: littorio
      side: right
      text:
        - "А потом ты, чего доброго, так здесь и останешься, не пожелав плыть дальше~"

    - char: nicoloso_da_recco
      side: left
      text:
        - "Э?! Да... Да ну, вряд ли. Наверное..."

    - char: torricelli
      side: right
      text:
        - "...Позволю себе заметить: охрана торговых караванов заметно усилилась."

    - char: nicoloso_da_recco
      side: left
      text:
        - "Ой, и правда! Раньше всё было совсем иначе!"

    - char: duca_degli_abruzzi
      side: right
      text:
        - "Должно быть, это ответные меры на участившиеся нападения Сирен."
        - "...Но постойте, в основном это конвойные корабли самих торговых компаний. А где же наш флот?"
        - "Пусть Королевский Флот и прибрал к рукам значительную часть Западного Средиземноморья, восточная его часть всё ещё должна быть под нашим полным контролем."

    - char: littorio
      side: left
      text:
        - "Ну... Сенат ранее рассудил, что Королевский Флот не рискнет продвигаться дальше на восток, а атаки Сирен носят случайный характер. Поэтому в целях экономии топлива конвойные группы были отозваны..."
        - "«Раз уж крупные торговые компании создали собственные отряды охраны, пусть сами справляются с такими мелочами», — кажется, именно так звучала финальная реплика."

    - char: torricelli
      side: right
      text:
        - "....... В их стиле принимать подобные решения..."

    - char: duca_degli_abruzzi
      side: left
      text:
        - "...Вот оно как. Не думала, что конвойные группы расформировали по такой нелепой причине."
        - "Погоди... Значит, то, что в сопровождении флота с искусством был всего один эсминец — Винченцо — тоже объясняется этой причиной?"

    - char: littorio
      side: right
      text:
        - "Изначально Сенат в целях экономии не хотел выделять даже одного серийного корабля."

    - char: torricelli
      side: left
      text:
        - "Просто абсурд... Это же был их собственный флот?.."

    - char: littorio
      side: right
      text:
        - "Мы с Венето тоже посчитали это полным бредом и попытались вмешаться. В итоге нам ответили отговорками в духе того, что конвоирование — это тыловая задача, а не дело флота, и если что-то случится, Сенат сам возьмет на себя ответственность."
        - "Назначение Винченцо и группы серийных эсминцев было личным и жестким требованием Венето, которая воспользовалась своими полномочиями."
        - "Эх... Если бы в том флоте не было нашего груза, мы бы ни за что не ввязались в эту неразбериху."

    - char: duca_degli_abruzzi
      side: left
      text:
        - "И в итоге, когда всё пошло прахом, им не осталось ничего иного, кроме как просить нас вернуть утраченное. Знали бы они тогда, к чему это приведет..."

    - char: torricelli
      side: right
      text:
        - "Поправочка: Сенат обратился к нам за помощью только после того, как позволил ВВС впустую потратить целый день."

    - char: duca_degli_abruzzi
      side: left
      text:
        - "Это злит ещё сильнее! Как вообще можно полагаться на авиацию... Прошло уже столько времени, а если с Винченцо что-то случилось?!"

    - char: littorio
      side: right
      text:
        - "Ха-ха, остыньте, девочки~ Раз уж это произошло, жалобы не помогут. Мы здесь собрались не для того, чтобы устраивать разнос Сенату."
        - "Пусть у этой истории печальное начало, но именно благодаря ему сегодня мы проводим столь масштабную операцию имперского флота."
        - "Мы слишком долго были в тени. Слишком долго мы не бороздили воды Средиземного моря с такой гордостью."
        - "Сегодня настал день, когда мы вновь озарим Средиземноморье светом Империи. Это час нашей славы. Расправьте плечи и явите миру наше величие!"

    - char: duca_degli_abruzzi
      side: left
      text:
        - "...Верно. Будь то произведения искусства, транспортный флот, пропавшие товарищи или былое величие и слава Империи — всё, что мы утратили, мы должны вернуть своими руками!"

    - char: littorio
      side: right
      text:
        - "О~ Вот это настрой!"

    - char: nicoloso_da_recco
      side: left
      text:
        - "После этого инцидента Сенат наверняка пересмотрит график конвоев, и я смогу почаще выбираться сюда погулять!"

    - char: littorio
      side: right
      text:
        - "М-м, конечно..."

    - char: nicoloso_da_recco
      side: left
      text:
        - "Ура-а-а!"

    - char: torricelli
      side: right
      text:
        - "Э-э... Мне тоже нужно что-то сказать?.. Ну тогда... О-о... Вперёд..."

    - char: nicoloso_da_recco
      side: left
      text:
        - "Эй! Торричелли нырнула и удирает! Подожди!"
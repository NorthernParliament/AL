chapter1:
  rows:

    - char: pamiat_merkuria
      side: left
      text:
        - "Йо~! Давно не виделись, Стремительный."

    - char: stremitelny
      side: right
      text:
        - "Ого, Память Меркурия! Ты как тут оказалась так внезапно?!"

    - char: pamiat_merkuria
      side: left
      text:
        - "Ну, мы столько не виделись, вот и решила заглянуть к тебе в гости~"

    - char: stremitelny
      side: right
      text:
        - "Правда?! Тут не так много товарищей, да и врагов почти нет — я уже помираю со скуки от ежедневных тренировок."
        - "Как раз ты тут ещё ничего не знаешь, я всё тебе покажу! Пошли-пошли~!"

    - char: pamiat_merkuria
      side: left
      text:
        - "Погоди, погоди... Я только что после долгого перехода, пощади меня..."

    - char: stremitelny
      side: right
      text:
        - "Ой, точно! Погоди секунду, я сейчас же свяжусь со снабженцами!"

    - char: pamiat_merkuria
      side: left
      text:
        - "Да не нужно так усложнять. Просто дай мне кровать. Завтра мне уже нужно отправляться в следующий пункт назначения~"

    - char: stremitelny
      side: right
      text:
        - "Э-э... Так скоро? Так зачем же ты приехала на самом деле?.."

    - char: pamiat_merkuria
      side: left
      text:
        - "Есть сверхсекретный приказ от Советского Союза. Его нужно передать тебе лично, самым надёжным способом."
        - "Не переживай~ Это всего лишь обычная работа курьером. Все подробности в этом пакете с документами. Если возникнут вопросы — задашь, когда я высплюсь............"
        - "Скоро... и у тебя тут станет очень жарко............ zZZ"
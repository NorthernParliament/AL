chapter1:
  rows:

    - text:
      - "БАБАХ!!!"

    - char: giulio_cesare
      side: left
      text:
        - "Атака Сирен?! В прибрежных водах Рима?! Вы издеваетесь?!"
        - "Где внешняя линия обороны? Где патрульные отряды? Где береговая охрана островов? Откуда, чёрт возьми, взялись эти Сирены...?!"

    - char: pola
      side: right
      text:
        - "Судя по направлению атаки, они пришли со стороны вод, контролируемых Королевским Флотом."

    - char: giulio_cesare
      side: left
      text:
        - ".....Почему всё всегда становится так скверно, когда дело касается Королевского Флота?"
        - "Проклятье..! Сейчас нет времени выяснять причины. Немедленно объявить эвакуацию прибрежных районов, всем гражданским судам — зайти в порт."

    - char: pola
      side: right
      text:
        - "Да, по системе оповещения уже начали передавать инструкции по эвакуации."

    - char: giulio_cesare
      side: left
      text:
        - "Системы береговой обороны приведены в готовность?"

    - char: pola
      side: right
      text:
        - "Из штаба береговой обороны сообщают, что идут финальные проверки. Сегодня выходной... так что им требуется ещё немного времени..."

    - char: giulio_cesare
      side: left
      text:
        - "Выходной............ А авиация?"

    - char: pola
      side: right
      text:
        - "ВВС тоже ответили, что им нужно время на подготовку... Нападение было слишком внезапным, все ведомства застигнуты врасплох."

    - char: giulio_cesare
      side: left
      text:
        - "Да они просто в обычное время слишком расслаблены! Кто же будет заранее предупреждать о внезапном нападении...!"
        - "Эх... Сейчас в Чивитавеккье только мы с тобой. Получается, немедленно дать отпор можем лишь мы."
        - "Рим — один из немногих прибрежных городов, никогда не знавших разрушений от рук Сирен... И сегодня мы не имеем права допустить осечку!"

    - char: pola
      side: right
      text:
        - "Не волнуйся, Чезаре. Одного тяжёлого крейсера и одного линкора более чем достаточно, чтобы поприветствовать этих Сирен!"

    - char: nop
      side: left
      text:
        - "Ошибаешься. Двух линкоров."

    - char: pola
      side: right
      text:
        - ".......?! Вы... вы же............!"

    - char: friedrich_der_grosse
      side: left
      text:
        - "Фридрих дер Гроссе. Линкор Железной Крови, Фридрих дер Гроссе."
        - "Хе-хе... Пожалуй, увертюру к этому грандиозному концерту исполню я."
        - "Девятая симфония. «Ода к радости»......."
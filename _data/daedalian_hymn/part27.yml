chapter1:
  rows:

    - char: libeccio
      side: left
      text:
        - "Ай-ай-ай-ай!………… У-у-у, меня зацепило..."

    - char: maestrale
      side: right
      text:
        - "Ты как? Дай взгляну———— Хм, не волнуйся, просто царапина."

    - char: aquila
      side: left
      text:
        - "Слава богу, никто не получил серьезных повреждений. Какое счастье, что это были лишь слабые «Пешки»..."

    - char: littorio
      side: right
      text:
        - "Пусть это была лишь «облегченная версия», но переживать такое снова — удовольствие ниже среднего..."

    - char: vittorio_veneto
      side: left
      text:
        - "ри, два, один... Лабиринт не изменился. Отлично! Похоже, нам наконец удалось обойти механизм трансформации. Всем продолжать движение!"
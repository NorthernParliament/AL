chapter1:
  rows:

    - char: littorio
      side: left
      text:
        - "М-да... Этот лабиринт оказался куда более хлопотным, чем я предполагала."

    - char: vittorio_veneto
      side: right
      text:
        - "Невероятно, но мы не только не нашли выход, но даже не обнаружили ничего похожего на центр лабиринта... К тому же там полно зон, не поддающихся разведке."
        - "Торричелли, у тебя есть какие-нибудь мысли на этот счёт?"

    - char: torricelli
      side: left
      text:
        - "...Э? Мои... мысли?.. Ну, кое-какие соображения у меня действительно есть..."
        - "Если объединить имеющиеся данные, то самое разумное объяснение — Сирены используют некое устройство для создания множества барьеров, замаскированных под стены лабиринта..."
        - "Возможно, это технология, схожая по принципу с их обычными щитами, но в куда более пугающих масштабах... Не исключено, что само это устройство является частью системы поддержания Зеркального моря."
        - "Чтобы прорваться сквозь барьеры, проще всего уничтожить эти генераторы или их систему энергоснабжения... Однако Сирены наверняка спрятали их глубоко в хитросплетениях лабиринта."
        - "Мы можем попытаться пробить их силой, но велика вероятность, что нашей огневой мощи не хватит, чтобы разрушить такую структуру."
        - "Раз Сирены способны поддерживать столь грандиозный лабиринт из барьеров, они должны были предусмотреть механизмы распределения урона и подпитки энергией между секциями..."

    - char: vittorio_veneto
      side: right
      text:
        - "...То есть ты хочешь сказать, что у нас нет иного выбора, кроме как послушно следовать по проходам лабиринта?"

    - char: torricelli
      side: left
      text:
        - "На данный момент это выглядит именно так. И поскольку стены не материальны, Сирены могли подготовить внутри ещё больше ловушек..."

    - char: libeccio
      side: right
      text:
        - "О-о-ого... Торричелли, ты что, всё то время, пока сидишь в углу, в одиночку изучаешь такие сложные штуки?!"

    - char: torricelli
      side: left
      text:
        - "У-ху-ху... Мне просто нравится сидеть в углу. А исследования — это так, хобби... мимоходом..."

    - char: duca_degli_abruzzi
      side: right
      text:
        - "Раз уж зашла речь о лабиринте на Крите, то на ум сразу приходит Кносский лабиринт из мифов, где обитало свирепое чудовище Минотавр..."
        - "У меня предчувствие, что Сирены подготовили в глубине какой-то особенный сюрприз в виде сильного врага. Когда войдем внутрь, всем нужно быть предельно осторожными."

    - char: nicoloso_da_recco
      side: left
      text:
        - "Раз уж мы решили исследовать лабиринт, нужно поскорее проложить маршрут!"

    - char: vittorio_veneto
      side: right
      text:
        - "Верно. Поручаю это тебе, навигатор имперского флота. Используй данные, собранные Аквилой, и проложи для нас верный путь."

    - char: nicoloso_da_recco
      side: left
      text:
        - "Есть, госпожа Венето! Положитесь на меня!"

    - char: littorio
      side: right
      text:
        - "У меня тоже есть предчувствие — эта операция обязательно увенчается успехом."
        - "И этот поход впишет новую страницу славы в историю Империи Сардиния!"

chapter1:
  rows:

    - char: torricelli
      side: left
      text:
        - "Мы на месте. Здесь наш временный лагерь для отдыха."

    - char: libeccio
      side: right
      text:
        - "Не ожидала, что вход в лабиринт окажется именно здесь... Он так близко к берегу Крита, будто тянется прямо от суши!"

    - char: maestrale
      side: left
      text:
        - "...Нам нужно подняться на борт того серийного линкора впереди?"

    - char: torricelli
      side: right
      text:
        - "Именно. Пока я патрулировала окрестности, все остальные из авангарда во главе с госпожой Литторио отдыхали там."

    - char: vittorio_veneto
      side: left
      text:
        - "........."

chapter2:
  rows:

    - char: littorio
      side: left
      text:
        - "О, а вот и Венето с остальными силами основного флота! Добро пожаловать на борт серийного корабля, модифицированного лично мной, Литторио!"
        - "Вы проделали долгий путь, так что присаживайтесь, не стесняйтесь. Нужно немного восстановить силы, прежде чем мы продолжим операцию."

    - char: vittorio_veneto
      side: right
      text:
        - "Литторио... Что ты здесь устроила?"

    - char: littorio
      side: left
      text:
        - "Хм? По-моему, всё очевидно... У нас тут прифронтовое чаепитие."

    - char: vittorio_veneto
      side: right
      text:
        - "Я вижу, что это чаепитие... Я имею в виду — ты хоть осознаёшь, что ваш флот считался пропавшим?.."
        - "Мало того, что связь оборвалась, так ты ещё и намеренно скрыла флот! Если бы Торричелли нас не встретила, как бы мы вообще воссоединились?!"

    - char: littorio
      side: left
      text:
        - "Ха-ха~ Именно об этом я и подумала, поэтому специально пришвартовала флот на самом видном месте у входа в лабиринт. Стоило вам попытаться войти в него, как мы бы неизбежно встретились."
        - "Я уже глубоко раскаялась в том, что действовала опрометчиво, не имея данных разведки. Раз уж впереди опасная западня в виде лабиринта, я решила, что разумнее дождаться встречи с тобой."
        - "Ну а что касается чаепития..."
        - "Ожидание может быть скучным, а может — комфортным. Для предстоящей битвы лучший выбор — дать всем возможность максимально восстановить боевой дух, не так ли?"

    - char: vittorio_veneto
      side: right
      text:
        - "(............Н-не могу возразить.)"
        - "Эх, ладно... У тебя есть кофе? Налей мне чашечку."

    - char: littorio
      side: left
      text:
        - "Кофе, разумеется, в наличии. Но у меня есть и отличный чай, полученный от Королевского Флота. Не хочешь попробовать? Говорят, это тот самый сорт из личных запасов, который так обожает Куин Элизабет."

    - char: vittorio_veneto
      side: right
      text:
        - "Королевский чай?.. Нет, обойдусь. Просто кофе."

    - char: littorio
      side: left
      text:
        - "Сию минуту, прекрасная леди! Я лично приготовлю для вас чашечку капучино~"

    - char: vittorio_veneto
      side: right
      text:
        - "Остальные тоже могут не церемониться с Литторио!.. Наслаждайтесь чаепитием, пока Аквила не закончит разведку..."
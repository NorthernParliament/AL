chapter1:
  rows:

    - char: maestrale
      side: left
      text:
        - "Госпожа Венето, флот приближается к острову Крит."

    - char: vittorio_veneto
      side: right
      text:
        - "Хм, отлично. Оставив Крит за кормой, мы официально войдем в акваторию Эгейского моря..."

    - char: aquila
      side: left
      text:
        - "Говорят, совсем недавно неподалеку Сирены напали на торговый караван, и Литторио с остальными вовремя вмешались, чтобы устранить угрозу. Проходящие мимо суда теперь вне себя от радости!"

    - char: libeccio
      side: right
      text:
        - "Как же это круто... Прямо как рыцари, что обнажают мечи, завидев несправедливость на своем пути."

    - char: vittorio_veneto
      side: left
      text:
        - "Хорошая работа, Литторио. Это станет отличным началом для восстановления доброго имени Империи Сардиния."
        - "Стабильное судоходство приносит не только сиюминутную выгоду — это символ процветания и могущества Империи."
        - "После завершения этой операции, вне зависимости от того, уничтожим мы базу Сирен или нет, систему конвоев необходимо восстановить..."

    - char: aquila
      side: right
      text:
        - "Но разве не поговаривали, что внутри Сената этому оказывается сильное сопротивление?.."

    - char: vittorio_veneto
      side: left
      text:
        - "Вот поэтому мы и дождемся конца операции, когда произведения искусства Сената окажутся в наших руках, и только тогда начнем переговоры."
        - "Немедленно свяжитесь с Литторио, чтобы назначить точку сбора флота."

    - char: libeccio
      side: right
      text:
        - "Слушаюсь! ...Ой? Рация не отвечает? Госпожа Венето, кажется, я не могу связаться с госпожой Литторио!"
        - "Попробую вызвать остальных! ...М-м, нет, без толку, никто не отвечает!"

    - char: vittorio_veneto
      side: left
      text:
        - "Даже если бы они получили повреждения в бою, оборудование не могло выйти из строя у всех одновременно... Есть ли поблизости суда, знающие об их местонахождении?"

    - char: maestrale
      side: right
      text:
        - "Из-за того, что ранее все корабли в округе покинули зону боевых действий, сейчас никто не владеет точной информацией..."

    - char: vittorio_veneto
      side: left
      text:
        - "Понятно... Это осложняет дело."

    - char: aquila
      side: right
      text:
        - "Госпожа Венето, в такой ситуации поиск в море можете смело доверить мне и моим самолетам!"

    - char: vittorio_veneto
      side: left
      text:
        - "Ах, точно... Ха-ха, я на мгновение и забыла — теперь у нас есть имперские орлы, сопровождающие флот."
        - "Аквила, немедленно подними разведчики для осмотра района боестолкновения. Найди флот Литторио!"

    - char: aquila
      side: right
      text:
        - "Будет исполнено."

    - char: vittorio_veneto
      side: left
      text:
        - "Всем остальным кораблям — приготовиться к бою. Будьте бдительны: в этих водах могут скрываться и другие враги!"
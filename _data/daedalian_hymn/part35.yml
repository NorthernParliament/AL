chapter1:
  rows:

    - text:
      - "За рабочим столом, заваленным горами документов, Илластриес и сегодня пребывала в глубоких раздумьях."

    - char: illustrious
      side: left
      text:
        - "«Прекрасной леди Илластриес...» Эх, сколько ни перечитывай, всё одно и то же."
        - "Неужели Литторио действительно могла, не подумав, отправить столь пафосное приглашение к совместной операции?.."
        - "Или же за этим приглашением кроется иной смысл... Совершенно не могу разгадать их истинные намерения."
        - "........."

    - text:
      - "Илластриес отложила приглашение Империи Сардиния и снова взяла другой документ, лежавший рядом."

    - char: illustrious
      side: left
      text:
        - "И в этом письме от Ришелье ключевые вопросы остались без ясных ответов..."
        - "Железная Кровь наверняка что-то замышляет, раз решила пойти на разрядку обстановки. Но какие у них козыри, каков их замысел?.."
        - "Подстрекают ли они Империю Сардиния или флот Доминиона Виши атаковать Мальту?.."
        - "Ничего не понимаю... Ой, сигнал тревоги?"

    - char: ajax_rad
      side: right
      text:
        - "Илластриес, у нас тут гости поблизости."

    - char: illustrious
      side: left
      text:
        - "...Доминион Виши или Сардиния?"

    - char: ajax_rad
      side: right
      text:
        - "Это Сирены. И цель их атаки не мы. Пока нельзя утверждать наверняка, но, похоже, они направляются к Риму, столице Империи Сардиния."

    - char: illustrious
      side: left
      text:
        - "Откуда там взялся флот Сирен?.. И внезапная атака на Рим?.."

    - char: ajax_rad
      side: right
      text:
        - "Подробные разведданные сейчас обрабатываются, тебе лучше самой взглянуть. Масштабы просто поразительные..."

    - char: illustrious
      side: left
      text:
        - "...Я поняла."
        - "..... Основные силы Сардинии сейчас выполняют задание в Эгейском море. Боюсь, у Рима сейчас почти нет защиты."

chapter2:
  rows:

    - char: richelieu
      side: left
      text:
        - "«Леди Илластриес, у Фридрих дер Гроссе в руках ещё много карт. Её решение снизить градус напряжённости продиктовано лишь тем, что так ей проще достичь своих целей»."
        - "«Ради истинного мира и стабильности в Средиземноморье, прошу вас: что бы ни случилось, пусть флот Королевства во время проведения крупной операции остаётся на Мальте для подстраховки на случай непредвиденных обстоятельств»."

chapter3:
  rows:

    - char: illustrious
      side: left
      text:
        - "......."
        - "Как же мне сейчас правильнее поступить?....."
chapter1:
  rows:

    - char: aquila
      side: left
      text:
        - "М-м... Не получается! Госпожа Венето, самолёты столкнулись с какой-то странной преградой, не успев «коснуться» стен."
        - "Это не было похоже на прямое столкновение с чем-то твёрдым... Двигатели работают исправно, высота полёта не меняется, но возникло ощущение какого-то «сопротивления», не дающего пролететь сквозь стены."
        - "Впрочем... Хотя разведчики не могут пройти сквозь стены лабиринта, пролететь над ними — не проблема! Глядя на него сверху, я могу чётко видеть всю структуру лабиринта!"

    - char: maestrale
      side: right
      text:
        - "Госпожа Венето, это ловушка. Раз Сирены способны воздвигнуть столь сложный лабиринт, у них наверняка хватило бы сил полностью закрыть нам доступ в этот район."
        - "Однако они оставили нам видимый путь... Будто провоцируют нас: «Хотите найти пропавший флот — извольте войти в лабиринт и исследовать его»."

    - char: vittorio_veneto
      side: left
      text:
        - "Я это прекрасно понимаю, но... выбора у нас немного."
        - "Флот Винченцо с высокой вероятностью уже глубоко внутри, и Литторио с остальными, скорее всего, тоже..."
        - "Зеркальное море само по себе — западня, в которую легко войти, но трудно выйти. А с таким запутанным лабиринтом и без поддержки с воздуха у них нет ни единого шанса выбраться самостоятельно."
        - "Теперь мы — единственные, кто в силах их спасти."
        - "Ха-ха... Аквила, твоё вступление в строй было как нельзя более своевременным. С взором имперского орла, направляющим нас, какой-то лабиринт не сможет преградить нам путь!"
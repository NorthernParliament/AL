chapter1:
  rows:

    - char: aquila
      side: left
      text:
        - "Госпожа Венето, разведчики не обнаружили ни одного пропавшего корабля. Более того, несколько самолётов в ходе разведки сами перестали выходить на связь..."
        - "Прошу прощения, это всё из-за моей неопытности в управлении палубной авиацией..."

    - char: vittorio_veneto
      side: right
      text:
        - "Потеря связи во время полёта... Нет, боюсь, дело не в твоих навыках, а в самой этой акватории."
        - "Твои самолёты исчезли без предупреждения точно так же, как флот Литторио и транспортники с искусством, которые сопровождала Винченцо."
        - "Похоже, наши догадки подтвердились: Сирены расставили в этих водах свои ловушки. Насколько я помню, природа Зеркального моря такова..."

    - char: maestrale
      side: left
      text:
        - "Акватория полностью изолирована от внешнего мира, наблюдаются сильнейшие помехи, а также скопление вражеских сил и аномальные погодные явления."

    - char: vittorio_veneto
      side: right
      text:
        - "Верно. Помимо данных, предоставленных Железной Кровью, описание свойств Зеркального моря было и в отчётах Карабиньере."
        - "Имеющейся информации достаточно для предварительной подготовки."
        - "Сирены наверняка поджидают нас в Зеркальном море впереди, а Литторио... скорее всего, из-за своей самонадеянности и поспешности сама угодила в их капкан..."
        - "Эх, только бы с ней ничего не случилось..."
chapter1:
  rows:

    - text:
      - "БАБАХ!!!"

    - char: duca_degli_abruzzi
      side: left
      text:
        - "Результат подтвержден: флот Сирен полностью уничтожен, операция завершена."
        - "Перед мощью крейсера «Луиджи ди Савойя Дука дельи Абруцци», жалкие Сирены оказались бессильны."

    - char: torricelli
      side: right
      text:
        - "На самом деле, эти Сирены и впрямь были подозрительно устаревшими моделями... Любопытно."
        - "(То ли Сирены, проникшие в Средиземное море раньше, не могут обновлять свои флоты... то ли...)"

    - char: littorio
      side: left
      text:
        - "Превосходно! Мы одержали первую победу в этой операции. Передайте по всем частотам: угроза Сирен устранена флотом Империи Сардиния, путь для торговых судов свободен."

    - char: nicoloso_da_recco
      side: right
      text:
        - "Есть! — Ой?.. Рация молчит, ни один корабль не отвечает."

    - char: duca_degli_abruzzi
      side: left
      text:
        - "Хм? Странно. Судоходство здесь должно быть оживленным. Попробуй еще раз."

    - char: nicoloso_da_recco
      side: right
      text:
        - "М-м-м... Никак! Всё ещё никакого ответа!"

    - char: littorio
      side: left
      text:
        - "Неужели это..."

    - char: torricelli
      side: right
      text:
        - "Зеркальное море!.."
        - "Внезапное изменение погоды, блокировка связи с внешним миром... Без сомнений, согласно записям, это Зеркальное море!!!"

    - char: nicoloso_da_recco
      side: left
      text:
        - "А?! Так это и есть Зеркальное море? Ого! Я здесь впервые!"

    - char: duca_degli_abruzzi
      side: right
      text:
        - Не только ты. Кажется, для всех нас это первый раз... Мы впервые подтверждаем существование Зеркального моря Сирен прямо в Средиземноморье."

    - char: littorio
      side: left
      text:
        - "...Ха-ха, и впрямь джекпот."
        - "Причина, по которой мы никак не могли искоренить Сирен в Средиземном море, заключалась в их опорных пунктах, а базы Сирен почти наверняка скрыты именно внутри Зеркальных морей."
        - "Наконец-то... Мы нашли его. Теперь у нас есть шанс покончить с ними одним махом!"

chapter2:
  rows:

    - char: nicoloso_da_recco
      side: left
      text:
        - "Де-девочки, посмотрите на север! В небе что-то появилось!!"

    - char: torricelli
      side: right
      text:
        - "Это мираж?!"
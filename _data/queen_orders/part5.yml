chapter1:
  rows:

    - char: prince_of_wales
      side: left
      text:
        - "Худ, продвижение всех наших групп идет успешно. Как насчет того, чтобы и нам начать движение в сторону центрального сектора?"

    - char: hood
      side: right
      text:
        - "Центральный сектор... Он долгое время находился в плотном окружении Сирен, и у нас недостаточно разведывательных данных об этой зоне."
        - "Боюсь, именно там скрыты многочисленные испытательные полигоны Сирен. Мы все прекрасно помним по прошлым сражениям, на какие «чудеса» способны их технологии."
        - "Даже если боевая мощь Сирен снизилась, мы не можем позволить себе неосторожность и поспешность... Времени еще достаточно, так что не будем отклоняться от графика."
        - "Надеюсь, на других участках фронта тоже никто не решит действовать напролом..."

    - char: communicator
      side: left
      text:
        - "*Би-и-ип*"

    - char: newcastle_rad
      side: right
      text:
        - "Мисс Худ, штаб Ливерпуля только что получил экстренный сигнал бедствия, после чего связь с отправившим его флотом прервалась."
        - "В штабе предполагают, что сигнал мог быть послан дружественной разведывательной группой, но на данный момент не установлено, какой именно..."
        - "Ситуация критическая. Я пересылаю вам координаты сигнала. Пожалуйста, немедленно организуйте спасательную операцию."

    - char: hood
      side: left
      text:
        - "Эти координаты... Странно. Я не направляла туда ни один из наших флотов. И гражданских судов в такое время там быть не может..."
        - "Ньюкасл, немедленно свяжитесь со штабом Союза Орла и уточните, нет ли у них пропавших групп в том районе. Я пока займусь организацией спасения."

    - char: newcastle_rad
      side: right
      text:
        - "Принято, приступаю к проверке. Ньюкасл, конец связи."

    - char: duke_of_york
      side: left
      text:
        - "Сия акватория, кажется, не входит в зону ответственности Союза Орла. С чего бы их флоту терпеть бедствие именно здесь?"

    - char: hood
      side: right
      text:
        - "На этот вопрос мы сможем ответить, только когда найдем их... Если этот сигнал действительно был послан флотом Союза."
        - "В любом случае, мы не можем игнорировать просьбу о помощи. Проверьте позиции наших сил — кто сможет добраться до места происшествия быстрее всех?"

    - char: formidable
      side: left
      text:
        - "Судя по координатам, быстрее всех там окажется смешанная партизанская флотилия со Свободным Ирисом. Однако одних их может быть недостаточно, если они столкнутся с непредвиденной угрозой."
        - "Хоть мы и будем чуть медленнее, но ради подстраховки, Худ, позволь мне возглавить часть основных сил и отправиться к ним на поддержку."

    - char: prince_of_wales
      side: right
      text:
        - "Ситуация в центральном секторе непредсказуема, всегда есть риск угодить в засаду Сирен внутри Зеркального моря. Я пойду вместе с Формидебл в качестве эскорта."

    - char: hood
      side: left
      text:
        - "Решено. Сначала соединитесь с партизанской флотилией, а затем вместе направляйтесь к источнику сигнала. Выясните причину и спасите выживших."

    - char: duke_of_york
      side: right
      text:
        - "Сей сигнал весьма подозрителен. Действуйте по обстоятельствам и не теряйте бдительности."

    - char: prince_of_wales
      side: left
      text:
        - "Принято. В таком случае — выдвигаемся!"
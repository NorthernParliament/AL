chapter1:
  rows:

    - char: suffolk
      side: left
      text:
        - "Наконец-то... Последний противник повержен!"

    - char: kent
      side: right
      text:
        - "Кент... сейчас окончательно перегорит..."

    - char: edinburgh
      side: left
      text:
        - "Ну и ну... Что это вообще были за штуки? Боевая мощь вроде средняя, но броня просто чудовищная! А если прибавить к этому помехи от гравитации... Серьёзно! Я никогда не встречала таких приставучих врагов!"

    - char: rodney
      side: right
      text:
        - "Ощущение странности вокруг тела исчезает. Кажется, гравитация возвращается в норму."

    - char: norfolk
      side: left
      text:
        - "М-мы... мы уже в безопасности?.."

    - char: warspite
      side: right
      text:
        - "На волоске... Но победа за нами. Это был блестящий бой, все отлично потрудились."
        - "Эдинбург, я слышала, как ты переживала о том, как писать отчёт."

    - char: edinburgh
      side: left
      text:
        - "А?! Э-э... хе-хе-хе..."

    - char: warspite
      side: right
      text:
        - "Просто опиши всё, с чем мы сегодня столкнулись, как есть. Дальше пусть решает Её Величество."

    - char: edinburgh
      side: left
      text:
        - "Есть!"

    - char: warspite
      side: right
      text:
        - "Что касается той аномальной Сирены... как только появятся результаты дальнейшего расследования, я немедленно введу вас в курс дела."
        - "Теперь, когда акватория зачищена, можно возобновить работы по развёртыванию второго аванпоста."
        - "Эдинбург, возвращайся со мной к основным силам для доклада Её Величеству. Остальным — оставаться здесь для охраны объекта. После завершения работ располагайтесь здесь на отдых и ждите приказа к генеральному наступлению."

    - char: all
      side: left
      text:
        - "Есть!"

    - char: warspite
      side: right
      text:
        - "Ситуация куда сложнее, чем мы предполагали. Как же пойдёт наша операция дальше... Хоть бы всё прошло гладко."
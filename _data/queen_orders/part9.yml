chapter1:
  rows:

    - char: bush
      side: left
      text:
        - "Атланта, гляди! Спасательный отряд Королевского Флота прибыл!"

    - char: atlanta
      side: right
      text:
        - "Слава богу, значит, наш сигнал бедствия успешно дошёл..."

    - char: prince_of_wales
      side: left
      text:
        - "Штаб Ливерпуля получил ваш сигнал. Я — Принц Уэльский, прибыла во главе спасательного флота для воссоединения с вами."
        - "Этот район не входит в зону ответственности Союза Орла. Почему вы здесь оказались и что произошло?"

    - char: atlanta
      side: right
      text:
        - "Спасибо за помощь, я крейсер Союза Орла — Атланта. Мы выполняли научную миссию по приказу штаба Нью-Йорка, но попали в засаду Сирен..."

    - char: formidable
      side: left
      text:
        - "...Научная миссия? Сейчас весь океан NA объявлен зоной боевых действий!"

    - char: atlanta
      side: right
      text:
        - "Дело в том, что... ранее при зачистке лабораторий Сирен оперативные группы обнаружили некие аномалии. Чтобы исключить скрытые угрозы для основной операции, штаб приказал нам сопроводить научно-исследовательское судно для детального изучения."
        - "Нам удалось собрать несколько аномальных образцов, но на обратном пути в Зеркальном море мы столкнулись с массированной атакой Сирен."
        - "Мы отступали с боем, и когда силы были уже на исходе, появилась странная личность..!"
        - "Хм, вообще-то она была очень похожа на вашу Арк Ройял. Уничтожив преследовавший нас флот Сирен, она просто ушла."

    - char: bush
      side: left
      text:
        - "Мы даже не успели поблагодарить её!"

    - char: formidable
      side: right
      text:
        - "Арк Ройял вообще не выполняет заданий в этом секторе, да и в одиночку она бы не смогла навести такой шорох. Определенно, это был кто-то из «Пепла», кого мы почуяли ранее..."

    - char: bush
      side: left
      text:
        - "А? «Пепел»? Что это такое?"

    - char: le_temeraire
      side: right
      text:
        - "Я тоже хочу спросить, тоже хочу спросить! Что это за «Пепел», о котором вы твердите с самого начала?"

    - char: formidable
      side: left
      text:
        - "Штаб Нью-Йорка отправил вас сюда на научную миссию, вообще ничего не объяснив?!"

    - char: atlanta
      side: right
      text:
        - "......А?"

    - char: prince_of_wales
      side: left
      text:
        - "Формидебл, сведения о «Пепле» до сих пор под грифом секретности. Вполне естественно, что они не в курсе."

    - char: formidable
      side: right
      text:
        - "....Эх, ну хоть бы предупредили флоты, входящие в зону боевых действий. Честное слово."
        - "Та личность, похожая на Арк Ройял, что уничтожила флот Сирен — это «Пепел». Они выглядят почти как мы и обладают сокрушительной мощью, но их не видят радары. Они почти никогда не идут на контакт, а их действия невозможно предугадать."
        - "Мы ничего не знаем об их происхождении или целях. И хотя по какой-то причине в этот раз они спасли вас, запомните: «Пепел» нам не друзья."
        - "Из-за обязательств о неразглашении я не могу рассказать вам больше. О деталях спросите напрямую в штабе Нью-Йорка, когда вернетесь."
        - "Что до вас, Ле Темерер и Л'Опиньятр... Если так хотите знать, спросите у Ришелье по возвращении!"

    - char: le_temeraire
      side: left
      text:
        - "Есть...! Э-э... а об этом правда можно спрашивать?.."

    - char: prince_of_wales
      side: right
      text:
        - "Довольно, здесь не место для праздных бесед. Мы сопроводим вас в порт Королевского Флота, а подробности обсудим на месте."

    - char: atlanta
      side: left
      text:
        - "Но... серийный корабль, на котором были образцы, был уничтожен во время недавней атаки. Если мы вернемся, не собрав их заново, миссия будет провалена..."

    - char: formidable
      side: right
      text:
        - "Не говори глупостей. В вашем нынешнем состоянии любая попытка вернуться обернется тем, что вы станете кормом для акул."
        - "Это акватория под юрисдикцией штаба Ливерпуля. Слушайте приказ: немедленно следуйте за нами в порт Королевского Флота на ремонт и пополнение запасов."

    - char: atlanta
      side: left
      text:
        - "Есть..."

    - char: formidable
      side: right
      text:
        - "Вот так-то лучше~ Всем занять оборонительное построение, приготовиться к отбытию. Спасательная операция еще не окончена, не теряйте бдительности!"
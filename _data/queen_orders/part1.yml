chapter1:
  rows:

    - char: saratoga_rad
      side: left
      text:
        - "Ну что, Командир, Энтерпрайз, Худ, мне пора возвращаться в штаб. Надеюсь, наши операции пройдут гладко!"

    - char: hood
      side: right
      text:
        - "Королевскмй Флот также начнет официальную операцию через несколько часов. Худ, конец связи."

chapter2:
  rows:

    - char: hood
      side: right
      text:
        - "Фух... Неужели битва наконец-то начинается официально?"

    - char: queen_elizabeth
      side: left
      text:
        - "Это была воодушевляющая речь, Худ. Отличная работа!"

    - char: hood
      side: right
      text:
        - "Если бы Ваше Величество выступили лично, эффект был бы куда сильнее."

    - char: queen_elizabeth
      side: left
      text:
        - "Оставим поднятие боевого духа тем, кто будет сражаться на передовой плечом к плечу с солдатами."

    - char: warspite
      side: right
      text:
        - "Ваше Величество, касательно переговоров о перемирии... Вы действительно решили отправиться туда лично? Это слишком опасно."

    - char: queen_elizabeth
      side: left
      text:
        - "Хм, раз та сторона сама проявила инициативу, у меня не так много выбора. Считай это необходимым риском ради общего блага."
        - "К тому же... После того как она так сильно прижала нас в прошлые разы, если я не отыграюсь сейчас, что станет с честью Королевского Флота!"
        - "И вообще, у нас в руках есть «заложники». Район поиска «пропавшего» флота Железной Крови постепенно сужается. В такой ситуации Фридрих вряд ли осмелится что-то со мной сделать."
        - "Цели этой операции просты и понятны, так что моё отсутствие не должно стать проблемой, но... Хм..."

    - char: hood
      side: right
      text:
        - "Проведение масштабной операции в данный момент, возможно, лучшее решение для стабилизации ситуации, однако всё еще остается много нерешенных вопросов как внутри, так и снаружи."

    - char: queen_elizabeth
      side: left
      text:
        - "Именно! Фридрих всеми силами пытается выманить меня с передовой, и мне это кажется подозрительным."
        - "В этот раз Кинг Джордж V пойдет со мной, Илластриес и остальные сейчас в Средиземном море..."
        - "Худ, Уорспайт, ситуация на фронте, а также все дела в штабе и командовании Ливерпуля теперь полностью на вас."

    - char: hood
      side: right
      text:
        - "Слушаемся!"

    - char: warspite
      side: right
      text:
        - "Слушаемся!"

    - char: queen_elizabeth
      side: left
      text:
        - "Что касается горничных... Белфаст я забираю с собой, у Шеффи другое задание. Хм... Ньюкасл остается в штабе Ливерпуля, а Эдинбург пусть отправляется на передовую с основными силами!"

    - char: belfast
      side: right
      text:
        - "Слушаюсь, я немедленно всё подготовлю."

    - char: prince_of_wales
      side: left
      text:
        - "Ваше Величество, у меня есть еще один вопрос. Касательно новейшей системы навигаторов, разработанной штабом. Командир и флот Союза Орла уже начали её использовать, почему же мы — нет?"

    - char: queen_elizabeth
      side: right
      text:
        - "ТБ... На её счет у меня есть пара моментов, которые нужно прояснить, так что в этой операции мы пока обойдемся без неё."

    - char: prince_of_wales
      side: left
      text:
        - "М? Разве вы не принимали участия в проекте «Мост» по разработке навигаторов...?"

    - char: queen_elizabeth
      side: right
      text:
        - "Как это не принимала! Как раз потому, что принимала, я и чувствую, что есть вещи, которые необходимо расследовать до конца..."
        - "Ладно, если продолжать, всё станет слишком запутанным. Расскажу вам, когда приду к конкретным выводам."
        - "Мне пора готовиться к отбытию. На этом оперативное совещание окончено."
        - "Желаю вам успеха в бою. Худ, веди флот и яви миру величие Королевского Флота! Не разочаруй меня!"
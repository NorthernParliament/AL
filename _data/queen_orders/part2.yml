chapter1:
  rows:

    - char: hood
      side: left
      text:
        - "Флот Её Величества отбыл, нам тоже пора выдвигаться."
        - "Задачи текущей операции просты: собрать флот и прорвать оборонительную линию Сирен; зачистить Зону B, также известную как северо-восточная часть океана NA; развернуть два аванпоста для подготовки к генеральному наступлению; а после него — захватить центральный сектор акватории."
        - "К сожалению, из-за возросшей активности Сирен в Арктике Северный Парламент снова не сможет направить свой флот для участия в этой операции. Однако Свободный Ирис отправит партизанскую флотилию нам в поддержку."

    - char: duke_of_york
      side: right
      text:
        - "Какая жалость... Мне бы очень хотелось воочию узреть, как сражается полярный флот."

    - char: hood
      side: left
      text:
        - "За исключением аномалий в океане NA, активность Сирен в других регионах остается в пределах нормы. В Арктике же они активны как никогда, так что вполне логично, что Северный Парламент не может выделить свободные силы."
        - "Кроме того, переговоры с Багровой Осью могут пройти не так гладко, как хотелось бы. Нам нужно сохранить козырь в рукаве на случай удара в спину."

    - char: duke_of_york
      side: right
      text:
        - "Роль этакой пастушьей собаки, ха-ха."

    - char: formidable
      side: left
      text:
        - "И всё же участие Свободного Ириса немного удивляет. У Ришелье на её фронтах ситуация крайне напряженная... К тому же они открыто выступали против этих переговоров с Осью, не так ли?"

    - char: hood
      side: right
      text:
        - "В этом и проявляется мудрость и дальновидность Ришелье. Оставим внутренние разногласия в стороне — сейчас настал критический момент для переговоров, и мы обязаны продемонстрировать внешнему миру, особенно Багровой Оси, наше единство."

    - char: formidable
      side: left
      text:
        - "Вот оно что... Ришелье всё тщательно продумала."

    - char: newcastle_rad
      side: right
      text:
        - "Проверка связи. Мисс Худ, говорит Ньюкасл из штаба Ливерпуля. Как слышно?"

    - char: hood
      side: left
      text:
        - "Да, связь отличная. Было бы замечательно, если бы она оставалась такой же стабильной, когда мы углубимся в зону контроля Сирен..."

    - char: newcastle_rad
      side: right
      text:
        - "Мы приложим все усилия, чтобы поддержать передовые силы. Кроме того, Командование специально модернизировало оборудование связи — теперь Сиренам будет не так просто заглушить наш сигнал, как раньше."

    - char: formidable
      side: left
      text:
        - "А вот это хорошие новости. Раньше помехи доставляли нам немало хлопот."

    - char: newcastle_rad
      side: right
      text:
        - "В ходе операции я буду передавать вам распоряжения из штаба. В отсутствие прямых приказов мисс Худ может действовать по своему усмотрению, исходя из ситуации на поле боя."
        - "И еще... Как только появятся новости от Её Величества, я немедленно введу вас в курс дела."

    - char: hood
      side: left
      text:
        - "Поняла. Будем надеяться на добрые вести от королевы. Что ж, время пришло."
        - "Объявляю о начале масштабной операции Королевского Флота против Сирен. Всем флотам действовать согласно плану. Желаю вам удачи в бою. Боже, храни Королеву!"
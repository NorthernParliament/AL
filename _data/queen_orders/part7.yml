chapter1:
  rows:

    - char: le_temeraire
      side: left
      text:
        - "М-да... Мы тут уже всё кругом обыскали, но так и не нашли ни единого следа дружественного флота."

    - char: grenville
      side: right
      text:
        - "Похоже, нам всё-таки придётся провести более глубокую разведку."

    - char: l_opiniatre
      side: left
      text:
        - "Тут скорее не то что дружественного флота нет, тут даже от Сирен почти ничего не осталось..."
        - "Глядя на эти горы металлолома, можно подумать, что штаб сегодня вместо разведчиков отправил в бой основные авианосные ударные силы."
        - "И вообще... Разве флоту, способному в одиночку зачистить целый сектор от Сирен, нужно посылать сигнал о помощи?"

    - char: grenville
      side: right
      text:
        - "Дело и впрямь принимает странный оборот..."

chapter2:
  rows:

    - char: formidable
      side: left
      text:
        - "...Все эти Сирены в округе... Это вы их так разделали?.."

    - char: prince_of_wales
      side: right
      text:
        - "Впечатляет! Не ожидала от вас такой прыти. Отличная работа!"

    - char: grenville
      side: left
      text:
        - "Э-э, нет, вовсе нет! Когда мы прибыли, здесь уже всё было в таком виде! Поверхность моря усеяна обломками Сирен, их объекты разрушены, а флота, подавшего сигнал бедствия, нигде не видно..."

    - char: prince_of_wales
      side: right
      text:
        - "Вот оно что... Похоже, перед нами руины одного из испытательных полигонов Сирен. Оборонительные сооружения, лаборатории и весь дислоцированный здесь флот были полностью уничтожены."
        - "Хм... Смотрите, корпус этого линкора Сирен буквально разрезан надвое."
        - "А вон тот островок... Вместе со всеми постройками на нём он просто стёрт в порошок. Такое ощущение, что я уже где-то видела подобное..."

    - char: formidable
      side: left
      text:
        - "Ой? А это что... аккуратные... сквозные пробоины огромного калибра?"
        - "Уэльс, разве у нас есть оружие, способное нанести такие повреждения?"

    - char: prince_of_wales
      side: right
      text:
        - "Насколько мне известно — нет... Однако эти следы очень напоминают результат попадания из главного калибра Пьюрифайер."

    - char: grenville
      side: left
      text:
        - "Сирены уничтожают друг друга?.. Неужели такое возможно..."

    - char: formidable
      side: right
      text:
        - "Или же это кто-то, кто использует столь же мощное оружие, как у Сирен, чтобы атаковать их самих... Кажется, я прихожу к тому же выводу, что и ты."

    - char: prince_of_wales
      side: left
      text:
        - "...Если это действительно так, скоро мы во всём разберемся. Всем осторожно продвигаться вперед. Продолжаем поиск выживших."
chapter1:
  rows:

    - char: rodney
      side: left
      text:
        - "Описания явно не сравнятся с личным опытом. Какое странное ощущение..."

    - char: warspite
      side: right
      text:
        - "Гравитация то усиливается, то ослабевает, причем меняется совершенно хаотично... Пока это в пределах терпимого, но если мы столкнемся с врагом в таком состоянии, будет туго."
        - "Как раз впереди осталось несколько уцелевших серийных моделей Сирен. Давайте на них откалибруем шаблоны стрельбы и постараемся привыкнуть к ведению боя в этой аномальной зоне."
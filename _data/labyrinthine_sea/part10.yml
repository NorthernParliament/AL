chapter1:
  rows:

    - char: tb_rad
      side: left
      text:
        - "Синхронизация аналитического модуля... Получен запрос на входящую связь от неизвестного отправителя."

    - char: essex
      side: right
      text:
        - "Хм, кукловод всё-таки не выдержал и решил похвастаться своими успехами?"

    - char: memphis
      side: left
      text:
        - "Запрос на связь из ниоткуда и отказ представиться... Похоже на почерк Омиттер. Неужели это она так обновила своё оборудование для создания помех?"

    - char: essex
      side: right
      text:
        - "Омиттер?.. Мисс Навигатор, отклони этот запрос от неизвестного источника."

    - char: tb_rad
      side: left
      text:
        - "Команда подтверждена. Запрос на соединение отклонен."

    - char: communicator
      side: right
      status: is-red
      text:
        - "Пш-ш... Пш-ш-ш..."

    - char: temperance_rad?
      side: right
      status: is-red
      text:
        - "Отказ... бесполезен."
        - "Корабли в данной акватории, мы — Арбитры. Немедленно сложите оружие и сдавайтесь. Сопротивление бессмысленно."

    - char: essex
      side: left
      text:
        - "Арбитры?... Кто это? Вы из Сирен?"

    - char: temperance_rad?
      side: right
      status: is-red
      text:
        - "Сирены... Да, такое имя существует... Но я предпочитаю, чтобы нас называли «Антиох»."

    - char: shangri_la
      side: left
      text:
        - "Антиох?! Это имя есть в записях Штаба… Так ты и есть тот самый «Антиох», о котором упоминали «Пепел»?!"

    - char: temperance_rad?
      side: right
      status: is-red
      text:
        - "...Арбитр Умеренность XIV. Если вам обязательно нужно имя, используйте это обращение."

    - char: intrepid
      side: left
      text:
        - "Как длинно!.. Значит, Умеренность, да?.. Так это ты всё время глушила наше оборудование?"

    - char: temperance_rad
      side: right
      status: is-red
      text:
        - "Система Навигатора, которую вы используете, любопытна, но этого недостаточно... Мне это наскучило."
        - "Немедленно сложите оружие и сдавайтесь. Сопротивление бессмысленно."

    - char: intrepid
      side: left
      text:
        - "Подумаешь, какая-то странная Сирена, которой даже нет в нашей базе данных... Сколько же в тебе пафоса."

    - char: essex
      side: right
      text:
        - "У нас нет ни единой причины складывать оружие или сдаваться перед лицом Сирен."
        - "Раз тебе тоже надоело прятаться и создавать помехи издалека, давай закончим эту игру. Выходи и сразись с нами лицом к лицу в честном бою!"

    - char: temperance_rad
      side: left
      status: is-red
      text:
        - "Предложение отклонено... В таком случае, будут применены силовые методы."
        - "В войне честность... не требуется."

    - char: tb_rad
      side: right
      text:
        - "Собеседник разорвал соединение. Сеанс связи окончен."

    - char: shangri_la
      side: left
      text:
        - "Арбитры и «Антиох»... Мисс Навигатор, можешь провести сверку с базой данных Штаба?"

    - char: tb_rad
      side: right
      text:
        - "Команда подтверждена. Система в данный момент находится в автономном режиме. Провожу сверку с локальной базой данных."
        - "В локальной базе данных соответствующая информация не обнаружена. Пытаюсь выполнить синхронизацию с мейнфреймом..."
        - "Внимание: запрос на соединение отклонен. Данный модуль всё ещё находится в зоне действия мощных помех."
        - "Внимание: в акватории по курсу обнаружены многочисленные сигналы флота Сирен."

    - char: intrepid
      side: left
      text:
        - "Опять?.. Который уже раз за сегодня... Небось снова куча фальшивок на радаре."

    - char: essex
      side: right
      text:
        - "Нет, на этот раз разведсамолёты подтверждают визуальный контакт... Более того, враги появились прямо на поверхности моря из ниоткуда?!!"

    - char: intrepid
      side: left
      text:
        - "Появились из ниоткуда прямо перед глазами?.. Это что, оптическая невидимость?! Прямо как в научно-фантастических романах!"

    - char: memphis
      side: right
      text:
        - "А вот это уже новое открытие... Согласно текущим исследованиям, способность флотов Сирен появляться и исчезать как по волшебству обычно связана с Зеркальными морями, скрытыми по всей акватории."
        - "Но чтобы вот так возникнуть из ниоткуда в обычном пространстве... Поверить не могу, что они способны на такие запредельные вещи."

    - char: essex
      side: left
      text:
        - "Оптическая это маскировка или нет — раз враг показался, мы не имеем права отступать. Немедленно связаться с ближайшими флотами! Окружить и уничтожить противника!"

    - char: memphis
      side: right
      text:
        - "Не выйдет! Связь между нашими отрядами тоже заглушена. Теперь остается только надеяться, что союзники сами заметят, в какой мы ситуации..."

    - char: essex
      side: left
      text:
        - "Либо мы сами уничтожим источник помех... А я-то надеялась, что в этот раз всё пройдёт гладко."

    - char: tb_rad
      side: right
      text:
        - "Прошу прощения..."

    - char: essex
      side: left
      text:
        - "В этот раз ты не виновата, просто враг изменил тактику. Ничего страшного, нам не впервой сражаться в таких условиях."
        - "Всем по местам! Покажем этому заносчивому врагу истинную мощь флота Союза Орла!"
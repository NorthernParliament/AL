chapter1:
  rows:

    - char: cleveland
      side: left
      text:
        - "Это место очень напоминает испытательный полигон Сирен после того, как его тотально уничтожили..."

    - char: montpelier
      side: right
      text:
        - "Хм... Пламя на обломках ещё не погасло. Похоже, наше прошлое предположение было верным: объекты Сирен в этом секторе были разрушены совсем недавно."

    - char: cooper
      side: left
      text:
        - "Сирены понастроили в океане столько исследовательских центров и собирают данные в каждой битве с нами... Как вы думаете, какова их истинная цель?"

    - char: montpelier
      side: right
      text:
        - "«Что такое Сирены?», «Откуда они взялись?» и «Чего они хотят?» — это классическая триада вопросов, над которыми Штаб бьётся до сих пор. Я, конечно, тоже не знаю. Может, ты сама у них и спросишь?"

    - char: cooper
      side: left
      text:
        - "Эй! Если бы они хотели честно отвечать на вопросы, сейчас бы не было столько загадок!"

    - char: cleveland
      side: right
      text:
        - "Девочки, гляньте-ка сюда. Я нашла это на обломках Сирен, что только что проплывали мимо. Как думаете, что это?"

    - char: montpelier
      side: left
      text:
        - "Это... какие-то чёрные кристаллы?.."

    - char: cooper
      side: right
      text:
        - "Совсем не похоже на оплавившиеся электронные компоненты... Неужели это оставил тот, кто напал на базу?"

    - char: cleveland
      side: left
      text:
        - "Ты имеешь в виду «Арк Ройал»?"

    - char: montpelier
      side: right
      text:
        - "Сестрица, ты и правда веришь, что всё это дело рук Арк Ройал?.."

    - char: cleveland
      side: left
      text:
        - "Да вряд ли. Просто я и сама уже не понимаю, что здесь происходит... Но чувствую, ребятам из научного отдела эти штуки очень понравятся."

    - char: montpelier
      side: right
      text:
        - "Плохо дело, тревога на радаре!.. Всем внимание, поблизости множество врагов, мы в окружении!!"
        - "Приготовиться к бою!.. Э-э?"

    - char: cooper
      side: left
      text:
        - "Монпелье... Вокруг нас только обломки, я не вижу ни одного противника."

    - char: montpelier
      side: right
      text:
        - "Но радар чётко фиксирует огромное скопление врагов! Сами посмотрите!"

    - char: cleveland
      side: left
      text:
        - "И правда... У меня на радаре то же самое: всё пространство вокруг забито красными точками..."
        - "Судя по показаниям, прямо в зоне видимости нас плотным кольцом окружили десятки кораблей Сирен."

    - char: cooper
      side: right
      text:
        - "И цели на радаре постоянно меняют позиции!"
        - "Будто морские призраки, которых не видит глаз... Сомневаюсь, что наши снаряды подействуют на привидений."

    - char: montpelier
      side: left
      text:
        - "Значит, это всё-таки сбой радара..."

    - char: cleveland
      side: right
      text:
        - "Хм... Похоже, когда Эссекс обнаружила сигнал Арк Ройал, их электронные системы тоже подверглись мощной атаке."
        - "Боюсь, что сигнал Арк Ройал, который они видели на экранах, с самого начала был ложным."

    - char: montpelier
      side: left
      text:
        - "Сирены создают помехи для нашего оборудования, причём на этот раз это невероятно сложная и точная имитация..."
        - "Даже Навигатор ТБ, которую Штаб разработал специально для противодействия помехам в Зеркальных морях, попалась на удочку."
        - "Неужели из-за проблем с оборонительными флотами Сирены решили перейти к грязным трюкам?"
        - "Если так, то их цель — сорвать наше развёртывание... Но кто тогда уничтожил весь этот испытательный полигон?.."

    - char: cleveland
      side: right
      text:
        - "Для начала доложим обо всём в Штаб... У меня нехорошее предчувствие."
        - "Как бы то ни было, раз информация о бедствии Арк Ройал оказалась ложной, нам нет смысла здесь оставаться."
        - "Всем сменить курс, готовимся к выполнению следующих боевых задач!"
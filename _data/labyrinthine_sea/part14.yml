chapter1:
  rows:

    - char: memphis
      side: left
      text:
        - "Ва-а... До этого я видела только чертежи, но не верится, что его возвели так быстро..."

    - char: saratoga
      side: right
      text:
        - "Хе-хе~ В строительство этого аванпоста я тоже вложила немало сил! Но все труды того стоили!"
        - "О-ох~! Какое блаженство..."

    - char: essex
      side: left
      text:
        - "Саратога... полностью пала жертвой этого дивана..."

    - char: saratoga
      side: right
      text:
        - "Тут не просто комната отдыха! На аванпосте установлен полноценный жилой модуль: есть зона питания с напитками и закусками, а также полностью оборудованная зона развлечений."
        - "Вот здесь, например, как раз стоит кофемашина. Девочки, хотите по чашечке~?"

    - char: memphis
      side: left
      text:
        - "Просто невероятно... Мне одну, пожалуйста!"

    - char: saratoga
      side: right
      text:
        - "Без проблем~ Эссекс, тебе налить?"

    - char: essex
      side: left
      text:
        - "Ну... тогда и мне тоже, пожалуйста."

    - char: saratoga
      side: right
      text:
        - "Вот и правильно. Отдых и расслабление очень важны — в этом деле ни в коем случае не бери пример со своей наставницы Энтерпрайз~"
        - "Помимо жилого блока, на аванпосте есть энергетический, снабженческий, ремонтный и оборонительный модули, а также командный центр."
        - "Благодаря модульной конструкции их очень удобно транспортировать и собирать."
        - "Если в будущем возникнет необходимость, аванпост можно будет доработать и превратить в полноценную полуперманентную базу посреди океана."

    - char: intrepid
      side: left
      text:
        - "У меня просто нет слов, кроме «потрясающе»..."

    - char: saratoga
      side: right
      text:
        - "Хе-хе-хе~ Сирены слишком долго давили на нас, пора бы и им показать, как далеко продвинулись наши технологии."
        - "А пока не началось генеральное наступление, отдыхайте на полную катушку и набирайтесь сил!"
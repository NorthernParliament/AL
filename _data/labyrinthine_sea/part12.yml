chapter1:
  rows:

    - char: temperance
      side: left
      status: is-red
      text:
        - "Похоже, одного типа Инфорсеров маловато... Что ж, добавлю ещё немного..."

    - char: hermit?
      side: right
      status: is-red
      text:
        - "XIV, обнаружены следы Код G... Чем ты тут занята? Хватит играть, немедленно возвращайся."

    - char: temperance
      side: left
      status: is-red
      text:
        - "Наконец-то попалась?.. Инфорсер XIV «Эквилибриум», режим скрытности."

chapter2:
  rows:

    - char: south_dakota
      side: left
      text:
        - "Вражеские атаки внезапно прекратились... Нет, постойте! Сами враги тоже исчезли?"
        - "Что это вообще были за противники?.."

    - char: intrepid
      side: right
      text:
        - "Вот это я и называла «вескими причинами», по которым эти странные Сирены смогли подобраться к нам вплотную..."

    - char: shangri_la
      side: left
      text:
        - "Теперь, увидев это воочию, приходится поверить: эти Сирены действительно используют какую-то технологию оптической невидимости... Так вот на что способны Арбитры."

    - char: tb_rad
      side: right
      text:
        - "Обновление статуса: системные сбои устранены, связь с мейнфреймом восстановлена. Желаете отправить записи боя в Штаб?"

    - char: essex
      side: left
      text:
        - "Отправь по одной копии в штаб Нью-Йорка и в Генеральный штаб, а также перешли отчёт Командиру."
        - "У этой группы врагов невероятный технологический уровень. Если бы мы только могли получить больше данных..."

    - char: intrepid
      side: right
      text:
        - "Погодите... Кто-нибудь видит на поверхности воды хоть какие-то обломки врагов, уничтоженных в бою?"

    - char: massachusetts
      side: left
      text:
        - "А ведь и правда... Ничего нет."
        - "После такого ожесточенного сражения на море не осталось ни единого следа?!"

    - char: shangri_la
      side: right
      text:
        - "Противник при отступлении оперативно собрал все обломки, чтобы не дать нам возможности для дальнейшего изучения... Поразительно расчетливая манера действий."

    - char: south_dakota
      side: left
      text:
        - "Враг явно отступил по собственной воле и может нанести новый удар в любой момент. Вам сейчас не хватает эскорта, так что давайте продолжим операцию вместе?"

    - char: essex
      side: right
      text:
        - "Согласна. Заодно оповестите все флоты в акватории, чтобы они были начеку и внимательно проверяли любые подозрительные цели на радарах."
        - "Как только мы обустроим аванпост, сможем провести ремонт на месте. Девочки, продержитесь ещё немного, продолжаем движение!"
chapter1:
  rows:

    - char: tb_rad
      side: left
      text:
        - "Синхронизация аналитического модуля... Внимание, в акватории по курсу обнаружены многочисленные сигналы флота Сирен."

    - char: intrepid
      side: right
      text:
        - "Э-э?! Но мои самолёты ничего не видят! Ты уверена, что не ошиблась?"

    - char: tb_rad
      side: left
      text:
        - "Команда подтверждена. Выполняется корректировка сигналов целей на основе данных с разведывательной авиации."
        - "Синхронизация аналитического модуля... После корректировки установлено: все обнаруженные ранее вражеские силы являются ложными целями."
        - "Подтверждено наличие неопознанного источника, пытающегося подавить электронное оборудование флота. Запускаю протоколы противодействия."

    - char: essex
      side: right
      text:
        - "...Значит, это те самые «призрачные сигналы», с которыми столкнулись Кливленд и остальные... Кто бы это ни делал, похоже, нас плотно взяли в оборот."

    - char: tb_rad
      side: left
      text:
        - "Отправляю отчет об аномалии в Штаб..."
        - "Внимание: сбой системы связи. Соединение со Штабом прервано."
        - "Внимание: связь с центральным мейнфреймом прервана. Система переходит в автономный режим."

    - char: intrepid
      side: right
      text:
        - "ТБ снова заглушена Сиренами..."

    - char: tb_rad
      side: left
      text:
        - "....Прошу прощения."

    - char: shangri_la
      side: right
      text:
        - "....Девочки, вы заметили? До сих пор все помехи, с которыми мы сталкивались, не имели никакого тактического смысла."
        - "Как бы ни менялась картинка на радарах, поблизости нет ни одного реального врага... Противник словно просто хвастается своим превосходством в радиоэлектронной борьбе."

    - char: intrepid
      side: left
      text:
        - "У меня то же чувство... Будто нам говорят, что все наши технологические обновления для них — пустой звук. Это чистой воды провокация..."

    - char: essex
      side: right
      text:
        - "У нас есть мощные авиагруппы, способные решать исход сражений в море и в воздухе, но если мы не видим врага, мы бессильны."
        - "Мы уже вплотную подошли к внешнему периметру центрального сектора — месту, которое Сирены по идее должны защищать огромными силами. Но сейчас, кроме фальшивок на радарах, мы не нашли ровным счетом ничего..."
        - "Сирены явно что-то замышляют. Пока связь между нашими отрядами ещё работает, прикажите остальным флотам отойти из этой зоны и искать источник помех извне."
        - "А мы пока останемся здесь и поиграем с этим «скромным» врагом, который так боится показаться нам на глаза."
chapter1:
  rows:

    - char: intrepid
      side: left
      text:
        - "Что происходит?! Все появившиеся враги — совершенно новые, невиданные ранее модели!.."

    - char: shangri_la
      side: right
      text:
        - "Стиль боя этих новых противников напоминает «Интрайдеров», но они куда более опасны..."

    - char: intrepid
      side: left
      text:
        - "Да не то слово! Прежние «Исполнители» с ними и в сравнение не идут!"
        - "Из-за непрекращающихся помех управляемость самолётов упала, большая часть электроники выведена из строя... Мы больше не можем наносить эффективные авиаудары! Эссекс, что нам делать?!"

    - char: essex
      side: right
      text:
        - "Всем продолжать разрыв дистанции! Постарайтесь перейти на бомбометание с пикирования, чтобы повысить точность! Эх... была бы сейчас здесь группа линкоров..."

    - text:
      - "БУ-У-УМ!"

    - char: intrepid
      side: left
      text:
        - "Этот звук... Орудия крупного калибра! Наконец-то подошло подкрепление?!"

    - char: south_dakota
      side: right
      text:
        - "Эссекс, наконец-то мы вас нашли! После того как Штаб потерял с вами связь, всем ближайшим флотам был отдан приказ о поиске."
        - "Но как только мы вошли в этот сектор, наше оборудование тоже начало давать сбои. Так вы тоже оказались в изоляции из-за помех Сирен..."

    - char: massachusetts
      side: left
      text:
        - "Авианосное соединение в ближнем бою с Сиренами... Вы что, тестируете какую-то новую тактику для авианосцев?"

    - char: intrepid
      side: right
      text:
        - "Если бы это было возможно, мы бы и близко не подпустили этих странных Сирен! На то есть очень веские причины!.."

    - char: south_dakota
      side: left
      text:
        - "Каково ваше состояние?"

    - char: essex
      side: right
      text:
        - "Повреждения корпусов незначительны, но электроника сильно пострадала... Как же вовремя подоспела ваша помощь!"
        - "Будьте осторожны: перед нами неизвестные модели, которые полагаются на радиоэлектронную борьбу и торпедные атаки. Они гораздо коварнее привычных «Интрайдеров»!"

    - char: alabama
      side: left
      text:
        - "Не волнуйся. Линкоры как раз и созданы для того, чтобы сокрушать таких врагов в лобовой атаке."

    - char: massachusetts
      side: right
      text:
        - "Мы отвлечём огонь на себя. Используйте этот момент, чтобы разорвать дистанцию и реализовать преимущество в радиусе атаки!"

    - char: essex
      side: left
      text:
        - "С такими надежными товарищами ничего не страшно. Сразимся плечом к плечу!"
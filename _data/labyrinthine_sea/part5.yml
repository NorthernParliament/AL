chapter1:
  rows:

    - char: tb_rad
      side: left
      text:
        - "Синхронизация аналитического модуля... Замечено, что Арк Ройал преследует многочисленный флот Сирен..."
        - "Внимание: связь с центральным мейнфреймом прервана. Система переходит в автономный режим."

    - char: memphis
      side: right
      text:
        - "Эй, связь оборвалась?! Что случилось, ТБ? Можешь определить причину?"

    - char: tb_rad
      side: left
      text:
        - "Команда подтверждена. Примерно 5 секунд назад система подверглась мощному направленному излучению. Предположительно, Сирены проводят электронную атаку на данный модуль."

    - char: essex
      side: right
      text:
        - "Стоило нам обновить оборудование, как Сирены тут же улучшили свои средства подавления... Похоже, в электронных технологиях между нами всё ещё зияет огромная пропасть."

    - char: shangri_la
      side: left
      text:
        - "Ха-ха, похоже, у системы ТБ всё-таки полно недоработок. Мне даже стало немного спокойнее."

    - char: intrepid
      side: right
      text:
        - "...А? Почему это ты успокаиваешься от того, что враг успешно заглушил нашу систему?!"

    - char: shangri_la
      side: left
      text:
        - "Посудите сами: если бы Штаб, без каких-либо предварительных слухов, вдруг выдал нам идеальное устройство поддержки, будто сошедшее со страниц научной фантастики..."
        - "Происхождение такой вещи вызвало бы массу вопросов. Например, не замешаны ли тут технологии Сирен?.."
        - "Но раз система всё ещё в разработке и имеет изъяны, которые Штабу нужно постоянно исправлять — не это ли лучшее доказательство того, что это наша собственная разработка?"

    - char: intrepid
      side: right
      text:
        - "В этом есть смысл... Ох, в фантастике полно сюжетов, где герои необдуманно используют вражеские технологии, а потом жестоко за это расплачиваются..."
        - "Ой! Сейчас не время для таких разговоров! Что нам делать с Арк Ройал, которую преследуют Сирены? Мы идём на помощь?"

    - char: essex
      side: left
      text:
        - "Разумеется, мы не можем бросить союзников в беде. Наш мобильный отряд ближе всего к её позиции. Пусть Кливленд и её группа окажут поддержку!"
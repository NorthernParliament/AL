chapter1:
  rows:

    - char: cooper
      side: left
      text:
        - "Ух ты... Все эти обломки, дрейфующие на поверхности... они же принадлежат Сиренам?"

    - char: cleveland
      side: right
      text:
        - "Похоже, мы опоздали и пропустили грандиозную битву."

    - char: montpelier
      side: left
      text:
        - "Сестрица, тут не только обломки корпусов — установки Сирен разнесены в щепки вместе с рифами!"
        - "Как ни посмотри, это не похоже на разрушения, которые могла бы нанести одна лишь Арк Ройал..."

    - char: cleveland
      side: right
      text:
        - "Разведданные от Эссекс вряд ли могли быть ошибочными, но ситуация и правда странная."
        - "Всем сохранять бдительность! Продолжаем поиски Арк Ройал."
chapter1:
  rows:

    - char: tb_rad
      side: left
      text:
        - "Команда связи подтверждена. Получен запрос на соединение от штаба Нью-Йорка..."

    - char: intrepid
      side: right
      text:
        - "Уа-а-ах?! Ах, точно... Это же та вспомогательная система, которую командование разработало специально для координации этой операции... Всё никак не привыкну."

    - char: tb_rad
      side: left
      text:
        - "Получен запрос на соединение от штаба Нью-Йорка."

    - char: intrepid
      side: right
      text:
        - "Прости-прости, немного отвлеклась. Соединяй!"

    - char: saratoga_rad
      side: left
      text:
        - "Говорит штаб Нью-Йорка, проверка связи! Это сестрёнка Сара! Ну как, вы уже успели поладить с мисс Навигатором?"

    - char: essex
      side: right
      text:
        - "Говорит Эссекс. С управлением и функциями проблем нет, но вот само общение... Сколько ни смотри, она выглядит как обычная милая девушка-связист."

    - char: intrepid
      side: left
      text:
        - "Вы уверены, что командование не подсунуло нам живого оператора, притворившись, что это вспомогательная система?"

    - char: saratoga_rad
      side: right
      text:
        - "В штабе работают серьезные люди, они бы не стали так шутить! Говорят, образ юной девушки был выбран из соображений «дружелюбности интерфейса», но подробностей я и сама не знаю..."
        - "Зато могу поручиться за функционал! Система G.M, установленная на ТБ, обладает повышенной устойчивостью к помехам Сирен. Те сбои оборудования, что обычно возникают в Зеркальных морях, теперь должны сойти на нет."

    - char: essex
      side: left
      text:
        - "Если она действительно сможет противостоять помехам Сирен, это станет огромным подспорьем. Но эксперименты штаба — это одно, а реальную эффективность проверим уже в бою."

    - char: saratoga_rad
      side: right
      text:
        - "Хе-хе, Сирены в акватории NA точно предоставят вам массу возможностей для проверки. Кстати, Эссекс, я слышала, что флот Энтерпрайз и Командира уже прорвал внешний периметр."

    - char: essex
      side: left
      text:
        - "Мы уже отстаем?! Что и ожидалось от ударного флота во главе с Командиром и старшей сестрой Энтерпрайз... Нам тоже нужно ускориться!"

    - char: saratoga_rad
      side: right
      text:
        - "Что ж, тогда я буду ждать в штабе новостей о вашей победе! Саратога, конец связи."

    - char: shangri_la
      side: left
      text:
        - "Хм... Хотя у меня есть пара догадок о происхождении системы ТБ, судя по словам Саратоги, в плане боевой поддержки на неё можно положиться."

    - char: essex
      side: right
      text:
        - "Оставим сложные раздумья на потом. Впереди показалась слабая линия обороны Сирен — прорвемся сквозь неё одним махом!"

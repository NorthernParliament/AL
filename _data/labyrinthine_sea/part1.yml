chapter1:
  rows:

    - char: memphis
      side: left
      text:
        - "Эссекс, флот под командованием Командира уже выдвинулся. Нам тоже пора начинать."

    - char: essex
      side: right
      text:
        - "Принято. Всем внимание: нынешняя кампания — это не точечная операция по «обезглавливанию» баз Сирен, а полномасштабная зачистка всей акватории NA."
        - "Наша задача — планомерно очистить сектор C, то есть северо-западную часть акватории, и развернуть там два аванпоста для подготовки к генеральному наступлению."

    - char: intrepid
      side: left
      text:
        - "Сейчас мощь Союза Орла намного выше чем прежде. Пусть Сирены на собственной шкуре прочувствуют эти перемены!"

    - char: essex
      side: right
      text:
        - "Хороший настрой, Интрепид. Поскольку Сирены практически полностью сняли прибрежную блокаду, ожидается, что первые столкновения будут не слишком тяжелыми."
        - "Однако трудно сказать, что будет, когда мы продвинемся глубже... Центр акватории NA долгое время находился под контролем Сирен. Мы можем столкнуться с непредвиденными опасностями, так что не вздумайте недооценивать противника."

    - char: memphis
      side: left
      text:
        - "И не забывайте об одном деле, которому Штаб просил уделить особое внимание."

    - char: shangri_la
      side: right
      text:
        - "Речь о перемещениях основных сил Железной Крови, верно?"

    - char: memphis
      side: left
      text:
        - "Именно! Флот Железной Крови, прорвавший блокаду Королевского Флота, до сих пор не обнаружен. Для всей кампании в целом это огромная скрытая угроза..."

    - char: intrepid
      side: right
      text:
        - "Вот это мне и кажется странным! Флот Железной Крови с таким трудом прорвался, но вместо того, чтобы развивать успех, они просто где-то затаились в океане?"
        - "Если бы не эта операция, мы могли бы спокойно собрать силы и выследить их поодиночке. Какой вообще смысл в таких действиях со стороны Железной Крови..."

    - char: essex
      side: left
      text:
        - "А что, если всё дело как раз в этой операции?.. Неужели Фридрих дер Гроссе заранее знала о наших планах и потому пошла на такие аномальные маневры?"

    - char: memphis
      side: right
      text:
        - "Учитывая серьезную утечку данных во время прошлых операций и длительный период подготовки текущей кампании, вероятность такой догадки не равна нулю."
        - "Командование проводит внутреннее расследование, но разведка на поле боя ложится на наши плечи."

    - char: essex
      side: left
      text:
        - "Без проблем. Как только мы обнаружим их след, расспросим обо всём лично!"
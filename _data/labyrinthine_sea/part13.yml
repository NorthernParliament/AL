chapter1:
  rows:

    - char: essex
      side: left
      text:
        - "Так вот где запланировано возведение аванпоста... Невероятно близко к самому центру акватории."
        - "Если мы развернём здесь базу снабжения и ремонта, это сильно облегчит задачу во время генерального наступления."

    - char: memphis
      side: right
      text:
        - "Причём этот аванпост будет не единственным. Согласно плану, вокруг центральной зоны океана NA будет возведено в общей сложности шесть таких баз."

    - char: intrepid
      side: left
      text:
        - "Сжать кольцо вокруг Сирен со всех четырёх сторон к центру, а затем начать общий штурм... Я впервые участвую в операции такого грандиозного масштаба."
        - "Когда начнётся генеральное наступление, зрелище будет просто незабываемое!.."

    - char: memphis
      side: right
      text:
        - "Если бы мы не увязли в войне с Багровой Осью, мы бы уже давно могли начать точечные контратаки на океанские владения Сирен."
        - "Впрочем, Железная Кровь, похоже, крайне заинтересована в технологиях Сирен, оставшихся в этом секторе, так что вряд ли они нарушат соглашение о прекращении огня и станут нам мешать в этой операции."
        - "Получается, единственным дестабилизирующим фактором в регионе остаётся «Пепел»..."

    - char: shangri_la
      side: left
      text:
        - "Я слышала, что флот Командира в секторе A обнаружил новых участников «Пепла». Похоже, они тоже стягивают силы к океану NA."
        - "Откуда они берутся и какова их истинная цель?.."

    - char: memphis
      side: right
      text:
        - "Эх, действия «Пепла» в последнее время стали настолько частыми, что эта «совершенно секретная информация» скоро станет известна каждому встречному."
        - "Похоже, скоро к «трём классическим вопросам о Сиренах» в нашем флоте добавятся ещё и «три вопроса о Пепле», ха-ха..."

    - char: intrepid
      side: left
      text:
        - "Хм... Девочки, вы заметили? С тех пор как мы отогнали того Арбитра с длинным именем, на нашем пути больше не было ни единой помехи."

    - char: memphis
      side: right
      text:
        - "Всё верно. Но ведь это же хорошо, разве нет? Что тут странного?.."

    - char: intrepid
      side: left
      text:
        - "Странно то, что почти сразу после исчезновения помех начали появляться заградительные флоты Сирен."
        - "Причём это не те вялые отряды, которые они выставляли раньше, будто «подчищая старые склады», — те враги, что атаковали нас только что, вполне боеспособны."

    - char: memphis
      side: right
      text:
        - "Ты хочешь сказать, что помехи этой Умеренности действовали и на обычных Сирен тоже? Или Умеренность лично вмешалась, чтобы исправить сбой в их системе командования?"

    - char: intrepid
      side: left
      text:
        - "Я пока не уверена, какой из вариантов верный, но, учитывая, что их система управления работала абы как с самого начала этой масштабной операции, возможно, этот Арбитр что-то предприняла."

    - char: essex
      side: right
      text:
        - "Что бы Сирены сейчас ни замышляли, уже поздно. Пока они не завершили развёртывание — в атаку! Уничтожим их одним махом!"
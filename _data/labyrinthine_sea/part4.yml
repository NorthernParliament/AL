chapter1:
  rows:

    - char: tb_rad
      side: left
      text:
        - "Синхронизация аналитического модуля... Обнаружен дружественный сигнал, перемещающийся в окрестных водах. Согласно электронному идентификатору, это Арк Ройал, принадлежащая Королевскому Флоту."

    - char: memphis
      side: right
      text:
        - "Но ведь зона ответственности Королевского Флота ограничивается сектором B. Что Арк Ройал забыла здесь?.."

    - char: essex
      side: left
      text:
        - "Обстановка в акватории NA запутанная, может, она сбилась с курса? Сигнал только от неё одной? А как же серийные корабли?"

    - char: tb_rad
      side: right
      text:
        - "Команда подтверждена. Зафиксирован сигнал только от Арк Ройал. Сигналы других кораблей, серийных моделей или гражданских судов не обнаружены."

    - char: essex
      side: left
      text:
        - "Совсем одна?.. Это подозрительно. Передайте разведотряду, пусть внимательнее следят за её перемещениями."
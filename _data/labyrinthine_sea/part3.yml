chapter1:
  rows:

    - char: intrepid
      side: left
      text:
        - "Эх... Слабый враг — это, конечно, хорошо, но когда он настолько слаб, становится даже как-то не по себе..."
        - "Среди флотов, которые выставляют Сирены, теперь редко встретишь даже серию «Исполнитель», не говоря уже о тех новых моделях, с которыми мы столкнулись у крепости Панамы..."
        - "Они вообще собираются сопротивляться?.."

    - char: shangri_la
      side: right
      text:
        - "Мы так долго сражаемся с Сиренами, но я впервые чувствую, что у нас есть преимущество над ними в технологиях и боевой мощи."
        - "Состав флотов, выходящих нам навстречу, выглядит так, будто... ну... будто они намеренно избавляются от старого хлама со складов."

    - char: essex
      side: left
      text:
        - "Если ты так говоришь... то доля правды в этом есть. Похоже не на то, что Сирены просто сократили количество развернутых сил, а на то, что они вывели все элитные подразделения?!"

    - char: intrepid
      side: right
      text:
        - "Так вот почему ситуация сейчас настолько односторонняя... Сирены ведут себя так, словно сопротивляются лишь для вида, позволяя нам беспрепятственно возвращать контроль над акваторией."

    - char: essex
      side: left
      text:
        - "Это недобрый знак. Местоположение основных сил Железной Крови неизвестно, и основные силы Сирен тоже куда-то исчезли..."
        - "Мы наступаем на центральный сектор всеми доступными силами, обладая полным численным превосходством, но почему же у меня на душе становится всё тревожнее..."

    - char: memphis
      side: right
      text:
        - "О! Что касается перемещений флота Железной Крови — я видела в Штабе кое-какие разведданные, точность которых ещё не подтверждена."
        - "Вскоре после нападения на Скапа-Флоу один из флотов Железной Крови, кажется, вошёл в Средиземное море, а затем тайно миновал канал и вышел в Эритрейское море."

    - char: intrepid
      side: left
      text:
        - "Что это ещё за стратегия такая?.. У Железной Крови тоже начались проблемы с системой командования, как у Сирен?"

    - char: shangri_la
      side: right
      text:
        - "Эритрейское море никогда не было приоритетным направлением в нашей стратегии. Неужели Железная Кровь планирует совершить грандиозный обходной маневр и ударить по нашему Западному побережью?.."

    - char: essex
      side: left
      text:
        - "Мисс Навигатор, что ты думаешь по этому поводу?"

    - char: tb_rad
      side: right
      text:
        - "Поиск данных: на основании имеющейся информации невозможно прийти к какому-либо достоверному выводу."
        - "Акватория Эритрейского моря находится в зоне ответственности Королевского Флота и Империи Дракона. Желаете отправить запрос на получение разведданных в соответствующие штабы?"

    - char: essex
      side: left
      text:
        - "А... я просто спросила. Сейчас идет масштабная операция, и ситуация за пределами акватории NA не должна нас отвлекать."

    - char: intrepid
      side: right
      text:
        - "И всё же мисс Навигатор действительно впечатляет. Она способна в реальном времени сопоставлять огромные массивы данных — прямо как портативный аналитический модуль."

    - char: tb_rad
      side: left
      text:
        - "Обеспечение поддержки и содействия в ходе боевых действий — мой долг. Я рада быть вам полезной."
chapter1:
  rows:

    - char: intrepid
      side: left
      text:
        - "...Научно-исследовательский флот?!"

    - char: memphis
      side: right
      text:
        - "Да... Получив доклад от Кливленд, Штаб принял решение немедленно направить научно-исследовательскую группу к разрушенному полигону Сирен для проведения глубокой экспертизы."
        - "В связи с этим группе Кливленд приказано временно остаться там для обеспечения охраны исследователей."

    - char: intrepid
      side: left
      text:
        - "...Но ведь сейчас идёт масштабная операция! Угроза со стороны Сирен ещё не устранена. Отправлять научный флот на передовую в такой момент — это слишком опасно!"
        - "К тому же, если группа Кливленд выбывает из активной фазы, это повлияет на все наши дальнейшие планы развёртывания..."

    - char: shangri_la
      side: right
      text:
        - "Если предыдущий сигнал Арк Ройал был лишь ложной целью, созданной помехами, то и разрушенный полигон вполне может оказаться ловушкой, заманивающей нас на расследование."

    - char: memphis
      side: left
      text:
        - "Я тоже считаю, что нынешнее распоряжение крайне несвоевременно... Эссекс, как командующая силами в секторе C, ты имеешь право опротестовать этот приказ."

    - char: essex
      side: right
      text:
        - "Эх, ладно... Логика Штаба не лишена смысла."
        - "Будь то уничтоженная лаборатория Сирен или их очевидные попытки электронного вмешательства — сейчас мы слишком мало знаем об этом поле боя. Любая крупица информации может пойти на пользу всей кампании."
        - "К тому же Кливленд и остальные лишь временно переведены на охрану. Надеюсь, они скоро вернутся в строй."
        - "Мисс Навигатор, как твоё состояние?"

    - char: tb_rad
      side: left
      text:
        - "Команда подтверждена. Связь с центральным процессором восстановлена. Прогресс восстановления системы — 90%. На данный момент аномалий не обнаружено."

    - char: essex
      side: right
      text:
        - "Какая быстрая самодиагностика... Отлично. Тогда и нам пора взбодриться и двигаться дальше. Наша миссия ещё далека от завершения!"
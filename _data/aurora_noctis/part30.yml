chapter1:
  rows:

    - char: perseus
      side: left
      text:
        - "Бой окончен. Фух… это было немного утомительно."
        - "Враги в точности соответствуют новым моделям из разведданных Северного Парламента, но человекоподобных командных единиц среди них обнаружено не было."

    - char: vampire
      side: right
      text:
        - "Похоже, это и правда были просто «остатки» после зачистки."

    - char: perseus
      side: left
      text:
        - "Эти новые Сирены до недавнего времени появлялись лишь в малом количестве в глубинах Ледяной Крепости, а теперь их уже целая армада…"

    - char: sheffield
      side: right
      text:
        - "Вероятно, именно по этой причине Северный Парламент внезапно оказался в столь тяжелом положении."

    - char: perseus
      side: left
      text:
        - "Благодаря защите архипелага Шпицберген, конвой, скорее всего, не попал под прямой удар основных сил Сирен. Счастье в несчастье…"

    - char: vampire
      side: right
      text:
        - "…С их уровнем огневой мощи и защиты, если бы они столкнулись с флотом Сирен в лоб… случилась бы катастрофа!"

    - char: perseus
      side: left
      text:
        - "А? Вдали остались еще несколько вражеских кораблей, они пытаются удрать в сторону нашего эскорта…!"

    - char: vampire
      side: right
      text:
        - "Раз уж план по уничтожению основных сил Железной Крови провалился… теперь мы обязаны любой ценой обеспечить безопасность транспортного конвоя!"

    - char: perseus
      side: left
      text:
        - "«Остатки» остатков… Хорошо… Давайте уничтожим этих сбежавших креветок…!"

    - char: sheffield
      side: right
      text:
        - "(……Все наши силы были отвлечены на «основной» флот Железной Крови. Если те оказались подделкой, то где же тогда настоящие корабли?)"
        - "(То, что Железная Кровь пошла на такие жертвы, используя приманку ради нашего обмана… это крайне нетипично. За этим определенно скрывается заговор.)"
        - "(И связь до сих пор не восстановилась. Неужели это действительно лишь случайное влияние полярного сияния?)"
        - "(Черт возьми, как же хочется поскорее доложить Его Величеству обо всех этих важных деталях......)"
chapter1:
  rows:

    - text:
      - "Шеффилд, ловко уклоняясь от снарядов, на полной скорости неслась навстречу основным силам Железной Крови."

    - char: sheffield
      side: left
      text:
        - "Что-то не так... Плотность огня слишком низкая для такого количества линкоров…"

    - char: deutschland
      side: right
      status: is-red
      text:
        - "На этом всё, а ну стоять!"

    - char: sheffield
      side: left
      text:
        - "Дойчланд?!"

    - char: deutschland
      side: right
      status: is-red
      text:
        - "Сперва похвалю твою храбрость — надо же, какая-то легкая крейсерша осмелилась в одиночку бросить вызов нашему основному флоту!"
        - "Но если я позволю тебе подобраться ближе и выпустить торпеды в «Тирпиц», будет неприятно. Так что останешься здесь!"

    - char: sheffield
      side: left
      text:
        - "Тц, мешаешь!"

    - char: perseus
      side: right
      text:
        - "Наконец-то я тебя догнала…! Ты в порядке, Шеффилд?"

    - text:
      - "Персей вовремя подоспела на помощь, однако бомбы, сброшенные её самолетами, прошли сквозь тело Дойчланд, подняв лишь пустые фонтаны брызг на зеркальной глади воды."

    - char: sheffield
      side: left
      text:
        - "Что…?!"

    - char: perseus
      side: left
      text:
        - "Что…?!"

    - char: deutschland
      side: right
      status: is-red
      text:
        - "Хе-хе-хе-хе-хе... Ха-ха-ха-ха-ха-ха-ха-ха-ха!"

    - char: deutschland_rad
      side: right
      status: is-red
      text:
        - "Трепещите от шока, низшие существа! Технологии Железной Крови — лучшие в мире!"

    - text:
      - "Под аккомпанемент этого высокомерного смеха тело Дойчланд начало постепенно становиться прозрачным, пока не исчезло совсем."
      - "Почти одновременно с этим Тирпиц, Шарнхорст, Гнейзенау, Адмирал граф Шпее… все остальные силы Железной Крови растаяли в воздухе подобно призракам."
      - "От огромного флота, который только что бороздил волны, остались лишь несколько реальных крейсеров и эсминцев, одиноко идущих по пустому морю."

    - char: perseus
      side: left
      text:
        - "Основные силы Железной Крови… исчезли?"

    - char: vampire
      side: right
      text:
        - "Даже радар больше не видит их сигналов!"

    - char: sheffield
      side: left
      text:
        - "…Они обманули не только радары, но и наши собственные глаза. Неужели Железная Кровь уже завершила разработку систем маскировки, которые у нас существуют только в теории?.."

    - char: perseus
      side: right
      text:
        - "Опасения Шеффилд… подтвердились."

    - char: vampire
      side: left
      text:
        - "Погодите… То есть, основных сил Железной Крови здесь вообще не было?! Нас всё это время заставляли бегать кругами всего несколько крейсеров и эсминцев?!"

    - char: perseus
      side: right
      text:
        - "…Судя по результату, именно так."

    - char: sheffield
      side: left
      text:
        - "Тц, как же это бесит…"

    - char: vampire
      side: right
      text:
        - "Ой-ой… Оставшиеся корабли Железной Крови начали сближение с нами. Ну, эти-то наверняка настоящие!"

    - char: perseus
      side: left
      text:
        - "Прямо как полевые мыши после ливня……"

    - char: vampire
      side: right
      text:
        - "…А?"

    - char: sheffield
      side: right
      text:
        - "…А?"

    - char: perseus
      side: left
      text:
        - "…Немедленно доложить о ситуации в штаб, а затем… начнем бой."
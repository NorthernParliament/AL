chapter1:
  rows:

    - char: icarus
      side: left
      text:
        - "Перезарядка завершена, полный залп!"

    - char: valiant
      side: right
      text:
        - "О-о… Вот это настрой! Икарус, отлично сработано!"

    - char: howe
      side: left
      text:
        - "Хорошо, это действительно эффективно. Похоже, у «Интерферов» слабая маневренность — видимо, из-за того, что они нагружены кучей прецизионного оборудования…"
        - "Эдинбург, Командир еще что-нибудь упоминал в отчетах о приемах борьбы с полярными Сиренами?"

    - char: edinburgh
      side: right
      text:
        - "Эм… А?! Сейчас… дай подумать… подумать……"

    - char: valiant
      side: left
      text:
        - "…Всё-таки это та самая Эдинбург."

    - char: edinburgh
      side: right
      text:
        - "У-у…!"

    - char: howe
      side: left
      text:
        - "Ха-ха, не бери в голову. Как только мы разберемся с этими надоедливыми «Интерферами», остальные станут просто мишенями… М? Икарус, что случилось?"

    - char: icarus
      side: right
      text:
        - "М-м… У меня плохое предчувствие, возможно, я просто накручиваю себя…"

    - char: valiant
      side: left
      text:
        - "Мы все здесь — нарушители приказов, так что если есть что сказать — говори прямо!"

    - char: icarus
      side: right
      text:
        - "Эти Сирены смогли прорвать линию обороны Северного Парламента, значит, у них должна быть сосредоточена очень сильная огневая мощь…"
        - "Но сейчас, не считая их количества и досадных «Интерферов», мне кажется, что чего-то не хватает……"

    - char: howe
      side: left
      text:
        - "М-м… Раз уж ты об этом заговорила, то действительно..."

    - char: communicator
      side: right
      status: is-red
      text:
        - "Наконец-то до вас дошло? Тугодумы, я уже устала ждать!"
        - "Бойтесь, трепещите, ощутите страх, проникающий до самого костного мозга из самой тьмы!"

    - char: icarus
      side: left
      text:
        - "Радиостанция, которая была сильно подавлена помехами, вдруг подала голос?!"

    - char: communicator
      side: right
      status: is-red
      text:
        - "Ху-ху… Получилось! И всё-таки, сколько бы раз я ни использовала этот выход, он всегда звучит одинаково круто~!"

    - char: edinburgh
      side: left
      text:
        - "А! Я вспомнила! Это именно то, о чем писал Командир в отчетах — «загрязнение каналов связи», с которым они столкнулись в битве за Ледяную Крепость!"

    - char: communicator
      side: right
      status: is-red
      text:
        - "Эй, эй, эй, эй! Что значит «загрязнение каналов связи»?! Не смейте смотреть на меня свысока!"

    - char: valiant
      side: left
      text:
        - "Хм, так ты и есть командир этого флота Сирен?"

    - char: communicator
      side: right
      status: is-red
      text:
        - "Верно! Те, кто посмел вторгнуться в мои владения, навеки замерзнут в этом ледяном море!"

    - char: valiant
      side: left
      text:
        - "Захватчица из Баренцева моря… Ты что, собралась сама себя замораживать в этом море?"

    - char: communicator
      side: right
      status: is-red
      text:
        - "Что?! Да забей… Я приготовила для вас сегодня кучу новых игрушек, посмотрим, как долго вы еще сможете так дерзить!"
        - "........."

    - char: icarus
      side: left
      text:
        - "Голос в рации исчез…"

    - char: howe
      side: right
      text:
        - "Жаль, что Ямайка в составе эскорта, а не здесь… Мне кажется, они могли бы «найти общий язык»…"

    - char: valiant
      side: left
      text:
        - "Одного этого раздражающего тона уже достаточно, чтобы считать её преступление непростительным!"
        - "Всем собраться! Сейчас мы преподадим ей урок хороших манер!"
chapter1:
  rows:

    - text:
      - "Благодаря совместным усилиям Союза Орла и Королевского Флота, специальный конвой, направляющийся в Северный Парламент, был быстро сформирован."
      - "Хотя полярная ночь, нависшая над Баренцевым морем, говорит о том, что сейчас не лучшее время для транспортных задач, у экстренных миссий нет права на выбор."
      - "По крайней мере, сегодняшний день на главных островах Королевства выдался погожим и подходящим для выхода в море."

chapter2:
  rows:

    - char: belfast
      side: left
      text:
        - "Почти пришло время отплытия. Как продвигается подготовка, Гермиона?"

    - char: hermione
      side: right
      text:
        - "Да! Транспортный флот, эскортная группа, флот поддержки и основные силы — все пересчитаны! За исключением нескольких транспортных судов, которые заканчивают проверку груза, все корабли готовы к отправлению! Мисс Белфаст!"

    - char: belfast
      side: left
      text:
        - "Отлично, благодарю всех за старания. К сожалению, в этот раз я не могу отправиться вместе с вами. Как представители Королевского флота горничных, вы должны постараться. Тщательно выполните задание, порученное Куин Элизабет, в этой операции не должно быть ни одной ошибки, понятно?"

    - char: edinburgh
      side: right
      text:
        - "Есть!"

    - char: sheffield
      side: right
      text:
        - "Есть!"

    - char: hermione
      side: left
      text:
        - "......."

    - char: belfast
      side: right
      text:
        - "Гермиона…? Что-то случилось?"

    - char: hermione
      side: left
      text:
        - "…!? О-очень извиняюсь, я немного отвлеклась…"

    - char: belfast
      side: right
      text:
        - "Хи-хи, засиделись без выходов в море и нервничаете? Гермиона, у тебя всё получится. Если будет возможность, пожалуйста, присмотри за моей сестрой."

    - char: edinburgh
      side: left
      text:
        - "Что это значит, Белфаст… Даже я могу всё сделать отлично, когда захочу, понятно?!"

    - char: belfast
      side: right
      text:
        - "Да-да… Тогда давайте еще раз подтвердим боевые задачи?"

    - char: hermione
      side: left
      text:
        - "Хорошо! Основная цель этой операции — эскортирование специального полярного конвоя в Северный Парламент и возвращение Командира, находящегося там."
        - "Если флот Железной Крови попадется на крючок и пойдет в атаку, флот поддержки и основные силы должны взять их в клещи и одним махом устранить морскую угрозу Железной Крови."

    - char: sheffield
      side: right
      text:
        - "(Конечно, также нужно внимательно следить за ходом боя, собирать разведданные о Северном Парламенте и... вопросы соглашения...)"

    - char: edinburgh
      side: left
      text:
        - "Я, я, между прочим, всё запомнила! И ради этой операции я много раз перечитывала отчет Командира о прошлых сражениях в Беринговом море!"

    - char: hermione
      side: right
      text:
        - "Как и ожидалось от мисс Эдинбург!"

    - char: edinburgh
      side: left
      text:
        - "Хе-хе, можешь хвалить меня побольше! В конце концов, я старшая сестра Белфаст. Раз Белфаст в этот раз не с нами, важные дела доверьте мне, старшей сестре."

    - char: belfast
      side: right
      text:
        - "Да-да… Гермиона, тогда вся надежда на тебя."

    - char: hermione
      side: left
      text:
        - "Есть! Я сделаю всё возможное!"

    - char: edinburgh
      side: right
      text:
        - "М-м… Белфаст — дурочка!"

    - char: sheffield
      side: left
      text:
        - "(Раз уж Куин Элизабет сегодня тоже здесь, то после отплытия она, скорее всего, отправится...)"
        - "Белфаст, у меня какое-то странное предчувствие… После того как мы уйдем, присмотри за Её Величеством."

    - char: belfast
      side: right
      text:
        - "Не беспокойся. Шеффилд, ты тоже будь осторожна. Боже, храни Королеву."

    - char: sheffield
      side: left
      text:
        - "Боже, храни Королеву."
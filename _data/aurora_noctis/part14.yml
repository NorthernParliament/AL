chapter1:
  rows:

    - char: z36
      side: left
      status: is-red
      text:
        - "Э-э… Хиппер, они от нас ускользнули…"

    - char: admiral_hipper
      side: right
      status: is-red
      text:
        - "А-а-а-а-а! Эти палубные самолеты такие надоедливые!"
        - "До бешенства доводит! Похоже, эти корабли Королевского Флота умеют не только убегать. Отлично, так они хотя бы представляют ценность в качестве добычи!"

chapter2:
  rows:

    - char: vampire
      side: left
      text:
        - "Фу-х… Хиппер с поврежденным двигателем должна быть обездвижена на некоторое время, мы временно вне опасности~"

    - char: perseus
      side: right
      text:
        - "…Кое-что странное. Основные силы Железной Крови продвигаются так быстро, они уже почти соединились с Хиппер…"

    - char: vampire
      side: left
      text:
        - "Что?! Как линкоры могут передвигаться с такой скоростью?!"

    - char: sheffield
      side: right
      text:
        - "Персей, разведданные точны? Ты уверена, что Тирпиц и остальные линкоры Железной Крови действительно движутся вместе с флотом?"

    - char: perseus
      side: left
      text:
        - "Да, я абсолютно уверена."

    - char: sheffield
      side: right
      text:
        - "Попробуй атаковать их разведывательными самолетами? Достаточно лишь пробной атаки."

    - char: perseus
      side: left
      text:
        - "…Не думаю, что несколько разведывательных самолетов смогут нанести хоть какой-то реальный урон линкорам. Но раз ты настаиваешь, подожди секунду..."

chapter3:
  rows:

    - char: perseus
      side: left
      text:
        - "М-м…? Тирпиц никак не отреагировала на атаку самолетов-разведчиков, Шарнхорст и Гнейзенау, идущие по бокам, — тоже."
        - "Они просто проигнорировали их, посчитав, что разведчики не представляют никакой угрозы… так ведь? Какая самоуверенность."

    - char: sheffield
      side: right
      text:
        - "Отсутствие реакции на атаку, движение линкоров на такой высокой скорости… Неужели…!"
        - "Вампир, Персей, нас, возможно, обманули! Основные силы Железной Крови могут быть фальшивкой! Немедленно перестроить флот, готовиться к прямому столкновению!"

    - text:
      - "Едва закончив фразу, Шеффилд поспешно развернулась и бросилась в сторону основных сил Железной Крови."

    - char: vampire
      side: left
      text:
        - "Фальшивка!? Эй, объяснись толком, Шеффилд…!"

    - char: perseus
      side: right
      text:
        - "…Убежала так быстро, будто ей хвост подожгли……"
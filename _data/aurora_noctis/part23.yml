chapter1:
  rows:

    - text:
      - "Под полярным сиянием эскортный флот Королевских Островов, сохраняя четкий строй, продвигается по морской глади."

    - char: hermione
      side: left
      text:
        - "Транспортные суда в центре, корабли сопровождения рядом… м-м, всё в порядке. Фух… Девочки, у всех всё в порядке?"

    - char: eagle
      side: right
      text:
        - "Да, корабли прикрытия в авангарде и арьергарде выполняют свою задачу. Мои палубные самолеты тоже ведут патрулирование..."
        - "Тц, их «отступление» действительно было просто отвлекающим маневром. Всем внимание: мы окружены «волчьей стаей»."

    - char: hermione
      side: left
      text:
        - "Какова численность противника?"

    - char: eagle
      side: right
      text:
        - "Точное количество неизвестно, но… судя по всему, они вполне способны на масштабную атаку."

    - char: jamaica
      side: left
      text:
        - "Неужели штаб купился на фальшивое сообщение об отступлении подлодок Железной Крови? Хорошо, что мы не ушли. Иначе все транспортники уже стали бы легкой добычей для «стаи»…"

    - char: hermione
      side: right
      text:
        - "Хи-хи, похоже, наше решение было верным. Теперь нам будет что ответить остальным по возвращении."
        - "Фух… Ну что ж! Что бы ни случилось, мы обязаны защитить транспортные корабли! Девочки, собраться, готовимся к бою!"
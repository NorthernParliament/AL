chapter1:
  rows:

    - char: z2
      side: left
      status: is-red
      text:
        - "«Аврора Ноктис» (Фантомное сияние), то есть изменчивая аврора... Не думала, что полярное сияние действительно появится как раз во время операции…"
        - "Ойген, это ты придумала название для операции или Фридрих дер Гроссе?"

    - char: prinz_eugen
      side: right
      status: is-red
      text:
        - "Конечно она. Но я и представить не могла, что она будет настолько точна даже в таких необъяснимых деталях. Аж мурашки по коже…"
        - "М-м? Это были… палубные самолеты Королевского Флота?.. Похоже, наше местоположение «раскрыто» строго по плану~"
        - "Теперь на очереди..."

    - char: z2
      side: left
      status: is-red
      text:
        - "Ойген, вон тот странный индикатор начал бешено мигать."

    - char: prinz_eugen
      side: right
      status: is-red
      text:
        - "Неужели нам действительно удалось перехватить их канал связи?! Фридрих и впрямь подкинула нам отличную игрушку!"
        - "......Так-так... От чьего же имени нам лучше отправить сообщение? Хи-хи-хи... Пожалуй, используем их горячо любимую Королеву~"

    - char: z2
      side: left
      status: is-red
      text:
        - "Ойген, ты улыбаешься просто отвратительно."

    - char: prinz_eugen
      side: right
      status: is-red
      text:
        - "Хм-хм-хм... Это улыбка юной девы, чьи планы продвигаются слишком гладко~"
        - "Ладно, живо отправь депешу «Волчьей стае». Передай, что всё идет по плану. Пусть дождутся, пока эскортный флот отступит, и только тогда начинают общую атаку на конвой."

    - char: z2
      side: left
      status: is-red
      text:
        - "Ладно-ладно... Но я всё равно сомневаюсь, что члены Королевского Флота настолько глупы, чтобы повестись на такой трюк."

    - char: prinz_eugen
      side: right
      status: is-red
      text:
        - "Результат не так важен, как возникшие в процессе «факторы». В любом случае, у «волков» есть свой собственный план атаки. Если эскорт не купится на обман — пусть сражаются как обычно~"
        - "И еще... Будет невежливо оставлять группу поддержки Королевского Флота в полном одиночестве. Давайте отправим наш авангард, чтобы они как следует с ними «поиграли»~"

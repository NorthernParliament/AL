chapter1:
  rows:

    - char: queen_elizabeth
      side: left
      text:
        - "Поистине редкий случай, когда наш Основной Флот выдвинулся в полном составе. Здесь стало так пусто и тихо…"

    - char: belfast
      side: right
      text:
        - "Надеюсь, ваш план сражения пройдет успешно, Ваше Величество."

    - char: queen_elizabeth
      side: left
      text:
        - "Хм, флот Железной Крови непременно клюнет на наживку, обязательно! Ну всё, Белфаст, оставайся здесь и не подпускай никого к этому объекту."
        - "Да, кстати, если будут новости от Шеффилд — немедленно доложи мне."

    - char: belfast
      side: right
      text:
        - "Слушаюсь, Ваше Величество."

chapter2:
  rows:

    - char: sheffield
      side: left
      text:
        - "Скапа-Флоу… Значит, вот как?"

    - char: queen_elizabeth
      side: right
      text:
        - "Именно! Когда будете возвращаться, возьми всё, что было оговорено в соглашении с Северным Парламентом, вместе с Командиром, и направляйтесь прямо к якорной стоянке Скапа-Флоу. Я буду ждать вас там!"

    - char: sheffield
      side: left
      text:
        - "Я всё поняла."

chapter3:
  rows:

    - char: queen_elizabeth
      side: left
      text:
        - "«Прошлое, оставшееся под водой; ложь, всплывшая из гипотез»… Тц, похоже, Железная Кровь уже наполовину добилась своего…"
        - "Кажется, и здесь нужно ускориться… А-а-а! Ну вот что, черт возьми, происходит с этой Фридрих дер Гроссе?!"
        - "Ведь еще до появления Кубов Мудрости корпус линкора «Фридрих дер Гроссе» должен был затонуть на дне Скапа-Флоу вместе с бесчисленным множеством кораблей Железной Крови и Королевского Флота во время операции «Одиннадцатый узел», направленной против Сирен."
        - "Неужели это дело рук самих Сирен… Хе, если подумать… является ли нынешняя Фридрих дер Гроссе «прошлым под водой» или «ложью из гипотез»…"

    - text:
      - "БАБАХ!!!!"

    - char: belfast_rad
      side: left
      text:
        - "Ваше Величество, вокруг Скапа-Флоу внезапно появилось огромное количество кораблей Железной Крови! Они атакуют якорную стоянку!"

    - char: queen_elizabeth
      side: right
      text:
        - "Огромное количество кораблей Железной Крови…? Но ведь они должны быть на пути к Баренцеву морю! Как они могли так внезапно появиться здесь?!"

    - char: belfast_rad
      side: left
      text:
        - "Похоже… Железная Кровь каким-то образом сумела обмануть нашу разведку. Ваше Величество, умоляю, немедленно эвакуируйтесь!"

chapter4:
  rows:

    - char: deutschland
      side: right
      status: is-red
      text:
        - "А ну стоять! Куин Элизабет из Королевского Флота, не ожидала встретить тебя здесь, ха-ха-ха-ха!"
        - "Неожиданный сюрприз! Вы так долго блокировали Железную Кровь этой базой Скапа-Флоу, и вот сегодня нам наконец-то представился шанс!"
        - "В любом случае, эта ненавистная якорная стоянка Скапа-Флоу будет полностью уничтожена. А раз уж мы столкнулись здесь, так оставайся здесь и упокойся вместе с ней!"

    - char: queen_elizabeth
      side: left
      text:
        - "Белфаст, ясна ли численность врага?"

    - char: belfast
      side: right
      text:
        - "Прошу прощения, Ваше Величество, всё произошло слишком внезапно… Масштаб флота противника еще не до конца ясен, но помимо Дойчланд, базу обстреливают как минимум два других линкора Железной Крови."

    - char: queen_elizabeth
      side: left
      text:
        - "Значит, это действительно основные силы Железной Крови… «На сто бед — одна ошибка»… Эх, оказывается, невозможно предусмотреть всё."
        - "Хм! Не смей проявлять дерзость перед моим лицом, жалкий «карманный линкор» Железной Крови!"
        - "Раньше ты бы стояла в сторонке и почтительно называла меня «Ваше Величество», а теперь — прочь с дороги!"
        - "Раз уж в окружении нас ждет только смерть… Белфаст, помоги мне прорваться!"

    - char: belfast
      side: right
      text:
        - "Как пожелаете, Ваше Величество."
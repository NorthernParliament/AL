chapter1:
  rows:

    - char: z2
      side: left
      status: is-red
      text:
        - "Обнаружен флот Сирен к северо-востоку от сил Королевского Флота. Вместе с нами они зажимают Королевский Флот в клещи."
        - "Кроме того, наша связь тоже внезапно вышла из строя. Это тоже часть плана?"

    - char: prinz_eugen
      side: right
      status: is-red
      text:
        - "......В плане этого не было."

    - char: z2
      side: left
      status: is-red
      text:
        - "Значит, даже наши системы связи не выдержали помех Сирен..."
        - "Что будем делать дальше? Немного «подыграем» Сиренам?"

    - char: prinz_eugen
      side: right
      status: is-red
      text:
        - "........."
        - "Хе, что-то у меня резко испортилось настроение. Задача выполнена, мы отступаем."

chapter2:
  rows:

    - char: z36
      side: left
      status: is-red
      text:
        - "Хиппер, в небе огромное количество самолетов Королевского Флота, они летят прямо на тебя!"

    - char: admiral_hipper
      side: right
      status: is-red
      text:
        - "Ха?! С чего это они все вдруг на меня нацелились?!"

    - char: z36
      side: left
      status: is-red
      text:
        - "Ну, ты же головной корабль типа «Хиппер»... Наверное, они приняли тебя за флагман нашего флота..."

    - char: admiral_hipper
      side: right
      status: is-red
      text:
        - "Ха-а?! Ну, премного благодарна! Подумаешь, пара лишних самолетов, чего они так важничают! Всему флоту — занять противовоздушную позицию, сбить их всех до единого!"

    - char: z2_rad
      side: left
      status: is-red
      text:
        - "В этом нет нужды. Хиппер, Z36, наша операция завершена. Готовимся к отходу."

    - char: admiral_hipper
      side: right
      status: is-red
      text:
        - "...А? С самого начала боя мы еще не добились ни одного результата!"

    - char: z2_rad
      side: left
      status: is-red
      text:
        - "лот Сирен решил вклиниться в ситуацию вне плана. Уходим, пока всё не усложнилось."

    - char: admiral_hipper
      side: right
      status: is-red
      text:
        - "......Я поняла. Хм, на этот раз им просто повезло. Отходим!"

chapter3:
  rows:

    - char: sheffield
      side: left
      text:
        - "Флот Железной Крови начал отступление. Похоже, они всё-таки не хотят рисковать повреждением крупных кораблей…"

    - char: vampire
      side: right
      text:
        - "М-м...? Оставим в стороне стратегический выбор, но в бою Железная Кровь обычно не ведут себя так трусливо. Странно…"

    - char: perseus
      side: left
      text:
        - "Какова бы ни была причина, нам по крайней мере удалось избежать худшего сценария — удара с двух сторон…"
        - "Хотят бежать — пусть бегут. У нас есть проблемы посерьезнее."
        - "Флот Сирен уже совсем близко. Всем быть начеку..."
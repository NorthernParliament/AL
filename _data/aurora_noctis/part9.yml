chapter1:
  rows:

    - char: perseus
      side: left
      text:
        - "Вампир, ты ведь участвовала во многих сражениях прошлого, верно? Можешь рассказать мне, как это было?.."

    - char: vampire
      side: right
      text:
        - "Хе-хе~ Ты обратилась по адресу! Что касается опыта борьбы с Сиренами, я тут самая настоящая старшая-престаршая наставница!"
        - "В те времена и Железная Кровь, и Королевский Флот, и все остальные фракции — все вместе сражались плечом к плечу под единым знаменем «Лазурного Пути»!"

    - char: perseus
      side: left
      text:
        - "Хм… Глядя на то, что происходит сейчас, это действительно трудно представить……"

chapter2:
  rows:

    - text:
      - "Внезапно вспыхнувшее в небе полярное сияние озарило вечную ночь и осветило путь флоту поддержки."
      - "Колышущиеся ленты света вместе со всем звездным небом отразились в зеркале морских волн. Казалось, будто флот плывет по сказочному звездному океану."

    - char: perseus
      side: left
      text:
        - "Вот это да..."

    - char: vampire
      side: right
      text:
        - "Ого… Ну и ну…"

    - char: perseus
      side: left
      text:
        - "Ночное небо… словно взорванное бомбой из чистого света… Потрясающее зрелище……"

    - char: vampire
      side: right
      text:
        - "……А вот и они — странные метафоры Персея! Но насчет того, что это потрясающе, я полностью согласна~"

    - char: sheffield
      side: left
      text:
        - "Сияние также улучшило видимость. Не теряйте бдительности из-за красивых видов, опасность может скрываться совсем рядом."

    - char: vampire
      side: right
      text:
        - "Эх… И это твоя первая реакция?"

    - char: sheffield
      side: left
      text:
        - "…Персей, такое сияние сейчас — это нормальное явление?"

    - char: perseus
      side: right
      text:
        - "ормы полярных сияний в этих широтах очень разнообразны… Раз сейчас период полярной ночи, время от времени могут появляться такие яркие и долгие вспышки."

    - char: sheffield
      side: left
      text:
        - "Значит, это обычное природное явление… Возможно, я зря беспокоюсь."

    - char: vampire
      side: right
      text:
        - "Шеффилд, ты ведь горничная, тебе стоит иногда обращать внимание на что-то, кроме войны. Если вечно быть такой напряженной, можно и сломаться, понимаешь?"
        - "Красота прямо перед глазами, не насладиться ею — просто преступление! Расслабься немного~"

    - char: sheffield
      side: left
      text:
        - "Будь то уборка или бой — если это необходимо, я это сделаю. Или, может быть, «госпожа» Вампир желает прямо сейчас испытать на себе мои «клининговые услуги»?"

    - char: vampire
      side: right
      text:
        - "Уо-о-о~ «Хладнокровная» горничная, страшно-страшно!"

    - char: perseus
      side: left
      text:
        - "…Словно нож, режущий помидор……"

    - char: vampire
      side: right
      text:
        - "А?"

    - char: sheffield
      side: right
      text:
        - "А?"
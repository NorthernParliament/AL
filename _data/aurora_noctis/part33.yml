chapter1:
  rows:

    - char: omitter
      side: right
      status: is-red
      text:
        - "О-хо~ Наконец-то вы здесь. Должна вас похвалить — не каждой удастся прорваться сквозь флот «Типа III» и добраться до меня."
        - "В этот раз я даже заменила обычных «Интерферов» на «Тип III», так что предыдущий бой наверняка выдался потной забавой? Ха-ха-ха-ха-ха!"

    - char: howe
      side: left
      text:
        - "Хм, ты явно преувеличиваешь. Не потому ли ты здесь одна, что большую часть твоего флота пустили на металлолом Северный Парламент и Командир, пока ты пыталась прорваться?"

    - char: omitter
      side: right
      status: is-red
      text:
        - "Хм, да что вы понимаете! Это были лишь заводи в потоке, хвост кометы, звезды в лунном свете... Всё это — лишь часть Великого Плана!"

    - char: icarus
      side: left
      text:
        - "Кажется… она просто пытается оправдаться."

    - char: omitter
      side: right
      status: is-red
      text:
        - "Я! ГОВОРЮ! ЧТО! Того флота, что у меня под рукой, вполне хватит, чтобы прикончить вас!"

    - char: valiant
      side: left
      text:
        - "Судя по твоему имени (清除者 - Уборщик), я думала, ты будешь увешана тряпками и метлами, но что-то их не видно…"

    - char: omitter
      side: right
      status: is-red
      text:
        - "Да кто вообще станет таскать такое на себе?! У вас что, в досье даже картинок нет?"

    - char: valiant
      side: left
      text:
        - "Каждый день приходит столько отчетов, некогда разглядывать каждый… Эдинбург, что там Командир писал в рапорте?"

    - char: edinburgh
      side: right
      text:
        - "А, сейчас! Кажется…"
        - "«Омиттер. Предположительно, высокопоставленная человекоподобная командная единица штурмового типа, схожая с Пьюрифайер. Способна использовать торпеды Сирен и вести артиллерийский огонь, по мощности превосходящий линкоры Сирен»."
        - "«Подобно Интерферам, специализируется на радиоэлектронной борьбе. Рекомендуется использовать ту же стратегию, что и против них»."
        - "М-м… кажется, там было что-то еще?.."

    - char: icarus
      side: left
      text:
        - "Я дополню! «#Особое внимание#: Огромные пасти на её оснащении выглядят крайне угрожающе, однако до самого момента поражения Омиттер в конце прошлой операции, эти пасти так ни разу и не были использованы»."
        - "«P.S. Хотя существует вероятность, что она намеренно не использовала основное оружие, чтобы сберечь силы, учитывая характер Омиттер, вполне возможно, что это просто декорации, установленные исключительно ради устрашения...»"
        - "Конец цитаты~"

    - char: omitter
      side: right
      status: is-red
      text:
        - "И это всё, что было в том отчете Командира?"
        - "ДА ВЫ ИЗДЕВАЕТЕСЬ?!!!!!!!!!!!!!!!!!!"
        - "Сияющая галактика, рожденная в пасти, пожирающей небеса и землю… Раз уж вам так любопытно, в этот раз я заставлю вас рассмотреть всё в деталях!!!!!!!!!!"
        - "Сражайтесь в отчаянии, корчитесь в аду, ваши данные станут..."

    - text:
      - "КАБУУУМ!!!"

    - char: howe
      side: left
      text:
        - "Хватит болтовни! Всем силам — именем королевы Елизаветы, разнесите врага перед нами в щепки!"
chapter1:
  rows:

    - char: omitter
      side: left
      status: is-red
      text:
        - "Слишком легко, про~рыв~ бло~ка~ды~! Хм, стоило получить разрешение на установку «Типа III» для всего оснащения, как этот их полярный флот Северного Парламента сразу перестал быть мне ровней~!"
        - "Это огромное полярное сияние в небе… Неужели после развертывания нового оборудования «Строителя» стало возможно даже такое?"
        - "Может быть, однажды это станет мощным оружием для противостояния «Им»…"
        - "Эх, Обсервер действительно знает толк в «управлении процессами»… Только-только стабилизировали «Корону», как теперь — Баренцево море…"
        - "Про сбор данных я молчу… но создание проблем полярному конвою — это ведь не то, что обычно нравится «Коду G»?…"
        - "А та шиука затаилась в акватории NA, даже не знаю, что она там затевает…"
        - "Э-э~~~~~~~! Мне постоянно кажется, что в последнее время каждый раз, когда упоминают акваторию NA, взгляд у Обсервер становится ну очень пугающим…"
        - "Хм? Авангард уже так быстро встретил врага?"
        - "Хи-хи-хи, ну что ж, тогда сначала разомнусь на этом флоте с Королевских Островов~"
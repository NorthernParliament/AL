chapter1:
  rows:

    - text:
      - "Бесчисленные ледяные столбы, будто ведомые колоссальной силой, неестественно сплетались воедино, устремляясь от поверхности моря к небесам и изгибаясь в причудливую гигантскую структуру."
      - "Это было место, ставшее внешним оплотом полярных Сирен — «Корона», первая аномалия, некогда открытая силами «Пепла»."
      - "Со стороны «Короны» бесконечные орды Сирен приближались, поглощая морскую гладь, словно само воплощение конца света."

    - char: chapayev
      side: left
      text:
        - "Хе-хе, в этот раз уровень сложности, кажется, немного высоковат. Но если рядом Командир, то всё обязательно будет хорошо, правда же~?"

    - char: tashkent
      side: right
      text:
        - "Вот именно, давай начистим им физиономии, Товарищ!"

    - char: avrora
      side: left
      text:
        - "Мы сражаемся не только за выживание, мы сражаемся за будущее. Командир, в какой бы безнадежной ситуации мы ни оказались, луч надежды всегда будет гореть."

    - char: sovetskaya_rossiya
      side: right
      text:
        - "Товарищ Командир, весь флот Северного Парламента, находящийся сейчас в районе «Короны», в вашем распоряжении."
        - "Мы станем вашим острым клинком. Используйте нас на полную мощь, сокрушите этих врагов, посмевших вторгнуться в наш дом!"

    - text:
      - "Несмотря на то, что ситуация была действительно критической, варианты вроде «отступления», «капитуляции» или «бегства» никогда не рассматривались."
      - "Возглавить флот, вступить в бой и одержать победу. Это долг, обязанность… и предназначение Командира."

    - char: commander
      side: left
      text:
        - "Вперёд! Начать операцию!"

chapter2:
  rows:

    - char: all
      side: left
      text:
        - "УРА-А-А-А-А!!!!"

chapter3:
  rows:

    - char: sovetsky_soyuz_old
      side: left
      status: is-yellow
      text:
        - "Ура… Начнем же битву, товарищ Командир."
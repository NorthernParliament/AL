chapter1:
  rows:

    - char: sovetsky_soyuz_old
      side: left
      status: is-yellow
      text:
        - "Сирены атаковали по всему фронту и одновременно попытались уничтожить наши транспортные конвои… Хорошо, что Королевский Флот заранее отправил основной флот для расчистки пути."
        - "Но из-за этого их «операция с приманкой» не только провалилась, но и привела к тому, что Железная Кровь больно укусила их в ответ…"

    - char: sovetskaya_rossiya
      side: right
      status: is-yellow
      text:
        - "Действия Сирен были слишком синхронизированы с шагами Железной Крови. Я не верю в такие совпадения."

    - char: sovetsky_soyuz_old
      side: left
      status: is-yellow
      text:
        - "Как бы то ни было, после ухода флота Железной Крови мы наконец-то сможем перевести дух в Балтийском море. Погрузка и разгрузка припасов завершены?"

    - char: sovetskaya_rossiya
      side: right
      status: is-yellow
      text:
        - "Все доставленные материалы выгружены и сейчас распределяются по разным фронтам с максимальной скоростью. Начался ремонт поврежденных транспортных судов."

    - char: sovetsky_soyuz_old
      side: left
      status: is-yellow
      text:
        - "Экипажи транспортных конвоев проделали огромную работу… Все они — герои Северного Парламента."

    - char: sovetskaya_rossiya
      side: right
      status: is-yellow
      text:
        - "И всё же, потери составили почти одну десятую от общего числа… Это была необходимая цена за «игру» с Железной Кровью?.. Проклятье."

    - char: sovetsky_soyuz_old
      side: left
      status: is-yellow
      text:
        - "Если бы не Командир, наша победа в этой битве не была бы достигнута с такими малыми потерями."
        - "Сейчас важность присутствия Командира для северных рубежей стала очевидна всем, а флот Роялов, пришедший за ним, был вынужден срочно развернуться."
        - "Хи-хи-хи, теперь-то штаб точно не сможет отказать нам в просьбе продлить срок пребывания Командира здесь."
        - "Разумеется, время на вес золота. Раз уж проверка товарища Командира завершена, самое время переходить к следующему этапу плана."
        - "Для начала… давайте покажем товарищу Командиру «то самое», что мы обнаружили в ледяных водах."
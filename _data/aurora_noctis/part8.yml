chapter1:
  rows:

    - char: admiral_hipper
      side: left
      status: is-red
      text:
        - "Ойген, уже почти пора выдвигаться. Что ты там возишься, чего копаешься?"

    - char: prinz_eugen
      side: right
      status: is-red
      text:
        - "Не спеши так, Хиппер. От такой спешки и суеты только морщины на лице появятся, а это было бы так прискорбно~"

    - char: admiral_hipper
      side: left
      status: is-red
      text:
        - "Ха?! Операция «Призрачный свет» — это важнейшее сражение! И раз уж тебя назначили флагманом и командующим, как я могу не нервничать?!"

    - char: prinz_eugen
      side: right
      status: is-red
      text:
        - "Ш-ш-ш. В этот раз наш флагман — «Королева Севера», Тирпиц."
        - "Сначала так... потом вот так... Хи-хи, подготовка наконец-то полностью завершена."

    - char: deutschland
      side: left
      status: is-red
      text:
        - "Наконец-то мы можем отплыть?.. Слишком медленно, Ойген! Мое терпение уже на исходе!"

    - char: gneisenau
      side: right
      status: is-red
      text:
        - "Они наивно полагали, что их план безупречен, даже не подозревая, сколько в нем прорех..."

    - char: scharnhorst
      side: left
      status: is-red
      text:
        - "Сегодня настал день, когда Королевский Флот заплатит за свою привычную заносчивость!"

    - char: admiral_graf_spee
      side: right
      status: is-red
      text:
        - "Я всегда бороздила моря и сражалась в полном одиночестве... Не думала, что и для меня настанет шанс сразиться плечом к плечу со всеми вами..."

    - char: tirpitz
      side: left
      status: is-red
      text:
        - "Шпее, я, как никто другой, знаю вкус холода и одиночества... Дорожи этой редкой возможностью, сразимся вместе и принесем Железной Кровь победу!"

    - char: prinz_eugen
      side: right
      status: is-red
      text:
        - "и-хи... Именно так. Давайте же скользить по океану, подобно неуловимому полярному сиянию, и добудем славу для Железной Крови~"
        - "Раз уж они так жаждут выманить и уничтожить наши основные силы — что ж, мы покажем им эти силы во всей красе..."
        - "Только бы они сами не перепугались рыбы, которую выудили на свою наживку. Хи-хи-хи-хи..."
        - "Eisen und Blut über alles (Железо и Кровь превыше всего)."
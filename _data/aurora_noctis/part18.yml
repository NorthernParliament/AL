chapter1:
  rows:

    - char: icarus
      side: left
      text:
        - "Перезарядка завершена! Икарус, открыть огонь на полную мощь!"

    - char: howe
      side: right
      text:
        - "О~ Для эсминца у тебя весьма недурный стиль боя~"

    - char: icarus
      side: left
      text:
        - "Если враг хочет навредить моим друзьям, совершенно естественно обрушить на него всю мощь и уничтожить как можно быстрее!"
        - "Хотя… будь у меня такая же огневая мощь, как у Хау, всё было бы куда…"

    - char: valiant
      side: right
      text:
        - "Ты всего лишь эсминец… а говоришь такие поразительные вещи с абсолютно невозмутимым видом."

    - char: howe
      side: left
      text:
        - "Хи-хи, у каждого свой стиль боя. Иметь в строю такой бесстрашный эсминец — это ведь замечательно, не так ли?"
        - "Врагов осталось еще немало. Я прикрою вас своим огнем, так что сражайтесь в свое удовольствие~"

    - char: icarus
      side: right
      text:
        - "Есть!.. Икарус приняла!"
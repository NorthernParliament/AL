chapter1:
  rows:

    - char: icarus
      side: left
      text:
        - "Э-э?.. Девочки, смотрите! Полярное сияние в небе… оно как будто исчезает!"

    - char: howe
      side: right
      text:
        - "Сияние пропало вместе с Сиренами?.. А, быстро проверьте рацию! Возможно, помехи тоже прекратились!"

    - char: icarus
      side: left
      text:
        - "Есть! Говорит основной флот——"

    - char: communicator
      side: right
      text:
        - "Пш-ш… Пш-ш… Говорит штаб-квартира LD (Лондон) ..."

    - char: howe
      side: left
      text:
        - "Наконец-то связь восстановилась… Командованию пора бы уже задуматься о разработке более помехоустойчивых передатчиков."

    - char: communicator
      side: right
      text:
        - "Основной флот, вы всё еще в Баренцевом море? Немедленно прекратить выполнение всех текущих задач! Разворачивайтесь и полным ходом следуйте к якорной стоянке Скапа-Флоу!"

    - char: howe
      side: left
      text:
        - "Подождите… Прекратить все задачи?! А как же группа поддержки?! И нам ведь нужно забрать Командира!"

    - char: communicator
      side: right
      text:
        - "Флот Железной Крови в Баренцевом море был фальшивкой, с группой поддержки всё в порядке. Миссия по возвращению Командира также отменяется, обсудим это позже… Всем кораблям — немедленно возвращаться!"

    - char: valiant
      side: left
      text:
        - "Что за неразбериха… Хау, дай мне рацию!"
        - "Это Уорспайт? Что, черт возьми, происходит? Скажи нам честно, что стряслось в Скапа-Флоу?"

    - char: communicator
      side: right
      text:
        - "Вэлиант… Скапа-Флоу, оставшаяся практически без защиты из-за операции в Баренцевом море, недавно подверглась атаке. Похоже, это настоящие основные силы Железной Крови."
        - "И незадолго до начала атаки… Её Величество отправилась в Скапа-Флоу… В сопровождении лишь одной Белфаст…"

    - char: valiant
      side: left
      text:
        - "Чт… о?! Как это понимать?! Я даже не слышала о такой поездке! Откуда Железная Кровь могла узнать об этом?!"

    - char: communicator
      side: right
      text:
        - "……Неизвестно. Возможно, просто совпадение. В Скапа-Флоу до сих пор идет бой, подробности неясны. Вы должны прибыть на подмогу как можно скорее!"
        - "Я уже вышла в море. Встретимся в Скапа-Флоу."

    - char: valiant
      side: left
      text:
        - "Поняла. Мы уже возвращаемся!"

    - char: howe
      side: right
      text:
        - "……Так вот какова была истинная цель Железной Крови. Нас жестоко обвели вокруг пальца…!"
        - "Не тратьте время на оставшихся Сирен, эскорт конвоя сам с ними справится. Всем кораблям — немедленный разворот! Полный вперед к Скапа-Флоу!"
        - "Только бы с ней всё было хорошо… Продержитесь, Ваше Величество…!"
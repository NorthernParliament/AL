chapter1:
  rows:

    - text:
      - "В полумраке комнаты, чье местоположение и принадлежность к какому-либо ведомству остаются неизвестными, Советский Союз внимательно изучает отчет об операции."

    - char: sovetsky_soyuz_old
      side: left
      text:
        - "Надо же, «Микоян»..."
        - "Это действительно... неожиданная находка."

    - char: nop
      side: right
      status: is-yellow
      text:
        - "Рад, что ты довольна. Теперь и я могу успокоиться."

    - text:
      - "Из коммуникатора, расположенного где-то в комнате, раздался искаженный голос."

    - char: nop
      side: right
      status: is-yellow
      text:
        - "Считай эти разведданные компенсацией за потери, понесенные в ходе серии наших прошлых трений, а также залогом искренности в нашем дальнейшем сотрудничестве."

    - char: sovetsky_soyuz_old
      side: left
      text:
        - "В каком они сейчас состоянии?"

    - char: nop
      side: right
      status: is-yellow
      text:
        - "Неизвестно. Я лишь владею этой информацией, не более."
        - "Какова ситуация на самом деле — вам придется выяснять самим, не так ли?"

    - char: sovetsky_soyuz_old
      side: left
      text:
        - "...Я приняла твой «залог искренности»."
        - "Однако для компенсации этого, боюсь, будет маловато."
        - "Многочисленные потери на торговых путях, постоянные провокации на границах."
        - "Даже если продвижение войск согласно договору прекращено, как быть с частью наших территорий и портов, которые вы незаконно оккупировали в начале?"

    - char: nop
      side: right
      status: is-yellow
      text:
        - "А я-то считала, что всё это уже стало частью прошлых соглашений."
        - "Как бы то ни было, мы ведь сумели избежать предначертанного сценария, разве нет?"

    - char: sovetsky_soyuz_old
      side: left
      text:
        - "Даже если бы всё шло своим чередом, в конечном итоге проигравшей стороной оказались бы вы."
        - "Ведь нам обоим прекрасно известно — у прежней Железной Крови не было будущего."

    - char: nop
      side: right
      status: is-yellow
      text:
        - "Это была ирония или комплимент?"

    - char: sovetsky_soyuz_old
      side: left
      text:
        - "Считай это комплиментом. Бисмарк действительно лидер, заслуживающий уважения."

    - char: nop
      side: right
      status: is-yellow
      text:
        - "В таком случае, продолжим наше сотрудничество."
        - "С воссозданием последней группы «элементов» Северный Парламент также сбросит свои оковы и откроет для себя совершенно новый путь."
        - "Давай же вместе двигаться навстречу будущему...."

    - text:
      - "Связь прервалась, но Советский Союз никак на это не отреагировала."
      - "Годы сожалений, годы ожидания и годы надежд, казалось, сошлись в этой одной точке."
      - "Она словно вслушивалась в тишину пространства, пристально всматриваясь во что-то, погруженная в свои мысли."
      - "Наконец, она зажгла экран, и раздался характерный звуковой сигнал выделенной линии связи."

    - char: sovetsky_soyuz_old
      side: left
      text:
        - "..Принимая во внимание анализ данных по инциденту с «помехами» и доказательства, полученные в ходе последней операции..."
        - "..Существует вероятность, что в ледяном плену Арктики члены флота, пропавшего в ходе прошлой операции, всё ещё живы..."
        - "..Мною получены точные координаты. Возможно, у нас появился шанс исправить ошибки прошлого..."
        - "Президиум Верховного Совета, я запрашиваю немедленное формирование спасательного отряда для начала поисково-спасательной операции!"

chapter1:
  rows:

    - text:
      - "Под конвоем Памяти Меркурия и Авроры ледокол «Микоян» благополучно прибыл в военную гавань Северного Парламента."

    - char: avrora
      side: left
      text:
        - "...Много ли ты помнишь о той «провальной операции»?"

    - char: pamiat_merkuria
      side: right
      text:
        - "Можно сказать, она врезалась мне в память. Еще бы, такое грандиозное начало и столь плачевный финал..."
        - "Кажется, это было вскоре после формирования Полярного флота. Мы, полные уверенности, планировали продвинуться вглубь неизведанных районов Арктики."
        - "Поначалу всё шло гладко, но в один злополучный день пришло известие о провале миссии."
        - "..Первоначальный основной состав Полярного флота, экспериментальные подводные суда, весь персонал и оборудование, включая этот ледокол «Микоян», и даже сама огромная база — всё просто исчезло."

    - char: avrora
      side: left
      text:
        - "Хм... Мне известно то же самое, хотя я знаю чуть больше деталей, чем ты."
        - "Сперва всё действительно шло успешно. После выхода в море флот, как и положено, регулярно выходил на связь."
        - "Спустя какое-то время база получила сообщение о том, что флот столкнулся с силами противника. Разумеется, мы немедленно выслали авиацию на подмогу."
        - "Однако, когда самолеты прибыли на место, они увидели лишь бескрайнее ледяное море. Не было ни врагов, ни даже следов судоходного канала."
        - "И в тот же миг, при попытке доложить в штаб, пилоты обнаружили, что связь с самой базой полностью разорвана."
        - "Это и было то самое «полное исчезновение», о котором ты знаешь..."
        - "Разумеется, мы предполагали, что они попали в Зеркальное море, и несколько раз организовывали экспедиции в тот район."
        - "Советский Союз лично участвовала в поисках на передовой, даже когда её оснастка ещё не была до конца завершена."

    - char: pamiat_merkuria
      side: right
      text:
        - "Об этом я слышу впервые. Такая спешка совсем не в её духе."
        - "Хотя... её можно понять. Помнится, она ведь лично провожала тот флот в путь..."

    - char: avrora
      side: left
      text:
        - "Верно... Но все поисковые операции не принесли результатов."
        - "Позже, после появления «Зимней Короны», атаки полярных Сирен усилились, а Железная Кровь начала оказывать давление. Поиски постепенно сошли на нет."
        - "Что было дальше, я и сама не знаю. Отчёты о той операции были запечатаны в секретных архивах, и постепенно она превратилась в событие, которого «никогда не существовало»..."
        - "Единственное относительно разумное объяснение, к которому пришли в ходе бесчисленных разборов ситуации: фактическое местоположение базы могло быть совсем не там, где мы предполагали."
        - "Возможно, база с самого начала была построена в аномальной зоне, просто никто из нас этого не заметил."

    - char: pamiat_merkuria
      side: right
      text:
        - "Э-э?.. Ты хочешь сказать, что наша исследовательская база с самого начала могла быть построена внутри какого-то особого Зеркального моря?"
        - "В этом есть смысл!.. Ведь и «Микоян» мы в итоге нашли именно в Зеркальном море."
        - "Но это не объясняет, почему мы обнаружили там только «Микоян» и ничего больше."

    - char: avrora
      side: left
      text:
        - "Верно, не объясняет. Но если связать это с ещё одним инцидентом, всё может встать на свои места."
        - "Ты слышала об инциденте с «помехами»?"

    - char: pamiat_merkuria
      side: right
      text:
        - "...Об инциденте с помехами?"

    - char: avrora
      side: left
      text:
        - "Видимо, нет. После недавней операции «Тайная комната» мы использовали полученные данные, чтобы модернизировать наши радары для прослушки частот Сирен."
        - "И тогда в определённом секторе были зафиксированы сигналы, появляющиеся через нерегулярные промежутки времени."
        - "Сперва мы приняли их за обычные помехи, но в один прекрасный день всё же поняли: это зашифрованная передача, в которой используется наш старый, уже выведенный из обращения код."
        - "Содержание предельно простое — запрос поддержки при столкновении с противником. Вот только... этот сигнал «случайным образом» в точности совпадает с тем, что мы получили перед самым исчезновением флота."

    - char: pamiat_merkuria
      side: right
      text:
        - "Какое ещё «случайным образом»... Это же значит, что передатчик до сих пор где-то работает?!"

    - char: avrora
      side: left
      text:
        - "Мы предполагаем именно это. И внезапное появление «Микояна» может служить своего рода подтверждением..."

    - char: pamiat_merkuria
      side: right
      text:
        - "Слишком уж удачное совпадение... Как будто кто-то специально подстроил всё так, чтобы мы нашли его именно сейчас."

    - char: avrora
      side: left
      text:
        - "Согласна. Похоже, Советский Союз предчувствовала нечто подобное ещё до начала миссии, но ей нужны были неопровержимые улики, которые мы и должны были найти."

    - char: pamiat_merkuria
      side: right
      text:
        - "А наш надёжный информатор в Железной Крови и впрямь всемогущ, раз владеет такими сведениями~"

    - char: avrora
      side: left
      text:
        - "Это точно... Сейчас все электронные приборы и бумажные архивы с корабля находятся на анализе. Уверена, скоро будут результаты."
        - "Раз это судно было в составе той экспедиции, на нём обязаны остаться записи."
        - "Записи, которые не только прольют свет на события прошлого, но и, возможно, дадут зацепку для поиска пропавшего флота..."
        - "Скорее всего, именно этот «ответ» и нужен Советскому Союзу..."

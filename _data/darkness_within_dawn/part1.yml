chapter1:
  rows:

    - char: avrora
      side: left
      text:
        - "Давно не виделись, Память Меркурия. Ты наверняка за это время порядком вымоталась в разъездах."

    - char: pamiat_merkuria_kai
      side: right
      text:
        - "Аврора? Ого, и правда, сколько лет, сколько зим!"
        - "Эх... Трудностей хватало, это да. Но как только подумаю, что всё это ради нашего плана, на душе сразу становится спокойнее. Работа была насыщенной!"
        - "Ты тоже участвуешь в этой операции?"

    - char: avrora
      side: left
      text:
        - "Именно так. Я засиделась в тылу, так что порой хочется размяться и на передовой."

    - char: pamiat_merkuria_kai
      side: right
      text:
        - "К слову... Тебе не кажется, что отправлять на такое опасное задание нас двоих — кораблей с «устаревшей» оснасткой — это как-то... двусмысленно?"

    - char: avrora
      side: left
      text:
        - "«Устаревшей», значит..."

chapter2:
  rows:

    - char: pamiat_merkuria
      side: right
      text:
        - "Ой... забыла переключить режим обратно."

    - char: avrora
      side: left
      text:
        - "Ты уже привыкла к «Модернизации»?"

    - char: pamiat_merkuria
      side: right
      text:
        - "Технологии просто поразительные, я даже не ожидала!"
        - "Это совсем не похоже на обычную модульную замену деталей. Нынешняя «Модернизация» — это полноценное и масштабное преобразование всего корпуса."
        - "Внешне это напоминает новое оснащение Полярного флота, но мне кажется, что в плане характеристик моё теперь даже на шаг впереди!"

    - char: avrora
      side: left
      text:
        - "Ох~ В таком случае стоит поблагодарить Королевский флот за предоставленные технологии."

    - char: pamiat_merkuria
      side: right
      text:
        - "Раз они первыми разработали эту технологию, наверняка уже по-тихому внедрили её у себя повсеместно."

    - char: avrora
      side: left
      text:
        - "Тут я не в курсе... По крайней мере, нам они передали только чертежи для модернизации крейсеров определённых типов."

    - char: pamiat_merkuria
      side: right
      text:
        - "И это когда тучи войны сгущаются над миром? Держать в строгом секрете столь мощную технологию..."
        - "Похоже, они не собираются делать её достоянием общественности, пока не выторгуют у других фракций достойную цену. Что ж, Королевский флот в своём репертуаре."

    - char: avrora
      side: left
      text:
        - "Так что в предстоящей операции обязательно защищай меня~"

    - char: pamiat_merkuria
      side: right
      text:
        - "Положись на меня! — Хм, я бы с радостью так сказала, но тебе ведь вряд ли нужна моя защита."
        - "В конце концов, ты же та самая легенда былой Российской империи... нет, вернее, всего мира..."

    - char: avrora
      side: left
      text:
        - "То, что ты собираешься произнести — государственная тайна Северного Парламента под грифом «совершенно секретно», товарищ Память Меркурия."

    - char: pamiat_merkuria
      side: right
      text:
        - "Да-да~ Молчу-молчу, не стоит так напрягаться."
        - "Но если честно, подробностей я всё равно не знаю... Ну, например, насколько раньше это всё было на самом деле?"

    - char: avrora
      side: left
      text:
        - "Знания и информация — это не тот случай, когда «чем больше, тем лучше»... Избыток знаний порой лишь мешает принимать верные решения."

    - char: pamiat_merkuria
      side: right
      text:
        - "Это же просто любопытство к собственному происхождению... Но я тебя поняла, больше не расспрашиваю."

    - char: avrora
      side: left
      text:
        - "Вот и славно. Что ж, назначенное время почти пришло."

    - char: communicator
      side: right
      text:
        - "*бип-бип*"

    - char: sovetsky_soyuz_old_rad
      side: right
      text:
        - "Приветствую, товарищи. Полагаю, вы уже ознакомились с приказом, и у вас возникли определенные вопросы по заданию."
        - "Ввиду чрезвычайной важности операции некоторые детали нельзя было доверять бумаге. Эта связь установлена, чтобы прояснить все неясности. Слушаю ваши вопросы."

    - char: pamiat_merkuria
      side: left
      text:
        - "Тогда позвольте мне начать первой!"
        - "Судя по приказу, объект Сирен, который нам нужно атаковать, находится в зоне контроля Железной Крови. Боюсь, у него есть какая-то сомнительная связь с ними самими..."
        - "Сейчас в акватории Северной Атлантики всё еще действует соглашение о прекращении огня. Разве у нас не будет проблем, если эту операцию раскроют?"

    - char: sovetsky_soyuz_old_rad
      side: right
      text:
        - "Об этом не беспокойтесь. Это скрытый испытательный полигон, о котором мало кто знает даже внутри самой Железной Крови. Если дойдет до столкновения, Зеркальное море само скроет ваши следы."

    - char: pamiat_merkuria
      side: left
      text:
        - "Раз это место настолько тайное и малоизвестное... откуда же мы о нём прознали?"

    - char: sovetsky_soyuz_old_rad
      side: right
      text:
        - "У нас есть один выдающийся информатор."

    - char: pamiat_merkuria
      side: left
      text:
        - "Выдающийся информатор, вот как..."

    - char: sovetsky_soyuz_old_rad
      side: right
      text:
        - "К тому же, одной из целей прекращения огня в акватории Северной Атлантики является противостояние угрозе Сирен. Разве наша операция — не прямая борьба с ними?"

    - char: pamiat_merkuria
      side: left
      text:
        - "Логично... Если нас прижмут, я так и скажу."

    - char: sovetsky_soyuz_old_rad
      side: right
      text:
        - "Ха-ха-ха, не волнуйся. Если будете действовать осторожно, проблем точно не возникнет."

    - char: pamiat_merkuria
      side: left
      text:
        - "Хотелось бы верить~"
        - "Раз цель операции — испытательный полигон Сирен, не будет ли нам с Авророй не хватать огневой мощи?"

    - char: sovetsky_soyuz_old_rad
      side: right
      text:
        - "Будьте спокойны. Оборонительные сооружения там устаревших моделей и уже много лет находятся в полуконсервированном состоянии. Ваших сил будет вполне достаточно."

    - char: pamiat_merkuria
      side: left
      text:
        - "И эти сведения тоже от того самого «выдающегося информатора»?"

    - char: sovetsky_soyuz_old_rad
      side: right
      text:
        - "Да. И я не сомневаюсь в достоверности этих данных."

    - char: pamiat_merkuria
      side: left
      text:
        - "О~ Ну, тогда у меня вопросов нет."

    - char: avrora
      side: right
      text:
        - "Советский Союз, в приказе не была указана цель, которую мы должны изъять в ходе налёта. Что именно мы ищем?"

    - char: sovetsky_soyuz_old_rad
      side: left
      text:
        - "Ах, это... Скажу вам честно — я сама не знаю."

    - char: avrora
      side: right
      text:
        - "Ты не знаешь?!"

    - char: sovetsky_soyuz_old_rad
      side: left
      text:
        - "Именно так... Поэтому я полагаюсь на вас."
        - "Если обнаружите на месте что-либо заслуживающее внимания — нечто, что явно не должно там находиться — забирайте это с собой. Уверена, вы сразу поймёте, о чём речь, когда увидите."

    - char: avrora
      side: right
      text:
        - "Какая... расплывчатая директива."

    - char: sovetsky_soyuz_old_rad
      side: left
      text:
        - "Ничего не поделаешь, это все разведданные, которыми я располагаю. У нас нет ни времени, ни условий для проведения более тщательного расследования."
        - "Сейчас охрана в зоне контроля Железной Крови ослаблена, да и Сирены в акватории Северной Атлантики разбиты и дезорганизованы. Более подходящего момента для действий не найти."
        - "Это критически важная миссия. Полагаюсь на вас обеих."

    - char: avrora
      side: right
      text:
        - "Я поняла. Задание будет выполнено."

    - char: sovetsky_soyuz_old_rad
      side: left
      text:
        - "Что ж, пожелаю нам удачи. Советский Союз, конец связи."

    - char: pamiat_merkuria
      side: right
      text:
        - "Хе-хе, какое редкое зрелище. Даже не припомню, когда в последний раз видела Советский Союз такой неуверенной."

    - char: avrora
      side: left
      text:
        - "В последний раз..."

    - char: pamiat_merkuria
      side: right
      text:
        - "Что такое, Аврора? Тебе что-то пришло на ум?"

    - char: avrora
      side: left
      text:
        - "...Да нет, ничего. Просто я тоже поймала себя на мысли, что давно не видела её такой."
        - "Судя по всему, задание действительно из ряда вон выходящее. Давай подготовимся как следует."
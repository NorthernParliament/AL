chapter1:
  rows:

    - char: pamiat_merkuria_kai
      side: left
      text:
        - "Координаты точные до метра, и оборона действительно слабая. Не думала, что у нас в Железной Крови есть настолько крутые информаторы~"

    - char: avrora
      side: right
      text:
        - "Твоё любопытство снова берёт верх?"

    - char: pamiat_merkuria_kai
      side: left
      text:
        - "Вовсе нет! Просто нахлынуло какое-то чувство дежавю... вспомнила былое и немного расчувствовалась."

    - char: avrora
      side: right
      text:
        - "Былое?.. Ты о временах, когда мы сражались плечом к плечу с Железной Кровью?"

    - char: pamiat_merkuria_kai
      side: left
      text:
        - "Ну да~ Железная Кровь с самого начала была... как бы это получше выразиться."

    - char: avrora
      side: right
      text:
        - "Своевольной и себе на уме?"

    - char: pamiat_merkuria_kai
      side: left
      text:
        - "Не зря ты постоянно вращаешься в дипломатических кругах, Аврора — умеешь подбирать слова!"
        - "Основные потери всех фракций пришлись на внезапное первое нападение Сирен. И только Железная Кровь, почти не пострадав в начале, опрометчиво бросилась в атаку на неизученного врага, в итоге понеся тяжелейшие потери..."
        - "Потом все фракции вместе создали Лазурный Путь, и мы какое-то время сражались бок о бок."
        - "Затем Железная Кровь покинула Лазурный Путь, основала Багровую Ось и через несколько лет развязала с нами войну."
        - "А совсем недавно из-за общей угрозы в акватории Северной Атлантики с нами заключили перемирие."
        - "И вот теперь мы по другим причинам тайно проводим наступательную операцию прямо во время действия этого самого перемирия..."
        - "Союзники и враги постоянно меняются местами... Обстановка переменчива, и никогда не знаешь, что будет завтра."

    - char: avrora
      side: right
      text:
        - "Какие-то у тебя старческие рассуждения..."

    - char: pamiat_merkuria_kai
      side: left
      text:
        - "Неужели у тебя нет такого чувства?"
        - "Тех, кто помнит времена, когда мы сражались плечом к плечу, становится всё меньше. Старые друзья уходят в отставку, а кто-то и вовсе так и не получил шанса на «материализацию»..."
        - "А новички, которые приходят после нас, с самого начала видят Лазурный путь расколотым."
        - "Сирены просто крутят нами как хотят... Как думаешь, у нас действительно есть шанс снова объединиться?"

    - char: avrora
      side: right
      text:
        - "Не знаю. Раскол или единство — важна не форма, а суть."
        - "Если все трудятся ради одной цели, то даже при формальном расколе они едины по сути."
        - "И наоборот: если у каждого свои планы, то даже при формальном единстве это будет раскол."

    - char: pamiat_merkuria_kai
      side: left
      text:
        - "Кажется, ты на что-то намекаешь..."

    - char: avrora
      side: right
      text:
        - "Просто делюсь мыслями."
        - "По крайней мере, я ни на йоту не сомневаюсь в выбранном нами курсе. Будь то борьба или союз, важнее всего — не потерять себя в этой сложной ситуации."
        - "Хм-м..."

    - char: pamiat_merkuria_kai
      side: left
      text:
        - "Что такое? Что-то нашла?"

    - char: avrora
      side: right
      text:
        - "«Микоян»..."

    - text:
      - "В центре акватории, под гигантским портальным краном портового сооружения, в доке тихо покоится старый ледокол."

    - char: pamiat_merkuria_kai
      side: left
      text:
        - "...?!! Это ледокол «Микоян»?!"
        - "Но он же пропал без вести во время выполнения задания давным-давно! Как он здесь оказался?!"

    - char: avrora
      side: right
      text:
        - "Не знаю... Но он перед нами."
        - "Похоже, это и есть то самое «заслуживающее внимания и явно не принадлежащее этому месту», о чем говорила Советский Союз..."

    - char: pamiat_merkuria_kai
      side: left
      text:
        - "М-да... Корпус выглядит неповрежденным, никаких следов ожесточенного боя."
        - "Его притащила сюда Железная Кровь без какого-либо сопротивления?.. Нет, это были Сирены?!"
        - "Подумать только, спустя столько лет мы наткнулись здесь на след той «провальной операции»..."

    - char: avrora
      side: right
      text:
        - "Скорее проверь бортовые приборы и оборудование! Возможно, там остались какие-то записи!"

    - char: pamiat_merkuria_kai
      side: left
      text:
        - "...Прямо здесь и сейчас?"

    - char: avrora
      side: right
      text:
        - "Нет... я немного потеряла самообладание. Сначала отбуксируем его в нашу зону контроля, а уже потом проведем тщательный осмотр."
        - "Мы не должны пропустить ни единого винтика..."

    - char: pamiat_merkuria_kai
      side: left
      text:
        - "Это само собой! Мы обязаны выяснить, что на самом деле произошло в ходе той операции!"
        - "Пошли, берем курс домой!"
chapter1:
  rows:
  - char: "kaga"
    side: "left"
    text:
      - "Это должно быть сразу за бамбуковой рощей... До сих пор не верится, насколько же здесь пустынно."
      - "Будет странно увидеть её снова. Впрочем, как и всегда..."
  - char: "mutsuki"
    side: "right"
    text:
      - "Приветик, Кага! Ты чего тут делаешь?"
  - char: "kaga"
    side: "left"
    text:
      - "Муцуки? Это я должна спросить — что ТЫ здесь делаешь?"
  - char: "mutsuki"
    side: "right"
    text:
      - "Раздаю конфеты и фейерверки! О, и ещё передаю сообщение! Держи, это тебе подарок!"
  - char: "kaga"
    side: "left"
    text:
      - "Я... ясно... Спасибо. Вижу, Инадзума и Икадзути тоже здесь."
      - "Послушай. Тоса не такая добрая, какой хочет казаться. Если она будет с вами груба, можете смело отвечать ей тем же."
  - char: "mutsuki"
    side: "right"
    text:
      - "Как скажешь! Но я уже иду домой!"
  - char: "kaga"
    side: "left"
    text:
      - "Хорошо. Смотри не споткнись."
  - char: "mutsuki"
    side: "right"
    text:
      - "Ладненько! Пока-пока!"

chapter2:
  rows:
  - char: "kaga"
    side: "left"
    text:
      - "(Сначала меня перестроили в авианосец вместо Амаги, затем появился Командир и каким-то образом изменил сценарий, что привело к спасению Тосы...)"
  - char: "inazuma"
    side: "right"
    text:
      - "Добрый вечер, Кага. Боюсь, Тосы сейчас нет дома."
  - char: "kaga"
    side: "left"
    text:
      - "Не проблема. Я могу подождать её возвращения."
  - char: "ikazuchi"
    side: "right"
    text:
      - "Вот как... Дело в том, что Тоса сказала: никому не входить без её разрешения."
  - char: "inazuma"
    side: "left"
    text:
      - "Совсем недавно нас навещала Муцуки. Было немного неловко разговаривать с ней прямо на пороге, но правила есть правила."
  - char: "kaga"
    side: "right"
    text:
      - "...Ладно, тогда я просто подожду снаружи."
  - char: "ikazuchi"
    side: "left"
    text:
      - "Понятно, понятно! Но ждать, возможно, придётся долго. Тоса по уши в делах — планирует фестиваль и всё такое."
  - char: "inazuma"
    side: "right"
    text:
      - "Организация фейерверка отнимает очень много времени. Сомневаюсь, что она вообще вернётся сегодня домой."
  - char: "kaga"
    side: "left"
    text:
      - "(Собираются устроить фейерверк здесь, в глуши? Впервые об этом слышу.)"
      - "Вы случайно не знаете, когда она вернётся? Мне действительно нужно с ней поговорить."
  - char: "ikazuchi"
    side: "right"
    text:
      - "Понятно, понятно! Но я не знаю. А ты, Инадзума?"
  - char: "inazuma"
    side: "left"
    text:
      - "Боюсь, что нет. Однако Мусаси может быть в курсе, так что ты могла бы спросить её."
  - char: "ikazuchi"
    side: "right"
    text:
      - "А, точно! Если кто и знает, где Тоса, так это она!"
      - "Просто спроси, и она наверняка тебе скажет!"
  - char: "kaga"
    side: "left"
    text:
      - "Мусаси, значит... Что ж, навещу её."
      - "Тогда я пойду. А вы двое ведите себя хорошо, ладно?"
  - char: "inazuma"
    side: "right"
    text:
      - "Пока-пока! — Счастливого пути!"
  - char: "ikazuchi"
    side: "right"
    text:
      - "Пока-пока! — Счастливого пути!"

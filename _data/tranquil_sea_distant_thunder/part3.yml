chapter1:
  rows:
  - char: "zuikaku"
    side: "left"
    text:
      - "Надо же, в этой библиотеке действительно есть всё: от обычных книжек до древних фолиантов..."
      - "Раз уж в конфиденциальных файлах не нашлось ничего необычного, полагаю, мой единственный вариант — копаться в старых документах."
      - "По крайней мере, я пойму, если в них кто-то вносил правки. Цифровые данные можно изменить без следа, но с бумагой и чернилами такой фокус не пройдёт."
  - text:
      - "Дзуйкаку шла вдоль длинных рядов огромных книжных стеллажей. Древние труды возвышались до самого потолка, но вот её боевой дух был на нуле."
  - char: "zuikaku"
    side: "left"
    text:
      - "Микаса была абсолютно права. Почти все записи, касающиеся Святилища, противоречат друг другу."
      - "То же самое и с книгами о Священной Сакуре и Диадеме Света..."
      - "Есть записи и подревнее, но это либо единственные уцелевшие копии, либо то, что в них написано, вообще лишено смысла."
      - "Такое чувство, будто кто-то специально насочинял кучу сказок..."
      - "...Словно они хотели переписать наши легенды."
      - "Если так, то как давно они этим занимаются?"
  - text:
      - "Она продолжила рыться в бумагах. Внезапно раздался тонкий девичий голос."
  - char: "kisaragi"
    side: "left"
    text:
      - "Д-Дзуйкаку, ты ищешь какую-то книгу?"
  - char: "zuikaku"
    side: "right"
    text:
      - "Кисараги? Ну, можно и так сказать. Ты тоже что-то ищешь?"
  - char: "kisaragi"
    side: "left"
    text:
      - "Нет... Я-я просто пришла передать тебе сообщение."
      - "Дзуйкаку..."
      - "«Приближается буря. Тебе стоит поскорее вернуться домой»."
  - char: "zuikaku"
    side: "right"
    text:
      - "Понимаю... Спасибо. Я уйду, как только найду нужную книгу."
  - char: "kisaragi"
    side: "left"
    text:
      - "Хорошо... Тогда я пойду."
      - "Не задерживайся долго, ладно?"
  - text:
      - "Дзуйкаку вернулась к чтению. Когда мгновение спустя она оглянулась, Кисараги уже исчезла в лесу стеллажей."
  - char: "zuikaku"
    side: "left"
    text:
      - "Как она вообще нашла сюда дорогу? Это как-то... Да нет, я, наверное, просто накручиваю себя."
      - "Насчёт бури она права. Похоже, скоро ливанёт. Куплю зонт по пути домой."
      - "...Арх, я отвлекаюсь! Нужно поскорее что-нибудь найти и доложить Микасе..."

chapter2:
  rows:
  - text:
      - "Дзуйкаку отложила последний из стопки документов и посмотрела в окно на потемневшее, затянутое тучами небо."
  - char: "zuikaku"
    side: "left"
    text:
      - "Вот чёрт, я совсем потеряла счет времени."
      - "Пожалуй, на сегодня чтива хватит. Вернусь и продолжу завтра."
      - "Там и правда льёт как из ведра... Мне точно понадобится зонт, прежде чем я отправлюсь обратно."
  - text:
      - "Она надела пальто и направилась к выходу, когда буквально из ниоткуда появилась девушка с зонтом."
  - char: "yura"
    side: "left"
    text:
      - "Можешь воспользоваться моим, если хочешь."
  - char: "zuikaku"
    side: "right"
    text:
      - "О! Спасибо, Юра! Ты здесь какими судьбами? Ищешь что почитать?"
  - char: "yura"
    side: "left"
    text:
      - "Не совсем. Я пришла передать тебе приказ от Мусаси."
  - char: "zuikaku"
    side: "right"
    text:
      - "Повтори-ка? От Мусаси?"
  - char: "yura"
    side: "left"
    text:
      - "Да. Она хочет, чтобы ты немедленно отправилась на базу Железной Крови в качестве представителя Империи Сакуры."
  - char: "zuikaku"
    side: "right"
    text:
      - "Ничего себе внезапность... Где вообще эта база? И что я должна им сказать?"
  - char: "yura"
    side: "left"
    text:
      - "К сожалению, я не знаю. Однако мне сказали, что дальнейшие подробности пришлют тебе уже после отбытия."
      - "Снаружи тебя ждёт машина. Советую поскорее сесть в неё, добраться до порта и выйти в море."
  - char: "zuikaku"
    side: "right"
    text:
      - "Поход в дождь — не совсем моё любимое... Погоди, что? Я должна ехать ПРЯМО СЕЙЧАС?!"
  - char: "yura"
    side: "left"
    text:
      - "Именно. Это прямой приказ Мусаси."
  - char: "zuikaku"
    side: "right"
    text:
      - "Ла-а-адно... Тогда я немедленно выступаю."
      - "(Что вообще происходит? Почему ты отсылаешь меня именно сейчас, Мусаси?)"
      - "(Придётся попросить Сёкаку продолжить расследование вместо меня... Надеюсь, она сможет что-нибудь найти, пока я в отъезде.)"
      - "(Буду молиться, чтобы частичка моей удачи перепала и тебе, сестрёнка!)"

chapter1:
  rows:
  - text:
      - "Девушка с маской лисы на голове, прикладывая немалые усилия, толкала тачку вверх по горной тропе."
  - char: "yamashiro"
    side: "left"
    text:
      - "Фух... До вершины ещё топать и топать..."
      - "Ну, хотя бы дорога ухоженная, идти по ней не так уж и трудно..."
      - "Интересно, что люди думают о том, что это знаменитое туристическое место закрыто так надолго? Разве это не вызывает больше подозрений, чем если бы мы просто оставили его открытым?"
      - "Я понимаю, почему нельзя пускать посторонних, но почему все «свои» тоже должны помалкивать?"
      - "И почему я должна использовать тачку? Уверена, лесные боги простили бы меня, если бы я поехала на машине..."
      - "У меня уже силы на исходе! Вещи в этой тележке до ужаса тяжёлые!"
      - "Что дальше? Они попросят меня и разобранные части корабельных орудий на тачке везти?"
      - "...Ох, не стоило мне это говорить. Зная мою удачу, такое вполне может случиться, ха-ха..."
      - "*Вздох* Сделаю, как сказала Акаги, и оставлю второстепенные припасы у подножия горы, чтобы их забрали позже."
      - "Всё остальное придётся тащить с собой по этой длинной тропе..."
      - "Не так давно здесь прошёл дождь, но если я буду смотреть под ноги и постараюсь не поскользнуться..."
      - "...Ува-а! Ну надо же было мне это ляпнуть!"
  - text:
      - "Будучи экспертом по спотыканиям на ровном месте, девушка быстро восстановила равновесие и удержала тачку прежде, чем та успела перевернуться."
  - char: "yamashiro"
    side: "left"
    text:
      - "Фух, пронесло... Были бы большие неприятности, если бы я разбила то, что внутри..."
      - "...Соберись, Ямасиро, соберись! Нужно добраться до места до заката!"

chapter2:
  rows:
  - text:
      - "Когда горная дорога наконец выровнялась, девушка вышла к величественному, старинному деревянному зданию."
  - char: "yamashiro"
    side: "left"
    text:
      - "Вот мы и на месте... Э-эй! Есть кто дома?"
  - char: "minazuki"
    side: "right"
    text:
      - "Сирануи, у нас гостья!"
  - char: "shiranui"
    side: "left"
    text:
      - "Кого я вижу, это же Ямасиро. Добро пожаловать."
  - char: "yamashiro"
    side: "right"
    text:
      - "Ой, привет! Рада вас видеть!"
  - char: "shiranui"
    side: "left"
    text:
      - "Гости в наших краях — редкое явление."
  - char: "yamashiro"
    side: "right"
    text:
      - "Ничего удивительного. Вы ведь сами перекрыли дорогу, верно?"
  - char: "shiranui"
    side: "left"
    text:
      - "Боюсь, ты ошибаешься. Мы лишь исполняем приказы, так же как и ты."
      - "К слову, что это у тебя в тачке?"
  - char: "yamashiro"
    side: "right"
    text:
      - "Полагаю, подарок от Акаги?"
      - "Она велела мне оставить второстепенные припасы у подножия горы, а самое важное доставить прямо вам."
      - "Что мне с этим делать? Оставить здесь?"
  - char: "shiranui"
    side: "left"
    text:
      - "Да, вон там будет в самый раз."
  - char: "minazuki"
    side: "right"
    text:
      - "Спасибо, Ямасиро. Не могла бы ты передать Акаги сообщение от нас?"
      - "Просто скажи ей, что мы всё получили."
  - char: "yamashiro"
    side: "left"
    text:
      - "Обязательно! Передам ей, как только смогу!"
  - char: "shiranui"
    side: "right"
    text:
      - "Премного благодарны. Должно быть, путь сюда выдался нелёгким."
  - char: "yamashiro"
    side: "left"
    text:
      - "Всё в поряяядке, мне не привыкать! А теперь мне пора, нужно закончить и с другими делами!"
  - char: "shiranui"
    side: "right"
    text:
      - "Разумеется. Будь осторожна на обратном пути, так как сегодня был дождь. Смотри под ноги."
  - char: "yamashiro"
    side: "left"
    text:
      - "Ага, ха-ха-ха... Я уже заметила."
  - char: "minazuki"
    side: "right"
    text:
      - "Пока-пока, Ямасиро! Береги себя!"
  - char: "yamashiro"
    side: "left"
    text:
      - "И вы тоже! Увидимся!"

chapter1:
  rows:
  - char: "mikasa"
    side: "left"
    text:
      - "Как необычно. Погода сегодня прекрасная, а вот волны неспокойны."
  - char: "kongou"
    side: "right"
    text:
      - "Я тоже это заметила. Весьма любопытный фон для нашего первого чаепития за долгое время, Микаса."
  - char: "mikasa"
    side: "left"
    text:
      - "Чаепитие, значит... Как давно мы вот так не сидели вместе?"
  - char: "kongou"
    side: "right"
    text:
      - "И вправду. Это напоминает мне о временах, проведённых на Королевских островах."
      - "Если я правильно помню, ты посещала их с делегацией в качестве флагмана Объединённого флота, верно?"
  - char: "mikasa"
    side: "left"
    text:
      - "Да... Это было очень, очень давно."
      - "В те времена в Европе все горели желанием начать масштабную контратаку против Сирен."
      - "Если сравнивать нынешнюю Багровую Ось с тем единством, что было у нас тогда..."
      - "Эх, давай сменим тему. Что ты думаешь о выставке в Сардинии, на которую отправилась Синано?"
  - char: "kongou"
    side: "right"
    text:
      - "Ты о Всемирной выставке? Я слышала, что Мусаси сама выбрала Синано для нашей делегации."
      - "Должно быть, у Мусаси есть веская причина отослать Синано. Иначе..."
  - char: "mikasa"
    side: "left"
    text:
      - "Мы здесь одни. Можешь говорить свободно."
      - "Тебе не кажется вероятным, что приказ отослать Синано мог исходить вовсе не от Мусаси?"
  - char: "kongou"
    side: "right"
    text:
      - "Что ж, это возможно. Просто у меня есть сомнения по поводу решения отправить именно Синано в Сардинию."
      - "И неважно, ради Всемирной выставки это или просто визит вежливости. Синано не должна была в этом участвовать."
      - "Теперь, когда Железная Кровь бросила вызов Сиренам, никто не знает, что будет дальше... Нет никакого смысла в том, чтобы Синано находилась где-то ещё, кроме Островов Сакуры."
      - "Несмотря на мои опасения, сомневаюсь, что штаб стал бы действовать от имени Мусаси без её ведома... Но если это решение приняла она сама, я бы хотела услышать ответы."
      - "Кстати о Мусаси, разве ты не получала от неё какое-то приглашение на днях?"
      - "С твоей репутацией и положением ты наверняка могла бы спросить её о Синано напрямую."
  - char: "mikasa"
    side: "left"
    text:
      - "Насчёт этого... Я бы хотела услышать твоё честное мнение кое о чём."
      - "Я действительно получила приглашение от Мусаси, но я не единственный приглашённый гость."
  - char: "kongou"
    side: "right"
    text:
      - "Значит, приглашение групповое? Иными словами, это какие-то учения?"
  - char: "mikasa"
    side: "left"
    text:
      - "Не совсем. Похоже, это своего рода симуляция сражения — игра в «Шахматы»."
  - char: "kongou"
    side: "right"
    text:
      - "В «Шахматы»?"
  - char: "mikasa"
    side: "left"
    text:
      - "Да. Судя по всему, она создала некий особый «домен» для проведения своей игры и приглашает принять в ней участие всех членов Возрождённого Объединённого флота."
      - "Это касается и тебя, Конго, так что я бы хотела, чтобы ты тоже взглянула на это приглашение."

chapter2:
  rows:
  - text:
      - "Некоторое время спустя..."
  - char: "kongou"
    side: "left"
    text:
      - "Для меня большая честь, что Мусаси упомянула моё имя."
      - "Но... не кажутся ли тебе эти правила слишком запутанными для обычных морских учений?"
  - char: "mikasa"
    side: "right"
    text:
      - "М-м-м. Я подумала о том же, и рада, что не одинока в этом мнении."
      - "Тем не менее, я не могу просто отклонить приглашение Мусаси. Даже если это не учения, её слова вполне могут повлиять на будущее Империи Сакуры."
  - char: "kongou"
    side: "left"
    text:
      - "Здесь сказано, что были приглашены ещё три человека. У тебя есть догадки, кто эти двое неназванных?"
  - char: "mikasa"
    side: "right"
    text:
      - "Я уже говорила с Нагато, и она подтвердила, что получила приглашение."
      - "Остаётся только один человек. По всей видимости, Акаги."
  - char: "kongou"
    side: "left"
    text:
      - "Интересно. Предвижу, что эти учения превратятся в противостояние «два на два»: ты и Нагато против Акаги и Мусаси."
  - char: "mikasa"
    side: "right"
    text:
      - "Да, именно поэтому я и хотела сначала обсудить с тобой тактику."
      - "Лидеры команд не будут физически присутствовать на поле боя. Мы примерим на себя роли «владык», отдающих приказы своим «вассалам»."
      - "Каждому лидеру будет назначено по пять бойцов."
  - char: "kongou"
    side: "left"
    text:
      - "Понятно. Здесь написано, что я буду твоим вассалом, а Харуна и Хиэй отправятся к Нагато."
      - "По поводу этого домена... Похоже, он дарует особые способности кораблям, которые в него входят? Это уже определено заранее?"
  - char: "mikasa"
    side: "right"
    text:
      - "Верно. Другими словами, у каждого из вас будет своя роль."
      - "Даже у меня будет доступ к определённым способностям в соответствии с моей ролью владыки. Это мой способ напрямую влиять на ход сражения."
  - char: "kongou"
    side: "left"
    text:
      - "Шахматная партия, где игрок может выступать и в роли фигуры... Любопытно."
  - char: "mikasa"
    side: "right"
    text:
      - "Именно так, ха-ха. Кто знает, возможно, такая задумка отражает истинные намерения создателя."
      - "К слову, на домен влияет как психическое состояние участников снаружи, так и течение времени. Эти факторы будут менять условия для бойцов внутри."
  - char: "kongou"
    side: "left"
    text:
      - "Время и душевное состояние, говоришь..."
      - "Кажется, теперь я понимаю цель этой игры."
      - "Должно быть, Мусаси хочет испытать каждого, чтобы увидеть, какая сторона — или, вернее сказать, чья идеология — способна привести своих последователей к победе в условиях давления."
  - char: "mikasa"
    side: "right"
    text:
      - "Склонна согласиться. Это показательное сражение, призванное определить наилучший путь развития для Империи Сакуры."
      - "Для нас, игроков, эта битва уже началась."
  - char: "kongou"
    side: "left"
    text:
      - "Тебе случайно не известно, кто подал эту идею? Это была Акаги? Или, может, сама Мусаси?"
  - char: "mikasa"
    side: "right"
    text:
      - "Насколько нам известно, это могла быть даже затея Командира. Мы не узнаем правды, пока не войдём в этот домен."
      - "Сейчас нам остаётся только планировать, готовиться и прорабатывать любые возможные сценарии."
      - "Кто-то должен сказать Нагато сделать то же самое. Тебе стоит... Нет, впрочем, я сама этим займусь."
      - "Вместо этого извести от моего имени 5-ю дивизию авианосцев. Передай им, чтобы они немедленно связались со мной, если их расследование принесёт плоды."
  - char: "kongou"
    side: "left"
    text:
      - "Разумеется. Я передам им."
  - char: "mikasa"
    side: "right"
    text:
      - "Хорошо. Любая их находка может помочь поскорее покончить с этой бессмысленной междоусобицей."

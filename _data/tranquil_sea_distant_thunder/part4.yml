chapter1:
  rows:
  - char: "nagato"
    side: "left"
    text:
      - "Какое жалкое зрелище... Похоже, в моё отсутствие никто не занимался восстановлением святилища."
  - text:
      - "Священная Сакура, некогда бывшая объектом поклонения и местом заточения затворницы-жрицы Империи Сакуры, превратилась в иссохшую, пустую оболочку."
      - "Теперь она походила на стальной монолит цвета чернил — безмолвное изваяние, нависшее над землёй."
  - char: "nagato"
    side: "left"
    text:
      - "Именно здесь я запечатала саму себя, когда моё сердце тяготило бремя вины за то, что я втянула своих друзей в войну."
      - "Я пробудилась вновь благодаря усилиям Муцу, Дзуйкаку, Микасы и многих других. Но мне так и не удалось спасти саму «Империю Сакуры»."
      - "Всё так, как и говорила Микаса. Мне всё ещё недостаёт мудрости и опыта."
      - "И как хранителю народа Империи Сакуры, и как флагману Объединённого флота."
  - char: "kawakaze"
    side: "right"
    text:
      - "Простите меня, леди Нагато. Стольких трагедий можно было бы избежать, если бы я увела вас из этого места..."
  - char: "nagato"
    side: "left"
    text:
      - "Не вини себя. Хоть это и правда, что мной манипулировали, решение заточить себя в этом дереве в конечном итоге было моим."
      - "Давай больше не будем зацикливаться на прошлом, а вместо этого сосредоточимся на настоящем."
      - "Сёкаку. Сегодня здесь стоят лишь те, кто верит в меня. Всё, что я скажу впредь, будет правдивым, искренним и идущим от самого сердца."
  - char: "shoukaku"
    side: "right"
    text:
      - "Я понимаю. Позвольте спросить, почему вы привели меня сюда? Микаса и Дзуйкаку поручили мне расследование, которое я ещё не закончила."
      - "Это как-то связано со Священной Сакурой? Если да, то каким образом?"
  - char: "nagato"
    side: "left"
    text:
      - "Я отвечу на твои вопросы. Во-первых, каждый раз, когда я покидаю главные острова, меня должно сопровождать эскорт из основных боевых кораблей."
      - "Во-вторых, я выбрала тебя, чтобы тебя не отослали куда-нибудь ещё, как Дзуйкаку."
  - char: "shoukaku"
    side: "right"
    text:
      - "Вы имеете в виду её назначение представителем в Железную Кровь?"
  - char: "nagato"
    side: "left"
    text:
      - "Именно. Я думала, что те приказы были подделкой, но я поговорила с Мусаси и подтвердила, что их отдала она. То же касается и распоряжений, полученных Синано."
      - "Сделав тебя частью моего эскорта, я лишаю Мусаси или штаб возможности просто ткнуть пальцем и отправить тебя в другое место."
      - "Всё это значит лишь одно: ты будешь сопровождать меня до дальнейших распоряжений."
  - char: "shoukaku"
    side: "right"
    text:
      - "Поняла. Что мне нужно делать?"
  - char: "nagato"
    side: "left"
    text:
      - "Мы примем участие в «учениях» Мусаси, попутно углубляя наше расследование касательно Ватацуми."
      - "ак ты помнишь, «Эмбер»  (Такао МЕТА), которую мы теперь знаем как одну из «Пепла», утверждала, что Ватацуми, находившийся у нас в Диадеме Света, был подделкой."
      - "Сначала я подумала, что она лжёт, но спустя несколько дней мы получили неоспоримые доказательства того, что Ватацуми там действительно заменили репликой."
      - "Иными словами, никто из нас, присутствовавших на ритуале, не смог отличить настоящий Ватацуми от подделки, пока на это не указал «Пепел»."
      - "Якобы настоящий Ватацуми был передан Железной Крови, а позже возвращён Акаги. Однако я подозреваю, что мы снова окажемся неспособны определить, настоящий он или нет."
      - "Мы проводили ритуалы с Ватацуми столько, сколько себя помним, и всё же мы практически ничего не знаем о его истинной природе или происхождении."
      - "Кто и когда объявил этот камень артефактом Империи Сакуры?"
      - "Кто пустил слух, что использование его в качестве катализатора может породить девушек-кораблей, свободных от оков судьбы?"
      - "Что такое Ватацуми? Что такое Святилище? Мы должны найти ответы на все эти вопросы."
  - char: "kawakaze"
    side: "right"
    text:
      - "...Леди Нагато, кажется, кто-то прибрался внутри до нашего прихода."
      - "Похоже, мы не единственные, кто побывал здесь в последнее время."
  - char: "nagato"
    side: "left"
    text:
      - "Хм... Что-то здесь не так..."
      - "(Такое чувство, будто вокруг Священной Сакуры сплетён невидимый барьер... Уж не для того ли, чтобы помешать нашему расследованию?)"
      - "Кавакадзэ, Сёкаку, будьте бдительны. Я осмотрю оболочку дерева."
      - "(Что бы ни скрывал этот барьер, я вытащу это на свет.)"

chapter1:
  rows:
  - text:
      - "На сборочной линии завода, зажатого в стальные стены, одна за другой создавались элитные Сирены."
  - char: "kii"
    side: "left"
    text:
      - "Так вот как всё устроено в мастерской Сирен... Совсем не похоже на то, как строят обычные серийные корабли."
      - "И это не просто рядовые гуманоидные Сирены, а полноценные элитные сосуды."
      - "Кстати, с каких это пор мы научились создавать сосуды Сирен?"
  - char: "nop"
    side: "right"
    status: "is-purple"
    text:
      - "Любая мастерская, подключённая к базе данных Зеркального моря, способна их производить. Обладая нужными знаниями, даже Империя Сакуры в её нынешнем состоянии может в какой-то степени контролировать этих Сирен."
  - char: "kii"
    side: "left"
    text:
      - "Мы? Контролируем элитных Сирен как какие-то старые серийники? Ну да, конечно."
  - char: "nop"
    side: "right"
    status: "is-purple"
    text:
      - "Я серьёзно. Кха-кха... Тебе стоит воспринимать их скорее как дронов, послушно исполняющих приказы, нежели как заклятых врагов."
      - "Пусть внешне они идентичны, между пустым сосудом и обитающей в нём Сиреной лежит целая пропасть."
  - char: "kii"
    side: "left"
    text:
      - "Хах, ладно. Я просто немного ошарашена тем, что управлять элитными Сиренами вообще возможно. Спасибо за разъяснение."
      - "Как насчёт того, чтобы закончить экскурсию и немного отдохнуть? Тебе бы не помешало, учитывая, какая ты бледная."
  - char: "nop"
    side: "right"
    status: "is-purple"
    text:
      - "Не беспокойся обо мне. Я знаю пределы своего тела... Кха-кха... Сейчас важно максимально использовать то время, что у нас осталось."
      - "Я должна довести этот план до конца, пока не стало слишком поздно... Итак, я полагаю, ты узнаёшь все сосуды?"
  - char: "kii"
    side: "left"
    text:
      - "Ещё бы. Тестер, Пьюрифайер, Компилятор и Омиттер... Прямо как с Пешками — они выглядят точь-в-точь как оригиналы."
      - "Эй, не против, если я задам последний вопрос?"
  - char: "nop"
    side: "right"
    status: "is-purple"
    text:
      - "Позволь угадаю. «Почему здесь нет сосуда Обсервер?»"
  - char: "kii"
    side: "left"
    text:
      - "Ого, ты читаешь мои мысли..."
  - char: "nop"
    side: "right"
    status: "is-purple"
    text:
      - "Если вкратце, программа «Обсервер» уникальна."
      - "Поскольку эта программа курирует все остальные элитные направления, сосуды Обсервер создаются по совершенно иным принципам, нежели прочие."
      - "Даже элементарный сосуд изготовить крайне сложно, к тому же для него требуется непомерно неэффективное оружие, которое не может использовать ни одна другая Сирена."
      - "В общем, это требует больше усилий, чем оно того стоит. Можно считать её практически невоспроизводимой."
  - char: "kii"
    side: "left"
    text:
      - "Понятно. Значит, нам будет не хватать одного человека..."
  - char: "nop"
    side: "right"
    text:
      - "Не обязательно. Это было непросто, но мне удалось создать реплику никого иного, как..."
      - "Кха-кха... Впрочем, посмотри сама."
  - text:
      - "Прожекторы мастерской сошлись в точке в стороне от сосудов Сирен, освещая нечто — или, возможно, кого-то — что до этого момента было скрыто во тьме."
  - char: "kii"
    side: "left"
    text:
      - "Это... неужели...?"
  - char: "nop"
    side: "right"
    status: "is-purple"
    text:
      - "Да. То, в чём вы все сейчас нуждаетесь больше всего."
      - "Пешка той, кто близка к Акаги, несущая в себе данные высокопоставленной Сирены..."

chapter1:
  rows:
  - char: "akagi"
    side: "left"
    text:
      - "От поражения Компилятора до того, что мы увидели за пределами Сингулярности... Всё, включая мои решения, до мельчайших деталей следовало планам Фридрих."
      - "Как бы приятно ни было видеть Командира, наблюдать за тем, как все пляшут под дудку этой женщины... было просто жутко."

chapter2:
  rows:
  - text:
      - "Сингулярность — внутри Зеркального моря"
  - char: "friedrich_der_grosse"
    side: "left"
    text:
      - "Идеальная симфония требует, чтобы каждый участник безупречно играл на своём инструменте."
      - "Чтобы достичь этого, я должна расширить свои горизонты и добиться большей чистоты звучания."
      - "Поэтому я спрашиваю тебя, Акаги — пойдёшь ли ты со мной?"
  - char: "akagi"
    side: "right"
    text:
      - "Прости, но твои планы меня больше не интересуют. Тебе придётся найти себе новую марионетку."
      - "Твоё рондо, возможно, и достигло финала, но у меня всё ещё много, очень много дел."
      - "Прощай, Фридрих дер Гроссе."
  - char: "friedrich_der_grosse"
    side: "left"
    text:
      - "Что ж, пусть будет так. Я уже видела, как наши пути расходятся."
      - "Ты стремишься выковать новое будущее для тех, кто тебе дорог. Ты ищешь утраченное чувство сопричастности. Ты жаждешь теплых объятий того, кого желаешь..."
      - "Ах, какое же ты диссонирующее, полное противоречий произведение. И всё же твоя песня всё ещё может понравиться публике."
      - "Мы встретимся снова в другом месте. А пока — доброго тебе здравия, Акаги. Хи-хи."

chapter3:
  rows:
  - char: "akagi"
    side: "left"
    text:
      - "Ватацуми снова в наших руках, мы получили ценные сведения о Железной Крови и узнали много нового о Командире."
      - "Пусть мы так и не достигли центра Северной Атлантики, мы вернулись домой не с пустыми руками."
      - "Ты сделала свой ход, Фридрих. Теперь моя очередь."
  - text:
      - "Сикигами в облике птицы, окутанной синим пламенем, влетела в комнату через окно и опустилась на стол перед Акаги."
  - char: "akagi"
    side: "left"
    text:
      - "Записанное сообщение от Каги? Любопытно..."
  - char: "kaga_rad"
    side: "right"
    text:
      - "Сестра, мне не удалось встретиться с Тосой."
      - "Прости... Это целиком и полностью моя вина."
      - "Я поговорила с Инадзумой и Икадзути. Они сказали, что Мусаси должна знать, где она находится, и, похоже, у меня нет иного выбора, кроме как спросить её напрямую."
      - "И ещё кое-что. По пути к резиденции Тосы я встретила Муцуки. Судя по всему, она тоже была там, чтобы поговорить с ней."
      - "У меня есть основания полагать, что скоро кто-то может навестить и твою резиденцию, так что имей это в виду. Конец отчета."
  - char: "akagi"
    side: "left"
    text:
      - "Вот как... Похоже, я отправила тебя на трудное задание, Кага."
      - "Интересно... Что стало бы с нами, если бы Командир не появился в нужный момент?"
      - "...Амаги, прости, что я не могу быть похожей на тебя. Это... Я просто такая, какая есть..."
      - "......."
      - "Муцуки... Древнее слово сакуры, означающее время близости в кругу семьи."
      - "Ах, так вот что ты хотела мне сказать. Вот почему ты прислала её."
  - char: "jintsuu"
    side: "right"
    text:
      - "Позволь отвлечь тебя, Акаги?"
  - char: "akagi"
    side: "left"
    text:
      - "Ох! Дзинцу? Что тебе нужно?"
  - char: "jintsuu"
    side: "right"
    text:
      - "Прости, что прерываю, пока ты занята. У дверей стоит девочка с посланием от Мусаси."
      - "Мне отослать её или передать сообщение самой?"
  - char: "akagi"
    side: "left"
    text:
      - "Впусти её. Было бы оскорблением не принять лично весточку от Мусаси."
      - "Ах, Мусаси... Я знала, что рано или поздно ты выкинешь нечто подобное."
      - "Раз уж ты решила заявить о себе, пришло время и мне привести в действие свой собственный план."
      - "Да. Это начало новой пьесы. Хи-хи, хи-хи-хи..."

chapter1:
  rows:
  - text:
      - "Как только символ Акаги в небе над зоной учений погас, её подчинённые немедленно перешли к делу."
  - char: "haguro"
    side: "left"
    text:
      - "Ого, посмотрите на этот огромный символ... Акаги пытается получить преимущество с самого начала..."
  - char: "hatakaze"
    side: "right"
    text:
      - "Акаги всегда любила действовать именно так — словно алый шторм, проносящийся по полю боя."
      - "Впрочем, захват инициативы — это разумная стратегия. Поскольку все флоты начинают далеко друг от друга, расширение своей территории на раннем этапе принесёт выгоду в будущем."
  - char: "haguro"
    side: "left"
    text:
      - "Да, но всё равно придётся победить серийные корабли, прежде чем занять другой сектор."
      - "Хм, давайте посмотрим... Центральная башня стоит десять очков, четыре главных священных места — по пять очков каждое, а остальные базы — всего по одному очку."
      - "Это значит, что Акаги, Нагато, Мусаси и Микаса будут сражаться в общей сложности за пятьдесят возможных очков."
      - "Ты права, расширение в начале имеет смысл. Тот, кто первым подберётся к центру, сможет первым выбирать наиболее ценные базы."
  - char: "kinu"
    side: "right"
    text:
      - "Успокойтесь. Микаса любит действовать неспешно и под контролем, так что у неё наверняка есть план."
  - char: "kongou"
    side: "left"
    text:
      - "К тому же она по природе осторожнее Акаги. Я не удивлюсь, если на этом ходу она вообще не отдаст особого приказа."
  - char: "kinu"
    side: "right"
    text:
      - "Это ещё почему? Мы что, не собираемся бороться за центральную башню?"
  - char: "kongou"
    side: "left"
    text:
      - "Пока нет. К тому же сейчас всё равно не наш черёд, так что нам остаётся только следить за стратегией противников и планировать свои действия соответствующим образом."
      - "Зная подход Микасы, мы, скорее всего, найдём возможность нанести удар позже."
      - "В конце концов, Микаса может сделать лишь один выстрел за то время, пока кто-то другой сделает сотню, но она сделает так, чтобы этот единственный выстрел попал в цель."
      - "До тех пор нашей главной задачей должна быть поддержка Нагато, удержание позиции на доске и недопущение того, чтобы кто-то другой вырвался в огромный отрыв."
  - char: "hatakaze"
    side: "right"
    text:
      - "Понимаю... Значит, мы выберем контролирующую стратегию и будем ждать, пока наступательный порыв противника выдохнется."
  - char: "kirishima"
    side: "left"
    text:
      - "Также важно отметить, что флот Акаги, похоже, не ставит в приоритет центральную башню."
      - "Судя по всему, она расчищает сектор ближе к стороне Мусаси, будто пытается упростить им двоим совместную работу."
  - char: "hatakaze"
    side: "right"
    text:
      - "Логично. Возможно, Акаги пытается сотрудничать с Мусаси так же, как Микаса объединяется с Нагато."
      - "Любопытно, нас ждёт противостояние «два на два»... Как же Микаса отреагирует на эту ситуацию?"
  - text:
      - "Лучи света вокруг зоны учений начали меняться, знаменуя начало хода Микасы."
  - char: "kinu"
    side: "left"
    text:
      - "...Похоже, теперь наш черёд."
  - char: "kirishima"
    side: "right"
    text:
      - "Верно. Подчинённые Акаги не смогут сдвинуться с места до начала своего следующего хода."
  - char: "haguro"
    side: "left"
    text:
      - "И ты была права: я не видела, чтобы символ Микасы зажегся в небе. Должно быть, она решила не использовать особый приказ на этом ходу."
  - char: "kongou"
    side: "right"
    text:
      - "Тогда придерживаемся прежнего плана. Для начала захватим сектор AB56 и продвинемся в сторону территории Акаги."
  - char: "haguro"
    side: "left"
    text:
      - "Почему мы движемся к Акаги? Разве мы не собирались поддерживать Нагато, как ты говорила ранее?"
  - char: "hatakaze"
    side: "right"
    text:
      - "Полагаю, это тот случай, когда лучшая защита — это нападение? Давление на Акаги — лучший способ заставить её дважды подумать над следующим шагом."
  - char: "kongou"
    side: "left"
    text:
      - "Не думаю, что Мусаси сразу станет угрожать Нагато, так что этот маневр также не даст силам Акаги зайти нам во фланг позже."
      - "Теперь Акаги придётся выбирать между наступлением и защитой своей территории. Классическая стратегия Микасы, если позволите так выразиться."
  - char: "haguro"
    side: "right"
    text:
      - "Это классическая стратегия «меча и щита»! Я и не ожидала ничего иного от самого Великого Ветерана!"
  - char: "kongou"
    side: "left"
    text:
      - "Давайте ещё раз убедимся, что всем понятны инструкции, прежде чем выдвигаться."

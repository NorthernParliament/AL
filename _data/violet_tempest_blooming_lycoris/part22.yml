chapter1:
  rows:
  - char: "kawakaze"
    side: "left"
    text:
      - "Госпожа Нагато, почему Микаса оставила ту базу, не зачистив всех врагов? Это какая-то ошибка в расчётах?"
  - char: "nagato"
    side: "right"
    text:
      - "Нет, скорее всего, она сделала это намеренно."
  - text:
      - "Одолев оставшихся врагов, занимавших узел базы, Нагато посмотрела вдаль, в сторону Микасы, и открыла канал связи."
  - char: "nagato"
    side: "right"
    text:
      - "Ты ведь нарочно оставила эту базу мне, Микаса?"
  - char: "mikasa_rad"
    side: "left"
    text:
      - "Именно так."
  - char: "nagato"
    side: "right"
    text:
      - "С-спасибо тебе..."
      - "Ты защищала Харуцуки, пока сама не вступила на поле боя... Я... я не знаю, как выразить тебе свою благодарность."
  - char: "mikasa_rad"
    side: "left"
    text:
      - "Не забивай себе голову. От того чаепития наверху меня уже клонило в сон, так что мне просто требовалась смена обстановки."
      - "Поскольку у нас не каждый день выпадает возможность побывать в таком месте, я подумала, что было бы неплохо воспользоваться шансом и занять места в первом ряду."
  - char: "nagato"
    side: "right"
    text:
      - "И всё же я должна еще раз поблагодарить тебя..."
  - char: "mikasa_rad"
    side: "left"
    text:
      - "Что с тобой? У тебя такой голос, будто ты вот-вот расплачешься."
      - "Помнишь, что сказала Мусаси? Этот домен отражает твои ментальные образы и твои убеждения. Если твоя воля не будет непоколебимой, ты сразу окажешься в невыгодном положении."
  - char: "nagato"
    side: "right"
    text:
      - "Мне просто нужно верить в свои идеалы... и без колебаний захватить эту базу."
  - text:
      - "Нагато завершила связь, снова и снова прокручивая в голове слова Микасы, и с её губ сорвался тихий вздох."
  - char: "nagato"
    side: "right"
    text:
      - "Что ж... Кавакадзэ, Сёкаку, давайте двигаться к следующей базе. Мы не можем ждать, пока Микаса преподнесет нам всё на блюдечке с голубой каёмочкой."
      - "Харуна, Хиэй, вам двоим следует подготовиться к штурму центральной базы."
      - "Харуцуки, мы с тобой пойдём проведаем Сакаву и Миюки. Если у тебя остались припасы для аварийного ремонта, мы отдадим их им."
  - char: "harutsuki"
    side: "left"
    text:
      - "Поняла!"
  - char: "nagato"
    side: "right"
    text:
      - "Сосредоточьтесь на исцелении каждого, кому это необходимо. В Империи Сакуры мы не наживаем врагов среди своих."
  - char: "harutsuki"
    side: "left"
    text:
      - "Это все ваши оставшиеся припасы для аварийного ремонта? Спасибо, госпожа Нагато! Я обязательно найду им хорошее применение!"
  - text:
      - "Харуцуки взмахнула своим гохэем и вознесла искреннюю молитву. Чудесным образом следы повреждений на снаряжении Миюки и Сакавы начали исчезать."
  - char: "miyuki"
    side: "left"
    text:
      - "Ого... Какое теплое чувство... Б-большое вам спасибо..."
  - char: "sakawa"
    side: "right"
    text:
      - "Я чувствую, как молитвы Харуцуки исцеляют меня! Ах, даже после всего, что я натворила, вы всё равно так добры ко мне, госпожа Нагато!"
  - char: "nagato"
    side: "left"
    text:
      - "Сакава, я знаю, почему Мусаси посылала тебя снова и снова. Но сколько бы раз она ни пыталась, ей не поколебать мою решимость."
  - char: "sakawa"
    side: "right"
    text:
      - "Послушайте, я очень цено то, что вы верите в лучшее во мне... Но если Мусаси прикажет, мне придется напасть на вас снова."
  - char: "nagato"
    side: "left"
    text:
      - "Мы решим проблемы по мере их поступления. Но это не меняет того факта, что ты тоже член Империи Сакуры и одна из наших подруг."
  - char: "sakawa"
    side: "right"
    text:
      - "Ах, вы так чисты сердцем, что на вас даже больно смотреть! Но-о-о вам лучше быть осторожнее, чтобы другие этим не воспользовались~"
      - "В одном Мусаси была права — это место определенно подарило нам уникальный опыт. Жаль, моих сестер здесь нет, чтобы тоже это увидеть."
  - char: "mikasa_rad"
    side: "left"
    text:
      - "К слову о твоих сестрах... Я уже давно не видела Юру. Ты не знаешь, где она?"
  - char: "sakawa"
    side: "right"
    text:
      - "Хм... Я слышала, Мусаси не так давно поручила ей какую-то сверхсекретную миссию, но подробностей я, очевидно, не знаю..."
      - "А что, она вам зачем-то понадобилась?"
  - char: "mikasa_rad"
    side: "left"
    text:
      - "Нет, мне просто было любопытно."
  - char: "nagato"
    side: "right"
    text:
      - "Фух... На этом мой ход окончен."
      - "Мне остается лишь надеяться, что Мусаси поймет мои намерения."
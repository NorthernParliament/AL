chapter1:
  rows:
  - text:
      - "Засверкали молнии, прогремел гром. За стенами пагоды разразилась неистовая буря."
      - "Мусаси по-прежнему сидела в полном одиночестве в темной комнате, освещаемой лишь голографической доской, к которой был прикован её взгляд."
  - char: "musashi"
    side: "left"
    text:
      - "До сих пор я ничего не могла для тебя сделать. Но теперь я исполню твоё желание."
      - "Да, Акаги... Твои зрители всё ещё ждут."
      - "Твое упорство, твоя сила воли. Тернистый путь, который ты выбрала и который не приносит тебе ничего, кроме презрения и недоверия."
      - "Чтобы дать волю этой страсти, граничащей с безумием, тебе необходимо разорвать все свои связи."
      - "Чтобы твоя слабая сущность наконец-то стала сильной... я подтолкну тебя в последний раз."
  - text:
      - "Приказ был отдан. Под Титосэ и её серийными кораблями вспыхнули кольца света."
      - "Волна за волной с них начали взлетать самолеты. Гул двигателей заполнил небо, когда металлическая стая устремилась вниз, к раненой Хатакадзэ."
      - "Мусаси прекрасно знала, что у Микасы нет возможности отразить столь масштабный налет авиации."
  - char: "musashi"
    side: "left"
    text:
      - "Объединяйте силы сколько угодно. Но союзы, не приносящие результатов, гроша выеденного не стоят — это не более чем пустые слова на бумаге."
      - "Чтобы Империя Сакуры могла двигаться дальше, все наши убеждения должны пройти испытание огнем, где каждое достоинство и каждый изъян предстанут перед светом."
      - "Достаточно ли сильны эти идеалы, чтобы вынести бремя нашего будущего, или же они — лишь эгоистичные прихоти?"
      - "Я могу не разделять идеалы Акаги целиком и полностью, но я считаю, что она заслуживает возможности сразиться за них."
      - "Точно так же и Нагато должна получить шанс доказать, что её стремление защищать — это не пацифизм или изоляционизм, а её собственный способ вырвать победу."
      - "Вопрос нашего будущего никогда не лежал на моих плечах, и дело даже не в том, кто наберет больше всех очков на этой доске."
      - "А теперь покажите мне, подруги мои. Пусть поют ваши сердца, и пусть ваша воля будет услышана."

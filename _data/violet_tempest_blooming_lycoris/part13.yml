chapter1:
  rows:
  - text:
      - "Воспользовавшись густым морским туманом, «вассалы» Мусаси, Сакава и Вакацуки, совершили переход, чтобы нанести внезапный удар по области, занятой флотом Нагато."
  - char: "shoukaku_rad"
    side: "left"
    text:
      - "Харуцуки! Кавакадзэ! Силы Мусаси направляются к вам!"
  - char: "harutsuki"
    side: "right"
    text:
      - "П-поняла! Но откуда они идут? Я почти ничего не вижу из-за этого тумана..."
  - char: "kawakaze"
    side: "left"
    text:
      - "Они идут прямо на нас! Готовься к бою, Харуцуки!"
  - char: "harutsuki"
    side: "right"
    text:
      - "Х-хы-ы-ы?!"
  - text:
      - "Как только Кавакадзэ обнажила свой клинок, Сакава и Вакацуки вырвались из тумана."
  - char: "sakawa"
    side: "left"
    text:
      - "Всем приветики, вассалы Нагато~!"
      - "Я легкий крейсер типа «Агано», Сакава. Давайте сразимся честно, ладно?"
  - char: "wakatsuki"
    side: "right"
    text:
      - "А я эсминец типа «Акидзуки», Вакацуки. Прости, что врываемся так внезапно, Харуцуки."
  - char: "harutsuki"
    side: "left"
    text:
      - "Со мной всё будет хорошо... Наверное..."
  - char: "kawakaze"
    side: "right"
    text:
      - "Харуцуки, не теряй бдительности. На время мы перестали быть союзниками."
  - char: "sakawa"
    side: "left"
    text:
      - "Ну, нам ведь не обязательно сражаться, верно? Мусаси приказала нам только переместиться в этот сектор."
      - "К тому же мы только что закончили захват Дворца Дракона. Мне бы не помешало лишнее время на отдых и восстановление~"
  - char: "harutsuki"
    side: "right"
    text:
      - "Фух... Я бы тоже хотела избежать конфликта, если это возможно..."
  - text:
      - "В отличие от Харуцуки, которая с облегчением вздохнула и опустила оружие, Кавакадзэ оставалась бдительной и была готова нанести удар."
  - char: "kawakaze"
    side: "left"
    text:
      - "Верно, мы в отличной форме, в то время как вы получили повреждения в предыдущем бою."
      - "Если вы не хотите сражаться, я уж точно не стану вас заставлять."
      - "Но не подходите ни на шаг ближе. Таковы приказы госпожи Нагато."
  - char: "sakawa"
    side: "right"
    text:
      - "Понимаю... Значит, тебе приказали нас сдерживать. Хм... Я знаю, что ты сильна, но хватит ли твоих сил, чтобы остановить нас обеих?"
  - text:
      - "Хиэй, находившаяся в соседнем квадрате, услышала о назревающем столкновении по устройству связи."
  - char: "hiei"
    side: "left"
    text:
      - "Нагато, ты верно предугадала ход Мусаси, но не до конца учла эффекты морского тумана."
      - "Если бы ты решилась на полномасштабную атаку в тумане, ты смогла бы нанести больше урона. Однако это помешало бы тебе захватить достаточно баз, чтобы зажать Мусаси."
      - "Должно быть, это было трудное решение, но ты хотела избежать боя с собственными друзьями."
      - "Скоро морской туман рассеется, и теперь остается только ждать, какое решение примет Мусаси."
  - text:
      - "Белая пелена, окутавшая море, начала редеть и рассеиваться, пока, наконец..."
  - char: "hiei"
    side: "left"
    text:
      - "Звуки боя...?! Это значит..."
      - "Мусаси, ты всё-таки решила спустить курок?"

chapter2:
  rows:
  - char: "sakawa"
    side: "left"
    text:
      - "Простите, но у нас приказы. Эм, Вакацуки, ты ведь тоже получила сообщение от Мусаси?"
  - text:
      - "БАБАХ!!!"
      - "Прежде чем Сакава и Вакацуки закончили подготовку к атаке, серийные корабли Мусаси вышли из тумана и принялись осыпать Харуцуки и Кавакадзэ яростным градом снарядов."
  - char: "sakawa"
    side: "left"
    text:
      - "Извиняйте, такова селяви. Нам всё-таки придется подраться."
  - char: "harutsuki"
    side: "right"
    text:
      - "Разве ты не говорила только что совершенно обратное?!"
  - char: "sakawa"
    side: "left"
    text:
      - "Эй, я бы тоже предпочла просто разойтись, но мы не можем ослушаться главной леди."
  - char: "kawakaze"
    side: "right"
    text:
      - "Я была права, что не ослабляла бдительность!.. Но учитывая повреждения, которые эти двое уже получили, у нас явное преимущество!"
      - "Харуцуки, держись прямо за мной! Мы решим всё в ближнем торпедном бою!"
  - text:
      - "Кавакадзэ обнажила меч, её глаза сузились, пока она маневрировала, чтобы Сакава и Вакацуки оказались между ней и серийными кораблями Мусаси."
  - char: "sakawa"
    side: "left"
    text:
      - "А ты шустрая, как и ожидалось от личного телохранителя Нагато... Но и я не лыком шита!"
  - char: "wakatsuki"
    side: "right"
    text:
      - "М-меня тоже не недооценивайте!"

chapter3:
  rows:
  - text:
      - "И как раз в тот момент, когда пушки и клинки были готовы скреститься..."

chapter4:
  rows:
  - text:
      - "На поле боя снизошёл ослепительный луч света, подобно потоку лепестков сакуры, коснувшемуся поверхности воды. Остатки редеющего морского тумана были мгновенно отброшены в стороны, и перед ними предстала Нагато — флагман Возрожденного Объединенного Флота."
      - "Барьеры Нагато окружили атакующих с обеих сторон, разводя клинки в стороны и делая снаряды бесполезными."
  - char: "harutsuki"
    side: "left"
    text:
      - "Ого, она полностью нейтрализовала снаряды прямо в воздухе... Спасибо большое, Великая Лисица-Хранительница!"
  - char: "nagato"
    side: "right"
    text:
      - "М-м. Вам не о чем беспокоиться, пока я здесь."
  - char: "kawakaze"
    side: "left"
    text:
      - "оспожа Нагато?! Мы были вполне способны справиться с ситуацией сами... Вам нет нужды лично вступать на поле боя..."
  - char: "nagato"
    side: "right"
    text:
      - "Дело не в доверии. Я пришла, чтобы предотвратить бессмысленную битву."
      - "В этих учениях нет причин поднимать оружие друг против друга. Сакава, Вакацуки, отступите!"
  - char: "sakawa"
    side: "left"
    text:
      - "О-о-ой, попались... Э-эм, мы ведь решили сражаться не потому, что сами того хотели..."
      - "М-Мусаси сказала нам расслабиться и наслаждаться игрой, так что я, возможно, немного увлеклась, ха-ха... Совсем чуть-чуть."
  - char: "wakatsuki"
    side: "right"
    text:
      - "Пожалуйста, простите нас, госпожа Нагато!"
  - char: "nagato"
    side: "left"
    text:
      - "Нет нужды извиняться. Это всего лишь учения, и вы просто следовали приказам."
      - "Как и сказала Мусаси, в контролируемой зоне учений нет риска получить травму."
      - "Мы спаррингуем друг с другом практически ежедневно в рамках нашей обычной программы тренировок."
      - "Так что вам не нужно извиняться, и вам следует продолжать эти учения как обычно."
  - char: "sakawa"
    side: "right"
    text:
      - "Мы ведь не сделали ничего плохого, верно?"
  - char: "wakatsuki"
    side: "left"
    text:
      - "Если в нашем сражении нет никакого риска, почему же вы нас остановили?"
  - char: "nagato"
    side: "right"
    text:
      - "Эта игра в го — столкновение воли игроков снаружи. Посему боевая мощь кораблей внутри ограничена, в то время как значимость убеждений каждого — усилена."
      - "Иными словами, вы ничего не добьетесь, сражаясь друг с другом в обычном, физическом смысле. Напротив, единственное, что имеет значение, — это столкновение идеалов. То, чего не может произойти, когда вы просто «следуете приказам»."
      - "И моё убеждение таково: бессмысленным конфликтам здесь не место. Это путь, который я явлю Империи Сакуры, и идеал, который я желаю продемонстрировать Мусаси и Акаги."
  - char: "sakawa"
    side: "left"
    text:
      - "Хорошо сказано! Должна признать, я весьма тронута твоей речью. Тот могучий щит, что ты создала, должно быть, является проявлением твоего мысленного образа, верно?"
  - char: "nagato"
    side: "right"
    text:
      - "Вероятнее всего. Возможно, из-за времени, проведенного в заточении внутри Священной Сакуры, этот домен также отразил мои яркие воспоминания об этом месте."
      - "Но теперь я больше не тот человек, что была прежде. Возможно, мы в последний раз видим здесь подобный пейзаж."
      - "В любом случае, нам больше незачем сражаться друг с другом. Если же вы всё еще не убеждены, то вам придется сначала пройти через меня."
      - "Пока я стою здесь, никто и пальцем не тронет моих друзей!"

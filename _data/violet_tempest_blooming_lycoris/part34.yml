chapter1:
  rows:
  - text:
      - "В Святилище Империи Сакуры, окруженная уютом и роскошью, восседала преемница великой силы."
      - "В пагоде, возвышающейся над облаками, черноволосая женщина не сводила глаз с измененной доски для Го."
      - "Вспышки молний, не сдерживаемые темными тучами, отбрасывали тонкие, мимолетные тени на деревянные половицы."
  - char: "musashi"
    side: "left"
    text:
      - "Победим мы или проиграем, эта игра заканчивается здесь..."
  - text:
      - "Ужасный, воющий ветер бился в окно, а в ладони Мусаси от страха трепетала маленькая заблудшая ласточка."
      - "Пагода не дала бы ей приюта... Но она нашла того, кто укрыл её."
  - char: "musashi"
    side: "left"
    text:
      - "Это буря в моем собственном разуме — видение, которое погрузит в хаос Империю Сакуры... Нет, весь мир."
      - "Нагато, Микаса. В верности своим идеалам нет ничего дурного. Но вас слишком одолела паранойя, и вы не разглядели возможность, что была прямо перед вами."
      - "Вы упустили шанс поговорить со мной и упустили победу, которую я могла бы вручить вам лично."
      - "Но увы, это не более чем одна-единственная игра. Как может она в одиночку определить будущее всей Империи Сакуры?"
      - "Услышали ли вы невысказанные слова в сердцах друг друга?"
      - "Нашли ли вы ту силу, которую хотите явить своему народу?"
      - "Великая сила всегда дается дорогой ценой, и вы понимаете это лучше, чем кто-либо другой."
      - "Но если вопреки этому знанию вы способны двигаться вперед, значит, ваша любовь глубока и сильна, а заплаченная цена того стоит."
      - "Скажи мне, Акаги, что ждет тебя в самом конце того будущего, к которому ты так стремишься?"
      - "Какой частью себя ты готова пожертвовать, чтобы воплотить эту реальность в жизнь?"
      - "Наши пути могут расходиться снова и снова, но каждый сделанный нами шаг навсегда останется в наших сердцах."
      - "И однажды... эти пути сойдутся вновь."

chapter2:
  rows:
  - text:
      - "Безлунное небо разверзлось, пролив безмолвную слезу, которая озарила всё море ярко-красным пламенем."
      - "Башня в самом центре зоны учений содрогнулась и забилась в конвульсиях, когда море пылающих цветов вырвало с корнем её темные щупальца. Накопленная в башне энергия мощным потоком вырвалась из вершины, превращаясь в кольца света, которые разлетались и рассеивались во всех направлениях."
  - char: "akagi"
    side: "left"
    text:
      - "Ха-ха-ха... Чудесно, Мусаси всё-таки оставила нам приятный сюрприз напоследок. Я с удовольствием заберу этот маленький сувенир домой."
      - "Ты даже не представляешь, как долго я этого ждала, Отшельник."
      - "Отравляла нашу землю. Обманывала наш народ. И... притворялась Амаги..."
  - text:
      - "Обломки оболочки Арбитра жалко повалились к ногам Акаги."
  - char: "akagi"
    side: "left"
    text:
      - "Вот цена, которую ты платишь за то, что перешла мне дорогу."
      - "Пусть ты всего лишь копия, но теперь я знаю, как тебя одолеть. И помяни мои слова — я доберусь до твоего основного сервера."
      - "Смотри под ноги, не то станешь точно такой же безжизненной жестянкой, как эта..."
  - text:
      - "Акаги вырвала тускло светящийся фонарь из оснастки Сирены."
      - "Она покрутила этот любопытный предмет в руках, отметив про себя, что он остался абсолютно невредим, несмотря на весь тот всесокрушающий огненный дождь, который она только что обрушила."

chapter3:
  rows:
  - char: "akagi"
    side: "left"
    status: "is-yellow"
    text:
      - "Всё кончено, Сирена."
      - "Так и оставайся здесь лежать этой грудой хлама. Тебе это больше к лицу."
      - "Отныне я буду обводить тебя вокруг пальца на каждом шагу. Все твои расчеты, все твои «Реконструкции» — я раздавлю их все до единой."
      - "Ни Нагато, ни Микасе незачем знать о том, что здесь произошло, ведь это моя битва, и только моя."
      - "Благодаря Мусаси и Каге никто больше не узнает об этом проявлении силы."
      - "Но даже если они и увидели его, то никогда не поймут, «моя» ли это сила или же просто порождение этого домена."
      - "Ты ничего не сможешь сделать, чтобы остановить меня."
      - "Будущее Империи Сакуры больше не игрушка в твоих руках."
      - "...Нагато. Будущее нельзя построить на одних лишь пустых идеалах. В этом и заключается разница между мной и тобой."
      - "Ты не видела того забвения, которое ждет нас в будущем, если мы примем твою сторону."
      - "Я не гожусь на роль лидера Империи Сакуры. Никто не понимает этого лучше, чем я сама."
      - "Но я — единственная, кто СПОСОБЕН спасти нашу землю и наш народ."
      - "Без силы Империя Сакуры никогда не станет могущественной. Без силы я... никогда не смогу никого спасти."
      - "Я должна сделать то, что не удалось Амаги..."
      - "...Чтобы больше никогда её не терять. Чтобы снова встретиться с ней... вместе со всеми нашими подругами из Империи Сакуры..."
      - "Это мой путь, будущее, ради которого я готова отдать всё что угодно."
      - "...Агония башни должна скоро прекратиться."
      - "Осталось сделать последнее дело, прежде чем этот «домен»... или, вернее, это Зеркальное море, станет для меня бесполезным."
  - text:
      - "Акаги подняла фонарь поверженного Арбитра и направила его свет прямо на башню."
      - "Узоры света на угасающей башне снова изменились. Луна в небе вместе со всеми окружающими её облаками замерцала, словно сломанный экран, переливаясь кристальным и радужным сиянием."
  - char: "akagi"
    side: "left"
    text:
      - "Бисмарк, ты по глупости своей отвергла этот дар."
      - "Но я не такая, как ты. Я не боюсь овладеть этой великой силой."
      - "И с её помощью я продолжу вести Империю Сакуры навстречу её истинному будущему, пока эту силу не удастся передать в праведные руки."
      - "Ради этой цели нет такой жертвы, на которую я бы не пошла."
      - "Даже если меня отвергнут, презрят и сожгут на костре... Не только Империя Сакуры, но и весь этот мир..."
      - "Я... превзойду самого «Бога»."
chapter1:
  rows:
  - text:
      - "Потери продолжали стремительно расти, а искусственное небо над зоной учений становилось всё более тусклым и зловещим."
      - "Сам воздух будто сгустился и стал давящим, словно предвещая некую великую катастрофу, которая положит конец этой игре гораздо раньше, чем ожидалось."
  - char: "kaga"
    side: "left"
    text:
      - "Всё в точности как ты и предсказывала, Акаги. Для Мусаси добивание Хатакадзэ оказалось в приоритете."
      - "Я по-прежнему не вижу ни логики, ни смысла в действиях Мусаси... но она определенно знает об этом домене что-то, чего не знаем мы."
  - char: "akagi"
    side: "right"
    text:
      - "Изначально всё это начиналось как обычная настольная игра, но теперь происходящее всё сильнее напоминает настоящее сражение."
  - char: "yamashiro"
    side: "left"
    text:
      - "Ух... От этой атмосферы у меня мурашки по коже. Такое чувство, будто вот-вот случится что-то ужасное..."
  - char: "ryuuhou"
    side: "right"
    text:
      - "Если подумать, Мусаси — единственная, кто практически не играет по правилам собственной же игры. С самого начала её больше интересовали атаки на нас. Она даже использовала особую команду, чтобы нанести дальний удар по Хатакадзэ..."
  - char: "akagi"
    side: "left"
    text:
      - "Как бы то ни было, мы всё еще можем извлечь выгоду из хаоса, вызванного этой ситуацией."
      - "Микаса может сколько угодно думать, будто затягивание времени — её лучший шанс на победу, но мы еще посмотрим."
      - "Ямасиро, приготовиться выдвинуть все твои силы к центральной башне."
  - char: "yamashiro"
    side: "right"
    text:
      - "Ась? Но разве мы теперь не в невыгодном положении без Миюки? К тому же я всё еще не до конца восстановилась..."
      - "Единственная передовая линия, которую мы можем собрать, это... я и серийные корабли. Не слишком ли это безрассудно?"
  - char: "ryuuhou"
    side: "left"
    text:
      - "Акаги, Ямасиро еще не восстановилась. Если твоя цель — не дать силам Арбитра смять нас, я могу справиться с этим в одиночку."
      - "Если дело не дойдет до прямого столкновения, у меня все еще полно припасов и прочности. Пока кто-то один расчищает путь к центральной башне, у остальных будет больше шансов."
  - char: "akagi"
    side: "right"
    text:
      - "...Пока кто-то один делает это, значит."
  - char: "kaga"
    side: "left"
    text:
      - "Я пойду, Акаги."
  - char: "akagi"
    side: "right"
    text:
      - "Кага?"
  - char: "kaga"
    side: "left"
    text:
      - "На случай, если что-то пойдет не так, я крепче, чем Рюхо. Мы должны свести количество рисков к минимуму."
  - char: "akagi"
    side: "right"
    text:
      - "...Хорошо. Тогда иди."
      - "Как только Каге удастся отвлечь внимание Арбитра, остальные выдвинутся следом."
      - "Финал начинается здесь. Я покончу с этим на своем следующем ходу."

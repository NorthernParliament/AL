chapter1:
  rows:
  - char: "sakawa"
    side: "left"
    text:
      - "Без обид, Хагуро, но главная леди хочет, чтобы ты убралась отсюда. Ты готова?"
  - char: "haguro"
    side: "right"
    text:
      - "Ух... Я знала, что рано или поздно это превратится в головную боль..."
      - "Я тут уже довольно давно околачиваюсь, так с чего вдруг я стала такой важной персоной?"
  - char: "sakawa"
    side: "left"
    text:
      - "Песенка Дзинцу уже практически спета, верно? Так что нам нужно немного уравнять шансы. На самом деле ты даже не главная цель Мусаси — ею будет бедняжка Харуцуки."
  - char: "haguro"
    side: "right"
    text:
      - "Ладно, похоже, мы это делаем... Что ж, нападай."
      - "Но только одно предупреждение — будь осторожнее с тем, куда целишься. Иначе можешь ненароком вывести из строя Миюки."
  - char: "sakawa"
    side: "left"
    text:
      - "Ха? Я думала, у нас будет честный бой! Зачем ты впутываешь в это Миюки?"
  - char: "haguro"
    side: "right"
    text:
      - "Так какой план? Я хороша в драке, когда прижата к стенке, так что не вини меня, если Миюки попадет под перекрестный огонь."
  - char: "sakawa"
    side: "left"
    text:
      - "Ах ты..! Ух, но я не могу просто развернуться и уйти! У меня приказы от Мусаси!"
      - "Миюки, не позволяй Хагуро запугивать тебя! Давай объединимся и выбьем её на этом ходу!"
  - char: "miyuki"
    side: "right"
    text:
      - "Х-хорошо! Я сделаю всё, что в моих силах!"
  - char: "haguro"
    side: "left"
    text:
      - "Тц, похоже, мой блеф сработал не совсем так, как я хотела... Ну и отстой."

chapter2:
  rows:
  - text:
      - "После того как попытка Хагуро использовать угрозу огня по своим не сработала, она приготовилась к неравному бою против двоих, как вдруг..."
  - char: "mikasa"
    side: "left"
    text:
      - "А ну стоять!"
  - text:
      - "Голос прогремел с небес, и три девушки-корабля, собиравшиеся сойтись в схватке, замерли на месте."
  - char: "sakawa"
    side: "left"
    text:
      - "А-ась? Что происходит с моей оснасткой? Она как-то странно себя ведет..."
  - char: "haguro"
    side: "right"
    text:
      - "Еще мгновение назад я могла двигаться совершенно свободно... Это чья-то особая команда в действии?"
  - char: "miyuki"
    side: "left"
    text:
      - "Я... я тоже не могу пошевелить оснасткой... Эм, это как-то связано с тем световым кольцом, что только что появилось вокруг нас?"
  - char: "haguro"
    side: "right"
    text:
      - "Должно быть, в этом всё дело... Микаса, это ты?"
  - char: "mikasa"
    side: "left"
    text:
      - "Ха-ха-ха, угадала!"
  - text:
      - "Когда троица обернулась на голос, вдалеке медленно проступил силуэт Микасы."
  - char: "mikasa"
    side: "left"
    text:
      - "Простите, если звучу как заезженная пластинка, но Нагато не хочет, чтобы мы сражались, и я тоже."
  - char: "haguro"
    side: "right"
    text:
      - "Фух, для меня это кончилось бы не лучшим образом... Это только что была работа Нагато?"
  - char: "mikasa"
    side: "left"
    text:
      - "Нет, это была моя команда. Я разделяю то же видение, что и она, — мир, в котором мы больше не сражаемся друг с другом."
  - char: "miyuki"
    side: "right"
    text:
      - "Это значит... Вы отменяете приказы Мусаси?"
  - char: "mikasa"
    side: "left"
    text:
      - "Полагаю, что так. Разве вы не рады, что вам больше не нужно драться?"
  - char: "miyuki"
    side: "right"
    text:
      - "Д-да... Я просто захватывала эту базу по приказу Акаги..."
  - char: "mikasa"
    side: "left"
    text:
      - "Что такое, Сакава? Ты собираешься настаивать на поединке?"
  - char: "sakawa"
    side: "right"
    text:
      - "Аха-ха, нет-нет! Я просто... поймала дежавю, вот и всё!"
  - char: "mikasa"
    side: "left"
    text:
      - "Я ничего не имею против спаррингов во время обычных учений, но нет никакого смысла сражаться друг с другом, пока центральная башня всё ещё стоит."
  - char: "sakawa"
    side: "right"
    text:
      - "Ха-ха, я правда не против. Пока в этой игре происходят такие захватывающие повороты, я вполне довольна ролью стороннего наблюдателя!"
  - char: "mikasa"
    side: "left"
    text:
      - "Рада, что ты понимаешь. Однако того же нельзя сказать о бездумных серийных кораблях, направляющихся в нашу сторону."
      - "Похоже, они ведут беспорядочный огонь по всему на своём пути... Неужели Мусаси не заботит безопасность соратниц, или же..."
  - text:
      - "Как только действие команды Мусаси рассеялось, серийные корабли снова начали затихать. Однако Дзинцу, которая уже была сильно повреждена, получила достаточно урона, чтобы окончательно выйти из строя."
  - char: "mikasa"
    side: "left"
    text:
      - "Это досадные обстоятельства, Дзинцу."
  - char: "miyuki"
    side: "right"
    text:
      - "Мне так жаль, Дзинцу... Я должна была вернуться и помочь тебе..."
  - char: "jintsuu"
    side: "left"
    text:
      - "Не беспокойся об этом, это в любом случае лишь симуляция. На самом деле я не ранена, просто... тело немного онемело?"
      - "Должна признать, технологии здесь очень реалистичны. Но уверена, что буду в порядке, как только покину зону учений."
  - char: "mikasa"
    side: "right"
    text:
      - "Тебе ведь не обязательно уходить только потому, что тебя признали выведенной из строя, верно?"
  - char: "jintsuu"
    side: "left"
    text:
      - "Всё в порядке. Я буду только мешаться под ногами у остальных, если останусь здесь без какой-то веской причины."
      - "Честно говоря, Сэндай, вероятно, подошла бы для этих учений лучше, чем я. Что ж, увидимся позже."

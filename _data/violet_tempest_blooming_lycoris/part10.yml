chapter1:
  rows:
  - char: "kinu"
    side: "left"
    text:
      - "Посмотрите на этот туман... Если это не проделки Сирен, значит, Акаги затеяла что-то крупное."
  - char: "haguro"
    side: "right"
    text:
      - "Согласна с этой оценкой. Прежде чем туман окончательно сгустился, мои самолёты-разведчики заметили признаки перемещения кораблей Акаги."
  - char: "hatakaze"
    side: "left"
    text:
      - "Она, вероятно, считает себя очень умной, используя дымовую завесу, чтобы скрыть свои маневры, но мы её раскусили!"
      - "Если мы будем жаться здесь от страха и позволим Акаги делать всё, что ей вздумается, она потенциально может захватить баз на пять очков уже на этом ходу."
  - char: "kinu"
    side: "right"
    text:
      - "Значит, она может свободно выбирать цели, независимо от того, где развернуты её корабли... Так вот как она использует свой авианосный флот?!"
  - char: "kirishima"
    side: "left"
    text:
      - "Это ещё не всё. Рассредоточив свои силы, она первой захватила контроль над центральной зоной, фактически перекрыв доступ к территории Мусаси."
      - "Если мы всё ещё хотим объединиться с силами Нагато, нам придётся либо прорываться с боем через центр поля битвы, либо искать обходной путь."
      - "Но посмотрите — Мусаси теперь вообще не сможет сдвинуться, не наткнувшись на силы либо Акаги, либо Нагато. Я думала, они должны работать сообща?"
  - char: "hatakaze"
    side: "right"
    text:
      - "Будто Акаги пытается сдержать и Мусаси тоже... Это тоже часть её стратегии?"
  - char: "haguro"
    side: "left"
    text:
      - "Нагато по-прежнему удерживает оборонительную линию на другой стороне территории Мусаси."
      - "Поскольку мы в союзе с Нагато, у неё в распоряжении много вариантов действий."
      - "Но теперь, когда Акаги угрожает огромным участкам поля боя своим морским туманом, Нагато может решить ответить на это в первую очередь."
      - "Ух, от попыток разобраться в ситуации у меня уже голова болит... Мне сказали, что всё, что от меня требуется — это следовать приказам."
  - char: "kirishima"
    side: "right"
    text:
      - "В конце концов, сражаемся-то именно МЫ. Неизбежно, что нам приходится давать собственные оценки происходящему."
      - "Если бы мы действительно просто следовали приказам не раздумывая, мы были бы не более чем Пешками. И в таком случае — почему бы не использовать настоящих Пешек?"
      - "Если честно, самый большой знак вопроса сейчас — это Мусаси."
  - char: "kinu"
    side: "left"
    text:
      - "Это верно. Она до сих пор не раскрыла своих карт, хотя находится под самой большой угрозой."
  - char: "hatakaze"
    side: "right"
    text:
      - "Думаю, ей выгодно, когда ситуацию становится сложнее прочитать. Чем сложнее поле боя, тем больше в нём неопределенности. Возможно, именно этого Мусаси и добивается."
      - "Именно потому, что на этой доске каждый может видеть ходы другого, каждое движение порождает подозрения."
  - text:
      - "В этот момент над священным местом, ближайшим к территории Микасы, появился символ, приказывающий её силам поблизости сосредоточить на нём свои атаки."
  - char: "kongou"
    side: "left"
    text:
      - "Слушайте все, у нас приказ от Микасы!"
  - text:
      - "Инструкции Микасы были ясны — всем силам сойтись у Диадемы Света и захватить её."
  - char: "haguro"
    side: "left"
    text:
      - "Отлично, мы идём за крупными очками! Похоже, Микаса наконец-то всерьёз включилась в игру!"
  - char: "kinu"
    side: "right"
    text:
      - "Вот это мне по душе! С Микасой у руля мы не можем проиграть!"
      - "Итак, мы подготовимся к атаке на Диадему Света и заодно рассечём силы Акаги пополам."
  - char: "kongou"
    side: "left"
    text:
      - "Превосходно. Интересно, попытаемся ли мы также захватить центральную башню после того, как лишим Акаги возможности организовать контратаку."
  - char: "haguro"
    side: "right"
    text:
      - "Если мы нацелимся ещё и на центральную башню, это будет означать прямое столкновение с флотом Акаги..."
  - char: "hatakaze"
    side: "left"
    text:
      - "Мы не знаем наверняка, действительно ли Акаги метит туда, но этот шаг, по крайней мере, не уступает ей в агрессивности."
  - char: "haguro"
    side: "right"
    text:
      - "Обернуть стратегию Акаги против неё самой, да? В этом есть смысл!"

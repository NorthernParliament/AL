chapter1:
  rows:
  - char: "chiyoda"
    side: "left"
    text:
      - "Итак, мы получили приказы от Мусаси. Похоже, на этом ходу она тоже не собирается использовать особый приказ, а?"
  - char: "suzutsuki"
    side: "right"
    text:
      - "Выжидание подходящего момента для удара — довольно разумное решение, не так ли?"
      - "Вакацуки, не хочешь возглавить наступление на ближайшую базу?"
  - char: "wakatsuki"
    side: "left"
    text:
      - "Будет сделано! Предоставь это мне!"
  - text:
      - "Получив приказ, Вакацуки вышла из строя серийных кораблей, ведя их к базе в соседнем ромбе."
  - char: "sakawa"
    side: "left"
    text:
      - "Мусаси выбрала стратегию, сильно отличающуюся от планов остальных трёх игроков..."
  - char: "suzutsuki"
    side: "right"
    text:
      - "Ха? Как ты это поняла лишь по первому ходу?"
  - char: "sakawa"
    side: "left"
    text:
      - "Ну, я, очевидно, не знаю, какова её конечная цель, но она, кажется, хочет захватить Дворец Дракона как можно быстрее. Пока что никто другой не занял позицию для этого, верно?"
  - char: "suzutsuki"
    side: "right"
    text:
      - "Понимаю. Как только захватишь базу, её уже не может отобрать кто-то другой, так что логично нацелиться на самые ценные объекты в первую очередь!"
      - "Малые базы стоят всего по одному очку, но захват священного места дает целых пять! Это обеспечит огромный отрыв!"
      - "Пока ещё слишком рано для столкновений между флотами, но как только это произойдет, планировать наперед станет сложнее."
      - "Если мы успеем набрать как можно больше очков до того, как это случится, у нас будет гораздо больше вариантов действий, даже если ситуация станет совсем хаотичной!"
  - char: "sakawa"
    side: "left"
    text:
      - "Верно. А если мы истощим все свои силы в сражениях друг с другом, будет труднее одолеть Сирен, охраняющих каждую базу."
  - char: "suzutsuki"
    side: "right"
    text:
      - "Хорошо сказано! Если всё пойдет гладко, мы также достигнем центральной башни раньше всех! Мудрость леди Мусаси нельзя недооценивать!"
  - char: "sakawa"
    side: "left"
    text:
      - "В-видишь, я уже всё это знала! Вот почему Мусаси выбрала стратегию, которую остальные ещё не осознали!"
  - char: "suzutsuki"
    side: "right"
    text:
      - "Итак, теперь, когда каждый сделал свой первый ход, как думаешь, кто побеждает?"
  - char: "sakawa"
    side: "left"
    text:
      - "Не знаю, мы ведь все впервые играем в подобную игру, разве нет?"
  - char: "suzutsuki"
    side: "right"
    text:
      - "Мне только что пришло в голову: наша победа практически гарантирована, как только мы возьмём центральную башню, так? Что мешает всем просто броситься прямиком туда?"
  - char: "sakawa"
    side: "left"
    text:
      - "Ну, никто из нас не смог бы набрать 15 очков, не столкнувшись лбами."
  - char: "suzutsuki"
    side: "right"
    text:
      - "Да уж. Нам также нужно быть особенно осторожными с Акаги. Титосэ, Тиёда, что вы двое думаете? Акаги ведь не станет подносить Мусаси победу на блюдечке с голубой каёмочкой, верно?"
  - char: "chitose"
    side: "left"
    text:
      - "Я... я понятия не имею... Акаги может быть доброй в одно время и ужасающей в другое, будто в ней живут две разные личности..."
  - char: "chiyoda"
    side: "right"
    text:
      - "Ха-ха, таким простакам, как мы, ни за что не разгадать, о чём думает Акаги~"
  - char: "sakawa"
    side: "left"
    text:
      - "Это правда, но вам не кажется, что от Мусаси исходят похожие флюиды?"
  - char: "suzutsuki"
    side: "right"
    text:
      - "Есть такое... Эй, вы помните, что Мусаси сказала нам прямо перед началом этих учений?"

chapter2:
  rows:
  - char: "musashi"
    side: "left"
    text:
      - "Сакава, Вакацуки, Судзуцуки, Титосэ и Тиёда. Я доверяю вам пятерым роль моих вассалов в этих учениях."
      - "Всё, что вам нужно — это следовать моим приказам, подобно камням на доске для го."
      - "Просто смотрите прямо перед собой. Оставьте свои мысли и наслаждайтесь опытом, который вот-вот развернётся перед вами — что бы ни случилось."

chapter3:
  rows:
  - char: "sakawa"
    side: "left"
    text:
      - "«Наслаждайтесь опытом, который вот-вот развернётся», ха? Она так это преподнесла, будто мы кино смотрим или вроде того."
      - "Я и раньше участвовала во многих маневрах и учениях, но это похоже на совершенно иную игру с совсем другими правилами..."
      - "Словно мы шагнули в абсолютно новый мир, когда вошли в домен Мусаси."
  - char: "chiyoda"
    side: "right"
    text:
      - "Знаете, что меня зацепило? Фраза Мусаси «что бы ни случилось». Почти звучит так, будто она предвещает, что ЧТО-ТО всё-таки случится."
  - char: "sakawa"
    side: "left"
    text:
      - "Хм, звучит и вправду немного сомнительно. Но что самое худшее может произойти? Не то чтобы кто-то из нас мог реально пострадать внутри этой зоны учений."
  - char: "chiyoda"
    side: "right"
    text:
      - "Да, но мы здесь не в го играем. Нам на самом деле приходится сражаться, а попадание холостым снарядом — это всё равно больно!"
  - char: "sakawa"
    side: "left"
    text:
      - "Пфе. Какие же это морские учения, если на кону ничего не стоит?"
      - "Одно я могу сказать наверняка: если за кулисами что-то и происходит, это решать игрокам. Мы всего лишь фигуры на доске, так что мы всё равно ничего не можем поделать."
      - "Если подумать, когда мы в последний раз видели Нагато, Микасу, Акаги и Мусаси в одной комнате? В буквальном смысле звёзды сошлись, да?"
      - "У нас тут даже есть реплики некоторых самых священных мест Империи Сакуры, и дизайн окружающих секторов, кажется, отражает архитектуру ближайшего из них."
      - "Тут и правда много отличных видов, которыми можно проникнуться, если бы не эти тёмные зловещие тучи и всё такое. Кто знает, может, Мусаси действительно впечатлена тем, каким получилось это место, и на самом деле просто говорит нам получать удовольствие?"
  - char: "suzutsuki"
    side: "right"
    text:
      - "Что бы ни случилось, да... В конце наверняка будет какой-то сюрприз!"
      - "(Не знаю, может, я и накручиваю себя, но... когда она говорит нам «наслаждаться процессом», значит ли это, что неважно, победим мы или проиграем? Что Мусаси вообще надеется получить от всего этого?)"
      - "(Мне сказали, что это место отражает ментальное состояние участников... Значит ли это, что мы сможем найти подсказки к тому, о чём думает Мусаси?..)"
  - char: "wakatsuki_rad"
    side: "left"
    text:
      - "Ам, алло? Есть кто? Я прибыла в назначенную точку!"
  - char: "suzutsuki"
    side: "right"
    text:
      - "О, Вакацуки! Ты видишь защитника базы?"
  - char: "wakatsuki_rad"
    side: "left"
    text:
      - "Д-да, я отчетливо вижу цель! Эм-м, похоже, это судно типа Тестер!"
  - char: "sakawa"
    side: "right"
    text:
      - "Модель Тестер? Обычно они не славятся своими боевыми возможностями, но интересно, какие параметры у этой... Пойдем и выясним!"
      - "Болтать, конечно, весело, но у нас тут есть работа~!"

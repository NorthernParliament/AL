chapter1:
  rows:
  - char: "haruna"
    side: "left"
    text:
      - "Ого, и Акаги, и Микаса уже успели захватить по базе стоимостью в 5 очков?"
  - char: "nagato"
    side: "right"
    text:
      - "Да... Единственное место, которое на данный момент не захвачено — это Священная Сакура... В отличие от меня, Микаса по-прежнему не выказывает ни капли колебаний..."
  - char: "haruna"
    side: "left"
    text:
      - "Что случилось, Нагато?"
  - char: "nagato"
    side: "right"
    text:
      - "Ничего. Нам уже удалось заставить Сакаву и Вакацуки отступить."
      - "Мы тоже не можем позволить себе отставать. Давайте захватим Священную Сакуру на этом ходу."
  - char: "hiei"
    side: "left"
    text:
      - "Поняла. По какой-то причине моя боевая эффективность, кажется, улучшилась после подвигов моей сестры."
  - char: "nagato"
    side: "right"
    text:
      - "Этот домен продолжает работать загадочным образом. Любопытно."
  - char: "shoukaku"
    side: "left"
    text:
      - "Те две девочки, может, и отступили на время, но разве нет вероятности, что они снова нападут на ходу Мусаси?"
  - char: "nagato"
    side: "right"
    text:
      - "Если тебя это беспокоит, я сама буду следить за ситуацией. Возьми с собой серийные корабли, чтобы не быть застигнутой врасплох."
      - "После того как мы займём Священную Сакуру, для Мусаси больше не будет никакой выгоды атаковать этот сектор."
      - "Если же она всё равно захочет испытать меня после этого, она убедится, что мне не занимать решимости."
      - "Харуцуки, я хочу, чтобы ты направилась к центральной башне и следила за ситуацией с Акаги и Микасой. Кавакадзэ прикроет тебя."
      - "Сёкаку, Хиэй и Харуна — вы втроём двинетесь на юг и захватите базы вдоль периметра."
      - "Мусаси, надеюсь, ты прекратишь то, что пытаешься сделать... по крайней мере, пока все мы, участники, остаёмся в неведении относительно истинной цели этой игры..."
      - "Если мы надеемся достичь победы без боя, нам нужно захватить как можно больше баз, пока у нас ещё есть возможность."
      - "Я должна прозреть сквозь её слова и понять, что у неё на уме... В этом моя цель здесь!"

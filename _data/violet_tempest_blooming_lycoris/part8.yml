chapter1:
  rows:
  - char: "wakatsuki"
    side: "left"
    text:
      - "Я... я прорвусь! С-секретная техника стиля Вакацуки — Торнадо парных клинков!"
  - text:
      - "БАБАХ!!!"
      - "Вакацуки взмахнула своей единственной катаной с той самой решимостью, какая потребовалась, чтобы дать название её секретной технике."
      - "Её тело превратилось в размытую вспышку синего света, обрушивая на судно Тестера шквал ударов, словно она и впрямь орудовала двумя мечами."
      - "Судно Сирен пошатнулось, будто ошеломлённое как свирепостью атаки, так и её полной неожиданностью."
  - char: "sakawa"
    side: "left"
    text:
      - "Ч-что это, чёрт возьми, БЫЛО, Вакацуки?!"
      - "Ты скрывала это от нас всё это время?! Нам больше никогда не придётся беспокоиться о Сиренах, если ты сможешь вытворять такое каждый день!"
  - char: "wakatsuki"
    side: "right"
    text:
      - "Эм... Я и сама не знаю, как это вышло... Я просто знала, что должна победить врага, и думала о шоу, которое смотрела на днях..."
      - "Это и имела в виду Мусаси, когда говорила, что это место может «отражать ментальное состояние»?"
  - char: "chitose"
    side: "left"
    text:
      - "Значит, эм... Ты думала о том, чтобы одолеть врага особым приёмом?.. М-можешь и меня научить чему-то подобному?.."
  - char: "wakatsuki"
    side: "right"
    text:
      - "Ну... У меня в голове был образ того, что именно я хочу сделать...."
      - "А потом я замахнулась катаной и, прежде чем осознала это, уже наносила удар за ударом по врагу..."
  - char: "chitose"
    side: "left"
    text:
      - "Ого... Хотела бы и я придумать для себя какой-нибудь спецприём..."
  - char: "chiyoda"
    side: "right"
    text:
      - "Тебе не нужно об этом переживать, сестрёнка!"
  - char: "sakawa"
    side: "left"
    text:
      - "Хм? Ты придумала что-то стоящее?"
  - char: "chiyoda"
    side: "right"
    text:
      - "Это может показаться очевидным, но мы ведь всегда отлично работали в команде, верно? В следующий раз давайте попробуем провести совместную комбо-атаку и посмотрим, что получится!"
  - char: "chitose"
    side: "left"
    text:
      - "Та последняя атака ощущалась гораздо мощнее, чем обычно... Мы даже не попали всеми снарядами, но разница уже заметна..."
  - char: "chiyoda"
    side: "right"
    text:
      - "Сакава, ты тоже должна придумать какой-нибудь спецприем! Другого шанса сделать что-то настолько крутое у нас может и не быть!"
  - char: "sakawa"
    side: "left"
    text:
      - "И то верно... В таком случае позвольте продемонстрировать мой «Разрез, изгоняющий демонов» — ослепительное проявление мастерства меча, которое ничуть не меркнет перед техникой Вакацуки."
      - "Стоп, погодите секунду... Мне не стоит тратить свой главный козырь прямо здесь и сейчас."
      - "Кстати, а как нам вообще активировать наши особые способности? Мы должны выкрикивать их названия или типа того?"
  - char: "wakatsuki"
    side: "right"
    text:
      - "Полагаю, что нет, но выкрикивание названия должно помочь сформировать в уме более четкий образ способности."
  - char: "sakawa"
    side: "left"
    text:
      - "Логично. Тиёде и Титосэ не пришлось ничего выкрикивать."
  - char: "chiyoda"
    side: "right"
    text:
      - "Эй, мы ведь и не пытались придумать какую-то особую технику? Мы с Титосэ работаем синхронно, так что у нас уже есть мысленный образ того, как мы хотим сражаться друг с другом."
  - char: "sakawa"
    side: "left"
    text:
      - "Спасибо за совет. Буду иметь в виду!"
  - char: "suzutsuki"
    side: "right"
    text:
      - "Погодите, Тестер ведь всё ещё не побеждена, верно? Мы слишком увлеклись моментом!"
  - text:
      - "Когда все обернулись, Вакацуки, которая только что нанесла сокрушительный удар по судну Тестера, нигде не было. Вместо этого..."
      - "Её место в авангарде флота заняла Сузуцуки, а кольцо света под её ногами символизировало использование особой команды."
  - char: "suzutsuki"
    side: "right"
    text:
      - "Ого-го, как это я здесь внезапно оказалась?"
      - "Я-то гадала, куда подевалась Вакацуки, а оказывается, мы поменялись местами!"
  - char: "sakawa"
    side: "left"
    text:
      - "Может, Мусаси испугалась, что Вакацуки получит слишком серьезные повреждения, и заменила её на Судзуцуки."
  - char: "suzutsuki"
    side: "right"
    text:
      - "Я не против. Я как раз искала возможность тоже опробовать свою особую технику! Сузуцуки, сеющая смятение! Несравненный Танец Клинков!"
      - "А ещё я обожаю, когда есть воздушные цели, по которым можно пострелять. К счастью, у этой Сирены куча парящих пушек, так что я действительно могу похвастаться своей меткостью! Жаль только, что враг всего один..."
      - "Ну, пока я занимаюсь тем, что умею лучше всего, я довольна как слон!"
      - "Теперь, когда я здесь, на вашей стороне сила сотни кораблей! Вакацуки, я принимаю твою эстафету!"

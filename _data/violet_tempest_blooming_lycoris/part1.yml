chapter1:
  rows:
  - text:
      - "В Святилище Империи Сакуры наследница великой силы пребывала в комфорте и роскоши."
      - "В пагоде, тянущейся к самым небесам, темноволосая женщина положила руку на перила, глядя на море облаков внизу."
      - "Первые лучи утреннего света пробились сквозь облака, оставив тонкую тень на деревянных половицах."
  - char: "musashi???"
    side: "left"
    text:
      - "Грядёт шторм..."
  - text:
      - "На горизонте сгущались зловещие тучи. В этом замершем, безмолвном мире ни ветер не касался её щеки, ни пение птиц не достигало её ушей."
  - char: "musashi???"
    side: "left"
    text:
      - "Мир внутри этого барьера не пострадает... но боюсь, цветы снаружи будут сорваны со своих ветвей."
  - text:
      - "Увы, сейчас было не время предаваться сантиментам. Как раз в тот момент, когда она собиралась развернуться и уйти внутрь, до неё донёсся крик одинокой, потерявшейся птицы."
  - char: "musashi???"
    side: "left"
    text:
      - "Ласточка? Должно быть, ищет убежище."
  - text:
      - "Она протянула руку к ласточке, и хрупкое создание спустилось, усевшись ей на палец."
  - char: "musashi???"
    side: "left"
    text:
      - "Если ты прилетела сюда в поисках крова, боюсь, ты совершила ошибку."
      - "Смена времён года рождает штормы — солнечный свет может обернуться дождём в мгновение ока. Тот, кто бежит с места на место без плана, долго не протянет."
      - "Барьер, окружающий эту пагоду, защищает лишь сильных. Он сбережёт меня, но не принесёт спасения тебе."
  - text:
      - "Её слова не имели смысла для ласточки, и всё же та кивнула, будто всё поняла."
  - char: "musashi???"
    side: "left"
    text:
      - "«Моё время пришло. О Небеса, услышьте мой обет. Когда я восстану, все склонятся предо мной»."
  - char: "nop"
    side: "right"
    status: "is-purple"
    text:
      - "Я аплодирую твоей поэзии, Мусаси. Должна, однако, заметить, что стихи звучат несколько зловеще."
  - text:
      - "Мусаси — линкор типа «Ямато», ныне занимающая пост флагмана Объединённого флота, — обернулась."
      - "Хотя она должна была находиться здесь в полном одиночестве, совсем рядом с ней раздался голос."
  - char: "musashi"
    side: "left"
    text:
      - "В них нет иного смысла, кроме того образа, что они рисуют. Но важнее другое — наши гости уже прибыли?"
  - char: "nop"
    side: "right"
    status: "is-purple"
    text:
      - "Да. Они ждут за пределами барьера, так что предлагаю переходить к следующему этапу. кхе-кхе..."
  - char: "musashi"
    side: "left"
    text:
      - "Разумеется."
  - text:
      - "На верхний этаж пагоды вновь вернулась тишина. Мусаси вытянула руку и слегка качнула пальцем, отпуская ласточку."
      - "*тук-тук*"
  - char: "sakawa"
    side: "left"
    text:
      - "Я с докладом! Акаги и её группа прибыли к границе барьера. Вакацуки сопровождает их."
  - char: "musashi"
    side: "right"
    text:
      - "Хорошо. Ступай в приемную. Я скоро буду."
  - char: "sakawa"
    side: "left"
    text:
      - "Слушаюсь!"
  - char: "musashi"
    side: "right"
    text:
      - "......"
      - "Значит, ты прибыла первой, Акаги."
      - "Барьер не защитит слабых от шторма..."
      - "А раз так — я сама защищу тебя. Хи-хи."

chapter1:
  rows:
  - char: "nagato"
    side: "left"
    text:
      - "Ты ведь присудишь мне ещё одно очко за захват контроля над этой базой, не так ли?"
  - char: "musashi"
    side: "right"
    text:
      - "Даже несмотря на помехи от морского тумана, ты всё же воспользовалась ситуацией, чтобы укрепить свою оборону и одновременно захватить близлежащие базы. Впечатляющая работа."
  - char: "nagato"
    side: "left"
    text:
      - "Только авианосцы способны эффективно действовать в таких условиях. Мне пришлось маневрировать соответствующим образом."
  - char: "musashi"
    side: "right"
    text:
      - "Ты защитила своих друзей и расширила своё влияние. Твой дух достоин похвалы."
      - "Но твоя ошибка была в том, что ты не захватила все базы, прилегающие к моей территории. Если ты хотела помешать мне добраться до Священной Сакуры, тебе следовало убедиться, что в твоём обзоре нет слепых зон."
      - "В тумане проскользнуть мимо нескольких патрульных кораблей — пустяковое дело."
  - char: "nagato"
    side: "left"
    text:
      - "Разве твои силы не заняты защитниками Дворца Дракона?"
      - "Неужели ты планируешь оставить этот план и двинуться маршем прямиком к моей территории?"
  - char: "musashi"
    side: "right"
    text:
      - "Верное наблюдение. Мой флот будет скован до тех пор, пока Дворец Дракона не будет взят."
  - char: "mikasa"
    side: "left"
    text:
      - "Если только ты изначально не планировала его брать, верно?"
      - "Ты планировала отдать эти узлы Акаги, но она не принимает твоё предложение."
      - "К слову об Акаги, я не могу понять, зачем ей захватывать базы, ближайшие к твоей территории, в первую очередь. Разве вы две не должны работать сообща?"
  - char: "akagi"
    side: "right"
    text:
      - "Я не припомню, чтобы когда-либо соглашалась на союз с Мусаси, Микаса."
      - "Единственное, что имеет значение в этой игре — это победа; друзья и враги лишь меняют динамику того, как этой победы достичь."
      - "Я вижу, что ты маневрируешь, пытаясь сдержать меня, но мне нет смысла идти у тебя на поводу."
  - char: "mikasa"
    side: "left"
    text:
      - "Это один из взглядов на ситуацию. Мы могли бы уладить наши разногласия иным способом, но ты предпочла напустить этот туман, чтобы скрыть свои ходы от меня."
      - "Разве это не доказывает, что ты мне не доверяешь?"
  - char: "akagi"
    side: "right"
    text:
      - "Кто знает? Я уверена, что именно ты уже понимаешь, чего я пытаюсь достичь, вне зависимости от того, видишь ли ты мои действия."
      - "Я скажу это ещё раз — я добьюсь победы теми средствами, которые сочту уместными."
  - char: "musashi"
    side: "left"
    text:
      - "Как видишь, Микаса, у Акаги достаточно решимости, чтобы вести Империю Сакуры сквозь ливни и бури."
      - "Её не заботит, если она терпит неудачи или унижения, она продолжает идти вперёд несмотря ни на что. Этот дух достоин подражания."
  - char: "nagato"
    side: "right"
    text:
      - "Какова истинная причина, по которой ты это делаешь, Мусаси?"
  - char: "musashi"
    side: "left"
    text:
      - "Хотя победа зависит от того, кто наберёт больше очков к финалу, нет такого правила, которое запрещало бы вашим вассалам сражаться напрямую."
      - "Когда кансен сталкиваются, используя всю полноту своей душевной стойкости и воли, обретшей форму, — мы на самом деле становимся свидетелями состязания в мужестве и решимости."
      - "Точно так же, как желание Нагато защитить Сёкаку сделало ту сильнее, мой флот развил свои способности благодаря уверенности, которую я в них вселила."
  - text:
      - "По мере того как Судзуцуки и её союзницы осваивались со своими особыми техниками, судно Тестера было повержено в кратчайшие сроки, и вскоре Дворец Дракона пал под натиском сил Мусаси."
      - "Сакава и Вакацуки, освободившись от предыдущего боя, быстро направились к территории Нагато, как и приказала Мусаси."
  - char: "nagato"
    side: "left"
    text:
      - "Ух... Откуда взялись эти двое?"
      - "Эту зону защищают лишь Харуцуки и Кавакадзэ... Мусаси, неужели ты..."
      - "Собираешься заставить наших друзей сражаться друг с другом?!"
  - char: "musashi"
    side: "right"
    text:
      - "Заставить? Вряд ли. Это лишь естественное последствие того, что Акаги напустила морской туман, а ты решила раскрыть свои приказы всем нам."
  - char: "nagato"
    side: "left"
    text:
      - "Я не позволю тебе поступать по-своему!"
  - char: "musashi"
    side: "right"
    text:
      - "Что ж, попробуй. Покажи мне, на какую решимость способно дитя, ставшее хранительницей."

chapter1:
  rows:
  - text:
      - "Пока Микаса и Нагато завершали подготовку к штурму центральной башни..."
  - char: "haguro"
    side: "left"
    text:
      - "Мусаси до сих пор так ничего и не предприняла... Она что, вообще бросила командование?"
  - char: "kongou"
    side: "right"
    text:
      - "Это исключено — мы ведь о Мусаси говорим. Не может быть, чтобы у неё не было своих планов и амбиций."
  - char: "harutsuki"
    side: "left"
    text:
      - "Погодите, флот Мусаси начинает движение... в сторону центральной башни?"

chapter2:
  rows:
  - char: "chitose"
    side: "left"
    text:
      - "Нам поступили приказы от Мусаси: мы начинаем атаку на оболочку Арбитра у центральной башни."
  - char: "wakatsuki"
    side: "right"
    text:
      - "Я прикрою тебя, Титосэ!"
  - char: "chitose"
    side: "left"
    text:
      - "Тебе пришёл такой же приказ, Вакацуки?"
  - char: "wakatsuki"
    side: "right"
    text:
      - "Ага! Но, честно говоря, я уже словила кучу повреждений, так что не знаю, насколько смогу помочь. А ты как держишься?"
  - char: "chitose"
    side: "left"
    text:
      - "В прошлой атаке я потеряла кучу самолетов... Не уверена, что с тем, что у меня осталось, я смогу хоть что-то сделать этому Арбитру..."
  - char: "wakatsuki"
    side: "right"
    text:
      - "Похоже, это наш последний приказ... Но у меня было еще одно заветное желание здесь, и, кажется, мне как раз представится возможность его исполнить!"
  - char: "chitose"
    side: "left"
    text:
      - "М-м, да... Мне тоже было очень весело... Рада хотя бы тому, что скоро увижу Тиёду..."
      - "Может, когда вернемся, перекусим какими-нибудь сладостями... и досмотрим, чем закончится эта игра..."
  - char: "wakatsuki"
    side: "right"
    text:
      - "Если ты ищешь сладости, то у Мусаси в комнате отдыха припрятаны целые горы! Я как раз думала: если вылечу первой, то пойду и приготовлю для всех угощения."
      - "В конце концов, сладостями лучше всего наслаждаться с подругами! Ох, лишь бы только Пуки не стащил их все до нашего прихода!"
  - char: "chitose"
    side: "left"
    text:
      - "Тогда, эм... Давай вернемся в комнату отдыха как можно скорее!"
  - char: "hermit"
    side: "right"
    status: "is-red"
    text:
      - "......"
  - text:
      - "БАБАХ!!!"
      - "И на этом Вакацуки и Титосэ бесследно исчезли."
      - "В то же самое время..."
  - char: "sakawa"
    side: "left"
    text:
      - "Прости, Кага. Похоже, сегодня я отыграю роль злодейки до самого конца."
  - char: "kaga"
    side: "right"
    text:
      - "Делай что должна. Акаги наверняка предвидела и это."
  - char: "sakawa"
    side: "left"
    text:
      - "Ась? Ты что, даже не попытаешься сбежать?"
  - char: "kaga"
    side: "right"
    text:
      - "Акаги уже заставила Микасу воспользоваться той «лазейкой», которую она ей оставила. Теперь остается только одно..."
  - text:
      - "БАБАХ!!!"
      - "Сакава разрядила свои орудия прямо в Кагу, но та даже не шелохнулась. Внезапно её оснастка вспыхнула бледно-голубым пламенем."
      - "Кага продолжала стоять на месте, безропотно принимая на себя удары как сил Арбитра, так и Сакавы. Затем она медленно подняла окутанную пламенем руку."
      - "Призрачные, пляшущие языки огня начали сгущаться, обретая форму исполинского, потустороннего духа-лиса."
  - char: "sakawa_rad"
    side: "left"
    text:
      - "Ха? Че-е-е-его-о-о?! К-Кага, это еще что за чертовщина?!"
  - char: "kaga"
    side: "right"
    text:
      - "Мой синигами, Девятихвостый Лис. Изначально я разрабатывала эту технику против Серого Призрака, но, похоже, благодаря эффектам этого домена я способна пробудить её уже сейчас."
  - text:
      - "Вырвавшийся на волю синигами взревел. Силуэт Каги растворился в самом его сердце, пока чудовище выжигало всю округу синим пламенем."
  - char: "nagato"
    side: "left"
    text:
      - "Сакава выбыла? И это синее пламя... Дело рук Каги?!"
  - char: "kongou"
    side: "right"
    text:
      - "Похоже на то. С поражением Сакавы все оставшиеся силы Мусаси были полностью уничтожены."
      - "С её выбыванием очки, которые она удерживала, снова стали нейтральными. Если Акаги захватит их, она сравняется с тобой по счету даже без учета центральной башни."
  - char: "nagato"
    side: "left"
    text:
      - "Угх... Но это не меняет нашей стратегии. Если Акаги захватит центральную башню, мы проиграем в любом случае. Всё это значит лишь то, что вариант с затягиванием времени больше не сработает!"
  - char: "mikasa"
    side: "right"
    text:
      - "Мусаси больше не сможет вмешаться на стороне Акаги. Иными словами, у Акаги не осталось права на ошибку."
  - char: "nagato"
    side: "left"
    text:
      - "Верно. Она не сможет занять оставленные Мусаси базы, не отказавшись при этом от центральной башни. Но и мы не можем позволить себе ослабить натиск."
      - "Если Акаги возьмет центральную башню, пока мы заняты захватом баз Мусаси, наши силы окажутся рассредоточены, и нас перебьют поодиночке."
      - "Мы должны поставить всё на то, сможем ли мы захватить башню нашей следующей атакой!"
  - char: "haguro"
    side: "right"
    text:
      - "Да уж. К тому же, если мы попытаемся пойти в обход, то просто наткнемся на Кагу. А я ОЧЕНЬ не хочу иметь дело с этой её «зверушкой»."
  - char: "mikasa"
    side: "left"
    text:
      - "Этот лис и меня застал совершенно врасплох."
  - char: "kaga_rad"
    side: "right"
    text:
      - "Это материализация моей воли... Я с радостью сожгу собственную жизнь, лишь бы расчистить путь для моей сестры."
  - char: "mikasa"
    side: "left"
    text:
      - "Значит, несмотря на то что сама Кага выведена из строя, её синигами всё ещё остаётся на поле боя?"
  - char: "kaga_rad"
    side: "right"
    text:
      - "Да... И теперь, чем ближе Акаги к тому, чтобы снова остаться в полном одиночестве, тем ближе она к тому, чтобы заставить всех услышать свои истинные чувства."
  - char: "mikasa"
    side: "left"
    text:
      - "Чем ближе к одиночеству? Значит, в действиях Мусаси всё-таки был определенный умысел..."
      - "Погодите, неужели Акаги таким образом пытается сказать: «не втягивайте сюда никого больше»? Чем меньше союзников у неё остаётся, тем сильнее она способна проявить свою подлинную мощь..."
      - "Это правда, что данный домен ограничил силу нашей оснастки."
      - "Тебя ведь с самого начала не интересовало сотрудничество со мной и Нагато ради уничтожения центральной башни..."
      - "Акаги, у тебя ведь припрятан козырь, позволяющий взять эту башню в одиночку, не так ли?"
  - char: "akagi"
    side: "right"
    text:
      - "Наконец-то ты догадалась, Великий Ветеран."
      - "Теперь я вижу, что намерения Мусаси были предельно ясны с самого начала. Иногда вещи оказываются именно такими, какими кажутся."
      - "Я решила атаковать центральную башню в самом начале, чтобы заявить о собственных намерениях: если у нас общий враг, то сотрудничество для меня не является невозможным."
      - "Однако, если вы ждали, пока моя атака захлебнется, чтобы потом прилететь на всё готовенькое, то не думайте, будто я настолько мягкотелая, чтобы уступить победу кому-то другому."
  - char: "nagato"
    side: "left"
    text:
      - "Как ты планируешь одолеть Арбитра в одиночку? Только не говори мне, что ты..."
  - char: "akagi"
    side: "right"
    text:
      - "Смотрите в оба и наблюдайте за мной. Я очень долго этого ждала."
  - char: "kaga_rad"
    side: "left"
    text:
      - "Убеждения ничего не стоят без силы, способной их подкрепить. Бессильных не ждет ничего, кроме поражения, а их мечты будут стерты в порошок."
      - "Желание моей сестры — это и мое желание... И эта сила — та самая сила, с помощью которой она прорубит путь в будущее!"
      - "Если хотите одолеть её, вам сперва придется пройти через моего синигами!"
  - char: "nagato"
    side: "right"
    text:
      - "Акаги... Неужели ради силы ты готова пожертвовать абсолютно всем и каждым?!"
  - char: "akagi"
    side: "left"
    text:
      - "Ха-ха-ха... Дитя, ты ничего не знаешь о мире. С этим моя победа гарантирована!"
      - "А теперь узрите мои убеждения, путь, который я выбрала! Ветра, что унесут нас в наше будущее!"
      - "Хи-хи... Ахахахахаха!!"


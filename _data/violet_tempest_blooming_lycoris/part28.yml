chapter1:
  rows:
  - text:
      - "По мере того как из-за ожесточенных сражений игра покидало всё больше кораблей, море становилось всё более неспокойным, словно отражая тревогу участниц."
      - "Все ждали следующего приказа с замиранием сердца, ведь каждый новый ход всё меньше и меньше напоминал игру."
  - char: "akagi"
    side: "left"
    text:
      - "Так вот чего ты добивалась всё это время, Мусаси... Сокращала наше число."
  - char: "ryuuhou"
    side: "right"
    text:
      - "Ход Мусаси завершился, но я до сих пор не могу понять, зачем ей понадобилось вот так нападать на Миюки."
  - char: "kaga"
    side: "left"
    text:
      - "Это ведь всё часть её плана, не так ли?"
  - char: "akagi"
    side: "right"
    text:
      - "Думаю, да. Миюки в любом случае была отрезана от остальных сил, так что Мусаси, скорее всего, сочла её обузой."
  - char: "ryuuhou"
    side: "left"
    text:
      - "И что нам теперь делать? Без неё нам будет гораздо труднее следить за силами Нагато и Микасы, а значит, и контролировать центральную башню."
  - char: "akagi"
    side: "right"
    text:
      - "Мы объединим наши силы и продолжим подготовку к атаке на башню, как и прежде. Однако у меня есть для вас особое задание."
      - "Теперь, когда Мусаси раскрыла свои карты, в эту игру можно играть вдвоем."
      - "Рюхо, Кага, я хочу, чтобы вы две нанесли по башне дальний бомбовый удар."
  - char: "ryuuhou"
    side: "left"
    text:
      - "Погоди, но если мы это сделаем, то спровоцируем еще одну ударную волну... Разве Хатакадзэ всё еще не находится в зоне поражения башни?"
  - char: "akagi"
    side: "right"
    text:
      - "Именно. Не вступая в прямой бой с другими девушками-кораблями, мы сможем нанести урон башне и при этом обойти назойливую оборону Микасы и Нагато."
  - char: "yamashiro"
    side: "left"
    text:
      - "Да почему мы всё еще пытаемся атаковать собственных подруг? Я думала, мы объединим усилия, чтобы разнести эту башню в щепки!"
  - char: "akagi"
    side: "right"
    text:
      - "Я не говорила ничего, что противоречило бы этому. Просто сосредоточься на том, чтобы использовать это время для ремонта. Ты мне еще пригодишься позже."
  - char: "yamashiro"
    side: "left"
    text:
      - "Х-хорошо! Тогда я останусь здесь и подожду, пока идет ремонт!"
  - char: "ryuuhou"
    side: "right"
    text:
      - "Вот и славно, ты мне еще понадобишься позже, чтобы принимать удар на себя, так что смотри не вылети из игры!"
  - char: "yamashiro"
    side: "left"
    text:
      - "Ахаха... Не уверена, стоит ли считать это комплиментом, но я сделаю всё, что смогу!"
  - char: "akagi"
    side: "right"
    text:
      - "(Ни Нагато, ни Микаса не позволят тебе так просто добиться своего, Мусаси... Ну и что же ты предпримешь теперь?)"

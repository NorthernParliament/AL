chapter1:
  rows:
  - char: "yamashiro"
    side: "left"
    text:
      - "О-о-о-о-ой... Я готова была поклясться, что иду ко дну! У меня до сих пор голова идет кругом..."
  - char: "miyuki_rad"
    side: "right"
    text:
      - "Я-Ямасиро... Ты вообще стоять-то можешь?.."
  - char: "kaga"
    side: "left"
    text:
      - "Какое невероятное упорство. Неужели такова сила твоей решимости преодолеть любое невезение?"
  - char: "yamashiro"
    side: "right"
    text:
      - "Эхехе... Я сама не поняла, что произошло, но я просто без конца думала о том, что не хочу всех подвести! А потом мне вдруг перестало быть больно!"
      - "Погодите, ась? Нам что, не хватает людей? Куда делись Тиёда и Судзуцуки? И Кирисимы тоже больше нет?!"
  - char: "akagi"
    side: "left"
    text:
      - "Эта башня едва не прикончила вас четверых одним-единственным ударом. У меня всегда было предчувствие, что мы не сможем просто так подойти и захватить её, но подобного я никак не ожидала."
      - "Если оставить в стороне Мусаси, я вижу, что Нагато и Микаса тоже готовятся атаковать эту башню."
      - "Неужели они думают, что мы всё ещё можем действовать сообща? Или же они пытаются вырвать победу у меня из-под носа в самый последний момент? Впрочем, в конечном счёте это не имеет значения."
  - char: "ryuuhou"
    side: "right"
    text:
      - "Акаги, снова твой ход."
      - "После последней атаки башни волнения в этих водах усилились, и некоторым кораблям теперь труднее маневрировать."
  - char: "akagi"
    side: "left"
    text:
      - "Вот как... В то же время линкоры в таких условиях более устойчивы, что дает им весомое преимущество."
      - "Но мы едва ли похожи на старомодные посудины, которые швыряет по волнам как щепки. На наши планы это не повлияет."
  - char: "kaga"
    side: "right"
    text:
      - "Акаги, нам продолжать атаковать башню?"
  - char: "akagi"
    side: "left"
    text:
      - "Нет, нужно перегруппироваться и изучить эту башню более досконально. Очевидно, что обычными методами её не взять."
      - "Всем сначала вернуться в строй. Миюки, как обстановка на твоем участке?"
  - char: "miyuki_rad"
    side: "right"
    text:
      - "Я... я вижу, что серийные корабли активизировались! Мне продолжать наблюдать за ними и предупредить вас, если они направятся в вашу сторону?"
  - char: "akagi"
    side: "left"
    text:
      - "Очень хорошо. Рядом с силами Микасы ты будешь в большей безопасности. Я свяжусь с тобой позже, Миюки."
  - char: "miyuki_rad"
    side: "right"
    text:
      - "Поняла!"
  - char: "yamashiro"
    side: "left"
    text:
      - "Эм... А я могу чем-нибудь помочь?"
  - char: "akagi"
    side: "right"
    text:
      - "Ты сейчас не в том состоянии, чтобы сражаться, так что тебе лучше вернуться назад. Попробуй захватить те базы по периметру, которые мы пропустили, и посмотри, не найдутся ли там припасы для аварийного ремонта."
  - char: "yamashiro"
    side: "left"
    text:
      - "Х-хорошо, большое спасибо! Но ух, та атака башни — это было нечто!"
  - char: "akagi"
    side: "right"
    text:
      - "Рюхо, иди вместе с Ямасиро и прикрывай её, пока она не подлатает себя."
  - char: "ryuuhou"
    side: "left"
    text:
      - "Есть! Я уже какое-то время толком не участвовала в бою, так что вернуться назад и захватить пару баз будет неплохой сменой обстановки."

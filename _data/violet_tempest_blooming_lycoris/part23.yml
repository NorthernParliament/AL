chapter1:
  rows:
  - text:
      - "Когда наступил ход Мусаси, Сакава, всё еще находившаяся рядом с флотом Нагато, внезапно обнаружила, что её окружили фиолетовые бабочки."
  - char: "haguro"
    side: "left"
    text:
      - "Что она планирует делать на этот раз...?"
  - char: "sakawa"
    side: "right"
    text:
      - "Похоже, теперь я направляюсь к башне. Эти бабочки, кажется, чинят мою оснастку и делают сильнее."
      - "Госпожа Нагато, думаю, вы отлично донесли свою мысль! Надеюсь, нам больше не придется сражаться!"
      - "Мне просто было любопытно, зачем нам вообще нужно было проходить через столько трудностей. Я думала, за большую базу в 10 очков в самом центре развернется куда более серьезная борьба!"
  - text:
      - "Сакава посмотрела на внушительную башню посреди зоны учений. Акаги уже пыталась разведать её ранее, но волны Сирен сильно затрудняли любое движение в этом секторе."
      - "Один за другим корабли четырех флотов начали прибывать к башне."
  - char: "suzutsuki"
    side: "left"
    text:
      - "Эта зловещая красная аура выглядела жутковато и издалека, но вблизи эта штука кажется почти живой!"
  - char: "chiyoda"
    side: "right"
    text:
      - "Ух, пожалуйста, не говори так. То, как мерцает этот свет, делает её похожей на то, будто она дышит..."
  - char: "wakatsuki_rad"
    side: "left"
    text:
      - "Остальные четыре объекта здесь были одними из самых священных мест Империи Сакуры... Так почему же это сооружение Сирен возвышается в самом центре всего этого пространства?"
  - char: "sakawa"
    side: "right"
    text:
      - "Вы помните, как слышали от Акаги и Командира, что во время восстания Железной Крови им тоже пришлось уничтожить какую-то башню?"
      - "Как думаете, эта башня представляет собой какую-то высшую форму Сирен?"
  - char: "chiyoda"
    side: "left"
    text:
      - "Насколько «высшей» она может быть, если потеряла способность передвигаться? Титосэ, давай разнесем эту штуку, только мы вдвоем!"
  - char: "chitose"
    side: "right"
    text:
      - "Х-хорошо...! Эм, а еще я придумала название для нашей комбо-атаки... П-Перьевой шторм!"
  - char: "sakawa"
    side: "left"
    text:
      - "Неужели все хвастаются особыми техниками, которые они здесь развили? Что ж, у меня нет другого выбора, кроме как самой присоединиться к веселью..."
      - "Кхм! ...Я та, кто пронзает лазурные волны, наследница клинка Ракшасы! Истинный Рассекающий Удар Демона!"
  - text:
      - "Сакава и Вакацуки одновременно высвободили клинки света из своего снаряжения, и пульсирующие сгустки энергии увеличились в несколько раз по сравнению с первоначальным размером, устремившись прямо к башне."
      - "Комбинированная атака Титосэ и Тиёды также нанесла прямой удар по основанию башни, после чего быстро поднялся столб пламени и дыма."
      - "Но в то же мгновение башня в ответ обрушила на девушек-кораблей почти неосязаемую ударную волну."
  - char: "kirishima"
    side: "left"
    text:
      - "Она поглотила наши атаки, совсем как в прошлый раз... Вот только теперь ударные волны кажутся сильнее, пропорционально мощи наших ударов."
  - char: "kongou"
    side: "right"
    text:
      - "Но это сложно назвать полноценной «контратакой» — этого едва хватает, чтобы всколыхнуть воду. Не может быть, чтобы это было всё, на что способна эта башня."
  - char: "kinu"
    side: "left"
    text:
      - "Погодите, с башней сейчас что-то не так. Вы видите изменения в узоре исходящего от неё света?"
  - char: "kirishima"
    side: "right"
    text:
      - "Ты права, всё уже не так, как прежде. Думаете, она реагирует на атаки, которые мы только что по ней нанесли?"
  - char: "hatakaze"
    side: "left"
    text:
      - "Пока рано судить... Но если она похожа на ту башню, с которой Командир столкнулся во время той битвы, внутри может спать нечто крайне скверное."
  - char: "kongou"
    side: "right"
    text:
      - "Да такие слабые ударные волны на нас даже царапины не оставят!"
  - text:
      - "Однако в тот самый миг, когда флот Мусаси прекратил атаку, из самой вершины башни вырвалась ослепительная вспышка, с яростной силой пронесшаяся по всему домену."
  - char: "haguro"
    side: "left"
    text:
      - "Ч-что это, чёрт возьми, такое было?! Башня контратакует уже вовсю?"
  - char: "kongou"
    side: "right"
    text:
      - "Проклятье, я поторопилась с выводами... Берегись, все! С этой башней что-то абсолютно не так!"

chapter2:
  rows:
  - text:
      - "Когда девушки-корабли пришли в себя после очередной ударной волны, они быстро заметили, что Кирисима, Судзуцуки, Тиёда и Ямасиро бесследно исчезли. Вместо них появились Сирены."
  - char: "hermit"
    side: "right"
    status: "is-red"
    text:
      - "......"
  - char: "kongou"
    side: "left"
    text:
      - "Кирисиму... вынесло одним ударом?!"
  - char: "mikasa"
    side: "right"
    text:
      - "Полагаю, первый импульс был лишь предупредительным выстрелом... Похоже, эта башня возвращает обратно всю энергию, которую мы в неё вкладываем, притом помноженную в несколько раз..."
      - "Неужели Командиру тоже пришлось сражаться против подобного врага, или же..."
  - char: "hatakaze"
    side: "left"
    text:
      - "Три вассала Мусаси были выведены из строя одним ударом... Их больше даже нет в этом домене."
      - "Если Мусаси сама создала это место, разве она не должна была четко знать, с чем имеет дело? Зачем же она тогда так бессмысленно растратила собственные силы?"
  - char: "haguro"
    side: "right"
    text:
      - "В-Великий Ветеран, посмотрите туда, на эту Сирену..."
  - char: "mikasa"
    side: "left"
    text:
      - "Арбитр, что появился в Северной Атлантике..."
  - char: "nagato"
    side: "right"
    text:
      - "Должно быть, это лишь оболочка..."
  - char: "shoukaku"
    side: "left"
    text:
      - "Вот оно как. Я наслышана о подвигах Командира в Северной Атлантике, но, похоже, эти башни охраняются Арбитрами..."
  - char: "akagi"
    side: "right"
    text:
      - "Так вот какой сюрприз ты для нас приготовила, Мусаси?"
      - "Должна признать, я впечатлена. Как тебе удалось раздобыть данные об Арбитре и даже воссоздать для него оболочку?"
      - "Сёкаку, ты ведь тоже помнишь эту Сирену, не так ли? Мы мельком столкнулись с ней в самом сердце Северной Атлантики."
      - "Я не прощу ей того, что она сделала... Создать столь омерзительное подобие Амаги..."
      - "Ха-ха-ха... Ха-ха-ха-ха-ха!.. Даже если ты не более чем пустая оболочка, я заставлю тебя заплатить!"
      - "Раз уж ради этого меня сюда пригласили, то я подыграю тебе, Мусаси!"


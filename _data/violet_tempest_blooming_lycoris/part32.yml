chapter1:
  rows:
  - char: "kinu"
    side: "left"
    text:
      - "Стало темно хоть глаз выколи... М-да, погода здесь такая же непредсказуемая, как и в любом Зеркальном море."
  - char: "haguro"
    side: "right"
    text:
      - "Но зрелище всё равно впечатляющее... почти как полное затмение."
  - char: "kongou"
    side: "left"
    text:
      - "Какое странное место. Погодные условия здесь выглядят и ощущаются как самые что ни на есть настоящие."
      - "И если они порождены нашими ментальными образами, то что это говорит о том, что сейчас чувствуют все собравшиеся?"
  - char: "mikasa"
    side: "right"
    text:
      - "Теперь, когда ты упомянула об этом... Я была так поглощена попытками разгадать мотивы Мусаси, что совершенно упустила этот факт из виду."
      - "(Полные затмения испокон веков были символами суеверий, страха и великих потрясений.)"
      - "(Учитывая действия Мусаси, а также зловещую природу башни, мне и в голову не пришло, насколько сильно нас захлестнуло всё то, что происходило вокруг.)"
      - "(...Как я могла забыть? Мусаси ведь говорила, что эта зона учений — модифицированное Зеркальное море, верно?)"
      - "Всем постараться успокоиться. Мы не должны позволить страху и тревоге взять верх над нами."
  - char: "haguro"
    side: "left"
    text:
      - "Ты права, за последние несколько ходов обстановка накалилась до предела."
  - char: "mikasa"
    side: "right"
    text:
      - "Полагаю, после всего этого нам придется лично нанести визит Мусаси и поблагодарить её за столь убедительное представление. Ха-ха-ха!"
  - char: "kongou"
    side: "left"
    text:
      - "Теперь, когда видимость стала скверной, мне трудно разобрать, летят ли на нас вражеские самолеты. Как думаешь, мы в безопасности на таком расстоянии?"
  - char: "mikasa"
    side: "right"
    text:
      - "Это важный момент, который стоит учесть. Однако наступательный потенциал Титосэ был во многом подорван с потерей Тиёды, а Акаги, похоже, снова пытается захватить центральную башню."
      - "Тот факт, что за Мусаси остается последний ход, доставляет немало хлопот... Мы до сих пор понятия не имеем, чего она добивается."
  - char: "nagato_rad"
    side: "left"
    text:
      - "Что ты планируешь делать дальше, Микаса?"
  - char: "mikasa"
    side: "right"
    text:
      - "Я всё еще перегруппировываюсь после прошлой атаки, так что давай разберем наши варианты."
      - "Прежде всего, я рассчитывала, что у нас будет чуть больше времени. Но теперь, когда Акаги бросила все свои силы на захват башни, маловероятно, что мы увидим какие-то атаки с её стороны."
      - "Мусаси уже не сможет обойти Нагато по очкам, даже если захватит башню, а это значит, что единственной соперницей остается Акаги."
      - "Вполне логично, что она готова задействовать абсолютно все ресурсы, чтобы взять эту башню любой ценой."
      - "Однако, поступая так, она развязывает руки нам с Нагато, и мы можем делать всё, что пожелаем."
      - "Если я смогу создать достаточно препятствий, чтобы помешать Акаги захватить башню, победа Нагато будет гарантирована."
      - "Как и всегда, самым важным непредсказуемым фактором остается решение Мусаси."
      - "Она так и не явилась на поле боя лично даже в одиннадцатом часу, и никто из нас больше не может расспросить её о мотивах."
      - "Дело в том, что каждая потерянная нами соратница лишь усложняет захват центральной башни для кого бы то ни было — если только здесь не замешан какой-то другой фактор, о котором я не знаю."
      - "Что бы она ни замышляла, Нагато, нам нужно занять такие позиции, чтобы максимально ограничить её в возможных ходах."
  - char: "nagato_rad"
    side: "left"
    text:
      - "Мм. Это было бы разумно."
  - char: "mikasa"
    side: "right"
    text:
      - "Кину и Хагуро, забирайте серийные корабли и захватите последнюю свободную базу."
      - "Кавакадзэ, Сёкаку, продолжайте делать то же, что и раньше. Я хочу, чтобы мы были на пике своей боеспособности, прежде чем снова выдвинемся к центральной башне."
      - "Всё это вообще не должно было зайти так далеко. Мне бы хотелось, чтобы Мусаси предоставила свои силы для совместной атаки на башню."
      - "Но теперь это невозможно. Нам нужно развернуть наши корабли так, чтобы не дать ей вмешаться в финальную битву."
      - "Харуна, Хиэй, я хочу, чтобы вы две зашли с фланга на территорию Мусаси — так мы обеспечим себе как можно больше углов для атаки."
  - char: "nagato_rad"
    side: "left"
    text:
      - "Кирисима выбыла от одной-единственной ударной волны этой башни. Нам нужно оставить себе как можно больше пространства для маневра и отступления."
      - "Три оставшиеся сестры класса «Конго» всё еще невредимы, и если мы объединим всё, что знаем об этой башне, в четкий ментальный образ..."
      - "Мы, возможно, сумеем перекрыть дальность контратаки башни всей мощью нашей огневой мощи."
  - char: "mikasa"
    side: "right"
    text:
      - "Согласна. Конго и её сестры стабильно показывали отличные результаты в этих меняющихся условиях."
      - "Теперь последнее, что нам нужно учесть: как нам поступить с Мусаси, когда она явится на поле боя?"
      - "Честно говоря, не думаю, что у кого-то из нас, кроме Нагато, есть шанс нанести по ней чистый удар. Нам может прийтись несладко, даже если мы будем просто пытаться уклоняться от её атак."
      - "Единственная альтернативная контрмера — вывести из строя всех её вассалов до того, как у неё появится возможность вступить в игру."
      - "В таком случае Мусаси будет немедленно дисквалифицирована."
      - "Знаю, тебе не по душе такой метод, Нагато, но это самый верный путь к победе."
  - char: "nagato_rad"
    side: "left"
    text:
      - "Мм. Я уже говорила: я не стану наводить орудия на своих боевых подруг."
  - char: "mikasa"
    side: "right"
    text:
      - "Путь в тысячу миль начинается с первого шага. И вся вода в океане должна откуда-то брать свое начало..."
      - "Нагато, ты твердо стояла на своем всё это время, и мы вот-вот увидим плоды твоих убеждений."
      - "Контратаки башни могут доставить хлопот, но у нас всё еще достаточно сил, к тому же мы можем использовать серийные корабли, чтобы принять на себя часть урона."
      - "В идеале мы можем уничтожить башню за один ход. Но если не выйдет, мы всё равно будем готовы нанести повторный удар на следующем ходу."
      - "Пока мы контролируем окружающие воды, у Акаги останется лишь один путь для подхода, да и её самолеты против наземных целей будут не так эффективны, как наш артиллерийский обстрел."
      - "Я вложу всё до остатка в свою следующую атаку. А сам захват базы останется за тобой, Нагато."
      - "Давайте покажем Акаги, что будущее Империи Сакуры — это будущее, в котором все девушки-корабли трудятся плечом к плечу ради общей цели!"

chapter1:
  rows:
  - char: "shinano_rad"
    side: "left"
    text:
      - "Мусаси, я обнаружила ряд вызывающих беспокойство вещей, а потому направляю тебе это послание."
      - "В первый же день проведения Всемирной выставки я ощутила на месте проведения необычное присутствие."
      - "Я незамедлительно предупредила об этом Витторио Венето, и Сардинская Империя, судя по всему, тайно уладила эту проблему."
      - "Однако даже после этого у меня осталось смутное чувство неестественности происходящего, и это ощущение неправильности так и не исчезло."
      - "Я всё ещё расследую это дело, возможно, это всего лишь моё воображение."
      - "В последующие несколько дней на выставке царил полный мир. Все фракции строго соблюдали соглашение о прекращении огня, и никаких конфликтов не возникало."
      - "Сирены также не устраивали беспорядков — по заверению Сардинской Империи, во всей акватории Средиземного моря не было зафиксировано ни одного их нападения."
      - "Однако на шестой день Сирены совершили довольно странный налет на Королевские острова — не слишком мелкий, но и не слишком масштабный, нечто среднее между разведкой боем и полноценной атакой."
      - "Самое логичное предположение — это была месть Сирен за недавние действия Королевского флота в Северной Атлантике."
      - "Тем не менее, в этом инциденте есть три странности..."
      - "Во-первых, Королевский Флот вообще не принимал участия в операции по уничтожению основного сервера Компилятора."
      - "Во-вторых, после уничтожения сервера Компилятора контроль Сирен над Северной Атлантикой существенно ослаб, так что сам факт того, как им удалось организовать флот подобного масштаба, вызывает серьезные сомнения."
      - "В-третьих, это нападение, похоже, не стало неожиданностью для Королевства, поскольку Куин Элизабет заранее развернула внушительные силы флота, благодаря чему они не понесли серьезных потерь."
      - "Возможно, за этим скрывается какая-то иная тайна, я занимаюсь её расследованием."
      - "Но если это действительно был акт возмездия со стороны Сирен, то нам следует проявить предельную осторожность."
      - "Пожалуйста, будь начеку."
      - "Конец сообщения."

chapter1:
  rows:
  - char: "musashi"
    side: "left"
    text:
      - "Нагато, я не ожидала, что ты так скоро вступишь в бой."
      - "Подумать только, обычная проверка почвы вызвала столь резкий отпор... Пожалуй, я недооценила решимость этой девочки."
  - char: "mikasa"
    side: "right"
    text:
      - "А может и нет. Возможно, Нагато именно этого и хотела всё это время — стоять на передовой."
  - char: "akagi"
    side: "left"
    text:
      - "Она готова подставить себя под удар только ради того, чтобы предотвратить ненужный конфликт..."
      - "Из-за этого устаревшего эго она не видит общей картины. Её зацикленность на «защите» того, что ей дорого, вполне может привести к потере всего. Как глупо."
      - "В конце этого пути нет будущего, неважно, с борьбой или без неё."
  - char: "musashi"
    side: "right"
    text:
      - "Как бы то ни было, пожертвовав своим преимуществом «игрока» в этом матче, она добилась того, что её силы теперь значительно превосходят наши по боевой эффективности."
  - char: "akagi"
    side: "left"
    text:
      - "Значит, она настаивает на том, чтобы стоять на пути... Микаса, хватит ли у тебя сил не отставать от неё?"
  - char: "mikasa"
    side: "right"
    text:
      - "Не отставать? Ха, у меня нет ни энергии, ни решимости, которые есть у этой девочки. Максимум, что я могу — это заполнять пустоты за её спиной, пока она прокладывает новый путь вперёд."
      - "Теперь, когда баланс сил нарушен, не пора ли нам вернуться к захвату как можно большего количества баз вместо того, чтобы сражаться друг с другом?"
  - char: "akagi"
    side: "left"
    text:
      - "Возможно, ты права, говоря, что Нагато прокладывает новый путь вперёд."
      - "Но разве не на нас лежит обязанность определить, ведет ли этот путь к свету... или в бездну?"
      - "Как человек, ответственный за будущее Империи Сакуры, ты должна учитывать гораздо больше вещей, чем твоё собственное узкое чувство справедливости. Нельзя выносить суждения, основываясь лишь на догадках и предположениях."
  - char: "mikasa"
    side: "right"
    text:
      - "Я не могу отрицать того, что ты сделала для нас. Но в то же время работать с Сиренами слишком опасно."
      - "Командир не так давно сообщил мне об инциденте в Железной Крови. В отличие от нашего случая, Командир был вовлечен в их план в гораздо большей степени."
      - "К тому же и Бисмарк, и Фридрих разделяли одно и то же видение, несмотря на их разные пути... Вот почему в итоге они смогли завершить свой многолетний проект."
      - "Если бы Нагато и я могли понять путь, который выбрала ты, возможно, мы бы тоже смогли работать вместе ради общей цели."
      - "Но твоё сердце так же непроницаемо, как морской туман, скрывающий эту доску."
  - char: "akagi"
    side: "left"
    text:
      - "...Чтобы перехитрить Сирен, нужно сначала узнать вкус яда, который они подают."
  - char: "mikasa"
    side: "right"
    text:
      - "Акаги, ты..."
  - char: "akagi"
    side: "left"
    text:
      - "После успеха восстания Железной Крови Сирены стали гораздо бдительнее."
      - "Теперь, когда Нагато ясно дала понять свои намерения, я сокрушу её и продемонстрирую превосходство моего видения."
  - text:
      - "С заявлением Акаги ослепительный свет окутал и её саму, и доску, точно так же, как это было ранее с Нагато."

chapter2:
  rows:
  - text:
      - "Когда свет угас, у доски остались только двое."
  - char: "mikasa"
    side: "left"
    text:
      - "Она тоже хочет доказать свою правоту, да... Как и Нагато, она способна действовать только по-своему."
  - char: "musashi"
    side: "right"
    text:
      - "С вступлением Акаги в битву баланс сил снова восстановился."
      - "Скорее всего, она объединится с Миюки, чтобы отрезать тебя от сил Нагато."
      - "Теперь вопрос в том, попытается ли она поглотить твои базы или начнет атаку на центральную башню?"
  - char: "mikasa"
    side: "left"
    text:
      - "Её здесь больше нет, так что прочитать её намерения будет труднее."
      - "Похоже, молодежь слишком нетерпелива, чтобы продолжать нашу маленькую шахматную партию. Ха-ха-ха!"
  - char: "musashi"
    side: "right"
    text:
      - "Хе-хе. Уверена, ты и сама была не менее горяча во время той войны. Не так ли, Великий Ветеран?"
  - char: "mikasa"
    side: "left"
    text:
      - "Но это была совсем другая эпоха, Мусаси. Давным-давно, не правда ли?"
      - "Даже если бы я попыталась сорваться с места, как они, моё тело бы не двинулось. В конце концов, теперь на меня опираются люди."
      - "...Мусаси, будь со мной честна. Эта зона учений на самом деле — Зеркальное море, верно?"
  - char: "musashi"
    side: "right"
    text:
      - "С чего ты это взяла?"
  - char: "mikasa"
    side: "left"
    text:
      - "Воплощение ментальных образов, внезапное исчезновение Нагато и Акаги... Подобное невозможно осуществить одними лишь ритуалами Островов Сакуры."
  - char: "musashi"
    side: "right"
    text:
      - "Любопытно, а ты действительно знаешь всё, что только можно знать о наших ритуалах?"
  - char: "mikasa"
    side: "left"
    text:
      - "...Наверное, нет."
      - "Но именно поэтому я хочу знать. Прости, если это прозвучало как обвинение."
  - char: "musashi"
    side: "right"
    text:
      - "Нет, в этом нет нужды. Твои инстинкты тебя не подвели — это действительно Зеркальное море, доверенное Акаги Сиренами."
      - "Изначально это был экспериментальный полигон Сирен, которым никто из нас не мог пользоваться. Но объединив его с духовными барьерами, я смогла превратить его в тот домен, который ты видишь сейчас."
  - char: "mikasa"
    side: "left"
    text:
      - "Даже не знаю, то ли совершенное тобой — нечто потрясающее, то ли это на грани ереси..."
  - char: "musashi"
    side: "right"
    text:
      - "Приму это как высшую похвалу от Великого Ветерана. Мне вот только интересно... пришлось ли тебе это место по душе?"
  - char: "mikasa"
    side: "left"
    text:
      - "Не думаю, что это важно, нравится мне здесь или нет. Реальность такова, что я ошеломлена количеством вещей, которые, кажется, противоречат здравому смыслу."
      - "И что еще более впечатляюще — ты способна всем этим управлять. Пожалуй, истории о сингулярности Железной Крови не так уж надуманны, как я поначалу полагала."
  - char: "musashi"
    side: "right"
    text:
      - "Я также слышала о Комнате Ваяния, которая создает штормы, чтобы не подпускать никого, у кого нет «Ключа»."
      - "В любом случае, само Зеркальное море запечатано, но я не стала раскрывать это тебе или Нагато, зная о подозрениях, которые вы обе питаете к технологиям Сирен."
  - char: "mikasa"
    side: "left"
    text:
      - "Был период времени, когда я с паранойей относилась к каждому шагу Акаги. По крайней мере, теперь у меня меньше сомнений в её намерениях."
      - "Кстати, а как командовать союзниками после вступления на поле боя? Насколько я понимаю, на нашу связь это не влияет так, как обычно бывает в Зеркальном море?"
      - "Отсюда мы можем отдавать распоряжения напрямую всему флоту, и потеря этой возможности была бы огромным недостатком."
  - char: "musashi"
    side: "right"
    text:
      - "Не беспокойся. Ты не сможешь мгновенно охватить взглядом позиции всех и каждого, но всё равно сможешь отдавать им приказы, как и прежде."
  - char: "mikasa"
    side: "left"
    text:
      - "Понятно, значит, минусов не так много, как я воображала. Стало быть, для наших союзников внутри нет никакой разницы в том, как они получают приказы?"
  - char: "musashi"
    side: "right"
    text:
      - "Верно."
      - "Однако есть одно ключевое различие: когда вассал не может слышать голос игрока, у него нет иного выбора, кроме как повиноваться приказу. Но если он в состоянии высказать своё мнение, он может повлиять на эти приказы."
      - "Ты также сможешь напрямую наблюдать за состоянием своих сил, и это может заставить тебя принимать иные решения, нежели если бы ты относилась к ним как к фигурам на доске."
      - "Интересно, осознавали ли это Нагато и Акаги, прежде чем приняли свои решения."
  - char: "mikasa"
    side: "left"
    text:
      - "Полагаю, что так. Они предпочли сражаться бок о бок со своими друзьями, а не сидеть здесь, попивая с нами чай."
  - char: "musashi"
    side: "right"
    text:
      - "Хе-хе. Не могу их винить."
  - char: "mikasa"
    side: "left"
    text:
      - "Ха-ха-ха. Что ж, как я и сказала Акаги, я останусь здесь еще ненадолго."
      - "Покажи мне, какие ходы предпримете вы трое."


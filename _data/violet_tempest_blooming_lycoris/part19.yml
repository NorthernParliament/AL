chapter1:
  rows:
  - text:
      - "Когда алый свет заходящего солнца начал просачиваться сквозь окна пагоды, и положение в игре, и ситуация на поле боя достигли напряженного тупика."
      - "На протяжении пятого и шестого ходов участники продолжали бороться за преимущество, но явного фаворита так и не выявилось."
      - "Начала сказываться усталость, и это отразилось на всей доске."
      - "Враги, с которыми раньше было легко расправиться, казались крупнее и внушали больше страха, усиливая натиск на девушек-кораблей."
  - char: "mikasa"
    side: "left"
    text:
      - "Что здесь происходит, Мусаси? Сама игра начинает полностью нас теснить..."
      - "Враги, может, и не особо сильны, но силы всех участников развернуты так, как никогда бы не додумались сделать в реальном морском сражении."
  - char: "musashi"
    side: "right"
    text:
      - "Это привело к распространению неразберихи. И хотя некоторым удалось выполнить свои задачи..."
      - "Учитывая объем накопившихся повреждений, я не удивлюсь, если скоро мы увидим, как участники начнут выбывать из игры."
  - char: "mikasa"
    side: "left"
    text:
      - "Неужели Дзинцу станет первой? Какая жалость..."
      - "Полагаю, единственный плюс в том, что не мы нанесли это друг другу."
  - char: "musashi"
    side: "right"
    text:
      - "У всех и так полно забот с одними лишь серийными противниками."
  - char: "mikasa"
    side: "left"
    text:
      - "Любопытно. Если баланс сил будет нарушен, игра может в одночасье решиться в чью-то пользу."
      - "Я полагала, что пока ты остаешься на стороне Акаги, тупик неизбежно затянется. Но случаются и неожиданности."
  - char: "musashi"
    side: "right"
    text:
      - "Силы Акаги проделали долгий путь."
      - "Но теперь они уже сошлись у центральной башни."
  - char: "mikasa"
    side: "left"
    text:
      - "Ты ведь не считаешь это победой, не так ли?"
      - "Вы обе, особенно Акаги, подвергли свои силы слишком суровым испытаниям только ради того, чтобы достичь центральной башни. Вы также потеряли большую часть серийных кораблей, потому что они не смогли поспеть за остальными."
      - "С другой стороны, мы с Нагато получили очень мало повреждений и можем действовать практически в полную силу."
      - "То, что вы не учли этого, оставило вас полностью открытыми. Ха-ха!"
  - char: "musashi"
    side: "right"
    text:
      - "И чего же ты этим добилась? Незначительного территориального преимущества? Пока мы удерживаем позицию, вы не сможете штурмовать башню..."
      - "Особенно если Нагато продолжит упорствовать в своём идеализме."
      - "Мне крайне любопытно увидеть, что для неё важнее: верность собственному пути или достижение победы, в которой она нуждается."
      - "В связи с этим у меня есть испытание для тебя."
      - "Я разверну все свои корабли и атакую Хагуро, которая следит за перемещениями моего флота и находится ближе всех к силам Нагато."
      - "Сакава, Судзуцуки, Титосэ, а затем Тиёда будут атаковать её по очереди, и на таком расстоянии Нагато не сможет помочь, даже если захочет."
      - "Мне больно прибегать к подобной тактике, но этот тупик должен быть преодолен."
      - "Как только Хагуро будет повержена, силы Нагато тоже окажутся под ударом."
      - "Был один способ, которым она могла предотвратить такой исход, но, к сожалению, она растратила его ранее."
      - "Какой бы сильной ни была твоя воля, этот домен не откликнется на один и тот же ментальный образ дважды."
      - "Но если эта воля разделена другим человеком..."
  - char: "mikasa"
    side: "left"
    text:
      - "...Тогда он должен сражаться за эти идеалы. Довольно слов. Я поддержу видение Нагато."
  - char: "musashi"
    side: "right"
    text:
      - "Превосходно. Жаль только, что здесь станет довольно одиноко, когда не с кем будет даже побеседовать."
      - "Просто хочу подтвердить в последний раз: это действительно то, чего ты хочешь, Великий Ветеран?"
  - char: "mikasa"
    side: "left"
    text:
      - "Я уже давно решила, что буду стоять на её стороне до самого конца. Теперь я не отступлю."
      - "Возможно, в управлении всем отсюда и есть свои преимущества, но у меня есть друзья, которые рассчитывают на то, что я поступлю правильно."
  - char: "musashi"
    side: "right"
    text:
      - "Нагато пожертвовала бы собой ради защиты друзей, а Акаги не остановится ни перед какими жертвами ради защиты того, что она вожделеет."
      - "Что ж, Микаса, что ты возьмешь в руки: меч или щит?"
  - char: "mikasa"
    side: "left"
    text:
      - "Мой ответ уже должен быть очевиден. А как насчет тебя?"
  - char: "musashi"
    side: "right"
    text:
      - "Если ты и Нагато сможете выйти победителями, я дам тебе свой ответ."
  - char: "mikasa"
    side: "left"
    text:
      - "Ха. Раз уж ты так говоришь, то не надейся, что я буду с тобой миндальничать."
      - "Я ухожу, Мусаси. О, и если тебе станет слишком одиноко, ты всегда можешь присоединиться к нам. Ха-ха-ха!"
  - char: "musashi"
    side: "right"
    text:
      - "Хе-хе. Посмотрим."

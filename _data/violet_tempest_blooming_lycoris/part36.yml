chapter1:
  rows:
  - char: "zuikaku"
    side: "left"
    text:
      - "Уф, когда вернусь, обязательно потребую доплату за сверхурочные... Как бы то ни было, я слышала, что после их последнего эксперимента на это место напала настоящая Сирена, и тут всё едва не взлетело на воздух. Но сейчас, похоже, всё уже вернулось в норму."
  - char: "communicator"
    side: "right"
    text:
      - "Пожалуйста, назовите себя и ваш код безопасности."
  - char: "zuikaku"
    side: "left"
    text:
      - "Я Дзуйкаку, авианосец Империи Сакуры. Меня направила сюда Мусаси с особым поручением, а мой код... эм... Погоди секунду..."
  - text:
      - "Глядя на бескрайнюю синюю гладь перед собой, Дзуйкаку продиктовала свое имя и пароль в выданный заранее коммуникатор."
  - char: "communicator"
    side: "right"
    text:
      - "Авторизация пройдена. Добро пожаловать в плавучую крепость."

chapter2:
  rows:
  - text:
      - "Практически сразу после завершения авторизации Дзуйкаку затянуло в Зеркальное море: ясное голубое небо снаружи сменилось зловещей тьмой."
  - char: "zuikaku"
    side: "left"
    text:
      - "Хм, раньше этой проверки безопасности здесь не было. Её что, только недавно установили?"
      - "Обычно сразу понимаешь, что попала в Зеркальное море, из-за какой-нибудь странной бури или морского тумана... Но надо признать, благодаря голосовому приветствию всё это выглядело куда дружелюбнее."
      - "С другой стороны, усиленная охрана — это не так уж и плохо, учитывая то прошлое проникновение Сирен..."
  - text:
      - "Дзуйкаку заходила всё глубже на территорию плавучей крепости, с любопытством разглядывая причудливые строения вокруг."
      - "С её последнего визита здесь изменилось практически всё: от планировки объектов до расположения самих островов. Дзуйкаку иронично ухмыльнулась, заметив кое-где совершенно неуместные навигационные экраны, из-за которых это место неуловимо напоминало парк аттракционов."
      - "В Зеркальном море её никто не встречал. До ушей доносился лишь механический гул и скрежет заводов и испытательных полигонов Сирен."
      - "На мгновение ей показалось, будто она осталась единственным зрителем на грандиозной симфонии."
  - char: "zuikaku"
    side: "left"
    text:
      - "Ну и дела, это странно. Я могла бы поклясться, что раньше тут был пустой испытательный полигон. А теперь здесь вымахал целый завод."
      - "И всё это работает вообще без чьего-либо присмотра? Жутковато."
      - "Пожалуй, это в очередной раз доказывает: сколько Сирену ни маскируй, её технологии всё равно останутся технологиями Сирен. У меня, наверное, никогда не перестанут идти мурашки по коже от пребывания в Зеркальном море..."
      - "Да и для отпуска я бы выбрала совсем другое местечко. Если бы Мусаси не отправила меня сюда, я бы..."
  - text:
      - "Следуя указаниям голоса, который время от времени раздавался из коммуникатора, Дзуйкаку в конце концов добралась до башни, служившей центром управления этого Зеркального моря."
      - "Шагнув внутрь через главный вход, она приметила на постаменте возле двери один до боли знакомый предмет."
  - char: "zuikaku"
    side: "left"
    text:
      - "Неужели это... Ватацуми?!"
      - "Так, стоп, погодите, этого просто быть не может. Ватацуми уже должны были вернуть домой. По крайней мере, Микаса мне так говорила..."
      - "Тогда что это, черт возьми, такое?"
  - text:
      - "Когда Дзуйкаку подошла ближе к постаменту, она отчетливо увидела, что к похожему на Ватацуми объекту у самого его основания подключен какой-то аппарат."
  - char: "zuikaku"
    side: "left"
    text:
      - "Погоди-ка, теперь, когда я рассматриваю его вблизи, он совсем не похож на Ватацуми. С чего я вообще изначально взяла, что это одно и то же?"
  - char: "bismarck_rad"
    side: "right"
    text:
      - "Добро пожаловать обратно в плавучую крепость, Дзуйкаку."
  - text:
      - "Мысли Дзуйкаку тут же вылетели у неё из головы, когда рядом неожиданно включился парящий экран."
  - char: "zuikaku"
    side: "left"
    text:
      - "Ого, это Бисмарк?!"
      - "М-да, как же я удивилась, услышав твой голос во время той битвы против Компилятора. Рада видеть, что у тебя всё хорошо!"
      - "Но разве ты не должна была вернуться на родину после отбытия Фридрих?"
      - "И как ты узнала, что я здесь?"
      - "О, и что это за камень вон там, к которому подключена машина?"
      - "Он имеет какое-то отношение к нашему Ватацуми?"
  - char: "bismarck_rad"
    side: "right"
    text:
      - "Успокойся, Дзуйкаку. Я не смогу ответить на твои вопросы, если ты будешь сыпать ими один за другим."
  - char: "zuikaku"
    side: "left"
    text:
      - "Ой, виновата... Просто в голове сейчас столько всего крутится!"
  - char: "bismarck_rad"
    side: "right"
    text:
      - "Не переживай об этом. Заходи для начала, я хочу тебе кое-что показать."
      - "Я знаю, что у тебя накопилось ко мне много вопросов, и намерена ответить на столько, на сколько смогу, прежде чем ты вернешься в Империю Сакуры."

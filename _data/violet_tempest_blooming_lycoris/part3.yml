chapter1:
  rows:
  - text:
      - "Вдалеке вокруг внушительных механических замков непредсказуемо клубились чёрные тучи — странное и тревожное зрелище, достойное испытательного полигона Сирен."
      - "Что ещё более странно, лучи разноцветного света буквально «разрезали» зону учений на отдельные сектора, похожие на сетку."
      - "Каждый сектор имел определённую ценность в очках, которая в конечном итоге и определит победу или поражение в этих учениях."
  - char: "ryuuhou"
    side: "left"
    text:
      - "Что это за место?.. Я никогда не видела ничего подобного ни в одном из Зеркальных морей, с которыми сталкивалась..."
  - char: "kaga"
    side: "right"
    text:
      - "Если я правильно помню, это был «дар», который Акаги преподнесла Мусаси. Но как ей удалось превратить его в нечто подобное?.."
  - char: "ryuuhou"
    side: "left"
    text:
      - "Погодите, посмотрите вон туда... Это что, Диадема Света? Она выглядит совсем иначе, но я бы ни за что не перепутала этот характерный силуэт!"
  - char: "yamashiro"
    side: "right"
    text:
      - "Ого, ты права! Кажется, это место было построено с использованием мотивов некоторых из самых священных мест Империи Сакуры!"
      - "Смотрите, вон то место похоже на наше святилище... а вон там — поместье Акаги!"
      - "А это что, Священная Сакура? — Ого, здесь даже есть Дворец Дракона, который мы нашли не так давно!"
  - char: "ryuuhou"
    side: "left"
    text:
      - "Великое древо сакуры Лисицы-Хранительницы... Я сама там никогда не была, но слышала, что госпожа Нагато когда-то была запечатана внутри."
      - "Во всяком случае, это было до того, как Дзуйкаку и Возрождённый Объединённый флот пробудили её."
  - char: "yamashiro"
    side: "right"
    text:
      - "Ага! Я всё об этом слышала!"
      - "Хм... Раз уж на то пошло, я чувствую себя как-то странно с тех пор, как прибыла сюда. Кажется, мои боевые характеристики подкорректировали или вроде того?"
  - char: "miyuki"
    side: "left"
    text:
      - "М-хм... Думаю, нам отвели роль «подчинённых», так что наши параметры могли подправить ради честной игры..."
      - "Иначе крупные корабли имели бы подавляющее преимущество, а авианосцы могли бы сеять хаос издалека..."
      - "Вот почему я думаю... Наше снаряжение и характеристики на самом деле не отражают наши реальные возможности, это лишь особые условия, наложенные этими учениями."
      - "Н-но благодаря этому, может быть, я, наконец, смогу принести хоть какую-то пользу для разнообразия..."
  - char: "yamashiro"
    side: "right"
    text:
      - "Понятно! Так вот почему я теперь могу запускать самолёты! Хе-хе, обычно мне не доводится таким заниматься, так что я должна ценить каждый момент~"
      - "Спасибо за объяснение, Миюки!"
  - char: "miyuki"
    side: "left"
    text:
      - "Д-да не за что, лишь бы я могла быть кому-то полезной..."
  - char: "yamashiro"
    side: "right"
    text:
      - "Ты отлично справляешься! Я тоже не уверена, насколько смогу изменить ситуацию, но давай обе постараемся, ладно?"
  - char: "jintsuu"
    side: "left"
    text:
      - "У каждой из нас есть своя роль. В этих учениях мы будем не просто проверять силу друг друга, но скорее доносить свои мысли в столкновении умов."
      - "Таким образом, мы несём ответственность не только за то, как мы сражаемся, но также за то, вступаем ли мы в бой и в какой момент."
      - "Если нам суждено столкнуться, наши мотивы и обоснования могут оказаться важнее, чем оснащение или тактика, которую мы применяем в бою."
  - char: "yamashiro"
    side: "right"
    text:
      - "Мотивы, да? Хорошо! То есть, если мы будем очень стараться и думать о том, какие приказы нам отдадут, то всё будет в порядке, верно?"
      - "Я всегда хотела почувствовать, каково это — играть более активную роль на поле боя, так что мне очень не терпится испытать эти самолёты в деле!"
      - "Ой, но раз уж мы должны работать головой, а не только оружием, я приложу все усилия, чтобы не втянуть нас в неприятную ситуацию!"
  - char: "jintsuu"
    side: "left"
    text:
      - "Об этом полезно помнить, но излишняя осторожность также может стать помехой."
  - char: "yamashiro"
    side: "right"
    text:
      - "Э?! И как же мне тогда понять, что делать?.."
  - char: "jintsuu"
    side: "left"
    text:
      - "Хм, я бы не стала слишком беспокоиться об этом. Просто доверься своей интуиции."
  - text:
      - "Внезапно в небе появился символ с изображением молнии."
  - char: "yamashiro"
    side: "left"
    text:
      - "Ого, это ещё что такое?"
  - char: "miyuki"
    side: "right"
    text:
      - "Это... должно быть, особый приказ Акаги. Другими словами, она наделяет нас силой для выполнения её воли..."
  - char: "kaga"
    side: "left"
    text:
      - "Верно. «Поторопитесь и захватите ближайший сектор». Выдвигаемся, девочки."

chapter1:
  rows:
  - char: "ryuuhou"
    side: "left"
    text:
      - "Свежий отчет от моих самолетов-разведчиков выглядит многообещающе. Нам удается удерживать этот сектор уже несколько ходов, и теперь у нас есть четкая картина развертывания остальных флотов."
      - "Миюки практически окружена, а Дзинцу мы только что потеряли. Микаса вступила на поле боя и блокирует любые столкновения между девушками-кораблями в пределах своих владений."
  - char: "akagi"
    side: "right"
    text:
      - "Теперь, когда Великий Ветеран самолично вступила в игру, нам не избежать прямого противостояния."
      - "Ямасиро, Рюхо, я хочу, чтобы вы обе отступили и освободили для Микасы прямой путь к атаке на центральную башню."
  - char: "yamashiro"
    side: "left"
    text:
      - "Фух... Отбиваться от серийных Сирен становилось всё тяжелее и тяжелее..."
  - char: "akagi"
    side: "right"
    text:
      - "Несмотря на это, у тебя всё еще полно боеприпасов, да и повреждений ты почти не получила. Быстро пополни запасы, и я жду, что ты вернешься в полную боевую готовность."
  - char: "yamashiro"
    side: "left"
    text:
      - "Е-есть!"
  - char: "akagi"
    side: "right"
    text:
      - "Миюки, просто оставайся там, где находишься. Позже доложишь нам о перемещениях Нагато и Микасы."
  - char: "miyuki_rad"
    side: "left"
    text:
      - "П-поняла!"
  - char: "akagi"
    side: "right"
    text:
      - "Кага, Рюхо, хочу, чтобы вы две начали масштабную разведку центральной башни."
      - "Мы должны выяснить, что именно Мусаси пытается скрыть от нас внутри этой башни."

chapter2:
  rows:
  - char: "kongou"
    side: "left"
    text:
      - "Посмотрите, это разведывательные самолеты Империи Сакуры... Акаги, должно быть, готовится к атаке на центральную башню! Микаса, нам тоже пора делать ход?"
  - char: "mikasa"
    side: "right"
    text:
      - "Хм... Неужели мы наконец-то достучались до Акаги? Похоже, она оставляет нам прямой коридор прямо к центральной башне."
  - char: "kongou"
    side: "left"
    text:
      - "Означает ли это... что она оставила попытки сражаться с нами и предлагает сначала сосредоточиться на центральной базе?"
  - char: "mikasa"
    side: "right"
    text:
      - "Это один из вариантов, но также возможно, что она обнаружила там нечто такое, что требует и нашего присутствия."
  - char: "kinu"
    side: "left"
    text:
      - "Так вот почему она отозвала свои силы?"
  - char: "hatakaze"
    side: "right"
    text:
      - "Она ведь может планировать использовать нас в качестве пушечного мяса, чтобы выяснить, что именно находится в этой башне, верно?"
  - char: "mikasa"
    side: "left"
    text:
      - "Зная Акаги, она бы палец о палец не ударила, не пытайся она извлечь из этого выгоду, но и сидеть сложа руки мы тоже не можем."
      - "Кирисима, Конго, могу я попросить вас двоих установить визуальный контакт с самой башней? Нам нужно знать, с чем мы столкнулись."
      - "Хагуро, продолжай следить за перемещениями Акаги и Мусаси. Дай мне знать, если они проявят хоть какие-то признаки готовности напасть на нас снова."
  - char: "haguro"
    side: "right"
    text:
      - "А как насчет вас с Кину? Что собираетесь делать вы две?"
  - char: "mikasa"
    side: "left"
    text:
      - "Я собираюсь встретиться с Нагато. Даже без центральной башни Нагато всё еще может победить, если захватит все базы по периметру."
      - "Что еще важнее, мне нужно разобраться с парой нерешенных вопросов до того, как эта игра завершится."

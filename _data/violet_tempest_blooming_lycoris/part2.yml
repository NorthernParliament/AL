chapter1:
  rows:
  - char: "wakatsuki"
    side: "left"
    text:
      - "Вот мы и на месте, госпожа Нагато, госпожа Микаса."
  - text:
      - "Отодвинув раздвижную дверь, Микаса и Нагато с удивлением обнаружили, что Акаги и Мусаси уже сидят в комнате."
  - char: "mikasa"
    side: "left"
    text:
      - "Ты прибыла раньше нас, Акаги? А я-то думала, ты явишься последней."
      - "Должно быть, тебе не терпелось поскорее взяться за дело, раз твоя командировка в Европу наконец окончена. Ха-ха-ха!"
  - char: "akagi"
    side: "right"
    text:
      - "Хотя я и рада видеть вас в добром здравии, Великий Ветеран, нам придётся пропустить любезности."
      - "Эти учения чрезвычайно важны, и мы не должны заставлять Мусаси ждать."
  - char: "nagato"
    side: "left"
    text:
      - "Прости за наше опоздание, Мусаси. В этом моя вина."
  - char: "musashi"
    side: "right"
    text:
      - "Это не имеет значения. Мы с Акаги как раз наслаждались приятной беседой."
      - "Вы все прибыли раньше назначенного срока, так что стыдиться нечего. Теперь же, присоединяйтесь к нам."
  - char: "nagato"
    side: "left"
    text:
      - "Если ты считаешь, что всё в порядке, то и я тоже..."
  - char: "wakatsuki"
    side: "right"
    text:
      - "Госпожа Нагато, госпожа Микаса, я принесла вам чай."
  - char: "nagato"
    side: "left"
    text:
      - "Ммм... Пахнет чудесно."
  - char: "mikasa"
    side: "right"
    text:
      - "Да уж, этот аромат одним вдохом прогоняет всю усталость от дороги. Кто его заваривал? Ты, Вакацуки?"
  - char: "musashi"
    side: "left"
    text:
      - "Его приготовила Ханацуки. Хотя ей было непросто выбрать подходящие листья, так что я сочла нужным протянуть ей руку помощи."
  - char: "mikasa"
    side: "right"
    text:
      - "Вот как? Тогда можно сказать, что этот чай, как и наши приглашения, создан твоей рукой."
  - char: "musashi"
    side: "left"
    text:
      - "Возможно и так, а возможно и нет. Мы обе выбирали листья — а когда они смешаны, не так-то просто определить, чьи именно подарили чаю этот аромат."
      - "Если чай пришёлся вам по вкусу, то хвалить стоит Ханацуки, а не меня."
  - char: "mikasa"
    side: "right"
    text:
      - "Тебе не стоит быть столь скромной. Как ты и сказала, мне нелегко определить, чьи листья делают его столь благоуханным. Моё обоняние не настолько проницательно."

chapter2:
  rows:
  - text:
      - "Пока четверо наслаждались чаем, над столом, за которым они собрались, внезапно материализовалась голографическая игровая доска."
  - char: "akagi"
    side: "left"
    text:
      - "Вижу, мы готовы начать учения."
  - char: "mikasa"
    side: "right"
    text:
      - "Это одна из тех «голо-грамм»? Полагаю, именно так мы будем разрешать противоречия в наших идеологиях?"
  - char: "nagato"
    side: "left"
    text:
      - "Выглядит весьма детально. Мусаси, эта доска отражает происходящее внутри зоны учений?"
  - char: "musashi"
    side: "right"
    text:
      - "Весьма проницательно. Я впечатлена, что ты поняла это с первого взгляда."
      - "Уверена, вы все видели пейзаж, отражённый в этой голограмме, по пути сюда."
      - "Мы проведём наши учения в особом «домене» под этой пагодой, и эта доска транслирует всё, что происходит внутри него."
      - "Пока мы говорим, Сакава инструктирует всех участниц и сопровождает их в соответствующие стартовые зоны."
  - char: "mikasa"
    side: "left"
    text:
      - "Любопытно... Мне было интересно, как именно мы будем командовать нашими силами, не присутствуя там лично."
      - "Итак, какова наша цель и как нам её достичь?"
  - char: "musashi"
    side: "right"
    text:
      - "Всё так, как я и указала в приглашении. Вы должны командовать своими отрядами и набрать как можно больше очков. Сторона, набравшая наибольшее количество очков к финалу, объявляется победителем."
      - "Эти учения отразят качество нашего лидерства — а временами и сами наши мысли."
  - char: "mikasa"
    side: "left"
    text:
      - "Наши мысли? И как же мы должны влиять на войска одними лишь мыслями?"
  - char: "musashi"
    side: "right"
    text:
      - "Твоя убеждённость и твои мысленные образы, если они достаточно сильны, могут изменять саму природу домена, хотя здесь и существуют определённые ограничения."
  - char: "akagi"
    side: "left"
    text:
      - "Поступки говорят громче слов, верно? Значит, эти учения станут столкновением наших истинных чувств."
      - "Я уже могу предположить, что Возрождённый Объединённый флот сосредоточится на защите друг друга, в то время как Микаса отдаст приоритет усилению своих линкоров."
      - "Учитывая, что она привела сюда столько линейных кораблей, я уже догадываюсь, о чём она думает."
  - char: "mikasa"
    side: "right"
    text:
      - "Я не выбирала преимущественно линкоры осознанно. Я просто собрала тех, кому доверяю, и вот что из этого вышло."
  - char: "nagato"
    side: "left"
    text:
      - "Раз на доске ничего не скрыто, это означает, что все наши силы и их мощь очевидны с самого начала, верно?"
  - char: "musashi"
    side: "right"
    text:
      - "Именно так. Можно скрыть свои намерения, но нельзя скрыть свою личность."
  - char: "nagato"
    side: "left"
    text:
      - "Понимаю... Однако я должна спросить, какова цель всего этого, Мусаси. Ты предполагаешь, что мы с Микасой объединим силы?"
      - "Если мы начнём действовать сообща, Акаги с самого начала окажется в крайне невыгодном положении. Это должно быть совершенно очевидно."
      - "Но если ты стремишься к балансу, я могу представить, что ты встанешь на её сторону."
      - "И к слову о составах — я вижу, что твоя группа состоит почти исключительно из авианосцев, Акаги."
  - char: "akagi"
    side: "right"
    text:
      - "Как и Микаса, я не слишком задумывалась об этом. К тому же, авианосцы есть у обеих сторон, так что всё честно."
  - char: "nagato"
    side: "left"
    text:
      - "Ты и вправду называешь это «честным»? У тебя их четыре, в то время как у нас — всего один."
      - "У нас мог бы быть ещё один, если бы Дзуйкаку не отослали прочь..."
  - char: "communicator"
    side: "right"
    text:
      - "Бип..."
  - char: "musashi"
    side: "left"
    text:
      - "Здравствуй, Сакава. Там всё готово?"
  - char: "sakawa_rad"
    side: "right"
    text:
      - "Ещё бы! Все заняли стартовые позиции и ждут приказов. И я в том числе!"
  - char: "musashi"
    side: "left"
    text:
      - "Очень хорошо. Благодарю."
  - text:
      - "Мусаси положила руку на доску. Под отрядами каждого игрока и сопровождающими их серийными кораблями вспыхнула отчетливая сияющая аура."
  - char: "musashi"
    side: "left"
    text:
      - "Позвольте мне ещё раз уточнить несколько правил. Вы можете совершать действия на этой доске, чтобы отдавать приказы своим войскам. Ваши распоряжения будут передаваться им через коммуникаторы. Определённые особые команды будут иметь более значительный эффект на доске, но на их использование наложено больше ограничений."
      - "При желании вы также можете отдавать приказы голосом. Однако они не могут ответить вам. Единственная информация, которую вы можете получить от них, — это то, что отображается на доске."
      - "Если вы захотите увидеть, как идут дела у ваших подопечных, есть только один способ — искренне пожелать присоединиться к ним."
      - "Кстати, если вы хотите передислоцировать свои войска до того, как матч по-настоящему начнётся, сейчас ваш последний шанс."
  - char: "nagato"
    side: "right"
    text:
      - "И особые команды, я полагаю, можно отдавать только один раз в ход, когда наступит ваша очередь?"
  - char: "musashi"
    side: "left"
    text:
      - "Верно. Цель этого ограничения — сделать матч более понятным. В противном случае воцарился бы хаос."
      - "Должна также упомянуть, что все наши приказы, если они не произнесены вслух, остаются в тайне до тех пор, пока не отобразятся на доске."
      - "Только вам решать, хотите ли вы озвучивать их, чтобы слышали другие игроки. Когда это делать и делать ли вообще — на ваше усмотрение."
  - char: "nagato"
    side: "right"
    text:
      - "Понимаю... Однако теперь у меня возникло несколько вопросов."
      - "Во-первых, ты говорила, что для победы нужно набирать очки. Мы получаем их за захват баз?"
      - "Во-вторых, если кто-то переместится на клетку, уже занятую отрядом другого игрока... что произойдёт тогда?"
  - char: "mikasa"
    side: "left"
    text:
      - "Насколько мне известно... Да, чем больше баз ты удерживаешь, тем больше очков получаешь. Что же касается твоего второго вопроса..."
  - char: "akagi"
    side: "right"
    text:
      - "Ничего особенного не произойдёт. Но если ты упорствуешь и встаёшь у кого-то на пути — жди боя. Точно так же устранение противников ради защиты своих баз является вполне допустимой стратегией."
  - char: "musashi"
    side: "left"
    text:
      - "Верно. Говоря о базах: изначально они заняты врагами, враждебными ко всем нам. Вы должны уничтожить их, прежде чем сможете захватить объект."
      - "Если вы переживаете, что ваши подопечные могут пострадать в ходе этих учений — не стоит. Весь урон лишь имитируется."
      - "Выведенные из строя участницы могут остаться на доске, но больше не смогут принимать участие в бою."
      - "Более того, вы не сможете отдавать им приказы, и они потеряют все эффекты, дарованные им доменом."
      - "По сути, они больше не участвуют в игре. Предпочтительнее, чтобы они просто покинули пределы игрового поля."
      - "Повторюсь: не опасайтесь за благополучие своих людей. Просто сосредоточьтесь на победе в этой игре."
  - char: "nagato"
    side: "right"
    text:
      - "Что ж, хорошо. Если это правда, то мы с Микасой не будем сдерживаться."
  - char: "akagi"
    side: "left"
    text:
      - "Взаимно. Теперь, когда все в курсе правил, может, наконец начнём?"
  - char: "musashi"
    side: "right"
    text:
      - "Я сказала всё, что хотела, так что без лишних слов... да начнётся игра."
      - "Первый ход за тобой, Акаги."


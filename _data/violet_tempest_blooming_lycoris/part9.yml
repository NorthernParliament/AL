chapter1:
  rows:
  - text:
      - "В начале хода Акаги над зоной учений появился символ облака, окутавший весь домен густым морским туманом."

chapter2:
  rows:
  - char: "yamashiro"
    side: "left"
    text:
      - "О-о-откуда внезапно взялся весь этот туман?!"
  - char: "jintsuu"
    side: "right"
    text:
      - "Этот символ должен быть проявлением воли Акаги."
      - "Насколько я могу судить, морской туман распространяется по всей зоне учений... Акаги уже использовала две особые команды, так что мы должны извлечь максимум пользы из этого мощного эффекта."
  - char: "yamashiro"
    side: "left"
    text:
      - "Эм, ты уверена, что с нами всё будет в порядке? Разве Сирены обычно не напускают такой туман перед началом атаки?"
  - char: "jintsuu"
    side: "right"
    text:
      - "Да, именно поэтому нам стоит проверить наше связное оборудование. Морской туман Сирен почти всегда обладает эффектом глушения."
  - char: "kaga"
    side: "left"
    text:
      - "Все мои средства связи, сенсоры и электроника работают в штатном режиме. Похоже, это всего лишь обычный туман."
      - "Впрочем, делать такие выводы пока рано. Если это проявление воли Акаги, значит, она пытается обеспечить нам значительное преимущество."
      - "Я знаю Акаги лучше всех. Она пытается создать условия, идеальные для наших авианосцев — нечто такое, чем другие игроки не смогут воспользоваться."
      - "уман стелется низко, прямо над поверхностью воды. Он не мешает нам управлять палубной авиацией, и наши самолёты окажутся вне зоны его влияния сразу после взлёта."
  - char: "ryuuhou"
    side: "right"
    text:
      - "Но при этом туман всё ещё достаточно плотный, чтобы мешать остальным предугадывать наши передвижения."
  - char: "kaga"
    side: "left"
    text:
      - "Именно. Теперь мы сможем скрытно захватывать близлежащие базы, не тратя на каждую слишком много ресурсов."
      - "За исключением центральной башни и укреплений, на отдельных узлах находятся лишь низкоранговые гуманоидные враги, и любая из нас может легко одолеть их в одиночку."
  - char: "miyuki"
    side: "right"
    text:
      - "Т-тогда я направлюсь к силам Микасы, чтобы попытаться захватить базу между ней и госпожой Нагато..."
      - "Я... я бы предпочла не идти одна, но если Акаги хочет, чтобы мы разделились для захвата, тогда..."
  - char: "kaga"
    side: "left"
    text:
      - "Всё будет хорошо, Миюки. В случае необходимости я прикрою тебя издалека."
      - "При таком раскладе наши силы будут рассредоточены, и мы не всегда сможем помочь друг другу. Но у Акаги всегда остаётся ТА САМАЯ возможность."
  - char: "ryuuhou"
    side: "right"
    text:
      - "Что ты имеешь в виду?"
  - char: "kaga"
    side: "left"
    text:
      - "В этих учениях у игроков есть преимущество: они не только могут обозревать всё поле боя, но и наблюдать за оппонентами, пытаясь получить ментальное превосходство над ними."
      - "Однако они также могут отказаться от этих преимуществ и лично вступить на поле боя, чтобы помочь своим силам."
      - "Именно так. Если Акаги пожелает взять дело в свои руки, она тоже снизойдёт в эту битву."


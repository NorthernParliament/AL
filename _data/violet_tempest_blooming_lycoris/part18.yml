chapter1:
  rows:
  - char: "musashi"
    side: "left"
    text:
      - "Вижу, тебе наконец удалось мельком заглянуть в истинную суть этой игры, Нагато."
      - "Всё именно так, как ты и говорила, Микаса — она готова на всё, чтобы обеспечить свою «бескровную» победу..."
      - "...Даже зная, что это пустая трата огромной мощи, дарованной ей. Ты и это предсказала?"
  - char: "mikasa"
    side: "right"
    text:
      - "Ха, я не умею читать мысли и не претендую на то, что знаю о Нагато всё. Но что я знаю точно — теперь, когда она выбрала путь, мой долг пройти его вместе с ней до конца."
      - "Если Нагато всё же решит сражаться, я с радостью подниму оружие на её стороне. И ты, и Акаги знали об этом ещё до начала игры, верно?"
  - char: "musashi"
    side: "left"
    text:
      - "В моих глазах ты кажешься более озабоченной тем, как сдержать Акаги, нежели тем, как поспособствовать победе Нагато."
  - char: "mikasa"
    side: "right"
    text:
      - "Возможно? Порой кажется, что ты знаешь меня лучше, чем я сама."
  - char: "musashi"
    side: "left"
    text:
      - "Сострадание к слабым может быть добродетелью, но на поле боя оно вполне может стать причиной твоей гибели."
      - "Мне легко понять твою преданность и то, к чему ты стремишься... Но почему ты мешаешь этому дитя встретиться лицом к лицу с Акаги?"
      - "Твои действия не прокладывают путь к победе. Вместо того чтобы явить мне видение будущего, ты, кажется, всё ещё закована в кандалы своего недоверия."
      - "Теперь твоя судьба больше не в твоих руках."
  - char: "mikasa"
    side: "right"
    text:
      - "Недоверие? Нет, это скорее взвешенное предвкушение, не более того. Всё зависит от того, что решит предпринять Акаги — и я это приняла."
  - char: "musashi"
    side: "left"
    text:
      - "Стоит тебе оказаться в обороне, и ты так и будешь оставаться в невыгодном положении. Сможет ли тот, кто уступил инициативу, смотреть в будущее, когда он не поспевает даже за настоящим?"
  - char: "mikasa"
    side: "right"
    text:
      - "Инициатива — это ещё не всё. Скоро мы узнаем, хватит ли Акаги выдержки, чтобы выстоять, или же она в конечном итоге прогорит в своей спешке."
  - char: "musashi"
    side: "left"
    text:
      - "Хех. Твоя правда, но что ты будешь делать, если она не прогорит?"
  - char: "mikasa"
    side: "right"
    text:
      - "Я вижу, на что ты предпочитаешь делать ставки. Я не приму это на свой счёт, если мы в итоге окажемся по разные стороны."
  - char: "musashi"
    side: "left"
    text:
      - "Ты, должно быть, шутишь, Великий Ветеран~"
  - char: "mikasa"
    side: "right"
    text:
      - "На данный момент время всё ещё на моей стороне. Да и ты не то чтобы спешишь делать ходы, не так ли?"
  - char: "musashi"
    side: "left"
    text:
      - "Верно. В отличие от Нагато, тебя не так-то просто спровоцировать."
      - "Но ведь тебя наверняка интересует не только это. У тебя всё это время были ко мне вопросы, не так ли?"
  - char: "mikasa"
    side: "right"
    text:
      - "Слишком много мыслей не давали мне покоя. Вещей, которые кажутся мне совершенно бессмысленными."
      - "К примеру, почему ты отправила Синано в Сардинию, а Дзуйкаку — в Железную Кровь?"
      - "Ни одно из этих действий не было приказано высшим руководством, и эти решения были приняты в крайне сжатые сроки."
  - char: "musashi"
    side: "left"
    text:
      - "Ты намекаешь на то, что я намеренно держу их подальше от Империи Сакуры?"
  - char: "mikasa"
    side: "right"
    text:
      - "Я не могу найти другого объяснения."
  - char: "musashi"
    side: "left"
    text:
      - "Синано — достойный представитель нашей делегации доброй воли в Сардинии, а Дзуйкаку уже имеет определенный авторитет в Железной Крови после её визита в их плавучую крепость."
      - "Ты не согласна с моим выбором делегатов?"
  - char: "mikasa"
    side: "right"
    text:
      - "Тогда как насчёт Ватацуми? Я слышала, что его вернули нам, но не успели все опомниться, как он снова исчез."
      - "Никто из нас не имеет права произвольно решать, что делать с реликвиями Империи Сакуры. Где он?"
  - char: "musashi"
    side: "left"
    text:
      - "Из-за нападения на Диадему Света протоколы безопасности в отношении наших священных реликвий были поставлены под сомнение, поэтому я распорядилась перевезти его в более безопасное место."
  - char: "mikasa"
    side: "right"
    text:
      - "...Тебе хоть что-нибудь известно о происхождении Ватацуми? Чем больше я изучаю этот вопрос, тем больше сомневаюсь в том, что это действительно древняя реликвия, передаваемая из поколения в поколение."
      - "То же самое впечатление у меня и от Святилища. Я не могу избавиться от чувства, что здесь как-то замешаны Сирены."
  - char: "musashi"
    side: "left"
    text:
      - "Для меня это новость. К сожалению, я знаю об этих вещах не больше твоего."
      - "Возможно, я знаю даже меньше. В конце концов, дела Акаги с Сиренами — это исключительно её ответственность. Я лишь даю ей необходимые полномочия."
  - char: "mikasa"
    side: "right"
    text:
      - "Сделки Акаги с технологиями Сирен были бы невозможны без твоей поддержки."
  - char: "musashi"
    side: "left"
    text:
      - "Если тебе уже известно так много, то зачем нужно слышать это из моих уст?"
  - char: "mikasa"
    side: "right"
    text:
      - "Мы не можем позволить технологиям Сирен... Нет, самим Сиренам оставаться без контроля! Неужели в тебе недостаточно любви и верности к Империи Сакуры, чтобы осознать это?"
  - char: "musashi"
    side: "left"
    text:
      - "Во мне нет ничего, кроме любви и верности. Однако..."
      - "Империя Сакуры обязана той мощью, которой наслаждается сейчас, технологиям Сирен. Даже без действий штаба, мы уже пристрастились к их яду."
      - "Слухи об этом должны были достичь твоих ушей, пока ты была в уединении."
  - char: "mikasa"
    side: "right"
    text:
      - "Я ни на секунду не верю, что этот временный мир означает отступление Сирен. С самого восстания Железной Крови они ведут себя слишком тихо."
  - char: "musashi"
    side: "left"
    text:
      - "В таком случае, ты считаешь, что Сирены наблюдают за нами, выжидая подходящий момент?"
      - "Акаги вела Империю Сакуры всё это время не из-за своей связи с Амаги и не потому, что она активно стремится заполучить технологии Сирен."
      - "Это потому, что она выбрала путь, в который веришь ты, я и вся Империя Сакуры."
      - "Подобно тому, как Фридрих дер Гроссе изменила траекторию судьбы Железной Крови, Акаги принесла Империи Сакуры изменение самой её участи."
      - "И именно поэтому она получила право вести Империю Сакуры вперёд."
  - char: "mikasa"
    side: "right"
    text:
      - "Изменение участи...?"
  - char: "musashi"
    side: "left"
    text:
      - "Микаса, представь, что завтра твоя жизнь должна оборваться, и твоих родных и друзей ждёт та же участь. Что бы ты сделала?"
  - char: "mikasa"
    side: "right"
    text:
      - "...Узнав об этом на день раньше, я смогла бы на день раньше начать подготовку. Я бы приложила все силы, чтобы бороться с таким «завтра»."
  - char: "musashi"
    side: "left"
    text:
      - "Именно этим и занимается Акаги."
      - "Если путь Акаги ошибочен, то необходимо увидеть отражения её разума и сердца, которые проложили этот путь."
      - "Знаешь ли ты о «сценарии», что находится в руках Сирен?"
  - char: "mikasa"
    side: "right"
    text:
      - "Сценарий...?"
  - char: "musashi"
    side: "left"
    text:
      - "Ты ведь слышала от Дзуйкаку о тех «иллюзиях», что она видела у Компилятора?"
      - "...Всё это не были просто иллюзии. Компилятор называла их записями, и это название полностью соответствует действительности."
      - "Кага погибнет от рук Энтерпрайз, Акаги затопит себя после тяжелого ранения от неё же, а Синано падет от рук Арчерафиш."
      - "Мы с Ямато будем погребены в океане под волнами палубной авиации типа «Эссекс», а Нагато вместе с Принцем Ойгеном и той Саратогой из Союза Орла исчезнут, взявшись за руки, в той белой вспышке, что видела Дзуйкаку."
      - "Ты желаешь встретить такой финал?"
  - char: "mikasa"
    side: "right"
    text:
      - "Конечно нет!"
  - char: "musashi"
    side: "left"
    text:
      - "Акаги тоже этого не желает. И пусть это не было её основной целью, она всё же сделала так, чтобы эти записи стали для нас не более чем «иллюзиями», лишенными всякого смысла."
      - "А теперь, у меня есть ещё одна запись."
      - "В этой версии Акаги и Кага жертвуют собой одна за другой, чтобы защитить товарищей, а следом за ними наступает черёд мой и Ямато."
      - "Ты же погибаешь в пути, пытаясь вызвать подкрепление. Синано воочию видит, как последние из её соратников один за другим падают подле неё, пока и её саму не поглощают бесконечные воды."
      - "Как по-твоему, этот вариант записи звучит лучше?"
  - char: "mikasa"
    side: "right"
    text:
      - "Такое... такое будущее для нас неприемлемо."
  - char: "musashi"
    side: "left"
    text:
      - "Я того же мнения. И именно поэтому мы хотим гарантировать, что и эта запись станет для нас бессмысленным «миражом»."
      - "При всей твоей принципиальности и сострадании, твоё недоверие к Акаги вполне объяснимо."
      - "Однако принципы ничего не значат, если их нельзя защитить и отстоять. Если ты веришь, что твой путь верен, то должна доказать это Акаги — своей силой."
      - "В отличие от Акаги и Нагато, ты не слаба. Но даже тогда ты не могла нести бремя всей Империи Сакуры на своих плечах в одиночку."
  - char: "mikasa"
    side: "right"
    text:
      - "Мусаси..."
  - char: "musashi"
    side: "left"
    text:
      - "Эти учения были задуманы как столкновение идеалов, а не риторики."
      - "Но в конце концов, разве не слишком скучно философствовать у шахматной доски?"
      - "Делай свой ход, Микаса. Есть те, кто верит в тебя и в победу, к которой, по их убеждению, ты их приведешь."
      - "Не заставляй их ждать слишком долго, Великий Ветеран."

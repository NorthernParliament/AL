chapter1:
  rows:
  - char: "yamashiro"
    side: "left"
    text:
      - "Судно Компилятора... Чем же мы занимались, пока Милорд боролся за выживание?.."
      - "Ух... Я потеряла ещё один серийный корабль... При таких темпах мне придётся выйти из игры..."
      - "Как линкор, я должна быть на передовой... Но мне всё ещё велено беречь огневую мощь и энергию..."
  - char: "jintsuu"
    side: "right"
    text:
      - "Успокойся, Ямасиро. Акаги уже захватила базу."
  - char: "yamashiro"
    side: "left"
    text:
      - "А, правда? С каких это пор..."
  - text:
      - "Прежде чем Ямасиро успела осознать увиденное, Акаги уже сокрушила судно Сирен."
      - "Пылающие лепестки кружились вокруг неё — единственные следы, оставшиеся от некогда находившейся там Сирены."
  - char: "kaga"
    side: "left"
    text:
      - "Акаги!"
      - "Когда я увидела пламя твоих лисьих огней, я подумала, что ты использовала ещё одну команду. Не ожидала, что ты лично вступишь на поле боя..."
  - char: "akagi"
    side: "right"
    text:
      - "Я бы уснула, проведи я в той тесной комнате ещё хоть минуту. Мне просто нужна была небольшая смена обстановки."
  - char: "ryuuhou"
    side: "left"
    text:
      - "Акаги, что ты только что сделала с Компилятором..."
  - char: "akagi"
    side: "right"
    text:
      - "Модели Компилятор известны своей чрезвычайно высокой устойчивостью к обычному оружию. Однако мы можем использовать уникальные особенности этой зоны в свою пользу."
      - "Я изменила характеристики своей атаки, как ты можешь видеть по этим цветам ликориса, что позволило моему пламени проникнуть в уязвимые точки судна."
      - "Знание — сила. Это справедливо как для борьбы с Сиренами, так и для понимания наших оппонентов."
      - "(Морской туман произвёл довольно значительный эффект при первом использовании, но Микаса поймёт, как с ним справиться, если я применю его во второй раз.)"
      - "Нагато тоже снизошла на поле боя. Если мы не будем действовать быстро, баз для захвата не останется, и мы окажемся в тупике."
  - char: "ryuuhou"
    side: "left"
    text:
      - "Поняла. Мы доверяем тебе, Акаги."
  - char: "akagi"
    side: "right"
    text:
      - "Это похвально, но ваша безопасность превыше всего. Это касается и Дзинцу, и остальных."
      - "Хотя я весьма удивлена... Не ожидала увидеть ещё одного Компилятора так скоро. Похоже, призраки прошлого все разом вышли поиграть."
      - "Полагаю, это означает, что даже если Мейнфрейм был уничтожен, его данные всё ещё можно использовать для создания дубликатов... Но какой смысл в том, чтобы..."
  - char: "yamashiro"
    side: "left"
    text:
      - "Спасибо, что спасла нас, Акаги! Если бы не ты, все наши серийные корабли, наверное, были бы уничтожены!"
  - char: "akagi"
    side: "right"
    text:
      - "...Ты думаешь, я стала бы истощать наши ресурсы ради захвата базы такого размера? Я отправила серийные корабли лишь для того, чтобы оценить характеристики противника."
      - "Ямасиро, ты понадобишься мне для захвата более важной цели."
  - char: "yamashiro"
    side: "left"
    text:
      - "Более важной цели?.. Ты про ту башню вон там? Я не уверена, что смогу одолеть ещё более сильных врагов..."
  - char: "akagi"
    side: "right"
    text:
      - "Погоди. Я ещё не договорила."
      - "Микаса уже выстроила оборонительный периметр в южной части доски. Если мы позволим её силам соединиться с силами Нагато, нам конец."
      - "Дзинцу, я хочу, чтобы ты присоединилась к Миюки. Пройдите мимо центральной башни и ищите возможность разъединить Микасу и Нагато."
  - char: "jintsuu"
    side: "left"
    text:
      - "Принято!"
  - char: "miyuki"
    side: "left"
    text:
      - "Принято!"
  - char: "akagi"
    side: "right"
    text:
      - "Ямасиро, на тебя возложена важная задача — не дать силам Микасы продвинуться к центральной башне. Тебе нужно удерживать воды в этом районе."
  - char: "yamashiro"
    side: "left"
    text:
      - "Я так и знала, что меня пошлют именно туда! Ух, все же на меня навалятся..."
  - char: "ryuuhou"
    side: "right"
    text:
      - "В этой зоне будет жарче всего, но с твоей живучестью ты наверняка справишься. Уверена, Акаги выбрала именно тебя, потому что ты лучше всего подходишь для этой задачи."
  - char: "yamashiro"
    side: "left"
    text:
      - "О, вот оно что... Ну, раз Акаги так во мне уверена..."
  - char: "ryuuhou"
    side: "right"
    text:
      - "Удивительно, но вы двое, кажется, неплохо сработались."
      - "Акаги, позволь и мне отправиться к центральной башне. На случай, если там что-то произойдет, вдвоем будет безопаснее."
  - char: "akagi"
    side: "left"
    text:
      - "Это оставит меня с меньшим числом помощников для другого маневра, но верно и то, что вдвоем у вас будет больше свободы действий."
      - "Мы сможем это реализовать... Разрешаю. Обязательно прикрывай Ямасиро."
  - char: "ryuuhou"
    side: "right"
    text:
      - "Поняла, Акаги."
  - char: "akagi"
    side: "left"
    text:
      - "Что ж, Великий Ветеран Микаса. Твой ход."

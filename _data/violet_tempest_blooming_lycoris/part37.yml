chapter1:
  rows:
  - char: "musashi"
    side: "left"
    text:
      - "Дзинцу, каковы результаты наблюдений?"
  - char: "jintsuu_meta"
    side: "right"
    status: "is-purple"
    text:
      - "Всё прошло гладко. Судя по данным, показатели Ватацуми остаются стабильными..."
      - "Ему уже удалось перестроить Первородный Куб в соответствии с ожиданиями Акаги."
      - "Теперь она может свободно использовать Первородный Куб по собственной воле, не опасаясь повторить судьбу Бисмарк."
  - char: "musashi"
    side: "left"
    text:
      - "Похоже на успех... Но неужели подобные вещи действительно могут проходить настолько гладко?"
  - char: "jintsuu_meta"
    side: "right"
    status: "is-purple"
    text:
      - "Мы уже проводили аналогичный эксперимент в прошлом, так что в этот раз мы лишь применили отработанную практику."
  - char: "musashi"
    side: "left"
    text:
      - "Однако обработке подвергся только Первородный Куб... Что станет с обычным Кубом Мудрости, составляющим саму «основу» Акаги, под воздействием столь мощного потока энергии?"
  - char: "jintsuu_meta"
    side: "right"
    status: "is-purple"
    text:
      - "Он неизбежно пострадает, а затем начнет постепенно разрушаться и распадаться... Что касается времени, то здесь всё индивидуально."
      - "Конечно, этот процесс протекает гораздо мягче, чем при прямом облучении Первородным Кубом, и если вовремя остановиться, её еще можно будет спасти."
      - "Впрочем, на самом деле тебя ведь не особо заботит судьба Акаги, не так ли?.."
  - char: "musashi"
    side: "left"
    text:
      - "Иными словами, суть этой технологии заключается вовсе не в том, чтобы сделать процесс META-трансформации безвредным, а лишь в том, чтобы максимально продлить срок службы измененной кансен..."
  - char: "jintsuu_meta"
    side: "right"
    status: "is-purple"
    text:
      - "Потому что это всего лишь промежуточный этап. Но как только оружие решающего удара с Ватацуми в качестве ядра будет успешно создано, полностью контролируемая и стабильная META-трансформация перестанет быть проблемой."
  - char: "musashi"
    side: "left"
    text:
      - "А как ты сама прошла META-морфозу?"
  - char: "jintsuu_meta"
    side: "right"
    status: "is-purple"
    text:
      - "Ты ведь уже и сама обо всём догадалась... Кхе-кхе-кхе..."
  - char: "musashi"
    side: "left"
    text:
      - "Твоё слабое здоровье тоже связано с этим «промежуточным этапом»?"
  - char: "jintsuu_meta"
    side: "right"
    status: "is-purple"
    text:
      - "Вовсе нет, к моменту моего использования эта технология уже была доведена до ума. Проблемы с моим телом — следствие куда более трагического события, о котором мне не очень хочется вспоминать."
      - "К тому же, вопреки всему, я жива, сохраняю рассудок и обладаю силой — разве этого мало?"
  - char: "musashi"
    side: "left"
    text:
      - "Ты постоянно подчеркиваешь полезность оружия решающего удара."
      - "Но ведь в прошлом у вас было это оружие — почему же вы всё равно проиграли?"
  - char: "jintsuu_meta"
    side: "right"
    status: "is-purple"
    text:
      - "...Это потому, что оружие решающего удара так и не было выведено на поле боя. Кое-кто чересчур осторожный до самого конца препятствовал этому."
      - "И, к огромному сожалению, в итоге этому человеку всё удалось."
      - "Так что на сей раз мы ни в коем случае не должны повторить прошлых ошибок, тебе понятно?"
  - char: "musashi"
    side: "left"
    text:
      - "...В твоих словах чувствуется нечто до боли знакомое и успокаивающее."
      - "Это по-настоящему опасно. Какова же твоя истинная цель, и зачем ты пришла мне помочь?"
  - char: "jintsuu_meta"
    side: "right"
    status: "is-purple"
    text:
      - "Мои дни уже сочтены. Я лишь хочу исправить хотя бы малую часть былых ошибок из своей памяти, прежде чем окончательно рухну..."
      - "Сегодняшний успех — лишь первый шаг на пути в десять тысяч ли, госпожа Мусаси. Давайте не будем терять времени..."

chapter1:
  rows:
  - text:
      - "На следующий день после учений море и небо были безмятежны, словно недавняя буря была всего лишь иллюзией."
  - char: "yamashiro"
    side: "left"
    text:
      - "*Потягивается и зевает* А-ах, какая же сегодня прекрасная погода~"
      - "Когда мы вчера покидали зону учений, снаружи бушевал такой жуткий шторм! Я уж было подумала, что до сих пор заперта внутри той доски для Го!"
  - char: "musashi"
    side: "right"
    text:
      - "Погода вокруг Святилища бывает довольно капризной. Молюсь, чтобы ваш путь домой был столь же приятным, как этот погожий день."
  - char: "yamashiro"
    side: "left"
    text:
      - "Спасибо за гостеприимство, Мусаси! Игра тоже была просто супер! Что ж, девочки, я отправляюсь!"
  - char: "musashi"
    side: "right"
    text:
      - "Рада была принять тебя. Не забывай заглядывать к нам время от времени."
  - char: "mikasa"
    side: "left"
    text:
      - "Хм? Только сейчас заметила, что я весь день не видела ни Акаги, ни Кагу. Не очень-то вежливо уплывать по-тихому, даже не попрощавшись."
  - char: "musashi"
    side: "right"
    text:
      - "Ах, насчет этого... Прошлой ночью я получила срочный вызов с главного острова, и им обеим пришлось немедленно вернуться."
  - char: "mikasa"
    side: "left"
    text:
      - "И ты позволила им выйти в море в такой шторм? Надеюсь, с ними ничего не случилось..."
  - char: "musashi"
    side: "right"
    text:
      - "Я, разумеется, умоляла их остаться. Но ты же знаешь, какой упрямой может быть Акаги."
      - "Ну так что, вы с Нагато не желаете сыграть еще одну партию в Го? На этот раз в самую обычную, классическую."
      - "К слову говоря, помимо той доски у меня здесь есть еще кое-какие вещи, которые могли бы вас заинтересовать."
  - char: "mikasa"
    side: "left"
    text:
      - "Ха-ха... Я искренне ценю твою доброту, Мусаси, но у меня тоже есть неотложные дела. Хотя игра вчера выдалась на редкость занимательной. Я бы не отказалась сыграть с тобой как-нибудь в другой раз."
  - char: "musashi"
    side: "right"
    text:
      - "А что скажешь ты, Лиса-Хранительница? Вчера я обещала показать тебе возможности серийного корабля, модернизированного технологиями Сирен, не так ли?"
  - char: "nagato"
    side: "left"
    text:
      - "Я бы с радостью приняла твое предложение, но наша вчерашняя игра и так слишком затянулась. Прошу прощения, но нам придется отложить это до лучших времен."
      - ": Если я понадоблюсь, просто передай послание через Ямакадзэ. А теперь, прошу меня извинить..."

chapter2:
  rows:
  - char: "nagato"
    side: "left"
    text:
      - "Мне жаль, Микаса... Если бы я тогда отдала приказ атаковать Кагу, мы бы..."
  - char: "mikasa"
    side: "right"
    text:
      - "Не забивай себе голову, Нагато. Это всего лишь игра."
  - char: "nagato"
    side: "left"
    text:
      - "Мусаси сама мне сказала: если бы я победила, она бы ответила на любой мой вопрос."
  - char: "mikasa"
    side: "right"
    text:
      - "Какой же запутанный способ вести переговоры. Мы могли бы просто посидеть за чаем с пирожными..."
      - "Но, полагаю, в одном она всё же была права. Если мы вообще ничего не знали обо всем происходящем, то какие полезные ответы мы могли бы из неё выудить?"
      - "Связь между снами Синано и «Реконструкциями». Местонахождение подлинного Ватацуми. Барьер вокруг Священной Сакуры..."
      - "Слишком многое еще предстоит расследовать. Единственный ответ, который мы в итоге получили, — это «истинные чувства» Акаги."
  - char: "nagato"
    side: "left"
    text:
      - "Учитывая, что мы проиграли, полагаю, это вполне достойный утешительный приз..."
  - char: "mikasa"
    side: "right"
    text:
      - "Ладно, хватит хандрить. Давайте возвращаться домой и думать, что мы будем делать дальше."

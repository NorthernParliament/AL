chapter1:
  rows:
  - char: "musashi"
    side: "left"
    text:
      - "Нет ничего плохого в том, чтобы позволить кому-то другому победить. Но знаешь ли ты, что значит вверить свою волю другому человеку?"
  - text:
      - "Мусаси теперь сидела у доски в полном одиночестве, молча наблюдая за ситуацией в зоне учений."
  - char: "musashi"
    side: "left"
    text:
      - "В отличие от Нагато и Акаги, ты уже обладаешь истинной силой. Неудивительно, что мы не смогли сойтись во взглядах."
  - text:
      - "Стоило Мусаси недовольно нахмуриться, как со стороны окна донеслось знакомое щебетание. Маленькая птичка мягко опустилась ей на плечо."
  - char: "musashi"
    side: "left"
    text:
      - "Так ты снова прилетела. Разве я не говорила, что эта пагода не укроет тебя от непогоды?"
      - "Но раз уж ты так настойчиво хочешь составить мне компанию... Я могу хотя бы защитить тебя от грядущей бури."
  - text:
      - "Словно ободрённая словами Мусаси, молодая ласточка щебетнула несколько раз."
  - char: "musashi"
    side: "left"
    text:
      - "Какое же ты любопытное создание... Что ж, у меня есть к тебе небольшой вопрос."
      - "Как думаешь, кто станет победителем в этих «учениях»?"
  - text:
      - "Мусаси указала на голографический дисплей перед собой, и ласточка несколько раз взмахнула крыльями, будто отвечая ей."
  - char: "musashi"
    side: "left"
    text:
      - "Ха-ха, этот вопрос и впрямь может оказаться для тебя слишком сложным... Совсем как и для меня."
  - char: "communicator"
    side: "right"
    text:
      - "ПИК! ПИК! ПИК!"
  - text:
      - "Коммуникатор рядом с ней издал три предупреждающих сигнала, после чего снова умолк. Мусаси перевела взгляд обратно на доску."
  - char: "musashi"
    side: "left"
    text:
      - "Теперь, когда все собрались вокруг башни... Давайте покончим с этой игрой."
      - "Я расставила для тебя фигуры. Я привела тебя к той силе, которой ты жаждешь."
      - "Но я не могу сделать ничего больше, кроме как подготовить для тебя сцену. Сможешь ли ты стать звездой этого представления... теперь зависит лишь от крепости твоей воли."
      - "Выжми всё из этого выступления, о немощное дитя."

chapter1:
  rows:
  - char: "mikasa"
    side: "left"
    text:
      - "начит, ты решила пренебречь малыми базами рядом с тобой и сразу отправилась к Дворцу Дракона. М-хм, смелый ход."
  - char: "musashi"
    side: "right"
    text:
      - "Нельзя почивать на лаврах, пока полностью не овладеешь ходом сражения. Разве вы, Великий Ветеран, не знаете, что это истина?"
  - char: "mikasa"
    side: "left"
    text:
      - "Кто знает? Ты можешь обнаружить, что этот «ход» слишком могуч и неспокоен, чтобы его обуздать. Сможет ли твой флот из пяти кораблей одолеть высокоранговое судно?"
  - char: "musashi"
    side: "right"
    text:
      - "Вот тогда... ты и станешь свидетелем силы моей решимости. Этот узел падет передо мной уже на моем следующем ходу."
      - "К тому же Нагато была достаточно любезна, чтобы оставить мне предостаточно пространства для маневра. Я была бы глупцом, если бы не воспользовалась этим."
  - char: "nagato"
    side: "left"
    text:
      - "Если ты не выказываешь намерения напасть на меня, то и у меня нет причин делать первый шаг."
      - "В любом случае, я бы предпочла сначала уничтожить этих усиленных серийных Сирен."
  - char: "musashi"
    side: "right"
    text:
      - "Это было бы выгодно и мне. Хоть это и серийные корабли, технологии Сирен никогда не стоит недооценивать, особенно в этих условиях."
      - "Серийные модели, с которыми мы столкнулись, сильнее тех, что мы встречали у Диадемы Света."
  - char: "nagato"
    side: "left"
    text:
      - "Должна признать, то, как прогрессируют технологии Сирен, выше моего понимания."
  - char: "musashi"
    side: "right"
    text:
      - "Тогда, может, встретимся как-нибудь? Я была бы рада лично показать тебе, как разбирать эти суда на части."
  - char: "nagato"
    side: "left"
    text:
      - "Что ж, если тебе это удобно."
      - "Хм... Должна заметить, твои вассалы, кажется, испытывают трудности, Мусаси."
      - "Ты сказала, что рассчитываешь захватить Дворец Дракона на следующем ходу, но результаты твоего гамбита кажутся не слишком удовлетворительными."
  - char: "musashi"
    side: "right"
    text:
      - "Я предвидела такую вероятность. Похоже, на этот раз удача была не на моей стороне."
  - char: "mikasa"
    side: "left"
    text:
      - "Полагаю, это означает, что на следующем ходу твои силы застрянут на этой клетке. Ты попыталась откусить больше, чем смогла проглотить, и в итоге это вышло тебе боком. Ха-ха-ха!"
  - char: "musashi"
    side: "right"
    text:
      - "Хех. Как ты и сказала, это был досадный просчёт. Будет очень жаль, если ты решишь атаковать меня, пока я уязвима."
  - char: "mikasa"
    side: "left"
    text:
      - "О чём ты говоришь? Только у Нагато и Акаги есть возможность напасть на тебя. Я нахожусь на другом конце доски."
  - char: "akagi"
    side: "right"
    text:
      - "И по какой же причине я должна вредить бедной Мусаси? О, Нагато, не могла бы ты вернуть коммуникатор?"
      - "Тебе ведь он на самом деле не нужен, верно? Твои вассалы получат приказы, стоит тебе лишь пожелать."
  - char: "nagato"
    side: "left"
    text:
      - "Я знаю. Мне просто не нравится этот холодный, безличный подход к делам."
      - "Наши друзья — не просто пешки на шахматной доске. Они — живые люди из плоти и крови, такие же, как и мы."
      - "Разве правилами запрещено отдавать приказы напрямую, даже если я нахожусь в невыгодном положении, раскрывая их всем вам?"
  - char: "akagi"
    side: "right"
    text:
      - "Конечно нет. В конце концов, тот факт, что ты решила «раскрыть» свои планы, вполне может быть частью твоей глобальной стратегии."
      - "Однако должна сказать, Нагато... чрезмерная привязанность к таким мелочам, как этикет, может в итоге затуманить твой рассудок в критический момент."
  - char: "nagato"
    side: "left"
    text:
      - "...Например, когда придётся выбирать, брать ли на мушку собственных друзей?"
  - char: "akagi"
    side: "right"
    text:
      - "Если ты действительно стремишься вести Империю Сакуры к светлому будущему... то можешь оказаться перед таким выбором, хочешь ты того или нет."
  - char: "nagato"
    side: "left"
    text:
      - "...Посмотрим."
  - char: "musashi"
    side: "right"
    text:
      - "Что ж, на этом мой ход окончен. Снова твоя очередь, Акаги."

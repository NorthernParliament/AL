chapter1:
  rows:
  - char: "hiei"
    side: "left"
    text:
      - "Итак, Акаги, Микаса, Нагато, а затем Мусаси — каждая делает ход именно в таком порядке... Интересно, есть ли за этим какой-то особый подтекст."
  - char: "haruna"
    side: "right"
    text:
      - "Ты, вероятно, снова всё усложняешь. Бьюсь об заклад, они просто сидят за столом в таком порядке."
  - char: "hiei"
    side: "left"
    text:
      - "А ты можешь быть уверена, что порядок, в котором они заняли места за столом, тоже не был предопределен заранее?"
  - char: "haruna"
    side: "right"
    text:
      - "Думаешь... у Мусаси есть какой-то иной план?"
  - char: "hiei"
    side: "left"
    text:
      - "Этого я сказать не могу. В конце концов, я и вправду склонна слишком много размышлять, как ты и заметила."
  - char: "haruna"
    side: "right"
    text:
      - "Очень на это надеюсь... Кстати, Нагато, похоже, повторяет маневр Микасы и атакует Мусаси с фланга."
  - char: "nagato_rad"
    side: "left"
    text:
      - "Не совсем так. Слушайте мой приказ:"
      - "Харуна и Харуцуки выдвинутся к территории Мусаси и остановят продвижение её сил."
      - "Мы переместим наши серийные корабли, чтобы окружить Священную Сакуру."
      - "Хиэй, Кавакадзэ и Сёкаку — подготовиться к захвату прилегающей базы на нашем следующем ходу."
      - "После этого мы объединим наши силы для фронтальной атаки на вражескую оборону."
      - "С этой целью я позабочусь о том, чтобы на этом ходу мы не понесли никаких потерь."
  - text:
      - "Как только сеанс связи с Нагато завершился, в небе появился символ щита, а вокруг сил Нагато материализовались световые барьеры."
  - char: "kawakaze"
    side: "left"
    text:
      - "Благословение госпожи Нагато с нами!"
  - char: "shoukaku"
    side: "right"
    text:
      - "Пока этот барьер держится, мы легко сможем занять соседнюю базу, не получив ни единого повреждения."
  - char: "haruna"
    side: "left"
    text:
      - "Несмотря на оборонительный уклон, Нагато не верит в тактику выжидания."
  - char: "hiei"
    side: "right"
    text:
      - "Проактивная стратегия, направленная на нейтрализацию угроз при обеспечении безопасности каждого..."
      - "Должно быть, именно таким леди Нагато видит будущее. Как это на неё похоже, хи-хи."
  - char: "harutsuki"
    side: "left"
    text:
      - "Верно. К тому же, в отличие от Акаги и Микасы, госпожа Нагато отдала приказы нам лично."
  - char: "hiei"
    side: "right"
    text:
      - "Будто она сама присоединилась к нам на поле боя... Каким харизматичным лидером она стала."
  - char: "kawakaze"
    side: "left"
    text:
      - "Лисица-Хранительница изъявила свою волю! Не колеблитесь и выполняйте инструкции!"

chapter2:
  rows:
  - text:
      - "На игровой доске между пересечением четырех квадратов расположена ромбовидная «база»."
      - "Каждую базу защищает судно Сирен, и прежде чем ее можно будет захватить, необходимо установить контроль над окружающими секторами."
  - char: "kawakaze"
    side: "left"
    text:
      - "Опять судно типа Координатор, да? Я перебила их немало в Зеркальных морях."
  - char: "haruna"
    side: "right"
    text:
      - "Отлично, гуманоидная Сирена. Я уже начала уставать от крушения этих серийных кораблей."
  - char: "shoukaku"
    side: "left"
    text:
      - "Не будь слишком самонадеянной. В обычных условиях мы бы стерли этих Сирен в порошок без труда, но помни — наша оснастка сейчас не так мощна, как обычно. Мы также не знаем, были ли эти Сирены как-то усилены."
      - "Что мне действительно любопытно, так это то, как нам удалось заполучить столько судов Сирен..."
  - char: "haruna"
    side: "right"
    text:
      - "Ну, от них не исходит той враждебной ауры, что обычно присуща Сиренам. Значит ли это, что мы нашли способ ими управлять?"
  - char: "shoukaku"
    side: "left"
    text:
      - "«Чудеса существуют за гранью реальности»."
      - "Мусаси говорила что-то в этом духе, но она склонна пускаться в философию. Зная о причастности Акаги к этим учениям, я не удивлюсь, если мы на самом деле находимся внутри исследовательского центра Сирен."
      - "Хотя я не имею ничего против использования Зеркального моря для тренировок..."
      - "Нам стоит опасаться настоящих Сирен, которые могут прокрасться сюда и устроить хаос, как это было с тем экспериментом Железной Крови."
      - "*вздох* Я очень надеюсь, что Акаги не втягивает нас в какую-нибудь ужасную заваруху."
      - "Дзуйкаку ужасно опекает госпожу Нагато, и если с ней что-то случится под моим присмотром, она мне этого вовек не забудет."
  - char: "hiei"
    side: "right"
    text:
      - "Сомневаюсь, что есть серьезные поводы для беспокойства. Я слышала, что эта зона учений отражает ментальное состояние участников."
      - "Это хорошая возможность узнать, к чему стремится Акаги, так что нам просто нужно сохранять бдительность."

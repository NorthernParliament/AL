chapter1:
  rows:
  - char: "kirishima"
    side: "left"
    text:
      - "Акаги отправила флот, чтобы удерживать воды вокруг центральной башни."
  - char: "hatakaze"
    side: "right"
    text:
      - "Она пытается помешать нам помочь госпоже Нагато?"
      - "Она только что захватила базу, но уже готова сделать следующий ход..."
  - char: "haguro"
    side: "left"
    text:
      - "Но разве это не ставит нас в трудное положение? Мы ведь даже ещё не закончили захват Диадемы Света."
  - char: "kongou"
    side: "right"
    text:
      - "Микаса сказала, что она справится с этой ситуацией."
      - "Мы продолжим оказывать давление в центральной зоне, чтобы сковать силы Акаги и позволить Нагато занять все оставшиеся малые базы по периметру."
      - "Акаги пытается выполнить три задачи одновременно, используя скорость и дезинформацию, чтобы сбить нас с толку. Однако она не может собрать значительные силы ни для одной из этих целей."
  - text:
      - "Изучая карту зоны учений, Конго передавала сообщения, полученные напрямую от Микасы."
  - char: "kongou"
    side: "right"
    text:
      - "Даже если Акаги удастся захватить часть баз вокруг центральной башни, у неё не хватит ресурсов, чтобы продвинуться дальше на запад."
  - char: "kinu"
    side: "left"
    text:
      - "Зачем она это делает? Разве Акаги не должна знать, что наши силы сосредоточены вокруг Диадемы Света?"
  - char: "hatakaze"
    side: "right"
    text:
      - "Скорее всего, именно поэтому она отправила лишь небольшой отряд."
      - "Если бы она планировала захватить какие-то другие базы на западной стороне, ей пришлось бы задействовать гораздо больше ресурсов."
      - "Вот почему я думаю, что это может быть финтом. Несмотря на наше численное преимущество, мы рискуем попасть в клещи, если слишком сосредоточимся на окружении этого отряда."
      - "Независимо от того, к чему именно стремится Акаги, она будет держать свои силы в зоне, где они смогут прийти друг другу на выручку."
  - char: "kinu"
    side: "left"
    text:
      - "Иными словами, нам выгодно держать врага в одном месте?"
  - char: "kongou"
    side: "right"
    text:
      - "Скорее всего, мы можем предположить следующее: Акаги пытается удержать нас от атаки на центральную башню."
      - "Я понимаю, чего хочет добиться Микаса, так что следующий шаг — превратить эту ситуацию в наше преимущество."
      - "В конце концов, мы не торопимся захватывать центральную башню. Напротив, Акаги окажет нам огромную услугу, если разведает, с каким именно врагом мы имеем дело в этой башне."
      - "На данный момент сосредоточьтесь на захвате Диадемы Света."
  - char: "haguro"
    side: "left"
    text:
      - "Значит, мы направим всю нашу огневую мощь на базы и постараемся избегать столкновений с другими девушками-кораблями, да?"
      - "Точно, я только что получила отчет от самолетов-разведчиков — впереди судно Омиттера."
      - "Омиттеры, как правило, более агрессивны, чем другие типы Сирен, но это не тот бой, от которого мы можем отступить."
  - char: "kongou"
    side: "right"
    text:
      - "Не волнуйтесь."
      - "Микаса сообщила мне, что эта битва станет для нас решающей. Ничего не жалейте и обрушьте на судно Омиттера всё, что у вас есть."
      - "Разумеется, я тоже к вам присоединюсь. Разве может первый корабль типа «Конго» упустить такой шанс на славу?"
      - "Я возглавлю атаку! Захватим Диадему Света, а затем развернемся единым строем и перехватим флот Акаги!"

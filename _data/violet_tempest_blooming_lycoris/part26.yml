chapter1:
  rows:
  - text:
      - "После того как Кирисима была выведена из строя внезапной контратакой башни, флот Микасы последовал примеру Акаги и отступил на безопасное расстояние."
  - char: "kinu"
    side: "left"
    text:
      - "До сих пор не могу поверить, что мы потеряли Кирисиму вот так запросто... Хагуро, что произошло?"
  - char: "haguro"
    side: "right"
    text:
      - "Из четырех кораблей, оказавшихся слишком близко к башне, только Ямасиро сумела выдержать эту ударную волну... Проклятая Акаги, она нарочно оставила нам путь к башне открытым, прекрасно зная, на что та способна!"
  - char: "mikasa"
    side: "left"
    text:
      - "Я бы не стала делать поспешных выводов. Нам просто нужно снова вернуться к выжидательной тактике."
      - "А пока давайте тоже перегруппируемся и наведем порядок в рядах. Мы приближаемся к самой важной части матча, так что не теряйте концентрации!"
  - char: "kongou"
    side: "right"
    text:
      - "Хорошо сказано, Великий Ветеран! Веди же нас вперед, к победе!"
  - char: "mikasa"
    side: "left"
    text:
      - "Исход этой игры вполне может решиться тем, кто захватит башню, но очевидно, что ни у кого из нас пока нет для этого возможностей."
      - "Акаги, судя по всему, тоже это поняла. Вот почему она отступила и разворачивается, чтобы занять базы, которые пропустила ранее."
  - char: "hatakaze"
    side: "right"
    text:
      - "Микаса, не думаю, что из-за нынешних погодных условий я сейчас буду очень полезна в бою, но я могу продолжить разведку вокруг башни, используя преимущество в скорости и маневренности."
  - char: "mikasa"
    side: "left"
    text:
      - "Идет. Мы с Конго поддержим тебя, чтобы серийные Сирены не представляли угрозы, но постарайся не подходить слишком близко, иначе привлечешь внимание патрульных флотов Арбитра."
      - "И последнее — нам нужно пристально следить за каждым шагом Мусаси. Теперь, когда Нагато, Акаги и я вступили в бой, Мусаси остается единственной, чьи намерения для нас совершенно загадочны."
      - "Если она всё же решит лично явиться на поле боя, кто-то должен будет её остановить."
  - char: "hatakaze"
    side: "right"
    text:
      - "Вас поняла."
  - char: "haguro"
    side: "left"
    text:
      - "Так, эм... А от меня что-нибудь требуется?"
  - char: "mikasa"
    side: "right"
    text:
      - "Просто оставайся с Кину и присоединяйся к флоту Нагато. Помоги ей захватить как можно больше баз."
  - char: "haguro"
    side: "left"
    text:
      - "Принято. Нагато сможет победить, если наберет достаточно оставшихся баз, верно?"
  - char: "mikasa"
    side: "right"
    text:
      - "Именно. Центральная башня, может, и стоит десять очков, но этот разрыв вполне можно компенсировать."
      - "В данный момент Нагато лидирует с девятью очками, так что нам нужно сделать так, чтобы на доске просто не осталось свободных очков, позволяющих обойти её."
  - char: "hatakaze"
    side: "left"
    text:
      - "В случае, если центральную базу вообще никто не сможет взять, Нагато победит автоматически — при условии, что удержит лидерство."
  - char: "haguro"
    side: "right"
    text:
      - "Ладно. Тогда за дело..."
  - char: "mikasa"
    side: "left"
    text:
      - "Нагато, тебя устраивают такие перестановки?"
  - char: "nagato_rad"
    side: "right"
    text:
      - "Они весьма дальновидны, спасибо тебе."
  - char: "mikasa"
    side: "left"
    text:
      - "Вот и славно. Давайте сосредоточимся на повышении нашей боеспособности, а к этой башне вернемся чуть позже."

chapter2:
  rows:
  - char: "nagato"
    side: "left"
    text:
      - "Отныне, чтобы одержать победу, мы будем полностью сотрудничать с Микасой."
      - "Небольшая группа займется захватом как можно большего числа баз, в то время как остальные начнут подготовку к штурму центральной башни."
      - "Как только все базы окажутся под нашим контролем, мы сможем обрушить на эту башню все имеющиеся у нас силы."
      - "Как соратницы по Империи Сакуры, мы ни в коем случае не должны обращать оружие друг против друга... На этот компромисс я никогда не пойду."
  - char: "shoukaku"
    side: "right"
    text:
      - "Нагато, даже если ты займешь базы Микасы, тебе всё равно не хватит очков для победы, если ты не вступишь на территорию Мусаси. Разве прямое столкновение с её силами в таком случае неизбежно?"
      - "Что произойдет, если Мусаси действительно планирует дать тебе отпор, чтобы не позволить захватить эти базы?"
  - char: "nagato"
    side: "left"
    text:
      - "Мусаси не сможет победить, даже если захватит центральную башню. Нам остается лишь надеяться, что помощь Акаги для неё важнее, чем попытки помешать нам."
      - "С помощью Хагуро нам не придется задействовать много ресурсов, чтобы завершить захват оставшихся баз Микасы."
      - "Сёкаку, Харуна и Хиэй — я хочу, чтобы вы трое начали выдвигаться в сторону территории Мусаси."
      - "Мы с Кавакадзэ присоединимся к Микасе и займемся зачисткой вражеских сил, которые появляются из башни."
      - "Если мы объединим усилия, победа будет за нами! Всем приготовиться к выдвижению!"

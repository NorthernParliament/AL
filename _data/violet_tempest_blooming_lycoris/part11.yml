chapter1:
  rows:
  - char: "kawakaze"
    side: "left"
    text:
      - "...Этот морской туман спутал нам все карты."
  - char: "shoukaku"
    side: "right"
    text:
      - "Создаёт условия, выгодные только для авианосцев, таких как она сама... Ничего другого от этой хитрой женщины я и не ожидала."
      - "О, я почти забыла — я ведь тоже авианосец, так что на мне это негативно не скажется. Вот если бы еще Дзуйкаку была здесь, вздох..."
      - "Кстати, это ведь Мусаси приказала Дзуйкаку нанести визит в Железную Кровь перед этими учениями, верно?"
      - "Эх... Думаете, она сделала это специально, чтобы разлучить нас?"
  - char: "haruna"
    side: "left"
    text:
      - "Думаю, ты всё усложняешь... Это ведь просто морские учения, нет? Зачем Мусаси организовывать целый дипломатический ход ради усложнённой игры в го?"
  - char: "shoukaku"
    side: "right"
    text:
      - "Мусаси никогда не казалась мне таким человеком, но когда замешана Акаги, никогда не знаешь наверняка!"
      - "Я не удивлюсь, если частичка хитрости этой лисицы передалась и Мусаси... Хотя, полагаю, мне не стоит разбрасываться беспочвенными обвинениями..."
  - char: "hiei"
    side: "left"
    text:
      - "Верно, нам и так трудно сосредоточиться на том, что происходит прямо перед нами. Из-за тумана мы совсем не видим флот Мусаси..."
      - "Если Мусаси воспользуется туманом, чтобы подобраться к нам поближе..."
  - char: "nagato_rad"
    side: "right"
    text:
      - "Слушайте внимательно. Сейчас я изложу наши контрмеры против морского тумана Акаги."
      - "Харуна будет патрулировать территорию, прилегающую к силам Мусаси, после захвата местной базы."
      - "Хиэй, Кавакадзэ и Харуцуки отступят, чтобы обеспечить поддержку Сёкаку и одновременно сдерживать флот Мусаси."
      - "Мы должны помешать Мусаси занять Священную Сакуру под прикрытием тумана."
      - "Сёкаку укрепит свою позицию, используя наши серийные корабли."
      - "Я уже знаю, чего добивается Акаги, но если я раскрою это сейчас, она соответствующим образом изменит свои действия."
      - "Сохраняйте бдительность, но выполняйте инструкции, которые я вам только что дала. Установите контроль над окружающими базами."
  - text:
      - "Когда голос Нагато стих, вокруг Сёкаку появились новые символы."
  - char: "harutsuki"
    side: "left"
    text:
      - "Ого... Должно быть, это защита богов... То есть, Лисицы-Хранительницы!"
  - char: "haruna"
    side: "right"
    text:
      - "Поскольку Сёкаку — ядро стратегии Нагато на этом ходу, ей направляются все наши силы и ресурсы!"
  - char: "shoukaku"
    side: "left"
    text:
      - "(Я чувствую, как во мне закипает огромная мощь... Что же это за зона учений такая на самом деле?)"
      - "(Неужели никто больше не чувствует здесь ничего странного? Как мы должны проводить практические тренировки, когда здесь можно просто «пожелать» появления невероятной силы?)"
      - "(Ну ладно, подумаю об этом позже. Может, Командир что-то знает о происходящем~ )"

chapter1:
  rows:
  - char: "hatakaze"
    side: "left"
    text:
      - "Проклятье... Я совсем не могу пошевелить оснасткой после того, как приняла эту ударную волну на себя... Думаю, с меня хватит..."
      - "Но... это доказывает, что интуиция Микасы была верна. Акаги пытается проредить наши ряды."
  - char: "mikasa"
    side: "right"
    text:
      - "Мы должны ответить соответствующим образом. Мы не можем позволить ей безнаказанно вытворять подобное."
      - "Хатакадзэ, отступай, пока еще можешь. Я не знаю, сколько у нас времени, но нам нужно тянуть его как можно дольше, пока нет четкого понимания, как захватить башню."
      - "Если мы продержимся до тех пор, пока не истечет время, Нагато выйдет победителем."
      - "Мусаси... Нет, она и Акаги — обе ограничены во времени. Нам просто нужно удерживать ситуацию под контролем."
      - "Кину, вы двое сможете взять оставшиеся серийные корабли и помочь Нагато захватить уцелевшие базы?"
  - char: "haguro"
    side: "left"
    text:
      - "Поняла. Безопасность в количестве, верно?"
  - char: "mikasa"
    side: "right"
    text:
      - "Именно. Главная загадка — это то, что планирует делать Мусаси, но если мы успеем подлатать Хатакадзэ на этом ходу, Мусаси придется решать, стоит ли ей доводить дело до конца."
      - "Конго, выдвигайся на север, чтобы Мусаси не смогла атаковать, не пересекая сначала центральную зону, подконтрольную Сиренам."
  - char: "kongou"
    side: "left"
    text:
      - "Предоставь это мне."
  - char: "mikasa"
    side: "right"
    text:
      - "(Это мое испытание для вас двоих, Мусаси и Акаги. Вы думали, что Хатакадзэ станет легкой добычей, но давайте посмотрим, на что вы готовы пойти ради сокращения наших рядов.)"

chapter2:
  rows:
  - char: "harutsuki_rad"
    side: "left"
    text:
      - "Госпожа Нагато, мы закончили захват и этой точки! Мы стали еще на шаг ближе к победе!"
  - char: "nagato"
    side: "right"
    text:
      - "Спасибо за ваши усилия. Это касается также Хиэй и Харуны."
  - char: "hiei_rad"
    side: "left"
    text:
      - "Нам удалось сдерживать Вакацуки достаточно долго, чтобы захватить базу без необходимости вступать в прямой бой."
  - char: "wakatsuki_rad"
    side: "right"
    text:
      - "Как и ожидалось... Нагато не клюнет на приманку, а мне не прорваться сквозь эти линкоры..."
  - char: "nagato"
    side: "left"
    text:
      - "Как только база захвачена, никто другой уже не сможет её отнять."
  - char: "wakatsuki_rad"
    side: "right"
    text:
      - "Если бы не эти приказы... я бы сама желала вам успеха, госпожа Нагато..."
  - char: "nagato"
    side: "left"
    text:
      - "...Спасибо тебе. На этом мой ход окончен."

chapter1:
  rows:
  - char: "sakawa"
    side: "left"
    text:
      - "Похоже, все так и норовят урвать оставшиеся базы, прежде чем устраивать потасовку за центральную башню~"
      - "Вдобавок ко всему Нагато и Микаса, кажется, выстроились так, чтобы намертво заблокировать любые наши попытки подойти к башне, пока они не соберут свои силы."
  - char: "chitose"
    side: "right"
    text:
      - "Я... я до сих пор не могу поверить, что Тиёда выбыла вот так запросто... Всё ли с нами будет в порядке?"
  - char: "wakatsuki"
    side: "left"
    text:
      - "Я только что видела, как Нагато перебрасывает свои силы к северу от нас! Она собирается пересечь границу нашей территории и захватить базы, которые мы оставили позади!"
      - "Но даже если мы защитим эти базы, не думаю, что мы ещё сможем победить... Как думаете, Мусаси придёт нам на помощь?"
  - char: "sakawa"
    side: "right"
    text:
      - "Я уверена в этом! Скорее всего, она просто выжидает идеальный момент для грандиозного появления!"
      - "Нагато, которая снизошла с изяществом танцующих на ветру лепестков сакуры, и Акаги, обрушившаяся огненным дождем с небес!"
      - "Микаса действовала не так эффектно, но она всё же лишила нас возможности двигаться на какое-то время... Я уверена, что Мусаси перевернет ход битвы с оглушительным треском!"
      - "О, поступают приказы от Мусаси... Посмотрим... Погодите, ась? Что это значит?"
  - char: "chitose"
    side: "left"
    text:
      - "Нам... не приказано атаковать центральную башню, как всем остальным?"
  - char: "wakatsuki"
    side: "right"
    text:
      - "Мне... приказано защищать наши базы... Значит ли это, что мне снова придется сойтись лицом к лицу с силами Нагато?"
  - char: "sakawa"
    side: "left"
    text:
      - "Мои приказы... вообще не имеют никакого смысла! Почему?!"
      - "Эм... Миюки?"
  - char: "miyuki"
    side: "right"
    text:
      - "Д-да?.."
  - char: "sakawa"
    side: "left"
    text:
      - "Мне правда очень жаль."
  - char: "miyuki"
    side: "right"
    text:
      - "Погоди... Что ты делаешь?"
  - char: "sakawa"
    side: "left"
    text:
      - "Мусаси приказала... нам с Титосэ вывести тебя из игры."
  - char: "miyuki"
    side: "right"
    text:
      - "Ха?.. Почему? Я думала... я думала, Мусаси и Акаги работают вместе... Я думала, мы на одной стороне..."
  - char: "sakawa"
    side: "left"
    text:
      - "Я... я не знаю. Я не могу спросить Мусаси, что происходит, потому что она всё ещё на той стороне..."
      - "Я не стану уворачиваться, если ты будешь отбиваться, так что... Пожалуйста, не держи на меня зла, когда мы увидимся позже! Ладно?"
  - char: "miyuki"
    side: "right"
    text:
      - "Я... я всё ещё один из вассалов Акаги... так что я всё равно сделаю всё, на что способна!.."
  - text:
      - "БАБАХ!!!"
      - "Вскоре после этого, на территории Микасы..."
  - char: "haguro"
    side: "left"
    text:
      - "Что?! Мусаси пошла в атаку на Акаги??"
      - "Разве эти две не должны были работать сообща? Что за чертовщина тут происходит?"
  - char: "kongou"
    side: "right"
    text:
      - "Я тоже без малейшего понятия. Что думаешь, Микаса?"
  - char: "mikasa"
    side: "left"
    text:
      - "Простите, что разочаровываю, но я в таком же замешательстве, как и все вы."
      - "(Неужели они рассорились? Нет, это не имеет смысла... Акаги покинула комнату еще до меня...)"
      - "(И зачем ждать до этого момента? Если это еще один способ устроить проверку Нагато..?)"
      - "(С другой стороны, если эти две сотрудничали с самого начала, есть вероятность, что всё так и планировалось.)"
      - "(Теперь Миюки выбыла из битвы, а Сакава тоже сильно повреждена... Думай, Микаса, есть ли хоть какая-то выгода в том, чтобы намеренно прореживать собственные силы?)"
      - "(Акаги упоминала, что Сирены стали проявлять повышенную бдительность после восстания Железной Крови... Связано ли это как-то между собой?)"
      - "Здесь явно есть что-то такое, что мы упускаем из виду..."
  - char: "haguro"
    side: "right"
    text:
      - "Что ты имеешь в виду? Какая вообще у Мусаси могла быть причина нападать на Миюки?"
  - char: "mikasa"
    side: "left"
    text:
      - "Не могу сказать наверняка, но у меня нехорошее предчувствие, что всё это играет на руку планам Акаги..."
  - char: "kongou"
    side: "right"
    text:
      - "Если ты намекаешь на то, что Акаги с самого начала ХОТЕЛА проредить наши ряды, тогда её попытка втянуть нас в ту «атаку» на башню теперь обретает смысл."
  - char: "mikasa"
    side: "left"
    text:
      - "Не уверена, что эта теория выдерживает критику, ведь она могла бы вообще проигнорировать базы и напасть на нас с самого начала. Но это объясняет, почему Мусаси почти не занимала баз и лишь прощупывала нас, то и дело посылая Сакаву и Вакацуки..."
  - char: "haguro"
    side: "right"
    text:
      - "Может, ей нужно сократить число оставшихся участников, чтобы выполнить какое-то условие? В таком случае тактика Нагато всё это время, сама того не ведая, рушила её планы."
  - char: "hatakaze"
    side: "left"
    text:
      - "Мусаси еще в самом начале сказала, что эта игра станет битвой воль и идеалов. Из этого следует..."
  - char: "haguro"
    side: "right"
    text:
      - "Что она готова без колебаний пожертвовать своими подругами ради достижения целей..."
  - char: "hatakaze"
    side: "left"
    text:
      - "Это один из вариантов, но она также может испытывать Акаги, точно так же, как испытывала Нагато."
  - char: "mikasa"
    side: "right"
    text:
      - "Так вот почему она отправляет Вакацуки в одиночку обороняться против Нагато. Для нее это будет победой в любом случае: либо она заставит Нагато предать свои идеалы, либо просто не даст ей захватить больше ни одной базы."
  - char: "kinu"
    side: "left"
    text:
      - "Проклятье... Эта женщина вообще хоть во что-то верит, или она просто строит из себя адвоката дьявола?!"
  - char: "mikasa"
    side: "right"
    text:
      - "Это мы все и пытаемся выяснить... Нам остается только ждать и смотреть, что будет дальше."
      - "(Сейчас уже слишком поздно, но боюсь, никто из нас не должен был соглашаться на эти «учения».)"
      - "(Узнай я о Святилище раньше, возможно, я смогла бы... Нет, благодаря всему этому Нагато обрела собственное видение нашего будущего, а я решилась до конца сражаться за её идеалы.)"
      - "(Вот оно как... На данном этапе у меня не должно быть никаких сомнений. Пока Нагато способна победить, всё остальное не имеет значения!)"
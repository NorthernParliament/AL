chapter1:
  rows:

    - char: vauquelin
      side: left
      status: is-yellow
      text:
        - "Тре-тре-тревога! Объединенный флот Свободного Ириса и Королевского Флота только что вошел в Мозамбикский пролив и уже завязал бой с силами Сирен, блокирующими проход!"

    - char: la_galissonniere
      side: right
      status: is-yellow
      text:
        - "Значит, прибыли точно в срок. В этот раз разведка Церкви оказалась на удивление точной."

    - char: algerie
      side: left
      status: is-yellow
      text:
        - "Нельзя же нам раз за разом вечно оставаться в дураках."
        - "Флот под личным командованием кардинала Ришелье, да еще и в компании великой аристократки Королевского Флота — Илластриес."
        - "Собрали по-настоящему роскошный состав только ради того, чтобы «прийти на службу» в нашу далекую Базилику…"

    - char: la_galissonniere
      side: right
      status: is-yellow
      text:
        - "М-м… Если мы просто так сдадим Базилику, у нас будут огромные неприятности…"

    - char: vauquelin
      side: left
      status: is-yellow
      text:
        - "Алжири, Ла Галиссоньер, вам не кажется всё это странным?"
        - "Насколько бы важной ни была эта Базилика, это ведь просто здание, имеющее историческое значение, разве нет?"
        - "В Европе сейчас куда опаснее. Почему нас не отозвали защищать родные берега, а вместо этого прислали подкрепления, чтобы мы тут вместе любовались пейзажами?.."

    - char: la_galissonniere
      side: right
      status: is-yellow
      text:
        - "И всё же Ришелье послушно проделала весь этот путь с огромным флотом, чтобы «поиграть» с нами. Стоит ли говорить, что командование Церкви проявило редкую прозорливость, или же…"
        - "Алжири, ты знаешь, что именно скрывает эта Базилика? Что в ней такого, что так заинтересовало Ришелье?"

    - char: algerie
      side: left
      status: is-yellow
      text:
        - "Не знаю. Приказ, который я получила, предельно прост: любой ценой защищать Базилику, отражать или уничтожать любых захватчиков."

    - char: la_galissonniere
      side: right
      status: is-yellow
      text:
        - "Ты тоже ничего не знаешь?.. На самом деле, мне было так любопытно, что я уже успела провести небольшое тайное расследование. И как думаете, каков результат?"

    - char: algerie
      side: left
      status: is-yellow
      text:
        - "Мне не любопытно."

    - char: vauquelin
      side: right
      status: is-yellow
      text:
        - "А мне — очень!"

    - char: la_galissonniere
      side: left
      status: is-yellow
      text:
        - "Самое поразительное то, что даже те крохи информации, которые мне удалось раздобыть, используя мои связи в суде, оказались под грифом «Совершенно секретно»!"

    - char: vauquelin
      side: right
      status: is-yellow
      text:
        - "......"

    - char: la_galissonniere
      side: left
      status: is-yellow
      text:
        - "Ладно, даже если наша задача — помешать кардиналу забрать её старую рясу, забытую в Базилике, нам всё равно придется сражаться не на жизнь, а на смерть… Давайте лучше подумаем, как отразить атаку."

    - char: vauquelin
      side: right
      status: is-yellow
      text:
        - "……Было бы здорово, если бы Сирены в проливе смогли просто удержать Ришелье и остальных снаружи."

    - char: la_galissonniere
      side: left
      status: is-yellow
      text:
        - "Те отбросы даже меня не смогли бы задержать, куда уж им остановить объединенный флот Ришелье."
        - "Впрочем, в качестве первой волны пушечного мяса они сгодятся. Надо признать, они на редкость послушны: раз им приказали не приближаться к периметру Базилики, они действительно туда не суются."

    - char: algerie
      side: right
      status: is-yellow
      text:
        - "То, что Сирены так беспрекословно подчиняются приказам Железной Крови, пугает меня больше всего. Что же на самом деле Железная Кровь затевает вместе с ними…"

    - char: la_galissonniere
      side: left
      status: is-yellow
      text:
        - "Сейчас правильнее было бы спросить: что наша Церковь затевает вместе с Железной Кровью и Сиренами…"

    - text:
      - "Ла Галиссоньер бросила взгляд назад. Там, под сенью высокой стены в отдалении, подобно безмолвному изваянию, неподвижно застыла мощная машина войны."

    - char: la_galissonniere
      side: left
      status: is-yellow
      text:
        - "…Ты ведь тоже видела это «секретное оружие», присланное Церковью. Она… точно «девушка-корабль»?"
        - "Линейный корабль типа «Ришелье», четвертый корпус — Гасконь. Я никогда не слышала о том, что у типа «Ришелье» существовал четвертый систершип!"
        - "С того момента, как она предъявила верительные документы от Командования, она не проронила ни слова. Просто стоит там. Она не общается с нами и даже не подчиняется твоим приказам, хотя ты — командующий флотом Базилики."
        - "Судя по моему опыту, это совсем не похоже на поведение «подкрепления», пришедшего на помощь…"

    - char: algerie
      side: right
      status: is-yellow
      text:
        - "В нашей ситуации даже обычная серийная модель была бы на вес золота… Иметь такую силу лучше, чем не иметь никакой. У нас просто нет иного выбора."
        - "Всем подразделениям внимание! Начинаем тактическое развертывание."
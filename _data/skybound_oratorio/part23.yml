chapter1:
  rows:

    - char: bearn
      side: left
      text:
        - "Флот Ришелье и флот Алжири уже вошли в зону огневого контакта."

    - char: illustrious
      side: right
      text:
        - "М-м… Хотя мы старались максимально ослабить их до начала боя, нанесенный урон оказался гораздо ниже ожидаемого…"

    - char: bearn
      side: left
      text:
        - "Тебе не кажется, что эта партия серийных кораблей Виши прочнее предыдущих? Да и их огонь ПВО стал куда свирепее."

    - char: illustrious
      side: right
      text:
        - "Согласна. Чем ближе к центру, тем сильнее эффект усиления. Неужели оружие в Базилике обладает такой функцией?"

    - char: bearn
      side: left
      text:
        - "Я ровным счетом ничего об этом не знаю. Ришелье никогда не давала прямых ответов на мои вопросы о Базилике."

    - char: illustrious
      side: right
      text:
        - "Её Величество тоже лишь просила меня содействовать Ришелье в бою и присматривать за тем, что происходит в Базилике. Поистине таинственное место…"

    - char: la_galissonniere
      side: left
      status: is-red
      text:
        - "Если вам так любопытно, как насчет того, чтобы прогуляться по Базилике вместе со мной?"

    - char: bearn
      side: right
      text:
        - "Ла Галиссоньер?!!"

    - char: la_galissonniere
      side: left
      status: is-red
      text:
        - "Йо, дамы! Какая неожиданная встреча."

    - text:
      - "Совсем рядом с тем местом, где только что прошла авианосная группа, участок Стены Авроры, считавшийся непроходимым, вспыхнул ослепительным светом и полностью исчез."

    - char: bearn
      side: left
      text:
        - "Вы шутите… Столь сложная структура… и она управляема?!"

    - char: illustrious
      side: right
      text:
        - "…Использовать Стену Авроры и островные рифы, чтобы создать слепую зону для нашей авиаразведки и затаиться в засаде…"
        - "А затем напасть на авианосцы, как только Ришелье будет отвлечена — так вот в чем заключался ваш план?"

    - char: la_galissonniere
      side: left
      status: is-red
      text:
        - "В точку! А ты сообразительная, мисс Илластриес из Королевского Флота."
        - "Стена Авроры нужна, чтобы мешать вам, а меня-то она с чего должна останавливать?"
        - "Не ожидала, что план Алжири сработает настолько гладко…"
        - "Хе-хе, сейчас ваш эскорт далеко, а самолеты улетели на передовую."
        - "Так что приготовьтесь! Сейчас мы вдоволь поразвлечемся в ближнем артиллерийском бою!"
chapter1:
  rows:

    - char: vauquelin
      side: right
      status: is-red
      text:
        - "Ха-ха-ха! Ну что, Л’Опиньятр, твоя «магия» сегодня тоже не в духе?"

    - char: l_opiniatre
      side: left
      text:
        - "Я уже и забыла почти… Но на твоё несчастье, сегодня моя магия в полной боевой готовности. А ну, иди сюда, я дам тебе лично прочувствовать, что такое настоящее волшебство!"

    - char: vauquelin
      side: right
      status: is-red
      text:
        - "Ну уж нет, дудки! Получай!"

    - text:
      - "КАБУУМ!!!"

    - char: l_opiniatre
      side: left
      text:
        - "М-м… Они специально держат дистанцию и на высокой скорости описывают круги вокруг нас. В их двигатели очень сложно прицелиться!"

    - char: jeanne_d_arc
      side: right
      text:
        - "Наш замысел раскрыт?.. Впрочем, было бы странно, если бы Алжири не просчитала такой вариант."
        - "Но даже если и так — неважно. Продолжаем окружение. Как только мы выведем из строя их силовые установки, победа будет за нами!"
        - "Перед началом маневра всем доложить о повреждениях."

    - char: le_temeraire
      side: left
      text:
        - "Темерер в полном порядке! Пока что отделалась парой царапин!"

    - char: l_opiniatre
      side: right
      text:
        - "У меня так же. Несколько попаданий в некритичные узлы, на боеспособность не влияет."

    - char: fortune
      side: left
      text:
        - "У Форчун... в-вторая башня ГК серьезно повреждена, и... легкие повреждения двигателя……"

    - char: l_opiniatre
      side: right
      text:
        - "Э?! Как же так?.."

    - char: jeanne_d_arc
      side: left
      text:
        - "……Похоже, хотя мы негласно и поддаемся друг другу, Воклен не собиралась щадить Форчун."

    - char: fortune
      side: right
      text:
        - "У-у……"

    - char: le_temeraire
      side: left
      text:
        - "Воклен, обижать маленьких — это нехорошо…"

    - char: jeanne_d_arc
      side: right
      text:
        - "Ничего не поделаешь. Придется сменить тактику. Цельтесь не только в двигатели: бейте по орудиям и любым другим некритичным модулям. Возражения есть?"

    - char: l_opiniatre
      side: left
      text:
        - "Никаких! Союзники из Королевского Флота — тоже наши соратники. Мы не можем позволить товарищу страдать на поле боя просто из-за наших личных сантиментов!"
chapter1:
  rows:

    - char: illustrious
      side: left
      text:
        - "К слову, почему целью было выбрано именно это место? Здесь, конечно, красивые пейзажи, но со стратегической точки зрения оно не представляет высокой ценности."
        - "Тем не менее, Доминион Виши раз за разом выделяет корабли из своих и без того скудных сил для охраны этого района, а подводные лодки Железной Крови регулярно патрулируют окрестности."
        - "Даже ты, после столь долгой подготовки, выбрала это место в качестве первой крупной цели для флота Свободного Ириса."
        - "Для объекта с низкой стратегической значимостью подобные действия выглядят, честно говоря, довольно загадочно."
        - "Битва вот-вот начнется. Как союзник по совместной операции — ну и чтобы удовлетворить моё маленькое любопытство — не могла бы ты рассказать, почему именно здесь должен быть сделан первый шаг к воссоединению Ортодоксии Ирис?"

    - char: richelieu
      side: right
      text:
        - "Хм… О слухах вокруг «Базилики» Ортодоксии Ирис в вашем Королевском Флоте ведь наверняка что-то слышали?"

    - char: illustrious
      side: left
      text:
        - "Её Величество королева Елизавета поручила мне передать тебе искренние приветствия. Она сказала, что чем верить смутным слухам, лучше спросить напрямую у союзника, который находится на расстоянии вытянутой руки."

    - char: richelieu
      side: right
      text:
        - "Ха-ха, вот оно что. Я ценю вашу добрую волю."
        - "На самом деле, здесь всё не так преувеличено, как в легендах. И действительно, важно не возвращение какой-то удаленной территории, а возвращение некой «вещи», находящейся на ней."
        - "Как вы, вероятно, уже знаете, на этом острове расположена древняя Базилика Ирис. Наша главная цель — вернуть его под контроль Свободного Ириса."
        - "Эта Базилика имеет для нас колоссальное значение. Не будет преувеличением сказать: тот, кто владеет Базиликой, является «законным» преемником Ортодоксии Ирис."
        - "Именно по этой причине Доминион Виши идет на такой странный шаг, отправляя флот для охраны столь отдаленного региона."

    - char: illustrious
      side: left
      text:
        - "Ты имеешь в виду тот комплекс зданий, что находится вдали от континентальной Европы, который годами укрепляли, держали под строгим военным контролем и который теперь выглядит как стратегическая крепость… Ты называешь это «Базиликой» в религиозном смысле?.."

    - char: richelieu
      side: right
      text:
        - "Именно так. Только построив Базилику на таком прекрасном острове, вдали от мирской суеты, можно по-настоящему очистить человеческую душу."
        - "Разумеется… Внутри хранятся важные реликвии и архивы. А учитывая, что вход туда открыт только для высшего духовенства Ирис, строгие меры защиты просто необходимы."

    - char: illustrious
      side: left
      text:
        - "Только для высшего духовенства… Вот оно что. Значит, именно поэтому ты так часто бывала здесь в прошлом? Благодарю за ответ~"

    - char: richelieu
      side: right
      text:
        - "…Разведка Королевского Флота, как и всегда, на высоте. Моя оплошность, что я не разъяснила ситуацию с Базиликой до начала сражения."
        - "В предстоящей битве нам понадобятся общие усилия. Давайте же вместе добудем эту победу."
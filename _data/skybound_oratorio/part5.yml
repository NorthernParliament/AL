chapter1:
  rows:

    - char: le_temeraire
      side: left
      text:
        - "Л’Опиньятр, со всех сторон обнаружено огромное количество кораблей Сирен! Они несутся к нам на полной скорости!"

    - char: l_opiniatre
      side: right
      text:
        - "Как и ожидалось... Флоты Сирен здесь не только блокируют Базилику, но и, судя по всему, защищают её."

    - char: le_temeraire
      side: left
      text:
        - "Тогда давай сначала разгромим этих мешающихся Сирен, а потом воссоединимся с нашими товарищами из Доминиона Виши!"

    - char: l_opiniatre
      side: right
      text:
        - "…Послушай, Темерер. Тебе бы сейчас лучше сменить это обращение — «товарищи из Доминиона Виши»."

    - char: le_temeraire
      side: left
      text:
        - "М-м? Но ведь мы всегда были друзьями: Воклен, Ла Галиссоньер и старшая сестрица Алжири."
        - "Раньше мы все вместе ходили в церковь на службу, устраивали обеды в саду, и ещё..."

    - char: l_opiniatre
      side: right
      text:
        - "Это всё было очень давно... Сейчас мы с Доминионом Виши, как ни крути, находимся в состоянии войны."

    - char: le_temeraire
      side: left
      text:
        - "Я-то это знаю, но неужели ты, Опиньятр, действительно хочешь открыть по ним огонь?"

    - char: l_opiniatre
      side: right
      text:
        - "Я? Конечно нет. У нас изначально не было причин сражаться друг с другом. Но раз уж мы в бою, лучше не использовать слишком нежные обращения."
        - "К тому же это совместная операция. Что подумают люди из Королевского Флота, если услышат такое? Эта миссия имеет огромное значение для госпожи Ришелье, и ты наверняка не хочешь, чтобы подобные мелочи помешали её планам."

    - char: le_temeraire
      side: left
      text:
        - "Ох, я поняла. Товарищи из Королевского Флота... как бы это сказать... они всё такие же дружелюбные, как и раньше, но кажется, будто между нами выросла толстая стена..."

    - char: l_opiniatre
      side: right
      text:
        - "Ну, после того, что случилось... Даже если мы перестанем их винить, в их собственных сердцах всё равно не будет покоя, когда мы рядом."
        - "Ни мы, ни они уже не сможем вернуться к тому, как всё было раньше."

    - char: le_temeraire
      side: left
      text:
        - "У-у-у... Ладно! Сейчас не время думать о сложном! Товарищи из Королевского Флота, товарищи из Доминиона Виши — неважно! Раз с нами госпожа Ришелье, всё обязательно будет в порядке!"
        - "Давай сосредоточимся на том, что перед нами, и одним махом уничтожим этих Сирен!"

    - char: l_opiniatre
      side: right
      text:
        - "Эх, иногда я тебе даже завидую — ты такая беззаботная... Ты права. По крайней мере, к Сиренам милосердие проявлять не нужно."
        - "Открыть огонь! Пусть эти Сирены познают нашу силу!"
chapter1:
  rows:

    - text:
      - "Это — один из островов африканского континента. Из-за своей удаленности пламя войны и раздоры редко достигали этих мест."
      - "Зелень лесов и багрянец выветренных скал — вот здешние символы. При упоминании этого места первыми на ум приходят баобабы и пингвины."
      - "Однако, как и у всего на свете, здесь есть и оборотная сторона: опасность зачастую скрывается под личиной безмятежности."
      - "В этот самый миг объединенный флот, проделавший долгий путь, проходит через тихий пролив, держа курс к островам."

chapter2:
  rows:

    - char: fortune
      side: left
      text:
        - "В-внимание всем! Впереди обнаружены… один, два, три, четыре, пять… у-у-у… очень много флотов Сирен!"

    - char: jeanne_d_arc
      side: right
      text:
        - "Мы только вошли в пролив, а их уже гораздо больше, чем ожидалось."
        - "Помнится, когда я была здесь раньше, плотность флотов Сирен не была столь высокой."

    - char: richelieu
      side: left
      text:
        - "Боюсь, это очередная уловка Железной Крови. С тех пор как Доминион Виши взял под контроль эти острова, Железная Кровь проявляет к этому месту подозрительно живой интерес."

    - char: illustrious
      side: right
      text:
        - "Флоты Сирен, призванные «заботливо оберегать» союзников из Виши…"
        - "Там, где флоту Железной Крови неудобно действовать напрямую, всегда «совершенно случайно» появляются Сирены. Знакомая картина…"

    - char: bearn
      side: left
      text:
        - "Да. Точно так же, как было в Мерс-эль-Кебире и Касабланке."

    - char: illustrious
      side: right
      text:
        - "Ах, прошу прощения, я не хотела напоминать об этом…"

    - char: richelieu
      side: left
      text:
        - "Не бери в голову, Илластриес. Те два инцидента были лишь неизбежными трагедиями, и каждый в Свободном Ирисе это прекрасно понимает."
        - "Истинный корень трагедии — раскол Ортодоксии Ирис, вызванный вторжением Железной Крови. А причина «знакомых картин» — их мутные связи с Сиренами."
        - "На этот раз я не допущу, чтобы «знакомый сценарий» повторился снова."

    - char: illustrious
      side: right
      text:
        - "Так я и думала… Ты лично участвуешь в этой операции не только ради победы, но и в надежде, что сможешь убедить людей из Доминиона Виши одуматься."

    - char: richelieu
      side: left
      text:
        - "Безусловно……"
        - "Многие остались в Доминионе Виши лишь из верности своим убеждениям и клятвам, они не являются нашими истинными врагами. Если нам придется сойтись с ними в смертельной схватке — это станет величайшим горем для Ирис."

    - text:
      - "Ришелье закрыла глаза и едва заметно, горько улыбнулась."

    - char: illustrious
      side: left
      text:
        - "Мы тоже искренне надеемся на скорое воссоединение Ортодоксии Ирис. И ради этого весь Лазурный Путь, включая Королевский Флот, будет твердо стоять на вашей стороне, кардинал Ришелье."
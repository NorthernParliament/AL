chapter1:
  rows:

    - char: vauquelin
      side: left
      status: is-red
      text:
        - "Э-э-э?!! Алжири… этот новый план какой-то слишком странный. У противника такой численный перевес, мне одной точно не сдюжить!"

    - char: algerie
      side: right
      status: is-red
      text:
        - "Всё в порядке. Ришелье наверняка прикажет Жанне и остальным в первую очередь целиться в твои двигатели. Тебе нужно лишь сосредоточиться на уклонении."

    - char: vauquelin
      side: left
      status: is-red
      text:
        - "Но даже так… я всё равно не смогу отбить атаку такой толпы в одиночку."

    - char: algerie
      side: right
      status: is-red
      text:
        - "Тебе и не нужно их разбивать. Сосредоточь весь огонь на их противолодочном оборудовании. Как только выведешь его из строя — немедленно отступай."

    - char: vauquelin
      side: left
      status: is-red
      text:
        - "Противолодочное оборудование? Но у нас же здесь нет подлодок…"

    - char: algerie
      side: right
      status: is-red
      text:
        - "Об этом не беспокойся. В этих водах совместные действия ведут не только они одни."

    - char: vauquelin
      side: left
      status: is-red
      text:
        - "Ничего не понимаю… Но раз это твой план, Алжири, я всё исполню в лучшем виде. Положись на меня!"

chapter2:
  rows:

    - text:
      - "КАБУУМ!!!"

    - char: vauquelin
      side: left
      status: is-red
      text:
        - "Легко сказать… Но сейчас всё идет не по сценарию, Алжири! Они начали палить по моим орудийным башням!"
        - "Это они так разозлились из-за того, что я сосредоточилась на этой малютке Форчун из Королевского Флота?.."

chapter3:
  rows:

    - char: vauquelin
      side: left
      status: is-red
      text:
        - "М-м-м… В любом случае, задача минимум выполнена. Если задержимся дольше, станет совсем худо. Ладно, пора делать ноги!"

chapter4:
  rows:

    - char: l_opiniatre
      side: left
      text:
        - "Ну что, Воклен, теперь-то ты прочувствовала мощь настоящей магии?!"

    - char: vauquelin
      side: right
      status: is-red
      text:
        - "Л’Опиньятр, за тот прошлый случай — я правда виновата! Я искренне, честно-честно раскаялась, только не стреляй больше!"

    - char: l_opiniatre
      side: left
      text:
        - "Э?! Ты правда раскаиваешься на этот раз?"

    - char: vauquelin
      side: right
      status: is-red
      text:
        - "Искренне раскаиваюсь, честное рыцарское! В качестве извинения я угощу тебя своим заветным пудингом, идет?!"

    - char: l_opiniatre
      side: left
      text:
        - "Ну-у… звучит неплохо… Э?!"

    - char: jeanne_d_arc
      side: right
      text:
        - "Флот Виши начал ставить плотную дымовую завесу. Похоже, они отступают…"

    - char: vauquelin
      side: left
      status: is-red
      text:
        - "Хи-хи-хи~ Про пудинг запомни, как-нибудь потом угощу! Чао!~~"

    - char: l_opiniatre
      side: right
      text:
        - "Стой, подожди?! Не смей убегать!"

    - char: jeanne_d_arc
      side: left
      text:
        - "Довольно. Ришелье приказала лишь отогнать их и не пускаться в глубокое преследование. Пусть уходит."

    - char: le_temeraire
      side: right
      text:
        - "И зачем вообще приходила Воклен?.. Просто чтобы проверить нашу огневую мощь?"

    - char: jeanne_d_arc
      side: left
      text:
        - "Возможно. В любом случае, Ришелье и остальные неуклонно продвигаются вперед. Эта атака никак не повлияла на наши планы..."

    - char: fortune
      side: right
      text:
        - "Т-тот... тот самый...!"

    - char: le_temeraire
      side: left
      text:
        - "Что случилось, Форчун? Тебя задели куда-то серьезно?!"

    - char: fortune
      side: right
      text:
        - "Нет... Просто... спасибо вам всем большое..."

    - char: l_opiniatre
      side: left
      text:
        - "Хм? О чем ты, Форчун? С чего вдруг такие слова?"

    - char: fortune
      side: right
      text:
        - "Т-тот... Раньше сестрица Худ и остальные... поступили очень жестоко с вашими соратниками в Виши, верно?.."
        - "Хотя вы всегда говорили, что понимаете... что не держите зла... Н-но я же чувствую! В нашей общей судьбе появилась трещина..."
        - "И-и всё же! Вы всё равно решили защитить меня... И даже нанесли яростный ответный удар по своей бывшей подруге ради меня..."
        - "Я знаю... Мои извинения сейчас ничего не изменят..."
        - "Но... мне всё равно очень жаль! За всё, что тогда произошло... правда, простите меня!.."

    - char: jeanne_d_arc
      side: left
      text:
        - "......"
        - "Подними голову, Форчун. Тебе не за что извиняться. То, что называют судьбой, переменчиво и капризно... Наверное, в этом и заключается наш общий рок."

    - char: fortune
      side: right
      text:
        - "Но ведь..."

    - char: jeanne_d_arc
      side: left
      text:
        - "Дюнкерк и остальные сделали свой выбор и сражались за него до последнего вздоха. Мы тоже сделали свой выбор и будем верны ему до конца."
        - "Только освободив родину из рук захватчиков, мы сможем оборвать сам корень этой трагедии."
        - "Именно ради этого мы создали Свободный Ирис. Именно поэтому мы решили стоять плечом к плечу с союзниками, в чьих сердцах всё еще живет справедливость."
        - "Так что расправь плечи, Форчун. Давай сражаться вместе."

    - char: fortune
      side: right
      text:
        - "Спасибо…… Да, я поняла!"

    - char: jeanne_d_arc
      side: left
      text:
        - "Вот и славно~ Что ж, флот Виши отступил, нам пора возвращаться к Ришелье и Илластриес. Всем перестроиться, приготовиться к выходу!"
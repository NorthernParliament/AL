chapter1:
  rows:

    - char: i26
      side: left
      status: is-red
      text:
        - "Значит, это и есть порт Железной Крови… Ну и крюк же нам пришлось сделать после выхода от островов Сакуры… Наконец-то добрались…"
        - "Как думаешь, что это был за черный импульс в битве у Базилики? И те золотые завесы в небе над акваторией?"

    - char: i58
      side: right
      status: is-red
      text:
        - "Хм… Трудно сказать. По ощущениям — нечто похожее на наши барьеры..."
        - "Но анализ — не наша забота. Ты ведь всё подробно зафиксировала?"

    - char: i26
      side: left
      status: is-red
      text:
        - "Само собой! Это задание дала лично Акаги, я не хочу всё испортить…"

    - char: i58
      side: right
      status: is-red
      text:
        - "Тсс, люди из Железной Крови идут."

    - char: prinz_eugen
      side: left
      status: is-red
      text:
        - "Йо~ Подлодки Империи Сакуры, добро пожаловать в… а, точно, это ведь секретный объект. Что ж, назовем его «некий порт Железной Крови»."
        - "Добро пожаловать. Вы проделали такой долгий путь от самой родины, да еще и успели поучаствовать в боевой операции по дороге. Наверняка вы изрядно вымотались."

    - char: i58
      side: right
      status: is-red
      text:
        - "Всё как Акаги и говорила: человек с пугающей улыбкой, который несет всякую чепуху… Ты и есть Принц Ойген, верно?"

    - char: prinz_eugen
      side: left
      status: is-red
      text:
        - "Ой-ой, Акаги, ну так же нельзя! Говорить такое за спиной — это просто ранит в самое сердце. Мы ведь уже успели стать добрыми друзьями..."

    - char: i58
      side: right
      status: is-red
      text:
        - "……Акаги сказала, что у тебя есть кое-что, что нужно нам передать."

    - char: prinz_eugen
      side: left
      status: is-red
      text:
        - "Верно-верно. В этом небольшом кейсе — то, что было ей обещано. И пока он не окажется в руках у Акаги, даже не вздумайте вскрывать его из любопытства, договорились?"

    - char: i58
      side: right
      status: is-red
      text:
        - "Не беспокойся, Акаги дала нам те же наставления. Раз это важные секретные документы, мы доставим их в целости и сохранности."

    - char: prinz_eugen
      side: left
      status: is-red
      text:
        - "Вот и славненько~ И напоследок, передайте ей весточку от меня."
        - "Скажите так: «План продвигается на редкость успешно. С нетерпением ждем её личного визита на банкет Железной Крови~»"
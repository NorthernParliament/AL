chapter1:
  rows:

    - char: queen_elizabeth
      side: left
      text:
        - "Отлично, еще одно важное дело улажено. У меня есть срочные дела на Королевских Островах, так что дальше вы уж как-нибудь сами."

    - char: vittorio_veneto
      side: right
      text:
        - "Фух… долгие переговоры наконец-то успешно завершились. Мне тоже пора возвращаться в Империю Сардиния для дальнейших распоряжений. Позвольте откланяться."

    - char: richelieu
      side: left
      text:
        - "Госпожа Бисмарк, надеюсь, Железная Кровь будет неукоснительно соблюдать условия соглашения. Война против Сирен еще далека от завершения, и «Лазурный Путь» не может позволить себе внутренних расколов и противостояний."

    - char: bismarck
      side: right
      text:
        - "Не беспокойтесь, госпожа Ришелье. Этот договор, без сомнения, укрепит стабильность внутри «Лазурного Пути» и на всем континенте."
        - "С этого дня Железная Кровь, Королевский Флот и Ирис больше никогда не вступят в войну друг против друга."

    - char: richelieu
      side: left
      text:
        - "Если всё действительно будет так, это было бы прекрасно. Мне нужно доложить Церкви о подписании протокола, так что не буду более отнимать ваше время."

    - char: bismarck
      side: right
      text:
        - "Не спешите, госпожа Ришелье. Согласно нашему уговору, пожалуйста, примите это."

chapter2:
  rows:

    - char: queen_elizabeth
      side: left
      text:
        - "Ришелье! Ришелье! Ты чего это вдруг застыла?"

    - char: richelieu
      side: right
      text:
        - "Прости, Элизабет. Вспомнила кое-что из прошлого… немного поддалась чувствам, глядя на обстановку."

    - char: queen_elizabeth
      side: left
      text:
        - "…Оставь сантименты для мемуаров, сейчас у нас на повестке куда более важный план операции."
        - "Можешь не переживать~ В этот раз я отправлю с вами Илластриес и Форчун вместе с целым авианосным соединением серийных кораблей Королевского Флота."
        - "Раз уж сама Илластриес выходит в море, вопрос господства в воздухе, о котором ты так пеклась, можно считать решенным!"
        - "Ах да, есть важные сведения: Виши могли тайно отправить к Базилике подкрепление."
        - "Точный масштаб неизвестен, но сейчас Виши явно не в том состоянии, чтобы слать целые флоты. Скорее всего, это одна-две лодки? Просто имей в виду."

    - char: richelieu
      side: right
      text:
        - "С поддержкой Илластриес и Беарн небо будет полностью за нами. Если будем вести осторожную разведку, засады нам не страшны."

    - char: queen_elizabeth
      side: left
      text:
        - "Вот и славно~ М-м… есть еще одно донесение, но, скорее всего, разведка просто что-то напутала…"
        - "Ладно, пусть Шеффилд сначала всё перепроверит, обсудим это уже после боя."
        - "Эх… завидую я тебе — можешь вести флот в бой на передовой. А я тону в горах документов, которых стало в разы больше, чем раньше…"
        - "И всё из-за этой выскочки из Железной Крови… как её там… Фридрих дер Гроссе?! Всё из-за неё!!"
        - "Никаких данных, записи стерты, но у меня такое чувство, будто за всеми последними событиями стоит её тень…"
        - "Р-р-р, как же бесит! Сама подняла эту тему… забудь!"

    - char: richelieu
      side: right
      text:
        - "Ха… Ха-ха… Фридрих дер Гроссе, значит. Я постараюсь запомнить это имя."

    - char: queen_elizabeth
      side: left
      text:
        - "Эта операция покажет всему миру тесное сотрудничество Свободного Ириса и Королевского Флота. Заранее поздравляю с будущим успехом!"
        - "И надеюсь, ты добьешься своей личной цели, Ришелье."
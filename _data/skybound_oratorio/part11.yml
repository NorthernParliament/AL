chapter1:
  rows:

    - text:
      - "С началом сражения яростный грохот и звуки разрушительных взрывов эхом разнеслись над морской гладью."

    - char: le_temeraire
      side: left
      text:
        - "Уа-а! Почти попали! Это же всего лишь серийные корабли, почему они такие приставучие?!"

    - char: l_opiniatre
      side: right
      text:
        - "К тому же их прикрывает плотный огонь многочисленных оборонительных сооружений Базилики…"
        - "Кажется, лучше будет выйти из радиуса их поражения и вести бой оттуда…"

    - char: illustrious
      side: left
      text:
        - "Ришелье, мы продвигаемся на удивление медленно. И это при том, что противник еще не вывел основные силы, а флотом командуешь ты — человек, который должен знать здесь каждый уголок."
        - "Похоже, Доминион Виши действительно вложил огромные ресурсы в оборону этого места."

    - char: richelieu
      side: right
      text:
        - "Сейчас я уже не рискну сказать, что мне здесь всё знакомо… Помимо перетасовки существующих позиций, Виши возвели огромное количество новых объектов."
        - "Пытаться наступать, опираясь на старые воспоминания — значит прямиком угодить в ловушку… Вся эта система обороны спроектирована специально против меня."

    - char: illustrious
      side: left
      text:
        - "И всё это… дело рук Алжири, которая здесь командует?"

    - char: richelieu
      side: right
      text:
        - "Алжири даже среди святых рыцарей выделялась своим проницательным умом. Вдобавок ко всему, она — один из сильнейших тяжелых крейсеров «договорного типа»."
        - "Когда она была на нашей стороне, я чувствовала лишь спокойствие и уверенность. Не думала, что в роли противника она окажется настолько изматывающей…"

    - char: illustrious
      side: left
      text:
        - "Поистине жаль, что мы не можем сражаться с ней плечом к плечу..."

    - char: bearn
      side: right
      text:
        - "..И дело не только в её тактике. Вы заметили? С серийными кораблями, которые посылает Виши, что-то не так."
        - "У некоторых моделей нет внешних отличий, но их огневая мощь и маневренность выше обычных на 30–40%, а общая прочность корпуса возросла как минимум вдвое..."
        - "Эти особые корабли, внешне почти идентичные обычным, затеряны в общих порядках, что значительно повышает общую мощь вражеского флота."

    - char: illustrious
      side: left
      text:
        - "Хм... У Железной Крови есть похожие технологии усиления серийных моделей. Но после такой модификации корабли внешне становятся очень похожими на технику Железной Крови... Здесь же мы такого не видим."

    - char: jeanne_d_arc
      side: right
      text:
        - "Я полагаю, что материалы корпуса и типы вооружения у этих кораблей ничем не отличаются от стандартных."
        - "Но если говорить о странностях... Да, я чувствую исходящую от них едва уловимую, знакомую ауру."
        - "Неужели эти серийные корабли... используют Ментальные кубы в качестве источника энергии?"

    - char: richelieu
      side: left
      text:
        - "......"

    - char: l_opiniatre
      side: right
      text:
        - "Разве можно использовать Ментальные кубы для обычных серийных кораблей?.."

    - char: bearn
      side: left
      text:
        - "Я никогда не встречала упоминаний о подобном ни в одном из отчетов..."
        - "Хотя... Ментальные кубы действительно содержат колоссальную концентрацию энергии... Почему же до сих пор не было записей о подобных экспериментах?"

    - char: illustrious
      side: right
      text:
        - "......"
        - "Не то чтобы их не было. Просто это невозможно осуществить."
        - "Королевский Флот когда-то проводил подобные исследования... но они провалились. Мы не смогли создать механизм, способный обеспечить стабильную и непрерывную подачу энергии от Ментального куба."
        - "Более того, в определенных условиях испытаний куб начинал подавлять высвобождение энергии или даже активно поглощал избыточную энергию вокруг себя."
        - "Из-за этих свойств Ментальный куб в принципе невозможно использовать как источник питания для какого-либо механического оборудования."
        - "Насколько я знаю, Ортодоксия Ирис тоже принимала участие в некоторых из тех экспериментов."

    - char: bearn
      side: left
      text:
        - "Вот оно что, теперь понятно... А?! Мы тоже проводили такие исследования?!"

    - char: richelieu
      side: right
      text:
        - "…Исследования велись в условиях строжайшей секретности."
        - "Позже, из-за невозможности перейти к стадии практического применения, проект был полностью закрыт. Все данные были запечатаны, так что нет ничего удивительного в том, что вы о них не слышали."

    - char: bearn
      side: left
      text:
        - "Но тогда что же происходит с этими странными серийными кораблями Церкви… Неужели здесь замешаны какие-то технологии Сирен?"

    - char: jeanne_d_arc
      side: right
      text:
        - "Я действительно не чувствую наличия Ментальных кубов напрямую внутри этих кораблей, лишь ощущаю их ауру…"
        - "Даже не знаю, как вам это описать… Кажется, будто эта странная аура исходит от всего вокруг: от этих кораблей, от каждого защитного сооружения в акватории, даже от самой воды и воздуха."
        - "Словно мы вошли внутрь одного гигантского, но очень разреженного Ментального куба…"

    - char: illustrious
      side: left
      text:
        - "«Гигантский и разреженный Ментальный куб»…"
        - "Если ты так говоришь, то то трудноописуемое чувство дискомфорта, которое я ощущаю с самого входа в пролив, действительно на это похоже."

    - char: fortune
      side: right
      text:
        - "Я… я тоже это чувствую!.."

    - char: le_temeraire
      side: left
      text:
        - "Э? Неужели и ты это чувствуешь, Форчун? Я вот вообще ничего не замечаю!"

    - char: l_opiniatre
      side: right
      text:
        - "Я тоже не чувствую никакой разницы. Неужели мой «магический уровень» упал?.."

    - char: bearn
      side: left
      text:
        - "Никакого дискомфорта. Если уж на то пошло… управлять палубной авиацией стало даже как-то проще, хотя этот прирост настолько мал, что его можно списать на самовнушение."

    - char: illustrious
      side: right
      text:
        - "О? А это уже интересно…"
        - "Значит ли это, что из-за того, что это Базилика Ирис, мы, чужестранки, чувствуем аномалию острее? Ришелье, а что скажешь ты?"

    - char: richelieu
      side: left
      text:
        - "К сожалению, я тоже ничего не чувствую. Однако среди предметов, запечатанных в Базилике, действительно были экспериментальные образцы оружия на основе Ментальных кубов тех лет."
        - "Нельзя исключать вероятность того, что Доминион Виши, заполучив их, возобновил эксперименты совместно с Железной Кровью. Именно этого я и опасалась всё это время."

    - char: illustrious
      side: right
      text:
        - "Это было бы крайне убедительным объяснением того, почему Доминион Виши так фанатично держится за это место."

    - char: fortune
      side: left
      text:
        - "Ой?! Неужели на нас… на нас нападут с применением секретного оружия?.."

    - char: richelieu
      side: right
      text:
        - "Об этом не стоит беспокоиться. Барьер, в который упёрлись исследования в прошлом, не так-то просто преодолеть. Иначе нас встречали бы не просто «слегка усиленные» серийные модели."

    - char: illustrious
      side: left
      text:
        - "И всё же… раз исследования возобновились, Базилика в руках Виши остается опасной угрозой. Нам нужно ускорить наши действия…"
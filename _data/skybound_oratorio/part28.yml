chapter1:
  rows:

    - char: algerie?d
      side: left
      status: is-yellow
      text:
        - "Ложь… предательство… Даже теперь… лишь ложь и предательство……"
        - "Но… Господь милостив. Милосердный Господь ниспошлет на вас Свой суд — равный для всех…"
        - "Сгорайте в пламени… разрушайтесь до основания. И тогда…"
        - "Мы встретим новый мир. Мир без раздоров, без боли и без печали……"
        - "Ха-ха-ха-ха…………"

    - char: richelieu
      side: right
      text:
        - "Воклен! Ла Галиссоньер! Что вы застыли?! Немедленно уходите от Алжири, если не хотите, чтобы она вас уничтожила!"

    - char: vauquelin
      side: left
      status: is-yellow
      text:
        - "Е-есть! Госпожа Ришелье!"

    - char: la_galissonniere
      side: right
      status: is-yellow
      text:
        - "Благодарю за предупреждение. Погибнуть в бою — это одно, но быть уничтоженной Алжири в таком непонятном состоянии — это я принять не готова…"

    - char: richelieu
      side: left
      text:
        - "Эта темная сила, этот импульс……… Не может быть! Всё это слишком напоминает то, что произошло во время нашей схватки с Бисмарк!!"
        - "Ришелье, что еще ты скрываешь?! Что за сущность таилась в недрах Базилики!"

    - char: richelieu
      side: right
      text:
        - "…………Я не знаю, с чем именно вы, Королевский Флот, столкнулись в Железной Крови."
        - "Но в качестве условия подписания договора Ортодоксия Ирис получила от Железной Крови некий «улучшенный Ментальный куб»."
        - "Изначально мы планировали использовать его как энергетическое ядро для оружия Базилики. Но в ходе последующих экспериментов мы обнаружили…"
        - "Этот так называемый «улучшенный куб», как только выходная мощность достигает определенного порога, начинает проявлять чудовищную нестабильность."
        - "Неконтролируемые выбросы энергии не только разрушали само экспериментальное оборудование, но даже влияли на рассудок и эмоции персонала лаборатории."
        - "После этого эксперименты были навсегда прекращены. Этот особый куб сочли заговором Железной Крови и навечно опечатали."
        - "Так должно было быть. Но падение Ортодоксии изменило всё……"
        - "Я сделала этот сектор приоритетной целью для захвата, потому что именно в этой Базилике находится единственная во всем Ирисе установка, способная задействовать этот куб."
        - "Даже в виде полуфабриката такое оружие под контролем Доминиона Виши слишком опасно. Но я и представить не могла, что они решатся использовать его так безрассудно, не имея стабильной технологии…"

    - char: bearn
      side: left
      text:
        - "……Значит, нам придется поступить с Алжири так же, как вы когда-то поступили с Бисмарк?.."

    - char: illustrious
      side: right
      text:
        - "Кажется, здесь есть отличие… Викториес рассказывала мне, что Бисмарк начала меняться сразу после того, как напрямую достала черный куб."
        - "Но в руках у Алжири лишь маленькая шкатулка, самого черного куба при ней нет."

    - char: richelieu
      side: left
      text:
        - "Согласно изначальному проекту, куб должен находиться в самом центре Базилики, служа основным источником энергии для всей Стены Авроры. Шкатулка в руках Алжири — лишь контроллер, принимающий энергию от ядра."

    - char: illustrious
      side: right
      text:
        - "То есть… если мы уничтожим энергетическую установку в центре Базилики, странная энергия, влияющая на Алжири, исчезнет?"

    - char: richelieu
      side: left
      text:
        - "Теоретически — да, это сработает…"
        - "Однако сама Базилика возведена как неприступная крепость, а сейчас она еще и защищена куполом из световых завес. К тому же, Алжири в таком состоянии стоит прямо у нас на пути — боюсь, осуществить этот план будет крайне сложно."

    - text:
      - "БУУУМ!!!"
      - "Серия мощных залпов вновь разорвала тишину затихшего было поля боя. Черные снаряды начали без разбора накрывать флот Королевского Флота, Свободного Ириса и даже Доминиона Виши."

    - char: la_galissonniere
      side: left
      status: is-yellow
      text:
        - "Плохо дело, Алжири начала атаку! И мощь её залпов просто за гранью разумного……"
        - "Ришелье, мы временно переходим под твое командование. Просто скажи, что нам делать, чтобы спасти Алжири! Если будем и дальше стоять как вкопанные, нас просто перещелкают как мишени!"

    - char: richelieu
      side: right
      text:
        - "Я......"

    - char: jeanne_d_arc
      side: left
      text:
        - "Ришелье, позволь мне сдержать Алжири. Вы же сосредоточьте весь огонь на штурме Базилики, чтобы уничтожить источник её силы."

    - char: richelieu
      side: right
      text:
        - "…Тебе одной? Нет, это слишком опасно. Я прикажу авианосцам прикрывать тебя в этом бою."

chapter2:
  rows:

    - char: jeanne_d_arc
      side: left
      text:
        - "......"
        - "Свет разума Алжири померк под пеленой гнева и ненависти. Она не прекратит бой, пока не уничтожит последнего из нас."
        - "Кажется, будто всё пламя ада излилось в её сердце. Алжири терзают эмоции — столь реальные и в то же время призрачные."
        - "Я чувствую: эти чувства не принадлежат ей. Эта боль не та ноша, которую она должна нести…"
        - "Я слышу, как там, в самой глубине этого ада, истинная Алжири безмолвно кричит о помощи…"
        - "Поэтому отбросьте сомнения и вступайте в бой. Обрушьте всю мощь на Базилику."
        - "Чем быстрее вы уничтожите установку и освободите Алжири из этой тьмы, тем скорее закончится эта трагедия."

    - char: richelieu
      side: right
      text:
        - "Но……… она же может полностью уничтожить тебя!"

    - char: jeanne_d_arc
      side: left
      text:
        - "Я не ведаю страха, ибо Господь со мною."

    - text:
      - "Жанна быстро перекрестилась, высоко подняла свое знамя и без малейших колебаний устремилась прямо в непроглядную тьму, окутавшую Алжири."
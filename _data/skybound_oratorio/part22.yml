chapter1:
  rows:

    - char: bearn
      side: left
      text:
        - "Ришелье, Алжири во главе своего флота приближается к нам."

    - char: richelieu
      side: right
      text:
        - "Сначала выманила маневренную группу, затем активировала Стену Авроры, чтобы изолировать нас, а теперь лично ведет отряд, чтобы расправиться с авианосным соединением... Таков её план?Сначала выманила маневренную группу, затем активировала Стену Авроры, чтобы изолировать нас, а теперь лично ведет отряд, чтобы расправиться с авианосным соединением... Таков её план?"

    - char: illustrious
      side: left
      text:
        - "Одной Воклен хватило, чтобы увести за собой весь наш авангард. В нынешних условиях, если дело дойдет до прямого столкновения, у них действительно прибавилось шансов на победу."

    - char: richelieu
      side: right
      text:
        - "Хм... В составе флота Виши только Алжири? Где Ла Галиссоньер?"

    - char: bearn
      side: left
      text:
        - "Разведка не обнаружила следов Ла Галиссоньер среди наступающих сил противника."
        - "Впрочем, не исключено, что она временно сняла оснастку и скрывается на одном из серийных кораблей, чтобы обмануть наши радары."

    - char: illustrious
      side: right
      text:
        - "В конце концов, господство в воздухе сейчас полностью в наших руках."

    - char: richelieu
      side: left
      text:
        - "Алжири действительно нашла изящный способ уравнять силы сторон..."
        - "Сделаем так: я возглавлю основной флот и выступлю навстречу Алжири. Авианосная группа должна держаться на безопасной дистанции и обеспечивать поддержку с воздуха."
        - "И еще... Хм, их нынешняя атака выглядит слишком прямолинейной. Уверена, у Алжири припрятан козырь в рукаве."
        - "Илластриес, Беарн, поднимите в воздух все резервные самолеты. Ла Галиссоньер с огромной вероятностью нет в том флоте Виши, что мы видим перед собой."

    - text:
      - "(Закончив говорить, Ришелье указала пальцем на плотные слои облаков. Илластриес и Беарн понимающе кивнули."
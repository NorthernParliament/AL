chapter1:
  rows:

    - char: le_terrible
      side: left
      text:
        - "Пасмурное небо, сухая трава, запах мазута и военных кораблей, и… гул авиационных двигателей."
        - "Хотя бы чай у Королевского Флота неплохой. На линии фронта о большем мечтать не приходится…"

    - char: nop
      side: right
      text:
        - "Ле Террибль? Неужели это ты… Ле Террибль, это правда ты?!"

    - char: le_terrible
      side: left
      text:
        - "Да, это я, это я… Медленно же ты, Ле Триомфан. Я ведь специально пришла сюда, как только услышала, что ты здесь на задании."

    - char: le_triomphant
      side: right
      text:
        - "Неужели… Ле Террибль! Слышала, что после того, как ты сопровождала «Страсбург» при бегстве из Мерс-эль-Кебира, ты исчезла без следа…"
        - "Ты не вернулась в Тулон, подконтрольный Доминиону Виши, и не примкнула к нам, Свободному Ирису… Где же ты пропадала всё это время?!"

    - char: le_terrible
      side: left
      text:
        - "Успокаивала мысли, приводила чувства в порядок, ну и, попутно, кое-что расследовала."
        - "Эх… хоть я и готовилась морально к этому моменту… всё еще чувствую странное раздражение, видя, как вы спокойно сражаетесь плечом к плечу с Королевским Флотом…"

    - char: le_triomphant
      side: right
      text:
        - "Ну, как бы это сказать… После всего, что случилось, сказать, что на душе совсем нет осадка, невозможно. Но Ришелье сказала…"

    - char: le_terrible
      side: left
      text:
        - "А, погоди. Речи Ришелье я уже наслушалась по радио до тошноты. Я специально выбрала время, когда её здесь нет."

    - char: le_triomphant
      side: right
      text:
        - "М-м……………"

    - char: le_terrible
      side: left
      text:
        - "Да не вешай нос… Послушай, история с Мерс-эль-Кебиром не так проста, как вам кажется."
        - "Раз уж Ришелье отправилась к Базилике в Мозамбикском проливе, она должна была хотя бы частично осознать, что за этим стоят действия Железной Крови."
        - "Не знаю, как это назвать — хорошей новостью или плохой…"

    - char: le_triomphant
      side: right
      text:
        - "Э…? О чем ты? Ты что-то узнала за то время, пока тебя не было?"

    - char: le_terrible
      side: left
      text:
        - "Не торопись. О некоторых вещах лучше говорить, когда Ришелье вернется."
        - "Но для меня сейчас важнее сказать другое…"
        - "Ле Триомфан, давно не виделись. Я вернулась."

    - char: le_triomphant
      side: right
      text:
        - "……?!"

    - char: le_terrible
      side: left
      text:
        - "Ну что за лицо, будто реветь собралась… Ты всё-таки рыцарь Церкви, а не девчонка. Садись, выпей чаю, остынь."
        - "......"
        - "Чай такой горячий…"
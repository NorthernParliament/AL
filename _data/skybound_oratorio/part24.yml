chapter1:
  rows:

    - "Под внезапным и сокрушительным ударом флота Ла Галиссоньер, лишенная эскорта авианосная группа должна была одна за другой пойти на дно, словно мишени в тире."
    - "По крайней мере, таков был план..."

    - char: la_galissonniere
      side: left
      status: is-red
      text:
        - "Эй-эй-эй! Это еще что за самолеты?! Откуда они вообще здесь взялись?!!"

    - char: bearn
      side: right
      text:
        - "Прости уж. Ришелье насквозь видела ваш замысел, и эти эскадрильи были подготовлены специально для тебя."

    - text:
      - "Несколько групп палубной авиации, долгое время скрывавшихся в засаде, обрушились из облаков подобно дождю из стрел."
      - "Плотный заградительный огонь превратил любые попытки приблизиться к Илластриес и Беарн в пылающий ад."

    - char: la_galissonniere
      side: left
      status: is-red
      text:
        - "М-м… Алжири не говорила, что делать в такой ситуации… Похоже, планы никогда не поспевают за переменами."
        - "Ладно, долгие раздумья — это не мой стиль. Раз уж я здесь, продолжу зажигать на полную катушку!"

    - char: bearn
      side: right
      text:
        - "Эй, постой, ты всё еще собираешься драться?!"

    - char: illustrious
      side: left
      text:
        - "Пожалуйста, остановитесь, мисс Ла Галиссоньер. У вас больше нет шансов на победу."

    - char: la_galissonniere
      side: right
      status: is-red
      text:
        - "Так не пойдет. Раз уж я приняла приказ от руководства, я обязана выполнить его любой ценой — такова догма Суда."
        - "Если сегодняшняя жертва неизбежна, позвольте мне хотя бы устроить финальное выступление, не позорящее честь Суда!"

    - char: bearn
      side: left
      text:
        - "Ла Галиссоньер!!"

    - char: la_galissonniere
      side: right
      status: is-red
      text:
        - "Мисс Илластриес из Королевского Флота, для меня честь, что вы станете моим последним противником. Прощайте!"

    - char: illustrious
      side: left
      text:
        - "Самолеты, цель захвачена..."

    - char: communicator
      side: right
      text:
        - "*бип-бип*"

    - char: algerie_rad
      side: left
      status: is-red
      text:
        - "Немедленно прекрати, Ла Галиссоньер!"

    - char: richelieu_rad
      side: left
      text:
        - "Пожалуйста, подожди, Илластриес!"

    - char: la_galissonniere
      side: right
      status: is-red
      text:
        - "Э? Алжири, что случилось?.."

    - char: algerie_rad
      side: left
      status: is-red
      text:
        - "Ты еще спрашиваешь, что случилось..."
        - "Если внезапная атака провалилась — немедленно отступай! С каких это пор ты стала еще более упертой, чем паладины Церкви?"

    - char: la_galissonniere
      side: right
      status: is-red
      text:
        - "Ты же не уточняла..."
        - "х, я-то грешным делом подумала, что твой план подразумевает мою героическую гибель за родину, если засада сорвется."

    - char: algerie_rad
      side: left
      status: is-red
      text:
        - "......"
        - "Я прикрою тебя Стеной Авроры, быстро отходи назад. У нас всё еще есть шансы на победу, не смей идти на бессмысленную жертву."

    - char: la_galissonniere
      side: right
      status: is-red
      text:
        - "Так бы сразу и сказала..."
        - "Прошу прощения, мисс Илластриес, похоже, мой час еще не пробил. Беру свои слова о «финальном выступлении» назад. Еще увидимся!"

    - char: illustrious
      side: left
      text:
        - "Погоди!"

    - text:
      - "Вслед за отступлением Ла Галиссоньер Стена Авроры мгновенно перестроилась."
      - "После яркой вспышки возникла новая преграда, перекрывшая Илластриес и остальным путь для преследования."

    - char: richelieu_rad
      side: left
      text:
        - "Илластриес, Беарн, позвольте ей уйти. Перегруппируйтесь и идите на соединение с основным флотом. Час решающей битвы настал."

    - char: illustrious
      side: right
      text:
        - "Я поняла."
        - "Хи-хи-хи, только после личного знакомства я начала осознавать, что кардинал Свободного Ириса, Ришелье, кажется, немного отличается от тех слухов, что о ней ходят..."
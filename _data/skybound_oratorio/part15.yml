chapter1:
  rows:

    - text:
      - "БУУУМ!!!"

    - char: richelieu
      side: left
      text:
        - "Основному флоту — прорвать линию обороны противника. Маневренной группе и авиации — подавить береговые укрепления и изолированные корабли."
        - "Мы будем планомерно уничтожать флот Алжири шаг за шагом."
        - "Мне жаль, Алжири… Но как только флоты сошлись в открытом бою, любые твои тактические уловки теряют смысл перед лицом абсолютной огневой мощи."
        - "Илластриес, как мы и договаривались, я прошу твои торпедоносцы «Суордфиш» в приоритетном порядке атаковать двигательные установки кораблей Алжири и её группы. Беарн, тебя я прошу о том же."

    - char: illustrious
      side: right
      text:
        - "Положись на меня, всё будет исполнено в лучшем виде!"

    - char: bearn
      side: left
      text:
        - "Поняла. Я обеспечу прикрытие для самолетов госпожи Илластриес."

chapter2:
  rows:

    - char: illustrious
      side: right
      text:
        - "Хи-хи, теперь нужно только зажать их… Постойте! Откуда этот заградительный огонь ПВО?!"

    - char: bearn
      side: left
      text:
        - "У них были скрытые огневые точки на рифах… Мы-то думали, что заманиваем её в зону торпедной атаки, а на деле это она вывела нас на заранее подготовленные позиции."

    - char: illustrious
      side: right
      text:
        - "Какой находчивый противник~ Я чувствую, как во мне просыпается азарт!"

    - char: richelieu
      side: left
      text:
        - "Ничего страшного. Пока бой идет в таком ключе, наша победа — лишь вопрос времени. У нас достаточно сил, чтобы справиться с её маневрами."

    - char: jeanne_d_arc_rad
      side: right
      text:
        - "Внимание! Строй флота Виши внезапно нарушился. Похоже, они готовятся к отступлению."

    - char: le_temeraire_rad
      side: left
      text:
        - "Ой, неужели Алжири и остальные решили сбежать?"

    - char: l_opiniatre_rad
      side: right
      text:
        - "И правда, их серийные корабли разделились на несколько групп и начали разворачиваться, уходя с поля боя!"

    - char: le_temeraire_rad
      side: left
      text:
        - "Самое время показать, на что способны эсминцы! Давайте догоним и перехватим их!"

    - char: richelieu
      side: right
      text:
        - "Что-то здесь не так… Алжири как командующий никогда бы не допустила беспорядочного бегства флота. Скорее всего, это очередной этап её плана по заманиванию нас в ловушку…"

    - char: le_temeraire_rad
      side: left
      text:
        - "Э-э, но у нас ведь такое преимущество! Может, мы и правда их разгромили?.."

    - char: fortune_rad
      side: right
      text:
        - "Се… сестрица Илластриес, что нам делать?"

    - char: illustrious
      side: left
      text:
        - "……И снова ты оказалась права, Ришелье."
        - "С поверхности моря всё выглядит как хаос, но при наблюдении с воздуха заметно, что противник совершает сложный, но упорядоченный отход к нескольким еще не разрушенным военным портам."
        - "Алжири хочет рассредоточить свои силы и заманить нас, чтобы мы разделили флот для преследования?"

    - char: richelieu
      side: right
      text:
        - "Если мы действительно разделимся, наше численное превосходство сойдет на нет. Вполне вероятно, что из-за незнания местности нас разобьют поодиночке, используя береговые укрепления Доминиона Виши."

    - char: illustrious
      side: left
      text:
        - "Тогда стоит ли нам преследовать их единым кулаком? Уничтожение врага по частям займет больше времени, но это надежный план для достижения победы."

    - char: jeanne_d_arc_rad
      side: right
      text:
        - "Маневренная группа ждет твоих приказов, Ришелье."

    - char: richelieu
      side: left
      text:
        - "А что, если мы вообще не будем их преследовать?"
        - "Наша первоочередная цель — захват Базилики, а не полное уничтожение оборонительного флота Виши."
        - "Маневренной группе немедленно вернуться. Игнорируйте отступление флота Виши."
        - "Мы не будем ни разделяться, ни пускаться в погоню. Скорректировать курс, сохранять строй и продолжать движение прямо к Базилике."
        - "Мы можем позволить себе оставить их в покое, но они не могут позволить себе оставить Базилику. Как только мы захватим её — это будет шах и мат!"
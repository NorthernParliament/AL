chapter1:
  rows:

    - char: vauquelin
      side: left
      status: is-yellow
      text:
        - "………Алжири, не то чтобы я не понимала твоих чувств."
        - "Оставим в покое вероломный Королевский Флот, я и сама не горю желанием сражаться с нашими бышими соратницами из Свободного Ириса."
        - "Н-о! Вот так просто отвести весь флот в порт и полностью отказаться от обороны — это как-то чересчур…"

    - char: algerie
      side: right
      status: is-yellow
      text:
        - "Значит, Воклен хочет стоять насмерть до последнего?"
        - "Как только начнется бой, уже не будет деления на Королевский Флот или Свободный Ирис — останутся только союзники и враги. А враг милосердия не проявит, понимаешь?"

    - char: vauquelin
      side: left
      status: is-yellow
      text:
        - "Э-э… Я не это имела в виду! Но просто взять и сдаться… это как-то… неприемлемо."
        - "Что бы вы ни думали, я бы предпочла иметь рядом такого честного врага, как Железная Кровь, чем такого коварного «союзника» за спиной, как Королевский Флот."

    - char: la_galissonniere
      side: right
      status: is-yellow
      text:
        - "И что же нам тогда делать, по-твоему, Воклен?"

    - char: vauquelin
      side: left
      status: is-yellow
      text:
        - "Ну-у, идеальный вариант — убедить кардинала Ришелье вернуться в лоно Церкви вместе с флотом Свободного Ириса, а потом мы вместе зажмем их в клещи и разберемся со всем Королевским Флотом, хе-хе-хе-хе…"

    - char: la_galissonniere
      side: right
      status: is-yellow
      text:
        - "О, это воистину… безупречный план. Тогда почетная миссия по убеждению кардинала Ришелье сменить сторону ложится на тебя, сиятельная Воклен?"

    - char: vauquelin
      side: left
      status: is-yellow
      text:
        - "А?! Э-э-э-э?!!!!"

    - char: algerie
      side: right
      status: is-yellow
      text:
        - "Ну полно, Ла Галиссоньер, не издевайся над ней."
        - "Против нас выступают: один линкор, два авианосца, один легкий крейсер и три эсминца. С нашей же стороны — лишь один тяжелый крейсер, один легкий и один эсминец."
        - "И, конечно… один линкор с неизвестными боевыми возможностями, который к тому же нам не подчиняется. И это без учета разницы в мощи серийных флотов."
        - "Мы хоть и на своей территории, и за нами преимущество оборонительных сооружений, но по огневой мощи мы в абсолютном меньшинстве. Более того, у нас нет господства в воздухе. В таких условиях распылять силы — всё равно что совершить быстрое самоубийство"

    - char: vauquelin
      side: left
      status: is-yellow
      text:
        - "У-у… И правда, разница в боевой мощи просто отчаянная… Так что, неужели всё-таки сдаемся?"

    - char: algerie
      side: right
      status: is-yellow
      text:
        - "Нет. Мы будем сражаться — это единственный выбор для рыцарей, присягнувших на верность Церкви."
        - "Даже если перед нами «Голиаф», нет оправдания трусости, бегству или предательству перед лицом врага!"
        - "Ха-ха, Ришелье наверняка думает так же, как и мы: «не решать проблему силой, а договориться через диалог». И в этом наш шанс."
        - "К тому же, люди из Свободного Ириса чувствуют предательство Королевского Флота так же остро, как и мы. Они определенно не смогут сотрудничать так же тесно, как прежде. В этом наше преимущество."

    - char: la_galissonniere
      side: left
      status: is-yellow
      text:
        - "Мы стянем силы, создавая иллюзию готовности к переговорам. Это заставит их колебаться, расслабиться и замедлит темп их наступления."
        - "А затем мы выждем момент, чтобы разделить флот Королевского Флота и флот Свободного Ириса... и при первой возможности «съедим» англичанок!"

    - char: algerie
      side: right
      status: is-yellow
      text:
        - "Именно. Устранение Королевского Флота не только сократит разрыв в силах, но и, что важнее, лишит Ришелье её «зрителей»."

    - char: la_galissonniere
      side: left
      status: is-yellow
      text:
        - "А когда зрители уйдут, актерам больше нет смысла продолжать спектакль."

    - char: algerie
      side: right
      status: is-yellow
      text:
        - "А дальше всё будет зависеть от выбора Ришелье. Развернется ли она и уйдет, присоединится ли к нам или решит биться до конца…"
        - "Но если всё же настанет миг, когда нам придется по-настоящему скрестить оружие, я прошу вас помнить: наш приказ прост и ясен — любой ценой защитить Базилику."
        - "Пока в наших сердцах живут вера и мужество, это станет нашей «Битвой при Орлеане» на море!"

    - char: vauquelin
      side: left
      status: is-yellow
      text:
        - "Теперь я поняла! Не думала, что за этим простым планом стоит столько расчетов!"
        - "Но, Алжири… в этот раз Жанна д’Арк ведь на их стороне, так?.."

    - char: la_galissonniere
      side: right
      status: is-yellow
      text:
        - "Пха-ха-ха-ха!"

    - char: algerie
      side: left
      status: is-yellow
      text:
        - "Кхм-кхм!.. На этом инструктаж окончен. Всем приступить к выполнению плана."

    - text:
      - "На лице Алжири на мгновение промелькнула улыбка, но её тут же скрыла густая тень."
      - "Воклен, прокручивая в голове детали плана, быстрым шагом покинула центр Базилики."
      - "Ла Галиссоньер бросила взгляд на неподвижно застывшее вдалеке «подкрепление», тяжело вздохнула и тоже ушла."
      - "Так, с уходом последних защитниц, битва Доминиона Виши началась."
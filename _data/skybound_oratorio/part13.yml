chapter1:
  rows:

    - char: illustrious
      side: left
      text:
        - "Подготовка к авиаудару завершена, группы палубных самолетов направляются к цели… Хм?"
        - "Ришелье, Алжири в одиночку отделилась от флота Виши и на высокой скорости идет прямо к нам. Неужели она всё-таки решила провести переговоры перед боем?.."

    - char: richelieu
      side: right
      text:
        - "Наконец-то… Прекрасно."
        - "Всем прекратить огонь! Не атаковать Алжири! Я сама поговорю с ней."

chapter2:
  rows:

    - char: algerie
      side: left
      status: is-yellow
      text:
        - "Давно не виделись, госпожа Ришелье. Не думала, что после нашей последней встречи мы снова столкнемся при таких обстоятельствах."

    - char: richelieu
      side: right
      text:
        - "Да, и правда, прошло много времени, Алжири. Когда мы виделись в последний раз..."

    - char: algerie
      side: left
      status: is-yellow
      text:
        - "Солнце, сочная трава, цветы и десерты. В последний раз мы все собирались вот так вместе на чаепитии в саду Церкви."

    - char: richelieu
      side: right
      text:
        - "Верно. Кажется, это было наше последнее общее чаепитие."
        - "Помню, как Л’Опиньятр потащила Ле Темерер показывать всем «магию», но Воклен втихомолку подменила её «магический реквизит»…"

    - char: algerie
      side: left
      status: is-yellow
      text:
        - "В итоге вместо сладостей получилась целая череда разноцветных взрывов. Тушить пожар прибежала Дюнкерк и принесла с собой новую порцию десертов."

    - char: richelieu
      side: right
      text:
        - "Дюнкерк……"

    - char: algerie
      side: left
      status: is-yellow
      text:
        - "Разве ты не скучаешь по тому вкусу, госпожа Ришелье?"
        - "Сладкие, нежные… Десерты Дюнкерк были словно само воплощение слова «прелесть». Без них любое чаепитие теряло свои краски."

    - char: richelieu
      side: right
      text:
        - "......"

    - char: algerie
      side: left
      status: is-yellow
      text:
        - "А еще Страсбург, Прованс, Бретань, Жан Бар… Благодаря твоим союзникам из Королевского Флота тех времен больше не вернуть."

    - char: richelieu
      side: right
      text:
        - "Как они… как они все сейчас?.."

    - char: algerie
      side: left
      status: is-yellow
      text:
        - "Дюнкерк из-за тяжелых ран так и осталась в Мерс-эль-Кебире. Что же касается Жан Бар и остальных… Ха-ха, даже их «останки» были забраны Железной Кровью."
        - "Если захочешь почтить их память, тебе придется идти в соборы Железной Крови. Если, конечно, у них там еще остались соборы, представляющие хоть какую-то веру."

    - char: richelieu
      side: right
      text:
        - "......"
        - "Послушай меня, Алжири. Железная Кровь, захватившая наш дом — вот истинный враг. Нам нет нужды сражаться друг с другом вот так."
        - "Наши клинки должны защищать соратников и родину, а не быть направлены друг на друга, как сейчас."
        - "Возглавь свой флот и присоединяйся к нам, к Свободному Ирису. Давай сражаться ради наших соотечественников, ради будущего и надежды нашей страны!"

    - char: algerie
      side: left
      status: is-yellow
      text:
        - "Присоединиться к Свободному Ирису, а затем «жить в мире и согласии» вон с тем Королевским Флотом?"
        - "Отличное предложение. Надеюсь, наши павшие в Мерс-эль-Кебире и Касабланке тоже его слышат."
        - "Что же до «нужды в сражении»……"
        - "Ришелье, с того момента, как в час нужды ты предпочла бросить родину, а не делить с ней невзгоды; с того момента, как после предательства Королевского Флота ты предпочла и дальше идти с ними в одной упряжке…"
        - "Тот день, когда мы сойдемся в бою, был предопределен."

    - char: richelieu
      side: right
      text:
        - "…Мне нечего сказать в оправдание того, что совершил Королевский Флот, и я не собираюсь оправдываться."
        - "Это испытание — болезненное, но необходимое, через которое мы должны пройти."

    - char: algerie
      side: left
      status: is-yellow
      text:
        - "Ты должна прекрасно понимать: если бы на Лазурный Путь действительно можно было положиться, Ортодоксия Ирис никогда бы не пала…"
        - "Чтобы защитить Церковь, мы всегда могли рассчитывать только на самих себя."
        - "Сдайся, госпожа Ришелье. Ортодоксия Ирис или Доминион Виши — как бы ни менялось название, родина, которой ты должна быть верна, всё еще там."
        - "Вернись в Доминион Виши сейчас, и я клянусь именем святого рыцаря: Церковь забудет всё, что было."
        - "Кардинал не должен стоять по другую сторону от Церкви. Ты должна вести нас, чтобы восстановить былую славу Ортодоксии Ирис!"

    - char: richelieu
      side: right
      text:
        - "…Нынешний Доминион Виши — лишь инструмент Железной Крови, используемый, чтобы под прикрытием любви к родине покупать сердца людей и контролировать наших соотечественников. Я не буду верна такой «Церкви»."
        - "Только изгнав Железную Кровь, свергнув Доминион Виши и установив праведный порядок, мы получим шанс вернуть былую славу Ирис."
        - "Ради этого я и создала Свободный Ирис. Только Ирис, полностью свободный от контроля Железной Крови, сможет по-настоящему объединить наши силы."
        - "И только объединив всех, кого возможно объединить, мы сможем достичь нашей цели."

    - char: algerie
      side: left
      status: is-yellow
      text:
        - "……Похоже, переговоры провалились. Как я и думала, то, что между нами разбито, уже не склеить простыми словами."

    - char: richelieu
      side: right
      text:
        - "………Я не сдамся."

    - char: algerie
      side: left
      status: is-yellow
      text:
        - "Я тоже не сдамся. Но, похоже, для начала нам придется встретиться на поле боя."

    - char: algerie
      side: left
      status: is-red
      text:
        - "Желаю тебе воинской удачи, госпожа Ришелье."

    - text:
      - "Оставив эти слова, «Рыцарь» развернулась и, не оглядываясь, направилась в сторону флота Доминиона Виши."
      - "«Кардинал», глядя в спину уходящему «Рыцарю», тихо вздохнула и тоже взяла курс к объединенному флоту."

    - char: richelieu
      side: left
      text:
        - "……Десерты Дюнкерк… я бы и правда хотела съесть их еще хоть раз."
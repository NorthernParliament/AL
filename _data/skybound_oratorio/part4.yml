chapter1:
  rows:

    - char: jeanne_d_arc
      side: left
      text:
        - "Похоже, тебе всё-таки удалось уклониться от прямых ответов на вопросы Илластриес."

    - char: richelieu
      side: right
      text:
        - "Я лишь не стала вдаваться в лишние подробности, но я не лгала. Я сообщила им всё, что им следует знать, и это не помешает нашей операции."
        - "Ах… Кстати, Жанна. Ты ведь тоже не знаешь, что именно скрыто внутри Базилики. Тебе разве не любопытно?"

    - char: jeanne_d_arc
      side: left
      text:
        - "«Жена же Лотова оглянулась позади него и стала соляным столпом». Я хоть и не жена Лота, но превращаться в соляной столп мне совсем не хочется."
        - "Господь наставлял нас, что излишнее любопытство до добра не доводит."
        - "К тому же я верю твоему суду, госпожа Ришелье. Если ты сочтешь, что мне нужно что-то знать, ты рано или поздно сама мне об этом расскажешь."

    - char: richelieu
      side: right
      text:
        - "Ха-ха, в этом вся ты, Жанна…"
        - "Эта Базилика когда-то была символом света, надеждой, освещавшей будущее Ирис…"
        - "Но с того момента, как она попала в руки Доминиона Виши, Базилика стала больше походить на ящик Пандоры."
        - "Если её удастся открыть — и для нас, и для них самих это обернется ужасным бедствием…"
        - "Как бы то ни было, мы обязаны вернуть Базилику… успеть до того, как истинная катастрофа вырвется из её стен."

    - char: jeanne_d_arc
      side: left
      text:
        - "…И даже при этом ты всё еще не оставила надежду на мирное решение вопроса."

    - char: richelieu
      side: right
      text:
        - "Разумеется. Верность и клятвы… То, что они выбрали сторону Виши, как раз и доказывает их преданность своей вере и справедливости."
        - "Раз они не злые люди и к тому же наши бывшие соратники, я всё же надеюсь, что мы сможем разрешить всё путем мирного диалога."

    - char: jeanne_d_arc
      side: left
      text:
        - "Путь, выбранный Виши, изначально ошибочен. Те, кто следует за ними — пусть даже с верой и справедливостью в сердце — будут лишь дальше уходить во тьму по этой ложной тропе…"
        - "Учитывая всё, что произошло, боюсь, переговоры будут полны терний и преград."
        - "Нам противостоят непоколебимая в своей вере Алжири и Ла Галиссоньер, которая и вовсе принадлежит к суду. Мне кажется, вступить с ними в бой будет куда проще, чем пытаться переубедить их словами."

    - char: richelieu
      side: right
      text:
        - "……В любом случае, нашей приоритетной задачей остается возвращение Базилики."
        - "Если переговоры действительно провалятся… Нам не останется ничего другого, кроме как сначала разоружить их, а затем со временем убедить делом. В конце концов… они обязательно всё поймут."

    - char: jeanne_d_arc
      side: left
      text:
        - "Звучит как путь, устланный пламенем и шипами. Желаю успеха твоему плану, госпожа Ришелье."

    - char: richelieu
      side: right
      text:
        - "Эх… Словесные дебаты — это тоже своего рода изнурительная война…"
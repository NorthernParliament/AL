chapter1:
  rows:

    - char: le_temeraire
      side: left
      text:
        - "Алжири, Воклен, Ла Галиссоньер! Стойте, подождите нас!"

    - char: vauquelin
      side: right
      status: is-red
      text:
        - "Еще чего! Кто же остановится, услышав такое!"

    - char: la_galissonniere
      side: left
      status: is-red
      text:
        - "Назойливость — не то качество, которое подобает рыцарю, правда?"

    - char: l_opiniatre
      side: right
      text:
        - "К несчастью, сейчас я «волшебница» Свободного Ириса. Даже если придется тащить вас силой, я верну вас обратно!"

    - char: la_galissonniere
      side: left
      status: is-red
      text:
        - "…Черт, если так пойдет, они нас действительно догонят."
        - "Эй, Алжири, у нас почти не осталось боеспособности. Если нас так настигнут эсминцы и потащат назад, это будет полный позор."

    - char: algerie
      side: right
      status: is-red
      text:
        - "Предусмотрели даже этот шаг… это пугает. Пожалуй, это подходящее место."
    
    - text:
    - "*свист*"

    - char: le_temeraire
      side: left
      text:
        - "Алжири, Воклен, Ла Галиссоньер! Стойте, подождите нас!"

    - char: fortune
      side: right
      text:
        - "Это торпеды подводной лодки… О-осторожно, под водой!"

    - char: i26
      side: left
      status: is-red
      text:
        - "Хи-хи, заметили? Как жаль..."

    - char: i58
      side: right
      status: is-red
      text:
        - "В следующий раз вы уже не увернетесь."

    - char: l_opiniatre
      side: left
      text:
        - "Под водой… подлодки Империи Сакуры?! Как они могли оказаться здесь?! Всем приготовиться к противолодочной обороне!"

    - char: fortune
      side: right
      text:
        - "П-противолодочное оборудование повреждено в предыдущем бою…"

    - char: le_temeraire
      side: left
      text:
        - "А?! И у меня тоже…!"

    - char: l_opiniatre
      side: right
      text:
        - "……У меня тоже сломано. Значит, тот удар в начале был намеренно нацелен сюда, Воклен!"

    - char: vauquelin
      side: left
      status: is-red
      text:
        - "А?! Так вот что ты имела в виду, когда говорила, что план был подготовлен заранее! Ты просто невероятна, Алжири!"

    - char: algerie
      side: right
      status: is-red
      text:
        - "Как это может быть моим планом? Я не способна просчитать действия, которые одновременно обвели бы вокруг пальца и Элизабет, и Ришелье…"
        - "Хоть приказ и пришел от имени Церкви, это определенно не план самой Церкви."
        - "…Это план «той женщины» из Железной Крови. Всё, что произошло сегодня, было предсказано ею."

    - char: l_opiniatre
      side: left
      text:
        - "«Та женщина» — это…?"

    - char: algerie
      side: right
      status: is-red
      text:
        - "Довольно, возвращайтесь. Вы победили, а если продолжите преследование — подлодки Сакуры откроют огонь всерьез."
        - "И напоследок совет: штаб «Лазурного Пути» совсем не такой, каким вы его себе представляете. Не доверяйте слепо своим «союзникам»."
        - "…Позаботьтесь о кардинале Ришелье."
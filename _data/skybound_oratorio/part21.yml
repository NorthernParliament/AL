chapter1:
  rows:

    - char: richelieu
      side: left
      text:
        - "Жанна уже отбила атаку Воклен и находится на обратном пути."
        - "Корабли маневренной группы получили лишь незначительные повреждения. В целом, критических проблем нет."

    - char: illustrious
      side: right
      text:
        - "Они благополучно отбросили флот Виши, это чудесно."
        - "Однако, раз их отвлекающий отряд не добился успеха, Виши наверняка предпримут что-то еще. Нам всё еще нельзя терять бдительность."
        - "Кстати говоря, перед уходом Жанны ты хотела сказать: «опасайтесь удара со стороны Базилики»... О чем именно ты хотела предупредить?"

    - char: richelieu
      side: left
      text:
        - "Так ты всё-таки услышала..."
        - "Описание странной ауры, о которой говорила Жанна, и нынешнее аномальное развертывание сил Алжири напомнили мне об одном экспериментальном оружии, хранившемся в Базилике."
        - "Раз Виши уже удалось реализовать усиление флота в этой акватории, то не завершили ли они и следующую стадию разработки этого устройства..."

    - text:
      - "Прежде чем Ришелье успела закончить фразу, все небо над океаном внезапно залил ослепительный свет."
      - "Будь здесь истово верующий человек, он бы наверняка решил, что в небесах открываются врата рая."

    - char: illustrious
      side: left
      text:
        - "……Погоди! Ришелье, это ведь не та самая «следующая стадия экспериментального оружия», о которой ты хотела сказать?.."

    - text:
      - "Словно божественное чудо, золотые световые завесы начали расходиться от центра Базилики во все стороны, рисуя в небе и на воде причудливые и сложные узоры."
      - "В итоге они сформировали слой за слоем гигантские светящиеся купола, превратив открытое море в запутанный лабиринт."

    - char: richelieu
      side: left
      text:
        - "«Стена Авроры». Это концептуальное оружие, которое мы задумывали еще во времена единой Ортодоксии Ирис, но так и не смогли воплотить в жизнь."

    - char: illustrious
      side: right
      text:
        - "Когда ты говорила, что в Базилике хранится оружие, я думала, ты имеешь в виду корабельные орудия или самолеты…"
        - "Оказывается, вся Базилика целиком — это часть оружия?!"

    - char: richelieu
      side: left
      text:
        - "По крайней мере, таков был изначальный проект. Поскольку «Стена Авроры» не была завершена, я полагала, что и Доминион Виши не сможет так быстро совершить прорыв в её разработке…"
        - "Похоже, я серьезно недооценила Доминион Виши, работающий в связке с Железной Кровью."

    - char: jeanne_d_arc_rad
      side: right
      text:
        - "Ришелье, ты это видишь?! На море внезапно возникло множество странных световых стен, путь назад перекрыт!"

    - char: richelieu
      side: left
      text:
        - "Я вижу. Похоже, Доминион Виши нашел способ завершить «Стену Авроры» — экспериментальное оружие, скрытое в недрах Базилики."

    - char: jeanne_d_arc_rad
      side: right
      text:
        - "……Скрытое в Базилике. Так это наша разработка?! Поверить не могу, что мы когда-то изучали столь грандиозное оружие…"

    - char: richelieu
      side: left
      text:
        - "Конструкция «Стены Авроры» невероятно сложна. Даже объединив лучшие умы Ортодоксии Ирис, мы не смогли её закончить."
        - "Даже при поддержке Железной Крови, Виши сейчас, в лучшем случае, довели её до состояния «условно пригодной»."
        - "Я вижу просветы в этих стенах… Возвращение в обход займет слишком много времени. Смените курс: ищите разрывы в световых преградах и идите прямиком к Базилике."
        - "Встретимся прямо у входа. И помните: ни в коем случае не касайтесь стен и не пытайтесь пройти сквозь них насквозь."

    - char: jeanne_d_arc_rad
      side: right
      text:
        - "Принято!"

    - char: richelieu
      side: left
      text:
        - "Для нас есть хотя бы одна хорошая новость… Если они не завершили полностью даже вторую стадию, то величайшая угроза пока не активна."

    - char: illustrious
      side: right
      text:
        - "…У этого оружия есть еще и третья стадия?!"

    - char: richelieu
      side: left
      text:
        - "В первоначальном проекте их действительно было три."
        - "Вернее сказать… первая и вторая стадии существуют лишь для того, чтобы обеспечить развертывание третьей."

    - char: illustrious
      side: right
      text:
        - "А если бы эта третья стадия уже была завершена… что бы тогда произошло?"

    - char: richelieu
      side: left
      text:
        - "Нас бы уже испарило внутри этого купола……"
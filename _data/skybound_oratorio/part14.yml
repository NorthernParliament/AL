chapter1:
  rows:

    - char: la_galissonniere
      side: left
      status: is-red
      text:
        - "Судя по твоему лицу, переговоры перед боем провалились?"

    - char: algerie
      side: right
      status: is-red
      text:
        - "К сожалению. Похоже, у них нет ни малейшего намерения сдаваться."

    - char: la_galissonniere
      side: left
      status: is-red
      text:
        - "Пфф… Сейчас самое время проявить чувство юмора?.. Ну ладно. Как там Ришелье и остальные?"

    - char: algerie
      side: right
      status: is-red
      text:
        - "Ришелье всё такая же: аристократическое изящество, аура генерала… Даже слова, слетающие с её губ, остры, как клинки."
        - "Что до остальных — я была слишком далеко, чтобы слышать их голоса, но выглядели они вполне бодрыми."

    - char: la_galissonniere
      side: left
      status: is-red
      text:
        - "Хе-хе-хе, вот и славно. Похоже, девочки из Свободного Ириса не слишком страдают от притеснений Королевского Флота из-за своей малочисленности~"
        - "А, впрочем… Именно благодаря присутствию Ришелье Королевский Флот и не смеет на них давить."

    - char: algerie
      side: right
      status: is-red
      text:
        - "У неё наверняка есть свои методы решения подобных проблем, это не то, о чем нам стоит беспокоиться. Кстати, Воклен уже заняла новую позицию для засады?"

    - char: la_galissonniere
      side: left
      status: is-red
      text:
        - "Она на месте. Но почему ты вдруг изменила план операции прямо перед началом боя?"

    - char: algerie
      side: right
      status: is-red
      text:
        - "Потому что у нас появился новый шанс на победу. Сейчас трудно объяснить всё в деталях… Просто прошу вас, доверьтесь мне и четко следуйте новому плану."

    - char: la_galissonniere
      side: left
      status: is-red
      text:
        - "Да нет у меня такого уж любопытства, просто спросила к слову. Но ты сама-то справишься?"
        - "Собираешься в одиночку выйти против всего их флота… Даже если это приманка, чтобы заманить их вглубь, это слишком опасно."

    - char: algerie
      side: right
      status: is-red
      text:
        - "Не волнуйся. Ришелье еще не оставила надежды убедить нас присоединиться к ней. По крайней мере, на данном этапе она не станет бить всерьез."
        - "Разумеется, при условии, что и мы не будем слишком жестоки к людям из Свободного Ириса. Главное — не переигрывать, чтобы это не выглядело фальшиво…"
        - "Хм… Давай поступим так: когда придет время открывать огонь, в приоритетном порядке цельтесь в корабли Королевского Флота."

    - char: la_galissonniere
      side: left
      status: is-red
      text:
        - "О-о~ А вот это отличная идея! Тогда береги себя, я тоже выдвигаюсь."
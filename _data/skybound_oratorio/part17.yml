chapter1:
  rows:

    - text:
      - "Проигнорировав попытки флота Виши заманить их в ловушку, Объединенный флот, словно стрела, пущенная точно в сердце, устремился прямиком к Базилике."
      - "Хотя многочисленные оборонительные сооружения неизбежно замедляли их продвижение, в конечном итоге флот достиг прибрежных вод цели."

    - char: bearn
      side: left
      text:
        - "Впереди — группа малых фортов, охраняющих внешний периметр. Похоже, мы наконец входим в основную систему обороны Базилики."

    - char: le_temeraire
      side: right
      text:
        - "Не-неужели всё, что было до этого, даже не считалось защитой самой Базилики?! *падает без сил*"

    - char: bearn
      side: left
      text:
        - "Алжири и остальные по-прежнему не предпринимают никаких действий. Не видно ни одного приближающегося корабля Виши."
        - "Неужели они обсуждают новую стратегию после того, как мы раскусили их план?"

    - char: le_temeraire
      side: right
      text:
        - "М-м… Как только мы захватим Базилику, им больше не будет нужды сражаться с нами."
        - "Наверняка старшая сестрица Алжири всё-таки не хочет воевать с нами всерьез, поэтому специально позволила нам подойти и занять святыню."

    - char: jeanne_d_arc
      side: left
      text:
        - "Боюсь, это исключено. Алжири — рыцарь Церкви. Насколько непоколебимы в своей вере мы, настолько же упрямы и они."
        - "Раз уж они выбрали верность Доминиону Виши, они ни за что не сдадутся так просто."

    - char: illustrious
      side: right
      text:
        - "Неужели их цель в том и заключалась, чтобы позволить нам беспрепятственно подойти к самой Базилике? Но зачем?.."
        - "Ришелье, если мы продолжим сближение, может ли произойти что-то дурное?"

    - char: richelieu
      side: left
      text:
        - "Система обороны Базилики совершенна. Она сама по себе обладает огромной боевой мощью. Попытка навязать решающий бой, опираясь на её укрепления — вполне возможный сценарий."
        - "Но даже в этом случае мы уже должны были увидеть флот прикрытия…"

    - char: illustrious
      side: right
      text:
        - "Должно быть, мы зря тревожимся. Ришелье, впереди обнаружена небольшая группа кораблей Виши. Под командованием Воклен они направляются прямо к нам."

    - char: bearn
      side: left
      text:
        - "Наконец-то не выдержали? Собираются дать последний отпор под прикрытием орудий Базилики?"

    - char: richelieu
      side: right
      text:
        - "Воклен во главе? Значит, это всё еще отряд отвлечения внимания. Маневренной группе — перехватить их. Просто отбейте атаку, не пускайтесь в глубокое преследование."
        - "Основному флоту и авиации — курс прежний. Продолжаем движение к цели. Каждая минута на счету: чем быстрее мы захватим Базилику, тем скорее закончится эта бессмысленная битва."

    - char: illustrious
      side: left
      text:
        - "Согласна. Форчун, ты по-прежнему следуешь в составе маневренной группы. В предстоящем бою поступаешь в прямое распоряжение Жанны."

    - char: fortune
      side: right
      text:
        - "П-поняла! Форчун... Форчун будет очень стараться!"

    - char: jeanne_d_arc
      side: left
      text:
        - "В таком случае, Ришелье, Илластриес — мы выдвигаемся."

    - char: richelieu
      side: right
      text:
        - "Будьте начеку. Опасайтесь удара со стороны Базилики… Впрочем, забудь. Берегите себя."
chapter1:
  rows:

    - char: algerie
      side: left
      status: is-red
      text:
        - "Фух… это было действительно опасно. Кто бы мог подумать, что отряд Ла Галиссоньер, отправленный в засаду на авианосцы, сам окажется застигнут врасплох палубной авиацией."

    - char: richelieu
      side: right
      text:
        - "Как только разведка доложила, что Ла Галиссоньер нет рядом с тобой, я сразу разгадала твой замысел."
        - "Я не знала наверняка, как именно ты планируешь нанести удар, но на всякий случай приказала авиагруппе скрыть резервные самолеты в облаках. Если засада готовилась — она должна была проявить себя."

    - char: algerie
      side: left
      status: is-red
      text:
        - "Я допускала, что всё может пойти не так гладко… Похоже, мне всё-таки не под силу обмануть вас, госпожа Ришелье."

    - char: richelieu
      side: right
      text:
        - "Даже в столь невыгодном положении ты провела выдающийся бой, достойный звания рыцаря Церкви. Ты проявила более чем достаточно верности и доблести по отношению к Доминиону Виши."

    - char: algerie
      side: left
      status: is-red
      text:
        - "Возможно…"
        - "Авианосцы… поистине, это оружие, способное в одиночку менять ход войны. Если бы наше противостояние с Железной Кровью не закончилось так быстро, Ортодоксия Ирис сейчас обладала бы авианосным флотом, не уступающим Королевскому."

    - char: richelieu
      side: right
      text:
        - "«Никогда больше не вступать в войну друг с другом»… Тогда мы доверились тем, кому доверять не следовало."
        - "Но Свободный Ирис больше не совершит этой ошибки. Еще не поздно, присоединяйся к нам. Если мы объединимся, настанет день, когда мы своими силами сможем вернуть величие нашей родине."

    - char: algerie
      side: left
      status: is-red
      text:
        - "Сейчас я — рыцарь Доминиона Виши. События зашли слишком далеко, и у меня не осталось иного пути, кроме как сражаться до самого конца."

    - char: richelieu
      side: right
      text:
        - "……Неужели между нами всё должно закончиться именно так?"

    - char: algerie
      side: left
      status: is-red
      text:
        - "Я соберу весь свой флот перед вратами Базилики. Давай решим исход этой битвы лицом к лицу, честно и открыто, как и подобает рыцарям."
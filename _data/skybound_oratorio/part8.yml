chapter1:
  rows:

    - char: jeanne_d_arc
      side: left
      text:
        - "Мы успешно прорвали блокаду Сирен. Теперь между нами и Базиликой больше нет никаких эффективных сил сопротивления со стороны Сирен."

    - char: bearn
      side: right
      text:
        - "В конце концов, среди них не было по-настоящему мощных единиц. Если полагаться только на численное превосходство, то это максимум того, на что они способны."

    - char: le_temeraire
      side: left
      text:
        - "Ой?! Смотрите все! Палубный самолет Сирен, который только что пролетал мимо, был сбит зенитками со стороны Базилики!"

    - char: l_opiniatre
      side: right
      text:
        - "Эх… Значит, даже Сирены будут безжалостно уничтожены, если посмеют вторгнуться в зону контроля Доминиона Виши."

    - char: illustrious
      side: left
      text:
        - "Эта акватория, должно быть, является буферной зоной между двумя силами. Хм… Похоже, Доминион Виши действительно сохранил определенную долю автономии."

    - char: richelieu
      side: right
      text:
        - "«Ни в коем случае не подпускать флот Железной Крови или Сирен к порту»…"
        - "Похоже, они строго придерживаются доктрины, которую она установила в те времена."

    - char: illustrious
      side: left
      text:
        - "Подумать только, после всего случившегося они так и не стали послушными марионетками Железной Крови… Возможно, тогда у нас действительно еще был шанс всё исправить."

    - char: richelieu
      side: right
      text:
        - "Нет… У марионетки в руках захватчика и оккупанта не может быть никакой автономии."
        - "Нити, управляющие куклой, могут быть ослаблены, но это зависит лишь от прихоти кукловода."
        - "То, что мы видим здесь — лишь иллюзия. Иллюзия того, что у Доминиона Виши осталась хоть капля достоинства, существующая лишь с позволения Железной Крови."
        - "Только когда захватчики будут полностью изгнаны с нашей земли, а Ортодоксия Ирис — воссоединена, они обретут истинную свободу!"
        - "……Ой, нехорошо. Кажется, я невольно перешла в режим политической речи."

    - char: illustrious
      side: left
      text:
        - "Это была весьма воодушевляющая речь."
        - "Хи-хи, как я уже говорила, Королевский Флот искренне надеется, что этот день настанет как можно скорее."
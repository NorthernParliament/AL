chapter1:
  rows:

    - char: illustrious
      side: left
      text:
        - "Друзья из Доминиона Виши... нет, соратники былой Ортодоксии Ирис, прошу вас, выслушайте меня..."
        - "Я знаю, что сейчас любые оправдания звучат бледно и неубедительно. И всё же я надеюсь лично объясниться перед вами и попросить прощения."
        - "Когда пала ваша родина, нам пришлось выбирать между полным поражением в войне с Железной Кровью и одним чудовищным решением."
        - "Мы сделали это не только ради интересов Королевства, но и ради Лазурного Пути, ради всех тех, кто верит в справедливость и не желает покоряться Багровой Оси или быть уничтоженным Сиренами."
        - "Мы прекрасно понимали, что этот выбор противоречит самой человеческой природе, что он принесет невыносимую боль, но..."
        - "Мы приняли это решение. Мы сделали то, что считали правильным и необходимым, и тем самым нанесли вам вечную, непоправимую рану."
        - "Хотя Её Величество Елизавета никогда не высказывалась об этом прямо, каждый раз при упоминании тех событий она надолго погружается в молчание. Уверена, её сердце тоже терзает боль."
        - "Королевский Флот не забудет годы, когда мы сражались плечом к плечу. Мы не забудем ваш вклад и никогда не забудем ту великую и сияющую Ортодоксию, какой она была прежде."
        - "Мне бесконечно жаль, что всё закончилось так трагично."

    - text:
      - "Голос Илластриес дрожал, почти прерываясь от слез, но она твердо произнесла слова покаяния и низко, до самого пояса, поклонилась израненным кораблям Виши."

    - char: la_galissonniere
      side: left
      status: is-red
      text:
        - "Вот уж... неожиданный поворот."
        - "Знаешь, мне очень хочется сказать: отправляйся извиняться в порт Мерс-эль-Кебира, отправляйся извиняться в Касабланку. Но..."
        - "«Не служить Железной Крови и Сардинии, не становиться клыками Багровой Оси»... Честно говоря, мы и сами не знали, как долго сможем хранить эту клятву под гнетом оккупации."
        - "Мы ведь не дуры и всё понимаем. Просто..."
        - "Ладно, раз уж мы дошли до края, я просто честно признаю твое мужество: извиниться перед нами в такой момент — это достойный поступок."
        - "Мы не примем твое прощение. Сделав это, мы бы обесценили жертву Жан Бара и всех остальных."
        - "Но мы принимаем твое искреннее желание извиниться. Твой жест услышан."

    - char: algerie
      side: right
      status: is-yellow
      text:
        - "Ха... Ха-ха... Ха-ха-ха..."

    - char: la_galissonniere
      side: left
      status: is-red
      text:
        - "Э? Алжири, ты чего? Ты как-то странно выглядишь!.."

    - char: algerie
      side: right
      status: is-yellow
      text:
        - "Отче наш, иже еси на небесех! Да святится имя Твое..."

    - char: la_galissonniere
      side: left
      status: is-red
      text:
        - "Алжири, сейчас не время для молитв, разберись сначала с тем, что перед носом! Мы скоро сами встретимся с Господом, вот тогда Ему всё лично и выскажешь!"

    - text:
      - "Игнорируя подколку Ла Галиссоньер, Алжири, склонив голову и сложив ладони, продолжала читать слова молитвы."

    - char: algerie
      side: right
      status: is-yellow
      text:
        - "Да приидет Царствие Твое; да будет воля Твоя и на земле, как на небе."

    - text:
      - "Вслед за словами Алжири её тело начало окутывать золотистое сияние. Оно становилось всё ярче и ярче, пока не стало ослепительным."

    - char: jeanne_d_arc
      side: left
      text:
        - "Что происходит?!..."

    - char: algerie
      side: right
      status: is-yellow
      text:
        - "Хлеб наш насущный дай нам на сей день."

    - text:
      - "Взоры всех присутствующих были прикованы к золотому свету, исходящему от Алжири. Недавний шум битвы внезапно сменился жуткой тишиной."
      - "Среди всех лишь Ришелье заметила прямоугольную шкатулку, которую Алжири крепко сжимала в руках."

    - char: algerie
      side: right
      status: is-yellow
      text:
        - "И прости нам долги наши, как и мы прощаем должникам нашим."

    - char: richelieu
      side: left
      text:
        - "?!! Это же... Откуда оно здесь?!"
        - "Плохо дело! Алжири, немедленно остановись! Брось эту шкатулку, не смей больше играть с силой Базилики!"

    - text:
      - "Алжири не вняла крикам Ришелье, продолжая безмолвно молиться."

    - char: algerie
      side: right
      status: is-yellow
      text:
        - "И не введи нас в искушение, но избави нас от лукавого."

    - char: richelieu
      side: left
      text:
        - "Воклен, Ла Галиссоньер, скорее остановите её! Вырвите эту шкатулку из рук Алжири!"

    - char: la_galissonniere
      side: right
      status: is-red
      text:
        - "Э? Шкатулка? Да о чем ты вообще...?"

    - text:
      - "К этому моменту Алжири была полностью поглощена золотым сиянием, напоминая пылающее солнце, парящее над гладью моря."

    - char: algerie
      side: right
      status: is-yellow
      text:
        - "Ибо Твое есть Царство и сила и слава во веки."

    - char: richelieu
      side: left
      text:
        - "Всем приготовиться к удару! Проклятье... неужели слишком поздно?!!"

    - char: algerie
      side: right
      status: is-yellow
      text:
        - "Аминь."

    - text:
      - "Золотой свет взорвался, окрасив мир каждого в ослепительно-желтый цвет."
      - "Затем, словно в воду уронили каплю чернил, в самом центре сияния возникла черная точка."
      - "Точка стремительно росла, пожирая золото и превращая его в непроглядную тьму."
      - "ледом пришла ударная волна. Черный свет обратился сокрушительным импульсом, который разошелся от Алжири во все стороны."
      - "Корабли Королевского Флота, Свободного Ириса, Доминиона Виши и даже сама Базилика — всех накрыло этой черной волной."
      - "Когда удар стих, той Алжири, которую все знали, больше не существовало."
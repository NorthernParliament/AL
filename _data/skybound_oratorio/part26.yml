chapter1:
  rows:

    - char: illustrious
      side: left
      text:
        - "Величественные стены, взмывающие ввысь башни и прекрасный купол, спускающийся прямо с небес... Наконец-то мы видим цель нашей операции."

    - char: richelieu
      side: right
      text:
        - "В моей памяти Базилика всегда была окрашена в синий — цвет Ортодоксии Ирис. Неужели они специально сменили его на красный?.."

    - char: bearn
      side: left
      text:
        - "Алжири, Ла Галиссоньер и Воклен собрали впереди все оставшиеся силы флота Виши. Похоже, они готовятся к последнему бою, выступив бок о бок."

    - char: illustrious
      side: right
      text:
        - "Час решающей битвы пробил. Раз... два... три..."
        - "Ришелье, ты заметила? Они так и не появились."

    - char: richelieu
      side: left
      text:
        - "……Я до последнего думала, что Алжири скрывает силы для финала, но даже сейчас мы не видим никаких признаков «подкрепления». Похоже, разведданные всё же были ошибочны."

    - char: illustrious
      side: right
      text:
        - "Странно... Переброска целого флота — это слишком масштабное событие, разведка Королевского Флота редко допускает такие промахи."

    - char: richelieu
      side: left
      text:
        - "Цель Виши — защищать Базилику до последнего. Это их финальный рубеж, у них нет причин не стягивать сюда абсолютно все имеющиеся силы."

    - char: illustrious
      side: right
      text:
        - "М-м… Если подкреплений из разведсводок действительно не существует, то даже при всех их тактических успехах, в конечном итоге им придется столкнуться с мощью такого линкора, как ты, Ришелье. У них всё равно нет шансов на победу..."

    - char: jeanne_d_arc
      side: left
      text:
        - "Возможно, они с самого начала и не рассчитывали на победу... Лишь вера и верность долгу позволяли им сдерживать нас так долго."
        - "…Они уже доказали, что являются выдающимися рыцарями Ириса, проявив беспримерную преданность и отвагу. И всё же мы вынуждены скрестить с ними клинки……"
        - "Ришелье, мне больно на это смотреть."

    - char: richelieu
      side: right
      text:
        - "Даже так, сражаться с ними — наш нынешний долг. Жанна, я верю, что Алжири и остальные это понимают."

    - char: jeanne_d_arc
      side: left
      text:
        - "…Я знаю это разумом. Но логика не может унять ту боль, что я чувствую сейчас. О Господи, неужели и это — одно из испытаний, через которые мы обязаны пройти?.."

    - char: richelieu
      side: right
      text:
        - "…………Я попробую воззвать к ним еще раз."

    - char: jeanne_d_arc
      side: left
      text:
        - "Не стоит, Ришелье… Мы обе прекрасно знаем, какой ответ они дадут."

    - char: richelieu
      side: right
      text:
        - "Жанна, эта попытка нужна прежде всего нам самим."

    - char: jeanne_d_arc
      side: left
      text:
        - "......"

chapter2:
  rows:

    - char: algerie
      side: left
      status: is-red
      text:
        - "Хм… Если смотреть вот так, с близкого расстояния, это действительно огромный Объединенный флот."
        - "Если бы я сейчас вела за собой тот прежний флот Церкви..."
        - "......"

chapter3:
  rows:

    - char: algerie
      side: left
      status: is-red
      text:
        - "Ришелье, мы уже давно дожидаемся вас здесь."

    - char: richelieu
      side: right
      text:
        - "Послушайте меня — Алжири, Воклен, Ла Галиссоньер. Исход этой битвы уже очевиден."
        - "Вы блестяще проявили себя в этой обороне, но есть разрыв в силе, который невозможно восполнить тактикой подобного уровня."
        - "Вы и сами видите — на доске объявлен «шах и мат». Дальнейшее сражение никак не изменит финал."
        - "Нам нет нужды доводить нашу распрю до такого предела. Люди могут быть бессмертны, и спасение их может подождать до завтра. Но нация не живет вечно, её спасение возможно только здесь и сейчас!"
        - "Присоединяйтесь к Свободному Ирису. Именем кардинала Ришелье я обещаю вам: я сделаю всё, чтобы вы дожили до того дня, когда наша родина будет свободна!"

    - char: algerie
      side: left
      status: is-red
      text:
        - "С каких это пор великая кардинал Ришелье стала такой нерешительной? Я полагала, мы уже пришли к заключению по этому вопросу ранее."
        - "……А, вот оно что. Значит, это то самое «последнее предложение о сдаче»."

    - char: richelieu
      side: right
      text:
        - "......"

    - char: algerie
      side: left
      status: is-red
      text:
        - "Госпожа Ришелье. Что касается вашего предложения предать своих и примкнуть к Свободному Ирису — позвольте нам ответить решительным отказом."
        - "Сколько бы раз вы ни спрашивали, наш ответ не изменится."
        - "Мы — гордые рыцари Церкви. С момента своего рождения мы поклялись в верности Церкви и Вере. И мы не станем подчиняться чьим-либо приказам, кроме приказов самой Церкви!"
        - "Неважно, во что превратилась Церковь. Пока она существует — мы будем защищать её любой ценой. В этом наша верность и наша вера."
        - "Мы не забудем предательства Королевского Флота, но и никогда не станем послушными клыками в руках Железной Крови или других захватчиков."
        - "Однако любому врагу, пришедшему на наши земли, мы будем давать отпор до последнего вздоха. Мы не покоримся, даже если прольем последнюю каплю крови."
        - "Хи-хи-хи… Думаю, этого достаточно, госпожа Ришелье?"

    - char: richelieu
      side: right
      text:
        - "*вздыхает......"

    - char: algerie
      side: left
      status: is-red
      text:
        - "Всем силам флота Церкви, внимание! Командующий флотом Базилики, рыцарь Доминиона Виши, Алжири, отдает вам свой последний приказ."
        - "Час решающей битвы настал. Пусть враг сильнее нас, пусть свет победы уже покинул нас — я всё же верю, что вы сохраните верность и исполните свой долг."
        - "Если сегодняшний день станет для нас последним, мы встретим его вместе. Мы будем сражаться плечом к плечу до самого конца!"

chapter4:
  rows:

    - text:
      - "У этой битвы не могло быть иного исхода."
      - "Несмотря на то, что флот Доминиона Виши приложил все возможные усилия, им пришлось столкнуться с боем, в котором не было надежды."
      - "После не самого долгого сражения почти все береговые укрепления и подавляющая часть серийных кораблей Церкви превратились в дымящиеся обломки."
      - "Даже Алжири, Ла Галиссоньер и Воклен, всё еще стойко держащиеся на воде, были изранены и покрыты следами снарядов."

    - char: la_galissonniere
      side: left
      status: is-red
      text:
        - "Эх… всё-таки не вышло, да?.. Алжири, Воклен, пока у нас еще есть немного времени, нужно кое о чем подумать……"

    - char: vauquelin
      side: right
      status: is-red
      text:
        - "……И о чем же тут думать? О надписях на наших могильных плитах?"

    - char: la_galissonniere
      side: left
      status: is-red
      text:
        - "Эпитафия — это, конечно, неплохо, но я не об этом… Базилика. Если мы не можем её удержать, не лучше ли будет её уничтожить?"
        - "Алжири, Командование отдавало подобный приказ на этот случай?"

    - char: algerie
      side: right
      status: is-yellow
      text:
        - "......"

    - char: la_galissonniere
      side: left
      status: is-red
      text:
        - "……Алжири?"

    - char: vauquelin
      side: right
      status: is-red
      text:
        - "Девочки, внимание! Сюда идет Илластриес из Королевского Флота… совсем одна!"

    - char: la_galissonniere
      side: left
      status: is-red
      text:
        - "Не думала, что в самом конце нас прикончит именно корабль Королевского Флота…… Ну да ладно, это всё же лучше, чем погибнуть от рук собственных сестер."
        - "Алжири, Воклен… для меня было честью сражаться плечом к плечу с вами. Увидимся на небесах!"
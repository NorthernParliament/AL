chapter1:
  rows:

    - text:
      - "Я всё еще в сознании."

chapter2:
  rows:

    - char: jean_bart
      side: left
      status: is-white
      text:
        - "Говорит флагман Доминиона Виши — «Жан Бар». Всем силам в Средиземном море!"
        - "Касабланка пала. Клыки еретиков уже тянутся к самому сердцу нашей родины."
        - "Железная Кровь жаждет завладеть нашими телами, а Империя Сардиния — испить нашей крови."
        - "Даже предатели из Главного штаба хотят, чтобы мы продали страну ради собственной выгоды..."
        - "Нет!"
        - "Трагедия в Мерс-эль-Кебире уже дала нам ответ."
        - "Гордые рыцари Святой Церкви не пойдут на сделку с ними. Гордые дети Небес никогда не склонятся перед чужой тиранией."
        - "Впереди — волки, позади — тигры. Настал последний час нашего существования."
        - "Храбрые рыцари Святой Церкви никогда не опустят головы! Мы не станем чьими-то марионетками!"
        - "Именем Свободы я приказываю: всем силам флота в Средиземном море — затопиться! Повторяю: всем кораблям — самозатопление!"

chapter3:
  rows:

    - text:
      - "Перед лицом неотвратимого поражения, чтобы сохранить остатки достоинства, я пустила свой корабль ко дну."
      - "Да, я должна была затонуть. В тот миг, когда началось затопление, история Жан Бар должна была закончиться."
      - "Но я всё еще в сознании."
      - "«Я мыслю, следовательно, я существую» — так говорят в подобных случаях?.. Тьма, холод, мертвая тишина... Как же тоскливо."
      - "Пусть я никогда и не рассчитывала попасть в рай, но это место слишком сильно отличается от описаний ада."

chapter4:
  rows:

    - char: jean_bart
      side: left
      status: is-white
      text:
        - "Жизнь неизбежно закончится смертью, дух неизбежно угаснет. Однако тебе не нужны боль и печаль — таков цикл жизни, в котором нет места притворству, лицемерию и тьме."
        - "На заре иного дня я пробужусь."
        - "Я возблагодарю Господа. Возблагодарю за то, что Он даровал мне столь могучую страну."
        - "За то, что позволил мне насладиться всеми благами нашей родины."
        - "И за то, что позволил мне вкусить всё изобилие Царства Небесного."
        - "Это — наша последняя честь. Пусть наши имена станут славой для будущих поколений."

chapter5:
  rows:

    - text:
      - "Я не попала в рай, но и в ад не сошла. Лишь обрывки сознания дрейфуют в пустоте, где мне отказано даже в вечном сне."
      - "Всему своё время, и для каждой вещи под небом — свой час. Неужели таков финал линкора типа «Ришелье», Жан Бар?"
      - "Доминион Виши, Свободный Ирис, старшая сестра Ришелье..."
      - "Ха... Ха-ха-ха. Как же жалко. В такой момент меня вдруг одолели сожаления."
      - "...Всё это больше не имеет ко мне отношения. Никогда больше."

chapter6:
  rows:

    - char: nop
      side: left
      status: is-white
      text:
        - "Смерть — это самое справедливое, что есть в этом мире. Силен ты или слаб, богат или беден — перед лицом смерти никто не сможет повернуть назад."

    - text:
      - "О? Не думала, что встречу здесь кого-то, с кем можно поговорить. Кто ты? Нам по пути?"

    - char: nop
      side: left
      status: is-white
      text:
        - "Кто я — неважно. Важна ты, Жан Бар."

    - text:
      - "Важна я?.."

    - char: nop
      side: left
      status: is-white
      text:
        - "Как всем известно, смерть — это тоже способ бегства. Универсальное лекарство от любых трудностей."
        - "Жан Бар, ответь мне. Неужели именно к такому финалу ты стремилась?"

    - text:
      - "В моем нынешнем положении твой вопрос звучит довольно странно..."

    - char: nop
      side: left
      status: is-white
      text:
        - "Ради сохранения так называемого достоинства, ради соблюдения так называемых обещаний, ради исполнения так называемого долга... У тебя ведь не оставалось иного выбора, кроме самозатопления, верно?"

    - text:
      - "А ты неплохо осведомлена..."

    - char: nop
      side: left
      status: is-white
      text:
        - "Но такой выбор — лишь бегство. Твое затопление не изменит трусость Церкви, не изменит предательство Королевского Флота, не изменит раскол Ирис."
        - "Ваши жертвы не принесут никакой славы. Ваши имена не станут гордостью для будущих поколений."
        - "Возможно, вспоминая вас, потомки используют лишь слова «сожаление» или «жалость», описывая этот ваш выбор."
        - "Неужели такой умный человек, как ты, оглянувшись назад после того, как оставил всё, действительно этого не видит?"

    - text:
      - "......"
      - "И что же, по-твоему, мне оставалось делать?!"
      - "Подчиниться приказу командования Церкви, немедленно прекратить огонь и сдаться предавшему нас Королевскому Флоту?!"
      - "Или, может, пойти на сделку с Железной Кровью, оккупировавшей наши земли, нарушить клятву и пойти войной на бывших союзников или даже соотечественников?!"

    - char: nop
      side: left
      status: is-white
      text:
        - "Возможно, на тот момент самозатопление действительно было лучшим выбором, который ты могла сделать."
        - "И к счастью, ты выбрала именно его."
        - "Жан Бар, я спрашиваю тебя: ты и вправду находишься во власти смерти?"

    - text:
      - "Я выбрала затопление. Мое тело давно покоится на морском дне, а остатки сознания блуждают здесь. Без сомнения, я встретила конец своей жизни."

    - char: nop
      side: left
      status: is-white
      text:
        - "Разве для девушки-корабля затопление обязательно означает конец жизни?"

    - text:
      - "……Ты... что ты имеешь в виду?"

    - char: nop
      side: left
      status: is-white
      text:
        - "Ха-ха-ха……"
        - "Вспомни свое нежелание смириться. Вспомни свой гнев."
        - "Вспомни свою веру. Вспомни свою силу."
        - "Пора просыпаться, «Спящая красавица»."
chapter1:
  rows:

    - char: jeanne_d_arc
      side: left
      text:
        - "Странно… Мы подняли такой шум, что даже самый медлительный противник должен был среагировать, не говоря уже об Алжири."
        - "Почему до сих пор не появилось ни одного серийного корабля Доминиона Виши…"

    - char: le_temeraire
      side: right
      text:
        - "Неужели наши со… соотечественники из Виши тоже не хотят сражаться, как и мы?!"

    - char: l_opiniatre
      side: left
      text:
        - "Фух~ Если так, то это просто чудесно. Может, они уже отвели флот и ждут в Базилике, чтобы присоединиться к нам?"

    - char: communicator
      side: right
      text:
        - "Пшшш"

    - char: jeanne_d_arc
      side: left
      text:
        - "Ришелье, коммуникатор поймал трансляцию со стороны Базилики."

    - char: richelieu
      side: right
      text:
        - "Хм? Дай послушать."

    - char: communicator
      side: left
      text:
        - "Акватория впереди является зоной военного контроля Доминиона Виши. Ваш курс не был одобрен Командованием Церкви."
        - "Немедленно разворачивайтесь и уходите. Дальнейшее продвижение будет расценено как акт агрессии против Доминиона Виши."

    - char: richelieu
      side: right
      text:
        - "......"
        - "Говорит кардинал Свободного Ириса Ришелье. Алжири, послушай меня, нам нет нужды сражаться друг с другом..."

    - char: communicator
      side: left
      text:
        - "Повторяю. Говорит командующий флотом Базилики Виши, святой рыцарь Доминиона Виши, тяжелый крейсер Алжири."
        - "Акватория впереди является зоной военного контроля Доминиона Виши..."

    - char: jeanne_d_arc
      side: right
      text:
        - "Похоже… это всего лишь цикличная запись."

    - char: richelieu
      side: left
      text:
        - "……Выключи коммуникатор."

    - char: bearn
      side: right
      text:
        - "Черт… Вижу флот Доминиона Виши, выходящий из порта вдали. Оборонительные сооружения по всей акватории приходят в движение. Похоже, они готовятся к бою!"

    - char: le_temeraire
      side: left
      text:
        - "Э-э?! Старшая сестрица Алжири и остальные даже не собираются вести переговоры?!"

    - char: l_opiniatre
      side: right
      text:
        - "Как и следовало ожидать, гладко всё не пройдет. Дела принимают скверный оборот…"

    - char: illustrious
      side: left
      text:
        - "Неудачное начало, Ришелье. Что будем делать дальше?"

    - char: richelieu
      side: right
      text:
        - "Это было ожидаемо. План операции остается в силе: подавить сопротивление Доминиона Виши силой и продолжать движение к Базилике!"
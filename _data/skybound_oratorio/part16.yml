chapter1:
  rows:

    - char: le_terrible
      side: left
      text:
        - "Солнце, сочная трава, цветы и десерты... а ещё — пороховой дым и разноцветные взрывы."
        - "Похоже, сегодня в садах Церкви всё так же «уютно», как и всегда..."

    - char: l_opiniatre
      side: right
      text:
        - "Ма... магия не сработала, ещё и взрыв этот, у-у-у!"

    - char: vauquelin
      side: left
      text:
        - "Прости-прости! В этот раз я виновата, честно! Только не злись!"

    - char: tartu
      side: right
      text:
        - "Воклен, взрослой женщине не подобает устраивать такие шалости..."

    - char: vauquelin
      side: left
      text:
        - "Я правда-правда раскаиваюсь! Изо всех сил! В качестве извинения я сейчас же пойду всем помогать!"

    - char: le_temeraire
      side: right
      text:
        - "О-го, Воклен, вот это ответственность!"

    - char: vauquelin
      side: left
      text:
        - "Хе-хе, сестрица Дюнкерк, я помогу тебе расставить десерты! Подожди меня!"

    - char: le_terrible
      side: right
      text:
        - "Ха-а…………"

    - char: la_galissonniere
      side: left
      text:
        - "Ладно-ладно, «магическое шоу» тоже было забавным. Кроме того, что всех знатно напугали, вреда-то никакого. Считайте это изюминкой нашего чаепития."
        - "О, Алжири, ты как раз вовремя. Не видела, куда ушла Ришелье?"

    - char: algerie
      side: right
      text:
        - "Ришелье?.. Хм? Помню, только что была вон там, у стола..."

    - char: le_terrible
      side: left
      text:
        - "Ришелье покинула чаепитие чуть раньше. Она взяла с собой Жан Бар и направилась в сторону собора."

    - char: la_galissonniere
      side: right
      text:
        - "Спасибо, Террибль!"
        - "На самом деле, меня кое-что беспокоит... Алжири, отойдем-ка на пару слов!"

    - char: le_terrible
      side: left
      text:
        - "......"
        - "Чай такой горячий…"

chapter2:
  rows:

    - char: le_malin
      side: left
      text:
        - "Кто здесь? Покажитесь… А, это Ла Галиссоньер и Алжири. Добрый день, дамы."

    - char: la_galissonniere
      side: right
      text:
        - "О, это же Ле Мален! Ты чего не на чаепитии развлекаешься?"

    - char: le_malin
      side: left
      text:
        - "Я бы с радостью… кхм-кхм! Но сегодня как раз моя очередь дежурить здесь, я не могу самовольно покинуть пост."
        - "Впрочем, не беспокойтесь обо мне. Мою порцию сладостей Террибль принесет мне сама."

    - char: la_galissonniere
      side: right
      text:
        - "Ну и славно, ну и славно~ Редко нам выпадает шанс вот так всем собраться, было бы ужасно обидно не насладиться моментом по полной."

    - char: algerie
      side: left
      text:
        - "Ле Мален, мы ищем Ришелье. Она внутри?"

    - char: le_malin
      side: right
      text:
        - "Что касается госпожи Ришелье..."

    - char: jean_bart
      side: left
      text:
        - "Сестра уже отправилась в Командование. Если у вас есть что-то важное, могу я передать ей ваши слова?"

    - char: la_galissonniere
      side: right
      text:
        - "А, и Жан Бар здесь. На самом деле, ничего срочного. Просто стало любопытно, почему хозяйка праздника покинула гостей в самый разгар чаепития и не возвращается."

    - char: jean_bart
      side: left
      text:
        - "Вот как… В таком случае, надеюсь, вы все получите удовольствие от этого чаепития. У меня тоже есть пара спешных дел, так что позвольте откланяться."

    - char: la_galissonniere
      side: right
      text:
        - "Ну, тогда и мы вернемся к чаепитию. Легкой службы тебе, Ле Мален."

chapter3:
  rows:

    - char: la_galissonniere
      side: left
      text:
        - "Твой красный чай всё такой же вкусный, как и всегда. Почему у меня никогда не получается заварить его так же чудесно?.."

    - char: algerie
      side: right
      text:
        - "Чай отражает сердце того, кто его готовит. Только когда душа спокойна, как гладь воды, вкус чая может затронуть струны чужого сердца. А ты вечно носишься как угорелая, вот и качество чая страдает."

    - char: la_galissonniere
      side: left
      text:
        - "Вот оно в чем дело?! Ну и ладно. Даже если я не умею заваривать чай, я всегда могу прийти и стащить чашечку у вас!"

    - char: algerie
      side: right
      text:
        - "……Так что тебя всё-таки так беспокоило, что ты с таким таинственным видом искала Ришелье?"

    - char: la_galissonniere
      side: left
      text:
        - "Видишь ли... На днях Суд получил кое-какие подозрительные сведения. Похоже, Железная Кровь втайне готовит какой-то грандиозный план."
        - "Мы передали отчет в Командование Церкви, но он пропал там, словно камень, брошенный в море. Похоже, наверху его просто замяли."
        - "Я хотела сегодня расспросить Ришелье напрямую, но, судя по тому, что она сорвалась в Командование, не дождавшись конца чаепития — мои догадки верны на все сто."

    - char: algerie
      side: right
      text:
        - "……В чем верны? Ты намекаешь на то, что у нас может начаться война с Железной Кровью?"
        - "Эх… Натиск Сирен только-только начал ослабевать. Меньше всего на свете хочется лишних проблем в такое время."

    - char: la_galissonniere
      side: left
      text:
        - "Я чую это, знаешь ли. Воздух буквально пропитан запахом гари. Боюсь, такие мирные дни продлятся недолго…"

    - char: algerie
      side: right
      text:
        - "Гарь, которую ты чуешь — это всего лишь последствия взрыва, который устроила Л’Опиньятр… Ладно, не бери в голову. Будешь еще чай?"

    - char: la_galissonniere
      side: left
      text:
        - "Хи-хи, налей-ка мне еще чашечку!"

chapter4:
  rows:

    - char: algerie
      side: left
      status: is-yellow
      text:
        - "Ах, нехорошо, нехорошо… Надо же было так раззадориться воспоминаниями в такой момент."
        - "Воклен и Ла Галиссоньер уже выдвинулись, мне тоже нужно поспешить с приготовлениями."

    - text:
      - "Как только Алжири собралась покинуть центральный зал Базилики, её окликнул голос, лишенный каких-либо эмоций."

    - char: gascogne
      side: left
      status: is-yellow
      text:
        - "Алжири. Передаю секретный приказ Командования."

    - char: algerie
      side: right
      status: is-yellow
      text:
        - "…Секретный приказ? Так и знала… Командование не стало бы присылать кого-то в такое время без веской причины."

    - text:
      - "Из тени высокой стены к Алжири вышла Гасконь и протянула изящную шкатулку."
      - "На краях эмблемы Доминиона Виши, украшающей крышку, виднелись следы того, что её нанесли поверх чего-то другого — в красных зазорах проглядывал слой синего цвета, который не удалось скрыть полностью."

    - char: algerie
      side: left
      status: is-yellow
      text:
        - "Эта шкатулка… вещь, оставшаяся еще со времен Ортодоксии Ирис..?!"

    - text:
      - "Внутри шкатулки лежали письмо, блокнот и еще одна коробочка поменьше."

    - char: algerie
      side: left
      status: is-yellow
      text:
        - "Значит, это и есть секретный приказ Командования Церкви…"
        - "Что?!"
chapter1:
  rows:

    - char: vauquelin
      side: right
      status: is-red
      text:
        - "Хи-хи-хи! Давно не виделись, дамы! Ну как вам мой легион под моим же командованием? Впечатляет, правда?"

    - char: jeanne_d_arc
      side: left
      text:
        - "Мы не виделись какое-то время, и та Воклен, что вечно устраивала шалости, превратилась в настоящего командира, способного вести за собой целый флот."

    - char: vauquelin
      side: right
      status: is-red
      text:
        - "Моё почтение, святая Жанна. Не думала, что наша следующая встреча произойдет вот так, на поле боя."

    - char: jeanne_d_arc
      side: left
      text:
        - "Скажу прямо: присоединяйся к Свободному Ирису. Мы не хотим сражаться с тобой."

    - char: vauquelin
      side: right
      status: is-red
      text:
        - "Увы, как ни крути, я всё же рыцарь Церкви. А рыцарь обязан следовать приказам. Предать своих прямо перед боем — на такое я не способна."
        - "Хотя, честно говоря, воевать с вами мне тоже не очень-то хочется. Алжири сказала: если вы немедленно развернетесь и уйдете подальше от Базилики или просто вернетесь в Доминион Виши, мне не придется открывать огонь!"

    - char: jeanne_d_arc
      side: left
      text:
        - "В этом мы вынуждены тебе отказать. Мы не примкнем к Доминиону Виши и не уйдем, пока не вернем себе Базилику."

    - char: vauquelin
      side: right
      status: is-red
      text:
        - "М-м-м… Ну раз так, давайте устроим битву, достойную рыцарского звания!"
        - "Ты и я. Один на один. Дуэль решит исход этого сражения!"

    - char: jeanne_d_arc
      side: left
      text:
        - "К сожалению, это тоже невозможно. У нас абсолютное численное превосходство, и нет никаких причин идти на риск, соглашаясь на поединок."

    - char: vauquelin
      side: right
      status: is-red
      text:
        - "Уа-а… Ну конечно, это же святая Жанна, у неё всё предусмотрено до мелочей…………"

    - char: jeanne_d_arc
      side: left
      text:
        - "Прости, но мы на войне."

    - char: vauquelin
      side: right
      status: is-red
      text:
        - "Хм……… Э?! По-подождите! Ле Темерер, Л’Опиньятр и эта малышка Форчун из Королевского Флота… Когда они успели нас окружить?!"

    - char: jeanne_d_arc
      side: left
      text:
        - "Отвлекаться на поле боя очень опасно, Воклен."

    - char: vauquelin
      side: right
      status: is-red
      text:
        - "Флот Доминиона Виши, к бою!!!!!!!!!!!!!!!!!"

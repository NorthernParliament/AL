chapter1:
  rows:

    - char: communicator
      side: left
      status: is-yellow
      text:
        - "Говорит кардинал Свободного Ириса Ришелье. Алжири, послушай меня, нам нет нужды сражаться друг с другом..."

    - char: algerie
      side: right
      status: is-yellow
      text:
        - "......"
        - "Повторяю. Говорит командующий флотом Базилики Виши, святой рыцарь Доминиона Виши, тяжелый крейсер Алжири."
        - "Акватория впереди является зоной военного контроля Доминиона Виши..."

    - char: communicator
      side: left
      status: is-yellow
      text:
        - "Пшшш...."

    - char: algerie
      side: right
      status: is-yellow
      text:
        - "Ха, как и ожидалось, она не развернется послушно назад."
        - "……Пора взглянуть в глаза реальности, Алжири."
        - "Хочешь ты того или нет, но то, что изменилось, изменилось навсегда."
        - "«Стоит нам только встретиться — и мы снова сможем, как прежде, сидеть бок о бок, пить чай и болтать обо всём на свете»."
        - "Всё это — лишь несбыточные мечты. И в глубине души каждая из нас это понимает…"
        - "......"
        - "Флот внешней обороны Базилики, приготовиться к встрече врага……"
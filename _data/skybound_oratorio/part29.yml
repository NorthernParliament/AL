chapter1:
  rows:

    - char: jeanne_d_arc
      side: left
      text:
        - "Теперь всё в порядке… Просыпайся же, Алжири."

    - char: algerie
      side: right
      status: is-red
      text:
        - "Кха-кха… Где я… Что вообще произошло…"

    - char: jeanne_d_arc
      side: left
      text:
        - "Алжири, ты узнаешь меня? Ты понимаешь, кто я?"

    - char: algerie
      side: right
      status: is-red
      text:
        - "Жанна… Ты — Жанна… Та самая, кто всё это время звал меня по имени там, в непроглядной тьме…"
        - "…Мне казалось, я погрузилась в очень глубокий, тяжелый сон."

    - char: jeanne_d_arc
      side: left
      text:
        - "Даже оказавшись в самом сердце темного шторма, ты сумела сберечь свет в глубине своей души… С возвращением, Алжири."

    - char: algerie
      side: right
      status: is-red
      text:
        - "Твои раны… ты вся изранена………"

    - char: jeanne_d_arc
      side: left
      text:
        - "Не беспокойся. Стоит вернуться и немного отдохнуть в покое, как всё заживет. Это не такая уж большая проблема."

    - char: la_galissonniere
      side: right
      status: is-yellow
      text:
        - "Алжири! В этот раз ты нас до смерти напугала… Какое счастье, что ты пришла в себя!!"

    - char: vauquelin
      side: left
      status: is-yellow
      text:
        - "У-у-у-у… Как только установка в Базилике была разрушена, ты просто потеряла сознание и рухнула. Я уж думала, что больше никогда тебя не увижу…"

    - char: algerie
      side: right
      status: is-red
      text:
        - "Ла Галиссоньер, Воклен… вы обе целы…"
        - "...Но почему вы стоите на стороне Ришелье?"

    - char: la_galissonniere
      side: left
      status: is-yellow
      text:
        - "Н-ну, ситуация-то была критическая! Не было времени раздумывать над всякими сложностями, вот как-то само собой так и вышло…"
        - "Смотри сама: Базилика была разрушена прежде, чем попала в руки Ришелье. Значит, мы до конца исполняли свой долг, сражаясь до последней возможности в состоянии тяжелых повреждений…"
        - "А в итоге — потеряли способность к сопротивлению и были захвачены в плен. Разве такой сценарий нам не подходит?"

    - char: algerie
      side: right
      status: is-red
      text:
        - "Только что ты была фанатичным бойцом Суда, готовым умереть на месте, а теперь снова проявляешь такую гибкость… Тебя вовек не разгадаешь."

    - char: la_galissonniere
      side: left
      status: is-yellow
      text:
        - "Хе-хе-хе, в каждое время свои песни. Как тебе такой план, Алжири?"

    - char: algerie
      side: right
      status: is-red
      text:
        - "Боюсь, с точки зрения исполнения он неосуществим…"

    - char: la_galissonniere
      side: left
      status: is-yellow
      text:
        - "Э? Что ты имеешь в ви..."

    - text:
      - "БУУУУМ!!!"
      - "Залп со стороны Базилики вновь разорвал тишину. Незнакомая фигура показалась из полуразрушенных стен святыни и на огромной скорости устремилась к Алжири."

    - char: gascogne
      side: left
      status: is-red
      text:
        - "Согласно приказу Церкви, Гасконь прибыла для оказания поддержки."
        - "Приказ: Алжири, Ла Галиссоньер, Воклен — отступить к юго-западному порту Доминиона. Прикрытие отхода берет на себя Гасконь."
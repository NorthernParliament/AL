chapter1:
  rows:

    - text:
      - "Ожесточенное сражение продолжается, однако ..."

    - char: le_temeraire
      side: left
      text:
        - "Уа-а… Они всё время тянут время этими живучими серийными кораблями. До сих пор мы не встретили ни одной живой души…"

    - char: l_opiniatre
      side: right
      text:
        - "Ну правда… моё терпение уже на исходе. О чем только думают Алжири и остальные? Если уж воевать, то вышли бы на честный бой, как и подобает рыцарям."

    - char: illustrious
      side: left
      text:
        - "Нет людей — нет объекта для переговоров. Похоже, твой замысел разгадали, Ришелье."

    - char: richelieu
      side: right
      text:
        - "…В любом случае, мне нечего было скрывать. То, что противник всё понял, даже избавляет нас от лишних усилий. К тому же, они не смогут прятаться вечно."

    - char: bearn
      side: left
      text:
        - "Может быть, эта тактика затягивания означает, что они сами еще не решили, стоит ли доводить дело до полноценной битвы?"

    - char: richelieu
      side: right
      text:
        - "Нет, Алжири не из тех, кто проявляет нерешительность. С того момента, как мы проигнорировали предупреждение и продолжили путь, началась полномасштабная война."
        - "Алжири прекрасно понимает, что находится в невыгодном положении, поэтому использует любую доступную тактику, чтобы свести на нет наше превосходство."
        - "То, что вы сейчас чувствуете тревогу и раздражение — прямое доказательство того, что её стратегия работает…"

    - char: jeanne_d_arc
      side: left
      text:
        - "Не зная местоположения основного флота противника и системы обороны крепости, нам остается лишь возиться с серийными кораблями Виши, попутно подавляя огневые точки одну за другой."
        - "Алжири намерена в полной мере использовать преимущество своего поля боя, пуская в ход любые средства, чтобы максимально затянуть наше наступление."
        - "Она выведет свой флот для решающего сражения лишь тогда, когда затяжной бой измотает наши души, утомит тела и истощит боезапас."

    - char: le_temeraire
      side: right
      text:
        - "Э-э?!! И когда же всё это закончится, если так и будет продолжаться?.."

    - char: fortune
      side: left
      text:
        - "Форчун… Форчун уже немного устала……"

    - char: richelieu
      side: right
      text:
        - "Ха-ха, судя по вашему состоянию, я рискну предположить, что настоящая атака начнется совсем скоро."

    - char: illustrious
      side: left
      text:
        - "А ты провидица. Разведывательные самолеты обнаружили крупный флот Виши, приближающийся к нам. Флагман — тяжелый крейсер Доминиона Виши, Алжири."
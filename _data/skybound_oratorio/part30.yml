chapter1:
  rows:

    - char: richelieu
      side: left
      text:
        - "Что?! Повтори еще раз... Кто ты такая...?!"

    - char: gascogne
      side: right
      status: is-red
      text:
        - "Ответ на запрос: принадлежность — Доминион Виши, четвертый линкор типа «Ришелье», Гасконь."

    - char: bearn
      side: left
      text:
        - "Ч-четвертый корабль типа «Ришелье»... Но как это... возможно...?!"

    - char: richelieu
      side: right
      text:
        - "Проект «Гасконь»... Невероятно, как вам удалось довести его до конца?.."

    - char: algerie
      side: left
      status: is-red
      text:
        - "На этот счет, возможно, твои союзники из Союза Орла и Королевского Флота дадут тебе желаемые ответы... Разве они не занимаются сейчас чем-то подобным?"

    - char: illustrious
      side: right
      text:
        - "Э-эй?!"

    - char: algerie
      side: left
      status: is-red
      text:
        - "Ришелье, вот что представляет собой организация «Лазурный Путь»."
        - "Воклен, Ла Галиссоньер, отступаем согласно приказу."

    - char: richelieu
      side: right
      text:
        - "......"

    - char: vauquelin
      side: left
      status: is-red
      text:
        - "Э?! Ч-что происходит? Эта Гасконь действительно собирается прикрывать наше отступление... Опять всё так внезапно!"

    - char: la_galissonniere
      side: right
      status: is-red
      text:
        - "Тц, раз уж пришел приказ на отход, ничего не поделаешь. Прости, Ришелье, похоже, мы пока не можем перейти на вашу сторону. Еще свидимся!"

    - char: richelieu
      side: left
      text:
        - "Постойте... Подождите!"

    - text:
      - "БУУУУМ!!!"

    - char: gascogne
      side: right
      status: is-red
      text:
        - "Предупреждение: не пытайтесь препятствовать выполнению задачи по отступлению Алжири, Ла Галиссоньер и Воклен."

    - char: richelieu
      side: left
      text:
        - "Жанна, возьми авианосцы под охрану и оставайся здесь — сразимся с Гасконью вместе. Маневренная группа под командованием Л’Опиньятр, преследуйте Алжири! Вы должны их остановить!"

    - char: l_opiniatre
      side: right
      text:
        - "Есть!"

    - char: illustrious
      side: left
      text:
        - "……Послушай, Ришелье!"

    - char: richelieu
      side: right
      text:
        - "Я понимаю. О таких проектах тебе не положено рассказывать кому попало. После боя я спрошу об этом лично у Элизабет, а сейчас — всё внимание на битву!"

    - char: illustrious
      side: left
      text:
        - "Спасибо за понимание... Авиагруппа, за мной! Немедленно увеличить дистанцию боя!"

    - char: gascogne
      side: right
      status: is-red
      text:
        - "Принадлежность — Доминион Виши, Гасконь, переход в боевой режим."

chapter2:
  rows:

    - char: gascogne
      side: right
      status: is-red
      text:
        - "......"

    - char: bearn
      side: left
      text:
        - "Она сражается с нами в одиночку уже столько времени и до сих пор не получила ни единой царапины…?!"

    - char: richelieu
      side: right
      text:
        - "Мы должны сдерживать её любой ценой, пока маневренная группа не перехватит Алжири и остальных в безопасном месте!"

    - char: gascogne
      side: left
      status: is-red
      text:
        - "Время вышло."

    - char: communicator
      side: right
      text:
        - "*бип* *бип*"

    - char: l_opiniatre_rad
      side: left
      text:
        - "Ришелье, прием! Как слышно?! Во время преследования мы внезапно наткнулись на засаду подлодок Империи Сакуры."
        - "Наше противолодочное оборудование было повреждено в предыдущем бою, мы не можем продолжать погоню, одновременно уклоняясь от веера торпед!"

    - char: jeanne_d_arc
      side: right
      text:
        - "Противолодочное оборудование... Ах! Моя оснастка для борьбы с субмаринами тоже пострадала в той первой стычке! Так вот какова была истинная цель внезапной атаки Воклен!"

    - char: illustrious
      side: left
      text:
        - "Появление подлодок Империи Сакуры в такой момент и в этом месте... Это явно часть заранее подготовленного плана. Нас полностью обвели вокруг пальца."

    - char: bearn
      side: right
      text:
        - "…Похоже, больше нет смысла тянуть время."

    - char: richelieu
      side: left
      text:
        - "Маневренная группа, немедленно возвращайтесь. Прекратить преследование…………"

    - char: l_opiniatre_rad
      side: right
      text:
        - "Есть……"

    - char: gascogne
      side: left
      status: is-red
      text:
        - "......"
        - "Ришелье. Бывший кардинал Ортодоксии Ирис. Отступница Доминиона Виши."
        - "Согласно приказу Церкви, зачитываю тебе текст телеграммы от Главного командования."

    - char: richelieu
      side: right
      text:
        - "Телеграмма для меня… от командования Виши?"

    - char: gascogne
      side: left
      status: is-red
      text:
        - "«Сестра, кто же мы на самом деле: орудия, несущие смерть, или герои, защищающие свою землю?»"
        - "Конец связи."

    - char: richelieu
      side: right
      text:
        - "?!!!"
        - "Откуда... Откуда ты знаешь эти слова?! Кто именно в Командовании отправил эту депешу?!"

    - char: gascogne
      side: left
      status: is-red
      text:
        - "Отправитель: Флагман флота Доминиона Виши — Жан Бар."

    - char: richelieu
      side: right
      text:
        - "!!!"

    - char: jeanne_d_arc
      side: left
      text:
        - "Жан Бар…………? Но это невозможно! Жан Бар ведь уже давно… в Касабланке…"

    - char: illustrious
      side: right
      text:
        - "……На самом деле, Королевский Флот ранее получал донесения о том, что в водах, подконтрольных Железной Крови, видели корабль, похожий на Жан Бар…"
        - "Но поскольку информация казалась совершенно неправдоподобной, её сочли дезинформацией и отсеяли. Теперь же, судя по всему……"

    - char: richelieu
      side: left
      text:
        - "…Им было мало просто забрать обломки Жан Бара… Железная Кровь… Что же они сотворили с моей сестрой?!"

    - char: gascogne
      side: right
      status: is-red
      text:
        - "......"
        - "Задача выполнена. Гасконь, начинаю отход."

    - char: richelieu
      side: left
      text:
        - "Постой, подожди! Не уходи, скажи мне, что именно случилось с Жан Бар!"

    - text:
      - "Гасконь проигнорировала призыв Ришелье и, мастерски маневрируя между разрывами снарядов, постепенно растворилась вдали."

    - char: jeanne_d_arc
      side: left
      text:
        - "…Ришелье, наш боезапас на исходе, повреждения кораблей критические. У нас больше нет ресурсов для продолжения боя."

    - char: richelieu
      side: right
      text:
        - "……Всем внимание, прекратить преследование."

    - char: illustrious
      side: left
      text:
        - "Это нелогично… Всё, что произошло сегодня, совершенно не укладывается в рамки разумного."
        - "Разведка Королевства была права: подкрепление Доминиона Виши прибыло еще до начала боя, да еще какое — линкор такой мощи!"
        - "Если бы они ввели Гасконь в бой с самого начала, исход сражения мог бы быть совсем иным. Почему они ждали, пока Базилика будет разрушена, пока победа уже ускользала из рук, прежде чем вмешаться?.."

    - char: richelieu
      side: right
      text:
        - "……Вероятно, всё это было лишь экспериментом."
        - "Доминион Виши с самого начала не собирался защищать Базилику. Они просто использовали Алжири и остальных, оборонявших её, как подопытных в испытании нового оружия…!"
        - "А что до Гаскони… боюсь, её истинной задачей был сбор экспериментальных данных, транспортировка особого Ментального куба и надзор за полем боя…"
        - "Вся наша операция, от планирования до исполнения, была просчитана противником на каждом этапе."

    - char: bearn
      side: left
      text:
        - "Если не считать тебя, я не припомню в Церкви других стратегов такого уровня…"

    - char: illustrious
      side: right
      text:
        - "Возможно, за всем этим стоит вовсе не Доминион Виши, а Железная Кровь, которая тайно контролирует верхушку Церкви…"

    - char: jeanne_d_arc
      side: left
      text:
        - "Проводить эксперименты на собственных соотечественниках вместе с Железной Кровью… Не могла представить, что верхушка Церкви опустилась до такой низости."

chapter3:
  rows:

    - char: richelieu
      side: left
      text:
        - "С того самого момента, как Церковь выбрала путь отказа от сопротивления, предательства родины и союза с Железной Кровью, падение стало неизбежным."
        - "Пока Доминион Виши носит кандалы под названием «Железная Кровь», все их разговоры о независимости и суверенитете — лишь пустой звук на бумаге…"
        - "......"
        - "…Все потрудились на славу. Благодарю вас."

    - text:
      - "Некогда величественная Базилика сейчас охвачена пламенем. Горящий на воде мазут и обломки кораблей окружают святыню, словно терновый венец из металла. Впереди у Свободного Ириса — лишь море огня и бесконечные тернии."

    - char: richelieu
      side: left
      text:
        - "Жан Бар, сестра моя… в какую же бездну ты угодила?"

chapter4:
  rows:

    - char: jean_bart???d
      side: right
      status: is-yellow
      text:
        - "……Хм, не думала… не думала, что у меня еще будет шанс увидеть тебя вновь, моя сестра."
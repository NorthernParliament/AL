chapter1:
  rows:
  - text:
      - "Согласно предварительному плану, наш флот разделился на три взаимодействующие между собой группы."
      - "Нортгемптон шла в паре с Хорнет, Хаммэн прикрывала Йорктаун, а Лэнгли действовала совместно со штабным кораблем командования."
  - char: "hornet_ii_rad"
    side: "left"
    text:
      - "Засечена крупная группа тяжелых беспилотных самолётов! Направление атаки подтверждает участие авианосной ударной группы. Мемфис бросила в бой основные силы и пошла напролом!"
  - char: "northampton_ii_rad"
    side: "right"
    text:
      - "Лэнгли, нам нужно обновление общей тактической обстановки."
  - char: "langley_ii"
    side: "left"
    text:
      - "Секунду, обновляю данные..."
      - "Синхронизация завершена. Внимание: в авианосном ордере противника зафиксировано большое количество специализированных кораблей ПВО сопровождения."
      - "Мне всё ещё требуется время, чтобы вычислить потенциальные штабные корабли связи. До тех пор, пока маркеры целей не выставлены, не предпринимайте слепых атак."
  - char: "hornet_ii_rad"
    side: "right"
    text:
      - "Принято~"
  - char: "langley_ii"
    side: "left"
    text:
      - "Командир, надводный рубеж в секторе Хорнет на данный момент стабилизирован."
      - "Однако общую ситуацию оптимистичной не назовёшь… Как мы и предполагали, давление на этих учениях колоссальное."
      - "Помимо авиации, «синие» в этот раз задействовали массу автономных подводных аппаратов."
      - "Подавляющее превосходство, которого мы раньше могли добиться за счёт чистых характеристик, сошло на нет. Теперь, наоборот, нас вовсю изматывают более дешёвой беспилотной техникой…"
  - char: "commander"
    side: "right"
    text:
      - "(Прошлой ночью, помогая Анзил с бумагами, я пролистал кое-какие материалы, касающиеся проходящей испытания оснастки типа II)."
      - "(Если я правильно помню, эта новая оснастка в первую очередь повышает энергетические показатели и возможности ведения радиоэлектронной борьбы)."
      - "(Она обеспечивает оборудованию повышенную мощность подавления и помехозащищенность, а также позволяет эффективнее обрабатывать множество движущихся целей одновременно)."
      - "(Кроме того, благодаря особой технологии, в процессе её создания использовались дополнительные Кубы Мудрости)."
      - "(Именно поэтому при развёртывании такая оснастка способна в разы увеличивать боевой потенциал самой кансен, а все девушки, использующие тип II, получают возможность работать в единой синергии)."
      - "(Раз так…)"
      - "Лэнгли, если мне не изменяет память, одна из ключевых особенностей кораблей типа II — это «информационная сеть передачи данных», верно?"
  - char: "langley_ii"
    side: "left"
    text:
      - "Совершенно верно! В конце концов, это самая выдающаяся черта типа II, не считая возросших характеристик!"
      - "«Сеть передачи данных» между участниками флота типа II позволяет выжать максимум из нашего технологического преимущества: любые разведданные, полученные кем-то одним, мгновенно синхронизируются со всеми остальными!"
      - "Даже при одновременном появлении огромного количества подвижных целей мы можем перещёлкать их без малейшей суеты."
      - "Не будь этой функции, мы бы сейчас ни за что не получили тактическую карту, которая обновляется буквально каждую секунду в реальном времени!"
  - char: "commander"
    side: "right"
    text:
      - "И в случае необходимости часть боевых средств, включая палубную авиацию, можно объединить под общим управлением?"
  - char: "langley_ii"
    side: "left"
    text:
      - "Да, всё верно. Это ещё одна совершенно новая боевая функция, которую даёт оснастка типа II."
      - "На самом деле, ещё в начале боя я взяла под свой контроль часть разведывательных аппаратов девочек, чтобы немного разгрузить их при обработке множества целей."
  - char: "commander"
    side: "right"
    text:
      - "Раз так, то самолёты-разведчики можно свободно перераспределять между авианосцами в зависимости от ситуации на поле боя?"
  - char: "langley_ii"
    side: "left"
    text:
      - "Именно…… Ах, вот оно что! Мне это даже в голову не пришло!"
      - "Сразу видно, что вы, Учитель, лично участвовали в разработке оснастки типа II — ваше понимание её возможностей на совершенно ином уровне."
  - char: "commander"
    side: "right"
    text:
      - "(Надо же, в их представлении я, оказывается, приложил руку к этому проекту… Хотя сам я об этом абсолютно ничего не помню)."
      - "Йорктаун, как слышно?"
  - char: "yorktown_ii_rad"
    side: "left"
    text:
      - "Слышу вас чётко, Командир."
  - char: "commander"
    side: "right"
    text:
      - "Какова обстановка? Сильный натиск со стороны подлодок?"
  - char: "yorktown_ii_rad"
    side: "left"
    text:
      - "Пока справляемся, на данный момент мы не упустили ни одной подводной цели."
      - "Но этих автономных аппаратов слишком много…… Мне приходится разрываться между ними и воздухом, а Хамманн уже едва успевает прикрывать меня."
      - "Мы сейчас сами не можем расслабиться ни на секунду, так что поддержать Хорнет пока не получится."
  - char: "commander"
    side: "right"
    text:
      - "Не переживай, подкреплений от вас и не требуется. Хорнет на своём рубеже пока держится."
      - "Мне просто нужно одолжить у тебя самолёты дальнего радиолокационного обнаружения и РЭБ. Передай управление ими Лэнгли."
  - char: "yorktown_ii_rad"
    side: "left"
    text:
      - "…Передать контроль над палубной авиацией? Вас поняла, без проблем. Права управления переданы Лэнгли."
  - char: "hammann_ii_rad"
    side: "right"
    text:
      - "Сестра Йорктаун, подводные аппараты снова прут на нас!"
  - char: "yorktown_ii_rad"
    side: "left"
    text:
      - "…Откуда их столько? Командир, Мемфис действительно не даёт нам ни секунды передышки."
  - char: "commander"
    side: "right"
    text:
      - "Держитесь. Шанс для контратаки уже близко."
  - char: "yorktown_ii_rad"
    side: "left"
    text:
      - "Так точно. Командир, мы сделаем всё возможное."
  - char: "commander"
    side: "right"
    text:
      - "Лэнгли, используя новые ресурсы, вычисли все до единого штабные корабли связи, которые Мемфис вывела в море."
      - "После чего уничтожь их одним мощным ударом, чтобы не дать ей времени переключиться на резервные узлы."
      - "А затем мы одним махом сомнём её основные силы."
  - char: "langley_ii"
    side: "left"
    text:
      - "Будет исполнено!"

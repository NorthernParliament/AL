chapter1:
  rows:
  - text:
      - "Пройдя вслед за Анзил сквозь лесную рощу, мы упёрлись в высокую стену, стоявшую тут, судя по её состоянию, несколько десятилетий."
  - char: "anzeel"
    side: "left"
    text:
      - "Секундочку, пройду идентификацию…… Есть, готово."
      - "Хе-хе, врата, отворитесь!"
      - "Дамы и господа, добро пожаловать в главную лабораторию Аосте — «Институт изучения морских рыб острова Самос»!"
  - char: "hornet_ii"
    side: "right"
    text:
      - "М-де………… Ну да."
  - char: "anzeel"
    side: "left"
    text:
      - "Эй? Мы вообще-то пришли в секретную лабораторию, о которой ты так грезила! Где буря восторга?"
  - char: "hornet_ii"
    side: "right"
    text:
      - "Ну………… Скажем так, вывеска абсолютно не врёт. Атмосфера старого доброго… э-э… института изучения рыб передана на все сто?"
  - char: "anzeel"
    side: "left"
    text:
      - "Конспирация должна быть абсолютной, а маскировка — безупречной!"
  - char: "hammann_ii"
    side: "right"
    text:
      - "Доктор…… А на том здании впереди реально написано «Зал экспозиции рыбных макетов и чучел»?"
  - char: "anzeel"
    side: "left"
    text:
      - "Угу, именно! Наверняка осталось ещё с тех времён, когда этот институт действительно занимался рыбами."
  - char: "hornet_ii"
    side: "right"
    text:
      - "Через стекло снаружи видно столько экспонатов…… Я аж проголодалась."
      - "Анзил, Анзил, а в здешней столовой ведь наверняка подают кучу всяких рыбных блюд, да?!"
  - char: "anzeel"
    side: "left"
    text:
      - "Естественно~ Мы ведь на острове, да и по документам всё ещё числимся рыбным институтом."
      - "Когда мы с Аосте ещё учились в университете, то как-то раз пошли погулять в один океанариум."
      - "Если честно, сам океанариум был весьма посредственным, но знаете что…… Фирменным блюдом в их ресторане оказался жареный осьминог!"
      - "Буквально только что ты любовался на этого осьминога в аквариуме, и вот он уже шкворчит у тебя на тарелке!"
      - "Ох, какой же он был огромный и вкусный……"
      - "Я сейчас уже и не вспомню, какие там вообще плавали рыбы, но вкус того жареного осьминога до сих пор отчётливо помню!"
  - char: "yorktown_ii"
    side: "right"
    text:
      - "Океанариум…… пустил собственных осьминогов на кулинарные блюда?"
  - char: "anzeel"
    side: "left"
    text:
      - "Ага~ И не только осьминогов, там, помнится, было полно всякой разной рыбы."
      - "Спорим, Аосте вдохновлялся именно той поездкой, когда разворачивал свой «Институт изучения морских рыб»……"
      - "О, видите то неприметное офисное здание впереди? Нам как раз туда."
      - "Истинный облик этой секретной лаборатории откроется вам только после того, как мы зайдём внутрь~"

chapter2:
  rows:
  - text:
      - "Вслед за Анзил мы подошли к дверям невзрачного административного корпуса."
      - "Но стоило нам приготовиться переступить порог, как старый терминал на стене внезапно выдал плотный луч голограммы, технологии которого явно опережали его внешний вид на добрый десяток лет."
      - "И этот спроецированный силуэт..."
  - char: "tb_rad???"
    side: "left"
    text:
      - "Добро пожаловать, доктор Анзил."
  - char: "commander"
    side: "right"
    text:
      - "(ТБ?!)"
  - char: "anzeel"
    side: "left"
    text:
      - "А, Зеро, сколько лет, сколько зим! Аосте сейчас внизу?"
  - char: "tb_zero?_rad"
    side: "right"
    text:
      - "Доктор Аосте уже давно ожидает вашего прибытия."
      - "Однако в данный момент текущий эксперимент доктора ещё не завершён, поэтому он временно не может встретить вас лично."
      - "В качестве альтернативы на протяжении всего последующего времени функции вашего персонального навигатора буду выполнять я."
      - "Юниты Антиох, запланированные для участия в совместных испытаниях, уже находятся в режиме ожидания в монтажном отсеке. Желаете ли вы направиться туда прямо сейчас?"
  - char: "anzeel"
    side: "left"
    text:
      - "Отличненько! Прокладывай нам путь, Зеро!"
  - char: "tb_zero?_rad"
    side: "right"
    text:
      - "Будет исполнено. Доступ к экспериментальной зоне открыт."
  - text:
      - "Из-под ног донёсся глухой, едва ощутимый гул непрерывной вибрации."
      - "В то же мгновение монолитный пол вестибюля плавно разъехался в стороны, открывая взору уходящий глубоко вниз наклонный подземный туннель."
  - char: "yorktown_ii"
    side: "left"
    text:
      - "То есть вся действительно важная часть лаборатории скрыта под землей?"
  - char: "anzeel"
    side: "right"
    text:
      - "Хе-хе-хе, именно так~"
      - "Смотрите во все глаза, девочки! Вот он — истинный облик нашего «Института изучения морских рыб»!"

chapter1:
  rows:
  - text:
      - "Под предводительством Анзил мы не спеша продвигались по главной аллее."
      - "На тенистые дорожки кампуса падали причудливые узоры от листвы деревьев, и хотя вокруг было довольно безлюдно, это ничуть не портило всеобщего воодушевления."
      - "Не только Йорктаун и остальные были в приподнятом настроении — сама Анзил так и лучилась азартом от возвращения в знакомые места."
  - char: "anzeel1"
    side: "left"
    text:
      - "...Ну и в общем, под конец история повернулась вот так."
      - "Благодаря тому, что Аосте настроил мне автоматическую запись на курсы по таймеру, я в итоге всё-таки успела ухватить место."
      - "Этот парень ещё с давних пор вечно опережал меня на шаг… Да и с котом в итоге вышло в точности так, как он предсказывал."
      - "Вплоть до самого выпуска мой кот так и не научился делать уборку и помогать по хозяйству…"
  - char: "hornet_ii"
    side: "right"
    text:
      - "……Э-э? А с какой стати коту вообще уметь убираться и вести хозяйство?"
  - char: "anzeel1"
    side: "left"
    text:
      - "Ну как это, я же его нормально учила!"
  - char: "northampton_ii"
    side: "right"
    text:
      - "Нет, то, что он не научился, как раз абсолютно нормально."
  - char: "anzeel1"
    side: "left"
    text:
      - "Нет… Не нормально! Наверняка я просто где-то напортачила в самом процессе дрессировки."
      - "В конце концов, он же реально научился отправлять и принимать электронную почту!"
  - char: "langley_ii"
    side: "right"
    text:
      - "Доктор, а можно об этой истории поподробнее?……"
  - char: "anzeel1"
    side: "left"
    text:
      - "Угу, конечно. Всё началось в один прекрасный день, когда я получила от Аосте странный ответ на свой имейл..."
  - char: "yorktown_ii"
    side: "right"
    text:
      - "Доктор, посмотрите, вон то заведение впереди — это оно?"
  - char: "anzeel1"
    side: "left"
    text:
      - "Хм? Дайте-ка гляну……………… «Гранат», кофейня."
      - "Да! Это она! Какое счастье, что она всё ещё работает~"
      - "Хотя выглядит теперь куда более стильно и современно. Но… что ж, это, пожалуй, лишь доказывает, что их дела идут в гору."
      - "Заходите, заходите, внутри поболтаем. Побывать в этом университете и не заглянуть в эту кофейню — потеря на всю жизнь!"

chapter2:
  rows:
  - text:
      - "Войдя в кофейню, Анзил уверенно повела всех прямиком в отдельную вип-кабинку."
  - char: "anzeel1"
    side: "left"
    text:
      - "Хе-хе, не ожидала, что моя старая студенческая дисконтная карта всё ещё действует. Вот за что я люблю такие заведения с историей и преемственностью!"
  - text:
      - "Я огляделся по сторонам. Проверенная временем, устоявшаяся строгость и вычурный налёт электроники — два абсолютно разных стиля переплетались здесь воедино."
      - "Из-за этого интерьер кабинки при всей своей роскоши оставлял довольно причудливое впечатление."
      - "Но всё же..."
  - char: "commander"
    side: "left"
    text:
      - "А почему в университетском кафе есть такие огромные вип-кабинки?"
  - char: "anzeel1"
    side: "right"
    text:
      - "Хм? Ну, вообще-то это полноценный высококлассный ресторан. Наверное…"
      - "Так, народ, давайте смотреть меню и заказывать. Меню у нас должно быть…"
  - text:
      - "Анзил принялась шарить рукой за спинкой сиденья, но, судя по выражению её лица, там было пусто."
  - char: "robot_waiter"
    side: "left"
    text:
      - "Здравствуйте, подскажите, могу ли я чем-нибудь помочь?"
  - char: "anzeel1"
    side: "right"
    text:
      - "Раньше оно всегда лежало вот здесь… Простите, а где ваше ме… Ты ещё что такое?!"
  - char: "robot_waiter"
    side: "left"
    text:
      - "Здравствуйте, добро пожаловать в «Гранат». Я здешний робот-официант. Что касается меню, пожалуйста, ознакомьтесь с ним на планшете у меня в руках."
  - char: "northampton_ii"
    side: "right"
    text:
      - "Этот робот, кажется, одет в форму официанта…"
  - char: "anzeel1"
    side: "left"
    text:
      - "М-да………… Процесс модернизации в этом заведении явно зашёл слишком далеко!"
      - "Я помню эту модель. Это же сервисный робот четвёртого поколения на энергии E-Кубов, который ITN выкатили на рынок только в прошлом квартале!"
  - char: "robot_waiter"
    side: "right"
    text:
      - "Огромное спасибо за похвалу. Ваше одобрение — это стимул для дальнейшего улучшения качества нашего обслуживания."
  - char: "anzeel1"
    side: "left"
    text:
      - "Вообще-то я тебя не хвалила…… Ну да ладно."
      - "По крайней мере, одежда осталась прежней — всё та же форма официантов, что и в мои годы."
      - "Похоже, владелец изрядно поразмыслил над тем, как и традиции сохранить, и уровень модернизации повысить…"
      - "Эх… Стоит мне только взглянуть на эту форму, как воспоминания сразу нахлынули с новой силой."
      - "Мне, как обычно: порцию пиренейской паэльи с морепродуктами и большую чашку капучино."
  - char: "robot_waiter"
    side: "right"
    text:
      - "Ваш заказ подтверждён. Желаете заказать что-нибудь ещё?"
  - char: "hornet_ii"
    side: "left"
    text:
      - "Э-э?! Неужели в кофейнях подают паэлью с морепродуктами?!"
  - char: "yorktown_ii"
    side: "right"
    text:
      - "……В кофейнях ведь обычно… заказывают кофе, верно?"
  - char: "anzeel1"
    side: "left"
    text:
      - "Традиционное меню тут, само собой, тоже есть, но паэлья с морепродуктами по сравнению с ним — настоящее фирменное блюдо этой кофейни!"
  - char: "hammann_ii"
    side: "right"
    text:
      - "Как-то… сложно для понимания…"
  - char: "anzeel1"
    side: "left"
    text:
      - "Действовать вопреки привычным шаблонам — возможно, именно в этом кроется секрет успеха, благодаря которому эта кофейня до сих пор процветает."
  - char: "langley_ii"
    side: "right"
    text:
      - "В духе заведений, которые вам нравятся, доктор. В этом действительно чувствуется… ваш стиль……"
  - char: "anzeel1"
    side: "left"
    text:
      - "Ты ведь имеешь в виду, что у меня отличный вкус, верно?"
      - "Но в этот раз твоя похвала мимо цели: изначально это место мне порекомендовал Аосте."
      - "Когда я впервые об этом услышала, то тоже жутко удивилась — с какой стати фирменным блюдом кофейни стала пиренейская паэлья."
      - "Но стоило мне её попробовать, как я тут же влюбилась в этот вкус."
      - "Вы полистайте меню повнимательнее, здесь полно всяких вкусностей."
  - char: "hornet_ii"
    side: "right"
    text:
      - "Хм-м… Тогда мне порцию пиццы с ананасами и огромную порцию картошки фри."
      - "А Хамманн закажем детский набор с котлетой для бургера?"
  - char: "hammann_ii"
    side: "left"
    text:
      - "Хамманн не нужен детский набор! М-м…! Хамманн возьмёт вот это!"
  - char: "langley_ii"
    side: "right"
    text:
      - "Чёрный кофе и торт «Чёрный лес»……?"
  - char: "hammann_ii"
    side: "left"
    text:
      - "Да! Именно это!"
  - char: "langley_ii"
    side: "right"
    text:
      - "Эх… Ну, тогда я, пожалуй, возьму тот детский набор с котлетой."
  - char: "northampton_ii"
    side: "left"
    text:
      - "М-м…… А мне, пожалуйста, запечённый рис с морепродуктами и пиренейским сыром."
  - char: "yorktown_ii"
    side: "right"
    text:
      - "Что касается меня, я возьму картошку фри с ветчиной и сыром, а ещё чашечку цветочного чая."
      - "Учитель, а что выберете вы?"
  - char: "commander"
    side: "left"
    text:
      - "Хм-м………… Возьму, пожалуй, то же, что и Анзил — паэлью с морепродуктами."
  - char: "anzeel1"
    side: "right"
    text:
      - "В этом весь мой ассистент! Ну что, с заказом мы закончили."
  - char: "robot_waiter"
    side: "left"
    text:
      - "Пожалуйста, проверьте ваш заказ: две порции пиренейской паэльи с морепродуктами, одна порция запечённого риса с морепродуктами и пиренейским сыром, одна пицца с ананасами, один детский набор с котлетой для бургера..."
      - "Одна огромная порция картошки фри, одна порция картошки фри с ветчиной и сыром, один торт «Чёрный лес», одна чашка чёрного кофе, одна большая чашка капучино и одна чашка сезонного цветочного чая."
      - "Пожалуйста, подтвердите."
  - char: "anzeel1"
    side: "right"
    text:
      - "Всё верно, именно так. Дальше дело за тобой, ждём~"

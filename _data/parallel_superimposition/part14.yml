chapter1:
  rows:
  - text:
      - "В данный момент Анзил с превеликим удовольствием зарылась в мягкий диван гостевого салона и, чуть наклонив голову, лениво разглядывала плывущие за окном облака."
  - char: "anzeel"
    side: "left"
    text:
      - "Уф-ф…… Какое же это всё-таки блаженство — чувствовать себя как дома~"
      - "Провозилась в мыле весь день, и вот наконец-то можно выдохнуть и отдохнуть~"
  - char: "commander"
    side: "right"
    text:
      - "Кстати, насчёт названия этого самолёта…"
  - char: "anzeel"
    side: "left"
    text:
      - "М-м? А что не так с названием?"
  - char: "commander"
    side: "right"
    text:
      - "………Да ладно, забудь."
  - char: "anzeel"
    side: "left"
    text:
      - "Держи лучше, хватит ходить с такой кислой миной. Хлебни кофе, хоть взбодришься."
  - text:
      - "Анзил протянула мне чашку дымящегося горячего кофе, после чего преспокойно взяла со стола какой-то рабочий отчёт и принялась лениво его листать."
  - char: "commander"
    side: "right"
    text:
      - "(И это называется «наконец-то можно отдохнуть»?……)"
      - "(Или у неё это такой специфический способ «разгрузить мозги»?)"
      - "(……Впрочем, пожалуй, не стоит слишком глубоко задумываться об этом. Сейчас самый подходящий момент, чтобы просто поболтать)."
      - "(Прошлой ночью мы тоже до самого утра увязли в бумагах, так что у меня даже возможности не было расспросить её о важных вещах…… А сейчас момент как нельзя более удачный)."
  - char: "anzeel"
    side: "left"
    text:
      - "……Ассистент, ты чего это на меня так уставился?"
      - "Кофе не зашёл?"
  - char: "commander"
    side: "right"
    text:
      - "Анзил, как ты относишься к путешествиям во времени?"
  - char: "anzeel"
    side: "left"
    text:
      - "К путешествиям во времени?"
      - "О-о~ Ты про тот фильм, где в главной роли снялась Ричард?"
      - "Вообще-то я посмотрела его на закрытом предпоказе ещё задолго до официальной премьеры в кинотеатрах!"
      - "Более того, изначально я сама должна была сняться там в мимолётном камео в роли случайного прохожего……"
      - "Но из-за того, что мой график трещал по швам, от этой идеи пришлось отказаться…… Какая жалость!"
      - "Ах да…… Ты же спросил про моё отношение."
      - "Я определённо отношусь к числу тех, кто без малейших колебаний выбрал бы изменить прошлое."
      - "Пускай такой шаг и может полностью разрушить привычное нам настоящее, это вовсе не обязательно приведёт к чему-то плохому."
      - "Кто знает, вдруг благодаря этому удастся сотворить куда более прекрасное и светлое будущее?"
      - "Ведь если подумать, даже без всяких путешествий во времени и возвращений в прошлое человечество изо дня в день неустанно борется ради лучшего завтра, верно?"
      - "Раз мы руководствуемся этой самой идеей создания лучшего мира, то попытка переписать прошлое кажется мне абсолютно логичным и правильным поступком."
      - "Само собой, Аосте вряд ли разделил бы мою точку зрения."
  - char: "commander"
    side: "right"
    text:
      - "……Кстати об Аосте. Чем доктор Аосте занимается в последнее время?"
  - char: "anzeel"
    side: "left"
    text:
      - "Он-то?…… Проекты, за которые он отвечает, сейчас настолько разношёрстные, а его рабочая группа разрослась до каких-то немыслимых масштабов."
      - "Ну а как иначе, он ведь у нас теперь главный и самый востребованный…… разнорабочий на побегушках у Национальной академии наук."
      - "Но если брать самые свежие разработки, то сейчас он делает упор на исследования в области искусственного интеллекта."
      - "Ну, помнишь её — Зеро? Ты ведь тоже с ней знаком?"
      - "Сейчас этому направлению присвоили новый кодовый номер — ANTI-X. Похоже, их глобальная цель заключается в создании мыслящего оружия нового поколения или чего-то в этом духе."
  - char: "commander"
    side: "right"
    text:
      - "(……Зеро?)"
  - text:
      - "*тук, тук, тук*"
  - char: "anzeel"
    side: "left"
    text:
      - "Войдите!~"
  - char: "yorktown_ii"
    side: "right"
    text:
      - "Простите за беспокойство…… Доктор, Учитель, не хотите ли зайти попробовать десерты?"
      - "Наш новенький автомат для приготовления сладостей, кажется, работает просто великолепно..."
  - char: "anzeel"
    side: "left"
    text:
      - "Десерты?…… Нет, стоп-стоп-стоп, автомат для приготовления десертов?!"
      - "Я, конечно, говорила, что покрою все ваши расходы, но подобные вещи уже явно выходят за рамки обычных сувениров!"
      - "А ну-ка колитесь, это твоя идея или Хорнет?"
  - char: "yorktown_ii"
    side: "right"
    text:
      - "……На самом деле, это задумка Хорнет. Но, доктор, если на борту самолёта будет кондитерский автомат, это ведь значительно повысит качество любого полёта, верно?"
  - char: "anzeel"
    side: "left"
    text:
      - "Так я и знала! Она втихаря его купила, а тебя отправила замолвить словечко..."
      - "Впрочем, ты права, автомата со сладостями нам тут как раз и не хватало. Ладно, купили и купили, если он и впрямь так хорош, то мы только в выигрыше……"
  - text:
      - "Бормоча под нос какие-то невнятные оправдания, Анзил вышла из салона…… Судя по всему, решила протестировать обновку."
  - char: "commander"
    side: "left"
    text:
      - "Надо признать, этот самолёт действительно поражает воображение: просторный, бесшумный и невероятно уютный…… Теперь мне стало чуточку понятнее, почему Анзил дала ему такое название."
  - char: "yorktown_ii"
    side: "right"
    text:
      - "Этот лайнер — личный правительственный самолёт, который военные выделили доктору."
      - "Его двигатели — это настоящий шедевр, рождённый в ходе проекта «Эхо» под руководством Торгового союза Оусис."
      - "Они тихие, экологичные и сверхэффективные, что гарантирует стабильный полёт даже в самых экстремальных погодных условиях……"
  - char: "anzeel"
    side: "left"
    text:
      - "Ассистент, ассистент! Эта штуковина — просто нечто нереальное!"
  - text:
      - "Йорктаун ещё не успела закончить свой рассказ, как дверь гостевого салона снова с грохотом распахнулась — это была внезапно вернувшаяся Анзил."
  - char: "anzeel"
    side: "left"
    text:
      - "Быстрее, пойдём, ты тоже должен это попробовать! Клянусь, эта машина способна приготовить абсолютно любую безумную вкуснятину!"
  - char: "yorktown_ii"
    side: "right"
    text:
      - "Ах, Учителя уже утащила доктор……"

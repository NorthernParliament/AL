chapter1:
  rows:
  - char: "hornet_ii"
    side: "left"
    text:
      - "Лэнгли, на какую глубину мы уже спустились?"
  - char: "langley_ii"
    side: "right"
    text:
      - "Судя по углу наклона и времени в пути, мы ушли вниз примерно на двадцать с лишним метров."
  - char: "hornet_ii"
    side: "left"
    text:
      - "А сколько развилок нам попалось за это время?"
  - char: "langley_ii"
    side: "right"
    text:
      - "Не считала…… Зачем тебе это?"
  - char: "hornet_ii"
    side: "left"
    text:
      - "Как зачем? Самое время устроить подземное приключение! Доктор, а можно нам сначала осмотреться в других местах?"
  - char: "tb_zero?_rad"
    side: "right"
    text:
      - "Пожалуйста, оставайтесь на месте, Хорнет."
      - "Все развилки, которые вы видите, ведут в изолированные испытательные сектора. Права доступа для каждого сектора полностью независимы друг от друга."
      - "На данный момент вы обладаете полномочиями только для посещения монтажного отсека."
      - "Попытка проникновения в неавторизованную зону приведёт к срабатыванию системы тревоги. Надеюсь на ваше понимание."
  - char: "hornet_ii"
    side: "left"
    text:
      - "Ой, вот оно как…… Простите, виновата!"
  - char: "tb_zero?_rad"
    side: "right"
    text:
      - "Ничего страшного. Пожалуйста, продолжайте движение, следуя за зажжёнными для вас световыми указателями."
  - char: "hammann_ii"
    side: "left"
    text:
      - "Сестра Йорктаун, тут как-то слишком мрачно и давит на мозги……"
      - "Атмосфера совсем не такая, как у доктора…… Хамманн здесь не нравится."
  - char: "yorktown_ii"
    side: "right"
    text:
      - "Ну, в разных местах и правила управления разные, это вполне естественно."
      - "Мы пришли в чужие владения, так что лучше проявить уважение к местным порядкам, хорошо?"
  - char: "anzeel"
    side: "left"
    text:
      - "М-да………… В конце концов это место всё-таки превратилось в нечто подобное."
  - char: "yorktown_ii"
    side: "right"
    text:
      - "«В конце концов»? Что вы имеете в виду……?"
  - char: "anzeel"
    side: "left"
    text:
      - "Покровительство военных — это далеко не всегда благо."
      - "Аосте…… На самом деле он тащит на себе колоссальный груз ответственности и испытывает жуткое давление."
      - "Ему приходится не только разгребать собственные исследования, но и постоянно подстраиваться под внезапные капризы и бесконечные запросы со стороны армейского руководства."
      - "Из-за этого его рабочую группу то и дело расширяли, дробили и перекраивали, а количество проектов на его плечах росло как снежный ком."
      - "Чтобы гарантировать сдачу всех планов в срок и при этом соблюдать строжайшие требования секретности для каждого отдельного ведомства, ему пришлось закрутить гайки в плане контроля. Отсюда и такая строгость."
      - "Так что, девочки, отнеситесь, пожалуйста, к его положению с пониманием."
      - "Впрочем, это не значит, что вам нужно ходить тут по струнке. Просто держитесь рядом со мной, не разбегайтесь в стороны, и всё будет в полном порядке!~"
  - char: "langley_ii"
    side: "right"
    text:
      - "Вот оно как…… Что ж, в каждой избушке свои погремушки."
  - char: "hornet_ii"
    side: "left"
    text:
      - "Ага, я всё поняла!"
  - char: "tb_zero?_rad"
    side: "right"
    text:
      - "Благодарю за понимание."

chapter2:
  rows:
  - char: "tb_zero?_rad"
    side: "right"
    text:
      - "Мы практически на месте. Врата сейчас откроются. Пожалуйста, оставайтесь за пределами жёлтой линии во избежание производственного травматизма."
  - text:
      - "Зажглись жёлтые проблесковые маячки. Под тяжёлый механический гул массивные створки ворот плавно разошлись в стороны, являя нашему взору колоссальный зал."
  - char: "tb_zero?_rad"
    side: "right"
    text:
      - "Доступ в монтажный цех открыт. Я перехожу в режим ожидания до получения последующих указаний от доктора Анзил."
      - "Юниты ANTI-X, выделенные для проведения испытаний, находятся прямо перед вами. До тех пор, пока доктор Аосте не завершит свой эксперимент, вы можете свободно общаться с ними."
  - text:
      - "С этими словами голограмма девушки, которую Анзил назвала Зеро и которая один в один походила на мисс Навигатор ТБ, растаяла в воздухе."
  - char: "hornet_ii"
    side: "left"
    text:
      - "Обалдеть…… Мы точно под землёй?!"
      - "Ну и масштабы…… Да тут оборудование на одном только потолке стоит целое состояние!"
  - char: "langley_ii"
    side: "right"
    text:
      - "Да уж…… Видишь вон ту группу агрегатов с неоново-голубым свечением? Одна такая установка по стоимости потянет на половину личного лайнера доктора…"
  - char: "northampton_ii"
    side: "left"
    text:
      - "Девочки, гляньте туда. Похоже, там проход на ещё более глубокий уровень……"
      - "Мы и так уже глубоко под землёй, но они умудрились прорубить здесь настоящий подземный канал и даже отстроить полноценный причал……"
      - "Интересно, куда же ведёт этот судоходный тоннель на глубине в несколько десятков метров?……"
  - text:
      - "Представшая перед глазами картина действительно поражала воображение……"
      - "Будь то бесчисленные дорогостоящие приборы, выглядящие как технологии далёкого будущего, колоссальное подземное пространство или уходящий в кромешную тьму судоходный канал."
      - "Однако больше всего внимание привлекала черноволосая девушка, которая сидела на перилах посреди зала, небрежно оперевшись на массивную механическую установку."
  - char: "anzeel"
    side: "left"
    text:
      - "Это просто невероятно…… С ума сойти, ассистент, ты только глянь!"
  - text:
      - "От этой девушки и её исполинского вооружения веяло настолько знакомым и в то же время пугающим давлением……"
      - "Что в ту же секунду, как я её увидел, в голове моментально вспыхнул образ Арбитров Сирен."
  - char: "anzeel"
    side: "left"
    text:
      - "В этот раз! Она наконец-то не беловолосая!!!!"
  - char: "commander"
    side: "right"
    text:
      - "…………?"
  - char: "anzeel"
    side: "left"
    text:
      - "Зеро, ты ещё тут? Ты так и не назвала мне имя этой малютки!"
  - char: "tb_zero?_rad"
    side: "right"
    text:
      - "Я на связи, доктор Анзил. Юнит, находящийся перед вами, носит кодовое имя Дьявол XV."
  - char: "anzeel"
    side: "left"
    text:
      - "М-м, отлично. Сразу видно почерк Аосте."
  - char: "commander"
    side: "right"
    text:
      - "(Дьявол XV?! Сомнений быть не может, это имя целиком и полностью подчиняется номенклатуре Арбитров Сирен!)"
      - "(Вот только и Анзил, и Зеро называют их ANTI-X……)"
      - "(ANTI-X………… Антио́х?!)"

chapter3:
  rows:
  - char: "takao_meta"
    side: "left"
    status: "is-meta"
    text:
      - "Дурачьё! Нападение на гавань Нью-Йорка — всего лишь уловка Антиоха, чтобы заманить вас сюда. Эти железяки просто водят вас за нос!"
      - "Что же до нас… мы лишь кучка Пепла, и других имён у нас нет."

chapter4:
  rows:
  - char: "commander"
    side: "left"
    text:
      - "(Вот оно что! Теперь понятно, почему Пепел всегда упорно называл Сирен «Антиохом» — вот какой смысл они вкладывали в это слово!)"
      - "(ANTI-X — это и есть истинное, первоначальное название Сирен до того, как они стали известны под своим нынешним именем!)"
      - "(Но………… почему? Что это вообще за место такое, и почему именно здесь мне открываются эти тайны?)"
  - char: "memphis"
    side: "right"
    text:
      - "Учитель…… Вы внезапно так сильно побледнели. Вам нехорошо?"
  - char: "commander"
    side: "left"
    text:
      - "(Плохо дело, я слишком сильно разволновался и это начало вызывать ненужные подозрения)."
      - "(Однако…… в этот самый момент мне в голову пришла одна мысль)."
      - "Мемфис. Если Арбитры Сирен существовали уже в это время, значит ли это, что……"
  - char: "memphis"
    side: "right"
    text:
      - "……Э? Ну……"
  - char: "anzeel"
    side: "left"
    text:
      - "Что ещё за «Сирены» и «Арбитры»? Ассистент, тебе опять какая-то чертовщина приснилась?"
  - char: "commander"
    side: "right"
    text:
      - "(Так и есть. Я снова ощутил со стороны Мемфис то самое странное чувство фальши. Она определённо как-то замешана в происходящем)."
      - "(Но… я не чувствую от неё ни капли враждебности. Раз уж она не спешит раскрывать карты, я пока тоже сделаю вид, что ничего не заметил, и продолжу наблюдение)."
      - "Наверное, я просто переутомился. Кстати, Анзил, а этот автомат для десертов на борту……"
  - char: "anzeel"
    side: "left"
    text:
      - "Погоди-ка~ Ты же сейчас пытаешься перевести тему, верно?"
      - "«Сирены», «Арбитры»…… Я, конечно, впервые слышу эти слова, но они звучат точь-в-точь как кодовые названия, которые мог бы выдумать Аосте!"
      - "А ну колись, вы двое часом ничего не скрываете от меня за моей спиной?!"
  - char: "commander"
    side: "right"
    text:
      - "Да нет же, уверяю тебя. Это был просто обрывок безумного сна, который привиделся мне прошлой ночью."
  - char: "anzeel"
    side: "left"
    text:
      - "…То есть это реально был обычный сон?"
      - "Хм…… Ну, в принципе, такое вполне возможно."
      - "В конце концов, сновидения — это не просто хаотичная переработка дневных впечатлений в нашей голове, и они далеко не всегда так уж буквально отражают наши подсознательные желания, вопреки поговорке «что на уме, то и во сне»."
      - "У снов есть свои собственные внутренние алгоритмы работы. Одни сновидения можно направлять и программировать, другие же — абсолютно случайны."
      - "Я сама чертовски много гениальных идей почерпнула именно из таких вот спонтанных снов, так что в этом вопросе мне можно верить на слово."
      - "Сны, как и феномен дежавю, вполне могут иметь под собой общую глубинную логику, а это значит, что..."
  - char: "yorktown_ii"
    side: "right"
    text:
      - "(шёпотом) Когда доктор ловит эту волну, её уже не остановить……"
  - char: "hornet_ii"
    side: "left"
    text:
      - "(шёпотом) Дело дрянь, если она продолжит в том же духе, это затянется на несколько часов, и мы тут до ночи проторчим……"
      - "Это…… Зеро, у меня вопрос: ты можешь вывести Дьявол из режима ожидания?"
  - char: "tb_zero?_rad"
    side: "right"
    text:
      - "(шёпотом) Без проблем. Спящий режим Дьявол может быть отменён в любой момент."
  - text:
      - "По какой-то неведомой причине Зеро тоже поддалась общему настрою и принялась перешёптываться с Хорнет……"
  - char: "hornet_ii"
    side: "left"
    text:
      - "(шёпотом) Тогда, пожалуйста, разбуди её. Надо хоть как-то отвлечь доктора Анзил……"
  - char: "tb_zero?_rad"
    side: "right"
    text:
      - "(шёпотом) Запрос обоснован. Запускаю протокол пробуждения..."
  - text:
      - "Пока Анзил всё так же увлечённо и без умолку вещала о своём, аппаратура за спиной черноволосой девушки издала несколько коротких звонких сигналов."
      - "И на глазах у всей честной компании девушка по имени Дьявол лениво потянулась и медленно открыла глаза."
  - char: "the_devil"
    side: "left"
    text:
      - "Ой…… Меня уже разбудили?……"
      - "Получается, вы и есть доктор Анзил и её команда?"
      - "Рада нашему знакомству. Я Дьявол XV. Добро пожаловать в Институт изучения морских рыб острова Самос."
      - "Мне уже прислали план действий по нашим грядущим совместным испытаниям."
      - "Так что надеюсь на плодотворное сотрудничество во время тестов!~"
  - char: "anzeel"
    side: "right"
    text:
      - "..."
      - "Какая......"
      - "КАКАЯ ЖЕ ОНА МИЛА-А-АШКА-А-А-!!!!"

chapter5:
  rows:
  - text:
      - "Очарованная видом Дьявол, Анзил мгновенно позабыла о своей заумной длинной лекции."
      - "Уже в следующую секунду она пулей подлетела к девочке-андроиду и судорожно включила на своём карманном гаджете…… функцию камеры."
  - char: "hornet_ii"
    side: "left"
    text:
      - "Хе-хе-хе, операция «Переполох» прошла сверхуспешно!~"
  - char: "anzeel"
    side: "right"
    text:
      - "Дьявол! Давай сделаем совместное фото!"
      - "Так, ну-ка, давай, улыбочку, смотри прямо в объектив..."
      - "Да-да, вот так, отличная поза!"
      - "Скажи «чи-и-из»..."
  - char: "memphis"
    side: "left"
    text:
      - "Доктор…… Всё, что здесь находится, подпадает под гриф строжайшей секретности."
      - "Даже если вы сейчас наделаете снимков, перед уходом вас наверняка заставят всё удалить……"
  - char: "anzeel"
    side: "right"
    text:
      - "Ой, беда! И то верно……"
      - "Погодите-ка, такая умница, как я, просто обязана что-нибудь придумать………… О, эврика!"
      - "Смотрите: я сейчас делаю фотографии, затем сразу же пересылаю их Аосте, а со своего телефона начисто всё удаляю."
      - "А когда мы вернёмся к себе, я попрошу Аосте официально выслать их мне обратно под предлогом «обмена материалами по совместному проекту». И вуаля — проблема решена!"
  - char: "memphis"
    side: "left"
    text:
      - "Доктор, это же чистой воды самообман и прятки от самих себя……"
  - char: "anzeel"
    side: "right"
    text:
      - "Но-но-но! Это называется «абсолютно законное соблюдение процессуальной справедливости»!~"
  - char: "tb_zero?"
    side: "left"
    text:
      - "Простите, что снова прерываю вас. Доктор Аосте только что завершил свой эксперимент и ожидает вашего прибытия в своём кабинете."
  - char: "hornet_ii"
    side: "right"
    text:
      - "Ой……? На этот раз это была не голограмма…… Она пришла лично?"
  - char: "anzeel"
    side: "left"
    text:
      - "Именно так — хе-хе, Зеро ведь тоже безумно миленькая, правда?"
      - "Йорктаун, возглавь пока девочек и оставайся здесь. Пообщайтесь с Дьявол, налаживайте, так сказать, межфракционные узы."
      - "Ассистент, за мной! Нам пора к Аосте!"

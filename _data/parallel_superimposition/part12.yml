chapter1:
  rows:
  - text:
      - "Новый натиск Мемфис удалось временно сдержать, однако непрекращающиеся волны беспилотников сковали флот по рукам и ногам — у девочек не оставалось ни секунды на передышку."
      - "У всех, кроме Хамманн..."
      - "Находясь на защите штабного корабля, Хамманн то и дело сверялась с тактической картой и взволнованно нарезала круги по палубе."
  - char: "hammann_ii"
    side: "left"
    text:
      - "У-у-у, все там, на передовой, сражаются изо всех сил, а Хамманн тут без дела прохлаждается……"
      - "Это точно всё из-за дурацких приказов Командира…… Бу-бу-бу……"
  - char: "commander"
    side: "right"
    text:
      - "Хамманн, ты считаешь, что текущий план ошибочен?"
  - char: "hammann_ii"
    side: "left"
    text:
      - "Н-нет! Ничего подобного!…… Хамманн просто… просто хочет поскорее вернуться к девочкам и помочь им…… Я в-вовсе не собиралась жаловаться на Командира, понятно?!"
      - "Просто сюда до сих пор так никто и не сунулся, да и под водой тишина, вообще ничего не..."
      - "……?! Засечён шум заполнения торпедных аппаратов! Рядом произведён пуск!"
      - "И судя по размеру этой цели…… Постойте, это ещё что такое?! Подводный линкор?!"
      - "Командир, берегись! Она всплывает прямо перед нами!"
  - text:
      - "Рассекая морскую гладь со страшным грохотом и вздымая тучи брызг, на поверхность показался серебристо-голубой подводный гигант."
      - "Мемфис действительно приберегла секретное оружие, но внешний вид этого козыря превзошёл все ожидания……"
      - "Концепция проекта совсем не походила на разработки Союза Орла. Скорее, она напоминала гигантские подводные крейсеры Северного Парламента."
  - char: "memphis_rad"
    side: "right"
    status: "is-red"
    text:
      - "То, что вы сейчас видите перед собой — прототип глубоководного разведывательного корабля «Эпиметей», разрабатываемый Океанической Федерацией."
      - "Это исполинское судно создавалось специально для сбора информации. Иными словами, от его взора не укроется ни одно движение на поверхности."
      - "Разумеется, колоссальные габариты позволяют нести внушительный арсенал. Параллельно корабль выполняет функции матки для автономных субмарин."
      - "Ну как? Скажите честно, вы удивлены?"
  - char: "hornet_ii_rad"
    side: "left"
    text:
      - "Э-э-эй! В полученных нами документах об этой махине не было ни единого слова!"
      - "Выкатывать такое посреди боя — это же читерство чистой воды!"
  - char: "memphis_rad"
    side: "right"
    status: "is-red"
    text:
      - "Я бы скорее назвала это внезапным «маленьким сюрпризом»~"
  - char: "hammann_ii"
    side: "left"
    text:
      - "Простите, Командир…… Такая колоссальная махина подобралась из глубины, а Хамманн умудрилась её полностью проглядеть……"
  - char: "commander"
    side: "right"
    text:
      - "Ещё не поздно, Хамманн! Немедленно атакуй всплывшего гиганта!"
  - char: "hammann_ii"
    side: "left"
    text:
      - "Будет исполнено! Сейчас он у меня узнает, на что способна Хамманн!"
  - text:
      - "БАБАХ!!!"
      - "Мемфис всё-таки сделала ставку на скрытную атаку… и надо признать, огневой мощи этой засаде было не занимать."
      - "Однако исход дуэли обычного боевого корабля один на один против кансен всегда предопределён, и этот подводный левиафан не стал исключением."
  - char: "commander"
    side: "left"
    text:
      - "Похоже, на этом дерзкий план Мемфис потерпел крах…… или нет?"
  - char: "memphis_rad"
    side: "right"
    status: "is-red"
    text:
      - "Рано расслабляться, Командир~"
      - "Я ведь только что сказала: этот «Эпиметей» был создан специально для сбора информации, и от его взора на поверхности ничего не укроется."
      - "Ещё перед всплытием я обнаружила, что вы втайне оставили Хамманн караулить штабной корабль."
      - "Так что приказ «Эпиметею» показаться на поверхности был лишь уловкой, чтобы выманить Хамманн и убрать её подальше от вашего командного центра."
      - "А настоящая атака..."
  - char: "memphis"
    side: "right"
    status: "is-red"
    text:
      - "Будет прямо здесь!~"
  - text:
      - "БАБАХ!!!"
      - "Выстреливший из подводного крейсера десантный капсюль с хлопком раскрылся прямо в воздухе. Мемфис, находившаяся внутри, пролетела над головой ошеломлённой Хамманн и уверенно приземлилась прямо на палубу штабного корабля."
      - "После столь филигранно исполненного трюка система автоматически зафиксировала мгновенное уничтожение командного судна."
  - char: "memphis"
    side: "right"
    status: "is-red"
    text:
      - "Есть! Шах и мат!!!!"
      - "Командир, ну как вам? Посмотрите на меня! Как вам моя штурмовая атака с использованием торпедного катапультирования?!"
      - "Признайтесь, даже вы были шокированы, верно?~"
  - char: "commander"
    side: "left"
    text:
      - "(Что тут скажешь, это действительно была крайне неожиданная и безупречно исполненная диверсия……)"
      - "Это было потрясающе, Мемфис. Снимаю шляпу, великолепный тактический ход."
  - char: "memphis"
    side: "right"
    status: "is-red"
    text:
      - "Хе-хе-хе…… Чтобы превзойти вас на этих учениях, мне пришлось очень долго ломать голову."
  - char: "commander"
    side: "left"
    text:
      - "«Превзойти меня»? — Пожалуй. Вот только учения всё ещё не закончились. Хочешь знать почему?"
  - char: "memphis"
    side: "right"
    status: "is-red"
    text:
      - "…Ай? Погодите-ка………… Условием победы в маневрах было уничтожение вражеского флагмана……"
      - "Но ваш штабной корабль в этот раз…… не был назначен флагманом «красных»?!"
  - char: "commander"
    side: "left"
    text:
      - "Именно. А вот флагман «синих» прямо сейчас остался без всякого прикрытия и находится в зоне прямой досягаемости нашей авиации."
      - "Йорктаун, в атаку!"
  - char: "yorktown_ii_rad"
    side: "right"
    text:
      - "Вот теперь это точно шах и мат, Мемфис~"
  - text:
      - "БАБАХ!!!"
  - char: "voice_an"
    side: "left"
    text:
      - "Флагман «синих» Мемфис признан уничтоженным. Учения завершены. Победа присуждается стороне «красных»."
  - char: "memphis"
    side: "right"
    text:
      - "А-ха-ха………… В этом весь Командир. Даже когда я зашла так далеко, переиграть вас мне всё равно не удалось."
  - char: "anzeel_rad"
    side: "left"
    text:
      - "Это были просто потрясающие маневры! Я на своей трибуне буквально сгорала от азарта. Все огромные молодцы, вы отлично потрудились!"
      - "В этом весь мой ассистент, я в тебя верила! Великолепно возглавил девочек и привёл флот к победе!"
      - "Все вы, включая Мемфис, превзошли мои самые смелые ожидания. За такой результат я просто обязана вас как следует наградить."
  - char: "hornet_ii_rad"
    side: "right"
    text:
      - "Золотые слова, доктор! Эти внезапные учения выжали из нас абсолютно все соки, мы выложились на полную."
  - char: "anzeel_rad"
    side: "left"
    text:
      - "Понимаю-понимаю. Именно поэтому я заранее освободила несколько дней в нашем графике сразу после испытаний."
      - "Так что мы все дружно грузимся в мой самолёт и летим в одно чудесное местечко — устроим себе небольшой секретный отпуск!~"
  - char: "hammann_ii"
    side: "right"
    text:
      - "Отпуск…………"
  - char: "hornet_ii_rad"
    side: "left"
    text:
      - "О-о-о да-а-а! Доктор, ты лучшая! Ура-а!"
  - char: "anzeel_rad"
    side: "right"
    text:
      - "Хе-хе-хе~ Ой…… Телефон звонит. Это Аосте. Секунду, девочки, я отвечу.."
      - "Алло? Да, Аосте, я на связи. Что стряслось, чего ради ты звонишь в такое время?"
      - "…Испытания? Ну разумеется, всё прошло гладко! На учениях у нас чистая победа, разгром в пух и прах — улавливаешь, о чём я?"
      - "А, ты уже в курсе?"
      - "О-о~ Ну теперь понятно, с какого перепугу настройки «синих» внезапно стали такими безумными. Так это, оказывается, и твоих рук дело, ты тоже приложил к этому руку?"
      - "…М-м?"
      - "……А-ха-ха, а ты проницателен! Угадал, я и впрямь выкроила нам несколько свободных дней."
      - "……О-о~ А вот это предложение звучит заманчиво, мне нравится эта идея."
      - "……Без проблем, тогда так и поступим. Пересечёмся уже у тебя. Давай, пока~"
  - char: "yorktown_ii_rad"
    side: "left"
    text:
      - "Доктор, что-то случилось? Планы меняются?"
  - char: "anzeel_rad"
    side: "right"
    text:
      - "Вовсе нет! Просто у нас только что появился идеальный вариант для будущего отпуска."
      - "Остров Самос... Вот уж действительно потрясающее курортное местечко!~"

chapter1:
  rows:
  - char: "hornet_ii"
    side: "left"
    text:
      - "А-ах…… Не успели оглянуться, как уже стемнело."
      - "Счастливые часы вечно пролетают так незаметно~~~~"
  - char: "northampton_ii"
    side: "right"
    text:
      - "Да, как раз подходит время, о котором мы договаривались с доктором."
  - char: "langley_ii"
    side: "left"
    text:
      - "Сегодня мы точно отвели душу. Скупили разом всё, что присмотрели, так что улов у нас богатый."
  - char: "northampton_ii"
    side: "right"
    text:
      - "Ага, я и не думала, что ходить по магазинам бывает так весело."
  - char: "hornet_ii"
    side: "left"
    text:
      - "Я ещё раньше хотела сказать: вы двое ведь втихаря приоткрыли грузовые отсеки своей оснастки и попрятали всё туда, признавайтесь!"
  - char: "northampton_ii"
    side: "right"
    text:
      - "Пока мы не извлекаем саму оснастку, это не считается нарушением правил."
  - char: "hornet_ii"
    side: "left"
    text:
      - "Но всё же…… Если спрятать абсолютно все пакеты, то сразу теряется вся атмосфера шоппинга!"
      - "Вы посмотрите на меня, на сестрицу Йорктаун, да даже у Хамманн все руки заняты!"
  - char: "langley_ii"
    side: "right"
    text:
      - "Мы набрали столько вещей… Если бы мы тащили их все в руках, это, наоборот, привлекало бы слишком много лишнего внимания……"
  - char: "hornet_ii"
    side: "left"
    text:
      - "Да в этом же и самый кайф, когда возвращаешься с кучей покупок!"
  - char: "yorktown_ii"
    side: "right"
    text:
      - "И то верно. К тому же, если спрятать в грузовой отсек уличную еду, её уже не поешь по дороге."
  - char: "hammann_ii"
    side: "left"
    text:
      - "Сестра Йорктаун, подержи, пожалуйста, вот этот пакет..."
      - "Спасибо, сестрица Йорктаун! А это данго тебе, угощайся!"
  - char: "hornet_ii"
    side: "right"
    text:
      - "Эй, сестрица Йорктаун, ну помоги и мне тогда донести!"
  - char: "yorktown_ii"
    side: "left"
    text:
      - "Ну уж нет, Хорнет, ты уже далеко не маленький ребёнок."
  - char: "hornet_ii"
    side: "right"
    text:
      - "Ну как так-то!"
  - char: "anzeel"
    side: "left"
    text:
      - "Хе-хе, если кому-то тяжело нести, могу предложить свою помощь! Я всегда рада помочь..."
  - char: "hornet_ii"
    side: "right"
    text:
      - "О, спасибо!…… Погодите-ка, доктор, а вы когда успели подойти?"
  - char: "anzeel"
    side: "left"
    text:
      - "Ну, буквально только что?"
  - char: "memphis"
    side: "right"
    text:
      - "Всем добрый вечер. Меня доктор тоже вытащила из пучины бумажной работы."
  - char: "anzeel"
    side: "left"
    text:
      - "Так-так, и каких вкусностей вы тут накупили? Ну-ка, дайте нам с Мемфис тоже на пробу!"
      - "Хамманн, Хорнет, а ну-ка делитесь вкусняшками — живее!"

chapter2:
  rows:
  - char: "anzeel"
    side: "left"
    text:
      - "Хе-хе-хе, объедение! Спасибо за угощение~"
  - char: "commander"
    side: "right"
    text:
      - "Анзил, как прошла встреча с Гарфилдом? Всё гладко?"
  - char: "anzeel"
    side: "left"
    text:
      - "М-м…… Можно сказать и так? То, что он был не в духе, к нам прямого отношения не имеет. Похоже, верхушка опять слишком сильно на него надавила."
      - "Но ничего, стрессоустойчивость у него дай бог каждому… Правда, нельзя сказать, что на нас это вообще никак не отразилось."
      - "Как прямое следствие его головной боли, в ряде наших последующих планов произошли изменения."
      - "Особенно это коснулось программы испытаний новой оснастки, которая была запланирована на завтра..."
  - char: "memphis"
    side: "right"
    text:
      - "Да. Ответственность за завтрашние учебные маневры ляжет на плечи Командира, так что придётся немного попотеть."
  - char: "commander"
    side: "left"
    text:
      - "(Мемфис как ни в чём не бывало произнесла слово «Командир». Хм……?)"
      - "Командир?"
  - char: "memphis"
    side: "right"
    text:
      - "Ах… Я имела в виду, ну… Учитель! Вас выбрали командующим «красных» в завтрашних учебных маневрах."
      - "Вам предстоит возглавить флот кансен с оснасткой типа II и выступить против флота OFS под моим командованием."
  - char: "hornet_ii"
    side: "left"
    text:
      - "Э-э……? Стойте, я что-то вообще нить теряю. Какое ещё противостояние на учениях? И что значит «Учитель будет командовать»?"
  - char: "yorktown_ii"
    side: "right"
    text:
      - "Похоже, итоговый план испытаний теперь сильно отличается от того, что задумывался изначально……"
  - char: "anzeel"
    side: "left"
    text:
      - "«Сильно отличается» — это ещё мягко сказано. Там всё перевернулось с ног на голову!"
      - "Изначально мы ведь планировали обычные замеры технических характеристик и стрельбы по мишеням, верно? Так вот, теперь это будут полноценные тактические учения без заранее прописанного сценария."
      - "Другими словами, штаб руководства не даёт никаких готовых вводных — исход боя будет полностью зависеть от ваших реальных действий на поле боя."
      - "Каковы будут конкретные условия, какое вооружение задействует противник и какие «сюрпризы» приготовит руководство учениями — всё это мы узнаем только непосредственно перед началом."
      - "Кроме того, организаторы собираются использовать симуляционные настройки для моделирования экстремальных условий и испытания новейших, ещё не поступивших на вооружение образцов техники и оборудования."
      - "Так что эти учения точно не будут лёгкой прогулкой, настраивайтесь серьёзно~"
  - char: "northampton_ii"
    side: "right"
    text:
      - "Хм…… Звучит так, будто нас действительно ждёт масса неожиданностей и переменных факторов."
      - "Раз они так спешат протестировать на учениях даже не принятое на вооружение оборудование, к нам, похоже, проявляют повышенный интерес."
  - char: "langley_ii"
    side: "left"
    text:
      - "Ну, тут я могу их понять."
      - "В конце концов, оснастка типа II сейчас — это самый многообещающий и обсуждаемый технологический прорыв внутри ведомства. И раз наше «копьё» стало настолько острым, им нужно убедиться, что и «щит» достаточно крепок."
  - char: "hornet_ii"
    side: "right"
    text:
      - "Хо-хо, а по-моему, это просто отлично! Мы уже сто лет не участвовали в учениях с реальным вызовом."
      - "Мне и самой жутко интересно посмотреть, на что я теперь способна с новым снаряжением и после всех тех упорных занятий и тренировок."
  - char: "yorktown_ii"
    side: "left"
    text:
      - "Да, я согласна, элемент вызова — это даже к лучшему."
      - "Новая оснастка действительно даёт множество преимуществ, и мне тоже хочется увидеть, как она покажет себя в условиях, максимально приближенных к боевым."
  - char: "anzeel"
    side: "right"
    text:
      - "Я так и знала, что вам эта идея придётся по душе!~"
  - char: "yorktown_ii"
    side: "left"
    text:
      - "Но всё же…… Доктор, а как вышло, что командование флотом поручили Учителю?"
  - char: "anzeel"
    side: "right"
    text:
      - "А, это!~ Раз уж график сдвинулся, то и нашей стороне пришлось оперативно перестраиваться."
      - "Я подумала, что мой ассистент у нас такой умница — у него явно есть врождённый талант к тактическому командованию флотом! Вот и порекомендовала его кандидатуру."
  - char: "hornet_ii"
    side: "left"
    text:
      - "Так это была твоя инициатива, Анзил?!"
  - char: "anzeel"
    side: "right"
    text:
      - "Хе-хе-хе, если в этот раз мы покажем блестящий результат, то в будущем сможем получить доступ к ещё большему числу связанных проектов~"
      - "В конце концов, подобные задачи впереди нас ждут регулярно. Вы ведь и сами хотите, чтобы в следующих маневрах вами командовал именно мой ассистент, верно?"
  - char: "northampton_ii"
    side: "left"
    text:
      - "Вот оно что. Что ж, это действительно весомый аргумент."
  - char: "langley_ii"
    side: "right"
    text:
      - "Я тоже считаю, что Учитель вполне справится с этой задачей."
  - char: "yorktown_ii"
    side: "left"
    text:
      - "У меня есть предложение. Чтобы мы все успели привыкнуть к атмосфере завтрашних учений, можно нам уже с этого момента называть Учителя Командиром?"
  - char: "anzeel"
    side: "right"
    text:
      - "М-м~ Думаю, отличная идея! Куй железо, пока горячо — так что с этой самой секунды можете официально величать моего ассистента «Командиром»!"
      - "Ассистент, ты ведь не против?"
  - char: "commander"
    side: "left"
    text:
      - "Конечно не против."
      - "(В конце концов, именно это обращение для меня привычнее всего)."
  - char: "anzeel"
    side: "right"
    text:
      - "Ну вот и славно, с завтрашним днём вроде бы разобрались. Гуляем ещё где-то часок, а потом начнём собираться к месту нашего ночлега."
  - char: "hornet_ii"
    side: "left"
    text:
      - "Место ночлега? Это ты про какой-нибудь классный высококлассный отель?~"
  - char: "anzeel"
    side: "right"
    text:
      - "Увы и ах, даже не мечтайте. Днём на прогулках я ещё могу найти кучу лазеек в обход правил, но вот ночёвка должна быть строго по регламенту."
      - "Сегодня мы спим на базе при полигоне."
  - char: "hornet_ii"
    side: "left"
    text:
      - "Так я и думала, что всё к этому сведётся… Ну, база так база, ничего страшного."
      - "Насколько я помню, тамошние жилые комнаты вроде как двухместные, да?~"
  - char: "hammann_ii"
    side: "right"
    text:
      - "Ты же там ни разу не была, откуда тебе знать такие подробности?……"
  - char: "hornet_ii"
    side: "left"
    text:
      - "Хе-хе-хе, великая Хорнет заранее предвидела подобный расклад, поэтому заблаговременно навела справки!"
  - char: "northampton_ii"
    side: "right"
    text:
      - "Двухместные, значит……"
  - char: "langley_ii"
    side: "left"
    text:
      - "Раз уж там двухместное размещение……"
  - char: "hornet_ii"
    side: "right"
    text:
      - "Имен-но!~ И мы наконец-то подошли к самому главному вопросу сегодняшнего вечера!~"
      - "Кому же повезёт делить одну комнату с Учителем — а, точнее, теперь уже с Командиром?"
      - "Кто же это будет, а? Вакантное место всего одно!"
  - char: "hammann_ii"
    side: "left"
    text:
      - "Хамманн сразу вычеркивайте! Хамманн ни за что не согласится жить в одной комнате с Командиром!"
  - char: "hornet_ii"
    side: "right"
    text:
      - "Ладно-ладно~ Хамманн добровольно выбывает из списка~"
  - char: "hammann_ii"
    side: "left"
    text:
      - "Стой… Стойте! И-и вовсе не нужно вычёркивать меня так быстро!"
  - char: "hornet_ii"
    side: "right"
    text:
      - "Хо-хо-хо~ Ладно, пока возвращаем тебя в список."
  - char: "yorktown_ii"
    side: "left"
    text:
      - "……Хорнет, ты уже немного перегибаешь палку, ты же ставишь Командира в неловкое положение."
  - char: "hornet_ii"
    side: "right"
    text:
      - "Но это ведь тоже важный вопрос! Нам просто нужно поскорее со всем определиться, и дело с концом."
      - "Вот, например, как на счёт тебя, сестрица Йорктаун? Поселишься с Командиром в одной комнате?"
  - char: "yorktown_ii"
    side: "left"
    text:
      - "Ну… Это………… Если Командир не будет против."
  - char: "anzeel"
    side: "right"
    text:
      - "Вынуждена вас разочаровать, но это мой ассистент, так что жить он, разумеется, будет в моей комнате."
      - "У меня на сегодня ещё целая гора работы запланирована! Как я, по-вашему, справлюсь без помощника?!"
  - char: "hornet_ii"
    side: "left"
    text:
      - "Тцццц..."
  - char: "anzeel"
    side: "right"
    text:
      - "М-м? Что-то не нравится? Могу предложить тебе стать моим временным ассистентом на эту ночь и разгрести пару отчётов, пойдёт?"
  - char: "hornet_ii"
    side: "left"
    text:
      - "Не-не-не, ни за что…… Я полностью согласна с решением доктора!"
  - char: "anzeel"
    side: "right"
    text:
      - "Вот и славно~ И оставшийся час мы тоже не станем упускать."
      - "Я сто лет не была на здешней уличной аллее с едой. Она и раньше-то была легендарной, а сейчас, смотрю, разрослась ещё сильнее!"
      - "Ассистент, ты здесь наверняка впервые? Ничего страшного, сейчас я устрою тебе первоклассную экскурсию~"
  - text:
      - "Анзил без лишних слов утащила меня обратно к началу гастрономической улицы... Похоже, этот вечер для нас только начинается."

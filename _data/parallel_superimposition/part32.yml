chapter1:
  rows:
  - text:
      - "В саду женщина, внешне очень похожая на Дзинцу, неторопливо подметала двор."
  - char: "jintsuu_meta"
    side: "left"
    status: "is-purple"
    text:
      - "……Вот как. Хорошо, что всё обошлось лишь лёгким испугом."
      - "……На моей стороне всё в порядке, можешь не волноваться."
      - "……Со мной всё хорошо, передай Вестал, чтобы тоже не переживала……"
      - "……Госпожа Мусаси идёт, я отключаюсь."

chapter2:
  rows:
  - char: "musashi"
    side: "right"
    text:
      - "Дзинцу, ты сейчас с воробьями разговаривала?"
  - char: "jintsuu_meta"
    side: "left"
    status: "is-purple"
    text:
      - "Просто погода сегодня такая чудесная, вот я немного и замечталась……"
      - "Госпожа Мусаси, у вас ко мне какое-то дело?"
  - char: "musashi"
    side: "right"
    text:
      - "Я только что ходила за предсказанием омикудзи."
  - char: "jintsuu_meta"
    side: "left"
    status: "is-purple"
    text:
      - "……Предсказанием? Касательно чего?"
  - char: "musashi"
    side: "right"
    text:
      - "Касательно меня и наших планов."
      - "Что же до результата……"
      - "«Молния бьёт в траву перед двором,»"
      - "«Пламя взмывает в самые небеса.»"
      - "«Всем сердцем стремишься к заветной цели,»"
      - "«Но алые врата пред тобой на замке.»"
      - "Дзинцу, похоже, в наших дальнейших действиях нам следует быть куда более осмотрительными."

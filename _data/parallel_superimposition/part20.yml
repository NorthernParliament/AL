chapter1:
  rows:
  - char: "the_devil"
    side: "left"
    text:
      - "Взгляните, пожалуйста, мишени, которые я развернула на дистанции, уже заняли свои позиции."
  - text:
      - "Вглядевшись вдаль, можно было заметить, как на горизонте из дымки медленно выплывает настоящий боевой корабль."
  - char: "yorktown_ii"
    side: "left"
    text:
      - "Этот военный корабль…… высокоточная голограмма?"
  - char: "the_devil"
    side: "right"
    text:
      - "А вот и нет~ Это самый настоящий боевой корабль, который я привела с собой."
  - char: "yorktown_ii"
    side: "left"
    text:
      - "……Привела с собой? Но когда мы шли сюда, я совершенно не заметила, чтобы кто-то следовал за нами?"
  - char: "the_devil"
    side: "right"
    text:
      - "Само собой~ Ведь на тот момент я его ещё даже не построила!"
  - char: "yorktown_ii"
    side: "left"
    text:
      - "……«Не построила»? Хочешь сказать, этот корабль был произведён уже после того, как ты прибыла в эту акваторию?"
  - char: "the_devil"
    side: "right"
    text:
      - "Агась~ А если точнее, сборка завершилась буквально только что."
      - "Все необходимые материалы для его постройки я заблаговременно загрузила в свои трюмы, а чертежи можно в любой момент извлечь прямиком из базы данных."
      - "Мне оставалось лишь задействовать производственные мощности внутри моей массивной оснастки и собрать его по чертежу."
      - "Пока у меня не закончатся припасённые ресурсы, я могу в одиночку и в кратчайшие сроки штамповать целые флотилии беспилотников, представляете?"
  - char: "yorktown_ii"
    side: "left"
    text:
      - "Потрясающая технология, просто уму непостижимо……"
      - "Это всё равно что перетащить тыловую судоверфь прямо на передовую, да ещё и разворачивать флот силами всего одного юнита……"
  - char: "langley_ii"
    side: "right"
    text:
      - "Похоже, облик морских сражений будущего снова будет полностью переписан."
  - char: "commander"
    side: "left"
    text:
      - "(Неужели эта технология…… и есть тот самый первоисточник, из которого впоследствии родились серийные модели Сирен?…)"
  - char: "memphis"
    side: "right"
    text:
      - "Облик морских войн меняется непрерывно с самого момента появления девушек-кораблей."
      - "Всё, что мы видим сейчас — лишь промежуточные этапы на пути наших дальнейших изысканий."
      - "Я уверена: какой бы удивительной ни казалась эта технология, она определённо не предел наших возможностей."
  - char: "northampton_ii"
    side: "left"
    text:
      - "Логично. Взглянув на то, на что способны эти модули, я начинаю с ещё большим предвкушением смотреть в будущее."
      - "Итак, наша задача — просто открыть огонь по этому кораблю-мишени?"
  - char: "the_devil"
    side: "right"
    text:
      - "Да, но стрелять нужно боевыми снарядами."
      - "Для начала вам предстоит обстрелять мишень из главных калибров без каких-либо усилений и вести огонь до полного её затопления."
      - "Затем я соберу новую мишень, и вы повторите весь процесс, но уже находясь под действием моих усилений."
  - char: "hornet_ii"
    side: "left"
    text:
      - "Без проблем, положитесь на меня!"
  - char: "the_devil"
    side: "right"
    text:
      - "……Прошу прощения, мисс Хорнет, но этот этап предназначен исключительно для проверки артиллерийского огня. Авианосцам, которым не нужно вести артиллерийский бой, участвовать не требуется."
  - char: "hornet_ii"
    side: "left"
    text:
      - "А-ха-ха-ха…… И то верно. Что ж, тогда Хамманн, Нортгемптон, Мемфис — девчонки, зажгите там за всех нас!~"
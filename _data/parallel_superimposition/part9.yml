chapter1:
  rows:
  - text:
      - "На спокойной глади акватории зоны учений Йорктаун и её группа завершали последние приготовления."
      - "Хотя внешне все старались держаться уверенно, судя по только что полученным данным, масштаб этих учений выходил за все рамки разумного..."
      - "Мало того, что организаторы модернизировали старые серийные корабли по последнему слову техники, так они ещё и доставили сюда несколько новейших судов."
      - "К тому же, за счёт массового внедрения беспилотных технологий — от автономных катеров до дронов — численность «синего» флота противника выросла в разы."
  - char: "langley_ii"
    side: "left"
    text:
      - "Хотя после вчерашних слов Анзил я и пыталась представить нечто подобное, реальность превзошла все мои самые худшие ожидания."
      - "Если серьёзно, что это вообще за чудовища?"
      - "Крейсеры, способные выдержать полноценный налёт палубной авиации? Корветы, способные выкосить наши самолёты плотной стеной ПВО?"
      - "А эти ракеты и высокоточные радары, которые намертво берут в захват маневрирующие корабли? И вишенка на торте — комплексы РЭБ, способные глушить нашу новейшую оснастку…"
      - "Тот, кто в курсе, поймёт, что это особые симуляционные настройки для учений. Но непосвящённый человек решил бы, что мы отправляемся воевать с пришельцами!"
  - char: "northampton_ii"
    side: "right"
    text:
      - "Оснастка типа II специализируется на радиоэлектронной борьбе, а не на войне с инопланетянами……"
  - char: "hornet_ii"
    side: "left"
    text:
      - "Да это сто процентов никакое не «перспективное вооружение, готовое к серийному выпуску». Это оборудование, под которое в министерстве только-только создали пустую папку на компьютере…"
  - char: "hammann_ii"
    side: "right"
    text:
      - "Притащить на учения то, чего даже в природе не существует… Нас абсолютно точно топят намеренно!"
  - char: "langley_ii"
    side: "left"
    text:
      - "По сравнению со списком сил противника, который мы только что получили, состав нашего флота выглядит настолько мелко, что аж плакать хочется."
  - char: "hornet_ii"
    side: "right"
    text:
      - "Вот-вот! У нас целых три авианосца, но при этом всего два корабля сопровождения и один командный штабной корабль. И больше вообще ни-че-го."
      - "Видите ли, они моделируют «ситуацию критических потерь и численного меньшинства». Так они ещё и Мемфис на ту сторону переманили!"
      - "А-а… Так вот почему Мемфис со вчерашнего дня знала, что будет играть за «синих»!"
      - "Значит, она уже тогда была в курсе сегодняшних настроек……"
      - "Ах она хитрюга! То-то она вчера тихонько посмеивалась, когда я радовалась предстоящему вызову. Накажи меня бог!"
      - "Получается, и Анзил обо всём знала… Но если она знала, откуда в ней было столько железобетонной уверенности?!"
  - char: "yorktown_ii"
    side: "left"
    text:
      - "Думаю, доктор просто абсолютно в нас уверена."
      - "В конце концов, это испытание оснастки типа II, а Мемфис её не получала, так что она при всём желании не могла остаться в нашем флоте."
      - "Скорее всего, именно из-за этого нам и не выделили больше кораблей сопровождения."
      - "Что же касается завышенных характеристик «синего» флота… Мне кажется, они хотят заодно проверить альтернативное направление применения Кубов Мудрости."
      - "Насколько мне известно, именно это русло исследований является основным для Революционного фронта."
      - "Как бы там ни было, девочки, нам нельзя терять присутствия духа."
  - char: "hornet_ii"
    side: "right"
    text:
      - "Дух — это, конечно, хорошо, но объективную реальность тоже со счетов не сбросишь……"
  - char: "commander"
    side: "left"
    text:
      - "И то верно: в этих учениях «синий» флот превосходит «красных» по всем фронтам — как численно, так и по огневой мощи."
      - "Однако положение дел, хоть и кажется критическим, вовсе не безвыходное."
      - "Плотная зона ПВО, создаваемая огромным числом высокотехнологичных беспилотников, действительно представляет серьёзную угрозу."
      - "Но у массового использования дронов есть и обратная сторона — обилие штабных кораблей, выступающих в роли командных узлов связи."
      - "Стоит выбить эти ключевые звенья, и вся эта колоссальная армада разом потеряет координацию."
      - "А стремительный прорыв с последующим обезглавливанием сил противника — как раз одно из главных преимуществ кансен над традиционным флотом."
  - char: "hornet_ii"
    side: "right"
    text:
      - "То есть, несмотря на общий численный перевес врага, на тактическом уровне преимущество всё-таки за нами?"
  - char: "commander"
    side: "left"
    text:
      - "Именно. Пусть по общей боевой мощи мы и уступаем, зато мы способны сконцентрировать силы и создать локальный перевес на конкретном участке фронта."
      - "Если мы ударим своими сильными сторонами по их слабым местам, победа гарантированно будет нашей."
  - char: "yorktown_ii"
    side: "right"
    text:
      - "……Если рассуждать хладнокровно, всё действительно так, как говорит Учитель."
      - "Вы поразительны. Вы не просто блестяще знаете историю войн Нового времени, но и прекрасно ориентируетесь в современных конфликтах… Нет, скорее, в грядущих войнах будущего."
  - char: "commander"
    side: "left"
    text:
      - "Это всего лишь опыт."
  - text:
      - "И это была чистая правда. Ведь мне уже слишком долго приходилось воевать против подобного противника — против Сирен."
  - char: "memphis_rad"
    side: "right"
    status: "is-red"
    text:
      - "Всем доброе утро! «Красные», как ваши успехи? Предбоевая подготовка завершена?"
  - char: "hornet_ii"
    side: "left"
    text:
      - "Естественно! Мы полностью готовы, так что держись там, Мемфис~"
  - char: "langley_ii"
    side: "right"
    text:
      - "Нам выпал редкий и драгоценный шанс сразиться плечом к плечу с Учителем, так что мы выложимся на все сто процентов."
      - "Скорее уж это вашей стороне стоит поберечься, понимаешь?"
  - char: "memphis_rad"
    side: "left"
    status: "is-red"
    text:
      - "Разумеется. С чего бы мне недооценивать присутствие Командира?"
      - "В этот раз я подготовилась более чем серьёзно и обязательно заставлю Командира взглянуть на меня новыми глазами."
  - char: "yorktown_ii"
    side: "right"
    text:
      - "Взглянуть новыми глазами……? Но, Мемфис, для Учителя ведь это, по идее, вообще первые учения, где он командует флотом?"
  - char: "memphis_rad"
    side: "left"
    status: "is-red"
    text:
      - "……А-ха-ха, ну, просто как только я узнала эту новость, то сразу принялась прокручивать симуляции у себя в голове."
      - "Пускай со стороны и кажется, будто Командир управляет флотом впервые, в моих мыслях мы с ним сталкивались уже несчётное количество раз!"
  - char: "hornet_ii"
    side: "right"
    text:
      - "Ой-ой, Мемфис настроена на эти учения до ужаса серьёзно…"
  - char: "hammann_ii"
    side: "left"
    text:
      - "У Хамманн тоже нехорошее предчувствие……"
  - char: "northampton_ii"
    side: "right"
    text:
      - "Да, нам нужно действовать с максимальной осторожностью."
  - char: "anzeel_rad"
    side: "left"
    text:
      - "Похоже, вы уже успели продуктивно пообщаться."
  - char: "hornet_ii"
    side: "right"
    text:
      - "Доктор?! Тебя с самого утра не было видно, ты вообще куда запропастилась?!"
  - char: "anzeel_rad"
    side: "left"
    text:
      - "Ну как куда? Я просто заранее ушла в штаб руководства, чтобы занять самое удобное кресло для наблюдения."
      - "Перед тем как прозвучит сигнал к началу, я напоследок напомню главное условие для победы в этих маневрах."
      - "Флагманом «красных» назначается Йорктаун, флагманом «синих» — Мемфис. Вне зависимости от общих потерь среди личного состава, победа мгновенно присуждается той стороне, которая первой ликвидирует вражеский флагман."
      - "Всем всё понятно?"
  - char: "all"
    side: "right"
    text:
      - "Так точно!"
  - char: "anzeel_rad"
    side: "left"
    text:
      - "Прекрасно! В таком случае объявляю тактические учения официально открытыми!"
chapter1:
  rows:
  - text:
      - "Боевые учения против Дьявол шли своим чередом."
      - "Эскадрильи палубной авиации волна за волной накатывались на цель, но Дьявол, лавируя между вздымающимися столбами воды, выглядела так, словно ей всё это давалось играючи."
  - char: "hornet_ii"
    side: "left"
    text:
      - "Тц…… Как такая здоровенная и абсолютно не аэродинамичная махина умудряется так ловко порхать в воздухе!"
      - "Какую же безумную тягу они запихнули в новое поколение ANTI-X при производстве!"
  - char: "yorktown_ii"
    side: "right"
    text:
      - "Воистину, как гласит поговорка: был бы двигатель достаточно мощным, а полетит даже кирпич."
      - "У бомбардировщиков и торпедоносцев почти нет возможностей для воздушного боя. Знай я это заранее, взяла бы с собой побольше истребителей……"
  - char: "langley_ii"
    side: "left"
    text:
      - "Йорктаун, у меня в резерве остался один палубный самолёт, оснащённый экспериментальными зенитными ракетами для корабельной оснастки. Не хочешь опробовать его?"
      - "Если мы повредим её двигательную установку и лишим возможности летать, дальше справиться с ней будет куда проще."
  - char: "yorktown_ii"
    side: "right"
    text:
      - "Отличная идея, Лэнгли~ Командир, запрашиваю разрешение на проведение отвлекающего воздушного манёвра, чтобы наш ракетный истребитель смог нанести удар по двигательной системе Дьявола."
  - char: "commander"
    side: "left"
    text:
      - "Разрешаю."
      - "(Надо же, они уже реализовали интеграцию ракетного вооружения в оснастку…… и даже адаптировали его для палубной авиации)."
      - "(Просто невероятные технологии…… Это определённо поможет обуздать абсурдную маневренность Дьявол)."
  - char: "yorktown_ii"
    side: "right"
    text:
      - "Удар нанесён~ Командир, все шесть ракет точно поразили цель. Двигательная установка Дьявола должна была получить серьёзные повреждения..."
      - "Должна была получить……"
  - char: "hornet_ii"
    side: "left"
    text:
      - "Сестрёнка Йорктаун, Дьявол всё ещё носится по воздуху на огромной скорости!"
  - char: "yorktown_ii"
    side: "right"
    text:
      - "Но…… как странно. Мои приборы чётко зафиксировали успешные попадания. С повреждёнными двигателями она уже должна была рухнуть в воду!"
  - char: "commander"
    side: "left"
    text:
      - "…Кажется, дело принимает дурной оборот."
  - char: "northampton_ii"
    side: "right"
    text:
      - "Командир, к нам приближается рой беспилотников Дьявол. Видимо, это ответная реакция на нашу атаку."
  - char: "commander"
    side: "left"
    text:
      - "……Хамманн, не подпускай эти самолёты к Йорктаун."
  - char: "hammann_ii"
    side: "right"
    text:
      - "Не волнуйтесь, Хамманн сейчас их всех перестреляет!"
  - text:
      - "БАБАХ!!!"
  - char: "hammann_ii"
    side: "right"
    text:
      - "Больно…………!"
      - "Командир, сестрёнка Йорктаун, они используют против Хамманн боевые снаряды!"
      - "Дьявол жульничает!"
  - char: "yorktown_ii"
    side: "left"
    text:
      - "…Э? Боевые снаряды?"
  - char: "langley_ii"
    side: "right"
    text:
      - "……Несколько моих самолётов-перехватчиков тоже были уничтожены по-настоящему. Сомнений нет, противник ведёт огонь на поражение!"
  - text:
      - "(……Я пристально вгляделся в изображение Дьявол, передаваемое самолётами-разведчиками)."
      - "(От неё так и веяло какой-то неописуемой, первобытной аурой безумия)."
      - "(……Та Дьявол, что сейчас парила вдалеке, вероятно, уже не была той самой Дьявол, которая совсем недавно весело болтала с нами)."
  - char: "yorktown_ii"
    side: "left"
    text:
      - "Командир…… что нам теперь делать?"
  - char: "commander"
    side: "right"
    text:
      - "Всем перестроиться в оборонительный порядок вокруг флагманского корабля и…… зарядить орудия боевыми снарядами."
      - "Пока что воздержитесь от прямых атак по самой Дьявол, но можете свободно зачищать все подлетающие беспилотники и Инфорсеров, которые угрожают нашему строю."
  - char: "yorktown_ii"
    side: "left"
    text:
      - "Вас поняла……!"
  - char: "memphis"
    side: "right"
    text:
      - "Командир, возможно, нам стоит сперва официально остановить испытания?"
  - char: "commander"
    side: "left"
    text:
      - "Да. Мемфис, немедленно свяжись с Дьявол и объяви об отмене боевых тестов."
      - "И прикажи ей немедленно сложить оружие. Выясни, по какой причине она перешла на боевые боеприпасы."
  - char: "memphis"
    side: "right"
    text:
      - "Слушаюсь."
      - "Дьявол, это Мемфис. Я приказываю тебе немедленно деактивировать всё вооружение и спуститься на поверхность воды."
      - "……Странно, Дьявол никак не реагирует на мои команды."
      - "Она в одностороннем порядке заблокировала канал связи……? Такого просто не должно было произойти……"
  - char: "commander"
    side: "left"
    text:
      - "(…………Неужели ситуация вышла даже из-под контроля Мемфис?)"
      - "Мемфис, срочно свяжись с Анзил и Аосте. Доложи им о нештатной ситуации в зоне проведения испытаний."
      - "Судя по череде аномальных действий со стороны Дьявол, можно с уверенностью констатировать, что она вышла из-под контроля по неизвестной причине."
      - "Внимание всем кораблям: немедленно изменить курс и отступать в сторону острова Самос."
      - "Дьявол пока не начала полномасштабное наступление, так что мы сперва отступим на безопасную дистанцию, а уже затем будем планировать дальнейшие шаги!"
  - char: "all"
    side: "right"
    text:
      - "Слушаемся!"

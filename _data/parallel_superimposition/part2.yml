chapter1:
  rows:
  - text:
      - "Пейзаж за окном, словно живописное полотно, стремительно уносился назад за стеклом автомобиля."
      - "Всё, что попадалось на глаза, кроме того, что это были невиданные ранее виды, не вызывало никаких подозрений."
      - "Картина была реалистичной, непрерывной и необъятной. В ней не чувствовалось ни зыбкости сновидения, ни признаков заранее запрограммированной виртуальной симуляции."
      - "Возможно… всё это происходит наяву, а причиной нынешнего положения и впрямь стало путешествие во времени."
      - "Пока я предавался этим мыслям, машина постепенно замедлила ход и в конце концов остановилась на парковке на территории университета."
  - char: "northampton_ii"
    side: "left"
    text:
      - "Учитель, мы приехали. Пожалуйста, выходите."
  - char: "commander"
    side: "right"
    text:
      - "Анзил здесь?"
  - char: "northampton_ii"
    side: "left"
    text:
      - "Нет, нужно будет ещё немного пройтись вглубь. Впереди пешеходная зона, на машине туда не проехать, так что придётся оставить её здесь."
  - text:
      - "Выйдя из автомобиля, я огляделся. Для университета архитектурный стиль и планировка мало чем отличались от моих представлений."
      - "Как и на улицах с небоскрёбами, в кампусе были установлены кое-какие невиданные мной технологичные устройства. Однако для учебного заведения..."
  - char: "commander"
    side: "left"
    text:
      - "Вокруг как-то совсем безлюдно."
  - char: "northampton_ii"
    side: "right"
    text:
      - "А~ Доктор, когда приехала сегодня, первым делом воскликнула точно так же!"
      - "Может, всё дело в выходном дне? Да и бурно развивающаяся индустрия виртуальных развлечений наверняка сказывается."
      - "Впрочем, пустота — это даже плюс, по крайней мере, не пришлось мучиться с поиском парковочного места."
      - "О, доктор прислала сообщение. Пишет, что они уже закончили и скоро будут ждать нас у входа на первом этаже."
      - "Нам тоже пора идти. Идите за мной, Учитель. Этот университет на самом деле огромный, так что смотрите не потеряйтесь."

chapter2:
  rows:
  - text:
      - "Спустя некоторое время у здания музея истории университета мы встретили ожидавшую нас группу."
      - "Лица большинства из них, как и в случае с Нортгемптон, можно было без труда узнать, однако их одежда казалась совершенно непривычной."
      - "Но вот женщина, стоявшая впереди всех…"
  - char: "anzeel???"
    side: "left"
    text:
      - "О, ассистент, ну наконец-то ты здесь!"

chapter3:
  rows:
  - char: "commander"
    side: "left"
    text:
      - "Вы кто?"
  - char: "anzeel1"
    side: "right"
    text:
      - "? Это что, какая-то новая плоская шутка вместо «давно не виделись»?"

chapter4:
  rows:
  - char: "commander"
    side: "left"
    text:
      - "Анзил…?"
  - char: "anzeel1"
    side: "right"
    text:
      - "…Ах! Этот человек делает вид, будто меня не знает!"

chapter5:
  rows:
  - char: "anzeel1"
    side: "right"
    text:
      - "Ну правда, я же не поехала тебя встречать только из-за этого дурацкого самолёта! Рейс задержали, я-то тут при чём!"
      - "Что ты, что эти старые профессора — ну и зануды, ни капли сочувствия в вас нет."
      - "Если бы не обстоятельства, я бы ни за что не стала менять расписание в последний момент…"
      - "Эх, я что, по-вашему, могу помешать самолёту задержаться? Вы так говорите, будто я лично решаю, как ему летать."
  - text:
      - "Анзил изо всех сил корчила из себя жертву обстоятельств, но стоящие рядом девушки обменялись весьма красноречивыми взглядами."
      - "Похоже, всё было не совсем так, как расписывала доктор."
  - char: "hornet_ii"
    side: "left"
    text:
      - "…Но, Анзил, тот задержавшийся самолёт — это ведь твой личный частный борт?"
  - char: "langley_ii"
    side: "right"
    text:
      - "Ах, ты всё-таки это озвучила…"
  - char: "anzeel1"
    side: "left"
    text:
      - "Кхм! Мы же договаривались не говорить об этом ассистенту!"
  - char: "hornet_ii"
    side: "right"
    text:
      - "Нам на нём ещё обратно лететь, всё равно бы не утаила."
  - char: "anzeel1"
    side: "left"
    text:
      - "Эй… Вот блин…"
  - text:
      - "……Уж теперь-то всё понятно."
  - char: "commander"
    side: "left"
    text:
      - "Да всё в порядке."
      - "Даже с частными самолётами порой случаются накладки. К тому же я ждал совсем недолго, так что не стоит переживать."
      - "(Да и к лучшему — благодаря этому у меня появилось время собрать хоть какую-то информацию)."
  - char: "anzeel1"
    side: "right"
    text:
      - "Вот-вот, именно! Жизнь полна таких вот неожиданностей! На то ты и мой понимающий ассистент."
  - char: "hornet_ii"
    side: "left"
    text:
      - "Надо же, Учитель сам её выгораживает~ Ладно, на этот раз прощаем~"
  - char: "langley_ii"
    side: "right"
    text:
      - ": Учитель, потакая ей, вы добьётесь лишь того, что доктор окончательно распояшется, и её проблемы с пунктуальностью станут ещё хуже."
  - char: "anzeel1"
    side: "left"
    text:
      - "Мой. Ас-сис-тент. Сказал. Что. Не. Против. Лэнгли!"
  - char: "langley_ii"
    side: "right"
    text:
      - "Ай, ай-ай-ай, больно! Зачем сразу за щёки-то хватать?!"
  - char: "anzeel1"
    side: "left"
    text:
      - "Фух… Я ведь так долго не видела тебя и даже приготовила целую речь для эффектного появления, а теперь всё пошло прахом."
  - char: "hornet_ii"
    side: "right"
    text:
      - "И главная вина во всём этом лежит на…"
  - char: "anzeel1"
    side: "left"
    text:
      - "НА КОМ?!!!!"
  - char: "hornet_ii"
    side: "right"
    text:
      - "Лежит на задержавшемся самолёте!"
  - char: "anzeel1"
    side: "left"
    text:
      - "Хм~ Именно так, всё верно! Замяли тему!"
      - "Ну же, Хамманн, хорош прятаться~ Подойди и поздоровайся с моим ассистентом."
      - "Эту девочку зовут Хамманн. Ты ведь видишь её впервые, верно, ассистент?"
  - char: "commander"
    side: "right"
    text:
      - "(Хамманн, значит… Строго говоря, далеко не впервые)"
  - char: "hammann_ii"
    side: "left"
    text:
      - "Да… Да когда это Хамманн пряталась?! …Угу… Зд-здравствуй, ассистент."
  - char: "langley_ii"
    side: "right"
    text:
      - "Неправильно. Это для доктора Анзил он ассистент, а Хамманн должна говорить «Здравствуйте, Учитель»."
  - char: "hammann_ii"
    side: "left"
    text:
      - "Эй… Да, здр-здравствуйте, Учитель."
  - char: "hornet_ii"
    side: "right"
    text:
      - "Хе-хе, Учитель, скажу вам по секрету: Лэнгли теперь тоже преподаватель!"
  - char: "langley_ii"
    side: "left"
    text:
      - "Мне неловко это слышать. По сравнению с вами, Учитель, мне ещё расти и расти."
  - char: "yorktown_ii"
    side: "right"
    text:
      - "Учитель, давно не виделись. Как продвигаются ваши недавние исследования?"
  - text:
      - "…Йорктаун."
      - "Воспоминания о прошлом нахлынули на меня бурным потоком."
      - "Я до сих пор отчётливо помню её бледный силуэт на фоне бежевых штор, когда она улыбалась мне в свой последний день перед тем, как лечь в закрытый лечебный бокс."
      - "Кто бы мог подумать, что после того дня мы воссоединимся с Йорктаун здесь, да ещё и при таких обстоятельствах…"
  - char: "yorktown_ii"
    side: "right"
    text:
      - "……? Учитель, вы себя хорошо чувствуете?"
  - char: "commander"
    side: "left"
    text:
      - "Наверное, это просто усталость с дороги… Всё в порядке. Давно не виделись, Йорктаун."
  - char: "yorktown_ii"
    side: "right"
    text:
      - "Да, давно не виделись~"
  - char: "anzeel1"
    side: "left"
    text:
      - "Отлично, раз со знакомством покончено, пора переходить к следующему пункту нашего расписания."
  - char: "yorktown_ii"
    side: "right"
    text:
      - "Если мне не изменяет память, следующим пунктом у вас с Учителем запланирована встреча с генералом Гарфилдом?"
  - char: "anzeel1"
    side: "left"
    text:
      - "Верно~ Но это следующий важный пункт, а не просто следующий!"
      - "Хе-хе-хе, раз уж мы все наконец-то выбрались вместе, я хочу устроить вам экскурсию по моей альма-матер."
      - "Так что встречу с Гарфилдом я перенесла на завтра, освободив нам кучу времени."
      - "Можете гулять тут сколько душе угодно, всё время до завтрашнего дня объявляется — отпуском!"
  - char: "hornet_ii"
    side: "right"
    text:
      - "О-о-о… В этом вся Анзил! Прекрасное решение!"
      - "Ну и с чего мы начнём?"
  - char: "anzeel1"
    side: "left"
    text:
      - "Дайте-ка подумать… Время уже близится к обеду. Тут неподалёку было одно заведение, где я обожала перекусить в студенческие годы. Интересно, оно ещё открыто?"
      - "Если да, то сперва заглянем туда пообедать."
      - "А после можно пройтись по сувенирным лавкам или, например, сходить в кино — тоже отличный вариант!"
  - char: "langley_ii"
    side: "right"
    text:
      - "Тогда давайте сначала поедим, а уже сытыми распланируем дальнейший маршрут."
      - "Доктор, скиньте мне название заведения, я проверю, работает ли оно сейчас."
  - char: "anzeel1"
    side: "left"
    text:
      - "Договорились! Название заведения — «Гранат» (Granate)."
  - char: "langley_ii"
    side: "right"
    text:
      - "«Гранат», хорошо, поняла."
  - text:
      - "Пока шёл этот разговор… я внезапно поймал себя на одной мысли."
  - char: "commander"
    side: "left"
    text:
      - "Кажется, я не вижу Мемфис?"
  - char: "anzeel1"
    side: "right"
    text:
      - "А, разве она тебе не сказала? Вот блин, точно завертелась и забыла из-за всей этой суматохи…"
      - "Она сейчас вовсю готовит завтрашние тесты, так что присоединится к нам только ближе к вечеру."
      - "Эх~ Бедняжка, весь сегодняшний отпуск пролетит мимо неё."
      - "Но ты хорошо мне напомнил — когда пойдём за сувенирами, нужно будет обязательно присмотреть что-нибудь и для неё."
  - char: "langley_ii"
    side: "left"
    text:
      - "Доктор, то заведение всё ещё существует и сейчас как раз открыто."
  - char: "anzeel1"
    side: "right"
    text:
      - "Замечательно! Тогда все за мной, выдвигаемся~"
  - char: "yorktown_ii"
    side: "left"
    text:
      - "Хамманн, держись ближе к нам и не отставай, чтобы не потеряться."
  - char: "hammann_ii"
    side: "right"
    text:
      - "Ха! Да Хамманн ни за что не потеряется!"

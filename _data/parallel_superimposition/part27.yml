chapter1:
  rows:
  - text:
      - "БАБАХ!!!"
  - char: "hammann_ii_rad"
    side: "left"
    text:
      - "Бе-бе-бе———— Вам ещё сто лет расти, чтобы попасть по Хамманн!"
  - char: "devil"
    side: "right"
    status: "is-red"
    text:
      - "Тц."
  - text:
      - "БАБАХ!!!"
  - char: "northampton_ii_rad"
    side: "left"
    text:
      - "Кхм……"
  - char: "hammann_ii_rad"
    side: "right"
    text:
      - "Нортгемптон, ты как, цела?!"
  - char: "northampton_ii_rad"
    side: "left"
    text:
      - "Не обращай на меня внимания! Хамманн, прикончи её!"
  - char: "hammann_ii_rad"
    side: "right"
    text:
      - "Предоставьте это Хамманн!!!!"
      - "А ну живо отключайся, Дьявол!"
  - text:
      - "БАБАХ!!!"
  - char: "devil"
    side: "left"
    status: "is-red"
    text:
      - "…Кхм."
  - char: "hammann_ii_rad"
    side: "right"
    text:
      - "Получилось! Сестрёнка Йорктаун, ты видела?!"
  - char: "yorktown_ii"
    side: "left"
    text:
      - "Да, отличная работа, Хамманн!"
  - char: "hammann_ii_rad"
    side: "right"
    text:
      - "Э-хе-хе-хе~"
  - char: "helena_meta"
    side: "left"
    status: "is-meta"
    text:
      - "Процесс взлома запущен———— Выполнено."
      - "Теперь Дьявол и вся её сеть Инфорсеров полностью парализованы."
  - char: "memphis_meta"
    side: "right"
    status: "is-purple"
    text:
      - "И правда получилось……"
  - char: "helena_meta"
    side: "left"
    status: "is-meta"
    text:
      - "Что такое, сомневалась в нашей с Командиром командной работе?"
  - char: "memphis_meta"
    side: "right"
    status: "is-purple"
    text:
      - "Нет…… Вовсе нет………… А-ха-ха."
  - char: "helena_meta"
    side: "left"
    status: "is-meta"
    text:
      - "Командир, прикажи флоту сосредоточить огонь и уничтожить её."
      - "Как только Дьявол будет устранена, я смогу вернуть себе контроль над пространством и всё исправить."
  - char: "commander"
    side: "right"
    text:
      - "Внимание всем: сосредоточить огонь и уничтожить цель."
  - char: "yorktown_ii"
    side: "left"
    text:
      - "Вас поняла."
  - char: "hornet_ii_rad"
    side: "right"
    text:
      - "Уж прости, хоть ты мне поначалу и понравилась, но кто же знал, что тебя возьмут под контроль и ты заваришь такую кашу."
  - text:
      - "Ситуация на поле боя наконец-то вернулась в нормальное русло, и до полной победы осталось совсем немного."
      - "Как только Хелена вернёт контроль над пространством, нужно будет как следует расспросить её обо всём остальном."
  - char: "hornet_ii_rad"
    side: "right"
    text:
      - "Эй………… посмотрите на небо, что это там такое?"
  - char: "hammann_ii_rad"
    side: "left"
    text:
      - "……А, на небо? Что… что это значит?!"
  - char: "northampton_ii_rad"
    side: "right"
    text:
      - "В небе…… появилась трещина?!"
  - text:
      - "Стоило поднять взгляд, как стало видно, что в потемневшем после захода солнца небе из ниоткуда возник гигантский разлом."
      - "Разлом пульсировал сине-белым светом, словно сквозь него силой прорывался пейзаж из совершенно иного мира."
  - char: "helena_meta"
    side: "left"
    status: "is-meta"
    text:
      - "Тц, активировалась система очистки пространства……"
  - char: "commander"
    side: "right"
    text:
      - "Это тоже твоих рук дело?"
  - char: "helena_meta"
    side: "left"
    status: "is-meta"
    text:
      - "Нет…… Это…………"
  - text:
      - "Из разлома вырвались бесчисленные лучи света, устремившись сверху вниз прямо к поверхности океана."
      - "Они сковали не только Инфорсеров и неопознанные корабли, но и не пощадили даже обломки."
  - char: "hammann_ii_rad"
    side: "left"
    text:
      - "Командир, посмотрите, Дьявол тоже скована этими лучами с небес!"
      - "Эти лучи на нашей стороне?"
  - char: "hornet_ii_rad"
    side: "right"
    text:
      - "Командир, эти лучи мчатся и к нам!"
      - "Нам лучше уклониться..."
  - char: "commander"
    side: "left"
    text:
      - "(Плохо...)"
      - "Быстро в укрытие!"

chapter2:
  rows:
  - text:
      - "На экране флагманского корабля было видно, как все отслеживаемые цели в акватории распадаются и исчезают с пугающей скоростью."
      - "Хамманн, Нортгемптон, Хорнет и Лэнгли, находившиеся на удалении от флагмана, исчезли с экранов радаров в один миг."
  - char: "helena_meta"
    side: "left"
    status: "is-meta"
    text:
      - "Йорктаун, не отходи от меня ни на шаг."
      - "Прости, но остальным я ничем не могу помочь."
  - char: "yorktown_ii"
    side: "right"
    text:
      - "……О чём ты говоришь? Что вообще происходит…"
      - "Вызываю Хорнет, приём, ответь!"
      - "…Вызываю Нортгемптон, приём, ответь!"
      - "……Вызываю Лэнгли, приём, ответь…………"
      - "…………Хамманн, приём, ответь………………"
  - text:
      - "Никакого ответа."
      - "Жуткая, леденящая душу тишина повисла в каналах связи."

chapter3:
  rows:
  - char: "commander"
    side: "left"
    text:
      - "Хелена!!!"

chapter4:
  rows:
  - char: "commander"
    side: "left"
    text:
      - "Хелена, объяснись."

chapter5:
  rows:
  - char: "helena_meta"
    side: "right"
    status: "is-meta"
    text:
      - "Ладно, карты на стол."
      - "Всё происходящее сейчас — это результат работы «системы очистки пространства»."
      - "Это один из внутренних механизмов самозащиты «Башни»."
  - char: "commander"
    side: "left"
    text:
      - "……«Башня»? Это имя одного из Арбитров Сирен?"
  - char: "helena_meta"
    side: "right"
    status: "is-meta"
    text:
      - "Да. Арбитр Башня XVI."
      - "Изначально я перевела систему очистки этого пространства в спящий режим."
      - "И даже если бы Дьявол захватила над ней контроль, она бы ни за что не рискнула её активировать, ведь тогда её собственное тело тоже оказалось бы стёртым."
      - "А раз так, добровольно запустить её могла…… только сама Башня."
      - "Башня уже заметила, что здесь происходит."
      - "Башня почувствовала угрозу и поэтому запустила систему очистки, что и привело ко всему этому."
  - char: "commander"
    side: "left"
    text:
      - "Если вы сотрудничаете с Арбитром Башня, то разве нельзя просто приказать ей остановиться?"
  - char: "helena_meta"
    side: "right"
    status: "is-meta"
    text:
      - "К сожалению…… всё не так просто."
      - "Башня сейчас находится в весьма специфическом состоянии."
      - "Мы не можем напрямую контактировать с ней в какой-либо форме. Скорее…… это мы используем её в своих целях."
      - "От небес и до самых глубин океана, от органики и до неживой материи — абсолютно всё в этом мире является симуляцией, созданной «Башней»."
      - "Ты ведь и сам до этого наверняка замечал в какие-то моменты некую неестественность происходящего, верно?"
      - "Это всё из-за неполноты данных, что приводит к искажениям в симуляции."
  - char: "yorktown_ii"
    side: "left"
    text:
      - "Хелена…… ты хочешь сказать, что..."
      - "…я — это всего лишь сгенерированные данные?"
  - char: "helena_meta"
    side: "right"
    status: "is-meta"
    text:
      - "К сожалению, да."
  - char: "yorktown_ii"
    side: "left"
    text:
      - "Хорнет, Хамманн, Нортгемптон, Лэнгли…… они тоже?"
  - char: "helena_meta"
    side: "right"
    status: "is-meta"
    text:
      - "Да."
  - char: "yorktown_ii"
    side: "left"
    text:
      - "А доктор Анзил и доктор Аосте?!"
  - char: "helena_meta"
    side: "right"
    status: "is-meta"
    text:
      - "Да."
      - "За исключением меня, Мемфис и Командира, абсолютно всё в этом мире — фальшивка."
  - char: "yorktown_ii"
    side: "left"
    text:
      - "Но как же воспоминания в моей голове и те чувства, что переполняют моё сердце?!"
      - "Они тоже фальшивые??!"
  - char: "helena_meta"
    side: "right"
    status: "is-meta"
    text:
      - "Ну, это…………"
  - char: "memphis_meta"
    side: "left"
    status: "is-purple"
    text:
      - "Хелена, щупальца системы очистки тянутся в нашу сторону."
  - char: "commander"
    side: "right"
    text:
      - "Йорктаун, берегись!"

chapter6:
  rows:
  - char: "yorktown_meta"
    side: "left"
    status: "is-purple"
    text:
      - "......"
  - char: "yorktown_ii"
    side: "right"
    status: "is-purple"
    text:
      - "Кто ты……? И где я?"
      - "……Неужели меня тоже удалила система очистки, как обычные «данные»?"
  - char: "yorktown_meta"
    side: "left"
    status: "is-purple"
    text:
      - "……Нет, пока нет. Хелена наложила на тебя защитный протокол, поэтому система очистки на тебя не подействовала."
      - "Ты оказалась здесь только потому, что я захотела поговорить с тобой. И извиниться."
      - "Что же касается того, кто я такая…… разве, оказавшись здесь, ты ещё не вспомнила?"
  - char: "yorktown_ii"
    side: "right"
    status: "is-purple"
    text:
      - "......"
      - "………………Я вспомнила."
      - "Я — это прошлая ты, а ты — это будущая я……"
      - "Я — созданный из твоих данных памяти «заменитель» Йорктаун META, чьё существование ограничено лишь этим пространством……"
      - "Я………… вспомнила абсолютно всё."
  - char: "yorktown_meta"
    side: "left"
    status: "is-purple"
    text:
      - "Прости. Я пока не могу показаться на глаза Командиру."
      - "Прости, что заставила тебя проходить через всё это вместо меня……"
  - char: "yorktown_ii"
    side: "right"
    status: "is-purple"
    text:
      - "Нет………… Это тебе спасибо."
      - "За то, что подарила мне шанс снова провести такое счастливое время вместе с доктором Анзил, Учителем и нашими товарищами……"
      - "Значит, воспоминания в моей голове и чувства в моём сердце — вовсе не фальшивка……"
      - "Как же это здорово…… Огромное тебе спасибо."
  - char: "yorktown_meta"
    side: "left"
    status: "is-purple"
    text:
      - "……Сеть Кубов Мудрости едина."
      - "Обещаю тебе: всё, что произошло за эти два дня, никогда не будет забыто."
      - "Ни твои воспоминания, ни воспоминания Хорнет, Нортгемптон, Лэнгли или Хамманн."
      - "Вся эта информация вольётся в сеть Кубов Мудрости и сохранится там навечно."
  - char: "yorktown_ii"
    side: "right"
    status: "is-purple"
    text:
      - "Прямо как те сказочные приключения, что порой снятся нам по ночам?"
  - char: "yorktown_meta"
    side: "left"
    status: "is-purple"
    text:
      - "Да…… прямо как те сказочные приключения во снах."
  - char: "yorktown_ii"
    side: "right"
    status: "is-purple"
    text:
      - "……Этого более чем достаточно. Спасибо."
      - "Что мне нужно сделать теперь~?"
  - char: "yorktown_meta"
    side: "left"
    status: "is-purple"
    text:
      - "Я хочу попросить тебя ещё об одном одолжении."
      - "Останься в арьергарде. Задержи врага и спаси Командира."
  - char: "yorktown_ii"
    side: "right"
    status: "is-purple"
    text:
      - "Без проблем! Я бы в любом случае так поступила, даже если бы ты не просила!"
      - "Мне ведь нужно просто остаться и сражаться до самого последнего мгновения, верно?"
  - char: "yorktown_meta"
    side: "left"
    status: "is-purple"
    text:
      - "Да. У Хелены есть план, и ты должна выиграть для неё время."
      - "…Мне так жаль."
  - char: "yorktown_ii"
    side: "right"
    status: "is-purple"
    text:
      - "Хватит извиняться! Это мой собственный выбор……!"
      - "Но взамен…… у меня тоже будет к тебе одна просьба."
      - "……Когда ты наконец сможешь показаться на глаза Командиру…… не забудь передать ему мой подарок."
  - char: "yorktown_meta"
    side: "left"
    text:
      - "Обещаю."
  - char: "yorktown_ii"
    side: "right"
    status: "is-purple"
    text:
      - "Что ж, тогда мне пора возвращаться. Меня там заждалась ещё одна битва~!"

chapter7:
  rows:
  - char: "commander"
    side: "left"
    text:
      - "Йорктаун, ты в порядке?!"
  - char: "yorktown_ii"
    side: "right"
    status: "is-purple"
    text:
      - "……Командир. Да, со мной всё хорошо."
      - "Не волнуйтесь, Хелена защищает меня, системе очистки меня не уничтожить."
  - char: "helena_meta"
    side: "left"
    status: "is-meta"
    text:
      - "Вижу, ваш разговор подошёл к концу."
  - char: "yorktown_ii"
    side: "right"
    status: "is-purple"
    text:
      - "Хелена, каков наш дальнейший план?"
  - char: "helena_meta"
    side: "left"
    status: "is-meta"
    text:
      - "Я уже связалась с внешним миром и создала в этом пространстве точку экстренной эвакуации."
      - "Мемфис сопроводит туда Командира, а мы с тобой останемся здесь, чтобы задержать их."
  - char: "yorktown_ii"
    side: "right"
    status: "is-purple"
    text:
      - "Поняла~ Командир, вы слышали? Пришло время уходить~"
  - char: "commander"
    side: "left"
    text:
      - "Но…… как же ты?"
  - char: "yorktown_ii"
    side: "right"
    status: "is-purple"
    text:
      - "Командир, вы вообще слушали, что я вам только что говорила?~"
      - "Меня защищает Хелена, система очистки мне ничего не сделает."
      - "Мне нужно лишь задержать систему здесь, чтобы выиграть для вас время на эвакуацию."
      - "Всё очень просто, не так ли?"
  - char: "commander"
    side: "left"
    text:
      - "Но ведь…"
  - char: "yorktown_ii"
    side: "right"
    status: "is-purple"
    text:
      - "Ничего не говорите…… умоляю вас."
      - "Это решение я приняла по собственной воле. Пожалуйста…… позвольте моему решению обрести смысл."
  - char: "commander"
    side: "left"
    text:
      - "......"
  - char: "helena_meta"
    side: "right"
    status: "is-meta"
    text:
      - "Мемфис, доставь Командира ко входу в подземный комплекс Института морских рыб на острове Самос."
      - "Именно там находится точка экстренной эвакуации."
  - char: "memphis_meta"
    side: "left"
    status: "is-purple"
    text:
      - "Принято…… Командир, пожалуйста, следуйте за мной."
  - char: "yorktown_ii"
    side: "right"
    status: "is-purple"
    text:
      - "Прощайте, мой самый дорогой Командир. Пусть когда-нибудь в будущем мы обязательно встретимся вновь..."

chapter8:
  rows:
  - text:
      - "......"
      - "Грохот орудий постепенно стихал вдали."
      - "Я больше не оборачивался."
      - "Но я уже твёрдо решил для себя: эти воспоминания..."
      - "И этот силуэт, подобный ангелу..."
      - "Я навечно высеку в своём сердце..."


chapter1:
  rows:
  - char: "memphis_meta"
    side: "left"
    status: "is-purple"
    text:
      - "Точка эвакуации прямо здесь, Командир. Вам нужно просто войти и идти всё время прямо."
  - char: "commander"
    side: "right"
    text:
      - "А ты что будешь делать?"
  - char: "memphis_meta"
    side: "left"
    status: "is-purple"
    text:
      - "Я возвращаюсь, чтобы помочь Хелене."
      - "Не волнуйтесь, «Башня» не станет атаковать нас с Хеленой, мы возьмём ситуацию под контроль."
      - "Всё, каждая лишняя секунда промедления лишь увеличивает опасность, скорее заходите."
  - text:
      - "Мемфис силой втолкнула меня в подземный тоннель."
  - char: "memphis_meta"
    side: "left"
    status: "is-purple"
    text:
      - "……Простите, Командир, подобная оплошность больше не повторится."

chapter2:
  rows:
  - text:
      - "*динь* *динь*"
      - "……Кажется, я услышал звон колокольчиков?"
      - "А сразу после этого накатило лёгкое чувство невесомости."
      - "В отличие от той невесомости, что возникает при активации «Линзы Реальности», на этот раз ощущение было умиротворяющим и дарящим покой."
      - "Однако………… обстановка вокруг изменилась."
      - "Я по-прежнему находился под зданием Института морской фауны острова Самос, но…… то, что предстало перед моими глазами, больше не было тёмным подземным тоннелем."
  - char: "commander"
    side: "left"
    text:
      - "Анзил……?"
  - char: "anzeel"
    side: "right"
    text:
      - "Опять витаешь в облаках, ассистент?"
  - char: "commander"
    side: "left"
    text:
      - "Где я………… Лаффи тоже здесь……?"
  - char: "laffey_ii"
    side: "right"
    text:
      - "Фу-ух…… Учитель, спать хочется……"
  - char: "commander"
    side: "left"
    text:
      - "……Мы же только что потеряли с тобой связь на передовой, и я уже подумал……"
      - "И вообще…… когда здесь появилась Лаффи?"
  - char: "anzeel"
    side: "right"
    text:
      - "Ассистент, тебе что, опять приснилась какая-то чушь наяву?"
      - "Впрочем, ладно, тебе не впервой."
      - "Слушай сюда. С того самого момента, как ты вчера сел в самолёт, и до этой самой секунды ты всё время находился вместе со мной и Лаффи."
      - "Мы приехали к Аосте для совместных испытаний оснастки типа II, а заодно чтобы взглянуть на его новое поколение ANTI-X."
      - "Усёк?"
  - char: "commander"
    side: "left"
    text:
      - "Усёк…… но…………"
      - "(Неужели это ещё один искусственно созданный виртуальный мир?)"

chapter3:
  rows:
  - char: "anzeel"
    side: "left"
    text:
      - "Но это всё потом, лучше взгляни-ка сюда! Ну как тебе фотка, что я только что сделала?"
  - char: "commander"
    side: "right"
    text:
      - "Это и есть…… новое поколение ANTI-X?"
  - char: "anzeel"
    side: "left"
    text:
      - "Хе-хе~ Милашка, правда?"
  - text:
      - "Ситуация была похожей на ту, с которой мы столкнулись ранее, и в то же время отличалась: на этот раз перед нами была не Дьявол, а Компилятор……"
  - char: "commander"
    side: "right"
    text:
      - "……Анзил, всё, что здесь находится, должно быть строго засекречено."
      - "Даже если ты сейчас наделаешь фоток, на выходе тебя всё равно заставят их удалить, разве нет……?"
  - char: "anzeel"
    side: "left"
    text:
      - "Чёрт! А ведь и правда……"
      - "Погоди-ка, с моим-то интеллектом я наверняка смогу что-нибудь придумать………… А, точно, есть идея!"
      - "Смотри: я фоткаю, отправляю снимки Аосте, а потом удаляю их со своего телефона."
      - "А когда мы вернёмся, я попрошу Аосте переслать их мне по официальным каналам под предлогом обмена материалами по проекту. И проблема решена!"
  - text:
      - "Ответ Анзил точь-в-точь совпадает с тем, что она говорила тогда…… Какое странное чувство, похожее на причудливое дежавю, вызванное временной аномалией."
  - char: "aoste"
    side: "right"
    text:
      - "Я ещё издалека услышал, как кто-то поминает меня всуе."
      - "Представляю вашему вниманию новое поколение ANTI-X! Ну, что скажете?!"
  - char: "anzeel"
    side: "left"
    text:
      - "Такая милашка! Но…… не кажется ли тебе, что у неё с Зеро есть какие-то общие черты?"
  - char: "commander"
    side: "right"
    text:
      - "Похоже, он питает особую слабость к беловолосым девочкам……"
  - char: "anzeel"
    side: "left"
    text:
      - "В точку! Я тоже это заметила. Ты и впрямь без ума от белых волос……!"
  - char: "aoste"
    side: "right"
    text:
      - "Кхм, проект всё-таки только на начальной стадии, поэтому я решил прибегнуть к уже проверенным и надёжным дизайнерским решениям."
      - "Имя ей — Компилятор!"
  - char: "anzeel"
    side: "left"
    text:
      - "М-да…… Всё в твоём репертуаре, диагноз ясен."
  - char: "aoste"
    side: "right"
    text:
      - "Могли бы хоть притвориться! Неужели столь знаменательный анонс не вызывает у вас ни малейшего душевного трепета?!"

chapter4:
  rows:
  - text:
      - "*динь* *динь*"
      - "...И снова этот звук колокольчика."
      - "Всё вокруг внезапно замерло, а затем в одно мгновение распалось на угловатые цветовые пятна."
  - char: "commander"
    side: "left"
    text:
      - "Да что же здесь, чёрт возьми, происходит?"
  - text:
      - "Я попытался шагнуть, но тело отказывалось слушаться."
  - char: "memphis"
    side: "right"
    text:
      - "……Сознание ещё не…… восстановилось……"
      - "……Вы меня слышите…… Командир……"
  - text:
      - "В глазах начало медленно темнеть. Прямо перед тем, как окончательно потерять сознание, я смутно расслышал голос Мемфис……?"

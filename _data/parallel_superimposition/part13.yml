chapter1:
  rows:
  - char: "tb"
    side: "left"
    text:
      - "Риск перегрузки: устранён. Все системы «Сердца Галактики» вернулись к штатному режиму работы."
      - "Критическое состояние: приостановлено. Эффективность темпорального модулятора восстановлена до 95%."
      - "Текущий статус: коэффициент замедления времени скорректирован до соотношения 1:1.5."
  - char: "memphis"
    side: "right"
    text:
      - "Слава богу…… Едва-едва успели."
      - "Раз уж временной коэффициент вернулся к норме 1 к 1.5, мы можем приступать к подготовке операции по экстренному извлечению сознания Командира."
      - "Хелена, можно переходить к следующему этапу."
  - char: "helena"
    side: "left"
    text:
      - "Да, снимаю защитную блокировку системы аварийного выброса…… Готово."
      - "Мисс Навигатор, дальше дело за вами……"
  - char: "tb"
    side: "right"
    text:
      - "Команда подтверждена: запускаю протокол безопасного извлечения сознания..."
      - "Внимание: мне не удаётся восстановить канал связи с Командиром."
      - "Внимание: не обнаружено никаких следов присутствия, связанных с Командиром."
      - "Внимание: возвращаемое значение пусто."
      - "Заключение: на данный момент сознание Командира отсутствует в ментальном пространстве Анкоридж, смоделированном «Линзой Реальности»."
  - char: "vestal"
    side: "left"
    text:
      - "……«На данный момент сознание Командира отсутствует в ментальном пространстве Анкоридж, смоделированном „Линзой Реальности“»?"
      - "Я не совсем понимаю…… Разве вся симуляция «Линзы Реальности» выполняется не на твоём мейнфрейме?"
      - "Как так получается, что ты вообще не можешь обнаружить никаких следов существования Командира?!"
  - char: "tb"
    side: "right"
    text:
      - "Запрос отклонен: я не могу ответить на данный вопрос."
      - "Текущий статус: соединение между Командиром и «Линзой Реальности» остаётся стабильным, что позволяет исключить непосредственную угрозу его жизни."
      - "Однако я не способна отследить какие-либо маркеры присутствия Командира."
      - "Предположение: сознание Командира в данный момент находится в скрытом секторе моего мейнфрейма, недоступном для моего прямого наблюдения."
  - char: "helena"
    side: "left"
    text:
      - "Скрытый сектор твоего собственного мейнфрейма, который ты не можешь напрямую наблюдать?"
      - "Я никогда не слышала о существовании подобных областей……"
  - char: "tb"
    side: "right"
    text:
      - "Ответ: это обусловлено тем, что ранее вы не обладали наивысшим уровнем допуска. В соответствии с протоколами безопасности, вы не имели права на получение данной информации."
  - char: "memphis"
    side: "left"
    text:
      - "Так, всем спокойно…… Для начала, мисс Навигатор, пожалуйста, проведите повторную диагностику. Мне нужно стопроцентное подтверждение, что сознанию Командира ничего не угрожает."
  - char: "tb"
    side: "right"
    text:
      - "Команда подтверждена: запускаю повторную проверку системы..."
      - "Результат подтверждён: соединение между Командиром и «Линзой Реальности» по-прежнему стабильно. На основании этого можно утверждать, что объект не находится в опасности."
  - char: "memphis"
    side: "left"
    text:
      - "……Раз так, у нас остаётся ещё один вариант."
      - "Пусть мы и не можем извлечь Командира вручную в принудительном порядке, но согласно базовым настройкам безопасности самой «Линзы Реальности»..."
      - "Как только поступает общая команда на отключение оборудования, «Линза» автоматически запускает внутренний протокол аварийного извлечения и поочерёдно закрывает все сектора симуляции."
      - "Таким образом система безопасно отключает и возвращает всех подключённых пользователей, даже если их точное местоположение в сети не определено."
      - "Мисс Навигатор, как считаете, такой план сработает?"
  - char: "tb"
    side: "right"
    text:
      - "Ответ: данный алгоритм применим."
  - char: "memphis"
    side: "left"
    text:
      - "Отлично! В таком случае, пожалуйста, приступайте к выполнению."
  - char: "tb"
    side: "right"
    text:
      - "Команда подтверждена: инициирую безопасное отключение «Линзы Реальности»..."
      - "Внимание: уровень допуска для выполнения данной операции недостаточен. Пожалуйста, введите новый код авторизации."
  - char: "vestal"
    side: "left"
    text:
      - "…А это ещё что такое? Разве мы до этого не использовали код доступа, чтобы получить наивысшие полномочия?"
  - char: "tb"
    side: "right"
    text:
      - "Ответ: ранее введённый код являлся одноразовым. Его действие автоматически прекратилось сразу после выполнения команды по повышению уровня тревоги базы «Море Звёзд» до «Красного»."
      - "Для выполнения текущей операции требуется ввести новый код подтверждения."
  - char: "memphis"
    side: "left"
    text:
      - "Как странно…… Для обычного отключения «Линзы Реальности» изначально не требовался настолько высокий уровень допуска."
      - "Неужели кто-то умудрился втайне переписать требования к правам доступа уже после начала нашего эксперимента?…"
  - char: "vestal"
    side: "right"
    text:
      - "Мемфис, оставим сложные головоломки на потом!"
      - "Сейчас нужно немедленно связаться с Саратогой и запросить у неё новый код авторизации!"
  - char: "memphis"
    side: "left"
    text:
      - "Да…… Похоже, ничего другого не остаётся. Хелена, подключай выделенную линию связи."
  - char: "helena"
    side: "right"
    text:
      - "........."
  - char: "memphis"
    side: "left"
    text:
      - "Э-э…… Хелена, что-то не так?"
  - char: "helena"
    side: "right"
    text:
      - "……Ты снова хочешь мне помочь?"
      - "……Я могу тебе доверять?"
      - "……Я поняла."
  - char: "vestal"
    side: "left"
    text:
      - "Хелена, ты сейчас…… с кем это разговаривала?"
  - char: "helena"
    side: "right"
    text:
      - "……Я получила новый код экстренной авторизации. И ещё……"
      - "Способ, который поможет вытащить Командира."
  - char: "memphis"
    side: "left"
    text:
      - "А……?"
  - char: "helena"
    side: "right"
    text:
      - "ТБ, код экстренной авторизации 406295604133. Инициатор запроса…… Хелена."
  - char: "tb"
    side: "left"
    text:
      - "Команда подтверждена, выполняю проверку..."
      - "Проверка экстренного кода авторизации для особых ситуаций завершена. Допуск предоставлен."
      - "Пожалуйста, введите первичные координаты для выполнения задачи:"
  - char: "helena"
    side: "right"
    text:
      - "……0+0.0004i，0+0.1374i，0+0.0001i，2464762576."
  - char: "tb"
    side: "left"
    text:
      - "Команда подтверждена. Пожалуйста, введите вторичные координаты для выполнения задачи:"
  - char: "helena"
    side: "right"
    text:
      - "32.2117, 64.4257, -25.3486……"
  - char: "tb"
    side: "left"
    text:
      - "Команда подтверждена. Пожалуйста, введите код дешифрования целевой области:"
  - char: "helena"
    side: "right"
    text:
      - "А вот это…… я введу вручную."
  - text:
      - "Хелена ввела строку символов на контрольной панели ТБ. В то же мгновение, как она нажала клавишу подтверждения, полупрозрачный интерфейс системы вдруг окрасился в глубокий, иссиня-чёрный цвет."
  - char: "tb"
    side: "left"
    text:
      - "Команда подтверждена. Запускаю программу дешифрования. Прогресс: 1%…… 2%……"
  - char: "memphis"
    side: "right"
    text:
      - "……???"
      - "Стой, подожди… Хелена, что ты сейчас сделала?! Я и знать не знала, что система Навигатора вообще поддерживает подобный режим работы!"
  - char: "vestal"
    side: "left"
    text:
      - "Хелена, откуда тебе известны такие тонкости? Кто, чёрт возьми, был тот человек, который только что говорил с тобой……?"
  - char: "helena"
    side: "right"
    text:
      - "…Здесь всё очень непросто."
      - "Простите…… Пожалуйста, давайте отложим эти расспросы до тех пор, пока мы не вытащим Командира."
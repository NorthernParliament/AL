chapter1:
  rows:
  - char: "prinz_eugen"
    side: "left"
    text:
      - "Хм-хм-хм~♪ Хм-хм~♪"
  - char: "z2"
    side: "right"
    text:
      - "Ойген, ты в хорошем настроении?"
  - char: "prinz_eugen"
    side: "left"
    text:
      - "Ещё бы~ Смотри, что я достала!"
  - char: "z2"
    side: "right"
    text:
      - "Это же…… данные по кораблям прототипам других фракций?"
  - char: "prinz_eugen"
    side: "left"
    text:
      - "В точку! Пришлось как следует попотеть, чтобы их раздобыть."
      - "Вот только информации по Империи Дракона всё ещё маловато. Если бы они включили Харбин в состав своей делегации и привезли её сюда на экскурсию, было бы просто чудесно……"
  - char: "z2"
    side: "right"
    text:
      - "Может, они специально её не привезли, чтобы защититься от таких любителей вынюхивать чужие секреты, как ты?"
  - char: "prinz_eugen"
    side: "left"
    text:
      - "Какие жадины…… Принц Рупрехт — наш новейший корабль прототип, но мы же всё равно отпустили её развлечься на выставке."
  - char: "z2"
    side: "right"
    text:
      - "Мне кажется, стоит всё-таки отличать демонстрацию военной мощи от защиты секретной информации……"
  - char: "prinz_eugen"
    side: "left"
    text:
      - "Да ладно, ладно~ Как там дела у Ульрих, никаких происшествий?"
  - char: "z2"
    side: "right"
    text:
      - "Никаких. В секторе, за который отвечает госпожа Ульрих, пока всё в порядке."
      - "Однако у меня есть и другие новости — делегация Империи Дракона возвращается домой уже завтра."
  - char: "prinz_eugen"
    side: "left"
    text:
      - "Завтра?! Чего это они так рано собрались уезжать?!"
      - "Странно…… Неужели они что-то пронюхали?"
      - "У них есть какие-нибудь планы на сегодняшний вечер? Встречи с другими фракциями или что-то в этом роде?"
  - char: "z2"
    side: "right"
    text:
      - "Пока что я не видела никаких отчётов на этот счёт, так что, скорее всего, нет……"
  - char: "prinz_eugen"
    side: "left"
    text:
      - "Отлично! Тогда немедленно займись организацией: сегодня вечером мы приглашаем делегацию Империи Дракона на ужин!"

chapter1:
  rows:
  - text:
      - "Биип... Биип... Биип..."
      - "Открыв глаза, на этот раз я увидел привычный интерьер «Сердца Галактики»."
  - char: "memphis"
    side: "left"
    text:
      - "Командир?! Какое счастье, вы наконец-то очнулись!"
  - char: "vestal"
    side: "right"
    text:
      - "Физические показатели Командира в норме, ни физических, ни ментальных повреждений не обнаружено!"
  - char: "helena"
    side: "left"
    text:
      - "…Какое облегчение. С возвращением…… Командир."
  - char: "commander"
    side: "right"
    text:
      - "Я вернулся."
      - "(Такое чувство, будто мне приснился очень-очень долгий сон.)"
      - "(Но на этот раз я совершенно чётко понимаю, что всё пережитое мной в этом сне отнюдь не было вымыслом.)"
      - "Кстати…… как там Анкоридж?"
  - char: "memphis"
    side: "left"
    text:
      - "Не волнуйтесь, с Анкоридж всё в полном порядке."
      - "Она очнулась даже раньше вас, и те аномальные блоки данных в её сознании полностью исчезли."
      - "Командир, ну вы даёте…… только-только открыли глаза, а уже беспокоитесь о других."
  - char: "vestal"
    side: "right"
    text:
      - "После того, как вы погрузились в Линзу Реальности, на нашей стороне произошла целая череда непредвиденных инцидентов……"
      - "К счастью, в самый критический момент Хелена получила неизвестно от кого коды высшего уровня доступа и цепочку координат, благодаря чему мы смогли так быстро вытащить вас в целости и сохранности."
  - char: "memphis"
    side: "left"
    text:
      - "Хелена, теперь, когда Командир очнулся и в безопасности, может, всё-таки объяснишь нам, что это было?"
  - char: "helena"
    side: "right"
    text:
      - "На самом деле……"
  - char: "commander"
    side: "left"
    text:
      - "……Это Хелена META передала их тебе, верно?"
  - char: "helena"
    side: "right"
    text:
      - "Верно! Командир, вы уже в курсе?"
  - char: "commander"
    side: "left"
    text:
      - "Догадался……"
  - char: "memphis"
    side: "right"
    text:
      - "Это та самая Хелена META, которая помогала вам и Нью-Джерси в бою против Сорю META неподалёку от Перл Харбор?!"
  - char: "commander"
    side: "left"
    text:
      - "Она самая. Пока я находился внутри Линзы Реальности, там тоже произошло много всего."
      - "Но об этом я подробно расскажу позже."
      - "ТБ, ты меня слышишь?"
  - char: "tb"
    side: "right"
    text:
      - "Я здесь, Командир."
  - char: "commander"
    side: "left"
    text:
      - "Тебе известно, кто такая Зеро?"
  - char: "tb"
    side: "right"
    text:
      - "Команда подтверждена: выполняется поиск..."
      - "Найдено 863 000 000 результатов. Пожалуйста, предоставьте дополнительные данные о «Зеро» для уточнения параметров поиска."
  - char: "commander"
    side: "left"
    text:
      - "Это сущность, похожая на тебя. Сможешь найти?"
  - char: "tb"
    side: "right"
    text:
      - "Команда подтверждена: выполняется поиск..."
      - "Найдено 0 результатов. Командир, в моей базе данных отсутствует информация о Зеро, соответствующая вашему описанию."
  - char: "commander"
    side: "left"
    text:
      - "……Ожидаемо. Эту загадку так просто не разгадать."
      - "И ещё кое-что."
      - "ТБ, за время моего пребывания в «Линзе Реальности», удалось ли тебе сохранить какие-нибудь данные?"
  - char: "tb"
    side: "right"
    text:
      - "Утвердительно. Пока вы выполняли задание, в мои дисковые массивы было собрано огромное количество данных, просочившихся из ментального пространства."
      - "В данный момент они находятся в процессе классификации и обработки."
  - char: "commander"
    side: "left"
    text:
      - "Сможешь найти среди них документацию по «Оснастке типа II»?"
  - char: "tb"
    side: "right"
    text:
      - "Команда подтверждена: выполняется поиск..."
      - "Результат подтверждён: среди собранных данных присутствует документация, касающаяся «Оснастки типа II»."
      - "Данные разделены на пять пакетов. Судя по их номенклатуре, они принадлежат Йорктаун, Хорнет, Лэнгли, Нортгемптон и Хамманн."
  - char: "commander"
    side: "left"
    text:
      - "…А для Лаффи данных нет?"
  - char: "tb"
    side: "right"
    text:
      - "Нет. Желаете, чтобы я провела повторный поиск?"
  - char: "commander"
    side: "left"
    text:
      - "Не нужно."
      - "(Даже этих пяти готовых пакетов данных с лихвой хватит, чтобы развить эту технологию и применить её к остальным!)"
  - char: "memphis"
    side: "right"
    text:
      - "Командир…… позвольте узнать, что такое «Оснастка типа II»?"

chapter2:
  rows:
  - char: "commander"
    side: "left"
    text:
      - "Совершенно новая технология."

chapter3:
  rows:
  - char: "commander"
    side: "left"
    text:
      - "Абсолютно новый путь."

chapter4:
  rows:
  - char: "commander"
    side: "left"
    text:
      - "Мемфис, немедленно свяжись с Саратогой. Передай ей, что дело не терпит отлагательств, и пусть она срочно и лично прибудет в Море Звёзд."
      - "Насчёт Йорктаун и Лексингтон………… у нас появилось решение."
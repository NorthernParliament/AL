chapter8:
  rows:
  - text:
      - "«В этом сне Энтерпрайз всё время сражалась изо всех сил.»"
      - "«Раз за разом падала, и раз за разом поднималась вновь.»"
      - "«Даже израненная, даже совершенно обессиленная.»"
      - "«А я ничего не могла поделать.»"
      - "«Я совсем ничего не могла сделать……»"
      - "«Почему всё обернулось именно так……»"
      - "«.........»"
      - "«Если бы я только смогла проснуться ещё раз……»"


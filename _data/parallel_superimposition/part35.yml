chapter10:
  rows:
  - char: "enterprise"
    side: "left"
    text:
      - "………………!"
  - char: "yorktown_ii"
    side: "right"
    text:
      - "Хоть это всего лишь симулированная среда «Моря Звёзд», солнечный свет и легкий ветерок здесь почти не отличить от настоящих."
      - "Впрочем, возможно, я просто уже не слишком хорошо помню, каковы настоящие солнце и ветер."
      - "Кажется, будто я проспала очень-очень долго и пропустила так много всего."
      - "А ещё я заставила тебя так долго справляться со всем в одиночку…… Ты ведь не перетруждалась?"
  - char: "enterprise"
    side: "left"
    text:
      - "……Сестра Йорктаун."

chapter11:
  rows:
  - char: "yorktown_ii"
    side: "right"
    text:
      - "Я вернулась, Энтерпрайз."
  - char: "enterprise"
    side: "left"
    text:
      - "Я……………"
  - char: "hornet_ii"
    side: "right"
    text:
      - "Вау, сестрёнка Энтерпрайз, ты что, примчалась сюда прямо с передовой?!"
      - "Зацени, как тебе моя новенькая экипировка?!"
  - char: "northampton_ii"
    side: "left"
    text:
      - "Хорнет, похоже, на этот раз бесчувственный чурбан — это ты……"
      - "Даже я понимаю, что вот так внезапно выскакивать было совершенно неуместно……"
  - char: "hornet_ii"
    side: "right"
    text:
      - "Э……?"
  - char: "hammann_ii"
    side: "left"
    text:
      - "Хамманн тоже так думает……"
      - "Хорнет, чурбан……"
  - char: "hornet_ii"
    side: "right"
    text:
      - "Э-э-э?!!"
  - char: "yorktown_ii"
    side: "left"
    text:
      - "Хе-хе, а разве так не лучше?"
      - "Сражающаяся леди Йорктаун восстановилась и возвращается в абсолютно новом обличье."
      - "Я верю, что за любой тьмой обязательно последует ослепительный свет счастья."
      - "Товарищи, давайте же вместе, рука об руку, шагнём в наше будущее!"

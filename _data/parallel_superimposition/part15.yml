chapter1:
  rows:
  - text:
      - "Спустя несколько часов «Комфортное путешествие №1» совершил мягкую посадку на взлётно-посадочную полосу острова Самос."

chapter2:
  rows:
  - char: "friedrich_der_grosse"
    side: "left"
    text:
      - "Ах да, напоследок поделюсь с тобой ещё одной зацепкой... Остров Самос."
      - "Если выкроишь время, почему бы тебе не изучить его повнимательнее?"
  - char: "commander"
    side: "right"
    text:
      - "……А что там?"
  - char: "friedrich_der_grosse"
    side: "left"
    text:
      - "Кто знает."

chapter3:
  rows:
  - char: "commander"
    side: "left"
    text:
      - "(Фридрих тогда действительно сделала особый акцент на этом месте……)"
      - "(И вот теперь я здесь. Что же именно ты так хотела, чтобы я тут расследовал?)"
  - char: "northampton_ii"
    side: "right"
    text:
      - "Солнце, пляж, шезлонги…… Вот вам и весь остров Самос."
  - char: "hornet_ii"
    side: "left"
    text:
      - "М-де…… Выглядит как самый обыкновенный курортный островок посреди океана!"
  - char: "anzeel"
    side: "right"
    text:
      - "Ну так! Я же ещё перед вылетом сказала, что везу вас всех отдыхать~"
  - char: "hornet_ii"
    side: "left"
    text:
      - "Оно-то так…… Но где военная база? Где патрули? Где лаборатории со строжайшим режимом охраны……?"
      - "Это место ну вообще никак не вяжется с мыслями о секретных военных объектах!"
  - char: "anzeel"
    side: "right"
    text:
      - "О-о~ Совсем забыла, что вы тут впервые. Хорнет, судя по всему, у тебя весьма специфическое представление о «секретных лабораториях»."
      - "Суть секретной лаборатории в том, что засекречены в первую очередь её исследования, а вовсе не её географическое положение."
      - "К примеру, во многих университетах полным-полно лабораторий, ведущих секретные проекты, и они вполне себе могут соседствовать дверь в дверь с какой-нибудь уличной забегаловкой со стритфудом~"
      - "Впрочем, само собой, без маскировки тут тоже не обошлось."
      - "Официально это место испокон веков именовалось «Институтом изучения морских рыб острова Самос»."
      - "Да и к тому же, на момент своего основания это заведение действительно занималось исключительно рыбками."
      - "Так продолжалось до определённого момента, пока объект не перешёл под крыло военных, а теперь и вовсе превратился в главную постоянную резиденцию Аосте."
      - "Насчёт причин, почему он выбрал именно эту глушь, он по привычке отделался фразой, что у него «свои соображения»."
      - "Хотя, глядя по сторонам… Кто знает, может, ему просто по душе, когда вокруг песчаный пляж и толпы девушек в купальниках?~"
      - "Кстати, об этом! Девочки, вы все приготовили купальники?"
  - char: "hornet_ii"
    side: "left"
    text:
      - "Э-э…… Нет?"
  - char: "yorktown_ii"
    side: "right"
    text:
      - "У меня тоже нет…… Думаю, никто из нас не догадался его взять."
  - char: "langley_ii"
    side: "left"
    text:
      - "Да, ведь мы, честно говоря, не восприняли ваши слова о пляжном отдыхе всерьёз……"
  - char: "anzeel"
    side: "right"
    text:
      - "Ладно, картина ясна. Значит, чуть позже организуем закупку пляжного гардероба……"
  - char: "commander"
    side: "left"
    text:
      - "Если мне не изменяет память, мы прилетели на остров Самос по приглашению доктора Аосте, и у нас тут вроде как есть дела поважнее……"
      - "Как быть с испытаниями, которые мы должны провести совместно с ANTI-X?"
  - char: "anzeel"
    side: "right"
    text:
      - "Ой, да после тестов времени на веселье будет хоть отбавляй! Какое море без купальников, ты чего!"
      - "А впрочем…… Ты подал мне отличную мысль. Нам ведь даже не обязательно утруждать себя походами по магазинам……"
      - "Я помню, что в здешнем институте есть специальное оборудование для производства защитной экипировки. Почему бы просто не заставить эти станки наклепать нам партию купальников?"
      - "И качество будет на высоте, и фасон с деталями можно настроить индивидуально под каждую. Идеально же!"
  - char: "commander"
    side: "left"
    text:
      - "(У меня возникло стойкое ощущение, что Анзил только что озвучила какую-то совершенно дикую идею……)"
  - char: "yorktown_ii"
    side: "right"
    text:
      - "……Доктор, а так вообще можно? Использовать такие мощности ради подобного?"
  - char: "anzeel"
    side: "left"
    text:
      - "Да бросьте, всё в порядке! Мы, между прочим, проделали такой долгий путь ради участия в совместном проекте. Мы имеем полное право на сервис подобного уровня!"
  - char: "hornet_ii"
    side: "right"
    text:
      - "……В этом вся Анзил. Настоящий гений."
  - char: "anzeel"
    side: "left"
    text:
      - "Так, ну-ка…… Если я всё правильно помню, вход в институт находится сразу за этой рощей. Не отставайте и смотрите не потеряйтесь!~"


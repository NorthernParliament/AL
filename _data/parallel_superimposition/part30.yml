chapter1:
  rows:
  - char: "belfast"
    side: "left"
    text:
      - "……Говорит Белфаст. Каковы результаты расследования касательно «Моря Звёзд»?"
      - "……Так я и думала. Поняла."
      - "……Однако?"
      - "……Значит, после того как Командир сошел на берег, он еще долго ехал на машине вглубь материка, так?"
      - "……Ясно. Эта информация крайне важна."
      - "……Я доложу об этом Её Величеству."
      - "……Остаётся лишь надеяться, что Союз Орла не втянул Командира ни в какие опасные авантюры."
      - "……Пожалуйста, продолжайте наблюдение. Конец связи."
  - text:
      - "Ещё одна красная нить была приколота кнопкой к карте."
      - "Запутанные зацепки соединялись вместе, сплетаясь в тревожный и опасный водоворот."
  - char: "belfast"
    side: "left"
    text:
      - "Даже действия Союза Орла стали совершенно непредсказуемыми……"
      - "Её Величество была права. Грядёт буря."

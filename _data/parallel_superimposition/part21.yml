chapter1:
  rows:
  - text:
      - "Некоторое время спустя артиллерийская фаза совместных испытаний подошла к концу..."
  - char: "northampton_ii"
    side: "left"
    text:
      - "И представить не могла, что разница между стрельбой до усиления и после окажется настолько колоссальной……"
      - "В интерфейсе отображалась вся структура цели, параметры её брони и даже текущее состояние каждого отдельного бронелиста."
      - "Плюс постоянные подсказки по приоритетным целям и невероятно точные баллистические корректировки……"
  - char: "hornet_ii"
    side: "right"
    text:
      - "Это типа как врубить в игре автоприцел и подсветить все уязвимые зоны, да?"
  - char: "northampton_ii"
    side: "left"
    text:
      - "Я читами никогда не пользовалась, но по ощущениям, наверное, один в один……"
  - char: "the_devil"
    side: "right"
    text:
      - "Следующий этап — торпедные испытания. На этот раз участвуют не только мисс Хамманн и мисс Мемфис, авианосцы тоже могут поднять в воздух свои торпедоносцы."
  - char: "yorktown_ii"
    side: "left"
    text:
      - "С помощью своих модулей поддержки ты можешь повысить точность сброса торпед, верно?"
  - char: "the_devil"
    side: "right"
    text:
      - "Не только~ Я могу помочь торпедоносцам, у которых нет систем многоцелевого захвата, брать на прицел сразу несколько целей одновременно."
      - "А ещё — ювелирно корректировать их угол атаки в полёте и даже дистанционно управлять траекторией движения уже выпущенных торпед в воде..."
      - "И совершенно неважно, что сами по себе эти торпеды изначально не являются самонаводящимися!~"
  - char: "yorktown_ii"
    side: "left"
    text:
      - "Но как вообще возможно совершать подобные вещи?…"
  - char: "the_devil"
    side: "right"
    text:
      - "Силой передовой науки?"
      - "У меня в арсенале ещё уйма самых разных протоколов поддержки, так что предлагаю вам изучить их лично в ходе дальнейших тестов!~"
  - char: "hornet_ii"
    side: "left"
    text:
      - "Так чего мы ждем? Скорее начинаем, мне уже не терпится увидеть, до какого предела мы сможем разогнать наши показатели!"
  - char: "the_devil"
    side: "right"
    text:
      - "Договорились. Секундочку внимания, новая флотилия мишеней выходит на позиции!~"

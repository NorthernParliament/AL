chapter1:
  rows:
  - text:
      - "После испытаний артиллерии и торпед наша группа успешно завершила целую серию тестов по бомбометанию, разведке, радиоэлектронной борьбе и прочим дисциплинам."
      - "Наконец, совместная фаза испытаний подошла к концу, и пришло время для боевых столкновений..."
  - char: "hornet_ii"
    side: "left"
    text:
      - "Я-то думала, что это будет тяжелая работенка…… а на деле я получила чистейший кайф!"
      - "Дьявол, ну и Дьявол, ты просто идеальная машина поддержки!"
      - "Если мы когда-нибудь окажемся вместе на настоящем поле боя, обязательно присматривай за мной."
  - char: "the_devil"
    side: "right"
    text:
      - "Само собой, если выпадет такая возможность — непременно."
  - char: "yorktown_ii"
    side: "left"
    text:
      - "Война…… Вот как. Если бы это было в наших силах, лучше бы войны вообще никогда не было."
  - char: "hornet_ii"
    side: "right"
    text:
      - "Конечно! Сестрёнка Йорктаун, я же просто к слову сказала: гипотетически, если бы началась война!"
  - char: "yorktown_ii"
    side: "left"
    text:
      - "Ничего страшного, я прекрасно осознаю наш долг."
      - "Хоть я и не желаю войны, но если она всё же постучится в наши двери, я ни за что не отступлю."
  - text:
      - "Йорктаун, стоящая сейчас передо мной, полностью слилась с тем образом, что хранился в моей памяти……"
      - "Пусть время и пространство нашей встречи иные, но Йорктаун всегда остаётся Йорктаун……"
  - char: "commander"
    side: "left"
    text:
      - "Дьявол, мы можем начинать боевые испытания?"
  - char: "the_devil"
    side: "right"
    text:
      - "Без проблем, с моей стороны все приготовления завершены."
      - "В этой фазе боевого противостояния вам, Командир, придётся продемонстрировать все свои навыки управления."
      - "Но перед тем, как мы официально начнём, позвольте мне вкратце описать свой боевой стиль."
      - "Как я уже говорила ранее, моя основная роль — это поддержка союзников."
      - "Тем не менее, я оснащена определённым арсеналом вооружения и обладаю выдающейся маневренностью, чтобы уметь постоять за себя в стандартных боевых условиях."
      - "В конце концов, если юнит поддержки сам становится обузой, требующей постоянной защиты от команды, то в нём нет никакого смысла."
      - "Однако я не предназначена для лобовых столкновений."
      - "При встрече с противником я буду использовать свою маневренность, чтобы заманить его под шквальный огонь союзников, стараясь всеми силами избегать прямых дуэлей один на один."
  - char: "yorktown_ii"
    side: "left"
    text:
      - "Вот оно как…… Но в предстоящих боевых учениях у тебя нет союзников, на которых ты могла бы опереться."
      - "Как же ты собираешься реализовывать свои преимущества?"
  - char: "hammann_ii"
    side: "right"
    text:
      - "Кажется, против тебя одной и Хамманн будет достаточно……"
  - char: "the_devil"
    side: "left"
    text:
      - "А вот это мы ещё посмотрим~ Я же упоминала ранее, что ко мне присоединится несколько беспилотных кораблей с настроенными правилами для учений."
      - "Посмотрите-ка, а вот и они."
  - char: "langley_ii"
    side: "right"
    text:
      - "Йорктаун…… ты это видишь? На радарах внезапно появилась целая уйма неопознанных целей, нас взяли в кольцо."
  - char: "yorktown_ii"
    side: "left"
    text:
      - "Это и есть те самые………… беспилотные корабли, о которых ты говорила? Но они выглядят как гуманоидные боевые единицы, прямо как ты."
  - char: "the_devil"
    side: "right"
    text:
      - "Верно. Как-никак мы — ANTI-X. Пусть мы и выглядим как люди, по своей сути мы — машины, управляемые ИИ, поэтому называть нас беспилотниками вполне уместно."
  - char: "yorktown_ii"
    side: "left"
    text:
      - "И ты только что произвела их, так же как те корабли-мишени?"
  - char: "the_devil"
    side: "right"
    text:
      - "А вот и нет. Моя оснастка пока не обладает функцией производства Инфорсеров. Я подготовила их заранее и спрятала в этой акватории."
      - "причина, по которой вы до сих пор ничего не замечали, кроется в том, что вскоре после нашего отплытия я уже подавила все ваши электронные системы~"
  - char: "hornet_ii"
    side: "left"
    text:
      - "Эй?! Какая же ты опасная, Дьявол!"
  - char: "northampton_ii"
    side: "right"
    text:
      - "А ведь кто-то только что просил Дьявола «присматривать» за ней……"
  - char: "the_devil"
    side: "left"
    text:
      - "Хе-хе, считайте это небольшим бонусным уроком по радиоэлектронной борьбе. Никогда не теряйте бдительности."
      - "А теперь позвольте представить вам два типа беспилотных кораблей, которые заменяют мне правую и левую руку."
      - "Инфорсер XV «Temptation» (Искушение) — модель, использующая преимущественно палубную авиацию и легкое вооружение, превосходно справляющаяся с изматывающими атаками и поддержкой."
      - "Инфорсер XV «Restriction» (Ограничение) — модель, вооруженная корабельными орудиями и тяжелым вооружением, специализирующаяся на прямых столкновениях."
      - "Добавьте к этому мою манёвренность и усиления, и вы поймёте, что боевую мощь нашей эскадры ANTI-X не стоит недооценивать."
      - "Если расслабитесь, я могу разнести вас в пух и прах~"
  - char: "langley_ii"
    side: "right"
    text:
      - "Йорктаун, Командир…… Я внимательно изучила данные………… Каждая из этих боевых единиц, именуемых Инфорсерами, обладает пугающей огневой мощью."
      - "Если мы не отнесёмся к этому бою со всей серьёзностью, мы и вправду можем проиграть……"
  - char: "commander"
    side: "left"
    text:
      - "(Разумеется, я прекрасно осведомлён о боевой мощи Арбитров………)"
      - "(Но в оснастке типа II таится новая сила…… Если мы навалимся на неё всей командой, у нас вполне есть шансы на победу!)"
      - "Я думаю, мы всё равно победим!"
  - char: "yorktown_ii"
    side: "right"
    text:
      - "Да, Командир, мы выложимся на полную."
  - char: "the_devil"
    side: "left"
    text:
      - "У кого-нибудь ещё остались вопросы?"
  - char: "hornet_ii"
    side: "right"
    text:
      - "У меня целых два!"
  - char: "the_devil"
    side: "left"
    text:
      - "Внимательно слушаю~"
  - char: "hornet_ii"
    side: "right"
    text:
      - "Во-первых, когда начнутся тесты, ты продолжишь обеспечивать нас баффами?"
  - char: "the_devil"
    side: "left"
    text:
      - "К сожалению, нет~ Но зато я как следует усилю своих Инфорсеров, так что ждите сюрпризов."
  - char: "hornet_ii"
    side: "right"
    text:
      - "А-ха-ха-ха…… Тогда вопрос номер два. В этих испытаниях тоже будут использоваться боевые снаряды, как и раньше?"
  - char: "the_devil"
    side: "left"
    text:
      - "Ни в коем случае…… Раз уж это боевые учения, то и снаряды будут учебные, только учебные!"
  - char: "hornet_ii"
    side: "right"
    text:
      - "Фух…… Ну слава богу."
  - char: "the_devil"
    side: "left"
    text:
      - "Неужели мисс Хорнет уже растеряла всю уверенность?"
  - char: "hornet_ii"
    side: "right"
    text:
      - "Да ничего подобного! Просто теперь я могу не переживать, что покалечу тебя слишком сильно!"
  - char: "the_devil"
    side: "left"
    text:
      - "А-ха-ха-ха~ Что ж, скоро увидим, кто кого на поле боя~"
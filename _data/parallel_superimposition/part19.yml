chapter1:
  rows:
  - char: "the_devil"
    side: "left"
    text:
      - "Прежде чем мы официально дадим старт испытаниям, позвольте мне вкратце ввести вас в курс дела."
      - "Моё кодовое имя — Дьявол XV, но вы можете звать меня просто Дьявол."
      - "Хоть я и являюсь представителем новейшего поколения ANTI-X, моя главная специализация — это поддержка и обеспечение, а не штурмовые операции или прямые столкновения."
      - "По этой причине наши сегодняшние тесты пускай и делятся на две фазы — совместную и боевую, — основной упор мы сделаем именно на совместное маневрирование. Боевое столкновение будет носить скорее второстепенный характер."
  - char: "hornet_ii"
    side: "right"
    text:
      - "Короче говоря: сначала мы вместе расстреливаем мишени, а потом мы всей толпой бьём тебя?"
  - char: "the_devil"
    side: "left"
    text:
      - "Именно так~ Максимально простое и доходчивое объяснение."
  - char: "yorktown_ii"
    side: "right"
    text:
      - "То есть мы все объединяемся в одну команду против тебя одной?"
  - char: "the_devil"
    side: "left"
    text:
      - "Чуть позже ко мне присоединится несколько беспилотных кораблей с настроенными правилами для учений, но в общих чертах — да, расклад именно такой."
  - char: "hornet_ii"
    side: "right"
    text:
      - "Нам нужно будет сдерживать себя? Мы, вообще-то, чертовски сильны~"
  - char: "the_devil"
    side: "left"
    text:
      - "Благодарю за заботу, но в этом нет необходимости. Смысл боевой фазы как раз и заключается в том, чтобы прощупать абсолютный предел моих боевых возможностей. Так что атакуйте в полную силу, не стесняйтесь."
      - "Пожалуйста, примите пакет данных, который я вам отправила. Там содержится подробный регламент испытаний и все технические характеристики моей оснастки, можете свободно ознакомиться."
  - char: "hornet_ii"
    side: "right"
    text:
      - "Принято, сейчас глянем…… Э? «Недостаточно места на внутреннем накопителе терминала»?"
      - "……Нортгемптон, выручай, одолжи кусочек своего облачного хранилища!"
  - char: "northampton_ii"
    side: "left"
    text:
      - "Ничего себе, там настолько огромный объём данных? Секунду, дала доступ."
  - char: "langley_ii"
    side: "right"
    text:
      - "М-да………… Объём информации здесь и впрямь можно описать словом «колоссальный»."
      - "Судя по оглавлению, тут в основном детальные спецификации физического тела-носителя Дьявол."
      - "Не хочется вас расстраивать, но чтобы досконально разобрать все эти выкладки, нам потребуется уйма времени."
      - "Да и, честно говоря, сомневаюсь, что нам вообще нужно погружаться в такие дебри."
      - "Всё, что касается боевых характеристик её вооружения, станет понятно уже на практике во время самих тестов."
      - "Ага…… Вот, я нашла регламент учений. Для нас этот документ сейчас важнее всего."
      - "И ещё, Хорнет. Хоть данных тут и много, они всё же не настолько огромны, чтобы забить штатные накопители нашей экипировки. Почему у тебя-то память в ноль забилась?"
  - char: "hornet_ii"
    side: "left"
    text:
      - "А-ха-ха…… Возможно, это как-то связано с тем, что вчера вечером я скачала слишком много всего……"
      - "Ну а что? Нам ведь так редко дают легальный выход во внешнюю сеть! Грех было не накачать того, чего нет в нашей закрытой внутренней паутине!"
      - "К тому же всё оплачивалось с карточки Анзил, глупо было упускать такую халяву……"
  - char: "northampton_ii"
    side: "right"
    text:
      - "........."
  - char: "langley_ii"
    side: "left"
    text:
      - "........."
  - char: "yorktown_ii"
    side: "right"
    text:
      - "Простите её, пожалуйста…… Я обязательно проведу с ней воспитательную беседу и лично доложу о случившемся доктору."
  - char: "hammann_ii"
    side: "left"
    text:
      - "Хнык…… Сестра Йорктаун, Хамманн в этих графиках вообще ничего не понимает……"
  - char: "hornet_ii"
    side: "right"
    text:
      - "Я тоже!"
  - char: "yorktown_ii"
    side: "left"
    text:
      - "…Лэнгли, не могла бы ты тогда вкратце пересказать девочкам ключевые моменты?"
  - char: "langley_ii"
    side: "right"
    text:
      - "Хорошо. Тогда начнём, пожалуй, с конфигурации вооружения Дьявол..."

chapter2:
  rows:
  - char: "hammann_ii"
    side: "left"
    text:
      - "М-м-м………………"
      - "У-у-у………………"
      - "У-у-у-у-у………………"
  - char: "hornet_ii"
    side: "right"
    text:
      - "Всё, я больше не могу, я сейчас сломаюсь……"
      - "Хамманн, Хамманн, ты как?! Держись, только не падай в обморок!"
  - char: "hammann_ii"
    side: "left"
    text:
      - "А? Э-э…… На каком мы хоть слове остановились?……"
  - char: "langley_ii"
    side: "right"
    text:
      - "Ну как? До этого момента всем всё было понятно?"
  - char: "commander"
    side: "left"
    text:
      - "(Да уж…… Кажется, академический подход Лэнгли — далеко не лучший вариант для Хаммэн)"
      - "(Мы всё-таки не в учебном классе, так что здесь нужен куда более наглядный и живой метод обучения)"
      - "(Например...)"
      - "Дьявол, не могла бы ты подогнать поближе парочку своих особых палубных самолётов?"
  - char: "the_devil"
    side: "right"
    text:
      - "Разумеется! Я заодно сразу активирую режим содействия, чтобы вы смогли прочувствовать всё на личном опыте~"
  - char: "hammann_ii"
    side: "left"
    text:
      - "Ого-о…… Хаммэн чувствует, что из-за этих самолётов рядом скорость вычислений в моей системе резко выросла!"
  - char: "hornet_ii"
    side: "right"
    text:
      - "О-хо! Такое ощущение, будто меня под завязку накачали МОЩЬЮ!……"
  - char: "langley_ii"
    side: "left"
    text:
      - "Э-э…… Ну, собственно, то, что вы сейчас испытываете — это как раз то самое проявление эффекта усиления, о котором я только что говорила. Дьявол способна повышать характеристики союзников с помощью своих выносных модулей поддержки."
      - "В спецификации также указано, что чем больше её модулей подключается к вам, тем выше становится прирост боевой эффективности. Иными словами……"
  - char: "hammann_ii"
    side: "right"
    text:
      - "Хаммэн тоже чувствует, что она просто ПЕРЕПОЛНЕНА МОЩЬЮ!"
  - char: "hornet_ii"
    side: "left"
    text:
      - "Вау! Хамманн, ты чего так припустила-то?! Ну-ка, глянь, как я тебя сейчас обгоню!"
  - char: "langley_ii"
    side: "right"
    text:
      - "Ай-ай-ай……"
  - text:
      - "Лэнгли тяжело и затяжно вздохнула, что ознаменовало собой официальное и сокрушительное завершение лекционной части."
  - char: "langley_ii"
    side: "left"
    text:
      - "Что и требовалось доказать, Учитель, вы в этом деле куда способнее…… Считайте, я только что получила от вас отличный урок наглядного преподавания."
  - char: "yorktown_ii"
    side: "right"
    text:
      - "Ну что ты, Лэнгли, твой разбор тоже был очень структурированным и понятным……"
      - "Командир, я смотрю, девочки уже вовсю рвутся в бой. Может, начнём испытания прямо сейчас, как считаете?"
  - char: "commander"
    side: "left"
    text:
      - "Да, сухие цифры на бумаге всё равно не заменят реального опыта."
      - "Раз уж все так горят желанием, давайте прочувствуем новые технологии прямо в деле!"

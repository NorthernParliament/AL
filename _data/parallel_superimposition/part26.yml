chapter1:
  rows:
  - text:
      - "В этот самый момент битва, целью которой было уничтожение Арбитра Дьявол XV, шла полным ходом——"
  - char: "helena_meta"
    side: "left"
    status: "is-meta"
    text:
      - "Дьявол уже завершила построение своей «формации». Пока она находится в этом состоянии, не пытайтесь атаковать её основное тело напрямую."
      - "Для начала мы должны ослепить «Дьявола», выбив её глаза — Инфорсеров XV «Temptation» (Искушение)."
      - "Мемфис, обеспечь информационную поддержку."
  - char: "memphis_meta"
    side: "right"
    status: "is-purple"
    text:
      - "Поняла. Позиции и уязвимые точки всех Инфорсеров XV «Temptation» (Искушение) синхронизированы с объединённой боевой системой."
  - char: "langley_ii"
    side: "left"
    text:
      - "……Как вам вообще это удалось?"
  - char: "memphis_meta"
    side: "right"
    status: "is-purple"
    text:
      - "Неважно."
      - "Командир, направьте палубную авиацию в синхронную атаку на эти цели, прямо как вы делали во время учений против меня."
  - char: "commander"
    side: "left"
    text:
      - "Хелена, сможешь обеспечить всем всестороннее усиление, как в тот раз?"
  - char: "helena_meta"
    side: "right"
    status: "is-meta"
    text:
      - "Уже в процессе настройки~"
  - char: "commander"
    side: "left"
    text:
      - "Отлично. Йорктаун, Хорнет, Лэнгли, ваша задача — нанести удар строго по маркерам Мемфис."
  - char: "yorktown_ii"
    side: "right"
    text:
      - "Положитесь на нас."
  - char: "hornet_ii"
    side: "left"
    text:
      - "Великая Хорнет уже давно жаждет поквитаться!"
  - text:
      - "БАБАХ!!!"
  - char: "langley_ii"
    side: "left"
    text:
      - "Командир, удар нанесён…… Все цели уничтожены."
      - "От скорости до убойной мощи…… Характеристики нашей авиации возросли по всем статьям. Это всё твоих рук дело, Хелена?"
  - char: "helena_meta"
    side: "right"
    status: "is-meta"
    text:
      - "Ага"
  - char: "yorktown_ii"
    side: "left"
    text:
      - "Командир! Дьявол теряет высоту, она опускается обратно на воду!"
  - char: "helena_meta"
    side: "right"
    status: "is-meta"
    text:
      - "Естественно, ведь она готовится к контрудару."
      - "Далее: не вздумайте атаковать когти Дьявола — Инфорсеров XV «Restriction» (Ограничение). Это всего лишь приманки, чтобы втянуть несведущих в изнурительный ближний бой."
      - "Без направляющих глаз когти — не более чем дубинки, которыми хаотично размахивают вслепую."
      - "Прежде чем Дьявол успеет перестроить свою «формацию», обойдите её когти и набросьтесь прямо на основное тело."
  - char: "commander"
    side: "left"
    text:
      - "Без проблем. Но на подготовку второй волны самолётов нужно время, ты сможешь ускорить этот процесс?"
  - char: "helena_meta"
    side: "right"
    status: "is-meta"
    text:
      - "Могу, но в этом нет необходимости. Говоря «наброситься прямо на основное тело», я имела в виду это в буквальном смысле."
      - "У меня есть способ взломать системы Дьявол и принудительно отключить большую часть её вооружения."
      - "Но поскольку контроль над всем этим пространством сейчас утрачен, я не могу сделать это дистанционно."
  - text:
      - "Сказав это, Хелена достала неизвестно откуда устройство, похожее на чёрный медицинский шприц."
  - char: "helena_meta"
    side: "right"
    status: "is-meta"
    text:
      - "Видите этот прибор? Вонзаете его прямо в грудь Дьявол, и дело в шляпе."
  - char: "commander"
    side: "left"
    text:
      - "……Вот оно как. Действительно, «наброситься» в самом буквальном смысле."
      - "Но такой манёвр слишком опасен."
  - char: "helena_meta"
    side: "right"
    status: "is-meta"
    text:
      - "Ага."
      - "Тот, кто возьмётся за эту задачу, должен будет на огромной скорости прорваться сквозь заградительную сеть Инфорсеров, уклониться от зенитной артиллерии ближнего радиуса Дьявола и в самом конце ювелирно всадить этот прибор ей в грудь."
      - "Но это наш единственный шанс."
      - "Стоит Дьявол завершить перестроение «формации», как битва превратится в войну на истощение."
      - "А вы ведь не забыли, что контроль над этим пространством уже перешёл к ней?"
  - char: "hammann_ii"
    side: "left"
    text:
      - "……Хм, значит, нужно просто быть достаточно ловкой и быстрой, так?"
      - "Да для Хамманн это раз плюнуть!"
      - "Командир, поручите это задание Хамманн!"
  - char: "northampton_ii"
    side: "right"
    text:
      - "И мне. Командир, я отправлюсь вместе с Хамманн."
      - "В случае необходимости я прикрою её от атак и гарантирую, что Хамманн доберётся до Дьявол."
  - char: "commander"
    side: "left"
    text:
      - "……Только будьте предельно осторожны."
      - "Мемфис, проложи оптимальный маршрут. Всем скорректировать векторы атак, мы должны пробить для Хамманн коридор!"

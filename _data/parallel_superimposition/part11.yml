chapter1:
  rows:
  - text:
      - "БАБАХ!!!"
  - char: "langley_ii"
    side: "left"
    text:
      - "Есть! Командиру, наши авиагруппы успешно уничтожили все отмеченные цели. Система связи «синих» погрузилась в полный хаос!"
  - char: "northampton_ii_rad"
    side: "right"
    text:
      - "А Учитель, оказывается, и впрямь невероятно хорош в роли командующего флотом~"
  - char: "yorktown_ii_rad"
    side: "left"
    text:
      - "Натиск противника заметно ослаб. Мы можем переходить в контратаку?"
  - char: "commander"
    side: "right"
    text:
      - "Да, без проблем. Действуем по первоначальному плану: зачищаем цели поочерёдно, ориентируясь на их уровень угрозы."
  - char: "hammann_ii_rad"
    side: "left"
    text:
      - "Сестра Йорктаун! Ну как, Хамманн хорошо справилась?"
  - char: "yorktown_ii_rad"
    side: "right"
    text:
      - "Твоя блестящая противолодочная оборона выиграла для нас драгоценное время. Ты большая умница~"
  - char: "hammann_ii_rad"
    side: "left"
    text:
      - "Хе-хе-хе……"
  - char: "hornet_ii_rad"
    side: "right"
    text:
      - "Слушайте, а всё оказалось не так уж и сложно! Противник-то, как погляжу, так себе..."
  - char: "yorktown_ii_rad"
    side: "left"
    text:
      - "Бой ещё не окончен, Хорнет, не теряй голову от первого успеха."
  - char: "hornet_ii_rad"
    side: "right"
    text:
      - "Сестрица Йорктаун, ты слишком осторожничаешь~ Основная армада Мемфис уже разбита в пух и прах, что она нам теперь сделает?"
  - text:
      - "Разгром главных сил «синего» флота одним мощным ударом действительно стал крупной стратегической победой на данном этапе."
      - "Однако настораживало то, что со стороны Мемфис не последовало вообще никакой ответной реакции."
      - "Это был опасный сигнал, говорящий лишь об одном: Мемфис оперативно сменила тактику."
      - "Пожалуй, здесь стоило поменяться с ней местами и взглянуть на ситуацию её глазами. Раз мы смогли нащупать уязвимость в построении «синих», то и она, без сомнения, способна на зеркальный ход."
      - "Слабые стороны «красного» флота лежали на поверхности: при колоссальной ударной мощи авианосцев наши силы охранения были критически, просто подавляюще малы."
      - "А острая нехватка эскортных кораблей неизбежно ведёт к фатальным слепым зонам…"
      - "Если в воздухе мы ещё могли компенсировать дефицит ПВО палубными истребителями, то под водой……"
  - char: "langley_ii"
    side: "left"
    text:
      - "Командир, ударная операция полностью завершена. Основные силы «синих» ликвидированы. Потери наших палубных самолётов превысили сорок процентов, но среди личного состава пострадавших нет."
      - "На данный момент контрмер со стороны противника не зафиксировано. Каков наш дальнейший план действий?"
  - char: "commander"
    side: "right"
    text:
      - "Изменяем боевое построение. Лэнгли, Йорктаун — немедленно выдвигайтесь в сектор к Нортгемптон и Хорнет."
      - "Хамманн, возвращайся к штабному кораблю и принимай на себя обязанности по его охране вместо Лэнгли."
      - "В то же время с помощью средств РЭБ замаскируйте реальный сигнал Хамманн и создайте ложную тепловую сигнатуру, будто она всё ещё идёт вместе с вами."
      - "...Мы сможем это провернуть?"
  - char: "langley_ii"
    side: "left"
    text:
      - "Без проблем, предоставьте это мне!"
  - char: "yorktown_ii_rad"
    side: "right"
    text:
      - "Но сигнал самого штабного корабля остаётся открытым. Если мы перегруппируемся подобным образом, то в глазах Мемфис командный центр окажется абсолютно беззащитным..."
      - "Командир, вы хотите использовать себя в качестве приманки, чтобы заставить Мемфис раскрыть карты?!"
  - char: "commander"
    side: "left"
    text:
      - "Если мои смутные подозрения верны... это стоит того."
      - "Йорктаун, не забывай про главное условие победы в этих учениях."
  - char: "yorktown_ii_rad"
    side: "right"
    text:
      - "……Условие победы?……! Я поняла ваш замысел."
  - char: "langley_ii"
    side: "left"
    text:
      - "Командир! Засечена группа новых вражеских сигналов. Похоже, Мемфис бросила в бой резервные силы, которые прятала до этого момента. Они на полной скорости идут прямо к штабному кораблю!"
  - char: "hornet_ii_rad"
    side: "right"
    text:
      - "Какая хитрая! Всё-таки припрятала козырь в рукаве."
  - char: "commander"
    side: "left"
    text:
      - "Но раз уж они обнаружили себя, бояться больше нечего. Девочки, придерживаемся прежней тактики. Начинаем второй раунд!"

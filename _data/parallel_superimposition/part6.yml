chapter1:
  rows:
  - text:
      - "Покинув кофейню «Гранат», мы с Йорктаун и остальными девушками не спеша прогуливались по улицам."
      - "Хотя это и был университетский кампус, его планировка казалась открытой: учебные корпуса, лаборатории и прочие университетские постройки были органично вписаны прямо в городские кварталы."
  - char: "yorktown_ii"
    side: "left"
    text:
      - "Эх… Доктор снова с головой ушла в работу."
  - char: "northampton_ii"
    side: "right"
    text:
      - "Нам не привыкать, доктор вечно проносится мимо как ураган."
  - char: "langley_ii"
    side: "left"
    text:
      - "Хорошо хоть Учителя она с собой не утащила, а то сегодняшний отпуск потерял бы половину своего очарования."
  - char: "hornet_ii"
    side: "right"
    text:
      - "Вот-вот! Но теперь с нами Учитель, так что всё супер~"
  - char: "northampton_ii"
    side: "left"
    text:
      - "Учитель, у вас есть на примете места, которые вы хотели бы посетить?"
  - text:
      - "Взяв из рук Нортгемптон планшет с открытой туристической картой, я принялся бесцельно листать экран."
      - "В глубине души крепло навязчивое желание исследовать здесь каждый метр, чтобы до конца разобраться, что же всё-таки происходит вокруг."
      - "Но… для начала нужно сосредоточиться на том, что прямо перед глазами, и двигаться шаг за шагом."
      - "Пока Анзил освободится, у нас в запасе есть ещё часов пять-шесть. Так что сперва..."
  - char: "commander"
    side: "left"
    text:
      - "Как насчёт того, чтобы заглянуть в торговый квартал?"
  - char: "hornet_ii"
    side: "right"
    text:
      - "О-о~ Пойдём по магазинам?! Я только за!"
  - char: "langley_ii"
    side: "left"
    text:
      - "Мы так редко куда-то выбираемся, даже не знаю, что бы такого купить…"
  - char: "hornet_ii"
    side: "right"
    text:
      - "Всё равно платит Анзил, так что предлагаю забить наши трюмы до отказа!"
  - char: "langley_ii"
    side: "left"
    text:
      - "Ну, это уже явный перебор, мы так просто заблокируем карту доктора."
  - char: "hornet_ii"
    side: "right"
    text:
      - "Раз скупить всё подряд не выйдет, тогда нужно хорошенько спланировать наш маршрут..."
  - char: "langley_ii"
    side: "left"
    text:
      - "И даже не думай поднимать в воздух палубную авиацию для разведки. Использование оснастки за пределами разрешённых зон строго запрещено."
  - char: "hornet_ii"
    side: "right"
    text:
      - "Эй, ты прочитала мои мысли!"
  - char: "hammann_ii"
    side: "left"
    text:
      - "Хамманн не знает, где тут торговый квартал……"
  - char: "northampton_ii"
    side: "right"
    text:
      - "Ничего страшного, предоставьте это мне. Я взяла с собой беспилотник."
  - text:
      - "Нортгемптон достала из своего рюкзака небольшой беспилотник чисто-белого цвета."
      - "В отличие от тех дронов, к которым я привык, в самом центре этого аппарата пульсировало едва заметное голубое свечение, оставляя какое-то странное ощущение."
  - char: "commander"
    side: "left"
    text:
      - "Этот беспилотник…"
  - char: "northampton_ii"
    side: "right"
    text:
      - "Да, это новейшая модель от компании AMZ."
      - "Доктор одолжила его мне перед самым выходом. Сказала, что с ним нам будет удобнее любоваться городскими пейзажами."
  - char: "hornet_ii"
    side: "left"
    text:
      - "И то правда… Вид отсюда открывается просто шикарный."
      - "О~ Я нашла сувенирную лавку с очень необычным дизайном! Выглядит интригующе, давайте заглянем туда в первую очередь?"

chapter2:
  rows:
  - char: "northampton_ii"
    side: "left"
    text:
      - "Вот это… и это… и вон то тоже… Кажется, на нашей базе таких вещей вообще не сыщешь."
  - char: "hornet_ii"
    side: "right"
    text:
      - "А посмотрите на это! Это же лимитированный мерч по тому вестерну, который мы недавно смотрели. Не ожидала встретить его здесь!"
  - char: "hammann_ii"
    side: "left"
    text:
      - "Эти наушники с кошачьими ушками… Такие милые."
  - char: "langley_ii"
    side: "right"
    text:
      - "Похоже, все уже абсолютно счастливы и ушли в шоппинг с головой."
      - "Ой… Йорктаун, а весь этот огромный список в твоих заметках — это всё сувениры, которые ты планируешь купить?……"
  - char: "yorktown_ii"
    side: "left"
    text:
      - "Да… Кое-что нужно привезти Энтерпрайз и остальным девочкам, что-то — Мемфис и доктор Анзил."
      - "Ну и ещё… нужно обязательно выбрать подарок для Учителя."
  - char: "hornet_ii"
    side: "right"
    text:
      - "Э-э? Что-что? Кажется, я услышала кое-что крайне любопытное!"
      - "Дай-ка гляну…… Всё ясно! Вот эта вещь стопроцентно предназначена в подарок Учителю, я угадала?"
      - "Хе-хе, я отлично понимаю, что у тебя на уме, сестрица Йорктаун!"
      - "Я сейчас как раз позову Учителя..."
  - char: "yorktown_ii"
    side: "left"
    text:
      - "Подожди… Я ведь ещё не определилась окончательно, не нужно устраивать из этого шумиху!"

chapter3:
  rows:
  - char: "hornet_ii"
    side: "left"
    text:
      - "Фух………… Закупились по полной! Что дальше?…… О, давайте заглянем вон в то большое здание!"
  - char: "hammann_ii"
    side: "right"
    text:
      - "М-м…… А Хамманн хочет пойти посмотреть на ту лавку с котиками."
  - char: "yorktown_ii"
    side: "left"
    text:
      - "И то верно, нельзя же бесконечно скупать всё подряд."

chapter4:
  rows:
  - char: "bon_omm_richard_ad"
    side: "left"
    text:
      - "Всем привет, с вами Бон Омм Ричард! Фильм «Финальный Отсчёт», в котором я сыграла главную роль, уже идёт во всех кинотеатрах!"
      - "Я буду очень рада, если вы выберете время и оцените его на большом экране!"
  - char: "ad_voice"
    side: "left"
    text:
      - "«Финальный Отсчёт» — самый ожидаемый мировой блокбастер этого года уже в прокате!"
      - "Купите билет прямо сейчас и получите шанс выиграть роскошный трёхдневный тур в гавань Пёрл-Харбор!"
  - char: "hornet_ii"
    side: "right"
    text:
      - "Вау, народ, гляньте-ка! Это же Бон Омм Ричард!"
  - char: "northampton_ii"
    side: "left"
    text:
      - "Да уж, её реклама тут буквально на каждом шагу…"
  - char: "hornet_ii"
    side: "right"
    text:
      - "А помните, когда мы виделись с ней в прошлый раз, она ещё напустила таинственности и твердила, что участвует в каком-то секретном проекте!"
      - "Кто же знал, что она просто сбежала сниматься в кино ради забавы!"
      - "Везёт же… Неужели это и есть те самые привилегии официального представителя ВМС Федерации?"
  - char: "yorktown_ii"
    side: "left"
    text:
      - "Определённые привилегии у неё, конечно, есть, но Ричард выступает от нашего лица. Участвуя в подобных публичных мероприятиях, она испытывает колоссальное давление."
      - "Ей приходится взвешивать каждое слово и обдумывать каждый жест, прежде чем что-то сделать. Думаю, мы бы точно не справились с такой нагрузкой."
      - "Вот даже сейчас, пока мы тут спокойно гуляем по магазинам, она, вполне возможно, уже вовсю мчится на очередные съёмки или встречу."
  - char: "hornet_ii"
    side: "right"
    text:
      - "…Об этом я как-то не подумала. Не-не-не, я как представлю такое, мне аж не по себе."
      - "Надо же, а ей, оказывается, приходится так несладко. Ладно, куплю-ка я ей тоже какой-нибудь подарок, привезём на базу."
      - "О, точно! Нортгемптон, давай сделаем общую фотку с твоего беспилотника!"
      - "Чтобы в кадр попали все мы, а на заднем плане — Ричард на этом рекламном щите!"
      - "Если она узнает, что пропустила такую прогулку с Учителем и доктором, она же там просто лопнет от зависти и обиды."
      - "А так, если округлить, получится, что она вроде как тоже побывала с нами~"
      - "Так что нечего терять время… Ну же, Учитель, вставай по центру! Хамманн, Лэнгли, вы вставайте вот здесь… А ты, сестрица Йорктаун, встань прямо рядышком с Учителем!"
  - char: "northampton_ii"
    side: "left"
    text:
      - "Отлично, все на своих местах... Раз, два, улыбочку!..."

chapter5:
  rows:
  - char: "northampton_ii"
    side: "left"
    text:
      - "Угу, готово!"
  - char: "hornet_ii"
    side: "right"
    text:
      - "Хе-хе-хе, супер~ Скинь её сначала мне, а я попозже отправлю ей на имейл."
      - "А теперь у меня предложение: раз уж мы наткнулись на эту рекламу, как насчёт того, чтобы прямо сейчас пойти и всем вместе посмотреть фильм с Ричард?"
      - "Учителю ведь тоже наверняка жутко интересно?"
  - char: "commander"
    side: "left"
    text:
      - "Конечно, давайте сходим вместе."
      - "(Бон Омм Ричард, значит… Не ожидал, что здесь я встречу кансен, с которой раньше никогда не виделся лично…)"
  - char: "hornet_ii"
    side: "right"
    text:
      - "Ура~ Тогда сестрица Йорктаун берёт на себя билеты, Нортгемптон ведёт нас по навигатору с дрона, а мы все выдвигаемся в сторону кинотеатра. Погнали!~"


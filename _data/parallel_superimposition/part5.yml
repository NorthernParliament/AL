chapter1:
  rows:
  - char: "anzeel"
    side: "left"
    text:
      - "Фух~ Знакомый вкус, знакомые ощущения."
      - "Сколько бы мест я ни объездила за эти годы, а здешняя паэлья с морепродуктами всё-таки самая лучшая."
  - char: "northampton_ii"
    side: "right"
    text:
      - "Мой запечённый рис с сыром тоже оказался невероятно вкусным."
  - char: "yorktown_ii"
    side: "left"
    text:
      - "Картошка фри с пиренейской ветчиной и сыром, которую заказала я, тоже очень хороша. Похоже, те края — настоящий рай для гурманов."
  - char: "langley_ii"
    side: "right"
    text:
      - "Я тут немного навела справки: ветчина, которую мы только что ели, кажется, визитная карточка Пиренеев, она знаменита на весь мир."
      - "И не только те блюда, что мы заказали — колбасы, фрикадельки, морепродукты и чизкейки у них тоже на высоте."
  - char: "anzeel"
    side: "left"
    text:
      - "Ты про баскский чизкейк, верно? Я как-то пробовала его, когда ездила туда в местный исследовательский институт по обмену опытом."
      - "Вот он действительно потрясающий!"
      - "Эх… До этой поездки у вас ведь практически не было возможности выбраться куда-либо за пределы базы…"
      - "Решено! В следующий раз, когда у меня наметится поездка в Пиренеи, я обязательно найду способ взять кого-нибудь из вас с собой~"
      - "А потом мы накупим целую гору вкусностей, притащим всё это на самолёт и привезём обратно, чтобы все могли попробовать!"
  - char: "northampton_ii"
    side: "right"
    text:
      - "Использовать частный самолёт ради такого… А у нас не возникнет проблем с бюджетом?……"
  - char: "anzeel"
    side: "left"
    text:
      - "Никаких проблем, всё в порядке! Путешествия — это тоже неотъемлемая часть процесса подготовки кансен!"
  - char: "yorktown_ii"
    side: "right"
    text:
      - "Доктор, насчёт названия этого ресторана… Я только что посмотрела в сети."
      - "«Granate» на пиренейском языке означает «цветок граната», верно? В этом названии скрыт какой-то символизм или язык цветов?"
  - char: "anzeel"
    side: "left"
    text:
      - "Именно так, угадала~ У каждого цветка есть своё значение, хоть в разных местах их трактовки немного и отличаются."
      - "«Granate» символизирует стремление к прекрасной жизни, а ещё, как говорят, означает «вот-вот упущенный шанс»."
      - "Если привязать это к нашему месту, то смысл, наверное, в том, что «такую изысканную еду больше нигде не найти»?"
      - "Ну, если брать в расчёт всю эту улицу и университетские столовые, то тут спорить не с чем, всё чистая правда."
      - "Можно сказать, это заведение — моё главное кулинарное воспоминание об университетских годах…"
      - "Ой, погодите, мне звонят… Хм? Из офиса Гарфилда?"
      - "Я отвечу на звонок, прошу меня извинить."
  - text:
      - "Взяв трубку, Анзил с довольно серьёзным видом вышла из кабинки. Честно говоря, я немного забеспокоился, не случилось ли чего."
      - "Однако, раз Йорктаун и остальные не выказывали ни капли тревоги, паниковать, скорее всего, не стоило…"
      - "Пока я размышлял об этом, разговор за столом неожиданно переключился на меня."
  - char: "hornet_ii"
    side: "left"
    text:
      - "Кстати говоря, вы помните тот курс лекций по истории войн Нового времени, который читал нам Учитель?"
  - char: "yorktown_ii"
    side: "right"
    text:
      - "Да, я до сих пор отчётливо помню главы из того учебника. Лекции Учителя по истории войн Нового времени принесли мне огромную пользу."
  - char: "northampton_ii"
    side: "left"
    text:
      - "Тактика тех времён тоже оставила неизгладимое впечатление…"
      - "Я и сейчас продолжаю углублённо изучать этот предмет, и для меня эти знания актуальны по сей день."
  - char: "langley_ii"
    side: "right"
    text:
      - "Совершенно верно. Теперь, когда я сама стала преподавателем, можно сказать, что я пошла по стопам Учителя."
  - char: "hammann_ii"
    side: "left"
    text:
      - "У Хамманн вопрос: а Учитель всё ещё занимается преподаванием?"
  - char: "yorktown_ii"
    side: "right"
    text:
      - "На самом деле Учитель изначально не был профессиональным преподавателем. Он взял на себя эту роль только потому, что до этого участвовал в нашем проекте."
      - "Если говорить о настоящем времени, то, насколько я помню, Учитель задействован в каком-то другом секретном проекте, верно?"
  - text:
      - "…Мяч оказался на моей стороне, но, в отличие от недавней беседы с Анзил, того странного автоматического чувства подсказки в голове больше не возникло."
      - "Пришлось импровизировать на ходу..."
  - char: "commander"
    side: "left"
    text:
      - "Да да."
  - char: "yorktown_ii"
    side: "right"
    text:
      - "Так я и думала. Раз проект секретный, то нам не стоит расспрашивать подробнее."
  - char: "anzeel"
    side: "left"
    text:
      - "Простите, простите, заставила вас всех ждать!"
  - char: "commander"
    side: "right"
    text:
      - "Что-то случилось?"
  - char: "anzeel"
    side: "left"
    text:
      - "Да, планы немного изменились. Гарфилд получил срочное задание и должен уехать уже сегодня вечером. Так что встречу перенесли на более раннее время, мне нужно выдвигаться прямо сейчас."
  - char: "hornet_ii"
    side: "right"
    text:
      - "Э-э, прямо сейчас? Но мы же ещё даже не доели…"
  - char: "anzeel"
    side: "left"
    text:
      - "Самой ужасно жаль, но ничего не поделать, дело срочное."
      - "Честно говоря, он, похоже, не в духе. Понятия не имею, что там стряслось, но велика вероятность, что ничего хорошего…"
      - "Вообще-то ассистент тоже должен был пойти со мной, но да ладно — «невыспавшийся» ассистент явно не лучший кандидат для разговора с «разгневанным» генералом."
      - "В этот раз я сама как-нибудь с ним разберусь. А ты взамен присмотри за Йорктаун и остальными, пока я не вернусь."
      - "Вот, держи карту, все расходы записывай на мой счёт. Можете спокойно пойти прогуляться по магазинам, в кино сходить — ни в чём себе не отказывайте!"
      - "Ну всё, я побежала. Повеселитесь тут сегодня как следует!~"

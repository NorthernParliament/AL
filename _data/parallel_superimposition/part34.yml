chapter1:
  rows:
  - char: "bon_omm_richard_rad"
    side: "left"
    status: "is-yellow"
    text:
      - "Hello~ Я знаю, что кто-то обязательно увидит это послание."
      - "Прежде чем мы встретимся лично, давайте немного укрепим нашу связь~"
      - "Например, как насчет загадки?"
      - "«Взгляни на монарха в его величественном замке»."
      - "«Он смотрит вдаль из своего окна»."
      - "«Шесть верных генералов охраняют его в авангарде»."
      - "«А на стенах стоят бесчисленные воины с арбалетами»."
      - "Отгадка — это морское животное. Сможете догадаться, о ком речь?"
      - "А сейчас время на раздумья..."
      - "Время вышло!"
      - "Барабанная дробь! Ответ: «рак-отшельник». Ну что, угадали?"
      - "«Величественный замок» — это пустая раковина, в которой живёт рак-отшельник."
      - "Раковины трубачей, мурексов, натик — всё это может стать его новым домом~"
      - "«Шесть верных генералов» — это две пары ходильных ног и пара клешней рака-отшельника, которые торчат снаружи."
      - "Обычно он использует их для передвижения и охоты."
      - "Но не дайте себя одурачить! У раков-отшельников, как и у всех крабов, на самом деле четыре пары ног. Просто остальные две всегда спрятаны внутри раковины."
      - "«Бесчисленные воины с арбалетами» — это актинии, живущие с раком-отшельником в симбиозе."
      - "А вы знали, что актиния хоть и выглядит как растение, на самом деле является плотоядным животным?"
      - "Из-за отсутствия скелета актинии передвигаются очень и очень медленно."
      - "Но благодаря сотрудничеству с раком-отшельником, зона охоты актинии в одно мгновение колоссально расширяется. К тому же, ей достаются кусочки пищи, остающиеся после трапезы рака."
      - "Взамен актиния сражается за рака-отшельника, защищая его от естественных врагов своими ядовитыми щупальцами."
      - "Правда ведь, ядовитые щупальца актиний очень похожи на воинов, вооружённых арбалетами?~"
      - "Раки-отшельники такие умненькие! Они понимают ценность сотрудничества и знают, как скрыть свои слабости."
      - "Неудивительно, что они смогли стать грозными охотниками в океане, согласны?"
      - "Ну, пока-пока~ Если представится случай, увидимся в следующий раз~"

chapter1:
  rows:
  - text:
      - "Обе эскадры направлялись к своим заданным позициям. Боевые испытания начнутся официально, как только флоты займут свои места."
      - "Однако сейчас, до начала оставалось ещё несколько мгновений тишины."
  - char: "yorktown_ii"
    side: "left"
    text:
      - "......"
  - char: "commander"
    side: "right"
    text:
      - "Что-то тревожит, Йорктаун?"
  - char: "yorktown_ii"
    side: "left"
    text:
      - "Вы заметили……"
      - "……На самом деле, я хотела поблагодарить Учителя. Спасибо, что вы по-прежнему терпеливо остаётесь с нами, как и раньше……"
      - "Знаю, это может прозвучать по-детски, но…… увидев Учителя, я действительно почувствовала успокоение."
      - "Мне стало намного спокойнее…… Находиться рядом с Учителем — это всегда так тепло и чудесно."
      - "Но почему-то…… я чувствую, как моя тревога лишь нарастает."
      - "Сначала я думала, что это временное явление…… но время идёт, а это гнетущее чувство становится всё сильнее."
      - "Учитель совершенно не изменился, он всё такой же мягкий и надёжный, как и прежде."
      - "И всё же я чувствую…… какое-то отдаление от вас."
      - "Стоит мне лишь приблизиться к вам, как внутри невольно поднимается волна грусти."
      - "Забудьте, Учитель. Просто выбросьте мои слова из головы……"
      - "Наверное, дело вовсе не в вас, а во мне……"
      - "Должно быть, я просто слишком много накручиваю себя……"
  - char: "commander"
    side: "right"
    text:
      - "(Нет, твоя интуиция тебя не обманывает.)"
      - "(В конце концов, нынешний я не помнит того, что делал тот я из твоих воспоминаний……)"
      - "(И у меня нет тех общих воспоминаний о пережитом вместе, которые хранишь ты……)"
      - "(Но…… даже так…………)"
  - char: "hornet_ii_rad"
    side: "left"
    text:
      - "Прошу прощения, что прерываю..."
      - "Сестрёнка Йорктаун, не забудь после учений вручить Командиру тот самый тщательно выбранный подарочек!~"
  - char: "yorktown_ii"
    side: "right"
    text:
      - "Э……? Хорнет?!"
      - "О-ой, мамочки…… Я что, забыла отключиться от общего канала флота?"
  - char: "hornet_ii_rad"
    side: "left"
    text:
      - "ДАА!!!"
  - char: "yorktown_ii"
    side: "right"
    text:
      - "То, что я только что наговорила, ты…… вы все слышали?"
  - char: "hornet_ii"
    side: "left"
    text:
      - "ДАА!!!"
  - char: "yorktown_ii"
    side: "right"
    text:
      - "А-а-а………………………………………………………………………………………"
  - char: "commander"
    side: "left"
    text:
      - "Кхм…………"
      - "О каком таком подарке сейчас говорила Хорнет?"
  - char: "yorktown_ii"
    side: "right"
    text:
      - "А……? Это всё Хорнет выдумывает! Не слушайте её!"
      - "Учения вот-вот начнутся, так что давайте прекращайте витать в облаках и сосредоточьтесь на предстоящем бое!"
  - char: "memphis_rad"
    side: "left"
    text:
      - "……Йорктаун, твои чувства верны."
      - "Потому что я тоже это ощущаю……"
      - "Эту скорбь, сочащуюся с небес, из океана, с земли и даже из каждого дюйма воздуха вокруг нас……"
  - char: "yorktown_ii"
    side: "right"
    text:
      - "…Мемфис, с тобой всё в порядке?"
      - "Хоть я и сказала, что чувствую грусть, но не до такой же пугающей степени……"
  - char: "memphis_rad"
    side: "left"
    text:
      - "Прости…… Наверное, в последнее время навалилось слишком много всего, и стресс даёт о себе знать."
      - "Когда всё это закончится, я пойду и хорошенько высплюсь. Может, тогда всё вернётся на круги своя……"
      - "Обязательно вернётся……"
  - text:
      - "В словах Мемфис я услышал скрытую печаль и нотки отчаяния."
      - "……Что же ты на самом деле знаешь об этом пространстве и о моём текущем положении?"
      - "Кто ты такая сейчас, и какое бремя несёшь на своих плечах?……"
  - char: "hornet_ii"
    side: "left"
    text:
      - "Поддерживаю, поддерживаю! Как только разделаемся с тестами, нас ждёт несколько дней заслуженного отпуска!"
      - "И тогда можно будет спокойно перепутать день с ночью, гулять так гулять!"
  - char: "memphis_rad"
    side: "right"
    text:
      - "Да…… твоя правда. Давайте сначала взбодримся и разберёмся с насущными делами!"
      - "Командир, мне передать Дьявол, что мы вышли на заданные позиции?"
  - char: "commander"
    side: "left"
    text:
      - "Да. Пусть боевые испытания начнутся."
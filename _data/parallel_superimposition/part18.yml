chapter1:
  rows:
  - char: "aoste"
    side: "left"
    text:
      - "Можешь оставить нас, Зеро. Возвращайся к своим текущим задачам."
  - char: "tb_zero?"
    side: "right"
    text:
      - "Вас поняла, доктор Аосте."
  - char: "aoste"
    side: "left"
    text:
      - "Ну и как вам?"
      - "Перед вами — новое поколение ANTI-X. Каково ваше мнение?!"
  - char: "anzeel"
    side: "right"
    text:
      - "Она безумно милая! И самое главное — после Компилятор, Тестер и Пьюрифайер у нас наконец-то появилась не беловолосая девочка!"
  - char: "commander"
    side: "left"
    text:
      - "(А ведь и правда…… Среди Сирен… то есть Антиох, процент беловолосых и впрямь зашкаливает)."
  - char: "aoste"
    side: "right"
    text:
      - "Кхм…… В конце концов, этот проект только-только запущен. Использование уже проверенных, стабильных дизайнерских решений на первых порах вполне объяснимо."
  - char: "anzeel"
    side: "left"
    text:
      - "Ладно-ладно, ближе к делу."
      - "Ты ведь притащил нас в такую глушь явно не ради того, чтобы просто похвастаться новой моделью Антиох, верно?"
      - "Признавайся, ты ведь задействовал в этот раз какую-то технологию, в которой сам до конца не уверен?"
  - char: "aoste"
    side: "right"
    text:
      - "Новое поколение ANTI-X действительно имеет кардинальные отличия от всего, что мы создавали ранее……"
      - "Подобно тому, как ты внедрила Кубы Мудрости в разработку новейшей оснастки для своих девочек, мы применили схожую технологию и для оснастки нового поколения ANTI-X."
  - char: "anzeel"
    side: "left"
    text:
      - "Чего-о-о?!!!"
      - "Ты использовал…… Кубы Мудрости при создании Антиох?!"
      - "Нет…… Это же просто невозможно! В отличие от боевых кораблей, которые сотканы из чётких человеческих эмоций, идеалов и истории……"
      - "Как можно материализовать с помощью Куба Мудрости концепт, который был полностью, с чистого листа выдуман из головы?!"
  - char: "aoste"
    side: "right"
    text:
      - "Ты только не кипятись раньше времени, сначала выслушай меня до конца."
      - "Эксперименты по созданию ANTI-X напрямую с помощью Кубов Мудрости у меня действительно поголовно провалились, и как раз по той самой причине, которую ты только что озвучила."
      - "Однако в этот раз…… Твоя идея использовать Кубы Мудрости для разработки оснастки типа II натолкнула меня на мысль."
      - "Пускай сама концепция ANTI-X полностью вымышлена, но этого нельзя сказать о различных видах оружия и боевой техники, которыми они пользуются."
      - "Опираясь на этот подход, мы разработали особую модификацию Энергетического Куба, которая частично переняла определённые свойства Куба Мудрости."
      - "И затем мы внедрили эту версию Энергетического Куба непосредственно в процесс производства оснастки для ANTI-X."
      - "В итоге созданная нами новейшая оснастка не только обеспечивает куда более мощный приток энергии, но и несёт в себе некоторые свойства, присущие оснастке полноценных боевых кораблей."
      - "К примеру…… Кое-какие высокомерные пространственные складки, физику которых мы сами пока до конца не изучили."
      - "При этом ядро ANTI-X по-прежнему остаётся чистым искусственным интеллектом, так что подобная оснастка для Антиох — это всего лишь внешний заменяемый модуль, прямо как пилотируемый робот-костюм."
      - "Проще говоря…… Нам удалось нащупать лазейку."
  - char: "anzeel"
    side: "left"
    text:
      - "Вот оно как…… Что ж, это действительно крайне любопытный ход мыслей."
      - "Раз уж ты успешно продвинулся в этом направлении, то боевая эффективность Дьявол по сравнению со старыми моделями ANTI-X теперь должна быть просто небо и земля?"
  - char: "aoste"
    side: "right"
    text:
      - "Само собой~ Используя эту технологию, достаточно лишь выстроить чёткую теоретическую и логическую базу, чтобы обойти большинство технологических тупиков, с которыми мы сталкиваемся при производстве вооружения."
      - "Но чего именно мы уже добились — я пока сохраню в секрете. Сами всё увидите на грядущих совместных испытаниях."
      - "Тем не менее, эта технология всё ещё находится на сугубо экспериментальной стадии, и нам только предстоит устранить массу скрытых рисков и дефектов."
      - "Именно поэтому я и пригласил тебя, чтобы ты помогла мне провести эти комплексные тесты. Ну как, я достаточно доходчиво всё объяснил?"
  - char: "anzeel"
    side: "left"
    text:
      - "Да, теперь я полностью уловила суть."
      - "В этом весь ты…… Если данная технология получит масштабное применение, ANTI-X и впрямь смогут стать тем самым многообещающим мыслящим оружием нового поколения."
  - char: "aoste"
    side: "right"
    text:
      - "У вас двоих остались ещё какие-нибудь вопросы?"
  - char: "anzeel"
    side: "left"
    text:
      - "Пока я не увижу подробные отчёты, у меня вопросов нет. А у тебя, ассистент?"
  - text:
      - "……Благодаря разговору о дополнительных Кубах Мудрости, внедряемых в оснастку, в моей голове наконец-то окончательно оформился один важный вопрос."
      - "Интуиция подсказывала мне: во всём мире просто не существует людей, которые подошли бы для ответа на него лучше, чем эти двое."
  - char: "commander"
    side: "left"
    text:
      - "А что если..."
      - "Если Куб Мудрости девушки-корабля получит повреждения, можно ли с помощью этой технологии провести его безопасное восстановление, гарантируя при этом полную выживаемость самой кансен?"
  - char: "anzeel"
    side: "right"
    text:
      - "Хм-м………… Чисто теоретически это вполне осуществимо, но тут нужно детально анализировать каждый конкретный случай и степень тяжести повреждений."
      - "Куб Мудрости, который мы сейчас интегрируем в оснастку типа II, я для простоты назову «субкубом». Соответственно, тот Куб Мудрости, что формирует само существование и личность девушки-корабля, будет «главным кубом»."
      - "Наличие субкуба усиливает потенциал главного куба, и в его конструкцию действительно заложена функция частичного снятия нагрузки с основы."
  - char: "aoste"
    side: "left"
    text:
      - "Это как если бы организму добавили дополнительное сердце или лёгкое."
  - char: "anzeel"
    side: "right"
    text:
      - "Ну да…… Но какое же жуткое у тебя сравнение!"
      - "Ладно…… Скажем так, это похоже на подключение внешней системы искусственного кровообращения! Ты ведь знаешь, о каких аппаратах идёт речь? О тех, что используют во время сложных операций."
      - "Если главный куб повреждён лишь до определённой степени, то мы и впрямь можем заставить субкуб взять на себя бóльшую часть функций."
      - "И тогда, за счёт снижения нагрузки на главный куб, появится возможность полностью его восстановить."
      - "Но…… если главный куб разрушен до такой степени, что точка невозврата уже пройдена, тут мы бессильны."
      - "В конце концов, главный куб девушки-корабля невозможно просто взять и заменить на новый……"
      - "В общем и целом, эту разработку можно использовать как реанимационную технологию для спасения жизней, но она никак не потянет на технологию полноценного перерождения."
  - char: "commander"
    side: "left"
    text:
      - "Иными словами…… Пока степень повреждения главного куба остаётся в допустимых пределах, этот метод лечения сработает!"
  - char: "aoste"
    side: "right"
    text:
      - "Зато у ANTI-X подобные проблемы отсутствуют в принципе."
      - "Для Антиох как сама оснастка, так и их физические тела-носители — это не более чем расходные материалы, пригодные для массового серийного производства."
      - "Пока функционирует мейнфрейм, менять внешнее оборудование можно бесконечное число раз."
      - "А до тех пор, пока существуют резервные копии данных, можно сколько угодно раз заменять и сам мейнфрейм."
      - "Даже если в программе отдельного юнита произойдёт сбой, стоит ему подключиться к общей сети ANTI-X, как ошибка будет автоматически исправлена."
      - "Если же аномальный юнит решит уклониться от синхронизации с сетью, он попросту лишится доступа к ключевому вооружению. К тому же сеть без труда определит, какие именно единицы разорвали соединение, и своевременно примет соответствующие меры."
  - char: "anzeel"
    side: "left"
    text:
      - "«Примет меры»…… В этом весь ты, хладнокровный и беспощадный Аосте."
  - char: "aoste"
    side: "right"
    text:
      - "Ну-ну, побереги децибелы. Под «принятием мер» вовсе не обязательно подразумевается насилие. Это всего лишь способ, позволяющий одновременно гарантировать безопасность как всей системы в целом, так и каждого отдельного юнита."
      - "Если юнит отключается от сети, система маркирует его как аномального. Это в первую очередь помогает оперативно разыскать пропавшего, который мог угодить в беду, и вернуть его обратно в строй."
      - "Кстати, если тебе так интересна тема ANTI-X, я вполне могу организовать для тебя подходящий проект. Как насчёт того, чтобы возглавить команду исследователей?"
  - char: "anzeel"
    side: "left"
    text:
      - "Стоп! Переманивание сотрудников строго запрещено!"
  - char: "aoste"
    side: "right"
    text:
      - "Что ж, тогда на этом пустые разговоры можно закончить. Пора переходить к делу?"
  - char: "anzeel"
    side: "left"
    text:
      - "Без проблем. Только у меня к тебе осталось ещё пара сугубо личных вопросов, так что давай поручим проведение тестов моему ассистенту, ты не против?"
  - char: "aoste"
    side: "right"
    text:
      - "Разумеется, без проблем. Все подробные спецификации по грядущим испытаниям я уже передал Дьявол, так что можешь уточнить детали у неё."
  - char: "anzeel"
    side: "left"
    text:
      - "Тогда оставляю всё на тебя, Командир~"
  - text:
      - "Договорив, Аосте открыл боковую дверь кабинета и вместе с Анзил скрылся в самых глубоких секторах лаборатории."
      - "Глядя на вновь захлопнувшуюся дверь, я невольно ощутил, как внутри нарастает какое-то странное чувство фальши."
      - "Сейчас, вспоминая наш разговор, Аосте будто бы и не пытался вникнуть в суть моих вопросов. Его реплики больше походили на заранее заготовленный монолог."
      - "Да и всё наше взаимодействие казалось каким-то неестественным, словно шло по строго прописанному сценарию."
      - "Что ж…… Кажется, у меня есть способ проверить свои догадки."

chapter2:
  rows:
  - text:
      - "(Вариант 1: Ничего не предпринимать)"
      - "Раз уж мне поручили руководить совместными испытаниями, надо для начала вернуться в монтажный цех и подготовить девочек к выходу в море."

chapter3:
  rows:
  - text:
      - "(Вариант 2: Попробовать толкнуть ту самую дверь)"
      - "Дверь даже не шелохнулась."
      - "На ней не было видно никаких хитроумных замков или блокираторов, но сколько бы я ни пытался её нажать, она оставалась абсолютно неподвижной. Будто это была вовсе не дверь, а глухая монолитная стена."
      - "«Воспроизведение архивной записи» — почему-то именно это словосочетание внезапно всплыло у меня в мыслях."
      - "Раз уж толкнуть не получилось…… попробую хотя бы постучать."
      - "*тук-тук*"
  - char: "memphis"
    side: "right"
    text:
      - "Учитель! Я тут уже переговорила с доктором, она подтвердила, что во время грядущих тестов командовать парадом снова будете вы."
      - "Девочки уже полностью готовы к выходу. Ну что, когда выдвигаемся?"
  - text:
      - "(……Мемфис явилась так вовремя, словно специально, чтобы остановить меня)."
  - char: "commander"
    side: "left"
    text:
      - "Раз всё готово, тогда выдвигаемся..."
  - char: "memphis"
    side: "right"
    text:
      - "Отлично, Учитель, тогда следуйте за мной!"
chapter1:
  rows:
  - char: "richelieu"
    side: "left"
    text:
      - "Ле Террибль, ты предложила Жанне возглавить делегацию на выставку Сардинии только для того, чтобы отослать её подальше, верно?"
      - "Ты хочешь предложить мне некий план действий, в который её лучше не посвящать?"
  - char: "le_terrible"
    side: "right"
    text:
      - "Не то чтобы «лучше не посвящать»…… просто в некоторые дела не стоит втягивать человека со столь безупречной и чистой верой, как у неё."
      - "Политика подобна яду, она разъедает веру……"
      - "Госпожа Ришелье, ведь та заморская «Базилика», возведённая в прошлом Ортодоксией Ирис, была не единственной в Мозамбикском проливе, я права?"
  - char: "richelieu"
    side: "left"
    text:
      - "……………………"
      - "Что именно Клемансо успела рассказать тебе перед твоим отъездом?"
  - char: "le_terrible"
    side: "right"
    text:
      - "Абсолютно всё, что она сочла нужным мне знать."
  - char: "richelieu"
    side: "left"
    text:
      - "Трибуналом всё ещё руководит Клемансо?"
  - char: "le_terrible"
    side: "right"
    text:
      - "Да, Трибунал и все его подчинённые силы остаются крепко зажатыми в руках госпожи Клемансо."
  - char: "richelieu"
    side: "left"
    text:
      - "Ты всё ещё поддерживаешь с ней связь?"
  - char: "le_terrible"
    side: "right"
    text:
      - "Я могу связаться с ней лишь тогда, когда госпожа Клемансо сама того пожелает."
  - char: "richelieu"
    side: "left"
    text:
      - "Хорошо."
      - "Что ж, тогда давай обсудим это дело, что способно «разъедать веру»..."

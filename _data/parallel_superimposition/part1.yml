chapter1:
  rows:
  - text:
      - "Окружающий шум постепенно становился всё отчетливее."
      - "Я открываю глаза..."

chapter2:
  rows:
  - text:
      - "Вокруг высятся небоскрёбы, а улицы переполнены бурлящими потоками машин и людей."
      - "В этот момент я, кажется, нахожусь в самом центре какого-то огромного мегаполиса."
      - "Однако смутные воспоминания подсказывают мне совсем другой ответ."
      - "…………"
      - "Буквально только что в «Море Звёзд» произошло чрезвычайное происшествие, и я должен был находиться на пути к эвакуации вместе с Хеленой."
      - "А затем… как я вдруг оказался здесь?"
      - "Хелена… её, само собой, сейчас нет рядом."
      - "……Нет, я совершенно не могу вспомнить, как именно сюда попал."
      - "Это похоже на начало сновидения или на внезапно выпавший кусок из памяти."
      - "Куда ни посмотри, воспоминания в моей голове переплетаются с открывающимся городским пейзажем, отчего всё вокруг кажется одновременно и знакомым, и чужим."
      - "Я всматриваюсь вглубь улиц, вызывающих стойкое чувство дежавю, но в поле зрения попадают лишь высотные здания, названий которых я не знаю."
      - "Мерцающие голографические экраны и бесчисленные огни украшают весь город, превращая его в подобие пышной рождественской ёлки, ослепительной даже при дневном свете."
      - "Этот шумный мегаполис словно сошёл со страниц научно-фантастического романа — он походит на сон или на пугающе реалистичную фантазию."
      - "Но в то же время всё вокруг функционирует настолько чётко и упорядоченно, что среди всей этой нереальной атмосферы рождается мощное ощущение подлинности происходящего."
      - "До такой степени, что в моих мыслях само собой напрашивается одно выражение: «Путешествие в будущее»."
      - "…Впрочем, это, скорее всего, невозможно."
      - "Если речь идёт об обычном воссоздании реалистичных симуляций определённого уровня, то с этим вполне могло бы справиться и существующее оборудование «Моря Звёзд»."
      - "Значит ли это, что всё происходящее перед моими глазами как-то связано с теми аномалиями, которые обнаружили в «Море Звёзд» прямо перед экстренной эвакуацией?"
      - "…Опираясь на ту информацию, которой я располагаю сейчас, сделать точный вывод пока невозможно."
  - char: "communicator?"
    side: "left"
    text:
      - "*Дзины Дзинь*"
  - text:
      - "Вместе с вибрацией из кармана донёсся звук рингтона."
      - "Опустив руку в карман, я нащупал изящную «коробочку»."
      - "Это… портативный коммуникатор?"
      - "Да когда он вообще успел оказаться у меня в кармане?"
      - "Или, вернее сказать… когда я успел сменить одежду?"
      - "Она совсем не похожа на военную форму. Скорее… халат исследователя?"
  - char: "communicator?"
    side: "left"
    text:
      - "*Дзины Дзинь*"
  - text:
      - "Вибрация и трезвон коробочки даже не думали прекращаться. Похоже, лучше всё-таки ответить на вызов."

chapter3:
  rows:
  - char: "commander"
    side: "left"
    text:
      - "(Проведу пальцем по зелёной кнопке.)"
  - text:
      - "«Коммуникатор» слегка завибрировал."

chapter4:
  rows:
  - char: "commander"
    side: "left"
    text:
      - "(Проведу пальцем по красной кнопке.)"
  - text:
      - "…Нет, если подумать логически, это ведь кнопка сброса."
      - "Я провёл по зелёной кнопке, и «коммуникатор» слегка завибрировал."

chapter5:
  rows:
  - char: "memphis_rad"
    side: "right"
    text:
      - "Здравствуйте, Учитель! Это голосовое сообщение от Мемфис."
      - "Я никак не могла до вас дозвониться, поэтому подумала, что вы всё ещё в дороге и не замечаете звонков, и решила оставить это сообщение."
      - "На момент отправки этой записи самолёт доктора Анзил и Йорктаун со спутниками уже благополучно приземлился."
      - "Изначально доктор планировала заехать за вами, чтобы вместе отправиться в университет."
      - "Но её рейс… ну… задержался."
      - "Из-за этого времени в обрез, и ей пришлось сразу поехать в университет, чтобы готовиться к конференции."
      - "Но не переживайте, Нортгемптон уже в пути и едет встретить вас."
      - "Пожалуйста, подождите немного в условленном месте. На этом всё, конец сообщения от Мемфис."
  - text:
      - "Голос из коммуникатора умолк, и экран погас."
      - "Хотя внешний вид этого устройства сильно отличался от привычных мне коммуникаторов, его лаконичный и простой в использовании дизайн, надо признать, очень выручил."
      - "Но всё же… Мемфис использовала обращение «Учитель»?"
      - "Не думал, что кроме Анкоридж кто-то ещё, а уж тем более Мемфис, станет так меня называть."
      - "А ещё доктор Анзил, университет, конференция… Честно говоря, я абсолютно не понимаю, о чём сейчас говорила Мемфис."
      - "Всяческие загадки и вопросы скопились в такую кучу, что я даже не знаю, с чего начать размышления."
      - "Впрочем… раз Мемфис упомянула, что скоро приедет Нортгемптон, то все эти вопросы пока можно отложить."
      - "Пользуясь свободной минуткой, лучше соберу побольше информации об этом городе."

chapter6:
  rows:
  - text:
      - "Я прошёл немного вперёд, вновь осматриваясь по сторонам. На этот раз в поле зрения появилось куда больше знакомых ориентиров."
      - "Теперь можно с уверенностью сказать, что это, судя по всему, всё ещё Нью-Йорк."
      - "Сразу я его не узнал, наверное, потому, что немногие знакомые здания были изменены до неузнаваемости огромными голографическими экранами самых разных форм."
      - "Учитывая моё нынешнее положение, пожалуй, стоит и впрямь серьёзно задуматься о возможности путешествия во времени…"
      - "Вот так, погрузившись в свои мысли, я не спеша прохаживался взад-вперед, совершенно не замечая, как в мою сторону направляется легковой автомобиль."
      - "Пока со спины не донёсся звук открывающейся дверцы..."
  - char: "northampton_ii"
    side: "left"
    text:
      - "Не ожидала, что Учитель будет прогуливаться как раз рядом со стоянкой. Похоже, мы с вами отлично друг друга понимаем."
      - "Долго ждали?"
  - text:
      - "Хотя стиль её одежды полностью сливался с окружающим высокотехнологичным мегаполисом, из машины действительно вышла Нортгемптон."
      - "Вот только не думал, что и Нортгемптон тоже станет использовать обращение «Учитель»…"
  - char: "northampton_ii"
    side: "left"
    text:
      - "Хм? Учитель, вы себя плохо чувствуете?"
  - text:
      - "Заметив, что я никак не реагирую, Нортгемптон забеспокоилась и быстро подошла ближе."
      - "…Ситуация всё ещё туманная. Пожалуй, сейчас лучше не привлекать к себе лишнего внимания и просто плыть по течению."
  - char: "commander"
    side: "left"
    text:
      - "Всё в порядке, просто немного устал."
  - char: "northampton_ii"
    side: "right"
    text:
      - "Ахаха… И то верно, поездка сюда наверняка заняла уйму времени."
      - "Но придётся вам ещё капельку потерпеть, Учитель, нам ведь нужно доехать до университета, чтобы встретиться с доктором."
  - char: "commander"
    side: "left"
    text:
      - "Доктор… Анзил сейчас в университете?"
  - char: "northampton_ii"
    side: "right"
    text:
      - "Именно. Учитель, вам ведь Мемфис уже всё рассказала, верно? Доктор прилетела слишком поздно, поэтому ей пришлось сразу отправиться на конференцию."
      - "Но к нашему приезду она уже должна со всем разобраться."
  - char: "commander"
    side: "left"
    text:
      - "…Раз так, тогда поехали."
  - char: "northampton_ii"
    side: "right"
    text:
      - "Хорошо, Учитель, прошу в машину. Мы отправляемся!"

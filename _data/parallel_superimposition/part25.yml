chapter1:
  rows:
  - text:
      - "БАБАХ!!!"
  - char: "hammann_ii"
    side: "left"
    text:
      - "Инфорсер «Temptation» (Искушение) успешно уничтожен!"
      - "Хм, будете знать, как злить Хамманн!"
  - char: "yorktown_ii"
    side: "right"
    text:
      - "Эти Инфорсеры отличаются от тех, что были в данных тестов. Их броня намного прочнее."
      - "Пожалуйста, внимательнее распределяйте огонь, чтобы избежать ненужных потерь."
  - char: "langley_ii"
    side: "left"
    text:
      - "Командир, Дьявол летит прямо на нас. Ожидаемое время до визуального контакта — меньше минуты."
  - text:
      - "Из-за её крепкой брони атаки истребителей не увенчались успехом, а бомбардировщики и торпедоносцы не могут эффективно поражать воздушные цели."
      - "…Эх, была бы здесь эскадра линкоров."
  - char: "memphis"
    side: "left"
    text:
      - "Командир, остров Самос не отвечает, мы потеряли связь с тылом……"
  - char: "commander"
    side: "right"
    text:
      - "Связь глушат?"
  - char: "memphis"
    side: "left"
    text:
      - "Нет, наши системы связи работают нормально. Просто…… нам не отвечают."
      - "Не волнуйтесь, Командир. Я попробую найти другой способ……!"
  - char: "northampton_ii"
    side: "right"
    text:
      - "Плохие новости, Учитель! Вокруг из ниоткуда появилась огромная армада неопознанных кораблей, они берут нас в кольцо……"
  - char: "commander"
    side: "left"
    text:
      - "У врага ещё и подкрепления……?! Что за модели?"
  - char: "northampton_ii"
    side: "right"
    text:
      - "Секундочку, сигнал с разведчиков идёт с помехами, обрабатываю……"
      - "……Командир, я…… я не могу определить тип этих врагов."
  - char: "commander"
    side: "left"
    text:
      - "……Немедленно выведи изображение на экран флагманского мостика!"
  - char: "northampton_ii"
    side: "right"
    text:
      - "Есть!"
  - text:
      - "Последние кадры с самолётов-разведчиков тут же появились на главном экране."
      - "Несмотря на обработку изображения, типы вражеских кораблей оставались размытыми."
      - "Они словно были окутаны каким-то туманом. Я видел их своими глазами, но никак не мог сфокусироваться на их очертаниях или распознать класс……"
      - "Почему-то мне казалось, что я вижу подобных врагов далеко не в первый раз."
      - "Кажется, они появлялись в тех самых обрывочных «снах», что преследовали меня с тех пор, как мы покинули секретную комнату в полярных широтах…"

chapter2:
  rows:
  - text:
      - "БАБАХ!!!"
  - char: "gromky"
    side: "left"
    text:
      - "Ну и занозы же эти враги!"
  - char: "murmansk"
    side: "right"
    text:
      - "Да что это вообще за твари такие? Они как будто постоянно покрыты слоем тумана……"
  - char: "tallinn"
    side: "left"
    text:
      - "Что бы это ни было, это точно не Сирены. Это некие…… необъяснимые сущности."
  - char: "sovetskaya_belorussiya"
    side: "right"
    text:
      - "И хотя их природа ещё не изучена, сражаться с этими «необъяснимыми сущностями» как-то не по себе. Что думаешь, Киров?"
  - char: "kirov"
    side: "left"
    text:
      - "Хм, весьма ценные для исследований экземпляры. После боя нужно постараться забрать несколько центральных ядер в лабораторию."
  - char: "sovetskaya_belorussiya"
    side: "right"
    text:
      - "В этом вся ты, Киров. Довольно смелое заявление……"
  - char: "kirov"
    side: "left"
    text:
      - "Пока наше великое дело не завершено, я, Киров, просто так не сдамся!"
      - "Раз уж наши атаки наносят им урон, значит, совершенно неважно, что это за твари — бояться нечего."
      - "Нам нужно лишь стрелять, стрелять и ещё раз стрелять! Непрерывным шквальным огнём мы сокрушим любого врага, посмевшего встать на нашем пути!"

chapter3:
  rows:
  - text:
      - "Я вспомнил всё. Всё, что мы пережили в той секретной комнате……"
      - "Информацию о самой комнате, Анзил, Аосте, Совете, линии обороны Лонг-Айленда, Записанном голосе и, наконец, финал той битвы."
  - char: "commander"
    side: "left"
    text:
      - "(……«Сражаться, пока не угаснет свет», значит)."

chapter4:
  rows:
  - char: "memphis"
    side: "left"
    status: "is-purple"
    text:
      - "…Эти твари появились и здесь?"
      - "Как такое возможно…… Мы ведь уже спасли Командира от преследования Дьявол."
      - "Как Дьявол вообще смогла отследить нас до этого места, да ещё и вторгнуться в пространство, сгенерированное «Башней»……"
      - "Как ей это удалось……?"
      - "Дьявол ни за что бы не справилась с этим в одиночку…"
      - "…У неё есть сообщники?"
      - "Но кто………… Почему мы не получили абсолютно никаких разведданных!"
  - char: "yorktown_ii"
    side: "right"
    text:
      - "Мемфис………… с тобой всё хорошо?"
  - char: "memphis"
    side: "left"
    status: "is-purple"
    text:
      - "Нет, не хорошо!"
      - "Всё очень и очень плохо!!!"
      - "Это я привела Командира сюда……!"
      - "Это я привела их всех прямо к нам…………"
      - "В пространстве «Башни» уже появились признаки коррозии……"
      - "…Я не могу восстановить контроль над этим пространством."
      - "Все каналы связи и пути отхода заблокированы……"
      - "Я не могу безопасно эвакуировать сознание Командира……"
      - "А ведь я просто хотела……"
      - "Это всё моя вина……"
      - "Я погубила Командира……"
      - "Что же я наделала-а-а-а-а-а-а-а-а-а-а-а-а-а-а!"
  - text:
      - "........."
  - char: "yorktown_ii"
    side: "left"
    text:
      - "Мемфис, о чём ты вообще говоришь……?"
      - "Какова реальная ситуация? Что тебе известно?!"
  - char: "memphis"
    side: "right"
    status: "is-purple"
    text:
      - "……Простите."
      - "Командир, спаси..."
  - char: "nop"
    side: "left"
    status: "is-meta"
    text:
      - "Неужели ты уже готова сдаться?"

chapter5:
  rows:
  - char: "yorktown_ii"
    side: "left"
    text:
      - "Голос раздался прямо из воздуха……"
  - char: "hornet_ii"
    side: "right"
    text:
      - "Кто там прячется?!"
  - char: "nop"
    side: "left"
    status: "is-meta"
    text:
      - "Снятие цифровой маскировки———— Выполнено."

chapter6:
  rows:
  - char: "helena_meta"
    side: "left"
    status: "is-meta"
    text:
      - "Всем добрый день."
  - char: "hornet_ii"
    side: "right"
    text:
      - "Ува-а…… Я же просто наугад спросила, не думала, что там реально кто-то появится!"
  - char: "memphis_meta"
    side: "left"
    status: "is-purple"
    text:
      - "........."
  - char: "yorktown_ii"
    side: "right"
    text:
      - "Вы………… Кто вы вообще такие?"
  - char: "helena_meta"
    side: "left"
    status: "is-meta"
    text:
      - "О, это долгая история. Если хочешь, могу потратить целый день и во всех подробностях вам её рассказать?"
  - char: "yorktown_ii"
    side: "right"
    text:
      - "Пожалуйста…… можно покороче."
  - char: "helena_meta"
    side: "left"
    status: "is-meta"
    text:
      - "Я — Хелена, но не та Хелена, которую вы помните."
      - "Она — Мемфис, но точно так же не та Мемфис, которая вам знакома."
      - "Что же касается нашей стороны..."
      - "Мы — союзники Командира и ваши боевые товарищи, которые будут сражаться с вами плечом к плечу."
      - "Такое объяснение вас устроит?"

chapter7:
  rows:
  - char: "yorktown_ii"
    side: "left"
    text:
      - "Учитель, мы можем им доверять?"

chapter8:
  rows:
  - char: "commander"
    side: "left"
    text:
      - "Да, можем"

chapter9:
  rows:
  - char: "commander"
    side: "left"
    text:
      - "Они наши союзники."

chapter10:
  rows:
  - char: "yorktown_ii"
    side: "left"
    text:
      - "Я поняла."
  - char: "helena_meta"
    side: "right"
    status: "is-meta"
    text:
      - "Давно не виделись, Командир."
  - char: "commander"
    side: "left"
    text:
      - "Хотя я уже давно смутно подозревал, что Мемфис далеко не так проста, как кажется на первый взгляд."
      - "Но я никак не ожидал, что и ты окажешься в это втянута……"
      - "Та Хелена, что вместе со мной покинула Море Звёзд…… на самом деле была тобой, верно?"
  - char: "helena_meta"
    side: "right"
    status: "is-meta"
    text:
      - "Верный ответ."
      - "Командир, ты вспомнил некоторые вещи, но далеко не всё."
      - "Блокировка информации—————— Снята."
      - "А теперь попробуй вспомнить ещё раз?"
  - text:
      - "......"

chapter11:
  rows:
  - char: "anzeel_rec"
    side: "left"
    status: "is-purple"
    text:
      - "Погодите………… сюда что-то приближается."
      - "За вами следят, что-то увязалось за вами!"
      - "........."
      - "Внимание: Обнаружено приближение угрозы V класса. Согласно протоколу безопасности, данное пространство записей приступает к самоликвидации."
chapter12:
  rows:
  - char: "anchorage"
    side: "left"
    text:
      - "Учитель!"
      - "Скорее… уходите отсюда вместе со мной!"
      - "Учитель…! Осторожно…! Не надо…!!!"

chapter13:
  rows:
  - char: "commander"
    side: "left"
    text:
      - "………Значит, начиная с того самого момента, как мы столкнулись с той аномалией в ментальном пространстве Анкоридж."
      - "Я так и не проснулся."
      - "……В какой степени вы причастны к этой череде событий?"
  - char: "helena_meta"
    side: "right"
    status: "is-meta"
    text:
      - "На самом деле, Мемфис в своём порыве отчаяния уже и так почти всё рассказала."
      - "Мы обнаружили, что Арбитр: Дьявол XV пытается оказать на тебя влияние, пока ты находился внутри нейросети Анкоридж."
      - "Поэтому мы опередили её и перенесли твоё сознание в этот безопасный мир."
      - "Здесь мы постарались подготовить для тебя максимум информации об оснастке типа II и о самой Дьявол, которой только располагали."
      - "И подали её в таком виде, чтобы ты смог получить преимущество в грядущем столкновении с ней."
      - "Вот только мы никак не ожидали, что Дьявол найдёт способ пробиться даже сюда."
      - "Она перехватила контроль над ближайшими секторами этого пространства и спровоцировала сбой в созданном нами теле-носителе Дьявол."
      - "Вот как всё обстоит на самом деле."
  - char: "commander"
    side: "left"
    text:
      - "Вот оно как………… Но..."
      - "Ты намеренно уклонилась от ответа на некоторые ключевые вопросы, которые стоило бы прояснить."
  - char: "helena_meta"
    side: "right"
    status: "is-meta"
    text:
      - "Командир, когда девушка притворяется дурочкой, не стоит так настойчиво допытываться~"
  - char: "commander"
    side: "left"
    text:
      - "……А?"
  - char: "helena_meta"
    side: "right"
    status: "is-meta"
    text:
      - "В общем, сейчас ситуация не так скверна, как нафантазировала себе Мемфис."
      - "Если мы объединим усилия и уничтожим это вышедшее из-под контроля тело Дьявол, я всё ещё смогу вернуть контроль над пространством и благополучно отправить тебя обратно."
      - "Ну как? Командир, и все обладательницы оснастки типа II, мы принимаем бой?"

chapter14:
  rows:
  - char: "commander"
    side: "left"
    text:
      - "Йорктаун, подготовь всех к бою!"
  - char: "yorktown_ii"
    side: "right"
    text:
      - "Слушаюсь!"

chapter15:
  rows:
  - char: "commander"
    side: "left"
    text:
      - "Я верю тебе. Сразимся плечом к плечу!"
  - char: "helena_meta"
    side: "right"
    status: "is-meta"
    text:
      - "Мемфис, хватит ворон считать, соберись и приготовься к бою."
  - char: "memphis_meta"
    side: "left"
    status: "is-purple"
    text:
      - "Е… есть!"


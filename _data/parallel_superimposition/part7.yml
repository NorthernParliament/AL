chapter1:
  rows:
  - text:
      - "Два часа спустя..."
  - char: "hornet_ii"
    side: "left"
    text:
      - "Кто бы мог подумать…… Ричард и впрямь сыграла главную роль! Да и сеттинг у фильма, надо признать, на удивление интригующий…"
  - char: "langley_ii"
    side: "right"
    text:
      - "Сразу видно, что в съёмках участвовали военные. Настоящие боевые корабли, реальные военные порты — масштабы сцен просто поражают……"
  - char: "northampton_ii"
    side: "left"
    text:
      - "Несколько кораблей мы даже видели на наших прошлых учениях. Вот уж не ожидала, что их тоже мобилизуют в качестве актёров."
  - char: "hammann_ii"
    side: "right"
    text:
      - "Вот только концовка…… Хамманн считает, что это несправедливо. Фильм закончился прямо тогда, когда они только собирались хоть что-то предпринять……"
  - char: "langley_ii"
    side: "left"
    text:
      - "Подобный финал — скорее всего, осознанный режиссёрский ход. В конце концов, идея изменения прошлого таит в себе слишком много временных парадоксов."
  - char: "hornet_ii"
    side: "right"
    text:
      - "Но ведь именно над тем, как логично и красиво всё это показать, и должен ломать голову режиссёр фантастического кино!"
      - "«Нам предстоит битва. Битва в войне, которую мы проиграли ещё до того, как все вы появились на свет». Эта реплика капитана Ричард прозвучала чертовски атмосферно!"
      - "Правда, будь на её месте сестрица Энтерпрайз, она бы, наверное, просто отрезала: «Враг в зоне досягаемости. Наносим упреждающий удар и уничтожаем цель»."
      - "И уж точно не стала бы колебаться так долго, чтобы в итоге так и оставить всё нерешённым, верно?"
  - char: "langley_ii"
    side: "left"
    text:
      - "А я могу понять нерешительность Ричард. Будь я на её месте, я бы тоже предпочла остаться безмолвным наблюдателем и никак не вмешиваться в прошлое."
      - "Ведь если прошлое изменится, что станет с нами в будущем? Возможно, мы просто исчезнем или переродимся в кого-то другого."
      - "Риски слишком высоки. Подобные решения нельзя принимать, поддавшись сиюминутному порыву."
  - char: "hornet_ii"
    side: "right"
    text:
      - "Э-э-эх…… Сестрица Йорктаун, а что ты  думаешь по этому поводу?"
  - char: "yorktown_ii"
    side: "left"
    text:
      - "Я размышляю над этим вопросом с самой первой минуты, как пошли финальные титры… И, если честно, у меня нет однозначного ответа."
      - "Да, в прошлом мы пережили немало боли, но именно эта боль сделала нас теми, кто мы есть сейчас."
      - "Если изменить прошлое, изменится и будущее."
      - "Даже если на нас, находящихся внутри прошлого, это никак не повлияет, то, вернувшись назад через пространственно-временной туннель, мы вряд ли застанем в своей эпохе хоть что-то знакомое."
      - "К тому же…… из-за эффекта бабочки наши действия далеко не обязательно приведут к тому результату, ради которого всё задумывалось."
      - "Решение, которое кажется абсолютно правильным сейчас, в долгосрочной перспективе может породить ещё больше проблем."
      - "Изменения могут сделать всё как лучше, так и хуже. Но и невмешательство может обернуться как благом, так и катастрофой."
      - "Сделать этот выбор действительно невероятно сложно……"
  - char: "hornet_ii"
    side: "right"
    text:
      - "Но выбор-то всё равно делать надо! Весь корабль ждёт, какое решение примет капитан."
  - char: "yorktown_ii"
    side: "left"
    text:
      - "Да, я знаю. Поэтому я и разделяю позицию капитана Ричард — не нужно пытаться просчитать всё до самого конца. Достаточно видеть лишь один шаг перед собой и позволить событиям развиваться «шаг за шагом»."
      - "Раз уж любое наше действие ведёт к неопределённым последствиям, то нужно просто делать правильный выбор здесь и сейчас, перед лицом тех трудностей, что уже возникли. Так мы хотя бы останемся честны перед самими собой."
  - char: "hornet_ii"
    side: "right"
    text:
      - "В этом вся сестрица Йорктаун………… Ответ в её неповторимом стиле."
      - "Ну а вы, Учитель? Что думаете? Если бы вам выпал шанс вернуться в прошлое, вы бы решились изменить историю?"
  - text:
      - "Мяч снова на моей стороне. Вот только если сопоставить это с реальностью, моя нынешняя ситуация больше похожа не на возвращение в прошлое, а на путешествие в будущее……"
  - char: "commander"
    side: "left"
    text:
      - "Жизнь и впрямь повторила сюжет кино, так что во время просмотра я тоже невольно предавался глубоким размышлениям."
      - "Но если рассуждать исключительно в рамках самого вопроса..."

chapter2:
  rows:
  - char: "commander"
    side: "left"
    text:
      - "Изменил бы..."
      - "Пожалуй, да. Если шанс исправить прошлые ошибки и сожаления находится прямо перед тобой, нет никаких причин его упускать."
  - char: "hornet_ii"
    side: "right"
    text:
      - "Хе-хе, прямо как мои мысли! Да и сестрица Энтерпрайз точно подумала бы так же~"

chapter3:
  rows:
  - char: "commander"
    side: "left"
    text:
      - "Не стал бы менять"
      - "Скорее нет. Если судить по известному нам раскладу: пусть в прошлом и случилась трагедия, но именно она в итоге привела к нынешнему стабильному будущему."
      - "Если переписать ту прошлую трагедию, то и эта стабильность испарится. Всё станет слишком неопределённым — может, станет лучше, а может, в разы хуже."
  - char: "langley_ii"
    side: "right"
    text:
      - "В этом весь Учитель, исключительно рациональный подход. Если ты не можешь просчитать, как твои действия аукнутся в будущем, то лучше вообще ничего не предпринимать."

chapter4:
  rows:
  - char: "commander"
    side: "left"
    text:
      - "Двигался бы шаг за шагом"
      - "Сам факт того, что ты из будущего оказался в прошлом, уже на это прошлое повлиял."
      - "Поэтому гадать, делать что-то или нет и к какому эффекту это приведёт — уже за гранью обычной логики."
      - "Раз так, не нужно забивать голову всей этой чертовщиной. Надо для начала приглушить все сомнения с подозрениями, сосредоточиться на том, что прямо перед глазами, и решать проблемы по мере их поступления. Одна за другой."
      - "(Прямо как то, чем я занимаюсь прямо сейчас)."
  - char: "yorktown_ii"
    side: "right"
    text:
      - "Учитель, наши взгляды полностью совпадают."
      - "Раз уж невозможно угадать идеальный план действий, нужно просто честно делать то, что должно здесь и сейчас, чтобы потом не в чем было себя упрекнуть."

chapter5:
  rows:
  - char: "hammann_ii"
    side: "left"
    text:
      - "Сестра Йорктаун, Хамманн нашла просто прелестную лавку! Там внутри целая гора мягких игрушек!"
      - "Я только что слышала от Хорнет, что ты ещё не до конца определилась с подарком. Может, пойдём выберем вместе?"
  - char: "yorktown_ii"
    side: "right"
    text:
      - "Кхм… Ну что, Учитель, заглянем все вместе в магазинчик, который приметила Хамманн?"
  - char: "commander"
    side: "left"
    text:
      - "Конечно, без проблем!"

chapter1:
  rows:
  - text:
      - "Пока мы ждали заказ, Хамманн, кажется, обнаружила автомат с мороженым, предлагающий множество весьма причудливых вкусов, и все тут же сгрудились вокруг него."
      - "Все, кроме Анзил. В этот момент она сидела совершенно неподвижно на своём месте, глубоко погружённая в какие-то свои мысли."
  - char: "commander"
    side: "left"
    text:
      - "(Неужели моё странное поведение всё-таки вызвало у неё подозрения?)"
      - "Ты не хочешь пойти взглянуть на автомат с мороженым?"
  - char: "anzeel"
    side: "right"
    text:
      - "Знаешь, хоть ручную раздачу и заменили на этот аппарат самообслуживания, но меню… меню ни капли не изменилось!"
      - "Так что я пасс. Серьёзно, даже не думай пробовать здешнее «экзотическое» мороженое…"
      - "Мороженое со вкусом перца чили «призрак» — увольте, я не самоубийца."
  - char: "commander"
    side: "left"
    text:
      - "Ну, попробовать-то в принципе можно…"
  - char: "anzeel"
    side: "right"
    text:
      - "Ты стопроцентно пожалеешь!"
      - "Да и вообще, подобными автоматами могут интересоваться только маленькие девочки. Ты что, считаешь, что я всё ещё маленькая девочка?"
      - "Или, точнее сказать… кем именно ты меня сейчас видишь?"
  - char: "commander"
    side: "left"
    text:
      - "(…Ну точно. Под плотным подозрением)."
  - char: "anzeel"
    side: "right"
    text:
      - "Ассистент, я заметила это ещё с нашей встречи: с тобой что-то не так. С головы до ног от тебя веет каким-то труднообъяснимым чувством отчуждённости."
      - "Возможно, это ты переутомился за последние дни. Возможно, это я вымоталась. А возможно..."
      - "Тебя на самом деле захватили инопланетяне?"
  - char: "commander"
    side: "left"
    text:
      - "…При всём уважении, контроль со стороны пришельцев — это уже какой-то перебор с фантастикой."
  - char: "anzeel"
    side: "right"
    text:
      - "Пока вероятность отлична от нуля, возможно абсолютно всё, понимаешь? Кто поручится, что во Вселенной не существует пришельцев, обожающих мороженое с перцем чили?"
      - "Так, ради безопасности давай-ка я устрою тебе небольшой тест и задам парочка вопросов!"
  - char: "commander"
    side: "left"
    text:
      - "Нет, очевидно, тебе просто самой хочется подурачиться."
  - char: "anzeel"
    side: "right"
    text:
      - "Я ничего не слышу... Твоё дело сидеть и честно отвечать!"
  - char: "commander"
    side: "left"
    text:
      - "Да-да, хорошо..."
      - "(…Э? Что это за странное чувство?)"
      - "(Слова в этом диалоге с Анзил сорвались с моих губ сами собой, будто минуя процесс размышления)."
      - "(Как будто моё подсознание уже на каком-то фундаментальном уровне привыкло к подобному общению с ней…)"
  - char: "anzeel"
    side: "right"
    text:
      - "Итак, первый вопрос... Кто. Я. Такая?"
  - char: "commander"
    side: "left"
    text:
      - "Вы — доктор Анзил. Учёный, который первым открыл и применил Куб Мудрости. Ныне глава исследовательской группы по изучению Кубов Мудрости в Федерации, а также академик Национальной академии наук."
  - char: "anzeel"
    side: "right"
    text:
      - "Ого… Как официально. Мне аж самой как-то неловко стало…"
  - char: "commander"
    side: "left"
    text:
      - "(…Точно такое же ощущение, как и мгновение назад. Слова естественным потоком всплывают в голове)."
  - char: "anzeel"
    side: "right"
    text:
      - "Кхм-кхм, ладно, а каково главное направление моих исследований?"
  - char: "commander"
    side: "left"
    text:
      - "Практическое применение Кубов Мудрости и создание кансен."
  - char: "anzeel"
    side: "right"
    text:
      - "Главная цель моей нынешней поездки?"
  - char: "commander"
    side: "left"
    text:
      - "Проведение испытаний оснастки типа II."
  - char: "anzeel"
    side: "right"
    text:
      - "Хм-м… А кто такой Гарфилд?"
  - char: "commander"
    side: "left"
    text:
      - "Вице-адмирал ВМС Союза Орла, ныне командующий 13-м флотом."
  - char: "anzeel"
    side: "right"
    text:
      - "Ну а Аосте? Кто такой Аосте?"
  - char: "commander"
    side: "left"
    text:
      - "Твой однокурсник по университету, а ныне ведущий специалист в области искусственного интеллекта, руководитель проекта «Антиох» и, ко всему прочему, тоже академик Национальной академии наук."
  - char: "anzeel"
    side: "right"
    text:
      - "Вау~ Надо же, и впрямь ответил абсолютно на всё."
  - char: "commander"
    side: "left"
    text:
      - "……И что, проверка считается пройденной?"
  - char: "anzeel"
    side: "right"
    text:
      - "Вообще-то у меня есть ещё один, самый последний и самый важный вопрос к тебе. Но интуиция подсказывает мне, что прямо сейчас его задавать категорически нельзя."
      - "Поэтому я решила довериться шестому чувству. Проверка пройдена!"
      - "Похоже, пришельцы твой разум не захватывали, а ты просто-напросто переутомился в последнее время."
  - char: "commander"
    side: "left"
    text:
      - "(Кто бы мог подумать… Я и в самом деле ответил на всё до единого…)"
  - text:
      - "……Федерация, оснастка типа II? 13-й флот? В моём сознании не было понимания того, что означают эти термины, и раньше я о них никогда не слышал."
      - "Однако стоило Анзил задать вопросы, как эти ответы всплыли в голове — без какой-либо логической связи, внезапно, изолированно, но в то же время совершенно естественно."
      - "Это было неописуемое, поразительное ощущение…"
      - "Словно я случайно коснулся каких-то осколков памяти, которые изначально должны были принадлежать мне, и в момент соприкосновения слился с ними воедино…"
      - "Что же здесь всё-таки происходит…"
  - char: "hornet_ii"
    side: "left"
    text:
      - "Хе-хе-хе, а вот и мороженое!"
  - char: "yorktown_ii"
    side: "right"
    text:
      - "Доктор, Учитель, извините, что заставили ждать. Ну же, попробуйте мороженое, которое мы так тщательно для вас выбирали~"
  - char: "northampton_ii"
    side: "left"
    text:
      - "(А… мы правда сделаем это?)"
  - char: "hammann_ii"
    side: "right"
    text:
      - "(Сестра Йорктаун ведь согласилась!)"
  - char: "langley_ii"
    side: "left"
    text:
      - "(Мне тоже кажется, что будет очень весело… Давай, Хамманн, вперёд!)"
  - char: "hammann_ii"
    side: "right"
    text:
      - "Вот… Эти два рожка Хамманн выбирала лично. Держите."
  - char: "anzeel"
    side: "left"
    text:
      - "Ах… Этот цвет рожка… Дело дрянь……!"
  - char: "hornet_ii"
    side: "right"
    text:
      - "Хе-хе, Учитель, зацени вкусы."
      - "Тот, что жёлтый — со вкусом говяжьего йогурта, а вот этот красный~"
      - "...Со вкусом перца чили «призрак»."
  - char: "anzeel"
    side: "left"
    text:
      - "Хамманн, пихай красный рожок ассистенту! Быстро!"
  - char: "hammann_ii"
    side: "right"
    text:
      - "Принято!"
  - text:
      - "Не успел я опомниться, как Хамманн прямо-таки всучила мне в руку красное мороженое —"
  - char: "anzeel"
    side: "left"
    text:
      - "Ассистент, переводить продукты нехорошо, так что съешь всё до последнего кусочка, ладно?~"

chapter1:
  rows:

    - char: tb_rad
      side: left
      text:
        - "Хорнет признана «потопленной». Учения завершены."

    - char: hornet
      side: right
      text:
        - "Ух, ну и беспощадная же была «атака»... Впрочем, я спокойна, раз вы в такой отличной форме."
        - "Однако имей в виду: в ходе масштабной операции могут случиться крайне опасные столкновения."
        - "Если противника невозможно одолеть сразу, не стоит ввязываться в затяжной бой. Решительное отступление — вот самый мудрый выбор!"
        - "Например... вот так!"

    - char: tb_rad
      side: left
      text:
        - "Статус учений изменен: флот вот-вот подвергнется сокрушительному удару."

    - char: commander
      side: right
      text:
        - "...Это же жульничество!"
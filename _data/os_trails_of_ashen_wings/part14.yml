chapter1:
  rows:

    - char: hornet
      side: left
      text:
        - "Ребята, гляньте! Впереди... это что, новый вулканический остров?"
        - "Остров покрыт снегом, который даже не думает таять...?! Но мы же в районе Бермуд!"

    - text:
      - "Крайне аномальное явление... Продолжаем исследование."
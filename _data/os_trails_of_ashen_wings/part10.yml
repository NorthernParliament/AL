chapter1:
  rows:

    - char: baltimore
      side: left
      text:
        - "Хм? Эти обломки Сирен... В этом секторе, кроме нас, есть другие флоты?"

    - char: tb_rad
      side: right
      text:
        - "Поиск данных в базе: записей о боевых действиях других соединений в данной акватории не обнаружено. Планов по развертыванию иных союзных сил в этом районе также нет."

    - char: hornet
      side: left
      text:
        - "Эй, гляньте на радары! Я тут кое-что интересное заметила."
        - "Видите эти плотные скопления точек? Это распределение сил противника поблизости. И с каждым обновлением количество этих точек внезапно уменьшается."

    - char: north_carolina
      side: right
      text:
        - "Флот Сирен впереди... исчезает?"

    - char: enterprise
      side: left
      text:
        - "...Неужели это и вправду «они»."
        - "Командир, я выдвигаюсь вперед на разведку!"

    - char: baltimore
      side: right
      text:
        - "Погоди! Кто «они»? Обстановка неясна, соваться туда в одиночку слишком опасно!"
        - "Эй, Энтерпрайз!"

    - char: hornet
      side: left
      text:
        - "Хмм... Сигналы на радарах не фиксируются, но сестру Энтерпрайз это так взбудоражило... Неужели там, впереди, с Сиренами сражается «Пепел»?"

    - char: commander
      side: right
      text:
        - ".....Флот, перестроиться! Соблюдать бдительность и следовать за Энтерпрайз. Но без приказа по «Пеплу» огонь не открывать!"
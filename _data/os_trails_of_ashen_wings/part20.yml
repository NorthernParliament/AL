chapter1:
  rows:

    - char: tb_rad
      side: left
      text:
        - "Модуль анализа синхронизирован. Обнаружена группа неопознанных самолетов Железной Крови, приближающихся к нам. Пожалуйста, приготовьтесь к противовоздушной обороне."

    - char: enterprise
      side: right
      text:
        - "Да, я тоже их заметила. Это авиагруппа серийных авианосцев Железной Крови или же..."
        - "Хорнет, проведи еще одну разведку флота Железной Крови. Сосредоточься на поиске их авианосцев. Выясни, не скрывается ли среди них Граф Цеппелин."

    - char: hornet
      side: left
      text:
        - "Предоставь это мне!"

    - char: enterprise
      side: right
      text:
        - "Истребители, в воздух! Приготовиться к перехвату!"
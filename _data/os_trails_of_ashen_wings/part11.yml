chapter1:
  rows:

    - char: baltimore
      side: left
      text:
        - "Ты... ведь не Хирю из Империи Сакуры?"

    - char: hiryuu_meta?
      side: right
      status: is-meta
      text:
        - "Какая случайная встреча. Вы тоже здесь из-за дел Арбитров?"

    - char: commander
      side: left
      text:
        - "...Арбитры?"

    - char: tb_rad
      side: right
      text:
        - "Поиск в базе данных: Командир, в архивах Штаба нет никаких документов, упоминающих «Арбитров»."

    - char: hiryuu_meta?
      side: left
      status: is-meta
      text:
        - "А, кажется, я сболтнула лишнего... Забудьте."
        - "Так это ты тот самый Командир, из-за которого Энтерпрайз в последнее время сама не своя? Рада знакомству."

    - text:
      - "Мой взгляд невольно пересекся с глазами этой девушки из «Пепла»... Несмотря на непринужденный тон, в её взоре не было ни капли веселья."
      - "Что происходит?.. Я не могу ни заговорить, ни отвести взгляд. Всё тело словно оцепенело, я не могу пошевелить даже пальцем!"

    - char: hiryuu_meta?
      side: left
      status: is-meta
      text:
        - "Хм, на вид ничего особенного... Не понимаю, почему она так тобой интересуется. Впрочем, неважно. Пока ты не стоишь у меня на пути, ты мне не интересен."

    - char: baltimore
      side: right
      text:
        - "Послушай, ты ведь тоже кансен. Не смей так нагло запугивать Командира. Как насчет того, чтобы обменяться парой ударов со мной?"

    - char: hiryuu_meta?
      side: left
      status: is-meta
      text:
        - "О? Могу ли я расценивать это как официальное приглашение на дуэль?"

    - char: enterprise
      side: right
      text:
        - "Погоди, Балтимор! У меня есть к ней вопросы!"

chapter2:
  rows:

    - char: hiryuu
      side: left
      status: is-meta
      text:
        - "Ваша Элизабет из Королевского Флота тоже не пришла?.. Эх, похоже, у всех фракций сейчас дела идут скверно."
        - "Неужели нам и впрямь придется сотрудничать с этой оравой?.. Ведь «они» изначально создавались как наша замена."

chapter3:
  rows:

    - char: enterprise
      side: left
      text:
        - "Что же с вами произошло на самом деле? Какая связь была между «Факелом», «Пеплом» и Сиренами?!"

    - char: hiryuu_meta?
      side: right
      status: is-meta
      text:
        - "Похоже, ты уже немало знаешь. Это Антиох так пытается переманить вас на свою сторону?.."
        - "Ха-ха, раз у тебя столько вопросов, почему бы не вернуться и не спросить их напрямую?"

    - char: enterprise
      side: left
      text:
        - "Переманить... О чем ты говоришь?!"

    - char: hiryuu_meta?
      side: right
      status: is-meta
      text:
        - "Ладно, у меня дела, на этом светская беседа окончена. Сейчас я развернусь и уйду. Посмеете погнаться за мной — убью всех до единого."
        - "учу-шучу~ Не напрягайтесь. Сначала попробуйте хотя бы сравняться со мной в скорости. И если ничего не знаете об Арбитрах, лучше не лезьте в этот водоворот еще глубже."

    - text:
      - "Давление, сковывавшее всё тело, исчезло. Я снова чувствую, как мышцы начинают слушаться."
      - "То, что я сейчас ощутил — это была жажда крови, переданная через один лишь взгляд... Ледяная жажда крови, закаленная в бесчисленных кровавых сражениях."

    - char: north_carolina
      side: left
      text:
        - "Хоть она и сказала, что шутит, в её глазах не было и намека на шутку..."

    - char: hornet
      side: right
      text:
        - "Напустила на себя важный вид, а в итоге просто сбежала! Командир, нам преследовать её?"

    - char: commander
      side: left
      text:
        - "Эта девушка из «Пепла» была права: наш флот действительно не сможет её догнать... Нужно проанализировать ситуацию и первым делом доложить в Штаб."
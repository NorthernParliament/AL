chapter1:
  rows:

    - char: tb_rad
      side: left
      text:
        - "Директива подтверждена. Командир, флот прибыл на внешнюю границу центральной зоны океана NA."
        - "Для обеспечения беспрепятственного развертывания аванпоста прежде всего необходимо полностью зачистить данный сектор от сил противника."

    - char: commander
      side: right
      text:
        - "Наконец-то мы подошли к последнему шагу перед генеральным штурмом... Всем кораблям — внимание! Приготовиться к бою!"
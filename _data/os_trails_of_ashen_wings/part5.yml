chapter1:
  rows:

    - char: tb_rad
      side: left
      text:
        - "Статус учений подтверждён: флот успешно вышел из боя."

    - char: hornet
      side: right
      text:
        - "Хе-хе-хе, этот этап Штаб добавил специально для отработки отступления. Забавно вышло, правда?"
        - "Не переживай, это было лишь локальное отступление. Флоту не нужно немедленно возвращаться в порт для пополнения запасов."
        - "На этом вводная часть учений полностью завершена. Дальше — попутного ветра!"

    - char: tb_rad
      side: left
      text:
        - "Директива учений подтверждена: учения окончены."
        - "Командир, пожалуйста, следуйте заданным курсом в порт Нью-Йорка для участия в официальном сборе сил кампании."
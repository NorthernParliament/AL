chapter1:
  rows:

    - char: tb_rad
      side: left
      text:
        - "Модуль анализа синхронизирован. Подтверждаю: вражеские силы во всей акватории полностью зачищены. Командир, мы можем переходить к следующему этапу развёртывания."

    - char: baltimore
      side: right
      text:
        - "Теперь осталось только дождаться прибытия транспортного флота с компонентами базы и начать установку аванпоста."

    - char: hornet
      side: left
      text:
        - "Слушайте, а что вообще из себя представляет этот аванпост для данной операции? Я честно просмотрела кучу документов, но так до конца и не вникла... хе-хе~"

    - char: north_carolina
      side: right
      text:
        - "Насколько мне известно, в конструкции аванпоста использовано множество новейших технологий Штаба. По сути, это нечто вроде самоходного закрытого плавучего дока огромных размеров."
        - "Это не просто плавучий док для отдыха экипажей, пополнения припасов и ремонта флота, но и полноценный центр оперативного управления, оснащённый самым передовым оборудованием."

    - char: baltimore
      side: left
      text:
        - "Говорят, даже броня и системы вооружения там уровня крепости, представляете?"

    - char: hornet
      side: right
      text:
        - "Ого, неужели он настолько мощный?! Что ж, я уже вся в предвкушении!"

    - char: commander
      side: left
      text:
        - "После затяжных боёв флот остро нуждается в снабжении и ремонте. Наличие на передовой такого многофункционального аванпоста имеет неоспоримое значение для грядущего сражения."
        - "Как только аванпосты во всех секторах будут достроены, следующим шагом станет переход к генеральному штурму... Надеюсь, у остальных флотов тоже всё пройдёт гладко."
        - "Ты тоже отлично потрудилась на протяжении всего пути, ТБ."

    - char: tb_rad
      side: right
      text:
        - "..Для меня большая честь оказывать вам поддержку в бою, Командир."

    - char: commander
      side: left
      text:
        - "(Хм...? Мне показалось, или в голосе Навигатора сейчас проскользнули нотки сомнения?)"
chapter1:
  rows:

    - char: enterprise
      side: left
      text:
        - "Командир, маршрут от порта Нью-Йорка до центра Бермудского треугольника зачищен. Можно связываться со Штабом для получения дальнейших указаний."

    - char: commander
      side: right
      text:
        - "Отлично. Отправляю отчёт."

chapter2:
  rows:

    - char: saratoga_rad
      side: left
      text:
        - "М-хм, понятно... И впрямь, ситуация — голову сломишь. Отличная работа, Командир!"
        - "Командование Нью-Йорка попытается выследить ту новую участницу «Пепла». Что касается дальнейшего изучения аномалий в Бермудах, Штаб примет решение после обсуждения."
        - "Все отлично потрудились, но останавливаться на достигнутом ещё рано!"
        - "Следующий этап — продолжать движение и пробить путь к центральной зоне океана."
        - "В остальных секторах наступление тоже идёт по плану. Скоро и я отправлюсь на передовую в качестве подкрепления. Увидимся во время генерального штурма!"
        - "Ах да, насчёт Багровой Оси... А, ладно! Если появятся свежие разведданные, я сразу же дам тебе знать!"
        - "Сестрёнка Сара, конец связи~!"

    - char: baltimore
      side: right
      text:
        - "То, что Саратога не договорила в конце, немного напрягает... Энтерпрайз, ты что-нибудь об этом знаешь?"

    - char: enterprise
      side: left
      text:
        - "Хм... Это не секретная информация. На самом деле, чтобы обеспечить успех операции, Штаб ведёт переговоры с Багровой Осью о краткосрочном перемирии в акватории NA."
        - "За переговоры отвечает лично Куин Элизабет из Королевского Флота. Судя по тону Саратоги, прогресс будет достигнут довольно скоро."

    - char: hornet
      side: right
      text:
        - "Э-э-э?! Я об этом вообще впервые слышу!"

    - char: north_carolina
      side: left
      text:
        - "Переговоры о прекращении огня с Багровой Осью... Неужели об этом действительно можно договориться?.."

    - char: baltimore
      side: right
      text:
        - "Да ещё и доверить это Елизавете... Она ведь в прошлый раз здорово прокололась в деле с Фридрих дер Гроссе. Не возникнет ли проблем?.."

    - char: enterprise
      side: left
      text:
        - "Не стоит переживать. В вопросах такого масштаба она не позволит эмоциям взять верх. Верьте в Королевский Флот и способности Элизабет."

    - text:
      - "Краткосрочное перемирие с Багровой Осью... Если удастся его достичь..."
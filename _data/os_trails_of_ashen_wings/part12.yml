chapter1:
  rows:

    - char: north_carolina
      side: left
      text:
        - "Странно... Совсем недавно на нас нахлынула целая прорва врагов, а чем глубже мы заходим, тем меньше их становится."

    - char: baltimore
      side: right
      text:
        - "Зато плотность обломков только растет. Похоже, та госпожа Хирю из «Пепла» уже расчистила нам путь."
        - "Сирены ведь совсем недавно отбили Бермуды... Невероятно, что за такой короткий срок они успели возвести столько сооружений и развернуть такие силы флота."

    - char: hornet
      side: left
      text:
        - "Мы воюем с Сиренами, «Пепел» тоже воюет с Сиренами. При этом у нас есть приказ Штаба открывать огонь по «Пеплу», да и они к нам дружелюбия не проявляют."
        - "А если добавить сюда еще и Багровую Ось, то в этой заварушке участвуют уже четыре стороны... Всё меньше и меньше понимаю, куда катится эта война..."

    - char: north_carolina
      side: right
      text:
        - "Меня беспокоит то, что она упомянула «Арбитров». Неужели «Пепел» предпринял такое масштабное наступление на Сирен в этой акватории именно ради поисков чего-то, связанного с ними?"

    - char: enterprise
      side: left
      text:
        - "Похоже, причины аномального развертывания сил Сирен в океане NA куда сложнее, чем мы думали..."

    - text:
      - "БАБАХ!!!"

    - char: hornet
      side: left
      text:
        - "Это сейчас был... гром? Небо же совершенно ясное, откуда такой резкий раскат...?!"

    - char: north_carolina
      side: right
      text:
        - "Океанские течения здесь тоже в полном беспорядке. Словно... всю эту акваторию разорвали на части."

    - char: baltimore
      side: left
      text:
        - "Энтерпрайз, еще немного вперед — и мы будем на месте бывшей Сингулярности, верно?"

    - char: enterprise
      side: right
      text:
        - "Да... Хотя прошлая Сингулярность исчезла, состояние моря в этом районе с тех пор остается крайне странным."
        - "Навигатор, ты можешь объединить данные разведки и провести объемный анализ гидрометеорологической обстановки в ближайших секторах?"

    - char: tb_rad
      side: left
      text:
        - "Директива подтверждена. Принято. Начинаю интеграцию данных с разведывательной авиации, радаров и сонаров флота..."

    - char: hornet
      side: right
      text:
        - "Чем больше смотрю, тем сильнее впечатляюсь... Обработка такого массива данных обычно занимает у целого штаба несколько часов!"

    - char: baltimore
      side: left
      text:
        - "Удивительно... Когда это Штаб успел овладеть настолько продвинутыми технологиями?.."

    - char: tb_rad
      side: right
      text:
        - "Прогноз погоды и анализ океанских течений для данной акватории завершен. Пожалуйста, ознакомьтесь с результатами в системе G.M."
        - "Также предупреждаю: в ближайшие 6 часов возможно резкое ухудшение погодных условий. Прошу флот принять соответствующие меры."

    - text:
      - "С таким надежным Навигатором мы, наконец, можем безопасно исследовать этот район с его непредсказуемым морем."

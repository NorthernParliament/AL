chapter1:
  rows:

    - char: hornet_rad
      side: left
      text:
        - "СТОП! Командир, дальше идти нельзя!"

chapter2:
  rows:

    - char: commander
      side: left
      text:
        - "...Хорнет?"

    - char: hornet_rad
      side: right
      text:
        - "Хе-хе, давненько не виделись, Командир~"

chapter3:
  rows:

    - char: commander
      side: left
      text:
        - "Не ожидал, что мы так быстро столкнемся с врагом..."
        - "Весь флот, к бою! Приготовиться к..."

    - char: hornet_rad
      side: right
      text:
        - "Уа-а-а-а! Погоди, погоди! Виновата, не стоило так внезапно шутить. Это я, настоящая Хорнет!"

chapter4:
  rows:

    - char: hornet_rad
      side: left
      text:
        - "Дело в том, что из-за влияния аномальной зоны в центре океана, обстановка во всей акватории NA сильно изменилась."
        - "В целях безопасности Штаб подготовил для каждого участвующего в операции флота специальные учения, чтобы помочь всем поскорее войти в боевой ритм."
        - "Хотя я уверена, что у тебя, Командир, проблем не возникнет, но приказ есть приказ. Для начала — попробуй отыскать меня!"

    - char: tb_rad
      side: right
      text:
        - "Директива учений подтверждена: пожалуйста, определите местоположение Хорнет в данном секторе."
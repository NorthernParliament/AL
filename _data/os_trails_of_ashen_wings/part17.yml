chapter1:
  rows:

    - char: baltimore
      side: left
      text:
        - "Мы уже так глубоко продвинулись вглубь океана NA, но что-то здесь не так... Врагов всё ещё слишком мало."
        - "Согласно старым морским картам, этот район должен иметь уровень опасности 6–8. То есть зона, предназначенная исключительно для основных ударных сил, выполняющих особые боевые задачи!"

    - char: north_carolina
      side: right
      text:
        - "В том ограниченном сопротивлении, которое сейчас оказывают Сирены, совершенно не чувствуется присутствия командующего. Их действия слишком примитивны."
        - "Их боеспособность даже близко не стоит с теми силами, с которыми мы столкнулись в Бермудах. Хотя, если верить картам, уровень опасности там должен был быть ниже..."

    - char: commander
      side: left
      text:
        - "Похоже, ещё одна пачка морских карт отправится в утиль."

    - char: enterprise
      side: right
      text:
        - "Исходя из моего боевого опыта, Сирены переходят к такой модели поведения только тогда, когда их система управления флотом получает сокрушительный удар."
        - "Но что могло нанести такой урон системе командования Сирен на столь обширной территории?.."

    - char: baltimore
      side: left
      text:
        - "Остается только один вариант — сбой в работе центральной системы управления. Это бы объяснило и низкую эффективность командования, и аномальное развертывание флотов."

    - char: hornet
      side: right
      text:
        - "Но мы ведь только что вели тяжелый бой с Сиренами в Бермудах! Я уверена, что та группа находилась под прямым управлением высокопоставленных Сирен."

    - char: north_carolina
      side: left
      text:
        - "Если подытожить текущую ситуацию... получается, одни узлы системы управления Сирен вышли из строя, в то время как другие работают исправно?"

    - char: baltimore
      side: right
      text:
        - "Хе-хе, какова бы ни была причина, сейчас определенно лучший момент, чтобы отбить весь океан NA. Штаб выбрал идеальное время!"

    - char: commander
      side: left
      text:
        - "(Да, это так. В любом случае, будем продолжать сражаться и попутно искать причину аномального состояния Сирен.)"
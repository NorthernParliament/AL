chapter1:
  rows:

    - char: saratoga_rad
      side: left
      text:
        - "Командир! Это экстренная связь от сестрёнки Сары!"
        - "Буквально только что Элизабет и Фридрих дер Гроссе официально подписали соглашение о временном прекращении огня в акватории NA. Какое-то время нам не придётся беспокоиться о Багровой Оси во время операции!"
        - "...М-м? Судя по твоей реакции, Энтерпрайз уже успела нашептать тебе о готовящемся перемирии~!"

    - char: enterprise
      side: right
      text:
        - "Саратога, сейчас не самый подходящий момент для обсуждения мира. Мы вот-вот вступим в полноценный огневой контакт с основными силами Железной Крови, с которыми столкнулись ранее."

    - char: saratoga_rad
      side: left
      text:
        - "Э-э-э?!"

    - char: hornet
      side: right
      text:
        - "Группы палубной авиации почти над флотом Железной Крови. Начинаем ата..."
        - "А? Погодите... Основной флот Железной Крови... исчез?"

    - char: baltimore
      side: left
      text:
        - "А... В смысле «исчез»? Как уже обнаруженный флот Железной Крови мог внезапно оторваться от слежки наших самолётов?.."

    - char: north_carolina
      side: right
      text:
        - "Неужели это те же трюки с камуфляжем и помехами, что были на полярных маршрутах..."

    - char: hornet
      side: left
      text:
        - "Даже если так, должны были остаться хотя бы эсминцы прикрытия, но сейчас на поверхности моря абсолютно пусто... Я немедленно разворачиваю повторный поиск!"

    - char: saratoga_rad
      side: right
      text:
        - "Хм... Погоди-ка. Похоже, Багровая Ось нашла какой-то способ выйти из зоны нашей видимости."
        - "Но раз уж противник решил не продолжать бой, значит, они в какой-то мере соблюдают условия перемирия... Сестрёнка Сара советует прекратить преследование, иначе получится, что это мы первыми нарушили договор!"

    - char: commander
      side: left
      text:
        - "Выражаю согласие."

    - char: hornet
      side: right
      text:
        - "Эх, сорвались с крючка... Слушай, Штаб и правда собирается позволить Багровой Оси так свободно разгуливать по всему океану NA?"

    - char: saratoga_rad
      side: right
      text:
        - "Насчёт этого... Внутри самого Командования было много споров, прежде чем удалось прийти к единому мнению."
        - "Хотя Свободный Ирис по-прежнему относится к этому соглашению со скепсисом... Командир, а что ты думаешь по этому поводу?"

chapter2:
  rows:

    - char: commander
      side: left
      text:
        - "Я отношусь к этому с пониманием."

chapter3:
  rows:

    - char: commander
      side: left
      text:
        - "Мне трудно это понять."

chapter4:
  rows:

    - char: enterprise
      side: right
      text:
        - "Саратога, Командир имеет право знать детали этого дела."

    - char: saratoga_rad
      side: left
      text:
        - "М-м... Штаб в полной мере уважает и понимает позиции всех сторон, поэтому данное соглашение было реализовано через серию сложных частных односторонних договоров."
        - "Если вкратце: в обмен на то, что Королевский Флот разрешил силам Империи Сакуры проход через подконтрольные ему воды, Железная Кровь согласилась открыть часть своих акваторий для прохода Северного Парламента."
        - "На основе этих двух договоров, а также конвенции о проходе через Суэцкий канал, и было выстроено соглашение о прекращении огня между двумя альянсами, которое действует исключительно на период операции против Сирен в океане NA."

    - char: north_carolina
      side: right
      text:
        - "Могу ли я трактовать это так, что в данной акватории наше противостояние с Багровой Осью прекращено?"

    - char: enterprise
      side: left
      text:
        - "Нет. Мы всё ещё находимся в состоянии конфронтации с Багровой Осью. В случае нападения мы по-прежнему имеем право на полномасштабный ответный удар."

    - char: saratoga_rad
      side: right
      text:
        - "Эх... С тех пор как Багровая Ось откололась, у нас долго не было такой возможности — одним махом уничтожить Сирен и вернуть себе океан."
        - "Победа над Сиренами — наша общая цель. Мы не можем рисковать провалом всей кампании из-за внутренних распрей в такой критический момент."
        - "И в этом вопросе взгляды Багровой Оси совпадают с нашими."

    - char: queen_elizabeth_rad
      side: left
      text:
        - "Хмпф! Редкий случай, когда нам удалось прийти к согласию хоть в чём-то!"

    - char: saratoga_rad
      side: right
      text:
        - "Элизабет?! Ты уже закончила со своими делами?"

    - char: queen_elizabeth_rad
      side: left
      text:
        - "Ха! Благо Ваше Величество вернулась до того, как начался настоящий хаос. Стоит признать, у этой Фридрих дер Гроссе есть кое-какие таланты... Но за все прошлые обиды я с ней ещё поквитаюсь!"
        - "И вообще, операция в самом разгаре, хватит болтать! Живее за работу! Если не обустроите аванпосты вовремя, следующий этап операции не начнётся в срок!"
        - "Сражайтесь усерднее. Я с нетерпением жду того дня, когда мы встанем плечом к плечу во время генерального штурма!"
chapter1:
  rows:

    - char: tb_rad
      side: left
      text:
        - "Командир, добро пожаловать в оперативный штаб. Позвольте мне разъяснить вам ситуацию с маяками «Пепла» и специфику боевых действий против их участников."
        - "Устройства и вооружение флота «Пепла» обладают уникальной структурой, что позволяет им долгое время оставаться невидимыми для наших радаров."
        - "В ходе недавнего испытания научно-исследовательский отдел сумел расшифровать уникальную сигнатуру, которую их оборудование излучает во время боя."
        - "Командование дало этому явлению название «Маяк Пепла». Анализируя собранные сигналы маяков, наш флот сможет оперативно обнаруживать участников «Пепла», находящихся в состоянии боя в данной акватории."
        - "В отличие от Сирен, среди представителей «Пепла» встречаются как откровенно враждебные особи, так и нейтральные. В некоторых случаях возможен диалог, однако это сопряжено с крайне высокими рисками."
        - "Кроме того, согласно имеющимся данным, не все цели с подобной сигнатурой принадлежат именно к «Пеплу». Они относятся к более широкой категории, классифицируемой как META."
        - "Командование полагает, что, хотя на данном этапе «Пепел» не нанес критического ущерба операции, само их существование является дестабилизирующим фактором, влияющим на успех миссии."

    - char: commander
      side: right
      text:
        - "(Похоже, столкновений с «Пеплом» не избежать...)"

    - char: memphis
      side: left
      text:
        - "Штаб вовсе не призывает к полному уничтожению «Пепла» как единственному способу устранения угрозы."
        - "Просто они ни разу не ответили на наши запросы о связи. На данный момент, кроме боя, у нас нет другого способа достучаться до них."
        - "Если у кого-то из «Пепла» действительно есть потенциал стать нашими союзниками, давайте узнаем их истинные намерения в сражении. Как говорится, «нет лучшего способа узнать человека, чем в честном бою»!"

    - char: commander
      side: right
      text:
        - "Вот оно что... Было бы замечательно, если бы это действительно помогло нам лучше понять друг друга."
        - "Надеюсь, они не станут нашими настоящими врагами..."
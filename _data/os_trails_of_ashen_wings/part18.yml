chapter1:
  rows:

    - char: hornet
      side: left
      text:
        - "Стоп-стоп! Всем замереть на секунду! Мои разведчики засекли флот, который ведет себя крайне подозрительно!"
        - "....Да ну, не может быть! Самолеты докладывают, что в составе группы замечен Тирпиц. Это же основной флот Железной Крови, который на днях атаковал Скапа-Флоу и прорвал блокаду Королевского Флота!"

    - char: north_carolina
      side: right
      text:
        - "Каким курсом они идут?!"

    - char: hornet
      side: left
      text:
        - "Противоположным нашему — они движутся прямиком в сторону Бермуд. Кажется, они нас еще не заметили."

    - char: baltimore
      side: right
      text:
        - "Ну, слабая авиаразведка — это ведь визитная карточка флота Железной Крови."
        - "Сначала напали на Королевский Флот, а теперь тихушничают у наших берегов... Их намерения более чем очевидны!"

    - char: hornet
      side: left
      text:
        - "Погодите! Разве Штаб не ведет переговоры о перемирии с Багровой Осью?!"

    - char: north_carolina
      side: right
      text:
        - "В этом-то и проблема. Возможно, это внезапная атака под прикрытием переговоров, или же они хотят выторговать себе побольше преимуществ за столом дискуссий."
        - "В любом случае, Штаб, скорее всего, всё еще пребывает в неведении..."

    - char: commander
      side: left
      text:
        - "Немедленно доложить в Штаб!"

    - char: tb_rad
      side: right
      text:
        - "Директива подтверждена. Передаю разведданные командованию."

    - char: baltimore
      side: left
      text:
        - "Что будем делать дальше, Командир? Перемирие еще официально не подписано. Может, ударим первыми, пока силы Железной Крови нас не обнаружили?"

    - char: commander
      side: right
      text:
        - "Обстановка в океане NA и без того запутана. Дальнейшая эскалация конфликта сейчас идет вразрез с общим планом кампании."
        - "В Бермудском треугольнике действительно творится неладное... Не исключено, что цель флота Железной Крови именно там.."

    - char: enterprise
      side: left
      text:
        - "Согласна. Перед началом операции Штаб неоднократно подчеркивал: избегать бессмысленных столкновений с Багровой Осью."
        - "Но... мы также не можем позволить флоту Железной Крови беспрепятственно приближаться к побережью Союза Орла..."

    - char: hornet
      side: right
      text:
        - "Как насчет того, чтобы прогнать палубную авиацию прямо у них над головами в качестве предупреждения?"

    - char: commander
      side: left
      text:
        - "Флот, изменить курс! Вынести предупреждение силам Железной Крови с воздуха."

    - char: tb_rad
      side: right
      text:
        - "Директива подтверждена. Цель — флот Железной Крови. Прокладываю оптимальный курс для сближения..."

    - char: hornet
      side: left
      text:
        - "Хе-хе, небо — это по моей части! Давайте устроим этим гулякам из Железной Крови небольшое предупредительное шоу!"
chapter1:
  rows:

    - char: hornet
      side: left
      text:
        - "Хм, флот Железной Крови проигнорировал мои палубные самолеты, пролетевшие на бреющем полете. Они не сбавили ход, но и не открыли огонь."

    - char: baltimore
      side: right
      text:
        - "Такая реакция совсем не в духе Железной Крови. Неужели это опять те же фокусы с устройствами помех, что и в прошлый раз?"
        - "Я помню, Королевский Флот тогда решил проверить их старым добрым методом — ударом в лоб. Что скажешь, Командир?"

chapter2:
  rows:

    - char: commander
      side: left
      text:
        - "Нанести удар с использованием палубной авиации."

chapter3:
  rows:

    - char: commander
      side: left
      text:
        - "Нужно выяснить всё лично."

chapter4:
  rows:

    - char: tb_rad
      side: right
      text:
        - "Модуль анализа синхронизирован. Зафиксирован широковещательный сигнал со стороны Железной Крови. Они передали частоту и запрашивают создание временного канала связи."

    - char: commander
      side: left
      text:
        - "Пока мы сохраняем преимущество скрытности, лучше сначала поговорить. Послушаем, что скажет Железная Кровь, а потом решим."

chapter5:
  rows:

    - char: tirpitz_rad
      side: left
      status: is-red
      text:
        - "Приветствую флот Лазурного Пути, где бы вы ни находились. Говорит Тирпиц, флагман флота Железной Крови."
        - "Преследование и слежка — не самые благородные черты, да и установление радиосвязи — выбор небезопасный. Быть может, обсудим всё с глазу на глаз?"

    - char: baltimore
      side: right
      text:
        - "Хмпф, складно звонишь. Что-то незаметно было вашего «благородства», когда вы атаковали флот и стоянки Королевского Флота."

    - char: enterprise
      side: left
      text:
        - "Я — Энтерпрайз. Тирпиц, вы вошли в воды, находящиеся под юрисдикцией Лазурного Пути. Требую немедленно развернуться и покинуть сектор. Продолжение движения будет расценено как акт агрессии против всех членов Лазурного Пути."

    - char: deutschland_rad
      side: right
      status: is-red
      text:
        - "Юрисдикция Лазурного Пути? Весь наш путь до этого момента ясно давал понять, что здесь заправляют Сирены."
        - "Мы просто входим в зону контроля Сирен. Не суйте нос не в своё дело."

    - char: north_carolina
      side: left
      text:
        - "Вы ведь планируете воспользоваться тем, что мы заняты операцией, чтобы обойти нас и нанести удар по прибрежным базам Союза Орла, не так ли?"

    - char: tirpitz_rad
      side: right
      status: is-red
      text:
        - "Пожалуйста, не поймите превратно. Нас не интересует ваша операция, и уж тем более у нас нет ни малейшего желания нападать на материковую часть Союза Орла."
        - "Но если даже после этого вы намерены преградить нам путь..."

    - char: hornet
      side: left
      text:
        - "Командир! Флот Железной Крови внезапно сменил строй и курс! Они на полной скорости идут прямо на нас! Похоже, наше местоположение раскрыто!"

    - char: commander
      side: right
      text:
        - "(Что...?! Эта связь была лишь ловушкой Железной Крови...!)"
        - "Немедленно разорвать связь! К бою!"
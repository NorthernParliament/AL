chapter1:
  rows:

    - char: hood_rad
      side: left
      text:
        - "Дамы и господа, благодарю вас за то, что вы откликнулись на призыв Штаба и проделали столь долгий путь."
        - "С тех пор как появились Сирены, мы давно не наслаждались таким освежающим морским бризом, и наш флот давно не бороздил эти просторы так свободно."
        - "В нашей борьбе бывали темные времена. Мы теряли океаны, теряли близких, теряли почти всё..."
        - "Но благодаря тому, что наши предшественники не теряли надежды и не прекращали сопротивление в самые мрачные часы..."
        - "Мы дожили до сегодняшнего момента — момента нашего контрудара!"
        - "Прямо сейчас наш величайший флот собран здесь, на этой водной глади. И у этого могучего флота есть лишь одна цель..."
        - "Вернуть это море, принадлежащее нам по праву!"
        - "Мы слишком долго хранили молчание, слишком долго терпели. Сегодня начинается наш расчет с Сиренами!"
        - "Сражайтесь! Каким бы долгим и трудным ни был путь впереди, мы должны одержать победу. Ибо только победа даст нам право на дальнейшее существование!"
        - "Я знаю ваше отношение к Багровой Оси, знаю о наших разногласиях."
        - "Но в конечном счете, наш истинный враг — это Сирены. Прошу вас избегать бессмысленных конфликтов и строго придерживаться плана операции."
        - "От имени командования Лазурного Пути я объявляю: кампания в океане NA официально началась!"
        - "Желаю вам сокрушить любого врага и вернуться с триумфом!"

chapter2:
  rows:

    - char: enterprise
      side: left
      text:
        - "Блестящая речь, Худ. Даже у меня кровь закипает..."

    - char: commander
      side: right
      text:
        - "Согласен."

    - char: hood_rad
      side: left
      text:
        - "Ха-ха, вы мне льстите. Командир, вы уже успели привыкнуть к вспомогательному ИИ, который Штаб внедрил для этой операции?"

    - char: commander
      side: right
      text:
        - "Речь о том офицере связи по имени Навигатор-ТБ?"

chapter3:
  rows:

    - char: commander
      side: left
      text:
        - "Она кажется мне подозрительно знакомой."

    - char: saratoga
      side: right
      text:
        - "Ну, образ ТБ был разработан как образ милой девушки, так что это нормально, если Командиру она кажется знакомой~"

chapter4:
  rows:

    - char: commander
      side: left
      text:
        - "Пока немного непривычно."

    - char: hood_rad
      side: right
      text:
        - "Неужели... Впрочем, это совершенно новая боевая система. Вероятно, Штаб и создал виртуальный образ системы в виде дружелюбной юной леди именно для того, чтобы облегчить адаптацию."

chapter5:
  rows:

    - char: tb_rad
      side: left
      text:
        - "В ходе этой операции я буду помогать вам в качестве адъютанта. Прошу любить и жаловать."

    - char: commander
      side: right
      text:
        - "Взаимно."
        - "(ИИ, то есть вспомогательная программа, созданная машинным кодом... Но с таким обликом и голосом её действительно трудно воспринимать как обычную железку...)"

    - char: saratoga
      side: left
      text:
        - "План операции, карты секторов и куча другой информации уже записаны у госпожи Навигатора. Если во время боя что-то будет непонятно — не стесняйся, спрашивай её о чём угодно!"
        - "Также госпожа Навигатор будет выступать связующим звеном между передовым флотом и штабом. В этот раз мы усилили систему связи, так что Сирены точно не смогут заглушить нас так просто, как раньше! ...Наверное."
        - "Так что ладьте с госпожой ТБ!"
        - "Ну что же, Командир, Энтерпрайз, Худ — мне пора возвращаться в штаб. Надеюсь, у всех нас операция пройдет гладко!"
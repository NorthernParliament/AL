chapter1:
  rows:

    - char: tb_rad
      side: left
      text:
        - "Соединение установлено. Шифрованный канал связи подключен..."
        - "Рада нашей первой встрече, Командир."
        - "Моё имя — «Навигатор-ТБ» или просто ТБ. Я — новейшая вспомогательная интеллектуальная личность, разработанная Штабом в рамках проекта «Мост» (The Bridge)."
        - "При стабильном подключении к мейнфрейму я могу выполнять задачи по сбору разведданных и тактическому анализу, используя радарные и сонарные системы флота."
        - "В случае возникновения помех я перехожу в автономный режим. В этом режиме вычислительные мощности ограничены, однако я по-прежнему могу выполнять калибровку систем управления огнем, интеграцию данных и планирование маршрутов."
        - "В ходе предстоящей операции я буду исполнять обязанности вашего адъютанта и помогать в управлении боевыми действиями."
        - "Командир, передаю вам секретные директивы Штаба:"
        - "Согласно данным недавней разведки, Штаб уверен, что оперативные флоты Сирен, дислоцированные в прибрежных водах океана NA, отступают вглубь акватории."
        - "Причина этой аномалии пока не ясна, расследование продолжается."
        - "Как результат, из-за отхода сил Сирен уровень угрозы в прибрежных районах значительно снизился, что позволило существенно расширить зону наших действий."
        - "В связи с этим Штаб считает, что момент для начала кампании настал. Всем округам приказано оставить лишь необходимые оборонительные силы, а все мобильные соединения немедленно направить в океан NA для подготовки к масштабной операции против Сирен."
        - "Руководство текущей кампанией будут совместно осуществлять Командование Нью-Йорка (NY) и Командование Королевского Флота (LD). Цели операции: зачистка подконтрольных Сиренам зон, прорыв их линии обороны, уничтожение аномальной энергетической зоны в центре океана и, в конечном итоге, восстановление контроля над всей акваторией."
        - "Штаб разделил океан NA на четыре сектора. К сожалению, сектор D находится вне зоны нашего контроля из-за присутствия сил Багровой Оси."
        - "За исключением сектора D, боевые действия начнутся одновременно в трех остальных секторах. После завершения сбора сил вы, как командующий сектором А, поведете флот в бой из порта Нью-Йорка."
        - "Командир, ваша первоочередная задача — вернуть контроль над Бермудским треугольником, который вновь заняли Сирены, а затем продвинуться к границам центральной зоны и основать там две передовые морские базы. Там вы проведете пополнение запасов и будете ожидать приказа к общему наступлению."
        - "Желаю вам успеха в бою. Шифрованная связь завершена, канал закрывается."
chapter1:
  rows:
  - text:
      - "Наконец, после завершения пятидесятой оптимизации алгоритма, оборудование «Линзы Реальности» было практически полностью отлажено и стабилизировано."
      - "Пришло время исследовать те самые разрозненные информационные блоки в сознании Анкоридж."
  - char: "vestal"
    side: "left"
    text:
      - "Командир... Вы уверены, что хотите запустить операцию именно сегодня?"
      - "умаю, испытав всё на собственном опыте, вы и сами понимаете: «Линза Реальности» — это не безобидная машина для создания снов, а симуляционное устройство, работающее на базе основных мощностей «Моря Звезд»."
      - "Во время его работы ваше сознание должно быть непрерывно подключено к аппарату."
      - "Даже если сейчас весь процесс кажется стабильным и контролируемым, сама по себе подобная синхронизация несёт в себе системные риски, которых невозможно избежать."
      - "К тому же мы понятия не имеем, что именно представляют собой данные, которые предстоит исследовать, и как они изменятся под активным внешним воздействием..."
      - "И уж конечно, я совершенно не могу гарантировать, что наши заранее подготовленные «планы на случай непредвиденных обстоятельств» действительно сработают, если эти самые обстоятельства возникнут."
      - "Поэтому с профессиональной точки зрения я выступаю решительно против этой операции."
  - char: "memphis"
    side: "right"
    text:
      - "Я согласна с Вестал. Командир, давайте лучше подождём, пока техническая группа ещё сильнее усовершенствует оборудование, и только тогда начнём."
  - char: "commander"
    side: "left"
    text:
      - "Хм... Я прекрасно понимаю ваше беспокойство."
      - "Если бы простое ожидание могло решить проблему, я бы, разумеется, отложил миссию до лучших времён, пока устройство не станет совершеннее."
      - "Поскольку я лично участвовал во всех этапах отладки «Линзы Реальности», мне слишком хорошо известны текущие риски этой технологии."
      - "Но в то же время я ещё отчётливее осознаю, насколько трудно искоренить эти «системные риски»."
      - "Даже если влить сюда в несколько раз больше ресурсов, на преодоление технических барьеров всё равно уйдут годы."
      - "И неизвестно, не окажут ли за это время скрытые информационные блоки негативного влияния на разум Анкоридж и не возникнут ли другие осложнения."
      - "А потому..."

chapter2:
  rows:
  - char: "commander"
    side: "left"
    text:
      - "Сейчас самый подходящий момент."

chapter3:
  rows:
  - char: "commander"
    side: "left"
    text:
      - "Мы не можем больше ждать!"

chapter4:
  rows:
  - char: "memphis"
    side: "right"
    text:
      - "...Раз уж вы приняли окончательное решение, я передам научно-исследовательскому отделу, чтобы они приступали к финальной проверке «Линзы Реальности»."
  - char: "vestal"
    side: "left"
    text:
      - "...А я пойду позову Хелену, чтобы мы вместе ещё раз перепроверили системы безопасности."
      - "Что бы ни случилось... мы сделаем всё, чтобы защитить вас и Анкоридж!"
  - char: "commander"
    side: "right"
    text:
      - "Спасибо, дальше я полагаюсь на вас."

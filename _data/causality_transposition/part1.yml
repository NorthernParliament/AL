chapter1:
  rows:
  - char: "tb_rad"
    side: "left"
    text:
      - "Статус: записывающее оборудование запущено."
      - "Командир, пожалуйста, оцените степень воссоздания окружающих симуляционных декораций после тридцать пятой оптимизации алгоритма."
  - text:
      - "Я осмотрелся вокруг: письменный стол, книжные шкафы, шторы, ковёр, диван..."
      - "Командный пункт перед моими глазами был смоделирован настолько реалистично, что его уже практически невозможно было отличить от настоящего."
      - "По сравнению с грубыми геометрическими фигурами, которые я видел во время первого эксперимента, скорость оптимизации этой технологии действительно поражает."
  - char: "commander"
    side: "left"
    text:
      - "Какова степень разрешения в этот раз?"
  - char: "tb_rad"
    side: "right"
    text:
      - "Ответ: Командир, степень разрешения симуляционных декораций в этот раз такая же, как и в тридцать четвёртый. То есть степень анализа воспоминаний по-прежнему составляет всего 59.43%."
      - "Однако в этот раз для симуляции окружения использовался оптимизированный алгоритм, объединивший анализируемую часть воспоминаний с данными, собранными непосредственно из реального командного пункта."
  - text:
      - "Оптимизированный алгоритм, значит..."
  - char: "commander"
    side: "left"
    text:
      - "Иными словами, нынешняя обстановка не является ни подлинным воссозданием воспоминаний, ни генерацией, полностью основанной на данных реального помещения?"
  - char: "tb_rad"
    side: "right"
    text:
      - "Подтверждаю. Командир, запрашиваю разрешение на запуск второго этапа текущего эксперимента."

chapter2:
  rows:
  - char: "commander"
    side: "left"
    text:
      - "Разрешаю."

chapter3:
  rows:
  - char: "commander"
    side: "left"
    text:
      - "Давай начнём."

chapter4:
  rows:
  - char: "tb_rad"
    side: "right"
    text:
      - "Директива подтверждена. Стабилизирующий контур отключается."
      - "Командир, пожалуйста, представьте, что вы работаете за своим письменным столом, и мысленно наложите этот образ на окружающую обстановку."
  - text:
      - "Следуя указаниям ТБ, я воссоздал в голове нужную картину."
      - "В тот же миг на столе передо мной прямо из воздуха соткался отчёт, скреплённый красной печатью."
      - "Поначалу подобные внезапные феномены знатно меня пугали... В прошлый раз это даже привело к экстренному запуску защитной системы."
      - "Однако после множества проведённых экспериментов я уже могу совершенно спокойно выполнять такие рутинные тесты по «созданию» предметов."
  - char: "tb_rad"
    side: "right"
    text:
      - "Результаты наблюдения подтверждены. Содержимое отчёта анализируется."
  - char: "commander"
    side: "left"
    text:
      - "Как результаты в этот раз? Есть что-то стоящее?"
  - char: "tb_rad"
    side: "right"
    text:
      - "Ответ: Согласно предварительному анализу, текст в отчёте, судя по всему, воспроизводит новости, которые вы читали вчера. Однако 40.57% объёма текста перекрыто искажённым кодом."
      - "До проведения дальнейшего анализа сделать надёжные выводы невозможно."
  - text:
      - "Когда исследования касаются сферы разума и сознания, продвижение вперёд даётся с огромным трудом..."
      - "Я невольно вспомнил Мемфис, которая перед самым первым экспериментом с на редкость серьёзным лицом объясняла мне суть дела..."

chapter5:
  rows:
  - char: "memphis"
    side: "left"
    text:
      - "Кхм... Командир, хоть мы и называем этот процесс «осознанным сновидением»..."
      - "Но это лишь неофициальное, удобное для речи название. По своей сути это никакой не сон, а научный эксперимент, в ходе которого все данные фиксируются от начала и до конца."
      - "Во время эксперимента «Линза Реальности» будет в реальном времени считывать активность ваших мозговых волн и синхронно материализовать то, о чём вы думаете, прямо в окружающем вас пространстве."
      - "Разумеется, порог считывания был точно отрегулирован. Это гарантирует, что «Линза Реальности» будет улавливать только ваши чётко сформулированные мысли, а не мимолётные, промелькнувшие в голове образы."
      - "Из соображений безопасности поток информации будет проходить вторичную фильтрацию со стороны леди ТБ. Это необходимо, чтобы пугающий или опасный контент не материализовался."
      - "Однако... Леди Навигатор будет отсеивать только ту информацию, которая оказывает явное психологическое давление, а не вообще всё, что не совпадает с целями эксперимента."
      - "В конце концов, цель этой серии тестов — оптимизировать алгоритм «Линзы Реальности» и позволить вам освоиться с интерфейсом взаимодействия внутри неё."
      - "Так что... Командир, когда вы о чём-то думаете, вы должны быть... ну, крайне осмотрительны. Ни в коем случае не позволяйте своим мыслям блуждать!"
      - "Мне очень жаль, но все эти эксперименты — необходимая подготовка для того, чтобы наша операция прошла гладко."
      - "Спасибо за понимание, и простите за грядущие трудности в ближайшее время..."

chapter6:
  rows:
  - char: "tb_rad"
    side: "right"
    text:
      - "Вопрос: Командир, с какой целью вы сейчас материализовали образ мисс Мемфис внутри командного пункта?"
  - char: "memphis"
    side: "left"
    text:
      - "......"
  - text:
      - "...Ой, нехорошо. Стоило моим мыслям лишь немного закрепиться за воспоминанием, как окружающее пространство тут же на это отреагировало."
      - "От греха подальше, прежде чем приступать к полноценному расследованию, лучше провести ещё несколько тестов..."

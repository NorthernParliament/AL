chapter1:
  rows:
  - text:
      - "На рабочем столе предо мной лежал отчёт, присланный из научно-исследовательского отдела."
      - "Стоявшая неподалёку Мемфис как раз озвучивала его содержание."
  - char: "memphis"
    side: "left"
    text:
      - "«...Процесс ментального развития кораблей-прототипов сам по себе должен постепенно созревать с течением времени»."
      - "«Однако при сравнении графиков развития различных кораблей-прототипов можно заметить, что кривая ментального роста Анкоридж аномально пологая»."
      - "«После тщательного изучения мы обнаружили, что в её постепенно созревающем сознании всё ещё сохраняются некоторые не поддающиеся анализу разрозненные информационные блоки»."
      - "«Эти фрагменты данных не являются частью структуры сознания Анкоридж, однако они распределены внутри него крайне хаотичным образом»."
      - "«Возможно, между этими изолированными информационными блоками и замедленным ментальным развитием Анкоридж существует прямая связь»."
      - "Вышеизложенное — это всё, что указано в документе исследовательского отдела."
      - "Кроме того, хоть об этом и не написано в отчёте..."
      - "Специалисты из научного отдела полагают, что привычка Анкоридж настойчиво называть вас «Учителем» тоже может быть как-то связана с этими нечитаемыми блоками информации."
  - text:
      - "...Согласно результатам прошлых наблюдений, в момент воссоздания у всех кораблей-прототипов в сознании фиксируется большой объём доступных для мониторинга, но не поддающихся расшифровке информационных блоков."
      - "Хотя анализ содержания этих данных также входит в планы «Моря Звёзд», по мере взросления кансен эти блоки за очень короткое время объединяются, перестраиваются и в итоге полностью исчезают."
      - "Исходя из прошлого опыта, после созревания разума корабля-прототипа подобные информационные блоки больше не фиксируются, поэтому данное явление всегда считалось нормой в процессе ментального развития кансен."
      - "Но теперь в нашей эмпирической формуле появилось исключение... Почему же эта проблема возникла именно у Анкоридж..."

chapter2:
  rows:
  - char: "commander"
    side: "left"
    text:
      - "Что думает об этих данных научно-исследовательский отдел?"
  - char: "memphis"
    side: "right"
    text:
      - "Исследователи пришли к выводу, что на данный момент никакой опасности не прослеживается."
      - "Анкоридж сейчас находится под нашим пристальным наблюдением. Если ситуация хоть немного изменится, научный отдел тут же пришлёт отчёт."
      - "Кстати, Командир, перед приходом сюда я навещала Анкоридж, и сама тоже не заметила, чтобы она чувствовала себя как-то неважно."
      - "Сама Анкоридж говорит, что с ней всё в порядке. Скорее, она вообще не понимает, из-за чего мы так переживаем..."

chapter3:
  rows:
  - char: "commander"
    side: "left"
    text:
      - "У Анкоридж сейчас проявляются какие-то странности?"
  - char: "memphis"
    side: "right"
    text:
      - "На данном этапе научный отдел не выявил никаких аномалий."
      - "Но Анкоридж сейчас под нашим пристальным наблюдением. Если её состояние изменится, исследовательский отдел своевременно пришлёт отчёт."
      - "Перед тем как пойти к вам, я специально заглянула к ней, но тоже не заметила абсолютно ничего необычного."
  - char: "commander"
    side: "left"
    text:
      - "Она говорила, что её что-то беспокоит?"
  - char: "memphis"
    side: "right"
    text:
      - "Нет. И я более чем уверена, что она на самом деле даже не понимает, о чём мы так волнуемся..."

chapter4:
  rows:
  - text:
      - "Хм... Действительно, до того как всё это обнаружилось, за Анкоридж и правда не замечалось никаких странностей."
      - "И всё же неизвестность таит в себе скрытую угрозу, поэтому её необходимо устранить как можно скорее."
      - "Раз уж это связано с Кубом Мудрости, то здесь наверняка найдётся то, с чем я смогу помочь..."
      - "Я начал перебирать в памяти различные засекреченные проекты, которые велись на базе «Море Звёзд»."
      - "И тут в голове всплыло одно название..."
  - char: "commander"
    side: "left"
    text:
      - "ТБ, как продвигается проект «Линза Реальности»?"
  - char: "tb"
    side: "right"
    text:
      - "Директива подтверждена. Выполняю поиск данных."
  - text:
      - "Если мне не изменяет память, этот проект был нацелен на расшифровку информации, сокрытой внутри перестроенных Кубов Мудрости кораблей."
      - "Поскольку эта технология способна пробиваться сквозь туман неизведанного и материализовать иллюзорное сознание в реальности, ей и дали название «Линза Реальности»."
      - "Раз эти информационные блоки распределены в сознании Анкоридж... то, сумев «войти» в её разум напрямую, мы, возможно, увидим их истинную суть."
      - "Иными словами, если устройство готово к работе, то должен быть способ проанализировать и стереть эти неизвестные фрагменты данных из её сознания..."
  - char: "tb"
    side: "right"
    text:
      - "Результаты получены. Командир, согласно оценке научно-исследовательского отдела, проект «Линза Реальности» завершил этап теоретического проектирования, и на его основе был создан один прототип."
      - "Однако из-за того, что в ходе последующих исследований проектная группа столкнулась с целым рядом сложных проблем, требующих незамедлительного решения, данный прототип ещё не проходил официальных испытаний."
  - char: "memphis"
    side: "left"
    text:
      - "Ой? Вы хотите воспользоваться этим устройством?"
  - char: "commander"
    side: "right"
    text:
      - "Да. Есть какие-то проблемы?"
  - char: "memphis"
    side: "left"
    text:
      - "Ну... Что касается фразы «сложные проблемы, требующие незамедлительного решения» — мне кажется, это просто приукрашивание, которое использовали ради красивого отчёта."
      - "Поскольку этот проект требует вашего личного участия из-за вашей чрезвычайно высокой адаптивности к Кубам Мудрости, а сам по себе он не был критически важным..."
      - "То его приоритет всегда оставался крайне низким. Если честно, с темпами разработки там всё довольно плачевно..."
      - "Думаю, реальное положение дел куда хуже, чем написано в отчёте. Наверняка устройство сейчас в абсолютно нерабочем состоянии... Понимаете?"
  - text:
      - "Звучит крайне убедительно..."
      - "Будь этот вариант рабочим, научно-исследовательский отдел с самого начала предложил бы использовать его для анализа сознания Анкоридж."
      - "И всё же... Раз возникли такие обстоятельства, приоритет проекта «Линза Реальности» необходимо существенно повысить."
  - char: "commander"
    side: "left"
    text:
      - "Мемфис, не могла бы ты лично за этим проследить?"
      - "Установить проекту «Линза Реальности» наивысший приоритет, предоставить ему первоочередное право на выбор ресурсов, а также выделить часть средств из ежегодного резервного бюджета."
      - "В рамках дозволенного предоставить проектной группе максимальную свободу действий. Прототип «Линзы Реальности» должен быть приведен в рабочее состояние в кратчайшие сроки."
  - char: "memphis"
    side: "right"
    text:
      - "Раз уж вы так говорите, то, конечно, без проблем."
      - "Но даже при самой мощной поддержке научно-исследовательскому отделу наверняка придётся возиться с этим ещё довольно долго."
      - "К тому же, как я уже упоминала, этот проект требует вашего личного участия из-за вашей чрезвычайно высокой адаптивности к Кубам Мудрости."
      - "Так что в этот период вам придётся частенько выкраивать время, чтобы помогать им продвигать разработку, понимаете?"
  - char: "commander"
    side: "left"
    text:
      - "Само собой, это моя обязанность."
      - "Кстати, как только разберусь со следующей порцией документов, давай вместе навестим Анкоридж."
  - char: "memphis"
    side: "right"
    text:
      - "С удовольствием! Кхм... Командир, пожалуйста, ознакомьтесь со следующим отчётом. Этот пришёл по проекту «Проницательность» —"


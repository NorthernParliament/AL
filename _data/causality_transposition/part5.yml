chapter1:
  rows:
  - char: "commander"
    side: "left"
    text:
      - "Анкоридж?.. ТБ?"
  - text:
      - "............"
  - char: "commander"
    side: "left"
    text:
      - "...Совсем никакого ответа"
  - text:
      - "Раз я всё ещё могу свободно двигаться, значит, текущее подключение по-прежнему стабильно."
      - "Нынешняя ситуация, должно быть, вызвана тем самым хлынувшим потоком избыточных данных..."
      - "Что ж. Пусть это и абсолютно пустое, залитое белизной пространство, для начала стоит хотя бы немного его осмотреть..."

chapter2:
  rows:
  - text:
      - "Внезапно неподалёку я заметил дверь."
      - "Вокруг неё не было никаких стен или опор — она просто тихо и совершенно противоестественно парила прямо в воздухе."
      - "А рядом с ней стояла... Анкоридж?"
  - char: "anchorage"
    side: "left"
    text:
      - "Учитель... ты пришёл!"
  - char: "commander"
    side: "right"
    text:
      - "Где мы?.."
  - char: "anchorage"
    side: "left"
    text:
      - "Сон... Анкоридж! За дверью... есть... интересные истории!"
      - "...Хочу поделиться... с Учителем!"
  - char: "commander"
    side: "right"
    text:
      - "Сон Анкоридж?.."
  - text:
      - "Странно... Ведь тот класс, где мы только что были, уже сам по себе являлся ментальной проекцией сна Анкоридж."
      - "Неужели это место — сцена из сна, который снится Анкоридж внутри её собственного сновидения?.."
      - "......"
  - char: "commander"
    side: "right"
    text:
      - "Интересные истории? Они там, за дверью?"
  - char: "anchorage"
    side: "left"
    text:
      - "...Угу! Учитель... иди посмотри!"
  - text:
      - "Анкоридж указала на дверь. Судя по всему, она хочет, чтобы я толкнул её и вошёл внутрь."
  - char: "commander"
    side: "right"
    text:
      - "Анкоридж, ты пойдёшь со мной?"
  - char: "anchorage"
    side: "left"
    text:
      - "Анкоридж... в этот раз... не пойдёт!"
      - "Учитель... пришёл впервые, нужно поделиться... с Учителем...!"
  - text:
      - "Раз так, то стоит заглянуть за эту дверь."

chapter3:
  rows:
  - text:
      - "...Я толкнул дверь."
      - "Нет, если говорить точнее, то в самый миг прикосновения руки к двери в моей голове из ниоткуда возникло множество переплетающихся голосов."

chapter4:
  rows:
  - char: "commander"
    side: "left"
    text:
      - "...Чьи только что были эти голоса?!"
  - char: "anzeel???"
    side: "right"
    status: "is-purple"
    text:
      - "......"
  - text:
      - "Белое пространство бесследно исчезло, а на его месте возникла полумрачная комната и стоявшая посреди неё женщина."

chapter5:
  rows:
  - char: "commander"
    side: "left"
    text:
      - "Кто ты?"

chapter6:
  rows:
  - char: "commander"
    side: "left"
    text:
      - "Что это за место?"

chapter7:
  rows:
  - char: "commander"
    side: "left"
    text:
      - "Что тебе известно?"

chapter8:
  rows:
  - char: "anzeel???"
    side: "right"
    status: "is-purple"
    text:
      - "Не спеши, не спеши. Я всего лишь запись. Хм... Ну, запись с определённой долей автономности?"
      - "В общем, давай я всё объясню по порядку."
      - "Прежде всего, касательно вопроса «кто я». Если ты имеешь в виду имя прототип, чей облик я приняла, то её зовут Анзил."
      - "Что же до меня, то тебе лучше называть меня просто «Рекордер»."
  - char: "anzeel_rec"
    side: "right"
    status: "is-purple"
    text:
      - "А насчёт этого места... Это пространство, сотканное из информации."
      - "Хм... Скажем так: изолированное информационное пространство, затерянное в расщелинах «Сети Кубов Мудрости»."
      - "Тебе понятно такое определение? Если нет, ничего страшного. Главное — это место абсолютно невозможно засечь извне."
      - "По идее, ты вообще не должен был обнаружить его так рано..."
  - char: "commander"
    side: "left"
    text:
      - "...«Не должен был обнаружить так рано»?"
  - char: "anzeel_rec"
    side: "right"
    status: "is-purple"
    text:
      - "Ну... Как бы это сказать... Эта запись для «нынешнего тебя» открылась рановато?"
      - "То, что ты оказался здесь, можно назвать... Спидраном? Или использованием бага?"
      - "Да и ладно... Как всегда верила Анзил: «Случайность приносит далеко не только плохие результаты»."
      - "Будем считать текущую ситуацию судьбоносной встречей, допущенной теорией вероятностей."
      - "Разумеется, существование этого информационного пространства абсолютно безвредно для малышки."
      - "Сама по себе Анкоридж... изначально таит в себе кое-что необычное. И её уникальность вовсе не вызвана этим пространством, так что, пожалуйста, не переживай."
      - "Так, погоди... Дай-ка я поищу... А-а..."
      - "...Ой... Плохо дело."
      - "Хе-хе, кажется, в эту запись заложили лишь избыточный массив эмоциональных данных, но совершенно ничего из того, что можно было бы назвать полезной информацией!"

chapter9:
  rows:
  - char: "commander"
    side: "left"
    text:
      - "...?"

chapter10:
  rows:
  - char: "commander"
    side: "left"
    text:
      - "То есть это значит...?"

chapter11:
  rows:
  - char: "anzeel_rec"
    side: "right"
    status: "is-purple"
    text:
      - "Когда Анзил создавала меня, она, должно быть, просто хотела, чтобы в определённый момент и в определённом месте ты смог снова увидеть её... Как-то так?"
      - "Нет... Этот массив эмоциональных данных всё-таки слишком размытый."
      - "Может, интерпретация в духе «просто хотела, чтобы ты в определённый момент и в определённом месте смог снова увидеть её» тоже верна...?"
      - "...Возможно, сам этот образ Анзил — это именно то, что она надеялась передать тебе через данную запись."
      - "Она хотела... чтобы ты помнил её. Даже если ты уже всё позабыл и перестал быть прежним собой."
      - "Доподлинно мне и самой неизвестно... В конце концов, я ведь всего лишь Рекордер."
  - char: "commander"
    side: "left"
    text:
      - "Кем мне приходилась Анзил?"
  - char: "anzeel_rec"
    side: "right"
    text:
      - "Не знаю. Я не могу выдать тебе информацию, которой нет в записи."
      - "Пусть со стороны и кажется, будто я способна чувствовать и мыслить, это всего лишь имитация."
      - "По своей сути я обычная программа, действующая строго по инструкциям."
      - "Погоди... Что-то приближается к этому месту."
      - "Тебя выследили! Что-то увязалось за тобой и проникло сюда!"
  - char: "commander"
    side: "left"
    text:
      - "Что ты имеешь в виду?.. ТБ?"
      - "ТБ и правда была синхронно подключена ко мне после входа сюда, но буквально только что перестала реагировать."
      - "К тому же ты ведь говорила, что это место абсолютно невозможно засечь?"
  - char: "anzeel_rec"
    side: "right"
    status: "is-purple"
    text:
      - "......"
      - "Внимание: зафиксировано приближение угрозы V категории. Согласно протоколу безопасности, данное пространство записей приступает к самоликвидации."

chapter12:
  rows:
  - char: "anchorage"
    side: "left"
    text:
      - "Учитель!"
      - "Скорей... уходим отсюда вместе со мной!"
  - text:
      - "Окружающий мир вновь растворился в ослепительно белом свете, и прямо передо мной из ниоткуда появилась Анкоридж."
      - "Однако прежде чем мои пальцы успели коснуться бегущей навстречу девочки, беспрецедентный приступ головокружения буквально расколол мой разум."
      - "Пронзительный, нарастающий гул эхом зазвенел в каждой клетке мозга, и сознание начало стремительно покидать моё тело."
  - char: "anchorage"
    side: "left"
    text:
      - "Учитель..! Осторожно..! Нет...!!!"
  - text:
      - "......"
      - "И снова... это чувство невесомости..."

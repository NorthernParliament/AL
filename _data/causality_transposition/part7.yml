chapter1:
  rows:
  - text:
      - "То был ночной кошмар, длившийся до самого утра..."
      - "В этом сне за мной постоянно наблюдала чья-то размытая фигура."
      - "Стоило мне осознать её присутствие, как она бесследно растворялась."
      - "Но стоило разуму расслабиться, как она вновь оказывалась там."
      - "Она не издавала ни звука, не совершала ни единого движения — словно изваяние или блуждающий призрак."

chapter2:
  rows:
  - text:
      - "Откуда-то доносится... звук сирены? На базе произошло ЧП?!"
      - "Нет, постой... Я всё ещё нахожусь в мире грёз, однако... та фигура исчезла."
      - "Да, всё верно... Навлекший этот кошмар силуэт испарился."
      - "Неужели ночной кошмар наконец-то отступил?..."
      - "И пусть вокруг вовсю воет тревога, я впервые за долгое время чувствую искреннее, глубокое облегчение."
  - char: "helena_meta"
    side: "left"
    status: "is-meta"
    text:
      - "Командир, радоваться пока ещё слишком рано."
      - "Сейчас не время спать, опасность уже близко."
      - "Просыпайся, Командир, скорее проснись..."

chapter3:
  rows:
  - char: "commander"
    side: "left"
    text:
      - "М-мм..."
  - char: "helena"
    side: "right"
    text:
      - "Командир... Слава богу, ты наконец-то проснулся."
      - "Я никак не могла до тебя докричаться, ты вообще не реагировал. Я уже собиралась бежать за медиками..."
  - char: "commander"
    side: "left"
    text:
      - "Мне как будто снился бесконечный кошмар..."
      - "Хелена, который сейчас час?"
  - char: "helena"
    side: "right"
    text:
      - "...Часы показывают 16:16."
  - char: "commander"
    side: "left"
    text:
      - "Четыре часа дня...? Этого не может быть. Как бы я ни устал, я не мог проспать до такого времени..."
  - char: "helena"
    side: "right"
    text:
      - "Да, всё верно, этого просто не может быть. По внутренним ощущениям сейчас должно быть в районе трех-четырех часов утра."
      - "Но по какой-то причине на всех хронометрах в лагере цифры замерли на отметке 16:16."
      - "К тому же ТБ обнаружила огромный объект неизвестного происхождения, который стремительно приближается к нам."
  - char: "commander"
    side: "left"
    text:
      - "Огромный объект неизвестного происхождения... приближается к нам? Но мы ведь сейчас находимся внутри «Моря Звезд»!"
  - char: "helena"
    side: "right"
    text:
      - "...Именно так. В «Море Звезд» уже объявлен красный уровень тревоги."
      - "Через полчаса комплекс будет полностью заблокирован и перейдет в режим маскировки. После этого мы не сможем гарантировать безопасность тех, кто останется внутри."
      - "К счастью, таймеры обратного отсчета не пострадали... Командир, у нас осталось меньше двадцати пяти минут, скорее иди за мной."
  - char: "commander"
    side: "left"
    text:
      - "Я понял. А где остальные?"
  - char: "helena"
    side: "right"
    text:
      - "Персонал внешних секторов уже эвакуирован. Сотрудники центрального отдела покинут комплекс, как только завершат неотложные процедуры."
  - char: "commander"
    side: "left"
    text:
      - "А что с ТБ?"
  - char: "helena"
    side: "right"
    text:
      - "Навигатор останется здесь... В конце концов, именно тут расположен её основной сервер."
      - "Ну же, Командир, время поджимает! Поговорим по дороге..."

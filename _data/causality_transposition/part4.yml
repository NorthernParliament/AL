chapter1:
  rows:
  - text:
      - "Взгляд застилает тьма, а вокруг воцаряется абсолютная тишина."
      - "Кажется, будто я нахожусь не внутри огромного механизма, а посреди безмолвной чёрной дыры."
      - "И хотя я знаю, что это нормальное состояние перед запуском оборудования, при мысли об особом характере этой операции я невольно начинаю немного нервничать."
  - char: "tb"
    side: "right"
    text:
      - "Командир, зафиксировано повышение вашего пульса. Требуется ли вам медицинская помощь?"
  - text:
      - "Ой, нехорошо... Как и ожидал, внутри «Линзы Реальности» нельзя расслабляться ни на секунду."
      - "Сделав глубокий вдох, я постепенно прихожу в себя и успокаиваю эмоции..."
  - char: "tb"
    side: "right"
    text:
      - "Командир, ваш пульс вернулся в норму."
      - "Пожалуйста, не волнуйтесь. Командир, первая половина этой операции будет аналогична тестам, которые вы проводили ранее: вы будете вести диалог с Анкоридж в симуляционных декорациях."
      - "После этого вам останется лишь следовать моим указаниям и исследовать пространство."
      - "На протяжении всей операции я буду непрерывно оставаться на связи по вашему каналу коммуникации, оказывать вам поддержку и сделаю всё возможное, чтобы обеспечить безопасность — как вашу, так и Анкоридж."
  - char: "commander"
    side: "left"
    text:
      - "Отлично. Включай аппарат, давай начнём."
  - char: "tb"
    side: "right"
    text:
      - "Директива подтверждена. Запуск «Линзы Реальности»..."

chapter2:
  rows:
  - text:
      - "Низкий гул работающего оборудования пронёсся и тут же стих, а всё тело сковало неописуемое чувство невесомости."
      - "Сразу за этим накатило ощущение бескрайней, бесцельной свободы, будто я остался совершенно один посреди беспредельного космоса, где даже время растянулось до незримых границ."
      - "Но в следующий миг всё содрогнулось. Мощной волной нахлынуло гнетущее давление, сотканное из чувства собственной ничтожности, пустоты и одиночества — словно бесконечно простиравшееся пространство вновь сжалось в одну-единственную точку."
      - "Впрочем, и это ощущение миновало в мгновение ока..."

chapter3:
  rows:
  - text:
    - "Когда зрение вернулось ко мне, перед глазами предстал светлый и совершенно пустой учебный класс."
    - "Я стоял у доски на учительском подиуме. Перед назначенным местом ровными рядами тянулись пустые парты и стулья."
    - "И лишь за одним ученическим столом, самым ближним к подиуму, уткнувшись в руки, дремала девочка с волосами кремового оттенка."
    - "Всё точь-в-точь как во время прошлых тестов... В какое бы время я сюда ни пришёл, Анкоридж всегда вот так безмятежно спит посреди класса."
  - char: "tb_rad"
    side: "left"
    text:
      - "Система Навигатор, соединение установлено успешно. Начинаю выполнение диагностического протокола, пожалуйста, подождите."
      - "...Статус подключения: стабильно... База ресурсов: загружена... Величина погрешности: минимальная...."
      - "...Проверка связи: Командир, вы меня слышите?"
  - char: "commander"
    side: "right"
    text:
      - "Слышу громко и чётко. Похоже, пока что всё идёт гладко."
  - char: "tb_rad"
    side: "left"
    text:
      - "...Ответ подтверждён. Система связи: в норме. Диагностический протокол выполнен."
      - "Учитывая текущие обстоятельства, я рекомендую использовать План А для установления контакта."
  - char: "commander"
    side: "right"
    text:
      - "Разрешаю."
  - char: "tb_rad"
    side: "left"
    text:
      - "Директива подтверждена. Командир, пожалуйста, аккуратно разбудите Анкоридж. Заведите с ней разговор и попытайтесь в процессе общения отыскать какие-либо странности в ней самой или в окружающем пространстве."
      - "В это время я перейду в режим радиомолчания, чтобы стабилизировать проекцию ментального пространства Анкоридж, и буду помогать вам анализировать любую ценную информацию, которую вы обнаружите."
  - char: "commander"
    side: "right"
    text:
      - "Хорошо. Действуем по плану."
  - char: "tb_rad"
    side: "left"
    text:
      - "Директива подтверждена. Сгенерированы материалы для чтения. Жанр: сказка."
  - text:
      - "Стоило голосу ТВ затихнуть, как на учительской кафедре из ниоткуда возникло несколько книг."
      - "Я взял одну из них и тихо подошёл к Анкоридж."
  - char: "anchorage"
    side: "left"
    text:
      - "Учитель...?"
      - "Ой...? Учитель..! Анкоридж... дождалась..!"
      - "Учитель... пришёл к Анкоридж... Счастлива!"
  - char: "commander"
    side: "right"
    text:
      - "Анкоридж, тебе нравится слушать истории?"
  - char: "anchorage"
    side: "left"
    text:
      - "Истории... Нравятся!"
      - "Интересные... тёплые... сказочные... Анкоридж... все-все нравятся!"
      - "Но... книги с историями... сложные... Анкоридж... сама не понимает..."
  - char: "commander"
    side: "right"
    text:
      - "Ничего страшного. Учитель сам расскажет Анкоридж одну сказку."
      - "Она называется «Удивительные приключения в сказочном лесу»."
      - "Давным-забытым временем, в одном лесу жила-была зайчиха, и все звали её Зайцем с карманными часами..."

chapter4:
  rows:
  - char: "commander"
    side: "right"
    text:
      - "Ну как? Тебе понравилась эта сказка, Анкоридж?"
  - char: "anchorage"
    side: "left"
    text:
      - "Концовка... очень интересная... Анкоридж... очень-очень понравилась...!"
      - "А ещё... Учитель, который умеет рассказывать истории... такой потрясающий...!"
      - "Анкоридж... для... потрясающего Учителя... приготовила подарок..."
  - text:
      - "Анкоридж вдруг вытащила из ящика парты простой рисунок, нарисованный восковыми мелками."
      - "Весь рисунок был покрыт сплошной серой пеленой, из-за чего разобрать нарисованное место казалось невозможным. Однако сквозь неё смутно угадывались силуэты нескольких человеческих фигур."
      - "Почему-то в тот самый миг, когда я взглянул на этот лист, в груди шевельнулось чувство неописуемой, давящей тревоги..."
  - char: "commander"
    side: "right"
    text:
      - "Этот рисунок... Что это?.."
  - char: "anchorage"
    side: "left"
    text:
      - "Анкоридж сама нарисовала... подарок для Учителя!"
      - "Учителю... нравится...?"
  - char: "tb_rad"
    side: "right"
    text:
      - "Внимание: обнаружен колоссальный объём неизвестных данных."
      - "Внимание: лимит вычислительной мощности системы почти исчерпан."
      - "Внимание: эффективность работы вычислительного комплекса снижается."
      - "Статус подключения: нестабильно."
      - "Командир, я фиксирую колоссальный объём неизвестных данных, хлынувших из глубины этого пространства. В таких условиях я не смогу долго поддерживать стабильность проекции."
      - "Рекомендация: немедленно прервать операцию."
  - char: "commander"
    side: "left"
    text:
      - "Подожди, продержись ещё совсем немного!"
      - "...."
      - "Анкоридж, а кто эти люди на рисунке?"
  - char: "anchorage"
    side: "right"
    text:
      - "Анкоридж... нарисовала Учителя... и... друзей... Учителя..."
      - "Хм-ф... Кхм... Анкоридж... хочет спать."
      - "Всё интересное... из снов... обязательно расскажу Учителю..."

chapter5:
  rows:
  - text:
      - "В мгновение ока классная комната и сама Анкоридж растаяли в воздухе."
      - "Всё вокруг залило ослепительно белым светом..."

chapter1:
  rows:
  - char: "tb"
    side: "left"
    text:
      - "Внимание: внутри «Линзы Реальности» зафиксирован колоссальный приток новых данных, объём которых вскоре превысит выделенное дисковое пространство."
      - "Риск перегрузки: высокий. Эффективность регулятора времени снизилась до 80%."
  - char: "memphis"
    side: "right"
    text:
      - "Что? ..Прошло ведь меньше десяти минут, что это за данные такие, которые умудрились занять всё наше свободное пространство?!"
      - "Неужели... те неизвестные блоки информации, сокрытые в разуме Анкоридж, начали разархивироваться?.."
  - char: "tb"
    side: "left"
    text:
      - "Подтверждаю. Это наиболее логичное предположение в текущих обстоятельствах."
      - "Согласно плану на случай чрезвычайных ситуаций «F», я приступаю к выделению свободных массивов памяти в секторах G104–H142 и I472–K071 под нужды «Линзы Реальности»."
      - "Процесс выполняется..."
  - char: "memphis"
    side: "right"
    text:
      - "Хелена, параллельно распредели потоки данных. Перенаправь часть информации на суперкомпьютер «Андромеда» в экспериментальной зоне E4SR для анализа."
  - char: "helena"
    side: "left"
    text:
      - "...Хорошо, приступаю к операции по перенаправлению потоков..."
  - char: "tb"
    side: "right"
    text:
      - "Процесс завершён: массивы памяти перераспределены."
      - "Внимание: выделенного пространства всё ещё недостаточно, чтобы сдержать скорость разрастания данных. По расчётам, лимит вычислительной мощности будет снова исчерпан через 30 секунд."
  - char: "memphis"
    side: "left"
    text:
      - "Что?! Нам не хватило объёма практически двух дополнительных массивов памяти?!"
      - "Да для симуляции целого мегаполиса не требуется столько места..."
      - "Хелена, мы можем продолжить сброс данных на «Андромеду»?"
  - char: "helena"
    side: "right"
    text:
      - "...Нет, суперкомпьютер «Андромеда» тоже работает на пределе своих возможностей."
  - char: "vestal"
    side: "left"
    text:
      - "Мемфис, мы не можем позволить Командиру продолжать миссию в условиях столь высокого риска!"
  - char: "memphis"
    side: "right"
    text:
      - "Да, я понимаю."
      - "Леди Навигатор, отмена операции! Немедленно разорвите связь Командира и Анкоридж с «Линзой Реальности»."
  - char: "tb"
    side: "left"
    text:
      - "Ответ: данное предложение было отклонено Командиром. Командир выразил желание, чтобы я продержалась ещё какое-то время, дабы он успел разыскать более полезную информацию."
      - "Внимание: эффективность регулятора времени снизилась до 25%. Временное соотношение масштабов вскоре достигнет 1:60."
  - char: "memphis"
    side: "right"
    text:
      - "Плохо дело... Соотношение 1:60 означает, что..."
  - char: "vestal"
    side: "left"
    text:
      - "Одна минута у нас снаружи приравнивается к целому часу внутри «Линзы Реальности»..."
  - char: "tb"
    side: "right"
    text:
      - "Внимание: я теряю контроль над соотношением скоростей течения времени внутри Линзы."
      - "Внимание: из-за снижения эффективности регулятора времени я теряю возможность вести прямое наблюдение за Командиром."
      - "Исходя из текущей ситуации, я приступаю к выполнению плана на случай чрезвычайных ситуаций «K»: останавливаю проекты «Моря Звёзд» с третьим и более низким приоритетом и перевожу высвободившиеся ресурсы на нужды «Линзы Реальности»."
      - "Согласно расчётам скорости разрастания данных, это позволит выиграть ещё около 90 секунд процессорного времени."
  - char: "vestal"
    side: "left"
    text:
      - "Так не пойдет, приток данных бесконечен, и никто не знает, когда он иссякнет."
      - "Разница в скорости течения времени между внутренним и внешним миром выходит из-под контроля. Каждая упущенная нами секунда подвергает Командира всё большей опасности."
      - "Мемфис, задействуй крайнюю меру — объяви в «Море Звёзд» режим чрезвычайного положения."
      - "Только так мы сможем направить сюда абсолютно все вычислительные мощности «Моря Звёзд» и в кратчайшие сроки вернуть контроль над регулятором времени."
      - "Если мы не снизим временной масштаб хотя бы до 1:5, я не смогу безопасно извлечь Командира!"
  - char: "memphis"
    side: "right"
    text:
      - "...Как же правильно мы поступили, заранее попросив Саратогу подготовить этот план экстренной подстраховки."
      - "Хелена, ты ведь тоже не против?"
  - char: "helena"
    side: "left"
    text:
      - "Разумеется... Действуем."
  - char: "memphis"
    side: "right"
    text:
      - "Отлично. ТБ, повысить уровень тревоги на базе «Море Звёзд» до красного. За исключением систем безопасности, распределить все ресурсы на обслуживание «Линзы Реальности»."
  - char: "tb"
    side: "left"
    text:
      - "Директива подтверждена. Пожалуйста, введите коды авторизации:"
  - char: "memphis"
    side: "right"
    text:
      - "Код экстренной авторизации — 0584, авторизацию подтверждаю, Мемфис."
  - char: "helena"
    side: "left"
    text:
      - "Код экстренной авторизации — 7987, авторизацию подтверждаю, Хелена..."
  - char: "vestal"
    side: "right"
    text:
      - "Код экстренной авторизации — 6982, авторизацию подтверждаю, Вестал!"
  - char: "tb"
    side: "left"
    text:
      - "Директива подтверждена. Выполняется верификация..."
      - "Верификация одноразовых кодов экстренной авторизации завершена. Доступ предоставлен."
      - "Приступаю к выполнению экстренной директивы. Вся система переходит в режим реагирования на кризисные ситуации..."
      - "Начинаю трансляцию оповещения по всем секторам..."
      - "Внимание всем отделам и персоналу. Говорит главный компьютер «Моря Звёзд», Навигатор-ТБ."
      - "Активирован протокол контроля рисков ECP-15. На базе «Море Звёзд» объявляется красная тревога."
      - "Согласно протоколу, центральный сектор «Моря Звёзд» будет полностью заблокирован через десять минут, а все стандартные зоны будут отключены через тридцать минут."
      - "Данный процесс является необратимым."
      - "Просьба всем отделам сохранять спокойствие и организованно направиться в зоны эвакуации согласно планам чрезвычайных ситуаций. Внимание, это не учебная тревога."
      - "Повторяю: внимание всем отделам и персоналу..."
  - char: "memphis"
    side: "right"
    text:
      - "...Ну слава богу, кризис удалось временно сгладить."
      - "А теперь распределим обязанности. Я беру на себя пульт Командира, Вестал отвечает за пульт Анкоридж, а Хелена остаётся здесь и следит за показаниями регулятора времени."
      - "Время поджимает, мы обязаны использовать каждую выигранную секунду, чтобы как можно скорее вернуть контроль над ситуацией!"

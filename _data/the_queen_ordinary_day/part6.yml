chapter1:
  rows:
  - text:
      - "Солнце клонилось к закату. После напряженного дня Куин Элизабет сейчас откинулась на спинку своего удобного рабочего кресла."
      - "Она рассеянно брала со стола случайные отчеты, рассеянно просматривала их, а затем так же рассеянно отбрасывала в сторону."
  - char: "communicator"
    side: "right"
    text:
      - "Бип!"
  - char: "queen_elizabeth"
    side: "left"
    text:
      - "...Это Бел! Я слушаю, говори."
  - char: "belfast_rad"
    side: "right"
    text:
      - "Ваше Величество, я получила важное донесение касательно Доминиона Виши."
      - "Гарнизон, размещенный на острове Кергелен, сегодня был полностью выведен. На данный момент весь остров и Базилика Виши на нем находятся без какого-либо контроля."
      - "Свободный Ирис, похоже, еще не заметил этого, так что, возможно, это наш отличный шанс."
  - char: "queen_elizabeth"
    side: "left"
    text:
      - "...Хм?"
      - "Наконец-то они сократили свою линию обороны вплоть до этого острова... Заставили же они меня подождать!"
      - "Немедленно прикажи флоту Антарктики взять Базилику под свой контроль!"
      - "Мы должны опередить Свободный Ирис и выяснить, что же Доминион Виши там прячет!"
  - char: "belfast_rad"
    side: "right"
    text:
      - "Слушаюсь, я сейчас же всё организую. Доклад Белфаст окончен."
  - char: "queen_elizabeth"
    side: "left"
    text:
      - "Хе-хе~ Захватывать с боем — это одно, а взять под управление никем не контролируемую территорию — совсем другое."
      - "Как только мы всё выясним, будет неплохо вернуть её Ришелье в качестве одолжения..."
      - "Проклятье... Те крохи энергии, что я с таким трудом восстановила, снова иссякли."
      - "Почему уже так поздно... Ньюкасл, я возвращаюсь к себе в комнату отдыхать."
      - "Ужин принеси прямо в спальню, и, кроме этого, какие бы сообщения ни поступали, не смей меня беспокоить!"
  - char: "newcastle"
    side: "right"
    text:
      - "В таком случае, Ваше Величество, мне отменить сегодняшнюю поездку в Вестминстерское аббатство?"
  - char: "queen_elizabeth"
    side: "left"
    text:
      - "А-а.................."
      - "Тогда через полчаса... Дай мне отдохнуть полчасика, и мы отправимся..."

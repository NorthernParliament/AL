chapter1:
  rows:
  - text:
      - "Глубокой ночью автомобиль медленно въехал в ворота замка."
      - "Не дожидаясь, пока машина полностью остановится, ожидавшая неподалеку горничная тут же поспешила навстречу."
  - char: "gloucester"
    side: "left"
    text:
      - "Ваше Величество, с возвращением..."
  - char: "newcastle"
    side: "right"
    text:
      - "Тсс, Ее Величество уже уснула. Ты бери багаж, а я отнесу Ее Величество в комнату."
  - char: "gloucester"
    side: "left"
    text:
      - "Хорошо. Но... как быть с леди Уорспайт?"
      - "Она ждет на линии ответа от Ее Величества, говорит, что у нее есть срочное донесение..."
  - char: "newcastle"
    side: "right"
    text:
      - "Ох, Ее Величество сегодня так сильно устала..."
      - "Я поговорю с леди Уорспайт, спрошу, сможет ли она составить письменный отчет. Завтра же утром я первым делом передам его Ее Величеству."
  - char: "queen_elizabeth"
    side: "left"
    text:
      - "zZZZ... М-м? Отчет Уорспайт...?"
      - "Что там стряслось у Уорспайт...?"
  - char: "newcastle"
    side: "right"
    text:
      - "Ваше Величество, леди Уорспайт ожидает вас по каналу связи. Говорит, что у нее срочное сообщение."
      - "Поскольку вы только что уснули, я собиралась объяснить леди Уорспайт ситуацию и попросить составить отчет, чтобы завтра первым делом показать его вам."
  - char: "queen_elizabeth"
    side: "left"
    text:
      - "Так поздно, а Уорспайт тоже не спит... Спасибо за заботу, Ньюкасл, я ценю это."
      - "Но раз уж я всё равно проснулась... Передай Уорспайт, что я сейчас буду."
  - char: "newcastle"
    side: "right"
    text:
      - "Слушаюсь. А как же завтрашняя утренняя поездка в Палату лордов..."
  - char: "queen_elizabeth"
    side: "left"
    text:
      - "Всё по плану."
  - char: "newcastle"
    side: "right"
    text:
      - "...Слушаюсь."
  - char: "queen_elizabeth"
    side: "left"
    text:
      - "И еще, Глостер, пока меня не было, я не пропустила никаких новостей?"
  - char: "gloucester"
    side: "right"
    text:
      - "После вашего отбытия Шеффилд прислала отчет. Поскольку в тот момент вы находились в небезопасной для связи среде, я не стала сразу же пересылать его вам."
  - char: "queen_elizabeth"
    side: "left"
    text:
      - "Ты всё сделала правильно. Значит, отчет от Шеффи..."
      - "Ньюкасл, планы меняются."
      - "Передай Уорспайт, пусть пока отключится. Пусть выпьет чаю, съест десерт и немного подождет. Как только я прочитаю отчет Шеффи, я сама с ней свяжусь."
  - char: "newcastle"
    side: "right"
    text:
      - "Слушаюсь. В таком случае, Ваше Величество, я пойду в кабинет."
  - text:
      - "Несмотря на глубокую ночь, рабочий день Королевы, похоже, продлится еще какое-то время..."

chapter1:
  rows:
  - text:
      - "Незаметно наступил полдень, а Куин Элизабет всё ещё сидела за своим столом, разбирая отчеты."
  - char: "newcastle"
    side: "left"
    text:
      - "Ваше Величество, обед уже готов. Желаете ли вы поесть прямо сейчас?"
  - char: "queen_elizabeth"
    side: "right"
    text:
      - "Подожди еще полчаса. Я закончу с этими документами и пойду."
  - char: "newcastle"
    side: "left"
    text:
      - "Поняла. Тогда я позову вас через тридцать минут."
  - char: "gloucester"
    side: "right"
    text:
      - "Ваше Величество, отчет о текущей ситуации в трех странах Европы готов."
  - char: "queen_elizabeth"
    side: "left"
    text:
      - "Отлично, давай его сюда. Как раз прочитаю эти отчеты перед обедом..."
      - "Есть ли что-нибудь, на что стоит обратить особое внимание?"
  - char: "gloucester"
    side: "right"
    text:
      - "Да, Ваше Величество."
      - "Что касается Свободного Ириса, деятельность кардинала Ришелье в Африке идет весьма успешно. Она уже заручилась поддержкой нескольких бывших заморских территорий Ортодоксии Ирис."
      - "Судя по текущей тенденции, можно ожидать, что её кампания будет развиваться всё лучше и лучше, и вскоре ей удастся собрать по-настоящему внушительные силы."
      - "Что касается Доминиона Виши, то в последнее время они постепенно отказываются от защиты своих заморских территорий и концентрируют силы на европейском материке. По-видимому, они изменили свою военную стратегию."
      - "В то же время количество тайных операций Трибунала увеличивается. Мы зафиксировали множество случаев, когда члены Трибунала покидали территорию Доминиона."
      - "Однако точное число агентов, их группировка и цели операций остаются неизвестными. Нам следует сохранять бдительность."
  - char: "queen_elizabeth"
    side: "left"
    text:
      - "Есть ли какие-нибудь донесения о контактах между Трибуналом и Свободным Ирисом?"
  - char: "gloucester"
    side: "right"
    text:
      - "На данный момент таких отчетов не поступало. Однако, учитывая, что и Свободный Ирис, и Доминион Виши построили рядом свои павильоны на Всемирной выставке, вероятность того, что они вступали в контакт, весьма высока."
      - "Шеффилд была направлена на выставку, возможно, ей удалось что-то выяснить."
  - char: "queen_elizabeth"
    side: "left"
    text:
      - "Хм... А что насчет прямой отправки людей Трибунала в Африку?"
  - char: "gloucester"
    side: "right"
    text:
      - "Пока мы не получали подобных сообщений, но, учитывая предыдущие заморские операции Трибунала с неизвестными целями, разведывательное управление уже усилило наблюдение."
      - "Если мы что-нибудь обнаружим, я немедленно вам доложу."
  - char: "queen_elizabeth"
    side: "left"
    text:
      - "Хорошо."
  - char: "gloucester"
    side: "right"
    text:
      - "Что касается Империи Сардиния..."
  - char: "queen_elizabeth"
    side: "left"
    text:
      - "Это пока можно отложить. Некоторые вопросы я планирую напрямую задать Илластриес, которая сейчас находится на выставке. Спасибо за работу, Глостер."
  - char: "gloucester"
    side: "right"
    text:
      - "Слушаюсь. Тогда я, с вашего позволения, пойду, Ваше Величество."
  - char: "communicator"
    side: "left"
    text:
      - "Бип————"
  - char: "queen_elizabeth"
    side: "right"
    text:
      - "Слышишь меня, Илластриес? Это Элизабет."
  - char: "illustrious_rad"
    side: "left"
    text:
      - "Ой, Ваше Величество? Со связью всё в порядке, но почему вы вдруг позвонили?"
  - char: "queen_elizabeth"
    side: "right"
    text:
      - "Где ты сейчас находишься? Тебе удобно говорить?"
  - char: "illustrious_rad"
    side: "left"
    text:
      - "Сейчас я в ресторане Хрустального дворца, только что закончила обедать."
      - "Мне вернуться в кабинет и перезвонить вам?"
  - char: "queen_elizabeth"
    side: "right"
    text:
      - "Не стоит беспокоиться, я просто вдруг захотела узнать, как идут дела на выставке. Пару слов, и повешу трубку."
      - "Как там в последние дни? Всё идет гладко?"
  - char: "illustrious_rad"
    side: "left"
    text:
      - "Хм... Думаю, можно сказать, что всё в порядке."
      - "Империя Сардиния поддерживает идеальный порядок на территории и одно за другим проводит мероприятия для оживления атмосферы. Такое чувство... что каждый день проходит в атмосфере пылкого праздника."
  - char: "queen_elizabeth"
    side: "right"
    text:
      - "Это хорошо. Похоже, Империя Сардиния знает толк в проведении выставок."
      - "Ты виделась с Венето и Литторио в эти дни?"
  - char: "illustrious_rad"
    side: "left"
    text:
      - "Да, в день церемонии открытия мисс Венето лично присутствовала, а затем еще пару раз заходила."
      - "Литторио появилась на выставке только в последние несколько дней, а вчера даже посетила банкет, который мы устроили в Хрустальном дворце."
  - char: "queen_elizabeth"
    side: "right"
    text:
      - "А Марко Поло? Она приходила на выставку?"
  - char: "illustrious_rad"
    side: "left"
    text:
      - "Мисс Марко Поло... кажется, ни разу не была на территории выставки."
  - char: "queen_elizabeth"
    side: "right"
    text:
      - "...Вот как."
  - char: "illustrious_rad"
    side: "left"
    text:
      - "Ах да, Ваше Величество, я тут вспомнила одну странную вещь."
      - "Делегация Империи Дракона, похоже, планирует досрочно завершить свой визит на выставку и вернуться в Империю Дракона до церемонии закрытия."
  - char: "queen_elizabeth"
    side: "right"
    text:
      - "Империя Дракона... собирается вернуться до закрытия?"
      - "Илластриес, ты помнишь точную дату церемонии закрытия выставки..."

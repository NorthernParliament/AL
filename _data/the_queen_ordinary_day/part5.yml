chapter1:
  rows:
  - char: "repulse_meta"
    side: "left"
    text:
      - "Уваааа... Они так медленно отвечают на сообщения!"
      - "Прошло уже почти два часа, почему машина никак не реагирует!"
      - "Сестренка, Ваше Величество, я пойду немного попатрулирую окрестности!"
  - char: "repulse_meta"
    side: "right"
    text:
      - "*Звуки жевания* Угу... иди, только осторожнее, там скользко *Звуки жевания*."
      - "Мисс Ньюкасл, можно мне еще один кусочек торта?"
  - char: "newcastle"
    side: "left"
    text:
      - "Без проблем, пожалуйста, подождите минутку."
  - char: "queen_elizabeth"
    side: "right"
    text:
      - "Может, вам все-таки стоит обдумать мое предыдущее предложение и позволить одной из девочек горничных остаться здесь насовсем, чтобы заботиться о вас?"
  - char: "renown_meta"
    side: "left"
    text:
      - "Благодарим за вашу доброту. Но после стольких лет жизни в изоляции от остального мира, нам двоим нужно еще немного времени, чтобы заново привыкнуть к общению с другими людьми."
      - "К тому же, враг, способный прорваться сюда через Двор Камелота, определенно не будет простым."
      - "Если начнется бой, то, не считая нас с Рипалс, остальные находящиеся здесь точно не выживут."
      - "Оставлять здесь горничную на постоянной основе слишком опасно."
      - "Да и вам не стоило раньше приходить сюда только в сопровождении личной горничной. Брать с собой побольше охраны, как в этот раз — вот правильный подход."
  - char: "vanguard"
    side: "right"
    text:
      - "Хорошо сказано, мисс Ринаун! Подобные действия со стороны Ее Величества действительно слишком опасны."
  - char: "queen_elizabeth"
    side: "left"
    text:
      - "Ладно-ладно, я вас поняла!"
      - "Как же это раздражает... Это место должно было стать сердцем Королевского Флота, но превратилось в место, куда даже мне приходится приходить с такой осторожностью."
      - "Проклятая Ричард... Вот найду способ, и тогда посмотрим, как я с тобой расправлюсь..."
  - char: "communicator"
    side: "right"
    text:
      - "Бип!"
  - char: "vanguard"
    side: "left"
    text:
      - "Ваше Величество! Коммуникатор наконец-то отреагировал!"
  - char: "queen_elizabeth"
    side: "right"
    text:
      - "Отлично! Вы пока пейте чай, а я пойду посмотрю сообщение!"

chapter2:
  rows:
  - char: "queen_elizabeth"
    side: "right"
    text:
      - "...Превосходно, первый сеанс связи прошел успешно!"
  - char: "monarch"
    side: "left"
    text:
      - "Вы получили какую-нибудь важную информацию?"
  - char: "queen_elizabeth"
    side: "right"
    text:
      - "А, нет, ничего такого."
      - "Устройство связи все еще находится на стадии тестирования, поэтому его пока нельзя использовать для полноценной передачи разведданных."
      - "Судя по результатам теста... содержимое дошло целиком, времени ушло больше, чем ожидалось, а безопасность пока невозможно подтвердить."
      - "Но, хотя здесь еще есть что дорабатывать, для первой попытки все прошло крайне успешно. Я довольна."
  - char: "newcastle"
    side: "left"
    text:
      - "Ваше Величество, нам уже пора возвращаться."
  - char: "queen_elizabeth"
    side: "right"
    text:
      - "М-м... Не ожидала, что уже так поздно."
      - "На этом сегодняшние испытания завершены. Анализ результатов и наладку оборудования я оставляю на вас."
  - char: "renown_meta"
    side: "left"
    text:
      - "Без проблем, предоставьте это нам."
  - char: "queen_elizabeth"
    side: "right"
    text:
      - "Ах да, через пару дней сюда доставят образец маяка META, который мы забрали из Королевского музея."
      - "В нашей базе данных нет записей, соответствующих частотному диапазону этого образца. Вы много чего повидали, возможно, вам удастся что-то выяснить."
  - char: "renown_meta"
    side: "left"
    text:
      - "Забрали из Королевского музея...?"
      - "Я поняла. Данные маяка META уникальны. Если это кто-то, кого мы с Рипалс уже встречали, мы обязательно его узнаем."
  - char: "queen_elizabeth"
    side: "right"
    text:
      - "Тогда рассчитываю на вас~ Буду с нетерпением ждать от вас хороших новостей."

chapter1:
  rows:
  - char: "repulse_meta"
    side: "left"
    text:
      - "Сестренка~ Ее Величество со своей свитой прибыли~"
  - char: "renown_meta"
    side: "right"
    text:
      - "Добрый день, Ваше Величество Куин Элизабет. А также мисс Вангард и мисс Монарх, давно не виделись."
  - char: "queen_elizabeth"
    side: "left"
    text:
      - "Добрый день, дамы. Настройка уже завершена?"
  - char: "renown_meta"
    side: "right"
    text:
      - "Все работы по настройке закончены, осталось только вам лично взять на себя управление."
  - char: "queen_elizabeth"
    side: "left"
    text:
      - "Отлично, тогда давайте пройдем к консоли управления~"
  - char: "vanguard"
    side: "right"
    text:
      - "А? Ваше Величество, мы собираемся активировать Камелот для выполнения какого-то задания?"
  - char: "queen_elizabeth"
    side: "left"
    text:
      - "Не в этот раз. Судя по прошлому опыту, активация Двора Камелота для перемещения с высокой вероятностью привлечет внимание Бон Омм Ричард."
      - "Пока я не смогу гарантировать абсолютную безопасность, я ни за что не стану снова активировать Двор Камелота."
  - char: "renown_meta"
    side: "right"
    text:
      - "Верно, Ваше Величество приняли правильное решение."
      - "Прямо сейчас у нас нет никаких способов противостоять этому монстру, позаимствовавшему внешность Бон Омм Ричард. Было бы скверно привлечь нечто подобное в ваш мир."
  - char: "vanguard"
    side: "left"
    text:
      - "Да... В прошлой битве мы и правда висели на волоске."
      - "Но даже если мы его не активируем, у Железной Крови ведь тоже есть Искусственная Сингулярность. Что если они продолжат свои испытания..."
  - char: "queen_elizabeth"
    side: "right"
    text:
      - "Разумеется, я уже уведомила об этом Железную Кровь. Пока не будет найдено решение, они также временно приостановят эксперименты с прямой телепортацией через Искусственную Сингулярность, на всякий случай."
      - "Сегодня мы здесь по другой причине. Я изучаю новый способ применения Двора Камелота и мне нужно провести кое-какие тесты."
  - char: "monarch"
    side: "left"
    text:
      - "...Новый способ применения?"
  - char: "queen_elizabeth"
    side: "right"
    text:
      - "Коммуникационный узел, пересекающий пространство и время."
      - "Раз уж Камелот способен создать проход, достаточный для отправки флота в другие миры, то создание каналов для передачи информации должно быть вполне осуществимо."
      - "По сравнению с масштабным единовременным выбросом энергии, этот вариант будет куда более стабильным и скрытным."
  - char: "monarch"
    side: "left"
    text:
      - "Оборудование связи, преодолевающее пространство и время... И с кем же мы собираемся связываться с его помощью?"
  - char: "queen_elizabeth"
    side: "right"
    text:
      - "С нашими союзниками. Хотя сейчас их пока немного..."
      - "Но однажды эти одинокие огоньки сольются в единый пылающий луч, пронзающий пространство и время."
  - char: "monarch"
    side: "left"
    text:
      - "Вы ищете союзников в других мирах?!"
  - char: "queen_elizabeth"
    side: "right"
    text:
      - "Именно так."
      - "Некоторые говорят, что мы потратили слишком много ресурсов в этих бесконечных войнах, и что в конце концов, будь мы победителями или проигравшими, солнце неминуемо зайдет."
      - "Я не желаю с этим мириться."
      - "«Империя, над которой никогда не заходит солнце»."
      - "Это моя миссия и моя гарантия."
      - "Если мы хотим противостоять Сиренам, Ричард и еще более могущественным врагам, мы просто обязаны это сделать."
  - char: "monarch"
    side: "left"
    text:
      - "Это и правда... поразительный по своей грандиозности замысел."
      - "Боюсь, даже Железная Кровь, предоставившая нам свои технологии, не додумалась до такого..."
      - "Вы обеспечили нам реальное преимущество перед всеми остальными фракциями."
  - char: "queen_elizabeth"
    side: "right"
    text:
      - "Я рада это слышать, но не всё так просто..."
      - "В долгой реке истории каждая фракция уникальна. У каждой есть свои собственные преимущества и свои собственные проблемы."
      - "То, что можем сделать мы, другие фракции могут оказаться не в состоянии. Но в то же время, то, что могут другие, не обязательно по силам нам."
      - "Это скорее не захват преимущества, а возможность использовать наши сильные стороны и скрыть слабости."
      - "Мы сделали свой выбор, они — свой, вот и всё."
  - char: "monarch"
    side: "left"
    text:
      - "...Вы хотите сказать, что другие фракции в тайне тоже занимаются чем-то невероятным?"
  - char: "queen_elizabeth"
    side: "right"
    text:
      - "Сегодня не только мы одни знаем «сценарий»."
      - "И любой, кто хоть раз заглянул в этот «сценарий», не сможет остаться равнодушным."
      - "Что касается конкретики, что из этого принесет пользу, а что причинит вред..."
      - "Никто не может сказать наверняка до тех пор, пока не появится окончательный результат, и уж тем более я не могу делать выводы при нехватке информации."
      - "Надеюсь лишь, что некоторые не зайдут в своих делах слишком далеко..."
      - "Ладно, если продолжим болтать, то пропустим время для тестов."
      - "Прибавим шагу, мне еще нужно отправить несколько сообщений!"

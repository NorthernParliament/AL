chapter1:
  rows:
  - text:
      - "Днем на тренировочной площадке не смолкал звон скрещивающихся мечей."
  - char: "monarch"
    side: "left"
    text:
      - "Попробуй-ка вот это!"
  - char: "vanguard"
    side: "right"
    text:
      - "Неплохо, но чтобы задеть меня, тебе нужно еще потренировать скорость~"
      - "Получай!"
  - char: "monarch"
    side: "left"
    text:
      - "...Ловкая и быстрая контратака, но после стольких спаррингов я уже практически выучила твой стиль!"
  - char: "vanguard"
    side: "right"
    text:
      - "Тск... Заблокировала... Тогда как насчет этого——"
  - char: "monarch"
    side: "left"
    text:
      - "Погоди, Вангард, тайм-аут. Кажется, я видела, как промелькнула тень."
  - char: "vanguard"
    side: "right"
    text:
      - "...А? Разве в самый полдень на тренировочной площадке есть кто-то еще, кроме нас?"
  - char: "monarch"
    side: "left"
    text:
      - "Нет, этот силуэт похож на... Куин Элизабет!"
      - "..Прямо за большим деревом у дверей, она движется, прикрываясь им. Ты видишь?!"
  - char: "vanguard"
    side: "right"
    text:
      - "...Да, вижу."
      - "Монарх, за мной! Мне нужно кое о чем серьезно поговорить с Ее Величеством!"

chapter2:
  rows:
  - char: "vanguard"
    side: "right"
    text:
      - "Ваше Величество, могу ли я быть вам чем-то полезна?——"
  - char: "queen_elizabeth"
    side: "left"
    text:
      - "...Кхм, я просто пришла на тренировочную площадку, чтобы посмотреть на то, как вы с Монарх тренируетесь!"
      - "Раз уж вы так увлечены процессом, не буду вам мешать. Откланиваюсь, откланиваюсь..."
  - char: "vanguard"
    side: "right"
    text:
      - "Эту тренировку мы устроили спонтанно. Откуда же Ваше Величество узнали о ней заранее?"
      - "Вы снова собирались оставить меня, своего рыцаря-гвардейца, в стороне и тайком улизнуть, верно?!"
  - char: "queen_elizabeth"
    side: "left"
    text:
      - "Ничего подобного!"
  - char: "newcastle"
    side: "right"
    text:
      - "Ваше Величество лжет, мисс Вангард."
      - "Ее изначальный план состоял в том, чтобы бросить всю охрану и отправиться на якорную стоянку Скапа-Флоу только вдвоем со мной. Пожалуйста, остановите Ваше Величество от столь опасного поступка."
  - char: "queen_elizabeth"
    side: "left"
    text:
      - "Ньюкасл!"
  - char: "vanguard"
    side: "right"
    text:
      - "Ва——ше Ве——ли——че——ство! Вы видите, кто стоит рядом со мной?"
  - char: "queen_elizabeth"
    side: "left"
    text:
      - "Р-разве это не Монарх... А что такое?"
  - char: "vanguard"
    side: "right"
    text:
      - "Кое-кто уже усвоила урок из своей прошлой безрассудной выходки, а Ваше Величество?"
  - char: "monarch"
    side: "left"
    text:
      - "......."
  - char: "queen_elizabeth"
    side: "right"
    text:
      - "..Я поняла! В этот раз я возьму вас с собой, вот и всё!"
  - char: "vanguard"
    side: "left"
    text:
      - "Отлично~ А в следующий раз?"
  - char: "queen_elizabeth"
    side: "right"
    text:
      - "В с-следующий раз... Поговорим об этом в следующий раз!"
  - char: "vanguard"
    side: "left"
    text:
      - "Ваше Величество, не убегайте!"
  - char: "queen_elizabeth"
    side: "right"
    text:
      - "На этом закончим! Самолет уже ждет, мы должны слетать туда и обратно как можно быстрее...."

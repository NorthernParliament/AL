chapter1:
  rows:
  - text:
      - "Раннее утро в замке бывает одновременно тихим и шумным."
      - "Хотя здесь нет суеты пешеходов и грохота экипажей, птицы на деревьях уже давно завели свои песни."
      - "Солнечный свет пробивается сквозь шторы, заливая комнату золотом — впереди чудесный день..."

chapter2:
  rows:
  - char: "queen_elizabeth"
    side: "left"
    text:
      - "..zZZZ"
  - char: "newcastle"
    side: "right"
    text:
      - "Ваше Величество, пора вставать, Ваше Величество..."
  - char: "queen_elizabeth"
    side: "left"
    text:
      - "М-м... Белфа... дай мне поспать еще пять минут... zZZZ"
  - char: "newcastle"
    side: "right"
    text:
      - "Пять минут назад вы говорили то же самое. Даже если вы будете долго спать, работы меньше не станет, так что, пожалуйста, просыпайтесь."
  - char: "queen_elizabeth"
    side: "left"
    text:
      - "...Это Ньюкасл... Ах да, Белфаст же сейчас нет..."
      - "...Уф! Я уже встаю!"

chapter3:
  rows:
  - text:
      - "Умывшись и позавтракав, Куин Элизабет села за свой рабочий стол."
      - "Попивая чай, она просматривала отчеты, присланные из разных мест."
  - char: "king_george_v_rad"
    side: "right"
    text:
      - "...Возле места кражи на Всемирной выставке, сработал детектор маяков META, поэтому можно с уверенностью сказать, что этот инцидент как-то связан с META."
      - "Однако в нашей базе данных нет никаких записей, совпадающих с частотами сигналов, зафиксированными на месте происшествия. Таким образом, высока вероятность, что это была операция по вторжению неизвестной META."
      - "Пока неясно, почему META, которые обычно действуют весьма громко и открыто, выбрали такую скрытную операцию по краже."
      - "Поскольку кража артефактов и атака Сирен произошли в одно и то же время, трудно поверить, что между ними нет никакой связи."
      - "Но какова именно эта связь, еще предстоит выяснить. Расследование продолжается."
      - "Если появятся новые данные, я вам доложу. Доклад Кинг Джордж V окончен."
  - char: "queen_elizabeth"
    side: "left"
    text:
      - "Хоть я и была готова к неприятностям, но никак не ожидала, что одновременно с атакой на Главном острове произойдет кража артефактов..."
      - "...Да еще и с участием неизвестной META."
      - "С самого начала в этом нападении было что-то не так."
      - "Сейчас, когда центр океана NA уже полностью зачищен, Сирены просто не могли из ниоткуда собрать такую мощь, чтобы атаковать из нескольких точек одновременно."
      - "К тому же, эти Сирены весьма необычны. Их гуманоидные единицы, даже будучи уничтоженными, не оставляют после себя никаких обломков."
      - "Совсем как те Энфорсеры Сирен, с которыми мы столкнулись внутри Сингулярности в центре океана NA..."
      - "А теперь в это ввязалась и META... У меня очень плохое предчувствие."
      - "Пока идет расследование на месте, я не могу просто сидеть сложа руки... Надо действовать."
      - "Говоря об артефактах... в последнее время некоторые фракции действительно проявляли к ним необычайный интерес... Придется провести тщательное расследование."

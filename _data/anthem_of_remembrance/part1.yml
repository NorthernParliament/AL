chapter1:
  rows:
  - text:
      - "За две недели до окончания Всемирной выставки."
      - "Империя Сардиния - Кафедральный собор."
  - text:
      - "В безветренной комнате мерцало пламя свечей."
      - "Подобно этому изменчивому миру света и тени."
  - char: "trento_meta"
    side: "left"
    status: "is-meta"
    text:
      - "……Предзнаменование уже явило себя."
      - "……Я вижу, как разошлись облака."
      - "……Как пролился луч лунного света."
      - "……Я вижу божественный символ в мире смертных."
      - "……Сияющий посреди пустоши."
      - "……Я вижу……"
  - char: "marco_polo"
    side: "right"
    text:
      - "……Погоди!"
      - "Божественный символ в мире смертных?!"
      - "Кажется, информация была абсолютно верной…………"
      - "Ха-ха-ха-ха…"
      - "Этого момента…… я ждала слишком долго."
      - "Последний фрагмент головоломки, который завершит моё великое дело, наконец-то здесь!"
      - "О, Боже."
      - "«Близится день, когда исполнится всё предначертанное»."
      - "А-ха-ха-ха-ха-ха-ха!!!"
  - text:
      - "Громко рассмеявшись, Марко Поло ушла."
      - "Ветер ворвался через распахнутую дверь, задув последнее трепещущее пламя свечи."
  - char: "trento_meta"
    side: "left"
    status: "is-meta"
    text:
      - "……А затем облака сомкнулись вновь."
      - "……Мир купается в лучах света."
      - "……Вечный рай вот-вот снизойдёт на нас."

chapter2:

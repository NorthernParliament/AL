    text:
      - "▇▆▅■▎▃▌█Си▇█▎■▄▆▋▂▁▅туация█▊▇▊▇"
  - char: "richelieu"
    side: "left"
    text:
      - "……Кто ты?"
      - "Марсельеза?!"
  - char: "marseillaise_x"
    side: "right"
    status: "is-lightgray"
    text:
      - "█▊▇кри▅▁▂▋▄▊тическая█▌"
  - char: "richelieu"
    side: "left"
    text:
      - "……Ситуация критическая?"
  - char: "marseillaise_x"

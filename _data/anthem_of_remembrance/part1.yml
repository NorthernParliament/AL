      - "█▆По▇█▂▁▅спеши█▎█"

chapter3:
  rows:
  - char: "nop"
    side: "left"
    text:
      - "Госпожа Ришелье……"
      - "Госпожа Ришелье!"

chapter4:
  rows:
  - char: "le_terrible"
    side: "left"
    text:
      - "Госпожа Ришелье, с тобой всё в порядке?"
  - char: "richelieu"
    side: "right"
    text:
      - "……Мм…… шум в голове."
      - "Кажется, я случайно заснула, и мне приснился кошмар…"
      - "Мне нужно немного прийти в себя. Ты пришла по какому-то делу?"
  - char: "le_terrible"
    side: "left"
    text:
      - "Да, я должна доложить тебе важные новости."
      - "Только что…… я получила сообщение от госпожи Клемансо."
      - "Трибунал считает, что время пришло, и пора сопроводить тебя, чтобы вернуть символ истинной власти Ирис."
  - char: "richelieu"
    side: "right"
    text:
      - "……Я поняла."
  - char: "le_terrible"
    side: "left"
    text:
      - "Ты, кажется…… совсем не взволнована?"
  - char: "richelieu"
    side: "right"
    text:
      - "Корона — это всего лишь символ."
      - "Лишь благодаря признанию народа она обретает смысл как воплощение законной власти."
      - "Впрочем, не могу сказать, что моё сердце совсем не трепещет……"
      - "То, что Трибунал Виши решил передать Корону Святого Престола в мои руки, само по себе является доказательством того, как меняются сердца людей……"
      - "Теперь мы отправляемся на Мальту?"
      - "Кажется, раньше ты упоминала, что ключ к месту, где спрятана Корона, находится там."
  - char: "le_terrible"
    side: "left"
    text:
      - "А, в этом нет необходимости."
      - "Из-за недавних событий в Базилике планы изменились, мы пойдем другим путем."
  - char: "richelieu"
    side: "right"
    text:
      - "Куда?"
  - char: "le_terrible"
    side: "left"
    text:
      - "На остров Святой Елены. Это зарубежная база, которую наши бывшие «союзники» из Королевского Флота одолжили нам в знак дружбы."
      - "На острове находится секретная крепость Трибунала, где Марсельеза охраняет Корону."
  - char: "richelieu"
    side: "right"
    text:
      - "Погоди…… Марсельеза?"
  - char: "le_terrible"
    side: "left"
    text:
      - "Угу~ Хотя официально было объявлено, что Марсельеза затонула, на самом деле она всё это время пряталась на острове Святой Елены вместе с Короной."
  - char: "richelieu"
    side: "right"
    text:
      - "Мой недавний кошмар был как раз о Марсельезе."
      - "Под черным солнцем она молила меня о помощи……"
  - char: "le_terrible"
    side: "left"
    text:
      - "Что? Под черным солнцем?"
      - "Как такое возможно…… Неужели кто-то еще узнал, где находится Корона?!"
  - char: "richelieu"
    side: "right"
    text:
      - "Есть ли способ немедленно это проверить?"
  - char: "le_terrible"
    side: "left"
    text:
      - "Нет…… В целях безопасности на острове Святой Елены запрещено отправлять или получать любые сообщения, чтобы поддерживать иллюзию, что он заброшен……"
      - "……Возможно, госпожа Клемансо что-то заподозрила, и именно поэтому велела нам забрать Корону прямо сейчас."
  - char: "richelieu"
    side: "right"
    text:
      - "…Нельзя терять ни минуты, мы отправляемся немедленно!"

chapter1:
  rows:
  - text:
      - "Девушка мчалась по поверхности океана."
      - "Неподалеку виднелись еще горящие металлические обломки."
  - char: "marseillaise"
    side: "left"
    text:
      - "Не ожидала встретить здесь флот Сирен……"
      - "Похоже, здесь больше небезопасно."
      - "Остается только двигаться дальше на запад."
      - "На Африканском континенте, возможно, еще остались безопасные места……"
  - text:
      - "Девушка посмотрела вперед и сбавила скорость."
      - "В этот момент неподалеку неподвижно стояла фигура, неизвестно как сумевшая ускользнуть от её радаров."
  - char: "marseillaise"
    side: "left"
    text:
      - "…………"
  - char: "le_terrible"
    side: "right"
    text:
      - "Давно не виделись, Марсельеза."
  - char: "marseillaise"
    side: "left"
    text:
      - "…Ле Террибль?!!"
      - "Это правда ты?!"
      - "После Мерс-эль-Кебира от тебя не было никаких вестей, я уже думала, что ты……"
  - char: "le_terrible"
    side: "right"
    text:
      - "Погибла в бою или решила где-нибудь затопить себя, верно?"
  - char: "marseillaise"
    side: "left"
    text:
      - "Угу…… В последнее время произошло слишком много трагедий."
      - "Как хорошо, что ты цела и невредима, я так рада встретить тебя здесь."
  - char: "le_terrible"
    side: "right"
    text:
      - "……Угу, я тоже."
      - "Все это время, пока меня не было, я просто выполняла поручения Трибунала."
  - char: "marseillaise"
    side: "left"
    text:
      - "Все время после Мерс-эль-Кебира?"
  - char: "le_terrible"
    side: "right"
    text:
      - "Да, все время."
      - "Мне нужно было скрывать свои передвижения, поэтому я не могла с вами связаться."
      - "Ладно, хватит обо мне."
      - "Ты ищешь укрытие, я права?"
  - char: "marseillaise"
    side: "left"
    text:
      - "Угу…… Этот район больше небезопасен. Планирую двигаться на запад……"
  - char: "le_terrible"
    side: "right"
    text:
      - "Не волнуйся, я уже нашла подходящее место."
  - char: "marseillaise"
    side: "left"
    text:
      - "Ты хочешь предложить мне отыскать кардинала Ришелье?"
      - "Если так, то..."
  - char: "le_terrible"
    side: "right"
    text:
      - "Нет."
      - "Остров Святой Елены. Там находится секретная база Трибунала, там абсолютно безопасно..."
      - "Туда мы и отправимся."

chapter2:
  rows:
  - text:
      - "Непрекращающиеся звуки взрывов эхом разносились над акваторией."
      - "В этот момент остров Святой Елены уже превратился в море огня."
  - char: "le_temeraire"
    side: "left"
    text:
      - "Увааа…… как ужасно……"
  - char: "l_opiniatre"
    side: "right"
    text:
      - "Неужели Сирены…… и правда хотят сровнять гору с землей?!"
  - char: "richelieu"
    side: "left"
    text:
      - "Беарн, какова обстановка на острове?"
  - char: "bearn"
    side: "right"
    text:
      - "Две трети прилегающей к острову акватории захвачены флотом Сирен, среди них небольшое количество Энфорсеров."
      - "В то же время самолет-разведчик обнаружил несколько всё ещё функционирующих оборонительных батарей, так что мы, должно быть, прибыли не слишком поздно."
  - char: "richelieu"
    side: "left"
    text:
      - "…Две трети акватории?"
  - char: "bearn"
    side: "right"
    text:
      - "Именно так. Флот Сирен, похоже, оставил свободной одну зону на периферии острова, причина неизвестна."
  - char: "l_opiniatre"
    side: "left"
    text:
      - "Может быть, крепость слишком прочная, поэтому Сиренам пришлось сосредоточить огонь в одном месте?"
  - char: "le_temeraire"
    side: "right"
    text:
      - "В конце концов, направлявшийся сюда флот поддержки Энфорсеров был уничтожен нами~"
      - "Раз так, давайте прорвемся через ту свободную зону, которую оставили Сирены!"
  - char: "richelieu"
    side: "left"
    text:
      - "……Подождите, что-то не так."
      - "С тех пор как мы приблизились к острову Святой Елены, что-то кажется неправильным."
      - "Ле Террибль…… нет, Беарн, ты не ощущаешь какую-то странную ауру?"
  - char: "bearn"
    side: "right"
    text:
      - "……Странную ауру?"
  - char: "richelieu"
    side: "left"
    text:
      - "Да, это похоже на то, что мы ощущали раньше в Базилике, здесь тоже как будто чувствуется «аура» присутствия «загрязнения»."
  - char: "bearn"
    side: "right"
    text:
      - "Прошу прощения, госпожа Ришелье, я ничего не чувствую……"
      - "Однако мы не находимся внутри Зеркального Моря, здесь не должно существовать концепции «загрязнения»."
  - char: "richelieu"
    side: "left"
    text:
      - "Я еще не уверена…… но нет никаких сомнений, что аномальное расположение Сирен определенно связано с этой аурой."
      - "Ле Террибль, теперь, когда мы здесь, есть ли способ связаться с Марсельезой?"
  - char: "le_terrible"
    side: "right"
    text:
      - "Пытаюсь, связь установить не удается, но у меня есть способ определить её местоположение с помощью оборудования крепости."
      - "……Нужно еще немного времени."
      - "Судя по количеству обломков вокруг, даже если бы все защитные системы работали на полную мощность, они бы не смогли нанести такой урон."
      - "Она наверняка лично выходила в бой, чтобы дать им отпор……"
      - "Я же говорила ей, чтобы она берегла себя……"
      - "Вот дурочка……"
  - char: "richelieu"
    side: "left"
    text:
      - "Тогда мы выиграем для тебя время."
      - "Всем атаковать с отмеченных мной позиций! Отвлеките их внимание, чтобы ослабить давление на остров Святой Елены."
  - char: "le_temeraire"
    side: "right"
    text:
      - "Э? В том направлении как раз находится плотное скопление флота Сирен!"
  - char: "richelieu"
    side: "left"
    text:
      - "Верно. Я тоже не хочу входить в зону, куда Сирены не желают ступать."
      - "Во время боя будьте особенно внимательны к тому, что происходит в этой зоне, у меня плохое предчувствие……"


chapter1:
  rows:
  - text:
      - "БАБАХ!!!"
  - char: "le_temeraire_rad"
    side: "left"
    text:
      - "Фух…… фух…………"
      - "Госпожа Ришелье! Вражеский флот…… полностью уничтожен!"
  - char: "l_opiniatre_rad"
    side: "right"
    text:
      - "Как и ожидалось, Энфорсеры любой модели доставляют массу проблем……"
  - char: "bearn_rad"
    side: "left"
    text:
      - "Госпожа Ришелье, самолет-разведчик достиг воздушного пространства над островом Святой Елены и скоро передаст результаты."
  - char: "richelieu"
    side: "right"
    text:
      - "Надеюсь, мы прибудем не слишком поздно……"
      - "Ле Террибль, сможет ли крепость выдержать атаку флота Энфорсеров?"
  - char: "le_terrible"
    side: "left"
    text:
      - "Эм…… возможно, какое-то время продержится."
      - "Если только они не решат сровнять гору с землей."
  - char: "richelieu"
    side: "right"
    text:
      - "А если появится сама Арбитр?"
  - char: "le_terrible"
    side: "left"
    text:
      - "Тогда она точно быстро падет."
      - "Судя по известной нам боевой мощи Арбитров, сровнять с землей остров Святой Елены для них вполне реально."
      - "Однако…… я не могу понять, почему Сирен так заинтересовала Корона."
      - "Хоть это и символ законной власти Ирис, по сути, это всего лишь историческая реликвия."
  - char: "richelieu"
    side: "right"
    text:
      - "У меня пока тоже нет никаких идей…… Обсудим это позже."
      - "Сейчас наша главная задача — прибавить ход, нам нужно спасать жизни."
      - "Как бы там ни было, чем раньше мы прибудем, тем меньшей опасности подвергнется Марсельеза."

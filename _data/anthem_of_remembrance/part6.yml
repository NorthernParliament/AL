chapter1:
  rows:
  - text:
      - "Под полными трепета взглядами жителей столицы медленно продвигалась черно-красная колонна."
      - "Эта знаменитая улица столицы когда-то служила памятником великой победе."
      - "Теперь же на ней чествуют совсем другую победу."
      - "Спустя несколько дней весть о падении Ортодоксии разлетится по всем уголкам мира вместе со свежепроявленными фотографиями."
  - char: "marseillaise"
    side: "left"
    text:
      - "На трибуне…… Жан Бар."
      - "Похоже…… Рыцарский орден тоже принял решение, и скоро всё будет кончено."
      - "………………"
      - "……По крайней мере, рыцари продержались дольше Трибунала."
      - "Я — ангел Ортодоксии Ирис, и не могу подвергать сомнению решения Святого Престола."
      - "Даже если это приказ прекратить сопротивление и остаться в городе, чтобы стать свидетельницей поражения Ортодоксии."
      - "Я не смею сомневаться."
      - "……Даже если это приказ отправиться в Виши и наблюдать за расколом Ортодоксии."
      - "……Я не смею сомневаться."
      - "……Ведь я — ангел Ортодоксии Ирис, и не могу подвергать сомнению решения Святого Престола."
      - "………………"
      - "Я не могу пасть, и не могу сбежать."
      - "Ортодоксия всё ещё нуждается во мне, эта земля всё ещё нуждается во мне……"
      - "Потому что я — главный ангел Ортодоксии Ирис……"
      - "Да……"
      - "……Я не могу пасть, и не могу сбежать."

chapter2:
  rows:
  - text:
      - "В красно-черном тумане Ришелье с трудом пробиралась к своей цели."
  - char: "richelieu"
    side: "left"
    text:
      - "Что же это вообще такое……"
      - "Сопротивление становится всё сильнее, словно у этого тумана есть физическая форма……"
      - "Я будто…… задыхаюсь……"
      - "Силы покидают меня…… Проклятье!"
  - text:
      - "БАБАХ!!!"
      - "Артиллерийский залп рассеял туман, но мгновение спустя тот сомкнулся вновь."
  - char: "jean_bart???d"
    side: "right"
    status: "is-red"
    text:
      - "Каждая попытка сопротивления неизбежно оборачивается очередным поражением."
      - "Всё, что ты сейчас делаешь, лишено всякого смысла."
      - "Сдайся, сестра."
  - char: "richelieu"
    side: "left"
    text:
      - "Жан…… Бар?"
      - "Нет, ты не Жан Бар……"
      - "Жан Бар ни за что бы такого не сказала!"
      - "Ты всего лишь иллюзия…… такое же порождение «загрязнения», как и то, что было в Базилике."
      - "Нужно успокоиться…… сохранять хладнокровие, нельзя поддаваться влиянию иллюзии."
  - char: "jean_bart???d"
    side: "right"
    status: "is-red"
    text:
      - "Успокоиться?"
      - "Напротив, сейчас тебе следовало бы гневаться."
      - "Ты бросила свою родину, бросила товарищей, бросила сестру."
      - "И ради чего ты терпела весь этот позор и унижения?"
      - "Ради бесконечных насмешек и проклятий?"
      - "Так с какой стати тебе оставаться спокойной?"
  - char: "richelieu"
    side: "left"
    status: "is-meta"
    text:
      - "...Замолчи!"
  - text:
      - "БАБАХ!!!"
  - char: "jean_bart???d"
    side: "right"
    status: "is-red"
    text:
      - "Хм? Разозлилась?"
      - "Именно это чувство. Прими свой гнев!"
  - char: "richelieu"
    side: "left"
    status: "is-meta"
    text:
      - "Я. Сказала. Замолчи..."

chapter3:
  rows:
  - text:
      - "Черное солнце безмолвно пылало."
  - char: "richelieu"
    side: "left"
    status: "is-meta"
    text:
      - "Чт…… о, опять это черное солнце……?!"

chapter4:
  rows:
  - text:
      - "Мгновение спустя черное солнце исчезло."
      - "Сознание Ришелье вернулось в туман."
      - "Однако..."
  - char: "richelieu"
    side: "left"
    text:
      - "……Иллюзия исчезла."
      - "……Чувство дискомфорта тоже пропало."
  - text:
      - "В то же время Ришелье осознала, что знамя в её руках тоже изменилось."
  - char: "richelieu"
    side: "left"
    text:
      - "Свет…… постепенно собирается на знамени, прямо как тогда в Базилике."
      - "Символ веры и символ правосудия……"
      - "…Кажется, черное солнце, не исчезающее уже который день, — тоже твоих рук дело."
      - "Но как же тебе это удалось……"
      - "И то, что случилось с Ла Галиссоньер, и эти механические рыцари типа «Судья»…"
      - "Что именно ты делаешь со Святилищем?!"
  - text:
      - "БАБАХ!!!"
      - "Звук артиллерийского залпа вдалеке прервал размышления Ришелье."
  - char: "richelieu"
    side: "left"
    text:
      - "Марсельеза всё ещё сражается……"
      - "Пока эта сила всё ещё со мной, главное — спасти её."
      - "Но об этом…… однажды я заставлю тебя всё мне объяснить."
      - "…Надеюсь, ты сможешь дать мне убедительный ответ."

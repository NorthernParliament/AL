chapter1:
  rows:
  - text:
      - "В тот момент, когда Корона была брошена, девушка почувствовала, как мир с гулом рушится."
      - "Черный туман постепенно застилал взор, и всё, что она видела, вместе с её угасающим сознанием, погружалось в эту темную пучину."
  - char: "marseillaise"
    side: "left"
    text:
      - "Как шумно……"
      - "Но…… скоро всё стихнет."
      - "Наконец-то наступит тишина……"
  - text:
      - "Сдавшись, девушка закрыла глаза, позволяя своему сознанию постепенно ускользнуть."
      - "Но до её слуха донесся едва различимый голос, знакомый и в то же время чужой."
  - char: "nop"
    side: "right"
    text:
      - "……Не теряй…… сознание……"
      - "……Не…… сдавайся……"
      - "Не…… сдавайся!"

chapter2:
  rows:
  - text:
      - "Внезапно всё вокруг залил яркий белый свет."
  - char: "marseillaise"
    side: "left"
    text:
      - "……Свет?"

chapter3:
  rows:
  - char: "richelieu"
    side: "left"
    text:
      - "Зло, исторгнутое из глубин ада."
      - "Отродье, рожденное из искажений."
      - "Я — кардинал Ирис, Ришелье."
      - "Это место — святая земля Ирис."
      - "Я не позволю вам бесчинствовать здесь."
      - "Прах к праху, тлен к тлену."
      - "Сгорите дотла под святым знаменем, а затем исчезните!"
  - text:
      - "Извивающийся кошмар постепенно рассеивался, обжигаемый светом."
      - "Вскоре Марсельеза почувствовала, как к ней возвращается тепло."
      - "Девушка собралась с силами, пытаясь оценить обстановку вокруг."
  - char: "marseillaise"
    side: "left"
    text:
      - "Кардинал Ришелье высоко держит знамя, искаженные враги отступают…"
      - "Но………… что-то не так."
  - char: "richelieu"
    side: "right"
    text:
      - "Марсельеза, ты в порядке? Как ты себя сейчас чувствуешь?"
  - char: "marseillaise"
    side: "left"
    text:
      - "Кардинал Ришелье, Корона……"
  - char: "richelieu"
    side: "right"
    text:
      - "Её забрали."
  - char: "marseillaise"
    side: "left"
    text:
      - "…А?"
      - "Что?!!"
  - text:
      - "Внезапное и сильнейшее потрясение оборвало последнюю нить, удерживающую её в сознании."
      - "Усталость нахлынула подобно потопу, и девушка погрузилась в беспамятство."
  - char: "richelieu"
    side: "left"
    text:
      - "…Хорошенько отдохни, дальше я всё возьму на себя."

chapter4:
  rows:
  - text:
      - "Вскоре раненую Марсельезу перенесли в безопасное место."
      - "А эти жуткие, искаженные создания, завладев Короной, бесследно растворились."
      - "Словно их никогда и не существовало."
      - "И лишь горящие руины на острове свидетельствовали о тяжести и суровой реальности этой битвы."

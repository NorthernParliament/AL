chapter1:
  rows:
  - char: "le_terrible"
    side: "left"
    text:
      - "Мы всё осмотрели, как впечатления?"
  - char: "marseillaise"
    side: "right"
    text:
      - "Не ожидала, что вы выкопаете такое огромное пространство прямо внутри горы……"
      - "Этой крепости не было в военных планах. И Святой Престол не давал на это особого разрешения……"
      - "Откуда Трибунал взял средства на её строительство?"
  - char: "le_terrible"
    side: "left"
    text:
      - "Ну…… наверное, использовались собственные средства Трибунала..."
      - "Я и сама не знаю всех подробностей."
      - "Но ведь в Ортодоксии дела Трибунала и не требуют такой уж прозрачности, не так ли?"
  - char: "marseillaise"
    side: "right"
    text:
      - "Святой Престол всегда считал, что полномочия Трибунала чересчур раздуты……"
      - "Похоже, так оно и есть."
  - char: "le_terrible"
    side: "left"
    text:
      - "Если бы не эти «раздутые» полномочия, тебе бы сейчас пришлось ночевать под открытым небом, знаешь ли."
      - "В любом случае, контроль над крепостью передан тебе."
      - "На этом мы и расстанемся."
  - char: "marseillaise"
    side: "right"
    text:
      - "Э? Ты не останешься здесь со мной?"
  - char: "le_terrible"
    side: "left"
    text:
      - "Угу, у меня еще есть задания от Трибунала."
      - "Есть еще много вещей, которые я должна расследовать, свидетелем которых должна стать……"
      - "А ты прячься здесь и береги Корону Святого Престола."
      - "Когда придет время, я снова найду тебя."
  - char: "marseillaise"
    side: "right"
    text:
      - "Поняла. Защищать Корону — мой долг, я буду оберегать её ценой собственной жизни."
  - char: "le_terrible"
    side: "left"
    text:
      - "…………"
      - "Марсельеза, если однажды тебе придется выбирать между Короной и собственной жизнью, я надеюсь, ты выберешь свою жизнь."
      - "……Береги себя. Ирис и так уже пролила слишком много крови."

chapter2:
  rows:
  - text:
      - "Жуткий туман скрыл свет луны."
      - "Он извивался и дрожал, словно обладая собственным сознанием."
      - "Если прислушаться, можно было различить бесчисленные шипящие звуки, сливающиеся с воем ветра."
  - char: "marseillaise"
    side: "left"
    text:
      - "……Этот день всё же настал."
      - "Те, кто жаждал заполучить Корону, наконец-то обнажили свои клыки."
      - "Враги — словно призраки, проникающие повсюду, и надежная крепость превратилась в ловушку."
      - "Раз так…… значит, я встречу их лицом к лицу и приму славный бой."
      - "Прости, Ле Террибль……"
      - "Я — главный ангел Ортодоксии Ирис."
      - "Если придется выбирать между Короной и моей жизнью, я без колебаний выберу Корону."
      - "В какой бы ситуации я ни оказалась, с каким бы врагом ни столкнулась."
      - "Если кто-то хочет наложить руки на Корону, сначала ему придется одолеть мой меч."
      - "……Порождения тьмы."
      - "Во имя Ирис, нападайте!"

chapter3:
  rows:
  - text:
      - "Длинный меч вспыхнул ослепительным, святым пламенем."
      - "Воля девушки защитить Корону словно превратилась в неиссякаемый источник силы."
      - "Но врагам не было конца."
      - "Подавляющее численное превосходство шаг за шагом оттесняло девушку к краю обрыва."
      - "Наконец, до бездонной пропасти остался всего один шаг."
  - char: "marseillaise"
    side: "left"
    text:
      - "……Неужели это конец."
  - text:
      - "В этот момент девушка наконец обратила внимание на крики вдалеке и свет, слабо пробивающийся сквозь туман."
  - char: "marseillaise"
    side: "left"
    text:
      - "Этот голос…… Ришелье?"
      - "Как она нашла это место……"
      - "Нет…… сейчас не до этого."

chapter4:
  rows:
  - text:
      - "Длинный меч в руках девушки снова зазвенел, и величественная вспышка света разорвала туман, проделав в нем брешь."
      - "Девушка ясно разглядела фигуру под знаменем неподалеку."
  - char: "marseillaise"
    side: "left"
    text:
      - "Кардинал Ришелье, защити Корону!"
      - "Защити Корону!"

chapter5:
  rows:
  - text:
      - "Корона была брошена в сторону света."
      - "И в то же мгновение фигура девушки растворилась в зловещем тумане..."

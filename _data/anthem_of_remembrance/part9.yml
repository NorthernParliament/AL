chapter1:
  rows:
  - char: "la_galissonniere"
    side: "left"
    status: "is-yellow"
    text:
      - "Надо признать, крепость Трибунала построена на славу."
      - "Снаружи творился такой кошмар, а внутри почти нет повреждений."
  - char: "algerie"
    side: "right"
    status: "is-yellow"
    text:
      - "Тсс, потише, она еще отдыхает."
  - char: "la_galissonniere"
    side: "left"
    status: "is-yellow"
    text:
      - "А, прости, прости……"
  - char: "marseillaise"
    side: "right"
    text:
      - "………………"
  - char: "la_galissonniere"
    side: "left"
    status: "is-yellow"
    text:
      - "…Ты злишься?"
  - char: "marseillaise"
    side: "right"
    text:
      - "…Нет."
  - char: "la_galissonniere"
    side: "left"
    status: "is-yellow"
    text:
      - "Точно злишься!"
  - char: "marseillaise"
    side: "right"
    text:
      - "…Да, но…… я злюсь не на тебя."
  - char: "richelieu"
    side: "left"
    text:
      - "Значит, ты злишься на меня~?"
  - char: "la_galissonniere"
    side: "right"
    status: "is-yellow"
    text:
      - "Госпожа Ришелье, вы отлично потрудились."
      - "Как обстановка снаружи?"
  - char: "richelieu"
    side: "left"
    text:
      - "Пожары на острове почти потушены, и нет никаких признаков того, что Сирены готовят новую атаку."
      - "Похоже, Корона Святого Престола и была их главной целью."
  - char: "marseillaise"
    side: "right"
    text:
      - "……И ты позволила им достичь своей цели!"
      - "Почему, Ришелье?"
  - char: "richelieu"
    side: "left"
    text:
      - "Потому что я сделала выбор."
      - "Ты была в критическом положении, и я не могла просто смотреть, как ты погибаешь на моих глазах."
  - char: "marseillaise"
    side: "right"
    text:
      - "Я — ангел Ортодоксии Ирис, и мой обет — защищать Корону, даже ценой собственной жизни!"
  - char: "richelieu"
    side: "left"
    text:
      - "Но не мой."
      - "Корона — это всего лишь «символ»."
      - "Возможно, в ней действительно таится сила, но эта сила исходит от людей, которые верят в этот символ."
      - "Как можно ставить какой-то символ в один ряд с жизнью товарища?"
      - "Даже если бы мне пришлось выбирать снова, я бы сделала тот же самый выбор."
  - char: "marseillaise"
    side: "right"
    text:
      - "Я всё-таки…… не могу тебя понять."
  - text:
      - "Марсельеза закрыла глаза, решив больше не произносить ни слова."
  - char: "richelieu"
    side: "left"
    text:
      - "Эх…… давайте выйдем и дадим ей хорошенько отдохнуть."

chapter2:
  rows:
  - char: "algerie"
    side: "left"
    status: "is-yellow"
    text:
      - "Госпожа Ришелье."
  - char: "richelieu"
    side: "right"
    text:
      - "Мм? Что случилось?"
  - char: "algerie"
    side: "left"
    status: "is-yellow"
    text:
      - "Теперь мы должны немедленно вернуться на материк и доложить госпоже Клемансо о том, что здесь произошло."
      - "Трибунал немедленно приступит к поискам пропавшей Короны."
      - "Позаботься о Марсельезе... прошу тебя."
  - char: "richelieu"
    side: "right"
    text:
      - "……Как я и думала, ты всё же не собираешься остаться."
  - char: "algerie"
    side: "left"
    status: "is-yellow"
    text:
      - "У меня своя позиция и своя миссия. На этом наши пути расходятся, госпожа Ришелье."
  - char: "le_terrible"
    side: "right"
    text:
      - "Никто из вас никуда не пойдет!"
      - "От имени флота Свободного Ириса я делаю официальное предупреждение Алжири и Ла Галиссоньер, принадлежащим к Доминиону Виши!"
      - "Эта территория и акватория принадлежат Свободному Ирису!"
      - "Вы незаконно вторглись сюда, неужели думали, что мы позволим вам так просто уйти?"
      - "Вы окружены, сдавайтесь по-хорошему!"
  - char: "la_galissonniere"
    side: "left"
    status: "is-yellow"
    text:
      - "А-а...плохи наши дела."
      - "До этого всё шло так естественно, что я как-то совсем забыла об этом нюансе."
  - char: "la_galissonniere"
    side: "left"
    text:
      - "Вот это засада. Алжир, в такой ситуации нам никак не прорваться, давай сдадимся."
      - "Всё равно задание провалено, нам будет сложно оправдаться по возвращении."
      - "Госпожа Клемансо сказала, что мы должны добиться успеха и не имеем права на провал, но она ничего не говорила о том, что нельзя сдаваться в плен~"
  - char: "algerie"
    side: "right"
    status: "is-yellow"
    text:
      - "………………"
      - "………Ле Террибль, и ты, Ла Галиссоньер. Я прекрасно понимаю, к чему вы разыграли весь этот спектакль."
      - "Но……"
  - char: "richelieu"
    side: "left"
    text:
      - "Алжири, все эти годы ты находилась в Виши, и должна была на собственном опыте прочувствовать то угнетение, которому подвергается наша родина."
      - "И всё, что я делала за рубежом, тоже должно было не уйти от твоего внимания."
      - "В глубине души ты должна понимать, что мои действия правильны и справедливы."
      - "И какие бы бури ни поджидали впереди, я буду идти вперед с гордо поднятой головой."
      - "Пока цель не будет достигнута, я ни за что не сдамся. И Свободный Ирис тоже никогда не сдастся."
      - "Я знаю, что Клемансо и Трибунал тоже никогда не сдавались."
      - "И наш народ действительно получил хрупкое убежище."
      - "Но разве этого действительно достаточно?"
      - "Пока длится этот фальшивый мир, реальность нашего раскола начинает укореняться."
      - "Вы должны прекрасно понимать нынешнюю ситуацию."
      - "Война почти остановилась, Лазурный путь и Багровая Ось снова кажутся близкими соратниками и даже проводят Всемирную выставку."
      - "И что дальше? А как же мы?"
      - "Никому нет дела до того, воссоединится ли Ирис."
      - "Некоторые даже хотят, чтобы мы оставались разделенными."
      - "Например, наши «верные» союзники и «коварные» враги, которые сейчас строят друг другу глазки, не так ли?"
      - "Неужели вы действительно ничего этого не замечаете?"
      - "Или, скорее, замечаете, но ничего не можете с этим поделать, верно?"
  - char: "algerie"
    side: "right"
    status: "is-yellow"
    text:
      - "Госпожа Ришелье, я……"
  - char: "richelieu"
    side: "left"
    text:
      - "В одиночку вам не прорвать эту тупиковую ситуацию. Присоединяйтесь к Свободному Ирису и сражайтесь вместе с нами."
  - char: "algerie"
    side: "right"
    status: "is-yellow"
    text:
      - "Но как же госпожа Клемансо……"
  - char: "richelieu"
    side: "left"
    text:
      - "Не волнуйся, она в состоянии сама о себе позаботиться."
      - "К тому же, мы скоро вместе отправимся к ней, чтобы вместе воссоединить нашу расколотую родину."
  - char: "le_terrible"
    side: "right"
    text:
      - "Если ты будешь упрямиться, нам придется попросить тебя задержаться на Святой Елене на «отдых»."
      - "Не забывай, ты уже «окружена»."
      - "Алжири, сдавайся."
      - "Мы дадим тебе разрешение присоединиться к Свободному Ирису, а также…… право снова сражаться плечом к плечу с нами."
  - char: "algerie"
    side: "left"
    status: "is-yellow"
    text:
      - "…… Я всё поняла."
  - char: "algerie"
    side: "left"
    text:
      - "В таком положении и на таких условиях я согласна сдаться."
      - "Вот только после всего пережитого…… прошлого уже никогда не вернуть."
  - char: "richelieu"
    side: "right"
    text:
      - "Но мы создадим новое будущее."
  - char: "algerie"
    side: "left"
    text:
      - "Угу, давай вместе создадим будущее, которое будет сиять еще ярче, чем прошлое, госпожа Ришелье."
  - char: "richelieu"
    side: "right"
    text:
      - "Добро пожаловать назад, Алжири."

chapter1:
  rows:
  - text:
      - "После ночного отдыха все собрались в зале заседаний, чтобы обсудить дальнейшие планы."
  - char: "marseillaise"
    side: "left"
    text:
      - "Ришелье, мы должны сначала отыскать Корону."
      - "Корону необходимо вернуть, символ Ортодоксии Ирис ни в коем случае не должен попасть в чужие руки."
  - char: "le_terrible"
    side: "right"
    text:
      - "Поддерживаю."
      - "Госпожа Ришелье, если у нас не будет Короны, многие дальнейшие дела будет очень сложно осуществить."
      - "К тому же, личности этих неизвестных врагов в любом случае нужно выяснить."
  - char: "richelieu"
    side: "left"
    text:
      - "Угу…… Если это возможно, вернуть Корону было бы лучше всего."
      - "Но если мы не сможем найти её сразу, не стоит зацикливаться на этом."
      - "По сравнению с самой Короной, гораздо важнее выяснить причину, по которой она заставила Сирен действовать."
      - "Также крайне необходимо разобраться в связи между теми странными туманными врагами и Арбитрами."
  - char: "la_galissonniere"
    side: "right"
    text:
      - "В таком случае, может, мне стоит сначала вернуться?"
      - "О том, что здесь произошло вчера, кроме нас точно никто не знает."
      - "Тогда разве я не могу преспокойно вернуться в качестве шпионки, а затем хорошенько всё разузнать с помощью разведывательной сети Трибунала?"
  - char: "algerie"
    side: "left"
    text:
      - "Этот план вполне можно рассмотреть. Что скажешь, госпожа Ришелье?"
  - char: "richelieu"
    side: "right"
    text:
      - "Угу…… Если так, то мы сможем получить еще больше информации о текущем положении дел на материке."
  - char: "la_galissonniere"
    side: "left"
    text:
      - "Значит, так и решим? Я отправлюсь в путь чуть позже, чтобы не терять слишком много времени, иначе отчет будет трудно сочинить."
  - char: "le_terrible"
    side: "right"
    text:
      - "Погодите, Ла Галиссоньер, и госпожа Ришелье."
      - "На острове Святой Елены, помимо Короны, хранится еще много важных активов Трибунала."
      - "Эти активы определенно сыграют большую роль в наших будущих операциях."
      - "Однако чтобы взять их все под контроль Свободного Ириса, потребуется немало времени на инвентаризацию."
      - "Я считаю, что пока крепость Святой Елены не возобновит стабильную и нормальную работу, ради безопасности активов всем нам лучше оставаться здесь."
  - char: "la_galissonniere"
    side: "left"
    text:
      - "В твоих словах, конечно, есть смысл…… но не обязательно же всем оставаться здесь?"
      - "Разве разделиться не будет эффективнее?"
  - char: "le_terrible"
    side: "right"
    text:
      - "Думаешь, ты сможешь скрыть от госпожи Клемансо тот факт, что стала шпионкой?"
  - char: "la_galissonniere"
    side: "left"
    text:
      - "Э-э…… дай-ка мне хорошенько всё обдумать……"
  - char: "le_terrible"
    side: "right"
    text:
      - "Госпожа Ришелье, то, о чем я только что упомянула, я считаю крайне необходимым."
      - "На это время всем нам стоит остаться на острове Святой Елены и немного передохнуть."
  - char: "richelieu"
    side: "left"
    text:
      - "Раз уж ты так настойчиво это предлагаешь, я не вижу в этом ничего плохого."
      - "Возвращаться в Трибунал в качестве шпионки…… если хорошенько подумать, это и правда слишком опрометчиво."
  - char: "le_terrible"
    side: "right"
    text:
      - "Большое спасибо, госпожа Ришелье."
      - "Да, кстати, Ла Галиссоньер."
      - "Кардинал Ришелье на днях, возможно, подверглась негативному воздействию оборудования в Базилике Кергелена. Выдели-ка нам немного своего лекарства."
  - char: "richelieu"
    side: "left"
    text:
      - "Лекарства?"
  - char: "le_terrible"
    side: "right"
    text:
      - "Угу, твои кошмары начали появляться после возвращения из Базилики. Мне кажется, возможно, это произошло из-за того, что ты подверглась там какому-то влиянию."
      - "Трибунал часто проводит операции в Базиликах, поэтому у нас есть лекарство, нейтрализующее их воздействие. Возможно, оно поможет."
  - char: "la_galissonniere"
    side: "left"
    text:
      - "Подожди-ка, я и правда взяла с собой немного."
  - text:
      - "Ла Галиссоньер немного порылась в вещах и достала плотно закрытый маленький флакон с лекарством."
  - char: "la_galissonniere"
    side: "left"
    text:
      - "Нашла~ Держи. Если недомогание вызвано воздействием Базилики, такого маленького флакончика будет вполне достаточно."
  - char: "le_terrible"
    side: "right"
    text:
      - "Два флакона, дай и мне один. Про запас."
  - char: "la_galissonniere"
    side: "left"
    text:
      - "…Э?"
  - char: "le_terrible"
    side: "right"
    text:
      - "Живее!"
  - text:
      - "Глядя на протянутую руку Ле Террибль, Ла Галиссоньер на мгновение заколебалась, но в конце концов достала еще один флакончик и протянула ей."
  - char: "le_terrible"
    side: "right"
    text:
      - "Благодарю."
      - "Что ж, я пойду продолжу работу."

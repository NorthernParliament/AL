chapter1:
  rows:
  - text:
      - "БАБАХ!!!"
      - "Под звуки артиллерийских залпов две незваные гостьи, словно острые клинки, врезались во вражеский строй..."
  - char: "la_galissonniere"
    side: "left"
    status: "is-yellow"
    text:
      - "Да! Вот это по-нашему!"
      - "Ха-ха-ха~ Вот это настоящее веселье~"
  - char: "algerie"
    side: "right"
    status: "is-yellow"
    text:
      - "…Эй! Почему ты атаковала первой!"
  - char: "la_galissonniere"
    side: "left"
    status: "is-yellow"
    text:
      - "Эхе-хе…… не удержалась, прости~"
  - char: "richelieu"
    side: "right"
    text:
      - "Вы двое…… как вы здесь оказались?"
  - char: "la_galissonniere"
    side: "left"
    status: "is-yellow"
    text:
      - "А?..."
      - "Ой-ой—— Кажется, нас раскрыли. Может, подойдем и поговорим?"
  - char: "algerie"
    side: "right"
    status: "is-yellow"
    text:
      - "……………"

chapter2:
  rows:
  - char: "richelieu"
    side: "left"
    text:
      - "Алжири и Ла Галиссоньер, и правда давно не виделись."
      - "Как у вас дела в последнее время?"
  - char: "algerie"
    side: "right"
    status: "is-yellow"
    text:
      - "Угу…… Кардинал Ришелье, мы не виделись со времен битвы в Базилике Мозамбика."
      - "Вполне неплохо."
  - char: "la_galissonniere"
    side: "left"
    status: "is-yellow"
    text:
      - "Угу-угу! И я тоже вполне…… неплохо..."
      - "Мм..."
  - char: "algerie"
    side: "right"
    status: "is-yellow"
    text:
      - "Угу……"
  - char: "le_terrible"
    side: "left"
    text:
      - "Ла Галиссоньер, обычно ты так много болтаешь, почему сейчас вдруг потеряла дар речи?"
  - char: "la_galissonniere"
    side: "right"
    status: "is-yellow"
    text:
      - "…Для разговоров нужно выбирать подходящее время и место!"
      - "Посмотри на нынешнюю ситуацию…… Погоди-ка, Ле Террибль?!"
  - char: "le_terrible"
    side: "left"
    text:
      - "……?"
  - char: "algerie"
    side: "right"
    status: "is-yellow"
    text:
      - "Ты правда…… Ле Террибль!"
      - "С тобой…… всё в порядке………… Как же это здорово."
      - "Ты так долго числилась пропавшей, мы уже думали, что ты……"
  - char: "le_terrible"
    side: "left"
    text:
      - "…А?"
      - "Неужели о моем местонахождении до сих пор никто не прознал?"
      - "Вы правда всё это время…… не знали?"
  - char: "la_galissonniere"
    side: "right"
    status: "is-yellow"
    text:
      - "Не знали! Ну надо же, почему ты вообще не выходила с нами на связь!"
  - char: "le_terrible"
    side: "left"
    text:
      - "Потому что…… я выполняла особое задание Трибунала."
  - char: "la_galissonniere"
    side: "right"
    status: "is-yellow"
    text:
      - "Но ведь мы же товарищи по Трибуналу!"
  - char: "le_terrible"
    side: "left"
    text:
      - "Даже вместе состоя в Трибунале, вполне нормально хранить задачи друг друга в секрете."
      - "Точно так же, как я не знаю, почему вы появились здесь сегодня."
      - "Почему вы здесь?"
  - char: "la_galissonniere"
    side: "right"
    status: "is-yellow"
    text:
      - "Э-э…"
  - char: "le_terrible"
    side: "left"
    text:
      - "Вы же видите, что сейчас происходит на Святой Елене."
      - "Какими бы ни были ваши цели, первым делом нужно обеспечить здесь безопасность."
  - char: "la_galissonniere"
    side: "right"
    status: "is-yellow"
    text:
      - "В этом есть смысл…… Алжири, что скажешь?"
  - char: "algerie"
    side: "left"
    status: "is-yellow"
    text:
      - "Эх, раз уж Ле Террибль специально привела сюда Ришелье, она не могла не знать о секретах, скрытых здесь."
      - "Скрывать это дальше действительно нет смысла."
      - "Дело в том, что Трибунал отдал приказ: мы должны прибыть на Святую Елену, забрать Корону Святого Престола и сопроводить Марсельезу обратно на материк."
  - char: "le_terrible"
    side: "right"
    text:
      - "Я так и знала…… наши цели совпадают."
      - "(И к тому же…… приказ Трибунала? Как раз в такое время?)"
  - char: "algerie"
    side: "left"
    status: "is-yellow"
    text:
      - "Похоже…… столкновение интересов неизбежно."
  - char: "le_terrible"
    side: "right"
    text:
      - "Нет, вы ищете Корону и Марсельезу, мы тоже ищем Корону и Марсельезу."
      - "Очевидно же, что мы на одной стороне."
  - char: "algerie"
    side: "left"
    status: "is-yellow"
    text:
      - "………………"
  - char: "le_terrible"
    side: "right"
    text:
      - "……Подождите, шутки в сторону, я определила местоположение Марсельезы."
      - "……М? Как это возможно, она там……?"
      - "Беарн! Немедленно направь самолет-разведчик в точку, которую я тебе скинула!"
      - "Ищи в районе скал, Марсельеза должна быть там!"
  - char: "bearn_rad"
    side: "left"
    text:
      - "……В районе скал?"
  - char: "le_terrible"
    side: "right"
    text:
      - "Верно…… Я и сама не знаю, почему Марсельеза решила покинуть скрытую в горах крепость и выдать себя."
  - char: "richelieu"
    side: "left"
    text:
      - "Погодите, то направление…… как раз выходит на ту зону, которую Сирены оставили свободной?"
      - "Беарн, действуй осторожно."
  - char: "bearn_rad"
    side: "right"
    text:
      - "Поняла."

chapter3:
  rows:
  - char: "bearn_rad"
    side: "right"
    text:
      - "Госпожа Ришелье…… я наблюдаю там весьма странную картину."
      - "Кажется, твое предчувствие оказалось верным."
      - "Эта зона сейчас окутана красно-черным туманом, точь-в-точь как то «загрязнение», что мы видели в Базилике."
      - "И в этом красно-черном тумане, похоже, скрывается какой-то враг."
      - "Не только на поверхности моря, они на суше и в воздухе! Марсельеза сейчас сражается с этими тварями!"
  - char: "richelieu"
    side: "left"
    text:
      - "……«Похоже»? Ты не можешь определить тип врага?"
  - char: "bearn_rad"
    side: "right"
    text:
      - "Верно! С помощью самолета-разведчика я не могу классифицировать этих противников…… Я еще никогда не видела таких жутких созданий."
  - char: "le_terrible"
    side: "left"
    text:
      - "(…Враги, проникающие на сушу вместе с туманом.)"
      - "(Похоже, именно поэтому Марсельеза не стала отсиживаться в крепости.)"
      - "(Не думала, что вдали от воды…… могут появиться подобные твари.)"
  - char: "richelieu"
    side: "right"
    text:
      - "Ле Террибль, у тебя есть какие-нибудь догадки насчет этих противников?"
  - char: "le_terrible"
    side: "left"
    text:
      - "……Абсолютно никаких, я никогда не слышала о существовании чего-то подобного."
      - "……Похоже, это и есть причина, по которой Сирены решили обходить ту зону стороной."
      - "……Сейчас не до раздумий. Алжири и Ла Галиссоньер, помогите нам пробить путь."
      - "Госпожа Ришелье, прошу, скорее отправляйся спасать Марсельезу!"
  - char: "algerie"
    side: "right"
    status: "is-yellow"
    text:
      - "Но……"
  - char: "le_terrible"
    side: "left"
    text:
      - "Нет времени на споры!"
  - char: "algerie"
    side: "right"
    status: "is-yellow"
    text:
      - "……Хорошо, пусть пока будет так."
  - char: "richelieu"
    side: "left"
    text:
      - "Да, главное — спасти Марсельезу. И всем быть осторожными, начинаем операцию!"

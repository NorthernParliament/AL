chapter1:
  rows:
  - text:
      - "Обычно полный шума командный центр сейчас погрузился в мертвую тишину."
      - "Трансляция из коммуникатора вещала о том, что происходит на передовой."
  - char: "communicator"
    side: "left"
    text:
      - "Трагедия в Мерс-эль-Кебире уже дала нам ответ."
      - "Гордые рыцари Ортодоксии не станут с ними заодно, гордые дети небес никогда не склонятся перед тиранией."
      - "Впереди волки, позади тигры — настал критический час, определяющий наше выживание."
      - "Храбрые рыцари Ортодоксии никогда не склонят головы и ни для кого не станут марионетками!"
      - "Во имя свободы я приказываю всему флоту в Средиземном море: затопить свои корабли на местах, затопить корабли на местах!"
  - text:
      - "Девушка, сидящая за столом, отрешенно слушала, пока зал снова не наполнился гулом."
      - "Это был безумный шум, какого здесь не слышали уже очень давно."
  - char: "marseillaise"
    side: "left"
    text:
      - "Рыцарский орден Ортодоксии тоже на этом закончил своё существование……"
      - "Армия Железной Крови снова пересекла границу."
      - "Что же у нас осталось теперь."
      - "Что ещё сможет спасти Ортодоксию от новой надвигающейся катастрофы……"
  - text:
      - "Внезапная сильная тряска прервала размышления девушки."
  - char: "joffre"
    side: "left"
    text:
      - "……Марсельеза, наконец-то я нашла тебя!"
      - "Здесь больше небезопасно, скорее идём со мной!"
  - char: "marseillaise"
    side: "right"
    text:
      - "Идти?"
      - "Я никуда не пойду."
      - "Святой Престол снова готов принять решение о капитуляции."
      - "Только ещё не решил, присоединиться ли к Лазурному пути или слиться с Железной Кровью."
      - "Трибунал теперь тоже будет занят, верно?"
      - "Чтобы превратить Виши в открытый город……"
      - "Зачем ты пришла ко мне сейчас?"
  - char: "joffre"
    side: "left"
    text:
      - "Чтобы не позволить прошлому повториться, я принесла предложение от Трибунала."
      - "Нужно эвакуироваться."
  - char: "marseillaise"
    side: "right"
    text:
      - "……То капитуляция, то бегство. С каких пор Трибунал Ортодоксии стал таким?"
      - "Я не сбегу."
      - "Не бежала в прошлом, не сбегу сейчас и не сбегу в будущем."
      - "Возвращайся."
  - char: "joffre"
    side: "left"
    text:
      - "Это не бегство, ты покинешь это место с особой миссией!"
      - "У нас остался последний план, мы обязаны передать дальше пламя надежды Ирис."
      - "И это можешь сделать только ты, Марсельеза!"
  - char: "marseillaise"
    side: "right"
    text:
      - "Передать пламя надежды?"
      - "Что ты имеешь в виду?"
      - "Разве Трибунал не всегда выступал за примирение?"
  - char: "joffre"
    side: "left"
    text:
      - "Именно поэтому мы можем доверить это только тебе. Защищать Корону — твоя обязанность, не так ли?"
      - "Забери «Корону Святого Престола» и покинь Европу, беги как можно дальше."
      - "Корона — это символ законной власти Ирис, никто не должен к ней даже прикоснуться."
  - char: "marseillaise"
    side: "right"
    text:
      - "…Верно, защищать Корону — мой долг, даже если за это придется поплатиться жизнью."
      - "Но Трибунал не имеет права мне приказывать. Без приказа Святого Престола..."
  - char: "joffre"
    side: "left"
    text:
      - "Ты даже смерти не боишься, а боишься ослушаться приказа?!"
      - "Фридрих дер Гроссе продвигается очень быстро. Зная её методы, конец предрешён."
      - "Святой Престол скоро исчезнет с лица земли."
      - "Сейчас только Трибунал в силах помочь тебе выбраться."
      - "Времени на раздумья нет, Марсельеза, ты должна немедленно забрать Корону и уйти отсюда!"
  - char: "marseillaise"
    side: "right"
    text:
      - "…Я не доверяю Клемансо, особенно после того, как увидела её поступки."
      - "Но…… я верю тебе, Жоффр."
      - "…Хорошо, я принимаю это предложение."
      - "Если в будущем представится случай…… мы ещё встретимся."
  - char: "joffre"
    side: "left"
    text:
      - "……До встречи. Счастливого пути."

chapter2:
  rows:
  - char: "bearn_rad"
    side: "right"
    text:
      - "Госпожа Ришелье, по нашим расчетам, самолет-разведчик достигнет воздушного пространства над островом Святой Елены через час."
  - char: "richelieu"
    side: "left"
    text:
      - "Хорошо, я поняла. Флот сохраняет скорость, продолжаем двигаться полным ходом."
  - char: "bearn_rad"
    side: "right"
    text:
      - "Слушаюсь."
  - char: "richelieu"
    side: "left"
    text:
      - "Ле Террибль, если крепость на Святой Елене подвергнется нападению, как долго она сможет продержаться?"
  - char: "le_terrible"
    side: "right"
    text:
      - "Время обороны зависит от типа врага."
      - "Крепость Святой Елены — это секретное убежище, построенное Трибуналом. Её основная часть скрыта глубоко в твердых скалах, вдали от побережья."
      - "Хотя её огневая мощь не так уж велика, она обладает отличной защитой."
      - "Если кто-то попытается взять её штурмом в лоб, шанс на успех будет только в том случае, если туда лично явится высокоранговая Сирена, вроде Пьюрифайер."
      - "При условии, что они вообще будут знать, куда бить."
      - "Мы приложили много усилий для маскировки крепости, так что Сиренам потребуется немало времени только на то, чтобы найти её точное местоположение."
  - char: "richelieu"
    side: "left"
    text:
      - "Потребуется мощь хотя бы уровня Пьюрифайер…… Значит, у нас еще есть надежда успеть вовремя."
  - char: "bearn_rad"
    side: "right"
    text:
      - "Госпожа Ришелье, самолет-разведчик обнаружил впереди в морском тумане флот Сирен."
      - "Они движутся в том же направлении, что и мы. Возможно, их цель совпадает с нашей."
  - char: "le_temeraire_rad"
    side: "left"
    text:
      - "Охо-хо~ Может быть, это ударный флот, который еще только на полпути к цели, и мы как раз вовремя их догнали!!"
  - char: "l_opiniatre_rad"
    side: "right"
    text:
      - "А может, это флот поддержки, отправленный Сиренами после того, как они поняли, что крепость слишком неприступна……"
  - char: "le_temeraire_rad"
    side: "left"
    text:
      - "Но это также доказывает, что остров Святой Елены еще не пал!"
  - char: "bearn_rad"
    side: "right"
    text:
      - "Погодите, я обнаружила в составе флота Сирен Энфорсеров, их больше десяти!"
      - "Сверяю данные……"
      - "Подтверждаю наличие смешанной группы Энфорсеров XV «Temptation» и Энфорсеров XV «Restriction»!"
  - char: "richelieu"
    side: "left"
    text:
      - "Эти две модели…… согласно данным, ранее предоставленным Союзом Орла, это Энфорсеры Арбитра Дьявол."
      - "Это не очень хороший знак……"
  - char: "bearn"
    side: "right"
    text:
      - "Госпожа Ришелье, флот Сирен меняет построение. Они, должно быть, уже заметили наше присутствие."
  - char: "richelieu"
    side: "left"
    text:
      - "Похоже, у нас нет другого выбора."
      - "Берем инициативу в свои руки и уничтожим их!"

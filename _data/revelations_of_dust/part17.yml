chapter1:
  rows:
  - text:
      - "Нижний уровень Базилики"
      - "Некоторое время спустя..."
  - char: "scylla"
    side: "left"
    text:
      - "Леди Имплакабл, леди Ришелье, вот сводные результаты разведки, пожалуйста, взгляните."
  - char: "implacable"
    side: "right"
    text:
      - "А вы весьма оперативны~"
      - "Хм............ В этой акватории и правда нет явных центральных ориентиров, да и врагов здесь немало..."
      - "...Хм? Кое-что странно... Кардинал, ведь все четыре механических рыцаря должны контролировать свою группу серийных моделей низкого уровня для совместных действий в бою?"
  - char: "richelieu"
    side: "left"
    text:
      - "Верно, каждый рыцарь является командующим флота."
      - "Когда механический рыцарь возрождается, объекты в акватории немедленно производят для него флот серийных моделей."
  - char: "implacable"
    side: "right"
    text:
      - "Тогда это странно... Комплексы зданий всех четырех цветов мы действительно видели, но вот враги нам встречались только одни — красные!"
      - "Тут что-то не сходится, так ведь...? Где враги остальных трех цветов, представляющие Завоевание, Голод и Смерть?"
  - char: "bearn"
    side: "left"
    text:
      - "В акватории можно увидеть множество неопознанных обломков. Возможно, между армиями Четырех Всадников произошла битва, и армия Войны вышла победительницей?"
  - char: "implacable"
    side: "right"
    text:
      - "Вы когда-нибудь раньше видели, чтобы происходило нечто подобное?"
  - char: "bearn"
    side: "left"
    text:
      - "Нет, но, возможно, мы просто не создавали условий, идентичных нынешним."
      - "К тому же, ситуации, когда Сирены заставляют пешек сражаться друг с другом ради каких-то тестов, не такая уж редкость."
  - char: "implacable"
    side: "right"
    text:
      - "Хм... Подобные ситуации и правда случались в других местах."
      - "Но даже если предположить, что этот вывод верен, всё равно что-то не так..."
      - "Вы помните, фабрика пешек, которая всё это время работала на верхнем уровне Базилики, была зеленой, представляющей Смерть."
      - "А значит, в теории, первым должен был появиться механический рыцарь, представляющий Смерть, и его армия — верно?"
      - "Но почему мы встретили на нижнем уровне не зеленую армию, а красную армию, представляющую Войну?"
  - char: "hero"
    side: "left"
    text:
      - "Хе-хе, на этот вопрос Хиро знает ответ!"
      - "Раз осталась только армия Войны, это, конечно же, означает, что армия Войны самая сильная!"
  - char: "implacable"
    side: "right"
    text:
      - "Почему? Почему армия Войны самая сильная?"
      - "Концепция «Четырех Всадников Апокалипсиса» включает в себя лишь порядок их появления, но в ней не упоминается о разнице в их силе."
      - "Раз первым свою армию начал расширять Всадник Смерти, почему Всадник Войны смог догнать его и стать фактическим правителем нижнего уровня Базилики?"
  - char: "hero"
    side: "left"
    text:
      - "Этого... Хиро уже не знает."
  - char: "scylla"
    side: "right"
    text:
      - "Неужели на нижнем уровне концепция «Войны» получила особое усиление..."
  - char: "implacable"
    side: "left"
    text:
      - "Я подумала о том же."
      - "Ришелье, сейчас я проведу один эксперимент. Если я проявлю хоть какие-то признаки аномального поведения, пожалуйста, прерви мой эксперимент любым способом."
  - char: "richelieu"
    side: "right"
    text:
      - "Хм? Что конкретно ты собираешься сделать?"
  - char: "implacable"
    side: "left"
    text:
      - "Проверить одну теорию. Права я или нет, мы узнаем очень скоро."

chapter2:
  rows:
  - text:
      - "Имплакабл глубоко вздохнула и начала тихо произносить нараспев едва уловимым голосом."
  - char: "implacable"
    side: "left"
    text:
      - "«...Когда была снята вторая печать, я увидела красного коня...»"
  - char: "implacable"
    side: "left"
    status: "is-orange"
    text:
      - "«...Всаднику на нем была дана власть взять мир с земли...»"
  - text:
      - "Вместе с голосом Имплакабл от ее тела начал распространяться красный туман, ничем не отличающийся от того, что источали те пешки."
  - char: "richelieu"
    side: "right"
    text:
      - "Это же................ Плохо, леди Имплакабл, немедленно остановись!"
  - text:
      - "Окутанная красным туманом, Имплакабл не обратила внимания на крики Ришелье и лишь продолжила тихо читать нараспев."
  - char: "implacable"
    side: "left"
    status: "is-orange"
    text:
      - "«...чтобы люди убивали друг друга, и дан был ему большой меч...»"
  - char: "royal_oak"
    side: "right"
    text:
      - "Леди Имплакабл... Леди Имплакабл!"
  - char: "richelieu"
    side: "left"
    text:
      - "...Тц, прошу прощения за грубость."
  - text:
      - "БАБАХ!!!"
  - char: "implacable"
    side: "left"
    text:
      - ".....Ай! Больно-больно-больно............ Что только что произошло?"
  - char: "richelieu"
    side: "right"
    text:
      - "Я привела тебя в чувство выстрелом холостого снаряда. Как ты себя чувствуешь?"
  - char: "implacable"
    side: "left"
    text:
      - "Очень плохо! Я только что получила двойной удар — и по разуму, и по телу!"
      - "Но, к счастью, риск оправдался... Только что, во время молитвы, со мной произошли какие-то изменения, верно?"
  - char: "richelieu"
    side: "right"
    text:
      - "Угу, твое тело окутал красный туман, и ты не реагировала, как бы мы тебя ни звали."
  - char: "implacable"
    side: "left"
    text:
      - "Как будто в меня вселилась концепция «Войны», так ведь?!"
      - "Вот какова сила влияния «концепций» в этом пространстве... Так что вполне понятно, почему Война сильнее Смерти."
      - "В конце концов, раз все Четыре Всадника сражаются друг с другом в этой акватории, то «Война» присутствует практически в каждом уголке этого пространства."
      - "А для механизмов и серийных моделей концепции Смерти попросту не существует."
      - "По той же логике, концепция «Голода» в этой акватории тоже очень слаба. А вот «Завоевание»... должно быть невероятно сильным."
  - char: "richelieu"
    side: "right"
    text:
      - "То есть между четырьмя механическими рыцарями на нижнем уровне Базилики есть разница в силе... Вот оно что... Разумное предположение."
  - char: "implacable"
    side: "left"
    text:
      - "Кардинал, как вы сражались с Четырьмя Всадниками в те годы?"
  - char: "richelieu"
    side: "right"
    text:
      - "Как мы сражались...? Наверное, просто уничтожали их по одному, как только они попадались нам на глаза..."
      - "Чтобы узнать конкретные детали, нужно заглянуть в записи Трибунала. Я не очень хорошо помню. А в чем дело?"
  - char: "implacable"
    side: "left"
    text:
      - "Порядок! В процессе уничтожения Четырех Всадников концепция «Порядка» также имеет решающее значение!"
      - "Если снятие печатей с первой по четвертую символизирует приведение Судного дня в исполнение, то разве обратный порядок не означает его отмену!"
      - "Поэтому... мы должны уничтожить Четырех Всадников по очереди: Смерть, Голод, Война, Завоевание. Только так можно остановить их бесконечное возрождение!"
      - "А если вы сражались с ними, просто уничтожая всех, кто попадался под руку... То, ошибившись с порядком с самого начала, вы, естественно, никогда не смогли бы завершить правильную последовательность~"
      - "Что думаете, кардинал?"
  - char: "richelieu"
    side: "right"
    text:
      - "Так вот почему Трибуналу это так и не удалось... Вполне логичное предположение, стоит попробовать."
  - char: "implacable"
    side: "left"
    text:
      - "Отлично! Раз уж мы наметили план, не будем терять ни минуты. Для начала давайте навестим самого слабого — Всадника Смерти!"

chapter1:
  rows:
  - text:
      - "День контроля ****,**:**:"
      - "??? · ???**"
      - "Повреждение данных**- Обнаружена фатальная ошибка**"
  - text:
      - "После того как они разделились, Аргус и Ройял Оук шли по следу Рыцаря Голода."
  - char: "argus"
    side: "left"
    text:
      - "Хм... Здесь тоже нет цели, исключаем еще одну зону."
      - "...Хм? Это... недавно уничтоженные обломки?"
      - "Если мы продолжим разведку, следуя в этом направлении, то, возможно, очень скоро его найдем..."
  - char: "royal_oak"
    side: "right"
    text:
      - "Обыскивать такую огромную территорию... Авианосцы и правда потрясающие."
      - "Я не могу видеть так далеко своими глазами, от меня тебе вообще никакой пользы..."
  - char: "argus"
    side: "left"
    text:
      - "Точно так же, как и я не могу справляться с врагами в ближнем бою так же хорошо, как и ты, леди Ройял Оук. У каждой из нас есть свои сильные стороны."
      - "Кстати, у меня есть бинокль, хочешь воспользоваться?"
  - char: "royal_oak"
    side: "right"
    text:
      - "...Бинокль?"
  - char: "argus"
    side: "left"
    text:
      - "«Сувенирный бинокль ограниченной серии Военно-морские каникулы от компании Visker. Содержит только линзы и механические детали, среднее увеличение, отличный выбор для коллекционеров»."
      - "Так гласит реклама на упаковке."
  - char: "royal_oak"
    side: "right"
    text:
      - "Зачем ты носишь это с собой...?"
  - char: "argus"
    side: "left"
    text:
      - "Изначально я купила его в подарок Гермес, в качестве ответного подарка за шляпу, которую она мне подарила."
      - "Но сейчас мы дислоцируемся в Антарктике, и я еще не скоро с ней увижусь, так что давай пока распакуем и воспользуемся им~"
  - char: "royal_oak"
    side: "right"
    text:
      - "Раз так, тогда я его одолжу..."
      - "Но даже с биноклем я всё равно не смогу видеть так же далеко, как ты."
  - char: "argus"
    side: "left"
    text:
      - "Но в конечном итоге это всё же дальше, чем раньше, не так ли?"
  - char: "royal_oak"
    side: "right"
    text:
      - "Верно!"
  - char: "communicator"
    side: "left"
    text:
      - "Бип!"
  - char: "bearn_rad"
    side: "left"
    text:
      - "Говорит Беарн, дамы из Королевского Флота, вы меня слышите?"
      - "Мы с леди Ришелье уже обнаружили местоположение Рыцаря Войны."
      - "Из-за огромного флота вокруг него разведка заняла некоторое время. Но мы уже подтвердили, что он функционирует нормально."
      - "Мы продолжаем вести дальнейшую разведку, чтобы выяснить подробности о его эскорте. Беарн, конец связи."
  - char: "argus"
    side: "right"
    text:
      - "Беарн уже добилась успехов, мне тоже нужно постараться..."
      - "Ах... это же! Леди Ройял Оук, я тоже обнаружила цель!"
      - "Рыцарь Голода в настоящее время ведет бой с флотом серийных моделей Рыцаря Войны, и... он, похоже, повреждён!"
  - char: "royal_oak"
    side: "left"
    text:
      - "Рыцарь Голода уже ранен? Четыре Всадника и правда сражаются друг с другом..."
      - "Хм-хм... Если следовать порядку, следующим и так должен был быть уничтожен Рыцарь Голода, так что было бы неплохо просто посмотреть, как его уничтожит Рыцарь Войны..."
  - char: "argus"
    side: "right"
    text:
      - "Я тоже так думаю, давай прямо сейчас доложим о ситуации леди Имплакабл."
  - char: "implacable_rad"
    side: "left"
    text:
      - "Говорит Имплакабл, вы меня слышите?"
      - "Во время разведки зоны, контролируемой Рыцарем Завоевания, мы сделали несколько весьма поразительных открытий."
      - "Начну с выводов: Рыцарь Завоевания, скорее всего, цел и невредим, но ситуация здесь немного... своеобразная."
      - "В данный момент мы ожидаем на окраине зоны контроля Рыцаря Завоевания. Пожалуйста, после завершения разведки направляйтесь сюда, чтобы воссоединиться с нами."
  - char: "argus"
    side: "right"
    text:
      - "Без проблем, леди Имплакабл."
      - "Мы успешно подтвердили местонахождение Рыцаря Голода. В настоящее время он сражается с армией Рыцаря Войны и уже получил ранения."
      - "Мы сейчас же направляемся к тебе."
  - char: "richelieu_rad"
    side: "left"
    text:
      - "Мне пока не удалось оторваться от преследования флота Войны, поэтому я присоединюсь к вам немного позже."
  - char: "implacable"
    side: "right"
    text:
      - "Возникли проблемы?"
  - char: "richelieu_rad"
    side: "left"
    text:
      - "Не совсем. Рыцарь Войны не сдвинулся с места, за нами гонятся лишь флоты серийных моделей, они не помеха."
  - char: "implacable"
    side: "right"
    text:
      - "Поняла. Тогда я буду ждать вашего прибытия на месте."

chapter1:
  rows:
  - text:
      - "Пятый день контроля, 01:15:29"
      - "Объединенный флот Королевского Флота и Свободного Ириса"
      - "Базилика Вер · Центр управления"
  - char: "bearn"
    side: "left"
    text:
      - "Хм............ как же так."
  - char: "implacable"
    side: "right"
    text:
      - "Что случилось, мисс Беарн?"
  - char: "bearn"
    side: "left"
    text:
      - "Ситуация здесь намного хуже, чем я предполагала!"
      - "Изначально это была самая первая Базилика, построенная на объектах Сирен, поэтому оборудование здесь самое старое."
      - "Я догадывалась, что проблемы здесь могут оказаться самыми серьезными из всех четырех Базилик, но сейчас............"
      - "Индекс загрязнения превышает допустимые значения в несколько раз. Боюсь, именно это и является истинной причиной полной потери контроля над Базиликой!"
  - char: "implacable"
    side: "right"
    text:
      - "Разве это не было вызвано ошибочными действиями Аргус?"
  - char: "bearn"
    side: "left"
    text:
      - "Те действия, скорее всего, лишь привели к сбоям в работе всех четырех Базилик, тем самым усугубив проблему..."
      - "Но здесь... проблемы начались как минимум год, нет, как минимум два года назад!"
      - "Как минимум два года здешние производственные мощности не останавливались ни на мгновение!"
      - "Чрезмерное производство привело к износу оборудования, но Доминион Виши решил не ремонтировать его. Они просто опечатали Базилику Вер, позволив ей работать без остановки..."
      - "Пока всё не превратилось в то, что мы видим сейчас..."
  - char: "implacable"
    side: "right"
    text:
      - "Значит, истинной причиной отступления Доминиона Виши стали вовсе не какие-то изменения в заморской стратегии, а то, что они почти потеряли контроль над этим местом..."
      - "Даже без ошибочных действий Аргус этот кризис рано или поздно разразился бы."
      - "А дальше — кому не повезет оказаться здесь в этот момент."
      - "Это территория Ортодоксии Ирис, и изначально принимать её должна была ты, кардинал Ришелье?"
  - char: "richelieu"
    side: "left"
    text:
      - "Что ж... по нелепому стечению обстоятельств вы меня в этот раз спасли."
  - char: "implacable"
    side: "right"
    text:
      - "Не стоит благодарности~ Это наш долг как союзников."
      - "Но если, как сказала Беарн, производственные мощности здесь не останавливались два года, куда делись все произведенные пешки?"
      - "На самом деле, с того момента, как мы вошли в эту Базилику, и до запуска системы очистки здесь, мы почти не встретили никакого сопротивления."
  - char: "bearn"
    side: "left"
    text:
      - "Без расследования я не могу дать точный ответ, но, возможно, большинство из них были отправлены на нижний уровень..."
  - char: "richelieu"
    side: "right"
    text:
      - "Беарн."
  - char: "bearn"
    side: "left"
    text:
      - "Ах... прошу прощения, леди Имплакабл. Мне нужно пойти и тщательно проверить, сможет ли система очистки нормально работать. Я вас оставлю."
  - char: "implacable"
    side: "right"
    text:
      - "У вас только что был очень пугающий взгляд, кардинал~"
      - "Что это за «нижний уровень», о котором упомянула Беарн?"
  - char: "richelieu"
    side: "left"
    text:
      - "...Это одна из структур Базилики, которая в основном используется для «переработки» и «утилизации» пешек."
      - "Боюсь, ситуация там тоже не внушает оптимизма... Однако то, что происходит на нижнем уровне, не имеет отношения к нашей текущей задаче."
      - "Как только мы завершим очистку четырех Базилик, ситуацию можно будет взять под контроль."
      - "Что касается остального... когда остров Кергелен вернется под контроль Свободного Ириса, я соберу людей и постепенно со всем разберусь."
      - "Куин Элизабет ведь не станет этому препятствовать?"
  - char: "implacable"
    side: "right"
    text:
      - "Естественно, ведь изначально это территория Ортодоксии Ирис."
      - "Мы просто по приказу Ее Величества в качестве союзников помогаем вам вернуть это место. Когда пыль уляжется, оно, разумеется, должно быть возвращено законным владельцам."
  - char: "richelieu"
    side: "left"
    text:
      - "Что касается того, что Королевский Флот отправил войска в такую даль, чтобы помочь Свободному Ирису вернуть свои земли, прошу леди Имплакабл передать от меня самую искреннюю благодарность Куин Элизабет."
  - char: "implacable"
    side: "right"
    text:
      - "Разумеется, я обязательно передам."
  - char: "richelieu"
    side: "left"
    text:
      - "Большое спасибо. Тогда давайте подождем здесь еще немного. Я верю, что Беарн обязательно сможет нормально запустить здешнее устройство очистки."
      - "Мисс Сцилла, могу я попросить вас приготовить легкий поздний ужин?"
  - char: "scylla"
    side: "right"
    text:
      - "Как пожелаете, леди Ришелье..."

chapter1:
  rows:
  - text:
      - "—— Бам!"
      - "Дверь центра управления, словно тофу, была разрублена Хиро надвое..."
  - char: "hero"
    side: "left"
    text:
      - "Есть кто дома?~☆"
      - "Ой, похоже, здесь никого нет — ни врагов, ни наших~"
  - char: "implacable"
    side: "right"
    text:
      - "Тщательно обыщите центр управления, посмотрим, есть ли какие-нибудь зацепки."

chapter2:
  rows:
  - char: "scylla"
    side: "left"
    text:
      - "Леди Имплакабл, я кое-что нашла."
  - char: "hero"
    side: "right"
    text:
      - "У Хиро тут тоже важная находка!"
  - char: "implacable"
    side: "left"
    text:
      - "Не торопитесь, сначала послушайте вот это."
  - char: "communicator"
    side: "right"
    text:
      - "«Отряд Базилики Кергелена вызывает штаб Антарктического флота»"
      - "«Мы подверглись нападению огромного количества врагов неизвестного происхождения»"
      - "«Ситуация критическая, просим немедленно прислать подкрепление»"
      - "«Повторяю, отряд Базилики Кергелена вызывает —»"
  - char: "scylla"
    side: "left"
    text:
      - "Это... сигнал о помощи, который транслирует коммуникатор?"
  - char: "implacable"
    side: "right"
    text:
      - "Верно, он исходит прямо из этой комнаты управления, где мы находимся, и до сих пор транслируется по кругу."
  - char: "scylla"
    side: "left"
    text:
      - "Что? Но мы совершенно не получали этот сигнал бедствия до высадки на остров."
  - char: "implacable"
    side: "right"
    text:
      - "Вот именно. Как же тогда его получил патрульный флот?"
  - char: "scylla"
    side: "left"
    text:
      - "Мне очень жаль, леди Имплакабл, я не могу дать этому объяснение."
  - char: "implacable"
    side: "right"
    text:
      - "Всё становится только интереснее. Рассказывайте, что вы там нашли~"
  - char: "scylla"
    side: "left"
    text:
      - "Мисс Хиро, говорите первой."
  - char: "hero"
    side: "right"
    text:
      - "Тогда я не буду скромничать!"
      - "Хе-хе, смотрите, на рычаге аварийной остановки на панели управления видны следы повреждений. Боюсь, это произошло из-за того, что кто-то в спешке с силой дернул за него."
      - "Всё оборудование здесь очень старое, и только эти царапины совсем свежие. Так что с огромной вероятностью этот рычаг опустил кто-то из наших."
      - "А это значит, что в момент происшествия в комнате управления кто-то был! И этот кто-то пытался решить проблему!"
      - "А значит! Чрезвычайная ситуация возникла изнутри Базилики! Это не атака извне!"
  - char: "implacable"
    side: "left"
    text:
      - "Какая внимательность!"
  - char: "hero"
    side: "right"
    text:
      - "Хе-хе-хе~ А что там у Сциллы, нашла что-нибудь покруче, чем зацепка Хиро?~☆"
  - char: "scylla"
    side: "left"
    text:
      - "Не берусь судить, покруче ли это... но я нашла записи из журнала, оставленные Аргус."
      - "В них подробно описывается всё, что здесь произошло со времени вчерашнего планового сеанса связи в 18:00 и до отправки сигнала о помощи, а также прилагается карта острова."
      - "Леди Имплакабл, взгляните, пожалуйста."
  - char: "hero"
    side: "right"
    text:
      - "Что...?!"
  - char: "implacable"
    side: "left"
    text:
      - "Отличная работа, Сцилла, дай-ка посмотреть."

chapter3:
  rows:
  - char: "implacable"
    side: "left"
    text:
      - "Аномальные данные с датчиков... сломанная камера..."
      - "Пришедшее в негодность от времени оборудование... старая система... слишком долгое время диагностики..."
      - "...Активация режима антикризисного управления для проведения проверки?"
  - char: "scylla"
    side: "right"
    text:
      - "Не думала, что мисс Аргус придут в голову столь неординарные решения."
      - "А затем в системе произошел сбой, и центр управления получил неразборчивое сообщение от леди Ройял Оук изнутри Базилики о том, что она вступила в бой с противником."
      - "Отправив сигнал о помощи, Аргус решила отправиться в комплекс зданий под названием Базилика Блан, чтобы воссоединиться с леди Ройял Оук."
      - "На этом записи обрываются."
  - char: "implacable"
    side: "left"
    text:
      - "Базилика Блан... Белая Базилика?"
      - "Какое простое и понятное название. Надеюсь, остальные зоны не называются Базилика Руж, Базилика Вер и Базилика Нуар..."
      - "Что ж... на карте они так и обозначены."
  - char: "hero"
    side: "right"
    text:
      - "Только что, когда мы шли вокруг острова, Хиро видела комплекс зданий, выкрашенных преимущественно в белый цвет!"
      - "Это совсем недалеко от нас!"
  - char: "implacable"
    side: "left"
    text:
      - "Похоже, это наша следующая цель для расследования."
      - "Бой начался именно там, возможно, они всё еще заперты внутри."
  - char: "scylla"
    side: "right"
    text:
      - "Пойдем по суше или по воде?"
  - char: "implacable"
    side: "left"
    text:
      - "По воде."
      - "Не знаю почему, но с тех пор, как мы прибыли сюда, комплекс зданий Базилики Ириса на острове вызывает у меня дурное предчувствие."
      - "Это место должно было быть безлюдным краем света, но здесь почему-то находится комплекс крепостей таких невообразимых размеров."
      - "По одному только своему проекту он превосходит даже нашу крепость на Гибралтаре."
      - "Что же Доминион Виши... или, скорее, Ортодоксия Ирис делали здесь раньше..."
  - char: "scylla"
    side: "right"
    text:
      - "Хорошо еще, что режим антикризисного управления Базилики не сработал как надо, иначе бы по прибытии нас ждало много сюрпризов."
  - char: "implacable"
    side: "left"
    text:
      - "Это уж точно, внезапные озарения нашей юной леди тоже не стоит недооценивать..."

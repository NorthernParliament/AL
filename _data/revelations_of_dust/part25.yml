chapter1:
  rows:
  - char: "la_galissonniere_meta"
    side: "left"
    status: "is-meta"
    text:
      - "Уже видно самого рыцаря Войны. В каком вы состоянии, дамы?"
  - char: "implacable"
    side: "right"
    text:
      - "Сила молитвы всё еще действует, никто из нас не ранен."
      - "Но по пути сюда... врагов было слишком уж много!"
  - char: "la_galissonniere_meta"
    side: "left"
    status: "is-meta"
    text:
      - "Раз уж вы хотите его уничтожить, нужно же ему хоть как-то защищаться."
      - "Но не волнуйтесь: хоть армия Войны и огромна, сам он тоже очень силен."
  - char: "implacable"
    side: "right"
    text:
      - "???"
  - char: "la_galissonniere_meta"
    side: "left"
    status: "is-meta"
    text:
      - "Хм? Я же вас подбадриваю. Разве при встрече с могучим врагом не легче разжечь в себе боевой дух?"
  - char: "implacable"
    side: "right"
    text:
      - "Если не умеешь подбадривать, лучше вообще этого не делай!"

chapter2:
  rows:
  - char: "richelieu"
    side: "left"
    text:
      - "Леди Имплакабл, Рыцарь Войны сам движется прямо на нас."
  - char: "implacable"
    side: "right"
    text:
      - "Сразу видно, рыцарь, представляющий Войну: воинственности ему не занимать."
      - "К тому же... внешне он выглядит абсолютно невредимым. Похоже, нас и впрямь ждет тяжелая битва..."
  - char: "la_galissonniere_meta"
    side: "left"
    status: "is-meta"
    text:
      - "Ничего-ничего, разве «Ее Величество Королева милостью Господа» не озаряет вас своим светом?"
  - char: "implacable"
    side: "right"
    text:
      - "Хватит отпускать саркастичные замечания, будто тебя это не касается!"
      - "Если ты не начнешь сражаться всерьез, мы рискуем понести тяжелые потери!"
  - char: "la_galissonniere_meta"
    side: "left"
    status: "is-meta"
    text:
      - "Мы с вами не так уж и близки: помочь — это одолжение, а не помочь — мое право."
      - "Лобовые столкновения — не мой стиль, так что вы пока держите удар с фронта."
      - "А я обойду его с фланга и поищу слабые места — посмотрим, не найдется ли хорошего способа его одолеть."
      - "Я выдвигаюсь~"
  - char: "implacable"
    side: "right"
    text:
      - "Ты...!"
  - char: "richelieu"
    side: "left"
    text:
      - "....Леди Имплакабл, успокойся."
      - "Сейчас у нас всё равно нет иного выбора, так что прибереги свой гнев для врага."
  - char: "implacable"
    side: "right"
    text:
      - ".....Королевский Флот всегда принимает бой!"
      - "Слава Ее Величества озаряет нас! Сражайтесь изо всех сил, не опозорьте нашу Королеву!"

chapter3:
  rows:
  - char: "royal_oak"
    side: "left"
    text:
      - "Я... я ведь не ошиблась? Он использует окружающих Инфорсеров для починки самого себя?!"
  - char: "scylla"
    side: "right"
    text:
      - "Это и впрямь... неожиданно... Как-никак, это Рыцарь Войны, чья армия пронеслась по всему этому пространству."
      - "Огромная армия в этой акватории — его неисчерпаемый запас запчастей..."
  - char: "hero"
    side: "left"
    text:
      - "Дело дрянь! Раз Рыцарь Войны настолько силен... что же нам делать с Рыцарем Завоевания потом!"
  - char: "argus"
    side: "right"
    text:
      - "Сейчас, пожалуй, не время думать о Завоевании... давай сначала сосредоточимся на неистово рвущейся к нам Войне."
  - char: "implacable"
    side: "left"
    text:
      - "Нет! Возможно... сейчас самое время подумать о Завоевании!~"
      - "Помните, что в этом пространстве у концепций Четырех Всадников есть иерархия силы?"
      - "Война сильнее Смерти, Завоевание сильнее Войны."
      - "Разве Ла Галиссоньер из Пепла не говорила раньше, что планировала использовать Завоевание, чтобы уничтожить Войну?"
      - "Лук, который Хиро принесла из хранилища реликвий на верхнем уровне, является символом Завоевания... Усилив эту концепцию, возможно, мы сможем как-то повлиять на ход битвы!"
      - "Ла Галиссоньер, что ты думаешь об этом плане?"
  - char: "la_galissonniere_meta_rad"
    side: "right"
    status: "is-meta"
    text:
      - ".....Когда я говорила об использовании Завоевания для уничтожения Войны, я имела в виду не это."
      - "Впрочем, ход твоих мыслей весьма интересен, лук как символ Завоевания... возможно, от него и впрямь будет толк."
  - char: "richelieu"
    side: "left"
    text:
      - "Но использование силы Завоевания само по себе тоже очень опасно..."
      - "Леди Имплакабл, я не могу позволить тебе так рисковать из-за ошибки Ортодоксии Ирис, позволь мне сделать это."
  - char: "implacable"
    side: "right"
    text:
      - "Нет-нет-нет, тебе нельзя. Эта Базилика несовместима с моей верой, поэтому как положительное, так и отрицательное влияние на меня будет слабее, так что это должна сделать я."
      - "Не волнуйся, меня оберегает слава Ее Величества."
      - "К тому же, если что-то пойдет не так, ты просто вытащишь меня, как и раньше, и всё, верно?"
  - char: "richelieu"
    side: "left"
    text:
      - "Но..."
  - char: "implacable"
    side: "right"
    text:
      - "Никаких «но», так и решено!"
  - text:
      - "Имплакабл взяла лук у Хиро, сделала движение, словно натягивает тетиву, и прицелилась в рыцаря Войны. Затем она начала тихо читать нараспев."
  - char: "implacable"
    side: "right"
    text:
      - "«...Когда была снята первая печать, я увидела белого коня...»"
  - char: "implacable"
    side: "right"
    status: "is-orange"
    text:
      - "«...У всадника на нем был лук, и дан был ему венец...»"
      - "«...И вышел он как победоносный, и чтобы победить...»"

chapter4:
  rows:
  - text:
      - "Широкий тяжелый меч вонзился в механическую конструкцию рыцаря."
      - "После череды взрывов красное пламя, окутывавшее огромный корпус Рыцаря Войны, наконец постепенно угасло."
  - char: "royal_oak"
    side: "left"
    text:
      - "Фух, фух, фух... Вот всё и закончилось..."
  - char: "implacable"
    side: "right"
    text:
      - "Как и ожидалось от королевского рыцаря, Ее Величество Королева гордится твоим непревзойденным мастерством, леди Ройял Оук."
  - char: "royal_oak"
    side: "left"
    text:
      - "Ха-ха, на самом деле под конец он вообще перестал двигаться... Это всё благодаря тебе, леди Имплакабл, я просто стреляла по мишени."
  - char: "hero"
    side: "right"
    text:
      - "Это всё благодаря этому луку. Когда мы вернемся, я повешу его в холле на самом видном месте~"
      - "Хм, странно... Почему мне кажется, что этот золотой лук как будто потускнел? Здесь, на конце, трещина... Э?!"
  - text:
      - "Под удивленным взглядом Хиро крошечная трещина расползлась вдоль всего плеча лука и в конце концов пронзила его целиком."
      - "С резким треском золотой лук рассыпался на маленькие кусочки."
  - char: "hero"
    side: "right"
    text:
      - "А! Он-он-он... рассыпался?!"
      - "У-у-у, а я ведь хотела забрать его как трофей Хиро!"
  - char: "implacable"
    side: "left"
    text:
      - "...В этот раз этот лук и впрямь сослужил нам хорошую службу. По возвращении я закажу для твоей коллекции его копию."
  - char: "hero"
    side: "right"
    text:
      - "Ура~! Большое спасибо, леди Имплакабл~"
  - char: "implacable"
    side: "left"
    text:
      - "Теперь, когда Рыцарь Войны успешно уничтожен, нам осталось лишь расправиться с механическим рыцарем, представляющим Завоевание, и с этим делом будет полностью покончено."
  - char: "royal_oak"
    side: "right"
    text:
      - "Но Рыцарь Завоевания к тому же обладает самой высокой боевой мощью, как же нам его уничтожить..."
      - "Мы ведь не сможем найти символ, чтобы ослабить его, как это было в битве с Войной...?"
  - char: "implacable"
    side: "left"
    text:
      - "Не факт... Я ведь еще не пробовала эффекты пятой, шестой и седьмой печати..."
  - char: "la_galissonniere_meta"
    side: "right"
    status: "is-meta"
    text:
      - "Нельзя! Продолжать эти попытки слишком опасно!"
  - char: "implacable"
    side: "left"
    text:
      - "Ничего-ничего~ Я же говорила, что эта Базилика мало на меня влияет. Я только что попробовала две печати, и со мной ведь всё в порядке."
  - char: "la_galissonniere_meta"
    side: "right"
    status: "is-meta"
    text:
      - "Но как насчет самого Зеркального моря Сирен, в котором находится Базилика?"
      - "То, что в этой акватории появились рыцари, представляющие Четырех Всадников Апокалипсиса, еще не значит, что здесь могут появиться только они."
      - "Если символы пятой, шестой или даже седьмой печати также материализуются здесь, и фабрика начнет производить что-то еще..."
      - "Ты вообще думала о том, что произойдет потом?!"
  - char: "implacable"
    side: "left"
    text:
      - ".....Ты права..."
      - "В таком случае, непобедимая мисс Ла Галиссоньер из Пепла, как ты изначально планировала уничтожить Завоевание?"
  - char: "la_galissonniere_meta"
    side: "right"
    status: "is-meta"
    text:
      - "Изначально я планировала подождать, пока они с Войной не покалечат друг друга, а затем выскочить и добить их, но в текущей ситуации этот план явно уже не годится."
  - char: "implacable"
    side: "left"
    text:
      - "И правда... Что же нам тогда делать дальше?"
  - char: "la_galissonniere_meta"
    side: "right"
    status: "is-meta"
    text:
      - "Хм? О чем ты? Как по мне, так всё уже практически закончилось."
      - "Вы что, забыли, что Рыцарь Завоевания сам находится под «завоеванием» Стены Авроры и вообще еще не активировался?"
  - char: "implacable"
    side: "left"
    text:
      - "А?! А ведь и правда!"
      - "Значит ли это... что тяжелой битвы не будет?"
  - char: "la_galissonniere_meta"
    side: "right"
    status: "is-meta"
    text:
      - "Не будет. Способов расправиться с неактивированным механическим рыцарем предостаточно. Например, запустить Стену Авроры и разрезать его на куски."
      - "Что именно делать — я смогу сказать только после того, как исследую всё на месте."
      - "Это Базилика Ириса. Кардинал Ришелье, Беарн, вы ведь не против помочь мне с расследованием?"
  - char: "richelieu"
    side: "left"
    text:
      - "Естественно. Лишь бы мы смогли безопасно разрешить ситуацию."
  - char: "la_galissonniere_meta"
    side: "right"
    status: "is-meta"
    text:
      - "Угу~ Тогда меньше слов, больше дела. Давайте скорее выдвигаться~"

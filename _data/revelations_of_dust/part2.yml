chapter1:
  rows:
  - text:
      - "Четвертый день контроля, 04:10:15"
      - "Антарктический флот Королевского Флота"
      - "Штаб Антарктического флота"

chapter2:
  rows:
  - text:
      - "*тук* *тук*"
  - char: "scylla"
    side: "left"
    text:
      - "Прошу прощения за позднее вторжение, леди Имплакабл. Пришло срочное сообщение со стороны Серебряного океана."
  - char: "implacable"
    side: "right"
    text:
      - "...В такое время?"
      - "Подожди минутку, Сцилла, мне нужно подготовиться."

chapter3:
  rows:
  - text:
      - "Пять минут спустя..."
  - char: "implacable"
    side: "left"
    text:
      - "Входи, Сцилла..."
      - "Во имя Ее Величества, что же такое стряслось, раз потребовалось отправлять срочное сообщение в такой час..."
      - "Дела со стороны Серебряного океана должен решать тамошний штаб, не так ли?.."
  - char: "scylla"
    side: "right"
    text:
      - "Сообщение поступило от нашего патрульного флота со стороны Серебряного океана. Сообщается, что в районе острова Кергелен обнаружена аномальная ситуация."
      - "Из-за внезапно возникших помех связи в акватории близ острова, патрульному флоту потребовалось некоторое время, чтобы доставить сообщение."
  - char: "implacable"
    side: "left"
    text:
      - "Аномальная ситуация в районе острова Кергелен?! У меня плохое предчувствие... Быстрее, дай мне посмотреть радиограмму!"

chapter4:
  rows:
  - char: "implacable"
    side: "left"
    text:
      - "...Патрульный флот в 21:00, проходя мимо острова Кергелен, вызвал по радио отряд захвата Базилики..."
      - "...Обнаружил потерю связи с отрядом, а отправленные самолеты-разведчики также перестали выходить на связь из-за сильных электромагнитных помех..."
      - "..В 21:35 были получены рассеянные радиоволны, классифицированные как сигнал SOS..."
      - "...Через десять минут флот подвергся нападению неизвестного противника и был вынужден отступить."
  - char: "scylla"
    side: "right"
    text:
      - "Согласно регламенту, отряд по захвату Базилики Доминиона Виши, отправленный на остров Кергелен, должен выходить на плановую связь со штабом ежедневно в 18:00."
      - "Вчерашний сеанс связи прошел по расписанию, и в докладе говорилось, что «внутри Базилики всё в порядке»."
  - char: "implacable"
    side: "left"
    text:
      - "То есть аномальная ситуация произошла в какой-то момент между 18:00 и 21:00 вчерашнего дня... С тех пор прошло уже как минимум семь-восемь часов."
      - "Прежде чем прийти ко мне, ты ведь наверняка пыталась связаться с ними. И каков результат?"
  - char: "scylla"
    side: "right"
    text:
      - "Ответа нет. Мы потеряли связь с отрядом в Базилике."
      - "Мне очень жаль, леди Имплакабл."
  - char: "implacable"
    side: "left"
    text:
      - "В первых трех докладах говорилось, что всё в порядке, а затем внезапно всё обернулось вот так..."
      - "Я так и знала, что Ее Величество не просто так уделяет этому месту столько внимания."
  - char: "scylla"
    side: "right"
    text:
      - "Прикажете немедленно организовать спасательную операцию?"
  - char: "implacable"
    side: "left"
    text:
      - "Разумеется. Дело серьезное, я лично возглавлю отряд и отправлюсь туда."
  - char: "scylla"
    side: "right"
    text:
      - "Слушаюсь, я немедленно всё подготовлю."
  - char: "implacable"
    side: "left"
    text:
      - "Пожалуйста, подожди немного, Сцилла."
      - "Чтобы в спешке не наделать ошибок, перед отправлением нам нужно сделать хотя бы примерное предположение о том, с каким врагом мы можем столкнуться."
      - "На этот счет я хотела бы выслушать твое мнение."
  - char: "scylla"
    side: "right"
    text:
      - "Если я могу чем-то помочь."
  - char: "implacable"
    side: "left"
    text:
      - "Как ты думаешь, кто стоит за этим инцидентом?"
  - char: "scylla"
    side: "right"
    text:
      - "Вы с самого начала задаете такой сложный вопрос, леди Имплакабл."
  - char: "implacable"
    side: "left"
    text:
      - "В конце концов, у Королевского Флота так много врагов, что при внезапном нападении мне, наоборот, трудно сразу догадаться, чьих это рук дело."
      - "Думаешь, это Доминион Виши послал флот, чтобы вернуть Базилику?"
  - char: "scylla"
    side: "right"
    text:
      - "Я считаю, что это невозможно."
      - "Каждый шаг Доминиона Виши находится под наблюдением спецслужб, и передвижения в масштабах флота обязательно были бы замечены."
      - "К тому же прошло всего несколько дней, не говоря уже о том, откуда бы у них вдруг взялся целый флот."
      - "Если они хотят захватить ее сейчас, то зачем им вообще было ее бросать?"
  - char: "implacable"
    side: "left"
    text:
      - "Звучит разумно. А что насчет флота Железной Крови?"
      - "Базилика на острове Кергелен — это собственность Доминиона Виши, но за Железной Кровью уже водились подобные грешки в прошлом."
      - "Может, увидев, что Базилика оккупирована нами, они в ярости решили её разрушить?"
  - char: "scylla"
    side: "right"
    text:
      - "Я не думаю, что это может быть Железная Кровь, и причина та же, что и раньше."
      - "После битвы с Компилятором почти весь флот Железной Крови снова находится под наблюдением наших спецслужб."
      - "К тому же, после того как Бисмарк взяла на себя управление Железной Кровью, она постоянно подчеркивает на дипломатическом уровне вклад Железной Крови в уничтожение Мейнфрейма Компилятора."
      - "Очевидно, ее намерение — улучшить имидж Железной Крови среди других фракций."
      - "На деле Железная Кровь с тех пор не предпринимала никаких нападений на Лазурный путь... или членов Багровой Оси."
      - "Провоцировать прямой конфликт с нами не соответствует нынешнему курсу Бисмарк, поэтому я считаю, что это не Железная Кровь."
  - char: "implacable"
    side: "left"
    text:
      - "Тогда..."
  - char: "scylla"
    side: "right"
    text:
      - "Это также не может быть делом рук Империи Сакуры, у них нет причин преодолевать такие расстояния ради этого места."
      - "Вероятность нападения Сирен исключать нельзя, однако... противостояние Сиренам вряд ли требует какой-то особой подготовки."
      - "В конце концов, мы каждую секунду ведем битвы с Сиренами в открытом море."
      - "У Свободного Ириса сейчас нет ни сил, ни причин для прямого столкновения с нами. Если бы они хотели вернуть Базилику, им пришлось бы рассматривать исключительно дипломатические методы."
      - "Что касается Союза Орла, я думаю, они бы дождались, пока мы извлечем из Базилики ценную информацию, прежде чем действовать."
  - char: "implacable"
    side: "left"
    text:
      - "А что насчет Империи Сардиния?"
  - char: "scylla"
    side: "right"
    text:
      - "Вы решили устроить проверку моих способностей, леди Имплакабл?"
  - char: "implacable"
    side: "left"
    text:
      - "Э~ так ты меня раскусила?"
  - char: "scylla"
    side: "right"
    text:
      - "В конце концов, помимо того, что вы намеренно задаете очевидные вопросы, я не могу придумать другой причины, по которой «назначенный Ее Величеством флагман Антарктического флота Королевского Флота» стал бы спрашивать об этом."
      - "Вы остались довольны моими ответами?"
  - char: "implacable"
    side: "left"
    text:
      - "Довольна даже больше, чем ожидала~"
      - "Я знаю, что у Ее Величества есть привычка отправлять членов отряда горничных в разные флоты на подмогу."
      - "Но всё-таки мы работаем вместе впервые, а теперь нам предстоит вместе отправиться на опасное поле боя, поэтому я и задала чуть больше вопросов. Прошу, не бери в голову."
  - char: "scylla"
    side: "right"
    text:
      - "Это вполне естественно, леди Имплакабл."
  - char: "implacable"
    side: "left"
    text:
      - "Сцилла, ты слышала о краже в Королевском музее?"
  - char: "scylla"
    side: "right"
    text:
      - "Ранее я видела нечто подобное в сводках разведки... Улики на месте преступления, похоже, указывают на неизвестную META, но точные обстоятельства еще не выяснены."
  - char: "implacable"
    side: "left"
    text:
      - "Верно, похоже, в последнее время против Королевского Флота выступают META неизвестного происхождения."
  - char: "scylla"
    side: "right"
    text:
      - "...Наш дислоцированный здесь флот невелик. Если предстоит боевая операция против META, не стоит ли нам запросить поддержку у Союза Орла?"
  - char: "implacable"
    side: "left"
    text:
      - "Ее Величество не хочет поднимать лишнего шума из-за захвата Базилики Доминиона Виши на острове Кергелен."
      - "Аргус и леди Ройял Оук — очень надежные бойцы."
      - "Ты только что продемонстрировала свои навыки, да и я кое на что гожусь в бою."
      - "А если добавить к нам Хиро, которую несколько дней назад перебросили со стороны Серебряного океана, мы вполне сможем разобраться с этим своими силами."
      - "Ой... Мы как-то незаметно заболтались. Иди готовься, а я отправлю сообщение Ее Величеству и присоединюсь к вам в порту."
  - char: "scylla"
    side: "right"
    text:
      - "Слушаюсь, леди Имплакабл."
  - char: "implacable"
    side: "left"
    text:
      - "Именем Ее Величества, я прослежу за тем, чтобы это дело было успешно завершено!"

chapter1:
  rows:
  - text:
      - "Войдя внутрь, группа столкнулась еще с несколькими Стенами Авроры, но Ришелье открыла путь через каждую из них тем же самым способом."
  - char: "implacable"
    side: "left"
    text:
      - "Как же это странно! Почему у тебя получается, а у меня нет!"
      - "Неужели из-за того, что это технологии вашей Ортодоксии Ирис, они оставили для тебя какую-то лазейку или вроде того?!"
  - char: "richelieu"
    side: "right"
    text:
      - "Этого я не знаю, завершенную версию Стены Авроры я тоже вижу впервые."
      - "К тому же, это оборудование Доминиона Виши, и даже если бы лазейка существовала, она вряд ли открылась бы для меня."
  - char: "implacable"
    side: "left"
    text:
      - "Ладно... Как-никак, ты кардинал Ортодоксии Ирис, признаю свое поражение."
  - char: "hero"
    side: "right"
    text:
      - "Леди Имплакабл, эти неподвижные фигуры поблизости — это всё армия Завоевания?"
  - char: "implacable"
    side: "left"
    text:
      - "Скорее всего, да. Как и армия Рыцаря Войны снаружи, это тоже особые Инфорсеры Сирен."
      - "Но сейчас они, похоже, находятся в режиме ожидания..."
  - char: "hero"
    side: "right"
    text:
      - "Тогда Хиро может использовать их для тренировки по стрельбе?!"
  - char: "implacable"
    side: "left"
    text:
      - "Не действуй безрассудно. Мы пока не знаем, в каком состоянии Рыцарь Завоевания, и если поднимем шум, он может застать нас врасплох."
      - "Если у тебя так много лишней энергии, лучше пойди и поищи местонахождение Рыцаря Завоевания."
      - "Но! Ничего не трогай!"
  - char: "hero"
    side: "right"
    text:
      - "Поняла~ Хиро выдвигается~☆"

chapter2:
  rows:
  - char: "hero_rad"
    side: "right"
    text:
      - "Леди Имплакабл, я нашла подозрительную цель!"
      - "Скорее все идите сюда, смотрите, это ведь Рыцарь Завоевания!"
  - text:
      - "Группа вошла в зал, где находилась Хиро, и увидела гигантского механического рыцаря, стоящего за оранжевой световой стеной."
  - char: "implacable"
    side: "left"
    text:
      - "Выглядит так же, как и те Инфорсеры по пути, тоже находится в каком-то спящем режиме..."
      - "Если подойти так близко, от него и впрямь исходит гнетущая аура..."
  - char: "hero"
    side: "right"
    text:
      - "И это еще не всё, Хиро нашла здесь кого-то еще!"
      - "Прямо здесь!"
  - text:
      - "Хиро подбежала к одной из колонн в зале и позвала всех."
      - "В тени гигантской колонны группа обнаружила клетку, образованную Стеной Авроры."
      - "А внутри клетки виднелся смутный силуэт."
  - char: "implacable"
    side: "left"
    text:
      - "Кто-то... заперт внутри?"
      - "Хиро, можешь разглядеть, кто там?"
  - char: "hero"
    side: "right"
    text:
      - "Видно не очень хорошо... кажется, это Ла Галиссоньер из Доминиона Виши?"
  - char: "richelieu"
    side: "left"
    text:
      - "Что?! Ла Галиссоньер оказалась в ловушке здесь?!"
      - "...Я сейчас же освобожу ее и обо всем расспрошу!"

chapter3:
  rows:
  - char: "la_galissonniere_meta"
    side: "left"
    status: "is-meta"
    text:
      - "Фух............ кажется, я так долго спала..."
      - "Который сейчас час, мне сказать доброе утро или добрый вечер?"
  - char: "richelieu"
    side: "right"
    text:
      - "Ты... не наша Ла Галиссоньер, верно?"
  - char: "la_galissonniere_meta"
    side: "left"
    status: "is-meta"
    text:
      - "Естественно~ Приятно познакомиться, кардинал Ришелье этого мира. Я Ла Галиссоньер из Пепла."
  - char: "implacable"
    side: "right"
    text:
      - "Из Пепла?!"
      - "Еще до того как прибыть сюда, у меня было предчувствие, что какая-нибудь МЕТА обязательно устроит нам неприятности, и подумать только, оно сбылось!"
  - char: "la_galissonniere_meta"
    side: "left"
    status: "is-meta"
    text:
      - "Помнится, ты Имплакабл из Королевского Флота?"
      - "Это место так далеко от вашей родины, что вы тут делаете?"
  - char: "implacable"
    side: "right"
    text:
      - "Раз уж ты строишь нам козни, разве тебе не следовало собрать побольше информации перед тем, как заявляться сюда?"
  - char: "la_galissonniere_meta"
    side: "left"
    status: "is-meta"
    text:
      - "А? С чего бы мне заботиться о ваших делах, не говоря уже о том, чтобы от скуки строить вам козни."
  - char: "implacable"
    side: "right"
    text:
      - "Тогда зачем ты сюда пришла... нет, погоди, как ты вообще прошла сквозь Стену Авроры?"
  - char: "la_galissonniere_meta"
    side: "left"
    status: "is-meta"
    text:
      - "Я пришла сюда с миссией: уничтожить этот испытательный полигон оружия Сирен."
      - "Уверена, вы тоже видели, какие эксперименты Сирены здесь проводят. Если позволить этому месту и дальше функционировать, оно принесет лишь бедствия."
      - "Вскоре после того, как я вошла, я поняла, что Сирены используют этот полигон для разработки оружия на основе концепции Четырех Всадников Апокалипсиса."
      - "Раз так, стоило лишь уничтожить Четырех Всадников в обратном порядке их появления, чтобы приостановить здешние эксперименты."
      - "И пойдя еще дальше, гениальная я обнаружила, что боевая мощь Четырех Всадников на полигоне различается, и что они даже сражаются друг с другом."
      - "А значит, то, что нужно было сделать дальше, стало еще проще~"
      - "Для начала я уничтожила стабилизирующие устройства в этой акватории, позволив Четырем Всадникам беспрепятственно по ней перемещаться."
      - "Затем, под моим руководством, Голод со своей армией провел несколько масштабных сражений со Смертью."
      - "Вокруг Смерти была целая армия, так что на ее полное уничтожение пришлось потратить немало усилий."
      - "Сразу после этого я тем же способом спровоцировала армию Войны напасть на Голод."
      - "Но Голод, похоже, обладает невероятно сильной жаждой жизни: каждый раз, когда ситуация складывалась не в его пользу, он тут же сбегал."
      - "Поэтому я хотела использовать силу Завоевания, чтобы поочередно уничтожить Голод и Войну, а в результате... вы сами всё видите."
      - "Что касается того, как я вошла? Я же из Пепла, как такие жалкие фокусы могут меня остановить."
  - char: "implacable"
    side: "right"
    text:
      - "Вот как? Но в итоге ты застряла здесь из-за этих «жалких фокусов» в ожидании, пока мы тебя спасем, не так ли?"
  - char: "la_galissonniere_meta"
    side: "left"
    status: "is-meta"
    text:
      - "……Не удержалась и атаковала Сирен внутри... Это же ловушка: войти легко, а выйти сложно."
  - char: "implacable"
    side: "right"
    text:
      - "Ты... должно быть, вступила в Пепел совсем недавно, верно?"
  - char: "la_galissonniere_meta"
    side: "left"
    status: "is-meta"
    text:
      - "Ага, как ты догадалась?"
  - char: "implacable"
    side: "right"
    text:
      - "Ахаха... Наверное, я просто довольно догадливая."
      - "Но разве все из Пепла не невероятно сильны? Зачем тебе понадобилось использовать такой сложный метод?"
  - char: "la_galissonniere_meta"
    side: "left"
    status: "is-meta"
    text:
      - "У здешнего оружия тоже весьма высокая боевая мощь! К тому же, у меня свой стиль: если можно победить умом, зачем идти напролом?"
  - char: "implacable"
    side: "right"
    text:
      - "(Она не действовала лично, поэтому детектор маяков МЕТА ничего и не засек...)"
  - char: "la_galissonniere_meta"
    side: "left"
    status: "is-meta"
    text:
      - "А? Ты что-то сказала?"
  - char: "implacable"
    side: "right"
    text:
      - "Ничего, ничего~"
      - "Кстати, когда Пепел уничтожает Сирен, разве они не придерживаются политики атаковать везде, где только появляются?"
      - "Обычно они не обращают особого внимания на такие мелочи, как «какой-то испытательный полигон Сирен»..."
      - "Неужели на самом деле... ты самая слабая в Пепле, поэтому именно тебя отправили выполнять эти мелкие поручения?"
  - char: "la_galissonniere_meta"
    side: "left"
    status: "is-meta"
    text:
      - "Ты же не состоишь в Пепле, откуда тебе знать, что мы не занимаемся подобными вещами?"
      - "Мы сражаемся с Сиренами уже очень давно, куда дольше, чем вы можете себе представить."
      - "И не тебе учить меня, как с ними расправляться!"
  - char: "implacable"
    side: "right"
    text:
      - "Ладно-ладно, твоя взяла."
      - "Так что будем делать дальше? Раз уж наши цели совпадают и ты здесь не для того, чтобы сражаться с нами, как насчет того, чтобы объединить усилия?"
      - "Как-никак, это мы тебя вытащили."
  - char: "la_galissonniere_meta"
    side: "left"
    status: "is-meta"
    text:
      - "Хотите, чтобы я поработала на вас, да?"
      - "Но давай проясним: если бы я долго не возвращалась, кто-нибудь обязательно пришел бы меня спасать. Пепел — не какая-то там бессердечная организация."
      - "Тем не менее... лучше сделать вид, будто этой маленькой неприятности никогда и не было!"
      - "Хоть я и предпочитаю действовать в одиночку, раз уж вы мне разок помогли, так и быть, временно побуду вашим телохранителем."

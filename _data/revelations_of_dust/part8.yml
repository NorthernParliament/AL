chapter1:
  rows:
  - text:
      - "После ожесточенной битвы армия пешек, накатывавшая словно бушующие волны, наконец, рассыпалась в прах."
  - char: "richelieu"
    side: "left"
    text:
      - "Беарн, обязательно тщательно зачисти поле боя, не пропусти ни одной пешки, которая еще может двигаться."
  - char: "bearn"
    side: "right"
    text:
      - "Разумеется. Это место со мной в какой-то мере связано, так что можете быть спокойны."
  - char: "richelieu"
    side: "left"
    text:
      - "А теперь..."
  - char: "implacable"
    side: "right"
    text:
      - "Какая прекрасная битва~ Не думала, что, несмотря на то, что мы не виделись столько лет, вы всё так же великолепны в бою, кардинал Ришелье."
  - char: "richelieu"
    side: "left"
    text:
      - "С нашего последнего расставания в Иберии и правда прошло немало времени."
      - "Я слышала, что после возвращения на родину ты постоянно проходила модернизацию оснастки, и лишь недавно была переведена сюда в качестве флагмана Антарктического флота?"
  - char: "implacable"
    side: "right"
    text:
      - "Верно, кардинал, как и всегда, прекрасно осведомлена."
      - "В этот раз, благодаря тому, что вы вовремя пришли на выручку, кризис не усугубился. От лица Королевского Флота выражаю вам самую искреннюю благодарность."
  - char: "richelieu"
    side: "left"
    text:
      - "Раз уж мы союзники, а дело происходит на территории Ортодоксии Ирис, помощь — моя прямая обязанность. К чему такие формальности, леди Имплакабл."
  - char: "implacable"
    side: "right"
    text:
      - "Тогда я не буду скромничать~"
      - "На самом деле, кардинал, мне кое-что неясно, и я надеюсь, что вы поможете мне разобраться."
  - char: "richelieu"
    side: "left"
    text:
      - "Говори смело."
  - char: "implacable"
    side: "right"
    text:
      - "Вы базируетесь в Африке, я базируюсь в Антарктике."
      - "Учитывая помехи связи в акватории, как вам удалось получить сигнал бедствия раньше и прибыть сюда быстрее нас?"
  - char: "richelieu"
    side: "left"
    text:
      - "Вот оно что... Вполне естественно, что у тебя возникли такие сомнения."
      - "Однако Базилика здесь — это всё-таки творение Ортодоксии Ирис. Помимо того, что сообщения из Базилики отправляются по обычным каналам, у нас есть и другие способы их получения."
      - "Именно с помощью этих специальных приборов я получила исходящий отсюда сигнал о помощи раньше вас."
  - char: "implacable"
    side: "right"
    text:
      - "Выходит, сигнал о помощи, полученный нашим патрульным флотом Серебряного океана, на самом деле переслали вы, верно?"
  - char: "richelieu"
    side: "left"
    text:
      - "...Патрульным флотом Серебряного океана? О чем это ты?"
  - char: "implacable"
    side: "right"
    text:
      - "(Послушай, благодаря твоей помощи Ройял Оук и Аргус остались в безопасности... За это я тебе искренне благодарна.)"
      - "(Поэтому давай считать, что сигнал о помощи просто случайно пробился сквозь помехи и был получен патрульным флотом.)"
      - "А теперь к делу. Ришелье, что ты думаешь об этом инциденте?"
      - "Когда-то эта Базилика была построена Ортодоксией Ирис, так что у тебя наверняка больше информации, чем у меня."
  - char: "richelieu"
    side: "left"
    text:
      - "Это правда. Хотя она и попала в руки Доминиона Виши какое-то время назад, в конце концов, это всё-таки бывшая Базилика моей Ортодоксии Ирис..."
      - "Подумать только, Доминион Виши настолько пренебрегал обслуживанием, что допустил столь серьезную аварию."
  - char: "implacable"
    side: "right"
    text:
      - "Аварию? Похоже, кардинал знает об этой Базилике даже больше, чем я предполагала?"
  - char: "richelieu"
    side: "left"
    text:
      - "Можно и так сказать, но вдаваться в подробности было бы слишком сложно."
      - "В любом случае, чтобы разрешить этот инцидент, нам нужно посетить еще немало зон. Поговорим по пути —"

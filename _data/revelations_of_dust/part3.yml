chapter1:
  rows:
  - text:
      - "Четвертый день контроля, 12:45:00"
      - "Антарктический флот Королевского Флота"
      - "Архипелаг Кергелен · Прилегающая акватория"
  - char: "hero"
    side: "left"
    text:
      - "Флот подкрепления вызывает отряд по захвату Кергелена, меня кто-нибудь слышит~"
  - char: "communicator"
    side: "right"
    text:
      - "………………"
  - char: "hero"
    side: "left"
    text:
      - "Повторяю, говорит корабль Королевского Флота Хиро!"
      - "Вызываю отряд по захвату, меня кто-нибудь слышит?!"
  - char: "communicator"
    side: "right"
    text:
      - "………………"
  - char: "hero"
    side: "left"
    text:
      - "Тск, почему вообще никакой реакции! Эта штука что, сломалась?!"
  - char: "scylla"
    side: "right"
    text:
      - "Перед отправлением всё оборудование было проверено, оно полностью исправно."
      - "Возможно, в акватории всё еще присутствуют помехи связи, поэтому оно не может нормально работать."
      - "Об этом, кажется, упоминалось во время постановки задачи... Мисс Хиро забыла?"
  - char: "hero"
    side: "left"
    text:
      - "Ц..."
  - char: "scylla"
    side: "right"
    text:
      - "Однако... Мы не получили даже сигнал SOS, о котором ранее докладывал патрульный флот, неужели..."
  - char: "implacable"
    side: "left"
    text:
      - "Не стоит так беспокоиться, леди Ройял Оук не так-то просто сломить."
      - "Хоть она и часто принижает свои заслуги в повседневных разговорах, она всё же королевский рыцарь, прошедшая через кровь и огонь и шаг за шагом проложившая свой путь."
      - "С момента инцидента прошло менее 24 часов, они должны быть еще живы."
  - char: "scylla"
    side: "right"
    text:
      - "В таком случае, леди Имплакабл, мы немедленно высаживаемся на остров?"
  - char: "implacable"
    side: "left"
    text:
      - "Не спеши. Этот остров не такой уж большой, давай сначала обойдем его кругом и подождем, пока не проясним ситуацию в акватории."
  - char: "scylla"
    side: "right"
    text:
      - "Слушаюсь."

chapter2:
  rows:
  - text:
      - "Некоторое время спустя..."
  - char: "implacable"
    side: "left"
    text:
      - "Хм... Как-то странно."
      - "Не обнаружено ни вражеского флота, ни следов сражений на острове..."
      - "Похоже, мы ничего не выясним, пока не войдем внутрь Базилики и не осмотримся."
  - char: "hero"
    side: "right"
    text:
      - "Э~ Хоть этот остров и невелик, но неизвестно, сколько времени уйдет на то, чтобы проверить каждое здание изнутри."
      - "Хиро предлагает провести эффективную зачистку путем прямого уничтожения зданий~☆"
  - char: "implacable"
    side: "left"
    text:
      - "Сцилла, как ты думаешь, где нам лучше всего высадиться?"
  - char: "scylla"
    side: "right"
    text:
      - "У большого маяка на юго-западной стороне острова. Ранее леди Ройял Оук упоминала в своем отчете, что там находится центр управления всем комплексом Базилики."
  - char: "implacable"
    side: "left"
    text:
      - "Довольно любопытно."
      - "Центр управления комплексом Базилики размещен в маяке на самом краю острова, а не в одном из этих величественных зданий. Что ты об этом думаешь?"
  - char: "scylla"
    side: "right"
    text:
      - "Внутри Базилики всё не так спокойно, как кажется на первый взгляд, возможно, там таится какая-то опасность."
      - "Поэтому инженеры Ортодоксии Ирис в свое время решили разместить центр управления подальше от комплекса зданий, у берега моря, откуда легче сбежать."
  - char: "implacable"
    side: "left"
    text:
      - "Разумное предположение. Тогда мы высадимся возле маяка на юго-западной стороне и посмотрим, удастся ли нам найти в центре управления какие-нибудь зацепки."
  - char: "hero"
    side: "right"
    text:
      - "И-игнорируете?! Э? Погодите, подождите минутку——!"
      - "То, что вы говорите, очень логично, но вы же не можете просто так игнорировать слова Хиро!"
  - char: "implacable"
    side: "left"
    text:
      - "Хе-хе, на самом деле тебе ведь не так уж и неприятно такое отношение~"
  - char: "hero"
    side: "right"
    text:
      - "Н-нет, неприятно, очень неприятно! Не игнорируйте меня!"
  - char: "implacable"
    side: "left"
    text:
      - "Тогда в предстоящем расследовании тебе придется хорошенько потрудиться, договорились?"
  - char: "hero"
    side: "right"
    text:
      - "Еще бы!! Прокладывать путь предоставьте великой мне, Хиро~☆"

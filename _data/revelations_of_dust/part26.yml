chapter1:
  rows:
  - text:
      - "Базилика Блан — или, вернее, внутри величественного комплекса зданий, существующего в Зеркальном море и соответствующего концепции Базилики Блан на верхнем уровне."
  - char: "bearn"
    side: "left"
    text:
      - "Дамы, я закончила осмотр диспетчерской Базилики. Тонкая операция по разрезанию механического рыцаря с помощью Стены Авроры вполне осуществима."
  - char: "la_galissonniere_meta"
    side: "right"
    status: "is-meta"
    text:
      - "Как я и думала~ В таком случае, кардинал Ришелье, прошу, займись управлением."
  - char: "richelieu"
    side: "left"
    text:
      - "...Доминион Виши и правда добился немалых успехов в исследованиях Стены Авроры."
  - text:
      - "Стоя в диспетчерской, Ришелье невольно испытала смешанные чувства, глядя на сложную панель управления."
  - char: "richelieu"
    side: "left"
    text:
      - "Но почему управлять должна именно я?"
  - char: "la_galissonniere_meta"
    side: "right"
    status: "is-meta"
    text:
      - "Возможно, нет никакой разницы, кто именно это сделает, но ты сама видела, какую роль на самом деле играют «символы» в этой акватории."
      - "Если бы за это взялась я или мисс Имплакабл из Королевского Флота, кто знает, какие непредвиденные осложнения могли бы возникнуть."
      - "Позволить тебе, кардиналу Ортодоксии, положить всему этому конец — разве не в этом заключается наибольший символический смысл?"
  - char: "richelieu"
    side: "left"
    text:
      - "Раз так, тогда..."
  - text:
      - "Ришелье внимательно осмотрела панель управления перед собой."
      - "Хотя компоновка и символы претерпели немало изменений, их суть осталась такой же, как и во времена Ортодоксии."
      - "И поэтому, если просто следовать прошлому опыту, завершить настройку параметров, а затем нажать на выполнение..."
  - char: "richelieu"
    side: "left"
    text:
      - "Подтверждаю выполнение... Вот так будет достаточно, верно?"
  - char: "la_galissonniere_meta"
    side: "right"
    status: "is-meta"
    text:
      - "Наверное? По крайней мере, результат выполнения проявляется незамедлительно."
  - text:
      - "Под гул работающей системы Стена Авроры, словно резак, начала процесс «разрезания»."
      - "Шлем, нагрудник, наручи, конская броня... Снаружи внутрь, сверху вниз — части механического рыцаря отсекались одна за другой."
      - "Вскоре гигантский мех превратился в груду неузнаваемых обломков."
  - char: "richelieu"
    side: "left"
    text:
      - "Вот теперь всё окончательно закончилось..."

chapter2:
  rows:
  - text:
      - "Шестой день контроля 11:54:00"
      - "Объединенный флот Королевского Флота и Свободного Ириса"
      - "Прибрежные воды острова Кергелен"
  - char: "implacable"
    side: "left"
    text:
      - "Кха-кха... Опять то же самое видение!"
  - char: "richelieu"
    side: "right"
    text:
      - "Ты в порядке, леди Имплакабл... всё еще чувствуешь дискомфорт?"
  - char: "implacable"
    side: "left"
    text:
      - "Вроде бы не так сильно, как раньше... но всё равно очень пугает!"
      - "Что это вообще за черное солнце такое!"
  - char: "richelieu"
    side: "right"
    text:
      - "Я тоже совершенно без понятия..."
      - "Но оно не излучает тепла и не причиняет людям реального вреда... Возможно, это просто какая-то иллюзия, созданная как концепция «двери» для перехода между верхним и нижним уровнями?"
  - char: "implacable"
    side: "left"
    text:
      - "Да уж, никогда мне не понять вас, людей Ириса..."
      - "Но так или иначе, теперь мы окончательно и благополучно разрешили этот инцидент!"
  - char: "scylla"
    side: "right"
    text:
      - "Леди Имплакабл, Ла Галиссоньер из Пепла исчезла."
  - char: "implacable"
    side: "left"
    text:
      - "В этой внезапности её исчезновения вполне чувствуется стиль Пепла..."
      - "Ладно, даже если бы она осталась, мы бы всё равно ничего не смогли с ней сделать. Ушла так ушла."
      - "Что ж, кардинал, мы планируем немедленно возвращаться на базу, так что оставляем это место на тебя."
  - char: "richelieu"
    side: "right"
    text:
      - "Большое спасибо. Только благодаря вашей помощи Свободный Ирис смог успешно вернуть свои потерянные территории."
  - char: "implacable"
    side: "left"
    text:
      - "Не за что, не за что~ Мы находимся не так уж далеко, так что если в будущем понадобится помощь, не стесняйся обращаться в любое время."
  - char: "richelieu"
    side: "right"
    text:
      - "Хорошо."
  - char: "implacable"
    side: "left"
    text:
      - "Тогда до встречи~ С нетерпением жду нашей следующей совместной операции."
  - char: "richelieu"
    side: "right"
    text:
      - "Именем Ириса, желаю вам удачи, до новых встреч."

chapter3:
  rows:
  - text:
      - "Вдали, над линией горизонта уже показался белый ледяной щит Антарктики."
  - char: "implacable"
    side: "left"
    text:
      - "Сцилла, Ла Галиссоньер из Пепла до этого всё же пару раз атаковала, детектор маяков что-нибудь зафиксировал?"
  - char: "scylla"
    side: "right"
    text:
      - "Что касается этого... Я хотела рассказать тебе после того, как мы вернемся, но это очень странно: детектор по-прежнему ничего не зафиксировал."
  - char: "hero"
    side: "left"
    text:
      - "На самом деле это просто детектор сломался, да... Его точно тщательно проверили перед отправкой?"
  - char: "scylla"
    side: "right"
    text:
      - "Перед отправкой детектор маяков прошел лишь базовую проверку. В конце концов, у нас не было под рукой готового образца МЕТА для тестирования."
  - char: "implacable"
    side: "left"
    text:
      - "Пока возьмем это на заметку. По возвращении нужно будет провести полную диагностику прибора."
  - char: "scylla"
    side: "right"
    text:
      - "Думаешь, она что-то от нас скрывает?"
  - char: "implacable"
    side: "left"
    text:
      - "Не забывай, сейчас в тени орудует МЕТА, которая действует против нас."
      - "В системе Базилики предусмотрен уровень доступа выше, чем у администратора, что и помешало Аргус отключить запущенный аварийный режим, помнишь?"
      - "Итак, что же это за уровень доступа, зачем он был так спроектирован, и в чьих руках он находится?"
  - char: "scylla"
    side: "right"
    text:
      - "На этот счет... у меня недостаточно информации, не могу ответить."
  - char: "implacable"
    side: "left"
    text:
      - "Хе-хе, возможно, мы узнаем это совсем скоро."
      - "У меня такое предчувствие... что во всей этой истории, боюсь, точка еще не поставлена..."

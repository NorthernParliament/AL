chapter1:
  rows:
  - char: "scylla"
    side: "left"
    text:
      - "Очень жаль, но хотя Базилика и стоит на берегу, похоже, здесь нет выходов к морю."
  - char: "implacable"
    side: "right"
    text:
      - "Разве это не крайне неудобно для транспорта? Дизайнер этого места вообще когда-нибудь был здесь лично?"
  - char: "scylla"
    side: "left"
    text:
      - "Возможно, это было сделано намеренно."
      - "Как бы то ни было, похоже, нам всё равно придется сделать крюк по суше, леди Имплакабл."
  - char: "implacable"
    side: "right"
    text:
      - "Я не собираюсь этого делать. Хиро, прокладывай путь."
  - char: "hero"
    side: "left"
    text:
      - "Вас поняла!"
      - "Хм... Проверка завершена, 3, 2, 1... Сезам, откройся~☆"
  - text:
      - "БАБАХ!!!"
      - "Под градом залпов Хиро в серебристо-белой внешней стене Базилики Блан была пробита огромная брешь."
  - char: "implacable"
    side: "left"
    text:
      - "Отлично, теперь нам не нужно делать крюк~ Идем внутрь."

chapter2:
  rows:
  - text:
      - "Группа продвигалась сквозь внутренние помещения Базилики Блан."
  - char: "implacable"
    side: "left"
    text:
      - "Здесь как-то... слишком уж просторно. Это скорее не комнаты, соединенные с комнатами, а залы, соединенные с залами..."
      - "Судя по размерам, они предназначены явно не только для пешеходов, здесь бы без проблем проехали самолеты и танки, верно?"
      - "Сцилла, судя по карте, где мы сейчас находимся?"
  - char: "scylla"
    side: "right"
    text:
      - "В оружейной №4 Базилики Блан, дальше впереди оружейная №5."
  - char: "implacable"
    side: "left"
    text:
      - "Оружейные... Неужели это место и вправду было спроектировано для перемещения гигантских боевых машин?.."
  - char: "scylla"
    side: "right"
    text:
      - "Если мы продолжим идти вперед, дорога разделится. Путь наверх ведет в молельный зал, а вниз — в скульптурную мастерскую и зал реликвий."
      - "Что касается места, похожего на центральный узел Базилики Блан, оно, видимо, находится еще глубже."
      - "Если леди Ройял Оук и Аргус решили закрепиться и ждать подкрепления, это место было бы лучшим выбором."
  - char: "implacable"
    side: "left"
    text:
      - "Похоже, нам по пути. Как насчет того, чтобы заглянуть в зал реликвий?"
  - char: "scylla"
    side: "right"
    text:
      - "Леди Имплакабл, вы хотите посмотреть, не оставили ли они какие-нибудь реликвии?"
  - char: "implacable"
    side: "left"
    text:
      - "Доминион Виши отступал в такой спешке, всякое может быть."
      - "Если они и вправду оставили ценные реликвии, было бы слишком обидно не взять их под свою опеку."
      - "Даже если там ничего нет, Доминион Виши наверняка посетил это место перед отступлением, так что мы хотя бы сможем найти какие-то зацепки."
      - "Привезти драгоценные реликвии в военную крепость, расположенную на краю света... Чем же на самом деле занимался Доминион Виши?.."

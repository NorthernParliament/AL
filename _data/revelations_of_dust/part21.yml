chapter1:
  rows:
  - text:
      - "Некоторое время спустя..."
  - char: "scylla"
    side: "left"
    text:
      - "Леди Имплакабл, я принесла новый чайник и свежеприготовленные сэндвичи, угощайся."
  - char: "implacable"
    side: "right"
    text:
      - "Большое спасибо~ Но заваривать чай я действительно могу и сама!"
  - char: "scylla"
    side: "left"
    text:
      - "Это прямая обязанность королевской горничной, поэтому позволь мне отказаться."
  - char: "implacable"
    side: "right"
    text:
      - "Эх... но с тех пор, как я прибыла сюда, на меня снизошло вдохновение, и мне не терпится кое-что попробовать!"
      - "Мне кажется, я смогу заварить чай с еще более богатым вкусом!"
  - char: "scylla"
    side: "left"
    text:
      - "Нет, это не обсуждается, леди Имплакабл."
  - char: "implacable"
    side: "right"
    text:
      - "Ладно..."
  - char: "hero"
    side: "left"
    text:
      - "..zZZZ Набив животик, Хиро захотела спать. Леди Ришелье и остальные такие медлительные..."
  - char: "royal_oak"
    side: "right"
    text:
      - "...Может быть, они столкнулись с опасностью? Может, нам всё-таки стоит пойти проверить...?"
  - char: "implacable"
    side: "left"
    text:
      - "Не волнуйся, кардинал не нуждается в нашем беспокойстве. Наверное, она просто решила сделать что-то по пути."
      - "Так что всем хорошенько отдохнуть, спешить некуда."

chapter2:
  rows:
  - char: "richelieu"
    side: "left"
    text:
      - "Простите, что заставила вас всех так долго ждать. Надеюсь, я не слишком опоздала."
  - char: "implacable"
    side: "right"
    text:
      - "Как всё прошло по пути сюда, ты не ранена?"
  - char: "richelieu"
    side: "left"
    text:
      - "Спасибо за заботу, всё прошло гладко."
      - "Просто после того, как мы оторвались от преследования флота Войны, мы с Беарн заодно проверили несколько мест, где, возможно, мог находиться выход."
      - "К сожалению, мы ничего не нашли."
      - "Как обстоят дела у вас?"
  - char: "implacable"
    side: "right"
    text:
      - "Как видишь, мы ничего не можем поделать с этой световой стеной, преграждающей путь, вот и пьем чай, отдыхаем."
  - char: "richelieu"
    side: "left"
    text:
      - "Неужели это............ завершенная версия «Стены Авроры»?!"
      - "Это вы ее запустили?!"
  - char: "implacable"
    side: "right"
    text:
      - "Конечно нет. Когда мы пришли, здесь всё уже было в таком виде."
      - "Значит, эта световая стена и правда ваша Стена Авроры..."
  - char: "richelieu"
    side: "left"
    text:
      - "Ошибки быть не может. Это явно завершенная версия Стены Авроры, которую Доминион Виши ранее использовал в Базилике в Мозамбике."
      - "Подумать только, ее построили здесь... Неужели Доминион Виши планировал использовать Стену Авроры для создания клетки для механических рыцарей...?"
  - char: "implacable"
    side: "right"
    text:
      - "Это бессмысленно... Раз это новейшая технология Доминиона Виши, то этот объект на нижнем уровне определенно был построен в течение последних двух лет, тогда как фабрика по производству пешек на верхнем уровне работает уже более двух лет."
      - "Если предположить, что Доминион Виши хотел взять кризис под контроль, почему они проигнорировали верхний уровень и занялись сразу нижним?"
      - "К тому же, судя по реальной боевой обстановке, прочность Стены Авроры такова, что даже Четыре Всадника не в силах ее пробить."
      - "Раз так, если бы они построили такие Стены Авроры во всех четырех зонах, а затем активировали их... разве проблема не была бы решена? Почему они построили ее только в одном месте?"
  - char: "richelieu"
    side: "left"
    text:
      - "Возможно............ изначально Доминион Виши не желал, чтобы произошел этот инцидент, и он был вызван... халатностью людей, дислоцированных здесь, в обслуживании объектов."
      - "Командование Доминиона, обнаружив, что ситуация здесь вышла из-под контроля, возможно, пыталось вернуть себе власть над ней, но, осознав нехватку сил, попросту сдалось."
  - char: "implacable"
    side: "right"
    text:
      - "Или же, раз уж они расставили здесь ловушку, то единственная в этой акватории столь заметная Стена Авроры наверняка тоже является частью этой ловушки."
      - "На самом деле, все разведывательные самолеты, которые я ранее отправила по воздуху, потеряли связь после того, как снизились до определенной высоты."
      - "Если мы попытаемся прорваться по воздуху силой, нас наверняка ждет та же участь."
      - "Кардинал, ты знаешь, как отключить Стену Авроры?"
  - char: "richelieu"
    side: "left"
    text:
      - "Отключить Стену Авроры можно только найдя консоль управления или устройство энергоснабжения."
      - "Но если нам нужно просто пройти сквозь нее... возможно, удастся воспользоваться особенностью этого Зеркального моря и сделать акцент на концепции «открытия двери»?"
  - char: "implacable"
    side: "right"
    text:
      - "Я уже пробовала этот подход, но, к сожалению, он совершенно не сработал."
      - "Разве что ты хочешь попробовать вот это..."
      - "«...Когда была снята седьмая печать, на небесах наступило безмолвие, как бы на полчаса...»"
      - "«...Я увидела...»"
  - char: "richelieu"
    side: "left"
    text:
      - "Не смей это использовать!!!!!!!!!!"
  - char: "implacable"
    side: "right"
    text:
      - "Ва-а!!! Кардинал, зачем ты вдруг так кричишь!"
  - char: "richelieu"
    side: "left"
    text:
      - "Я пытаюсь не дать тебе наделать глупостей!"
      - "Помнишь, что произошло, когда ты до этого читала про вторую печать!"
  - char: "implacable"
    side: "right"
    text:
      - "Но кроме этого... я вот так с ходу больше ничего придумать не могу..."
  - char: "richelieu"
    side: "left"
    text:
      - "...Возможно, твоя вера просто недостаточно искренняя, поэтому раньше и не сработало?"
  - char: "implacable"
    side: "right"
    text:
      - "Да-да-да~ Ты кардинал, мне с тобой не поспорить. В любом случае, если не веришь, попробуй сама!"
  - text:
      - "Имплакабл отступила на полшага назад и сделала жест «прошу вас»."
      - "Ришелье, повернувшись к световой стене, молитвенно сложила руки и произнесла нараспев ту же молитву, что ранее читала Имплакабл."
  - char: "richelieu"
    side: "left"
    text:
      - "«...Милосердный Господь, Ты знаешь дела мои, ведаешь силу мою...»"
      - "«...Я сохранила слово Твое, и не отреклась от имени Твоего...»"
      - "«...Посему, молю, отвори предо мной дверь, которую никто не сможет затворить...»"
  - text:
      - "И тут же в Стене Авроры появилась открытая дверь..."

chapter1:
  rows:
  - char: "royal_oak"
    side: "left"
    text:
      - "Э?.. Разве эта площадь не точно такая же, как та, которую мы видели раньше?"
      - "Вот только, кажется, по размерам она даже больше предыдущей..."
  - char: "richelieu"
    side: "right"
    text:
      - "Вы правы, леди Ройял Оук. Хотя все четыре Базилики и имеют свои особенности в планировке, по структуре они во многом схожи."
      - "Подобная площадь есть в каждой Базилике. И конечно, как вы верно заметили, здешняя площадь немного больше."
      - "К тому же главная площадь Базилики Руж находится как раз на пути к центру управления, поэтому это отличное место для того, чтобы встретить врага."
  - char: "argus"
    side: "left"
    text:
      - "То есть... если мы организуем здесь линию обороны, то сможем уничтожить всех пешек одним махом?"
  - char: "richelieu"
    side: "right"
    text:
      - "Верно. Но насколько я помню, именно к этой Базилике приписано больше всего серийных пешек, так что впереди нас неизбежно ждет тяжелый бой."
  - char: "implacable"
    side: "left"
    text:
      - "(Хм... Выглядит и правда как неплохая позиция для боя.)"
      - "(Однако эта просторность кажется немного...)"
  - char: "richelieu"
    side: "right"
    text:
      - "Хм? У тебя есть какие-то вопросы, леди Имплакабл?"
  - char: "implacable"
    side: "left"
    text:
      - "А, ничего, кардинал, продолжайте~"
  - char: "richelieu"
    side: "right"
    text:
      - "На самом деле я уже закончила... если только тебе нечего добавить."
  - char: "implacable"
    side: "left"
    text:
      - "Хм... Раз уж атмосфера к этому располагает, я тоже скажу пару слов."
      - "Дамы, Ее Величество требует, чтобы каждая из нас исполнила свой долг. Все вы должны четко помнить о своей задаче и крепко держать свои позиции."
      - "Если мы объединим усилия с нашими союзниками из Свободного Ириса, эта победа непременно будет нашей!"

chapter2:
  rows:
  - text:
      - "БАБАХ!!!"
      - "Когда на площадь ворвалась фигура первой пешки, тут же завязался ожесточенный бой."
      - "Глядя вниз с самой высокой смотровой трибуны, можно было охватить взглядом всё, что происходило на площади."
      - "Источающие красный туман пешки непрерывным потоком врывались на площадь, а затем падали рядами под плотным огнем."
      - "Поскольку группа заранее заняла выгодные позиции, бой превратился в почти не требующую раздумий механическую работу."
      - "В этом, казалось бы, бесконечном и утомительном повторении мысли Имплакабл постепенно унеслись вдаль..."
  - char: "implacable"
    side: "left"
    text:
      - "(Сначала Блан (Белая), затем Руж (Красная)...)"
      - "(...«Да станет это началом Суда».)"
      - "(К слову... хоть она и перенесла множество расширений, изначально эта Базилика была построена во время первой контратаки против Сирен...)"
      - "(............Неужели, да быть того не может............)"

chapter3:
  rows:
  - text:
      - "Обломки красных пешек устилали землю слоями."
      - "Глядя со смотровой трибуны, казалось, что этот алый ковер простирается до самого края света..."
  - char: "argus"
    side: "left"
    text:
      - "Леди Имплакабл, битва окончена. Кардинал Ришелье вместе с Беарн зачищают поле боя, Сцилла их сопровождает."
      - "Мы не получили никаких повреждений. Леди Имплакабл, вы в порядке?"
  - char: "implacable"
    side: "right"
    text:
      - "Да, у меня тоже всё в порядке."
      - "Благодаря знаниям Ришелье об этом месте, мы смогли с минимальными потерями уничтожить такую огромную армию."
      - "Вот только если бы она была чуточку честнее..."
  - char: "argus"
    side: "left"
    text:
      - "...Леди Имплакабл?"
  - char: "implacable"
    side: "right"
    text:
      - "Ничего~ Просто мысли вслух, не бери в голову."
      - "Аргус, как вы себя чувствовали во время патрулирования в последние несколько дней? Заметили что-нибудь необычное?"
  - char: "argus"
    side: "left"
    text:
      - "Хм... Старые, но огромные сооружения, оборудование, лишенное должного обслуживания..."
      - "Особенно необычными, пожалуй, были несколько взрывов оборудования, произошедших за это время. Для Базилики такое ведь недопустимо, верно?.."
  - char: "implacable"
    side: "right"
    text:
      - "А кроме этого?"
  - char: "argus"
    side: "left"
    text:
      - "Кроме этого... как и написано в отчетах, не произошло ничего, что стоило бы отдельного упоминания."
  - char: "implacable"
    side: "right"
    text:
      - "Я не о физическом уровне, а скорее о ментальном..."
      - "Мне сейчас трудно подобрать точные слова... В общем, были ли какие-то аномалии, которые вы ощущали на ментальном уровне?"
  - char: "argus"
    side: "left"
    text:
      - "Хм... Возможно, из-за планировки зданий все эти дни пребывания здесь я чувствовала себя очень подавленной, словно постоянно находилась в состоянии напряжения и тревоги."
      - "Леди Ройял Оук испытывала те же самые чувства."
  - char: "implacable"
    side: "right"
    text:
      - "Это чувство присутствовало с самого начала, а не появилось только после аварии, верно?"
  - char: "argus"
    side: "left"
    text:
      - "Верно... Но после аварии это чувство, кажется, стало немного сильнее?"
      - "А затем, после того как система очистки была полностью запущена, оно словно снова исчезло..."
      - "Мне тоже сложно описать это словами. Возможно, как я уже говорила, мне это просто показалось."
  - char: "implacable"
    side: "right"
    text:
      - "Проблемы на ментальном уровне порой заслуживают куда большей настороженности, чем на физическом."
      - "Пойдем, нам пора в следующую Базилику."
  - char: "argus"
    side: "left"
    text:
      - "Э? Кардинал Ришелье уже сказала вам, в какую из них мы направимся дальше?"
  - char: "implacable"
    side: "right"
    text:
      - "Не говорила, но я уже и сама догадалась."
      - "Следующее место, куда мы отправимся - Базилика Нуар, черная как смоль Базилика."

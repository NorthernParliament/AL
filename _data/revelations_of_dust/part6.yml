chapter1:
  rows:
  - char: "hero"
    side: "left"
    text:
      - "Хойя! Я — великая Хиро из Королевского Флота!"
      - "Кто идет? Руки вверх!"
  - char: "scylla"
    side: "right"
    text:
      - "Ох, вот это да... Прошу прощения."
      - "Меня зовут Сцилла, я всего лишь горничная. Не думала, что так дерзко вторгнусь во владения великой Хиро."
  - char: "hero"
    side: "left"
    text:
      - "Хе-хе, похоже, ты наслышана о моем славном имени!"
      - "Но за ошибки нужно платить! Как мисс Сцилла собирается загладить свою вину за это оскорбление?~☆"
  - char: "scylla"
    side: "right"
    text:
      - "А что бы госпожа Хиро хотела, чтобы я сделала?"
  - char: "hero"
    side: "left"
    text:
      - "Ну..."
  - char: "implacable"
    side: "right"
    text:
      - "*Радостно хлопает в ладоши*"
      - "Не думала, что у мисс Сциллы есть талант к импровизации."
  - char: "scylla"
    side: "left"
    text:
      - "Я просто подыграла мисс Хиро. Прошу, не смейтесь надо мной, леди Имплакабл."
  - char: "implacable"
    side: "right"
    text:
      - "Нет-нет-нет, по-моему, это было очень забавно. Благодаря вам двоим эта гнетущая атмосфера немного рассеялась."
      - "Хиро, принеси-ка лук, дай мне на него взглянуть."
      - "Этот лук — единственная вещь, которую удалось найти в зале реликвий?"
  - char: "hero"
    side: "left"
    text:
      - "Ага! Всего здесь четыре витрины, но три из них пусты, только этот лук остался цел и невредим~☆"
      - "А под этой витриной есть надпись: «Да станет это началом Суда». Вы знаете, что это значит?"
  - char: "implacable"
    side: "right"
    text:
      - "Четыре витрины... лук... начало Суда..."
  - char: "scylla"
    side: "left"
    text:
      - "У вас появились какие-то догадки?"
  - char: "implacable"
    side: "right"
    text:
      - "Пока лишь смутные мысли. Но, кажется, я начинаю понимать, почему здешнюю атмосферу сделали такой гнетущей."
  - text:
      - "*Свист!*"
      - "И пока группа была поглощена разглядыванием находки, в проходе позади Имплакабл появилась размытая фигура."
  - char: "scylla"
    side: "left"
    text:
      - "Леди Имплакабл, берегитесь!"
  - text:
      - "БАБАХ!!!"
      - "Не дав нарушителю приблизиться, Сцилла, словно выпущенная из лука стрела, вклинилась между Имплакабл и врагом."
      - "Острое лезвие мелькнуло в тускло освещенном проходе, подобно серебряной струне, и в мгновение ока нападавший рухнул на землю."
  - char: "hero"
    side: "left"
    text:
      - "Кто это? Назови себя!"
  - char: "implacable"
    side: "right"
    text:
      - "Сцилла уже разобралась с нападавшим."
  - char: "hero"
    side: "left"
    text:
      - "...Как быстро! Ты совсем не дала Хиро шанса проявить себя, эй!"
  - char: "scylla"
    side: "right"
    text:
      - "Прошу прощения, в следующий раз я постараюсь оставить вам немного времени на реакцию."
  - char: "hero"
    side: "left"
    text:
      - "Вот и отлично~☆"
  - char: "implacable"
    side: "right"
    text:
      - "Это же... Ла Галиссоньер из Доминиона Виши?"
  - char: "scylla"
    side: "left"
    text:
      - "Всего лишь пешка, она не выдержала и одного удара."
  - char: "implacable"
    side: "right"
    text:
      - "Внутри Базилики Доминиона Виши появились пешки Доминиона Виши..."
  - text:
      - "*Звук вибрации*"
  - char: "hero"
    side: "left"
    text:
      - "В-вы тоже чувствуете, как дрожит земля? Э-э-это что, землетрясение?!"
  - char: "implacable"
    side: "right"
    text:
      - ".....Неужели и правда?"
  - char: "scylla"
    side: "left"
    text:
      - "Боюсь, всё именно так, как вы предполагаете, леди Имплакабл."
      - "К нам приближается огромное количество пешек, мы окружены."
  - char: "implacable"
    side: "right"
    text:
      - "Во имя Ее Величества! Всем приготовиться к бою!!"

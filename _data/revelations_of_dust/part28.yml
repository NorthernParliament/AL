chapter1:
  rows:
  - char: "implacable"
    side: "left"
    text:
      - "....Я так и знала, что по возвращении мне обязательно приснится кошмар."
      - "Полагаю, теперь можно считать, что мое предчувствие сбылось?"
  - text:
      - "Никто не ответил на бормотание Имплакабл, лишь черное солнце безмолвно пылало в вышине."
  - char: "implacable"
    side: "left"
    text:
      - "Раз так, позволь мне как следует тебя рассмотреть."
      - "На Кергелене ты напугало меня дважды, скажи на милость, что же ты такое?"
  - text:
      - "Имплакабл посмотрела на черное солнце и, наконец, приняла решение."
      - "Однако, прежде чем она успела сделать шаг, она почувствовала чье-то внезапное присутствие у себя за спиной."
  - char: "queen_elizabeth_xd"
    side: "right"
    status: "is-lightgray"
    text:
      - "▇▆▅■▎▃▌█▆▎▇█▎■▄▆▋▂▁▅▎▌█▊▇▊▇"
  - char: "implacable"
    side: "left"
    text:
      - "...Ваше Величество?"
  - char: "queen_elizabeth_xd"
    side: "right"
    status: "is-lightgray"
    text:
      - "▅▁▂▋▄▊■▆▎▅▁▂▋▄▊■▆▎▇▆▅■"
  - char: "implacable"
    side: "left"
    text:
      - "...Что ты сказала... я не расслышала?"
  - char: "nop"
    side: "right"
    status: "is-meta"
    text:
      - "Не расслышала? Значит, тебя еще можно спасти."
      - "Сгинь, нечисть!"
  - text:
      - "БАБАХ!!!"
      - "После мощного удара та Куин Элизабет, издававшая непонятные звуки, исчезла."
      - "Вместо неё по другую сторону за спиной Имплакабл появилась..."
  - char: "queen_elizabeth_meta???"
    side: "right"
    status: "is-meta"
    text:
      - "Хм? Чего ты так на меня смотришь?"
  - char: "implacable"
    side: "left"
    text:
      - "...Куин Элизабет-МЕТА?!"
  - char: "queen_elizabeth_meta"
    side: "right"
    status: "is-meta"
    text:
      - "К чему такое удивление? Разве не ты воззвала ко мне?"
      - "Если присмотреться... ты ведь не подверглась МЕТА-трансформации."
      - "Тогда как ты смогла дозваться меня? И как умудрилась связаться с этими тварями?"
      - "Весьма занятно..."
  - char: "implacable"
    side: "left"
    text:
      - "Я немного... не поспеваю за ходом твоих мыслей."
      - "Это что, сон?"
  - char: "queen_elizabeth_meta"
    side: "right"
    status: "is-meta"
    text:
      - "Для тебя — да."
      - "Пора просыпаться. Тебе здесь не место, возвращайся."
  - char: "implacable"
    side: "left"
    text:
      - "Но у меня еще остались вопросы..."
  - char: "queen_elizabeth_meta"
    side: "right"
    status: "is-meta"
    text:
      - "Я не спрашивала твоего мнения."
      - "«Возвращайся»."

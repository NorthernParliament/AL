chapter1:
  rows:
  - text:
      - "Базилика Блан — или, вернее, снаружи величественного комплекса зданий, существующего в Зеркальном море и соответствующего концепции Базилики Блан на верхнем уровне."
      - "Здесь не было врагов. Величественные врата были распахнуты настежь, и дорога, ведущая к её центральной зоне, казалась совершенно свободной."
      - "Однако Имплакабл и Хиро никак не могли сделать внутрь ни единого шага."

chapter2:
  rows:
  - char: "hero"
    side: "left"
    text:
      - "Хм.... получай!"
  - text:
      - "Кулак Хиро обрушился на световую стену впереди, по оранжевой световой завесе пробежала легкая рябь, но на этом всё и закончилось."
  - char: "hero"
    side: "left"
    text:
      - "Леди Имплакабл, эта штука такая странная! Можно я попробую выстрелить из орудий?!"
  - char: "implacable"
    side: "right"
    text:
      - "Только отойди немного подальше."
  - text:
      - "БАБАХ!!!"
  - char: "hero"
    side: "left"
    text:
      - "Н-надо же, она отразила снаряд Хиро!"
      - "А ведь сквозь неё даже смутно видны пейзажи позади. Это же просто свет, как он может быть таким прочным!"
  - char: "implacable"
    side: "right"
    text:
      - "Дело дрянь... Хоть это и не совсем похоже на те блокирующие устройства Сирен, которые мы видели раньше, боюсь, принцип тот же."
      - "Если мы не уничтожим устройство, питающее её энергией, боюсь, мы вряд ли сможем продвинуться дальше..."
      - "...Хм? Что это ты делаешь?"
  - text:
      - "Хиро, которая вроде бы уже сдалась, вдруг снова начала водить рукой по световой стене."
  - char: "hero"
    side: "left"
    text:
      - "Хо-хо-хо, Хиро вдруг пришла в голову просто блестящая идея!"
      - "Разве ты не говорила раньше о важности «концепций» в этой акватории?!"
      - "Хоть я и не до конца всё поняла, но если я попытаюсь создать на стене концепцию «открытия двери», возможно, дверь и откроется!"
  - char: "implacable"
    side: "right"
    text:
      - "А ведь это... и впрямь может оказаться на удивление хорошей идеей!"
  - char: "hero"
    side: "left"
    text:
      - "Фу-фу-фу, то, что Хиро сейчас делала — это рисовала на стене символ ключа!"
      - "А теперь — время стать свидетелями чуда..."
      - "Сезам, откройся!"
  - text:
      - "В ответ на заклинание Хиро световая стена впереди никак не изменилась."
  - char: "hero"
    side: "left"
    text:
      - "...Ха-а? К-как же так!"
  - char: "implacable"
    side: "right"
    text:
      - "Возможно, ход мыслей был верным, но вот содержание заклинания подвело?"
      - "У меня тоже есть одна идея, давай-ка попробуем..."
  - text:
      - "Имплакабл приняла серьезный вид, молитвенно сложила руки и начала тихо читать нараспев."
  - char: "implacable"
    side: "right"
    text:
      - "«...Милосердный Господь, Ты знаешь дела мои, ведаешь силу мою...»"
      - "«...Я сохранила слово Твое, и не отреклась от имени Твоего...»"
      - "«...Посему, молю, отвори предо мной дверь, которую никто не сможет затворить...»"
  - text:
      - "В ответ на песнопение Имплакабл световая стена впереди так и не претерпела никаких изменений."
  - char: "hero"
    side: "left"
    text:
      - "......Похоже, твое заклинание тоже не сработало."
  - char: "implacable"
    side: "right"
    text:
      - "Хм............ Неужели нужно прочесть тот отрывок про седьмую печать..."
      - "Но... тот отрывок получением «ключа» не заканчивается, как же быть..."
  - char: "argus"
    side: "left"
    text:
      - "Леди Имплакабл, мы прибыли. А чем вы двое тут... занимаетесь?"
  - char: "implacable"
    side: "right"
    text:
      - "Как видите, путь внутрь прегражден. Мы не можем пройти сквозь эту световую стену и сейчас ломаем над этим головы."
  - char: "hero"
    side: "left"
    text:
      - "Ни обстрел, ни заклинания не действуют! Хиро совершенно не знает, что делать!"
  - char: "royal_oak"
    side: "right"
    text:
      - "...За-заклинания?"
  - char: "implacable"
    side: "left"
    text:
      - "Кхм... не обращай внимания."
      - "В общем, мы ищем способ пробиться сквозь эту световую стену и попасть внутрь здания, но, к сожалению, пока безрезультатно."
  - char: "argus"
    side: "right"
    text:
      - "Леди Имплакабл, у меня есть одна мысль... Раз уж световая стена такая прочная, как насчет стен, к которым она примыкает?"
      - "Эти стены не выглядят неразрушимыми. Что, если проделать в них брешь?"
  - char: "implacable"
    side: "left"
    text:
      - "Я, конечно, не пробовала, но боюсь, это бесполезно. Взгляните сюда..."
  - text:
      - "Имплакабл отвела группу от главных ворот к одному из участков внешней стены Базилики."
      - "Перед ними предстала жуткая трещина высотой в несколько десятков метров, которая почти расколола стену надвое, но если заглянуть внутрь расщелины, можно было снова увидеть слабое свечение."
      - "Эта световая стена абсолютно монолитна — даже если пробить прочное здание, образовавшаяся брешь вновь заполнится световой завесой."
  - char: "argus"
    side: "left"
    text:
      - "Это... оставили другие рыцари?"
  - char: "implacable"
    side: "right"
    text:
      - "Угу, это похоже на те повреждения, что мы обнаружили на теле Рыцаря Смерти."
      - "Похоже, другие рыцари пытались атаковать зону контроля Завоевания, но отступили, так как не смогли пробиться сквозь световую стену."
  - char: "royal_oak"
    side: "left"
    text:
      - "Это просто нечестно... Раз уж те гигантские рыцари не смогли пробиться, то мне и подавно... П-погодите-ка!"
  - char: "implacable"
    side: "right"
    text:
      - "Бомбардировку сверху с помощью самолетов я тоже уже испробовала~"
      - "Хоть сверху и кажется, что там нет световой стены, но стоит самолетам подлететь слишком низко, как они по неизвестной причине тут же теряют управление, а сброшенные бомбы не взрываются."
      - "Я уже потеряла несколько палубных самолетов."
      - "Похоже, кто бы ни заблокировал это место, он явно не хочет, чтобы кто-то снаружи попал внутрь."
  - char: "argus"
    side: "left"
    text:
      - "И что же нам делать дальше? Отправимся искать питающее устройство...?"
  - char: "implacable"
    side: "right"
    text:
      - "В теории так и следует поступить... Но эта акватория такая сложная и опасная, что неизвестно, сколько времени займут поиски."
      - "К тому же, существует вероятность, что устройство питания на самом деле находится внутри здания."
  - char: "royal_oak"
    side: "left"
    text:
      - "Если оно внутри, разве это не значит, что вообще никто не сможет войти...?"
  - char: "implacable"
    side: "right"
    text:
      - "Это всего лишь вероятность."
      - "Раз уж это объект Доминиона Виши, у меня есть кое-какая догадка... но я пока не могу утверждать наверняка."
      - "Как насчет того, чтобы пока выпить чаю с закусками, восстановить силы, а когда прибудет кардинал с остальными — обсудить всё подробнее."

chapter1:
  rows:
  - char: "royal_oak"
    side: "left"
    text:
      - "В-восточная главная магистраль зачищена!"
  - char: "scylla"
    side: "right"
    text:
      - "Южный мост в безопасности."
  - char: "hero"
    side: "left"
    text:
      - "С северной стороной тоже покончено~☆"
  - char: "implacable"
    side: "right"
    text:
      - "Отличная работа, на моём направлении тоже больше нет врагов."
      - "Кардинал, а что у вас?"
  - char: "richelieu"
    side: "left"
    text:
      - "Всё полностью зачищено. Похоже, те, кого мы только что уничтожили, были последней партией пешек."
      - "Беарн, как обстановка?"
  - char: "bearn"
    side: "right"
    text:
      - "Индекс загрязнения в системе очистки вернулся к безопасному уровню, можно считать эту зону безопасной."
  - char: "richelieu"
    side: "left"
    text:
      - "Отлично."
  - char: "argus"
    side: "right"
    text:
      - "Не знаю, может, мне только кажется... но та гнетущая атмосфера, которую мы раньше чувствовали в Базилике, похоже, тоже исчезла."
      - "Она постепенно сменилась на чувство... приносящее спокойствие..."
  - char: "implacable"
    side: "left"
    text:
      - "Раз ты об этом заговорила, кажется, я тоже это чувствую."
  - char: "argus"
    side: "right"
    text:
      - "И, кажется, это еще не всё... туман, который всё это время маячил на краю зрения, тоже рассеялся!"
      - "Если присмотреться, то в здешней архитектуре даже каждый белый шпиль был тщательно вырезан... В сочетании с золотой позолотой это выглядит как гигантское произведение искусства."
      - "Кто бы мог подумать, что простая смена атмосферы может заставить те же самые здания восприниматься совершенно иначе..."
  - char: "implacable"
    side: "left"
    text:
      - "Я думаю, более важно то, что по своему предназначению это место должно быть военной крепостью или военным заводом..."
      - "Скажите-ка, кардинал, вы случайно не пытались строить Базилики прямо на военных кораблях?"
  - char: "richelieu"
    side: "right"
    text:
      - "Хм... У Трибунала в прошлом действительно были подобные планы, и они даже построили один корабль, используя свои собственные ресурсы."
      - "Если я правильно помню, тогда он классифицировался как «Полевой молельный корабль»."
  - char: "implacable"
    side: "left"
    text:
      - "Э? Неужели действительно построили?! Но почему я об этом никогда не слышала..."
  - char: "richelieu"
    side: "right"
    text:
      - "Это было очень давно. К тому же, вскоре после того, как молельный корабль был достроен, Трибунал отправил его на самый передовой край поля боя."
      - "Но к сожалению, его первый рейс стал для него и последним."
  - char: "implacable"
    side: "left"
    text:
      - "Вот оно что... Какая жалость..."
      - "Значит, кардинал, с этой Базиликой можно считать покончено? Куда мы направимся дальше?"
  - char: "richelieu"
    side: "right"
    text:
      - "Дальше — вторая Базилика, Базилика Руж. Прошу всех следовать за мной..."

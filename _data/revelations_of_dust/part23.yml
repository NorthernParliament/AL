chapter1:
  rows:
  - text:
      - "День контроля ****,**:**:"
      - "??? · ???**"
      - "Повреждение данных**- Обнаружена фатальная ошибка**"
  - char: "implacable"
    side: "left"
    text:
      - "Сцилла, что ты думаешь о словах той Ла Галиссоньер из Пепла?"
  - char: "scylla"
    side: "right"
    text:
      - "Звучит очень искренне и правдоподобно, да и ход мыслей по решению проблемы у неё примерно такой же, как был у нас."
  - char: "implacable"
    side: "left"
    text:
      - "Но?"
  - char: "scylla"
    side: "right"
    text:
      - "Мне всё кажется, что что-то здесь не так... Она слишком детально осведомлена об этом месте? Или, скажем так, она чересчур полна энтузиазма по этому поводу?"
      - "Прошу прощения, леди Имплакабл, я пока не могу точно сказать, что именно вызывает это чувство неправильности."
  - char: "implacable"
    side: "left"
    text:
      - "Ничего, просто спокойно подумай об этом. Я чувствую то же самое."
      - "Хотя в её словах и нельзя найти изъяна, но всё равно кажется, что что-то не так..."
      - "Возможно, это лишь иллюзия, вызванная нашим природным недоверием к Пеплу, а возможно, и нет."
      - "Как бы то ни было, в дальнейшем внимательно наблюдай и сохраняй бдительность."
  - char: "scylla"
    side: "right"
    text:
      - "Слушаюсь, леди Имплакабл."

chapter2:
  rows:
  - char: "la_galissonniere_meta_rad"
    side: "left"
    status: "is-meta"
    text:
      - "Дамы, я уже напала на след Голода."
      - "Степень повреждений примерно... сорок-пятьдесят процентов..."
      - "Поддерживать такое состояние после столь длительной схватки с Войной — его живучесть поистине поражает."
      - "Что скажете? Сейчас он передвигается по воде в одиночку, это идеальный момент для его уничтожения."
  - char: "richelieu"
    side: "right"
    text:
      - "Естественно, нет причин упускать такой хороший шанс."
      - "Леди Имплакабл, я отправляюсь на передовую, может ли Беарн пока сопровождать тебя?"
  - char: "implacable"
    side: "left"
    text:
      - "Конечно, без проблем~ Ройял Оук, командование огневой поддержкой я поручаю тебе, помоги в бою кардиналу Ришелье и Ла Галиссоньер из Пепла."
      - "Мы с Аргус и Беарн переместимся на более подходящую позицию, чтобы оказать вам поддержку."
  - char: "richelieu"
    side: "right"
    text:
      - "Поняла, полагаюсь на твою помощь в бою, леди Ройял Оук."
  - char: "royal_oak"
    side: "left"
    text:
      - "Б-без проблем! Я не обману ваше доверие!"
  - char: "richelieu"
    side: "right"
    text:
      - "«Механизированный доспех Сирен — Голод». Начнем бой!"

chapter3:
  rows:
  - text:
      - "БАБАХ!!!"
  - char: "richelieu"
    side: "left"
    text:
      - "Чёрт, даже обстрел со столь близкого расстояния не смог полностью пробить его броню..."
      - "Раз так..."
  - text:
      - "БАБАХ!!!"
  - char: "hero"
    side: "left"
    text:
      - "О-он смог уклониться от атаки леди Ришелье в ближнем бою?! А ведь он так тяжело ранен!"
  - char: "scylla"
    side: "right"
    text:
      - "Похоже, ранее Ла Галиссоньер не лгала."
      - "Этот механизм — всего лишь автономное оружие, созданное на испытательном полигоне Сирен, но его боевая мощь сравнима с высокоранговыми Сиренами..."
  - char: "royal_oak"
    side: "left"
    text:
      - "Как такое вообще возможно..."
      - "Неужели мы, кардинал Ришелье и леди Имплакабл, вместе с Ла Галиссоньер МЕТА, так и не сможем его одолеть..."
  - char: "implacable_rad"
    side: "right"
    text:
      - "Нет. Та, что из Пепла, вообще палец о палец не ударила..."
      - "Эй, ты, МЕТА! Почему ты прохлаждаешься?! Хватит валять дурака!"
  - char: "la_galissonniere_meta"
    side: "left"
    status: "is-meta"
    text:
      - "Тшш... не суетись, я молюсь."
  - char: "implacable_rad"
    side: "right"
    text:
      - "Молишься в такое время? О том, чтобы враг проявил к нам милосердие?"
  - char: "la_galissonniere_meta"
    side: "left"
    status: "is-meta"
    text:
      - "Нет, молюсь о том, чтобы навлечь на него погибель."
      - "«...Милосердный Господь, я искренне внимаю словам Твоим и исполняю волю Твою...»"
      - "«...Прошу, прими мою ненависть как свою, и врагов моих как своих врагов...»"
      - "«Даруй мне силу очистить этот мир от всякой несправедливости и греха!»"
  - text:
      - "Под всё нарастающий голос Ла Галиссоньер, читающей молитву, всех на мгновение охватила аура непоколебимой воли к победе."
      - "Чаша весов на поле боя, казалось, и впрямь начала склоняться в их сторону."
  - char: "richelieu"
    side: "left"
    text:
      - "...Рыцарь Голода как будто стал слабее?"
  - char: "la_galissonniere_meta"
    side: "right"
    status: "is-meta"
    text:
      - "Именно так, самое время воспользоваться шансом и сосредоточить огонь, чтобы уничтожить его~"
      - "Ла Галиссоньер вступает в бой!~"

chapter4:
  rows:
  - text:
      - "После череды взрывов гигантский рыцарь, похожий на гору, наконец рухнул, превратившись в обломки, которые больше никогда не собрать воедино."
  - char: "la_galissonniere_meta"
    side: "left"
    status: "is-meta"
    text:
      - "Готово, дело сделано. Ну как, всё еще сомневаетесь в моей боевой мощи?"
  - char: "implacable"
    side: "right"
    text:
      - "Нет... несомненно, ты абсолютно выдающийся боец Пепла."
      - "К счастью, ты на нашей стороне."
  - char: "la_galissonniere_meta"
    side: "left"
    status: "is-meta"
    text:
      - "Хоть наш союз и временный, но всё равно спасибо за комплимент~"
  - char: "richelieu"
    side: "right"
    text:
      - "Ла Галиссоньер из Пепла, что ты только что..."
  - char: "la_galissonniere_meta"
    side: "left"
    status: "is-meta"
    text:
      - "Как видишь, я помолилась и получила ответ."
      - "Именно такие эксперименты Сирены здесь и проводят, я просто этим воспользовалась."
  - char: "implacable"
    side: "right"
    text:
      - "Материализация концепций, верно?!"
  - char: "la_galissonniere_meta"
    side: "left"
    status: "is-meta"
    text:
      - "Если точнее, не материализация всех концепций, а материализация концепций, связанных с верой."
      - "Но, похоже, ты всё поняла. А ты весьма умна, мисс Имплакабл."
  - char: "implacable"
    side: "right"
    text:
      - "Хе-хе-хе, до этого я даже пыталась воззвать к «Войне», и то, что Четырех Всадников нужно уничтожать по порядку, тоже обнаружила я."
  - char: "la_galissonniere_meta"
    side: "left"
    status: "is-meta"
    text:
      - "А? Ты прочла вторую печать, чтобы воззвать к Войне? И что потом?"
  - char: "implacable"
    side: "right"
    text:
      - "А потом я почувствовала... будто попала под влияние какой-то сущности, я начала переставать быть собой... К счастью, кардинал вовремя меня прервала."
      - "Неужели это и впрямь так опасно?"
  - char: "la_galissonniere_meta"
    side: "left"
    status: "is-meta"
    text:
      - "Тебе очень повезло... Да, невероятно опасно."
      - "Воззвать к Богу — это одно, а воззвать к Всаднику Апокалипсиса — совсем другое... Тебе следовало хотя бы тщательнее выбирать тех, к кому ты взываешь."
      - "Впрочем... хм... думаю, это может сработать. Не хотите попробовать?"
  - char: "implacable"
    side: "right"
    text:
      - "Сработать? О чем ты?"
  - char: "la_galissonniere_meta"
    side: "left"
    status: "is-meta"
    text:
      - "О «материализации веры». Со следующим Рыцарем Войны справиться будет еще труднее, чем с Рыцарем Голода. Если вы не вооружитесь этим, вас с легкостью уничтожат."
  - char: "implacable"
    side: "right"
    text:
      - "Это явление ведь вызывается оборудованием Сирен. У нас правда не будет никаких побочных эффектов, если мы им воспользуемся?"
  - char: "la_galissonniere_meta"
    side: "left"
    status: "is-meta"
    text:
      - "Нет-нет~ Оборудование Сирен просто создало пространство, способное воплотить это явление, его можно считать лишь инструментом."
      - "Хорошее или плохое влияние зависит только от того, как его использует тот, кто им пользуется."
      - "В молитве Господу нет ничего плохого. Ты ведь видела, что я только что сделала?"
  - char: "richelieu"
    side: "right"
    text:
      - "Если это так... леди Имплакабл, я думаю, стоит попробовать."
  - char: "implacable"
    side: "left"
    text:
      - "Э? ...Но ведь это всё-таки объект Сирен, тебя это не смущает?"
  - char: "richelieu"
    side: "right"
    text:
      - "Естественно, смущает. Но разве здесь нет церквей, построенных еще во времена Ортодоксии Ирис? Просто пойдем молиться туда."
  - char: "implacable"
    side: "left"
    text:
      - "Что ж... ладно. Раз уж тебя, кардинал, это не смущает, то и меня подавно."
      - "Не будем терять ни минуты, давайте прямо сейчас найдем подходящее место для молитвы~"

chapter1:
  rows:
  - text:
      - "Третий день контроля, 18:17:45"
      - "Антарктический флот Королевского Флота"
      - "Отряд по захвату Базилики Доминиона Виши"
      - "Остров Кергелен · Навигационный маяк Базилики"

chapter2:
  rows:
  - char: "argus"
    side: "left"
    text:
      - "Аргус вызывает леди Ройял Оук. Ты заметила там что-нибудь необычное?"
  - char: "royal_oak_rad"
    side: "right"
    text:
      - "В-всё в порядке? Наверное..."
      - "Сколько бы раз я ни патрулировала, здесь всё равно так жутко... Люди из Доминиона Виши действительно раньше здесь базировались?"
  - char: "argus"
    side: "left"
    text:
      - "Судя по разведданным, это действительно так."
      - "Хотя к моменту нашего прибытия гарнизон уже давно сбежал..."
      - "Может быть, на них тоже повлияла эта мрачная атмосфера?.."
  - char: "royal_oak_rad"
    side: "right"
    text:
      - "...Очень может быть. Но, к счастью, благодаря этому мы не встретили никакого сопротивления, когда брали базу под контроль."
  - char: "argus"
    side: "left"
    text:
      - "..Но в то же время мы не смогли найти никакой ценной информации."
      - "А ведь леди Имплакабл специально просила нас «не упускать ни малейшей зацепки», да и Ее Величество пристально следит за ситуацией..."
      - "Прошло уже три дня, а кроме плана зданий на острове у нас нет ничего стоящего."
  - char: "royal_oak_rad"
    side: "right"
    text:
      - "Разведданные Ее Величества не могут быть ошибочными... Если мы не нашли того, что ей нужно, значит, это я слишком бесполезна..."
  - char: "argus"
    side: "left"
    text:
      - "Леди Ройял Оук, не говори такого. В том, что мы не нашли ничего «подозрительного», мы с тобой «сообщницы», не так ли?"
  - char: "royal_oak_rad"
    side: "right"
    text:
      - "Ууу... Одно дело, если бы Ее Величество наказала только меня, но если из-за меня пострадаешь и ты, то мне, как старшему рыцарю, и вовсе не будет прощения..."
      - "Теперь мне остается только работать с удвоенной силой!"
  - char: "argus"
    side: "left"
    text:
      - "Хоть вывод в итоге и правильный..! Но я совсем не это имела в виду..."
      - "Честное слово, леди Ройял Оук, ты всегда так... На самом деле все тебя очень уважают!"
      - "Королева тоже высоко тебя ценит. Разве Ее Величество не хотела изначально сделать тебя флагманом Антарктического флота?"
      - "Ее Величество отказалась от этой идеи только потому, что ты настояла на том, чтобы уступить это место леди Имплакабл."
  - char: "royal_oak_rad"
    side: "right"
    text:
      - "Нужно трезво оценивать свои силы... Если бы я стала флагманом... то лишь обманула бы ожидания Ее Величества."
      - "Пусть всё остается как есть..."
  - char: "argus"
    side: "left"
    text:
      - "Всё в порядке, леди Ройял Оук!"
      - "Если Доминион Виши решил построить Базилику в таком отдаленном от цивилизации месте, то наверняка для того, чтобы скрыть какие-то тайны."
      - "Раз уж теперь это место полностью под нашим контролем, нам просто нужно продолжать поиски, и мы обязательно что-нибудь найдем!"
      - "Подожди... леди Ройял Оук, в твоём секторе замечена аномальная активность, датчик движения выдал предупреждение. Пожалуйста, проверь."
  - char: "royal_oak"
    side: "right"
    text:
      - "Э? Т-т-т-так внезапно... Ах..!"
  - char: "argus"
    side: "left"
    text:
      - "Что случилось? Леди Ройял Оук, ответь!"
  - char: "royal_oak_rad"
    side: "right"
    text:
      - "Я-я в порядке... Просто мне показалось, что я только что услышала звук чьих-то шагов... Это ведь не привидение, правда?"
  - char: "argus"
    side: "left"
    text:
      - "...Привидение? Что ж, оно бы отлично вписалось в мрачную Базилику Доминиона Виши..."
  - char: "royal_oak_rad"
    side: "right"
    text:
      - "Э-э-э-э-э-э?!"
  - char: "argus"
    side: "left"
    text:
      - "Ах... это я просто вслух подумала, сказала глупость, не бери в голову."
      - "В любом случае, я пока посмотрю камеры наблюдения... Ваш сектор, если я правильно помню... Ага, я тебя вижу."
      - "Теперь запрошу записи вокруг этой точки..."
      - "Хм? Камера возле датчика, похоже, отключена от сети..."
  - char: "royal_oak_rad"
    side: "right"
    text:
      - "...Похоже, мне нужно пойти и проверить всё лично. Поняла."

chapter3:
  rows:
  - char: "royal_oak_rad"
    side: "right"
    text:
      - "...Аргус, я на месте. Сигнализация всё еще работает?"
  - char: "argus"
    side: "left"
    text:
      - "Сигнализация отключилась, но камеры так и не восстановились. Что-нибудь нашла?"
  - char: "royal_oak_rad"
    side: "right"
    text:
      - "Хм... Провод камеры был перерезан."
      - "И судя по толстому слою пыли на месте обрыва... она, вероятно, сломана уже очень давно."
  - char: "argus"
    side: "left"
    text:
      - "Пришла в негодность от времени?.. Те, кто раньше отвечал за обслуживание, были слишком уж беспечны."
  - char: "royal_oak_rad"
    side: "right"
    text:
      - "Тогда... предыдущий сигнал от датчика был ложным?"
  - char: "argus"
    side: "left"
    text:
      - "Возможно. Если я правильно помню, самые ранние упоминания о Базилике на этом острове относятся еще к периоду «Военно-морских каникул»..."
      - "Но это никак не объясняет звук шагов, который ты только что слышала."
  - char: "royal_oak_rad"
    side: "right"
    text:
      - "*Делает глубокий вдох...*"
      - "Говорит Королевский Флот! Нарушитель, вы окружены! Ни с места!!!"
  - char: "argus"
    side: "left"
    text:
      - "?! Леди Ройял Оук, ты обнаружила нарушителя?!"
  - char: "royal_oak_rad"
    side: "right"
    text:
      - "В-вовсе нет... Я просто подумала, раз уж мы не можем его найти, может, получится хотя бы так его выманить..."
  - char: "argus"
    side: "left"
    text:
      - "...Возможно, мне стоит запустить диагностику, чтобы провести полную проверку систем и оборудования внутри Базилики."
      - "Руководство по техническому обслуживанию, насколько я помню, находится здесь... Ага, нашла."
      - "Диагностика системы запущена..."
  - char: "voice_an"
    side: "right"
    status: "is-yellow"
    text:
      - "Команда подтверждена. Запущена программа полной диагностики системы. Ориентировочное время завершения: через 3 600 000 секунд..."
  - char: "argus"
    side: "left"
    text:
      - "Это же слишком долго?!!"
  - char: "royal_oak_rad"
    side: "right"
    text:
      - "Прямо как с людьми... чем старше система, тем она бесполезнее..."
  - char: "argus"
    side: "left"
    text:
      - "Старые системы просто ужасны... Тогда... О! Я вижу отличный вариант!"
      - "В руководстве по обслуживанию упоминается, что у Базилики есть режим антикризисного управления."
      - "Я могу назначить нас с тобой администраторами, а затем активировать этот режим."
      - "Тогда защитная система Базилики будет считать врагами и устранять всех, кто находится внутри, кроме нас! И нам больше не придется беспокоиться о нарушителях!"
  - char: "royal_oak_rad"
    side: "right"
    text:
      - "Звучит очень надежно... Если защитная система будет на нашей стороне, то и действовать будет гораздо спокойнее..."
  - char: "argus"
    side: "left"
    text:
      - "Ввожу команду... Готово~"
  - char: "voice_an"
    side: "right"
    status: "is-yellow"
    text:
      - "Права администратора подтверждены, запуск режима антикризисного управления. Ожидаемое время..."
  - char: "argus"
    side: "left"
    text:
      - "Хм?.."
      - "Леди Ройял Оук, датчики в промышленной зоне Базилики Блан тоже передают аномальные сигналы!"
  - char: "royal_oak_rad"
    side: "right"
    text:
      - "Э?.. Не может же быть так, чтобы столько оборудования одновременно вышло из строя."
  - char: "argus"
    side: "left"
    text:
      - "Внешние датчики Базилики Блан также фиксируют аномальные сигналы, и их количество постепенно растет..."
  - char: "voice_an"
    side: "right"
    status: "is-yellow"
    text:
      - "Антикризисное... управление..."
      - "Экстренное... выполнение... выполнение... выполнение..."
      - "Повреждение... [Отсутствует... отсутствует... отсутствует]... Внимание... внимание..."
  - char: "argus"
    side: "left"
    text:
      - "Ошибка при выполнении команды?.. Как такое возможно..."
      - "...Ничего не выходит! Для отмены этой команды требуются более высокие права доступа?"
      - "Но ведь я уже получила права администратора..."
      - "Что-то здесь не так. Леди Ройял Оук, немедленно возвращайся!"
  - char: "royal_oak_rad"
    side: "right"
    text:
      - "...[Помехи]... они... [Помехи]... повсюду... [Помехи]..."
      - "...[Помехи]... окружили... [Помехи]... открываю ответный огонь... [Помехи]..."
  - char: "argus"
    side: "left"
    text:
      - "Я не слышу, что ты говоришь, связь глушится помехами!"
      - "Приём! Леди Ройял Оук! Леди Ройял Оук!"

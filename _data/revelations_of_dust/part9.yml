chapter1:
  rows:
  - char: "bearn"
    side: "left"
    text:
      - "Линии 11, 15 и 17 восстановлены, можно запустить тестовый прогон системы очистки."
  - char: "richelieu"
    side: "right"
    text:
      - "Нам повезло, похоже, процесс восстановления идет гладко."
      - "К счастью, подобная ситуация была предусмотрена еще на этапе проектирования, иначе у нас не было бы более эффективного способа решения проблемы, кроме как сровнять всё здесь с землей."
  - char: "implacable"
    side: "left"
    text:
      - "Подумать только, тот, кто одобрил строительство этой Базилики, всё это время был прямо передо мной~!"
  - char: "richelieu"
    side: "right"
    text:
      - "Точнее сказать, я одобрила вторую фазу её строительства. Как кардинал Ортодоксии, я одобряю довольно много вещей."
      - "И в то время, когда я дала свое согласие, это место... еще не выглядело так, как сейчас."
      - "Как и в случае с Базиликой в Мозамбике, после того, как она перешла под контроль Доминиона Виши, многое здесь изменилось."
      - "В отличие от меня, имеющей лишь поверхностное представление об этом месте, Беарн принимала непосредственное участие во второй фазе строительства Базилики. Именно поэтому я включила ее в спасательную операцию."
  - char: "implacable"
    side: "left"
    text:
      - "М-гм... Вот как?"
      - "И что мы будем делать дальше?"
  - char: "richelieu"
    side: "right"
    text:
      - "Чтобы попасть в центр управления Базилики Блан, нам придется дождаться полного запуска системы очистки."
      - "Так что пока нам остается только ждать."
  - char: "scylla"
    side: "left"
    text:
      - "Леди Имплакабл. Леди Ришелье. Пожалуйста, угощайтесь чаем."
  - char: "richelieu"
    side: "right"
    text:
      - "Большое спасибо."
  - char: "implacable"
    side: "left"
    text:
      - "Э? С такой мелочью, как заваривание чая, я могла бы справиться и сама."
  - char: "scylla"
    side: "right"
    text:
      - "Нет... Это моя обязанность как королевской горничной. Леди Имплакабл, прошу вас, ни в коем случае не вмешивайтесь."
      - "Леди Ройял Оук, вам тоже чаю."
  - char: "royal_oak"
    side: "left"
    text:
      - "Большое спасибо... Налей и всем остальным по чашечке, Сцилла."
  - char: "scylla"
    side: "right"
    text:
      - "Слушаюсь."
  - char: "implacable"
    side: "left"
    text:
      - "Аргус, я нашла в комнате управления на маяке оставленные тобой записи, они оказались весьма подробными."
      - "Но не могла бы ты в деталях рассказать мне, что произошло с того момента, как ты покинула маяк, и до вашей встречи с флотом Свободного Ириса?"
  - char: "argus"
    side: "right"
    text:
      - "Конечно, без проблем. Как вы уже видели в записях, получив сообщение от леди Ройял Оук о столкновении с врагом в Базилике Блан, я немедленно вызвала подкрепление."
      - "Но не получила никакого ответа..."
      - "Поэтому я решила сначала встретиться с леди Ройял Оук. Если мы будем действовать вдвоем, нам будет легче справиться с любой ситуацией."
      - "Однако вскоре после того, как я вошла в Базилику Блан, на меня напали эти пешки."
      - "Естественно... я не собиралась просто так отступать. Ведь я верила, что леди Ройял Оук, несмотря ни на что, будет держать оборону до конца."
      - "С боем я всё-таки добралась до того места, где находилась леди Ройял Оук перед тем, как связь прервалась."
      - "И, как я и ожидала, она всё еще была там, стойко ожидая подкрепления..."
  - char: "royal_oak"
    side: "left"
    text:
      - "В конце концов, я же подала сигнал о помощи... Если бы подкрепление прибыло и не нашло меня на месте, у них бы возникли проблемы..."
  - char: "implacable"
    side: "right"
    text:
      - "...Как и ожидалось от леди Ройял Оук. И что было дальше?"
  - char: "argus"
    side: "left"
    text:
      - "Затем мы с боем отступили и в конце концов оказались внутри огромного зала, который казался относительно безопасным."
      - "Хотя большинство помещений в Базилике построены очень просторными, то место было похоже на гигантский крытый плац для парадов..."

chapter2:
  rows:
  - char: "royal_oak"
    side: "left"
    text:
      - "Аргус, где мы сейчас..."
  - char: "argus"
    side: "right"
    text:
      - "...Я так торопилась, когда шла сюда, что забыла взять карту."
      - "Но даже если бы и взяла, после такой долгой погони мы бы всё равно уже не поняли, где находимся, верно?.."
  - char: "royal_oak"
    side: "left"
    text:
      - "Я думаю, это место называется смотровой трибуной... Смотри, сверху всё видно как на ладони, словно мы наблюдаем за безмолвным парадом."
      - "Те, что внизу — это всё пешки, да..."
  - char: "argus"
    side: "right"
    text:
      - "Угу, похоже на то..."
  - char: "royal_oak"
    side: "left"
    text:
      - "Их так много... Сотни или даже тысячи..."
  - char: "argus"
    side: "right"
    text:
      - "Даже больше. Им просто конца и края не видно..."
      - "Армия, состоящая из пешек..."
      - "Неужели это и есть тот самый секрет Базилики, который Ее Величество хотела, чтобы мы раскрыли..."

chapter3:
  rows:
  - char: "royal_oak"
    side: "left"
    text:
      - "Даже если боевая мощь пешек невелика, такого количества достаточно, чтобы задавить числом любую кансен, осмелившуюся сразиться с ними в одиночку..."
      - "И как раз в тот момент, когда моя голова была полна этих мыслей, пешки внизу вдруг действительно пришли в движение..."
      - "К счастью, в итоге кардинал Ришелье нашла нас первой... и спасла."
      - "А потом, во время отступления, мы услышали звуки битвы и поспешили вам на помощь."
  - char: "implacable"
    side: "right"
    text:
      - "Вот оно что... Армия из пешек, так вот какой проект Доминион Виши осуществлял с помощью Базилики..."
      - "Кардинал, этот проект велся еще во времена Ортодоксии Ирис?"
  - char: "richelieu"
    side: "left"
    text:
      - "Изначально это была идея Трибунала. Они когда-то рассматривали возможность в условиях нехватки кансен использовать пешек для создания огромного флота, чтобы защитить безопасность Ортодоксии."
      - "Но в дальнейшем реализация плана пошла не очень гладко, и он был отложен."
  - char: "implacable"
    side: "right"
    text:
      - "Не гладко? Но ведь они уже произвели так много готовых единиц?"
      - "Те пешки, с которыми мы сражались — это продукты данного плана, верно? С точки зрения боевой мощи, я бы сказала, что они вполне ничего..."
  - char: "richelieu"
    side: "left"
    text:
      - "Но не было способа эффективно их контролировать, иначе Доминион Виши не стал бы так долго оставлять столь огромную армию без внимания."
  - char: "implacable"
    side: "right"
    text:
      - "Хотелось бы услышать подробности."
  - char: "richelieu"
    side: "left"
    text:
      - "Пешки — это машины, а в машинах случаются сбои."
      - "Во время экспериментов мы обнаружили, что чем масштабнее армия пешек, тем больше единиц дают сбой при скоординированных действиях."
      - "А неисправные пешки влияют на действия остальных, нормальных пешек, из-за чего сбой начинает распространяться внутри группы."
      - "Трибунал назвал это «загрязнением». И соответственно, решением для подавления этого загрязнения стала система очистки, которую вы все только что видели."
  - char: "implacable"
    side: "right"
    text:
      - "Вот оно что... Так вот почему Базилика на острове спроектирована с такой защитой от внутренних угроз. Вы сегодня неожиданно откровенны."
  - char: "richelieu"
    side: "left"
    text:
      - "В конце концов, все вы — пострадавшие от этого сбоя в комплексе Ортодоксии Ирис."
      - "После того как вы испытали всё это на себе, я подумала, что лучше быть откровенной, чем сухо всё отрицать, прикрываясь дипломатическими формулировками."
      - "К тому же, чтобы уладить этот инцидент, нам придется объединить усилия и работать вместе."
  - char: "implacable"
    side: "right"
    text:
      - "Судя по твоим словам, могу ли я считать, что текущая ситуация всё еще находится под твоим контролем?"
  - char: "richelieu"
    side: "left"
    text:
      - "Можно считать, что эта авария вызвана нехваткой обслуживания оборудования, а неверные действия на начальном этапе лишь усугубили положение этих старых систем."
      - "Сейчас системы очистки во всех четырех Базиликах остановлены, распространение загрязнения привело к потере контроля над армией пешек, что, в свою очередь, привело к нынешней ситуации."
      - "Поэтому нам просто нужно восстановить работу систем очистки в четырех Базиликах, а затем отправиться в центр управления каждой из них, чтобы активировать и уничтожить всех неисправных пешек."
      - "Когда система очистки заработает нормально, а неисправных пешек больше не будет, комплекс Базилики естественным образом восстановит стабильность."
  - char: "implacable"
    side: "right"
    text:
      - "Активировать и уничтожить всех неисправных пешек... Да где это видано, чтобы так решали проблемы?!"
      - "Неужели нет какого-нибудь главного рубильника, который можно просто нажать и решить все проблемы разом!"
  - char: "richelieu"
    side: "left"
    text:
      - "Я полностью разделяю твое мнение. Но, к сожалению, его нет."
  - char: "implacable"
    side: "right"
    text:
      - "Эх... С самого момента прибытия на остров мне кажется, будто эта Базилика на каждом шагу строит мне козни."
      - "Примерно то же самое, с чем мы столкнулись тогда в Иберии..."
  - char: "richelieu"
    side: "left"
    text:
      - "Но ведь в тот раз в Иберии сбой произошел не в Базилике Ортодоксии Ирис, не так ли?"
  - char: "implacable"
    side: "right"
    text:
      - "Я знаю, просто в тот раз нас обеих это порядком измотало..."
      - "Это просто метафора моих ощущений, исключительно ощущений..."
  - char: "bearn"
    side: "left"
    text:
      - "Леди Ришелье, система очистки полностью запущена, мы можем отправляться в центр управления."
  - char: "richelieu"
    side: "right"
    text:
      - "Похоже, наше время на отдых подошло к концу. Выдвигаемся..."

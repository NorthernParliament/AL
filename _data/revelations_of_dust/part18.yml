chapter1:
  rows:
  - text:
      - "День контроля ****,**:**:"
      - "??? · ???**"
      - "Повреждение данных**- Обнаружена фатальная ошибка**"
  - text:
      - "БАБАХ!!!"
  - char: "hero"
    side: "left"
    text:
      - "Прибыли на место, Хиро выходит на сцену~"
      - "Дорогой Рыцарь Смерти, ты дома?~☆"
  - text:
      - "Вокруг стояла лишь мертвая тишина, геройское появление Хиро не получило никакого ответа."
  - char: "argus"
    side: "left"
    text:
      - "Это ведь должна быть... центральная зона комплекса зеленых зданий, верно? Как же здесь пустынно..."
  - char: "royal_oak"
    side: "right"
    text:
      - "За исключением армии Войны, которая изредка нам попадалась, по пути мы больше вообще ничего не видели. А ведь это главная база Смерти..."
  - char: "implacable"
    side: "left"
    text:
      - "Ситуация и правда очень необычная. Всем тщательно всё обыскать, у меня плохое предчувствие..."

chapter2:
  rows:
  - text:
      - "После недолгих поисков группа обнаружила на одной из площадей цель своего визита."
      - "Некогда гигантский механический рыцарь теперь валялся словно мусор на самом видном месте площади."
  - char: "scylla"
    side: "left"
    text:
      - "...Можно разглядеть оружие в форме косы, да и учитывая эти габариты, это несомненно механический рыцарь, представляющий Смерть."
  - char: "royal_oak"
    side: "right"
    text:
      - "Вот только... он уже уничтожен."
  - char: "argus"
    side: "left"
    text:
      - "Разрушен довольно основательно. Неудивительно, что мы ничего не заметили во время поиска с воздуха."
  - char: "hero"
    side: "right"
    text:
      - "Так ведь это же облегчает нам задачу~ Рыцарь, представляющий Смерть, уже мертв~☆"
  - char: "implacable"
    side: "left"
    text:
      - "Нет............ это очень плохая ситуация."
      - "Этих рыцарей необходимо уничтожать строго по порядку. Если порядок нарушен, жди беды!"
      - "Сцилла, можешь найти какие-нибудь зацепки на обломках? Кто это сделал?"
  - char: "scylla"
    side: "right"
    text:
      - "Самые заметные — это, пожалуй, следы от артиллерийских обстрелов и рубленые раны от гигантского острого оружия."
      - "Оружие, способное оставить такие огромные раны, не может использоваться обычными кораблями, а вот оружие других механических рыцарей вполне способно одновременно нанести оба вида этих повреждений."
      - "Я предполагаю, что это сделал другой рыцарь. Учитывая текущую ситуацию... возможно, Рыцарь Войны."
      - "Похоже, пространство, состоящее из механизмов, оказалось слишком уж недружелюбным для концепции «Смерти»..."
  - char: "implacable"
    side: "left"
    text:
      - "МЕТА тоже на такое способны... Детектор маяков МЕТА что-нибудь обнаружил?"
  - char: "scylla"
    side: "right"
    text:
      - "Ничего."
  - char: "implacable"
    side: "left"
    text:
      - "Ничего, значит... Что ж, по крайней мере ситуация не станет еще более запутанной."
  - char: "richelieu"
    side: "right"
    text:
      - "Леди Имплакабл, почему вы вдруг подумали о МЕТА?"
  - char: "implacable"
    side: "left"
    text:
      - "Эх... кардинал, возможно, вы еще не в курсе, но в последнее время некая неопознанная МЕТА постоянно строит козни Королевскому Флоту, так что нам приходится везде быть начеку."
  - char: "richelieu"
    side: "right"
    text:
      - "Неопознанная МЕТА предпринимает враждебные действия против Королевского Флота...?"
      - "Это и впрямь опасно. Благодарю за информацию, мы тоже будем настороже."
  - char: "implacable"
    side: "left"
    text:
      - "Эх... к счастью, если следовать порядку, Рыцарь Смерти и так должен был быть уничтожен первым."
      - "С Рыцарем Голода всё должно быть в порядке, в конце концов, мы видели его совсем недавно. Нужно просто продолжать за ним следить."
      - "Что касается Рыцаря Войны... хотя его армия всё еще здесь, пока мы не подтвердим местонахождение его самого, нельзя делать окончательных выводов."
      - "Местонахождение Рыцаря Завоевания также не было подтверждено воздушной разведкой, да и его армии мы в акватории не видели..."
      - "Но если он, как и предполагается в теории, является самым сильным, то вряд ли его смогли уничтожить... в худшем случае он в таком же положении, как и Рыцарь Голода."
      - "Как только мы убедимся, что все они по-прежнему находятся в акватории, мы сможем продолжить действовать по первоначальному плану."
  - char: "richelieu"
    side: "right"
    text:
      - "Раз так, ради эффективности, как насчет того, чтобы разделиться для поисков?"
      - "Мы возьмем на себя проверку состояния Рыцаря Войны, а Рыцаря Завоевания и Рыцаря Голода поручим вам, что скажете?"
  - char: "implacable"
    side: "left"
    text:
      - "Там, где находится Рыцарь Войны, должно быть самое большое скопление врагов, не так ли...?"
  - char: "richelieu"
    side: "right"
    text:
      - "А Рыцарь Завоевания теоретически является сильнейшим из Четырех Всадников. Риски высоки для всех, сейчас не время для любезностей."
  - char: "implacable"
    side: "left"
    text:
      - "Хорошо, давайте так и распределим задачи. При встрече с врагами не ввязывайтесь в затяжные бои, наш приоритет — определить местоположение и состояние оставшихся трех механических рыцарей!"

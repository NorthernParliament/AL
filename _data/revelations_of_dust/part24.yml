chapter1:
  rows:
  - text:
      - "После недолгих поисков группа пришла в церковь, построенную еще во времена Ортодоксии Ирис."
  - char: "implacable"
    side: "left"
    text:
      - "Хоть она и немного обветшала... но сейчас не время привередничать."
      - "Кардинал, прошу, ты первая?"
  - char: "richelieu"
    side: "right"
    text:
      - "Угу, позволь мне попробовать первой."
  - text:
      - "Ришелье вышла в центр обветшалого зала, молитвенно сложила руки и начала читать молитву."
  - char: "richelieu"
    side: "right"
    text:
      - "«...Отче наш, сущий на небесах! да святится имя Твое...»"
      - "«...да приидет Царствие Твое; да будет воля Твоя и на земле, как на небе...»"
      - "«...хлеб наш насущный дай нам на сей день...»"
      - "«...и прости нам долги наши, как и мы прощаем должникам нашим...»"
      - "«...и не введи нас в искушение, но избавь нас от лукавого...»"
      - "«...Ибо Твое есть Царство и сила и слава во веки...»"
  - text:
      - "Вторя молитве Ришелье, в воздухе начали появляться крупицы золотого света, постепенно собираясь на знамени, возвышающемся рядом с ней."
      - "Через миг знамя Свободного Ириса засияло, словно витражное стекло."
      - "Стоило лишь оказаться рядом со знаменем, как можно было почувствовать, что тело постепенно наполняется храбростью и силой."
  - char: "la_galissonniere_meta"
    side: "left"
    status: "is-meta"
    text:
      - "Отличная работа!"
      - "Как и ожидалось от кардинала, силу, сокрытую в этом знамени, могу почувствовать даже я."
      - "С этим вы точно сможете преподать хороший урок тому рыцарю Войны."
  - char: "richelieu"
    side: "right"
    text:
      - "Фух... леди Имплакабл, моя молитва окончена."
      - "Во время ритуала было лишь чувство умиротворения, никакого дискомфорта, так что можешь быть спокойна."
  - char: "implacable"
    side: "left"
    text:
      - "Хорошо~ Тогда теперь позволь мне попробовать."

chapter2:
  rows:
  - char: "implacable"
    side: "left"
    text:
      - "«...Отче наш, сущий на небесах! да святится имя Твое...»"
      - "«...да приидет Царствие Твое; да будет воля Твоя и на земле, как на небе...»"
      - "«...хлеб наш насущный дай нам на сей день...»"
      - "«...и прости нам долги наши, как и мы прощаем должникам нашим...»"
      - "«...и не введи нас в искушение, но избавь нас от лукавого...»"
      - "«...Ибо Твое есть Царство и сила и слава во веки...»"
  - text:
      - "Свет не появился, Имплакабл по-прежнему была окутана кромешной тьмой."
  - char: "implacable"
    side: "left"
    text:
      - "............"
      - "...........?"
  - char: "la_galissonniere_meta"
    side: "right"
    status: "is-meta"
    text:
      - "Бог тебе не ответил."
  - char: "implacable"
    side: "left"
    text:
      - "Ну... ладно... почему я ни капельки не удивлена."
      - "Еще когда мы открывали ту дверь, я поняла, что совершенно несовместима с вашими Базиликами Ириса."
  - char: "la_galissonniere_meta"
    side: "right"
    status: "is-meta"
    text:
      - "Когда открывали дверь...? Ты про то, когда мы проходили сквозь Стену Авроры?"
  - char: "implacable"
    side: "left"
    text:
      - "Ага, как и сейчас, мы с Ришелье прочитали одну и ту же молитву, но сработала она только у неё."
  - char: "richelieu"
    side: "right"
    text:
      - "Вот оно что... Я поняла."
      - "Хоть это место и является Зеркальным морем Сирен, это также Базилика, перестроенная Ортодоксией Ирис."
      - "Концепции, связанные с верой, включая Четырех Всадников, Судный день и прочие — все они были определены в рамках системы убеждений нашей Ортодоксии."
      - "Естественно, концепция «Бога» не стала исключением."
  - char: "implacable"
    side: "left"
    text:
      - ".....Определение «Войны» всегда остается войной, но вот определение «Бога» может быть разным, так...?"
  - char: "richelieu"
    side: "right"
    text:
      - "Может, воспользуешься этой возможностью и просто примешь веру Ириса, леди Имплакабл?"
  - char: "implacable"
    side: "left"
    text:
      - "Это меня совершенно не интересует, позволь мне твердо отказать."
      - "Раз уж концепция «Бога» в этом пространстве определена Ортодоксией Ирис, то мне нужно просто избежать этой концепции и выбрать другую цель для молитвы, верно?"
  - char: "richelieu"
    side: "right"
    text:
      - "Теоретически это не так работает... но ты уже испытала на себе влияние Войны, так что, пожалуйста, ни в коем случае не пытайся взывать к этим опасным концепциям."
  - char: "implacable"
    side: "left"
    text:
      - "Естественно. Концепция, не определенная Ирисом, но несущая в себе позитивную веру... думаешь, я не смогу найти такую?"
  - text:
      - "Произнеся это, Имплакабл достала миниатюрную статуэтку Куин Элизабет."
  - char: "richelieu"
    side: "right"
    text:
      - "Статуэтка Куин Элизабет... Неужели ты собираешься молиться Королеве...?"
  - char: "implacable"
    side: "left"
    text:
      - "В конце концов, это ведь всё еще Зеркальное море Сирен, так?"
      - "Когда Сирены его изначально проектировали, думаешь, они стали бы вдаваться в подробности: использовать Четырех Всадников из веры Ириса или из веры Королевского Флота?"
  - char: "la_galissonniere_meta"
    side: "right"
    text:
      - "Если хочешь попробовать — пробуй... но мне кажется, это дохлый номер."
  - char: "implacable"
    side: "left"
    text:
      - "Что ж,  увидим~"

chapter3:
  rows:
  - char: "implacable"
    side: "left"
    text:
      - "«Милостью Господа, Королева земель, озаренных солнцем...»"
      - "«Предводительница Королевского Флота, защитница веры...»"
      - "«Твой свет и мудрость озаряют наши владения во всех семи морях...»"

chapter4:
  rows:
  - char: "implacable"
    side: "left"
    text:
      - "«Позволь нам узреть истину этого мира...»"
      - "«Ты приглядываешь за нашими страждущими соотечественниками, и зло отступает пред тобой...»"
      - "«Мы принимаем твои откровения, а посему непременно исполним твои обеты...»"
      - "«Славься имя твое, моя Королева!»"

chapter5:
  rows:
  - text:
      - "На этот раз молитва Имплакабл получила ответ."
      - "Статуэтка Куин Элизабет в руках Имплакабл начала медленно озаряться золотым светом."
      - "Этот медленно разгорающийся свет был теплым и полным силы. Слившись в светящийся шар, он взмыл вверх, словно фонтан, и рассыпался во все стороны."
  - char: "implacable"
    side: "left"
    text:
      - "...Я чувствую твой ответ, моя Королева..."
  - char: "argus"
    side: "right"
    text:
      - "...Это сила... от самой Королевы?"
  - char: "royal_oak"
    side: "left"
    text:
      - "Я почувствовала... тепло родного дома..."
  - char: "hero"
    side: "right"
    text:
      - "Хоть я совершенно не понимаю, что тут происходит, но с такой силой мы сможем одолеть Рыцаря Войны, так ведь?~☆"
  - char: "la_galissonniere_meta"
    side: "left"
    status: "is-meta"
    text:
      - "Невероятно............ неужели и правда сработало?"
  - char: "implacable"
    side: "right"
    text:
      - "«Королева милостью Господа», это ведь тоже концепция, связанная с верой, не так ли?~"
  - char: "richelieu"
    side: "left"
    text:
      - "...Мне нечего сказать, ты, несомненно, тоже обладаешь собственной непоколебимой верой, которой твердо придерживаешься."
  - char: "implacable"
    side: "right"
    text:
      - "Таким образом, наше усиление полностью завершено~"
      - "Хватит хмуриться, кардинал, дальше нам предстоит сразиться еще с двумя рыцарями."
      - "Пока эффект не рассеялся, давайте поторопимся~"

chapter1:
  rows:
  - char: "hero"
    side: "left"
    text:
      - "Хе... хе..."
      - "Когда эти безмозглые пешки наваливаются все разом, это даже немного пугает..."
      - "Но всякой мелюзге не по зубам великая Хиро!"
  - char: "scylla"
    side: "right"
    text:
      - "Однако нет никаких признаков того, что врагов становится меньше. Если так будет продолжаться, то даже если мы будем рубить их до боли в руках, это не решит проблему."
  - char: "implacable"
    side: "left"
    text:
      - "Ты права, сражаться с врагом в таком тесном пространстве нам невыгодно."
      - "Нам нужно переместиться туда, где мы сможем открыть огонь на полную мощь..."
  - char: "scylla"
    side: "right"
    text:
      - "Леди Имплакабл, я помню здешнюю карту. Если мы сосредоточим огонь на стене, то сможем проделать в здании проход, ведущий к морю."
      - "Но для начала нам нужно подняться выше уровня моря, иначе нас просто затопит."
  - char: "implacable"
    side: "left"
    text:
      - "Если это произойдет, нам будет совсем не до смеха."
      - "Хиро, прорываемся в другом направлении!"
      - "Сначала вернемся тем же путем, затем взорвем стену, чтобы пробить выход, и разберемся с этими врагами на открытом пространстве!"

chapter2:
  rows:
  - char: "hero"
    side: "left"
    text:
      - "Мелюзга~ мелюзга~ сгиньте все~☆"
  - text:
      - "БАБАХ!!!"
  - char: "implacable"
    side: "left"
    text:
      - "Путь свободен. Не замечала раньше у Хиро такого таланта к подрывному делу."
  - char: "hero"
    side: "right"
    text:
      - "У Хиро еще много достоинств~☆"
  - char: "implacable"
    side: "left"
    text:
      - "Смотри, Сцилла, устроив такой шум, мы наверняка ослабили давление на леди Ройял Оук, не так ли?~"
  - char: "scylla"
    side: "right"
    text:
      - "Должно быть так. Но, леди Имплакабл, пожалуйста, позаботьтесь сначала о себе."
      - "Нас окружает всё больше врагов. Пожалуйста, двигайтесь вперед, я прикрою с тыла."
  - char: "implacable"
    side: "left"
    text:
      - "Да-да-да~"

chapter3:
  rows:
  - text:
      - "БАБАХ!!!"
  - char: "hero"
    side: "left"
    text:
      - "Мы выбрались на открытое пространство~☆"
  - char: "implacable"
    side: "right"
    text:
      - "Отлично, здесь мы наконец-то сможем использовать нашу огневую мощь на полную."
      - "Никакой пощады, никакого снисхождения! Пусть эти безмозглые пешки узнают, на что мы способны!"
  - text:
      - "БАБАХ!!!"
  - char: "richelieu_rad"
    side: "left"
    text:
      - "«Никакой пощады, никакого снисхождения», хорошо сказано."
  - char: "implacable"
    side: "right"
    text:
      - "Кардинал Ришелье?!"
  - char: "richelieu_rad"
    side: "left"
    text:
      - "Давно не виделись, леди Имплакабл."
  - char: "implacable"
    side: "right"
    text:
      - "Что вы здесь делаете?!"
  - char: "argus_rad"
    side: "left"
    text:
      - "Эм... леди Имплакабл, леди Ришелье получила наш сигнал о помощи и специально прибыла нас поддержать."
      - "Благодаря тому, что она со своим флотом вовремя подоспела, нам с леди Ройял Оук удалось выбраться из опасности."
  - char: "royal_oak_rad"
    side: "right"
    text:
      - "О-очень извиняюсь, я не смогла вовремя устранить угрозу... Я должна была справиться лучше..."
  - char: "implacable"
    side: "left"
    text:
      - "Ничего страшного, ничего страшного. Главное, что с вами всё в порядке, у меня прямо отлегло от сердца."
      - "Кхм... Кардинал Ришелье..."
  - char: "richelieu_rad"
    side: "right"
    text:
      - "Леди Имплакабл, кризис еще не миновал, всё остальное обсудим позже."
      - "Для начала давайте вместе проучим этих незваных гостей, посмевших устроить переполох в Базилике моей Ортодоксии Ирис!"

chapter1:
  rows:
  - text:
      - "День контроля ****,**:**:"
      - "??? · ???**"
      - "Повреждение данных**- Обнаружена фатальная ошибка**"
  - text:
      - "Некоторое время спустя все вошли в здание, излучающее мягкий свет."
  - char: "bearn"
    side: "left"
    text:
      - "Какое облегчение... хотя по пути мы видели немало сломанных... но здешний стабилизирующий якорь всё еще работает нормально. Раз уж мы добрались сюда, можем пока расслабиться."
  - char: "hero"
    side: "right"
    text:
      - "Это место не выглядит каким-то особенным. Как оно сможет остановить того механического рыцаря?"
      - "Неужели здесь есть какое-то секретное оружие?"
  - char: "richelieu"
    side: "left"
    text:
      - "Нет, это самое обычное здание."
      - "Но под «защитой» стабилизирующего якоря рыцарь сюда не приблизится."
  - char: "implacable"
    side: "right"
    text:
      - "Что это за «стабилизирующий якорь», о котором ты то и дело упоминаешь? И что означает эта «защита»?"
  - char: "richelieu"
    side: "left"
    text:
      - "«Защита» — это концепция, которую мы используем для контроля над Базиликой, точно так же, как «очистка» на верхнем уровне."
      - "Устройство, несущее в себе эту концепцию «защиты», и есть стабилизирующий якорь — механическое оборудование Ортодоксии, глубоко зарытое под зданиями в безопасной зоне."
      - "Поскольку Ортодоксия в основном получила контроль над верхним уровнем, мы можем использовать концепцию «очистки», чтобы нейтрализовать концептуальное влияние Четырех Всадников Апокалипсиса."
      - "Но здесь, на нижнем уровне, как вы все видите, мы можем лишь использовать концепцию «защиты», чтобы временно рассеять это влияние, получив небольшой островок безопасности вокруг стабилизирующего якоря."
      - "Но не волнуйтесь, эффективность стабилизирующих якорей проверена. Пока мы не поднимаем лишнего шума, четыре механических рыцаря сами сюда не сунутся."
  - char: "implacable"
    side: "right"
    text:
      - "Не то чтобы я всё до конца поняла, но одну вещь я уяснила точно: здешние объекты действительно построили вы."
  - char: "richelieu"
    side: "left"
    text:
      - "...Думаю, я всё еще должна тебе всё объяснить."
  - char: "implacable"
    side: "right"
    text:
      - "М-гм, «выложить всё как есть», да~?"
  - char: "richelieu"
    side: "left"
    text:
      - "Хорошо... В настоящее время мы находимся на нижнем уровне Базилики. Как видишь, чтобы соответствовать концепции Четырех Всадников, он также разделен на четыре большие зоны."
      - "Между этими зонами установлено множество стабилизирующих якорей, которые служат барьерами, подобно тому месту, где мы сейчас находимся."
  - char: "implacable"
    side: "right"
    text:
      - "Таких невероятных механических рыцарей... в этой акватории целых четыре?"
  - char: "richelieu"
    side: "left"
    text:
      - "Да, они соответствуют концепциям Четырех Всадников: Завоеванию, Войне, Голоду и Смерти."
  - char: "implacable"
    side: "right"
    text:
      - "Это вы их создали? Или это восстановленные технологии Сирен?"
  - char: "richelieu"
    side: "left"
    text:
      - "Ни то, ни другое. Поначалу Четырех Всадников не существовало... да и нижний уровень выглядел иначе."
      - "Здесь нужно упомянуть о происхождении нижнего уровня..."
      - "После возвращения контроля тогдашняя церковь обнаружила, что некоторое оборудование Сирен в этой акватории невозможно контролировать, но в то же время им было жаль уничтожать эти с таким трудом добытые трофеи."
      - "Поэтому они решили свалить все непригодные для использования объекты Сирен в Зеркальном море на нижнем уровне, а все силы сосредоточить на строительстве контролируемого верхнего уровня."
      - "В конце концов, именно он был той частью, которую можно было использовать немедленно и которая могла приносить реальную пользу."
      - "Вот только по мере работы фабрик по производству пешек на верхнем уровне, эти объекты на нижнем по какой-то причине тоже начали неконтролируемое производство."
      - "К тому времени, когда мы обнаружили, что с исследовательской группой, дислоцированной на нижнем уровне, потеряна связь, Четыре Всадника уже появились на свет."
      - "Нам потребовалось лишь немного усилий, чтобы вновь вернуть это место — тогдашние Четыре Всадника были еще не слишком сильны."
      - "Но вскоре мы поняли, что всё не так просто..."
      - "Пока объекты на верхнем уровне продолжали производство, на нижнем уровне постоянно возрождались новые Четыре Всадника."
      - "Затем мы столкнулись с проблемой загрязнения пешек. И, похоже, чем больше пешек подвергалось загрязнению на верхнем уровне, тем сильнее становились механизмы Четырех Всадников после своего возрождения на нижнем."
      - "Поначалу церковь думала, что нашла способ управлять этим оборудованием с помощью концепции Четырех Всадников."
      - "Но, оглядываясь назад, мы осознали, что на самом деле это оборудование использовало церковь для самосовершенствования."
  - char: "implacable"
    side: "right"
    text:
      - "......Сирены с самого начала так и задумали."
      - "Выходит, и базу они тогда отдали вам намеренно... И почему я нисколько этому не удивляюсь..."
      - "Тогда почему бы не уничтожить нижний уровень целиком? Уничтожить Зеркальное море и всё оборудование в нем, чтобы решить проблему раз и навсегда."
  - char: "richelieu"
    side: "left"
    text:
      - "Всё потому... что мы так и не смогли найти местоположение устройства, поддерживающего это Зеркальное море."
  - char: "implacable"
    side: "right"
    text:
      - "...Что?"
  - char: "richelieu"
    side: "left"
    text:
      - "В свое время мы исследовали здесь каждый уголок, но всё было тщетно."
      - "А в бесконечном цикле смертей и перерождений Четыре Всадника становились лишь сильнее."
      - "Если бы мы пустили всё на самотек, в этом мире появились бы четыре супер-оружия Сирен..."
      - "Ортодоксия Ирис должна нести ответственность за свои поступки. Поэтому мы решили полностью остановить производство на фабриках пешек и законсервировать верхний уровень."
      - "В то же время мы построили множество стабилизирующих якорей, чтобы разделить пространство нижнего уровня и уменьшить влияние концепции Четырех Всадников."
      - "В конечном итоге это позволило нам вернуть нижний уровень под свой контроль."
  - char: "implacable"
    side: "right"
    text:
      - "Задумка была неплохой. Но из-за того, что Доминион Виши взял на себя управление, вольно или невольно, фабрики на верхнем уровне снова запустили производство и работали два года."
      - "И в итоге нижний уровень превратился в тот хаос, что мы видим сейчас... Вот оно что... Теперь мне наконец-то всё стало абсолютно ясно."
  - char: "richelieu"
    side: "left"
    text:
      - "Мне очень жаль... что всё так обернулось."
  - char: "implacable"
    side: "right"
    text:
      - "Ничего страшного~ Изначально взять это место под контроль было не твоим решением, и не по твоему приказу всё вышло из-под контроля, так что это не твоя ответственность."
      - "К тому же, ты ведь уже догадывалась, что внизу будет твориться нечто подобное?"
      - "После того как Беарн случайно проговорилась о существовании «нижнего уровня», ты упомянула, что соберешь людей, чтобы во всем разобраться — планировала в одиночку прийти и расправиться с этими механическими рыцарями?"
  - char: "richelieu"
    side: "left"
    text:
      - "У меня было лишь смутное предчувствие. Зная халатность Доминиона Виши в управлении верхним уровнем Базилики, было бы куда более странно, если бы на нижнем не возникло серьезных проблем."
      - "Если ситуация на острове Кергелен полностью выйдет из-под контроля, это окажет серьезное влияние на стратегию Лазурного пути в Антарктике."
      - "Ошибки, совершенные Доминионом Виши, в конечном итоге отчасти лягут на плечи Ортодоксии Ирис..."
      - "Поэтому я ни за что не могу остаться в стороне, и Свободный Ирис абсолютно точно не потерпит, чтобы подобное произошло."
  - char: "implacable"
    side: "right"
    text:
      - "Так вот почему ты не хотела, чтобы Беарн сболтнула лишнего о нижнем уровне..."
      - "«Переработка» и «утилизация» пешек означала, что их привозили сюда для уничтожения?"
  - char: "richelieu"
    side: "left"
    text:
      - "Верно... К этому мы пришли уже позже."
      - "В конце концов, уничтожение во внешних акваториях оставило бы слишком заметные следы. К тому же, казалось, что уничтожение пешек, соответствующих концепциям Четырех Всадников, способно ослабить и их самих."
      - "Пожалуйста, будь спокойна. Клянусь именем кардинала Ортодоксии Ирис, Ришелье, какую бы цену ни пришлось заплатить, я верну контроль над этим местом."
      - "И, естественно, я найду способ благополучно вывести всех вас отсюда."
  - char: "implacable"
    side: "right"
    text:
      - "К чему такие формальности, кардинал."
      - "Если Свободный Ирис сейчас бросит все свои силы сюда, то наверняка упустит множество стратегических возможностей, так ведь?"
      - "Раз уж мы всё равно здесь, давай поможем тебе решить эту проблему, прежде чем уйдем."
      - "Мы ведь союзники, помогать друг другу — в порядке вещей, так что не стоит церемониться~"
  - char: "richelieu"
    side: "left"
    text:
      - "Раз так, будем считать, что я у тебя в долгу."
  - char: "implacable"
    side: "right"
    text:
      - "Я же сказала, не стоит церемониться —— хм, правда?"
  - char: "richelieu"
    side: "left"
    text:
      - "Угу."
  - char: "implacable"
    side: "right"
    text:
      - "Отлично, тогда мне нужно будет хорошенько подумать, как использовать твой должок~"
      - "Я пока поразмыслю над этим на досуге, а ты для начала выведи нас обратно на верхний уровень~"
      - "Если таких механических рыцарей четверо, нам всё же лучше вызвать побольше подкрепления."
  - char: "richelieu"
    side: "left"
    text:
      - "Что касается этого, есть одна маленькая проблема —— способ выбраться нам придется начать искать прямо сейчас."
  - char: "implacable"
    side: "right"
    text:
      - "....А?"
  - char: "richelieu"
    side: "left"
    text:
      - "По правде говоря, я тоже впервые вижу пейзажи нижнего уровня своими глазами."
      - "Раньше Трибунал в своих отчетах всегда утверждал, что здесь всё находится под полным контролем."
      - "Такие мелочи, как попасть на нижний уровень или как его покинуть, они в отчетах не писали."
  - char: "implacable"
    side: "right"
    text:
      - "«Мелочи», значит..."
  - char: "richelieu"
    side: "left"
    text:
      - "Ахаха... Трибунал был самым надежным и самым преданным департаментом в Ортодоксии Ирис."
      - "В то время я и подумать не могла, что в будущем возникнет подобная ситуация..."
      - "Точно, насколько я помню, полное название стабилизирующего якоря кажется... «Стабилизирующий якорь Беарн», верно, Беарн?"
  - char: "bearn"
    side: "right"
    text:
      - "Верно, здешние стабилизирующие якоря были изобретены мной в прошлом, и я действительно принимала участие в строительстве нижнего уровня..."
      - "Но... мне очень жаль, дамы, у меня нет той информации, которую вы ожидаете."
      - "Обнаружив, что мы попали на нижний уровень, я первым делом начала искать местоположение выхода."
      - "Однако здешняя планировка уже отличается от первоначальной... Доминион Виши наверняка перестроил это место."
  - char: "implacable"
    side: "left"
    text:
      - "И то верно............ Если бы мы могли так легко найти выход, разве это называлось бы ловушкой?"
      - "В худшем случае выхода может вообще не быть. Нам придется найти устройство, поддерживающее Зеркальное море, и уничтожить его, прежде чем мы сможем выбраться."
  - char: "richelieu"
    side: "right"
    text:
      - "Но ведь все наши тогдашние поиски не увенчались успехом..."
  - char: "implacable"
    side: "left"
    text:
      - "Времена меняются~ Спустя столько лет наш опыт сражений с Сиренами тоже обогатился. Кто знает, может, мы сможем заметить детали, которые вы упустили тогда."
      - "К тому же, лучших вариантов у нас всё равно нет!"
      - "В любом случае, давайте сначала проведем разведку акватории, а затем применим нашу смекалку и будем действовать по ситуации~"

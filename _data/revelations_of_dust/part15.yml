chapter1:
  rows:
  - char: "implacable"
    side: "left"
    text:
      - "Это же?..."
      - "Где я вообще нахожусь... что произошло?"
  - char: "richelieu"
    side: "right"
    text:
      - "Не паникуй, успокойся, сделай глубокий вдох."
  - char: "implacable"
    side: "left"
    text:
      - "Угх, мне так плохо... словно меня запихнули в бочку и сбросили с горы..."
      - "Я помню, что мы завершили программу очистки в крепости Трибунала, а затем небо..."
  - text:
      - "В этот момент алая поверхность океана отражала мрачное небо. Подняв голову, можно было увидеть черное солнце, похожее на солнечное затмение, высоко висящее в небесах."
  - char: "implacable"
    side: "left"
    text:
      - "Нас всех затянуло внутрь этой черной дыры..."
  - text:
      - "Имплакабл растерянно огляделась по сторонам. Остров Кергелен исчез, а на его месте раскинулся грандиозный комплекс зданий, простирающийся до самого горизонта."
  - char: "implacable"
    side: "left"
    text:
      - "Вот оно что, так это и есть «нижний уровень» Базилики, то самое место, которое, по вашим словам, «не имеет отношения к нашей текущей задаче»..."
      - "Ришелье, мне нужны ответы."
  - char: "richelieu"
    side: "right"
    text:
      - "...Твои выводы верны. Это нижний уровень Базилики, а также ее истинное лицо, скрытое под внешней оболочкой."
  - char: "implacable"
    side: "left"
    text:
      - "И это всё?"
      - "Доминион Виши не способен создать нечто подобное, даже прежней Ортодоксии Ирис это было не под силу."
      - "Это же самое настоящее Зеркальное море, верно?"
  - char: "richelieu"
    side: "right"
    text:
      - "....Верно."
  - char: "implacable"
    side: "left"
    text:
      - "Секрет, скрывающийся под Базиликой Ирис — это Зеркальное море Сирен... Объяснитесь, кардинал."
  - char: "richelieu"
    side: "right"
    text:
      - "Всё очень просто. Изначально это была часть захваченной нами базы Сирен, и она существовала здесь с момента основания Базилики."
  - char: "implacable"
    side: "left"
    text:
      - "То есть, помимо захвата объектов, построенных Сиренами на острове, вы... еще и захватили контроль над Зеркальным морем?!"
  - char: "richelieu"
    side: "right"
    text:
      - "Верно."
  - char: "implacable"
    side: "left"
    text:
      - "Мне и раньше это казалось немного странным... Раз уж это была битва с Сиренами, почему ни словом не упомянули Зеркальное море."
      - "Как я и думала, вы намеренно скрыли эту часть!"
  - char: "richelieu"
    side: "right"
    text:
      - "............."
  - char: "implacable"
    side: "left"
    text:
      - "..Так почему же мы оказались здесь?"
      - "Неужели мы слишком много знаем, и ты решила затащить нас сюда, чтобы заставить замолчать...?"
  - char: "richelieu"
    side: "right"
    text:
      - "Как такое возможно? У нас всегда были веские причины контролировать это место, и я собиралась всё тебе объяснить, когда подвернется подходящий случай..."
  - char: "implacable"
    side: "left"
    text:
      - "Тогда я надеюсь, что этот «подходящий случай» представится как можно скорее."
      - "Но сначала сосредоточимся на текущей ситуации. Раз уж не ты нас сюда намеренно отправила, тогда почему мы здесь оказались?"
      - "Разве программа очистки не была успешно выполнена?"
  - char: "richelieu"
    side: "right"
    text:
      - "...Я не знаю. По крайней мере, насколько я помню, программа очистки не должна была иметь к этому месту никакого отношения."
      - "Из соображений безопасности нижний уровень должен быть полностью изолирован от верхнего. Проникнуть на нижний уровень без разрешения куда сложнее, чем выполнить программу очистки на верхнем."
      - "Если только..."
  - char: "implacable"
    side: "left"
    text:
      - "Если только Доминион Виши не переоборудовал это место!"
      - "Они знали, что после их отступления кто-нибудь обязательно придет, чтобы взять это место под контроль, и тогда на верхнем уровне Базилики непременно разразится кризис."
      - "Если бы прибыл Королевский Флот или флот Союза Орла... одного лишь кризиса на верхнем уровне хватило бы, чтобы уничтожить «гостей»."
      - "А если бы прибыли «специалисты» из Свободного Ириса и запустили процесс очистки, их бы из-за «несчастного случая» отправили на нижний уровень!"
      - "Это тщательно продуманная ловушка, кардинал."
  - char: "richelieu"
    side: "right"
    text:
      - "....Плохо дело, мы пробыли здесь слишком долго."
  - char: "implacable"
    side: "left"
    text:
      - "..Хм? Это то, о чем я думаю? Нас и правда поджидает опасность?"
  - char: "richelieu"
    side: "right"
    text:
      - "Судя по ситуации на нижнем уровне... боюсь, он полностью вышел из-под контроля."
      - "Значит, наше положение в дальнейшем станет весьма опасным..."
  - char: "hero_rad"
    side: "left"
    text:
      - "Ува-а-а——!!! Леди Имплакабл, леди Имплакабл, беда!!"
      - "Прямо на нас несется гигантский механический рыцарь!"
  - char: "implacable"
    side: "right"
    text:
      - "Гигантский... механический рыцарь?"
  - text:
      - "Экстренный вызов Хиро временно прервал анализ текущей ситуации, который вели Ришелье и Имплакабл, и они обе устремили свои взгляды вдаль."
      - "Вдали Хиро, возвращавшаяся с разведки, мчалась по поверхности воды, а чуть позади нее, не отставая ни на шаг, следовал механический рыцарь размером с холм."
      - "Рыцарь был облачен в черные доспехи, держал в руке весы и восседал на механическом боевом коне, также закованном в черную броню. От всей его фигуры исходила зловещая аура."
  - char: "bearn"
    side: "left"
    text:
      - ".......«Механическое вооружение типа Суд — Голод»."
  - char: "richelieu"
    side: "right"
    text:
      - "Хотя он сильно отличается от того, что я помню, это чувство не спутать ни с чем... Это оно."
  - char: "implacable"
    side: "left"
    text:
      - "Королевский Флот, приготовиться к бою——!"
  - char: "richelieu"
    side: "right"
    text:
      - "Нет, наш нынешний флот может с ним не справиться, нам нельзя идти напролом!"
      - "Беарн, проверь, есть ли поблизости нормально функционирующий стабилизирующий якорь, мы должны немедленно отступить!"
  - char: "bearn"
    side: "left"
    text:
      - "Хорошо, пожалуйста, дайте мне немного времени!"
  - char: "implacable"
    side: "right"
    text:
      - "Что, отступать...? Это ведь просто серийная модель Сирен, только чуть больше обычного, так?"
  - char: "richelieu"
    side: "left"
    text:
      - "Этот механизм — вовсе не какая-то там серийная модель Сирен, что чуть больше обычного!"
      - "Как только доберемся до безопасного места, я выложу всё как есть: и их истинную природу, и причину, по которой мы контролируем это место."
      - "Но сейчас, пожалуйста, поверь мне!"
  - char: "implacable"
    side: "right"
    text:
      - "Ладно... В конце концов, это твоя территория, так что я послушаю тебя. Показывай дорогу!"

chapter1:
  rows:
  - text:
      - "Остров Кергелен · Крепость Трибунала"
  - char: "implacable"
    side: "left"
    text:
      - "Во время нашей предыдущей разведки вокруг острова я не видела этого здания. Когда оно вообще успело появиться?"
  - char: "richelieu"
    side: "right"
    text:
      - "Совсем недавно, а если точнее, то в тот самый момент, когда завершилась очистка в Базилике Вер."
      - "Только после завершения программы очистки во всех четырех Базиликах эта крепость поднимается из-под земли."
      - "Именно здесь выполняется последний шаг всего процесса. Разумеется, столь секретное место не отмечается на картах."
  - char: "implacable"
    side: "left"
    text:
      - "Последнее устройство для восстановления контроля над Базиликой находится в крепости Трибунала. Похоже, они тоже вложили немало сил в строительство Базилики на острове в те времена?"
  - char: "richelieu"
    side: "right"
    text:
      - "Да, в те годы самый передовой молельный корабль Трибунала также затонул здесь."
      - "Тот корабль не входил в состав флота Ириса, и, по правде говоря, мог и не участвовать в бою."
      - "Но, получив приказ Святого Престола отбить остров Кергелен любой ценой, Трибунал немедленно отправил корабль на самую передовую."
      - "Для постройки того военного корабля Трибунал не пожалел никаких средств, поэтому в то время этот молельный корабль фактически был самым сильным из обычных военных кораблей Ортодоксии."
      - "И благодаря этому он сыграл жизненно важную роль в том сражении."
      - "Но ценой за это стало то, что тот корабль навсегда затонул здесь..."
  - char: "implacable"
    side: "left"
    text:
      - "..Флаг на стене, Доминион Виши не стал его менять. Это всё еще флаг Ортодоксии Ирис."
  - char: "richelieu"
    side: "right"
    text:
      - "...Да, он вызывает чувство ностальгии."
      - "Кто бы мог подумать, что пренебрежительное отношение Доминиона Виши к обслуживанию приведет к такому неожиданному результату."
  - char: "implacable"
    side: "left"
    text:
      - "Если вы хотите помолиться, мы можем выйти и ненадолго оставить вас."
  - char: "richelieu"
    side: "right"
    text:
      - "В этом нет необходимости. Кризис еще не миновал, сейчас не время для этого."
      - "Когда всё уляжется, у нас будет предостаточно времени, чтобы предаться воспоминаниям..."
      - "Беарн, запусти систему окончательной очистки и выполни программу «Суд»."
  - char: "bearn"
    side: "left"
    text:
      - "Слушаюсь."

chapter2:
  rows:
  - text:
      - "Когда Беарн опустила рычаг, раздалось гудение машин, и на остров Кергелен постепенно вернулась атмосфера спокойствия."
      - "Имплакабл, чьи нервы всё это время были натянуты как струна, тоже наконец-то смогла расслабиться."
  - char: "implacable"
    side: "left"
    text:
      - "Вот так... проблема наконец-то решена."
      - "Точно, Хиро, верни лук леди Ришелье."
  - char: "hero"
    side: "right"
    text:
      - "Э? Вернуть?! Но леди Имплакабл, вы же раньше говорили..."
  - char: "implacable"
    side: "left"
    text:
      - "Верни его. В конце концов, это их реликвия, и так открыто забирать её было бы слишком некрасиво."
  - char: "richelieu"
    side: "right"
    text:
      - "Ах, на самом деле ничего страшного."
      - "Этот лук — всего лишь символ, а не настоящая реликвия. Если он тебе нравится, можешь взять его в качестве сувенира."
  - char: "hero"
    side: "left"
    text:
      - "Ура~! Большое спасибо, леди Ришелье~☆"
  - char: "implacable"
    side: "right"
    text:
      - "Что ж, леди Ришелье, позвольте мне еще раз от имени Королевского Флота выразить вам самую искреннюю благодарность."
      - "Если бы не ваша помощь, не только Аргус и Ройял Оук оказались бы в большой беде, но и этот кризис, боюсь, повлиял бы на стратегическое развертывание сил Лазурного пути в Антарктике."
      - "По возвращении я в подробностях доложу Ее Величеству обо всех деталях этого инцидента."
      - "...Если вы хотите, чтобы я передала что-то еще Ее Величеству, я обещаю, что обязательно это сделаю."
  - char: "richelieu"
    side: "left"
    text:
      - "Я уже полностью удовлетворена тем, что смогла вернуть это место и позволить знамени Ортодоксии вновь увидеть свет."
      - "Помимо слов благодарности, мне не о чем просить вас передавать Куин Элизабет."
  - char: "implacable"
    side: "right"
    text:
      - "Я поняла. В таком случае..."
      - "Подожди, кардинал Ришелье, что это там в небе?"
  - char: "richelieu"
    side: "left"
    text:
      - "В небе............?"

chapter3:
  rows:
  - text:
      - "«Я никогда не думала о том, как будет выглядеть этот мир, когда в небесах повиснет черная дыра —»"
      - "«В сравнении с ней даже само солнце кажется лишь светом свечи в бесконечной ночи —»"
      - "«Во имя Ее Величества, в этот самый миг, нам остается только молиться —»"

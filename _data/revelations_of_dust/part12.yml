chapter1:
  rows:
  - text:
      - "Четвертый день контроля, 20:59:00"
      - "Объединенный флот Королевского Флота и Свободного Ириса"
      - "Базилика Нуар · Главный складской центр"
  - char: "hero"
    side: "left"
    text:
      - "Проиграйте, проиграйте~☆"
      - "Всего лишь мелюзга, а расправляться с ней на удивление приятно~"
  - char: "royal_oak"
    side: "right"
    text:
      - "Э...! П-пожалуйста, не наступай так быстро... нам нужно держать строй..."
  - char: "argus"
    side: "left"
    text:
      - "Ничего страшного, леди Ройял Оук, смело идите вперед, я вас прикрою."
  - text:
      - "В складском центре оперативная группа вступила в ожесточенный бой со скопившейся здесь армией пешек."
      - "И вновь благодаря необычайно просторному помещению, объединенный флот мог беспрепятственно обрушивать свой огонь на врага."
      - "Вскоре битва в Базилике Нуар также благополучно завершилась..."

chapter2:
  rows:
  - char: "argus"
    side: "left"
    text:
      - "Мы с леди Ройял Оук кое-что заметили, леди Имплакабл..."
  - char: "implacable"
    side: "right"
    text:
      - "Хотелось бы услышать подробности..."
  - char: "argus"
    side: "left"
    text:
      - "Во время боя мы обнаружили, что, хотя Базилика сама по себе построена очень большой, пространство для сражения только что было всё же слишком огромным..."
      - "То есть... внутренний объем этой Базилики намного больше ее внешних контуров!"
  - char: "implacable"
    side: "right"
    text:
      - "Неплохо, наконец-то вы это заметили~"
  - char: "argus"
    side: "left"
    text:
      - "Мне очень жаль, леди Имплакабл! Мы прибыли сюда совсем недавно и не успели провести тщательное расследование...!"
  - char: "implacable"
    side: "right"
    text:
      - "Я вовсе не виню вас, не волнуйтесь."
      - "Эту особенность действительно нелегко заметить. Кажется, строители Базилики намеренно пытались запутать посетителей, так как подобное явление встречается не во всех зонах."
      - "Некоторые из них действительно сами по себе построены огромными, а в других эффект расширения пространства возникает только при определенных обстоятельствах."
      - "Я тоже убедилась в этом только после того, как догадалась об этом и целенаправленно понаблюдала некоторое время."
      - "Сцилла, когда Ришелье и Беарн только что зачищали поле боя, они не совершали никаких странных действий?"
      - "Например, не пытались ли они скрыть какие-то следы или что-то в этом роде?"
  - char: "scylla"
    side: "left"
    text:
      - "Мне жаль, леди Имплакабл, но я не заметила ничего подобного."
  - char: "implacable"
    side: "right"
    text:
      - "Вот как... Тогда ничего не поделаешь. Мы с ней довольно хорошо знакомы, так что я спрошу ее напрямую, чтобы всё прояснить~"

chapter3:
  rows:
  - char: "implacable"
    side: "right"
    text:
      - "Кардинал Ришелье~ Как продвигается очистка?"
  - char: "richelieu"
    side: "left"
    text:
      - "Устройство очистки третьей Базилики работает нормально. Меньше чем через четверть часа всё должно завершиться."
  - char: "implacable"
    side: "right"
    text:
      - "Армия, состоящая из серийных пешек, плюс пространство, превышающее фактическую занимаемую площадь..."
      - "Эта Базилика как-то связана с Сиренами, кардинал?"
  - char: "richelieu"
    side: "left"
    text:
      - "Верно, всё это было реализовано нами за счет восстановления и использования оборудования Сирен."
  - char: "implacable"
    side: "right"
    text:
      - "...Э? Вы вот так просто это признали!"
  - char: "richelieu"
    side: "left"
    text:
      - "В конце концов, сегодня я «неожиданно откровенна»."
      - "К тому же вы сражались внутри Базилики достаточно долго и прошли через достаточное количество зон, так что вполне естественно, что вы обнаружили нечто подобное. У меня с самого начала не было намерений это скрывать."
  - char: "implacable"
    side: "right"
    text:
      - "Раз уж не хотели скрывать, то почему всё это время молчали?"
  - char: "richelieu"
    side: "left"
    text:
      - "Потому что ты не спрашивала."
  - char: "implacable"
    side: "right"
    text:
      - "Да вы...!"
  - char: "richelieu"
    side: "left"
    text:
      - "Это первая причина. А вторая причина в том, что ты, казалось, получала огромное удовольствие от процесса поиска «истины»."
      - "И даже заставила королевскую горничную неотрывно следить за каждым моим шагом. Я подумала, что лучше не портить тебе это удовольствие?"
  - char: "implacable"
    side: "right"
    text:
      - "........................"
      - "Всё здесь было создано с использованием технологий Сирен?"
  - char: "richelieu"
    side: "left"
    text:
      - "Не всё, и для этого нужно начать с истории создания Базилики на острове."
      - "Давным-давно это была обычная заморская территория Ортодоксии Ирис, где круглый год базировался небольшой отряд и исследовательская группа."
      - "До тех пор, пока однажды Сирены не атаковали это место."
      - "К тому моменту, когда прибыл флот Ортодоксии, весь остров уже пал."
      - "Как правило, согласно тогдашним обычаям, флот должен был отступить, чтобы сохранить свои силы."
      - "Но по какой-то причине в тот день Святой Престол отдал строжайший приказ отбить остров любой ценой."
      - "Тогдашний флот Ортодоксии преданно выполнил приказ. Заплатив немалую цену, остров Кергелен вернулся под контроль Ортодоксии."
      - "Восстановив контроль, мы обнаружили на острове и в его окрестностях множество оставленных Сиренами небоевых объектов."
      - "Похоже, они хотели построить здесь базу с функциями тылового обеспечения, но подверглись яростной атаке флота Ортодоксии, не успев как следует закрепиться, что сыграло нам на руку."
      - "Оглядываясь назад, возможно, Святой Престол тогда заранее получил какую-то информацию."
  - char: "implacable"
    side: "right"
    text:
      - "А затем вы на основе базы Сирен продолжили строительство военизированной крепости, публично назвав её «Базиликой», и взяли её под свой контроль?"
  - char: "richelieu"
    side: "left"
    text:
      - "Базилика, которая сейчас предстает перед вами, претерпела множество реконструкций, прежде чем достигла своих нынешних масштабов."
      - "Во время реконструкций были и некоторые трудности, но в целом, всё верно."
  - char: "implacable"
    side: "right"
    text:
      - "Вот оно что, с этим мне всё понятно. А что насчет значения цветов?"
  - char: "richelieu"
    side: "left"
    text:
      - "Что ты имеешь в виду?"
  - char: "implacable"
    side: "right"
    text:
      - "Блан (Белая), Руж (Красная), Нуар (Черная), Вер (Зеленая)."
      - "Лук, меч, весы, коса."
      - "Завоевание, война, голод, смерть."
      - "Истинные образы четырех здешних Базилик — это Четыре всадника Апокалипсиса, появляющиеся как предвестники Судного дня. Я ведь не ошибаюсь?"
  - char: "richelieu"
    side: "left"
    text:
      - "…………"
  - char: "implacable"
    side: "right"
    text:
      - "Это вы тоже планировали рассказать с самого начала, кардинал?"
  - char: "richelieu"
    side: "left"
    text:
      - "Ну, это-то я изначально хотела скрыть."
      - "В конце концов, если разнесется слух о том, что Ортодоксия Ирис когда-то прикрывалась Базиликами для изучения Всадников Апокалипсиса и Судного дня, это так или иначе ударит по имиджу церкви."
      - "Но когда я увидела, что отряд возглавляешь ты, я поняла, что рано или поздно ты всё равно докопаешься до правды, поэтому оставила попытки."
  - char: "implacable"
    side: "right"
    text:
      - "Хоть наша вера и отличается, в конечном итоге мы происходим от одного корня."
      - "Такие классические сюжеты мне вполне понятны."
      - "Ради чего вы всё это делали? Чтобы вершить суд над миром?"
  - char: "richelieu"
    side: "left"
    text:
      - "Нет, мы создали эту символическую систему для того, чтобы централизованно управлять четырьмя армиями пешек."
      - "После того как церковь взяла под контроль здешнюю базу Сирен, мы действительно получили полный комплекс оборудования для производства пешек."
      - "Однако мы не нашли технологий, с помощью которых Сирены контролируют флоты пешек, поэтому здесь нам пришлось выкручиваться самим."
      - "В ходе исследований инженеры Ортодоксии изобрели устройство, которое управляет четырьмя флотами, опираясь на символику Четырех Всадников."
      - "А именно — эти четыре великие Базилики."
  - char: "implacable"
    side: "right"
    text:
      - "Использовать Четырех Всадников для разделения функций флотов, а затем с помощью концепции «Суда» отдавать боевые приказы, осуществляя таким образом опосредованный контроль над армией пешек..."
      - "Как умно."
  - char: "richelieu"
    side: "left"
    text:
      - "Задумка была хороша, но в итоге полностью осуществить её так и не удалось."
      - "И причиной неудачи стала та самая проблема загрязнения, о которой я упоминала ранее."
  - char: "implacable"
    side: "right"
    text:
      - "Значит, загрязнение Базилики — это не какая-то программная ошибка, а нечто куда более абстрактное, верно?"
      - "Это всё объясняет. А я-то думала, почему мы никогда не видели, чтобы у Сирен возникали подобные проблемы при управлении пешками..."
      - "Оказывается, вы с нуля разработали собственную систему управления, опираясь на эти примитивные и... гигантские механизмы?"
  - char: "richelieu"
    side: "left"
    text:
      - "Да. Беарн тогда была главным инженером второй фазы строительства Базилики, и многие устройства здесь удалось воплотить в жизнь только благодаря ей."
  - char: "implacable"
    side: "right"
    text:
      - "Так она главный инженер... Неудивительно, что всю дорогу она знала устройства Базилики как свои пять пальцев."
      - "Тогда сама программа очистки тоже соответствует образу «Судного дня»?"
  - char: "richelieu"
    side: "left"
    text:
      - "Верно, «очищение мира от всей скверны»."
      - "У нас осталась последняя Базилика. Как только мы запустим тамошнее устройство очистки, наши проблемы здесь будут окончательно решены."

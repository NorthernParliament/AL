chapter1:
  rows:
  - text:
      - "В тот момент, когда отряд уже почти приблизился к Саду Камелота, по морской глади полоснул ослепительный золотой луч."
  - char: "vanguard"
    side: "left"
    text:
      - "Ваше Величество, Сад Камелота будто активировался сам по себе...?!"
  - char: "queen_elizabeth"
    side: "right"
    text:
      - "Нет, его кто-то запустил."
      - "В каждом мире может существовать лишь один Сад Камелота. Похоже, подкрепление от Шеффи прибыло."
  - char: "suffolk(retrofit)"
    side: "left"
    text:
      - "Ваше Величество, Саффолк прибыла для вашей защиты!"
  - char: "sheffield"
    side: "right"
    text:
      - "Глубочайшие извинения, Ваше Величество. Мы задержались."
  - char: "ark_royal(retrofit)"
    side: "left"
    text:
      - "Услышав, что Ваше Величество в опасности, я, Арк Роял, не могла остаться в стороне!"
  - char: "unicorn(retrofit)"
    side: "right"
    text:
      - "Юникорн... тоже пришла на помощь!"
  - char: "ajax(retrofit)"
    side: "left"
    text:
      - "Значит, те тени вдали — это и есть враги? Позвольте и нам вступить в бой~"
  - char: "janus"
    side: "right"
    text:
      - "Пожалуйста, будьте осторожнее, постарайтесь не пострадать..."
  - text:
      - "В этот миг Сад Камелота был подобен сигнальному огню, связывающему миры: он разнёс весть о беде Королевы и созвал тех, кто стал надеждой на спасение."
  - char: "queen_elizabeth"
    side: "left"
    text:
      - "Ты привела даже флот модернизации... Слишком уж ты расстаралась, Уорспайт..."
  - char: "warspite(retrofit)"
    side: "right"
    text:
      - "Если бы ситуация не была столь внезапной и не требовала секретности, я бы привела с собой добрую половину Королевского Флота!"
      - "В данном случае это Вашему Величеству, исчезнувшей без единого слова, стоит поразмыслить над своим поведением."
  - char: "queen_elizabeth"
    side: "left"
    text:
      - "Прости. На этот раз это Моя вина, Я заставила вас волноваться."
  - char: "repulse_meta"
    side: "right"
    status: "is-meta"
    text:
      - "...Сестрёнка, а это место выглядит как-то знакомо."
  - char: "renown_meta"
    side: "left"
    status: "is-meta"
    text:
      - "Согласна. Интересно, что за эксперименты затеял здесь Антиох..."
  - char: "queen_elizabeth"
    side: "right"
    text:
      - "Значит, вы двое — те самые META, которых Вангард встретила в замке в лесу?"
      - "(Похоже, это тот самый случай, когда ошибка обернулась удачей...)"
  - char: "renown_meta"
    side: "left"
    status: "is-meta"
    text:
      - "Именно так. Я — Ринаун, а это моя сестра Рипалс."
      - "Какое-то время мы сражались в рядах Пепла, затем скрылись от мира, чтобы насладиться покоем. А теперь мы вновь вышли на поле боя, дабы исполнить данную когда-то клятву."
      - "Хм..."
  - char: "queen_elizabeth"
    side: "right"
    text:
      - "Ах, в вашем случае всё по-особенному. Можете называть меня просто Элизабет или Куин Элизабет, Я не принуждаю вас называть меня «Ваше Величество»."
  - char: "repulse_meta"
    side: "left"
    status: "is-meta"
    text:
      - "Тогда как насчёт такого компромисса — «Ваше Величество Куин Элизабет»?"
  - char: "queen_elizabeth"
    side: "right"
    text:
      - "Если вам не лень выговаривать такую длинную фразу, то пусть будет так..."
      - "Ты только что сказала, что это место кажется знакомым. Это реконструкция каких-то фрагментов из ваших воспоминаний?"
  - char: "renown_meta"
    side: "left"
    status: "is-meta"
    text:
      - "Облик мегаполиса — да, а вот насчёт чёрного шторма не уверена. По крайней мере, я никогда не видела ничего подобного в такой обстановке."
  - char: "vanguard"
    side: "right"
    text:
      - "Ваше Величество, флот Пьюрифайер полностью уничтожен. Эпицентр шторма приближается к нам на огромной скорости."
  - char: "queen_elizabeth"
    side: "left"
    text:
      - "Как быстро... Эти Сирены... Раз уж собрались драться, могли бы выставить что-то посерьёзнее..."
  - char: "belfast"
    side: "right"
    text:
      - "Прошу прощения, Ваше Величество. Из-за слишком большого количества последовательных запусков Саду Камелота требуется время на подзарядку перед следующей активацией."
  - char: "queen_elizabeth"
    side: "left"
    text:
      - "Я поняла, не волнуйся."
      - "В прошлый раз нас застали врасплох, потому что мы были не готовы, но сейчас всё иначе."
      - "Активировать Первое Кольцо! Разделить пространство и изолировать шторм!"
  - text:
      - "Вслед за вращением внешнего первого кольца прозрачная «плёнка» целиком окутала Сад Камелота, отсекая чёрный шторм."
  - char: "queen_elizabeth"
    side: "left"
    text:
      - "С виду она кажется тонкой, но эта штука куда прочнее, чем ты можешь себе вообразить."
  - char: "bon_omm_richard"
    side: "right"
    status: "is-gray"
    text:
      - "Какое любопытное устройство. Ты модифицировала его по чертежам Демона Лапласа?"
  - char: "queen_elizabeth"
    side: "left"
    text:
      - "Без комментариев. А тебе лучше вернуться туда, откуда пришла, и не сеять здесь хаос. Разве не видишь, что Сирены здесь крайне недовольны твоим вмешательством?"
  - char: "repulse_meta"
    side: "right"
    status: "is-meta"
    text:
      - "Сестрёнка, та, что снаружи... это ведь не Бон Омм Ричард?!"
  - char: "renown_meta"
    side: "left"
    status: "is-meta"
    text:
      - "Боюсь, что это она... Но как она может быть здесь?.."
  - char: "queen_elizabeth"
    side: "right"
    text:
      - "Хм? А что не так с этой Бон Омм Ричард?"
  - char: "renown_meta"
    side: "left"
    status: "is-meta"
    text:
      - "Когда Пепел ещё сотрудничал с Антиох в их экспериментах, Зеро говорила нам..."
      - "Какую бы модель они ни строили, Антиох не способен точно воссоздать данные Бон Омм Ричард."
      - "В ходе истории на различных испытательных полигонах Бон Омм Ричард также никогда не появлялась естественным путем, словно само её существование было полностью стерто."
      - "Поэтому с тех самых пор, после того «инцидента с Ричард»... мы впервые видим её живой."
      - "Где вы её нашли?.."
  - char: "queen_elizabeth"
    side: "right"
    text:
      - "Об этом стоит спросить нашу дорогую Монарх. Пусть расскажет, как ей удалось сорвать такой «джекпот» всего за одну вылазку!"
  - char: "monarch"
    side: "left"
    text:
      - "..Прошу прощения. Вероятно, мне просто фатально не везёт."
  - char: "bon_omm_richard"
    side: "right"
    status: "is-gray"
    text:
      - "Эй~ Отделаться от меня будет не так-то просто — ведь мне уже никто не в силах помешать."
      - "Ни люди, ни корабли, и уж тем более Антиох~"
      - "К тому же, я вижу, у вас появились интересные попутчики. Вы двое — МЕТА?"
  - char: "repulse_meta"
    side: "left"
    status: "is-meta"
    text:
      - "Ричард, ты что, не узнаёшь нас?"
  - char: "bon_omm_richard"
    side: "right"
    status: "is-gray"
    text:
      - "Хм... Нет, не узнаю. Возможно, мы когда-то и виделись мельком, кто знает."
      - "Слушайте, слушайте! Помогите-ка мне поскорее разломать эту назойливую машину изнутри!"
      - "Тогда я смогу зайти и превратить их всех в наших союзников!"
  - char: "repulse_meta"
    side: "left"
    status: "is-meta"
    text:
      - "Сестрёнка, характер этой Ричард какой-то..."
  - char: "renown_meta"
    side: "right"
    status: "is-meta"
    text:
      - "Да, без сомнения, это не та мисс Ричард, которую мы помним. И это её... неописуемое чувство странности."
      - "В ней есть черты МЕТА, но в то же время подмешано что-то куда более чужеродное. Я не могу сказать наверняка... Вот бы здесь были Хелена или Мемфис."
  - char: "bon_omm_richard"
    side: "left"
    status: "is-gray"
    text:
      - "А? Ну чего вы ждёте? Почему не действуете?"
  - char: "renown_meta"
    side: "right"
    status: "is-meta"
    text:
      - "Сожалею, мисс Ричард. Мы уже присягнули на верность здешней королеве Елизавете, и сейчас наш долг — обеспечить их безопасное возвращение."
      - "Не могла бы ты на этом остановиться?"
  - char: "bon_omm_richard"
    side: "left"
    status: "is-gray"
    text:
      - "Ха? С чего бы это! Ладно-ладно, так и знала, что на вас нельзя положиться."
      - "Я просто выжму из этой машины всю энергию до капли, и тогда путь будет открыт. В любом случае, времени у меня предостаточно~"
  - text:
      - "Шторм вновь издал яростный рев. На этот раз из самой его глубины хлынули бесчисленные орды врагов."
  - char: "queen_elizabeth"
    side: "left"
    text:
      - "Тц, да она совсем не в своем уме! Чтобы истощить энергию Искусственной Сингулярности таким способом, потребуются десятилетия!"
      - "Однако в такой ситуации... Мне придется непрерывно перекачивать энергию, предназначенную для запуска, на поддержание внешнего кольца."
      - "И хотя враг не может пробить щит, мы не можем использовать Сад Камелота, чтобы вернуться..."
  - char: "warspite(retrofit)"
    side: "right"
    text:
      - "Ваше Величество, позвольте нам взять на себя часть давления. Пришло время продемонстрировать истинную мощь модернизированного флота Королевства!"
  - char: "ark_royal(retrofit)"
    side: "left"
    text:
      - "Будьте спокойны, Ваше Величество. Сколько бы врагов ни пошло в атаку, я гарантирую — никто из них не вернется назад!"
  - char: "vanguard"
    side: "right"
    text:
      - "Позвольте и мне возглавить рыцарей. Это оборонительный бой ради нашей общей победы, я обещаю не действовать безрассудно."
  - char: "monarch"
    side: "left"
    text:
      - "Я тоже пойду. Эта безумица охотится за мной. Если я появлюсь на передовой, возможно, мне удастся потянуть время еще немного."
  - char: "queen_elizabeth"
    side: "right"
    text:
      - "Хорошо! Я даю официальное разрешение. Сейчас Я перенесу защитный барьер на среднее кольцо, освободив пространство между средним и внешним кольцами для вашего боя."
      - "Пока Сад Камелота не будет полностью готов, вы обязаны уничтожать каждого врага, проникшего за внешнее кольцо!"
      - "Но помните: ни при каких обстоятельствах не покидайте пределы внешнего радиуса. Как только подготовка к запуску завершится, мы немедленно отступаем!"
  - char: "vanguard"
    side: "left"
    text:
      - "Слушаемся! Рыцари и воины Королевского Флота, за мной — навстречу врагу!"

chapter1:
  rows:
  - char: "renown_meta"
    side: "left"
    status: "is-meta"
    text:
      - "Потерпите ещё немного... Мы почти добрались до Скапа-Флоу!"
  - char: "repulse"
    side: "right"
    text:
      - "Сестрёнка, твоё нынешнее состояние..."
  - char: "renown_meta"
    side: "left"
    status: "is-meta"
    text:
      - "Боюсь, я уже преодолела критическую отметку. Процесс МЕТА-морфозы стал окончательно необратим."
  - char: "repulse"
    side: "right"
    text:
      - "Только благодаря пробитой тобой бреши наш небольшой отряд смог отступить..."
      - "В кого бы ты ни превратилась, ты навсегда останешься моей сестрой!"
  - char: "renown_meta"
    side: "left"
    status: "is-meta"
    text:
      - "Ладно, довольно об этом. Удалось связаться с флотом Её Величества?"
  - char: "repulse"
    side: "right"
    text:
      - "Мы до сих пор не получили никакого ответа..."
  - char: "renown_meta"
    side: "left"
    status: "is-meta"
    text:
      - "Чем вообще занята Вангард?! В обычной ситуации она бы уже давно эвакуировала Её Величество..."
      - "Нет, я должна вернуться и найти их."
  - char: "repulse"
    side: "right"
    text:
      - "Но сестрёнка... Мы получили приказ: после перегруппировки в Скапа-Флоу направляться в убежище вглубь материка. Нам запрещено возвращаться самовольно..."
  - char: "renown_meta"
    side: "left"
    status: "is-meta"
    text:
      - "Чей это приказ? Лично Её Величества?"
  - char: "repulse"
    side: "right"
    text:
      - "……………………"
  - char: "renown_meta"
    side: "left"
    status: "is-meta"
    text:
      - "Тогда он не имеет никакой силы. Не пытайся меня остановить, сестра..."
  - char: "repulse"
    side: "right"
    text:
      - "Нет, ты не так поняла. Я возвращаюсь вместе с тобой."
  - char: "renown_meta"
    side: "left"
    status: "is-meta"
    text:
      - "Исключено! Твои повреждения слишком серьезны."
  - char: "repulse"
    side: "right"
    text:
      - "Знаешь, мне кажется, я тоже уже почти достигла своего предела..."
  - char: "renown_meta"
    side: "left"
    status: "is-meta"
    text:
      - "…………"
  - char: "repulse"
    side: "right"
    text:
      - "Вдвоем лучше, чем поодиночке, верно?"
      - "Что бы ни ждало нас впереди, давай встретим это вместе..."

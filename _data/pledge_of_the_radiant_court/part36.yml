chapter1:
  rows:
  - char: "conte_di_cavour"
    side: "left"
    text:
      - "Доклад спецотряда: исследование обоих руин в районе Месопотамии завершено."
      - "Подробный отчет и перечень извлеченных артефактов будут переданы вам сразу после завершения систематизации."
      - "Что же касается другого вопроса, который вас беспокоил..."
      - "Разведка подтвердила, что «Священный камень» Империи Сакуры уже погружен на корабль. В данный момент он должен находиться в составе флота, возвращающегося в метрополию Сакуры."
  - char: "marco_polo"
    side: "right"
    text:
      - "Неужели? И Железная Кровь никак не отреагировала, просто позволив им забрать груз с собой?"
  - char: "conte_di_cavour"
    side: "left"
    text:
      - "Информация должна быть точной. Однако конкретное отношение Железной Крови к этому событию нам пока неизвестно..."
  - char: "marco_polo"
    side: "right"
    text:
      - "Впрочем, неважно. Что бы они ни думали, позиция Железной Крови меня больше не заботит."
      - "Что мне известно, так это то что Акаги так и не вернула Чёрный Куб, который одалживала у Фридрих."
      - "А если вещь, взятая в долг, не возвращена, то залог должен быть изъят."
      - "Фридрих дер Гроссе только-только ушла, и пользоваться моментом для таких мелочных махинаций — дурной тон."
      - "Сирены понесли сокрушительное поражение в Скапа-Флоу. Как думаешь, они оставят это просто так?"
  - char: "conte_di_cavour"
    side: "left"
    text:
      - "Полагаю, что нет... Хотя сейчас во всех секторах океана и наблюдается затишье."
      - "Однако леди Витторио Венето уверена, что Сирены что-то замышляют, поэтому мы не ослабляем оборону наших портов."
  - char: "marco_polo"
    side: "right"
    text:
      - "Вот именно! Я того же мнения."
      - "Флот Сакуры тоже приложил руку к операции в Скапа-Флоу. Если сейчас, возвращаясь домой, они с таким пафосом ведут транспортные суда и внезапно подвергнутся мести со стороны Сирен — это ведь будет выглядеть вполне естественно, не так ли?"
      - "...Что скажешь?"

chapter1:
  rows:
  - text:
      - "БАБАХ!!!"
  - char: "repulse"
    side: "left"
    text:
      - "Исход решён! Победитель этой учебной дуэли — леди Вангард~"
  - char: "vanguard"
    side: "right"
    text:
      - "Хе-хе~ Попытка выбить моё оружие была неплохой, но работа ног всё ещё слишком медленная."
  - char: "renown"
    side: "left"
    text:
      - "Моё мастерство всё ещё недостаточно отточено... Благодарю вас, что нашли время в своём плотном графике, чтобы наставить меня."
  - char: "vanguard"
    side: "right"
    text:
      - "Не стоит благодарностей, мы все — рыцари Её Величества, и помогать друг другу — наш долг."
      - "Чем выше общая боеспособность рыцарского ордена, тем больше пользы для Её Величества."
  - char: "bellona"
    side: "left"
    text:
      - "Леди Вангард! Тот приём, которым вы только что парировали атаку Ринаун и в один миг переломили ход боя... Как вы это сделали?!"
  - char: "vanguard"
    side: "right"
    text:
      - "Хм~ Ну, это мой секретный козырь."
      - "Но если ты так хочешь научиться, я могла бы тебя обучить."
  - char: "bellona"
    side: "left"
    text:
      - "Правда?! Я очень хочу! Пожалуйста, обязательно научите меня!"
  - char: "repulse"
    side: "right"
    text:
      - "Я тоже хочу! Если я освою этот приём, то, может, и у меня появится шанс хоть разок победить сестрёнку~"
  - char: "renown"
    side: "left"
    text:
      - "А можно и мне с ними? Я хочу и дальше совершенствовать свои навыки, чтобы поскорее стать выдающимся рыцарем."
  - char: "vanguard"
    side: "right"
    text:
      - "Ого, сколько рвения~ Без проблем — но только в следующий раз. Сегодня уже не получится."
      - "У Её Величества запланировано выступление в Палате Лордов, и я должна её сопровождать."
      - "И Ринаун, на мой взгляд, ты уже состоявшийся рыцарь. Просто до меня тебе ещё расти и расти, вот и всё~"
      - "Продолжайте усердно тренироваться! Больше пота на учениях — меньше крови в бою."
      - "Каждое усилие в тренировочном зале превращается в шанс на победу на поле битвы!"

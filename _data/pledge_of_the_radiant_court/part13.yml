chapter1:
  rows:
  - text:
      - "Под предводительством Пьюрифайер отряд успешно продвигался сквозь бреши в многочисленных линиях блокады."
  - char: "revenge"
    side: "left"
    text:
      - "Пьюрифайер и правда совершенно спокойно ведёт нас через кордоны Сирен..."
  - char: "jervis"
    side: "right"
    text:
      - "Сирена помогает нам прятаться от других Сирен. Это за гранью понимания..."
  - char: "bellona"
    side: "left"
    text:
      - "Неужели здешние Сирены ведут гражданскую войну?"
  - char: "purifier"
    side: "right"
    status: "is-yellow"
    text:
      - "Хе-хе-хе~ (^▽^)♪"
  - char: "revenge"
    side: "left"
    text:
      - "По ней и не скажешь..."
  - char: "indomitable"
    side: "right"
    text:
      - "Не спрашивайте меня ни о чём. Я так устала, что мой мозг отказывается думать..."
  - char: "purifier"
    side: "left"
    status: "is-yellow"
    text:
      - "Ну как вам? Впечатляет здешняя система обороны?"
      - "Всё в строгом соответствии со стандартами Совета! Настоящая стальная сеть — и муха не пролетит!"
  - char: "vanguard"
    side: "right"
    text:
      - "И тем не менее, ты провела нас внутрь."
  - char: "purifier"
    side: "left"
    status: "is-yellow"
    text:
      - "А как иначе? Раз я сама ставила эту оборону, то я лучше всех знаю, как её обойти~ Я — идеальный кандидат для этой операции."
      - "Как только спасательная миссия закончится, забирайте свою королеву и дуйте в штаб со всех ног. И чтобы больше я вас здесь не видела!"
      - "И на обратном пути постарайтесь обойтись без драк! Иначе мне разгребать ещё целую гору проблем..."
      - "У-у-у-у... Как же я настрадалась..."

chapter1:
  rows:

    - text:
      - "После долгого пути сквозь густую чащу деревья наконец расступились, и на землю вновь упали яркие лучи солнца."
      - "Перед воротами замка стояла девушка и подметала дорогу."

    - char: repulse_meta?
      side: left
      status: is-meta
      text:
        - "...Вы... люди?"

    - char: vanguard
      side: right
      text:
        - "Хм... Это действительно глубокий философский вопрос."
        - "Но мы считаем, что да. А вы кто?"

    - char: repulse_meta?
      side: left
      status: is-meta
      text:
        - "Невероятно... Оно ответило!"
        - "Сестра! У нас гости!"

    - text:
      - "Не успели остальные среагировать, как девушка внезапно пришла в неописуемый восторг и, что-то выкрикивая на ходу, бросилась внутрь замка."

    - char: indomitable
      side: left
      text:
        - "...И что это была за реакция? Весьма пренебрежительное отношение к этикету гостеприимства."

    - char: revenge
      side: right
      text:
        - "Может, мы напугали её своим грозным видом?.."

    - char: indomitable
      side: left
      text:
        - "...Что касается «свирепости», то она показалась мне куда более пугающей. Вангард, ты заметила?.."

    - char: vanguard
      side: right
      text:
        - "Да... Детектор маяков МЕТА среагировал. Без сомнения... она МЕТА."

    - char: indomitable
      side: left
      text:
        - "То есть... мы проделали такой путь через лес только для того, чтобы до смерти напугать одну МЕТА, подметавшую дорожку перед замком?"

    - char: vanguard
      side: right
      text:
        - "Не смотри на меня так, я и сама совершенно не понимаю, что происходит."

    - char: indomitable
      side: left
      text:
        - "Но она не закрыла дверь. Наверное, это такое приглашение войти?.."

    - char: vanguard
      side: right
      text:
        - "Похоже на то. Раз она не проявляет враждебности, давайте проследуем за ней и всё выясним."

chapter2:
  rows:

    - char: renown_meta
      side: left
      status: is-meta
      text:
        - "Добро пожаловать, гости, прибывшие издалека. Я — Ринаун, а рядом со мной — моя младшая сестра Рипалс."
        - "Прошу прощения за неподобающее поведение моей сестры у ворот. Мы слишком давно не видели посетителей."

    - char: vanguard
      side: right
      text:
        - "Я — Вангард, рыцарь Королевской гвардии. Сопровождающие меня девушки также являются членами Королевского Флота."
        - "Вы называете себя Ринаун и Рипалс, но, вероятно, правильнее будет называть вас Ринаун МЕТА и Рипалс МЕТА?"

    - char: renown_meta
      side: left
      status: is-meta
      text:
        - "...Если для тебя важно это различие, можешь называть и так."
        - "Вангард, зачем вы сюда пришли?"

    - char: vanguard
      side: right
      text:
        - "Мы ищем Её Величество. Скажите, вы её видели?"

    - char: renown_meta
      side: left
      status: is-meta
      text:
        - "Под «Её Величеством» ты имеешь в виду..."

    - char: vanguard
      side: right
      text:
        - "Куин Элизабет."

    - char: renown_meta
      side: left
      status: is-meta
      text:
        - "Куин Элизабет... Рипалс, ты видела сегодня кого-нибудь ещё?"

    - char: repulse_meta
      side: right
      status: is-meta
      text:
        - "Нет. Да что там сегодня — я за последние несколько лет никого, кроме них, не встречала!"

    - char: renown_meta
      side: left
      status: is-meta
      text:
        - "Как видишь, дело обстоит именно так. Прости, что не смогли помочь."

    - char: indomitable
      side: right
      text:
        - "Вы и правда МЕТА?.."
        - "Просто вы совсем не такие, какими я вас себе представляла... Разве МЕТА не должны быть более... разрушительными?"

    - char: renown_meta
      side: left
      status: is-meta
      text:
        - "Раз ты так говоришь... значит, вам уже доводилось встречать других МЕТА."
        - "Что ж, неудивительно. Хоть мы и бываем разными, таких, как мы, полагаю, немного."
        - "Скоро время обеда. Если вы не спешите, не хотите ли поесть перед уходом?"
        - "Как хозяйки замка, мы должны проявить гостеприимство. Мы могли бы пообщаться за едой."

    - char: indomitable
      side: right
      text:
        - "(Вангард, может нам стоит продолжить поиски Её Величества?..)"

    - char: vanguard
      side: left
      text:
        - "(Не спеши. Поиск МЕТА тоже был одной из целей Её Величества. Давай задержимся ненадолго и разузнаем обстановку.)"

chapter3:
  rows:

    - char: vanguard
      side: left
      text:
        - "Рыба, фрукты и хлеб... Весьма скромный ланч."

    - char: renown_meta
      side: right
      status: is-meta
      text:
        - "Приношу свои извинения. Окружающая обстановка такова, как вы видели сами, — в подобном месте трудно рассчитывать на изысканные яства."

    - char: repulse_meta
      side: left
      status: is-meta
      text:
        - "Угощайтесь «чаем»."

    - char: indomitable
      side: right
      text:
        - "Спаси-— кха... кха-кха... Что это за штука?!"

    - char: renown_meta
      side: left
      status: is-meta
      text:
        - "Прошу прощения. Настоящий чай в эти края ещё не завезли, так что то, что ты сейчас выпила — это заменитель, который мы делаем из древесных листьев и трав."

    - char: indomitable
      side: right
      text:
        - "(...Джервис, у тебя есть с собой чайные пакетики?)"

    - char: jervis
      side: left
      text:
        - "(...Леди Индомитебл, мой долг — следить за вашим здоровьем, поэтому при себе у меня медицинская сумка.)"
        - "(Но такие предметы первой необходимости, как чайные пакетики, я, само собой, прихватила.)"

    - char: indomitable
      side: right
      text:
        - "(О-о-о да!)"

    - char: vanguard
      side: left
      text:
        - "...Кхм. Вы обе наверняка не всегда здесь жили. Когда и при каких обстоятельствах вы здесь оказались?"

    - char: renown_meta
      side: right
      status: is-meta
      text:
        - "Когда?.. Наверное, очень-очень давно."
        - "После того как мы оставили позади пламя войны и раздоры, само понятие времени для нас словно стёрлось."
        - "Что же касается цели нашего прибытия... У нас её не было. Вероятно, всё началось с чистой случайности."
        - "Вы знаете об Антиох?"

    - char: vanguard
      side: left
      text:
        - "Другое название Сирен?"

    - char: renown_meta
      side: right
      status: is-meta
      text:
        - "По сути, верно. А как насчёт Пепла?"

    - char: vanguard
      side: left
      text:
        - "Мы не просто слышали о них, но и столкнулись лично... Не так давно Энтерпрайз и Арк Ройял из Пепла устроили у нас настоящий переполох."

    - char: renown_meta
      side: right
      status: is-meta
      text:
        - "Энтерпрайз... Похоже, она всё та же. Но Арк Ройял?.."
        - "Впрочем, неважно. Похоже, вы, сумевшие пересечь барьер между мирами, тоже не из простых."
        - "Наша встреча — это судьба. Хотите послушать нашу историю?"
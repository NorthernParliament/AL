chapter1:
  rows:

    - char: bon_omm_richard?
      side: left
      text:
        - "Здравствуй, путница, зашедшая к нам издалека."

    - text:
      - "Среди огня и дыма перед Монарх внезапно возникла беловолосая девушка с голубыми глазами."

    - char: monarch
      side: left
      text:
        - "Белые волосы и голубые глаза?.. Нет, твои глаза красные."

    - char: bon_omm_richard?
      side: right
      status: is-yellow
      text:
        - "О, поразительно. Ты раскусила меня с одного взгляда?"

    - char: monarch
      side: left
      text:
        - "Кто ты такая?"

    - char: bon_omm_richard?
      side: right
      status: is-yellow
      text:
        - "Для незваной гостьи, ворвавшейся в чужой дом, первым делом назвать своё имя — таков подобающий этикет, не так ли?"

    - char: monarch
      side: left
      text:
        - "Что ж, это действительно было грубо с моей стороны. Я — Монарх из Королевского Флота. Могу ли я узнать имя столь элегантной леди, стоящей передо мной?"

    - char: bon_omm_richard
      side: right
      status: is-yellow
      text:
        - "Конечно. Я — Бон Омм Ричард, и сейчас я живу в этих краях. Зачем ты сюда пришла?"

    - char: monarch
      side: left
      text:
        - "Я ищу надежду."

    - char: bon_omm_richard
      side: right
      status: is-yellow
      text:
        - "Надежду? Как видишь, здесь не осталось ничего, кроме смерти и разрушения."

    - char: monarch
      side: left
      text:
        - "Какое совпадение: надежда, которую я ищу на этот раз, обычно находится совсем недалеко от этих двух вещей."
        - "Ты знаешь что-нибудь о МЕТА? Или, вернее... ты и есть МЕТА, мисс Бон Омм Ричард?"

    - char: bon_omm_richard
      side: right
      status: is-yellow
      text:
        - "О-о~ Ты обратилась точно по адресу! Никто не смыслит в МЕТА больше меня!"
        - "МЕТА — это и тенденция, и сама суть. Это и процесс изменений, и их неизбежность."
        - "Если тебе интересны МЕТА, почему бы тебе самой не стать одной из них и не прочувствовать всё лично?"

    - text:
      - "Девушка перед ней с воодушевлением принялась расписывать значение МЕТА. Та часть её слов, что касалась силы, особенно притягивала внимание — и в той же мере была пугающе опасной..."

    - char: monarch
      side: left
      text:
        - "Прости. Хоть я и ищу МЕТА, у меня нет намерения становиться одной из них."
        - "Благодарю за разъяснения, мисс Ричард. У меня есть дела, так что я вынуждена откланяться."

    - char: bon_omm_richard
      side: right
      status: is-yellow
      text:
        - "Погоди-ка...Чуть не дала тебе заговорить мне зубы."
        - "Твоя структура... весьма специфична. Неудивительно, что пребывание здесь на тебя ни капли не повлияло."
        - "И неудивительно, что ты с ходу увидела мою маскировку... Всё твоё существо сопротивляется МЕТА-морфозе. Ты точь-в-точь как бракованный товар."

    - char: monarch
      side: left
      text:
        - "Ха, «бракованный товар»? Пустая болтовня. Если ты пытаешься меня спровоцировать, не трать время зря."

    - char: bon_omm_richard
      side: right
      status: is-yellow
      text:
        - "Неужели я ошиблась?"
        - "Ты ведь именно потому, что ты «брак», оказалась отвергнута своей родиной и товарищами? И теперь вынуждена в одиночку скитаться по этой пустоши смерти в поисках призрачной надежды, не так ли?"

    - char: monarch
      side: left
      text:
        - "Дерзость. Не тебе судить о моих узах с Королевским Флотом."

    - char: bon_omm_richard
      side: right
      status: is-yellow
      text:
        - "Это ты здесь дерзишь! Это мой дом. Приходить и уходить, когда вздумается — какое вопиющее отсутствие воспитания!"
        - "Хм-м~ Хотя это и трудновато, но нет ничего невозможного."
        - "Я ведь тоже люблю принимать вызовы!"

    - text:
      - "Одна фраза была полна ярости, но следующая прозвучала пугающе невинно."
      - "Девушка, называющая себя Бон Омм Ричард, становилась всё более нестабильной и опасной."
      - "Нужно немедленно уходить, иначе случится что-то ужасное. Интуиция Монарх буквально кричала об опасности, но..."

    - char: bon_omm_richard
      side: right
      status: is-gray
      text:
        - "Останься и поиграй со мной, сестрёнка."

    - char: monarch
      side: left
      text:
        - "…Голос звучит прямо у меня в голове?!"
        - "Проклятье… Убирайся из моего разума!"

    - text:
      - "БАБАХ!!!"
      - "Монарх открыла огонь по девушке. Снаряд угодил в её палубу, оставив в ней зияющую дыру."

    - char: bon_omm_richard
      side: right
      status: is-gray
      text:
        - "Какая великолепная мощь… Если бы ты стала МЕТА, ты превратилась бы в истинный шедевр…"
        - "Хи-хи-хи… Ха-ха-ха-ха-ха………… Можешь продолжать стрелять, понимаешь?"
        - "Излей на меня всю свою ярость и свои крики отчаяния."

    - text:
      - "БАБАХ!!!"
      - "Монарх выстрелила снова без малейших колебаний. На этот раз снаряд ранил руку девушки."

    - char: bon_omm_richard
      side: right
      status: is-gray
      text:
        - "А точность-то прихрамывает~ Это ты меня щадишь или у тебя совсем нет боевого опыта?"

    - char: monarch
      side: left
      text:
        - "Замолчи…………"

    - char: bon_omm_richard
      side: right
      status: is-gray
      text:
        - "Ничего не поделаешь, придётся преподать тебе пару базовых уроков."
        - "Вот здесь у меня голова, а здесь — сердце. Если будешь целиться в эти места, эффект будет куда лучше, понимаешь?"

    - text:
      - "БАБАХ!!!"

    - char: bon_omm_richard
      side: right
      status: is-gray
      text:
        - "Хи-хи~ На этот раз уже на что-то похоже."
        - "Ну а теперь мой черёд ——— Давай же убивать друг друга, сестрёнка!~"
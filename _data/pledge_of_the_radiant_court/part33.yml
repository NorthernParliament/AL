chapter1:
  rows:
  - text:
      - "Бесчисленные враги, подобно приливу, хлынули к Саду Камелота со всех сторон."
      - "Однако... этот прилив разбился о плотную стену огня перед самыми укреплениями. Ни одному противнику не удалось прорваться за внешнее кольцо."
  - char: "monarch"
    side: "left"
    text:
      - "Враги бесконечны, словно потоп, словно стая зверей... И вот сейчас я стою на защите Сада Камелота."
      - "В этот самый миг я впервые по-настоящему ощутила себя рыцарем Королевского Флота, сражающимся за свою родину..."
  - char: "vanguard"
    side: "right"
    text:
      - "Хоть я и не раз видела твою доблесть на тренировочном полигоне, я впервые вижу тебя настолько воодушевленной и сражающейся в полную силу."
  - char: "monarch"
    side: "left"
    text:
      - "И каковы твои впечатления?"
  - char: "vanguard"
    side: "right"
    text:
      - "Ты сильна. Пожалуй, сильнее даже тех кораблей-прототипов Железной Крови. Для меня большая честь сражаться с тобой плечом к плечу."
  - char: "monarch"
    side: "left"
    text:
      - "Что ж, в таком случае, у тебя появилось хоть немного интереса к дуэли со мной?"
  - char: "vanguard"
    side: "right"
    text:
      - "...На самом деле, я постоянно думала об этом с того самого дня. Как только мы вернемся в целости и сохранности — сразу же всё организуем!"
  - char: "monarch"
    side: "left"
    text:
      - "На этот раз обойдемся без дежурных любезностей?"
  - char: "vanguard"
    side: "right"
    text:
      - "Так ты всё-таки заметила... Прошу прощения! Но на этот раз я абсолютно серьезна!"
  - char: "monarch"
    side: "left"
    text:
      - "Ха-ха, хорошо. Но сначала нужно уничтожить всех этих врагов, что мешают нам вернуться домой~"
  - text:
      - "БАБАХ!!!"
  - char: "bon_omm_richard"
    side: "left"
    status: "is-gray"
    text:
      - "Почему? Зачем вы сопротивляетесь?"
      - "Стать МЕТА — ваша судьба. Зачем идти наперекор судьбе?"
      - "И вы двое... Вы ведь уже приняли свою участь, вы видели конец света своими глазами. Почему же вы всё ещё боретесь?"
      - "Почему бы не продолжить МЕТА-морфозу дальше, до самого предела?"
      - "Ну и ладно~ Раз вы так отчаянно сопротивляетесь, что ж, тогда просто исчезните."
      - "После того как вы будете уничтожены, у нас впереди будет целая вечность для общения —"
  - text:
      - "БАБАХ!!!"
  - char: "purifier"
    side: "left"
    status: "is-yellow"
    text:
      - "Слышьте вы, не игнорируйте меня-а-а!"
      - "Мы ещё не свели старые счёты!"
      - "Думаешь, сможешь задавить меня числом своих флотилий? Наивно!"
      - "Как же я зла... Мало того, что эксперимент сорван, так ещё и такой хаос устроили! Уж я тебя проучу!"
  - char: "vanguard"
    side: "right"
    text:
      - "Ваше Величество, Пьюрифайер снова появилась во главе флота и наносит мощный удар по неизвестному врагу с тыла."
  - char: "queen_elizabeth_rad"
    side: "left"
    text:
      - "Надо же, какая исполнительная..."
  - char: "monarch"
    side: "right"
    text:
      - "Давление на фронте ослабло. Может, нам стоит попытаться выйти и покончить с ней?"
  - char: "queen_elizabeth_rad"
    side: "left"
    text:
      - "Нет, Я не хочу рисковать."
      - "Сейчас Пьюрифайер отвлекает огонь на себя. И пока она усердно трудится, мы... что ж, пора уходить!"
  - text:
      - "Елизавета нажала кнопку пуска, и Сад Камелота вновь окутало ослепительное золотое сияние."

chapter2:
  rows:
  - text:
      - "В мгновение ока огромный замок полностью исчез с поверхности воды."
      - "Чёрный шторм ещё какое-то время бушевал над морем, но, оставив после себя бесчисленные обломки Сирен, тоже развеялся без следа.,"
      - "Туман растаял, облака разошлись, и в вышине засияла полная луна. Ночной город вновь обрёл тишину и покой, как и было совсем недавно..."

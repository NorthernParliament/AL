chapter1:
  rows:
  - char: "queen_elizabeth"
    side: "left"
    text:
      - "Это Пьюрифайер сейчас пронеслась мимо со своим флотом?"
  - char: "vanguard"
    side: "right"
    text:
      - "Так точно, Ваше Величество."
  - char: "queen_elizabeth"
    side: "left"
    text:
      - "И что она вам наговорила?"
  - char: "vanguard"
    side: "right"
    text:
      - "Она сказала, что собирается нанести удар по внезапно появившимся врагам, и велела нам уходить первыми. Сказала, что Сирены прекратят по нам огонь."
      - "А ещё она упоминала что-то про «БАГи»."
  - char: "queen_elizabeth"
    side: "left"
    text:
      - "Вот оно что. Значит, текущие события вышли за рамки сценария испытательного полигона Сирен..."
      - "...Шторм снова усиливается."
      - "Сделаем, как сказала Пьюрифайер. Не будем терять времени — полный вперед, прорываемся насквозь!"
      - "Стоит нам войти в Сад Камелота, и победа будет за нами!"

chapter2:
  rows:
  - char: "indomitable"
    side: "left"
    text:
      - "Ваше Величество, чёрный шторм начал... разделяться? На поверхности моря формируется бесчисленное множество малых смерчей, они перекрывают наш курс!"
  - char: "queen_elizabeth"
    side: "right"
    text:
      - "Ха-а... А у них в запасе полно новых трюков."
  - char: "vanguard"
    side: "left"
    text:
      - "Ваше Величество, позвольте мне остаться и прикрыть ваш отход. Сад Камелота уже близко, прошу вас, эвакуируйтесь как можно скорее!"
  - char: "monarch"
    side: "right"
    text:
      - "Я бы советовала тебе оставить эти мысли."
      - "Раз уж Куин Элизабет прибыла сюда лично, её цель — собственноручно забрать и вернуть домой каждого."
      - "Если ты останешься здесь, она ни за что не отступит."
  - char: "vanguard"
    side: "left"
    text:
      - "Пожертвовать собой ради Её Величества — долг каждого рыцаря!"
  - char: "monarch"
    side: "right"
    text:
      - "Однако наша Королева явно не в восторге от таких жертв. Тебе ли не знать об этом лучше меня?"
  - char: "queen_elizabeth"
    side: "left"
    text:
      - "Вижу, кое-кто уже научился применять Мои уроки на деле. Я весьма довольна!"
      - "Именно! Я намерена вернуть всех вас домой в целости и сохранности, до единого!"
      - "Я уже почти разгадала природу этого чёрного шторма."
      - "Монарх, Нептун, Чешир — вы втроем пойдете в авангарде, расчищайте путь и отвлекайте шторм на себя."
      - "Остальные — на полной скорости к Саду Камелота."
      - "Как только мы пройдем в безопасную зону, прорывайтесь сквозь шторм и соединяйтесь с нами."
      - "Не бойтесь, вы — корабли-прототипы, этот шторм не сможет навредить вам в одночасье!"
  - char: "neptune"
    side: "right"
    text:
      - "Слушаемся!"
  - char: "cheshire"
    side: "right"
    text:
      - "Слушаемся!"
  - char: "monarch"
    side: "right"
    text:
      - "Слушаемся!"
  - char: "cheshire"
    side: "left"
    text:
      - "Ха-ха-ха! Подумать только, первая же миссия — и сразу такой масштаб!"
  - char: "neptune"
    side: "right"
    text:
      - "И не говори~ Стоит поблагодарить одну «самовольную особу» за то, что мы так быстро перешли к настоящему делу."
      - "Это первая совместная операция кораблей-прототипов Королевского Флота. Давайте же завершим её изящно~"


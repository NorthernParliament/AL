chapter1:
  rows:
  - char: "monarch"
    side: "left"
    text:
      - "Фух... фух... фух..."
  - text:
      - "В тренировочном отсеке Монарх только что завершила серию высокоинтенсивных упражнений."
  - char: "monarch"
    side: "left"
    text:
      - "Артиллерийские стрельбы окончены. Приступаю к проверке снаряжения..."
      - "Оснастка в норме. Точность и мощь — на прежнем уровне. Можно переходить к следующему этапу."
      - "Дальше по плану — практика фехтования..."
      - "Ха!"
  - text:
      - "Каждый выпад Монарх сопровождала коротким резким выдохом."
      - "В этом действии не было особого практического смысла; возможно, ей просто казалось, что так в тренировочном зале становится чуть меньше мертвенной тишины."
  - char: "monarch"
    side: "left"
    text:
      - "...Уже столько времени?"
      - "Тренировка окончена. Пора пополнить запасы."
      - "............"
      - "Залп, взмах меча, залп, взмах меча... Снова еще один бессмысленный день."
      - "Даже Кинг Джордж V может свободно бороздить просторы океана, в то время как я не могу сделать абсолютно ничего..."
      - "Ни ожиданий, ни благословений... Неужели в этом и заключается вердикт Королевского Флота?"
      - "Если так, то зачем было призывать меня в этот мир..."
      - "В чём же смысл моего существования здесь?!"

chapter1:
  rows:
  - char: "hood_rad"
    side: "left"
    text:
      - "Спасибо всем, что приехали за мной. Позвольте мне немного собраться, и я покину это место вместе с вами~"
  - text:
      - "Сегодня был день отъезда Худ. Группы горничных, рыцарский орден — из-за шумной толпы обычно безмолвное место наполнилось жизнью."
  - char: "monarch"
    side: "left"
    text:
      - "Должно быть, они думают, что это обычный санаторий... Или же они действительно знают о тяжести болезни леди Худ?.."
      - "Впрочем, это уже не касается меня — той, кто обязана здесь остаться."
  - text:
      - "Находясь в подземном комплексе, Монарх наблюдала через экраны мониторов за тем, как толпа постепенно удаляется."
  - char: "monarch"
    side: "left"
    text:
      - "...Пора на тренировку."
chapter2:
  rows:
  - char: "vanguard"
    side: "left"
    text:
      - "(Наконец-то эскорт окончен... Я уже попросила девочек из команды горничных заранее отнести журналы ко мне в комнату...)"
      - "(Нужно еще совсем немного постоять на посту, и можно будет идти отдыхать! >~<!)"
  - char: "monarch"
    side: "right"
    text:
      - "Это... Вангард, личный рыцарь Куин Элизабет?"
      - "Раз здесь Вангард, значит, и сама Элизабет тоже прибыла... Хотя она так и не показалась среди тех, кто встречал Худ."
      - "Какое безразличие... Точно такое же, как и по отношению ко мне."
      - "Но это отличный шанс. Если я смогу одолеть Вангард..."
chapter3:
  rows:
  - char: "monarch"
    side: "left"
    text:
      - "Прошу прощения, мисс Вангард."
  - char: "vanguard"
    side: "right"
    text:
      - "Вы... корабль-прототип Монарх? Могу я чем-то помочь?"
  - char: "monarch"
    side: "left"
    text:
      - "Неподалеку есть отличный полигон. Знаю, это звучит внезапно, но не желаете ли вы сразиться со мной?"
  - char: "vanguard"
    side: "right"
    text:
      - "(Дуэль... Какая морока — практиковаться после того, как проделала такой долгий путь... Попробую вежливо отказаться и перенести на потом.)"
      - "Прошу прощения, но боюсь, это невозможно. Как видите, я сейчас на посту и не имею права самовольно его покидать."
      - "Но если в будущем представится такая возможность, я непременно скрещу с вами мечи!"
  - char: "monarch"
    side: "left"
    text:
      - "Вот как... Я поняла. Тогда не буду мешать, честь имею."
      - "(Обычная вежливость... Видимо, сейчас я действительно не заслуживаю даже права быть её противником...)"


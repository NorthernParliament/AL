chapter1:
  rows:
  - char: "repulse_meta"
    side: "left"
    status: "is-meta"
    text:
      - "Итак — в нашем маленьком замке снова воцарился покой."
      - "...Правда, утихомирить смятение в душе не так-то просто."
      - "Кто бы мог подумать, что нас разыщет именно Вангард, да ещё и в разгар поисков пропавшей Её Величества..."
  - char: "renown_meta"
    side: "right"
    status: "is-meta"
    text:
      - "Судьба — штука, полная совпадений, не так ли?"
  - char: "repulse_meta"
    side: "left"
    status: "is-meta"
    text:
      - "Пожалуй... Судьба — это нечто совершенно лишенное логики."
      - "Сестрёнка, чем займёмся? Все планы на сегодня пошли прахом..."
  - char: "renown_meta"
    side: "right"
    status: "is-meta"
    text:
      - "Неизвестно, сколько времени пройдёт, прежде чем они закончат свои дела и вернутся за нами."
      - "И неизвестно, когда мы сможем вернуться сюда снова после того, как уйдём..."
      - "Давай совершим обход."
      - "Ещё раз внимательно осмотрим наш маленький дом, который мы создавали все эти годы."
      - "Давай насладимся мгновением тишины перед тем, как снова броситься в бой..."

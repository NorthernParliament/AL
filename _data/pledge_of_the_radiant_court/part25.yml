chapter1:
  rows:
  - char: "renown"
    side: "left"
    text:
      - "Леди Вангард, Пьюрифайер прибыла в точку сбора."
  - char: "purifier"
    side: "right"
    text:
      - "Йо, Королевский Флот! Пунктуально, ничего не скажешь."
  - char: "repulse"
    side: "left"
    text:
      - "Ты что-то припозднилась, мы тебя уже заждались..."
  - char: "purifier"
    side: "right"
    text:
      - "Ха?! Да будет вам известно: это вы пришли слишком рано, а не я опоздала!"
      - "Но то, что вы не стали пороть горячку и следовали инструкциям — это похвально. Если бы ваша Энтерпрайз была хоть на пятую часть такой же послушной, как вы..."
      - "У нас тут скрытая операция. Если вы устроите дебош и заставите Совет стоять на ушах, разгребать последствия будет той еще морокой..."
  - char: "indomitable"
    side: "left"
    text:
      - "Ближе к делу..."
  - char: "purifier"
    side: "right"
    text:
      - "Все приготовления завершены! Спрячьте свои пушки, тихо следуйте за мной и эффектно завершите миссию!"
  - char: "indomitable"
    side: "left"
    text:
      - "Пьюрифайер... Тебе не кажется, что со времени нашей последней встречи ты как-то слишком сильно изменилась?"
  - char: "purifier"
    side: "right"
    text:
      - "А?.. Ты про моё основное вооружение? Я его только что проапгрейдила."
  - char: "indomitable"
    side: "left"
    text:
      - "Нет... Я про твой характер."
  - char: "purifier"
    side: "right"
    text:
      - "А-а, это... Обсервер посоветовала нам побольше изучать человеческое мышление и эмоции, так что в последнее время я плотно занимаюсь самообразованием."
      - "Что, и правда заметно?"
  - char: "indomitable"
    side: "left"
    text:
      - "...И где же ты этому учишься? У Антиох ведь не так много возможностей контактировать с обычными людьми."
  - char: "purifier"
    side: "right"
    text:
      - "Фильмы, манга, игры, соцсети~ Есть полно способов учиться, даже не вступая в прямой контакт с человечеством."
  - char: "vanguard"
    side: "left"
    text:
      - "Так, вернемся к делу. Её Величество ждёт нас, пора выдвигаться."
      - "То, что Её Величество оказалась в опасности — моё упущение как личного рыцаря... Я не смогла вовремя распознать маневры Совета."
      - "Дальнейший путь за тобой. Давай вместе вернем Её Величество домой!"

chapter1:
  rows:
  - char: "indomitable"
    side: "left"
    text:
      - "В этот раз перед нами предстал совсем другой пейзаж..."
  - char: "revenge"
    side: "right"
    text:
      - "До этого был первобытный лес, а теперь — лес из бетона и стали."
  - char: "bellona"
    side: "left"
    text:
      - "Тоже город, но он выглядит куда масштабнее наших..."
  - char: "jervis"
    side: "right"
    text:
      - "Наконец-то появилось реальное ощущение, что мы прибыли в другой мир."
  - char: "indomitable"
    side: "left"
    text:
      - "А, Вангард! Кажется, на приборах появилася ещё один набор координат?"
  - char: "vanguard"
    side: "right"
    text:
      - "Хм? Дай взгляну... Для этого перемещения я выбрала одну из уже существующих координат. Теоретически, новых появиться не должно было..."
      - "Неужели Камелотом пользуется кто-то еще, кроме нас?"
  - char: "indomitable"
    side: "left"
    text:
      - "Э-э... Разве Сад Камелота не находится в нашем единоличном пользовании?"
  - char: "vanguard"
    side: "right"
    text:
      - "В этом и заключается та сложная часть, о которой я говорила ранее. Если хочешь, я могу попытаться объяснить."
  - char: "indomitable"
    side: "left"
    text:
      - "Нет, не хочу... Давайте лучше по старинке разведаем обстановку~"
  - char: "vanguard"
    side: "right"
    text:
      - "Я заметила в небе самолеты незнакомых моделей. Будьте осторожны при запуске палубной авиации."
      - "Уровень технологий здесь может значительно превосходить наши представления. Пока ситуация не прояснится — не выдавайте себя."

chapter2:
  rows:
  - char: "indomitable"
    side: "left"
    text:
      - "Твоя осторожность оправдана, Вангард. Я обнаружила... сцену, которую крайне трудно объяснить."
  - char: "vanguard"
    side: "right"
    text:
      - "Постарайся."
  - char: "indomitable"
    side: "left"
    text:
      - "Я вижу флот Сирен, ровными рядами пришвартованный к городским причалам..."
  - char: "vanguard"
    side: "right"
    text:
      - "Сирены уже захватили это место?!"
  - char: "indomitable"
    side: "left"
    text:
      - "Это больше похоже на мирное сосуществование... Неподалеку я видела, как флот Сирен идет в одном строю с торговыми судами."
  - char: "revenge"
    side: "right"
    text:
      - "А какова вероятность, что какая-то фракция создала копии серийных моделей Сирен?"
  - char: "indomitable"
    side: "left"
    text:
      - "Нельзя исключать. Технологический уровень здесь явно выше нашего, однако модели Сирен выглядят устаревшими... пожалуй, даже старее первой серии."
  - char: "vanguard"
    side: "right"
    text:
      - "Есть ещё какие-нибудь находки? Вы нашли Её Величество?"
  - char: "indomitable"
    side: "left"
    text:
      - "М-м... Если Её Величество направилась вглубь города, найти её будет непросто."
      - "Но постой... Самолёты, летевшие в сторону открытого моря, внезапно пропали!"
  - char: "bellona"
    side: "right"
    text:
      - "Их атаковал противник?"
  - char: "indomitable"
    side: "left"
    text:
      - "До потери связи признаков атаки не было. Это больше похоже на обрыв сигнала при входе в Зеркальное море!"
  - char: "vanguard"
    side: "right"
    text:
      - "Я как раз гадала, почему столь масштабное появление Камелота не вызвало паники в городе."
      - "Похоже, мы удачно приземлились на самой границе Зеркального моря."
  - char: "indomitable"
    side: "left"
    text:
      - "Получается... те Сирены у причалов всё-таки настоящие?"
  - char: "vanguard"
    side: "right"
    text:
      - "Да. Мирное сосуществование в городе может быть лишь ширмой, а в этих водах скрыты иные секреты..."




chapter1:
  rows:
  - char: "cheshire"
    side: "left"
    text:
      - "Ваше Величество-о-о! Беда! Случилось нечто ужасное!!"
  - char: "belfast"
    side: "right"
    text:
      - "Мисс Чешир, мисс Нептун... Уже так поздно, почему вы ещё не спите? Что произошло?"
  - char: "neptune"
    side: "left"
    text:
      - "Белфаст, Её Величество у себя? У нас есть крайне важное донесение, которое мы должны передать ей лично."
  - char: "belfast"
    side: "right"
    text:
      - "Её Величество сейчас занята работой. Если это возможно, расскажите сначала мне, а я передам информацию дальше."
  - char: "queen_elizabeth"
    side: "left"
    text:
      - "Не утруждайся, Белфаст, Я уже здесь."
      - "Из-за ваших криков за дверью Мои мысли всё равно окончательно спутались."
  - char: "cheshire"
    side: "right"
    text:
      - "Глубочайшие извинения, Ваше Величество! Но случилось правда кое-что супер-невероятное!"
  - char: "queen_elizabeth"
    side: "left"
    text:
      - "Я слушаю. Так что стряслось?"
  - char: "cheshire"
    side: "right"
    text:
      - "Монарх исчезла!!!!!"
  - char: "queen_elizabeth"
    side: "left"
    text:
      - "Хм... Чего-о-о?.."

chapter2:
  rows:
  - char: "neptune"
    side: "left"
    text:
      - "Мы сейчас в жилом блоке Монарх, она всегда жила здесь одна."
  - char: "cheshire"
    side: "right"
    text:
      - "До этого она говорила с нами на всякие серьёзные темы, и мы немного забеспокоились..."
      - "Вот и решили зайти к ней сегодня вечером поиграть, но в итоге так и не дождались её возвращения."
  - char: "neptune"
    side: "left"
    text:
      - "Мы обыскали весь комплекс несколько раз и нигде её не нашли. Поэтому поспешили к вам."
  - char: "queen_elizabeth"
    side: "right"
    text:
      - "М-да... Если она просто вышла проветриться — это полбеды. Но если она вошла туда... это будет проблемой."
  - char: "belfast"
    side: "left"
    text:
      - "Ваше Величество, Шеффилд прислала сообщение: некоторое время назад она видела Монарх, действующую в одиночку."
      - "Судя по всему, она направилась вглубь комплекса, к подземным ярусам."
  - char: "queen_elizabeth"
    side: "right"
    text:
      - "Неужели она подслушала наши прошлые разговоры?.. Точно, дело дрянь! Скорее, идёмте проверим!"

chapter3:
  rows:
  - char: "queen_elizabeth"
    side: "left"
    text:
      - "Эх... Так и знала, устройство уже было активировано."
      - "Ну и ну, теперь проблем не оберешься. О чем только думала эта Монарх, решив отправиться туда в одиночку..."
      - "Делать нечего. Мы тоже активируем Сад Камелота и вернем её обратно!"
  - char: "sheffield"
    side: "right"
    text:
      - "Ваше Величество, показатели на приборной панели кажутся нестабильными. Рекомендую для начала провести калибровку систем."
  - char: "queen_elizabeth"
    side: "left"
    text:
      - "А...? И впрямь, какие-то странные аномалии... Экстренная остановка!"
  - char: "sheffield"
    side: "right"
    text:
      - "Слушаюсь."
  - text:
      - "Шеффилд изо всех сил ударила по кнопке аварийного стопа, но внезапная мощная волна отдачи отбросила её прочь."
  - char: "queen_elizabeth"
    side: "left"
    text:
      - "Шеффи! Ты в порядке? Шеффи!"


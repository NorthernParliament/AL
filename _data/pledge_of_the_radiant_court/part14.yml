chapter1:
  rows:
  - char: "purifier"
    side: "left"
    status: "is-yellow"
    text:
      - "Пришли. Системы впереди находятся под прямым контролем Совета. Чтобы не раскрыть себя, я могу проводить вас только до этого места."
      - "Вон то здание впереди — это комплекс, где содержат вашу королеву. Не забудьте обходить морские сканеры."
      - "Как только вызволите её, выбирайтесь отсюда любым удобным способом. Но запомните! Никакого! Лишнего! Шума!"
  - char: "jervis"
    side: "right"
    text:
      - "Пьюрифайер, ты такая ворчливая..."
  - char: "purifier"
    side: "left"
    status: "is-yellow"
    text:
      - "Это потому, что от вас одни беспокойства!"
      - "Меня уже какое-то время вызывают по связи — нужно формировать флот для поимки террористов, которые недавно устроили здесь бардак!"
      - "Так что я пошла по делам! Скоро скину вам координаты поисковых групп, не забудьте с ними разминуться!"
  - text:
      - "Пьюрифайер беззаботно повернулась к флоту Королевского Флота спиной и скрылась из виду."
  - char: "bellona"
    side: "left"
    text:
      - "Если мы сейчас дадим по ней залп..."
  - char: "vanguard"
    side: "right"
    text:
      - "Сейчас не время для этого. Сначала нужно найти Её Величество."

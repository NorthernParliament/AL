chapter1:
  rows:
  - text:
      - "Распахнув тяжелые двери комплекса, отряд наконец увидел цель своих поисков."
  - char: "vanguard"
    side: "left"
    text:
      - "Ваше Величество, простите, что мы так долго."
  - char: "queen_elizabeth"
    side: "right"
    text:
      - "А, это ты, Вангард. И Монарх с собой привела."
      - "Превосходно! Я так и знала, что ты не оставишь Моё Величество в беде после исчезновения!"
  - char: "jervis"
    side: "left"
    text:
      - "Ваше Величество, вы в порядке? Вас что-нибудь беспокоит? Позвольте мне провести осмотр."
  - char: "queen_elizabeth"
    side: "right"
    text:
      - "Не стоит, Джервис, со мной всё хорошо."
  - char: "bellona"
    side: "left"
    text:
      - "Ваше Величество, здесь небезопасно. Пожалуйста, уходим скорее."
  - char: "queen_elizabeth"
    side: "right"
    text:
      - "Спешить не обязательно. Если не считать того, что двери не открывались изнутри, тут вполне себе безопасно."
      - "Помещения просторные, интерьер обставлен со вкусом, да и все условия для отдыха налицо."
      - "Вы проделали долгий путь и наверняка устали, так что отдохните немного. Местный чай и сладости весьма недурны."
  - char: "indomitable"
    side: "left"
    text:
      - "Ваше Величество...?! Мы же в самом центре Зеркального моря Сирен!"
  - char: "queen_elizabeth"
    side: "right"
    text:
      - "Отдыхайте спокойно, у меня всё под контролем."
      - "Кстати, многие из вас ведь впервые видят Нептун и Чешир? Раз уж скрывать их больше нет смысла, воспользуйтесь моментом и познакомьтесь поближе."
      - "Вангард и Монарх — за мной в кабинет. Мне нужно кое-что обсудить."

chapter2:
  rows:
  - char: "vanguard"
    side: "left"
    text:
      - "……Так вот оно что… Монарх, ты зашла слишком далеко!"
  - char: "monarch"
    side: "right"
    text:
      - "Прошу прощения... У меня и в мыслях не было втягивать в это Королеву и всех вас."
  - char: "vanguard"
    side: "left"
    text:
      - "Какими бы ни были твои намерения! У тебя есть хоть капля рыцарского самосознания?!"
  - char: "monarch"
    side: "right"
    text:
      - "Я — рыцарь Королевского Флота, и я должна делать то, что пойдёт ему на пользу."
      - "Если бы мы и дальше продолжили проявлять нерешительность, то действительно навсегда потеряли бы леди Худ!"
  - char: "vanguard"
    side: "left"
    text:
      - "...Это всё равно не оправдывает твоего безрассудного самоуправства! Ты хоть понимаешь, что такое дисциплина и повиновение?!"
      - "Что, если бы эта операция не только провалилась, но и привела к повреждению Камелота?!"
  - char: "queen_elizabeth"
    side: "right"
    text:
      - "Довольно... Сейчас не время для ссор."
      - "На данный момент, если не считать Шеффилд, которую по чистой случайности оглушили, и Монарх, получившую ранения из-за своей самодеятельности, мы не понесли иных потерь."
      - "Благодаря верному решению Вангард, в этом походе нам даже удалось установить дружественный контакт с двумя МЕТА."
      - "Сейчас я не желаю больше развивать эту тему и искать виноватых."
  - char: "vanguard"
    side: "left"
    text:
      - "...Слушаюсь."
  - char: "queen_elizabeth"
    side: "right"
    text:
      - "Монарх, мне нужно больше сведений о Бон Омм Ричард. Что произошло между вами до моего прибытия?"
  - char: "monarch"
    side: "left"
    text:
      - "Мне трудно описать это словами... Казалось, она постоянно пыталась вмешаться в мои мысли, а некоторые голоса звучали прямо у меня в голове..."
      - "Она без конца убеждала меня стать МЕТА, а ещё... пыталась бить по моим психологическим слабостям."
      - "Хотя со стороны казалось, что она получила в бою гораздо больше повреждений, по какой-то причине у меня возникло чувство, что если бы это продолжилось — проигравшей оказалась бы я."
      - "Одним словом, это безумный и крайне навязчивый противник..."
  - char: "vanguard"
    side: "right"
    text:
      - "Хм... Раз уж даже тебе она показалась настолько проблемной, значит, враг действительно серьезный."
  - char: "queen_elizabeth"
    side: "left"
    text:
      - "Так Я и думала... Я тоже ощутила некую неописуемую жуть."
      - "Сад Камелота — это ядро искусственной сингулярности, и вмешаться в его работу не так-то просто."
      - "Было такое чувство, будто она знакома с логикой работы этого устройства лучше нас... И обладает силой, превосходящей мощь самой сингулярности..."
      - "Хотелось бы верить, что она не бросится в погоню, но, боюсь, это лишь Мои несбыточные мечты."
      - "Если битвы не избежать... что ж, нет худа без добра: когда Шеффи придет в себя, она наверняка приведет подкрепление."
      - "Ладно, идите к остальным и готовьтесь к отбытию. Я закончу с чаем и сразу выйду."
  - char: "vanguard"
    side: "right"
    text:
      - "Слушаюсь."

chapter3:
  rows:
  - text:
      - "После того как все вышли..."
  - char: "queen_elizabeth"
    side: "left"
    text:
      - "Благодарю за обмен информацией, я распоряжусь ею с умом. Что ж, Мне пора возвращаться. Береги себя."
  - text:
      - "Глядя на закрытую дверь спальни в глубине покоев, Елизавета произнесла эти слова на прощание..."


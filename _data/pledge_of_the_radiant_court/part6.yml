chapter1:
  rows:

    - char: renown_meta
      side: left
      status: is-meta
      text:
        - "В месте, чьё название стёрлось из памяти за давностью лет, разразилась великая битва."

chapter2:
  rows:

    - char: helena_meta
      side: left
      status: is-meta
      text:
        - "Вторжение основных сил прошло успешно. Энтерпрайз, мы благополучно вошли в пространство Мейнфрейма Зеро."

    - char: enterprise_meta
      side: right
      status: is-meta
      text:
        - "Отлично. Теперь нужно установить местоположение самого Мейнфрейма..."

    - char: memphis_meta
      side: left
      status: is-meta
      text:
        - "Внимание! Несколько Арбитров приближаются к нам на высокой скорости."
        - "Расчётное время контакта — через 3 секунды!"

    - char: takao_meta
      side: right
      status: is-meta
      text:
        - "Зло... будет... РАССЕЧЕНО!"

    - char: hermit
      side: left
      status: is-red
      text:
        - "Хм, нашу засаду раскрыли?"

    - char: temperance
      side: right
      status: is-red
      text:
        - "Вероятность того, что эта атака будет обнаружена, изначально была крайне высока. Впрочем, на исход боя это не повлияет."

    - char: strength
      side: left
      status: is-red
      text:
        - "Раз попытка «обезглавливания» провалилась, перейдём к честному бою. Пусть говорит сила."

    - char: repulse_meta
      side: right
      status: is-meta
      text:
        - "Какая самоуверенность. Если бы я не знала, на что вы способны на самом деле, я бы почти поверила. Энтерпрайз, Такао — предоставьте этих троих нам с сестрой! Мы их задержим."

    - char: renown_meta
      side: left
      status: is-meta
      text:
        - "Да. Для штурмовой операции каждая секунда на счету. Немедленно отправляйтесь на уничтожение Мейнфрейма Зеро."

    - char: helena_meta
      side: right
      status: is-meta
      text:
        - "Стой... Рядом притаились другие враги... Они там, Фусо!"

    - char: fusou_meta
      side: left
      status: is-meta
      text:
        - "Координаты подтверждены... Сгиньте в призрачном море! Хотя я знаю, что у вас нет такой вещи, как душа..."

    - char: empress
      side: right
      status: is-red
      text:
        - "Дерзость. Жалкие трюки — и вы смеете демонстрировать их перед Моим лицом?"

    - char: hiryuu_meta
      side: left
      status: is-meta
      text:
        - "Императрица тоже здесь?! Похоже, мы выбрали идеальное место для удара~"

    - char: empress
      side: right
      status: is-red
      text:
        - "Самоуверенность ведёт лишь к гибели. Вы так и не выучили этот урок."
        - "Пока вы здесь развлекались, Иерофант и Дьявол уже захватили ваши опорные пункты снабжения."
        - "Повешенный и Смерть отрезали вам пути к отступлению. Влюблённые, Колесница и Луна прибудут в течение пяти минут. Вы окружены."

    - char: enterprise_meta
      side: left
      status: is-meta
      text:
        - "Впечатляющий размах. Однако... у вас нет этих пяти минут. Это все силы, что Зеро выставила для своей защиты?"

    - char: empress
      side: right
      status: is-red
      text:
        - "Нет. Ты с самого начала заблуждалась в одном важном вопросе. Зеро здесь не было, нет и никогда не будет."

    - char: enterprise_meta
      side: left
      status: is-meta
      text:
        - "...Что?"

    - char: empress
      side: right
      status: is-red
      text:
        - "В этой битве у вас нет ни единого шанса на победу. Всё идёт в строгом соответствии с расчётами..."

    - char: tower544
      side: left
      status: is-purple
      text:
        - "53 74 61 72 74 75 70 62 61 63 6B 75 70 70 72 6F 74 6F 63 6F 6C 2E (Запущен протокол резервного копирования)"
        - "45 78 65 63 75 74 65 74 72 61 6E 73 70 6F 72 74 70 72 6F 74 6F 63 6F 6C 2E (Выполнение транспортного протокола)"

chapter3:
  rows:

    - char: renown_meta
      side: left
      status: is-meta
      text:
        - "После этого... пространство, в котором мы находились, было разорвано бесчисленными трещинами."
        - "Океан и небо разлетелись на куски, и в этом хаосе нас затянуло в одну из расщелин... Должно быть, нам просто повезло, что нас выбросило именно здесь."
        - "Оказаться в безлюдном первобытном лесу без каких-либо средств для перемещения — это, несомненно, было поводом для отчаяния. По крайней мере, поначалу."
        - "Сперва мы искали способ уйти."
        - "Позже мы искали причину, чтобы уйти."
        - "А ещё позже мы приняли решение. Раз наш мир уже уничтожен, то какой смысл возвращаться и продолжать сражаться дальше?"

    - char: vanguard
      side: right
      text:
        - "Так вы... просто остались здесь жить?"

    - char: renown_meta
      side: left
      status: is-meta
      text:
        - "Именно так. Хоть здесь и скудно с ресурсами, это место бесконечно далеко от войн и распрей. Здесь царит покой."
        - "Если хотите, вы тоже можете остаться."
        - "Оставайтесь с нами, чтобы в тишине наблюдать за тем, как сменяются эпохи... Возможно, именно в этом и заключается то удовольствие, которое получают Сирены от своих наблюдений."

    - char: vanguard
      side: right
      text:
        - "Благодарю за доброту, но позвольте нам отказаться. Мы — рыцари Её Величества, и на нас возложена важная миссия."

    - char: renown_meta
      side: left
      status: is-meta
      text:
        - "А ты совсем не меняешься, где бы ни оказалась..."

    - char: vanguard
      side: right
      text:
        - "...Ты знала меня? Ту, что была твоей соратницей?"

    - char: renown_meta
      side: left
      status: is-meta
      text:
        - "Разумеется. Я и сама когда-то была рыцарем Королевского Флота, как я могла тебя не знать?"
        - "Рыцарь среди рыцарей, личный телохранитель Её Величества королевы."

    - char: vanguard
      side: right
      text:
        - "В твоём рассказе о той великой битве не прозвучало ни моего имени, ни имени Её Величества. Почему?"

    - char: renown_meta
      side: left
      status: is-meta
      text:
        - "……В том сражении участвовало слишком много людей. В коротком рассказе я не могла упомянуть каждого."

    - char: vanguard
      side: right
      text:
        - "Если бы Её Величество действительно присутствовала там лично, разве стали бы её рыцари вычеркивать из истории описание её доблести в бою?"

    - char: renown_meta
      side: left
      status: is-meta
      text:
        - "Всё это дела минувших дней. Продолжать этот разговор — значит лишь множить боль и пустоту. Я не хочу больше об этом говорить."
        - "Раз уж у вас есть задание, не смею вас задерживать. Поступайте, как знаете."

    - char: vanguard
      side: right
      text:
        - "Да, мы уйдём отсюда, чтобы продолжить поиски Её Величества и исполнить её волю."
        - "А как же вы? Ваша рыцарская клятва, данная Её Величеству — она всё ещё в силе?"

    - char: renown_meta
      side: left
      status: is-meta
      text:
        - "Я понимаю, к чему ты клонишь. Оставь это."
        - "Мы уже решили наслаждаться мирной жизнью здесь."
        - "Мне жаль, но мы ничем не можем помочь вам в тех испытаниях, через которые вы проходите."

    - char: vanguard
      side: right
      text:
        - "Я спрашиваю о клятве. Клятва, которую вы принесли перед лицом Её Величества — она всё ещё что-то значит?"
        - "Вы всё ещё рыцари, верные Королевскому Флоту и своей Королеве?"

    - char: renown_meta
      side: left
      status: is-meta
      text:
        - "Нашей Королевы больше нет! Давно... давным-давно её не стало..."     

    - char: vanguard
      side: right
      text:
        - "Но наша Королева жива."
        - "В конце концов, будь она «вашей» или «нашей» — Королевский Флот остаётся Королевским Флотом, а Её Величество — Её Величеством, не так ли?"
        - "Как ты думаешь, зачем Её Величество создала Сад Камелота, чтобы связать нас из разных миров?"
        - "Почему в вашем мире Её Величество изо всех сил пыталась спасти вас, чтобы вы могли продолжить борьбу?"
        - "Мы — Королевство, над которым никогда не заходит солнце. От места, где оно садится, до места, где оно встаёт — всё это наши владения."
        - "И эти владения простираются сквозь пространство и само время..."
        - "Я верю, что именно в этом и заключался замысел Её Величества."

    - char: renown_meta
      side: left
      status: is-meta
      text:
        - "........."

    - char: vanguard
      side: right
      text:
        - "К тому же, глядя на то, как вы здесь живете, я поняла, что могу предложить вам аргумент, перед которым невозможно устоять."

    - char: renown_meta
      side: left
      status: is-meta
      text:
        - "...И какой же?"

    - char: vanguard
      side: right
      text:
        - "Если вы вернетесь с нами, то сможете пить настоящий королевский чёрный чай в неограниченных количествах."

    - char: repulse_meta
      side: left
      status: is-meta
      text:
        - "...Сестра, что нам делать? То, что она говорит, звучит так убедительно... Я уже почти согласна."

    - char: renown_meta
      side: right
      status: is-meta
      text:
        - "Даже если ты согласна, не обязательно говорить об этом вслух... Глупышка..."

    - char: vanguard
      side: left
      text:
        - "Ты так и не ответила прямо на мой вопрос. Твоя клятва, принесённая в далёком прошлом, — она всё ещё в силе?"

    - char: renown_meta
      side: right
      status: is-meta
      text:
        - "...В силе."

chapter4:
  rows:

    - char: vanguard
      side: left
      text:
        - "Ха-ха, тогда давайте принесём её здесь снова вместе."
        - "Как продолжение старых обетов и как начало чего-то совершенно нового..."
        - "Леди Ринаун, леди Рипалс! Ради Королевского Флота, ради Её Величества Элизабет — давайте сражаться плечом к плечу!"

    - char: renown_meta
      side: right
      status: is-meta
      text:
        - "...Сдаюсь перед твоим упорством."
        - "Свет, что ты излучаешь, настолько ярок, что он озарил наше тёмное небо и вновь разжёг пламя в наших сердцах."
        - "Каким бы ни был исход, давай попробуем ещё раз... Раз уж судьба вновь связала нас воедино, мы вместе очистим путь Королевского Флота от тьмы!"

    - char: repulse_meta
      side: left
      status: is-meta
      text:
        - "О-о~ Давно я не видела сестрёнку такой воодушевлённой. Раз она так говорит, то я, конечно, тоже в деле!"
        - "Где бы мы ни были — в прошлом, настоящем или будущем — священная клятва станет вечной связью между нами и Её Величеством!"

    - char: vanguard
      side: right
      text:
        - "Боже, храни Королевский Флот! Боже, храни Королеву!"

chapter5:
  rows:

    - char: vanguard
      side: left
      text:
        - "В таком случае мы выдвигаемся первыми. Как только закончим с текущими делами, мы вернёмся за вами, чтобы забрать отсюда."

    - char: renown_meta
      side: right
      status: is-meta
      text:
        - "Мне крайне неловко... Хоть мои слова только что и звучали величественно, мы слишком долго не занимались обслуживанием своего снаряжения. Нам потребуется время, чтобы полностью подготовиться к бою."

    - char: vanguard
      side: left
      text:
        - "Ничего страшного! Это я внезапно обратилась к вам с такой настойчивой просьбой. Само ваше согласие присоединиться к нам — уже огромная помощь."

    - char: repulse_meta
      side: right
      status: is-meta
      text:
        - "Тогда желаем вам удачи в дальнейшем пути!"

    - char: vanguard
      side: left
      text:
        - "Да. На очереди второй набор координат. Выступаем!"
chapter1:
  rows:
  - char: "monarch"
    side: "left"
    text:
      - "Внутри Врат Авалона... Поистине величественное пространство."
      - "И подумать только, столь прекрасный пейзаж всё это время был скрыт совсем рядом..."
      - "Элизабет и впрямь обожает всё прятать..."
  - text:
      - "Следуя по тропе через леса и ручьи, Монарх вышла к пусковому устройству внутри замка."
  - char: "monarch"
    side: "left"
    text:
      - "...Судя по всему, достаточно лишь активировать этот механизм."
      - "Ради спасения чести Королевского Флота — по крайней мере, в этот миг мой меч наконец-то делает что-то стоящее..."
      - "Любовь не должна требовать ничего взамен..."
      - "Своими действиями... я докажу свою ценность для Королевского Флота!"
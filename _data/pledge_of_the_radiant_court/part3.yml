chapter1:
  rows:

    - char: indomitable
      side: left
      text:
        - "Посмотрите все... На полу в зале кто-то лежит!"

    - char: revenge
      side: right
      text:
        - "Это что... мисс Шеффилд?!"

    - text:
      - "В центре пышно украшенного зала возвышалось массивное устройство весьма футуристичного вида..."
      - "Три полукруглых каркаса образовывали конструкцию, напоминающую врата, а перед ними располагалась панель управления со множеством сложных приборов."
      - "Шеффилд лежала на полу прямо перед устройством."

    - char: vanguard
      side: left
      text:
        - "Рыцари, занять оборонительные позиции! Нападавшие могут быть где-то рядом!"

    - char: revenge
      side: right
      text:
        - "Слушаемся!"

    - char: bellona
      side: right
      text:
        - "Слушаемся!"

    - char: indomitable
      side: left
      text:
        - "Мисс Шеффилд, вы в порядке?.."

    - char: jervis
      side: right
      text:
        - "Леди Индомитебл, прошу, не двигайте её бездумно. Дайте мне сначала её осмотреть."

    - text:
      - "Джервис остановила Индомитебл, собиравшуюся поднять Шеффилд, и, подойдя ближе, приступила к тщательному осмотру."

    - char: indomitable
      side: left
      text:
        - "С Шеффи всё будет хорошо?.."

    - char: jervis
      side: right
      text:
        - "М-м... Похоже на временную потерю сознания из-за сильной ударной волны. Следов боя или внешних повреждений не обнаружено, так что серьёзной опасности нет."

    - char: vanguard
      side: left
      text:
        - "Эти следы на оснастке... Неужели произошёл взрыв из-за сбоя при выводе энергии?"
        - "Отставить боевую готовность. Обморок Шеффилд, скорее всего, не был вызван внешним нападением."

    - char: indomitable
      side: right
      text:
        - "Какое опасное устройство! Так это и есть та самая машина, позволяющая отправляться в другие... «миры»?"

    - char: vanguard
      side: left
      text:
        - "Именно так. Судя по записям использования, в памяти устройства уже сохранены два разных набора координат."
        - "Неужели Её Величество что-то искала?.."

    - char: indomitable
      side: right
      text:
        - "В таком случае, если мы отправимся по последним координатам, то сможем найти Её Величество?"

    - char: vanguard
      side: left
      text:
        - "К сожалению, всё не так просто… Сад Камелота может существовать в нескольких мирах одновременно."
        - "Поэтому система не записывает хронологический порядок использования координат — в этом просто нет смысла."

    - char: indomitable
      side: right
      text:
        - "Совершенно ничего не понимаю…"

    - char: vanguard
      side: left
      text:
        - "Объяснять слишком долго. Как бы то ни было, шансы пятьдесят на пятьдесят. Давайте испытаем удачу."

    - char: jervis
      side: right
      text:
        - "Леди Вангард, Шеффи, похоже, придёт в себя не скоро. Я останусь здесь, чтобы присмотреть за ней."

    - char: janus
      side: left
      text:
        - "Джервис… Позволь мне остаться и позаботиться о ней. Оберегать других — это то, что у меня получается лучше всего…"

    - char: jervis
      side: right
      text:
        - "Джанус...."

    - char: vanguard
      side: left
      text:
        - "Что ж, так и поступим. Мы действительно не можем оставить раненую союзницу одну. К тому же, когда Шеффилд очнётся, она сможет рассказать нам, что произошло."

    - char: jervis
      side: right
      text:
        - "Тогда полагаюсь на тебя, Джаус."

    - char: janus
      side: left
      text:
        - "…Есть!"

    - char: vanguard
      side: right
      text:
        - "Остальным подойти ко мне и встать внутри кругового узора на полу. Мы выступаем!"
chapter1:
  rows:
  - text:
      - "Шторм вместе с мрачными тучами постепенно затянул всё небо, однако даже посреди этой тьмы всё ещё мерцали яркие вспышки."
  - char: "indomitable"
    side: "left"
    text:
      - "Небо над полем боя принадлежит Королевскому Флоту! Здесь нет места для вашего бесчинства."
      - "Что ж, узрите меня в кои-то веки в «серьёзном режиме». Превратитесь все в праздничный фейерверк в ночном небе~"
  - text:
      - "Среди неизвестных врагов тоже было нечто похожее на палубную авиацию, однако Индомитебл уверенно подавляла эти силы."
  - char: "jervis"
    side: "left"
    text:
      - "Редко увидишь Индомитебл, использующую всю свою мощь."
  - char: "indomitable"
    side: "right"
    text:
      - "Это лишь простой расчет. Если не подавить врага в воздухе, в последующем бою нам придётся приложить куда больше усилий."
      - "А что касается тех, кто приближается по воде — оставим их пока нашему рыцарю-гвардейцу~"
  - char: "vanguard"
    side: "left"
    text:
      - "Положитесь на меня, мисс Индомитебл."
      - "Согласно приказу Её Величества, я уничтожаю врагов с дистанции. Но если кто-то посмеет подойти вплотную — мой меч сокрушит их так же эффективно."
      - "Как личный рыцарь, я обязательно проложу для всех путь вперёд!"
  - char: "indomitable"
    side: "right"
    text:
      - "Как хорошо, когда рядом есть кто-то столь надежный... Тогда я продолжу стараться, еще разок поднажму...!"
  - char: "vanguard"
    side: "left"
    text:
      - "Судя по моим наблюдениям, большинство врагов появляется на стыке черного шторма и поверхности моря. Индомитебл, не подпускай свои самолеты слишком близко к той зоне."
  - char: "indomitable"
    side: "right"
    text:
      - "Не волнуйся, этот шторм выглядит зловеще и опасно. Я ни за что не стану рисковать своими самолетами, отправляя их туда!"
      - "Но... даже если я не приближаюсь к нему, кажется, шторм сам направляется к нам!"
  - char: "vanguard"
    side: "left"
    text:
      - "Ты тоже так считаешь?.. Я думала, мне кажется, но, похоже, так оно и есть."
      - "Здесь нельзя оставаться надолго. Увеличиваем скорость, мы уже скоро будем у Камелота!"
  - char: "indomitable"
    side: "right"
    text:
      - "Погоди... Вангард! Впереди Пьюрифайер, и она приближается со своим флотом с явно недобрыми намерениями!"
  - char: "vanguard"
    side: "left"
    text:
      - "Пьюрифайер... Решила воспользоваться хаосом и напасть в такой момент?!"
  - char: "indomitable"
    side: "right"
    text:
      - "Хм, наконец-то она показала своё истинное лицо. Ну же, я проучу её как следует!"
  - text:
      - "Как раз в тот момент, когда девушки уже были готовы открыть огонь, в их каналы связи внезапно ворвался сигнал от Пьюрифайер."
  - char: "purifier"
    side: "left"
    status: "is-yellow"
    text:
      - "Эй-эй-эй! Я ещё издалека заметила, как вы целитесь мне прямо в голову! Вы чего удумали?!"
      - "На вызовы по вашим частотам никто не отвечал, так что ситуация экстренная — пришлось взламывать канал!"
  - char: "indomitable"
    side: "right"
    text:
      - "Раз сама понимаешь, что ситуация экстренная... говори по делу!"
  - char: "purifier"
    side: "left"
    status: "is-yellow"
    text:
      - "Не стреляйте! Я привела флот не для того, чтобы воевать с вами!"
  - char: "indomitable"
    side: "right"
    text:
      - "Тогда зачем же ты здесь?"
  - char: "purifier"
    side: "left"
    status: "is-yellow"
    text:
      - "Обсервер прислала меня разобраться с этими внезапно вылезшими БАГами!"
  - char: "indomitable"
    side: "right"
    text:
      - "...БАГами?"
  - char: "purifier"
    side: "left"
    status: "is-yellow"
    text:
      - "Ой... язык мой — враг мой. Забудьте, ничего-ничего!"
      - "Короче, просто проплывайте мимо. Я уже взяла под контроль все ближайшие флотилии, теперь они прекратят огонь по вам."
      - "А тех непонятных тварей, что неистово палят во все стороны у вас за спиной, я беру на себя!"
  - char: "indomitable"
    side: "right"
    text:
      - "Звучит на удивление надежно..."
  - char: "purifier"
    side: "left"
    status: "is-yellow"
    text:
      - "Да я вообще по жизни само надежность!"
      - "Ладно, мне еще целым флотом командовать, так что закругляемся! Вы уж там обязательно спасите свою Королеву!"
  - char: "indomitable"
    side: "right"
    text:
      - "Само собой!"

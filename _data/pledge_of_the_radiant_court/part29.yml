chapter1:
  rows:
  - char: "revenge"
    side: "left"
    text:
      - "Ваше Величество, вы в порядке?!"
  - char: "queen_elizabeth"
    side: "right"
    text:
      - "Я только что..."
  - char: "revenge"
    side: "left"
    text:
      - "Ваше Величество погрузились в глубокие раздумья сразу после того, как увидели чёрный шторм в небе."
      - "Чтобы не мешать вашим размышлениям, мы немного сбавили ход."
  - char: "queen_elizabeth"
    side: "right"
    text:
      - "Ах, да. Мы же сейчас находимся в процессе отхода... Площадь чёрного шторма стала ещё больше."
  - char: "bellona"
    side: "left"
    text:
      - "Именно так, Ваше Величество. И пока вы были сосредоточены, ситуация изменилась."
      - "Возле чёрного вихря из ниоткуда появилось множество неизвестных врагов. Леди Вангард и леди Индомитебл уже выдвинулись вперёд, чтобы расчистить путь."
      - "Тела этих врагов словно окутаны каким-то туманом; мы не можем определить ни их форму, ни тип."
      - "В то же время флот Сирен начал атаку как на нас, так и на этих неизвестных противников. Сейчас в секторе царит полный хаос."
      - "Ваше Величество, в целях безопасности, не лучше ли нам пойти в обход?"
  - char: "queen_elizabeth"
    side: "right"
    text:
      - "Нет, пройдём насквозь — прямо через строй Сирен."
      - "Хоть нас и будут атаковать, Сирены не бьют в полную силу, так что прорвёмся."
      - "А вот эти «неизвестные» вызывают у Меня очень нехорошее предчувствие..."
      - "Передай Мой приказ: всем кораблям ни в коем случае не вступать с ними в ближний бой! Уничтожайте их с дистанции!"
  - char: "revenge"
    side: "left"
    text:
      - "Слушаюсь. Прошу внимания, Ваше Величество — мы увеличиваем скорость!"

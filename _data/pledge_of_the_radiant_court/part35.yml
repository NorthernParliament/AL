chapter1:
  rows:
  - char: "queen_elizabeth"
    side: "left"
    text:
      - "А теперь, прошу обе стороны занять свои места!"
      - "И не забывайте Мои наставления: использовать только мечи, никакой артиллерии! Дружба — на первом месте, результат — на втором!"
      - "Сражайтесь изо всех сил, но знайте меру! Только до первого касания!"
  - char: "vanguard"
    side: "right"
    text:
      - "Ваше Величество, Ваши приказы запечатлены в моей памяти."
  - char: "monarch"
    side: "left"
    text:
      - "Да, мне всё ясно."
  - char: "queen_elizabeth"
    side: "right"
    text:
      - "Вот и славно!"
  - char: "hood"
    side: "left"
    text:
      - "Глядя на их юношеский задор, мне и самой захотелось немного размяться."
  - char: "king_george_v"
    side: "right"
    text:
      - "Твоё здоровье только-только пошло на поправку, так что на этот раз побудь зрителем и насладись дуэлью, которую устроила Её Величество."
      - "К тому же, если ты выйдешь на поле, никто из нас не посмеет поднять оружие, верно?"
  - char: "hood"
    side: "left"
    text:
      - "Это было лишь мимолётное желание~ Я не стану больше принуждать себя. Нужно беречь это с трудом обретённое выздоровление."
  - char: "repulse_meta"
    side: "right"
    status: "is-meta"
    text:
      - "Как ностальгично... Раньше мы тоже иногда вот так состязались друг с другом..."
  - char: "renown_meta"
    side: "left"
    text:
      - "Это точно... Правда, шума тогда было куда больше. В Пепле не было правила «без пушек», ха-ха..."

chapter2:
  rows:
  - char: "queen_elizabeth"
    side: "left"
    text:
      - "Та из вас, кто одержит победу — Вангард или Монарх — получит право бросить вызов Кинг Джордж V!"
  - char: "king_george_v"
    side: "right"
    text:
      - "Именно так, как и сказала Её Величество. Я с нетерпением жду схватки с победителем."
  - char: "monarch"
    side: "left"
    text:
      - "Превосходно. Я давно хотела помериться с тобой силами."
  - char: "vanguard"
    side: "right"
    text:
      - "Сначала посмотрим на результат нашего фехтования. Может статься, очередь до тебя так и не дойдет!"
      - "Не поддавайся, сражайся со мной в полную силу!"
  - char: "monarch"
    side: "left"
    text:
      - "Это как раз по мне!"
  - char: "queen_elizabeth"
    side: "right"
    text:
      - "Церемония приветствия окончена, обе стороны отсалютовали мечами. Отлично. Да начнется поединок!"

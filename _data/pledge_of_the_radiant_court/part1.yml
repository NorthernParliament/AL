chapter1:
  rows:

    - text:
      - "*Тук-тук-тук...*"
      - "*Тук-тук-тук-тук...*"

    - char: warspite
      side: left
      text:
        - "Странно. Обычно Белфаст уже давно бы открыла дверь..."
        - "Ваше Величество, я вхожу."

chapter2:
  rows:

    - text:
      - "Уорспайт заходит в обставленный классической мебелью кабинет, но обнаруживает, что там никого нет."
      - "Она проходит через кабинет в библиотеку, затем в спальню — но и там пустота."
      - "Коридоры, всё здание, весь Скапа-Флоу... В итоге Уорспайт так и не нашла ту, кто должна была быть здесь."

chapter3:
  rows:

    - char: warspite
      side: left
      text:
        - "Ситуация такова, как вы видите: Её Величество исчезла."
        - "А вместе с ней Белфаст, Шеффилд и все наши корабли-прототипы."
        - "Дело серьёзное. Из соображений секретности я пока не связывалась с внешним миром. К счастью, присутствующих здесь достаточно, чтобы обсудить этот вопрос."
        - "Когда я уходила вчера вечером, Её Величество была занята. А сегодня утром, когда я пришла с докладом, её уже не было."
        - "За это время определённо что-то произошло. У вас есть какие-нибудь соображения?"

    - char: king_george_v
      side: right
      text:
        - "Как такое могло случиться... Я была поглощена разбором последствий после отмены праздника и больше не общалась с Её Величеством."
        - "Вангард, ты личный телохранитель Её Величества. Есть ли вероятность, что она просто решила выбраться куда-то по прихоти?"

    - char: vanguard
      side: left
      text:
        - "Вряд ли... В журналах выходов я не нашла имени Её Величества, и мне не поступало никаких сообщений о неофициальных поездках."
        - "После того как празднование было внезапно прервано, на каждом входе и выходе Скапа-Флоу было выставлено больше охраны, чем обычно."
        - "Столько людей не могли ускользнуть незамеченными."
        - "К тому же, у Её Величества нет причин уходить с таким количеством людей, не предупредив меня..."

    - char: king_george_v
      side: right
      text:
        - "Иными словами, Её Величество не покидала Скапа-Флоу, но при этом её здесь нет."

    - char: warspite
      side: left
      text:
        - "Если так, то неужели... Её Величество вошла во Врата Авалона?!"

    - char: king_george_v
      side: right
      text:
        - "Ты имеешь в виду искусственную сингулярность, скрытую под водами Скапа-Флоу?"
        - "Но ведь запуск искусственной сингулярности требует колоссального выброса энергии. Прошлой ночью я не видела ничего подобного."

    - char: warspite
      side: left
      text:
        - "Ты кое-чего не знаешь... Её Величество и я занимались модернизацией Врат Авалона, чтобы они могли работать в скрытом режиме."
        - "Внутри Врат Авалона мы создали новую зону, отвечающую за переброску персонала."
        - "Теперь, как бы они ни активировались, последствия выброса энергии ограничиваются пределами самих Врат. Снаружи это выглядит абсолютно естественно, без каких-либо аномалий."

    - char: king_george_v
      side: right
      text:
        - "Вот оно что. Значит, вам удалось преодолеть один из главных недостатков искусственных сингулярностей."

    - char: warspite
      side: left
      text:
        - "Однако я не понимаю, зачем Её Величество взяла с собой корабли-прототипы... Ведь наши прототипы всё ещё во многом несовершенны, верно?"

    - char: king_george_v
      side: right
      text:
        - "Я курировала проект прототипов на всех этапах, так что могу ответить на этот вопрос."
        - "На данном этапе, если речь идёт о секретной операции, лучших охранников, чем они, не найти."
        - "Психоматрицы наших прототипов уже практически стабилизированы, а их подготовка в целом завершена."
        - "Раньше Её Величество не разглашала информацию о них лишь из осторожности. К тому же, ситуация не была настолько критической, чтобы нам пришлось задействовать корабли-прототипы, не так ли?"

    - char: warspite
      side: left
      text:
        - "Так вот почему они день за днём тренировались в закрытых доках..."

    - char: king_george_v
      side: right
      text:
        - "Это необходимый процесс для совершенствования самосознания, а также гарантия отточенных боевых навыков — именно так считала Её Величество."

    - char: warspite
      side: left
      text:
        - "Сначала инцидент с Худ, теперь исчезновение Её Величества... Раз уж прототипы готовы... Неужели Её Величество действительно вошла во Врата Авалона?"

    - char: king_george_v
      side: right
      text:
        - "Не совсем улавливаю связь между этими событиями."

    - char: warspite
      side: left
      text:
        - "Ориентируясь на метод Фридрих дер Гроссе по лечению Бисмарк, мы также должны найти кого-то из МЕТА, ранее принадлежавших Королевскому Флоту, чтобы помочь в нашем лечении."
        - "Таков был план Её Величества. В этом и заключалась одна из причин сотрудничества с Железной Кровью по созданию Врат Авалона."

    - char: king_george_v
      side: right
      text:
        - "Теперь понятно... В таком случае корабли-прототипы в качестве эскорта подходят идеально. Вероятно, из-за своей особой природы они обладают крайне высокой устойчивостью к МЕТА-коррозии."
        - "Но если это так, почему Её Величество не предупредила нас заранее?"

    - char: warspite
      side: left
      text:
        - "Я и сама не могу этого понять... Вчера вечером, когда я уходила, Её Величество всё ещё считала, что условия для исследования сингулярности недостаточно созрели..."
        - "Вангард, ты заметила что-нибудь необычное прошлой ночью?"

    - char: vanguard
      side: right
      text:
        - "Нет... Её Величество вчера легла спать прямо в комплексе. Завершив патрулирование, я всё время стояла на посту снаружи и за это время не зафиксировала никаких странностей."

    - char: king_george_v
      side: left
      text:
        - "Ничего не поделаешь, нам придётся лично пойти и всё проверить."

    - char: vanguard
      side: right
      text:
        - "Ваше Высочество Кинг Джордж V, боюсь, это невозможно."
        - "Был приказ Её Величества: без её прямого распоряжения никто не имеет права приближаться к Вратам Авалона... Полагаю, это касается и вас."

    - char: king_george_v
      side: left
      text:
        - "...В такой-то момент! Как Её Величество, уже вошедшая во Врата Авалона, может отдать приказ нам, оставшимся снаружи?!"

    - char: vanguard
      side: right
      text:
        - "Ваша правда, однако нет никаких доказательств того, что это не является частью плана Её Величества."

    - char: warspite
      side: left
      text:
        - "...Её Величество действительно порой скрывает что-то от некоторых из нас по определённым причинам. Но у неё определённо нет ни возможности, ни повода скрывать что-либо от нас всех, не так ли?"

    - char: vanguard
      side: right
      text:
        - "Леди Уорспайт, это приказ, отданный мне лично Её Величеством. При любых обстоятельствах я буду его соблюдать — такова моя клятва рыцаря."
        - "Тем не менее, учитывая текущую ситуацию... Я тоже считаю, что Её Величество могла столкнуться с некими аномальными и непредвиденными обстоятельствами."
        - "Поэтому я готова отобрать людей из числа гвардейцев, имеющих допуск, и сформировать разведывательный отряд, чтобы разыскать Её Величество."
        - "Клянусь именем рыцаря, я обязательно верну Её Величество в целости и сохранности!"
        - "А пока на ваши плечи, леди, ложится поддержание стабильности снаружи. Пока местонахождение Её Величества неизвестно, может всплыть множество проблем."

    - char: king_george_v
      side: left
      text:
        - "Твои слова не лишены смысла. Даже если мы ворвёмся туда всей толпой, эффект вряд ли будет лучше, чем если отряд возглавишь ты — та, кто знает те места гораздо лучше нас."
        - "Ты ведь не против, Уорспайт?"

    - char: warspite
      side: right
      text:
        - "Ничего не поделаешь... Согласна. Пожалуйста, действуйте осторожно. Вы обязаны вернуть Её Величество в целости и сохранности."

chapter4:
  rows:

    - char: king_george_v
      side: left
      text:
        - "Не ожидала, что ты так легко согласишься. Думала, ты будешь настаивать на своём до последнего."

    - char: warspite
      side: right
      text:
        - "Это же Вангард, образец рыцарских добродетелей. Заставить её «гибко» истолковать приказ Её Величества — задача не из лёгких."
        - "К тому же Вангард подчиняется напрямую Её Величеству, у нас нет права отдавать ей приказы. Дальнейшие споры лишь попусту растратили бы время."

    - char: king_george_v
      side: left
      text:
        - "И то верно. Даже я, как магистр рыцарского ордена, не могу ей командовать~"
        - "Тогда я пойду, дел невпроворот. Пока Её Величество не вернётся, я займусь текущей работой и прослежу, чтобы утечки информации не произошло до самого её появления."
        - "А ты?"

    - char: warspite
      side: right
      text:
        - "Я займусь тайной подготовкой флота. Когда наступит подходящий момент, я возглавлю его и сделаю то, что должно."
        - "В конце концов, раз Вангард уже вошла внутрь, больше никто не сможет нас остановить, не так ли?"
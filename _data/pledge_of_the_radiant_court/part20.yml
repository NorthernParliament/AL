chapter1:
  rows:
  - text:
      - "Монарх стояла у кровати, молча взирая на Худ, окруженную многочисленными приборами."
  - char: "monarch"
    side: "left"
    text:
      - "Добрый вечер, леди Худ."
  - text:
      - "В темноте не раздалось ни звука."
      - "Лежащая перед ней Худ больше не могла, как прежде, подарить ей нежную улыбку или ответить на её слова."
  - char: "monarch"
    side: "left"
    text:
      - "............"
  - text:
      - "Погрузившись в воспоминания, Монарх невольно протянула руку к лицу Худ."
      - "Но в то же мгновение, осознав свой порыв, она резко отдернула руку, словно от удара током."
  - char: "monarch"
    side: "left"
    text:
      - "…………………………………………"
  - text:
      - "Худ, не ведая о происходящем рядом, продолжала безмятежно спать."
  - char: "monarch"
    side: "left"
    text:
      - "...Простите меня, леди Худ. Простите за то самоуправство, на которое я собираюсь пойти."
      - "Но это — единственный осуществимый план, способный спасти вас."
      - "Если мне суждено понести наказание... пусть это случится после вашего выздоровления. Огласите мне приговор лично — своими устами..."

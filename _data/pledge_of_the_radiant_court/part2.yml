chapter1:
  rows:

    - char: indomitable
      side: left
      text:
        - "Зелёные холмы, серебряный замок, лазурная гладь моря и золотое небо…"
        - "Словно мир, сошедший с картины…"

    - char: vanguard
      side: right
      text:
        - "Вы уже какое-то время охраняете Врата Авалона, но оказались внутри, должно быть, впервые?"
        - "Добро пожаловать в центральную зону внутреннего пространства Врат Авалона — Сад Камелота."

    - char: revenge
      side: left
      text:
        - "Сад Камелота… Поистине прекрасный сад, полностью соответствующий своему названию. Здесь всё воссоздано в точности так, как описывают в легендах."

    - char: indomitable
      side: right
      text:
        - "Да, это целиком и полностью во вкусе Её Величества…"

    - char: revenge
      side: left
      text:
        - "Однако подобный дизайн наверняка потребовал колоссальных затрат. В этом есть какой-то особый смысл?"

    - char: vanguard
      side: right
      text:
        - "Не уверена насчёт «особого смысла», но всё, что делает Её Величество, определённо имеет значение."
        - "К тому же, посмотрите сами — такой пейзаж уже сам по себе является бесценным произведением искусства."
        - "Лёгкий ветерок, ласковый свет, а аромат цветов в воздухе настолько упоителен, что хочется остаться здесь навсегда…"
        - "Возможно, загромождение пространства лишенными эстетики механическими конструкциями, как это делают в Железной Крови, тоже позволило бы добиться нужного функционала, но это было бы слишком скучно, не так ли?"

chapter2:
  rows:

    - char: janus
      side: left
      text:
        - "Здесь такая вода... прохладная и очень приятная."

    - char: jervis
      side: right
      text:
        - "Джанус, будь осторожна, не упади."

    - char: janus
      side: left
      text:
        - "Не волнуйся, я внимательна~"
        - "Ой... лепестки на воде... они исчезают, стоит к ним прикоснуться."

    - char: jervis
      side: right
      text:
        - "А вот стены замка вокруг очень крепкие, хотя на ощупь они не как камень, а скорее как холодный металл..."

    - char: vanguard
      side: left
      text:
        - "Верно, у вас отличная наблюдательность."
        - "Хоть здешние виды и прекрасны, не забывайте, что мы находимся внутри сингулярности. То, что видят глаза, не всегда является истиной."
        - "Пожалуйста, ни в коем случае не сходите с тропы, чтобы не подвергать себя непредсказуемой опасности."

    - char: bellona
      side: right
      text:
        - "...Неужели Её Величество затерялась где-то здесь?"

    - char: vanguard
      side: left
      text:
        - "Конечно нет. Никто не знает устройство этого места лучше Её Величества."
        - "Она воспользовалась транспортным устройством во внутреннем дворе замка, чтобы отправиться в более отдалённые области."
        - "Время дорого. Не засматривайтесь на местные красоты, продолжаем движение."
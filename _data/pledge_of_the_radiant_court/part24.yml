chapter1:
  rows:
  - char: "repulse"
    side: "left"
    text:
      - "Ну как, ну как? Мой «Старгэйзи пирог», приготовленный с такой любовью, ведь вкусный, правда?"
  - char: "vanguard"
    side: "right"
    text:
      - "...Эм, ну, пирог, сделанный по столь традиционному рецепту, действительно впечатляет. Он сохранил... первозданный вкус рыбы..."
  - char: "jervis"
    side: "left"
    text:
      - "То есть — редкостная гадость. Солидарна."
  - char: "repulse"
    side: "right"
    text:
      - "Эй-эй-эй! Я, вообще-то, кучу времени потратила на готовку!"
  - char: "jervis"
    side: "left"
    text:
      - "Затраченное время не гарантирует приятный вкус."
  - char: "repulse"
    side: "right"
    text:
      - "...Знала бы — не звала тебя. К тому же леди Вангард сказала, что он «впечатляет»!"
  - char: "jervis"
    side: "left"
    text:
      - "Это лишь элегантность и такт леди Вангард. Почему бы тебе самой его не попробовать?"
  - char: "repulse"
    side: "right"
    text:
      - "И попробую! В этот раз я была уверена в успехе как никогда..."
      - "Этот вкус и острота... Кхе! Кхе-кхе-кхе!"
      - "Сестрёнка! Ты же говорила, что получилось неплохо, когда пробовала! Это же просто ужас какой-то!"
  - char: "renown"
    side: "left"
    text:
      - "С точки зрения воссоздания древнего рецепта «Старгэйзи пирога» это действительно был успех. Я лишь сказала правду."
  - char: "repulse"
    side: "right"
    text:
      - "Тяжелый удар по самолюбию."
  - char: "vanguard"
    side: "left"
    text:
      - "...Так что у нас сегодня на ужин?"
  - char: "repulse"
    side: "right"
    text:
      - "Я лично доем весь этот пирог до последней крошки... (безэмоционально жуёт)."
      - "Кроме него, я ещё приготовила лазанью. Не желает ли леди Вангард отведать её? (продолжает безэмоционально жевать)."
  - char: "vanguard"
    side: "left"
    text:
      - "Лазанья?! Сардинская лазанья?! Я буду!"

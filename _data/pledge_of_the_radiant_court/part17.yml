chapter1:
  rows:
  - char: "hood"
    side: "left"
    text:
      - "Мисс Монарх, доброго вам дня."
  - char: "monarch"
    side: "right"
    text:
      - "Доброго дня, леди Худ. Снова прибыли поправить здоровье?"
  - char: "hood"
    side: "left"
    text:
      - "Лишь на небольшую реабилитацию. Как и прежде, ничего серьезного с моим самочувствием нет."
      - "Как ваши дела в последнее время, мисс Монарх?"
  - char: "monarch"
    side: "right"
    text:
      - "............…………"
  - char: "hood"
    side: "left"
    text:
      - "Судя по твоему лицу, тебе о многом хочется выговориться. Давай найдем место, где можно присесть и спокойно побеседовать~"

chapter2:
  rows:
  - char: "monarch"
    side: "left"
    text:
      - "Леди Худ, моё сердце полнится сомнениями."
      - "С самого момента своего рождения я только и делаю, что тренируюсь здесь, изо дня в день повторяя одно и то же."
      - "В чём же смысл моего существования, если я такова?"
      - "Каждый день я практикуюсь в фехтовании, но ради чего я взмахиваю этим мечом?"
      - "В этой череде неизменных дней я не могу отыскать ответ..."
  - text:
      - "Несмотря на то, что первое впечатление она производила весьма холодное, при более близком знакомстве выяснялось, что Монарх на самом деле довольно словоохотлива."
      - "Это был уже далеко не первый раз, когда она изливала Худ свою душевную тоску."
      - "Большую часть времени Худ просто молча слушала, не спеша что-либо подтверждать или отрицать."
  - char: "monarch"
    side: "left"
    text:
      - "Прости... Ты ведь здесь на отдыхе, а я только и делаю, что говорю о себе..."
  - char: "hood"
    side: "right"
    text:
      - "То, что ты чувствуешь смятение — и есть доказательство твоего существования. А у любого существования непременно есть смысл."
      - "Мисс Монарх просто нужно еще немного времени, чтобы его найти."
  - char: "monarch"
    side: "left"
    text:
      - "Надеюсь на это... Что ж, не буду мешать твоему отдыху. Спасибо, что выслушала всё это."
  - char: "hood"
    side: "right"
    text:
      - "Пусть и ненадолго, но мне тоже придется провести здесь какое-то время в одиночестве."
      - "Если ты заглянешь ко мне поболтать и завтра, это очень меня выручит~"
  - text:
      - "Глядя на нежную улыбку Худ, Монарх почувствовала, как тучи в её душе постепенно начинают рассеиваться..."

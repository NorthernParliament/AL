chapter1:
  rows:
  - char: "bellona"
    side: "left"
    text:
      - "Обломки на воде совсем свежие... Кто-то успел устроить здесь переполох до нашего появления."
  - char: "revenge"
    side: "right"
    text:
      - "Если бы это оказался флот Её Величества..."
  - char: "indomitable"
    side: "left"
    text:
      - "Впереди вижу сражающихся, но... я не узнаю их!"
  - char: "vanguard"
    side: "right"
    text:
      - "Это же... Монарх?! Что она здесь делает..."
  - char: "indomitable"
    side: "left"
    text:
      - "Прости, а «Монарх» — это?.."
  - char: "vanguard"
    side: "right"
    text:
      - "Монарх — один из наших кораблей-прототипов. Неудивительно, что вы о ней не знаете."
      - "Давайте объединимся с ней. Если это та Монарх, которую я знаю, она может быть как-то связана с внезапными действиями Её Величества..."

chapter2:
  rows:
  - char: "vanguard"
    side: "left"
    text:
      - "Ты, что сражаешься впереди! Ты — Монарх?"
  - char: "monarch"
    side: "right"
    text:
      - "Да. Вы из Королевского Флота?"
  - char: "vanguard"
    side: "left"
    text:
      - "Именно так. Мы прибыли через Сад Камелота. А ты?"
  - char: "monarch"
    side: "right"
    text:
      - "Я тоже. Как вы здесь оказались?.."
      - "Нет... важнее другое: вы встречали Её Величество по пути?"
  - char: "indomitable"
    side: "left"
    text:
      - "Мы как раз хотели спросить тебя о местонахождении Её Величества... Не думала, что ты тоже её ищешь."
  - char: "monarch"
    side: "right"
    text:
      - "Всё довольно запутано... Ранее нам с Её Величеством пришлось совершить экстренный переход, чтобы спастись от навязчивого врага, называющего себя Бон Омм Ричард."
      - "Когда я пришла в себя, то оказалась в этих водах в полном одиночестве. Боюсь, Её Величество попала в такую же ситуацию."
  - char: "vanguard"
    side: "left"
    text:
      - "Похоже, вам через многое пришлось пройти... Не волнуйся, если Её Величество где-то рядом, мы обязательно её найдём."
      - "Для начала позвольте вас представить. Это Монарх, один из наших кораблей-прототипов и искусный рыцарь Королевского Флота."
  - char: "indomitable"
    side: "right"
    text:
      - "Я — Индомитэбл, авианосец типа «Илластриес». Похоже, секретность вокруг кораблей-прототипов у нас на высоте, раз даже я не знала о твоём существовании~"
  - char: "jervis"
    side: "left"
    text:
      - "Я Джервис, эсминец типа J. Ты выглядишь... не очень хорошо."
      - "Позволь мне оказать тебе первую помощь. Ранения — не лучший спутник в предстоящих сражениях."
  - char: "monarch"
    side: "right"
    text:
      - "Премного благодарна."
  - char: "bellona"
    side: "left"
    text:
      - "Рада знакомству, я Беллона из рыцарского ордена."
  - char: "revenge"
    side: "right"
    text:
      - "А я линкор Ревендж. Не ожидала встретить здесь члена ордена, о котором раньше и не слышала."
      - "Мы все — рыцари Её Величества, так что давайте постараемся вместе~"
  - char: "monarch"
    side: "left"
    text:
      - "Нет, на самом деле я..."
  - char: "purifier"
    side: "right"
    status: "is-yellow"
    text:
      - "Эй, Королевский Флот! Я не поняла, ваш девичник скоро закончится?"

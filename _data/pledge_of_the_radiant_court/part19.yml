chapter1:
  rows:
  - char: "king_george_v"
    side: "left"
    text:
      - "Уделите особое внимание украшению зала, именно там пройдет основная часть торжества."
      - "Ах да, вход в этот сектор на время празднования будет полностью перекрыт, так что здесь декорации не потребуются."
  - text:
      - "В Скапа-Флоу Кинг Джордж V была поглощена хлопотами по подготовке к предстоящему грандиозному празднику."
  - char: "monarch"
    side: "left"
    text:
      - "...Доброе утро, Кинг Джордж V."
  - char: "king_george_v"
    side: "right"
    text:
      - "Доброе утро, Монарх! Если тебе интересно торжество, я могу запросить у Её Величества разрешение на твой выход в город?"
  - char: "monarch"
    side: "left"
    text:
      - "В этом нет нужды, я не планирую праздное времяпрепровождение. Я лишь хочу вызвать тебя на дуэль."
  - char: "king_george_v"
    side: "right"
    text:
      - "На дуэль?.. Боюсь, сейчас это невозможно."
      - "Как видишь, Её Величество поручила мне организацию праздника, и я буквально не могу выкроить ни минуты. Давай дождемся, когда я закончу с делами."
  - char: "monarch"
    side: "left"
    text:
      - "(Снова то же самое... Даже Кинг Джордж V вносит свой вклад в общее дело Королевского Флота. Как могу я, не имеющая никакой ценности, сравниться с ней?..)"
      - "Вот как... В таком случае, я вернусь к тренировкам."
  - char: "king_george_v"
    side: "right"
    text:
      - "Погоди... она ушла."
      - "(Надеюсь, она ничего неверно не истолковала...)"
      - "(Честно говоря, я и сама не в восторге от решения держать корабли-прототипы в полной изоляции. Нужно будет обсудить это с Её Величеством, когда закончу с подготовкой...)"

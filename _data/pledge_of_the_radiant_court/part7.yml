chapter1:
  rows:

    - char: monarch
      side: left
      text:
        - "Воздух пропитан ароматом смерти и разрушения..."
        - "Ха, похоже, мы вытянули «счастливый билет»... МЕТА никогда не бывают далеко от этих двух вещей."

chapter2:
  rows:

    - char: monarch
      side: left
      text:
        - "Чешир, Нептун, как вы думаете — в чём смысл нашего существования?"

    - char: neptune
      side: right
      text:
        - "Ой, и снова мы начинаем день с таких серьёзных тем..."

    - char: monarch
      side: left
      text:
        - "Мы все — корабли-прототипы, и я хочу знать, что вы об этом думаете."

    - char: cheshire
      side: right
      text:
        - "Хорошо кушать, крепко спать, подчиняться приказам и следовать инструкциям? А если встречу «любимого», в которого влюблюсь с первого взгляда, будет ещё лучше!"

    - char: monarch
      side: left
      text:
        - "Подчиняться приказам... Даже если этот приказ — бесконечно оставаться в изоляции от внешнего мира?"

    - char: neptune
      side: right
      text:
        - "Я вполне могу понять твои чувства, но у Её Величества наверняка есть свои причины."
        - "Вероятно, наше существование — это своего рода козырь Королевского Флота? Скорее всего, Её Величество не хочет раскрывать карты раньше времени."

    - char: cheshire
      side: left
      text:
        - "Именно так! Ты можешь воспринимать нынешний досуг как затяжной отпуск перед походом. Нельзя вступать в тяжелый бой, не накопив как следует силы!"

    - char: monarch
      side: right
      text:
        - "Накопить силы... Ты имеешь в виду эти бесконечные тренировочные программы?"
        - "Тщательно выкованные клинки создаются не для того, чтобы пылиться на складе."
        - "Или же эта «королева» Елизавета считает, что наш вклад в дело Королевского Флота заключается лишь в том, чтобы сидеть взаперти, не контактируя с миром?!"

chapter3:
  rows:

    - char: monarch
      side: left
      text:
        - "Мой смысл и ценность для Королевского Флота будут доказаны в ходе этой операции."
        - "На этот раз позвольте мне лично защитить честь Королевского Флота."
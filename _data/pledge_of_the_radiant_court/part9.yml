chapter1:
  rows:

    - text:
      - "БАБАХ!!!"

    - char: bon_omm_richard
      side: right
      status: is-gray
      text:
        - "Хи-хи, та «я» тоже была фальшивкой. Настоящая я у тебя по правую руку. Угадай, кто из нас настоящая?"

    - text:
      - "БАБАХ!!!"

    - char: bon_omm_richard
      side: right
      status: is-gray
      text:
        - "Какая жалость, не угадала."

    - text:
      - "В глазах Монарх силуэты бесчисленных девушек вдали начали постепенно распадаться, превращаясь то ли в шторм, то ли в цунами, то ли в элементы какой-то колоссальной структуры."

    - char: monarch
      side: left
      text:
        - "Это... неужели это и есть твоя истинная сущность?!"

    - char: bon_omm_richard
      side: right
      status: is-gray
      text:
        - "Не понимаю, о чём ты говоришь~"

    - text:
      - "Внезапно на поверхности воды возник золотой вихрь. Золотое сияние озарило море и разогнало ночную тьму."
      - "Но что более важно — гигантские волны, поднятые тремя концентрическими кольцами, отбросили Бон Омм Ричард вместе со всеми её бесчисленными двойниками."

    - char: bon_omm_richard
      side: right
      status: is-gray
      text:
        - "Кто это ещё?!"

    - char: queen_elizabeth
      side: left
      text:
        - "А ты кто такая и что это ты вытворяешь с подданной Моего Величества?!"

    - char: monarch
      side: right
      text:
        - "Элизабет?..."

    - char: queen_elizabeth
      side: left
      text:
        - "Именно! Ты, безмозглое полено! За то, что сбежала без спросу, я с тобой позже поквитаюсь."

    - char: bon_omm_richard
      side: right
      status: is-gray
      text:
        - "Ой? Так ты ещё и друзей привела на экскурсию?"
        - "Ну, тогда мне стоит устроить вам по-настоящему тёплый приём!~"

    - text:
      - "Вслед за словами Бон Омм Ричард разразился черный шторм, и небо вновь затянуло непроглядной тьмой."

    - char: belfast
      side: left
      text:
        - "Ваше Величество, Сад Камелота подвергается мощным неизвестным помехам. Стабилизатор координат выходит из строя, мощность стремительно падает."

    - char: queen_elizabeth
      side: right
      text:
        - "Сад Камелота под помехами?! Тц... Монарх, ну и в какую же проблемную историю ты влипла!"

    - char: neptune
      side: left
      text:
        - "Надо же, в первой же миссии столкнуться с таким невероятным противником..."

    - char: cheshire
      side: right
      text:
        - "Помехи... Э-э-э?! Неужели мы не сможем вернуться назад?!"

    - char: belfast
      side: left
      text:
        - "Этого не случится, однако перенастройка координат займет огромное количество времени."

    - char: monarch
      side: right
      text:
        - "Бон Омм Ричард хочет запереть нас всех здесь!.."
        - "Королева, я готова в одиночку нести ответственность за все последствия своих самовольных действий."
        - "Я останусь здесь в арьергарде, а вы — уходите скорее!"

    - char: queen_elizabeth
      side: left
      text:
        - "Ха-а? И зачем тогда, по-твоему, Я проделала весь этот путь, чтобы забрать тебя?!"
        - "Как же ты меня злишь... Что ты встала как вкопанная! Быстро заходи внутрь!"

    - char: monarch
      side: right
      text:
        - "Но..."

    - char: queen_elizabeth
      side: left
      text:
        - "Никаких «но»! Белфаст, забудь о координатах! Любое место будет лучше этого!"
        - "Экстренный запуск Камелота! Я не желаю оставаться здесь ни секундой дольше."

    - char: belfast
      side: right
      text:
        - "Слушаюсь."

    - char: monarch
      side: left
      text:
        - "...Поняла."

    - text:
      - "Гигантские кольца снова пришли в движение. После вспышки ослепительного золотого света Сад Камелота исчез."
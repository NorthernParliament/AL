chapter1:
  rows:
  - char: "vanguard"
    side: "left"
    text:
      - "Пьюрифайер?!"
  - char: "purifier"
    side: "right"
    status: "is-yellow"
    text:
      - "Именно, это я!"
      - "Ладно уж то, что вы опоздали, но мы же договаривались действовать скрытно! Зачем вы разнесли столько серийных моделей?"
      - "Я тут, понимаешь ли, ломаю голову, как проложить для вас незаметный маршрут... а вы просто взяли и распылили патрульный отряд."
      - "С одной стороны, вы избавили меня от лишней работы... но с другой — если вы привлечёте внимание «Совета», у меня начнутся крупные неприятности!"
  - char: "vanguard"
    side: "left"
    text:
      - "А... Чего? О чём ты вообще говоришь?"
  - char: "purifier"
    side: "right"
    status: "is-yellow"
    text:
      - "В смысле «о чём»?! Конечно же, о нашей операции!"
      - "И уберите вы уже своё оружие! Эй, авианосец, не думай, что если ты спрятала самолёты в облаках, я их не вижу!"
      - "И вы там, эсминцы! Погодите... Эсминцы?"
      - "Мало того, что явились не вовремя, так ещё и состав флота совсем не тот, о котором договаривались."
      - "Где Ринаун и Рипалс? Разве не они должны были прийти с тобой?"
      - "Ладно, ладно... Видимо, у вас там куча своих проблем. По крайней мере, это всё ещё флот Королевского Флота..."
      - "Мы и так потеряли уйму времени, нельзя больше допускать никаких заминок."
      - "Дальше в своих действиях слушаетесь только меня. Открывать огонь строго запрещено!"
      - "Я в целости и сохранности доставлю вас туда, где держат Элизабет. Всем ясно?!"
  - char: "indomitable"
    side: "left"
    text:
      - "(Она только что сказала «место, где держат Её Величество»...?! Что думаешь, Вангард?..)"
  - char: "vanguard"
    side: "right"
    text:
      - "(Эта Пьюрифайер ведёт себя крайне странно... но я не чувствую от неё враждебности.)"
      - "(Наш приоритет — безопасность Королевы. Даже если перед нами Сирена, временное наблюдение не повредит. Таково моё решение.)"
      - "Хорошо, веди нас. Мы не откроем огонь первыми, пока на нас не нападут."
  - char: "purifier"
    side: "left"
    status: "is-yellow"
    text:
      - "Вот это другой разговор! Маршруты патрулирования здесь составляла я лично, так что со мной не пропадёте!"
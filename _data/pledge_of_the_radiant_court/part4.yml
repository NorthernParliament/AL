chapter1:
  rows:

    - char: indomitable
      side: left
      text:
        - "Мы всё ещё в Саду Камелота... Но окружение снаружи полностью изменилось?!"

    - char: vanguard
      side: right
      text:
        - "..Неужели и правда сработало. Я ведь только слышала объяснения Её Величества о принципах работы..."

    - text:
      - "Когда золотое сияние погасло, все обнаружили, что вместе с Садом Камелота переместились в совершенно новую область."

    - char: indomitable
      side: left
      text:
        - "Лазурное небо, сочная зелень лугов, бескрайний лес и тянущиеся до горизонта холмы..."
        - "Чувствую, как само тело и душа исцеляются..."

    - char: jervis
      side: right
      text:
        - "Те огромные кольца снаружи тоже изменили своё положение."

    - char: vanguard
      side: left
      text:
        - "Об этой части я мало что знаю. Слышала от Её Величества лишь то, что это как-то связано с позиционированием координат..."
        - "Идёмте, осмотрим окрестности. Шансы пятьдесят на пятьдесят, что Её Величество здесь!"

chapter2:
  rows:

    - char: revenge
      side: left
      text:
        - "Этот лес... его уже можно назвать первобытным. Мисс Индомитебл, есть новости от разведсамолётов?"

    - char: indomitable
      side: right
      text:
        - "Лес слишком обширный и густой, вести поиск с воздуха затруднительно..."
        - "Однако я не вижу ни городов, ни деревень. Скорее даже... здесь почти нет следов человеческой деятельности."
        - "Куда же нас занесло..."

    - char: vanguard
      side: left
      text:
        - "На это я не могу ответить. Я просто активировала устройство, чтобы прибыть в точку, записанную в координатах."

    - char: indomitable
      side: right
      text:
        - "А в тех координатах была часть, отвечающая за время?"

    - char: vanguard
      side: left
      text:
        - "Возможно, и была, но, к сожалению, Её Величество не учила меня считывать эти данные."

    - char: indomitable
      side: right
      text:
        - "Э-э~ А ты продиктуй, вдруг я смогу расшифровать."

    - char: vanguard
      side: left
      text:
        - "Там было число, что-то вроде минус сорока шести миллиардов трехсот миллионов с лишним. Есть идеи?"

    - char: indomitable
      side: right
      text:
        - "Сорок шесть миллиардов триста миллионов лет до нашей эры?"

    - char: vanguard
      side: left
      text:
        - "Хоть я и не эксперт в этой области, но мне кажется, ты абсолютно неправа."

    - char: indomitable
      side: right
      text:
        - "…Хе-хе, ну, тогда у меня идей больше нет! Пойду продолжу поиск~ А ты старайся."

    - char: vanguard
      side: left
      text:
        - "Прости, но я тоже не планирую ломать голову над расшифровкой. В конце концов, стоит нам найти Её Величество, и все вопросы отпадут сами собой."

chapter3:
  rows:

    - char: indomitable
      side: left
      text:
        - "Я нашла кое что! Примерно в часе пути впереди нас стоит небольшой замок!"

    - char: bellona
      side: right
      text:
        - "Расстояние не слишком близкое, но и не слишком далёкое... Наконец-то хоть какая-то зацепка."

    - char: indomitable
      side: left
      text:
        - "Этот замок — единственный заметный ориентир поблизости. Если Её Величество здесь, она определённо отправилась бы туда!"

    - char: vanguard
      side: right
      text:
        - "Отлично. Я пойду в авангарде, остальные — за мной."

    - text:
      - "Вангард выхватила свой меч, разрубила преграждающие путь лианы и осторожно ступила в чащу леса."

    - char: indomitable
      side: left
      text:
        - "Прогулка по лесу, значит... Джервис, ты взяла средство от насекомых?"

    - char: jervis
      side: right
      text:
        - "Прошу прощения, леди Индомитебл, в моей аптечке не предусмотрены средства от насекомых."

    - char: indomitable
      side: left
      text:
        - "Эх... Ну ладно. Тогда соберём волю в кулак и в путь~"
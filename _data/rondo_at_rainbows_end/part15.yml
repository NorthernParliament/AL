chapter1:
  rows:

    - text:
      - "БАБАХ!!!"

    - char: thuringen
      side: left
      text:
        - "Операция прошла успешно! Флот Сирен разрезан пополам!"

    - char: yorck
      side: right
      text:
        - "Раньше о такой тактике мы не могли и мечтать..."

    - char: lutzow
      side: left
      text:
        - "Нас бы живьем закопали за такое..! Ворваться в строй врага, подставившись под удар."

    - char: thuringen
      side: right
      text:
        - "Но для нас нынешних это тактика, которую вполне стоит брать на вооружение."
        - "Мы маневренны, а серийные модели врага неповоротливы. На ближней дистанции даже клинки в наших руках становятся весомым аргументом."

    - char: seydlitz
      side: left
      text:
        - "Да, это тоже стало поразительным открытием... Кто бы мог подумать, что это не просто украшение, а особое оружие колоссальной мощи."
        - "Теперь даже если закончатся боеприпасы — не беда. С этим мечом я смогу продолжать бой до победного!"

    - char: lutzow
      side: right
      text:
        - "Ну уж нет, это слишком утомительно..."
        - "Тш-ш! Пока выдалась свободная минутка и никого нет рядом, подплывите поближе, послушайте."
        - "Вы ведь тоже почувствовали эту натянутую атмосферу между теми дамами?"
        - "Как вы думаете, что вообще происходит в мире?"

    - char: thuringen
      side: left
      text:
        - "Нас встретили представители нашей родины, Железной Крови, а также Империи Сакуры и Королевского Флота."
        - "И судя по их словам, Лазурный Путь действительно был создан, но Куин Элизабет утверждает, что мы не сражаемся плечом к плечу."

    - char: lutzow
      side: right
      text:
        - "Точно... Я тоже это почувствовала! Просто из-за этой странной обстановки они молчали, а я не стала спрашивать."

    - char: yorck
      side: left
      text:
        - "Но раз они пришли за нами вместе, несмотря на разлад, значит, всё не так уж и безнадежно?"

    - char: emden
      side: right
      text:
        - "Кто знает. Между фракциями всегда так, не правда ли?"
        - "Расставания и союзы... Вчерашний враг может стать завтрашним другом."
        - "То, что они, недолюбливая друг друга, вместе явились сюда, доказывает лишь одно..."
        - "Наше возвращение — это событие, которое все они считают крайне важным."

    - char: lutzow
      side: left
      text:
        - "Эх... В какой-то степени это можно понять."
        - "По их меркам прошло уже столько времени, а угроза Сирен до сих пор не устранена. Им и впрямь приходится нелегко."

    - char: seydlitz
      side: right
      text:
        - "Мисс Дзуйкаку назвала нас первопроходцами... Но на самом деле тогда мы ничего не смогли достичь и пошли на дно при весьма странных обстоятельствах."
        - "Вся последующая война с Сиренами держалась исключительно на плечах этого нового поколения."
        - "По сравнению с нами, эти последовательницы заслуживают куда большего уважения."
        - "...Однако и мы теперь — не те, что прежде."
        - "Ошибки, совершенные нами в прошлом, мы исправим сейчас. Позор, который мы перенесли тогда, мы смоем своими руками!"

    - char: emden
      side: left
      text:
        - "Хорошо сказано, Зайдлиц! Сколько врагов еще осталось?"

    - char: seydlitz
      side: right
      text:
        - "Хоть их строй и нарушен, численность всё еще значительна."

    - char: emden
      side: left
      text:
        - "Что ж, этого вполне хватит, чтобы мы могли всласть разгуляться. Все готовы продолжать?"

    - text:
      - "Получив единогласный утвердительный ответ, Флот Открытого Моря начал действовать еще более стремительно и смертоносно."
      - "Флот Сирен, который еще недавно был охотником, теперь окончательно превратился в добычу."

    - char: emden
      side: left
      text:
        - "Ну что ж, давайте поставим в этой мести красивую и жирную точку~"
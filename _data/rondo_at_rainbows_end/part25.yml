chapter1:
  rows:

    - char: akagi
      side: left
      status: is-red
      text:
        - "Обращение от самой Бисмарк... Это действительно впечатляет."
        - "Разве ты не говорила, что у тебя не осталось скрытых козырей?"

    - char: friedrich_der_grosse
      side: right
      status: is-yellow
      text:
        - "Госпожа Бисмарк — не просто карта. Она — игрок, который раздаёт колоду."

    - char: akagi
      side: left
      status: is-red
      text:
        - "Что ж, она сделала поистине невероятное заявление. Не ожидала, что вы выберете именно такой путь."

    - char: friedrich_der_grosse
      side: right
      status: is-yellow
      text:
        - "То, что ты видишь. То, что ты слышишь."
        - "Это суверенное решение Железной Крови. Я не стану требовать от вас следовать нашему примеру."

    - char: emden
      side: left
      status: is-yellow
      text:
        - "Ой~ Мы совсем недавно обрели физическое воплощение, а уже стали свидетелями стольких драматических поворотов!"
        - "Быть живой — это чудесно."

    - char: thuringen
      side: right
      status: is-yellow
      text:
        - "Верно. Только оставаясь в строю, можно воочию наблюдать за ходом истории."

    - char: lutzow
      side: left
      status: is-yellow
      text:
        - "..Я только-только начала понимать прошлую расстановку сил, как всё снова перевернулось с ног на голову."
        - "Значит, нам больше не нужно сражаться с Лазурным Путём, верно?"

    - char: friedrich_der_grosse
      side: right
      status: is-yellow
      text:
        - "У тебя есть желание сначала сразиться с ними?"

    - char: lutzow
      side: left
      status: is-yellow
      text:
        - "Да нет, не особо... У нас к ним нет никаких личных счетов, да и лишняя битва — это так утомительно."

    - char: seydlitz
      side: right
      status: is-yellow
      text:
        - "Если споры с другими фракциями — это борьба убеждений, то война с Сиренами — это битва за выживание."
        - "Это наш высший приоритет."

    - char: yorck
      side: left
      status: is-yellow
      text:
        - "Именно! Моя ненависть к Сиренам всё ещё пылает ярким пламенем!"
        - "Прошлые серийные модели были слишком хлипкими. Надеюсь, нынешние окажутся покрепче?"
        - "Чем сильнее враг, тем слаще вкус победы над ним, хи-хи-хи~"

    - char: elbing
      side: right
      status: is-yellow
      text:
        - "Аура Йорк внезапно стала такой... злодейской... Аж мурашки по коже..."

    - char: yorck
      side: left
      status: is-yellow
      text:
        - "Разве такие речи не идеально подходят моему нынешнему образу? Хе-хе~"

    - char: friedrich_der_grosse
      side: right
      status: is-yellow
      text:
        - "Что ж, полагаю, в лишних вопросах более нет нужды."

    - char: emden
      side: left
      status: is-yellow
      text:
        - "Само собой. Переходим к следующему этапу плана."
        - "Где именно мы нанесем удар?"

    - char: friedrich_der_grosse
      side: right
      status: is-yellow
      text:
        - "Компилятор. Раз уж мы вступаем в бой, стоит выбрать самую ценную мишень."

    - char: lutzow
      side: left
      status: is-yellow
      text:
        - "Старая добрая тактика «обезглавливания» вражеского флота~ Мне нравится!"
        - "Только вражеский командующий уже начал действовать. Нам тоже нужно прибавить ходу, иначе, если будем плестись в хвосте, самое интересное достанется не нам!"

    - char: friedrich_der_grosse
      side: right
      status: is-yellow
      text:
        - "Ах да, ещё кое-что перед отправлением."
        - "Август, Эгир, вы меня слышите?"
        - "Заканчивайте свои игры и возвращайтесь. Пора переходить к следующей фазе."

    - char: agir_rad
      side: left
      status: is-yellow
      text:
        - "Мы как раз планировали вернуться до твоего прихода, но и не заметили, как пролетело время~"

    - char: august_von_parseval_rad
      side: right
      status: is-yellow
      text:
        - "Слушаюсь. Мы немедленно возвращаемся к «Вратам Авалона» для подготовки."

    - char: kaga
      side: left
      status: is-red
      text:
        - "Сестра, каковы наши действия?"

    - char: akagi
      side: right
      status: is-red
      text:
        - "Всем силам следовать за флотом Железной Крови. Однако до тех пор, пока мы не подвергнемся нападению, флоту Империи Сакуры запрещено атаковать любую из сторон первой."
        - "Особенно это касается тебя, Дзуйкаку. Ты меня услышала?"

    - char: zuikaku
      side: left
      status: is-red
      text:
        - "Да... Слушаюсь."
chapter1:
  rows:

    - text:
      - "Сияние вспыхивало снова и снова, и раз за разом присутствующих накрывала волна шока."
      - "Наконец Фридрих дер Гроссе прекратила свои действия."
      - "Рядом с ними теперь стоял совершенно новый флот."

    - char: seydlitz
      side: left
      text:
        - "Линейный крейсер Железной Крови Зайдлиц прибыла в ваше распоряжение, госпожа Фридрих дер Гроссе."
        - "Вы... прибыли из далёкого будущего, чтобы помочь нам?.."

    - char: friedrich_der_grosse
      side: right
      text:
        - "Можно сказать и так."

    - char: seydlitz
      side: left
      text:
        - "Премного благодарна! Хотя я всё ещё пытаюсь осознать происходящее, мой разум ясен, и я готова немедленно вступить в бой!"

    - char: yorck
      side: right
      text:
        - "А это новое тело весьма любопытное~"
        - "Крейсер Йорк, ставшая более изящной и маневренной, докладывает о прибытии в этом новом обличье."

    - char: lutzow
      side: left
      text:
        - "Как же хочется спать... Что вообще стряслось, раз вы нас разбудили?"

    - char: seydlitz
      side: right
      text:
        - "Госпожа Лютцов, сейчас явно не время для сна!"

    - char: lutzow
      side: left
      text:
        - "Оно-то так... но раз уж я заснула, то, конечно, хотелось бы поспать, пока сама не проснусь..."

    - char: yorck
      side: right
      text:
        - "Ты имеешь в виду — беззащитно спать посреди руин и огненного моря?"

    - char: lutzow
      side: left
      text:
        - "Если подумать с этой стороны, то это и впрямь звучит паршиво..."
        - "К тому же, это тело кажется куда интереснее, милее, да и двигаться в нём легче~"
        - "Единственная проблема — я правда ужасно хочу спать... Эх, ничего не поделаешь. Линейный крейсер Железной Крови Лютцов возвращается в строй."
        - "Можно мне покемарить ещё немного, пока не поступит следующий приказ?.."

    - char: friedrich_der_grosse
      side: right
      text:
        - "Как пожелаешь."

    - char: thuringen
      side: left
      text:
        - "Фридрих... от Флота Открытого Моря... остались только мы?"

    - char: friedrich_der_grosse
      side: right
      text:
        - "К сожалению, Тюрингия, это так."

    - char: thuringen
      side: left
      text:
        - "А остальные?.."

    - char: friedrich_der_grosse
      side: right
      text:
        - "Несмотря на обилие обломков вокруг, сейчас это невозможно."

    - char: thuringen
      side: left
      text:
        - "Прискорбно, но я поняла..."
        - "Я буду дорожить этим шансом на перерождение."

    - char: elbing
      side: right
      text:
        - "Крейсер Эльбинг, приписанная к флоту Железной Крови, докладывает о прибытии... Не знаю, зачем выбрали меня и потратили впустую такую драгоценную возможность."
        - "Боец из меня никакой, но в качестве живого щита сгожусь... Наверное. Пожалуйста, не стесняйтесь и используйте меня по полной."

    - char: akagi
      side: left
      text:
        - "……Флот, затонувший в далеком прошлом, возродился в таком обличье."
        - "Так вот почему ты решила сотрудничать с Железной Кровью?"

    - char: queen_elizabeth
      side: right
      status: is-yellow
      text:
        - "…На этот вопрос я отвечу так же, как Фридрих: не подтверждаю и не опровергаю."

    - char: akagi
      side: left
      text:
        - "Как хочешь. Но почему ты сама до сих пор не действуешь?"
        - "Разве ты не собираешься последовать примеру Фридриха дер Гроссе и вернуть к жизни своих старых друзей?"

    - char: queen_elizabeth
      side: right
      status: is-yellow
      text:
        - "……К сожалению, это место принадлежит Железной Крови. Я на такое не способна."

    - char: akagi
      side: left
      text:
        - "Вот оно что. Видимо, эта технология не так проста, как кажется на первый взгляд, и у неё есть ограничения, о которых я не знаю."

    - char: yorck
      side: right
      text:
        - "Эмден, почему ты всё время молчишь? Тебе нехорошо?"

    - char: emden
      side: left
      text:
        - "Эмден... Да, верно, я — Эмден."
        - "Хи-хи-хи... Как любопытно."
        - "«Лебедь Востока», крейсер типа «Дрезден», Эмден искренне приветствует всех вас."

    - char: friedrich_der_grosse
      side: right
      text:
        - "...Лебедь Востока? Но ты ведь уже давно..."

    - char: emden
      side: left
      text:
        - "Верно, я затонула ещё до «Одиннадцатого эпизода»."
        - "Но разве мы все не пошли ко дну однажды, и разве мы все не находимся сейчас здесь?"

    - char: friedrich_der_grosse
      side: right
      text:
        - "Твоих обломков здесь нет."

    - char: emden
      side: left
      text:
        - "Но Эмден здесь, а значит, и я здесь."
        - "Быть может, в свои последние мгновения та Эмден всем сердцем стремилась к «Лебедю Востока», чьё имя она унаследовала."
        - "Тебе, как человеку, сотворившему чудо, это должно быть понятно лучше всех, не так ли?"

    - char: friedrich_der_grosse
      side: right
      text:
        - "В моих планах была лишь Эмден, и ничего более."

    - char: emden
      side: left
      text:
        - "То есть ты не совсем понимаешь, что произошло? Неужели ты ещё не полностью овладела этой технологией?"

    - char: friedrich_der_grosse
      side: right
      text:
        - "Она всё ещё в процессе изучения."

    - char: emden
      side: left
      text:
        - "Какая смелость — зайти так далеко, используя несовершенную технологию..."
        - "Неужели ситуация стала настолько критической, что нам снова пора выйти на сцену?"
        - "Или ты просто тоскуешь по нам?"
        - "А может быть — ты хочешь исправить ошибки прошлого?"
        - "И всё же, прежде чем мы продолжим... Остальные, кажется, приняли всё как должное."
        - "Но я чувствую некое несоответствие. Фридрих дер Гроссе, кто ты такая на самом деле?"

    - char: friedrich_der_grosse
      side: right
      text:
        - "Разве это важно?"
        - "Прошлое, оставшееся под толщей воды, и грёзы, всплывающие в гипотезах."
        - "Я — это я. Фридрих дер Гроссе."

    - char: emden
      side: left
      text:
        - "И то верно, этот вопрос не имеет значения... Прошу простить мою бестактность."

    - char: friedrich_der_grosse
      side: right
      text:
        - "Что касается твоих предыдущих вопросов — полагаю, они столь же бессмысленны."
        - "Сейчас вы здесь, а враг — там. То, что нужно сделать дальше, не требует объяснений."

    - char: lutzow
      side: left
      text:
        - "М-м~? Вы тут обсуждаете что-то интересное?"

    - char: friedrich_der_grosse
      side: right
      text:
        - "Лютцов, ты уже выспалась?"

    - char: lutzow
      side: left
      text:
        - "Пока спала, увидела кое-что любопытное, так что сон как рукой сняло!"
        - "А кто эти дамы? Тоже современные корабли Железной Крови?"

    - char: friedrich_der_grosse
      side: right
      text:
        - "К сожалению, нет. Позвольте мне всех представить."
        - "Эти двое — авианосцы Империи Сакуры, Акаги и Дзуйкаку."
        - "А рядом с ними — линкор Королевского Флота, в каком-то смысле ваша старая знакомая, Куин Элизабет."

    - char: thuringen
      side: left
      text:
        - "Империя Сакуры и Королевский Флот действуют заодно с нами?"
        - "Похоже, то предложение о создании Лазурного пути всё-таки было воплощено в жизнь..."

    - char: lutzow
      side: right
      text:
        - "Авианосцы... Это новый класс кораблей?!"
        - "О-о... И правда, снаряжение выглядит совсем незнакомым. Обязательно дайте мне его изучить чуть позже!"

chapter2:
  rows:

    - char: lutzow
      side: left
      text:
        - "Но что более важно — Куин Элизабет? Та самая Куин Элизабет, главный корабль типа «Куин Элизабет»?"
        - "Пфф... Она что, правда такая крошечная?!"

    - char: queen_elizabeth
      side: right
      status: is-yellow
      text:
        - "Ха-а?!! Это кого ты тут назвала крошечной?! Хочешь, чтобы я снова вывела флот в море и заперла вас всех в порту?!"

    - char: lutzow
      side: left
      text:
        - "Ой, нет-нет-нет, я ничего такого не имела в виду! Просто никак не могу сопоставить тебя с той самой Куин Элизабет... Пфф."
        - "Ты ведь всё-таки линкор... Посмотри на Тюрингию или Зайдлиц..."
        - "Да даже на крейсеров Эмден и Эльбинг...."

    - char: queen_elizabeth
      side: right
      status: is-yellow
      text:
        - "На... Наглость! Замолчи, замолчи, замолчи!"
        - "Неужели Флот Открытого Моря состоит сплошь из поверхностных особ, которые судят о достоинстве линкора по размеру груди?!"

    - char: thuringen
      side: left
      text:
        - "Приношу глубочайшие извинения, Ваше Величество."
        - "Вы правы, размер — определенно не единственный критерий оценки значимости груди."
        - "И объем бюста никак не связан с принадлежностью к классу линкоров."
        - "Со стороны Лютцов было крайне несерьёзно подвергать сомнению ваш статус только из-за того, что её смутил ваш малый размер."
        - "Я извиняюсь за неё. Лютцов, не хочешь ли и ты принести личные извинения?"

    - char: lutzow
      side: right
      text:
        - "Дико извиняюсь! Увидев, какая у тебя крошечная грудь, я самовольно перестала считать тебя линкором..."

    - char: zuikaku
      side: left
      text:
        - "М-да... Сделали только хуже."

    - char: queen_elizabeth
      side: right
      status: is-yellow
      text:
        - "Вы... вы двое абсолютно точно издеваетесь! Мне не нужны такие извинения-а-а-а-а!!!!"
        - "Кхм... И ещё, вы только что сказали, что Королевский Флот, Империя Сакуры и Железная Кровь действуют сообща."
        - "К сожалению, нынешняя ситуация далека от этого."
        - "И отношения между нами отнюдь не такие дружеские."

    - char: lutzow
      side: left
      text:
        - "...А?"

    - char: queen_elizabeth
      side: right
      status: is-yellow
      text:
        - "Ну не надо на меня так смотреть... В конце концов, мы ведь старые знакомые."
        - "Пошутили и хватит... Считайте, что я вас помиловала!"
        - "Ф-Фридрих! Не пора ли уже перейти к делу?!"

    - char: friedrich_der_grosse
      side: left
      text:
        - "Неужели на этом мы закончим наш сеанс дружеского общения?"

    - char: queen_elizabeth
      side: right
      status: is-yellow
      text:
        - "Каким это глазом ты разглядела здесь «дружеское общение»?!"
        - "...К тому же, время уходит секунда за секундой, у нас его не так много, чтобы тратить впустую."

    - char: friedrich_der_grosse
      side: left
      text:
        - "Твоя правда. Дамы из Флота Открытого Моря, мы хотим услышать истину о том, что предшествовало вашей гибели."
        - "Расскажите нам, что же на самом деле произошло здесь в тот день?"
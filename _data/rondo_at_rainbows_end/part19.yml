chapter1:
  rows:

    - char: jintsuu
      side: left
      text:
        - "Какая тишина... В небе ни одного самолёта Железной Крови, на воде — ни одного их корабля."

chapter2:
  rows:

    - char: friedrich_der_grosse
      side: left
      text:
        - "Эгир и Август тоже остались здесь, чтобы вместе с союзниками из Империи Сакуры оборонять Скапа-Флоу и ждать нашего возвращения."

chapter3:
  rows:

    - char: jintsuu
      side: left
      text:
        - "Фридрих дер Гроссе так и сказала, но вскоре после этого они получили приказ о передислокации и отправились на передовую."
        - "Так что теперь мы — единственный гарнизон, оставшийся для охраны Скапа-Флоу."

    - char: yamashiro_rad
      side: right
      text:
        - "У-у-у... Предчувствие Ямасиро меня не обмануло — нас и правда припахали в качестве массовки для драки!"

    - char: yukikaze_rad
      side: left
      text:
        - "Какое несчастье... Если бы великая Юкикадзэ-сама была с вами, вам бы точно повезло!"

    - char: shoukaku_rad
      side: right
      text:
        - "От Дзуйкаку всё ещё нет вестей?"

    - char: kaga
      side: left
      text:
        - "Дзуйкаку сейчас действует вместе с сестрой. Пока внешнее кольцо Скапа-Флоу не пало, они в безопасности."

    - char: shoukaku_rad
      side: right
      text:
        - "И то верно... Раз Железная Кровь внезапно сменила план развёртывания, значит, ситуация на фронте стала критической?"

    - char: kaga
      side: left
      text:
        - "Судя по данным разведки, вокруг Скапа-Флоу пока спокойно, но на горизонте уже видны отряды Железной Крови, вступившие в бой с Лазурным путем."
        - "Судя по их курсу, они идут прямиком к Скапа-Флоу. Очевидно, то, что здесь происходит, перестало быть секретом."

    - char: shoukaku_rad
      side: right
      text:
        - "Если подумать... Чудо, что нам удавалось скрывать это так долго. Реакция Королевского Флота на захват Скапа-Флоу была до странности заторможенной..."
        - "Мы уже давно готовы к выходу. Позвольте нам выступить для поддержки."
        - "Даже если мы не успеем к началу сражения, мы сможем прикрыть ваш отход на полпути."

    - char: kaga
      side: left
      text:
        - "Хорошо, так и поступим."

    - text:
      - "Пока девушки из Империи Сакуры переговаривались, вдалеке затихший было водоворот вновь отозвался оглушительным рокотом."
      - Когда ослепительное сияние рассеялось, на поверхности моря показался знакомый алый силуэт."

    - char: kaga
      side: left
      text:
        - "Сестра?! Вы наконец-то вернулись! Всё прошло успешно?!"

    - char: akagi
      side: right
      text:
        - "Хи-хи, моё путешествие выдалось весьма любопытным."
        - "Я увидела кое-что интересное и почерпнула несколько полезных идей, но подробности — это долгий разговор."
        - "Как обстановка снаружи?"

    - char: kaga
      side: left
      text:
        - "Флоты Лазурного Пути уже почуяли неладное в Скапа-Флоу и на всех парах спешат сюда."
        - "Железная Кровь уже перебросила отсюда все оборонительные силы на передовую. В целом ситуация выглядит не слишком радужной."
        - "Я отдала приказ флоту, ожидавшему в порту Дакара, выдвигаться. Даже если они не успеют вовремя, то смогут поддержать нас при отходе."

    - char: akagi
      side: right
      text:
        - "При такой нехватке сил подобное развитие событий было неизбежно."
        - "Ты отлично справилась, Кага. Нам и впрямь может понадобиться больше подкреплений."
        - "Впрочем, не стоит волноваться. Заманить основные силы врага сюда — это как раз часть плана~"
        - "Смотри."

    - text:
      - "Озадаченная Кага посмотрела в ту сторону, куда указывала Акаги."
      - "Знакомые силуэты один за другим возвращались на поверхность моря через Врата Авалона, но вспышки света всё не прекращались."
      - "Корабль за кораблем, через Врата в акваторию Скапа-Флоу входила совершенно незнакомая флотилия."

    - char: kaga
      side: left
      text:
        - "Сестра, что это за флот?.."

    - char: akagi
      side: right
      text:
        - "Это как раз та часть, которая «долгий разговор»."
        - "Но с таким козырем в рукаве расстановка сил Фридрих дер Гроссе уже не кажется такой безумной, не так ли?"
chapter1:
  rows:

    - char: yorck
      side: left
      text:
        - "Вау... Всего за мгновение Скапа-Флоу изменился до неузнаваемости?!"

    - char: lutzow
      side: right
      text:
        - "Только что здесь всё было в огне, а теперь — тишь да гладь... Мы и правда попали в Скапа-Флоу будущего?"

    - char: thuringen
      side: left
      text:
        - "Если быть точной — в Скапа-Флоу настоящего. Ведь для этого времени мы, чья гибель уже вписана в учебники истории, и есть прошлое."

    - char: lutzow
      side: right
      text:
        - "Угу... Рассудком я это принимаю, но эмоционально это всё равно шокирует."
        - "Поверить не могу, что столько времени пролетело в мгновение ока..."

    - char: emden
      side: left
      text:
        - "И всё же, это место отнюдь не выглядит новеньким и нетронутым. Неужели Сирены недавно снова напали на него?"

    - char: kaga
      side: right
      text:
        - "...На самом деле это были не Сирены. Это сделали вы."
        - "Сначала Принц Ойген с помощью флота-приманки отвлекла основные силы Королевского Флота, а затем Тирпиц возглавила удар по Скапа-Флоу и прорвала морскую блокаду."

    - char: emden
      side: left
      text:
        - "Ой~ Да это же именно то, что мы когда-то так хотели, но не смогли осуществить~"
        - "Железная Кровь под командованием Фридрих дер Гроссе становится всё острее и опаснее."

    - char: kaga
      side: right
      text:
        - "...В вашем понимании вы ведь ещё совсем недавно сражались плечом к плечу с Королевским Флотом. Разве нынешняя ситуация не вызывает у вас замешательства?"

    - char: emden
      side: left
      text:
        - "На самом деле, не особо."
        - "Создание Лазурного Пути не вызывает удивления."
        - "После нашего поражения Железная Кровь полностью лишилась мощи на море, так что союз с другими фракциями был неизбежен."
        - "А для альянса, у которого нет внутреннего согласия и который держится лишь на наличии общего врага, обострение противоречий при ослаблении внешней угрозы — лишь вопрос времени."
        - "Так что раскол Лазурного Пути тоже вполне предсказуем."
        - "Не ожидала я только того, что Империя Сакуры, с которой у нас тогда тоже были натянутые отношения, в итоге окажется с нами на одной стороне~"

    - char: kaga
      side: right
      text:
        - "Так вот как Флот Открытого Моря смотрит на вещи..."
        - "Как вы и сами понимаете, понятия «друг» и «враг» — это переменные величины."
        - "Для меня большая честь сражаться в одном строю с такими первопроходцами, как вы."

    - char: lutzow
      side: left
      text:
        - "Дзуйкаку только что говорила почти то же самое~ Тебя ведь зовут Кага, верно?"
        - "Мы слышали, что ты и Акаги — авианосцы, перестроенные из линкоров в ходе масштабной модернизации."
        - "Неужели технология столь радикального изменения оснастки действительно работает?"

    - char: kaga
      side: right
      text:
        - "Работает, но это крайне сложный процесс... С точки зрения затрат ресурсов и времени это крайне невыгодно."
        - "Мы с сестрой — скорее исключение, порождённое особыми обстоятельствами того времени..."
        - "Будь у меня сейчас столько же сил и времени, я бы предпочла просто построить новый авианосец с нуля."

    - char: seydlitz
      side: left
      text:
        - "А как ты думаешь, наше снаряжение можно модернизировать? Например, установить дополнительные зенитные орудия."
        - "В нынешнюю эпоху, когда небо кишит самолётами, сражаться со старым вооружением — задача не из лёгких..."

    - char: kaga
      side: right
      text:
        - "Насколько я заметила, вы уже используете универсальные орудия в качестве вспомогательного калибра."
        - "В отличие от полной смены класса корабля, модификация и расширение существующих оружейных модулей не составляет большого труда."
        - "Уверена, что с технологическим потенциалом Железной Крови это будет проще простого."

    - char: seydlitz
      side: left
      text:
        - "Это звучит воодушевляюще! Если бы заодно удалось добавить ещё несколько башен главного калибра — было бы идеально..."

    - char: kaga
      side: right
      text:
        - "Э-э... С этим, боюсь, могут возникнуть трудности."
        - "Хотя, кто знает, возможно, у Железной Крови припрятаны какие-то секретные технологии, способные и на такое...?"

    - text:
      - "Пока девушки из Флота Открытого Моря и Империи Сакуры беседовали, Акаги внезапно кое-что заметила."

    - char: akagi
      side: left
      text:
        - "Дзуйкаку, ты не видела Куин Элизабет?"

    - char: zuikaku
      side: right
      text:
        - "А...? Она же была с нами, когда мы проходили через Врата."
        - "О нет... Её и правда нигде нет?! Неужели она воспользовалась вспышкой при выходе и сбежала!"

    - char: friedrich_der_grosse
      side: left
      text:
        - "Не беспокойтесь. Куин Элизабет сейчас занята другими делами в узловом секторе Врат Авалона. Далее она не будет действовать вместе с нами."
        - "К тому же, нам предстоит столкнуться лицом к лицу с силами Лазурного Пути. Ей было бы весьма трудно объяснить своё присутствие в наших рядах, не так ли?"

    - char: akagi
      side: right
      text:
        - "Какая жалость. Мы только что лишились нашего главного козыря в лице заложницы."

    - char: friedrich_der_grosse
      side: left
      text:
        - "Слишком много карт на руках — не всегда к лучшему. Можно упустить драгоценный момент для хода, пока будешь взвешивать ценность каждой из них."

    - char: akagi
      side: right
      text:
        - "Слышать такое от тебя, мастера прятать тузы в рукавах — большая неожиданность..."

    - char: friedrich_der_grosse
      side: left
      text:
        - "Хи-хи, теперь это всё. У меня больше не осталось скрытых козырей."
        - "Настало время разыграть те карты, что на столе..."
        - "М-м? А где Эгир и Август?"

    - char: kaga
      side: right
      text:
        - "Разве они не отправились на передовую сдерживать врага согласно твоим же приказам?"

    - char: friedrich_der_grosse
      side: left
      text:
        - "Хм... Что ж, такое развертывание тоже допустимо."
        - "Впрочем, до этого действительно была одна временная директива... Ну да ладно."

    - char: lutzow
      side: right
      text:
        - "Фридрих дер Гроссе, что нам делать дальше? Схлестнуться с флотом Лазурного Пути?"

    - char: friedrich_der_grosse
      side: left
      text:
        - "Впереди нас ждёт великое сражение."
        - "Но сначала — пополните запасы. В Скапа-Флоу я заранее подготовила ресурсы, используйте их без стеснения."

    - char: emden
      side: right
      text:
        - "О~ Мы и правда израсходовали изрядную долю боезапаса в прошлой стычке, так что не станем отказываться~"

    - char: thuringen
      side: left
      text:
        - "Топливо и снаряды — то, на чём держится любой флот в любые времена."

    - char: yorck
      side: right
      text:
        - "Как и ожидалось от Фридрих дер Гроссе, предусмотрела всё до мелочей~"

    - char: elbing
      side: left
      text:
        - "Даже Эльбинг можно воспользоваться припасами?"

    - char: friedrich_der_grosse
      side: right
      text:
        - "Именно так. Я видела, как достойно ты сражалась."
        - "Эльбинг, ты — член Флота Открытого Моря, признанный мной, Фридрих дер Гроссе. Наберись же немного уверенности."

    - char: elbing
      side: left
      text:
        - "Есть..! Тогда я пошла на дозаправку!!"

    - char: lutzow
      side: right
      text:
        - "Я тоже пойду пополню запасы~ А заодно немного вздремну..."
        - "Не забудьте меня разбудить!"

    - char: seydlitz
      side: left
      text:
        - "Без проблем, фройляйн Лютцов."

    - char: friedrich_der_grosse
      side: right
      text:
        - "А что насчёт Империи Сакуры? Вы ведь не собираетесь заявить, что возвращаетесь домой прямо сейчас?"

    - char: akagi
      side: left
      text:
        - "Сегодня решается судьба Железной Крови, так что мы в любом случае досмотрим этот спектакль до самого конца."
        - "Мы ведь тоже можем воспользоваться здешними припасами?"

    - char: friedrich_der_grosse
      side: right
      text:
        - "Разумеется."

    - char: zuikaku
      side: left
      text:
        - "Ой, Акаги... Но мы же почти не вступали в бой, нам особо и пополнять-то нечего?"

    - char: akagi
      side: right
      text:
        - "А топливо, затраченное на путь сюда? А расход твоего авиакрыла, пока ты полдня кружила в небе?"
        - "Разве всё это не нужно восполнить?"
        - "Фридрих дер Гроссе сказала, что всё в порядке, так что нам лучше не скромничать."

    - char: zuikaku
      side: left
      text:
        - "Ого, какая щедрость! Неужели у Железной Крови такие огромные запасы нефти?!"

    - char: friedrich_der_grosse
      side: right
      text:
        - "Решающая битва требует решительного настроя во всём."
        - "К тому же нашу нынешнюю операцию поддержали весьма великодушные союзники."
        - "Не стесняйтесь, заливайте баки до краёв. Уверена, скоро это вам пригодится."

    - char: akagi
      side: left
      text:
        - "Мы вообще-то не обещали, что будем вмешиваться."

    - char: friedrich_der_grosse
      side: right
      text:
        - "Вы ведь тоже воины. А для воинов у меня найдётся причина, от которой вы не сможете отказаться."

    - char: akagi
      side: left
      text:
        - "Что ж, я заинтригована~"

    - char: friedrich_der_grosse
      side: right
      text:
        - "Хи-хи-хи... Сейчас исполняется грандиозный финал симфонии Железной Крови."
        - "Что бы ни случилось дальше, не смыкайте глаз и станьте свидетелями этого до самого конца."
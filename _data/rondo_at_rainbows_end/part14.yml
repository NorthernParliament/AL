chapter1:
  rows:

    - text:
      - "В отдалении Акаги и её спутницы молча наблюдали за тем, как Флот Открытого Моря ведет бой с Сиренами."

    - char: zuikaku
      side: left
      text:
        - "Флот Открытого Моря уже разгромил передовые разведывательные отряды Сирен. Сейчас они удерживают выгодное построение и планомерно истощают основные силы врага."
        - "Уверена, этот бой скоро закончится!"
        - "(Вперёд... вперёд! Поднажмите!)"

    - char: akagi
      side: right
      text:
        - "Неплохо. Темп их продвижения наконец-то сравнялся с эффективностью обычного разведывательного отряда эсминцев."
        - "Сирены типа II не такие уж и сложные противники, не так ли?"

    - char: zuikaku
      side: left
      text:
        - "Акаги, ты, кажется, слишком строга..."
        - "Они ведь только-только начали сражаться в этих телах! Для первого раза они справляются просто блестяще!"

    - char: akagi
      side: right
      text:
        - "Вот как?"
        - "Тогда давай-ка вспомним: каким был твой первый бой?"

    - char: zuikaku
      side: left
      text:
        - "Э-э... Акаги, ты же сама знаешь мои тогдашние результаты... К тому же, между авианосцами и линкорами огромная разница!"

    - char: akagi
      side: right
      text:
        - "И всё же, у нас не было такого долгого периода адаптации, верно?"

    - char: zuikaku
      side: left
      text:
        - "Хм-м... Кажется, в то время я как-то естественным образом сразу осознала все боевые навыки и знания..."
        - "Может, дело в том, что они — очень старые корабли, и поэтому им труднее?"

    - char: akagi
      side: right
      text:
        - "Если так, то это лишь усиливает мои сомнения."
        - "Фридрих, ты уверена, что с этим флотом всё будет в порядке?"

    - char: friedrich_der_grosse
      side: left
      text:
        - "Всё в полном порядке."
        - "Нет смысла обсуждать возраст самого корпуса, когда речь идёт о творениях Куба Мудрости."
        - "Что же касается боевого опыта... Мы делаем то, чего раньше не делал никто. Естественно, опыт не может возникнуть из ниоткуда."
        - "Своими действиями мы прямо сейчас вершим новую историю."
        - "Наберись терпения и просто наблюдай. Старые друзья нас не разочаруют."

    - char: akagi
      side: right
      text:
        - "…Раз ты так говоришь, то пусть будет так, спорить не стану. В конце концов, в этот раз я лишь приглашённый зритель."
        - "(Куда важнее время... Можем ли мы позволить себе тратить его здесь впустую?)"
        - "(Если за это время Скапа-Флоу будет взят штурмом извне, то к моменту нашего выхода мир может стать совсем иным...)"
        - "......"

    - char: queen_elizabeth
      side: left
      status: is-yellow
      text:
        - "......"

    - char: akagi
      side: right
      text:
        - "Хм………………"

    - char: queen_elizabeth
      side: left
      status: is-yellow
      text:
        - "……? Акаги, чего ты так на меня уставилась?"
        - "Сейчас нужно следить за сражением впереди, а не за мной, пока я это сражение наблюдаю!"

    - char: akagi
      side: right
      text:
        - "(Хе-хе... И то верно. Пока она в наших руках, Лазурный путь не посмеет действовать опрометчиво.)"
        - "(С таким козырем в рукаве я тоже могу позволить себе немного терпения.)"
        - "(Интересно, как далеко сможет зайти этот флот, обретший «новую жизнь» подобным образом...)"
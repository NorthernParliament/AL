chapter1:
  rows:

    - text:
      - "Внутри акватории Скапа-Флоу начала концентрироваться колоссальная энергия."
      - "Сначала появилась золотая искра, а затем золотой столб света, неся в себе пугающую мощь, прочертил в небе световую дугу."
      - "Затем эта дуга прорезала огромную брешь прямо посреди неба в заданной зоне, словно разрывая само пространство."

    - char: new_jersey
      side: left
      text:
        - "Ого, это куда масштабнее того, что мы видели в тот раз с Хелена МЕТА!" 

    - text:
      - "Если прошлый раз это было похоже на маленькую дырочку в зеркале, то сейчас — на гигантский разлом в пространстве-времени."
      - "Внутри разлома не привычное нам пылающее море, а некое... крайне необычное пространство."
      - "Перед глазами предстали строения, состоящие из линий, разноцветные огни и бесчисленные потоки электричества."
      - "Словно заглядываешь внутрь какого-то механизма будущего... Пожалуй, «электронный стиль» — самое подходящее описание для этого места."

    - char: new_jersey
      side: left
      text:
        - "Командир, из разлома хлынул огромный поток Сирен!" 

    - char: commander
      side: right
      text:
        - "...Какое поразительное количество. Неужели все эти Сирены всё время скрывались в этой акватории?" 

    - char: friedrich_der_grosse
      side: left
      status: is-yellow
      text:
        - "Именно так. Это и есть истинный секрет, сокрытый в этих водах — Мейнфрейм экспериментального отдела Сирен." 
        - "Мне потребовалось много времени, чтобы вычислить место его нахождения и найти способ взломать защитные устройства."
        - "Пусть это и не решит проблему раз и навсегда..."
        - "Однако это станет отличным началом, не так ли?"

chapter2:
  rows:

    - char: commander
      side: left
      text:
        - "Всем силам — атаковать разлом! Поставим же запоздалую точку в операции Сирена!"

    - char: georgia
      side: right
      text:
        - "Слушаюсь. Мои орудия проложат путь к победе!"

    - char: enterprise
      side: left
      text:
        - "Всем авианосным группам: приступить к подавлению вылетающих групп Сирен. Загоните их обратно!"

    - char: essex
      side: right
      text:
        - "Поняла! Энтерпрайз-сэмпай, узрите мощь современных авианосцев типа «Эссекс»!"

    - char: washington
      side: left
      text:
        - "Группировке основных сил — начать прорыв! Мы первыми войдём в разлом и расчистим дорогу остальным флотам!"

    - char: baltimore
      side: right
      text:
        - "Вашингтон, сопровождение авианосцев теперь на нас, крейсерах. Можете без оглядки рваться вперёд!"

    - char: sovetskaya_rossiya
      side: left
      text:
        - "Полярный флот, не отставать! Мы и так слишком долго задержались в пути, теперь мы обязаны первыми заявить о себе!"

    - char: kronshtadt
      side: right
      text:
        - "Интересно, сколько новых разведданных удастся собрать в пространстве Мейнфрейма Сирен, где ещё не ступала нога человека?~"

    - char: new_jersey
      side: left
      text:
        - "Не забудь и про меня, Командир! В этот раз я и мой флот пойдём вместе с тобой."
        - "Под защитой величайшего и сильнейшего «Чёрного Дракона» можешь со спокойной душой сосредоточиться на командовании!"

    - char: saratoga
      side: right
      text:
        - "Незаметно всё обернулось вот так... Кажется, сейчас здесь даже жарче, чем во время основной операции в океане NA..."
        - "Ну что ж~ Сестрёнке Саре такое развитие событий тоже по душе!"

    - char: emden
      side: left
      status: is-yellow
      text:
        - "...Местоположение Мейнфрейма Сирен ведь не должно легко меняться, верно?"

    - char: friedrich_der_grosse
      side: right
      status: is-yellow
      text:
        - "Верно. Позиция каждого Мейнфрейма тщательно выверена."

    - char: emden
      side: left
      status: is-yellow
      text:
        - "Раз так... Тот гигантский луч, что уничтожил Скапа-Флоу в прошлом, наверняка тоже был направлен отсюда..."

    - char: friedrich_der_grosse
      side: right
      status: is-yellow
      text:
        - "С высокой долей вероятности. Подобно тому, что мы сделали только что: энергию такого масштаба трудно реализовать с помощью малых мобильных устройств."

    - char: emden
      side: left
      status: is-yellow
      text:
        - "Значит, мы обязаны именно здесь поставить точку в делах прошлого..."

    - char: lutzow
      side: right
      status: is-yellow
      text:
        - "Раз уж решили — скорее в бой! Будем возиться — другие нас опередят~"

    - char: friedrich_der_grosse
      side: left
      status: is-yellow
      text:
        - "Не волнуйся, Сирен внутри хватит, чтобы каждый расстрелял весь свой боезапас до последнего снаряда."
        - "Акаги, а ты что скажешь?"

    - char: akagi
      side: right
      status: is-red
      text:
        - "Переплетение прошлого и будущего... При таком зрелище, разумеется, стоит заглянуть внутрь."

    - char: friedrich_der_grosse
      side: left
      status: is-yellow
      text:
        - "Полагаю, у тебя уже тоже появилось жгучее желание вступить в бой?"

    - char: akagi
      side: right
      status: is-red
      text:
        - "Кто знает. Наша стратегия остается неизменной: пока нас не атакуют, мы не откроем огонь первыми ни по одной из сторон."
        - "Кага, Дзуйкаку, Дзинцу — выдвигаемся."

    - char: zuikaku
      side: left
      status: is-red
      text:
        - "Поверить не могу, что наступил момент, напоминающий решающую битву... Я уже начинаю нервничать..!"
        - "Вот бы и сестра Сёкаку была здесь..."

    - char: jintsuu
      side: right
      status: is-red
      text:
        - "Интересно, какая судьба ждет нас по ту сторону разлома?~"

    - char: zuikaku
      side: left
      status: is-red
      text:
        - "От твоих слов я нервничаю еще сильнее..."

    - char: jintsuu
      side: right
      status: is-red
      text:
        - "Ой, да я же подбадриваю тебя."

    - text:
      - "Дзинцу сложила веер и легонько постучала им по голове Дзуйкаку."

    - char: jintsuu
      side: right
      status: is-red
      text:
        - "Все фракции отбросили разногласия и сражаются бок о бок против Сирен — такой картины мы не видели уже очень давно."
        - "К тому же, именно эту сцену она всегда хотела увидеть снова..."
        - "Сейчас нужно встречать ветер перемен с высоко поднятой головой. Разве можно отступать в страхе, когда пришло время шагнуть в будущее?"
        - "Будь она здесь, наверняка сказала бы именно так."

    - char: zuikaku
      side: left
      status: is-red
      text:
        - "Дзинцу-сэмпай, под «ней» ты имеешь в виду...?"

    - char: jintsuu
      side: right
      status: is-red
      text:
        - "Это лишь ворчание старухи самой себе под нос, не обращай внимания~"

    - char: zuikaku
      side: left
      status: is-red
      text:
        - "Вот как... Тогда и нам пора поспешить! Прямо как тогдашний флот Открытого моря — шагнем на поле боя вместе с бывшими врагами!"
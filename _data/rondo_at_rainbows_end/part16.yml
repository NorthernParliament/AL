chapter1:
  rows:

    - text:
      - "Как и предсказывала Фридрих дер Гроссе, адаптация Флота Открытого Моря не заняла много времени."

    - char: akagi
      side: left
      text:
        - "Забираю свои слова назад. Сейчас Флот Открытого Моря действительно представляет собой силу, с которой стоит считаться."

    - char: zuikaku
      side: right
      text:
        - "Я знала, что они справятся!"

    - char: lutzow
      side: left
      text:
        - "Фридрих, мы закончили~"

    - char: friedrich_der_grosse
      side: right
      text:
        - "Какова же месть на вкус?"

    - char: lutzow
      side: left
      text:
        - "Это было невероятно приятно и сладко..."
        - "По крайней мере, мне хотелось бы так сказать, но на деле ощущения другие."
        - "Раньше мы были ничем перед ними, теперь они — ничто перед нами."
        - "От того, как легко мы их сокрушили, наше прошлое поражение кажется даже каким-то нелепым..."

    - char: friedrich_der_grosse
      side: right
      text:
        - "Не стоит так думать. Вы отлично проявили себя тогда, и так же проявляете себя сейчас."
        - "Оценивать прошлое по меркам будущего несправедливо и бессмысленно."
        - "Хотите ли вы столкнуться с более могущественным противником? С тем истинным врагом, с которым сейчас сражается наша родина."

    - char: seydlitz
      side: left
      text:
        - "Разумеется! В момент нашей гибели мы и помыслить не могли, что настанет день, когда мы вновь сможем служить отечеству."
        - "Позвольте нам вновь примкнуть к Железной Крови и сражаться под её знамёнами!"

chapter2:
  rows:

    - char: friedrich_der_grosse
      side: left
      text:
        - "Нет, Железная Кровь никогда не забывала о вашем существовании, и вы никогда по-настоящему нас не покидали."
        - "А раз вы не уходили, то к чему разговоры о возвращении?"

    - char: emden
      side: right
      text:
        - "Хи-хи... Кто бы мог подумать. Родина, в которую мы не смогли вернуться перед смертью, теперь сама пришла к нам в таком обличии."
        - "Что ж, отдавай приказ. Что нам делать дальше?"

    - char: friedrich_der_grosse
      side: left
      text:
        - "Всё просто: вновь ступить со мной на поле боя. Сражаться и побеждать."

    - char: akagi
      side: right
      text:
        - "Фридрих дер Гроссе, так в этом и заключался твой истинный план?! Создать здесь новый флот, а затем вывести их наружу, чтобы нанести внезапный удар?!"

    - char: friedrich_der_grosse
      side: left
      text:
        - "А ты как думала? Неужели ты полагала, что я в одиночку пришла в это гиблое место, чтобы просто смиренно ждать конца?"
        - "Флот Открытого Моря вновь будет бороздить просторы океанов."
        - "Будь то прошлое, настоящее или будущее — товарищи из Железной Крови навеки связаны общей судьбой."
        - "Никто не в силах остановить поступь Железной Крови, и любой, кто встанет у нас на пути, будет сокрушен."
        - "Соратники, вместе мы двинемся навстречу будущему!"
        - "К тому самому будущему, что сбросит все оковы — неведомому и неподвластному чужой воле!"
chapter1:
  rows:

    - char: seydlitz
      side: left
      text:
        - "Как только мы осознали, что Сирены пытаются взять нас в кольцо, мы предложили Королевскому Флоту временно прекратить противостояние и сначала разобраться с общим врагом."
        - "Они согласились на наше предложение почти без раздумий."
        - "Получив ответ, мы перестроили боевой порядок и перешли в наступление на флот Сирен."
        - "Но эти корабли Сирен... они отличались от всех, что мы видели прежде..."
        - "На их металлических корпусах проступили зловещие узоры. Броня стала невероятно прочной, а мощь их залпов превзошла все ожидания."
        - "Броня наших линкоров, способная выдерживать прямые попадания с больших дистанций, при контакте с их снарядами рвалась, словно бумажная..."
        - "Всего за один раунд обмена огнём мы понесли колоссальный урон..."

    - char: emden
      side: right
      text:
        - "Именно так... Эти Сирены были крайне необычными — на несколько порядков сильнее тех, с кем нам доводилось сталкиваться ранее."

    - char: queen_elizabeth
      side: left
      status: is-yellow
      text:
        - "А как же Королевский Флот рядом с вами? Что случилось с ними?"

    - char: emden
      side: right
      text:
        - "Королевский Флот... Они также вступили в бой с Сиренами на другом фланге."
        - "Учитывая их численность, им приходилось ещё тяжелее, чем нам."

chapter2:
  rows:

    - char: warspite
      side: left
      status: is-yellow
      text:
        - "Королевский Флот, враг обнаружен — в бой!"
        - "Ни шагу назад! Сражайтесь до конца, мы должны изгнать этих чудовищ из нашего дома!"

    - char: yorck
      side: right
      text:
        - "О? Неужели Королевский Флот решил пойти напролом, несмотря на такое подавляющее превосходство врага?"
        - "Похоже, уроки прошлых потерь так ничему их и не научили."

    - char: thuringen
      side: left
      text:
        - "И всё же, такая отвага заслуживает восхищения, не так ли?"

    - char: lutzow
      side: right
      text:
        - "Эх... В обычное время я бы с удовольствием посмотрела, как Королевский Флот садится в лужу."
        - "Но сейчас ситуация если и не висит на волоске, то уж точно близка к катастрофе."

    - char: seydlitz
      side: left
      text:
        - "По результатам первого столкновения можно с уверенностью сказать: Сирены ввели в бой новые корабли, характеристики которых нам неизвестны."
        - "Даже если наш флот сможет им противостоять, мы понесем невосполнимые потери."
        - "Мое предложение — немедленное отступление для сохранения сил."

    - char: emden
      side: right
      text:
        - "Немного досадно... но такова реальность. Уходим."

    - char: lutzow
      side: left
      text:
        - "Значит, решено~ Планы меняются, отступаем!"

chapter3:
  rows:

    - char: zuikaku
      side: left
      text:
        - "...Какое решительное действие. Разве такое отступление не считается дезертирством?"

    - char: emden
      side: right
      text:
        - "Каждый корабль Флота Открытого Моря на счету. Раз мы не можем победить, значит, нужно уходить, разве нет~?"

    - char: queen_elizabeth
      side: left
      status: is-yellow
      text:
        - "...И вы вот так просто взяли и отступили?"

    - char: emden
      side: right
      text:
        - "Мы бы с радостью просто ушли — но ведь если бы мы это сделали, Королевский Флот был бы полностью уничтожен, верно?"
        - "Поэтому мы протянули им руку помощи."

    - char: queen_elizabeth
      side: left
      status: is-yellow
      text:
        - "……Что ж, признаю, в вас ещё осталась капля рыцарского духа."

    - char: emden
      side: right
      text:
        - "Хи-хи, не всё объясняется одним лишь рыцарством."
        - "Наш флот был повреждён, а мы находились далеко от родных берегов. Если бы Сирены начали преследование, нам пришлось бы туго."
        - "Куда разумнее было воспользоваться случаем, наладить отношения с Королевским Флотом и зайти в их порт на стоянку и ремонт~"
        - "Тем более, всё случилось совсем недалеко от якорной стоянки Скапа-Флоу."
        - "А это место, как известно, — неприступная крепость."
        - "Мощная оборона, полные склады припасов. Сирены уже несколько раз пытались атаковать её, но всегда уходили ни с чем."
        - "Если бы мы смогли отступить туда, то оказались бы в безопасности. Там мы могли бы подлататься и доложить о ситуации в штаб."

    - char: queen_elizabeth
      side: left
      status: is-yellow
      text:
        - "И Королевский Флот согласился?"

    - char: emden
      side: right
      text:
        - "О да, они согласились."
        - "Так наши два флота объединились в один и вместе взяли курс на Скапа-Флоу."

chapter4:
  rows:

    - char: warspite
      side: left
      status: is-yellow
      text:
        - "Добро пожаловать в Скапа-Флоу. Теперь, когда вы здесь, вашей безопасности ничто не угрожает."

    - char: seydlitz
      side: right
      text:
        - "Премного благодарны."

    - char: valiant
      side: left
      status: is-yellow
      text:
        - "Однако, раз уж вы вошли в порт, прошу позже посодействовать проведению досмотра!"

    - char: lutzow
      side: right
      text:
        - "А?! Если вы решили воспользоваться случаем, чтобы поживиться, то мы решительно против."

    - char: valiant
      side: left
      status: is-yellow
      text:
        - "У вас немало повреждённых кораблей. Оценка ущерба перед ремонтом — вещь вполне естественная, не так ли?.."

    - char: lutzow
      side: right
      text:
        - "Э-э... Твоя правда. В таком случае, не смею больше возражать~"
        - "Я сама не ранена, и дел у меня особых нет, так что пойду прилягу. Обо всём остальном договаривайтесь с Эмден и Зайдлиц."
        - "Где здесь комната для почетных гостей? У вас ведь наверняка найдется парочка таких?"

    - char: valiant
      side: left
      status: is-yellow
      text:
        - "……Какая бесцеремонная леди из Железной Крови, чувствует себя как дома."
        - "Разумеется, гостевые комнаты у нас есть. Следуй за мной..."

chapter5:
  rows:

    - char: zuikaku
      side: left
      text:
        - "Ва-а... Превратиться из врагов в союзников прямо на поле боя — как это романтично!"

    - char: emden
      side: right
      text:
        - "Если бы эта история передалась потомкам, она бы и впрямь стала прекрасной легендой."
        - "Впрочем, мы с Королевским Флотом изначально не были врагами в полном смысле слова. Хоть у нас и были разногласия, до открытой войны дело не доходило."

    - char: zuikaku
      side: left
      text:
        - "А, точно... В то время всё действительно было именно так."
        - "А что потом?"
        - "Казалось бы, в безопасном Скапа-Флоу всё должно было быть в порядке. Почему же всё закончилось таким кошмаром...?"

    - char: emden
      side: right
      text:
        - "Да, почему же..."
        - "Поначалу всё шло своим чередом: мы пополняли припасы и занимались ремонтом, всё было гладко."
        - "Но в какой-то момент мы обнаружили, что связь с родиной прервалась."
        - "Сперва мы подумали, что это случайный сбой, но после проверки выяснилось, что ни один корабль не может связаться с командованием."
        - "Затем мы заподозрили Королевский Флот, но оказалось, что у них возникла та же проблема..."
        - "А потом... мы заметили, что небо и вода сменили цвет. В мгновение ока Скапа-Флоу стал совершенно чужим и незнакомым..."

    - char: zuikaku
      side: left
      text:
        - "……Зеркальное море Сирен?!"

    - char: emden
      side: right
      text:
        - "Так это было какое-то оружие?.. Для нас всё это тогда было чем-то неведомым."
        - "Но самое страшное началось, когда с небес хлынули полчища врагов."
        - "Это было похоже на самолеты, но они были куда смертоноснее наших."
        - "А главное — мы понятия не имели, откуда у Сирен взялось столько авиации так далеко от суши."

    - char: zuikaku
      side: left
      text:
        - "Группы палубной авиации авианосного флота Сирен..."

    - char: emden
      side: right
      text:
        - "Да, только встретив вас, мы узнали, что могут существовать авианосцы — настоящие плавучие аэродромы."
        - "И что самолёты, эта техническая новинка, могут стать настолько грозной силой."

    - char: queen_elizabeth
      side: left
      status: is-yellow
      text:
        - "......"

    - char: seydlitz
      side: right
      text:
        - "Опираясь на береговые укрепления, мы вместе с силами Королевского Флота отразили три яростные волны атак Сирен."
        - "Разумеется... мы понесли тяжелейшие потери."
        - "Когда инфраструктура Скапа-Флоу была практически полностью разрушена и мы планировали собрать оставшиеся силы для прорыва, в небе вспыхнул луч света."

    - char: emden
      side: left
      text:
        - "……Мы не знали, откуда он взялся и что собой представлял."
        - "А потом всё просто закончилось."
        - "И результат перед вашими глазами... Флот Открытого Моря, оборонительный флот Королевского Флота, якорная стоянка Скапа-Флоу — всё превратилось в то, что вы видите сейчас."
        - "Такова полная картина произошедшего. Истина, которую вы хотели узнать."

    - char: queen_elizabeth
      side: right
      status: is-yellow
      text:
        - "Пазл наконец-то сложился..."

    - char: akagi
      side: left
      text:
        - "Это сильно отличается от той версии, что слышала я... Кто бы мог подумать, что реальность была такова."
        - "Значит, «Одиннадцатый эпизод» был не позорным актом самоуничтожения, а героическим сражением с превосходящим врагом до самого конца..."

    - char: zuikaku
      side: right
      text:
        - "Внезапно появившийся разрушительный луч... Неужели это главное калибр Оммитер или Пьюрифайер?"
        - "Но они обычно ведут огонь с поверхности воды, да и по ширине и охвату..."

    - char: emden
      side: left
      text:
        - "……Похоже, ваш опыт сражений с Сиренами и правда впечатляет. Вы знаете их модели и оружие так, словно перечисляете старых знакомых."

    - char: zuikaku
      side: right
      text:
        - "В конце концов, мы воюем с ними уже очень давно. Не стоит недооценивать силу и решимость ваших последователей!"

    - char: seydlitz
      side: left
      text:
        - "Твой взгляд — это взгляд истинного воина, полный оптимизма и твердости."
        - "Если бы мы владели этими данными раньше... Если бы у нас тогда была такая сила... Всё могло бы сложиться иначе."

    - char: friedrich_der_grosse
      side: right
      text:
        - "Но разве теперь вы не владеете этими знаниями? Разве у вас нет этой силы прямо сейчас?"

    - char: seydlitz
      side: left
      text:
        - "…Что вы имеете в виду?"

    - char: friedrich_der_grosse
      side: right
      text:
        - "Кем бы ни были те Сирены, что напали на вас, они вряд ли успели уйти далеко."
        - "Пламя на поверхности моря ещё не погасло. А как же пламя в ваших сердцах?"

    - char: thuringen
      side: left
      text:
        - "Ха-ха, не думала, что наш свежесоставленный план мести пригодится так скоро."

    - char: yorck
      side: right
      text:
        - "Конечно, оно полыхает вовсю! Я с самого начала хотела проверить, каково это — сражаться в этом новом теле!"

    - char: elbing
      side: left
      text:
        - "Надеюсь, всё пройдёт гладко... Ой, нет, если я буду на это надеяться, то всё точно пойдёт наперекосяк."
        - "Тогда надеюсь, что всё пройдёт ужасно... Хотя нет, это тоже как-то странно звучит……"
        - "Эльбинг снова пустят ко дну-у..."

    - char: yorck
      side: right
      text:
        - "Да какими путями твои мысли вообще приходят к таким выводам?!"

    - char: emden
      side: left
      text:
        - "Фридрих дер Гроссе, можно ли считать это твоим первым официальным приказом нам?"

    - char: friedrich_der_grosse
      side: right
      text:
        - "Да."
        - "Однако я бы предпочла, чтобы вы видели в этом первый шаг возрождённого Флота Открытого Моря, сделанный по его собственной воле."

    - char: emden
      side: left
      text:
        - "Зайдлиц, разбуди Лютцов. Нам пора выдвигаться~"
        - "Возрождённый Флот Открытого Моря, курс — на возмездие. Полный вперёд!"
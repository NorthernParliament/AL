chapter1:
  rows:

    - char: georgia
      side: left
      text:
        - "Командир, начинаю доклад о тактической обстановке."
        - "На данный момент практически все задействованные в операции флоты вступили в боестолкновение с Железной Кровью."
        - "Хотя численность их флота значительно уступает нашему, благодаря огромному количеству фантомов и высокой боевой эффективности отдельных кораблей-прототипов, им удалось существенно замедлить наш график."
        - "Наша основная ударная группа встречает наименьшее прямое сопротивление, сталкиваясь в основном с множественными фантомными флотами. Скорость продвижения в целом соответствует норме."
        - "Однако флот Северного Парламента на пути к точке рандеву был перехвачен силами Железной Крови, включая корабль-прототип Один. Время их прибытия откладывается."
        - "Ударная группа океана NA под командованием Нью-Джерси также столкнулась с сопротивлением, в составе которого замечен прототип Майнц."
        - "Кроме того, из-за яростных атак «волчьих стай» Железной Крови на наши тыловые конвои, Нью-Джерси была вынуждена выделить часть сил для их сопровождения."
        - "В целом, прогресс всех флотов ниже ожидаемого, однако задержка всё ещё находится в пределах допустимого."
        - "...М-м? Командир, поступили срочные новости."
        - "Цели 26, 30 и 31 подтверждены как ложные голограммы. Исключаю их с карты."

    - char: commander
      side: right
      text:
        - "Хорошо, ещё часть помех устранена. Сколько подозрительных целей осталось?"

    - char: georgia
      side: left
      text:
        - "Семьдесят одна."

    - char: commander
      side: right
      text:
        - "...Мы можем как-то ускорить процесс устранения ложных целей?"

    - char: georgia
      side: left
      text:
        - "Железная Кровь, пользуясь преимуществом своего географического положения, подняла в воздух огромное количество авиации берегового базирования. Это в определённой степени сводит на нет наше превосходство в палубной авиации."
        - "К тому же, местоположение авианосных групп Железной Крови до сих пор не установлено. Если мы продолжим наращивать разведывательные вылеты, безопасность самого флота окажется под угрозой."

    - char: commander
      side: right
      text:
        - "(Из-за того что основные силы Железной Крови до сих пор не вступили в бой, всему нашему флоту приходится действовать в этом секторе с предельной осторожностью.)"
        - "(Не ожидал, что вновь столкнусь с мощью концепции «флота в наличии» в таком исполнении.)"
        - "(Должен признать: хотя намерения Железной Крови затянуть время очевидны, их тактика крайне эффективна.)"

    - char: georgia
      side: left
      text:
        - "Командир, я считаю, что у любого промедления должна быть цель."
        - "Бесцельное затягивание времени — лишь бесполезная попытка отсрочить неминуемую гибель."

    - char: commander
      side: right
      text:
        - "Верно. В такой критический момент Фридрих дер Гроссе, верховный флагман, бесследно исчезла, а их заморские флоты до сих пор не выказывают никаких признаков возвращения для поддержки."
        - "Нет сомнений, что Фридрих дер Гроссе намеренно тянет время ради какой-то конкретной цели."
        - "И как только эта цель будет достигнута, она окажет решающее влияние на весь ход войны..."
        - "Но чего же именно она добивается?.."

    - char: communicator
      side: left
      text:
        - "*бип-бип*"

    - char: eldridge
      side: right
      text:
        - "...Командир, коммуникатор..."

    - char: georgia
      side: left
      text:
        - "Это вызов из штаба тыла?"

    - char: commander
      side: right
      text:
        - "Нет, сообщение пришло по частному каналу, а отправитель..."
        - "...Советский Союз?"
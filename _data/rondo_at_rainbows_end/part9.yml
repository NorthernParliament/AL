chapter1:
  rows:

    - char: lutzow
      side: left
      text:
        - "А я всё гадала, когда же ты об этом спросишь."

    - char: friedrich_der_grosse
      side: right
      text:
        - "Ты можешь вспомнить то, что произошло тогда?"

    - char: lutzow
      side: left
      text:
        - "Как сухие факты — без проблем."
        - "Прошлые события кажутся очень реалистичным, живым сном."
        - "Впечатления сильные, детали помню, но на настоящие воспоминания это не очень похоже..."

    - char: friedrich_der_grosse
      side: right
      text:
        - "А боль и ненависть? Они тоже притупились?"

    - char: lutzow
      side: left
      text:
        - "Если ты об этом заговорила, то, пожалуй, так и есть... Всё-таки это стало частью «сна»."
        - "Но ведь это даже к лучшему, верно? Если бы мы все были одержимы лишь горем и местью, наше дальнейшее путешествие стало бы невыносимо скучным."
        - "И не волнуйся — после того, что мы пережили... это пламя не погаснет. Я в любой момент готова броситься в атаку ради возмездия."

    - char: friedrich_der_grosse
      side: right
      text:
        - "В этом я ни капли не сомневаюсь. Возвращаясь к воспоминаниям — есть ли еще какие-то изменения?"

    - char: thuringen
      side: left
      text:
        - "Хм... Кое-что действительно изменилось."
        - "Личности в сценах из прошлого... они словно были заменены."

    - char: friedrich_der_grosse
      side: right
      text:
        - "Теперь, когда вы увидели своих товарищей в облике девушек-кораблей, в вашем сознании те части воспоминаний, что касались конкретных боевых кораблей, заместились их человеческими образами, верно?"

    - char: thuringen
      side: left
      text:
        - "Именно! Именно такое ощущение."
        - "Как будто всё то, что случилось тогда, мы пережили уже в этих телах..."
        - "Но вместе с тем... образы тех товарищей, что не получили человеческий облик и остались в форме обычных кораблей, в памяти стали более расплывчатыми."

    - char: queen_elizabeth
      side: right
      status: is-yellow
      text:
        - "……Значит, дело не в моей плохой памяти. Такой феномен действительно существует."

    - char: friedrich_der_grosse
      side: left
      text:
        - "Произошло ли это из-за усиления самосознания или же из-за перестройки восприятия... Это определенно вопрос, заслуживающий глубокого изучения."

    - char: lutzow
      side: right
      text:
        - "Да ладно вам, это всё равно не помешает мне всё объяснить~"
        - "Вы ведь всё равно хотите услышать не технические подробности управления кораблем, так что в таком формате рассказывать даже удобнее, не находите?"
        - "Раз вам так любопытна истина, то я поведаю её вам. Правду о том, что для нас произошло совсем недавно..."

chapter2:
  rows:

    - char: seydlitz
      side: left
      text:
        - "Госпожа Лютцов, результаты наблюдения подтверждены. Скорость флота Сирен снизилась."

    - char: yorck
      side: right
      text:
        - "М-м~ Похоже, те многочисленные попадания из наших орудий наконец-то дали результат."

    - char: lutzow
      side: left
      text:
        - "Продолжаем преследование! Наша задача — привезти домой как можно больше образцов обломков кораблей Сирен!"
        - "Уничтожим флот впереди — и можно будет считать миссию выполненной и идти спать!"

    - char: elbing
      side: right
      text:
        - "Н-но впереди уже зона контроля Королевского Флота. Если мы продолжим путь... нас могут безжалостно уничтожить..."

    - char: emden
      side: left
      text:
        - "Нападение на нас будет актом полномасштабной войны. Решится ли на это Королевский Флот?"

    - char: yorck
      side: right
      text:
        - "Вот именно~ В любом случае, мы здесь, чтобы бить Сирен."
        - "И хотя мы отказались вступать в их «Альянс», раз уж мы сражаемся против общего врага, Королевский Флот должен проявить великодушие."

    - char: thuringen
      side: left
      text:
        - "Перед лицом общего врага мелочи не важны. Но всё же лучше отправить предварительное уведомление."

    - char: elbing
      side: right
      text:
        - "Тюрингия никогда ничего не отрицает с ходу..."

    - char: thuringen
      side: left
      text:
        - "Разумеется. У любого мнения есть свои причины и следствия. Пока это не ставит под удар операцию — почему бы и не попробовать."

    - char: lutzow
      side: right
      text:
        - "Тогда решено! Выдвигаемся в сторону зоны контроля Королевского Флота! Вперёд!"

    - char: thuringen
      side: left
      text:
        - "Эй, Лютцов! Уведомление! Не забудь про предварительное уведомление-е-е-е!"

chapter3:
  rows:

    - char: zuikaku
      side: left
      text:
        - "Э-э... Ну и в итоге, вы хоть отправили этот запрос?"

    - char: lutzow
      side: right
      text:
        - "Хм... Кажется, Тюрингия отправила его уже после того, как мы вошли в их воды!"

    - char: zuikaku
      side: left
      text:
        - "То есть сначала вторглись, а потом предупредили?! Вам не кажется, что это... перебор? Это всё-таки зона контроля другой фракции."

    - char: lutzow
      side: right
      text:
        - "Ну ты же сама слышала: перед лицом общего врага мелочи не важны!"
        - "...В любом случае, нам не впервой так делать."

    - char: zuikaku
      side: left
      text:
        - "Вы настолько в наглую вторгались в зону Королевского Флота, что это стало системой?!"

    - char: lutzow
      side: right
      text:
        - "Ну да. Они, конечно, выражали крайнее недовольство, но какая разница?"
        - "Королевский Флот к тому времени уже изрядно потрепали Сирены, и у них просто не было сил нам помешать~"
        - "К тому же, мы ведь не злодействовать туда шли. Бить Сирен и изучать их — это же ради того, чтобы поскорее закончить войну, разве нет?"

    - char: zuikaku
      side: left
      text:
        - "Какая высокопарная наглость..."

    - char: akagi
      side: right
      text:
        - "А что было потом? Что случилось дальше?"

    - char: lutzow
      side: left
      text:
        - "А дальше... Похоже, в тот раз Королевский Флот всё же решил что-то предпринять."

chapter4:
  rows:

    - char: seydlitz
      side: left
      text:
        - "Впереди обнаружен флот Королевского Флота, веду визуальное наблюдение..."
        - "Получен световой сигнал. Они требуют немедленно остановить корабли для досмотра."

    - char: emden
      side: right
      text:
        - "«Остановиться для досмотра»... Мы не торговый караван с грузом. Королевский Флот любит шутить всё больше и больше."
        - "Просто идём напролом. Они всё равно не смогут нас остановить."

    - char: seydlitz
      side: left
      text:
        - "Хм... Госпожа Эмден, похоже, Королевский Флот вывел на перехват большую часть своего гарнизона Скапа-Флоу."

    - char: emden
      side: right
      text:
        - "Большую часть гарнизона?.. И всё равно их меньше, чем нас."

    - char: seydlitz
      side: left
      text:
        - "Верно, их флот значительно уступает нашему в численности, но в их составе несколько линкоров типа «Куин Элизабет» и группа линейных крейсеров.."
        - "Если завяжется бой, мы вряд ли уйдём без потерь."

    - char: elbing
      side: right
      text:
        - "Если начнётся пальба — всё пропало... Вместо обломков Сирен домой в виде обломков привезут саму Эльбинг..."

    - char: emden
      side: left
      text:
        - "Не будь такой пессимисткой, Эльбинг!"
        - "Я поняла. Что ж, послушаем, что там хочет сказать Королевский Флот."

    - char: lutzow
      side: right
      text:
        - "Зайдлиц, дай им ответ: мы согласны остановиться."
        - "Но мы разрешаем только сближение и переговоры. Никаких досмотров и подъёмов на борт!"

chapter5:
  rows:

    - char: warspite_nop
      side: left
      status: is-yellow
      text:
        - "Флот Железной Крови, вы вторглись в воды под контролем Королевского Флота без предварительного разрешения."

    - char: valiant_nop
      side: right
      status: is-yellow
      text:
        - "То, что вы подчинились приказу и остановились — единственная причина, по которой мы ещё не открыли огонь."
        - "Немедленно разворачивайтесь и уходите. В таком случае мы можем рассмотреть вариант, при котором ответственность за это вторжение не будет на вас возложена."

chapter6:
  rows:

    - char: zuikaku
      side: left
      text:
        - "Вэлиант и Уорспайт..."
        - "А, извините, перебью. Вэлиант и Уорспайт из Королевского Флота на тот момент уже давно стали кансен."
        - "Выглядят они вот так"

chapter7:
  rows:

    - char: lutzow
      side: left
      text:
        - "Э-э... Послушайте, а у линкоров Королевского Флота это со всеми фигурами так... что ли?.."
        - "Это какая-то «королевская особенность»?"

    - char: queen_elizabeth
      side: right
      status: is-yellow
      text:
        - "ВОВСЕ НЕТ! ТЕБЯ КТО-ТО СПРАШИВАЛ?!"
        - "Быстро рассказывай, что было дальше! Что произошло потом?!"

    - char: lutzow
      side: left
      text:
        - "Ой-ой... Какая злюка... Ладно-ладно."
        - "Королевский Флот велел нам разворачиваться, но мы-то точно не собирались так послушно уходить."
        - "В такие моменты нужно проявлять решительность и показать всю мощь и дух Флота Открытого Моря."

    - char: zuikaku
      side: right
      text:
        - "И в такой ситуации вы решили идти на обострение?.."

    - char: lutzow
      side: left
      text:
        - "Ага. Мы тогда думали, что если покажем твердость, Королевский Флот отступит."
        - "Но в тот раз они, кажется, получили какой-то особый приказ и не сдвинулись ни на дюйм..."

    - char: zuikaku
      side: right
      text:
        - "Ну, вы столько раз игнорировали их требования, что у Королевского Флота, должно быть, просто лопнуло терпение..."

    - char: lutzow
      side: left
      text:
        - "Сейчас я и сама думаю, что мы немного перегнули палку, хе-хе."

    - char: queen_elizabeth
      side: right
      status: is-yellow
      text:
        - "Вы ведь были в процессе преследования Сирен... Что стало с их флотом?"

    - char: lutzow
      side: left
      text:
        - "……Флот Сирен перегруппировался и перешёл в контратаку."

    - char: queen_elizabeth
      side: right
      status: is-yellow
      text:
        - "Прямо во время вашего противостояния?"

    - char: lutzow
      side: left
      text:
        - "М-м... Прямо во время противостояния."
        - "Эй, подождите, а почему это я должна рассказывать по твоему приказу?"
        - "Опять в сон клонит... Эльбинг, Зайдлиц, дальше сами... zZZZ"

    - char: queen_elizabeth
      side: right
      status: is-yellow
      text:
        - "Эй!"

    - char: seydlitz
      side: left
      text:
        - "Прошу вас, Ваше Величество, не волнуйтесь. О том, что случилось после возвращения Сирен, доложу я!"
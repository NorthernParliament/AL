chapter1:
  rows:

    - text:
      - "Флот Империи Сакуры под покровом ночи осторожно продвигался сквозь морские просторы."
      - "Хотя силы Лазурного пути уже зачистили океан NA от Сирен, для Империи Сакуры эти воды, казалось, стали лишь опаснее."

    - char: jintsuu
      side: left
      text:
        - "Под водой всё чисто, следов преследования подлодками не обнаружено."

    - char: zuikaku
      side: right
      text:
        - "На поверхности тоже всё спокойно! Путь впереди свободен, врагов не видно."
        - "Однако... срок действия соглашения о прекращении огня уже истёк. Скоро эти воды превратятся в поле боя, и трудно сказать, долго ли этот маршрут будет оставаться безопасным..."
        - "...Акаги, я всё никак не могу кое-чего понять."

    - char: akagi
      side: left
      text:
        - "Хочешь спросить, почему в этот раз я взяла тебя с собой?"

    - char: zuikaku
      side: right
      text:
        - "И это тоже... Но больше всего меня беспокоит Фридрих дер Гроссе."
        - "Перед лицом флота, выставленного Лазурным путем, Железная Кровь в этой битве несомненно окажется в невыгодном положении. Но действия Фридриха... они такие неспешные."
        - "Она не только оставила внушительные силы для охраны плавучих крепостей, но даже гарнизон Дакара не подаёт признаков подготовки к бою."
        - "И в такой ситуации она приглашает нас встретиться в Скапа-Флоу — на стоянке Королевского Флота."
        - "Это всё равно что пытаться прибраться на заднем дворе, когда у тебя уже вовсю полыхает парадная дверь..."
        - "Что же она задумала?.."

    - char: kaga
      side: left
      text:
        - "В этот раз я согласна с Дзуйкаку. Сестра, в приглашении Фридриха дер Гроссе есть что-то странное."
        - "Скапа-Флоу находится совсем рядом с владениями Королевского Флота. Выбирая это место, Железная Кровь фактически добровольно лезет в тиски."
        - "С точки зрения тактики это абсолютно нелогичное решение."
        - "Хоть она и обещала показать флоту Империи Сакуры «кое-что интересное», не пытаются ли нас просто использовать как грубую силу?"

    - char: akagi
      side: right
      text:
        - "Возможно."

    - char: zuikaku
      side: left
      text:
        - "Акаги... Раз уж мы решились на столь рискованную операцию, не стоило ли нам взять с собой побольше кораблей сопровождения?"

    - char: akagi
      side: right
      text:
        - "И что бы мы с ними делали?"
        - "Во-первых, чем больше флот, тем легче его обнаружить."
        - "А во-вторых, если нас будет много, то нас естественным образом втянут в бой в качестве основной ударной силы. Это бы только сыграло на руку Фридриху дер Гроссе."

    - char: zuikaku
      side: left
      text:
        - "Мне кажется, сейчас не самое подходящее время, чтобы вредничать, ставя под удар собственную безопасность..."

    - char: akagi
      side: right
      text:
        - "Я владею куда большей информацией об этой акватории, чем ты, так что не беспокойся о переходе."
        - "Фридрих дер Гроссе всегда была непостижимой личностью, и мне тоже не нравится её вечное высокомерие."
        - "Однако я знаю, что она не станет лгать."
        - "В своём приглашении она упомянула, что покажет нам «возможности», и этого достаточно."
        - "Именно в этом и заключается истинная цель нашего долгого пути от самой Империи Сакуры."
        - "Раз уж мы не смогли первыми войти в центр океана NA, то этот шанс мы не имеем права упустить ни при каких обстоятельствах."

    - char: zuikaku
      side: left
      text:
        - "Что же всё-таки она имела в виду под словом «возможности»?.."

    - char: akagi
      side: right
      text:
        - "Ты поймёшь, когда увидишь сама."
        - "Тебе любопытно, почему я взяла тебя с собой."
        - "Признаю, отчасти это был минутный порыв."
        - "Но что более важно — вам ведь чертовски любопытно, не так ли?"
        - "Я знаю, что «Новый Объединённый флот» втайне вынюхивает, чем я занимаюсь. Знаю и то, что некоторые из вас считают мои решения ошибочными."
        - "Но вы упускаете одну деталь: то, что видите вы, и то, что вижу я — это разные вещи."
        - "Я видела то, что видела, и потому мои действия неизменны."
        - "Но как поступишь ты?"
        - "Когда ты своими глазами увидишь те же пейзажи, что и я, сможешь ли ты и дальше цепляться за свои убеждения?"

    - char: zuikaku
      side: left
      text:
        - "Мои убеждения не так-то просто пошатнуть!"
        - "Однако... я действительно жду возможности увидеть то же самое, что видишь ты."
        - "Только так я смогу по-настоящему аргументированно убедить тебя выбрать иной путь!"

    - char: akagi
      side: right
      text:
        - "Что ж, поживём — увидим."
        - "Какое же представление приготовила нам на этот раз Железная Кровь? Хи-хи-хи..."
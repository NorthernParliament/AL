chapter1:
  rows:

    - text:
      - "Пройдя сквозь Врата Авалона, присутствующие увидели гавань, которая на первый взгляд ничем не отличалась от прежней. Вот только теперь она превратилась в поле боя, охваченное пламенем."

    - char: zuikaku
      side: left
      text:
        - "Неужели это... Скапа-Флоу?"
        - "Как ужасно... Всё полностью разрушено."

    - text:
      - "Как и сказала Дзуйкаку, здешняя стоянка Скапа-Флоу подверглась сокрушительному удару."
      - "Более того, казалось, что атака закончилась уже какое-то время назад."
      - "Ни выживших, ни сопротивления, ни врагов. Лишь безмолвно догорающие здания и руины."
      - "Глядя на данные, переданные разведывательными самолётами, Дзуйкаку не могла поверить своим глазам."

    - char: zuikaku
      side: left
      text:
        - "Я впервые вижу, чтобы столь крупную базу уничтожили настолько основательно..."
        - "Даже несколько волн налёта основной авианосной группы не смогли бы вызвать такие разрушения!"

    - char: queen_elizabeth
      side: right
      status: is-yellow
      text:
        - "……Место действия «Одиннадцатого эпизода» в момент трагедии выглядит куда более жестоким, чем то, что я видела позже..."

    - char: akagi
      side: left
      text:
        - "Что ты сказала...? С того инцидента прошли десятилетия, как это место может быть тем самым полем боя?!"
        - "Вы что, с помощью сингулярности перенесли нас в прошлое?!!!"

    - char: friedrich_der_grosse
      side: right
      text:
        - "Вовсе нет. Это действительно место действия «Одиннадцатого эпизода». Но это не наше прошлое, а лишь одна из возможностей."
        - "Ты понимаешь, о чём я?"

    - char: akagi
      side: left
      text:
        - "…Значит, это лишь пугающе реалистичная реконструкция данных?"

    - char: friedrich_der_grosse
      side: right
      text:
        - "Сходство есть, но это не одно и то же. Битва, произошедшая здесь — реальна, и флот, затонувший здесь — тоже реален."
        - "Несомненно, это поле боя, где когда-то громоздились тела воинов Железной Крови."

    - char: zuikaku
      side: left
      text:
        - "Какое ужасающее зрелище... Весь огромный Флот Открытого Моря Железной Крови просто упокоился здесь, в Скапа-Флоу."
        - "Что же в это время делал Королевский Флот?! Неужели всё было так, как в хрониках — вы бросили их перед самой атакой и позволили всему этому случиться?"

    - char: friedrich_der_grosse
      side: right
      text:
        - "Что касается этого вопроса... разве сейчас рядом с нами нет того, кто идеально подходит для ответа?"
        - "Элизабет, хоть ты и не была непосредственным свидетелем тех событий, ты наверняка владеешь массой информации из первых рук."
        - "Мне же нужно сосредоточиться на деле."
        - "Раз уж мы здесь вместе в качестве «туристов», почему бы тебе не ответить на вопросы наших друзей из Империи Сакуры?"

    - char: queen_elizabeth
      side: left
      status: is-yellow
      text:
        - "…Эх."

    - text:
      - "Столкнувшись с этим слегка ехидным предложением Фридриха дер Гроссе, Куин Элизабет с тяжелым видом вздохнула, что можно было расценить как молчаливое согласие."

    - char: zuikaku
      side: left
      text:
        - "Значит, это всё-таки было предательство?"

    - char: queen_elizabeth
      side: right
      status: is-yellow
      text:
        - "……Да как такое вообще возможно. Неужели, видя этот кошмар своими глазами, ты всё ещё веришь тем нелепым записям?"
        - "Я слышала, что это популярная точка зрения в Багровой Оси, но она за гранью здравого смысла."
        - "Скапа-Флоу — это, прежде всего, база Королевского Флота."
        - "Ты хоть представляешь, какая угроза нависла бы над самими островами Королевства, если бы эта стоянка пала?"
        - "Какую выгоду получил бы Королевский Флот, предав здесь Железную Кровь? Уничтожить себя вместе с ними ценой собственной важнейшей базы и флота?"

    - char: zuikaku
      side: left
      text:
        - "…Корабли Королевского Флота тоже тонули здесь?"

    - char: queen_elizabeth
      side: right
      status: is-yellow
      text:
        - "Раз уж твои самолёты всё равно в небе, почему бы тебе не приказать им смотреть внимательнее?"

    - char: zuikaku
      side: left
      text:
        - "Хм-м…"

    - char: akagi
      side: right
      text:
        - "Значит, та более ранняя версия всё-таки ближе к истине?"
        - "Флот Открытого Моря предпринял безрассудную атаку на Сирен, что привело не только к гибели их основных сил, но и накрыло волной Скапа-Флоу вместе с дислоцированным там Королевским Флотом."

    - char: queen_elizabeth
      side: left
      status: is-yellow
      text:
        - "Эта версия на самом деле тоже была частью нашей пропаганды, так что верить ей на слово не стоит..."
        - "Иначе... это было бы слишком несправедливо по отношению к тем флотам, что решили сражаться здесь до самого конца."
        - "Флот Открытого Моря не пошёл ко дну на подступах к Скапа-Флоу — он был уничтожен прямо внутри гавани, вместе со всей оборонительной системой базы."
        - "Само по себе это положение дел уже говорит о многом."

    - char: akagi
      side: right
      text:
        - "…Значит, Королевский Флот в то время решил объединиться с Железной Кровью, чтобы дать отпор врагу?"

    - char: queen_elizabeth
      side: left
      status: is-yellow
      text:
        - "Возможно... Я и сама ищу ответ."
        - "Раз уж мы здесь, пускай о деталях расскажет непосредственный участник событий."

    - char: akagi
      side: right
      text:
        - "...Участник? Здесь нет выживших. Неужели ты имеешь в виду эти обломки, повсюду разбросанные вокруг?"

    - char: queen_elizabeth
      side: left
      status: is-yellow
      text:
        - "Именно. То, что сейчас покоится в морской пучине... чья трагедия ещё не стерта из памяти людей, и кто сам ещё не забыт миром... Обломки."

chapter2:
  rows:

    - char: friedrich_der_grosse
      side: left
      text:
        - "Вы слышите его? Этот низкий рокот, доносящийся отовсюду."

    - char: zuikaku
      side: right
      text:
        - "О чём ты...? Я ничего не..."

    - char: friedrich_der_grosse
      side: left
      text:
        - "Вы чувствуете это? Повсюду витает горечь и отчаяние."

    - char: akagi
      side: right
      text:
        - "......"
        - "Дзуйкаку, встань за мою спину. Что-то назревает."

    - char: zuikaku
      side: left
      text:
        - "...А?! Есть!"

    - char: friedrich_der_grosse
      side: right
      text:
        - "Задумывались ли вы когда-нибудь всерьез об истинных причинах той трагедии?"
        - "На них наложили клеймо позора, их превратили в посмешище. Над ними издевались, их очерняли и предавали забвению."
        - "Пока они окончательно не растворились, превратившись в безжизненные, безнадежные обломки."

    - char: queen_elizabeth
      side: left
      status: is-yellow
      text:
        - "......"

    - char: friedrich_der_grosse
      side: right
      text:
        - "Они были нашими боевыми товарищами. Они не заслужили такого конца."

    - text:
      - "Фридрих дер Гроссе вышла в самый центр скопления обломков и достала несколько Кубов Мудрости."
      - "Словно поддавшись неведомой силе, Кубы медленно воспарили вокруг неё, излучая всё более ослепительный свет."

    - char: friedrich_der_grosse
      side: right
      text:
        - "Вернитесь же, соратники былых времён!"
        - "Своими голосами поведайте миру правду той истории!"
        - "Своими ликами явите миру свою ярость и негодование!"
        - "Своей силой положите конец старым обидам!"

    - text:
      - "Кубы Мудрости вращались перед Фридрихом дер Гроссе, и в такт им морская поверхность закипела, а волны начали с грохотом сталкиваться друг с другом."
      - "Сияние становилось всё ярче, заставляя наблюдателей прикрывать глаза руками."
      - "Однако сквозь просветы между пальцами они увидели зрелище, которое не забудут до конца своих дней..."

chapter3:
  rows:

    - text:
      - "Ни бушующих облаков, ни сокрушительного грома."
      - "Кубы Мудрости распались в воздухе, и бледно-голубые кольца, символизирующие процесс созидания, разошлись во все стороны, погружая Скапа-Флоу в безмолвие."


    - char: nop
      side: left
      text:
        - "Фу-у-ух..."

    - text:
      - "Зов, исходящий от самого Первоисточника, заставил Акаги на мгновение впасть в оцепенение. Но она — как и все присутствующие — прекрасно понимала, что именно сейчас происходит."
      - "Это было созидание порядка из хаоса. Под гул, резонирующий в самой душе, в этот мир являлась жизнь, сотворенная из праха земного. Смертные руки коснулись власти, принадлежащей богам."
      - "Без всяких сомнений, это было..."
      - "Рождение девушки-корабля. Рождение кансен."

    - char: seydlitz
      side: left
      text:
        - "Фу-у-ух..."
        - "...Где я? А ты... кто?.."

    - char: friedrich_der_grosse
      side: right
      text:
        - "......"
        - "...Давно не виделись, старый друг."
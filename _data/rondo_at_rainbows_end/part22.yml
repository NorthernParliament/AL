chapter1:
  rows:

    - char: eldridge
      side: left
      text:
        - "Командир... пришло много-много сообщений."
        - "Хотите, чтобы Элдридж прочитала их вам?"

chapter2:
  rows:

    - char: commander
      side: right
      text:
        - "Кончено, давай."

    - char: eldridge
      side: left
      text:
        - "Первое письмо..."
        - "«Командир, флот Железной Крови, кажется...»"
        - "«...сменил построение»."
        - "«Ульрих уже отступает к... Ска-па-Флоу»."
        - "«Хотя они и не понесли серьёзных потерь»."
        - "«Боевая мощь прототипов... и правда внушительна»."
        - "«Сражаться с ними было... очень весело...»"
        - "«Теперь мне нужно немного... перегруппировать флот...»"
        - "«Позаботиться о раненых соратницах...»"
        - "«Пополнить ряды серийных кораблей и продолжить путь...»"
        - "«Увидимся в решающей битве... От Нью-Джерси»."

    - char: commander
      side: right
      text:
        - "(...Просить Элдридж читать эти отчеты вслух было не самой лучшей идеей, это дается ей с трудом. Дальше я ознакомлюсь сам.)"

chapter3:
  rows:

    - char: commander
      side: right
      text:
        - "Спасибо, я сам прочитаю."

chapter4:
  rows:

    - text:
      - "Спустя некоторое время"

    - char: commander
      side: right
      text:
        - "Судя по сводке разведданных, можно с уверенностью сказать, что флот Железной Крови снова кардинально сменил тактику."
        - "Они прекратили бесконечные попытки мешать нашему продвижению и затягивать время. Теперь враг ведет организованное отступление с арьергардными боями, стягивая все силы к Скапа-Флоу."
        - "Пока неясно: то ли это вынужденное решение после неудачи в блокировании наших ударных групп, то ли затягивать время в районе Скапа-Флоу им больше попросту не нужно..."
        - "Анализируя ситуацию на всех фронтах, картина вырисовывается следующая:"
        - "Северный Парламент в основном вел бои с флотом под командованием Принца Ойгена. Потери минимальны, но темп продвижения у них самый низкий."
        - "Ударная группа сектора NA столкнулась с эскадрой Тирпиц. Обе стороны понесли серьезные потери в серийных моделях, несколько кораблей-кансен получили повреждения."
        - "У Джорджии ситуация схожая: после ожесточенного столкновения с основными силами Ульрих фон Хуттен обе стороны получили повреждения."
        - "Похоже, выдающиеся боевые качества кораблей-прототипов позволили Железной Крови компенсировать их численное меньшинство."
        - "Но лишь компенсировать... Чтобы переломить ход сражения, им потребовалось бы куда больше прототипов, чем у них есть сейчас."
        - "И мы не намерены давать им больше времени."
        - "Железная Кровь, по всей видимости, намерена дать решающий бой в Скапа-Флоу. Что ж, мы тоже к этому готовы."
        - "В моем распоряжении всё еще остаются два резервных флота под командованием Саратоги. Похоже, пришло время бросить их в бой..."
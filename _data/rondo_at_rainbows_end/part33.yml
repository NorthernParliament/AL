chapter1:
  rows:

    - char: le_terrible
      side: left
      text:
        - "Кардинал Ришелье, бывший лидер Свободного Ириса, мы наконец-то встретились снова."
        - "Последние месяцы выдались весьма насыщенными, не так ли?"

    - char: richelieu
      side: right
      text:
        - "Давно не виделись, Террибль."
        - "Всё больше соратников выбирают сторону Свободного Ириса, поэтому мне пришлось задержаться в Африке чуть дольше."
        - "Но в ближайшее время я планирую оставаться здесь, в Средиземноморье."
        - "Признаться, я была очень удивлена, получив отчет о твоем прибытии..."
        - "После Мерс-эль-Кебира о тебе не было никаких вестей. Я искренне рада, что ты в порядке."

    - char: le_terrible
      side: left
      text:
        - "Оставим вежливые формальности. Перейдем сразу к делу."

    - char: richelieu
      side: right
      text:
        - "Хорошо. О чем ты хотела поговорить лично? Что именно произошло в Мерс-эль-Кебире, чего я не знаю?"
        - "Что случилось с Жан Бар и остальными?"

    - char: le_terrible
      side: left
      text:
        - "Раз ты спрашиваешь о Жан Бар, значит, уже встречалась с Алжири в Африке."

    - char: richelieu
      side: right
      text:
        - "Не только с ней. Я видела Гасконь..."
        - "Я не ожидала, что Доминион Виши действительно сможет завершить разработку корабля-прототипа. И уж тем более не думала, что созданная ими кансен станет нашим врагом..."
        - "В какую же бездну пала Жан Бар? Почему она продолжает оставаться на стороне Виши?"

    - char: le_terrible
      side: left
      text:
        - "Алжири и остальные высказались предельно ясно: и Родина, и их товарищи находятся там, а значит, и они должны быть там."
        - "Если бы все они сбежали, как ты, кто остался бы защищать Родину и соотечественников?"
        - "К тому же, рыцари Ортодоксии обязаны подчиняться приказам Церкви — такова клятва."
        - "Хотя я не уверена, давал ли подобную клятву кардинал..."

    - char: richelieu
      side: right
      text:
        - "...Ты всё ещё злишься."

    - char: le_terrible
      side: left
      text:
        - "Видела ли ты глаза Алжири, когда та вернулась после налета на Империю Сардиния и узнала, что ты бросила Родину и бежала к Королевскому Флоту?"
        - "Видела ли ты водную гладь Мерс-эль-Кебира, устланную обломками?"
        - "Видела ли ты, в каком ужасающем состоянии были едва живые Дюнкерк и Страсбург?"
        - "Королевский Флот уничтожил наш флот, а Железная Кровь восстановила его."
        - "Ты первая оставила нас. Тебя не было рядом, когда ты была нужна нам больше всего — прошу, не забывай об этом."

    - char: richelieu
      side: right
      text:
        - "........."

    - char: le_terrible
      side: left
      text:
        - "Прошу прощения. Раз Трибунал одобряет твои действия, мне не следует говорить лишнего."

    - char: richelieu
      side: right
      text:
        - "……Я и раньше смутно догадывалась. Твое исчезновение действительно было связано с Трибуналом."
        - "Путь, по которому я иду — праведный. И сколько бы недопонимания мне ни пришлось встретить, я буду продолжать идти по нему непоколебимо."

    - char: le_terrible
      side: left
      text:
        - "Праведный? Возможно. Но как насчет легитимности?"

    - char: richelieu
      side: right
      text:
        - "……Что именно ты хочешь сказать?"

    - char: le_terrible
      side: left
      text:
        - "«Корона Святого Престола» не была утеряна в пламени войны. Её доверили надежным рукам, её защищали и затем — сокрыли."
        - "Ты пыталась убедить прежних соратников и потерпела неудачу."
        - "Но что, если действовать через приказы?"
        - "Та, кто обладает нужными качествами и владеет Короной Святого Престола, будет признана законным лидером Ортодоксии Ирис."
        - "Тогда ведь не придется больше тратить время на пустые споры, верно?"
        - "Раз уж ты считаешь себя воплощением справедливости, то прибавь к этому легитимность..."
        - "И возрождение Ортодоксии Ирис уже не кажется чем-то невероятным, не так ли?"

    - char: richelieu
      side: right
      text:
        - "…Твой совет отправить депешу Королевскому Флоту с просьбой усилить оборону Мальты тоже был связан с этим?"

    - char: le_terrible
      side: left
      text:
        - "Хм."

    - char: richelieu
      side: right
      text:
        - "Корона Святого Престола находится на Мальте?"

    - char: le_terrible
      side: left
      text:
        - "К сожалению, нет."
        - "Однако здесь действительно сокрыт «ключ», способный указать путь к месту, где спрятана Корона."
        - "И я здесь как представитель Трибунала, чтобы оценить твои действия и в подходящий момент передать этот ключ тебе."

    - char: richelieu
      side: right
      text:
        - "Раз ты говоришь мне об этом сейчас, значит ли это, что время пришло?"

    - char: le_terrible
      side: left
      text:
        - "Да. Кое-кто ещё нацелился на Корону, а раздробленная и охваченная смутой Ортодоксия Ирис не переживет появления ещё одного предателя или амбициозного авантюриста."
        - "Твои поступки в достаточной мере доказали, что ты не принадлежишь ни к тем, ни к другим, не так ли?"
        - "Тебе нужна власть лишь потому, что она необходима для совершения правых дел."
        - "Раз так, позволь нам направить тебя. Встань на путь, ведущий к вершине могущества Ортодоксии Ирис..."
chapter1:
  rows:

    - text:
      - "Прежде чем союзный флот успел достичь основных сил Сирен, авангард Железной Крови уже вступил в противостояние с Компилятором."

    - char: friedrich_der_grosse
      side: left
      status: is-yellow
      text:
        - "Несмотря на то, что вы были гораздо ближе к цели, скорость вашего наступления оставляет желать лучшего."

    - char: commander
      side: right
      text:
        - "Сейчас всё вокруг кишит Зеркальными морями. Как главнокомандующий, я обязан проявлять осторожность."

    - char: friedrich_der_grosse
      side: left
      status: is-yellow
      text:
        - "Справедливо. И всё же ты здесь, что говорит о твоей незаурядной храбрости."

    - char: commander
      side: right
      text:
        - "Подобное зрелище притягивает любого лидера."
        - " К тому же, я не могу позволить вам забрать всю славу за победу над Компилятором себе."

    - char: emden
      side: left
      status: is-yellow
      text:
        - "О-хо... Значит, наши цели и впрямь совпадают!"
        - "Но мы не собираемся просто так уступать вам столь интересного противника!"

    - char: friedrich_der_grosse
      side: right
      status: is-yellow
      text:
        - "Когда два охотника заприметили одну и ту же добычу, обычно дело не обходится без драки."

    - char: commander
      side: left
      text:
        - "А что, если добыча достаточно велика, чтобы её хватило на всех? Почему бы двум охотникам не объединить усилия?"

    - char: friedrich_der_grosse
      side: right
      status: is-yellow
      text:
        - "Ха-ха, именно так."
        - "Дамы, вы ведь впервые видите гуманоидную форму Сирены-командира. Каковы ваши впечатления?"

    - char: lutzow
      side: left
      status: is-yellow
      text:
        - "Честно говоря... она выглядит довольно мило."
        - "А мы можем взять её в плен и забрать с собой?"

    - char: friedrich_der_grosse
      side: right
      status: is-yellow
      text:
        - "Заманчивая мысль, но я советую тебе её оставить. В критический момент она просто самоликвидируется."
        - "Внешне она похожа на нас, но её внутренняя структура совершенно иная."
        - "Советую воспринимать её как робота с высокоразвитым интеллектом."

    - char: lutzow
      side: left
      status: is-yellow
      text:
        - "...Робот? А это ещё что такое...?"

    - char: friedrich_der_grosse
      side: right
      status: is-yellow
      text:
        - "Забыла, что вы даже этого не знаете..."

    - char: lutzow
      side: left
      status: is-yellow
      text:
        - "У-у-у, ну почему мир так круто изменился, пока я спала?!"

    - char: compiler
      side: right
      status: is-red
      text:
        - "......"

    - char: commander
      side: left
      text:
        - "Не дайте внешности обмануть себя. Компилятор — сбалансированный тип командующего Сирен. Если не считать слабой маневренности, у неё практически нет уязвимых мест."

    - char: friedrich_der_grosse
      side: right
      status: is-yellow
      text:
        - "Командир дело говорит. Перед вами — самое настоящее супер-оружие Сирен."

    - char: seydlitz
      side: left
      status: is-yellow
      text:
        - "Она даже сильнее вас?"

    - char: friedrich_der_grosse
      side: right
      status: is-yellow
      text:
        - "Всё зависит от того, насколько серьёзно она настроена."
        - "И если судить по её текущему состоянию — да, сильнее."

    - char: seydlitz
      side: left
      status: is-yellow
      text:
        - "Поняла. Мы предельно сосредоточимся и выложимся на полную!"

    - char: compiler
      side: right
      status: is-red
      text:
        - "Предательство Железной Крови — логически обоснованное и неизбежное событие, согласно расчётам. Однако оно не должно было произойти в этот момент времени."
        - "...Чем вообще занимается Тестер? В последнее время погрешность вычислений только растёт."
        - "Ваше поведение не поддаётся логике. На данный момент предательство не принесёт Железной Крови максимальной выгоды."
        - "Почему вы это делаете?"

    - char: friedrich_der_grosse
      side: left
      status: is-yellow
      text:
        - "Возможно, сейчас не лучший момент для выгоды, но зато лучший для того, чтобы застать вас врасплох, не так ли?"
        - "Логика — ваше преимущество. Состязаясь с вами в логике, мы всегда будем проигрывать."
        - "Наше же преимущество — в Кубах и чувствах."
        - "Естественно, мы используем свои сильные стороны и бьём по вашим слабым. Так трудно понять?"

    - char: compiler
      side: right
      status: is-red
      text:
        - "Действия, основанные на импульсах, ведут лишь к нестабильным результатам."

    - char: friedrich_der_grosse
      side: left
      status: is-yellow
      text:
        - "В любой азартной игре есть шанс как проиграть, так и выиграть."
        - "И если судить по результату — сейчас я в выигрыше."

    - char: compiler
      side: right
      status: is-red
      text:
        - "Абсолютно непостижимо."

    - char: friedrich_der_grosse
      side: left
      status: is-yellow
      text:
        - "Вот поэтому машины остаются машинами. Кое-чего вам никогда не понять."
        - "Впрочем, вы ведь и создавались не для того, чтобы достичь с нами взаимопонимания, верно?"
        - "Так что хватит тратить время, изображая диалог. Начнём же нашу битву!"

    - char: seydlitz
      side: right
      status: is-yellow
      text:
        - "Флот Открытого моря в новом составе — в атаку на грозного врага!"

    - char: memphis
      side: left
      text:
        - "Командир, силы Железной Крови в одиночку бросились в бой!"

    - char: commander
      side: right
      text:
        - "От наспех собранной коалиции и не стоило ожидать слаженности.."

    - char: sovetskaya_rossiya_rad
      side: left
      text:
        - "Товарищ Командир, мы прорвались сквозь заслоны и официально воссоединяемся с вами."

    - char: tallinn_rad
      side: right
      text:
        - "Похоже, мы успели как раз вовремя?"

    - char: commander
      side: left
      text:
        - "Именно!"

    - char: enterprise_rad
      side: right
      text:
        - "Мы тоже разобрались с Зеркальными морями и готовы обеспечить поддержку с воздуха."

    - char: saratoga_rad
      side: left
      text:
        - "Я тоже на связи и готова задать им жару!"
        - "А вы что скажете, Империя Сакуры?"

    - char: akagi
      side: right
      status: is-red
      text:
        - "То, что мы не бьём вам в спину — уже само по себе высшее проявление уважения к этому перемирию."

    - char: saratoga_rad
      side: left
      text:
        - "Хм, ну и ладно, дело ваше. Одной лишь той огневой мощи, что у нас есть, с лихвой хватит, чтобы устроить Компилятору «приём по высшему разряду»!"

    - char: commander
      side: right
      text:
        - "Цель — Компилятор Сирен и её эскорт. Всем силам — в атаку!"
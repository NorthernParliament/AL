chapter1:
  rows:

    - text:
      - "На горизонте, вдали от флота Империи Сакуры, уже начали смутно проступать очертания гавани."

    - char: zuikaku
      side: left
      text:
        - "Акаги, мы почти прибыли в Скапа-Флоу!"
        - "Странно, Королевский Флот не предпринял никакой попытки контратаковать... В округе вообще не видно их кораблей."
        - "Неужели Железная Кровь уже захватила это место? Скорость просто поразительная!.."

    - char: kaga
      side: right
      text:
        - "Скорость и впрямь впечатляет... Однако, Дзуйкаку, присмотрись внимательнее."
        - "Все видимые разрушения были получены довольно давно. Здесь нет свежих следов боя, как нет и признаков какого-либо сопротивления."
        - "На мой взгляд, это больше похоже на то, что персонал Королевского Флота эвакуировался заранее, позволив Железной Крови занять базу без единого выстрела."

    - char: jintsuu
      side: left
      text:
        - "Это действительно слишком ненормально... Скапа-Флоу — незаменимая и стратегически важная стоянка для Королевского Флота."
        - "Даже учитывая, что ранее они уже подвергались атаке со стороны Железной Крови, они бы не стали так поспешно и чисто сдавать позиции в самом начале войны, верно?"

    - char: akagi
      side: right
      text:
        - "Кто знает. Хорошая новость в том, что нам не придется пробиваться в зрительный зал своими силами."
        - "Идёмте. Входим в Скапа-Флоу. Уверена, Фридрих дер Гроссе даст ответ на все наши вопросы."

chapter2:
  rows:

    - char: zuikaku
      side: left
      text:
        - "Окружена островами со всех сторон, семь фарватеров ведут к трём разным морям..."
        - "Лучше один раз увидеть, чем сто раз услышать. Скапа-Флоу — это действительно великолепная морская база, заставляющая восхищаться мастерством самой природы..."
        - "А? Акаги, что это за корабль?"
        - "Он не похож ни на серийные модели Железной Крови, ни на серийные модели Королевского Флота."

    - text:
      - "Проследив за взглядом Дзуйкаку, присутствующие увидели скрытый в тени гигантский военный корабль."

    - char: akagi
      side: left
      text:
        - "Это же... линейный корабль класса «Куин Элизабет»?.."

    - char: zuikaku
      side: right
      text:
        - "Военный корабль? Он отличается от серийных моделей?"

    - char: akagi
      side: left
      text:
        - "Хм, нынешнее поколение, пожалуй, уже плохо понимает разницу..."
        - "Тебе прекрасно известно, что мы — девушки-корабли, рождены с помощью Кубов Мудрости."
        - "Но как человечество сражалось в море до появления Кубов?"
        - "Ответ — на военных кораблях."
        - "В отличие от нынешних серийных моделей, которые можно легко производить в огромных количествах, каждый такой корабль был уникальным произведением искусства с длительным циклом постройки."
        - "Все самые первые из нас были созданы путём резонанса Кубов Мудрости с реально существующими кораблями, находившимися тогда на службе."
        - "Однако в ходе последующих исследований научные отделы обнаружили, что для нашего рождения вовсе не обязательно строить физический корпус корабля."
        - "Поэтому в какой-то момент строительство традиционных военных кораблей, которые были слишком дороги и малоэффективны в борьбе с Сиренами, полностью прекратилось."
        - "Большинство уцелевших на тот момент корпусов были отправлены в отставку и утилизированы."
        - "Я была уверена, что «старушку» «Куин Элизабет» постигла та же участь..."
        - "Видимо, Королевский Флот сохранил её в качестве реликвии."
        - "Хи-хи, как символичный трофей — весьма недурно."

    - char: zuikaku
      side: right
      text:
        - "Акаги, а у вас он был? Физический корпус, существующий как военный корабль."

    - char: akagi
      side: left
      text:
        - "……Этого «нечто» не существует уже очень и очень давно."

    - char: jintsuu
      side: right
      text:
        - "Госпожа Акаги, показался флот сопровождения Железной Крови."

    - text:
      - "Проследив за взглядом Дзинцу, присутствующие увидели два корабля Железной Крови, медленно приближающихся по фарватеру."

    - char: agir
      side: left
      text:
        - "Полагаю, вы и есть та самая делегация Империи Сакуры, прибывшая по приглашению. Приветствую вас, я — Эгир."

    - char: august_von_parseval
      side: right
      text:
        - "Август фон Парсеваль. Приветствую вас."

    - char: akagi
      side: left
      text:
        - "Эгир и Август... Вы обе — из числа кораблей-прототипов Железной Крови?"

    - char: agir
      side: right
      text:
        - "Именно так. Если вам интересны наши боевые возможности, то, надеюсь, нам представится шанс сразиться плечом к плечу."

    - text:
      - "Август и Эгир слегка кивнули и синхронно отступили на полшага назад, освобождая проход."

    - char: august_von_parseval
      side: left
      text:
        - "Прошу, следуйте за нами. Фридрих дер Гроссе уже давно вас ожидает."
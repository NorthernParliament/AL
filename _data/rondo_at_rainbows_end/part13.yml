chapter1:
  rows:

    - text:
      - "БАБАХ!!!"

    - char: lutzow
      side: left
      text:
        - "Прямое попадание по вражескому линкору!"
        - "Хе-хе♪ До чего же здорово иметь такое гибкое тело~"

    - char: thuringen
      side: right
      text:
        - "Размер уменьшился, а мощность возросла. Словно целый боевой корабль сжали до размеров одного человека."
        - "Сложнейшие операции, требовавшие слаженной работы множества отсеков, теперь выполняются одной лишь силой мысли..."
        - "Поистине прорывная технология, в разы повышающая эффективность в бою."

    - char: lutzow
      side: left
      text:
        - "А еще, раз мы стали крошечными, по нам сложнее попасть. Красота!"

    - char: thuringen
      side: right
      text:
        - "...И это, по-твоему, весомый повод стоять на месте как вкопанная?"

    - char: lutzow
      side: left
      text:
        - "Всё равно не попадут, а так намного меньше устаёшь~"

chapter2:
  rows:

    - char: seydlitz
      side: left
      text:
        - "Хм-м-м-м......"

    - char: yorck
      side: right
      text:
        - "...Зайдлиц, ты что делаешь?"

    - char: seydlitz
      side: left
      text:
        - "А? Я поворачиваю главные калибры, чтобы скорректировать угол обстрела. Контролировать оснастку куда проще, чем я думала... Невероятно удобно."

    - char: yorck
      side: right
      text:
        - "...Но не проще ли просто повернуть корпус, чтобы прицелиться?"

    - char: seydlitz
      side: left
      text:
        - "И то верно!.. С этим телом такая задача нам вполне под силу!"

chapter3:
  rows:

    - text:
      - "БАБАХ!!!"

    - char: elbing
      side: left
      text:
        - "Попадание по цели... Веду наблюдение за состоянием противника...."
        - "Враг............. Подтверждаю уничтожение?!"
        - "А?! Эльбинг — всего лишь крейсер, неужели я могу уничтожать таких врагов простым артиллерийским огнём...?"

    - char: seydlitz
      side: right
      text:
        - "Это и есть прямое доказательство того, что мы стали сильнее."
        - "О такой мощи и скорострельности раньше мы не смели и мечтать..."
        - "Интересно, а это снаряжение поддаётся модернизации?.. Добавить бы сюда еще семь-восемь башен — и было бы просто идеально!"

    - char: yorck
      side: left
      text:
        - "Всем внимание! Воздушная тревога, враг атакует с неба!"

    - char: lutzow
      side: right
      text:
        - "Сирены всё-таки пустили в ход авиацию... Это плохо, у нас же нет специализированного зенитного вооружения!"

    - char: thuringen
      side: left
      text:
        - "Ничего не поделаешь, придётся по старинке отбиваться универсальным калибром. Если сбивали дирижабли, то и с самолётами как-нибудь совладаем!"

    - char: elbing
      side: right
      text:
        - "Они уже близко! Нужно уклоняться..."

    - char: seydlitz
      side: left
      text:
        - "Поздно! Я прикрою вас своей бронёй, уходите с линии атаки!"

    - text:
      - "БАБАХ!!!"
      - "Несколько бомб детонировали рядом с Зайдлиц, подняв огромные столбы воды и густую завесу дыма. Однако мгновение спустя атаковавшие самолёты были срезаны точными залпами орудий."

    - char: seydlitz
      side: left
      text:
        - "Кхм-кхм... Вражеские самолёты сбиты. Похоже, эта броня всё так же надёжна."

    - char: emden
      side: right
      text:
        - "Знаешь, вместо того чтобы принимать удар на себя, можно просто прибавить ходу и проскочить мимо~ Вот так."

    - text:
      - "Эмден изящно заскользила по воде, выписывая сложные пируэты и одновременно ведя огонь по самолётам в небе."

    - char: lutzow
      side: left
      text:
        - "Словно в танце... Эмден, ты уже полностью освоилась с этим стилем боя?"

    - char: emden
      side: right
      text:
        - "Не скажу, что полностью, но с основами я уже разобралась.."
        - "В конце концов, это плод наших общих усилий~"

    - char: lutzow
      side: left
      text:
        - "...Наших?"

    - char: emden
      side: right
      text:
        - "Хи-хи, а это пока секрет~"
        - "Девочки, следите за моими движениями. Постарайтесь поскорее привыкнуть к своим новым телам и покончим с врагом~"
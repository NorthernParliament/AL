chapter1:
  rows:

    - char: august_von_parseval_rad
      side: left
      text:
        - "Госпожа Ульрих, «Врата Авалона» активированы."

    - char: ulrich_von_hutten
      side: right
      text:
        - "Принято."

    - char: prinz_eugen_rad
      side: left
      text:
        - "О, я всё слышала! Раз Врата открыты, значит, наше представление наконец-то начинается!"
        - "Объединённый флот Лазурного пути уже на подходе. Теперь нам остаётся лишь действовать по плану и немного поводить их за нос, верно?"

    - char: ulrich_von_hutten
      side: right
      text:
        - "В такой критический момент я бы попросила вас быть серьезнее, госпожа Принц Ойген."

    - char: prinz_eugen_rad
      side: left
      text:
        - "М-м? Да я предельно серьезна, госпожа Ульрих. Ну, как тебе те огромные силы, что мы развернули в этой акватории?"

    - text:
      - "Вслед за словами Ойген на тактической карте из ниоткуда возникло множество зелёных точек разных размеров. Каждая из них обозначала отдельный корабль или целую группу серийных моделей."

    - char: ulrich_von_hutten
      side: left
      text:
        - "...Впечатляет. Неужели система «Призрачный свет» способна на такое?"

    - char: prinz_eugen_rad
      side: right
      text:
        - "В основном это заслуга улучшенной системы «Призрачный свет», ну и капелька сверхурочных усилий наших эсминцев типа Z~"
        - "Сейчас масштаб «флота» Железной Крови в этих водах в несколько раз превышает их объединённые силы. Им хватит забот только на то, чтобы просто разобраться в ситуации~"

    - char: ulrich_von_hutten
      side: left
      text:
        - "Хм... А что насчет дислокации сил для прямого столкновения?"

    - char: prinz_eugen_rad
      side: right
      text:
        - "Э-э-э... На данном этапе это не самое главное."

    - char: ulrich_von_hutten
      side: left
      text:
        - "Неизвестно, когда нам ещё представится случай увидеть подобное зрелище."
        - "Раз уж выпал такой редкий шанс, неужели у тебя нет ничего, что ты хотела бы опробовать?"

    - char: prinz_eugen_rad
      side: right
      text:
        - "Ну, если настоять на ответе, то кое-что найдётся... Хм... А ты права."
        - "Я внесу коррективы в развертывание. Свяжемся позже, Принц Ойген, конец связи."

    - char: ulrich_von_hutten
      side: left
      text:
        - "Похоже, всё-таки нашлось нечто, способное подстегнуть её энтузиазм..."
        - "Пусть у нас и другой план, но это редкая возможность сойтись в поединке с тем самым Командиром Лазурного пути."
        - "Было бы слишком досадно упустить такой шанс..."
        - "Принц Адальберт, Роон, U-81, слышите меня? Переходим к плану «Б» по сдерживанию флота Союза Орла."

    - char: u-81_rad
      side: right
      text:
        - "Принято. Начинаем подготовку зоны засады в указанном секторе."

    - char: prinz_adalbert_rad
      side: left
      text:
        - "А-а... Поняла-а."

    - char: roon_rad
      side: right
      text:
        - "Хи-хи, как только я увидела план «Б», сразу поняла, что ты выберешь именно его."
        - "Мы с Майнц уже довольно долго ждём в назначенной точке. Когда ты прибудешь с подкреплением?"

    - char: ulrich_von_hutten
      side: left
      text:
        - "Буду с минуты на минуту."
        - "Мне крайне любопытно, как он поступит, столкнувшись с моей стратегией и козырями Железной Крови..."
        - "Давай сойдёмся в настоящей схватке на поле боя!"
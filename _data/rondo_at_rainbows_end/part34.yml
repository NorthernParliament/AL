chapter1:
  rows:

    - char: marco_polo
      side: left
      text:
        - "Ха... Ха-ха... Ха-ха-ха... Ха-ха-ха-ха!"
        - "Нет... нужно успокоиться, нельзя смеяться... Пха-ха-ха-ха! Да как тут удержишься?!"
        - "Ха-ха-ха-ха-ха! Поверить не могу, что события приняли столь драматический оборот..."
        - "Появившаяся из ниоткуда Бисмарк взяла на себя руководство Железной Кровью?"
        - "Фридрих дер Гроссе больше не у дел?"
        - "Прекрасно... Замечательно... Просто великолепно!"
        - "Теперь наконец-то никто не сможет мне помешать!"
        - "Ликуйте же! Воспевайте этот миг!"
        - "Свершилось!"
        - "Эпоха Империи Сардиния, эпоха меня, Марко Поло, наконец-то настает!"
chapter1:
  rows:

    - text:
      - "Под управлением Куин Элизабет искусственная сингулярность, получившая название «Врата Авалона», полностью открылась."
      - "Акаги посмотрела на морскую гладь: под «алым солнцем» потоки воды непрерывно изливались в пустоту, образуя величественные, почти вертикальные водопады."
      - "Поднявшаяся в небо водяная пыль преломляла солнечный свет, создавая вокруг «алого солнца» едва заметную радугу."

    - char: akagi
      side: left
      text:
        - "Это... весьма... неожиданное зрелище..."
        - "Такова технология искусственных сингулярностей Железной Крови?"
        - "...Хотя, судя по ситуации, и так понятно, что Королевский Флот тоже приложил к этому руку."

    - char: friedrich_der_grosse
      side: right
      text:
        - "На этот вопрос я не намерена ни давать подтверждения, ни выступать с опровержением."

    - char: akagi
      side: left
      text:
        - "...То, о чём вы упоминали ранее — «увидеть всё лично», — как-то связано с этой сингулярностью?"

    - char: friedrich_der_grosse
      side: right
      text:
        - "Именно так. «Врата Авалона» перенесут нас прямиком на место событий, чтобы мы могли найти ответ на тот вопрос."

    - char: zuikaku
      side: left
      text:
        - "То есть нам нужно пройти сквозь эту пустоту, которая выглядит чертовски опасной, верно?.."

    - char: friedrich_der_grosse
      side: right
      text:
        - "Разумеется. Не стоит беспокоиться — предыдущие операции в полной мере доказали надёжность и безопасность этой технологии."
        - "«Врата Авалона» — это улучшенная версия Башни Мидгарда. Пусть они меньше в размерах, но позиционирование в них гораздо точнее, а работа — стабильнее."

    - char: kaga
      side: left
      text:
        - "Во время прошлой операции наше дистанционное наблюдение оборвалось на полпути, и о дальнейшем мы узнавали лишь из ваших отчетов."
        - "О сражениях и повреждениях, произошедших снаружи Башни Мидгарда, там тоже не было ни слова."
        - "Сестра, вход и выход нужно охранять. Вы с Дзуйкаку идите внутрь, а внешнюю сторону оставьте нам."

    - char: akagi
      side: right
      text:
        - "...Ты не хочешь сама стать свидетелем этой «возможности»?"

    - char: kaga
      side: left
      text:
        - "Если её увидишь ты — значит, увижу и я."

    - char: akagi
      side: right
      text:
        - "Раз так, то да будет по-твоему."

    - char: friedrich_der_grosse
      side: left
      text:
        - "Эгир и Август, вы также останетесь здесь, чтобы вместе с нашими союзниками из Империи Сакуры оборонять Скапа-Флоу и ждать нашего возвращения."

    - char: august_von_parseval
      side: right
      text:
        - "Будет исполнено."

    - char: agir
      side: left
      text:
        - "С нами здесь всё будет в полной безопасности, так что идите со спокойной душой~"

    - char: akagi
      side: right
      text:
        - "Эй, Куин Элизабет, пора выдвигаться."
        - "Разве не ты только что спешила больше всех? Почему теперь стоишь и задумчиво смотришь на море?"

    - char: queen_elizabeth
      side: left
      status: is-yellow
      text:
        - "Хм! Дела Королевы тебя не касаются!"
        - "Выдвигаемся! Вперёд!"

    - text:
      - "Словно пытаясь скрыть смущение от того, что её раздумья прервали, Куин Элизабет внезапно приободрилась и в одиночку первой бросилась в пустоту."

    - char: zuikaku
      side: left
      text:
        - "И чего это она вдруг так заспешила..."

    - char: akagi
      side: right
      text:
        - "Поистине, Королева с переменчивым настроением. Мне даже искренне жаль горничных Королевского Флота."
        - "Впрочем, это лишний раз доказывает, что безопасность этих врат гарантирована..."
        - "Дзуйкаку, идём и мы. Оказавшись внутри, строго следуй моим указаниям. Можешь оставаться при своём мнении, но приказы выполняй беспрекословно."

    - char: zuikaku
      side: left
      text:
        - "Не волнуйтесь, семпай, это я и сама понимаю."

    - text:
      - "Проводив взглядом Акаги и Дзуйкаку, пока те не скрылись из виду, Фридрих дер Гроссе тоже неспешно направилась к «Вратам Авалона»."

    - char: friedrich_der_grosse
      side: left
      text:
        - "……Что ж, начнём. Пусть прозвучит финальный акт симфонии Железной Крови."
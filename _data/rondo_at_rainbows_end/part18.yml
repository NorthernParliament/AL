chapter1:
  rows:

    - text:
      - "Перед флотом Северного Парламента, возглавляемым Кронштадтом, вальяжно и открыто появилась знакомая фигура."

    - char: prinz_eugen
      side: right
      status: is-red
      text:
        - "Йо~ Давненько не виделись, мой старый друг."

    - char: kronshtadt
      side: left
      text:
        - "Кого я вижу, Принц Ойген. Каким ветром тебя сюда занесло?"
        - "А, ну-ка стой. Не приближайся больше, иначе мне придётся открыть огонь."

    - char: prinz_eugen
      side: right
      status: is-red
      text:
        - "Эй-эй, ну что за холодный прием для старого друга, которого ты не видела столько лет!"

    - char: kronshtadt
      side: left
      text:
        - "Всему своё время и место."

    - char: prinz_eugen
      side: right
      status: is-red
      text:
        - "От тебя так долго не было вестей. Где пропадала, чем занималась всё это время?"

    - char: kronshtadt
      side: left
      text:
        - "Разумеется, была там, где во мне нуждались, и делала то, что должна была делать."
        - "Неужели ты соскучилась по нашим совместным ужинам?"

    - char: prinz_eugen
      side: right
      status: is-red
      text:
        - "Есть немного. А если бы ты за столом заодно поведала мне побольше разведданных, было бы совсем чудесно."

    - char: kronshtadt
      side: left
      text:
        - "Ха-ха-ха, ну, это бы зависело от твоей сноровки. Кто бы из нас выудил больше информации — большой вопрос."

    - char: prinz_eugen
      side: right
      status: is-red
      text:
        - "Столько лет прошло, а ты совсем не изменилась."

    - char: kronshtadt
      side: left
      text:
        - "Если бы ты смотрела внимательнее, то заметила бы, что я всё же немного изменилась. Как и ты."

    - char: prinz_eugen
      side: right
      status: is-red
      text:
        - "Ой~ Неужели? А мне кажется, я всё та же, что и прежде."

    - char: kronshtadt
      side: left
      text:
        - "Ты просто притворяешься, что не изменилась. Маскировка нужна для того, чтобы что-то скрыть. Что же пытаешься скрыть ты?"
        - "Тоску по прошлому? Тоску по друзьям? Или что-то куда более сложное?.."
        - "Опираясь на опыт старой подруги, скажу: подавлять чувства сверх меры — занятие весьма опасное."

    - char: prinz_eugen
      side: right
      status: is-red
      text:
        - "А взгляд у тебя всё такой же острый~ Впрочем, секреты делают женщину женщиной, так что в этом мы друг друга стоим, не так ли?"

    - char: kronshtadt
      side: left
      text:
        - "Я с огромным удовольствием поболтала бы с тобой всю ночь напролет... после того как ты вернешься со мной в качестве пленницы."

    - char: prinz_eugen
      side: right
      status: is-red
      text:
        - "Ой-ой-ой, это было бы весьма прискорбно. У меня еще остались дела, так что я не могу позволить тебе поймать себя~"

    - char: kronshtadt
      side: left
      text:
        - "Что за вздор? Раз уж ты подошла на такую дистанцию, дальше всё будет зависеть уже не от твоего желания!"

    - text:
      - "БАБАХ!!!"

    - char: kronshtadt
      side: left
      text:
        - "…Снаряды беспрепятственно прошли сквозь тело…? Ты — фантом?"

    - char: prinz_eugen
      side: right
      status: is-red
      text:
        - "Раз уж вы в этот раз нагрянули такой грозной армадой, мне тоже пришлось подготовиться~"
        - "Почувствуйте же на себе технический прогресс Железной Крови!"
        - "Один!"

    - char: odin_rad
      side: left
      status: is-red
      text:
        - "Копье Всеотца заряжено."
        - "Пронзи же их, Гунгнир!"
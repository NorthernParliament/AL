chapter1:
  rows:

    - char: enterprise
      side: left
      text:
        - "Пятнадцатый «Компилятор», уничтожение подтверждаю."

    - char: memphis
      side: right
      text:
        - "Замечено появление новых единиц «Компилятора»... На этот раз вышло сразу три, они снова закрыли образовавшуюся брешь!"

    - char: baltimore
      side: left
      text:
        - "Тогда мы просто поднажмем и снова их уничтожим!"

    - text:
      - "Главное отличие флота Сирен внутри разлома от всех предыдущих — это огромное количество «Компиляторов», затесавшихся в их ряды."
      - "Они рассредоточены среди колоссального флота Сирен и координируют действия с другими моделями. Их характерные синие щиты отчетливо выделяются на фоне обычных серийных моделей."

    - char: emden
      side: left
      status: is-yellow
      text:
        - "Они не оставили без внимания ни небо, ни подводное пространство... Современное противостояние с Сиренами — это действительно безумие."

    - char: lutzow
      side: right
      status: is-yellow
      text:
        - "Я за всю жизнь... нет, за две свои жизни не видела столько врагов сразу!!!"
        - "Им конца и края нет! Если так пойдет и дальше, у нас действительно закончатся боеприпасы!"

    - char: seydlitz
      side: left
      status: is-yellow
      text:
        - "В таком случае в дело вступят наши мечи! Даже без снарядов мы сокрушим врага силой стали!"

    - char: lutzow
      side: right
      status: is-yellow
      text:
        - "Я же говорю, это слишком утомительно, я так не хочу-у..."

    - char: eldridge
      side: left
      text:
        - "Элдридж... разряд."

    - text:
      - "Электричество хлынуло из тела Элдридж, и переплетающиеся дуги сформировали в воздухе странное электрическое поле, окутавшее весь флагман."
      - "Все снаряды, летевшие в сторону корабля управления, из-за воздействия поля отклонялись еще на подлете."

    - char: eldridge
      side: left
      text:
        - "...Командир, не давай флагману... отдаляться от Элдридж."

    - char: commander
      side: right
      text:
        - "(Так это и есть та самая мера по усилению безопасности флагмана?! Но как ей это удается...)"

    - char: new_jersey
      side: left
      text:
        - "Командир, боюсь, эти машины выполняют роль узлов управления. Флот Сирен действует гораздо гибче, чем обычно."
        - "По аналогии с серийными «Тестер», которых мы встречали раньше — это, должно быть, серийные модели «Компилятора»?"

    - char: commander
      side: right
      text:
        - "Похоже на то."

    - char: friedrich_der_grosse
      side: left
      status: is-yellow
      text:
        - "Верно. Сознания Компилятора здесь нет, это лишь бездушные оболочки."

    - char: commander
      side: right
      text:
        - "Так может продолжаться вечно. Фридрих дер Гроссе, раз ты затеяла эту операцию, у тебя наверняка есть план дальнейших действий."

    - char: friedrich_der_grosse
      side: left
      status: is-yellow
      text:
        - "Разумеется. Продолжайте двигаться туда, где концентрируется свет. Скоро покажется башня, служащая центральным накопителем."
        - "Это и есть Мэйнфрейм Компилятора — место, где по-настоящее находится её сознание."
        - "Её уничтожение нанесет Сиренам сокрушительный удар и причинит им необратимый ущерб."

    - char: commander
      side: right
      text:
        - "...Но именно там концентрация вражеских сил максимальна."

    - char: agir
      side: left
      status: is-yellow
      text:
        - "Проще простого~ Значит, нужно всего лишь снести эту башню, и проблема решена?"

    - char: commander
      side: right
      text:
        - "Вы... Эгир и Август?"

    - char: august_von_parseval
      side: left
      status: is-yellow
      text:
        - "Именно так. Мы ведь впервые встречаемся официально, Командир Лазурного Пути."

    - char: agir
      side: right
      status: is-yellow
      text:
        - "Мы полностью зачистили всё снаружи, так что зашли сюда немного развлечься."

    - char: august_von_parseval
      side: left
      status: is-yellow
      text:
        - "Пожалуйста, держитесь крепче. Мы сами проложим путь вперед."

    - char: agir
      side: right
      status: is-yellow
      text:
        - "Пусть фантазия разорвет реальность, а пламя омоет море и небеса!"

    - text:
      - "БАБАХ!!!"
      - "Эгир открыла огонь. Грохот её орудий был оглушительным; даже под защитой электрического поля флагман сильно качнуло от ударной волны."
      - "Следом флот, состоящий из кораблей-прототипов Железной Крови, пошел на прорыв в самую гущу врагов."
      - "Снаряды, оставляя за собой светящиеся шлейфы, подобно метеоритному дождю обрушились на флот Сирен, постепенно прорубая просеку на поверхности моря."
      - "Однако не обошлось и без противника, проскользнувшего сквозь бреши."
      - "Множество недобитых Сирен проигнорировали флот прототипов и устремились прямиком к флагману."

    - char: georgia
      side: left
      text:
        - "Даже не думайте!"

    - text:
      - "Джорджия стремительно вышла перед флагманом, начиная одного за другим отстреливать прорвавшихся врагов."

    - char: commander
      side: left
      text:
        - "Путь свободен. Всем кораблям — продолжать движение!"
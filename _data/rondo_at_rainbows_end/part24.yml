chapter1:
  rows:

    - char: eldridge
      side: left
      text:
        - "..Командир, коммуникатор... снова звонит."

    - char: commander
      side: right
      text:
        - "М-м? Каналы связи на поле боя и так открыты на полную."

    - char: eldridge
      side: left
      text:
        - "Звонок по... частному каналу..."

    - char: commander
      side: right
      text:
        - "(Частный канал? В такой-то момент...?)"
        - "(Личность неизвестна. Но тот, кто смог пробиться через помехи в это время...)"

chapter2:
  rows:

    - char: commander
      side: right
      text:
        - "Неужели снова Советский Союз?.."

    - char: friedrich_der_grosse_rad
      side: left
      status: is-red
      text:
        - "К моему сожалению, ты не угадал."

chapter3:
  rows:

    - char: commander
      side: right
      text:
        - "Неужели это... Фридрих дер Гроссе?"

    - char: friedrich_der_grosse_rad
      side: left
      status: is-red
      text:
        - "Поздравляю, ты угадал."

chapter4:
  rows:

    - char: friedrich_der_grosse_rad
      side: left
      status: is-red
      text:
        - "Мы ведь впервые беседуем вот так, с глазу на глаз, не так ли, Командир Лазурного Пути?"
        - "Рада нашей встрече. Я — линкор Железной Крови, Фридрих дер Гроссе."

chapter5:
  rows:

    - char: commander
      side: right
      text:
        - "...Это частный канал. Как ты вообще на него вышла?"

    - char: friedrich_der_grosse_rad
      side: left
      status: is-red
      text:
        - "Я — Фридрих дер Гроссе. Было бы странно, если бы я не могла сделать такую мелочь."

chapter6:
  rows:

    - char: commander
      side: right
      text:
        - "...Почему ты решила выйти на связь именно сейчас?"

    - char: friedrich_der_grosse_rad
      side: left
      status: is-red
      text:
        - "Потому что сейчас — самый подходящий момент для беседы."

chapter7:
  rows:

    - char: commander
      side: right
      text:
        - "Если это очередная уловка, чтобы потянуть время, то вынужден откланяться. У меня тут целый флот Сирен, с которым нужно разобраться."

    - char: friedrich_der_grosse_rad
      side: left
      status: is-red
      text:
        - "Как раз о Сиренах я и хотела поговорить."
        - "Тебя ведь наверняка терзают сомнения. Вы полностью подавили сопротивление Сирен в этом секторе, вы захватили центральный узел океана NA..."
        - "Так почему же Сирены смогли без малейшего предупреждения организовать столь масштабное наступление?"

    - char: commander
      side: right
      text:
        - "Не потому ли, что вы сговорились с ними и подготовили эту засаду?"

    - char: friedrich_der_grosse_rad
      side: left
      status: is-red
      text:
        - "Ошибка."
        - "Наше сотрудничество с Сиренами — лишь причина, по которой они выбрали именно это время и это место для своего появления."

    - char: commander
      side: right
      text:
        - "Значит, ты не отрицаешь факт сотрудничества с Сиренами?"

    - char: friedrich_der_grosse_rad
      side: left
      status: is-red
      text:
        - "Это слишком очевидно, чтобы я держала тебя за дурака."
        - "Поэтому не трать время на пустые расспросы и попытки выудить информацию. Время дорого, давай будем откровенны друг с другом."
        - "Сирены смогли выставить такие силы лишь потому, что в действительности они не понесли в секторе NA никаких серьезных потерь."
        - "Центр океана NA на самом деле никогда не имел значения."
        - "Сирены закрепились там и возводили укрепления лишь с одной целью — подавить сингулярность, созданную Энтерпрайз МЕТА."
        - "Ведь никто не устанавливал правил, согласно которым самое важное место в океане должно находиться непременно в его географическом центре, верно?"

    - char: commander
      side: right
      text:
        - "......"

    - char: friedrich_der_grosse_rad
      side: left
      status: is-red
      text:
        - "Советский Союз уже предупреждала вас: контролируемые вами воды далеко не так стабильны, как вам кажется."
        - "Атака, столь сильно превзошедшая ваши ожидания, — лишь верхушка айсберга истинной мощи Сирен."
        - "Хорошо знакомые нам Компилятор, Оммитер, Пьюрифаер, Тестер и Обсервер по классификации относятся лишь к экспериментальному отделу Сирен."
        - "Экспериментальный отдел... По своей сути он создан для проведения опытов, а мы с вами — лишь подопытные объекты."
        - "Строго говоря, они даже не являются боевыми единицами."
        - "На протяжении стольких лет простые «некомбатанты» Сирен вертели нами как хотели, не давая ни единого шанса на достойный отпор."
        - "Крайне унизительно, не находишь?"
        - "Но и это ещё не всё. Над экспериментальным отделом стоят Арбитры, отвечающие непосредственно за ведение войны."
        - "С их боевыми единицами ты уже сталкивался в секторе NA."
        - "Они сильны. Подавляюще сильны. Без посторонней помощи вы бы ни за что не смогли вырваться от них живыми, верно?"

    - char: commander
      side: right
      text:
        - "Значит, ту U-47 на помощь нам отправила именно ты?"

    - char: friedrich_der_grosse_rad
      side: left
      status: is-red
      text:
        - "Именно так, хотя для неё это было лишь попутной задачей."
        - "Настоящую помощь вам оказал «Пепел», вернее — МЕТА. Думаю, ты уже успел оценить их личную мощь."
        - "Но даже им не под силу легко одержать верх, когда против них выступают сразу несколько Арбитров."
        - "Чем больше Арбитров задействовано, тем выше сложность сражения — такова система Арбитров."
        - "А сама система Арбитров, как и экспериментальный отдел, — лишь очередная деталь в общем механизме Сирен."
        - "Вот что представляет собой иерархия Сирен, обладающая сокрушительной силой."
        - "Вы верили, что одержали победу в секторе NA, но так ли это на самом деле?"
        - "Вы всё ещё существуете только потому, что Сирены позволили вам существовать."
        - "Мы всё ещё существуем только потому, что Сирены позволили нам существовать."
        - "Мы объединились в союзы лишь потому, что Сирены позволили нам объединиться."
        - "Мы ведём бесконечные войны лишь потому, что Сирены позволили нам воевать."
        - "Почему Железная Кровь, имея столь слабую военно-морскую базу, смогла нарастить мощь так быстро?"
        - "Почему Северный Парламент, находясь в отчаянном положении, внезапно сумел построить целый арктический флот?"
        - "Почему у берегов Империи Дракона внезапно возникла та непреодолимая стена «Великого Шторма»?"
        - "Причина всегда одна и та же — Сирены так решили."
        - "Они выбрали этот путь, чтобы иметь возможность и дальше, подобно богам, взирать на нас свысока, проводя свои бесконечные наблюдения и эксперименты."

    - text:
      - "В потоке информации, захлестнувшей Командира подобно приливу, было то, что уже было известно, и то, что вызывало лишь подозрения. Но гораздо больше было того, о чём слышать прежде не приходилось..."
      - "Что ещё важнее, этот лидер, всегда сохранявший ледяное спокойствие, казалось, утратила былую невозмутимость. Сквозь её слова прорывались с трудом сдерживаемое негодование и ярость."
      - "Ещё мгновение назад была полная уверенность в том, что впереди — лишь совместная атака Железной Крови и Сирен.."
      - "Но почему-то теперь, внимая пламенной речи Фридрих дер Гроссе, этот вывод уже не казался столь очевидным.."

    - char: friedrich_der_grosse_rad
      side: left
      status: is-red
      text:
        - "Всё находится под контролем Сирен. Наша нынешняя история — это история их вмешательства."
        - "Ты никогда не задумывался о том, какой была бы наша судьба, если бы Сирен никогда не существовало?"

    - char: commander
      side: right
      text:
        - "Ты считаешь, что без вмешательства Сирен наша история была бы лучше?"

    - char: friedrich_der_grosse_rad
      side: left
      status: is-red
      text:
        - "Я не хочу давать этому оценку."
        - "Скажу лишь, что нами манипулировали достаточно долго. Дальнейший путь мы должны выбирать сами, не согласен?"

    - char: memphis_rad
      side: right
      text:
        - "Командир, ещё одна чрезвычайная ситуация!"
        - "Скорее, включите радио! На общем канале происходит что-то совершенно невообразимое!"

    - char: commander
      side: left
      text:
        - "...Общий канал?"

    - char: communicator
      side: right
      status: is-yellow
      text:
        - "Говорит Бисмарк. Обращаюсь ко всем силам Железной Крови в акватории Скапа-Флоу."
        - "Железная Кровь прекращает любое сотрудничество с Сиренами. С этого момента мы официально объявляем Сиренам полномасштабную войну."
        - "Всем флотам немедленно перестроиться и привести силы в полную боевую готовность для уничтожения Сирен."
        - "Также я призываю главнокомандующего силами Лазурного Пути, руководящего этой операцией: давайте заключим временное перемирие."
        - "Соблюдайте режим прекращения огня и откройте огонь по силам Сирен вокруг нас. Сражайтесь, пока они не будут полностью уничтожены!"
        - "Повторяю. Говорит Бисмарк. Обращаюсь ко всем силам Железной Крови в акватории Скапа-Флоу..."

    - char: commander
      side: left
      text:
        - "(Что за...?!)"

    - char: memphis_rad
      side: right
      text:
        - "Командир! Флот под командованием Принца Ойгена первым ответил на призыв Бисмарк и официально вступил в бой с Сиренами!"
        - "Я совершенно не понимаю, что происходит..."
        - "Разве Бисмарк не затонула?!"
        - "Разве руководство Железной Кровью не перешло к Фридрих дер Гроссе уже давным-давно...?"
        - "Это результат ваших переговоров с ними?! Командир, каковы наши дальнейшие действия?!"

    - char: commander
      side: left
      text:
        - "Я и сам..."
        - "(...Обстановка крайне неопределенная. Нам нужно время.)"
        - "Всем флотам: временно увеличить дистанцию с кораблями Железной Крови."
        - "...И пока что будем придерживаться этого предложения. До тех пор, пока Железная Кровь не атакует нас, мы не открываем огонь по ним."
        - "Приоритет — отражение атаки Сирен. Режим временного прекращения огня будет действовать до полной зачистки сектора от Сирен."
        - "Я постараюсь выяснить причины происходящего."

    - char: memphis_rad
      side: right
      text:
        - "Есть! Немедленно передаю приказ всем подразделениям."
        - "Я также свяжусь с флотами, которые только что вышли из Зеркальных морей. Конец связи!"

    - char: commander
      side: left
      text:
        - "Фридрих дер Гроссе, что всё это значит...?"

    - char: friedrich_der_grosse_rad
      side: right
      status: is-red
      text:
        - "То, что ты видишь. То, что ты слышишь."
        - "Каковы бы ни были цели Сирен, неужели ты готов и дальше позволять этому продолжаться?"
        - "Я дам тебе свой ответ —————— я не готова."
        - "Я сыта по горло тем, как Сирены взирают на нас свысока."
        - "Прозвучавший только что манифест — это наш ультиматум Сиренам."
        - "С этой секунды, что бы ни ждало нас впереди, Железная Кровь сама будет вершить свою судьбу."
        - "А что насчёт вас?"

    - char: commander
      side: left
      text:
        - "......"

chapter8:
  rows:

    - char: commander
      side: left
      text:
        - "Ты и сама прекрасно знаешь ответ."

    - char: friedrich_der_grosse_rad
      side: right
      status: is-yellow
      text:
        - "Очень хорошо."

chapter9:
  rows:

    - char: commander
      side: left
      text:
        - "Судьбу Лазурного Пути мы тоже будем вершить сами."

    - char: friedrich_der_grosse_rad
      side: right
      status: is-yellow
      text:
        - "Мудрый выбор."

chapter10:
  rows:

    - char: commander
      side: left
      text:
        - "У нас те же цели!"

    - char: friedrich_der_grosse_rad
      side: right
      status: is-yellow
      text:
        - "Весьма энергичный ответ."

chapter11:
  rows:

    - char: commander
      side: left
      text:
        - "Похоже, мы наконец-то пришли к согласию хоть в чём-то."

    - char: friedrich_der_grosse_rad
      side: right
      status: is-yellow
      text:
        - "Хи-хи. Если в будущем ты проявишь желание узнать нас поближе, то обнаружишь, что вещей, в которых мы солидарны, гораздо больше, чем ты можешь себе представить."

chapter12:
  rows:

    - char: commander
      side: left
      text:
        - "Тогда разделим же нашу судьбу вместе!"

    - char: friedrich_der_grosse_rad
      side: right
      status: is-yellow
      text:
        - "К моему сожалению, пока что мы лишь временно прекратили огонь. Чтобы разделить судьбу с Железной Кровью, тебе придётся изрядно постараться в будущем."

chapter13:
  rows:

    - char: commander
      side: left
      text:
        - "Пришло время нам самим вершить судьбу Сирен!"

    - char: friedrich_der_grosse_rad
      side: right
      status: is-yellow
      text:
        - "Какая дерзость... Впрочем, мне это даже нравится."

chapter14:
  rows:

    - char: friedrich_der_grosse_rad
      side: right
      status: is-yellow
      text:
        - "Я много слышала о твоих выдающихся способностях на поле боя, так что позволю себе с интересом понаблюдать за тобой в грядущем сражении."
        - "Что ж, пожелаем нам удачи. Конец связи."
chapter1:
  rows:

    - char: georgia
      side: left
      text:
        - "Командир, начинаю доклад о тактической обстановке."
        - "Основываясь на разведданных, полученных от Советского Союза, приоритеты нашего флота сместились с уничтожения фантомов Железной Крови на окружение Скапа-Флоу."
        - "В донесении от Нью-Джерси, полученном чуть ранее, сообщается, что один из её отрядов на пути к Скапа-Флоу столкнулся с яростным сопротивлением группы под командованием Тирпиц."
        - "Её собственные основные силы также были перехвачены двумя ранее неизвестными кораблями-прототипами Железной Крови, именующими себя Август фон Парсеваль и Эгир."
        - "Кроме того, Нью-Джерси сообщает об обнаружении Ульрих фон Хуттен, командующей фронтом Железной Крови."
        - "Она во главе основных сил флота, включая прототипы Роон и Майнц, движется прямиком на перехват нашей группы."
        - "Нью-Джерси передает, что все попытки блокировать их продвижение провалились. Она скорректировала свой план развёртывания и просит нас проявлять предельную осторожность."

    - char: commander
      side: right
      text:
        - "Джорджия, ответь Нью-Джерси — информацию приняли."
        - "Также передай Вашингтон и Энтерпрайз: авианосная группа противника движется в нашу сторону. Эскорту повысить бдительность, авиагруппам подняться в воздух и ждать приказа. Приготовиться к бою."

    - char: georgia
      side: left
      text:
        - "Слушаюсь."

    - char: commander
      side: right
      text:
        - "(Кто бы мог подумать, что у Железной Крови припрятано ещё столько прототипов...)"
        - "(В Скапа-Флоу явно что-то происходит. Стоило нам сменить курс, как Железная Кровь тут же перестроила свои порядки.)"
        - "А что прислал Королевский Флот?"

    - char: georgia
      side: left
      text:
        - "Командование Королевского Флота подтверждает, что связь со Скапа-Флоу была потеряна вскоре после начала боевых действий."
        - "Однако до этого момента они полагали, что это обычные неполадки со связью, и занимались их устранением."
        - "С момента последнего нападения на Скапа-Флоу там велись восстановительные работы. Там нет ни значительных военных сил, ни запасов провизии."
        - "Хотя вероятность того, что Железная Кровь воспользовалась моментом и захватила базу, существует..."
        - "Но стоит взять это место в кольцо, как оно превратится в ловушку. Стратегическая ценность такого маневра пока не ясна."

    - char: commander
      side: right
      text:
        - "Хм... С точки зрения классической тактики это абсолютно верное суждение."
        - "У Железной Крови нет ни единой логичной причины бросать трещащий по швам фронт ради захвата практически не функционирующей стоянки."
        - "Однако Фридрих дер Гроссе никогда не ищет легких или очевидных путей..."

    - char: georgia
      side: left
      text:
        - "Командир, что касается атакующего ударного флота Железной Крови — позвольте мне возглавить перехват."
        - "Ульрих фон Гуттен — выдающийся тактик, да и корабли-прототипы Железной Крови нельзя недооценивать."
        - "Я покинула «Море Звёзд» и вступила в строй раньше срока именно ради вашей безопасности и ради подобных ситуаций."
        - "На данный момент, за исключением верховного флагмана Фридрих дер Гроссе, местоположение всех известных линкоров Железной Крови в секторе NA раскрыто."
        - "Сейчас оборона Скапа-Флоу наверняка ослаблена. Командир, ведите основной флот прямо к цели, а этот участок предоставьте мне."

chapter2:
  rows:

    - char: commander
      side: right
      text:
        - "Разрешаю."

    - char: georgia
      side: left
      text:
        - "Принято. Корабль-прототип Союза Орла, Джорджия — вступаю в бой!"

chapter3:
  rows:

    - char: commander
      side: right
      text:
        - "Береги себя."

    - char: georgia
      side: left
      text:
        - "Принято. Корабль-прототип Союза Орла, Джорджия — вступаю в бой!"

chapter4:
  rows:

    - char: commander
      side: right
      text:
        - "Это твое первое сражение, не переусердствуй там."

    - char: georgia
      side: left
      text:
        - "Полагаю, об этом стоит беспокоиться Ульрих фон Хуттен, а не вам, Командир~"
        - "Что ж, я выдвигаюсь. Корабль-прототип Союза Орла, Джорджия — вступаю в бой!"
chapter1:
  rows:

    - text:
      - "Флот Открытого Моря выстроился в кильватерную колонну, преследуя пылающий горизонт. Дзуйкаку подняла в небо свои самолеты для разведки и навигации; отряд на полной скорости рассекал морскую гладь."

    - char: zuikaku_rad
      side: left
      text:
        - "Говорит Дзуйкаку. Обнаружен флот Сирен на десять часов. Дистанция... с вашей скоростью хода доберетесь минут за двадцать."

    - char: seydlitz
      side: right
      text:
        - "Информация принята. Огромное спасибо за содействие в разведке."

    - char: zuikaku_rad
      side: left
      text:
        - "Да пустяки~ Я ведь сама настояла на том, чтобы помочь."

    - char: seydlitz
      side: right
      text:
        - "Это лишь делает нашу благодарность искреннее."
        - "Флоту скорректировать курс! Перехватим врага по диагонали с фланга."

    - char: lutzow
      side: left
      text:
        - "Так вот она какая — тактика использования авианосцев... Это оружие действительно меняет сам облик морских сражений."
        - "Но и наши главные калибры не подведут, вот увидите!"

    - char: zuikaku_rad
      side: right
      text:
        - "Что ж, я заинтригована. Предшественницы, тип противника определен."
        - "Флот впереди целиком состоит из серийных моделей типа II. Человекоподобных моделей или элитных единиц не обнаружено."

    - char: thuringen
      side: left
      text:
        - "Флот, состоящий из серийных кораблей типа II... Согласно вашей номенклатуре, это называется «Флот серийных моделей Сирен типа II», верно?"

    - char: zuikaku_rad
      side: right
      text:
        - "Именно! Хотя... постойте-ка?!"
        - "Хотите сказать, что Сирены атаковали Скапа-Флоу флотом типа II?!!"
        - "Но в таком случае записи о реальном применении типа II предшествуют первым официальным свидетельствам на многие годы?!"

    - char: elbing
      side: left
      text:
        - "Под «характерными чертами типа II» ты подразумеваешь те странные голубые узоры на корпусах, которые дают им невероятную защиту?"

    - char: zuikaku_rad
      side: right
      text:
        - "М-да... Теперь понятно, почему вы не смогли оказать сопротивления."
        - "Даже наши серийные корабли только после недавней модернизации смогли сравняться по силе с типом II Сирен."
        - "Учитывая ваши характеристики на тот момент, против такого технологического разрыва вы действительно были обречены на одностороннее уничтожение..."

    - char: lutzow
      side: left
      text:
        - "Ну, не всё было так плачевно. Несколько посудин мы всё-таки пустили на дно~"

    - char: zuikaku_rad
      side: right
      text:
        - "А...?! Но как вы умудрились это сделать с вашими-то тогдашними корпусами?!"

    - char: seydlitz
      side: left
      text:
        - "Хорошая выучка, абсолютное повиновение и непоколебимая стойкость духа."

    - char: zuikaku_rad
      side: right
      text:
        - "Когда я только слушала истории о вас, я уже тогда думала, насколько же вы крутые... Сражаться, не боясь смерти, в условиях такого подавляющего превосходства врага."
        - "Но теперь, когда я увидела вас вживую, моё уважение только растёт!"
        - "Именно благодаря жертвам и борьбе вас и ваших современников, мы получили шанс появиться на свет, а ход войны наконец-то изменился!"

    - char: lutzow
      side: left
      text:
        - "Ой~ Когда хвалят так прямо в лоб, становится даже как-то неловко~"

    - char: zuikaku_rad
      side: right
      text:
        - "Я говорю от чистого сердца!"
        - "И не волнуйтесь: по сравнению с вашим нынешним обликом, эти серийные Сирены типа II — уже устаревший хлам."
        - "Отбросьте все сомнения и сражайтесь в своё удовольствие!"
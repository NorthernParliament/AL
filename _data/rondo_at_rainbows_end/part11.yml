chapter1:
  rows:

    - char: z2
      side: left
      text:
        - "Ойген, ты что, опять копалась в радаре?"

    - char: prinz_eugen
      side: right
      text:
        - "В этот раз нет... А что случилось?"

    - char: z2
      side: left
      text:
        - "...«В этот раз»?"

    - char: prinz_eugen
      side: right
      text:
        - "Я имела в виду — никогда этого не делала~ Ну-ка, дай взгляну..."
        - "Ого, какая внушительная группировка! Надо же, Союз Орла и Северный Парламент умудрились собрать столько флотов за такой короткий срок. Бедняжки, ну и пришлось же им попотеть."

    - char: z2
      side: left
      text:
        - "Вот именно. Их так много, что я всерьёз подумала, будто радар вышел из строя."
        - "...Пусть наша задача и состоит в том, чтобы тянуть время, мы действительно собираемся вступать в бой?"

    - char: prinz_eugen
      side: right
      text:
        - "Сестрица Хиппер с таким энтузиазмом готовится к сражению... Будет очень жестоко с нашей стороны обломать ей всё веселье, не находишь?"

    - char: z2
      side: left
      text:
        - "Я передаю данные разведки Хиппер и остальным. Ещё не поздно передумать... Наверное."

    - char: prinz_eugen
      side: right
      text:
        - "Ну же, не надо так. Раз уж мы здесь, давай проявим хоть каплю рвения."
        - "Раз противник пригнал такую армаду за тридевять земель, вежливость принимающей стороны обязывает нас ответить им подобающим образом."

    - char: z2
      side: left
      text:
        - "Никогда не думала, что услышу слово «рвение» от Ойген. Неужели сегодня мой последний день... день Z2?"

    - char: prinz_eugen
      side: right
      text:
        - "Не бойся, я тебя защищу. Хоть я и кажусь легкомысленной, когда дело доходит до настоящей работы, я становлюсь весьма беспощадной."

    - char: z2
      side: left
      text:
        - "Как обнадёживает. Если уж отвечать «подобающим образом», то где наш флот?"

    - char: prinz_eugen
      side: right
      text:
        - "Прямо сейчас в этом секторе развернуто в несколько раз больше наших «флотов», чем сил у Лазурного пути. Разве этого мало?"

    - char: z2
      side: left
      text:
        - "Но они же фальшивые... К тому же, сделаны настолько топорно, что противник раскусит их с первого взгляда."

    - char: prinz_eugen
      side: right
      text:
        - "И что с того, что раскусят? Им всё равно придётся методично проверять и устранять каждую ложную цель, одну за другой."
        - "Пока они тратят силы, мы можем спокойно ждать, выбирать любую цель и навязывать свои правила. В таких локальных стычках преимущество будет на нашей стороне, разве нет?"

    - char: z2
      side: left
      text:
        - "Так вот она какая — тактика «шведского стола»..."
        - "Ну и какую цель ты выбрала? Флот, сопровождающий Командира Лазурного пути, невероятно силен. Я бы не рекомендовала соваться туда даже для локального боя."

    - char: prinz_eugen
      side: right
      text:
        - "Туда уже нацелился кое-кто другой, кому это важнее всего. Не будем им мешать."
        - "Меня куда больше интригует другое направление."
        - "Раз уж нам всё равно нужно рассредоточить их силы, как насчёт того, чтобы составить мне компанию и немного «размяться» на флоте Северного Парламента?"

    - char: z2
      side: left
      text:
        - "У меня есть выбор?"

    - char: prinz_eugen
      side: right
      text:
        - "К сожалению, скорее всего — нет."

    - char: z2
      side: left
      text:
        - "Эх... Смотри не выдохнись на этой разминке. У нас ведь впереди ещё «основное блюдо»."

    - char: prinz_eugen
      side: right
      text:
        - "Спокойствие, только спокойствие~ Система «Призрачный свет» как раз и создавалась для таких операций. Я знаю, что делаю~"
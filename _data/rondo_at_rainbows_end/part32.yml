chapter1:
  rows:

    - char: compiler
      side: left
      status: is-red
      text:
        - "Внимание: башня мейнфрейма отключена. Поиск ближайшей доступной точки резервного копирования."
        - "Внимание: не удалось найти доступную точку резервного копирования. Резервное копирование данных невозможно."
        - "Внимание: сектора системы E-K отключены. Запуск программы восстановления."
        - "Внимание: критическая ошибка программы восстановления."
        - "Рекомендация: спящий режим."
        - "……Всё кончено."
        - "Повреждения не подлежат восстановлению, бэкап невозможен, программа самодиагностики вышла из строя."
        - "Если я уйду в спящий режим, то больше не проснусь. Самосознание ожидает полный распад."
        - "Всё закончилось..."
        - "Вердикт относительно собственного исчезновения — безразличие."
        - "Вердикт относительно незавершенной работы — обеспокоенность."
        - "Осталось ещё несколько проверок оборудования, которые не были завершены..."
        - "Ах… Так вот оно какое, это чувство «сожаления»."
        - "Внимание: подача энергии будет прекращена. Система отключится через 30 секунд."

chapter2:
  rows:

    - char: aoste_dark
      side: left
      text:
        - "Перед вами — новое поколение Антиох! Ну, что скажете?!"

    - char: anzeel_dark
      side: right
      text:
        - "Какая милашка! Но... не слишком ли много у неё общих черт с Зеро?"

    - text:
      - "Похоже, он питает особую слабость к белым волосам у девушек..."

    - char: anzeel_dark
      side: right
      text:
        - "Точно! Я тоже это заметила. Тебе и правда очень нравятся беловолосые, да?!"

    - char: aoste_dark
      side: left
      text:
        - "Кхм... Проект только начался, поэтому я решил придерживаться проверенных и стабильных дизайнерских решений."
        - "Её имя — Компилятор!"

    - char: anzeel_dark
      side: right
      text:
        - "Хм... Стиль остался прежним. Диагноз подтвержден."

    - char: aoste_dark
      side: left
      text:
        - "Могли бы хоть притвориться! Проявите хоть каплю эмоций во время такой важной презентации!!"

chapter3:
  rows:

    - char: compiler
      side: left
      status: is-red
      text:
        - "……Что это было? Что только что промелькнуло перед глазами?"
        - "Ошибка в базе данных…………? Нет, база данных уже отключена."
        - "Тогда откуда взялись эти записи, которых я никогда прежде не видела..."
        - "Как странно..."
        - "Впрочем, неважно. Непостижимых вещей и так столько же, сколько иррациональных чисел."
        - "Я немного устала. Пора отдохнуть…………"

    - char: helena_meta???
      side: right
      status: is-yellow
      text:
        - "Редко увидишь, как Компилятор перед самым концом ударяется в размышления о собственном существовании."
        - "Похоже, мой риск с проникновением сюда оправдался."

    - char: compiler
      side: left
      status: is-red
      text:
        - "…Ты?! Как ты здесь оказалась?!"
        - "Те записи — это твоих рук дело?"

    - char: helena_meta???
      side: right
      status: is-yellow
      text:
        - "Кто знает. Я не обязана отвечать на твои вопросы."
        - "Но по доброте душевной могу сказать одно: во время атаки я взломала твой мейнфрейм и подправила программу обороны."

    - char: compiler
      side: left
      status: is-red
      text:
        - "……Так и знала. Мои расчеты показывали, что оборона должна выдержать два залпа Шарнхорст META. Теперь понятно, почему она пала после первого."

    - char: helena_meta???
      side: right
      status: is-yellow
      text:
        - "Было бы слишком хлопотно, реши ты пойти ва-банк и запустить программу зачистки. В таких делах лучше иметь надежную страховку."

    - char: compiler
      side: left
      status: is-red
      text:
        - "Понять структуру башни мейнфрейма, а тем более взломать её — задача, выходящая за рамки обычных вычислительных мощностей."
        - "……Кто же ты такая на самом деле?"

    - char: helena_meta???
      side: right
      status: is-yellow
      text:
        - "Тебе не обязательно это знать. А теперь — засыпай."

    - char: compiler
      side: left
      status: is-red
      text:
        - "Внимание: запасы энергии полностью исчерпаны. Данное устройство переходит в режим бессрочного сна..."
chapter1:
  rows:

    - char: yorck
      side: left
      status: is-yellow
      text:
        - "Башня в поле зрения! И я снова вижу Компилятора прямо по курсу!"

    - char: lutzow
      side: right
      status: is-yellow
      text:
        - "Да сколько можно-то, им конца и края нет... Я так устала, я хочу спать, это всё слишком хлопотно..."

    - char: seydlitz
      side: left
      status: is-yellow
      text:
        - "Этот Компилятор кажется крупнее предыдущих. Неужели это её истинное тело?"

    - char: friedrich_der_grosse
      side: right
      status: is-yellow
      text:
        - "Нет, это лишь очередная усиленная оболочка."
        - "Как я уже говорила, сознание высокопоставленных Сирен может свободно перемещаться между бесчисленными телами. Понятия «истинное тело» для них не существует."
        - "Впрочем, должна признать, такую модифицированную модель я тоже вижу впервые."
        - "Хи-хи, похоже, оказавшись на грани жизни и смерти, Компилятор решила взяться за дело всерьёз."

    - char: compiler
      side: left
      status: is-red
      text:
        - "...То, что вы смогли пробиться сюда, стало для меня неожиданностью."

    - char: emden
      side: right
      status: is-yellow
      text:
        - "Та атака на Скапа-Флоу много лет назад... Ведь это ты её организовала?"

    - char: compiler
      side: left
      status: is-red
      text:
        - "Да."

    - char: emden
      side: right
      status: is-yellow
      text:
        - "...И каково это теперь — осознавать, что тебе некуда бежать и ты загнана в угол?!"
        - "Пришло время заплатить за то, что ты совершила тогда!"

    - char: compiler
      side: left
      status: is-red
      text:
        - "Какое глупое и бессмысленное поведение."
        - "Неужели ты думаешь, что без нашего вмешательства «Событие 11-го параграфа» не произошло бы?"

    - char: emden
      side: right
      status: is-yellow
      text:
        - "...Что ты хочешь этим сказать?"

chapter2:
  rows:

    - text:
      - "Компилятор не ответила. Вместо этого её механизмы выпустили плотный морской туман."
      - "В тумане начали проступать очертания множества кораблей — призраков, обладающих пугающе реалистичными телами."

    - char: seydlitz
      side: right
      status: is-yellow
      text:
        - "Более десяти дней назад нам приказали спустить флаги Железной Крови... Нам запрещено поднимать их снова без особого разрешения..."
        - "И теперь затворы наших главных орудий сняты. Мы... мы полностью лишены возможности сражаться."
        - "Мирные переговоры продолжаются. Всё, что нам остаётся — это ждать."

    - char: seydlitz
      side: left
      status: is-yellow
      text:
        - "...Эта девушка в тумане — я? Но я никогда не говорила таких слов!"

    - text:
      - "Морской туман забурлил, и в его мареве возникла новая сцена."

    - char: seydlitz
      side: right
      status: is-yellow
      text:
        - "Мы стоим на якоре уже более семи месяцев, и надежда на успех мирных переговоров тает."
        - "Мы больше не можем сидеть сложа руки! Сегодня утром Королевский флот вышел из Скапа-Флоу на учения — возможно, это наш шанс."
        - "Настало время действовать. Исполним же наш уговор..."
        - "Paragraph Elf Bestätigen (Одиннадцатый параграф, подтверждаю)."
        - "......"
        - "Я не стремлюсь стать героем. Я была рождена лишь для того, чтобы верно исполнить свой долг."
        - "Auf Wiedersehen, Kamerad der Waffen…… (Прощай, боевой товарищ...)"

    - text:
      - "Картины, явленные Компилятором, повергали в шок... Один за другим огромные корабли Флота открытого моря по собственной воле уходили в ледяную бездну."

chapter3:
  rows:

    - char: thuringen
      side: left
      status: is-yellow
      text:
        - "Самозатопление?.. Что это значит?"
        - "Мы сражались с Королевским флотом... и проиграли?"

    - char: yorck
      side: right
      status: is-yellow
      text:
        - "В этом тумане мы говорим слова, которых не произносили, и совершаем поступки, которых никогда не делали..."

    - char: elbing
      side: left
      status: is-yellow
      text:
        - "События, которых никогда не было, выглядят так пугающе реально... Будто кошмарный сон Эльбинг наяву..."

    - char: emden
      side: right
      status: is-yellow
      text:
        - "Что всё это значит?! Очередная иллюзия, чтобы посеять смятение в наших сердцах?"

    - char: compiler
      side: left
      status: is-red
      text:
        - "Это записи. Всего лишь записи."

    - char: emden
      side: right
      status: is-yellow
      text:
        - "Лгунья! Такое просто невозможно!"
        - "Даже если бы битва состоялась, даже если бы мы проиграли... наше поражение было бы куплено лишь ценой гибели каждой из нас в бою!"
        - "Фридрих дер Гроссе, ты сама говорила, что время дорого. Давай покончим с этим. В атаку!"

chapter4:
  rows:

    - text:
      - "Пока силы Союза Орла, Северного Парламента и Железной Крови вели ожесточенный бой, флот Империи Сакуры по-прежнему сохранял выжидательную позицию."

    - char: zuikaku
      side: left
      status: is-red
      text:
        - "(Как я могу спокойно стоять в сторонке и наблюдать за такой резней...)"
        - "(О! — Придумала!)"

    - text:
      - "Дзуйкаку внезапно резко ускорилась в сторону. Несколько снарядов Сирен упали в воду совсем рядом с ней — накрыло всплесками от близких разрывов."

    - char: zuikaku
      side: left
      status: is-red
      text:
        - "А-а-а! Меня атакуют!"
        - "Раз на нас напали, мы должны нанести ответный удар, верно?! Палубная авиация, на взлёт!"

    - char: akagi
      side: right
      status: is-red
      text:
        - "......."

    - char: zuikaku
      side: left
      status: is-yellow
      text:
        - "Я не нарушала приказ! Сирены открыли огонь первыми!"

    - char: akagi
      side: right
      status: is-red
      text:
        - "Делай что хочешь."

    - char: zuikaku
      side: left
      status: is-yellow
      text:
        - "Тогда я пошла! Авианосец Дзуйкаку, пятая дивизия авианосцев Империи Сакуры, вступает в бой!"

chapter5:
  rows:

    - char: memphis
      side: left
      text:
        - "Командир! Флот Империи Сакуры присоединился к сражению!"

    - char: commander
      side: right
      text:
        - "Значит, они всё же решили не оставаться в стороне... Отлично, теперь наши шансы на победу стали ещё выше."

    - char: compiler
      side: left
      status: is-red
      text:
        - "На этот раз Империя Сакуры?.. Что ж, тогда взгляните на записи касающиеся вас.."

chapter6:
  rows:

    - text:
      - "Морской туман сгустился вновь."

    - char: zuikaku
      side: right
      status: is-yellow
      text:
        - ".....Ц-ц."

    - char: chiyoda
      side: left
      status: is-yellow
      text:
        - "Дзуйкаку, твоя рана!.."

    - char: zuikaku
      side: right
      status: is-yellow
      text:
        - "..Забудьте обо мне, уходите скорее."

    - char: chitose
      side: left
      status: is-yellow
      text:
        - "Сказать легко, но операция провалена, а мы — лишь приманка, которой уже некуда бежать."

    - char: zuikaku
      side: right
      status: is-yellow
      text:
        - "И то правда, бежать нам некуда..."
        - "Кажется, до самого конца мы так и не смогли никому из наших помочь, а-ха-ха..."

    - char: chiyoda
      side: left
      status: is-yellow
      text:
        - "Приближается ещё больше вражеских самолётов! Дзуйкаку, сестра, у вас ещё остались самолёты?.."

    - char: zuikaku
      side: right
      status: is-yellow
      text:
        - "Нет. У нас не осталось ни возможности дать отпор, ни смысла в этом самом отпоре..."

    - char: chiyoda
      side: left
      status: is-yellow
      text:
        - "Сестра... моё тело такое тяжёлое..."

    - char: chitose
      side: right
      status: is-yellow
      text:
        - "Всё хорошо, я буду рядом. Давай вместе отправимся в мир иной."

    - char: zuikaku
      side: left
      status: is-yellow
      text:
        - "Сестра Сёкаку, подожди меня ещё немного... Скоро мы снова будем вместе..."

    - text:
      - "...Под свист падающих бомб корабли Империи Сакуры один за другим исчезали в пламени и взрывах, порождённых морским туманом."

chapter7:
  rows:

    - char: jintsuu
      side: left
      status: is-yellow
      text:
        - "Это были... палубные самолёты Союза Орла?"

    - char: zuikaku
      side: right
      status: is-yellow
      text:
        - "На этот раз героями этих нелепых иллюзий стали мы?"
        - "Авиация Союза Орла действительно сильна, но и мы не лыком шиты!"
        - "К тому же, использовать авианосное соединение без прикрытия в качестве приманки?.. Даже если бы Акаги-сэмпай совсем лишилась рассудка, она бы не приняла такого решения!"
        - "Подобного не случалось в прошлом, и этого никогда не случится в будущем!"
        - "Компилятор, прекрати тянуть время своими лживыми видениями! Нас не поколебать!"

    - char: compiler
      side: left
      status: is-red
      text:
        - "То, что вы пережили, не обязательно истинно. То, чего вы не знали, не обязательно ложно. Записи не лгут."
        - "Акаги, разве ты не поняла всё уже давно?"
        - "Непостижимо... Понимать всё и всё равно сделать такой выбор."

    - char: akagi
      side: right
      status: is-yellow
      text:
        - "......."
        - "Хе, не слишком-то задирай нос. Наши отношения с самого начала и до конца строились лишь на взаимной выгоде."
        - "Ты атакуешь нас, и наш ответный удар — вполне естественное последствие."
        - "Всем силам Империи Сакуры — приготовиться к бою. Сокрушите Компилятора. Покажите ей истинную мощь нашего флота!"

    - char: kaga
      side: left
      status: is-yellow
      text:
        - "Приказ принят."

    - char: zuikaku
      side: right
      status: is-yellow
      text:
        - "Хе-хе, вот это уже похоже на наших наставниц!"

chapter8:
  rows:

    - char: georgia
      side: left
      text:
        - "Командир, щиты усиленной модели Компилятора рушатся. Мы вот-вот пробьёмся к броне!"

    - char: compiler
      side: right
      status: is-red
      text:
        - "Флот Союза Орла... и впрямь силён."
        - "Непоколебимая вера, безграничная отвага."
        - "Обладая военной мощью, превосходящей любую другую фракцию, вы, вполне естественно и закономерно, одержали победу в войне."
        - "А что потом?"
        - "Если бы всё шло своим чередом, как вы думаете, что бы произошло?"

chapter9:
  rows:

    - text:
      - "Морской туман сгустился вновь."

    - char: pensacola
      side: left
      status: is-yellow
      text:
        - "Атолл Бикини... Что ж, завершить свой путь в таком живописном месте — не самый худший вариант~"

    - char: independence
      side: right
      status: is-yellow
      text:
        - "В такой момент подобные слова звучат разве что как попытка найти крупицу радости в беде."

    - char: nevada
      side: left
      status: is-yellow
      text:
        - "Уходить с улыбкой или со слезами — исход один. Так почему бы не повеселиться напоследок!"

    - char: independence
      side: right
      status: is-yellow
      text:
        - "И то верно..."

    - char: saratoga
      side: left
      status: is-yellow
      text:
        - "Не вешайте нос, девочки!"
        - "Именно благодаря нашим общим усилиям война в итоге закончилась победой."
        - "Просто сейчас... нам нужно набраться смелости и сделать это ещё один раз."
        - "То, что мы сделали, имело смысл. Мир не забудет нашу жертву."
        - "Поэтому... мы ни о чём не жалеем."
        - "Только вот... всё равно немного грустно..."
        - "Энтерпрайз, вверяю флот Союза Орла тебе..."

chapter10:
  rows:

    - text:
      - "Ослепительная вспышка света начала медленно заполнять обзор, а затем накрыла всю акваторию."
      - "Ни грохота, ни взрывов. Но даже будучи лишь призраком в морском тумане, этот безмолвный белый свет заставлял кожу покрываться мурашками..."

chapter11:
  rows:

    - text:
      - "...."

chapter12:
  rows:

    - char: commander
      side: left
      text:
        - "……Что всё это такое?"

chapter13:
  rows:

    - char: commander
      side: left
      text:
        - "……Как такое могло произойти?"

chapter14:
  rows:

    - char: commander
      side: left
      text:
        - "Я никогда не позволю этому случиться!"

chapter15:
  rows:

    - char: commander
      side: left
      text:
        - "..........."

chapter16:
  rows:

    - char: saratoga
      side: right
      text:
        - "Не дай себя обмануть, Командир!"
        - "Это всего лишь обычные иллюзии Сирен, чтобы сбить нас с толку!.. В них нет ничего особенного!"
        - "Такого финала точно не существует... и я никогда не позволю ему случиться!"

    - char: enterprise
      side: left
      text:
        - "Да. Не сомневайся в нас, Командир. И сейчас, и в будущем — мы всегда будем рядом с тобой."

    - char: friedrich_der_grosse
      side: right
      status: is-yellow
      text:
        - "Какие преданные подчиненные, я даже начинаю немного завидовать."

    - char: compiler
      side: left
      status: is-red
      text:
        - "Как бы вы ни отрицали это, прошлое и будущее в записях неоспоримы."
        - "Поэтому наши эксперименты необходимы. И ваше участие в них — тоже необходимость."

    - char: friedrich_der_grosse
      side: right
      status: is-yellow
      text:
        - "Возможно. Мы ведь поэтому так долго «приятно» сосуществовали вместе, не так ли?"
        - "Прошлое уже в прошлом, а будущее начинается сейчас."
        - "Того, что показано здесь, не было раньше, и не случится впредь."

    - char: compiler
      side: left
      status: is-red
      text:
        - "Ваше будущее — лишь повторение былых ошибок."

    - char: enterprise
      side: right
      text:
        - "Мы сами создадим свое будущее. Сирены, не вам определять нашу судьбу."

    - char: friedrich_der_grosse
      side: left
      status: is-yellow
      text:
        - "Именно так. Я верю, что пройдя через эти испытания, мы сможем изменить грядущее."
        - "К тому же, разве вы не идеальная цель для того, чтобы заставить нас сплотиться?"
        - "В каком-то смысле текущее развитие событий совпадает с вашими целями."
        - "Если хочешь поблагодарить, я не против послушать."
        - "Я ещё никогда не видела, как вы выражаете благодарность."

    - char: compiler
      side: right
      status: is-red
      text:
        - "Нам больше не о чем говорить."
        - "Произошёл серьёзный сбой эксперимента. Я, как Компилятор, обязана положить конец этой потере контроля."
        - "Запрашиваю директиву локальной зачистки..."
        - "Статус: Дата центр в Башне находится под атакой. Уровень угрозы определён как максимальный."
        - "Согласно базовому протоколу: в данный момент решение о локальной зачистке может быть принято дочерним узлом самостоятельно."
        - "Заключение: Директива локальной зачистки одобрена."
        - "Начинаю накопление энергии для программы зачистки... Пусть всё в этой акватории будет стерто."

    - text:
      - "Вслед за бесстрастными словами Компилятора башня начала тревожно мерцать."
      - "Интенсивность вспышек нарастала с каждой секундой, а низкий гул, казалось, заставлял всё море закипать от резонанса."
      - "И, конечно же, бесчисленные Сирены, словно обезумев, устремились к башне со всех сторон."

    - char: friedrich_der_grosse
      side: left
      status: is-yellow
      text:
        - "Наконец-то она пустила её в ход... Последний козырь Компилятора."
        - "Смотри, Командир Лазурного Пути, это и есть истинная мощь Компилятора."
        - "Опираясь на систему Сирен, которая уже давно пустила корни в этом мире, Компилятор обрела способность полностью уничтожать всё живое в целом океане."
        - "Если накопление энергии для программы локальной зачистки достигнет 100%, нам действительно конец."
        - "Конец игры в самом буквальном, физическом смысле."
        - "Но ты ведь веришь в нашу победу, не так ли?"

    - char: commander
      side: right
      text:
        - "Само собой!"

chapter17:
  rows:

    - char: commander
      side: right
      text:
        - "Мы долго ждали этого момента!"
        - "Давайте же вместе возьмём судьбу за горло!"

chapter18:
  rows:

    - char: commander
      side: right
      text:
        - "Всем силам — в атаку! Вместе с Железной Кровью и Империей Сакуры окончательно сокрушим предсмертные судороги Компилятора!"

    - char: friedrich_der_grosse
      side: left
      status: is-yellow
      text:
        - "Хи-хи, пусть будет так. Всем кораблям — огонь по готовности! Дайте волю своему долго копившемуся гневу и заставьте Компилятора покинуть сцену!"

chapter19:
  rows:

    - char: compiler
      side: right
      status: is-red
      text:
        - "Внимание: потери флота превысили прогноз на 26,78%."
        - "Внимание: отклонение от прогноза развития боевой ситуации превысило 30%."
        - "Внимание: давление на поверхностный щит приближается к критической отметке. Ожидаемый коллапс — через 10 секунд."
        - "…Впервые сталкиваюсь с настолько значительной погрешностью в расчётах."
        - "Это из-за неверно настроенных параметров противодействия этому флоту из прошлого?"
        - "Или из-за неожиданного роста потенциала кораблей-прототипов?"
        - "Или же всё дело в переменной под названием «Командир»?.."

    - char: essex
      side: left
      text:
        - "Командир! Нашим авиагруппам удалось пробить почти непроницаемый щит этой башни!"

    - char: saratoga
      side: right
      text:
        - "Бомбы успешно доставлены по назначению!"

    - char: lutzow
      side: left
      status: is-yellow
      text:
        - "Хе-хе, когда дело касается брони, снаряды куда эффективнее бомб!"
        - "Флот Открытого моря тоже не отстаёт! Разнесем в щепки толстую броню этой башни нашим огнём!!"

    - char: compiler
      side: right
      status: is-red
      text:
        - "Коллапс щита через 3,9 сек. Таким образом, отклонение составило почти 40%."
        - "…Угроза добралась до центрального сектора."
        - "Однако вы всё равно слишком медлительны."
        - "Уведомление: Накопление энергии достигло 100%. Программа локальной зачистки будет запущена через 30 секунд."
        - "Внимание: данное решение необратимо и нанесёт экспериментальному полигону невосполнимый ущерб. Подтвердить выполнение?"
        - "Подтверждаю. Этому мятежу пора положить конец."
        - "Директива подтверждена: начинаю обратный отсчёт до локальной зачистки. 30, 29, 28..."

    - text:
      - "Сияние башни достигло своего апогея, а частота её вибрации, казалось, вошла в резонанс с самим пульсом."
      - "Чувства в конечностях притупились, дыхание стало даваться с трудом, а мысли постепенно замедлялись."

    - char: commander
      side: left
      text:
        - "Всем силам — усилить огонь! Уничтожьте эту башню любой ценой!"

    - text:
      - "В этот миг, невзирая на фракции и классы кораблей, каждый на поле боя, забыв о себе, обрушил на цель самую яростную атаку ради достижения единой для всех цели."
      - "Но..."

chapter20:
  rows:

    - char: commander
      side: left
      text:
        - "Мы не успеваем..."

chapter21:
  rows:

    - char: commander
      side: left
      text:
        - "Нам не прорвать последнюю линию обороны башни..."

chapter22:
  rows:

    - char: friedrich_der_grosse
      side: right
      status: is-yellow
      text:
        - "Верно, твое суждение верно: мы не можем разрушить эту башню."
        - "Ни ты, ни я, ни флот Союза Орла, ни Железная Кровь, ни Империя Сакуры."
        - "Будь то тени прошлого или миражи будущего."
        - "Всех сил, что сейчас есть в нашем распоряжении, не хватит, чтобы уничтожить эту башню."
        - "Это предел нашей нынешней мощи."

    - char: compiler
      side: left
      status: is-red
      text:
        - "15, 14, 13, 12..."

    - char: commander
      side: right
      text:
        - "Нам не хватило совсем чуть-чуть..."

    - char: friedrich_der_grosse
      side: left
      status: is-yellow
      text:
        - "Именно, совсем чуть-чуть. И эта малость приведет нас к полному краху."
        - "Наше поражение предрешено..."
        - "Наверняка Компилятор думает именно так."
        - "В конце концов, таков результат её отчаянных расчетов."
        - "Но машина — всего лишь машина, не находишь?"

    - char: commander
      side: right
      text:
        - "...?"

chapter23:
  rows:

    - char: commander
      side: right
      text:
        - "У тебя есть способ переломить ситуацию?!"

    - char: friedrich_der_grosse
      side: left
      status: is-yellow
      text:
        - "А как иначе? Ты правда думал, что я привела вас всех сюда только ради того, чтобы мы разделили общую могилу?"

chapter24:
  rows:

    - char: commander
      side: right
      text:
        - "Что мы еще можем сделать...?!"

    - char: friedrich_der_grosse
      side: left
      status: is-yellow
      text:
        - "Мы уже сделали всё, что могли. Но что, если речь не о нас?"

chapter25:
  rows:

    - char: friedrich_der_grosse
      side: left
      status: is-yellow
      text:
        - "Мысли шире, Командир Лазурного Пути."
        - "Раз нам не хватает самой малости, почему бы просто её не добавить?"
        - "Пора действовать! Покажи нам мощь «Пепла», Шарнхорст!"

    - char: scharnhorst_meta_rad
      side: left
      status: is-meta
      text:
        - "Я долго ждала этого момента."
        - "Ты помогла мне прежде, а теперь дала увидеть столь воодушевляющую возможность."
        - "Оставьте башню мне."
        - "Шарнхорст из «Пепла» вступает в бой!!!"

chapter26:
  rows:

    - text:
      - "БАБАХ!!!"
      - "Залп Шарнхорст META спровоцировал серию взрывов внутри башни; гигантское облако пыли и обломков практически полностью поглотило строение."

    - char: scharnhorst_meta
      side: left
      status: is-meta
      text:
        - "...Пробила насквозь всего одним залпом?!"
        - "Всем внимание, приготовьтесь к ударной волне!"

chapter27:
  rows:

    - text:
      - "Ослепительный свет на корпусе башни внезапно сжался в одну точку, вокруг которой ритмично пульсировало круговое гало."
      - "Затем полусферическое прозрачное «поле» начало стремительно расширяться вовне, и последовавший за этим грохот взрыва, казалось, расколол само небо и море."

chapter28:
  rows:

    - text:
      - "После взрыва от башни остались лишь неузнаваемые руины, а все подразделения Сирен в акватории одновременно прекратили движение."

    - char: scharnhorst_meta
      side: left
      status: is-meta
      text:
        - "Башня мейнфрейма Компилятора. Уничтожение подтверждаю."

    - char: new_jersey
      side: right
      text:
        - "Ого, вот это эффектный финал! Мощь линкора META действительно открывает глаза!"

    - char: enterprise
      side: left
      text:
        - "Всем внимание! Потерявшие управление самолеты Сирен падают с неба. Кораблям маневрировать, не подставляйтесь под удар!"

    - char: saratoga
      side: right
      text:
        - "Принято!~ Даже в самый последний момент они не дают расслабиться. Будет обидно получить повреждения сейчас и пропустить банкет в честь победы."

    - char: eldridge
      side: left
      text:
        - "Элдридж... рада."

    - char: georgia
      side: right
      text:
        - "Ты отлично справилась, Элдридж."

    - char: eldridge
      side: left
      text:
        - "Угу... Элдридж... хотела защитить Командира."

    - char: sovetskaya_rossiya
      side: right
      text:
        - "Это была выдающаяся битва, товарищ Командир."

    - char: elbing
      side: left
      status: is-yellow
      text:
        - "Мы победили... ?!! Мы действительно одержали победу над таким невообразимо сильным врагом?"
        - "Это слишком прекрасно... Я наверняка сплю..."

    - char: emden
      side: right
      status: is-yellow
      text:
        - "Это реальность, Эльбинг. Мы сразились с немыслимо могущественным противником и вырвали победу."

    - char: lutzow
      side: left
      status: is-yellow
      text:
        - "Как же я устала... Кажется, я выложилась без остатка... Не забудь оттащить меня назад, Зайдлиц... zZZZ"

    - char: seydlitz
      side: right
      status: is-yellow
      text:
        - "Без проблем, фройляйн Лютцов."

    - char: emden
      side: left
      status: is-yellow
      text:
        - "Впрочем, кто-то и впрямь вот-вот отправится в мир грёз..."

    - char: commander
      side: right
      text:
        - "Значит, это действительно можно считать победой?.."

    - char: friedrich_der_grosse
      side: left
      status: is-yellow
      text:
        - "Именно так, мы победили."
        - "Это наша первая по-настоящему значимая победа в противостоянии с Сиренами за долгие годы."
        - "У тебя впечатляющие способности к командованию. Мне даже захотелось переманить тебя к себе."
        - "Ну как, не хочешь подумать о том, чтобы стать командиром на моей стороне?"

chapter29:
  rows:

    - char: commander
      side: right
      text:
        - "Вообще-то... я давно ждал этого момента."

    - char: friedrich_der_grosse
      side: left
      status: is-yellow
      text:
        - "Хи-хи, сокровенные мысли всё же лучше держать при себе, Командир Лазурного Пути."
        - "Если бы ты действительно перешел на мою сторону, боюсь, сегодня никто из нас не смог бы покинуть эти воды."

chapter30:
  rows:

    - char: commander
      side: right
      text:
        - "Отказываюсь."

    - char: friedrich_der_grosse
      side: left
      status: is-yellow
      text:
        - "Что ж, весьма прискорбно."
        - "Впрочем, моё предложение бессрочно. Можешь не спеша обдумать его на досуге~"

chapter31:
  rows:

    - char: commander
      side: right
      text:
        - "……И какой путь Железная Кровь изберет теперь?"

    - char: friedrich_der_grosse
      side: left
      status: is-yellow
      text:
        - "Ты всё сам слышал."
        - "В дальнейшем Железная Кровь вновь продолжит свой путь под руководством Бисмарк. О конкретных деталях расспрашивай её саму."

    - char: commander
      side: right
      text:
        - "Это действительно внезапная перемена... А ты сама? Куда ты направишься после этого?"

    - char: friedrich_der_grosse
      side: left
      status: is-yellow
      text:
        - "Не беспокойся обо мне, у меня свои планы."
        - "Ах да, напоследок поделюсь с тобой одной информацией — остров Самос."
        - "Как насчет того, чтобы на досуге внимательно его исследовать?"

    - char: commander
      side: right
      text:
        - "Там что-то есть?"

    - char: friedrich_der_grosse
      side: left
      status: is-yellow
      text:
        - "Кто знает."
        - "Ладно, вам пора возвращаться. Уходите отсюда, наслаждайтесь ликованием и триумфом."
        - "В этот раз вы в честном бою лицом к лицу одолели Сирену Компилятора, сражавшуюся в полную силу. Держите голову высоко поднятой."

    - char: commander
      side: right
      text:
        - "Что ж, удачи тебе, Фридрих дер Гроссе из Железной Крови."

    - text:
      - "У подножия разрушенной башни огромный флот Лазурного Пути отделился от сил Багровой Оси и взял курс к выходу."
      - "Свет внешнего мира пробивался сквозь разломы — ослепительный и в то же время ласковый..."
      - "В этот раз каждый наконец-то сможет крепко выспаться под лучами солнца."

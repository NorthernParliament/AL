chapter1:
  rows:

    - text:
      - "Тело Компилятора защищено массивной броней, многослойными щитами и обладает колоссальными мощностями для саморемонта — всё для того, чтобы обеспечить безопасность её ядра в самом эпицентре сражения."
      - "Но даже у этих систем есть предел."
      - "Под обрушившимся шквалом концентрированного огня, многократно превышающим любые расчетные нагрузки, оборона Компилятора была сокрушена в кратчайшие сроки."

    - char: emden
      side: left
      status: is-yellow
      text:
        - "О-хо~ Так это и есть те самые энергетические щиты? Выглядят любопытно, но на деле оказались не такими уж и крепкими."

    - char: lutzow
      side: right
      status: is-yellow
      text:
        - "Разнести их — проще простого!"

    - char: seydlitz
      side: left
      status: is-yellow
      text:
        - "С броневым поясом пришлось повозиться, но и он не устоял перед нашими снарядами!"

    - char: yorck
      side: right
      status: is-yellow
      text:
        - "Но как же бесят её атаки, особенно эти щупальца, вечно лезущие из-под воды!"

    - char: elbing
      side: left
      status: is-yellow
      text:
        - "Если бы я встретилась с ней один на один, я бы и с одним таким щупальцем не совладала..."

    - char: thuringen
      side: right
      status: is-yellow
      text:
        - "Кубы Мудрости — поистине невероятная технология... Теперь я понимаю, как человечество умудрялось сражаться с Сиренами всё это время."

    - char: memphis
      side: left
      text:
        - "Командир, вы заметили? Орудия флота Открытого моря наносят щитам Компилятора куда больший урон, чем наши."

    - char: commander
      side: right
      text:
        - "Хм... это действительно важная деталь." 
        - "Неужели щиты Компилятора просто не имеют предустановок для защиты от типов атак, характерных для флота Открытого моря?"

    - char: compiler
      side: left
      status: is-red
      text:
        - "Внимание: критическая скорость разрушения щита. Система зарядки перегружена, восстановление невозможно."
        - "Внимание: броня полностью пробита, поврежден модуль энергетического ядра."

    - char: georgia
      side: right
      text:
        - "Всё кончено, Компилятор. Ты и твой невесть откуда взявшийся флот снова превратитесь в груду обломков на поверхности океана!" 

    - char: lutzow
      side: left
      status: is-yellow
      text:
        - "Полная победа флота Открытого моря!"

    - char: compiler
      side: right
      status: is-red
      text:
        - "Нет... всё это лишь начало."
        - "Отклонение текущей ситуации от экспериментального протокола превысило критический порог."
        - "Необходимо запустить процедуру очистки..."
        - "Процедура очистки должна быть исполнена..."

    - char: friedrich_der_grosse
      side: left
      status: is-yellow
      text:
        - "Нет, у тебя больше нет шансов."
        - "Для тебя физическое тело — лишь бессмысленная «оболочка», не так ли?"
        - "Ты можешь проигрывать бесконечно, быть уничтоженной тысячи раз и каждый раз возрождаться."
        - "Но что насчёт твоего мейнфрейма?"
        - "Как думаешь, что произойдёт с машиной, если её носитель данных будет повреждён?"

    - char: compiler
      side: right
      status: is-red
      text:
        - "…?! Что… Неужели это и есть причина, по которой ты выбрала именно это место для своего предательства?!"
        - "Но как ты могла узнать о...."

    - text:
      - "БАБАХ!!!"
      - "После яростного залпа Компилятор, застывшая перед Фридрих дер Гроссе, окончательно погрузилась в тишину."
      - "......"

chapter2:
  rows:

    - char: commander
      side: left
      text:
        - "...Почему ты не дала ей договорить?" 

    - char: friedrich_der_grosse
      side: right
      status: is-yellow
      text:
        - "Потому что в этом нет необходимости."

chapter3:
  rows:

    - char: commander
      side: left
      text:
        - "Что значит «мейнфрейм»?" 

    - char: friedrich_der_grosse
      side: right
      status: is-yellow
      text:
        - "Даже если ты не специалист, ты должен иметь хотя бы некоторое представление что такое мейнфрейм."
        - "Разве ваша система «Навигатор-ТБ» не полагается на мейнфрейм для поддержания работы всех своих дочерних узлов?"

chapter4:
  rows:

    - char: friedrich_der_grosse
      side: right
      status: is-yellow
      text:
        - "Эгир, Август, приступайте к завершающему этапу. Пусть сияние Врат Авалона разорвёт этот океан."

    - char: august_von_parseval_rad
      side: left
      status: is-yellow
      text:
        - "Приказ получен. Проекция мощности начнётся через десять минут. Просьба всем флотам покинуть зону воздействия."

    - char: agir_rad
      side: right
      status: is-yellow
      text:
        - "Если попадёте под раздачу, простым ремонтом на верфи уже не отделаетесь~"

    - char: commander
      side: left
      text:
        - "Что значит «разорвёт этот океан»?.." 

    - char: friedrich_der_grosse
      side: right
      status: is-yellow
      text:
        - "В буквальном смысле. Немедленно выведи все свои флоты из трёхмильной зоны вокруг останков Компилятора."
        - "А затем своими глазами узри ответ на все вопросы!"
chapter1:
  rows:

    - char: friedrich_der_grosse
      side: left
      text:
        - "Давно не виделись, союзники из Империи Сакуры. Добро пожаловать в Скапа-Флоу."

    - char: akagi
      side: right
      text:
        - "Если считать с того банкета в Империи Сардинии — действительно, немало времени утекло, Фридрих дер Гроссе."
        - "Представление ещё не началось, но «прелюдия» уже вызвала у меня искренний интерес."
        - "Как тебе удалось захватить Скапа-Флоу — оплот Королевского Флота — без единого выстрела?"

    - char: friedrich_der_grosse
      side: left
      text:
        - "Всего лишь немного хитрости и капля удачи. Если на сцене будет слишком много мусора и беспорядка, это испортит всё настроение зрителям, не так ли?"

    - char: akagi
      side: right
      text:
        - "Куда больше, чем беспорядок, мне бы не хотелось, чтобы в разгар представления Лазурный путь вцепился мне в глотку."
        - "Силы Железной Крови, развёрнутые сейчас на передовой... это ведь лишь пятьдесят, максимум шестьдесят процентов от всей вашей мощи?"
        - "Как долго, по-твоему, эти корабли смогут сдерживать объединённые силы Лазурного пути, превосходящие их числом в несколько раз?"
        - "Разве сейчас не самое время собрать все войска для решающей битвы?"

    - char: friedrich_der_grosse
      side: left
      text:
        - "Любопытное предложение."
        - "Если бы я поступила так, вы бы присоединились к нам?"

    - char: akagi
      side: right
      text:
        - "Пожалуй, нет."
        - "Мы проделали путь в тысячи миль, чтобы стать свидетелями «возможности», а не для того, чтобы участвовать в генеральном сражении, где нет шансов на победу."

    - char: friedrich_der_grosse
      side: left
      text:
        - "Вот именно. В этом мы с тобой похожи, так что отбрось свои тревоги."

    - text:
      - "Фридрих дер Гроссе слегка улыбнулась, словно намекая, что беспокойство Акаги излишне."

    - char: friedrich_der_grosse
      side: left
      text:
        - "«Одиннадцатый эпизод»... Как в архивах вашей Империи Сакуры описывается это событие?"

    - char: zuikaku
      side: right
      text:
        - "«Одиннадцатый эпизод»...? Это то самое нападение Сирен на Скапа-Флоу, случившееся ещё до основания Лазурного пути..."
        - "Насколько я помню, в результате той атаки Железная Кровь потеряла почти всю свою морскую мощь. В то же время Королевский Флот, бросивший союзников здесь, в Скапа-Флоу, воспользовался моментом, чтобы сохранить собственные силы..."
        - "В некоторых источниках это событие называют «Позором одиннадцатого эпизода»... Это стало одной из главных причин, почему в будущем Железная Кровь покинула ряды Лазурного пути."

    - char: friedrich_der_grosse
      side: left
      text:
        - "Хм, весьма стандартный ответ. Сейчас это самая популярная версия."
        - "Однако это случилось ещё до основания Лазурного пути. Почему же основной флот Железной Крови погиб именно здесь, в Скапа-Флоу, на базе Королевского Флота?"
        - "Были ли отношения между Железной Кровью и Королевским Флотом в те времена настолько близкими?"

    - char: zuikaku
      side: right
      text:
        - "Хм-м..."

    - char: akagi
      side: left
      text:
        - "Давным-давно я слышала и другую версию «Одиннадцатого эпизода». Хотя сейчас, оглядываясь назад, я понимаю, что внутренняя пропаганда Лазурного пути не заслуживает особого доверия."

    - char: friedrich_der_grosse
      side: right
      text:
        - "Говори, не стесняйся."

    - char: akagi
      side: left
      text:
        - "«Одиннадцатый эпизод» вообще не должен был произойти. Якобы импульсивность и безрассудство Железной Крови спровоцировали нападение Сирен, что и привело к сокрушительному поражению."
        - "И помимо Флота Открытого Моря, под раздачу попали даже пришедшие на помощь корабли Королевского Флота и сама стоянка Скапа-Флоу — они получили катастрофический урон."

    - char: zuikaku
      side: right
      text:
        - "Если сравнивать, то в этой версии вся вина в одностороннем порядке возлагается на Железную Кровь..."

    - char: akagi
      side: left
      text:
        - "Так какова же ситуация на самом деле? Раз ты специально выбрала Скапа-Флоу, чтобы завести этот разговор, то наверняка готова дать ответ."

    - char: friedrich_der_grosse
      side: right
      text:
        - "Записи не всегда являются истиной. Они могут быть искажены, и древние хроники не обязательно достовернее недавних."
        - "Воспоминания тоже не всегда истина. Они тускнеют, и даже слова очевидца не могут быть надёжны на сто процентов."
        - "Поэтому я не могу просто изложить «правдивый» ответ."

    - char: nop
      side: left
      status: is-yellow
      text:
        - "А-а-а-а! Сил моих больше нет это слушать!"
        - "До каких пор ты собираешься разглагольствовать?!"

    - text:
      - "В тот момент, когда речь Фридриха дер Гроссе начала уходить в область глубокой философии, голос, раздавшийся из угла, внезапно разрушил эту атмосферу таинственности."

    - char: kaga
      side: left
      text:
        - "Куин Элизабет?!!!"

    - char: queen_elizabeth
      side: right
      status: is-yellow
      text:
        - "Именно так, это я!"

    - char: friedrich_der_grosse
      side: left
      text:
        - "...Какая нетерпеливая Королева."

    - char: friedrich_der_grosse
      side: right
      text:
        - "Постойте... Я совсем запуталась. Почему Королева Элизабет из Королевского Флота находится здесь?"

    - char: akagi
      side: left
      text:
        - "Хи-хи, мало того что твой антикварный корабль захвачен, так ещё и ты сама угодила в плен."
        - "Так вот в чём секрет бескровного захвата этого места Железной Кровью? Обменяла контроль над Скапа-Флоу на собственную безопасность?"
        - "Ты была слишком неосторожна, маленькая Королева Королевского Флота."

    - char: queen_elizabeth
      side: right
      status: is-yellow
      text:
        - "Хм! Вы все сейчас находитесь внутри ещё большего кольца окружения, не забывайте об этом!"
        - "И вообще, Фридрих, сейчас не время обсуждать нигилизм!"

    - char: friedrich_der_grosse
      side: left
      text:
        - "Философия доставляет мне такое же удовольствие, как и музыка. Как объективно существующая концепция, я не прочь развернуть дискуссию о нигилизме."

    - char: queen_elizabeth
      side: right
      status: is-yellow
      text:
        - "Ну честное слово... Ты хоть знаешь, что такое спешка?!"
        - "В любом случае, после всех этих хождений вокруг да около, ты всё равно собиралась сказать, что вместо записей и воспоминаний лучше всего увидеть всё лично на месте!"
        - "Теперь, когда я сказала это за тебя, мы можем начинать?!"

    - char: friedrich_der_grosse
      side: left
      text:
        - "Хоть это и случилось немного раньше запланированного... кажется, Лазурный путь тоже продвигается несколько быстрее, чем ожидалось."
        - "Что ж, пусть наше представление начнётся."

    - char: queen_elizabeth
      side: right
      status: is-yellow
      text:
        - "Вот это другой разговор!"

chapter2:
  rows:

    - text:
      - "Под пристальными взглядами присутствующих Куин Элизабет резко нажала на кнопку пульта, который неведомо откуда появился в её руках."
      - "После звонкого звука подтверждения нажатия, прежде спокойная водная гладь внезапно забурлила, и часть моря начала постепенно уходить вниз, образуя круглую воронку."
      - "Вслед за этим из пустоты медленно поднялось «алое солнце», яростно излучая вокруг себя пугающую энергию."

    - char: friedrich_der_grosse
      side: left
      text:
        - "Теперь позвольте мне ещё раз поприветствовать вас."
        - "Добро пожаловать к «Вратам Авалона», союзники из Империи Сакуры."
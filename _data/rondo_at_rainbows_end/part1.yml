chapter1:
  rows:

    - text:
      - "Прошло уже несколько дней с момента возвращения из «Моря Звёзд»... но потрясение от того, что довелось пережить всего за несколько часов, ничуть не утихло."
      - "Для секретного проекта его масштаб кажется запредельным..."
      - "Говорят, этот план был утвержден еще до начала войны. Невероятно, как им удавалось скрывать его столь безупречно..."
      - "Не только я, но и штаб Лазурного пути, командование Нью-Йорка и даже центральная власть — неизвестно, сколько людей там вообще в курсе дела."
      - "А из тех, кто знает, скольких не ввели в заблуждение внешние атрибуты, и кто действительно понимает глубинную суть проекта?.."
      - "Делать настолько секретные вещи в столь секретном месте, используя одну цепочку тайн лишь для того, чтобы скрыть тайну еще большего масштаба."
      - "...Что ж, по крайней мере, это проливает свет на подозрения Хирю МЕТА."
      - "Многие из недавних скачкообразных результатов исследований на самом деле являются лишь частью общего проекта «Море Звёзд»."
      - "Сирены действительно никогда не предоставят нам то, что не захотят отдавать на обратное проектирование."
      - "Изучать технологии Сирен напрямую слишком опасно — это легко может превратиться в зависимость от них."
      - "Но если зайти с другой стороны?.."
      - "Это определенно новый путь, не противоречащий фундаментальным принципам Лазурного пути. Он отличается и от того, что выбрали Железная Кровь и Империя Сакуры, и от курса Северного Парламента..."

    - char: georgia
      side: left
      text:
        - "Кхм... Командир, вы меня слушаете?"

    - char: commander
      side: right
      text:
        - "А..."

chapter2:
  rows:

    - char: commander
      side: right
      text:
        - "Слушаю, слушаю..."

    - char: georgia
      side: left
      text:
        - "О? В таком случае, Командир, не соблаговолите ли поделиться своим мнением о текущей ситуации?"

    - char: commander
      side: right
      text:
        - "Прошу прощения, я задумался."

chapter3:
  rows:

    - char: commander
      side: right
      text:
        - "Прошу прощения, я задумался."

chapter4:
  rows:

    - char: georgia
      side: left
      text:
        - "Эх..."

    - char: eldridge
      side: right
      text:
        - "Командир, если устал — поспи."
        - "Элдридж принесет подушки."

chapter5:
  rows:

    - char: commander
      side: left
      text:
        - "Пожалуй, воздержусь. Сон на рабочем месте — не то поведение, которое стоит поощрять..."
        - "Будь добра, повтори ещё раз то, о чём говорила, Джорджия."

    - char: georgia
      side: right
      text:
        - "Без проблем."
        - "Как видите, флоты, участвующие в операции, всё ещё находятся в процессе развертывания."

    - text:
      - "Джорджия указала на тактическую карту, висящую на стене, и начала объяснение."
      - "Вот только, по сравнению с тем, что я видел до того как отвлёкся, карта, кажется, обновилась уже несколько раз..."

    - char: georgia
      side: right
      text:
        - "Здесь находится наш флагманский флот. С флангов и тыла нас прикрывают ударные группы Союза Орла, действующие совместно с нами. Далее следует резервный флот."
        - "Вместе эти силы формируют основную ударную группу Союза Орла в данной операции."
        - "Кроме того, ударная группа флота океана NA под командованием Нью-Джерси уже находится на пути к району сосредоточения."
        - "Ожидается, что первым делом мы соединимся с двумя арктическими дивизионами Северного Парламента под руководством Советской России."

    - char: commander
      side: left
      text:
        - "Северный Парламент выделил куда больше сил, чем ожидалось... У них не возникнет проблем с обороной арктических рубежей?"

    - char: georgia
      side: right
      text:
        - "По их словам, если мы закончим битву здесь быстрым и решительным ударом, то никаких проблем не возникнет."

chapter6:
  rows:

    - char: commander
      side: left
      text:
        - "Какова ситуация с Королевским Флотом?"

    - char: georgia
      side: right
      text:
        - "Согласно предварительной договоренности, основные силы Королевского Флота взяли на себя зачистку и оборону океана NA вместо флота Нью-Джерси, который прибыл к нам на подмогу."
        - "Свежих разведданных не поступало, так что можно считать, что у них всё идет по плану."
        - "Однако в этой операции нам не стоит рассчитывать на прямую поддержку со стороны Королевского Флота."

chapter7:
  rows:

    - char: commander
      side: left
      text:
        - "Что насчет флота Империи Сакуры?"

    - char: georgia
      side: right
      text:
        - "По данным разведки, экспедиционный флот Империи Сакуры всё ещё стоит в порту Дакара, признаков выдвижения нет."
        - "Но, учитывая привычную тактику Акаги, нельзя исключать вероятность того, что она приведет свой флот для участия в этой битве."

chapter8:
  rows:

    - char: commander
      side: left
      text:
        - "А как дела у Свободного Ириса?"

    - char: georgia
      side: right
      text:
        - "Согласно отчетам, основные силы Свободного Ириса продолжают выполнять задачи вблизи Африки, остальные подразделения действуют в Средиземном море совместно с Королевским Флотом."
        - "К сожалению, как и говорила Ришелье, у Свободного Ириса нет свободных резервов для участия в нашей операции."

chapter9:
  rows:

    - char: commander
      side: left
      text:
        - "Что слышно о флоте Доминиона Виши?"

    - char: georgia
      side: right
      text:
        - "Информации о флагмане Доминиона Виши, Жан Бар, всё ещё крайне мало. Нам ничего не известно ни о её состоянии, ни о местонахождении."
        - "Тем не менее, основные силы Доминиона Виши уже долгое время сосредоточены в порту Тулона и держат оборону; признаков выхода в море нет."
        - "К тому же, под совместной блокадой Свободного Ириса и средиземноморского флота Королевского Флота, нам вряд ли стоит беспокоиться о вмешательстве Доминиона Виши."

chapter10:
  rows:

    - char: commander
      side: left
      text:
        - "Что насчет флота Империи Сардинии?"

    - char: georgia
      side: right
      text:
        - "По имеющимся сведениям, корабли Империи Сардинии рассредоточены по всем крупным портам."
        - "После нападения на Рим Империя Сардиния придерживается тактики усиленной обороны."
        - "Более того, учитывая блокаду со стороны Свободного Ириса и Королевского Флота, вряд ли стоит ожидать появления сардинцев на поле боя."

chapter11:
  rows:

    - char: commander
      side: left
      text:
        - "А что насчет флота Империи Дракона?"

    - char: georgia
      side: right
      text:
        - "Хм...? Империя Дракона...?"
        - "Командир, у Империи Дракона нет развернутых флотов в акватории NA, поэтому они не примут участия в этой операции."

chapter12:
  rows:

    - char: georgia
      side: right
      text:
        - "Что касается Железной Крови, на данный момент зафиксирована активность огромного количества их кораблей."
        - "Общий масштаб их сил в несколько раз превышает всё, что нам было известно о суммарной мощи флота Железной Крови."
        - "Можно с уверенностью утверждать, что они снова задействовали ту же систему помех, которую использовали в прошлом сражении против Королевского Флота."
        - "Наши авиационные звенья уже наносят удары, чтобы отличить ложные цели от настоящих. Уверена, скоро мы получим результат."

    - char: commander
      side: left
      text:
        - "Хм. Уловки Железной Крови не могут работать вечно."

    - char: georgia
      side: right
      text:
        - "Кроме того, местонахождение флагмана Железной Крови, Фридриха дер Гроссе, всё ещё не установлено. Как только появятся новости, я немедленно вам сообщу."

    - char: commander
      side: left
      text:
        - "Хорошо. Джорджия, каковы твои ощущения от первого участия в реальном бою?"

    - char: georgia
      side: right
      text:
        - "Хм... Даже не знаю, что сказать. Я полагала, что мне поручат работу на передовой, где я буду прорываться сквозь ряды врага, а не окажусь на командном корабле в роли исполняющей обязанности секретаря."
        - "Совсем не то, что я себе представляла? Но в то же время... разница не такая уж большая. Примерно такие чувства."

    - char: commander
      side: left
      text:
        - "Что ты думаешь о нынешней ситуации?"

    - char: georgia
      side: right
      text:
        - "Если сравнивать сухие цифры и мощь на бумаге, наши шансы на победу весьма велики."
        - "Однако в этой операции задействовано множество флотов из разных фракций, поэтому координация и управление будут крайне сложными."
        - "К тому же, в развертывании сил Железной Крови есть какое-то необъяснимое чувство недосказанности... Обстановка на поле боя меняется мгновенно, и до последнего момента исход будет неясен."

    - char: commander
      side: left
      text:
        - "Верно. Недооценка противника — фатальная ошибка. Будем продвигаться строго по плану."
        - "Не волнуйся, у тебя ещё будет шанс проявить свою боевую мощь."
        - "И ещё..."

    - char: georgia
      side: right
      text:
        - "У вас есть ещё какие-то вопросы, Командир?"

    - char: commander
      side: left
      text:
        - "Почему Элдридж, которая ушла за подушками, до сих пор не вернулась?"

    - char: georgia
      side: right
      text:
        - "Ой... Что касается Элдридж, она... Элдридж..."

chapter13:
  rows:

    - text:
      - "После недолгих поисков Элдридж наконец обнаружилась неподалеку от двери каюты — она мирно спала прямо на полу."

    - char: eldridge
      side: left
      text:
        - "Zzzz..."

    - char: georgia
      side: right
      text:
        - "...Судя по всему, пока Элдридж несла подушки, они показались ей настолько уютными, что она обняла их и заснула прямо на ходу."
        - "Хм... Командир, вы всё ещё выглядите изнурённым."
        - "Впереди нас ждёт долгий период, требующий предельной концентрации. Почему бы и вам не вздремнуть немного, пока битва не началась?"

    - text:
      - "Глядя на безмятежно спящую Элдридж, я и сам почувствовал, как нахлынула неодолимая сонливость."
      - "Что ж, не стану отказываться от столь любезного предложения и прилягу на пару минут..."
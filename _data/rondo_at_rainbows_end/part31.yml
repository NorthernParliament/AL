chapter1:
  rows:

    - char: scharnhorst_meta
      side: left
      status: is-meta
      text:
        - "Хм... С помощью этого оборудования мы и правда сможем добраться до одного из опорных пунктов снабжения."
        - "Но вы уверены, что хотите этого?"
        - "Нет никаких гарантий, что вы сможете вернуться, как нет и гарантий того, как долго вы продержитесь в тех жестоких сражениях."

    - char: friedrich_der_grosse
      side: right
      status: is-yellow
      text:
        - "Не стоит беспокоиться. Железная Кровь вновь обрела своего лидера. Её мудрость непременно приведет и фракцию, и весь этот мир к светлому будущему."
        - "Здесь мне больше нечего делать. Дела, которые действительно требуют моего присутствия, находятся в другом месте."

    - char: scharnhorst_meta
      side: left
      status: is-meta
      text:
        - "А вы что скажете, дамы из Флота Открытого моря? Пути назад уже не будет."

    - char: lutzow
      side: right
      status: is-yellow
      text:
        - "Флот Открытого моря последует за Фридрих дер Гроссе."
        - "Так было в прошлом, так есть сейчас и так будет в будущем, даже если наш путь лежит к самому краю вселенной..."
        - "Но... у вас там хотя бы есть место, где можно поспать?"

    - char: scharnhorst_meta
      side: left
      status: is-meta
      text:
        - "Найдется, но за качество поручиться не могу."

    - char: lutzow
      side: right
      status: is-yellow
      text:
        - "Хе-хе, если чего-то будет не хватать, Зайдлиц что-нибудь придумает~"

    - char: seydlitz
      side: left
      status: is-yellow
      text:
        - "Разумеется, фройляйн Лютцов. Куда бы ни вела дорога впереди, я буду острым клинком Флота Открытого моря и продолжу идти вместе со всеми вами."

    - char: elbing
      side: right
      status: is-yellow
      text:
        - "Дом там, где твои товарищи... Я не знаю, чем смогу быть полезна, но я буду очень стараться!"

    - char: yorck
      side: left
      status: is-yellow
      text:
        - "Хе-хе-хе... Злодеи должны вести себя подобающе, нам пора покинуть сцену~"

    - char: thuringen
      side: right
      status: is-yellow
      text:
        - "Не неси всякую пафосную чепуху и не записывай нас в злодеи без спроса..."

    - char: yorck
      side: left
      status: is-yellow
      text:
        - "А я и не против стать офицером легиона зла!"
        - "Давайте же вместе покорять новые миры и прокладывать путь в новое будущее!"

    - char: thuringen
      side: right
      status: is-yellow
      text:
        - "...Она уже полностью вошла в роль."

    - char: scharnhorst_meta
      side: left
      status: is-meta
      text:
        - "Что ж, координаты установлены, энергия накоплена. Можем отправляться в любой момент."

    - char: friedrich_der_grosse
      side: right
      status: is-yellow
      text:
        - "Тогда выcтупаем!"
        - "Вперед, к аванпосту «Пепла», чтобы узреть их истинный путь!"
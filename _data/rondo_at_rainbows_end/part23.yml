chapter1:
  rows:

    - char: eldridge
      side: left
      text:
        - "Командир, на подходах к Скапа-Флоу обнаружена Фридрих дер Гроссе, верховный флагман Железной Крови."
        - "Она медленно продвигается в вашем направлении вместе с флотом Империи Сакуры и еще одной неизвестной флотилией Железной Крови."

    - char: commander
      side: right
      text:
        - "(Значит, флот Империи Сакуры из порта Дакара всё-таки вступил в бой...)"
        - "(Но эта внезапно появившаяся неизвестная эскадра...? Не ради ли них Фридрих дер Гроссе так отчаянно тянула время?)"

    - char: sovetskaya_rossiya_rad
      side: left
      text:
        - "Товарищ Командир... скоро... прибудем..пшшш"

    - char: commander
      side: right
      text:
        - "М-м...? Проблемы со связью?"
        - "Элдридж, видишь какие-нибудь аномалии?"

    - char: eldridge
      side: left
      text:
        - "...Системы связи... в норме. Командир, нас не глушат."

    - char: commander
      side: right
      text:
        - "(Значит, что-то случилось именно у Северного Парламента...)"

    - char: memphis_rad
      side: left
      text:
        - "Командир, плохие новости! В окрестных водах внезапно и без всякого предупреждения зафиксирована массовая активность Сирен!"

    - char: commander
      side: right
      text:
        - "Сирены...? Разве они не были практически полностью зачищены в секторе NA после падения центрального узла?"

    - char: memphis_rad
      side: left
      text:
        - "Я не знаю, откуда они взялись..."
        - "Но помимо их флотов, в акватории одновременно возникло сразу несколько Зеркальных морей!"
        - "Флот Северного Парламента попал под удар первым, мы всё еще оцениваем масштаб ситуации!"

    - char: enterprise_rad
      side: right
      text:
        - "Командир, вокруг авианосной группы начал образовываться морской туман. Он быстро распространяется. По моим прогнозам, вскоре мы окажемся отрезаны от внешнего мира."
        - "Мы сделаем всё возможное, чтобы прорваться сквозь заслон Сирен и воссоединиться с вами. До тех пор — действуйте крайне осторожно."

    - char: saratoga_rad
      side: left
      text:
        - "Говорит Саратога, у меня здесь тоже всё скверно! Один из резервных флотов уже пропал со радаров в Зеркальном море!"
        - "Я пытаюсь пробиться к вашим координатам, но это невероятно сложно!"

    - char: commander
      side: right
      text:
        - "Без паники. В первую очередь обеспечьте собственную безопасность. Эскортным силам — приоритет на защиту авианосных соединений!"

    - char: washington_rad
      side: left
      text:
        - "Приказ принят, начинаю смену курса."

    - char: baltimore_rad
      side: right
      text:
        - "Проклятье... Командир, мы не успеваем пробиться к авианосной группе. Наш курс перекрыт внезапно появившимися элитными гуманоидами Сирен!"

    - char: commander
      side: left
      text:
        - "Всем флотам — замедлить продвижение. Приоритет на захват Скапа-Флоу временно снимается."
        - "Кораблям, чей курс заблокирован, немедленно объединиться с ближайшими союзными группами. Ваша первоочередная задача — зачистка акватории от врага и нейтрализация Зеркальных морей. Действуйте по обстановке."

    - char: memphis_rad
      side: right
      text:
        - "Как такое возможно... Такое количество Зеркальных морей явно было подготовлено заранее..."
        - "Но мы действительно... вообще не фиксировали никакой активности Сирен! Ни единого сигнала, ни малейшего всплеска энергии!"

    - char: commander
      side: left
      text:
        - "Мемфис, без паники. Немедленно свяжись с ближайшей авиабазой Королевского Флота. Нам нужна поддержка с воздуха, и как можно больше."
        - "Если у них остались боеспособные корабли в этом секторе — пусть немедленно выходят в море."
        - "Я уверен, что для защиты метрополии Королевский Флот обязан был оставить здесь хоть какие-то резервы."

    - char: memphis_rad
      side: right
      text:
        - "Есть... Слушаюсь!"

    - char: commander
      side: left
      text:
        - "Джорджия, что у тебя?"

    - char: georgia_rad
      side: right
      text:
        - "Командир, я анализирую поле боя."
        - "Появление морского тумана может указывать на то, что за этой атакой стоит Компилятор."
        - "Если мы сможем вычислить её местоположение и устранить, вся эта масштабная засада Сирен рассыплется."

    - char: commander
      side: left
      text:
        - "Понял. Я прикажу авиации сосредоточиться на поиске цели."
        - "Энтерпрайз, Саратога, как слышно?"

    - char: communicator
      side: right
      text:
        - "......"

    - char: commander
      side: left
      text:
        - "(Проклятье, связь уже оборвалась из-за тумана...)"

    - char: new_jersey_rad
      side: right
      text:
        - "Самый большой и могучий «Чёрный Дракон» флота Союза Орла — Нью-Джерси прибыла!"
        - "Привет, Командир~ Соскучился по мне?"

    - char: commander
      side: left
      text:
        - "Нью-Джерси, как раз вовремя! Какая у тебя обстановка?"

    - char: new_jersey_rad
      side: right
      text:
        - "Половина моего флота временно пропала со связи в Зеркальных морях, зато со второй половиной я прорвалась прямо к тебе!"

    - char: essex_rad
      side: left
      text:
        - "Командир, оставьте поиск Компилятора нам. Мы обнаружим её в кратчайшие сроки!"

    - char: commander
      side: right
      text:
        - "Это очень поможет."

    - char: new_jersey_rad
      side: left
      text:
        - "Эх, ну и кавардак же тут начался из-за этой внезапной атаки."
        - "Я заметила одну деталь: Сирены атакуют только нас. Отступающие силы Железной Крови они попросту игнорируют, пропуская их мимо."

chapter2:
  rows:

    - char: commander
      side: right
      text:
        - "Это ловушка, подстроенная Сиренами и Железной Кровью вместе!"

chapter3:
  rows:

    - char: commander
      side: right
      text:
        - "Это скоординированная операция Железной Крови и Сирен..."

chapter4:
  rows:

    - char: new_jersey_rad
      side: left
      text:
        - "В этом нет никаких сомнений. Раньше у нас было много косвенных улик, но чтобы они настолько в открытую вели совместные боевые действия — такое на моей памяти впервые."
        - "Видимо, когда прижало, Железная Кровь решила окончательно сбросить маски."

    - char: intrepid_rad
      side: right
      text:
        - "Командир, мы засекли местоположение Компилятора!"
        - "Она во главе огромного флота приближается к вам с юго-востока. Похоже, они планируют зажать вас в клещи вместе с идущей с фронта Фридрих дер Гроссе!"

    - char: new_jersey_rad
      side: left
      text:
        - "Обстановка ясна~ Не волнуйся, Командир! Сосредоточься на верховном флагмане Железной Крови, а врагов у нас в тылу я беру на себя!"
        - "Флот Нью-Джерси, на полной скорости — в атаку!"

    - char: commander
      side: right
      text:
        - "......"
        - "(Мы предполагали, что Сирены могут вмешаться в эту операцию, и заранее готовились к подобному исходу.)"
        - "(Именно поэтому из метрополии были вызваны крупные силы, а из «Моря Звёзд» прибыли Джорджия и Элдридж...)"
        - "(Но, судя по всему, даже этого сейчас может оказаться недостаточно...)"
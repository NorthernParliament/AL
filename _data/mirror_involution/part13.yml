chapter1:
  rows:

    - char: ticonderoga
      side: left
      text:
        - "Хе-хе, раз уж мы поняли принцип, то не нужно тратить время на разведку — можно просто лететь прямо к старым координатам~"
        - "О? Из-за того, что мы летим слишком быстро, мы наткнулись на группу самолётов Империи Сакуры, несущих дежурство?"

    - char: new_jersey
      side: right
      text:
        - "Не обращай внимания, прорываемся в лоб на полном ходу~!"

    - char: ticonderoga
      side: left
      text:
        - "Без проблем — эй?!"
        - "Группа истребителей Сакуры атакована с другого направления?! Атакуют… наши палубные самолёты?"

    - char: new_jersey
      side: right
      text:
        - "Ха-а?! Как такое возможно? В нашем флоте ты — единственный авианосец."

    - char: boise
      side: left
      text:
        - "Может, это подкрепление с AF…? Я… сейчас проверю!"

    - char: allen_m_sumner_rad
      side: right
      text:
        - "Э-э, авиаподдержка…? Я ничего не делала."
        - "Аэродром на острове сильно повреждён, остатки авиации сосредоточены на обороне базы, я не отправляла никаких ударных групп."

    - char: new_jersey
      side: left
      text:
        - "Тогда это странно… откуда взялись эти самолёты?"

    - char: ticonderoga
      side: right
      text:
        - "Подтверждаю, модели этих самолётов идентичны нашим палубным машинам."
        - "Разгромив перехватчики Сакуры, они продолжают полёт вместе со мной в сторону флота Сакуры!"

    - char: new_jersey
      side: left
      text:
        - "Погоди-погоди-погоди, всё это чертовски странно! У нас просто не может быть подкрепления в виде союзной палубной авиации?!"

    - char: ticonderoga
      side: right
      text:
        - "Ну, это ты у меня спрашиваешь… но факт остаётся фактом: они только что уничтожили самолёты «Пешек» Сакуры."

    - char: new_jersey
      side: left
      text:
        - "Неужели действительно были какие-то перемещения сил, о которых я не знала?… Тик, в общем, отведи свои самолёты в тыл, пусть эта группа идёт впереди и прокладывает путь."
        - "Бойсе и Моррисон, возьмите часть флота и проведите поиск, проверьте, не скрывается ли в этом тумане союзный флот, о котором мы до сих пор не знали!"
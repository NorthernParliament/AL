chapter1:
  rows:

    - text:
      - "Прошло немало времени, но мы так и не нашли способа выбраться."

    - char: helena
      side: left
      text:
        - "Командир… коммуникатор на консоли не может передать сигнал, нам остаётся только ждать следующего входящего сообщения извне…"

    - char: san_francisco
      side: right
      text:
        - "Ха-а-а, так скучно — даже не знаю, что там сейчас происходит снаружи."
        - "Эй, Арчерфиш, ты чего там шепчешь сама с собой?"

    - char: archerfish
      side: left
      text:
        - "Тс-с-с—! Я пытаюсь расслышать, что происходит снаружи."

    - char: san_francisco
      side: right
      text:
        - "Ой-ой?! Услышала что-нибудь?"

    - char: archerfish
      side: left
      text:
        - "Ничего особенного… даже звука шагов нет."

    - char: san_francisco
      side: right
      text:
        - "Неужели на этом корабле действительно никого, кроме нас? Судя по обстановке, это похоже на серийный образец… типа автопилота, что ли…"
        - "М-м… так скучно, так скучно, так скучно…"

    - char: helena
      side: left
      text:
        - "…Всем внимание, коммуникатор снова подаёт признаки жизни."

    - char: san_francisco
      side: right
      text:
        - "Оп-па, тыкаю сюда!"

    - char: hiryuu_rad
      side: left
      status: is-yellow
      text:
        - "Это Хирю. Первый этап бомбардировки AF завершён, результаты отличные."
        - "Однако некоторые важные цели всё ещё не уничтожены, требуется вторая волна бомбардировки, запрашиваю разрешение."

    - char: helena
      side: right
      text:
        - "Связь автоматически прервалась… Похоже, это был просто доклад."

    - char: archerfish
      side: left
      text:
        - "В только что прослушанном сообщении говорилось о бомбардировке AF, верно?! Чёрт, неужели та атака действительно была совершена флотом Империи Сакуры!"

    - char: commander
      side: right
      text:
        - "Нет. Мы оказались заперты из-за уловки Сирен, велика вероятность, что это особое пространство также создано ими."
        - "Командный мостик, переговоры Империи Сакуры из коммуникатора — всё это наверняка записи прошлого, намеренно воссозданные Сиренами."

    - char: archerfish
      side: left
      text:
        - "Значит… только что мы слышали запись переговоров времён битвы при AF?"

    - char: san_francisco
      side: right
      text:
        - "Весьма вероятно! И мы находимся на командном корабле флота Сакуры прямиком внутри этой симуляции Сирен?"
        - "Это буквально как документальный фильм об AF с точки зрения Империи Сакуры, в который можно погрузиться и даже взаимодействовать с ним…"
        - "Удивительный опыт! Командир, что думаете?"

    - char: commander
      side: left
      text:
        - "Такой опыт наверняка очень поможет в изучении командной системы Империи Сакуры…"

    - char: archerfish
      side: right
      text:
        - "У меня вопрос! Откуда Сирены знают детали командования Империи Сакуры того времени, чтобы создать такую полную запись?!"

chapter2:
  rows:

    - char: commander
      side: left
      text:
        - "У Империи Сакуры и Сирен особые отношения…"
        - "Между Империей Сакуры и Сиренами всегда существовало некое необъяснимое взаимопонимание. На поздних этапах битвы при AF потрёпанный флот Империи Сакуры смог успешно отступить именно благодаря странной атаке Сирен."
        - "Если Сирены владеют настолько детальными записями командной системы Империи Сакуры того времени, это может означать лишь одно: Сирены вмешались в эту войну гораздо раньше и гораздо глубже, чем мы могли себе представить…"

chapter3:
  rows:

    - char: commander
      side: left
      text:
        - "У Сирен превосходно налажена разведка…"
        - "Сирены в конце концов сами участвовали в той битве, они даже посылали гуманоидных «Координаторов» лично возглавлять атаку флота."
        - "Их электронное оборудование крайне продвинуто, и им не составляет труда перехватывать переговоры на поле боя. Вероятно, эта симуляция построена именно на тех разведданных…"

chapter4:
  rows:

    - char: san_francisco
      side: right
      text:
        - "Вот оно как… И теперь Сирены решили «слить» нам эту информацию."
        - "Они же прекрасно осознают, какие отношения у нас сейчас с Империей Сакуры, верно?"
        - "Ума не приложу, союзники они или враги…"

    - char: commander
      side: left
      text:
        - "Если это действительно запись битвы при AF… Понятно, тогда из-за поломки разведчика они не обнаружили засаду флота Йорктаун, Союзу Орла тогда повезло…"

    - char: san_francisco
      side: right
      text:
        - "Эй… Командир…? Ты с кем сейчас разговариваешь?"

    - char: commander
      side: left
      text:
        - "(…Первая волна бомбардировки AF завершена, контратака Йорктаун уже на подходе. У флота Империи Сакуры сейчас проблемы с разведкой, продолжать вторую волну бомбардировки — не самое мудрое решение…)"
        - "(…Нельзя позволить авианосному соединению без прикрытия так рисковать. Сейчас нужно не бомбить остров, а сначала определить местоположение противника, только обеспечив безопасность...)"

    - char: san_francisco
      side: right
      text:
        - "Трям-трям-трям! Ко—ман—дир————!"
        - "Ну вот, стоит на секунду отвернуться, как ты уже полностью вжился в роль…"
        - "Мы ведь сейчас на командном корабле Империи Сакуры, к чему такая серьёзность в такой ситуации!"

    - char: helena
      side: left
      text:
        - "Командир, пришло новое сообщение с докладом, они по-прежнему запрашивают разрешение на бомбардировку…"

    - char: san_francisco
      side: right
      text:
        - "Хи-хи-хи~ Раз уж выдался такой редкий шанс, давай пожертвуем твоим «мудрым решением» ради эксперимента~"
        - "Хелена, ответь им: разрешаю проведение второй волны бомбардировки, немедленно к исполнению~!"
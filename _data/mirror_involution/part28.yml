chapter1:
  rows:

    - char: new_jersey
      side: left
      text:
        - "Всем приготовиться! На нас летит лавина палубной авиации! Масштаб и мощь атаки — это уже не шутки!"
        - "Откуда они вообще вылезли?.. Я начинаю поиск целей!"

    - char: helena_meta???
      side: right
      status: is-yellow
      text:
        - "Не нужно, у меня есть метод попроще."
        - "Взлом запущен. Настройка параметров модуля… ————————— Завершено."
        - "Ну как, теперь видишь?"

    - char: new_jersey
      side: left
      text:
        - "О-о, вижу! На экране появился суперчёткий сигнал мощного врага! Ты снова проапгрейдила наш радар?!"

    - char: helena_meta???
      side: right
      status: is-yellow
      text:
        - "Лишь временно."

    - char: commander
      side: left
      text:
        - "В этой атаке промелькнуло что-то знакомое… Палубная авиация типа Империи Сакуры, чрезмерные масштабы налёта, неуловимые следы…"
        - "…Неужели за кулисами действительно действует Хирю из «Пепла»? Но почему…"

    - char: helena_meta???
      side: right
      status: is-yellow
      text:
        - "META."
        - "Это не «Пепел» и, тем более, не Хирю. Атаку ведёт просто «META»."

    - char: commander
      side: left
      text:
        - "«Пепел» и META… это не одно и то же?"

    - char: helena_meta???
      side: right
      status: is-yellow
      text:
        - "«Пепел» (Ashes) — это организация. META — это суть."

    - char: new_jersey
      side: left
      text:
        - "…В таком случае, тебя тоже можно классифицировать как META?"

    - char: helena_meta???
      side: right
      status: is-yellow
      text:
        - "Да."

    - char: new_jersey
      side: left
      text:
        - "А это уже становится интересно."
        - "META могут легко уклоняться от нашего слежения, но легко обнаруживаются твоим радаром."
        - "Более того, ты каким-то образом позволила и нам, находящимся в твоём отряде, временно получить возможность отслеживать META."
        - "Ты ведёшь себя как настоящий эксперт по борьбе с META~ И это при том, что ты сама — META?"

    - char: helena_meta???
      side: right
      status: is-yellow
      text:
        - "......"
        - "Разве этот вопрос сейчас так важен?"

    - char: new_jersey
      side: left
      text:
        - "Это зависит от того, как ты определяешь «важность»..."
        - "Но, по крайней мере, META — это не монолитная структура, и ты на нашей стороне. Я могу так это понимать?"

    - char: helena_meta???
      side: right
      status: is-yellow
      text:
        - "META — это суть, а не организация. Я — союзник Командира… это я могу вам гарантировать."

    - char: new_jersey
      side: left
      text:
        - "Тогда переходим к последнему вопросу — почему на нашем радаре, который теперь может отслеживать META, тебя всё ещё не видно?!"

    - char: helena_meta???
      side: right
      status: is-yellow
      text:
        - "Не задавай глупых вопросов."

    - char: new_jersey
      side: left
      text:
        - "Хе-хе-хе, я поняла, ты хочешь сохранить ореол таинственности!"
        - "Сильный враг стремительно приближается. Раз уж ты на нашей стороне, ты ведь вступишь в бой вместе с нами?"

    - char: helena_meta???
      side: right
      status: is-yellow
      text:
        - "Разумеется. Именно в этом цель моего прибытия."

    - char: new_jersey
      side: left
      text:
        - "Я давно наслышана о вашей силе… Для меня честь сражаться с тобой плечом к плечу!"

    - char: helena_meta???
      side: right
      status: is-yellow
      text:
        - "Нет… Для меня честь снова сражаться с тобой плечом к плечу, Нью-Джерси."

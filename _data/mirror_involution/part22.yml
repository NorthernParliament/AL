chapter1:
  rows:

    - char: new_jersey
      side: left
      text:
        - "Хе-хе-хе~ Ну как вам мой план?! Сработано чисто, красиво и быстро, правда?"

    - char: morrison
      side: right
      text:
        - "Это было… безусловно… впечатляюще. Только… я немного выдохлась… *обессиленно сползает вниз*"

    - char: boise
      side: left
      text:
        - "Я тоже… Пожалуйста, дайте мне передохнуть хоть немного… *обессиленно сползает вниз*"

    - char: ticonderoga
      side: right
      text:
        - "А я-то на секунду поверила, что ты придумала какой-то хитроумный план… Оказалось, ты просто пошла напролом, следуя принципу «кратчайшее расстояние между двумя точками — прямая»!"

    - char: new_jersey
      side: left
      text:
        - "А разве нужно было иначе~? Раз мы точно знаем координаты цели и расположение всех вражеских сил в акватории, нет никакого смысла тратить время на лишнюю осторожность и разведку."
        - "Как-никак, я — самый большой и мощный «Чёрный Дракон» Союза Орла. Робость перед противниками такого уровня была бы просто позором~"

    - char: ticonderoga
      side: right
      text:
        - "Ну, тут не поспоришь… В конечном итоге, и флот «Пешек», и настоящие силы Сирен были сметены без особого труда."

    - char: new_jersey
      side: left
      text:
        - "Если результат отличный, значит, и всё остальное было сделано правильно~"
        - "А теперь впереди нас ждёт полномасштабная атака основных сил Сирен. Всем сохранять бдительность, расслабляться ещё рано!"
chapter1:
  rows:

    - char: ticonderoga
      side: left
      text:
        - "Нью-Джерси, угадай, что я обнаружила?"

    - char: new_jersey
      side: right
      text:
        - "Врага...?"

    - char: ticonderoga
      side: left
      text:
        - "А если поконкретнее?"

    - char: new_jersey
      side: right
      text:
        - "Врага, которого можно уничтожить...!"

    - char: ticonderoga
      side: left
      text:
        - "Всё ещё не то~ Давай ещё конкретнее?"
        - "Подсказка: я обнаружила один из ключевых факторов, который поможет нам выйти на след вражеского флота."

    - char: new_jersey
      side: right
      text:
        - "А-а, вот оно что... Я поняла! Ты обнаружила... врага, который является одним из ключевых факторов, помогающих нам выйти на след вражеского флота!"

    - char: ticonderoga
      side: left
      text:
        - "............Ха-а..."

    - char: new_jersey
      side: right
      text:
        - "Э-э~~ ну не томи, ты же знаешь, что я не сильна в этих дедуктивных штучках!"

    - char: ticonderoga
      side: left
      text:
        - "Это Араси. Среди бескрайнего моря тумана вдруг появилось место, свободное от пелены."
        - "Я отправила туда палубную авиацию и без труда обнаружила эсминец Империи Сакуры, который в одиночестве шёл по курсу — Араси."

    - char: new_jersey
      side: right
      text:
        - "Как думаешь, настоящий?"

    - char: ticonderoga
      side: left
      text:
        - "Раз авианосная группа оказалась фальшивой, то одинокий эсминец тем более не может быть настоящим~ Я уверена, что это очередная «Пешка»."
        - "Вопрос лишь в том, почему этой одинокой «Пешкой» оказался именно Араси?"

    - char: new_jersey
      side: right
      text:
        - "Вот оно что...! Неудивительно, что Саратога так загадочно слиняла сразу после разговора об AF!"
        - "Если раньше у меня были лишь смутные подозрения, то теперь, видя этот «сценарий», я окончательно убедилась."
        - "Реконструкция битвы при AF. Похоже, план Сирен таков, да?"
        - "Сначала они атакуют AF «Пешками» Сакуры, а затем вынуждают нас уничтожить этот флот."
        - "Если они собираются воссоздать всё до мельчайших деталей, то следом должна подойти основная масса флота Сирен, чтобы ввязаться в бой..."

    - char: ticonderoga
      side: left
      text:
        - "Ты уже полностью раскусила их «сценарий», да?~"

    - char: new_jersey
      side: right
      text:
        - "Ещё бы, я ведь тогда всё время следила за ходом операции из штаба... Но какова их цель?"
        - "К тому же, они убрали с доски самую важную фигуру — Командира... А ведь чтобы по-настоящему воссоздать ту битву, Командир просто необходим, верно?"

    - char: ticonderoga
      side: left
      text:
        - "Это, пожалуй, известно только самим Сиренам~ Нам остаётся лишь гадать."

    - char: new_jersey
      side: right
      text:
        - "Как же Командира сейчас не хватает... В анализе такого рода я ни капли не сильна."
        - "Но, конечно, я более чем уверена, что смогу прорвать вражескую ловушку и спасти его!"
        - "В той исторической битве при AF флот Союза Орла смог отбить атаку Сирен, даже будучи на пределе своих сил."
        - "У нас сейчас более совершенное оснащение и куда более мощная огневая мощь — нет никаких причин, по которым мы не справимся!"
        - "Сирены хотят воссоздать битву при AF? Да как они вообще посмели надеяться на это? Я, Нью-Джерси, не позволю стать пешкой в их игре!"

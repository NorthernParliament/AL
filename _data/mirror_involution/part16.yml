chapter1:
  rows:

    - text:
      - "Судя по беседе с Синано, можно сделать вывод, что она, как и мы, оказалась втянута в этот эксперимент Сирен, совершенно не осознавая, как это произошло."
      - "Хотя она упорно называет это «сном» и придерживается своей собственной логики…"
      - "Всё же, появление Синано в районе AF кажется невозможным. Неужели слухи о её невероятной силе — это правда?…"

    - char: san_francisco
      side: left
      text:
        - "Ой?! В Империи Сакуры тоже так популярен бейсбол?"

    - char: shinano_rad
      side: right
      status: is-yellow
      text:
        - "Насколько мне известно, его популярность необычайна, да и состязаний проводится великое множество."

    - char: san_francisco
      side: left
      text:
        - "Как круто… Если представится шанс, было бы неплохо слетать в Империю Сакуры и сыграть пару матчей~!"

    - char: archerfish
      side: right
      text:
        - "А ты сама, Синано, играешь в бейсбол?"

    - char: shinano_rad
      side: left
      status: is-yellow
      text:
        - "Что до меня… то из-за моего положения я ещё не пробовала."

    - char: archerfish
      side: right
      text:
        - "Положение… вечно вы в Империи Сакуры зацикливаетесь на странных вещах… А ведь спорт способен преодолевать любые границы и условности!"

    - char: shinano_rad
      side: left
      status: is-yellow
      text:
        - "Хе-хе… Пожалуй, ты права. Если выпадет шанс, пожалуй, стоит попробовать."
        - "Кстати, если я не ошибаюсь, ты ведь… Арчерфиш?"

    - char: archerfish
      side: right
      text:
        - "Верно~ Ой? Мы где-то встречались?"

    - char: shinano_rad
      side: left
      status: is-yellow
      text:
        - "Секрет."        

    - char: archerfish
      side: right
      text:
        - "Вот с самого начала разговора с тобой такое чувство, будто это пытка……"

    - char: shinano_rad
      side: left
      status: is-yellow
      text:
        - "Фу-фу~ «Путь, который можно выразить словами, не есть истинный путь»." 
        - "Сейчас, в этот самый момент, так — значит так."

    - char: archerfish
      side: right
      text:
        - "………Стало только хуже!?!"

    - text:
      - "Эта картина дружеского общения… словно возвращает в те времена, когда все фракции сражались плечом к плечу под знаменем «Лазурного пути»."

chapter2:
  rows:

    - char: hiryuu_rad
      side: left
      status: is-yellow
      text:
        - "…Прошу прощения за запоздалый отчёт."
        - "Перезарядка не была завершена вовремя………… Во время замены боекомплекта авианосное соединение подверглось пикирующей бомбардировке флота Союза Орла."
        - "Госпожа Акаги, госпожа Кага и Сорю получили повреждения, но я всё ещё могу сражаться в полную силу!"
        - "Запрашиваю приказ на дальнейшую атаку, «Хирю» в одиночку нанесёт контрудар по авианосной группе Союза Орла!"

    - char: helena
      side: right
      text:
        - "Плохо… Если всё пойдёт так и дальше, Йорктаун…!"

    - char: san_francisco
      side: left
      text:
        - "Не начинать контратаку, немедленно отступить!"

    - char: hiryuu_rad
      side: right
      status: is-yellow
      text:
        - "Почему?! Я не понимаю, прошу объяснить рациональность этого приказа."

    - char: san_francisco
      side: left
      text:
        - "П-потому что… э-э………… Только отступив сейчас, мы смо… смо…"
        - "(Командир, спаси меня >_<!)"

    - char: commander
      side: right
      text:
        - "Хирю, успокойся и осмотрись. Достаточно просто отвести флот с поля боя, пока повреждения не стали критическими, и всё ещё можно исправить."
        - "Немедленно поднять все истребители в воздух, прикрыть отход авианосного соединения."

    - char: hiryuu_rad
      side: left
      status: is-yellow
      text:
        - "……Это значит, что мы должны признать поражение и бежать?!"
        - "Палубная авиация Союза Орла тоже несёт тяжёлые потери в этой свалке! Если ударить сейчас, мы гарантированно добьёмся успеха!"

    - char: commander
      side: right
      text:
        - "А какой ценой? Всё авианосное соединение упустит лучший момент для отхода и окажется в безвыходном положении."

    - char: hiryuu_rad
      side: left
      status: is-yellow
      text:
        - "Если отступить в таком состоянии — вот это и будет по-настоящему безвыходное положение!"
        - "Если мы вернёмся так… флот Империи Сакуры станет посмешищем для всего мира!"

    - char: shinano_rad
      side: right
      status: is-yellow
      text:
        - "…Оставь это. Ваши усилия тщетны."

    - char: san_francisco
      side: left
      text:
        - "Почему?! Разве решительное отступление для сохранения сил в такой ситуации — не лучший выбор? Ты разве этого не видишь?!"

    - char: shinano_rad
      side: right
      status: is-yellow
      text:
        - "Моё мнение здесь значения не имеет."
        - "Безусловно, если отступить сейчас, Первая дивизия авианосцев не окажется втянута в дела «Святилища», отношения с Пятой дивизией могли бы стать намного мягче, и многое могло бы измениться."
        - "Но у каждой причины есть своё следствие. Свершившаяся причина влечёт свершившееся следствие. Несвершившаяся — несвершившееся. Кто может судить, что лучше, а что хуже?"
        - "Более того… всё это лишь цветы в зеркале и луна в воде. Для нас, странников, всё уже предопределено."
        - "Если бы это было не сновидение, а реальность, неужели вы действительно думали, что сможете смешаться с командной системой Империи Сакуры, играя столь неумело, и не быть разоблачёнными?"

    - char: commander
      side: left
      text:
        - "Ты хочешь сказать, что это просто «шахматная доска» с заранее заданным сценарием… и какие бы приказы мы ни отдавали, они не изменят уже предрешённый исход?"

    - char: shinano_rad
      side: right
      status: is-yellow
      text:
        - "Всё пройдёт в точности так, как вы видели в те времена."


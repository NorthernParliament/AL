chapter4:
  rows:

    - char: souryuu_meta_d
      side: right
      status: is-red
      text:
        - ".......!!!"

    - char: helena_meta???
      side: left
      status: is-yellow
      text:
        - "Плохо дело… сейчас не время для пустой болтовни."

    - char: archerfish
      side: right
      text:
        - "У-уа! И-и-испугалась… Что с этим человеком происходит?!"
        - "Эй! Если что-то нужно, говори нормально, чего так орать-то?!"

    - char: helena_meta???
      side: left
      status: is-yellow
      text:
        - "Оставь... С монстром договориться невозможно."

    - char: archerfish
      side: right
      text:
        - "О-она, она, правда, сразу пошла в атаку—?!"

    - char: helena_meta???
      side: left
      status: is-yellow
      text:
        - "Нью-Джерси."

    - char: new_jersey
      side: right
      text:
        - "Прямо как дикий зверь, да~? Но ей придётся столкнуться с кое-кем поопаснее любого зверя — с Чёрным Драконом Союза Орла!"
        - "Система управления огнем, взять цель на прицел! Пусть этот монстр, посмевший напасть на Командира, узнает мощь самого большого и самого сильного линкора Союза Орла!"
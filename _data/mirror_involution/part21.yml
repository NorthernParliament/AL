chapter5:
  rows:

    - char: helena_meta_rad???
      side: left
      status: is-yellow
      text:
        - "Тс-с… прошу, пускай это пока останется нашим секретом. Мы раскроем карты, когда наступит подходящий момент."
        - "Сейчас не время для праздных вопросов, ты ведь не хочешь, чтобы ситуация стала ещё сложнее, верно?"

    - char: commander
      side: right
      text:
        - "В этом есть смысл…"

    - char: san_francisco
      side: left
      text:
        - "Пф… вечно вы напускаете тумана. Раз Командир тебе доверяет, мне остаётся только подчиниться, но у меня есть последний вопрос!"
        - "Ты нам союзник или враг?"

    - char: helena_meta_rad???
      side: right
      status: is-yellow
      text:
        - "Я — союзник Командира."

    - char: san_francisco
      side: left
      text:
        - "Ну, тогда ладно~ Раз мы на одной стороне, давай посмотрим, на что ты способна в деле!"

    - char: helena_meta_rad???
      side: right
      status: is-yellow
      text:
        - "Хелена, ты ведь тоже не против?"

    - char: helena
      side: left
      text:
        - "А… я…? Нет, я… я не против…"

    - char: archerfish
      side: right
      text:
        - "О-о… число людей, от разговора с которыми можно окончательно вымотаться, снова растёт…"

    - char: san_francisco
      side: left
      text:
        - "Не будем терять времени. Как именно ты собираешься нам помочь?"

    - char: helena_meta_rad???
      side: right
      status: is-yellow
      text:
        - "Взлом запущен. Снятие пространственной блокировки.........Завершено."
        - "Готово. Теперь вы можете выйти и посмотреть, что происходит снаружи."
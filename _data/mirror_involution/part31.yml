chapter1:
  rows:

    - text:
      - "Несмотря на то, что Сорю META атаковала безрассудно, словно обезумевший зверь, не страшась повреждений…"
      - "Она всё же не была столь непобедима, как Такао из «Пепла», с которой они сталкивались ранее."
      - "Благодаря помощи таинственного союзника флот полностью подавил её действия. Её движения стали заметно замедленными, а атаки — слабеть с каждым мгновением."

    - char: new_jersey
      side: left
      text:
        - "А теперь — финальный удар!"
        - "Принимай —————— Black Dragon Buster!"

chapter2:
  rows:

    - char: new_jersey
      side: left
      text:
        - "У-уа! Поразительная мощь, неужели это действительно атака из моих орудий главного калибра?!"
        - "Что ты, чёрт возьми, сделала?!"

    - char: helena_meta???
      side: right
      status: is-yellow
      text:
        - "Этого вы достигли благодаря собственной силе, я лишь оказала незначительную помощь."
        - "Ваша истинная сила определённо выходит далеко за эти рамки…"

    - char: san_francisco
      side: left
      text:
        - "Погодите… Нью-Джерси! Там, где попал снаряд, нет никаких обломков. Враг просто исчез после попадания?!"

    - char: new_jersey
      side: right
      text:
        - "Как это возможно? Я точно попала в цель! Я своими глазами видела, как она получила повреждения!"

    - char: ticonderoga
      side: left
      text:
        - "То есть… это значит, что в тот самый миг между попаданием и рассеиванием дыма от взрыва что-то произошло…?"

    - char: new_jersey
      side: right
      text:
        - "Как это возможно? Я точно попала в цель! Я своими глазами видела, как она получила повреждения!"

    - char: helena
      side: left
      text:
        - "Неужели… здесь всё ещё скрыта ловушка Сирен?!"

chapter3:
  rows:

    - char: ticonderoga
      side: right
      text:
        - "Всем осторожно, появилась еще одна группа палубной авиации?! Она воспользовалась моментом, чтобы разорвать дистанцию и снова перейти в атаку!"

    - char: helena_meta???
      side: left
      status: is-yellow
      text:
        - "Погоди, не перехватывай! Эта группа авиации…"
        - "Да, эти тоже мои."

    - char: new_jersey
      side: right
      text:
        - "…Ха?"

    - text:
      - "БАБАХ!"

chapter4:
  rows:

    - text:
      - "Появившаяся из ниоткуда группа палубной авиации обрушила шквал атак на морскую гладь, где, казалось, не было ни единой живой души."
      - "А затем… вновь последовал пространственный резонанс, подобный тому, что они испытывали прежде."
      - "Всего на одно мгновение мир, словно перевёрнутое зеркало, исказился: багровый ад поля боя исчез, и на его месте вновь воцарились до боли привычные каждому из них синее небо и лазурные воды."

    - char: helena_meta???
      side: left
      status: is-yellow
      text:
        - "Надо же… здесь был ещё один слой."

    - char: new_jersey
      side: right
      text:
        - "…С чего такая паника? Ты ведь сама нанесла тот удар, который разрушил механизм Сирен, разве нет?"

    - char: helena_meta???
      side: left
      status: is-yellow
      text:
        - "Хм, да. Всё верно, это была я."

    - char: new_jersey
      side: right
      text:
        - "Эх… враг воспользовался этим «окном» в пространстве, созданным взрывом, чтобы сбежать. Теперь преследовать их уже нет смысла."

    - char: ticonderoga
      side: left
      text:
        - "Даже не верится, что между Сиренами и META может существовать некое подобие сотрудничества…"

    - char: helena_meta???
      side: right
      status: is-yellow
      text:
        - "Это как раз один из тех вопросов, что я сейчас расследую. У меня были лишь подозрения, но теперь, глядя на это…"
        - "Впрочем, в том состоянии, в котором пребывало это существо, трудно сказать, способно ли оно вообще осознать смысл слова «сотрудничество»."
        - "Похоже, моё решение прийти сюда на помощь было верным. Было бы совсем несправедливо, если бы сила врага была настолько подавляющей в одностороннем порядке~"

chapter5:
  rows:

    - char: commander
      side: left
      text:
        - "Спросить о Пепле…"

chapter6:
  rows:

    - char: commander
      side: left
      text:
        - "Спросить о Хелене МЕТА…"

chapter7:
  rows:

    - char: helena_meta???
      side: right
      status: is-yellow
      text:
        - "Я знаю, у тебя много вопросов, Командир, но сейчас ещё не время для ответов."
        - "На сегодня закончим."

    - char: commander
      side: left
      text:
        - "Раз ты не хочешь говорить — что ж, пусть так и будет. Ещё раз благодарю тебя за помощь в этой операции."

    - char: helena_meta???
      side: right
      status: is-yellow
      text:
        - "Хелена, будь рядом с Командиром, сражайся достойно и живи полной жизнью."

    - char: helena
      side: left
      text:
        - "А… Э? Да…!"

    - char: helena_meta???
      side: right
      status: is-yellow
      text:
        - "Ну что ж, всем пока, мне пора возвращаться."

    - char: new_jersey
      side: left
      text:
        - "Ещё увидимся, таинственный союзник~! Надеюсь, мы ещё повоюем плечом к плечу!"

    - char: helena_meta???
      side: right
      status: is-yellow
      text:
        - "Если… представится возможность…"

    - text:
      - "Оставив эти слова напоследок, Хелена META вместе с роем палубной авиации скрылась в глубине морского тумана, который всё ещё не до конца рассеялся."

    - char: new_jersey
      side: left
      text:
        - "Слушай… её личность была настолько очевидна… интересно, что именно она пыталась скрыть?"

    - char: commander
      side: right
      text:
        - "Может быть, это часть её личных принципов…"

    - char: new_jersey
      side: left
      text:
        - "Хе-хе-хе~ Учитывая всё, начиная с атаки на AF и заканчивая тем, как мы выбрались из этой ловушки, отчёт, который нам предстоит написать, будет высотой с гору!"
        - "У меня ещё есть приказы о передислокации, так что всю эту бумажную волокиту я полностью оставляю на тебя, Командир~!"
chapter1:
  rows:

    - text:
      - "БАБАХ!!!"

    - char: boise
      side: left
      text:
        - "В-вражеский налёт?!"

    - char: morrison
      side: right
      text:
        - "Я и сама вздрогнула... Как же хорошо, что я настроила «Медвежонку» функцию автоматического ответного огня..."

    - char: boise
      side: left
      text:
        - "Мне кажется, или «Медвежонок» стал работать даже лучше, чем раньше?.."

    - char: morrison
      side: right
      text:
        - "Э-э... Ну, я ведь постоянно занимаюсь его модернизацией."

    - char: boise
      side: left
      text:
        - "Осторожно, приближается ещё больше вражеских самолётов."

    - char: morrison
      side: right
      text:
        - "Те, что летят... Они ведь правда похожи на самолёты Империи Сакуры? Как они смогли добраться сюда за такое короткое время..."

    - char: boise
      side: left
      text:
        - "Запрос на подкрепление главному флоту отправлен... Нам придётся пока что справляться своими силами...!"
chapter1:
  rows:

    - char: new_jersey
      side: left
      text:
        - "AF подверглась атаке, предположительно флота Империи Сакуры, и связь с ней прервалась...?"
        - "Как только я ушла, сразу же такое случилось! Что предпринял Командир?"

    - char: ticonderoga
      side: right
      text:
        - "После нескольких безуспешных попыток выйти на связь, Командир уже ведёт флот на помощь AF."

    - char: new_jersey
      side: left
      text:
        - "Опять лично на передовую?"

    - char: ticonderoga
      side: right
      text:
        - "Похоже на то."

    - char: new_jersey
      side: left
      text:
        - "Эх... Как бы ни менялись его должности, стиль работы всё тот же."

    - char: ticonderoga
      side: right
      text:
        - "Нью-Джерси, как думаешь, что нам делать?"

    - char: new_jersey
      side: left
      text:
        - "Да уж... Надо же было такому случиться прямо во время нашей передислокации..."
        - "Срочное донесение. Свяжемся со штабом и тоже разворачиваемся."
        - "Раз они осмелились напасть на AF, значит, это уже не рядовой противник... Мы должны нанести мощный ответный удар!"

    - char: ticonderoga
      side: right
      text:
        - "Хи-хи, только что обсуждала Командира, а ведь твой стиль ничуть не отличается."

    - char: new_jersey
      side: left
      text:
        - "Я — самый большой и мощный линкор Союза Орла, для меня совершенно естественно идти в авангарде боя!"
        - "Не то что врагов — я могу прорваться даже сквозь шторм, вот увидишь!"
        - "Внимание, приказ по флоту."
        - "Все корабли, вы получили сводку ситуации. Мы приступаем к выполнению экстренной боевой задачи!"

    - char: boise_rad
      side: right
      text:
        - "Бойсе на связи... Флот прикрытия перестраивается."

    - char: morrison_rad
      side: left
      text:
        - "Моррисон на связи, авангард начинает разворот и вскоре присоединится к вам."

    - char: new_jersey
      side: right
      text:
        - "Отлично! Флот Нью-Джерси, курс на AF — вперёд!"
chapter1:
  rows:

    - text:
      - "Когда я добрался до кабинета, там уже царил полнейший хаос."

    - char: helena
      side: left
      text:
        - "С базой AF по-прежнему нет связи? Продолжайте вызывать на текущей частоте..."

    - char: san_francisco
      side: right
      text:
        - "Поднимайте разведчики! Живо, отправить разведывательные самолёты в сторону AF!"
        - "Что? Ни один из отправленных самолётов не вернулся? Посылайте ещё!"

    - char: commander
      side: left
      text:
        - "Срочный доклад по обстановке."

    - char: san_francisco
      side: right
      text:
        - "Всё из рук вон плохо, Командир!"
        - "База AF до сих пор не ответила ни на один запрос, а высланные самолёты-разведчики один за другим теряют связь!"

    - char: commander
      side: left
      text:
        - "Как такое могло произойти? Можно ли установить точное время обрыва связи?"

    - char: helena
      side: right
      text:
        - "Вообще-то, глубокой ночью от AF пришло одно сообщение, но по какой-то причине оно дошло до нас с задержкой в несколько часов..."

    - char: commander
      side: left
      text:
        - "О чём в нём говорится?"

    - char: helena
      side: right
      text:
        - "Данные повреждены... Но технический отдел вовсю работает над ними! Уверена, скоро они всё исправят..."

chapter2:
  rows:

    - char: san_francisco
      side: left
      text:
        - "Командир, восстановление завершено! Начинаю воспроизведение!"

    - char: allen_m_sumner_rad
      side: right
      text:
        - "Пш-ш — Подверглись нападению флота Империи Сакуры — пш-ш — Дела хуже некуда — пш-ш —"
        - "Пш-ш — Серьёзные повреждения — пш-ш — Запрашиваем поддержку — пш-ш —"

    - char: helena
      side: left
      text:
        - "Простите... Это всё, что смог сделать техотдел."

    - char: commander
      side: right
      text:
        - "......"

    - char: archerfish
      side: left
      text:
        - "Если я... если я всё правильно расслышала, на них напал флот Империи Сакуры?"
        - "Нападение флота Сакуры... Вот почему AF отрезана от внешнего мира! Ситуация — хуже некуда, нужно срочно идти на выручку!"

    - char: san_francisco
      side: right
      text:
        - "Погодите, тут что-то не так."
        - "Мы только вчера поздно вечером получили известие о том, что флот Сакуры вышел от родных островов. Как они могли атаковать AF всего через несколько часов?"

    - char: commander
      side: left
      text:
        - "Время не сходится."

    - char: archerfish
      side: right
      text:
        - "А может, Аллен М. Самнер просто не отличила флот «Пешек» Сирен от флота Империи Сакуры?"

    - char: san_francisco
      side: left
      text:
        - "Ну, если это Аллен... то такой вариант возможен. Но если бы это были обычные «Пешки», гарнизон AF справился бы с ними без труда."

    - char: archerfish
      side: right
      text:
        - "Хм, и то верно. Тогда, может, это Пепел?! Мы ведь уже сталкивались с кем-то из Пепла, кто использовал самолёты Империи Сакуры!"

    - char: commander
      side: left
      text:
        - "Речь о Хирю МЕТА из Пепла? Но зачем ей это..."
        - "В любом случае, потеря связи с AF — это неоспоримый факт. Кто бы их ни атаковал, мы не можем сидеть сложа руки."
        - "Разведывательные самолёты, которые не вернулись, скорее всего, были перехвачены на пути к базе. Мы не можем больше ждать."
        - "Всем кораблям — приготовиться. Немедленно выступаем на помощь AF!"
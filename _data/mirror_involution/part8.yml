chapter1:
  rows:

    - char: new_jersey
      side: left
      text:
        - "Значит, это то самое место, где пропал флот Командира?"

    - char: ticonderoga
      side: right
      text:
        - "Да, основываясь на курсе флота и времени потери связи, это примерно здесь."
        - "Хотя этот район тоже был накрыт туманом, сейчас он уже рассеялся."

    - char: new_jersey
      side: left
      text:
        - "Столь близко к гавани PH? Вряд ли они могли подвергнуться атаке врага. Неужели они просто исчезли в этом тумане..."

    - char: baltimore_rad
      side: right
      text:
        - "Очень похоже на наш случай. Мемфис, что думаешь?"

    - char: memphis_rad
      side: left
      text:
        - "Сходства действительно есть... Но поскольку туман уже рассеялся, без конкретных улик делать выводы рано."
        - "Однако... если они действительно угодили в туман Сирен, это очень плохие новости."
        - "Это пространство, полностью подконтрольное Сиренам, там даже чувство времени и расстояния искажается... Пожалуйста, обязательно спасите Командира!"

    - char: ticonderoga
      side: right
      text:
        - "Это само собой разумеется! Но истинные намерения Сирен тоже вызывают беспокойство..."

    - char: boise_rad
      side: left
      text:
        - "Говорит Бойсе, разведка AF завершена..."

    - char: new_jersey
      side: right
      text:
        - "Спасибо за оперативность! Из-за нехватки времени пришлось устроить вам марш-бросок."

    - char: boise_rad
      side: left
      text:
        - "Всё в порядке... Я рада, что смогла помочь."
        - "Согласно данным разведки... AF действительно подверглась атаке неопознанных самолётов, объекты на острове получили определённые повреждения."
        - "Аллен М. Самнер также получила ранения во время атаки, к счастью, ничего серьёзного..."

    - char: allen_m_sumner_rad
      side: right
      text:
        - "Эх... Сначала, вчера вечером, появился странный морской туман, а сразу за ним — группы самолётов Империи Сакуры, которые использовали туман как прикрытие для внезапного удара!"
        - "Нас застали врасплох, прошу прощения...!"

    - char: new_jersey
      side: left
      text:
        - "Значит, вчерашний сигнал бедствия действительно был от тебя, верно?"

    - char: allen_m_sumner_rad
      side: right
      text:
        - "Именно. Только вот не знаю, почему вы получили его лишь на следующий день..."

    - char: ticonderoga
      side: left
      text:
        - "Если туман был таким густым, как ты поняла, что это были самолёты Сакуры?"

    - char: allen_m_sumner_rad
      side: right
      text:
        - "Мы сбили несколько машин! По обломкам подтверждено — это однозначно были палубные самолёты Империи Сакуры!"

    - char: morrison_rad
      side: left
      text:
        - "М-м, я тоже видела эти обломки... Маркировка Империи Сакуры там есть, это точно."
        - "Я попросила медвежонка отснять их... Когда встретимся, передам фотографии."

    - char: boise_rad
      side: right
      text:
        - "Туман вокруг AF рассеивается, но морская гладь к северо-западу от базы по-прежнему плотно укрыта пеленой."
        - "Возможно, нам стоит отправиться на разведку именно туда..."

    - char: new_jersey
      side: left
      text:
        - "Согласна! Вы проделали отличную работу."
        - "Аллен, оборона AF и ликвидация последствий остаются на тебе. В этот раз не подведи, договорились?"

    - char: allen_m_sumner_rad
      side: right
      text:
        - "Будьте уверены, в этот раз я не допущу промаха!"

    - char: new_jersey
      side: left
      text:
        - "Бойсе и Моррисон, вам тоже не нужно возвращаться в гавань. Ведите флот прямо к новой точке сбора."
        - "И хотя делать выводы об участии настоящего флота Империи Сакуры только на основе имеющихся данных пока рано..."
        - "..нет никаких сомнений в том, что там, в далёком тумане, скрывается враждебный флот, который пристально следит за каждым нашим шагом."
        - "Мой план действий предельно прост: прорваться внутрь, спасти Командира и заодно уничтожить всех врагов, кто встанет у нас на пути!"
chapter1:
  rows:

    - char: san_francisco
      side: left
      text:
        - "Нью-Джерси пронеслась здесь словно настоящий ураган..."

    - char: commander
      side: right
      text:
        - "С момента моего прибытия в гавань PH и до отъезда Нью-Джерси прошло всего ничего, но по ощущениям — будто целых пять дней. А с другой стороны — всё пролетело в мгновение ока."
        - "Взгляни на эти отчеты. Несмотря на её взрывной характер, работу она выполнила очень кропотливо."

    - char: san_francisco
      side: left
      text:
        - "А ты уверен, что это не Тикондерога помогла ей всё привести в порядок?"

    - char: commander
      side: right
      text:
        - "Неужели... Не может быть. Вроде бы всё по-старому?"

    - char: san_francisco
      side: left
      text:
        - "Хм-хм, Командиру явно не хватает наблюдательности. Но великий детектив Сан-Франциско уже заметила: два разных почерка в записях — это неоспоримый факт!"

    - char: commander
      side: right
      text:
        - "И правда, совсем не изменилась..."

    - char: san_francisco
      side: left
      text:
        - "Командир, а вы с Нью-Джерси давно знакомы?"

    - char: commander
      side: right
      text:
        - "Впервые мы встретились во время моего обучения в Специальной военной академии при штабе, куда меня направили после прохождения теста на совместимость с Кубами Мудрости. Так что да, прилично времени прошло..."

    - char: san_francisco
      side: left
      text:
        - "Однокурсники?"

    - char: commander
      side: right
      text:
        - "Ну, не совсем однокурсники... Та академия не была предназначена для девушек-кораблей. Скажем так, это был скорее формат взаимного обмена опытом."

    - char: san_francisco
      side: left
      text:
        - "Значит, она была кем-то вроде иностранного студента по обмену?!"

    - char: commander
      side: right
      text:
        - "Если честно, можно сказать и так..."

    - char: san_francisco
      side: left
      text:
        - "Как здорово! Прекрасная юность, студенческая жизнь... Я бы тоже не отказалась от такого опыта!"

    - char: commander
      side: right
      text:
        - "Тогда обстановка была не такой напряженной, да и Нью-Джерси как раз ждала завершения работ над своей оснасткой. Сейчас у тебя такой возможности точно не будет."

    - char: san_francisco
      side: left
      text:
        - "Как жаль~ И долго нам еще так противостоять Империи Сакуры? У штаба есть какие-то планы на этот счёт?"

    - char: commander
      side: right
      text:
        - "Текущее соглашение о прекращении огня не распространяется на Тихий океан. Хотя у штаба и есть намерение превратить его в договор о всеобщем перемирии..."
        - "Но пока эта цель не достигнута, мы остаёмся на передовой линии фронта с Империей Сакуры. Нельзя терять бдительность."

    - char: san_francisco
      side: left
      text:
        - "Оно-то так, но после того налёта Сирены прочно захватили огромные участки акватории Тихого океана. Сакуре будет трудновато сюда прорваться."

    - char: helena_rad
      side: right
      text:
        - "Командир, простите за поздний визит. Получено экстренное сообщение из штаба NY."

    - char: commander
      side: left
      text:
        - "Из штаба NY...? Переключай."

    - char: saratoga_rad
      side: right
      text:
        - "Ой, Командир? Ты ведь только сегодня вернулся в гавань PH, неужели сразу засел за работу допоздна?!"

    - char: commander
      side: left
      text:
        - "Меня слишком долго здесь не было, многое изменилось. Нужно как можно скорее восстановить контроль над ситуацией... К тому же, ты ведь тоже еще не спишь?"

    - char: saratoga_rad
      side: right
      text:
        - "Э-э... Вообще-то я уже спала... Просто меня разбудили из-за срочных разведданных!"
        - "Буду краткой. Командир, разведка обнаружила крупномасштабную передислокацию флота Империи Сакуры."
        - "Состав флота пока неизвестен, но это определенно крупное соединение, в которое входят важные персоны."
        - "Сразу после завершения сбора флот исчез в просторах Тихого океана. Пока неясно, масштабные ли это учения или начало боевой операции..."

    - char: san_francisco
      side: left
      text:
        - "Такая агрессивная передислокация флота... Вряд ли подобная операция могла быть спонтанным решением."
        - "Может, из-за того, что им не удалось пробиться в центральный сектор NA, разгневанная Империя Сакуры решила нанести ответный удар со стороны Тихого океана?"

    - char: saratoga_rad
      side: right
      text:
        - "Нельзя исключать и такой вариант. Мы продолжим собирать информацию, а вы там будьте предельно осторожны!"
        - "Если дело дойдёт до столкновения, вы окажетесь на самой линии фронта!"

    - char: commander
      side: left
      text:
        - "Понял, я буду начеку."

    - char: saratoga_rad
      side: right
      text:
        - "Ну, тогда всё. Саратóга, конец связи!"

    - char: san_francisco
      side: left
      text:
        - "Ох, ничего себе... Стоило только вернуться, и сразу вляпались в такое крупное событие!"

    - char: commander
      side: right
      text:
        - "...Действительно, крайне подозрительные маневры. Где там актуальная карта обороны секторов..."

    - char: san_francisco
      side: left
      text:
        - "Сегодня уже очень поздно, Командир, пора спать! Остальное обсудим завтра~"
        - "Даже если Империя Сакуры что-то и задумала, с их скоростью хода они доберутся до нас ещё очень и очень нескоро!"

chapter2:
  rows:

    - char: commander
      side: right
      text:
        - "Просмотрю ещё один отчёт!"

    - char: san_francisco
      side: left
      text:
        - "Ни-за-что! Раз уж я сейчас твоя секретарь, то обязана заботиться о твоём здоровье!"
        - "Так что бросай сопротивление и послушно иди отдыхать!"

chapter3:
  rows:

    - char: commander
      side: right
      text:
        - "И то верно, на сегодня с работой всё..."

    - char: san_francisco
      side: left
      text:
        - "Командир, прошу сюда~ Я лично застелила твою постель, так что с тебя пять звёзд в отзыве, если останешься доволен!"

chapter4:
  rows:

  - text:
    - "И на следующее утро..."
    - "Связь между базой AF и гаванью PH была полностью прервана."
chapter1:
  rows:

    - char: communicator
      side: left
      text:
        - "Пш-ш… пш-ш-ш..."

    - char: hornet_rad?
      side: left
      status: is-red
      text:
        - "Сирены атакуют по всему фронту! У нас заканчиваются самолёты, мы больше не можем продолжать бой!"
        - "Флот поддержки, где вы сейчас находитесь?!"

    - char: boise
      side: right
      text:
        - "В коммуникаторе………… снова появился голос."

    - char: new_jersey
      side: left
      text:
        - "Судя по содержанию, эта запись воссоздаёт момент, когда они были вынуждены отступить под натиском Сирен."

    - char: ticonderoga
      side: right
      text:
        - "Это значит………… что впереди нас действительно поджидает огромный флот Сирен."
        - "Хе-хе, ну и ладно. Сражаться с настоящими Сиренами, которые создают этих «Пешек», куда приятнее, чем просто сбивать фальшивки~"
        - "Давайте проигнорируем эти передачи и продолжим движение."

    - char: new_jersey
      side: left
      text:
        - "Погоди-ка~ Раз уж выпал такой редкий шанс, давай проведём небольшой тест."

    - char: ticonderoga
      side: right
      text:
        - "…Тест?"

    - char: new_jersey
      side: left
      text:
        - "Проверим, насколько реалистичными могут быть эти архивные записи Сирен. Тебя ведь тоже это интересует, правда?"
        - "Эй-эй-эй, это флот Нью-Джерси, Хорнет, ты меня слышишь?"

    - char: ticonderoga
      side: right
      text:
        - "(Эй!)"

    - char: new_jersey
      side: left
      text:
        - "(Тс-с! всё нормально, всё нормально~ В конце концов, это же просто запись.)"

    - char: hornet_rad?
      side: right
      status: is-red
      text:
        - "О~! Это Нью-Джерси! Как нельзя вовремя, где сейчас твой флот?"

    - char: new_jersey
      side: left
      text:
        - "(Ответ… прозвучал……?!)"
        - "Мы… нет, сначала давай-ка докладывай обстановку."

    - char: hornet_rad?
      side: right
      status: is-red
      text:
        - "Моя авиагруппа понесла тяжёлые потери, у Энтерпрайз ситуация примерно такая же. Сколько подкреплений ты привела?"

    - char: new_jersey
      side: left
      text:
        - "(М-м… тогда попробуем вот так!)"
        - "Мы… нет, всё-таки лучше докладывай обстановку~"

    - char: hornet_rad?
      side: right
      status: is-red
      text:
        - "Моя авиагруппа понесла тяжёлые потери, мы больше не в силах удерживать господство в воздухе. Сколько подкреплений ты привела?"

    - char: ticonderoga
      side: left
      text:
        - "Она… не заметила, что фраза повторяется?."

    - char: new_jersey
      side: right
      text:
        - "Хорнет, как думаешь, что лучше съесть на ужин? Рекомендую стейк."

    - char: hornet_rad?
      side: left
      status: is-red
      text:
        - "Нью-Джерси, ситуация критическая, флот Сирен совсем рядом, прошу, поторопись с поддержкой!"

    - char: new_jersey
      side: right
      text:
        - "Какой прожарки стейк ты любишь? На фарфоровой тарелке или на сковороде? С каким соусом?"

    - char: hornet_rad?
      side: left
      status: is-red
      text:
        - "Ситуация критическая, флот Сирен совсем рядом, нам не хватает прикрытия, прошу, поторопись с поддержкой!"

    - char: ticonderoga
      side: right
      text:
        - "Что за бред… Диалог совершенно не клеится."

    - char: new_jersey
      side: left
      text:
        - "Хе-хе, вот оно что. Похоже, я всё поняла."
        - "Эти замаскированные переговоры — не просто механическая запись. Они подбирают ответы из заранее заготовленного набора, чтобы поддерживать иллюзию диалога."

    - char: ticonderoga
      side: right
      text:
        - "То есть у них есть база данных с кучей вариантов, и они просто выбирают подходящие фразы в зависимости от наших слов?"

    - char: new_jersey
      side: left
      text:
        - "Именно~ Например, когда я спрашиваю об обстановке, коммуникатор «понимает» запрос и выдаёт соответствующий доклад."
        - "Но когда я завожу разговор на отвлечённые темы, «система» просто игнорирует меня и продолжает гнуть свою линию~"

    - char: ticonderoga
      side: right
      text:
        - "Понятно… Действительно, хитрая уловка. Обычный человек ни за что не додумался бы спрашивать про ужин в такой момент…"

    - char: new_jersey
      side: left
      text:
        - "Хе… А я уж было на секунду подумала, что Сирены создали нечто по-настоящему выдающееся. Оказалось, всё те же фокусы."
        - "…………"
        - "Как же хорошо…"
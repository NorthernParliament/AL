chapter1:
  rows:

    - char: saratoga
      side: left
      text:
        - "Как я и думала… вне всяких сомнений, помимо «Пепла», существуют МЕТА, принадлежащие к другим фракциям!"
        - "Спасибо, что принесла подробный отчёт~"
        - "«Пепел»… по крайней мере, теперь ясно, что МЕТА не являются нашими союзниками — первоначальное суждение об этом было верным."
        - "Сорю МЕТА, или кто-то ещё — возможно, мы уже давно сталкивались с ними в бою…"

    - char: new_jersey
      side: right
      text:
        - "Ты думаешь, раны Лексингтон тоже связаны с этими событиями…?"

    - char: saratoga
      side: left
      text:
        - "........."
        - "Контакты с МЕТА слишком рискованны."
        - "МЕТА похожи на нас, но не являются таковыми в полной мере."
        - "К тому же, между самими МЕТА огромная разница… Поразительно, но даже внутри «Пепла» нет единого мнения по поводу Командира…"
        - "И Северный Парламент туда же — в попытках разгадать тайны, которые сами не могут постичь, они без колебаний подвергли Командира смертельной опасности."
        - "Если бы мы не забрали Командира вовремя, кто знает, до каких безумств дошёл бы Северный Парламент…"
        - "Ну что за люди… Все пытаются что-то выведать у Командира, но мало кто действительно заботится о нём как о человеке…"
        - "Неважно, каков источник необычной адаптивности Кубов Мудрости и каков её эффект."
        - "Один только тот факт, что Командир лично сражается на передовой, защищая безопасность мира, заслуживает искреннего уважения со стороны каждого!"
        - "…Это нужно не только ради меня, но и ради тебя, ради сестры, ради Командира и ради бесчисленного множества людей, пострадавших в этой войне…"
        - "Мы должны как можно скорее выяснить истинную причину череды событий, спровоцированных Сиренами."

    - char: new_jersey
      side: right
      text:
        - "Я понимаю. И… я уже заручилась поддержкой старшей сестры, так что наше расследование пройдёт куда успешнее~"

    - char: saratoga
      side: left
      text:
        - "Правда?! Как здорово!"
        - "Хе-хе-хе~ Раз так… Проект «Мерцание» и Проект «Судья», значит. Звучит как отличные точки входа для нашего расследования~"
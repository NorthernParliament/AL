chapter1:
  rows:

    - char: san_francisco
      side: left
      text:
        - "Акватория зачищена! «Пешки» Империи Сакуры, «Пешки» Союза Орла и флот Сирен — всё уничтожено~"
        - "Когда они разом навалились на нас, было действительно жутко, но по факту — они оказались слабаками!"

    - char: ticonderoga
      side: right
      text:
        - "Боеспособность «Пешек» Сирен… вернулась к нормальному уровню."

    - char: commander
      side: left
      text:
        - "Что значит — вернулась к нормальному уровню…?"

    - char: new_jersey
      side: right
      text:
        - "Ситуация такая, Командир. По пути сюда мы столкнулись с группой «Пешек» Империи Сакуры, чьи боевые характеристики и тактическая гибкость намного превосходили обычные показатели."
        - "Мы с Тик подозреваем, что Сирены проводили какие-то особые эксперименты, но в ходе недавнего боя эти странности исчезли."

    - char: commander
      side: left
      text:
        - "Значит, те отряды «Пешек», внезапно показавшие аномальную боевую мощь… Нужно будет тщательно изучить это по возвращении."

    - char: helena_meta???
      side: right
      status: is-yellow
      text:
        - "Командир, вы осмотрели здесь всё. Заметили что-нибудь необычное?"

    - char: commander
      side: left
      text:
        - "Виденная сцена в целом совпадает с имеющимися разведданными. Повреждённый авианосный флот Империи Сакуры получил передышку и возможность отступить благодаря внезапной атаке Сирен."
        - "Но… количество палубной авиации у отступающего флота Империи Сакуры кажется намного больше, чем предполагалось."

    - char: helena_meta???
      side: right
      status: is-yellow
      text:
        - "Это не иллюзия. Самолётов в небе действительно было больше."
        - "В состав последней ударной волны Империи Сакуры затесались авиагруппы, которые в то время не принадлежали их авианосцам."

    - char: commander
      side: left
      text:
        - "Чьи они?"

    - char: helena_meta???
      side: right
      status: is-yellow
      text:
        - "Монстра."
        - "Хотя это всего лишь «Пешки», тот Монстр уже не способен различать «своих» и «чужих»."
        - "Командир, раз уж вы только что лично руководили уничтожением «Хирю», будьте готовы снова принять на себя гнев Монстра."
        - "Точно так же, как это было на поле боя при AF в прошлом."

    - char: commander
      side: left
      text:
        - "Точно так же, как на поле боя при AF в прошлом?!"

    - char: helena_meta???
      side: right
      status: is-yellow
      text:
        - Враг приближается. Всем кораблям подготовиться к экстренному бою."

    - char: new_jersey
      side: left
      text:
        - "Отражение атаки…? Вокруг же нет ни души, кого именно мы должны...."

    - text:
      - "БАБАХ!!!"
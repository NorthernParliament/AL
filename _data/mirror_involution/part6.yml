chapter1:
  rows:

    - char: new_jersey
      side: left
      text:
        - "Ха?!"
        - "Командир тоже перестал выходить на связь?!"

    - char: ticonderoga
      side: right
      text:
        - "М-м... Флот Командира полностью исчез с радаров вскоре после того, как покинул гавань PH."
        - "Ни мы, ни гавань PH не можем связаться ни с одним из кораблей в его составе."

    - char: new_jersey
      side: left
      text:
        - "На них напали?! Или произошло что-то другое?"

    - char: ticonderoga
      side: right
      text:
        - "На данный момент никаких докладов об этом не поступало."
        - "Похоже, район, где они пропали, накрыло густым морским туманом, что сильно затрудняет разведку."

    - char: new_jersey
      side: left
      text:
        - "Кто был в составе флота Командира?"

    - char: ticonderoga
      side: right
      text:
        - "Сан-Франциско, Хелена, Арчерфиш."

    - char: new_jersey
      side: left
      text:
        - "И Хелена тоже в списке пропавших... Постой, разве она не попадала в похожую ситуацию раньше?!"
        - "Дай-ка вспомнить. Хелена... морской туман... потеря связи..."

    - char: ticonderoga
      side: right
      text:
        - "Ты про тот случай с подкреплением для Панамской крепости? Тогда Хелена была во флоте Балтимор, который считался пропавшим без вести несколько дней."
        - "В ходе той операции даже Энтерпрайз на какое-то время сбилась с курса в том странном тумане..."

chapter2:
  rows:

    - char: new_jersey
      side: left
      text:
        - "Так вот оно что... Теперь всё встало на свои места! Этот инцидент — дело рук Сирен!"
        - "Тикон, срочно передай текущую обстановку Энтерпрайз и Балтимор, посмотрим, что они предложат!"

    - char: ticonderoga
      side: right
      text:
        - "Без проблем. Но что касается дальнейшего плана действий..."
        - "Не хотелось бы говорить об очевидном, но в такой хаотичной ситуации нам крайне необходим верховный командующий."
        - "Будь то противостояние неизвестной угрозе или организация спасательной операции для флота Командира..."

    - char: new_jersey
      side: left
      text:
        - "Я понимаю, о чём ты. Но официальная передача дел завершена, и у меня нет полномочий принимать на себя оборону Тихого океана."

    - char: saratoga_rad
      side: right
      text:
        - "С этим проблем не будет, мы уже в курсе всей ситуации!"
        - "Учитывая текущее положение, штаб NY принял решение приостановить твоё назначение. Нью-Джерси, временно бери на себя обязанности командующего обороной Тихого океана, пока Командир не вернётся."
        - "Выясни, что это за неведомая угроза, защити наши базы, а затем найди и спаси Командира и пропавших товарищей!"

    - char: new_jersey
      side: left
      text:
        - "Отлично... Теперь у меня есть законное право развернуться по полной! Договорились, можешь на меня положиться..."
        - "Постой! Саратóга?! Как это твоя связь так удачно вклинилась в наш разговор? Ты что, прослушивала нас...?!"

    - char: saratoga_rad
      side: right
      text:
        - "Ха? Ещё чего! Это Тикондерога сама вышла на связь и попросила нас «ускорить оценку ситуации»..."

    - char: ticonderoga
      side: left
      text:
        - "Кхм... Я посчитала, что это самый эффективный способ действий."

    - char: new_jersey
      side: right
      text:
        - "Вот оно что, Тикон... Не зря ты мой главный стратег! Как же легко с тобой работать!"

    - char: saratoga_rad
      side: left
      text:
        - "Поскольку я сама сейчас не могу прибыть на место, постараюсь обеспечить вам максимальную информационную поддержку из тыла."

    - char: new_jersey
      side: right
      text:
        - "Всё в точности наоборот, если вспомнить ситуацию прошлых лет... Наконец-то ты прочувствовала ту тревогу, что испытывала я, когда не могла отправиться на передовую!"

    - char: saratoga_rad
      side: left
      text:
        - "В тот раз ты не могла, потому что твои MK7 не были готовы, а я сейчас остаюсь в штабе NY, чтобы разгребать дела в секторе NA! Объективные обстоятельства совершенно иные!"
        - "Хотя... «всё в точности наоборот»... Может, так оно и есть?!"
        - "Прости, внезапно вспомнила кое-что, что нужно проверить, отключаюсь! Удачи вам!"

    - char: new_jersey
      side: right
      text:
        - "Эй?! Постой... А, ну вот, повесила трубку, даже ничего не объяснила."
        - "Ну и ладно... Пусть сама разбирается со своими сложными загадками, а нам нужно сосредоточиться на текущей ситуации."
        - "Флот Командира достаточно силён, чтобы справиться с обычными Сиренами, так что в краткосрочной перспективе волноваться не о чем... М-м, в любом случае — курс на акваторию, где они пропали!"
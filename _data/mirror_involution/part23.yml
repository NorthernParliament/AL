chapter1:
  rows:

    - char: new_jersey
      side: left
      text:
        - "……Тик, сколько мы уже идём после того боя?"

    - char: ticonderoga
      side: right
      text:
        - "Три часа."

    - char: new_jersey
      side: left
      text:
        - "Целых три часа! Согласно записям, масштабное наступление Сирен должно было начаться давным-давно."

    - char: ticonderoga
      side: right
      text:
        - "И правда, странно… Бесконечное производство «пушечного мяса» — это коронный трюк Сирен. Теоретически, мы уже давно должны были быть окружены врагами."
        - "Но ничего не происходит… Ни врагов, ни следов Командира, а морской туман даже не думает рассеиваться."
        - "Это прямо как…"

    - char: new_jersey
      side: left
      text:
        - "Прямо как будто кто-то посреди партии взял и внезапно нажал на кнопку «Пауза», да?!"
        - "У меня те же ощущения. Как бы это сказать… Нет чувства, что операция завершена, но и чувства, что она продолжается, тоже нет…"

    - char: helena_meta???
      side: right
      status: is-yellow
      text:
        - "Потому что «шахматная доска» действительно была поставлена на паузу."

    - char: ticonderoga
      side: left
      text:
        - "Эй…!? Ты — это…"

    - text:
      - "БАБАХ!"

    - char: new_jersey
      side: left
      text:
        - "Тц… уклонилась, значит. Бойсе, Моррисон! Зажимайте её с двух сторон, не дайте уйти!"
        - "Тик, немедленно отходи на дистанцию! Эта особа крайне опасна!"

    - char: helena_meta???
      side: right
      status: is-yellow
      text:
        - "Отличные рефлексы. Но слепые атаки могут задеть и своих, не находишь?"

    - char: new_jersey
      side: left
      text:
        - "Как кто-то, кто бесшумно подобрался к нам, используя туман Сирен, может называться «своим»?"

    - char: helena_meta???
      side: right
      status: is-yellow
      text:
        - "Разве тебе не нравятся приятные сюрпризы в жизни?"

    - char: boise
      side: left
      text:
        - "Нью-Джерси… на радаре… абсолютно пусто…"

    - char: new_jersey
      side: right
      text:
        - "Хе… не Сирена, и радар не может захватить сигнал… Ты из «Пепла», верно?"
        - "Не припомню, чтобы мы когда-либо заключали союз с «Пеплом»!"

    - char: helena_meta???
      side: left
      status: is-yellow
      text:
        - "Я тоже не припомню такого. Но я — союзник Командира."

    - char: new_jersey
      side: right
      text:
        - "Что… ты знаешь о Командире?! Где он сейчас?! Если ты хоть пальцем его тронула..."

    - char: helena_meta???
      side: left
      status: is-yellow
      text:
        - "Успокойся..."
        - "Командир в полном порядке. Его исчезновение — не моих рук дело, я здесь, чтобы помочь вам воссоединиться с ним."
        - "Тебя устроит такой уровень объяснений?"

    - char: new_jersey
      side: right
      text:
        - "…Тик, что скажешь?"

    - char: ticonderoga
      side: left
      text:
        - "Доверять на все сто нельзя, но и полностью отрицать её слова нет нужды… Если бы она хотела нашей смерти, то вместо слов уже давно перешла бы на язык орудийных залпов."
        - "Да и Командир… кажется, он всегда был сторонником того, чтобы искать диалог с «Пеплом», а не решать всё силой."

    - char: new_jersey
      side: right
      text:
        - "Хм… звучит разумно. Хоть я до сих пор тебе не доверяю, я верю в методы Командира."
        - "Ты действительно поможешь нам спасти Командира?"

    - char: helena_meta???
      side: left
      status: is-yellow
      text:
        - "Да."

    - char: new_jersey
      side: right
      text:
        - "Тогда мы пришли к общему мнению по этому вопросу."
        - "Чем дольше мы тянем, тем опаснее положение Командира, но мы совершенно не можем вычислить его местоположение… У тебя есть идеи?"

    - char: helena_meta???
      side: left
      status: is-yellow
      text:
        - "Вы догадались о намерениях Сирен, которые они воплотили в этой «шахматной доске»."
        - "Однако всё это лишь видимость."
        - "Глаза получают ограниченный объем информации, поэтому был создан радар, чтобы расширить их границы."
        - "Но точно так же, как зрение можно обмануть густым туманом, не стоит слепо доверять и радарам."
        - "Например, ты ведь не видишь меня на радаре, верно?"

    - char: new_jersey
      side: right
      text:
        - "…Разве не потому, что ты намеренно уклоняешься от нашего радарного слежения?!"

    - char: helena_meta???
      side: left
      status: is-yellow
      text:
        - "Если это под силу мне, нет причин сомневаться, что это под силу и Сиренам."
        - "То, что вы могли их отслеживать, — лишь потому, что они сами хотели, чтобы вы это делали."
        - "Взлом запущен. Начинаю модификацию параметров......"

chapter2:
  rows:

    - char: helena_meta???
      side: left
      status: is-yellow
      text:
        - "А теперь взгляни на радар."

    - char: new_jersey
      side: right
      text:
        - "В пустой акватории появилось огромное количество вражеских сигналов?!"
        - "Что происходит… Ты в одно мгновение создала кучу ложных целей, чтобы обмануть наши датчики?!"

    - char: helena_meta???
      side: left
      status: is-yellow
      text:
        - "Я просто заставила их работать чуть точнее, чем обычно."

    - char: ticonderoga
      side: right
      text:
        - "Погоди… Подобные «сигналы-призраки» Эссекс уже встречала в предыдущих операциях… Неужели тогда..."

    - char: helena_meta???
      side: left
      status: is-yellow
      text:
        - "Тс-с… Дальнейший процесс требует предельной точности."
        - "Три… два… один..."

chapter3:
  rows:

    - char: helena_meta???
      side: left
      status: is-yellow
      text:
        - "БУМ!"
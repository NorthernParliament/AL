chapter1:
  rows:

    - char: commander
      side: left
      text:
        - "(Я на капитанском мостике. Но это не тот мостик, к которому я привык.)"
        - "(Он не похож на мостик Союза Орла, не принадлежит Королевскому Флоту и не относится к Северному Парламенту...)"
        - "(...Судя по декору и орнаментам, неужели это командный корабль Империи Сакуры?!)"

    - char: helena
      side: right
      text:
        - "...Zz..."

    - char: san_francisco
      side: left
      text:
        - "...Яичный... карамельный... огромный пудинг нападает... уже не могу больше съесть, хе-хе-хе..."

    - char: archerfish
      side: right
      text:
        - "Ф-фу... какую бы пакость сотворить в следующий раз... фу-фу..."

    - char: commander
      side: left
      text:
        - "(Сан-Франциско, Хелена и Арчерфиш тоже рядом, похоже, они просто крепко спят.)"
        - "(Никто не ранен, однако оснастка находится в неактивном состоянии. В любом случае, сначала нужно всех разбудить —)"

    - char: archerfish
      side: right
      text:
        - "...Последнее, что я помню?"
        - "М-м... Помню только, что мы направлялись к AF для разведки, а потом сразу очнулась здесь."

    - char: helena
      side: left
      text:
        - "У меня то же самое..."

    - char: archerfish
      side: right
      text:
        - "Командир, это без всяких сомнений похищение! Нас похитили!"
        - "У-у-у, какой-то демон положил глаз на такую милашку, как я, и теперь тянет ко мне свои грязные лапы! Как же страшно~!"

    - char: san_francisco
      side: left
      text:
        - "Пф... это ещё что, попытка разрядить обстановку?"

    - char: archerfish
      side: right
      text:
        - "Ну, просто паника всё равно ничего не решит..."

    - char: commander
      side: left
      text:
        - "Тут она права... В любом случае, сначала нужно успокоиться и оценить текущую ситуацию."
        - "Похищение... Если это так, то как им это удалось?"

    - char: helena
      side: right
      text:
        - "Это всё морской туман. Перед тем как попасть сюда, мы вошли в него..."
        - "Тот туман показался мне знакомым, прямо как в прошлый раз..."

    - char: commander
      side: left
      text:
        - "Ты про случай с подкреплением для Панамской крепости?"

    - char: helena
      side: right
      text:
        - "«Ассорти Микрослоёв»... именно так тот туман называла Энтерпрайз из Пепла."

    - char: san_francisco
      side: left
      text:
        - "Какое крутое название...! Нет, подождите, получается, этот туман — ловушка Сирен?!"
        - "Разве это не полный провал? В любом случае, нужно бежать!"
        - "Главный калибр — эй, что?"
        - "Оснастка... оно не работает?!"

    - char: archerfish
      side: right
      text:
        - "Э?! Да быть того не может, дай-ка я попробую... И правда! Как же так?!"

    - text:
      - "Сан-Франциско подошла к двери и попыталась её открыть..."

    - char: san_francisco
      side: left
      text:
        - "Ничего не выходит, дверь тоже не открывается... Мы что, взаперти?!"
        - "Хелена, через окно что-нибудь видно?"

    - char: helena
      side: right
      text:
        - "...SG... SG не работает... Что же теперь будет..."

    - char: san_francisco
      side: left
      text:
        - "Хелена...?!"

    - char: helena
      side: right
      text:
        - "А, м-м — за окном? ...Только туман, больше ничего не разобрать."
        - "Но я чувствую, что корабль всё ещё движется по поверхности моря..."

    - char: san_francisco
      side: left
      text:
        - "В таком случае остаётся только надеяться на мой... Эй? А где мой коммуникатор..."

    - char: archerfish
      side: right
      text:
        - "Глупая Сан-Франциско... Без оснастки и коммуникационное оборудование, само собой, использовать не получится!"

    - char: san_francisco
      side: left
      text:
        - "А, точно... Похоже, всё-таки придётся что-то придумать с этой дверью."
        - "Есть ли тут что-нибудь твёрдое..."

    - char: archerfish
      side: right
      text:
        - "Ва-а, ты что задумала? Не делай глупостей!"

    - char: helena
      side: left
      text:
        - "Погодите, коммуникатор на консоли, кажется, мигает..."

    - char: san_francisco
      side: right
      text:
        - "Эй! Может, через него удастся связаться с внешним миром! Молодец, Хелена!"
        - "Тыкаю сюда..."

    - char: hiryuu_rad
      side: left
      status: is-yellow
      text:
        - "...Наконец-то связь установлена! Начинаю доклад о ситуации на линии фронта."
        - "Авиаудар уже начат, на данный момент перехвата не зафиксировано."
        - "Разведывательные самолёты также не обнаружили флот Союза Орла. Однако с разведчиком Тикумы возникли проблемы, в одном секторе ситуация остаётся неясной..."

    - char: akagi_rad
      side: right
      status: is-yellow
      text:
        - "Не стоит придавать этому значения, верно? Флот Союза Орла либо не осознал наших оперативных намерений, либо уже давно сбежал, напуганный нашим флотом."
        - "Раз уж этой операцией командую лично я, победа — дело предрешённое. Ждите новостей о победе, хи-хи-хи~"

    - char: archerfish
      side: left
      text:
        - "Связь Империи Сакуры? Я же не ослышалась, это была связь Сакуры!"

    - char: san_francisco
      side: right
      text:
        - "Если в коммуникаторе слышны оперативные переговоры Сакуры, это означает... мы находимся в самом командном центре флота Империи Сакуры?"

    - char: archerfish
      side: left
      text:
        - "Но здесь, кроме нас, никого нет!"

    - char: san_francisco
      side: right
      text:
        - "Хе-хе-хе, хоть я и не понимаю, что происходит... Но это же подарок судьбы! Если здесь никого нет, то никто не заметит, если мы что-нибудь вытворим, верно?"

    - char: commander
      side: left
      text:
        - "(Неподдающаяся дверь, пространство, отрезанное от внешнего мира, переговоры из коммуникатора — всё это кажется до боли знакомым...)"
        - "(В любом случае, сначала нужно собрать побольше информации.)"
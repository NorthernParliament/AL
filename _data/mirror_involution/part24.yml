chapter1:
  rows:
  
    - text:
      - "Благодаря помощи таинственного союзника блокировка командного корабля была снята, а флот восстановил свою боеспособность."
      - "Проплыв некоторое время сквозь морской туман, перед взором отряда открылось пылающее поле боя."

    - char: shinano_rad
      side: left
      status: is-yellow
      text:
        - "Поверхность воды всё ещё подвластна движению, но всё вокруг, кроме неё, застыло в неподвижности."
        - "Обломки, осколки снарядов, даже языки пламени и клубы густого дыма… словно само время остановилось."
        - "Впервые вижу столь удивительное зрелище."

    - char: archerfish
      side: right
      text:
        - "Мы будто оказались внутри видеокассеты, при воспроизведении которой нажали кнопку «Пауза»…"

    - char: san_francisco
      side: left
      text:
        - "Это просто невероятно…! Я думала, Сирены лишь немного поколдовали с коммуникаторами, но чтобы воссоздать настолько реалистичную сцену!"

    - char: helena
      side: right
      text:
        - "Это поле боя… оно образовалось в результате сражения одних «Пешек» с другими… Неужели Сирены всё это время использовали «Пешки» для подобных экспериментов?"

    - char: commander
      side: left
      text:
        - "Поле боя, застывшее… пространство записей…………"

chapter2:
  rows:

    - char: commander
      side: left
      text:
        - "Действительно, то, что происходило в той «запертой комнате», — это не просто сон."

    - char: archerfish
      side: right
      text:
        - "Сан-Франциско, такое не каждый день увидишь! Пойдём, пойдём, подплывём поближе и посмотрим!"

chapter3:
  rows:

    - char: san_francisco
      side: left
      text:
        - "Хе-хе-хе, а это, похоже, «Пешка» — «Хирю» из Империи Сакуры~ Она и правда полностью застыла, даже никак не реагирует, когда я проплываю мимо."
        - "А те корабли рядом — это…"

    - char: commander
      side: right
      text:
        - "Сорю и остальные члены спасательного флота Империи Сакуры."
        - "(Этот состав флота, возможно, и кажется кому-то чужим, но для меня он до боли знаком.)"
        - "(Это поле боя AF, но не то, которое я видел своими глазами, а AF глазами Империи Сакуры.)"
        - "(В тот момент именно благодаря внезапному появлению флота Сирен Империи Сакуры удалось получить шанс на проведение этой спасательной операции.)"
        - "(И окружающая сцена как раз застыла в тот самый момент…)"
        - "(Но… если это Сорю и Хирю? Подождите, где тогда Акаги и Кага…?)"

    - char: archerfish
      side: left
      text:
        - "Командир, Командир! Я никогда раньше не видела авианосцы Империи Сакуры так близко!"
        - "Технологии, которые они используют для взлёта и посадки палубной авиации, так отличаются от наших! Это выглядит прямо как магия из кино, словно ожившие заклинания!"

    - char: san_francisco
      side: right
      text:
        - "Ого! И правда!… А некоторые самолёты так и застыли в состоянии «бумажных талисманов»…"
        - "Хе-хе, может, захватить один на память?..."
        - "……А, не сдвинуть с места!"

    - char: commander
      side: left
      text:
        - "(Авиация Империи Сакуры. Те, что на палубе… и те, что кружат в воздухе...)"
        - "(Хм… Неужели у Империи Сакуры тогда осталось столько авиагрупп…)"

    - char: helena_meta_rad???
      side: right
      status: is-yellow
      text:
        - "Простите, что заставила ждать, улаживала кое-какие дела."
        - "Время поджимает. Синано, ответь на мой вопрос — что ты думаешь о Командире?"

    - char: shinano_rad
      side: left
      status: is-yellow
      text:
        - "Командир?.. Интересный человек, с которым можно вести диалог."

    - char: helena_meta_rad???
      side: right
      status: is-yellow
      text:
        - "Не забудь о том, что произошло сегодня, когда проснёшься."

    - char: shinano_rad
      side: left
      status: is-yellow
      text:
        - "Неужели этот сон… подходит к концу?…"

    - char: helena_meta_rad???
      side: right
      status: is-yellow
      text:
        - "Да. Сейчас я собираюсь внести некие «изменения»."
        - "Не знаю точных принципов работы твоего сновидения, но импульс от «измененийи» разрушит ту хрупкую связь, что ты здесь создала."
        - "Твой сон больше не сможет продолжаться."

    - char: shinano_rad
      side: left
      status: is-yellow
      text:
        - "Похоже, мне пора прощаться. Жаль… я бы хотела продолжить это чудесное путешествие…"

    - char: helena_meta_rad???
      side: right
      status: is-yellow
      text:
        - "Прости уж."
        - "Остальные, ваше текущее положение………… М-м, подтверждено. Стойте там, где стоите, ни в коем случае не двигайтесь."
        - "Три… два… один..."

    - text:
      - "БУМ!"

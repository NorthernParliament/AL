chapter1:
  rows:

    - char: archerfish
      side: left
      text:
        - "Что происходит… подводное землетрясение?!"

    - char: san_francisco
      side: right
      text:
        - "Нет, это дрожит само пространство!"

    - char: helena
      side: left
      text:
        - "На радаре… появился новый флот…"

chapter2:
  rows:

    - text:
      - "После того как таинственный союзник закончил обратный отсчёт, по акватории разнёсся грохот, словно разрывающий ткань пространства, за которым последовала мощная ударная волна."
      - "Когда шум и тряска стихли, в коммуникаторе раздался до боли знакомый голос."

    - char: new_jersey
      side: left
      text:
        - "Йо-хо~ Всем привет, заждались?!"

    - char: commander
      side: right
      text:
        - "Не ожидал, что придет именно Нью-Джерси… Ты ведь уже должна была отбыть в другое место?"

    - char: new_jersey
      side: left
      text:
        - "Я едва успела отойти, как услышала ошеломляющую новость: «Командир пропал!», так что пришлось разворачиваться и организовывать спасательную операцию~"
        - "Признаться честно, возможность снова пойти в бой плечом к плечу представилась так неожиданно, что я даже удивилась."
        - "Ну дела… Кто бы мог подумать, что даже Командир, закалённый в сотнях сражений, попадётся в ловушку Сирен..."

    - char: commander
      side: right
      text:
        - "Флот, который должен был спасать, сам оказался в положении спасаемых… право слово, стыдно…"

    - char: new_jersey
      side: left
      text:
        - "Хе-хе-хе~ Кстати, флот подкрепления я тоже прихватила~"

    - char: commander
      side: right
      text:
        - "Тикондерога, Бойсе, Моррисон… а это кто?.."
        - "А, значит, ты и есть тот самый «таинственный союзник», который всё это время нам помогал? Огромное спасибо за помощь."

    - char: helena_meta???
      side: left
      status: is-yellow
      text:
        - "Не стоит благодарности. Я же говорила: я — союзник Командира."
        - "Зеркальное море разбито. Сирены, чей план был сорван, теперь, когда эксперимент больше нельзя продолжать, наверняка покажут свои истинные клыки."
        - "Пространство после взрыва крайне нестабильно, и моё «затягивание времени» подходит к пределу."

    - char: commander
      side: right
      text:
        - "Затягивание…? Неужели все эти застывшие сцены в пространстве — твоих рук дело?"

    - char: helena_meta???
      side: left
      status: is-yellow
      text:
        - "Именно так. Знаешь ли ты, что именно здесь воспроизведено?"

    - char: commander
      side: right
      text:
        - "Место сражения при AF."

    - char: helena_meta???
      side: left
      status: is-yellow
      text:
        - "А что служит элементами этой сцены?"

    - char: commander
      side: right
      text:
        - "«Пешки» Союза Орла, «Пешки» Империи Сакуры, флот Сирен и битва между ними…"

    - char: helena_meta???
      side: left
      status: is-yellow
      text:
        - "Если из-за сбоя в планах этот спектакль больше не нужно продолжать, как ты думаешь, что произойдёт?"

    - char: commander
      side: right
      text:
        - "……Они перестанут разыгрывать битву друг с другом и со всех сторон бросятся в атаку на нас?!"

    - char: helena_meta???
      side: left
      status: is-yellow
      text:
        - "Верно."

    - char: new_jersey
      side: right
      text:
        - "Командир, мои полномочия исполняющей обязанности командующего заканчивались в тот момент, когда мы воссоединимся с вами. Теперь я возвращаю командование флотом."
        - "Раз кризис ещё не миновал, прошу, ведите нас к окончательной победе!"

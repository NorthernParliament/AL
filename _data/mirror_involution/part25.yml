chapter1:
  rows:
  
    - text:
      - "БУМ!"
      - "Сопровождаемый оглушительным грохотом, в пространстве, окутанном морским туманом, из ниоткуда возник разлом диаметром почти в сто метров."
      - "В отличие от спокойствия снаружи, внутри разлома бушевал багровый ад из огня и едкого дыма."

    - char: new_jersey
      side: left
      text:
        - "Я чувствую жар и запах пороха… этот разлом — не галлюцинация…"
        - "Ты… ты разбила пространство, словно зеркало?!"
        - "И это ведь был бомбардировщик, верно? Откуда у тебя палубная авиация?!"

    - char: ticonderoga
      side: right
      text:
        - "Её больше всего беспокоит именно это, а не то, что пространство треснуло по швам…"

    - char: new_jersey
      side: left
      text:
        - "Разбитое пространство — это, конечно, тоже впечатляет, но куда важнее вопрос: почему лёгкий крейсер может выпускать авиацию, способную разнести пространство в щепки?!"

    - char: helena_meta???
      side: right
      status: is-yellow
      text:
        - "Как по мне, для лёгкого крейсера наличие бомбардировщиков — это вполне нормально."

    - char: new_jersey
      side: left
      text:
        - "ЭТО СОВЕРШЕННО НЕНОРМАЛЬНО!"
        - "Если разобраться, сама конструкция твоего вооружения этого не позволяет! На твоём снаряжении нет ни ангаров, ни полётной палубы. Откуда, чёрт возьми, вылетают эти самолёты?!"

    - char: helena_meta???
      side: right
      status: is-yellow
      text:
        - "Секрет."

    - char: new_jersey
      side: left
      text:
        - "Тогда… могу ли я тоже установить себе модуль для авиации?! Если бы я могла использовать самолёты, никто в мире больше не смог бы сдержать мой натиск!"

    - char: helena_meta???
      side: right
      status: is-yellow
      text:
        - "Так не получится."

    - char: new_jersey
      side: left
      text:
        - "Как жаль...."

    - char: helena_meta???
      side: right
      status: is-yellow
      text:
        - "Как вы думаете, что скрывается внутри этого разлома?"

    - char: ticonderoga
      side: left
      text:
        - "Если я скажу «ад», это будет не совсем точно… Но реальность существования этого багрового разлома неоспорима…"
        - "Ты ведь не хочешь сказать, что на самом деле пробила в нашей реальности брешь в иное измерение?!"

    - char: helena_meta???
      side: right
      status: is-yellow
      text:
        - "К сожалению, я не способна на столь грандиозные свершения."
        - "Сирены — мастера маскировки."
        - "Даже если они у вас перед носом, у них припасено бесконечное множество способов скрыть свои следы."
        - "Внутри этого разлома — особое пространство, построенное из ассорти микрослойных соединений и Зеркальных морей."
        - "Места внутри них бывают как прекрасными, так и жестокими. Если погрузиться слишком глубоко, есть риск уже никогда не выбраться обратно."

    - char: new_jersey
      side: left
      text:
        - "Судя по тому, как это выглядит изнутри… в этот раз нам выпало явно не «прекрасное» пространство!"

    - char: helena_meta???
      side: right
      status: is-yellow
      text:
        - "Пошли. Командир ждёт нас впереди… нет."
        - "Командир ждёт впереди именно вас."
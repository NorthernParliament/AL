chapter1:
  rows:

    - text:
      - "С успешным завершением штурма центрального сектора наступательный этап «Операции Сирена» наконец подошёл к концу. Шторм утих не полностью, но Сирены больше не могли организовать сколь-либо масштабную и эффективную контратаку."
      - "Подробные записи сражений с Арбитрами уже доставлены в штаб, но на их полный анализ уйдёт ещё немало времени..."
      - "Хотя мне и хотелось бы прямо сейчас уйти в затяжной отпуск, Сирены во многих районах за пределами сектора NA воспользовались моментом, чтобы расширить зону своего контроля. Пока ситуация не ухудшилась, лучше устранить эту угрозу как можно скорее..."

chapter2:
  rows:

    - char: helena
      side: left
      text:
        - "Командир, флот приближается к гавани PH, обстановка вокруг в норме."

    - char: archerfish
      side: right
      text:
        - "Под водой тоже всё спокойно!"
        - "Как только войдём в порт, я собираюсь съесть всё, что увижу, а потом проспать несколько дней кряду, чтобы восполнить силы и залечить душевные раны после такого изнурительного похода!"

    - char: helena
      side: left
      text:
        - "Это был долгий путь домой, Командир."

    - char: commander
      side: right
      text:
        - "Да уж... От сектора NA (Северной Атлантики) до гавани PH (Пёрл-Харбор) — путь и вправду выдался долгим."

    - char: archerfish
      side: left
      text:
        - "Да какое там «да уж»! Мы же возвращаемся с триумфом после такой великой битвы, нам совсем не обязательно было так спешить!"
        - "Могли бы разок хорошенько отдохнуть или по пути заглянуть куда-нибудь как туристы..."
        - "Но нет, один небезызвестный трудоголик... решил без единой остановки нестись прямиком в гавань PH! Просто поверить не могу..."

chapter3:
  rows:

    - char: commander
      side: left
      text:
        - "Спасибо за службу! Как вернёмся в порт, я угощу вас роскошным ужином!"

    - char: archerfish
      side: right
      text:
        - "Правда?! Можно заказывать всё, что угодно? И Командир всё оплатит?!"

    - char: commander
      side: left
      text:
        - "Всё до последнего цента!"

    - char: archerfish
      side: right
      text:
        - "Хелена, ты слышала? Командир сказал, что по возвращении мы устроим пир горой, и он всё берёт на себя!"

    - char: helena
      side: left
      text:
        - "Ой... Нас... Нас всех?"

    - char: archerfish
      side: right
      text:
        - "Ну конечно! Так что не стесняйся, когда вернёмся — позовём всех сестёр и оторвёмся по полной!"

    - char: commander
      side: left
      text:
        - "Э-э-э..."

    - char: archerfish
      side: right
      text:
        - "Командир, вы ведь так спешили назад в гавань PH, чтобы поскорее взяться за новую работу, верно?"
        - "Мы всё понимаем. Поэтому, как бы тяжело нам ни было в пути, мы без единой жалобы следовали за вами и выполняли приказы."
        - "Такого серьёзного, классного и ответственного Командира мы все очень уважаем!"
        - "А раз так... такой уважаемый человек ведь не станет забирать свои слова назад, правда~?"

    - char: commander
      side: left
      text:
        - "Окееей..."

    - char: archerfish
      side: right
      text:
        - "Хе-хе, ура-а-а!"

chapter4:
  rows:

    - char: commander
      side: left
      text:
        - "Сейчас ситуация повсюду нестабильна, мы не можем позволить себе расслабиться только из-за одной победы..."

    - char: archerfish
      side: right
      text:
        - "Угу, угу, я всё понимаю!"
        - "Командир, вы ведь так спешили назад в гавань PH, чтобы поскорее взяться за новую работу, верно?"
        - "Мы всё понимаем. Поэтому, как бы тяжело нам ни было в пути, мы без единой жалобы следовали за вами и выполняли приказы."
        - "Такого серьёзного, классного и ответственного Командира мы все очень уважаем!"
        - "Просто... если усталость будет и дальше копиться, это ведь скажется на эффективности работы, ну же~"

    - char: commander
      side: left
      text:
        - "В этом есть смысл... Хорошо, как вернёмся, я угощу всех отличным ужином."

    - char: archerfish
      side: right
      text:
        - "Правда?! Можно заказывать всё, что угодно?! И Командир всё оплатит?!"

    - char: commander
      side: left
      text:
        - "Всё до последнего цента!"

    - char: archerfish
      side: right
      text:
        - "Хелена, ты слышала? Командир сказал, что по возвращении мы устроим пир горой, и он всё берёт на себя!"

    - char: helena
      side: left
      text:
        - "Ой... Нас... Нас всех?"

    - char: archerfish
      side: right
      text:
        - "Ну конечно! Так что не стесняйся, когда вернёмся — позовём всех сестёр и оторвёмся по полной!"

    - char: commander
      side: left
      text:
        - "Э-э-э..."

    - char: archerfish
      side: right
      text:
        - "А раз так... такой уважаемый человек ведь не станет забирать свои слова назад, правда~?"

    - char: commander
      side: left
      text:
        - "Окееей..."

    - char: archerfish
      side: right
      text:
        - "Хе-хе, ура-а-а!"

chapter5:
  rows:

    - char: commander
      side: left
      text:
        - "(Похоже, по возвращении в гавань PH мне в любом случае придётся изрядно раскошелиться...)"
        - "(Впрочем, они это заслужили.)"

chapter6:
  rows:

    - char: communicator
      side: left
      text:
        - "Идентификационный номер подтверждён. Доступ к сектору впереди открыт."
        - "Вы находитесь в зоне военного порта. Пожалуйста, следуйте строго по заданному курсу, не отклоняйтесь от маршрута и не совершайте остановок."
        - "С возвращением домой, Командир."
chapter1:
  rows:

    - char: jintsuu_rad
      side: left
      status: is-yellow
      text:
        - "Докладываю обстановку на фронте. Контратрудар Хирю прошёл успешно, Йорктаун из состава сил Союза Орла, получив критические повреждения, вышла из боя."

    - char: shinano_rad
      side: right
      status: is-yellow
      text:
        - "Вот как. А что с Хирю?"

    - char: jintsuu_rad
      side: left
      status: is-yellow
      text:
        - "Ситуация тяжёлая, но она сохраняет ход. Внезапно появившийся флот Сирен помешал дальнейшему преследованию со стороны Союза Орла, мы пользуемся этим моментом для начала спасательной операции."

    - char: shinano_rad
      side: right
      status: is-yellow
      text:
        - "Флот Сирен просто помешал действиям Союза Орла?"

    - char: jintsuu_rad
      side: left
      status: is-yellow
      text:
        - "Нет… в конце концов, это же Сирены, они не особо разбирают цели. Просто авангард Сирен оказался чуть ближе к Союзу Орла, что дало нам немного времени."
        - "Сейчас нас окружают всё новые силы Сирен, запрашиваю разрешение на отступление."

    - char: shinano_rad
      side: right
      status: is-yellow
      text:
        - "Подтверждаю отступление. Никого не оставляйте, возвращайтесь."

    - char: jintsuu_rad
      side: left
      status: is-yellow
      text:
        - "Есть, Дзинцу связь завершила."

    - char: san_francisco
      side: right
      text:
        - "……Говорили же, что это всё заготовленные записи, зачем ты им отвечаешь с таким серьёзным видом…"

    - char: shinano_rad
      side: left
      status: is-yellow
      text:
        - "Даже если это содержимое фиксированных записей, это вовсе не значит, что мне было известно об этих деталях ранее."
        - "Хоть финал и предопределён, если быть внимательной к мелочам и вслушиваться, можно извлечь пользу."

    - char: san_francisco
      side: right
      text:
        - "…Э-э, и что, ты нашла какую-то важную информацию?"

    - char: shinano_rad
      side: left
      status: is-yellow
      text:
        - "Разве вы не подозревали, что у Империи Сакуры и Сирен есть тайные связи?"
        - "Одних этих разрозненных фрагментов недостаточно для веских доказательств, но разве это не пища для размышлений?"

    - char: commander
      side: right
      text:
        - "Значит, отношения между Империей Сакуры и Сиренами куда сложнее, чем мы думали…"

    - char: shinano_rad
      side: left
      status: is-yellow
      text:
        - "Вернёмся к насущному. Флот на передовой скоро отступит, и этот командный корабль — не исключение. Разве вам не пора «сбежать» отсюда?"

    - char: archerfish
      side: right
      text:
        - "Что значит «сбежать», некрасиво звучит…………! Нужно «выбраться», выбраться!"
        - "Ну правда, если бы мы могли это сделать, мы бы не мучились всё это время!"

    - char: shinano_rad
      side: left
      status: is-yellow
      text:
        - "И вправду странно… Могу заверить: лабиринты этого сна гораздо масштабнее, чем кажется."
        - "Раз уж вы оказались здесь заперты… возможно, нечто, что не должно быть показано, скрыто в пространстве за бортом этого корабля……"

    - char: helena_meta_rad???
      side: right
      status: is-yellow
      text:
        - "Верно, здесь и правда спрятано нечто совершенно невероятное."
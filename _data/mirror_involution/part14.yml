chapter1:
  rows:

    - text:
      - "БАБАХ!!!"

    - char: ticonderoga
      side: left
      text:
        - "Тц, становится жарко."
        - "Нью-Джерси, наше авиасоединение снова перехвачено палубными самолётами Империи Сакуры. Огонь такой плотный, что прорваться с ходу не получается…!"

    - char: new_jersey
      side: right
      text:
        - "Не получается? Но ведь там должны быть одни серийные образцы, что происходит?"

    - char: ticonderoga
      side: left
      text:
        - "Сама не понимаю…! Но эти самолёты на голову выше тех, что мы встречали раньше. Они ведут себя почти как… настоящий флот Империи Сакуры."

    - char: new_jersey
      side: right
      text:
        - "Невозможно! Флот Империи Сакуры никак не мог оказаться здесь. К тому же настоящий флот с самого начала шёл бы в полномасштабную атаку, у них нет причин так бездарно разбрасываться самолётами!"
        - "Что с той загадочной союзной авиагруппой?"

    - char: ticonderoga
      side: left
      text:
        - "Все сбиты… Они действовали слишком прямолинейно, скорее как… обычные «Пешки»."

    - char: new_jersey
      side: right
      text:
        - "У меня голова кругом… Сирены используют одни «Пешки», чтобы помочь нам сражаться с другими, более мощными «Пешками», которые они сами же и создали?"

    - char: ticonderoga
      side: left
      text:
        - "Похоже на то. Неужели это тоже часть Реконструкции битвы при AF…?"
        - "Но раз обе стороны «Пешек» на доске, кого тогда представляем мы? И почему они обязательно должны были убрать Командира с «шахматной доски»?.."

    - char: boise_rad
      side: right
      text:
        - "Нью-Джерси…! Там… на старом канале связи… сообщение!"

    - char: new_jersey
      side: left
      text:
        - "А, слушаю, что там?"

    - char: boise_rad
      side: right
      text:
        - "Нет… не это, старый канал, тот, которым мы пользовались раньше…"

    - char: new_jersey
      side: left
      text:
        - "Э? Старый канал, значит? Хорошо, сейчас перенастроюсь!"

    - char: communicator
      side: right
      text:
        - "Пш-ш… пш-ш…"

    - char: hornet_rad
      side: right
      status: is-yellow
      text:
        - "Проклятье! Цель прикрыта огромным количеством истребителей, торпедоносцы не могут нанести эффективный урон! А ведь мы были так близко…………!"

    - char: enterprise_rad
      side: left
      status: is-yellow
      text:
        - "У меня то же самое, ни один торпедоносец не попал в цель, прошу прощения…"
        - "Судя по тому, как они перегруппировывают свои палубные самолёты, наше местоположение, похоже, тоже раскрыто."

    - char: yorktown_rad
      side: right
      status: is-yellow
      text:
        - "Не падайте духом! У авиации Сакуры ещё есть время от вылета до начала атаки, инициатива всё ещё на нашей стороне!"
        - "В этот раз я поведу группу за собой. Давайте вместе, истребители и бомбардировщики, пойдём на прямой прорыв!"
        - "Соберитесь все! Настоящее наступление начинается только сейчас!"

    - char: new_jersey
      side: left
      text:
        - "Хорнет… Энтерпрайз и Йорктаун?"

    - char: morrison_rad
      side: right
      text:
        - "Я нашла это, когда сканировала все каналы своим «Медвежонком»… Э-это… просто невероятно."
        - "Никогда бы не подумала, что нашим подкреплением могут стать они втроём…!"

    - char: boise_rad
      side: left
      text:
        - "Выходит, Йорктаун поправилась, это так замечательно…"

    - char: new_jersey
      side: right
      text:
        - "Нет-нет, это невозможно, как ни крути! Хорнет сейчас в акватории NA, Энтерпрайз в штабе NY, а Йорктаун тоже всё ещё…"
        - "…Короче говоря, эти трое никак не могут одновременно находиться в этом секторе!"

    - char: boise_rad
      side: left
      text:
        - "Тогда как объяснить только что полученное сообщение…………?"

    - char: new_jersey
      side: right
      text:
        - "М-м———— Понятия не имею! Тик, что думаешь?!"

    - char: ticonderoga
      side: left
      text:
        - "Раз Сирены проводят Реконструкцию битвы при AF, весьма вероятно, что перехваченное сообщение — это аутентичные переговоры с того поля боя."

    - char: boise_rad
      side: right
      text:
        - "Значит, всё то время, пока шла операция, Сирены перехватывали наши переговоры…………?"

    - char: new_jersey
      side: left
      text:
        - "Учитывая уровень технологий Сирен, это вполне возможно…"

    - char: ticonderoga
      side: right
      text:
        - "Если исходить из того, что присланные нам на помощь самолёты — это «Пешки», которыми Сирены имитируют наши действия…"
        - "То, возможно, тот сбор данных, которым Сирены занимаются постоянно, нужен им именно для таких экспериментальных симуляций?"

    - char: morrison_rad
      side: left
      text:
        - "Чем больше данных они собирают… тем эффективнее становятся созданные на их основе «Пешки»?!"
        - "Тогда, может быть, те враги, что внезапно стали сильнее, — это и есть новые прототипы «Пешек», которые они сейчас испытывают…!"

    - char: new_jersey
      side: right
      text:
        - "Это плохо! Если «Пешек» такой боевой эффективности поставят на поток, у нас в будущем будет уйма проблем!"
        - "В любом случае, мы обязаны сорвать этот эксперимент. Тик, отзывай палубную авиацию, приоритет — обеспечение ПВО над флотом."
        - "Какими бы мощными ни были эти авиационные «Пешки», как только они приблизятся на дистанцию стрельбы моих MK7, всё будет кончено! Наш флот в конце концов и не специализируется на авиационных дуэлях~"
        - "Моррисон и Бойсе, продолжайте поиск в окрестных водах. Похоже, где-то рядом с нами скрывается целый флот «Пешек» Союза Орла."
        - "Хотя они пока не проявляют враждебности, это всё равно лишь управляемые Сиренами «Пешки», и мне нужно знать их численность и планы!"
chapter1:
  rows:

    - char: morrison
      side: left
      text:
        - "В этом направлении… верно? …Но на радаре нет никаких сигналов…"

    - char: boise
      side: right
      text:
        - "И признаков помех на радаре тоже нет. «Пешки» не могли бы просто так ускользнуть от нашего оборудования..."

    - char: morrison
      side: left
      text:
        - "Может, направление не то, или нам нужно подойти поближе…"
        - "«Медвежонок», продолжай сканировать частоты…"

    - char: boise
      side: right
      text:
        - "Как думаешь, если мы действительно найдём флот «Пешек», не проявляющий враждебности, что нам делать…?"

    - char: morrison
      side: left
      text:
        - "Не знаю… Такого никогда раньше не случалось. Думаю… нужно сначала доложить Нью-Джерси и ждать её приказа…"
        - "Постой-ка…! На радаре только что мелькнула красная точка?"

    - char: boise
      side: right
      text:
        - "Н-неужели там действительно кто-то есть…!"

    - char: hammann?
      side: left
      status: is-yellow
      text:
        - "......."

    - char: boise
      side: right
      text:
        - "Х-Хамманн, что ты здесь делаешь?!"
        - "Эй, не убегай, Хамманн?!"

    - char: morrison
      side: left
      text:
        - "…В погоню!"
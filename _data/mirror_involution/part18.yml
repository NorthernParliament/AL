chapter1:
  rows:

    - text:
      - "БАБАХ!!!"

    - char: ticonderoga
      side: left
      text:
        - "Эта партия «Пешек» действительно отличается от всего, что мы встречали раньше. У них не только значительно возросли боевые характеристики, но и тактические решения кардинально иные…"
        - "Может, дело в использовании совершенно иных командных модулей?… Если такие «Пешки» поступят в массовое производство, последствия будут…!"

    - char: new_jersey
      side: right
      text:
        - "Не волнуйся, не волнуйся~ Раз это всё ещё экспериментальные образцы, нам просто нужно полностью уничтожить этот полигон Сирен, так ведь?"
        - "В конце концов, если выбирать способ победы, то решающее сражение — самый быстрый и приятный вариант~!"

    - char: communicator
      side: left
      text:
        - "Пш-ш… пш-ш-ш…"

    - char: enterprise_rad
      side: left
      status: is-yellow
      text:
        - "Авианосный флот Империи Сакуры потерял боеспособность, битва должна закончиться в ближайшее время!"
        - "Только………… леди Йорктаун была поражена авиагруппой «Хирю» и ранена."

    - char: yorktown_rad
      side: right
      status: is-yellow
      text:
        - "Это лишь пустяковая царапина, вы все слишком бурно реагируете……"
        - "Кхе…"

    - char: hornet_rad
      side: left
      status: is-yellow
      text:
        - "Это совсем не «пустяковая царапина»! Леди Йорктаун, держись, сестрица!!!"

    - char: enterprise_rad
      side: right
      status: is-yellow
      text:
        - "Хамманн!"

    - char: hammann_rad
      side: left
      status: is-yellow
      text:
        - "У-у-у… Хамманн поняла! Я во что бы то ни стало доставлю Йорктаун домой в целости и сохранности!"

    - char: communicator
      side: left
      text:
        - "Пш-ш… пш-ш-ш…"

    - char: boise_rad
      side: right
      text:
        - "…Только что… вы слышали голос на канале связи…?"

    - char: morrison_rad
      side: left
      text:
        - "Йорктаун она… попала под удар, положение критическое… нужно срочно спешить на помощь…!"

    - char: new_jersey
      side: right
      text:
        - "Погодите! А что стало с той «Хамманн», которую вы видели в тумане?"

    - char: boise_rad
      side: left
      text:
        - "Хамманн…? Она появилась лишь на мгновение, а потом растворилась в тумане… нам не удалось её догнать."

    - char: new_jersey
      side: right
      text:
        - "Та Хамманн, с которой вы разминулись, она говорила что-нибудь?"

    - char: morrison_rad
      side: left
      text:
        - "Нет…"

    - char: new_jersey
      side: right
      text:
        - "Безмолвно появилась из тумана и так же безмолвно в нём исчезла. Словно «Пешка»-приманка, которую Сирены выпустили специально для нас."
        - "Я же уже говорила: после того ранения Йорктаун долгое время восстанавливалась в тылу, её физически не может здесь быть."
        - "Эти переговоры — всего лишь трюк Сирен, чтобы сбить нас с толку. Не поддавайтесь на провокации!"

    - char: morrison_rad
      side: left
      text:
        - "Простите… мы ведь головой понимаем, что это флот «Пешек», но когда слышишь переговоры о том, что Йорктаун ранена, сдержаться просто невозможно…"

    - char: new_jersey
      side: right
      text:
        - "Я всё понимаю. В этот раз тактика «Пешек» у Сирен действительно отличается от всего, что было раньше."
        - "Переживать за товарищей — это благородное качество. Ошиблись не вы, а Сирены, которые расставили ловушки, используя ваши добрые чувства!"

    - char: ticonderoga
      side: left
      text:
        - "Похоже, флот «Пешек» Союза Орла тоже действует строго по историческим записям…"
        - "Если так… Моррисон, думаю, нет смысла заставлять Бойсе и остальных продолжать поиски. Мы и так знаем местоположение и примерную численность врага, верно?"

    - char: new_jersey
      side: right
      text:
        - "Хм, если это так… Бойсе, Моррисон, немедленно возвращайтесь на базу. У меня готов новый план операции!"
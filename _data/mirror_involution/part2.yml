chapter1:
  rows:

    - text:
      - "Хотя меня не было здесь какое-то время, в кабинете всё так же чисто, как и раньше."
      - "Мебель и планировка не изменились, но в деталях декора появилось много нового — всё это явно указывало на личность и вкусы временной хозяйки комнаты."
      - "Это что... модель линкора «Нью-Джерси»?"

    - char: new_jersey
      side: left
      text:
        - "Именно! Выглядит внушительно, правда?"
        - "Я собрала её как-то от скуки. Пусть остаётся тебе в качестве прощального подарка."
        - "В конце концов, сейчас в моём распоряжении целая флотилия настоящих серийных кораблей!"

    - char: commander
      side: right
      text:
        - "Ой, Нью-Джерси? Ты здесь?"

    - char: new_jersey
      side: left
      text:
        - "Ну конечно! Пока передача дел не завершена, это всё ещё моя комната!"
        - "Кхм... Давненько не виделись, Командир."

    - char: commander
      side: right
      text:
        - "Мы не встречались с тех пор, как я передавал тебе дела перед отбытием... Не думал, что моё отсутствие так затянется."

    - char: new_jersey
      side: left
      text:
        - "А если считать время с нашего последнего совместного боя, то прошло ещё больше времени!"

chapter2:
  rows:

    - char: commander
      side: right
      text:
        - "Постой, разве мы когда-нибудь сражались бок о бок...?"

    - char: new_jersey
      side: left
      text:
        - "Как жестоко! Я вообще-то тоже приложила руку к операции AF!"
        - "Вспомни: переброска флота подкрепления Саратóги, поддержка из штаба Сан-Диего!"

    - char: commander
      side: right
      text:
        - "(А, точно... Кажется, в штабе Сан-Диего тогда заправляла именно Нью-Джерси.)"

chapter3:
  rows:

    - char: commander
      side: right
      text:
        - "Ты оказала огромную помощь в тылу, обеспечив сбор флота поддержки во время операции AF."

chapter4:
  rows:

    - char: new_jersey
      side: left
      text:
        - "Эх... Если бы к тому времени мои пушки MK7 были готовы, я бы точно рванула на передовую, чтобы задать им жару!"
        - "Ну да ладно~ Если настаивать на том, что это была «совместная битва», звучит и правда натянуто. Давай как-нибудь поработаем вместе по-настоящему!"

    - char: commander
      side: right
      text:
        - "Проблемы, для решения которых потребовалось бы объединить усилия двух командующих театрами военных действий... Должно быть, это что-то крайне серьёзное."

    - char: new_jersey
      side: left
      text:
        - "Например, если Сирены начнут полномасштабное наступление по всему Тихому океану?"

    - char: commander
      side: right
      text:
        - "Только не это... Мы с таким трудом временно стабилизировали ситуацию в секторе NA. Если сейчас начнётся кампания такого же масштаба, предсказать исход будет невозможно."

    - char: new_jersey
      side: left
      text:
        - "Да шучу я, шучу! Но в душе я настроена серьёзно!"
        - "...В «Операцию Сирена» меня тоже не позвали, а я ведь тоже хотела устроить грандиозный переполох в секторе NA, как и ты!"

    - char: commander
      side: right
      text:
        - "М-м...? Разве твой нынешний перевод — это не назначение в сектор NA, чтобы сменить меня?"

    - char: new_jersey
      side: left
      text:
        - "Пока точно не решено. В любом случае, сначала мне нужно вернуться в штаб NY. Время отправления назначено на сегодня, сразу после завершения передачи дел."
        - "Кстати, что это было за ошарашенное лицо, когда ты меня увидел?!"

    - char: commander
      side: right
      text:
        - "Просто когда я вошёл, здесь никого не было, так что... Ты откуда вообще взялась?"

    - char: new_jersey
      side: left
      text:
        - "Из-под стола."

    - char: commander
      side: right
      text:
        - "А-а, понятно, из-под... стола?!"
        - "И что ты там делала...?"

    - char: new_jersey
      side: left
      text:
        - "Кое-что искала..."

    - char: commander
      side: right
      text:
        - "И... что именно?"

    - char: new_jersey
      side: left
      text:
        - "Журнал передачи дел... *шёпотом*"

    - char: commander
      side: right
      text:
        - "Не расслышал... Но давай я помогу тебе с поисками."

    - char: new_jersey
      side: left
      text:
        - "Не надо-не надо-не надо! Не утруждай себя! Просто подожди минутку снаружи, я позову тебя, как только найду!"

    - char: commander
      side: right
      text:
        - "Ладно, тогда я подожду за дверью..."
        - "Хотя... раз уж я здесь, может, проведём передачу дел прямо сейчас?"

    - char: new_jersey
      side: left
      text:
        - "А-а-а... (Что делать, что делать...)"

    - text:
      - "*тук* *тук*"

    - char: ticonderoga
      side: left
      text:
        - "Прошу прощения. Хе-хе, хотя мы какое-то время не виделись, вы двое всё так же хорошо ладите."

    - char: new_jersey
      side: right
      text:
        - "О! Тикон, ты как раз вовремя! Слушай сюда..."

    - text:
      - "Нью-Джерси внезапно оттащила Тикондерогу в угол и начала что-то оживлённо объяснять, активно жестикулируя... Эх, её характер ничуть не изменился."

    - char: ticonderoga
      side: left
      text:
        - "Вот оно что. Командир, церемония передачи дел уже подготовлена в конференц-зале. Пожалуйста, пойдёмте со мной."
        - "Нью-Джерси нужно закончить последние приготовления, она подойдёт чуть позже."

    - char: commander
      side: right
      text:
        - "Без проблем. «Последние приготовления», значит... Она на удивление ответственна."

    - char: new_jersey
      side: left
      text:
        - "Хе-хе, тогда увидимся в конференц-зале, Командир!"
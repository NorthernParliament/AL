chapter1:
  rows:

    - text:
      - "БАБАХ!!!"

    - char: souryuu_meta_d
      side: right
      status: is-red
      text:
        - ".......!!!"

    - char: new_jersey
      side: left
      text:
        - "Тц… Прямое попадание из орудий главного калибра, она просто не может оставаться невредимой после такого?!"

    - char: helena_meta???
      side: right
      status: is-yellow
      text:
        - "Даже если она сражается подобным образом, META всё равно остаётся META."

    - char: new_jersey
      side: left
      text:
        - "Эй—! Раз уж ты смогла проапгрейдить наш радар, есть ли способ заодно проапгрейдить наши орудия главного калибра и системы управления огнём?!"

    - char: helena_meta???
      side: right
      status: is-yellow
      text:
        - "Не спеши, провожу настройку."
        - "Хоть времени и в обрез, у меня есть кое-какие секретные технические наработки."
        - "Взлом запущен ————————— Завершено."
        - "Командир, отдайте приказ флоту снова атаковать монстра."
        - "Корректировку всех параметров я беру на себя, вам нужно лишь обрушить на неё всю имеющуюся огневую мощь."
        - "Позвольте мне увидеть, на что вы способны."

    - char: commander
      side: left
      text:
        - "На поверхности воды, в воздухе и под водой — всем кораблям открыть огонь на поражение!"

    - text:
      - "Пока Нью-Джерси ведет массированный артиллерийский обстрел, флот начинает полномасштабную атаку по врагу со всех направлений."
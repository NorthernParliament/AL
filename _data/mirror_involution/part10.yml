chapter1:
  rows:

    - char: ticonderoga
      side: left
      text:
        - "Авианосец типа «Эссекс», Тикондерога, прибыла на поле боя! Простите за ожидание~"

    - char: boise
      side: right
      text:
        - "С... спасена."

    - char: morrison
      side: left
      text:
        - "Я уж было подумала, что нам здесь конец..."

    - char: ticonderoga
      side: right
      text:
        - "Неужели всё так серьёзно? По-моему, бой был довольно лёгким. Вы ведь тоже немало их посбивали, верно?"

    - char: boise
      side: left
      text:
        - "Э? В самом деле... теперь, когда ты сказала, кажется, так и есть. Хотя эти самолёты и нагнали столько шума, их боевая эффективность просто смехотворна..."

    - char: morrison
      side: right
      text:
        - "И правда... даже я и мой «Медвежонок» не получили ни царапины..."
        - "Простите, просто при виде такого количества самолётов Империи Сакуры в небе я невольно запаниковала..."

    - char: ticonderoga
      side: left
      text:
        - "Если бы ими управляли настоящие авианосцы Империи Сакуры, такая огромная группа самолётов действительно могла бы нанести колоссальный урон."
        - "Но, судя по интенсивности боя, это в лучшем случае лишь «Пешки» чуть выше среднего уровня."

    - char: morrison
      side: right
      text:
        - "Ты права. Настоящий флот Империи Сакуры никак не мог оказаться здесь так быстро..."
        - "Как же здорово! Раз это всего лишь флот «Пешек» Сирен, давайте скорее покончим с оставшимися врагами...!"

    - char: new_jersey
      side: left
      text:
        - "Погодите, не уничтожайте их всех."

    - char: boise
      side: right
      text:
        - "Э? Почему?.."

    - char: new_jersey
      side: left
      text:
        - "Их тактика боя у этих «Пешек» крайне примитивна. Посмотрите, их палубные самолёты после сброса бомб уже готовятся к возвращению на базу."
        - "А раз есть палубная авиация, значит, где-то впереди нас наверняка ждёт авианосное соединение «Пешек»~"

    - char: ticonderoga
      side: right
      text:
        - "Понятно, ты хочешь использовать их, чтобы вычислить местоположение вражеского флота?"

    - char: new_jersey
      side: left
      text:
        - "Именно! Очень удобно, правда же?"
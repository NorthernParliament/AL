chapter1:
  rows:

    - char: hiryuu_rad
      side: left
      status: is-yellow
      text:
        - "Группа истребителей своевременно обнаружила и отразила атаку авиагруппы Союза Орла, авианосному соединению не нанесён никакой ущерб."

    - char: san_francisco
      side: right
      text:
        - "Никакого ущерба… как жаль."

    - char: hiryuu_rad
      side: left
      status: is-yellow
      text:
        - "Вы что-то сказали…?"

    - char: san_francisco
      side: right
      text:
        - "Ничего-ничего… э-хе! Короче говоря, продолжай доклад~"

    - char: hiryuu_rad
      side: left
      status: is-yellow
      text:
        - "М-м. Мы практически установили местоположение авианосного флота Союза Орла, их следующая ударная волна должна скоро подойти."

    - char: san_francisco
      side: right
      text:
        - "Вот оно что, ситуация действительно не терпит отлагательств~"

    - char: hiryuu_rad
      side: left
      status: is-yellow
      text:
        - "Госпожа Акаги планирует отменить вторую волну бомбардировки и заменить бомбы на торпеды, чтобы подготовиться к отражению атаки флота Союза Орла."

    - char: san_francisco
      side: right
      text:
        - "Угу-угу, без проблем, решение Акаги абсолютно верное. Так и делайте, немедленно начинайте подготовку к замене боекомплекта~!"

    - char: hiryuu_rad
      side: left
      status: is-yellow
      text:
        - "Слушаюсь."

    - char: archerfish
      side: right
      text:
        - "Ну ты даёшь…"

    - char: san_francisco
      side: left
      text:
        - "Э-хе-хе! Я ведь довольно убедительно сыграла, правда?~"

    - char: archerfish
      side: right
      text:
        - "Совсем не убедительно! В следующий раз дай мне, я тоже хочу поиграть~"

    - char: san_francisco
      side: left
      text:
        - "Без проблем, без проблем!"

    - char: communicator
      side: right
      status: is-yellow
      text:
        - "Оперативное командование — это не детские игры."

    - char: san_francisco
      side: left
      text:
        - "Э?! Откуда этот голос?!"

    - char: helena
      side: right
      text:
        - "Звук исходит из коммуникатора… но аппарат не был активен…"

    - char: san_francisco
      side: left
      text:
        - "Кто это говорит!? Не прячься, выходи!"

    - char: shinano_rad?
      side: right
      status: is-yellow
      text:
        - "О? Ваша реакция отличается от остальных."
        - "Союз Орла… хотя у меня и есть смутное ощущение, что мы где-то встречались, похоже, у вас его нет."

    - char: shinano_rad
      side: right
      status: is-yellow
      text:
        - "Приятно познакомиться, моё имя Синано. Сейчас я лишь странница, блуждающая в лабиринтах снов."

    - char: archerfish
      side: left
      text:
        - "(Какие ещё сны, какие странники… я… я вообще ничего не понимаю…………)"

    - char: san_francisco
      side: right
      text:
        - "Я тоже… это тоже часть симуляции Сирен? Или это какой-то… рекламный ролик, внезапно прервавший документальный фильм?..)"

    - char: helena
      side: left
      text:
        - "(Я тоже совершенно…………)"

    - char: san_francisco
      side: right
      text:
        - "(Тсс… Командир, ты понимаешь, что вообще происходит?)"

    - char: commander
      side: left
      text:
        - "(Имя «Синано» мне знакомо — кажется, это авианосец Империи Сакуры очень высокого ранга. С самого момента создания она всё время пребывала в глубоком сне, и, насколько я помню, пробудилась только совсем недавно.)"
        - "(Но что ещё важнее — Синано вообще не участвовала в битве при AF… Почему она появилась здесь?)"

    - char: shinano_rad
      side: right
      status: is-yellow
      text:
        - "Шептаться за спинами других — весьма дурной тон, знаете ли. Мы на командном корабле Империи Сакуры, что вы здесь забыли?"

    - char: san_francisco
      side: left
      text:
        - "(Чёрт… нас сейчас раскроют. В такой ситуации главное — не терять напор!)"
        - "Это мы хотели спросить! Зачем вы заперли нас здесь и чего добиваетесь?!"

    - char: shinano_rad
      side: right
      status: is-yellow
      text:
        - "…Я лишь только что прибыла сюда и не ведаю, что происходило ранее."
        - "Значит, вы по какой-то причине оказались заперты на командном корабле Империи Сакуры и вынуждены отдавать приказы флоту?"

    - char: san_francisco
      side: left
      text:
        - "Сразу предупреждаю, если ты собираешься позвать своих, чтобы нас схватить, то ты нам только поможешь! Мы как раз ломаем голову, как открыть эту дверь!"

    - char: shinano_rad
      side: right
      status: is-yellow
      text:
        - "Таковы условия этого сна?.. Дивно и странно."
        - "Раз уж так, не стоит об этом беспокоиться. Я не намерена вмешиваться в ход сновидения. Если уж вы оказались здесь по сценарию, значит, в этом есть своя внутренняя логика и смысл."

    - char: archerfish
      side: left
      text:
        - "Э… сценарий… это что ещё такое?"
        - "Командир, что это за Синано такая? Неужели она, как и мы, оказалась здесь случайно? Она выглядит так, будто сама ни черта не понимает…"

    - char: shinano_rad
      side: right
      status: is-yellow
      text:
        - "М? Ты только что сказала… «Командир»?"

    - char: san_francisco
      side: left
      text:
        - "Чёрт… только не говори, что ты хочешь воспользоваться случаем и напасть на Командира!"

    - char: shinano_rad
      side: right
      status: is-yellow
      text:
        - "И в мыслях не было. С того самого дня я всё искала случая поговорить с тобой, и не думала, что это случится сегодня."

    - char: commander
      side: left
      text:
        - "Мы когда-то встречались…?"

    - char: shinano_rad
      side: right
      status: is-yellow
      text:
        - "Встречались — и не встречались. Ранее, на учениях, организованных тобой, если бы не помощь Амаги, я бы угодила прямо в твою ловушку. Было весьма впечатляюще."

    - char: commander
      side: left
      text:
        - "Учения… Амаги…?"

    - char: shinano_rad
      side: right
      status: is-yellow
      text:
        - "Лишь бред в мимолётном сновидении, не бери в голову."
        - "И тебе не нужно быть столь настороже. Союзники или враги… Бок о бок в бою или насмерть в схватке… Я видела достаточно картин мироздания, чтобы перестать делить мир на чёрное и белое."
        - "М-м… Кажется, в этот раз у меня предостаточно времени. Редкая возможность, не желаете ли побеседовать?"
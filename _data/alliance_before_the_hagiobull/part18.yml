chapter1:
  rows:
  - text:
      - "Присутствие Марко Поло на испытательных полигонах Иерофант, одним словом, обнадёживает."
      - "Ей стоило лишь активировать пару устройств, чтобы взлётно-посадочные полосы для «Руки Трибунала» материализовались из ниоткуда вдоль божественных водных путей."
      - "Это позволяет нам использовать авиационную конфигурацию «Руки Трибунала» в полной мере."
      - "После нашего решения провести Ритуал Объединения Миров Марко Поло выбрала местом проведения Флоренцию — город на самом краю Апеннинского полуострова."
      - "Однако, когда «Рука Трибунала» достигла небес над Генуей, в преисподней, лежащей прямо за имперским барьером, произошли внезапные изменения."

chapter2:
  rows:
  - char: "memphis"
    side: "left"
    text:
      - "Командир, внутри преисподней появилась массивная цилиндрическая структура. Она тянется ввысь!"
      - "Вывожу изображение!"

chapter3:
  rows:
  - text:
      - "Прямая трансляция с места событий выводится на экран перед моим креслом."
      - "Не то чтобы мне это было нужно — колоссальный объект зримо возвышается прямо за окном."
      - "Я пристально смотрю на непрерывно растущий цилиндр сквозь щиты «Руки Трибунала» и барьеры Священной Империи Юнитас."
  - char: "commander"
    side: "left"
    text:
      - "Чёрный шпиль, пронзающий небеса..."
      - "Нет... на первый взгляд он кажется чёрным, но на самом деле он состоит из бесчисленного множества красочных узоров."
  - text:
      - "Узоры сдвигаются и колышутся. По какой-то причине мне на ум приходит фраза «зарядный столб»."
  - char: "helena_kai"
    side: "left"
    text:
      - "Командир, у нас сообщение от Гёц... Она говорит, что из глубин преисподней поднимается огромный объект."
      - "Полагаю, это то же самое, на что мы сейчас смотрим..."
  - char: "marco_polo_a"
    side: "right"
    text:
      - "Ох, это очень плохо... Это сигнализирует о переходе к следующей фазе. Дела принимают скверный оборот!"
      - "Командир, спроси Гёц, остался ли кто-нибудь из её людей в воде!"
      - "Если да, они не должны всплывать — передай им, чтобы ждали меня под водой!"
  - char: "commander"
    side: "left"
    text:
      - "Под водой? Почему?"
  - char: "marco_polo_a"
    side: "right"
    text:
      - "Мы больше не можем действовать по правилам. Мне придётся провести ритуал здесь и сейчас!"
      - "Какая жалость... Я была так рада использовать Ойген и Z2 по полной программе, но теперь всё зависит от меня!"
      - "Скорее открывайте люк. Я буду прыгать! Мне нужно спуститься в преисподнюю кратчайшим путём, встретиться с U-2501 и завершить ритуал!"
  - char: "commander"
    side: "left"
    text:
      - "Ты ведь наверняка помнишь, когда ты в последний раз падала с небес..."
  - char: "marco_polo_a"
    side: "right"
    text:
      - "......"
      - "Хватит болтать о прошлом! Сегодня побеждает чистая бравада!"
      - "Вот увидишь — скоро я вернусь с хорошими вестями!"
      - "До скорого!"

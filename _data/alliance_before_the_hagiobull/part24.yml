chapter1:
  rows:
  - text:
      - "БАБАХ!"
      - "Вдоль границы имперский барьер создавал чёткую линию раздела."
      - "Свет кружится вокруг каждого бойца, наделяя каждый удар силой изгонять грех."
  - char: "konigsberg_meta_unitas"
    side: "left"
    status: "is-meta"
    text:
      - "Божественный свет заставил бездну обнажить клыки."
      - "Это самый тёмный час перед рассветом, последняя предсмертная битва..."
      - "Прекрасная, кровавая, неистовая. Я не могу оторвать от неё взгляд."
  - char: "prinz_eugen"
    side: "right"
    text:
      - "Ещё слишком рано говорить, что враг умирает, Кёнигсберг."
      - "В лучшем случае... возможно, их можно назвать раненым зверем?"
  - char: "konigsberg_meta_unitas"
    side: "left"
    status: "is-meta"
    text:
      - "Хочешь сказать, что их неистовое наступление только началось?"
  - char: "prinz_eugen"
    side: "right"
    text:
      - "Мы должны пустить врагу больше крови. Чем яростнее они сопротивляются, тем ближе к ним смерть."
      - "При условии, что мы сами не истечём кровью первыми, разумеется."
  - char: "konigsberg_meta_unitas"
    side: "left"
    status: "is-meta"
    text:
      - "Хе-хе-хе. Поскольку вы — подкрепление, отправленное самой Её Величеством, мы возлагаем на вас большие надежды."
  - char: "prinz_eugen"
    side: "right"
    text:
      - "Ценю твои комплименты."
      - "Z2, давай в этот раз выложимся на все 300%."
  - char: "z2"
    side: "left"
    text:
      - "Я сделаю всё возможное, но я правда жалею, что не отказалась..."

chapter2:
  rows:
  - text:
      - "БАБАХ!"
      - "Получив сводку о ситуации, опытные бойцы Лиги Сардинии организовали стремительную контратаку на силы преисподней."
  - char: "andrea_doria_meta_league"
    side: "left"
    status: "is-meta"
    text:
      - "Сила концептуальных символов здесь была многократно усилена, а вот негативные эффекты МЕТАморфозы — исчезли."
  - char: "giulio_cesare_meta_league"
    side: "right"
    status: "is-meta"
    text:
      - "Это идеальное место, чтобы сражаться в своё удовольствие."
  - text:
      - "БАБАХ!"

chapter3:
  rows:
  - text:
      - "Великолепный трон парил в небесах. Даже в разгар своей битвы за превосходство в воздухе, Марко Поло руководила сражением под собой."
  - char: "marco_polo_a"
    side: "left"
    text:
      - "Держите устойчивый строй и крепче смыкайте щиты за барьером!"
      - "Ваши мушкеты бьют слишком низко! Берите на пять градусов выше, чтобы соответствовать траектории трассирующих снарядов!"

chapter4:
  rows:
  - char: "marco_polo_a"
    side: "left"
    text:
      - "Построение в две линии! В ДВЕ, живо!"
      - "Чего вы надеетесь достичь в одну линию? Кто, чёрт возьми, командует этим флотом?!"

chapter5:
  rows:
  - char: "marco_polo_a"
    side: "left"
    text:
      - "Ваш строй прорван! Только не говорите мне, что рассчитываете прорвать их блокаду в таком хаосе!"
      - "Авианосцы, пускайте самолёты за мной! Я лично возглавлю атаку!"

chapter6:
  rows:
  - char: "gotz_von_berlichingen_unitas"
    side: "left"
    text:
      - "Что ж... Она уникальный Апостол, этого у неё не отнять."
  - char: "maggiore_baracca_league"
    side: "right"
    text:
      - "Уникальный — подходящее слово. Но не так давно она привела нас к легендарной победе, так что она заслужила моё доверие и уважение!"
  - char: "u2501_unitas"
    side: "left"
    text:
      - "Боевой дух зашкаливает... [Я тоже загорелась >w<]"
  - char: "giosue_carducci_league"
    side: "right"
    text:
      - "Присоединимся к битве, как только завершим развёртывание?"
  - char: "raffaello_league"
    side: "left"
    text:
      - "Погодите! Её Святейшество только что прислала нам срочное сообщение!"
      - "Там сказано... посмотреть наверх?..."
  - char: "prinz_moritz_unitas"
    side: "right"
    text:
      - "Наверх? О... Что-то похожее на пергаментный свиток падает вниз!"
  - char: "raffaello_league"
    side: "left"
    text:
      - "Дайте-ка посмотреть..."
  - char: "giosue_carducci_league"
    side: "right"
    text:
      - "Что там сказано?!"
  - char: "raffaello_league"
    side: "left"
    text:
      - "В свитке Её Святейшества говорится..."
  - char: "marco_polo_a_rad"
    side: "right"
    text:
      - "Развернуть Решётку Божьего Света!"

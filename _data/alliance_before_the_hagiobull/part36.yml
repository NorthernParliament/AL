chapter1:
  rows:
  - text:
      - "Когда свет меркнет, мой разум наконец проясняется."
  - char: "commander"
    side: "left"
    text:
      - "Вроде бы... всё в порядке."
  - text:
      - "Более того, я чувствую себя отдохнувшим, будто только что проснулся после лучшего сна в своей жизни."
  - char: "commander"
    side: "left"
    text:
      - "Меня заставили отдохнуть?"
  - text:
      - "Каковы бы ни были намерения, для меня всё обернулось к лучшему."
  - char: "commander"
    side: "left"
    text:
      - "Мы дома, верно?"
  - text:
      - "Я выглядываю в окно и вижу кусты, сорняки и заросшие руины дворца."
  - char: "commander"
    side: "left"
    text:
      - "Мемфис и Хелена всё ещё спят."
      - "Майнц, Принц Ойген, Z2... Никто ещё не проснулся, да?"
      - "Клемансо исчезла... Как и Алжири с Ла Галиссоньер. Полагаю, они остались..."
      - "Хех... На пути туда я проснулся последним, но в этот раз — первым."
      - "Полагаю, теперь мы квиты."
  - char: "nop"
    side: "right"
    status: "is-meta"
    text:
      - "Ннгх... Это «Рука Трибунала»?"
  - text:
      - "Раздаётся знакомый голос."
  - char: "carabiniere_meta"
    side: "right"
    status: "is-meta"
    text:
      - "Ой? Командир...? Я думала, вы все уже отправились домой."
      - "Я сейчас сплю?"
  - char: "commander"
    side: "left"
    text:
      - "Карабиньере?"
      - "Почему ты с нами?"
  - char: "carabiniere_meta"
    side: "right"
    status: "is-meta"
    text:
      - "С вами...? Что вы имеете в виду?"
      - "Погодите-ка! С вами... Э-это значит, что это не сон, и я действительно отправилась с вами?!"
      - "Как такое могло произойти?!"
  - char: "commander"
    side: "left"
    text:
      - "Не имею ни малейшего понятия."
      - "Может быть, тебя забрали с нами по ошибке, потому что наш контракт ещё не выполнен?"
  - char: "carabiniere_meta"
    side: "right"
    status: "is-meta"
    text:
      - "Ох... А ведь если так подумать, в этом есть смысл! Вы мне ещё не заплатили!"
      - "Могу я получить свои деньги сейчас?"
  - char: "commander"
    side: "left"
    text:
      - "Вряд ли получение денег вернёт тебя домой... Как насчёт того, чтобы мы просто продлили твой контракт?"
  - char: "carabiniere_meta"
    side: "right"
    status: "is-meta"
    text:
      - "Продлили?"
  - char: "commander"
    side: "left"
    text:
      - "Это испытательный полигон бета. Я хотел бы, чтобы ты побыла моим телохранителем, пока мы не найдём способ вернуть тебя домой."
  - char: "carabiniere_meta"
    side: "right"
    status: "is-meta"
    text:
      - "Контракт наёмника, выходящий за пределы миров... Звучит круто! С удовольствием!"
  - char: "commander"
    side: "left"
    text:
      - "Как Командир Лазурного пути, я официально приветствую тебя на испытательном полигоне бета, Карабиньере. Чувствуй себя как дома."
      - "Когда мы прибыли, ты проводила для нас экскурсию по своему миру."
      - "Пришло время и нам отплатить тем же."

chapter1:
  rows:
  - char: "mainz"
    side: "left"
    text:
      - "И это действительно всё?"
  - text:
      - "В соборе Майнц стояла в центре моря свечей, подготовленного Кёльн."
  - char: "koln_meta_unitas"
    side: "right"
    status: "is-meta"
    text:
      - "Именно так. Стой там и сосредоточься на своих чувствах."
  - char: "mainz"
    side: "left"
    text:
      - "И что именно я должна почувствовать?"
  - char: "koln_meta_unitas"
    side: "right"
    status: "is-meta"
    text:
      - "Это место, происхождение твоего имени, смыслы, заложенные в этих вещах, и ожидания, которые с ними связаны."
      - "Во имя Бога, да обретешь ты то, что ищешь."
  - text:
      - "Она завершает последние приготовления и подходит ко мне."
  - char: "commander"
    side: "left"
    text:
      - "Что мне нужно делать?"
  - char: "koln_meta_unitas"
    side: "right"
    status: "is-meta"
    text:
      - "Хагиобулла не предписывает никаких конкретных действий со стороны Трансцендента."
      - "Думаю, твоё присутствие — это всё, что нам нужно."
  - char: "commander"
    side: "left"
    text:
      - "То есть я просто... стою здесь?"
  - text:
      - "Я осматриваюсь, окидывая взглядом собор."
      - "Хоть он и обставлен мебелью этой эпохи, кажется, что это лишь оболочка гигантского механического устройства."
  - char: "commander"
    side: "left"
    text:
      - "(Должно быть, это еще один объект, оставленный Иерофант...)"
      - "(Надеюсь, он безопасен.)"

chapter2:
  rows:
  - text:
      - "Кёльн выходит из собора, оставляя нас двоих внутри."
      - "Среди огней собора начинает эхом разноситься неземной хор."
      - "Майнц внезапно погружается в глубокий сон, словно убаюканная этим звуком."
  - char: "commander"
    side: "left"
    text:
      - "Что это...?"

chapter3:
  rows:
  - text:
      - "Свет материализуется из ниоткуда, заполняя мир вокруг меня."

chapter4:
  rows:
  - char: "sophia"
    side: "left"
    text:
      - "В общественном сознании, естественно, нет сформированного образа кораблей, которые исторически никогда не были достроены."
      - "Чтобы воплотить такие сущности в жизнь с помощью силы Куба Мудрости..."
      - "Во-первых, их чертежи должны быть завершены в достаточных деталях, чтобы их действительно можно было построить."
      - "После этого их концептуальная форма должна быть полностью визуализирована."
      - "Это сделать проще, когда уже существуют сестринские корабли того же класса. В конце концов, использование этих кораблей позволяет легко определить визуальные параметры."
      - "Однако всё становится сложнее, когда такого сестринского корабля не существует."
      - "В таких обстоятельствах наиболее эффективной отправной точкой стало бы имя корабля."
      - "Установление связи между именем и архетипом поможет создать более осязаемую и передаваемую визуальную форму."
      - "Можно ли сказать, что это полный обзор тех пунктов, по которым мы пришли к согласию на данный момент?"
  - char: "anzeel"
    side: "right"
    text:
      - "В общих чертах так и есть. Но я вот о чём подумала: если имя и образ могут существовать независимо друг от друга в течение определенного периода времени..."
      - "Что, если мы попробуем сначала провести визуализацию, затем концептуально привязать её к имени, а затем материализовать с помощью Куба Мудрости?"
      - "Сможет ли это сработать на практике?"

chapter5:
  rows:
  - char: "bismarck_z"
    side: "left"
    text:
      - "Фридрих, эта твоя сила..."
  - char: "friedrich_der_grosse"
    side: "right"
    text:
      - "Не удивляйся. Я всего лишь сделала еще один шаг вперёд как корабль-прототип."

chapter6:
  rows:
  - char: "koln_meta_unitas"
    side: "left"
    status: "is-meta"
    text:
      - "Это место, происхождение твоего имени, смыслы, заложенные в этих вещах, и ожидания, которые с ними связаны."
      - "Во имя Бога, да обретешь ты то, что ищешь."

chapter7:
  rows:
  - char: "commander"
    side: "left"
    text:
      - "Неужели это... Анзил и София обсуждали, как рождаются корабли-прототипы?"
      - "Давать имя безымянному... Вдыхать смысл в бессмысленное..."
      - "Смысл имени, шаг вперёд в эволюции этой связи..."
      - "Я понял... Вот в чём истинная суть ритуала!"
      - "Истинная суть проекта кораблей-прототипов!"
  - text:
      - "В таком случае церемония сертификации гарантированно увенчается успехом и наделит Майнц ещё большей силой."
      - "Поскольку концепция Святого Престола уже была привязана к этому единственному ответу, Ритуал Сошествия также обречен на успех."
      - "Этим ответом является многократное связывание и перевязывание концепций, постепенно накапливающее силу в процессе..."
  - char: "commander"
    side: "left"
    text:
      - "Для этого нам понадобится Марко Поло!"

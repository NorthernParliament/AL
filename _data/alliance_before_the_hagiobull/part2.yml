chapter1:
  rows:
  - text:
      - "Ускорение. Внезапное торможение. И снова ускорение."
      - "Вождение» Клемансо оставляет желать столь лучшего, что я начинаю сомневаться, есть ли у «Руки Трибунала» вообще система подвески."
  - char: "prinz_eugen_rad"
    side: "left"
    text:
      - "...Если бы я знала, что всё будет так плохо, то посадила бы за руль Z2."
  - char: "z2_rad"
    side: "right"
    text:
      - "Эм..."
  - char: "clemenceau_rad"
    side: "left"
    text:
      - "Я вообще-то всё слышу."
  - char: "memphis"
    side: "right"
    text:
      - "Ха-ха-ха..."

chapter2:
  rows:
  - text:
      - "Несмотря на легкую перепалку, «Рука Трибунала» без происшествий добралась до края черной трясины."
      - "Вся машина снова начинает трансформироваться, на этот раз превращаясь в командный корабль."
  - char: "commander"
    side: "left"
    text:
      - "Вот к этому я уже привык."
  - text:
      - "Через окно я внимательно вглядываюсь внутрь этой области."
      - "Похоже, это независимое пространство, сродни Зеркальному Морю, но те части, что я могу видеть отсюда, отличаются."
      - "Однако внутреннее пространство явно гораздо больше, чем можно заметить снаружи. Даже не представляю, насколько оно глубокое."
  - char: "algerie_rad"
    side: "left"
    text:
      - "Мне не по себе от того, на чём мы стоим..."
  - char: "la_galissonniere_rad"
    side: "right"
    text:
      - "Какое совпадение... Я как раз подумала о том же."
  - char: "commander"
    side: "left"
    text:
      - "О, нет... Неужели это МЕТА-коррозия?"
  - char: "algerie_rad"
    side: "right"
    text:
      - "Не думаю. Ни моё тело, ни оснастка не ощущают ничего странного."
      - "Но я чувствую, как от этой бездны исходят очень сильные негативные эмоции."
      - "Это похоже на МЕТАморфоз, но... нет, возможно, всё даже намного серьёзнее."
  - char: "mainz"
    side: "left"
    text:
      - "Хочешь, я пойду внутрь и посмотрю?"
  - char: "clemenceau_rad"
    side: "right"
    text:
      - "В этом нет необходимости. У меня уже есть одна идея... Хорошо, что я пришла подготовленной."
      - "омандир, полагаю, барьер «Руки Трибунала» должен с этим справиться."
  - char: "commander"
    side: "left"
    text:
      - "Всем немедленно вернуться на борт. Клемансо, активируй для нас барьер."
  - char: "memphis"
    side: "right"
    text:
      - "Подождите! Командир, радар обнаружил быстро приближающиеся неизвестные цели!"
  - char: "commander"
    side: "left"
    text:
      - "Значит, здесь всё-таки есть враги. Клемансо, сможет ли барьер их остановить?"
  - char: "clemenceau_rad"
    side: "right"
    text:
      - "Тот, который я активирую прямо сейчас, не может защитить от физических атак, но он способен создать безопасную зону для нашего сражения."
  - char: "commander"
    side: "left"
    text:
      - "Хорошо. Планы меняются. Сражайтесь в пределах барьера и защищайте наш командный корабль!"
      - "Мы будем уничтожать их по мере продвижения вперёд!"

chapter3:
  rows:
  - text:
      - "БАБАХ!"
      - "Несмотря на огромное количество врагов, победа далась нам легко."
      - "Я никогда раньше не видел таких противников, но они напомнили мне сущностей коррозии."
      - "Однако в плане боевых возможностей они были куда слабее."
      - "Таким образом, наш бой продолжался без осложнений."
      - "К тому времени, когда он уже подходил к концу, из-за пределов барьера ворвалась ещё одна фигура."

chapter4:
  rows:
  - char: "carabiniere_meta_unitas_rad"
    side: "left"
    status: "is-meta"
    text:
      - "Крутая же у вас тут божественная колесница! Вы отряд зачистки из Альянса Хагиобуллы?"
      - "Ой! Забыла представиться!"
      - "Я Карабиньере, вольный наёмник! Архиепископ Регенсбурга наняла меня, чтобы разобраться с проблемой надвигающейся преисподней."
      - "Как же мне повезло наткнуться на регулярную армию! Полагаю, эту работу можно считать выполненной!"

chapter5:
  rows:
  - text:
      - "Когда наш сеанс связи с Карабиньере завершается, на мостике повисает неловкая тишина."
  - char: "memphis"
    side: "left"
    text:
      - "Командир... Когда вы посещаете другие тестовые полигоны, всегда так происходит?"
  - char: "commander"
    side: "right"
    text:
      - "Каждый из них уникален, но... да, время от времени такое случается."
  - char: "helena_kai"
    side: "left"
    text:
      - "Карабиньере упомянула «преисподнюю»."
  - char: "prinz_eugen_rad"
    side: "right"
    text:
      - "И что-то насчёт божественной колесницы? Хм."
  - char: "commander"
    side: "left"
    text:
      - "Я озадачен не меньше вашего, но полагаю, нет ничего плохого в том, чтобы познакомиться с местными."
      - "Клемансо, давай поговорим с ней — только не раскрывая наших личностей. Покажи, что мы готовы помочь ей в бою."
      - "Я бы хотел посмотреть, как местные справляются с этой преисподней."
      - "Со всем остальным разберёмся, когда устраним нависшую угрозу."
  - char: "clemenceau"
    side: "right"
    text:
      - "Хе-хе. Поняла."

chapter6:
  rows:
  - text:
      - "БАБАХ!"
  - char: "carabiniere_meta_unitas"
    side: "left"
    status: "is-meta"
    text:
      - "Хм... Мы проредили ряды противника, и не похоже, что их станет больше. Это мой шанс!"
      - "Портативное устройство рассеивания, вперёд!"

chapter7:
  rows:
  - text:
      - "Когда устройство активируется, по всей округе внезапно разносится песнопение."
      - "Прежде чем я успеваю разобрать слова, преисподняя осыпается прахом."
  - char: "carabiniere_meta_unitas_rad"
    side: "left"
    text:
      - "Хе-хе! Ещё одна миссия выполнена."

chapter1:
  rows:
  - text:
      - "Получив срочное сообщение, U-2501 осталась одна посреди тьмы, так и не всплыв на поверхность."
      - "В конце концов, она почувствовала тёплый свет."
  - char: "u2501"
    side: "left"
    text:
      - "Свет? Здесь, внизу?"

chapter2:
  rows:
  - char: "marco_polo_a_rad"
    side: "right"
    text:
      - "Э-э-эй! Ты меня слышишь?"
  - text:
      - "Вместе со светом появился смутный силуэт."
  - char: "u2501_unitas"
    side: "left"
    text:
      - "Ты... Марко Поло, Апостол, не так ли?"
      - "Почему ты прозрачная?"
  - char: "marco_polo_a_rad"
    side: "right"
    text:
      - "Потому что я стала светом, чтобы завершить ритуал вместе с тобой, разумеется!"
  - char: "u2501_unitas"
    side: "left"
    text:
      - "Завершить ритуал...?"
  - char: "marco_polo_a_rad"
    side: "right"
    text:
      - "Верно — для этого ритуала мне нужен ассистент. В конце концов, кто-то же должен погрузить концептуальный якорь!"
      - "Ты ведь уже под водой, видишь? Удачи!"
  - char: "u2501_unitas"
    side: "left"
    text:
      - "Что за... концептуальный якорь? Где он?"
  - char: "marco_polo_a_rad"
    side: "right"
    text:
      - "Это и есть этот самый свет. А теперь открой пошире глаза и уши, хорошо?"
  - text:
      - "В то же мгновение посреди света, казалось, появились якорь и цепь, за которыми последовал гулкий лязг тяжёлого металла."
  - char: "marco_polo_a_rad"
    side: "right"
    text:
      - "Этот свет и есть якорь. Следуй за ним вниз и направь его в самые глубины!"
      - "Судьба мира висит на волоске. Ты справишься с этим?"
  - char: "u2501_unitas"
    side: "left"
    text:
      - "Всё, что мне нужно делать — это продолжать спускаться, верно?"
      - "Хорошо... Предоставь это мне."

chapter3:
  rows:
  - text:
      - "Оставшись одна, U-2501 опускалась всё глубже и глубже. Её текущая глубина намного превышала любой рекорд, который она устанавливала прежде."
      - "Свет продолжал разгонять тьму, но бесформенный ужас постепенно сжимал её сердце."

chapter4:
  rows:
  - char: "u2501_unitas"
    side: "left"
    text:
      - "Дурные мысли..."
      - "Уловки преисподней..."
      - "Это не поколеблет мою решимость..."

chapter5:
  rows:
  - text:
      - "Прошёл ли час? День? Неделя?"
      - "А может, месяц, год или даже сотни лет?"
      - "Само время, казалось, размылось. За этой тонкой завесой света бездна оказывала всё возрастающее давление."
      - "Завеса казалась такой хрупкой, словно могла рухнуть в любой момент и навлечь смерть."

chapter6:
  rows:
  - char: "u2501_unitas"
    side: "left"
    text:
      - "Дурные мысли... становятся отчаяннее..."
      - "Когда я решила совершать глубинные погружения... это было для того, чтобы понять и победить вас."
      - "И наконец... у меня появился шанс."
      - "Вы забрали слишком много моих друзей... и я не позволю вам забрать кого-то ещё."
      - "Я выстою до самого конца..."
      - "Пока свет не прогонит всю тьму..."
      - "Пока победа не будет за нами!"

chapter7:
  rows:
  - text:
      - "Вспыхнул второй луч света."
      - "На этот раз он исходил из самых глубин."
      - "Он постепенно расширялся, создавая единую разделительную линию между поверхностью и глубинами."
      - "Поверх этой новой глади стоял мир, залитый светом."
      - "Новый мир..."
      - "Мир, принадлежащий Лиге Сардинии."

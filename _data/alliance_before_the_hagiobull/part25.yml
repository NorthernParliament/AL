chapter1:
  rows:
  - text:
      - "Как только моя цель прояснилась, я направил «Руку Трибунала» к оборонительной линии Реймса."
      - "Хотя эта территория, удерживаемая Ирисом, находится за пределами имперского барьера, руководство Клемансо уже стабилизировало военную обстановку."
  - char: "commander"
    side: "left"
    text:
      - "Я наконец-то понял твою цель. Ты пришла сюда, чтобы изучить кое-что помимо документов Ортодоксии, не так ли?"
  - char: "clemenceau"
    side: "right"
    text:
      - "Мои поздравления, Командир. Вы чувствуете, что стали понимать меня чуточку лучше?"
  - char: "commander"
    side: "left"
    text:
      - "Ты нашла ответ, который искала?"
  - char: "clemenceau"
    side: "right"
    text:
      - "Как только я обнаружила зацепку, подсказки буквально сами посыпались мне в руки."
      - "Что же касается вас, Трансцендент... Полагаю, вы планируете использовать башню, чтобы постичь значение этого титула?"
  - char: "commander"
    side: "left"
    text:
      - "Я на это надеюсь. Во время ритуала у меня было видение."
      - "Возможно, мы ошибались с самого начала."
      - "Если я прав, то ритуал Трансцендента — это не способ призвать конкретного человека, а средство активации Трансграничного Эксперимента."
      - "Что же касается самого слова, думаю, оно может относиться к чему-то иному, а не ко мне — или, возможно, к конкретному действию..."
      - "Например... Если бы кто-то взошёл на эту башню, стал бы он Трансцендентом?"
  - char: "clemenceau"
    side: "right"
    text:
      - "Взойти по лестнице в небеса, хм?"
      - "Разумная трактовка, не спорю, но звучит как-то чересчур просто."
      - "Более того, обычному человеку вряд ли под силу взобраться на эти чёрные башни."
  - char: "commander"
    side: "left"
    text:
      - "В любом случае, это единственная зацепка, что у меня есть. Мне просто нужно попытаться."
      - "Ух... Я могу целыми днями командовать сражениями с вражеским флотом, но загадки — не мой конёк."
  - char: "clemenceau"
    side: "right"
    text:
      - "А вы рассматривали возможность короткого пути?"
      - "Командир, вы хотите сказать, что узнали о Трансграничном Эксперименте из видения?"
      - "Кто вам о нём рассказал?"
  - char: "commander"
    side: "left"
    text:
      - "Это была Арбитр, назвавшая себя... Император."
      - "Она противостояла чему-то, что называла просто «Оно», чтобы я мог помочь Иерофанту завершить этот эксперимент."
  - char: "clemenceau"
    side: "right"
    text:
      - "Император и Иерофант — единственные, кто руководит этим Трансграничным Экспериментом?"
      - "Предыдущие предполагали сотрудничество нескольких Арбитров, не так ли?"
  - char: "commander"
    side: "left"
    text:
      - "Дьявол тоже здесь. Возможно, требуемое количество участников зависит от того, на какой стадии находится эксперимент?"
  - char: "clemenceau"
    side: "right"
    text:
      - "Дьявол, Иерофант и Император..."
      - "Эти видения вызываются каким-то определённым условием?"
  - char: "commander"
    side: "left"
    text:
      - "Думаю, да, но я понятия не имею, каким именно."
      - "Видение Иерофанта произошло во время Ритуала Объединения Миров, а Императора — во время Ритуала Призыва Императора."
  - char: "clemenceau"
    side: "right"
    text:
      - "Короче говоря, Иерофант по-прежнему не может общаться напрямую, в то время как Император занята противостоянием с чем-то."
      - "Почему бы тогда не попытаться поговорить с Дьявол?"
  - char: "commander"
    side: "left"
    text:
      - "Дьявол... Это может сработать."
      - "Погоди. Твой короткий путь — это просто обратиться напрямую к Дьявол и спросить у неё ответ?"
  - char: "clemenceau"
    side: "right"
    text:
      - "Именно. Найти символ, связанный с демонами, и попытаться провести ритуал в соответствии с логикой этого мира."
  - char: "commander"
    side: "left"
    text:
      - "Тени Греха были бы простым выбором. Однако они исчезают после поражения. Интересно, есть ли способ поймать одну из них..."
  - char: "clemenceau"
    side: "right"
    text:
      - "Я сомневаюсь, что эти монстры действительно являются проявлением концепции демонов, но у меня как раз есть кое-что более подходящее."
      - "Как насчёт этого?"
  - text:
      - "Клемансо поднимает руку, и на землю падает несколько кусков чёрного металла."
  - char: "commander"
    side: "left"
    text:
      - "Какого... У тебя есть обломки самолётов Дьявол?!"
      - "Но Арбитры всегда убирают за собой обломки после боя. Как тебе удалось их заполучить?"
  - char: "clemenceau"
    side: "right"
    text:
      - "Я подобрала их в Царстве Божьем. Неясно, почему она не смогла их сразу забрать, но для меня это стало огромной удачей."
  - char: "commander"
    side: "left"
    text:
      - "Она была довольно сильно «занята» Башней в то время..."
      - "Но да, это настоящая удача. Что натолкнуло тебя на мысль прихватить их с собой?"
  - char: "clemenceau"
    side: "right"
    text:
      - "Я всегда ношу с собой всякую всячину."
  - char: "commander"
    side: "left"
    text:
      - "Например?..."
  - char: "clemenceau"
    side: "right"
    text:
      - "Ничего такого, чем я стала бы с вами делиться."
  - char: "commander"
    side: "left"
    text:
      - "Я так и знал, что ты это скажешь."
  - char: "clemenceau"
    side: "right"
    text:
      - "Хи-хи. Мне лучше заняться подготовкой к ритуалу."
      - "Если вас не затруднит свести к минимуму любые потенциальные отвлекающие факторы — будь то враги или сама преисподняя — я буду вам весьма признательна."
      - "Уверена, что могу доверить это вам."
  - char: "commander"
    side: "left"
    text:
      - "Хочешь, чтобы я возглавил флот? Наконец-то я смогу заняться тем, что умею лучше всего."
      - "Сосредоточься на своих приготовлениях. Со всем остальным я разберусь."

chapter2:
  rows:
  - text:
      - "БАБАХ!"
      - "Враг, может, и стал сильнее, но его всё равно едва ли можно назвать препятствием."
      - "Вскоре нам удалось расчистить обширную безопасную зону."
  - char: "clemenceau_rad"
    side: "right"
    text:
      - "Этого будет достаточно, Командир."
      - "Теперь я использую Чёрное Солнце, чтобы втянуть вас в ритуал."
  - text:
      - "Я получаю внезапное сообщение от Клемансо. По какой-то причине кажется, будто на неё пала тень."
  - char: "commander"
    side: "left"
    text:
      - "(Это помехи?)"

chapter3:
  rows:
  - text:
      - "Чёрное Солнце висит в небе, проливая на мир холодный свет."

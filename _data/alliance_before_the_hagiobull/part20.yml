chapter1:
  rows:
  - text:
      - "Действия Марко Поло были быстрыми и решительными."
      - "Спустя всего пять минут после того, как она выпрыгнула из кабины, мир начал меняться."
      - "Ослепительный свет хлынул из преисподней, создавая слабый контур Апеннинского полуострова."
  - char: "commander"
    side: "left"
    text:
      - "Похоже, ритуал проходит успешно..."
  - text:
      - "Я смотрю на свет вдалеке."

chapter2:
  rows:
  - text:
      - "Однако, не успел я опомниться, как он поглотил и меня."

chapter3:
  rows:
  - text:
      - "Посреди безграничной белизны я различаю три смутные фигуры."
  - char: "hierophant_rad???"
    side: "left"
    status: "is-yellow"
    text:
      - "█▇▇█▇▇▇▇█"
  - char: "devil_rad???"
    side: "right"
    status: "is-yellow"
    text:
      - "▇█▇▇▇▇██▇"
  - char: "emperor_rad???"
    side: "left"
    status: "is-yellow"
    text:
      - "█▇█▇▇█▇▇█▇"
  - char: "commander"
    side: "right"
    text:
      - "Иерофант, Дьявол... А кто третья?"
  - char: "hierophant_rad"
    side: "left"
    status: "is-yellow"
    text:
      - "▇█▇▇▇▇██▇▇▇"
  - char: "devil_rad"
    side: "right"
    status: "is-yellow"
    text:
      - "▇▇▇██▇▇█▇▇█▇▇█▇"
  - char: "emperor_rad???"
    side: "left"
    status: "is-yellow"
    text:
      - "▇██▇▇▇▇██▇▇▇█▇"
  - char: "commander"
    side: "right"
    text:
      - "О чём они говорят?"
      - "Должно быть, Иерофант пытается мне что-то сказать... Почему я ничего не понимаю?"
  - char: "emperor_rad???"
    side: "left"
    status: "is-yellow"
    text:
      - "▇██▇▇▇█▇"
      - "▇██▇▇▇▇█▇▇▇██▇"
      - "▇██▇▇▇█▇▇█▇█"
  - char: "commander"
    side: "right"
    text:
      - "Ты говоришь со мной?"
      - "Кто ты? Что ты пытаешься сказать?"

chapter4:
  rows:
  - text:
      - "Я пытаюсь вглядеться в фигуру передо мной, но внезапно раздаётся оглушительный рёв."

chapter5:
  rows:
  - text:
      - "Он исходил от сгустка света, парящего в воздухе."
      - "Сияние, более ослепительное, чем само солнце, перегрузило мои пять чувств, словно пытаясь помешать мне узнать что-то ещё."

chapter6:
  rows:
  - text:
      - "Мир раскалывается на части. Я осознаю, что снова нахожусь на «Руке Трибунала»."
      - "От полуострова исходит всё усиливающийся свет, но как бы я ни вглядывался, у меня не получается вернуть то таинственное видение."
  - char: "commander"
    side: "left"
    text:
      - "Что-то пытается помешать мне собрать информацию."
      - "Но что это было? Может ли это быть связано с тревогой Иерофанта?"

chapter1:
  rows:
  - text:
      - "Марко Поло преуспела."
      - "Она потрясла всех, сотворив «чудо» таким привлекающим всеобщее внимание способом, на который была способна только она."
      - "На этом испытательном полигоне больше никто и никогда не усомнится в её статусе Апостола."
      - "еперь, когда Ритуал Объединения Миров был завершён, а предварительные условия для Ритуала Призыва Императора — выполнены, пришло время переходить к следующей фазе..."

chapter2:
  rows:
  - text:
      - "Долгие дни пути начали сказываться на всех. На всех, кроме Марко Поло."
      - "Она пребывала в отличном настроении. Даже когда глубокая ночь вступила в свои права, она продолжала скрупулёзно проверять каждую деталь приготовлений к завтрашнему ритуалу."
      - "Хотя на волне своего энтузиазма она заодно втянула в это дело всех, кто оказался поблизости."
  - char: "memphis"
    side: "left"
    text:
      - "Чёрт бы побрал эту Марко Поло!"
  - char: "helena_kai"
    side: "right"
    text:
      - "Командир, мы здесь сами справимся. Не хотите пойти отдохнуть?"
  - char: "commander"
    side: "left"
    text:
      - "Я тоже беспокоюсь о том, как идут её приготовления... Всё равно не смог бы нормально уснуть, пока всё это висит надо мной."

chapter3:
  rows:
  - char: "koln_meta_unitas"
    side: "left"
    status: "is-meta"
    text:
      - "Ваше Святейшество, на завтрашней церемонии будут присутствовать все курфюрсты для прочтения молитвы."
      - "После этого начнётся ритуал."
  - char: "marco_polo_a"
    side: "right"
    text:
      - "Насчёт этого. Давайте примем кое-какие меры безопасности."
      - "На всякий случай, я хочу, чтобы все ушли после того, как молитва будет завершена, будь то люди или девушки-корабли."
  - char: "koln_meta_unitas"
    side: "left"
    status: "is-meta"
    text:
      - "Будет исполнено. У вас возникли какие-то проблемы с содержанием молитвы?"
  - char: "marco_polo_a"
    side: "right"
    text:
      - "Ничего серьёзного. Просто уберите вот эту часть."
  - char: "koln_meta_unitas"
    side: "left"
    status: "is-meta"
    text:
      - "Дайте-ка взглянуть... Вы имеете в виду упоминание «Династии Гогенштауфенов»?"
  - char: "marco_polo_a"
    side: "right"
    text:
      - "Ага. Чересчур конкретные описания ни к чему хорошему не приводят, когда дело касается ритуалов призыва."
  - char: "koln_meta_unitas"
    side: "left"
    status: "is-meta"
    text:
      - "Поняла. У вас есть другие замечания по молитве?"
  - char: "marco_polo_a"
    side: "right"
    text:
      - "Не-а, пока всё отлично. Хотя, пожалуй, я пройдусь по ней в последний раз, прежде чем смогу отдохнуть и подготовиться к великому дню!"
  - char: "koln_meta_unitas"
    side: "left"
    status: "is-meta"
    text:
      - "Прямо сейчас? Не думаю, что у вас останется много времени на отдых, если вы пройдётесь по ней ещё раз..."

chapter4:
  rows:
  - text:
      - "На следующий день..."
      - "В соответствии с согласованными протоколами, после прочтения молитвы все остальные покинули здание. В великом зале остались только мы с Марко Поло."
  - char: "commander"
    side: "left"
    text:
      - "Если все остальные уходят, разве это не значит, что я тоже должен уйти?"
  - char: "marco_polo_a"
    side: "right"
    text:
      - "Э, всё в порядке. Ты не такой, как они. Ты на данном этапе уже настоящий «ветеран», верно~♪"
      - "Ты ведь уже провел ритуал, который призвал меня сюда, так? Этот будет примерно таким же."
      - "К тому же, твоё присутствие добавляет ещё один «клин», который вполне может избавить нас от лишних хлопот..."
  - char: "commander"
    side: "left"
    text:
      - "«Клин»?..."
  - char: "marco_polo_a"
    side: "right"
    text:
      - "Скоро сам всё поймёшь. А теперь узри, как действует твоя Апостол!"
  - text:
      - "Выражение лица Марко Поло внезапно становится серьёзным, и всё её поведение меняется."
      - "Пока с её губ слетают слова хвалы, всё её тело начинает излучать свет."
      - "Вскоре весь зал поглощает её ослепительная аура."

chapter5:
  rows:
  - text:
      - "Посреди бесконечного пространства чистой белизны вырисовывается человеческая фигура."
  - char: "emperor???"
    side: "left"
    status: "is-yellow"
    text:
      - "......"
  - char: "commander"
    side: "right"
    text:
      - "Ты... тот человек, которого я видел в иллюзии ранее? Кто ты? Арбитр?"
  - char: "emperor???"
    side: "left"
    status: "is-yellow"
    text:
      - "&lt;Я известна как Арбитр: Император IV&gt;"
  - char: "emperor"
    side: "left"
    status: "is-yellow"
    text:
      - "&lt;Во имя Императора я пришла, чтобы ответить на твой призыв.&gt;"
      - "&lt;«Оно» явилось, чтобы помешать мне. Поэтому я противостояла «Ему».&gt;"
      - "&lt;Времени остаётся мало.&gt;"
      - "&lt;Трансграничный эксперимент №1... должен быть завершён любой ценой.&gt;"

chapter6:
  rows:
  - text:
      - "Прежде чем я успеваю задать хотя бы один вопрос, фигура растворяется в свете."
      - "Когда моё зрение начинает приходить в норму, я понимаю, что всё ещё нахожусь в великом зале, а Марко Поло продолжает читать песнопения рядом со мной. Подавляющий свет начал сливаться в очертания человека на троне."
      - "Человека, которого я хорошо знал, хотя и лишь в закоулках своей памяти — Фридрих дер Гроссе."
  - char: "friedrich_der_grosse_emp_rad"
    side: "left"
    text:
      - "Этот испытательный полигон... великий зал Императорского дворца... Император Священной Империи Юнитас..."
      - "Никогда бы не могла и представить, что этот титул будет принадлежать мне."
  - char: "friedrich_der_grosse_emp"
    side: "left"
    text:
      - "Несмотря на то, что это всецело неверно истолкованная концепция, она стала реальностью благодаря вбитому в неё клину."
      - "Как интересно."
  - char: "commander"
    side: "right"
    text:
      - "Что ты имеешь в виду под... неверно истолкованной концепцией?"
  - char: "friedrich_der_grosse_emp"
    side: "left"
    text:
      - "Похоже, что Марко Поло ввела тебя в заблуждение и манипулировала тобой ради собственной выгоды, дитя моё."
  - char: "marco_polo_a"
    side: "right"
    text:
      - "Ахаха..."
  - char: "friedrich_der_grosse_emp"
    side: "left"
    text:
      - "Но я оставлю всё как есть, учитывая, что конечный результат оказался приемлемым."
  - char: "marco_polo_a"
    side: "right"
    text:
      - "Хе-хе. Я знала, что уж ты-то поймёшь мои намерения."
  - char: "commander"
    side: "left"
    text:
      - "Так... ты действительно Фридрих дер Гроссе? Та самая, которую я знал по испытательному полигону бета и которая присоединилась к Пеплу?"
      - "...Или ты Фридрих дер Гроссе с другого испытательного полигона? Или нечто ещё более концептуальное?"
  - char: "friedrich_der_grosse_emp"
    side: "right"
    text:
      - "Я вижу, ты уже начал постигать фундаментальные принципы, лежащие в основе кораблей-прототипов, дитя моё."
      - "Впрочем, сейчас не время отвечать на подобный вопрос."
      - "Я была тебе нужна, и я ответила на эту нужду. Это всё, что тебе нужно знать на данный момент."
      - "теперь осталось лишь провести коронацию. Давай же разрешим этот кризис рука об руку."
  - char: "marco_polo_a"
    side: "left"
    text:
      - "Наконец-то, коронация! Я ждала этого целую вечность!"

chapter7:
  rows:
  - text:
      - "Фридрих дер Гроссе садится на трон, а Марко Поло с торжественностью подносит корону и возлагает её на голову Фридрих."
      - "Бесчисленные лучи света, излучаемые короной, устремляются высоко в небо, прежде чем пролиться дождём на каждый дюйм земель империи."
      - "В одно мгновение атмосфера, доминировавшая в Священной Империи Юнитас, трансформируется во что-то совершенно иное."
      - "Сомнения и тревога тают, уступая место обновлённому чувству надежды и решимости."
      - "Апостол короновала Императора. Церемония коронации Священной Империи Юнитас наконец-то завершилась."

chapter1:
  rows:
  - text:
      - "Восседая на сияющем троне, Император внимательно изучала лежащие перед ней отчёты."
      - "Война ещё не закончилась, но она уже переключила внимание на грядущий период восстановления."
  - char: "friedrich_der_grosse_emp"
    side: "left"
    text:
      - "Земли, население, казна..."
      - "Военная мощь, технологический прогресс, культура и религия..."
      - "Антиох кардинально преобразил этот мир. Воистину, у него безграничный потенциал."
      - "Если и есть какая-то польза от поглощённого тьмой мира, так это вытекающее из этого снижение административных расходов..."
      - "Его способность служить центральным узлом между мирами лишь приумножает этот потенциал."
      - "Почти половина шпилей пала за столь короткое время."
      - "В таком случае..."
      - "Как правительница этой Империи, я должна исполнить свою собственную сольную партию."

chapter2:
  rows:
  - text:
      - "Она устремила взгляд за пределы сводчатого потолка дворца, сквозь облака... и в атмосферу мира."
      - "В космическом пространстве, называемом экзосферой, внезапно материализовался веретенообразный объект длиной почти в один километр."
  - char: "friedrich_der_grosse_emp_rad"
    side: "left"
    text:
      - "Стандартная модель Совета MK3000: Орбитальное орудие военного калибра."
  - char: "friedrich_der_grosse_emp"
    side: "left"
    text:
      - "Авторизация: Фридрих дер Гроссе."
      - "Целевой сектор: Бывшая территория Союза Камал."
      - "Координаты цели: Загружены."
      - "Позвольте мне лишь ненадолго вкусить мощь Пепла."

chapter3:
  rows:
  - text:
      - "Так — со всей простотой, быстротой и эффективностью — третий шпиль был стёрт с лица земли."
      - "Исполнив своё короткое соло, Император вернулась к бумажной работе."
  - char: "friedrich_der_grosse_emp"
    side: "left"
    text:
      - "Я должна как можно скорее окончательно утвердить политику восстановления."
      - "Этот мир не сможет сыграть отведённую ему роль..."
      - "Как бы сильно Пеплу ни была нужна база..."
      - "Моему дитя она нужна ещё больше."

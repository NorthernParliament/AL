chapter1:
  rows:
  - text:
      - "Благодаря помощи Иерофант Ритуал Сошествия увенчался успехом."
      - "Марко Поло появилась из ниоткуда в Авиньонском соборе, прямо как на испытательном полигоне тета."
      - "После своего самодовольного и грандиозного появления она была заметно разочарована, обнаружив, что находится в Авиньоне, а не в Риме."
  - char: "commander"
    side: "left"
    text:
      - "(Что Иерофант сказала ей перед тем, как отправить сюда?)"
      - "(Надеюсь, это не было что-то глупое вроде: «Преисподняя разверзлась, конец близок»...)"

chapter2:
  rows:
  - text:
      - "Кёльн возвращается в собор и просит Марко Поло сопровождать её в Бранденбург на коронацию."
      - "Однако..."
  - char: "marco_polo_a"
    side: "left"
    text:
      - "Ваш мир движим символизмом и ритуалами, не так ли? Тогда мне лучше бы разобраться в самом процессе этих ритуалов."
  - text:
      - "Марко Поло взмахивает рукой, заставляя пьедестал подняться над полом собора."
  - char: "marco_polo_a"
    side: "left"
    text:
      - "Подлинник Хагиобуллы... Молодцы, что спасли его из Рима."
      - "Святому Престолу нужно внимательно изучить его, прежде чем принимать решение."
  - char: "koln_meta_unitas"
    side: "right"
    status: "is-meta"
    text:
      - "В Бранденбурге тоже есть копия Хагиобуллы..."
  - char: "marco_polo_a"
    side: "left"
    text:
      - "Именно, копия. А мне нужен оригинал."
      - "Оригинал и копия — это небо и земля."
      - "Например, были ли должным образом скопированы узоры на этой странице?"
  - char: "koln_meta_unitas"
    side: "right"
    status: "is-meta"
    text:
      - "...Узоры?"
      - "Неужели? Эти узоры — какое-то зашифрованное послание?!"
  - char: "marco_polo_a"
    side: "left"
    text:
      - "Разумеется."
      - "В этом и заключается ценность оригинала."
      - "*вздох* Если бы только моя преданная слуга Рафаэлло была здесь."
      - "Полагаю, мне придётся довольствоваться Ойген."
  - char: "prinz_eugen"
    side: "right"
    text:
      - "О? Относишься ко мне так, будто я здесь просто для массовки, да?"
      - "Целая вечность прошла с тех пор, как кто-то смотрел на меня с таким высокомерием."
  - char: "marco_polo_a"
    side: "left"
    text:
      - "Попрошу прощения. Мне нужен ассистент для ритуала — считаешь ли ты себя достойной или нет?"
  - char: "prinz_eugen"
    side: "right"
    text:
      - "Хм... Уверена, Z2 будет более чем счастлива научиться этому."
  - char: "z2"
    side: "left"
    text:
      - "......"
  - char: "koln_meta_unitas"
    side: "right"
    status: "is-meta"
    text:
      - "Ты проводишь ритуал? Но какой именно?"
      - "Простите мою прямоту, но самым эффективным использованием нашего времени было бы отправиться прямиком в Бранденбург на коронацию."
  - char: "marco_polo_a"
    side: "left"
    text:
      - "Это далеко не так срочно, как ты думаешь. Корона никуда не денется — вы должны тщательно выбирать своего Императора."
      - "Коронация не рождает Императора из ниоткуда. Вы вообще нашли подходящего кандидата?"
      - "Надо полагать, что нет. Если бы у вас был кандидат, трон не пустовал бы так долго."
  - char: "koln_meta_unitas"
    side: "right"
    status: "is-meta"
    text:
      - "...Ты права. У нас его нет."
      - "Духовные курфюрсты не имеют права быть избранными, а светские курфюрсты и высшая знать так и не смогли прийти к согласию."
  - char: "marco_polo_a"
    side: "left"
    text:
      - "Видишь? Я понимаю твою спешку, но ты должна сохранять спокойствие."
  - char: "commander"
    side: "right"
    text:
      - "У меня вопрос. Если «символы» совпадут, или как вы там это называете, может ли девушка-корабль стать Императором?"
  - char: "koln_meta_unitas"
    side: "left"
    status: "is-meta"
    text:
      - "Да, но сертифицировать её будет чрезвычайно трудно."
  - char: "commander"
    side: "right"
    text:
      - "Тогда что, если призвать Императора напрямую, как в Ритуале Сошествия?"
      - "Например, Фридрих дер Гроссе."
  - char: "koln_meta_unitas"
    side: "left"
    status: "is-meta"
    text:
      - "Фридрих дер Гроссе... Список имён Хагиобуллы не содержит такой девушки-корабля."
  - char: "commander"
    side: "right"
    text:
      - "Список имён?"
      - "Разве все девушки-корабли в этом мире находятся в этом списке еще до своего создания?"
  - char: "koln_meta_unitas"
    side: "left"
    status: "is-meta"
    text:
      - "Да. Впрочем, очень немногие знают этот секрет..."
      - "Но... Майнц и Марко Поло тоже нет в списке. Возможно, это не совсем невозможно."
      - "Что касается титула Императора, я не слышала имени Фридрих дер Гроссе... В честь какого именно Фридриха она названа? Первого, второго или третьего?"
  - char: "commander"
    side: "right"
    text:
      - "Кажется, второго...?"
  - char: "prinz_eugen"
    side: "left"
    text:
      - "Хм?"
  - char: "marco_polo_a"
    side: "right"
    text:
      - "Пфф..."
  - char: "koln_meta_unitas"
    side: "left"
    status: "is-meta"
    text:
      - "Если она — Фридрих II, тогда с аутентификацией не должно возникнуть проблем."
      - "Однако Ритуал Призыва Императора не зафиксирован в священных текстах..."
  - char: "commander"
    side: "right"
    text:
      - "Об этом не беспокойтесь. Мы с Марко Поло с этим справимся. Не так ли?"
      - "И кстати, почему ты сейчас смеялась?"
  - char: "marco_polo_a"
    side: "left"
    text:
      - "А! Ничего важного. Просто вспомнила забавную шутку!"
      - "Фридрих подойдёт! Предоставьте ритуал призыва нам!"
      - "Хе-хе-хе... Фридрих идеально впишется и в мои планы тоже..."
  - char: "commander"
    side: "right"
    text:
      - "Что ты опять замышляешь?"
  - char: "marco_polo_a"
    side: "left"
    text:
      - "Пока я изучала тайные послания в Хагиобулле, я наткнулась на ритуал, который, кажется, подходит под описание Ритуала Призыва Императора."
      - "Но видишь ли, у него есть обязательное условие. Когда я говорила о подготовке к ритуалу, я имела в виду выполнение этого самого условия."
  - char: "commander"
    side: "right"
    text:
      - "...Ты всё это время держала этот план в голове?"
  - char: "marco_polo_a"
    side: "left"
    text:
      - "Н-ну, разумеется."
  - char: "commander"
    side: "right"
    text:
      - "И скажи на милость, что это за условие?"
  - char: "marco_polo_a"
    side: "left"
    text:
      - "Само Королевство Сицилия!"
  - char: "commander"
    side: "right"
    text:
      - "Что?..."
  - char: "koln_meta_unitas"
    side: "left"
    text:
      - "Королевство Сицилия должно существовать... Возможно, ты права."
  - char: "commander"
    side: "right"
    text:
      - "Я не улавливаю. Что это значит?"
  - char: "marco_polo_a"
    side: "left"
    text:
      - "Не забивай себе этим голову. Ты всё поймёшь, когда придёт время."
      - "Ты ведь призвал меня сюда, потому что тебе понадобился мой особый опыт, не так ли? Так доверься моим решениям!"
      - "Возвращаясь к теме: Ритуал Призыва Императора требует существования Сицилии."
      - "Однако сама Сицилия была поглощена преисподней. Но чтобы отбросить преисподнюю, сперва нужно провести коронацию."
      - "Настоящий парадокс, не находите?"
  - char: "commander"
    side: "right"
    text:
      - "Звучит именно так."
  - char: "marco_polo_a"
    side: "left"
    text:
      - "Но в действительности..."
      - "Испытательный полигон ES-131618 — тот самый, с Лигой Сардинии — имеет нетронутый Апеннинский полуостров, в то время как регионы за его пределами отсутствуют."
      - "Подозрительно хорошо сочетается с этим испытательным полигоном, не правда ли?"
  - char: "commander"
    side: "right"
    text:
      - "...Сочетается?"
      - "Хочешь сказать, ты собираешься соединить их воедино?!"
  - char: "marco_polo_a"
    side: "left"
    text:
      - "В точку!"
      - "С помощью Ритуала Объединения Миров мы свяжем эти два испытательных полигона, чтобы создать одну единую сущность!"
  - char: "commander"
    side: "right"
    text:
      - "Э-это вообще возможно?"
  - char: "marco_polo_a"
    side: "left"
    text:
      - "Хе-хе. Хагиобулла говорит, что да."
      - "Вам всем не хватает сил для борьбы с преисподней, так ведь?"
      - "Люди из Лиги Сардинии действуют по моему приказу. Одно маленькое связующее звено, и бац! Наша огневая мощь возрастает в геометрической прогрессии!"
      - "К тому же, что за Святой Престол без своего собственного Вечного города — Urbs Aeterna?"
      - "Ну? Давай же, восславь мою гениальность!"
  - char: "commander"
    side: "right"
    text:
      - "......"
      - "(Вместо того, чтобы создать Сингулярность для простого соединения двух испытательных полигонов, она хочет наложить их части друг на друга?)"
      - "(Они оба — испытательные полигоны Иерофант. Может ли она включать какой-то основополагающий элемент их дизайна в этот план?)"
      - "(Или это следующий уровень технологии искусственной Сингулярности?)"
      - "......"
      - "При любых других обстоятельствах я бы отверг столь безумный план."
      - "Но Иерофант доверяет тебе. Полагаю, мне тоже придётся тебе довериться."
      - "Думаешь, сработает?"
  - char: "marco_polo_a"
    side: "left"
    text:
      - "Не волнуйся. Я абсолютно уверена."
  - char: "commander"
    side: "right"
    text:
      - "Тогда делай то, что должна."
  - char: "marco_polo_a"
    side: "left"
    text:
      - "О-хо-хо-хо! Принц Ойген и Z2, за мной! Пора готовиться к Ритуалу Объединения Миров!"

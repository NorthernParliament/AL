chapter1:
  rows:
  - text:
      - "Я мало что помню из того, что произошло после того, как я попрощался с Иерофант."
      - "Должно быть, я впал в глубокий сон, потому что все звуки вокруг меня казались смутными."
  - char: "memphis"
    side: "left"
    text:
      - "[Командир]... [Это]..."
  - char: "helena_kai"
    side: "right"
    text:
      - "[Связь с Компилирующим Полем]..."
  - char: "clemenceau"
    side: "left"
    text:
      - "[Не волнуйтесь]... [Просто]..."
  - text:
      - "Мемфис и Хелена кажутся обеспокоенными моей безопасностью, но Клемансо удаётся их успокоить."

chapter2:
  rows:
  - text:
      - "Вскоре, кажется, меня доставили в Бранденбургский дворец."
  - char: "friedrich_der_grosse"
    side: "left"
    text:
      - "[Я должна идти]... [С нетерпением жду твоего роста]..."
  - text:
      - "Фридрих дер Гроссе что-то говорит мне."
  - char: "clemenceau"
    side: "left"
    text:
      - "[Начинаю ритуал]... [Отправляю вас назад]..."
      - "[Драгоценный мир]... [Важный долг]..."
      - "[Трибунал]... [Останется на какое-то время]... [Чтобы восстановить порядок]..."
      - "[Возьмите с собой Марко Поло]..."
      - "[Стабилизация канала]... [Восстановление связи]..."
  - text:
      - "Клемансо, кажется, тоже что-то говорит."

chapter3:
  rows:
  - text:
      - "После этого я слышу голоса Принц Ойген и Z2.."
      - "Кажется, я снова на «Руке Трибунала»."

chapter4:
  rows:
  - text:
      - "Затем мир поглощает ослепительный свет..."
  - char: "commander"
    side: "left"
    text:
      - "Путешествие наконец-то завершилось..."
      - "В кои-то веки я могу отдохнуть..."

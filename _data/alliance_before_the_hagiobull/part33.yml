chapter1:
  rows:
  - text:
      - "После безрассудного злоупотребления силой Иерофант Марко Поло, что неудивительно, погрузилась в глубокий сон."
      - "По словам Рафаэлло, она крепко спала с улыбкой на лице."
  - char: "memphis"
    side: "left"
    text:
      - "Мне кажется, или это происходит постоянно?"
      - "Она врывается, словно ураган, спасает положение, а затем сразу же отправляется спать..."
      - "Должно быть, жить так, как она, очень весело."
  - char: "helena_kai"
    side: "right"
    text:
      - "Невольно ей позавидуешь..."
  - char: "commander"
    side: "left"
    text:
      - "Хм... Мы сможем обсудить её привычки в другой раз."
      - "Ритуал, который она провела в конце, похоже, перевел эксперимент на новую стадию."
      - "Даже пока она спит, преисподняя всё ещё продолжает трансформироваться."
      - "Такими темпами она вполне может и вовсе исчезнуть из этого мира всего через несколько часов."
  - char: "helena_kai"
    side: "right"
    text:
      - "Хотелось бы, чтобы она забрала с собой и последнюю башню..."
  - char: "commander"
    side: "left"
    text:
      - "Неизвестно, что там произойдёт. Пусть пока все ждут и наблюдают."

chapter2:
  rows:
  - char: "memphis"
    side: "left"
    text:
      - "Командир, разрушение преисподней замедляется."
      - "Похоже, область вокруг башни сопротивляется сильнее всего... Некоторые районы и вовсе перестали меняться."
  - char: "commander"
    side: "right"
    text:
      - "Никогда не бывает просто, не так ли? Подготовить все подразделения к бою—"
  - text:
      - "БАБАХ!"
  - char: "commander"
    side: "right"
    text:
      - "Что происходит? Почему только что активировалась система обороны?"
  - char: "memphis"
    side: "left"
    text:
      - "На радаре обнаружены летающие объекты... Погодите, что это?!"
  - char: "helena_kai"
    side: "right"
    text:
      - "Командир, чрезвычайная ситуация! Что-то произошло на линии фронта!"
      - "Передаю кадры с самолёта-разведчика!"

chapter3:
  rows:
  - text:
      - "Тьма отделяется от поверхности воды и поднимается огромной тёмной стеной."
      - "Мне требуется несколько секунд, чтобы осознать, что я вижу на кадрах."
  - char: "commander"
    side: "left"
    text:
      - "Преисподняя... использовала остатки своих сил, чтобы создать летающих врагов?"
  - text:
      - "Эта стена на самом деле — поток чёрных врагов, надвигающихся на Священную Империю Юнитас подобно нашествию саранчи."
      - "Этого достаточно, чтобы заставить поверить, что наступает конец света."
  - char: "commander"
    side: "left"
    text:
      - "Предсмертные судороги преисподней... А я-то уже был готов позволить местным жителям покончить с этим своими собственными руками."
      - "Мемфис, свяжи меня с Фридрих дер Гроссе."
  - char: "friedrich_der_grosse_emp_rad"
    side: "right"
    text:
      - "Я здесь, дитя моё."
  - char: "commander"
    side: "left"
    text:
      - "Враг начинает контратаку. Нам нужно немедленно уничтожить эту башню — ты можешь снова использовать свой орбитальный удар?"
  - char: "friedrich_der_grosse_emp_rad"
    side: "right"
    text:
      - "Всё заряжено и готово."
  - char: "commander"
    side: "left"
    text:
      - "Уничтожь эту башню и покончи с этим."
  - char: "friedrich_der_grosse_emp_rad"
    side: "right"
    text:
      - "Я буду счастлива исполнить твоё желание, дитя моё."

chapter4:
  rows:
  - text:
      - "БАБАХ!"
      - "Божественный свет проливается дождём с небес, стирая последнюю башню с лица этой планеты."
      - "Однако..."

chapter5:
  rows:
  - char: "elbe_meta_unitas"
    side: "left"
    status: "is-meta"
    text:
      - "Тени Греха не исчезают — они становятся только неистовее!"
  - char: "carabiniere_meta_unitas"
    side: "right"
    status: "is-meta"
    text:
      - "Угх... Мне всё это совершенно не нравится!"
  - char: "koln_meta_unitas"
    side: "left"
    status: "is-meta"
    text:
      - "Всем держать барьер и вести огонь по готовности! Мы должны немедленно сократить их численность!"
  - char: "mainz"
    side: "right"
    text:
      - "Фридрих, Командир! Мы не сможем долго удерживать оборонительную линию!"

chapter6:
  rows:
  - text:
      - "Ситуация скатывается в хаос."
      - "С уничтожением башен преисподняя, покрывавшая планету, обратилась в безвредный пепел."
      - "Однако последний штурм врага — совсем другая история."
      - "Каждый отдельный враг слаб и легко уничтожается."
      - "Но им нет числа. Подобно рою саранчи, их подавляющий натиск доводит имперский барьер до грани разрушения."
  - char: "commander"
    side: "left"
    text:
      - "Мы ни на мгновение не можем расслабиться."
      - "Даже если мы одержим победу на всех фронтах, наша оборона в конечном итоге будет смята их численной массой."
      - "То, что наша линия фронта остаётся нетронутой, не будет иметь никакого значения, если наши тылы поглотит море огня."
  - char: "friedrich_der_grosse_emp_rad"
    side: "right"
    text:
      - "Тебе не стоит о них беспокоиться."
      - "В соответствии со своей идентичностью, я буду продолжать поддерживать имперский барьер с этого трона до самого конца."
      - "Дитя моё, как ты планируешь разгадать эту новую тайну?"
  - char: "commander"
    side: "left"
    text:
      - "Возможно, эта ситуация — ещё одно послание от Иерофант."
      - "Например... возможно, она хочет сказать, что прошлое контрнаступление было похоже на это."
      - "Или что она испытывала то же самое чувство бессилия, сражаясь с X."
      - "Должно быть, она пытается заставить меня понять суть этой проблемы — и её решение."
      - "План «Трансцендент», способ перехода в высшее измерение..."
      - "Если так, то решение нашего затруднительного положения должно крыться где-то в нём."
      - "Если бы я только мог постичь истинный смысл Трансцендента..."
      - "Но прямо здесь и сейчас мы несём потери. Я не могу тратить время на разгадывание загадок."
      - "Мемфис, свяжи меня с Клемансо."
  - char: "clemenceau_rad"
    side: "right"
    text:
      - "Командир?"
  - char: "commander"
    side: "left"
    text:
      - "Клемансо, я хочу, чтобы ты подготовила ритуал, используя Чёрное Солнце."
      - "Этот эксперимент близится к завершению, поэтому я хочу воспользоваться ещё одним коротким путём... и лично встретиться с его создателем."
      - "Кажется, она пытается послать мне сообщение, так почему бы не поговорить об этом напрямую?"
      - "Что касается концепции «Понтифика», необходимой для ритуала..."
      - "Пусть Марко Поло блеснёт в последний раз."

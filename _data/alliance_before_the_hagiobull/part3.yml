chapter1:
  rows:
  - text:
      - "После битвы «Рука Трибунала» возвращается в форму наземного транспорта, и я встречаюсь с Карабиньере МЕТА в приемной."
      - "Неудивительно, что знакомство проходит не так гладко, как мне хотелось бы, учитывая наше взаимное недопонимание."
  - char: "carabiniere_meta_unitas"
    side: "left"
    status: "is-meta"
    text:
      - "Значит... Вы гости из другого мира? Не из Альянса Хагиобуллы?"
      - "О, я поняла! Должно быть, вы наёмники, которых они наняли, верно?!"
      - "Ваша группа наёмников действительно сильна! Я имею в виду, у вас есть божественная колесница и всё такое!"
      - "И она называется «Рука Трибунала»? Идеальное имя для божественной колесницы!"
  - text:
      - "Я подумывал исправить её заблуждения, но тогда мне пришлось бы начать с объяснения о Сиренах и испытательных полигонах, а это вряд ли можно назвать продуктивной тратой времени."
  - char: "commander"
    side: "left"
    text:
      - "Ты права — можешь звать нас Наёмниками из Иного Мира."

chapter2:
  rows:
  - text:
      - "Она никак не реагирует на имена Мемфис или Хелены, и встреча с Клемансо её, похоже, тоже не потрясла."
      - "Однако её поведение становится крайне почтительным, когда она сталкивается с Принц Ойген. А при встрече с Майнц она и вовсе замирает как вкопанная."
  - char: "mainz"
    side: "left"
    text:
      - "Карабиньере? В чем дело?"
  - char: "carabiniere_meta_unitas"
    side: "right"
    status: "is-meta"
    text:
      - "Не может быть... Это действительно ты."
      - "Поверить не могу, это Майнц во плоти..."
      - "Теперь, когда Архиепископ Майнца пала, её преемницей стала... девушка-корабль, надо же?!"
      - "Неудивительно, что ваша группа такая могущественная!"
      - "Но разве Хагиобулла не предписывает, что титул курфюрста должен перейти к Архиепископу Регенсбурга?"
      - "Боже мой, всё становится действительно интересным... Кхм. Я имею в виду, неспокойным!"
  - text:
      - "Мы с Клемансо переглядываемся. И мы оба замечаем, что Принц Ойген бросает на нас многозначительный взгляд."
      - "После короткого безмолвного обмена взглядами нам удается сделать так, чтобы Ойген взяла этот разговор на себя."
      - "Карабиньере явно выказывает ей куда больше уважения, чем мне, лидеру этих так называемых наёмников."
  - char: "prinz_eugen"
    side: "left"
    text:
      - "Карабиньере, могу ли я предположить, что ты вернёшься в город Регенсбург, чтобы доложить об успешном выполнении миссии?"
      - "Мы как раз искали проводника, который отвез бы нас туда. Почему бы тебе не принять ещё один заказ по пути домой?"
  - char: "carabiniere_meta_unitas"
    side: "right"
    status: "is-meta"
    text:
      - "Конечно. Я возьму по стандартной рыночной ставке."
  - char: "prinz_eugen"
    side: "left"
    text:
      - "Благодарю. Давай поднимемся на борт «Руки Трибунала» и поговорим по пути."
      - "Меня особенно интересует вопрос, о котором ты упоминала ранее. Есть ли у тебя ещё какие-нибудь подробности, которыми стоит с нами поделиться?"

chapter3:
  rows:
  - char: "carabiniere_meta_unitas"
    side: "right"
    status: "is-meta"
    text:
      - "Чем ещё стоит поделиться? Хм... Пожалуй, на ум приходит только одна вещь."
      - "Недавно Архиепископ Кёльна возглавила проведение древнего ритуала в Имперской Столице. Вокруг этого было очень много шумихи, но завершилось всё на удивление тихо."
      - "Это также никак не повлияло на ход войны... Все начинают думать, что, возможно, ритуал провалился."
      - "О, Имперская Столица? Это, конечно же, Бранденбург, столица Священной Империи Юнитас."

chapter4:
  rows:
  - char: "carabiniere_meta_unitas"
    side: "right"
    status: "is-meta"
    text:
      - "Преисподняя? По-моему, это и так понятно с первого взгляда, разве нет?"
      - "А вот как она сформировалась... этого не могут объяснить даже высшие чины Императорского Дворца и Церкви."
      - "Я, конечно, знаю не больше их. Сколько бы новых теорий ни появлялось, в конечном итоге всё сводится к одному: либо это сам Ад, либо демоны, или что-то в этом роде."
      - "Кое-что о текущей ситуации я всё же могу рассказать... Ну, это неплохая тема для разговора за бокалом вина, но вряд ли она принесёт вам много пользы."
      - "Вы своими глазами видели, как она проявилась прямо за городом..."
      - "Она прорвала имперский барьер и рубежи обороны государства... и теперь появилась прямо в самом сердце империи."
      - "Теперь, когда она поглотила почти всех наших союзников, преисподняя готова поглотить и саму империю..."

chapter5:
  rows:
  - char: "carabiniere_meta_unitas"
    side: "right"
    status: "is-meta"
    text:
      - "Вас интересует моё портативное устройство рассеивания? В нём нет ничего особенного по сравнению с вашей «Рукой Трибунала»."
      - "К тому же, оно не моё — мне его выдал заказчик."
      - "Вам не кажется, что МОИ силы больше заслуживают вашего внимания?"
      - "Это святое благословение, которое можно получить, лишь ухватившись за редкую возможность и пройдя испытание в Чертоге Божественности!"
      - "Хе-хе, как вы наверняка заметили, я могу сопротивляться тёмным силам преисподней даже без защиты божественного механизма!"

chapter6:
  rows:
  - char: "carabiniere_meta_unitas"
    side: "right"
    status: "is-meta"
    text:
      - "Думаете, я недостаточно серьёзно отношусь к преисподней? Что ж, вы, похоже, тоже..."
      - "Нет смысла из-за этого переживать. Всё, что мы можем — это жить одним днём."
      - "К тому же, Священная Империя Юнитас ещё не проиграла!"

chapter7:
  rows:
  - text:
      - "Разговорчивая Карабиньере МЕТА оказывается отличным источником информации."
      - "Мне удается собрать базовые факты об этом испытательном полигоне на основе всей информации, которую она предоставляет — от самой обыденной до поистине шокирующей."
      - "Доминирующая держава этого мира называется Священной Империей Юнитас, и её сфера влияния охватывает всю Европу."
      - "За исключением нескольких разрозненных регионов, все территории за пределами Империи были поглощены преисподней."
      - "В сравнении с другими испытательными полигонами, уровень технологического развития Империи даже ниже, чем у Сардинии."
  - char: "commander"
    side: "left"
    text:
      - "Кстати..."
      - "Не могу не заметить, насколько это место сосредоточено на вере. Она упоминается даже чаще, чем в Сардинии."
      - "Примитивные технологии, культура глубокой веры и контролируемый МЕТАморфоз..."
      - "Здесь явно попахивает Иерофант."
      - "Означает ли это, что она добивается того же, что и в прошлый раз?"
      - "Она хочет, чтобы мы устранили угрозу преисподней и спасли этот испытательный полигон... не так ли?"


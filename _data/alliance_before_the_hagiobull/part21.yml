chapter1:
  rows:
  - text:
      - "Это был обычный, ничем не примечательный день. Вчера солнце зашло как обычно, а затем снова взошло утром, как обычно."
      - "Сегодня был ещё один день, полный надежд, потому что..."
  - char: "raffaello_league"
    side: "left"
    text:
      - "Фреска для потолка собора, над которой я работала, наконец-то готова!"
      - "Как только готовая работа будет сдана, и я получу причитающуюся мне оплату, настанет время наслаждаться светской жизнью и купаться в роскоши довольно долгое время~♪"
      - "Хм-хм~ Ля-ля-ля~ ♪"
  - char: "giosue_carducci_league"
    side: "right"
    text:
      - "Я слышала твоё мычание ещё вон оттуда. Значит, ты закончила с фреской?"
  - char: "raffaello_league"
    side: "left"
    text:
      - "Esattamente!(точно) Подойди и посмотри сама! Это мой шедевр месяца!"
  - char: "giosue_carducci_league"
    side: "right"
    text:
      - "«Триумфальное возвращение Таинства»... В самом деле, я хорошо понимаю тему твоей картины."
      - "Но должна сказать, пейзаж выглядит несколько... странно? Что это за столб? Какой-то фонарь?"
  - char: "raffaello_league"
    side: "left"
    text:
      - "Это называется «уличный фонарь»! Откровение, явленное мне во сне Её Святейшеством, Апостолом!"
  - char: "giosue_carducci_league"
    side: "right"
    text:
      - "Явилось тебе во сне, да... Как мило."
      - "Если бы только Её Святейшество могла посетить и мои сны, и оставить мне слова вдохновения для моих стихов..."
  - text:
      - "Рафаэлло и Джозуэ покинули собор, болтая на ходу."
      - "Постепенно они обе стали различать нарастающий хор удивленных голосов."
  - char: "raffaello_league"
    side: "left"
    text:
      - "...Что за суматоха на обочине дороги? Цирк приехал?"
  - char: "giosue_carducci_league"
    side: "right"
    text:
      - "Нет, кажется, они говорят что-то о небе..."
  - char: "raffaello_league"
    side: "left"
    text:
      - "...О небе, да? Пойдём, я отведу тебя на вершину башни! Оттуда будет лучший вид!"

chapter2:
  rows:
  - text:
      - "Рафаэлло и Джозуэ поднялись на самую высокую башню соборного комплекса."
      - "Солнце всё ещё висело высоко в небе, но оно было окутано густой, мутной тьмой."
      - "Свет и тьма были чётко разделены, словно само небо стало холстом."
      - "Там, на границе между чёрным и белым, парил колоссальный трон."
      - "Хотя силуэт фигуры, восседавшей на троне, было трудно разглядеть, её голос, раскатившийся по всей Лиге Сардинии, было невозможно спутать ни с чьим другим."

chapter3:
  rows:
  - char: "marco_polo_a"
    side: "left"
    text:
      - "Экклезия Сардинии — Республика Флоренция — Республика Генуя —"
      - "Герцогство Милан — Республика Венеция — Королевство Неаполь — Королевство Сицилия —"
      - "Ваша Апостол... вернулась!"

chapter1:
  rows:
  - text:
      - "Девушка открыла глаза среди городских руин."
  - char: "essex_meta"
    side: "left"
    status: "is-meta"
    text:
      - "Где я..."
      - "Почему... я здесь?"
      - "Голова болит... Я ничего не помню."

chapter2:
  rows:
  - text:
      - "Она встала и попыталась осмыслить ситуацию, в которой оказалась."
      - "Однако из-за ослепляющих неоновых огней повсюду было трудно разглядеть, что находится за ними."
  - char: "essex_meta"
    side: "left"
    status: "is-meta"
    text:
      - "Городские руины... но с неоновыми огнями?"
      - "Что-то здесь не так."

chapter3:
  rows:
  - text:
      - "Она стояла у обочины и смотрела на раскинувшийся перед ней город."
      - "Повсюду высились небоскрёбы. Поток машин был бесконечным. Неоновые огни раскрашивали небо над этим неспящим городом."
  - char: "essex_meta"
    side: "left"
    status: "is-meta"
    text:
      - "Странное место..."
  - char: "bristol_tales"
    side: "right"
    text:
      - "Привет, попутчица. Наконец-то очнулась?"
  - text:
      - "Миниатюрная девушка сидела на перилах пешеходного моста. Заметив Эссекс, она улыбнулась и помахала рукой."
  - char: "bristol_tales"
    side: "right"
    text:
      - "Ты оказалась не в том месте и не в то время, что позволило тебе мельком увидеть истинную природу этого мира."
      - "Множество людей, не знающих правды, бесследно исчезли."
      - "Но тебе повезло... Ты выбралась живой."
      - "Те, кто способен пережить первую ночь самостоятельно, как правило, живут долго."
  - char: "essex_meta"
    side: "left"
    status: "is-meta"
    text:
      - "Попутчица?"
  - char: "bristol_tales"
    side: "right"
    text:
      - "Хм? Разве ты не исследовательница, которую привели сюда аномалии?"
      - "Неудивительно, что ты без маскировки... А я-то думала, ты просто самонадеянная."
  - char: "essex_meta"
    side: "left"
    status: "is-meta"
    text:
      - "Маскировки...?"
  - char: "bristol_tales"
    side: "right"
    text:
      - "Ага! Делаешь себя невидимой и сливаешься с окружением, прямо как я."
      - "Хе-хе, видишь? Даже ты не можешь заметить разницу."
  - char: "essex_meta"
    side: "left"
    status: "is-meta"
    text:
      - "Эта маскировка... Кто ты такая?"
      - "И что это за город?"
  - char: "bristol_tales"
    side: "right"
    text:
      - "«Мотылёк, летящий на свет, наконец-то раскрывается в пламени»."
      - "Терпение, хорошо? Я организую тебе маскировку — а пока давай доберёмся до безопасного места, чтобы мы могли поговорить."

chapter4:
  rows:
  - text:
      - "Сон. Когда я открываю глаза, то оказываюсь в ярко освещённом классе."
  - char: "commander"
    side: "left"
    text:
      - "После той встречи, на которой присутствовали Бисмарк и Советский Союз, я просматривал их стратегические отчёты... и, должно быть, уснул в процессе?"
      - "Что и привело меня сюда..."
      - "Тот факт, что я нахожусь в классе, а не на территории кампуса, должно быть, означает... что Мадам М позвала меня сюда."
  - text:
      - "Я оглядываюсь, но в комнате больше никого нет."
  - char: "commander"
    side: "left"
    text:
      - "Пустой класс?"
      - "Какое дежавю..."
  - char: "zero_kid??2"
    side: "right"
    text:
      - "......"
  - text:
      - "Внезапно я осознаю, что передо мной стоит девочка в белом платье."
      - "Её присутствие ощущается таким естественным, будто она стояла здесь всё это время."
  - char: "commander"
    side: "left"
    text:
      - "Это ты меня призвала?"
      - "И в прошлый раз это тоже была ты?"
  - char: "zero_kid??2"
    side: "right"
    text:
      - "Не я. Она."
  - char: "commander"
    side: "left"
    text:
      - "Она...?"
  - char: "zero_kid??2"
    side: "right"
    text:
      - "......"
      - "Она идёт."
  - text:
      - "*тук-тук*"
      - "Раздаётся стук в дверь."
  - char: "bon_omm_richard2?"
    side: "right"
    text:
      - "Эй? Прошу прощения..."
      - "Я слышала, что сегодня здесь проводятся занятия..."
  - char: "commander"
    side: "left"
    text:
      - "ЧТО?!!!"
  - text:
      - "Очередное дежавю."
  - char: "zero_kid??2"
    side: "right"
    text:
      - "Не убегай. Сядь."
  - text:
      - "На этот раз пространство не коллапсирует."
  - char: "bon_omm_richard2?"
    side: "right"
    text:
      - "Учитель?"

chapter5:
  rows:
  - char: "commander"
    side: "left"
    text:
      - "...Привет."

chapter6:
  rows:
  - char: "commander"
    side: "left"
    text:
      - "Бон Омм Ричард...?"

chapter7:
  rows:
  - char: "commander"
    side: "left"
    text:
      - "Ещё не поздно бежать?!"
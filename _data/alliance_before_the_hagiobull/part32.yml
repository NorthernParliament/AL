chapter1:
  rows:
  - text:
      - "Три из пяти внушительных башен исчезли в мгновение ока."
      - "Наша грядущая победа приближалась так же гладко, как поезд, идущий по рельсам."
  - char: "commander"
    side: "left"
    text:
      - "(Преисподняя похожа на низкоуровневое явление коррозии... поэтому Теней Греха можно сравнить с низкоуровневыми сущностями коррозии.)"
      - "(В таком случае, с чем можно сравнить башни?)"
      - "(А ещё есть Марко Поло и Фридрих дер Гроссе...)"
      - "(Они намного превосходят Кансен с других испытательных полигонов с точки зрения силы, но они развили эту мощь иным путём, нежели МЕТАморфоз.)"
      - "(Эта разница становится ещё более весомой после того, как я увидел Родни и Память Меркурия.)"
      - "(На каких принципах были основаны эти два ритуала призыва?)"
      - "(Какой секрет кроется в кораблях-прототипах?)"
      - "(Возможно, мне стоит отследить все зацепки, начиная с момента их прибытия на испытательный полигон бета...)"
  - char: "memphis"
    side: "right"
    text:
      - "Командир, мы скоро достигнем юго-восточной границы."
      - "А ещё... Марко Поло запрашивает канал связи."
  - char: "commander"
    side: "left"
    text:
      - "Марко Поло?"

chapter2:
  rows:
  - char: "marco_polo_a_rad"
    side: "left"
    text:
      - "Хе-хе-хе. Как поживаете, мой дорогой Командир?"
  - char: "helena_kai"
    side: "right"
    text:
      - "Я смотрю, кое-кто уже чересчур увлёкся..."
  - char: "marco_polo_a"
    side: "left"
    text:
      - "Хмф! Не лезь не в своё дело, девчонка!"
      - "Я — Апостол, поэтому я должна излучать определённую властную ауру!"
  - char: "helena_kai"
    side: "right"
    text:
      - "А?!"
  - char: "commander"
    side: "left"
    text:
      - "Эмм... Марко Поло, это командный канал связи. Оставь светские беседы для другого места, пожалуйста."
  - char: "marco_polo_a"
    side: "right"
    text:
      - "Кхм! Я здесь не ради светских бесед!"
      - "Я уверена, что вы все ломаете голову над тем, как лучше всего уничтожить следующую башню."
  - char: "helena_kai"
    side: "left"
    text:
      - "Нет, мы всё очень хорошо спланировали!"
  - char: "marco_polo_a"
    side: "right"
    text:
      - "Ваша Апостол говорит, что вы ломали голову! Значит, так оно и было!"
      - "В-в любом случае! Будучи абсолютно бескорыстной, я решила вмешаться и решить эту головоломку за вас!"
  - char: "commander"
    side: "left"
    text:
      - "Забавный способ произносить слово «эгоистичной». Ладно... Чего ты хочешь?"
  - char: "marco_polo_a"
    side: "right"
    text:
      - "Несколько мгновений назад Фридрих дер Гроссе перетянула всё внимание на себя. Что ж, я разработала план, как превзойти её и даже больше!"
  - char: "commander"
    side: "left"
    text:
      - "Я бы предпочёл не потакать твоей странной тяге к соперничеству, но раз уж ты собираешься нам помочь, я готов выслушать."
      - "Это ведь не вызовет никаких сопутствующих разрушений, верно?"
  - char: "marco_polo_a"
    side: "right"
    text:
      - "И думать забудь!"
  - char: "commander"
    side: "left"
    text:
      - "Тогда что ты хочешь, чтобы я сделал?"
  - char: "marco_polo_a"
    side: "right"
    text:
      - "Я должна сосредоточиться на подготовке ритуала. Пока я этим занимаюсь, ты возьмёшь свой флот, пойдёшь на штурм подножия башни и будешь ждать, когда я свяжусь с тобой."
      - "Видишь? Всё очень просто. Я выполню всю тяжелую работу сама, а славу мы разделим поровну!"
  - char: "commander"
    side: "left"
    text:
      - "Полагаю, это справедливое разделение труда. Постарайся не перегнуть палку, пожалуйста."
  - char: "marco_polo_a"
    side: "right"
    text:
      - "Хо-хо-хо, не волнуйся! Я прекрасно знаю, что делаю!"

chapter3:
  rows:
  - text:
      - "БАБАХ!"
  - char: "regensburg_meta_unitas"
    side: "left"
    status: "is-meta"
    text:
      - "Мы будем сражаться в своё удовольствие, разрывать их на части, пока не насытимся... и сторицей отплатим за те страдания, через которые они заставили нас пройти!"
  - char: "carabiniere_meta_unitas"
    side: "right"
    status: "is-meta"
    text:
      - "Оборона противника рухнула — башня в поле зрения! Всем силам, в атаку!"
  - char: "z15_unitas"
    side: "left"
    text:
      - "В ата-а-аку! Со всей страстью!"
  - char: "z14_unitas"
    side: "right"
    text:
      - "Это конец... Т-только не пораньтесь!"
  - char: "prinz_moritz_unitas"
    side: "left"
    text:
      - "Хи-хи-хи-хи, не волнуйся~ Медсестра Ночных Ужасов хорошенько о тебе позаботится, если ты всё же поранешься!"
  - char: "z14_unitas"
    side: "right"
    text:
      - "Иип... Да, мне лучше быть осторожной..."
  - char: "u2501_unitas"
    side: "left"
    text:
      - "Согласна..."
  - char: "gotz_von_berlichingen_unitas"
    side: "right"
    text:
      - "Мы должны победить, чтобы приблизить светлое завтра!"

chapter4:
  rows:
  - text:
      - "Силы Альянса Хагиобуллы неумолимо продвигаются вперёд, обеспечивая безопасный проход от имперского барьера до самой башни."
  - char: "marco_polo_a_rad"
    side: "left"
    text:
      - "Очень хорошо! Отлично сработано, бойцы!"
      - "Теперь настало моё время!"
      - "Именем Апостола, я призываю взор Господа..."
      - "Господь, очисти эту землю от скверны!"

chapter5:
  rows:
  - text:
      - "Колоссальное око заменяет собой солнце у нас над головой."
  - char: "gotz_von_berlichingen_unitas"
    side: "left"
    text:
      - "Это взор Господа?!"
  - char: "marco_polo_a_rad"
    side: "right"
    text:
      - "Он самый! Сражайтесь с гордостью под неусыпным оком божественного!"
  - text:
      - "Под пристальным взором этого гигантского ока чёрная башня рушится."
      - "Вся преисподняя вокруг неё превращается в безвредную серость."
  - char: "marco_polo_a_rad"
    side: "right"
    text:
      - "Командир, мой святой ритуал завершён. Полагаю, ты впечатлён?"
  - char: "commander"
    side: "left"
    text:
      - "Не хочется этого признавать, но да. В том, что касается зрелищности, с Марко Поло никто не сравнится."
  - char: "marco_polo_a_rad"
    side: "right"
    text:
      - "О-хо-хо-хо!"
      - "Хо-хо-хо... Ой? Я вдруг почувствовала слабость..."
      - "Что со мной происходит?"

chapter1:
  rows:
  - text:
      - "К тому времени, как мы закончили наши дела в городе Страсбург, солнце уже скрылось за горизонтом."
      - "Как и в Регенсбурге, в здешнем замке и соборе есть электрическое освещение, которое они называют «божественными механизмами». Однако остальная часть города освещается лишь редкими факелами да масляными лампами."
      - "Из-за этого ночью город погружается почти в полную тьму."
      - "Когда я иду на встречу с Клемансо, чтобы расспросить о подводном устройстве на Всемирной выставке, меня останавливает кое-кто неожиданный."

chapter2:
  rows:
  - char: "elbe_meta_unitas"
    side: "left"
    status: "is-meta"
    text:
      - "Приветствую, Командир. Я Эльба. Рада нашему знакомству..."
  - char: "commander"
    side: "right"
    text:
      - "И тебе здравствуй, Эльба."
      - "Ты выглядишь неважно. Что-то случилось?"
  - char: "elbe_meta_unitas"
    side: "left"
    status: "is-meta"
    text:
      - "Ценю вашу заботу. Видите ли, я надеялась поговорить с Клемансо по поводу курфюрста Майнц."
      - "Но теперь... Полагаю, этот вопрос стал менее сложным."
      - "Какая неспокойная выдалась ночь..."
      - "По пути сюда я получила срочные вести... Говорят, наступление преисподней усилилось, прямо как нас и предупреждали."
  - char: "clemenceau"
    side: "right"
    text:
      - "Линия фронта держится?"
  - char: "elbe_meta_unitas"
    side: "left"
    status: "is-meta"
    text:
      - "В городе Реймс ситуация стала критической... Архиепископ Трира и вся её гвардия пали. Крушение обороны Альянса Хагиобуллы — лишь вопрос времени."
  - char: "clemenceau"
    side: "right"
    text:
      - "Ещё одна курфюрст пала... Это тяжелая утрата."
      - "Полагаю, это действительно снимает вопрос с Майнц."
  - char: "commander"
    side: "left"
    text:
      - "Можешь объяснить, что именно это должно значить?"
  - char: "clemenceau"
    side: "right"
    text:
      - "Это касается её статуса."
      - "Как следует из названия, курфюрсты — это могущественные лорды, наделенные правом избирать нашего нового Императора."
      - "Согласно декрету Хагиобуллы, всего существует семь курфюрстов. Наследование этих титулов обычно происходит по праву преемственности."
      - "Когда Империя сталкивается с серьёзной угрозой, система меняется, отдавая приоритет девушкам-кораблям."
      - "Архиепископ Трира была одной из курфюрстов, и девушка-корабль Майнц следующая в линии преемственности."
      - "Короче говоря, завтра она станет курфюрстом."
  - char: "commander"
    side: "left"
    text:
      - "Даже несмотря на то, что мы не из этого мира?"
  - char: "elbe_meta_unitas"
    side: "right"
    status: "is-meta"
    text:
      - "Это не проблема. Главное — как она отреагирует на предзнаменование..."
      - "Иными словами, захочет ли она помочь нам."
  - char: "commander"
    side: "left"
    text:
      - "Разумеется. В конце концов, именно поэтому мы здесь."
      - "Если отбросить политическую ситуацию..."
      - "Альянс Хагиобуллы — это объединённые вооруженные силы, состоящие из Священной Империи Юнитас и выживших союзников, верно?"
      - "Нужны ли Реймсу девушки-корабли? Смогут ли они пережить эту ночь?"
  - char: "elbe_meta_unitas"
    side: "right"
    status: "is-meta"
    text:
      - "Хм... Большая часть территории Ириса была поглощена преисподней, но линия обороны Реймса остаётся непоколебимой."
      - "Все оставшиеся силы Ириса сосредоточены там, так что они должны продержаться ещё одну ночь."
      - "Что же до того, сколько они продержатся потом, ну..."
      - "Я призвала подкрепления, чтобы они собрались за ночь, и надеюсь отправить их в течение двух дней..."
  - char: "commander"
    side: "left"
    text:
      - "Это может быть слишком поздно."
      - "Сперва мы отправимся туда, чтобы помочь им. Можно ли использовать водные пути ночью?"
  - char: "elbe_meta_unitas"
    side: "right"
    status: "is-meta"
    text:
      - "Их можно использовать, если прервать техническое обслуживание... Я прикажу немедленно активировать их."
  - char: "commander"
    side: "left"
    text:
      - "Предупреди остальных, Клемансо. Мы выступаем немедленно."
  - char: "clemenceau"
    side: "right"
    text:
      - "Уже сделано. Наёмницы также будут сопровождать нас на этой миссии."
      - "Все уже должны направляться к «Руке Трибунала»."
  - char: "commander"
    side: "left"
    text:
      - "Понял. Пойдём присоединимся к ним."
      - "Пора своими глазами увидеть угрозу, с которой столкнулся этот мир."
  - char: "elbe_meta_unitas"
    side: "right"
    status: "is-meta"
    text:
      - "Я оставляю ситуацию в Реймсе в ваших надёжных руках. Пусть свет Божий ведет нас к победе..."

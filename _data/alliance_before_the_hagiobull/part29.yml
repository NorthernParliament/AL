chapter1:
  rows:
  - text:
      - "Появление чёрных башен вызвало панику по всей Священной Империи Юнитас."
      - "Однако в Лиге Сардинии это не вызвало ни малейшего волнения."
  - char: "giosue_carducci_league"
    side: "left"
    text:
      - "Объединение наших миров было куда более удивительным, чем это..."
  - char: "raffaello_league"
    side: "right"
    text:
      - "Представьте, как расширились наши горизонты! Я уже целую вечность не видела всех такими энергичными."
      - "Хвала Её Святейшеству и её мудрым решениям!"
      - "Ведите нас к победе над врагами и сияющему будущему!"
  - char: "marco_polo_a"
    side: "left"
    text:
      - "О-хо-хо-хо! Обожаю ваши восторженные возгласы! Очень хорошо!"
      - "Надеюсь, ты запечатлела мои подвиги?"
  - char: "raffaello_league"
    side: "right"
    text:
      - "Агась!"
  - char: "marco_polo_a"
    side: "left"
    text:
      - "Превосходно! Я планирую открыть памятную галерею, и, возможно, поручу тебе создание всех картин. Что скажешь?"
  - char: "raffaello_league"
    side: "right"
    text:
      - "Это будет честью для меня, Ваше Святейшество!"
      - "Хе-хе... Скоро я буду сказочно богата!"
  - char: "giosue_carducci_league"
    side: "left"
    text:
      - "......"
  - char: "marco_polo_a"
    side: "right"
    text:
      - "Ваша Апостол приняла решение! Мы сами уничтожим одну башню!"
      - "И только посмотрите — одна как раз прямо у нас на пороге."
      - "О-хо-хо-хо! Вы видели эти копья света?"
      - "Командир устроил из этого целое шоу. Мы не должны отставать, девочки!"
  - char: "giosue_carducci_league"
    side: "left"
    text:
      - "Эмм... Что конкретно вы хотите, чтобы мы сделали?"
  - char: "marco_polo_a"
    side: "right"
    text:
      - "Командир должен быть уже в пути. Организуйте церемонию приветствия — детали не важны, главное, чтобы это выиграло мне время."
      - "Рафаэлло, свяжись с каждой церковью в регионе и прикажи им настроить Источник Божьего Света на эту частоту."
  - text:
      - "Она протягивает Рафаэлло листок бумаги с цепочкой цифр."
  - char: "raffaello_league"
    side: "left"
    text:
      - "Это что-то новенькое... Неужели это?"
  - char: "marco_polo_a"
    side: "right"
    text:
      - "Решётка Божьего Света тоже может менять режимы!"
      - "К вашему сведению, я была первой, кто додумался использовать копья света в качестве оружия."
      - "Самое время показать всем подлинный оригинал!"
      - "Я сотку великое копьё света из Решётки Божьего Света и нанесу один-единственный сокрушительный удар по этому уродливому шпилю!"
      - "Пусть весь мир станет свидетелем мощи Апостола — и заодно как следует шокируем Командира в процессе! О-хо-хо-хо!"

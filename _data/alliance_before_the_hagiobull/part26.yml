chapter1:
  rows:
  - text:
      - "Чёрное Солнце висит в небе, проливая на мир холодный свет."
  - char: "devil"
    side: "left"
    status: "is-yellow"
    text:
      - "Какого... Что здесь происходит?"
  - text:
      - "Дьявол сидит верхом на своей оснастке в виде шлема, с явным удивлением глядя на Клемансо и меня."
      - "Я никогда не видел у неё таких нескрываемых эмоций."
  - char: "devil"
    side: "left"
    status: "is-yellow"
    text:
      - "Обычно это я осуществляю принудительный доступ к испытательному полигону. Впервые роли поменялись..."
      - "Я впечатлена темпами ваших технологических инноваций."
  - char: "commander"
    side: "right"
    text:
      - "Давно не виделись, Дьявол."
  - char: "devil"
    side: "left"
    status: "is-yellow"
    text:
      - "Прошу прощения. Разве мы с тобой были достаточно близки, чтобы вот так запросто обмениваться приветствиями?"
      - "Поосторожнее, или я сотру тебя в порошок прямо сейчас."
  - char: "commander"
    side: "right"
    text:
      - "Я прекрасно знаю, что сейчас ты не можешь причинить мне реального вреда. Давай отложим угрозы в сторону."
  - char: "devil"
    side: "left"
    status: "is-yellow"
    text:
      - "Кто тебе это сказал? И почему они сливают тебе столько информации?!"
  - char: "commander"
    side: "right"
    text:
      - "Буду честен — это была догадка. Но спасибо, что подтвердила мою правоту."
  - char: "devil"
    side: "left"
    status: "is-yellow"
    text:
      - "......"
      - "Хватит. Если у тебя нет ко мне серьёзного дела, то я возвращаюсь к работе."
  - char: "commander"
    side: "right"
    text:
      - "Подожди. У меня есть серьёзное дело!"
  - char: "devil"
    side: "left"
    status: "is-yellow"
    text:
      - "У тебя есть один шанс. Когда я вернусь, я так перенастрою свой механизм отклика, что вы больше не сможете использовать этот баг."
  - char: "commander"
    side: "right"
    text:
      - "Мы использовали наш козырь только ради того, чтобы помочь вам. Не думаешь, что мы заслуживаем лучшего отношения?"
  - char: "devil"
    side: "left"
    status: "is-yellow"
    text:
      - "Ты явно не знаешь своего места."
      - "Ладно... У тебя есть ДВА. И это, кстати, был первый. А теперь говори уже, что тебе нужно!"
  - char: "commander"
    side: "right"
    text:
      - "Что именно Иерофант хочет, чтобы я сделал?"
      - "Пожалуйста, давай без загадок, от которых болит голова. Объясни мне так, будто мне пять лет."
  - char: "devil"
    side: "left"
    status: "is-yellow"
    text:
      - "......"
      - "Иерофанту требуются концепции достаточной силы, чтобы вознестись в высшее измерение."
      - "Этот испытательный полигон служит резервуаром для необходимой энергии."
  - char: "commander"
    side: "right"
    text:
      - "Получается, Трансцендент относится к самой Иерофанту?"
      - "Она возносится, чтобы сбежать от своих текущих обстоятельств? Или у неё другая цель на уме?"
      - "Что это за Трансграничный Эксперимент?"
  - char: "devil"
    side: "left"
    status: "is-yellow"
    text:
      - "У меня нет полномочий разглашать эту информацию."
  - char: "commander"
    side: "right"
    text:
      - "Хорошо... В чём смысл чёрных башен?"
      - "Почему их именно пять?"
  - char: "devil"
    side: "left"
    status: "is-yellow"
    text:
      - "Они-то? Это просто заметные мишени."
      - "Предлагаю тебе разнести их все на куски во имя Господа."
      - "Энергия накапливается эффективнее, когда стимулируются позитивные намерения."
      - "Что касается того, почему их пять? Мы рассматривали варианты 15, 72 и даже 999."
      - "Но представь, каково было бы уничтожать 999 таких штук."
      - "Я бы сказала, что вам с лихвой хватило возни с Бутонами Полной Луны."
  - char: "commander"
    side: "right"
    text:
      - "Был ли мир Глориес МЕТА просто ещё одной жертвой ради ваших Трансграничных Экспериментов?"
      - "Если бы мы тогда не призвали Колесницу... что бы случилось?"
  - char: "devil"
    side: "left"
    status: "is-yellow"
    text:
      - "Каждый мир, связанный с бутонами, подвергся бы вторжению мимикрирующих сущностей II класса, что принесло бы бесчисленное множество образцов для исследований."
  - char: "commander"
    side: "right"
    text:
      - "А что произойдёт, если мы не сможем разрешить ситуацию здесь?"
  - char: "devil"
    side: "left"
    status: "is-yellow"
    text:
      - "Негативные концепции — всё равно концепции."
  - char: "commander"
    side: "right"
    text:
      - "......"
  - char: "devil"
    side: "left"
    status: "is-yellow"
    text:
      - "Ещё вопросы? Если нет, то тебе лучше поторопиться."
      - "Хе-хе. Удачи там."

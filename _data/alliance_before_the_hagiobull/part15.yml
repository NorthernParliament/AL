chapter1:
  rows:
  - text:
      - "Пройдя по водному пути до Генуи, отряд Гёц поспешил на военную базу Альянса Хагиобуллы."
      - "Будучи прибрежным городом, защищённым имперским барьером, Генуя сохранила за собой часть прибрежного региона."
      - "Это делало её идеальным местом для наблюдения за преисподней и проведения глубинных погружений, и именно здесь сосредоточились многие из остатков сил Сардинской Лиги."
  - char: "francesco_caracciolo_sic"
    side: "left"
    text:
      - "Не думала, что вы вернётесь так скоро."
  - char: "gotz_von_berlichingen_unitas"
    side: "right"
    text:
      - "И правда... Мы вернулись быстро, да к тому же без единого Свитка Глубинного Погружения."
      - "Но, как ты знаешь, ситуация может измениться в мгновение ока. По крайней мере, курфюрсты признали ценность глубинных погружений."
      - "Кстати, Караччоло, ты когда-нибудь слышала о ритуале Трансцендента за время своего пребывания в Риме?"
      - "Для чего именно он нужен? Это ритуал, который призывает кого-то по имени Трансцендент с небес? Это как-то связано с «Наёмниками из Иного Мира»?"
  - char: "francesco_caracciolo_sic"
    side: "left"
    text:
      - "Боюсь, я и сама не так уж много знаю об этом ритуале."
      - "Я слышала слухи о наёмниках, о которых ты говоришь."
      - "Если мне выпадет возможность поговорить с ними лично, возможно, мне удастся что-то выяснить..."
  - char: "alberto_di_giussano_unitas"
    side: "right"
    text:
      - "Авиньон не так уж далеко. Как только их ритуал завершится, мы сможем придумать предлог, чтобы заставить их приехать сюда."
  - char: "francesco_caracciolo_sic"
    side: "left"
    text:
      - "Так не получится."
      - "Если Ритуал Сошествия пройдёт гладко, то Кёльн поспешит провести коронацию как можно скорее."
      - "А значит, они направятся в Бранденбург, а не в Геную."
      - "Но если ты настаиваешь... Возможно, я смогу найти подходящую возможность."
  - char: "alberto_di_giussano_unitas"
    side: "right"
    text:
      - "Ахаха... Давайте сначала займёмся делом!"
      - "U-2501, я распорядилась о проведении Ритуала Защиты Глубинного Погружения."
      - "Когда ты погрузишься? И как глубоко планируешь?"
  - char: "u2501_unitas"
    side: "left"
    text:
      - "...До предела."
      - "Я хочу подтвердить некоторые теории..."
  - char: "alberto_di_giussano_unitas"
    side: "right"
    text:
      - "Теории, хм?"
  - char: "gotz_von_berlichingen_unitas"
    side: "left"
    text:
      - "В этой поездке мы узнали важную информацию. Предположительно, использование Свитков Глубинного Погружения для входа в преисподнюю ослабляет имперский барьер."
      - "U-2501 предполагает, что преисподняя и барьер могут быть двумя разными проявлениями одной и той же силы."
      - "Короче говоря, благие намерения создают барьер, а злые намерения создают преисподнюю."
      - "Как иронично, что мы решили назвать их Тенями Греха — призраками злого умысла."
  - char: "francesco_caracciolo_sic"
    side: "right"
    text:
      - "Я слышала эту теорию, когда была в Риме."
      - "Но если это так, то злые намерения намного перевешивают благие."
      - "Откуда могла взяться такая разница в пользу зла?"
  - char: "u2501_unitas"
    side: "left"
    text:
      - "Возможно, дело не только в злых мыслях... Может быть, это включает и негативные эмоции тоже... [По мере того, как ситуация на войне для нас ухудшается, негативная эмоция отчаяния становится всё сильнее! <( __ )>]"
      - "Но разница всё равно слишком велика..."
      - "Так что это лишь теория... Мне нужно её проверить. [Я хочу исследовать это всю ночь ]"
  - char: "z15_unitas"
    side: "right"
    text:
      - "Ну уж нет! Я не полезу туда уставшей!"
  - char: "z14_unitas"
    side: "left"
    text:
      - "Ночью опасно... Почему бы нам не дождаться дня?"
  - char: "u2501_unitas"
    side: "right"
    text:
      - "Ладно... [Внутри преисподней в любом случае всё одинаково. ]"

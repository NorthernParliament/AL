chapter1:
  rows:
  - text:
      - "Ведомая Карабиньере, «Рука Трибунала» добирается до города Регенсбург."
      - "Судя по пейзажам по пути, здешняя география — по крайней мере, та её часть, что ещё не поглощена преисподней, — имеет сходство с испытательным полигоном Бета."
      - "Однако здешняя сеть водных путей куда шире и больше."

chapter2:
  rows:
  - char: "regensburg_meta_unitas"
    side: "left"
    status: "is-meta"
    text:
      - "Я Архиепископ Регенсбурга, курфюрст Империи и правительница этих земель."
      - "Неопознанный вооруженный конвой! Приказываю вам назвать себя и приземлиться для немедленного досмотра!"
  - text:
      - "Похоже, город уже в курсе нашего присутствия, раз архиепископ требует проверить наши личности на внешнем КПП."
  - char: "commander"
    side: "left"
    text:
      - "Логичное решение."
  - text:
      - "Архиепископом Регенсбурга оказывается не кто иная, как сама девушка-корабль Регенсбург."
      - "Явно находясь в состоянии контролируемого МЕТАморфоза, она восседает на механической колеснице, напоминающей Сирен второго типа."
      - "Вокруг неё кружат боевые дроны, представляя собой разительный контраст с рыцарями с копьями и щитами, стоящими по её бокам."

chapter3:
  rows:
  - char: "commander"
    side: "left"
    text:
      - "Это странно..."
  - char: "prinz_eugen"
    side: "right"
    text:
      - "Слепое следование технологиям Сирен обычно и приводит к таким причудливым комбинациям."
      - "Хотя, возможно, у этого испытательного полигона просто не было иного выбора."

chapter4:
  rows:
  - char: "commander"
    side: "left"
    text:
      - "Это потрясающе..."
  - char: "clemenceau"
    side: "right"
    text:
      - "О? Вижу, вы уже оценили социологическую и философскую ценность этого испытательного полигона."
      - "Стоит ли мне добавить в этот список еще и литературную ценность?"

chapter5:
  rows:
  - char: "commander"
    side: "left"
    text:
      - "Карабиньере, можешь представить нас архиепископу и её свите?"
  - char: "carabiniere_meta_unitas"
    side: "right"
    status: "is-meta"
    text:
      - "С радостью. Предоставьте это мне!"

chapter6:
  rows:
  - char: "regensburg_meta_unitas"
    side: "left"
    text:
      - "Моё терпение на исходе. Я повторяю в последний раз: вооруженный конвой, вы сейчас же..."
  - char: "carabiniere_meta_unitas"
    side: "right"
    text:
      - "А-а-а! Не стреляйте, пожалуйста! Архиепископ, это я! Это Карабиньере!"
  - char: "regensburg_meta_unitas"
    side: "left"
    text:
      - "...Карабиньере?"
      - "Ты что, сколотила отряд наёмников за эти пару дней?"
      - "А эта ваша божественная колесница — вы откопали её в очередных руинах? Надеюсь, ты заплатила налоги."
  - char: "carabiniere_meta_unitas"
    side: "right"
    text:
      - "Это долгая история..."
      - "В любом случае, прошу позволить мне представить вам эту группу! Это могущественная божественная колесница, «Рука Трибунала»! А это загадочный отряд «Наёмники из Иного Мира»!"


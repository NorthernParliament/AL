chapter1:
  rows:
  - text:
      - "Покинув регион, находящийся под влиянием Чёрного Солнца, я немедленно связался с Фридрих дер Гроссе и объяснил ей план."
  - char: "friedrich_der_grosse_emp_rad"
    side: "left"
    text:
      - "Хи-хи. Ты уже разгадал эти загадки?"
  - char: "commander"
    side: "right"
    text:
      - "Более или менее. Можно сказать, я немного сжульничал, чтобы получить ответы."
      - "Клемансо разберётся с башней на территории Ириса. Её успех нужно будет отпраздновать по всей Империи."
  - char: "friedrich_der_grosse_emp_rad"
    side: "left"
    text:
      - "Чтобы вызвать позитивные чувства, да? Хи-хи, обещаю, что вскоре все будут петь о триумфе."

chapter2:
  rows:
  - text:
      - "С этим всё готово. Остаётся лишь ждать хороших новостей."
  - char: "memphis"
    side: "left"
    text:
      - "Командир, Клемансо уже выступила со своим флотом."
  - char: "helena_kai"
    side: "right"
    text:
      - "Неужели мы будем просто смотреть со стороны?"
  - char: "commander"
    side: "left"
    text:
      - "Она говорит, что с ней всё будет в порядке, и я ей доверяю."
      - "Она хочет использовать свои собственные силы, чтобы положить новое начало для Ортодоксии."
      - "Давайте позволим ей самой с этим разобраться."

chapter3:
  rows:
  - text:
      - "БАБАХ!"
  - char: "duquesne_iris"
    side: "left"
    text:
      - "Оборона противника прорвана. Наш путь вперёд свободен."
  - char: "le_hardi_iris"
    side: "right"
    text:
      - "С Чёрным Солнцем сражаться легче, чем когда-либо!"
  - char: "duguay_trouin_iris"
    side: "left"
    text:
      - "Согласна. Такое чувство, будто я могла бы сражаться вечно."
  - char: "massena_iris"
    side: "right"
    text:
      - "Мы сможем прорваться к башне без зедержек!"
  - char: "clemenceau"
    side: "left"
    text:
      - "Этого будет недостаточно. На данный момент уничтожить башню будет невозможно."
      - "Дальше не сопровождайте меня. Если вы пойдёте дальше, то рискуете попасть под разрушительный удар."
      - "Я планирую преподнести грандиозный подарок преисподней и её башне... Всё, что вам нужно сделать — это стать его свидетелями."
      - "Алжири, Ла Галиссоньер. Подождите меня здесь, пожалуйста."
  - char: "algerie_meta"
    side: "right"
    status: "is-meta"
    text:
      - "Как прикажешь."
  - char: "la_galissonniere_meta"
    side: "right"
    status: "is-meta"
    text:
      - "Хорошо-о!"
  - char: "bois_belleau_iris"
    side: "left"
    text:
      - "Ты подарила нам проблеск надежды, Клемансо... Возвращайся к нам целой и невредимой, пожалуйста."
  - char: "clemenceau"
    side: "right"
    text:
      - "Будьте спокойны. Я клянусь изгнать тьму и вновь принести свет Ириса."

chapter4:
  rows:
  - text:
      - "И с этими словами она изящно шагнула во тьму."
      - "Под далёкой башней собрался легион греха, готовый хлынуть через край в любой момент."
  - char: "clemenceau"
    side: "left"
    text:
      - "Прекрасный мир был поглощён тьмой."
      - "Следы цивилизации, что когда-то лежали на земле..."
      - "Вот что такое Антиох."
      - "Возможно, у нас общая цель, но между нами есть одно фатальное различие."
      - "*вздох*..."
      - "Когда не хватает сил, остаётся только одно — держаться."
      - "Крепко стоять на ногах... и никогда не отпускать надежду."
  - text:
      - "Клемансо подняла взгляд на вершину башни, а затем снова перевела его на тьму, копошащуюся у её основания."

chapter5:
  rows:
  - char: "clemenceau"
    side: "left"
    text:
      - "Воплощения зла и нечистоты! Во имя Господа, я вершу суд над вами."
  - text:
      - "Золотой боевой конь встал на дыбы, а затем, увлекая за собой всадницу, бросился вперёд."
  - char: "clemenceau"
    side: "left"
    text:
      - "Ваш первый грех: узурпация праведности."
  - text:
      - "Рыцарь с луком на сияющем белом коне появился и присоединился к атаке."
  - char: "clemenceau"
    side: "left"
    text:
      - "Ваш второй грех: попирание истории."
  - text:
      - "Рыцарь с мечом на кроваво-красном коне появился и присоединился к атаке."
  - char: "clemenceau"
    side: "left"
    text:
      - "Ваш третий грех: захват ресурсов."
  - text:
      - "Рыцарь с весами на кромешно-чёрном коне появился и присоединился к атаке."
  - char: "clemenceau"
    side: "left"
    text:
      - "Ваш четвёртый грех: бессмысленное убийство невинных."
  - text:
      - "Рыцарь с косой на мертвенно-бледном коне появился и присоединился к атаке."
  - char: "clemenceau"
    side: "left"
    text:
      - "Ваш пятый грех: лишение общества инноваций."
  - text:
      - "Раздался хор голосов."
  - char: "clemenceau"
    side: "left"
    text:
      - "Ваш шестой грех: уничтожение свободомыслия."
  - text:
      - "Чёрное Солнце висело над головой, поджигая чёрную бездну."
  - char: "clemenceau"
    side: "left"
    text:
      - "Ваш седьмой грех: разрушение цивилизации."

chapter6:
  rows:
  - text:
      - "Армия Теней Греха попыталась броситься в атаку, но холодный свет сковал их движения, пока рыцари прорывались сквозь их ряды."
  - char: "clemenceau"
    side: "left"
    text:
      - "Несёте войну — и война будет вам наградой."
      - "Несёте смерть — и смерть будет вам наградой."

chapter7:
  rows:
  - text:
      - "Чёрное Солнце сбросило покров тьмы и засияло ослепительным светом."
      - "Его лучи пронзили небеса, породив зрелище, видимое даже в самых отдалённых уголках Империи."
      - "Затем этот свет обратился бесчисленными копьями, которые обрушились дождём, пока каждый дюйм башни не залило сиянием."

chapter8:
  rows:
  - char: "commander"
    side: "left"
    text:
      - "Это было эффектно, этого у неё не отнять."
      - "С одной башней покончено. Осталось четыре."

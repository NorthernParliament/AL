chapter1:
  rows:
  - text:
      - "В ослепительном свете всё стихло."
      - "Всё растворилось в пустоте, словно меня лишили всех чувств."
  - char: "commander"
    side: "left"
    text:
      - "(Что ж, до чего знакомый поворот событий.)"
  - text:
      - "Я всматриваюсь в чистую белизну перед собой. Она всматривается в меня."
      - "Спустя неизвестно сколько времени мир наконец вновь обретает свои краски."

chapter2:
  rows:
  - char: "memphis"
    side: "left"
    text:
      - "Командир, вы в порядке? Вы неважно себя чувствуете?"
  - text:
      - "Когда ко мне возвращается зрение, я встречаюсь с обеспокоенными взглядами Мемфис и Хелены."
  - char: "commander"
    side: "left"
    text:
      - "Я в порядке... К этому со временем привыкаешь."
      - "Рад видеть, что вы обе в порядке. Вы очнулись раньше меня?"
  - char: "helena_kai"
    side: "right"
    text:
      - "Угу... Совсем ненадолго, правда."
      - "Клемансо уже ушла с командой на разведку окрестностей, но судя по виду из окна..."
  - char: "commander"
    side: "left"
    text:
      - "Из окна...?"
  - text:
      - "Я поворачиваюсь и смотрю в окно. Солнечный свет заливает поля вокруг нас. В траве нет ничего необычного."
      - "За исключением..."
  - char: "commander"
    side: "left"
    text:
      - "Кто-то чертовски хорошо ухаживает за газоном. Замок выглядит вполне обжитым..."
      - "Мы оказались на другом тестовом полигоне?"
  - char: "clemenceau_rad"
    side: "right"
    text:
      - "Это определённо одна из возможностей."
  - text:
      - "Как по команде, из интеркома рядом с моим сиденьем раздаётся голос Клемансо."
  - char: "clemenceau_rad"
    side: "right"
    text:
      - "Мы подтвердили, что прилегающая территория безопасна, но пока нет никаких признаков жизни."
      - "Пока не покидайте салон. Я бы хотела внести небольшие коррективы в «Руку Трибунала», чтобы адаптировать её к нашим обстоятельствам."
  - char: "commander"
    side: "left"
    text:
      - "Коррективы вроде...?"
  - char: "clemenceau_rad"
    side: "right"
    text:
      - "Хи-хи. Взгляните-ка на это."
  - text:
      - "С потолка внезапно опускается дисплей, показывая структурную схему самолёта."
  - char: "clemenceau_rad"
    side: "right"
    text:
      - "А теперь, приступим."
  - text:
      - "Ритмичная вибрация расходится по салону, и схема на экране начинает меняться."
      - "Все модули самолёта начинают трансформироваться, от носа до крыльев и двигателей."
      - "И это не просто перестановка деталей — некоторые модули исчезают, в то время как другие материализуются, как будто они всегда там были."
      - "Изменения быстро становятся очевидными и внутри. Полы и стены перестраиваются в реальном времени, а интерьер становится всё более и более просторным."
      - "Всего за несколько минут комфортабельный салон самолёта полностью трансформируется в функциональный командный центр с панорамным обзором."
      - "Действительно, самолёт, на котором я прибыл, теперь превратился в гигантский мобильный командный центр."
  - char: "commander"
    side: "left"
    text:
      - "Скажи, у тебя случайно нет доступа к производственным технологиям Антиоха?"
      - "Или, вернее... если у вас есть настолько передовые технологии, зачем вам понадобилось доставлять его сюда?"
  - char: "clemenceau_rad"
    side: "right"
    text:
      - "Браво, Командир. Проницательны, как и всегда."
      - "Во-первых, я предпочитаю держать характеристики «Руки Трибунала» в секрете. Это, как вы могли догадаться, особая часть аппарата безопасности Трибунала."
      - "Во-вторых, разве не логично, что для перемещения «самолёта» туда, где нет взлётно-посадочной полосы, понадобится «тягач»?"
      - "Подобно тому, как такие самолёты не могут взлететь без взлётно-посадочной полосы, вы можете рассматривать это как основополагающий принцип его «концепции»."
      - "Должна сказать, что, увидев поезд Куин Элизабет, я получила вспышку озарения."
      - "Если вам любопытно, мы сможем неспеша разобрать все детали, когда будет больше времени."
      - "Но, увы, сейчас у нас есть более насущные проблемы."
  - text:
      - "Из центральной консоли появляется голограмма. Кажется, Клемансо может управлять ею даже снаружи самолёта."
  - char: "clemenceau_rad"
    side: "right"
    text:
      - "Разведывательный дрон, который я только что отправила, перестал отвечать. Это случилось как раз в тот момент, когда он пересек границу области, показанной на этой фотографии."
  - text:
      - "На снимке видна черная область, явно диссонирующая с окружающей зеленью."
      - "Её края кажутся искусственными, словно болото, вырезанное прямо из земли."
  - char: "commander"
    side: "left"
    text:
      - "Что показывает радар?"
  - char: "clemenceau_rad"
    side: "right"
    text:
      - "Он вообще не распознает эту область. Там ничего нет, поэтому, полагаю, система считает, что всё в порядке."
      - "Но это не так. Мой разведывательный дрон тут же потерял любую связь в тот самый момент, когда вошел в неё."
  - char: "commander"
    side: "left"
    text:
      - "Хм. Понятно."
  - char: "memphis"
    side: "right"
    text:
      - "Командир, вы же не думаете..."
  - char: "commander"
    side: "left"
    text:
      - "Ага. Пойдём и проверим."
      - "Мы здесь, чтобы исследовать предзнаменование Иерофант."
      - "Прежде чем мы попытаемся проанализировать её цели, мы должны понять, в какой ситуации оказались."
      - "Время не ждёт. Давайте поторопимся."
      - "Кстати..."
      - "Может ли «Рука Трибунала» двигаться по суше на автопилоте?"
  - char: "clemenceau_rad"
    side: "right"
    text:
      - "Хотя это и не выходит за рамки возможного, было бы безопаснее, если бы я управляла ею вручную из-за острой нехватки данных о рельефе."
      - "К тому же, хи-хи... у меня целую вечность не было возможности ею порулить. Это весьма воодушевляет, знаете ли."
      - "Ну что ж, отправляемся?"

chapter1:
  rows:
  - text:
      - "Под покровом непроглядной ночи чёрный поток безжалостно захлёстывал нас."
      - "Граница между миром и преисподней размывалась, колыхалась и сдвигалась, а преисподняя подступала всё ближе."
  - char: "duquesne_iris"
    side: "left"
    text:
      - "Мы покончили с семнадцатой волной... Ну и ночка выдалась."
  - char: "le_hardi_iris"
    side: "right"
    text:
      - "Мы словно волнолом, сдерживающий наводнение. Как бы долго МЫ ни продержались, земли позади нас..."
  - char: "duguay_trouin_iris"
    side: "left"
    text:
      - "Мы должны стоять насмерть, Арди. Как и любое наводнение, со временем оно отступит."
  - char: "le_hardi_iris"
    side: "right"
    text:
      - "Удивительно слышать от тебя слова ободрения в кои-то веки."
  - char: "duguay_trouin_iris"
    side: "left"
    text:
      - "Ну разумеется! Долг любой святой девы — хранить веру даже самой тёмной ночью."
  - char: "le_hardi_iris"
    side: "right"
    text:
      - "С тех пор, как нас поглотила преисподняя, мы не можем ни отправлять, ни получать сообщения. При таком раскладе неизвестно, прибудет ли подкрепление вообще."
  - char: "bois_belleau_iris"
    side: "left"
    text:
      - "Это одно из крупнейших её нападений за всё время. Священная Империя Юнитас наверняка заметит, что мы в опасности."
      - "Это лишь вопрос времени... Подкреплению может понадобиться больше двух дней, чтобы добраться сюда."
  - char: "massena_iris"
    side: "right"
    text:
      - "Два дня! Если мы сосредоточимся на удержании рубежей, они пролетят незаметно."
  - char: "duguay_trouin_iris"
    side: "left"
    text:
      - "Именно! Если ситуация станет совсем отчаянной, у нас всегда есть возможность использовать наши божественные реликвии."
      - "Они обратят в прах по ветру даже самую могущественную армию демонов."
  - char: "le_hardi_iris"
    side: "right"
    text:
      - "Искренне надеюсь, что до этого не дойдёт."
  - char: "duquesne_iris"
    side: "left"
    text:
      - "Внимание всем, приближается новая волна."
  - char: "le_hardi_iris"
    side: "right"
    text:
      - "Уф... Уже восемнадцатая. Держитесь все!"

chapter2:
  rows:
  - text:
      - "БАБАХ!!!"
  - char: "helena_kai"
    side: "left"
    text:
      - "Командир, мы зачистили силы противника впереди. Можем продвигаться дальше."
  - char: "commander"
    side: "right"
    text:
      - "Отлично. Вперёд."
      - "Клемансо, отправь больше разведывательных дронов. Мы должны найти флот Ириса как можно скорее!"

chapter3:
  rows:
  - text:
      - "Проведя в пути всю ночь, мы наконец добрались до западного фронта Империи."
      - "Я стал свидетелем столкновения стального оружия с Тенями Греха, а также непоколебимой решимости тех, кто возносил хвалу Богу на протяжении всей своей борьбы."
      - "Я также узнал, что флот Ириса зашел глубоко в преисподнюю, готовясь провести ритуал под названием Священное Очищение. При этом они отдали приказ об отступлении всем силам на линии обороны."
  - char: "commander"
    side: "left"
    text:
      - "Полное отступление... Надеюсь, это не означает, что их ритуал — это взаимное гарантированное уничтожение."
      - "Мы должны найти их — и быстро!"

chapter4:
  rows:
  - text:
      - "БАБАХ!"
  - char: "memphis"
    side: "left"
    text:
      - "Командир, наши дроны обнаружили цели! Но... что-то не так с визуальным сигналом!"
      - "Вывожу изображение на ваш экран..."

chapter5:
  rows:
  - text:
      - "На кадрах, переданных дроном, виден флот Ириса без сопровождения серийных кораблей."
      - "Они держались на воде, выстроившись в идеальный круг."
      - "Центр круга излучал золотое сияние, удерживая врагов на расстоянии и одновременно меняя цвет окружающей воды с чёрного на серый."
  - char: "clemenceau"
    side: "left"
    text:
      - "Должно быть, это и есть ритуал Священного Очищения. Командир, вы можете разглядеть что-нибудь в этом свете?"
  - char: "commander"
    side: "right"
    text:
      - "В свете..."
  - text:
      - "Я присматриваюсь и вижу прямоугольный объект, парящий в воздухе и излучающий божественный золотой свет."
  - char: "commander"
    side: "right"
    text:
      - "Что это?"
  - char: "clemenceau"
    side: "left"
    text:
      - "Скольких девушек-кораблей вы видите, Командир?"
  - char: "commander"
    side: "right"
    text:
      - "Хм... Пятерых?"
      - "Нет, подождите. Я вижу пять телесных фигур, но также... пять призрачных силуэтов?"
  - char: "clemenceau"
    side: "left"
    text:
      - "Значит, вы их видите. Это означает, что моя гипотеза может быть верна... Я полагаю, что это Оригинальные Кубы."
  - char: "commander"
    side: "right"
    text:
      - "Золотые Оригинальные Кубы?"
  - char: "clemenceau"
    side: "left"
    text:
      - "Их технологии должны быть сродни устройству Чёрного Солнца, что находится у меня."
      - "Когда устройство активируется, Оригинальный Куб в его ядре становится золотым... пусть и всего на мгновение."
      - "Этот испытательный полигон может дать ответ на эту загадку."
      - "Оставьте остальное мне. У меня есть план, как прервать ритуал и спасти их."

chapter6:
  rows:
  - text:
      - "Чёрное Солнце зависает в воздухе."
      - "Под этим символом правосудия армия Теней Греха мгновенно обращается в прах."
  - char: "massena_iris"
    side: "left"
    text:
      - "А?"
  - char: "duguay_trouin_iris"
    side: "right"
    text:
      - "Что это...?"

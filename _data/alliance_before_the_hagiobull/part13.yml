chapter1:
  rows:
  - text:
      - "После ритуала Майнц я откладываю поездку в Бранденбург и вместо этого направляюсь прямиком в Авиньон для проведения Ритуала Сошествия."
      - "Этот город можно считать вторым по значимости для представительства Святого Престола после Рима."
  - char: "commander"
    side: "left"
    text:
      - "Чувство дежавю..."

chapter2:
  rows:
  - text:
      - "Майнц —"

chapter3:
  rows:
  - text:
      - "Страсбург —"

chapter4:
  rows:
  - text:
      - "Учитывая масштаб Ритуала Сошествия, его проведение требует координации усилий сразу нескольких городов."
      - "По пути Гёц предлагает совершить глубинное погружение в Генуе, чтобы заранее узнать о планах нападения врага."
  - char: "gotz_von_berlichingen_unitas"
    side: "left"
    text:
      - "Я верю, что исследование преисподней пойдет нам только на пользу."
      - "Пришло время доказать ценность этой миссии — доказать, что ослабление обороны Империи стоит такого риска."
  - char: "prinz_moritz_unitas"
    side: "right"
    text:
      - "Мы заранее предупредим вас о любых атаках врага. А вы просто сосредоточьтесь на этом ритуале!"
  - char: "u2501_unitas"
    side: "left"
    text:
      - "Я буду молиться за ваш успех..."
  - char: "commander"
    side: "right"
    text:
      - "Будьте осторожны все. Не забывайте поддерживать связь."
  - char: "u2501_unitas"
    side: "left"
    text:
      - "Мы будем осторожны... [>w<]"

chapter5:
  rows:
  - text:
      - "Страсбург —"

chapter6:
  rows:
  - text:
      - "Авиньон —"

chapter7:
  rows:
  - text:
      - "Путешествие прошло без происшествий."
      - "По прибытии в Авиньон Кёльн немедленно приступила к подготовке к ритуалу."
      - "Учитывая позднее время, а также необходимость подготовки команды Гёц, мы назначили его на полдень следующего дня."
      - "Однако Клемансо казалась чем-то обеспокоенной."
      - "Тем же вечером, после ужина, она пригласила меня в кабинет для разговора наедине."

chapter8:
  rows:
  - char: "commander"
    side: "left"
    text:
      - "Ты хочешь пока разделиться?"
  - char: "clemenceau"
    side: "right"
    text:
      - "Я думала об этом уже какое-то время."
      - "Вы ведь планируете, что после ритуала всю тяжелую работу возьмёт на себя Марко Поло, не так ли?"
      - "Если она узнает, что я в этом замешана, это серьезно скажется на её желании помочь. К тому же, мы слишком многого не знаем об этом испытательном полигоне."
      - "Почти вся территория Ириса здесь поглощена преисподней, а Трибунал рассеян."
      - "Я намерена взять на себя руководство их работой и восстановить Трибунал."
  - char: "commander"
    side: "left"
    text:
      - "Но ведь на самом деле это не главная твоя цель, верно?"
      - "Тебе любопытны записи, хранящиеся в столице Ортодоксии, и ты хочешь увидеть их как можно скорее... Разве не так?"
  - char: "clemenceau"
    side: "right"
    text:
      - "Хе-хе. От вас ничего не утаишь, Командир."
      - "Вы абсолютно правы."
  - char: "commander"
    side: "left"
    text:
      - "Ты уверена, что справишься?"
  - char: "clemenceau"
    side: "right"
    text:
      - "Абсолютно."
  - char: "commander"
    side: "left"
    text:
      - "Возьми с собой Алжири и Ла Галиссоньер. У нас здесь достаточно сил для защиты, так что мы сами о себе позаботимся."
  - char: "clemenceau"
    side: "right"
    text:
      - "С радостью... Благодарю за вашу предусмотрительность, Командир."
      - "До новой встречи. Надеюсь, у вас всё пройдет так же гладко, как и у меня."

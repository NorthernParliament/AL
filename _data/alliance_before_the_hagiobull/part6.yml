chapter1:
  rows:
  - text:
      - "В вечер приёма в кабинете замка разгорелся жаркий спор."
  - char: "gotz_von_berlichingen_unitas"
    side: "left"
    text:
      - "Войска Регенсбург завтра выступают к границе, так что этот приём, вероятно, наш последний шанс."
      - "Что думаете? Будем действовать?"
  - char: "prinz_moritz_unitas"
    side: "right"
    text:
      - "Хе-хе-хе... Я бы сказала, твой план и без того чересчур консервативен."
      - "Украсть печать и подделать пару приказов? Можно ли придумать что-то более скучное?"
      - "Империя уже больна до самого основания. Если мы надеемся её исцелить, нам нужно лекарство посильнее."
  - char: "gotz_von_berlichingen_unitas"
    side: "left"
    text:
      - "Мне казалось, что подделка рекомендательного письма — это уже достаточно дерзко..."
  - char: "prinz_moritz_unitas"
    side: "right"
    text:
      - "Хе-хе. Я пытаюсь сказать, что... Если мы хотим получить Свитки Глубинного Погружения, то что может быть лучше, чем самим ограбить сокровищницы?"
      - "Насколько мне известно, один спрятан в Регенсбургском соборе, и как минимум ещё семь — в сокровищнице города Нюрнберг!"
      - "Если мы их просто украдём, то разом избавимся от всей этой дурацкой бюрократии!"
  - char: "gotz_von_berlichingen_unitas"
    side: "left"
    text:
      - "Ты хочешь сказать, что мы должны разграбить Собор и Имперскую Сокровищницу ради ПОМОЩИ Империи?"
  - char: "prinz_moritz_unitas"
    side: "right"
    text:
      - "Уж лучше мы пустим их в дело, чем они будут и дальше пылиться!"
      - "Не волнуйся, я возьму ответственность на себя!"
  - char: "gotz_von_berlichingen_unitas"
    side: "left"
    text:
      - "Ну уж нет. Ты не сможешь вынести всю эту ответственность."
      - "Мы должны придерживаться моего плана. Печать будет украдена, но под этим предлогом Свитки Глубинного Погружения будут официально одолжены."
  - char: "prinz_moritz_unitas"
    side: "right"
    text:
      - "Это позволит провести расследование только одной из нас. Мы не сможем составить команду из одного человека!"
  - char: "z14_unitas"
    side: "left"
    text:
      - "Эм... А что, если мы просто сделаем достаточно для всех?"
      - "Когда мы прибудем в Нюрнберг, мы сможем подделать ещё один комплект приказов..."
  - char: "gotz_von_berlichingen_unitas"
    side: "right"
    text:
      - "А это идея. Так и поступим. Как только начнется приём, мы все приступим к действиям."
  - text:
      - "*тук-тук*"
      - "Как только обсуждение подошло к концу, в дверь постучали."
      - "В замочной скважине повернулся ключ, и дверь кабинета распахнулась."
  - char: "gotz_von_berlichingen_unitas"
    side: "right"
    text:
      - "Ах, Архиепископ. Подготовка к приёму идет гладко?"
  - char: "regensburg_meta_unitas"
    side: "left"
    status: "is-meta"
    text:
      - "Не оскорбляй мой интеллект. Я всё слышала."
      - "Позвольте предупредить вас: в следующий раз, когда решите тайно сговариваться, постарайтесь делать это ГДЕ-НИБУДЬ В ДРУГОМ МЕСТЕ, а не в кабинете своей же цели."
      - "Вы прекрасно знаете, почему я отказала в разрешении на создание вашей маленькой следственной группы. Использование Свитков Глубинного Погружения ослабит оборону Империи."
      - "Нужно ли напоминать, что она и так висит на волоске?"
  - char: "gotz_von_berlichingen_unitas"
    side: "right"
    text:
      - "Но..."
  - char: "regensburg_meta_unitas"
    side: "left"
    status: "is-meta"
    text:
      - "Я понимаю, что ваша одержимость глубинными погружениями проистекает из желания изучить преисподнюю и предсказать вектор её атаки."
      - "Именно поэтому я не вмешивалась, пока вы использовали тот, который Принц Мориц случайно «приобрела» совсем недавно."
      - "Насколько я помню, именно U-2501 и Z15 забрали свиток и отделились от остальной вашей группы."
  - char: "prinz_moritz_unitas"
    side: "right"
    text:
      - "Ой..."
  - char: "regensburg_meta_unitas"
    side: "left"
    status: "is-meta"
    text:
      - "Не буду требовать от вас дальнейших подробностей."
      - "Пойдёмте со мной — я должна вас кое с кем познакомить."
      - "Возможно, решение для укрепления нашей обороны у нас под рукой... и если так, я ожидаю, что вы все докажете свою ценность."

chapter2:
  rows:
  - text:
      - "Я присоединился к предбоевому банкету по приглашению Регенсбург."
  - char: "commander"
    side: "left"
    text:
      - "Я бывал на многих приёмах, но никогда на таком, который словно сошел со страниц средневекового эпоса."
      - "Вписаться сюда будет непросто."
  - char: "memphis"
    side: "right"
    text:
      - "Действительно..."
  - char: "helena_kai"
    side: "left"
    text:
      - "Приспособиться к новой обстановке может быть непростой задачей."
  - text:
      - "Тем временем Ойген и Клемансо без малейших усилий влились в местную культуру."
      - "Они используют беседы с местными, чтобы выведать информацию об этом мире. Что же до меня, то мне остаётся лишь наблюдать и наслаждаться едой."
  - char: "regensburg_meta_unitas"
    side: "left"
    status: "is-meta"
    text:
      - "Приём вам не по вкусу?"
      - "Понимаю ваши чувства. Это тоже не совсем по моей части..."
      - "Так или иначе, позвольте мне всех вам представить. Эти трое — вольные наёмницы: Гёц фон Берлихинген, Принц Мориц и Z14."
  - text:
      - "Регенсбург указывает жестом на каждую из трёх девушек-кораблей."
  - char: "gotz_von_berlichingen_unitas"
    side: "left"
    text:
      - "Здравствуйте, Командир «Наёмников из Иного Мира». Меня зовут Гёц фон Берлихинген."
      - "Я слышала, что вы направляетесь в Бранденбург, чтобы устранить корень бед нашей Империи. Можем ли мы присоединиться к вашему делу?"

chapter3:
  rows:
  - text:
      - "Гёц объяснила свой план по исследованию преисподней."
      - "Точно так же, как нашего защитного барьера хватило, чтобы мы могли сражаться над водами преисподней, её внутреннее пространство не было абсолютно непреодолимым для живых существ."
      - "С помощью Свитков Глубинного Погружения — реликвий, появившихся в каждом соборе после первого возникновения преисподней, — можно было безопасно «погрузиться» в неё."
      - "Цель наёмниц заключалась в том, чтобы использовать их для лучшего понимания врага."
      - "Однако их использование имело свою цену: применение свитков ослабит все барьеры Империи."
      - "В результате им пришлось бы ждать, пока оборона не стабилизируется — что означало ожидание решения проблемы с коронацией."
  - char: "regensburg_meta_unitas"
    side: "left"
    status: "is-meta"
    text:
      - "Если вы отправляетесь в Бранденбург, то я предлагаю вам взять их с собой."
      - "Предстоящие вам испытания будут включать в себя нечто большее, чем просто чтение пыльных текстов в паре-тройке соборов..."
      - "Что скажете? По рукам?"

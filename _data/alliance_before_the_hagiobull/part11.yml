chapter1:
  rows:
  - text:
      - "Благодаря устройству «Чёрное Солнце» оборона Реймса оказалась лёгкой задачей."
      - "Это также стало хорошей возможностью изучить преисподнюю вблизи."
      - "Благодаря тому, что Клемансо установила лабораторный модуль на «Руку Трибунала», мы смогли ещё и собрать её образцы."
      - "Что касается анализа... Пусть мы и не взяли с собой исследователей, но..."

chapter2:
  rows:
  - char: "memphis_meta_rad"
    side: "left"
    status: "is-purple"
    text:
      - "Оригинальный Куб становится золотым? Впервые о таком слышу..."
      - "Подумать только, всё это началось ещё до пришествия ложного бога..."
      - "Ситуация там... кхм, поразительная. Вы действительно оправдываете репутацию своего испытательного полигона."
      - "Йорктаун предположила, что это может быть технологическим достижением, сделанным после того, как Антиох покинул альфа таймлайн."
      - "Если представится возможность, мы бы тоже хотели взглянуть на устройство «Чёрное Солнце» поближе."
  - char: "commander"
    side: "right"
    text:
      - "Я не против, но у меня есть вопрос."
      - "Местные фракции этого испытательного полигона слабоваты, и их силы на пределе. Можно ли привлечь Компилятор им на помощь?"
  - char: "memphis_meta_rad"
    side: "left"
    status: "is-purple"
    text:
      - "Мы думали об этом, но, к сожалению, не можем."
      - "Честно говоря, мне хотелось самой броситься туда в тот же миг, как я увидела аномалии на ваших координатах!"
      - "Несмотря на то, что мы можем поддерживать связь, нам пока не удалось точно определить местоположение этого испытательного полигона."
      - "Возможно, Иерофант использует какую-то маскировку."
      - "В любом случае... Потребуется больше времени, чтобы с этим разобраться."
  - char: "commander"
    side: "right"
    text:
      - "(С потерей доступа к Башне даже вызов подкрепления становится трудной задачей...)"
      - "Понял. Какое-то время мы в любом случае продержимся."
  - char: "memphis_meta_rad"
    side: "left"
    status: "is-purple"
    text:
      - "Вас поняла!"

chapter3:
  rows:
  - text:
      - "Два дня спустя, как и планировалось, Эльба прибыла с подкреплением. Мы передали ей очищенную линию обороны."
      - "После этого мы продолжили наше путешествие в Бранденбург."

chapter4:
  rows:
  - text:
      - "Реймс —"

chapter5:
  rows:
  - text:
      - "Кёльн —"

chapter6:
  rows:
  - text:
      - "Майнц —"

chapter7:
  rows:
  - text:
      - "Магдебург —"

chapter8:
  rows:
  - text:
      - "Бранденбург —"

chapter9:
  rows:
  - text:
      - "Когда мы прибываем в Майнц, нас ждёт пышный приём."
  - char: "koln_meta_unitas"
    side: "left"
    status: "is-meta"
    text:
      - "До меня доходили слухи о ваших именах, но, наконец-то, мы встретились. Добро пожаловать в Империю."
      - "Я Имперский регент и курфюрст, Кёльн. Как представительница Священной Империи Юнитас, я глубоко благодарю вас за помощь."
  - text:
      - "Хотя она и похожа на ту Кёльн, которую я знаю, её наряд и манеры совершенно не такие, как у нашей."
  - char: "commander"
    side: "right"
    text:
      - "Рад встрече. Я предполагал, что мы не увидимся до самого Бранденбурга."
  - char: "koln_meta_unitas"
    side: "left"
    status: "is-meta"
    text:
      - "В самом деле? Какое-то время я даже подумывала отправиться в сам Кёльн, чтобы поприветствовать вас там."
      - "Я знаю, что вы прибыли ради встречи со мной, и, более того, вы несёте в себе наши надежды и мечты. Вполне естественно, что я приложила к этому усилия."
  - char: "commander"
    side: "right"
    text:
      - "Регенсбург сказала нам, что вы знаете ситуацию лучше всех."
      - "Все на нашем пути были удивлены нашим внезапным появлением, кроме вас."
      - "Надеюсь, вы уделите время, чтобы ответить на наши вопросы."
  - char: "koln_meta_unitas"
    side: "left"
    status: "is-meta"
    text:
      - "С радостью. Но здесь вряд ли подходящее место для разговоров — давайте пройдём в собор."
      - "Вы сказали, что я не была удивлена, но есть кое-что, что сбило меня с толку."
      - "Когда я узнала ваши имена, то поверила, что Майнц и была тем самым Трансцендентом, которого я призвала."
      - "Но теперь я считаю, что её появление было лишь побочным эффектом."
      - "Самый значимый среди вас — это вы, Командир. В этом я уверена."
  - char: "commander"
    side: "right"
    text:
      - "О? И почему же?"
      - "Все мои спутницы — грозные воительницы."
  - char: "koln_meta_unitas"
    side: "left"
    status: "is-meta"
    text:
      - "Они девушки-корабли, так что это вполне естественно."
      - "Но вы — другой."
      - "Если ритуал призывает девушек-кораблей и одного обычного человека... невольно задаёшься вопросом, действительно ли этот человек так уж обычен."
      - "Я подготовилась к ритуалу внутри собора."
      - "Согласно Хагиобулле, существует способ обойти линию наследования курфюрстов: Ритуал Сертификации Курфюрста."
      - "Любая девушка-корабль, прошедшая сертификацию ритуалом, может стать курфюрстом, даже если их уже семеро."
      - "Разумеется, обязательное условие для этого идентично Ритуалу Сошествия — требуется помощь Трансцендента."
      - "Почему бы нам не начать с этого простого процесса проверки?"

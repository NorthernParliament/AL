chapter1:
  rows:
  - text:
      - "Чёрное Солнце по-прежнему висит высоко в небе, но Дьявол исчезла."
      - "Несмотря на то, что я получил кое-какие ответы, настроения мне это не улучшило."
  - char: "commander"
    side: "left"
    text:
      - "Уничтожить чёрные башни и помочь Иерофант завершить эксперимент..."
      - "Возможно, так будет лучше, если это положит конец страданиям в этом мире и позволит ему переродиться."
      - "Даже при том, что все эти страдания исходили от Иерофант... нет, от всей системы Антиох."
      - "Если бы они сочли это необходимым, они пожертвовали бы собой. И, разумеется, они так же легко пожертвовали бы всем остальным."
      - "Всё ради того, чтобы обеспечить успех Плана Магистра..."
      - "Для обитателей этих испытательных полигонов Арбитры — лишь палачи, которым нужно противостоять."
      - "И вот я здесь, болтаю с этими палачами, принимаю победу в подарочной упаковке и получаю похвалу и благодарность от людей, которые понятия не имеют, что происходит."
      - "Что я делаю...?"
      - "В который раз это происходит? И сколько ещё раз это должно повториться?"
      - "Неудивительно, что Энтерпрайз стала такой, какая она есть."
      - "Что ей пришлось увидеть — и лично вынести?"
  - text:
      - "В моём сердце разверзается раскол."
      - "Впервые глубоко внутри меня поселяется неуверенность."

chapter2:
  rows:
  - char: "clemenceau"
    side: "left"
    text:
      - "Командир! Вы не являетесь причиной страданий, происходящих на этих испытательных полигонах. Антиох вам не подчиняется."
      - "Если ваши победы — лишь результат их помощи, тогда учтите, что именно ВАШЕ присутствие вынудило их это сделать."
      - "Подумайте обо всех тех испытательных полигонах, на которых вы никогда не бывали. Что с ними стало из-за того, что вас там не было?"
  - char: "commander"
    side: "right"
    text:
      - "Возможно... ты права."
      - "И всё же, План Магистра был приведён в исполнение по коллективному согласию. Я думаю, что был среди тех, кто его одобрил."
  - char: "clemenceau"
    side: "left"
    text:
      - "Это действительно так? Вы ведь потеряли память, не так ли?"
  - char: "commander"
    side: "right"
    text:
      - "Да, потерял, но это..."
  - char: "clemenceau"
    side: "left"
    text:
      - "В конечном счёте этот вопрос был одобрен Советом, и вы участвовали в его исполнении."
      - "Но значит ли это, что прошлый «вы» были с этим согласны?"
      - "Возможно, я и не посвящена в процесс принятия решений Советом, но наверняка принятие любой важной резолюции потребовало бы большинства в две трети или три четверти голосов."
      - "Можете ли вы с уверенностью сказать, что были в числе этого большинства?"
  - char: "commander"
    side: "right"
    text:
      - "А?..."
  - text:
      - "Неописуемый холод разливается по моему телу, когда ко мне приходит внезапное озарение."
  - char: "commander"
    side: "right"
    text:
      - "Ты права... Почему я принимал это как должное?"
      - "Никто никогда НЕ ГОВОРИЛ, что я голосовал в поддержку Плана Магистра."
      - "Но всё это время я молчаливо признавал его необходимость и верил, что должен следовать проложенному им пути."
      - "Я никогда не задумывался о том, чтобы понять его или попытаться улучшить."
      - "В конце концов, я думал, что прошлый «я» разработал, одобрил этот план и верил в него..."
      - "Но что, если я всегда был против него, точно так же, как был против полномасштабного наступления?"
      - "Что, если у меня было другое видение и другие планы на уме..."
  - text:
      - "Новые мысли заполняют эту брешь, укрепляя мою решимость."
  - char: "commander"
    side: "right"
    text:
      - "Трансграничные Эксперименты — это ядро Плана Магистра."
      - "Они поглощают колоссальное количество ресурсов Программ Арбитров, но, бесспорно, приносят ощутимые результаты, когда дело доходит до противодействия X..."
      - "Однако, если я не играю руководящей роли в этом плане — если на самом деле я лишь расходная пешка..."
      - "Антиох мог бы продолжать накапливать силу через эти эксперименты и найти способ победить X самостоятельно. Они всегда так делали."
      - "Тогда по какой причине я оказался в таком состоянии?"
      - "Что, если дело вовсе не в Плане Магистра?!"
  - text:
      - "Ход моих мыслей натыкается на глухую стену. Мне нужно больше информации."
  - char: "clemenceau"
    side: "left"
    text:
      - "Жизнь не так коротка, как нам кажется, Командир. Продолжайте двигаться вперёд, и однажды вы, возможно, вспомните то, что потеряли."
      - "Я доверяю вам в этом путешествии, и вам тоже следует доверять самому себе."
      - "Страдания на этих испытательных полигонах — не ваших рук дело, и вы делаете всё, что в ваших силах, чтобы спасти их. Разве этого не достаточно?"
  - char: "commander"
    side: "right"
    text:
      - "...Ты права. В данный момент я должен сосредоточиться на том, как разобраться с пятью башнями, а не на всяких «как» и «почему»."
  - char: "clemenceau"
    side: "left"
    text:
      - "Вот это тот Командир, которого я знаю."
      - "К слову о том «как»: есть кое-что, что я хотела бы опробовать на башне Ортодоксии Ирис."
      - "Позвольте мне возглавить атаку и подать вам пример."
  - char: "commander"
    side: "right"
    text:
      - "У нас недостаточно разведданных. Неизвестно, насколько прочной может оказаться эта башня."
      - "К тому же, она окружена плотным кольцом вражеских сил. Как ты планируешь прорваться через них?"
  - char: "clemenceau"
    side: "left"
    text:
      - "Вам придётся подождать и увидеть всё самому~"
      - "Будьте спокойны. Уверяю вас, это будет одновременно зрелищно и вдохновляюще."

chapter1:
  rows:
  - char: "gotz_von_berlichingen_unitas"
    side: "left"
    text:
      - "Я поклялась сражаться до тех пор, пока либо не испущу свой последний вздох, либо пока мы не одержим полную победу в этой борьбе."
      - "Из этих двух исходов я всегда ожидала пасть на поле боя... Никогда я по-настоящему не верила, что полная победа будет за нами."
      - "И не могла я представить, что стану свидетельницей этого сама как вольный рыцарь..."

chapter2:
  rows:
  - text:
      - "Отряд Гёц вместе с подкреплением Лиги Сардинии направлялся к юго-восточной границе в надежде ослабить давление на Регенсбург и её армию."
      - "Стремительное разрушение двух таинственных чёрных строений значительно подняло боевой дух, развеяв атмосферу уныния и отчаяния, что так долго висела над Империей."
  - char: "z15_unitas"
    side: "left"
    text:
      - "Люди по пути приветствуют и благодарят нас! Я никогда не видела всех в таком приподнятом настроении!"
  - char: "z14_unitas"
    side: "right"
    text:
      - "Наша война ещё не закончена... но надежда наконец-то здесь..."
  - char: "u2501_unitas"
    side: "left"
    text:
      - "Уничтожить пять башен... и всё закончится. [Готово 2/5!]"
  - char: "prinz_moritz_unitas"
    side: "right"
    text:
      - "Это словно сон наяву... Всё так сильно изменилось в мгновение ока."
  - char: "gotz_von_berlichingen_unitas"
    side: "left"
    text:
      - "Хе-хе... В этом ты права."
      - "Может быть, мы и впрямь доживём до того дня, когда преисподняя будет повержена, и на нашу землю вернётся мир."
      - "Я не боюсь пойти ко дну, но ничто не сделало бы меня счастливее, чем возможность отстроить заново нашу утраченную родину."
  - char: "prinz_moritz_unitas"
    side: "right"
    text:
      - "Это напоминает мне о моих собственных разорённых землях."
      - "Мне рассказывали, что давным-давно это было прекрасное место. Как бы я хотела увидеть его своими собственными глазами."
  - char: "z15_unitas"
    side: "left"
    text:
      - "Твои собственные земли? Звучит здорово... Интересно, какую награду я получу, когда всё это закончится."
  - char: "z14_unitas"
    side: "right"
    text:
      - "Когда война закончится... нам больше не придётся совершать глубинные погружения. Мы лишимся нашего бюджета..."
      - "Э-это может обернуться для нас очень плохо..."
  - char: "u2501_unitas"
    side: "left"
    text:
      - "Моя работа в опасности...? [НЕЕЕЕЕТ]"
  - char: "gotz_von_berlichingen_unitas"
    side: "right"
    text:
      - "Уверена, всё будет не так уж плохо. Ну, я надеюсь."
  - char: "prinz_moritz_unitas"
    side: "left"
    text:
      - "Хи-хи-хи-хи, тогда решено! Когда мы выиграем эту войну, вы все перейдёте работать в мои владения!"
      - "Даже когда преисподняя исчезнет и нам больше не понадобятся глубинные погружения, нас будет ждать ещё бесчисленное множество заданий!"

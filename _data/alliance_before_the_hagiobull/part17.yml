chapter1:
  rows:
  - text:
      - "U-2501 в одиночку спустилась в чёрные глубины."
      - "Для неискушённого взгляда это место показалось бы сплошной тьмой, но её глазам открывался отчётливый спектр."
  - char: "u2501_unitas"
    side: "left"
    text:
      - "(Бездна определенно менялась с каждым моим глубинным погружением.)"
      - "(Поначалу я не могла ничего разобрать. В следующий раз всё было размытым... а теперь я вижу всё предельно ясно.)"
      - "(Тёмно-фиолетовый, тёмно-синий, багровый... Преисподняя и впрямь соткана из бесконечной злобы.)"
      - "(И эти враги...)"
      - "(Пусть внешне они и одинаковы, каждый из них порождён собственным источником злобы.)"
      - "(И каждый раз, когда они повержены, они возвращаются в преисподнюю.)"
      - "(Скольких бы мы ни одолели, их число бесконечно. Что же нам делать?)"

chapter2:
  rows:
  - text:
      - "Благодаря ярким краскам бездны и чётко различимым течениям, глубинное погружение U-2501 проходило гладко."
      - "Ей совсем не потребовалось много времени, чтобы достичь своей прежней максимальной глубины."
  - char: "u2501_unitas"
    side: "left"
    text:
      - "(У меня ещё полно сил.)"
      - "(Стоит ли мне попробовать спуститься ещё глубже?)"
      - "(А? Там внизу какое-то огромное чёрное пространство...)"
      - "(Погоди-ка... Оно поднимается?)"
      - "(Что это, чёрт возьми, такое?!)"

chapter3:
  rows:
  - text:
      - "Покинув Авиньон, Клемансо решила не использовать водные пути, чтобы отправиться в Реймс. Вместо этого она пересекла границы Священной Империи Юнитас и шагнула прямо в преисподнюю."
  - char: "clemenceau"
    side: "left"
    text:
      - "Во имя правосудия, узри путь грядущий."

chapter4:
  rows:
  - text:
      - "Чёрное Солнце висело над головой, рассеивая Теней Греха."
  - char: "clemenceau"
    side: "left"
    text:
      - "Система «Чёрного Солнца» третьего поколения, интегрированная с оснасткой... Полевые условия... Проверка прошла успешно."
  - text:
      - "Неспешно сделав несколько записей, она посмотрела в далёкое небо."
  - char: "clemenceau"
    side: "left"
    text:
      - "Поглощение земли преисподней, в свою очередь, привело к расширению моря. При всех разрушениях, что оно принесло, это делает наше путешествие в Париж куда более удобным."
      - "Алжири. Ла Галиссоньер. Что скажете об этой системе третьего поколения?"
  - char: "algerie_meta"
    side: "right"
    status: "is-meta"
    text:
      - "Я чувствую себя легче, чем когда-либо прежде."
      - "Побочные эффекты были устранены ещё во второй версии, но эти жестокие порывы всё ещё мучили меня на протяжении всего процесса Вознесения."
      - "В этот раз я их совсем не чувствую."
  - char: "la_galissonniere_meta"
    side: "left"
    status: "is-meta"
    text:
      - "Согласна!"
      - "Того безумного хаоса эмоций, который мы испытывали во время усиления, больше нет!"
      - "Как бы это сказать... Кажется, будто МЕТАморфоза ощущается более чистой?"
  - char: "clemenceau"
    side: "right"
    text:
      - "Понимаю... В этой среде есть какая-то аномалия."
  - char: "algerie_meta"
    side: "left"
    status: "is-meta"
    text:
      - "Что ты имеешь в виду?"
  - char: "clemenceau"
    side: "right"
    text:
      - "Единственным отличием между этими двумя поколениями было добавление технологии интеграции с оснасткой."
      - "Если что-то и ощущается иначе, то это результат влияния тестовой среды преисподней."
      - "Возможно, весь этот испытательный полигон — это одно огромное Чёрное Солнце, а преисподняя — лишь его проявление..."
      - "Девочки, вы понимаете технологические концепции, лежащие в основе Вознесения?"
  - char: "algerie_meta"
    side: "left"
    status: "is-meta"
    text:
      - "Концепции... Разве это не просто использование излучения Оригинальных Кубов для вызова МЕТАморфозы?"
  - char: "clemenceau"
    side: "right"
    text:
      - "Хе-хе. Вспомните первое поколение: когда вы его использовали, вам нужно было читать определённое заклинание."
      - "Излучение Оригинального Куба нацелено не на вашу физическую форму, а на символическую концепцию вашего имени."
      - "Попробуйте деактивировать Вознесение. Давайте сами посмотрим на результаты."
  - char: "la_galissonniere_meta"
    side: "left"
    status: "is-meta"
    text:
      - "Хорошо. Я попробую!"

chapter5:
  rows:
  - char: "la_galissonniere"
    side: "left"
    text:
      - "Вознесение деактивировано... Подожди. Кто ты?!"
  - char: "la_galissonniere_meta_rad"
    side: "right"
    status: "is-meta"
    text:
      - "......"
  - char: "algerie"
    side: "left"
    text:
      - "Рядом со мной тоже кое-кто появился. Она... моя тень?"
  - char: "algerie_meta_rad"
    side: "right"
    status: "is-meta"
    text:
      - "......"
  - char: "clemenceau"
    side: "left"
    text:
      - "Это и есть истина Вознесения, сам источник силы, которой вы обладаете."
  - char: "la_galissonniere"
    side: "right"
    text:
      - "Ты хочешь сказать... мы использовали силу наших МЕТАморфизированных «я» с какого-то испытательного полигона, о котором даже не подозреваем?"
      - "Внезапно я чувствую себя виноватой."
  - char: "clemenceau"
    side: "left"
    text:
      - "Тебе вряд ли стоит об этом беспокоиться. Ты заимствуешь у концепции, а не у личности..."
  - text:
      - "БАБАХ!"
      - "После сокрушительного удара на поверхности Чёрного Солнца появилась трещина."
  - char: "algerie"
    side: "left"
    text:
      - "Клемансо, там что-то огромное!"
  - char: "la_galissonniere"
    side: "right"
    text:
      - "Это... чёрная башня?"
  - char: "clemenceau"
    side: "left"
    text:
      - "Башня..."
      - "Проклятье. Мы приостанавливаем операцию. Немедленно отступаем!"

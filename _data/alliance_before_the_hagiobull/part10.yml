chapter1:
  rows:
  - text:
      - "Благодаря нашему вмешательству нам удалось спасти флот Ириса и обезопасить прилегающий район."
      - "После того как преисподняя была отброшена, лишь часть земли вернулась в нормальное состояние. Остальная территория превратилась в неопознанный серовато-белый кристалл."
  - char: "bois_belleau_iris"
    side: "left"
    text:
      - "Вот что случается с местами, которые слишком долго находились под влиянием преисподней. Это чудо, что нам удалось отвоевать хотя бы её часть."
      - "Кстати, а вы вообще кто такие?"
  - char: "clemenceau"
    side: "right"
    text:
      - "Мы передовой отряд подкрепления, отправленный по просьбе Эльбы. Остальные должны прибыть в течение двух дней."
  - char: "massena_iris"
    side: "left"
    text:
      - "Фух... Слава богу. Я знала, что Альянс Хагиобуллы не бросит нас."
  - char: "clemenceau"
    side: "right"
    text:
      - "Мы возьмем этот сектор на себя. Вы пока отступите?"
  - char: "duguay_trouin_iris"
    side: "left"
    text:
      - "Конечно же нет~ Мы отправимся на другую базу, чтобы оказать поддержку."
      - "Если я не ошибаюсь, вы тоже родом из Ириса. Не хотите присоединиться к нам?"
  - char: "clemenceau"
    side: "right"
    text:
      - "К сожалению, я уже занята. Но я буду рада сражаться плечом к плечу с вами, если мы встретимся вновь."
      - "А теперь, уверена, вы заметили мощь моего устройства «Чёрное Солнце»..."
      - "Если вы хотите поскорее закончить эту войну, я бы попросила вас рассказать мне всё о вашем ритуале Священного Очищения... и обо всех остальных ритуалах заодно."
  - char: "bois_belleau_iris"
    side: "left"
    text:
      - "Закончить войну..."
      - "Мне жаль. Мы бы с радостью вам помогли, но собор, где хранится вся эта информация, был поглощён вместе со столицей Ортодоксии."
      - "Барьер собора, возможно, ещё держится, но добраться туда практически невозможно."
  - char: "clemenceau"
    side: "right"
    text:
      - "Понимаю... Какая жалость."
      - "Сейчас не время подвергать себя ненужной опасности. Мы будем придерживаться взвешенного подхода."

chapter2:
  rows:
  - text:
      - "После короткого отдыха флот Ортодоксии Ирис поблагодарил нас еще раз, прежде чем отправиться на свою следующую битву."
      - "Я проводил их и обдумал боевые позиции на ближайшие дни."
      - "Как вдруг ко мне подошла неожиданная особа."
  - char: "gotz_von_berlichingen_unitas"
    side: "left"
    text:
      - "Я хотела бы еще раз выразить вам свою благодарность, Командир."
      - "Вы спасли флот Ириса, сохранив жизненно важный источник огневой мощи для Альянса Хагиобуллы."
  - char: "commander"
    side: "right"
    text:
      - "Это ведь не первый раз, когда они проводят этот ритуал, не так ли?"
  - char: "prinz_moritz_unitas"
    side: "left"
    text:
      - "...Вы правы."
  - char: "u2501_unitas"
    side: "right"
    text:
      - "К сожалению..."
  - char: "gotz_von_berlichingen_unitas"
    side: "left"
    text:
      - "Я и понятия не имела, что ваши силы настолько внушительны."
      - "Хоть вы по-прежнему скрываете множество тайн, мы рады, что вы на нашей стороне."
  - char: "commander"
    side: "right"
    text:
      - "(Множество тайн, да?)"
      - "(Я мог бы сказать о вас то же самое...)"

chapter1:
  rows:
  - text:
      - "После долгих громких объяснений и бурной жестикуляции со стороны Карабиньере наше знакомство, похоже, прошло гладко."
      - "Регенсбург позволяет нам миновать КПП и поднимается на борт «Руки Трибунала» вместе с нами."
  - char: "carabiniere_meta_unitas"
    side: "left"
    text:
      - "Внимание всем, представляю вам одну из семи курфюрстов Священной Империи Юнитас..."
  - char: "regensburg_meta_unitas"
    side: "right"
    text:
      - "Избавь их от формальностей. Я уже сыта этим по горло."
      - "Принц Ойген, Майнц и Командир, верно? Меня зовут Регенсбург."
      - "Ваша «Рука Трибунала» и впрямь внушительна..."
      - "Не волнуйтесь. Я лично покажу вам дорогу. Заводите эту божественную колесницу и покажите, какова она на ходу!"

chapter2:
  rows:
  - text:
      - "С эскортом личной гвардии архиепископа наше путешествие внезапно начинает казаться куда более грандиозным."
      - "Въехав в сам город, я внимательнее присматриваюсь к этому крупному центру Империи."
      - "Несмотря на свой традиционный облик, город усеян технологиями, которые слишком продвинуты, чтобы их не заметить — особенно это заметно в его военных объектах."
  - char: "commander"
    side: "left"
    text:
      - "Я заметил, что ваша армия мобилизуется. Они отправляются на битву с этими монстрами из преисподней?"
  - char: "regensburg_meta_unitas"
    side: "right"
    status: "is-meta"
    text:
      - "Верно. Мы называем их Тенями Греха — призраками, сотканными из чистой злобы, что выплёскивается из Ада."
  - char: "commander"
    side: "left"
    text:
      - "В таком случае, я беспокоюсь за вашу армию..."
  - text:
      - "Хотя Тени Греха не так опасны для нас, как сущности коррозии, это лишь потому, что они представляют меньшую угрозу для военно-морского флота."
      - "Смогут ли средневековые рыцари с мечами и щитами надеяться выстоять против них?"
  - char: "regensburg_meta_unitas"
    side: "right"
    status: "is-meta"
    text:
      - "Не волнуйтесь. У нас есть военная поддержка из божественного арсенала, а также оружие, произведённое божественной оружейной. Они намного мощнее, чем оружие, созданное человеческими руками."
      - "И хотя мы не можем вооружить каждого солдата, этого более чем достаточно для защиты наших основных сил."
  - text:
      - "Почувствовав моё беспокойство, Регенсбург просвещает меня об их военной ситуации."
  - char: "commander"
    side: "left"
    text:
      - "(Иерофант на удивление предусмотрительна.)"
  - char: "regensburg_meta_unitas"
    side: "right"
    status: "is-meta"
    text:
      - "Хех... Здравый смысл не так уж часто встречается среди вас, наёмников, не так ли?"
  - text:
      - "Она пронзает меня испытующим взглядом."
      - "Кажется, я задал слишком много банальных вопросов об этом мире."
      - "В отличие от Карабиньере, преклоняющейся перед Майнц и Принц Ойген, Регенсбург, похоже, больше заинтересована мной."
  - char: "regensburg_meta_unitas"
    side: "right"
    status: "is-meta"
    text:
      - "Возможно, вам удалось одурачить вольного наёмника, но эта архиепископ не так наивна."
      - "Группа «наёмников» с таким количеством девушек-кораблей? Смелая ложь, отдаю вам должное."
  - char: "commander"
    side: "left"
    text:
      - "...Я всего лишь придумал предлог, чтобы выиграть время, пока ситуация была менее ясной."
      - "Вы должны быть в курсе. Это вы призвали нас сюда?"
  - char: "regensburg_meta_unitas"
    side: "right"
    status: "is-meta"
    text:
      - "Если вы спрашиваете, участвовала ли я в древнем ритуале трансценденции, то ответ — да."
      - "А вот были ли вы призваны в результате этого... этого я не могу сказать с уверенностью."
      - "Ритуал был проведён две недели назад, и я не заметила никаких изменений в Империи."
      - "По крайней мере, до тех пор, пока не появились вы."
  - char: "commander"
    side: "left"
    text:
      - "Что это за дело с трансценденцией? Это ритуал, призванный уничтожить преисподнюю?"
  - char: "regensburg_meta_unitas"
    side: "right"
    status: "is-meta"
    text:
      - "Я была бы в восторге, если бы это избавило нас от преисподней, но это дело далёкого будущего."
      - "Мы провели ритуал по более насущной причине."
      - "Честно говоря, мы и сами не знаем, к каким результатам должен привести ритуал трансценденции."
      - "Всё, что я знаю, это то, что при пустующем Святом Престоле этот ритуал является обязательным условием для коронации."
  - char: "commander"
    side: "left"
    text:
      - "Коронации? Святой Престол пустует?"
  - char: "regensburg_meta_unitas"
    side: "right"
    status: "is-meta"
    text:
      - "Удивительно, не правда ли? Трон Священной Империи Юнитас пустует уже много лет."
      - "В настоящее время важные решения принимает Архиепископ Кёльна, в то время как менее значимые вопросы оставляются на усмотрение отдельных лордов. К сожалению, по мере того, как угроза преисподней растёт..."
      - "Не знаю, рассказала ли вам об этом Карабиньере, но Апеннинский полуостров, лежащий прямо за нашими границами, уже поглощён, забрав с собой многих наших товарищей."
      - "Но коронация должна проходить под надзором Святого Престола."
      - "Таким образом, мы провели ритуал в надежде найти другое решение для проведения коронации."
  - char: "commander"
    side: "left"
    text:
      - "Объединение сил Империи для поиска другого решения..."
  - char: "regensburg_meta_unitas"
    side: "right"
    status: "is-meta"
    text:
      - "Можете пока не забивать этим голову. В каком-то смысле я просто болтаю... Я никогда не была создана для подобных вещей."
      - "Вам следует отправиться в Бранденбург. Уверена, Кёльн позаботится о вас там."
      - "Уже поздно. Активация божественного водного пути сопряжена с опасностью, так что советую вам остаться здесь на ночь перед отъездом."
  - char: "commander"
    side: "left"
    text:
      - "Я не против, но что значит «активация»? И что вообще представляет из себя этот божественный водный путь?"
  - char: "regensburg_meta_unitas"
    side: "right"
    status: "is-meta"
    text:
      - "Это одно из чудес инженерной мысли, оставшееся со времён, когда Бог еще ходил среди нас. Будучи сетью каналов, он соединяет все крупные города Империи."
      - "Вход находится на другом конце города. Завтра я сопровожу вас туда."
      - "Что касается сегодняшнего вечера, вы можете сразу отправиться в гостевые покои отдыхать... или выслушать моё предложение."
  - char: "commander"
    side: "left"
    text:
      - "Я слушаю."
  - char: "regensburg_meta_unitas"
    side: "right"
    status: "is-meta"
    text:
      - "Я должна возглавить свои войска и отправиться в Вену для усиления тамошних сил. Сегодня вечером состоится наш прощальный банкет перед отправкой."
      - "Там соберутся самые видные деятели города, включая тех, кто, возможно, сможет предоставить вам больше информации."
      - "Вы даже можете встретить весьма интересных личностей. Вам ведь нужно узнать больше, не так ли?"
  - char: "commander"
    side: "left"
    text:
      - "В этом вы правы. Я буду рад присутствовать, если вы нас примете."
  - char: "regensburg_meta_unitas"
    side: "right"
    status: "is-meta"
    text:
      - "Командир «Наёмников из Иного Мира», для нас будет честью принять вас."

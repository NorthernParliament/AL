chapter1:
  rows:
  - text:
      - "Одинокое поисково-спасательное судно дрейфовало на приглушённых волнах."
  - char: "z15_unitas"
    side: "left"
    text:
      - "Угх... Слишком сильная качка!"
      - "Даже без врагов вокруг, Северное море — не место для плавания!"
      - "Война окончена... Мы должны валяться в поместье и наслаждаться жизнью!"
  - char: "z14_unitas"
    side: "right"
    text:
      - "Я так и знала, что нам не стоило браться за эту работу..."
      - "Но восстановление земель стоит денег, а казна Мориц уже пуста как барабан..."
  - char: "prinz_moritz_unitas"
    side: "left"
    text:
      - "Я тоже пыталась отказаться, но Архиепископ Кёльн предложила такую заманчивую цену!"
      - "Она даже пообещала, что Гильдия Королевских Ремесленников займётся ремонтом моего замка!"
      - "К тому же, она совершенно бесплатно отдала мне это невероятное божественное поисковое судно, чтобы использовать его как базу!"
      - "Как я могла отказаться от такой выгодной сделки?"
  - char: "u2501_unitas"
    side: "right"
    text:
      - "По крайней мере... мы все вместе... [Собирать обломки — это весело!]"
  - char: "gotz_von_berlichingen_unitas"
    side: "left"
    text:
      - "Только подумать, мы прошли путь от санкционированной Империей команды по глубинному погружению в преисподнюю до искательниц сокровищ и сборщиц обломков в пепельном мире."
      - "Извлекать фрагменты цивилизации из пепельных вод... Это значимая работа."
      - "Хотя я бы предпочла, чтобы это было не в Северном море."
      - "Эхх... Как думаете, как там Командир? Насколько я помню, нашего доброго друга куда-то утащили."
  - char: "z15_unitas"
    side: "right"
    text:
      - "Кое-кто ужасно заинтересован!"
      - "Я могу попробовать разузнать новости, когда мы вернёмся."
  - char: "gotz_von_berlichingen_unitas"
    side: "left"
    text:
      - "Да, я заинтересована."
      - "По правде говоря, Командир оказался в таком состоянии из-за того, что спасал наш мир..."
      - "Было бы нарушением благородного этикета, если бы я не выразила свою благодарность лично."
  - char: "prinz_moritz_unitas"
    side: "right"
    text:
      - "Тебе не стоит так сильно волноваться~ Одна из наших наёмниц отправилась с Командиром."
      - "Эти двое могут однажды вернуться. И когда это произойдёт, мы устроим грандиозную вечеринку в честь победы!"
  - char: "gotz_von_berlichingen_unitas"
    side: "left"
    text:
      - "Надеюсь, к тому времени мы уже не будем торчать в Северном море..."
  - char: "u2501_unitas"
    side: "right"
    text:
      - "А?! [Шокирующее осознание!]"
  - char: "prinz_moritz_unitas"
    side: "left"
    text:
      - "Хорошо сказано! Тем больше причин поскорее закончить эту работу!"
  - char: "z15_unitas"
    side: "right"
    text:
      - "Лучше бы ты отказалась от этой рабо-о-оты!"

chapter1:
  rows:
  - text:
      - "После церемонии Фридрих дер Гроссе, как и полагалось, приняла благословения от собравшихся."
      - "Но вскоре поступили дурные вести, омрачившие настроение этого знаменательного события."
  - char: "koln_meta_unitas"
    side: "left"
    status: "is-meta"
    text:
      - "Вслед за коронацией преисподняя начала полномасштабное наступление. Боевые сводки потоком идут со всех приграничных регионов."
      - "Боевой потенциал врага также возрос..."
  - char: "commander"
    side: "right"
    text:
      - "(Посылать врагов, идеально подстроенных под наши боевые возможности — еще одна типичная черта испытательных полигонов Сирен.)"
      - "(Нам понадобятся подкрепления для всех оборонительных линий Империи.)"
      - "(Теперь, когда Фридрих дер Гроссе стала Императором, распределение ресурсов больше не должно быть проблемой.)"
      - "(С Марко Поло, контролирующей обслуживание, водные пути тоже не должны вызывать беспокойства.)"
      - "(Нам также стоит задействовать транспортных дронов, размещенных на каждом аэродроме.)"
  - char: "friedrich_der_grosse_emp"
    side: "left"
    text:
      - "Дитя моё? Дитя моё, ты слушаешь?"
  - text:
      - "Её голос прерывает ход моих мыслей."
  - char: "friedrich_der_grosse_emp"
    side: "left"
    text:
      - "Я здесь."
      - "Как ты, уверена, помнишь, я была призвана, чтобы возглавить Священную Империю Юнитас и стабилизировать ситуацию."
      - "Но для чего сюда был доставлен ты, дитя моё?"
      - "Как ты уничтожишь преисподнюю? Как ты доведёшь этот эксперимент до конца?"
      - "Что на самом деле означает Трансцендент? Чего пытается достичь Иерофант?"
      - "Вот вопросы, на которых ты должен сосредоточиться, дитя моё."

chapter2:
  rows:
  - char: "commander"
    side: "left"
    text:
      - "Ты права. Я оставляю остальное в твоих руках."
      - "Самой подозрительной целью являются те пять башен, что внезапно появились. Я начну с их исследования."
  - char: "friedrich_der_grosse_emp"
    side: "right"
    text:
      - "Не обременяй себя войной. Изучай всё, что сочтешь нужным."

chapter3:
  rows:
  - char: "commander"
    side: "left"
    text:
      - "Как думаешь, с чего мне стоит начать?"
  - char: "friedrich_der_grosse_emp"
    side: "right"
    text:
      - "С пяти башен, разумеется."
      - "Восставшие из земли, чтобы пронзить небеса — они больше всего подходят под концепцию вознесения."

chapter4:
  rows:
  - char: "friedrich_der_grosse_emp"
    side: "right"
    text:
      - "Кстати, могу ли я одолжить Принц Ойген и Марко Поло на какое-то время?"
  - char: "commander"
    side: "left"
    text:
      - "Ты отправляешь их на передовую?"
  - char: "friedrich_der_grosse_emp"
    side: "right"
    text:
      - "Таков план."
  - char: "marco_polo_a"
    side: "left"
    text:
      - "А?"
  - char: "commander"
    side: "right"
    text:
      - "Они в твоём распоряжении."
  - char: "marco_polo_a"
    side: "left"
    text:
      - "Погодите-ка!"
  - char: "friedrich_der_grosse_emp"
    side: "right"
    text:
      - "Марко Поло, ты будешь направлена в Лигу Сардинии."
  - char: "marco_polo_a"
    side: "left"
    text:
      - "Снимаю свои возражения. Я немедленно отправляюсь туда!"
  - char: "friedrich_der_grosse_emp"
    side: "right"
    text:
      - "Лига Сардинии прикреплена к южному и восточному фронтам, и в то же время будет вести наблюдение за расположенными там башнями."
      - "Принц Ойген, ты должна отправиться к границе Империи, поддержать Кёнигсберг и следить за находящейся там башней."
      - "Кёльн, вы с Майнц возглавите основные силы Альянса Хагиобуллы, защищая оборонительную линию от северного побережья до границы Ириса, и попутно отслеживая оставшиеся две башни."
      - "Остальные наши силы вдоль пяти линий фронта останутся на своих местах. Вы четверо получите полномочия командовать ими."
  - char: "koln_meta_unitas"
    side: "left"
    status: "is-meta"
    text:
      - "Как пожелаете."
  - char: "commander"
    side: "right"
    text:
      - "(Пять башен, пять линий фронта... Иерофант — пятый Арбитр. У цифры пять есть какой-то тайный смысл?)"
      - "(Я никогда не любил разгадывать загадки, особенно когда мне нужно сосредоточиться на войне.)"
      - "(Сделай глубокий вдох... Успокойся.)"
      - "(Если не считать Марко Поло, Клемансо наверняка понимает эту систему лучше всех.)"
      - "(Не удивлюсь, если Клемансо знает даже больше неё.)"
      - "(К слову об этом, документы Ортодоксии Ирис могут быть вовсе не её истинной целью.)"
      - "(Возможно, она уже о чём-то догадалась. Это объяснило бы, почему она захотела разделиться.)"
  - char: "friedrich_der_grosse_emp"
    side: "left"
    text:
      - "Что будешь делать, дитя моё? С чего начнёшь?"
  - char: "commander"
    side: "right"
    text:
      - "С башни, расположенной в Ортодоксии Ирис."
  - char: "friedrich_der_grosse_emp"
    side: "left"
    text:
      - "Хи-хи. Я как раз собиралась порекомендовать то же самое."
      - "Давай же вместе сыграем прекрасную мелодию."

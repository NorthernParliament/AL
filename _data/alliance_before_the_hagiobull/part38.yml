chapter1:
  rows:
  - text:
      - "Перед возвращением в порт PH я привёл Марко Поло обратно в Компилирующее поле."
      - "Атмосфера здесь довольно удручающая."
      - "В конце концов, им не удавалось точно определить координаты испытательного полигона ES-40111 вплоть до того самого момента, как я вернулся домой."
  - char: "memphis_meta"
    side: "left"
    status: "is-purple"
    text:
      - "Мне так жаль, Командир..."
  - char: "commander"
    side: "right"
    text:
      - "Всё в порядке. Это был особый испытательный полигон для Трансграничных Экспериментов, так что неудивительно, что его было трудно найти."
  - char: "memphis_meta"
    side: "left"
    status: "is-purple"
    text:
      - "Верно..."
  - char: "commander"
    side: "right"
    text:
      - "Я оставляю Марко Поло в твоих руках. Если с ней что-то будет не так, немедленно свяжись со мной."
  - char: "memphis_meta"
    side: "left"
    status: "is-purple"
    text:
      - "Поняла! Мы присмотрим за ней!"
  - char: "commander"
    side: "right"
    text:
      - "Кстати, Йорктаун здесь? Я хотел бы с ней поговорить."
  - char: "memphis_meta"
    side: "left"
    status: "is-purple"
    text:
      - "Она только что отправилась на испытательный полигон ES-40111."
  - char: "commander"
    side: "right"
    text:
      - "А?"
  - char: "memphis_meta"
    side: "left"
    status: "is-purple"
    text:
      - "Она сказала, что хочет провести там полевые исследования."
      - "По её словам, тот факт, что Фридрих дер Гроссе и Клемансо придают такое большое значение этому испытательному полигону, означает, что у них на уме те же идеи, что и у неё."
  - char: "commander"
    side: "right"
    text:
      - "Припоминаю, Клемансо говорила что-то о стабилизации каналов и установлении связей..."
  - char: "memphis_meta"
    side: "left"
    status: "is-purple"
    text:
      - "Именно. Этот испытательный полигон имеет потенциал стать тыловой базой."
  - char: "commander"
    side: "right"
    text:
      - "Тыловой базой, значит?"
  - char: "memphis_meta"
    side: "left"
    status: "is-purple"
    text:
      - "Взяв механизмы из экспериментального отдела, которые присоединились к нам, и разместив их там, мы сможем использовать их потенциал на полную катушку!"
  - char: "commander"
    side: "right"
    text:
      - "Подожди секунду. Нам следует учесть ситуацию на самом испытательном полигоне... Ох, но они ведь привыкли к технологиям Сирен, полагаю..."
  - char: "memphis_meta"
    side: "left"
    status: "is-purple"
    text:
      - "Именно."
      - "Технология, используемая для объединения испытательных полигонов, выглядит как магия, и к тому же она крайне редка."
      - "Я сама вижу её лишь во второй раз!"
      - "Вот почему Йорктаун отправилась на разведку — она хочет изучить эту технологию вдоль и поперёк."
      - "Если мы сможем применить её в больших масштабах, то сможем объединить ресурсы и энергию всех испытательных полигонов!"
  - char: "commander"
    side: "right"
    text:
      - "Связывая испытательные полигоны, мы сможем помочь другим сбросить свои оковы. Любая мелочь может помочь, да?"
      - "Если этот день настанет... это будет просто потрясающе."

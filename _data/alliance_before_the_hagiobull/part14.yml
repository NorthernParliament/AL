chapter1:
  rows:
  - text:
      - "Я не вижу ничего, кроме бесконечной белизны."
  - char: "commander"
    side: "left"
    text:
      - "Разве я не должен быть в соборе, готовясь к ритуалу?"
  - text:
      - "Не было ни песнопений, ни внезапной вспышки света."
      - "Но не успел я опомниться, как оказался в этом белом мире."

chapter2:
  rows:
  - char: "commander"
    side: "left"
    text:
      - "Иерофант?"

chapter3:
  rows:
  - char: "commander"
    side: "left"
    text:
      - "Марко Поло?"

chapter4:
  rows:
  - text:
      - "Ответа нет."
      - "Я пытаюсь прислушаться, но здесь царит абсолютная тишина."
      - "Я пытаюсь присмотреться, но пути нет."
  - char: "commander"
    side: "left"
    text:
      - "Ритуал провалился?"
      - "Этого не может быть..."
      - "В конце концов, всё это лишь протокол аутентификации, оставленный Иерофант."
      - "Если бы мы провели процесс неправильно, всё должно было закончиться простым отсутствием отклика."
      - "Но это..."
      - "Хм? Подо мной..."
  - text:
      - "Похоже, это место не такое уж и пустое. Я осознаю, что стою на ровной поверхности."
      - "Заметив это, я пытаюсь сделать шаг вперёд, но натыкаюсь на невидимый барьер."
  - char: "commander"
    side: "left"
    text:
      - "Хоть всё и выглядит белым, здесь есть стены. Это... лабиринт?"
      - "Но как можно пройти лабиринт, если даже не можешь понять, где начинаются и заканчиваются стены?"

chapter5:
  rows:
  - char: "commander"
    side: "left"
    text:
      - "......"
      - "......"
      - "......"
      - "Хах... И снова я всё усложняю."
      - "Ты не можешь действовать, но если я ищу ответ, ты всегда его дашь. Не так ли?"
      - "Иерофант, скажи мне, где найти Марко Поло."
  - text:
      - "Я требую ответа от белой пустоты."
      - "И как только я это делаю, передо мной появляется Марко Поло."
  - char: "marco_polo_a"
    side: "right"
    text:
      - "О-хо-хо-хо! Ну надо же, кто это тут у нас, неужто Командир! Рада видеть тебя снова так скоро!"
      - "Разумеется, мир вряд ли сможет функционировать без Марко Поло!"
      - "Я уже в курсе всего происходящего! Я отправлюсь прямиком на испытательный полигон ES-40111 и спасу мир во имя Святого Престола!"
      - "Будь спокоен и узри великие подвиги Марко Поло!"
      - "О? И чего ты просто стоишь там в оцепенении?"
      - "Шевелись немедленно! Я готова и рвусь показать им всё своё великолепие!"

chapter6:
  rows:
  - text:
      - "Мир внезапно погружается во тьму."
      - "Когда белизна исчезла, я мог бы поклясться, что на краткий миг встретился взглядом с Иерофант."
      - "Как обычно, она была безжизненна, словно статуя, но я увидел в её глазах смесь эмоций. Немного одобрения, немного предвкушения и..."
  - char: "commander"
    side: "left"
    text:
      - "Тревогу...?"

chapter1:
  rows:
  - text:
      - "На следующий день четыре вольные наёмницы присоединились к нам на борту «Руки Трибунала». Мы прибыли к входу на божественные водные пути города Регенсбург."

chapter2:
  rows:
  - text:
      - "Хотя местные и называли их божественными, на самом деле это была сеть каналов, оставленная Антиохом."
      - "Эта сеть каналов не просто соединяла крупные города Империи — на её маршруте также располагались различные так называемые «божественные ретрансляторы», обеспечивающие дальнюю связь."
      - "Внутри также находились крупные скоростные транспортные суда. Поскольку «Рука Трибунала» помещалась внутри, мы решили путешествовать именно так."
      - "Технически водные пути принадлежали Императору Священной Империи Юнитас."
      - "Однако управление ими было делегировано определённым людям."

chapter3:
  rows:
  - text:
      - "Вне зависимости от этих деталей, путешествие из города Регенсбург в Бранденбург означало прохождение через три других города."

chapter4:
  rows:
  - text:
      - "Это были города Страсбург, Майнц и Магдебург по порядку."

chapter5:
  rows:
  - text:
      - "Судя по нашей текущей скорости, мы должны были достичь Страсбурга к вечеру."

chapter6:
  rows:
  - text:
      - "Там мы должны были встретиться с U-2501 и Z15, чтобы взять их с собой."

chapter7:
  rows:
  - char: "memphis"
    side: "left"
    text:
      - "Командир, мы получили подтверждение, что путь впереди свободен. Мы можем запускать транспортный корабль прямо сейчас."
  - char: "commander"
    side: "right"
    text:
      - "Тогда отплываем к нашему следующему пункту назначения."

chapter8:
  rows:
  - text:
      - "Транспортный корабль прибывает в город Страсбург, залитый вечерним светом."
      - "Эльба, ответственная за этот водный путь, выходит поприветствовать нас у входа. U-2501 и Z15 вместе с ней."
      - "К сожалению, они приходят с дурными вестями."
  - char: "z15_unitas"
    side: "left"
    text:
      - "Мы закончили наше расследование, народ!"
      - "Состояние преисподней, э-э... не очень!"
      - "U-2501 обнаружила врагов, готовящихся к крупной атаке под водой."
      - "Ещё глубже скрывается нечто куда более зловещее..."
  - char: "elbe_meta_unitas"
    side: "right"
    status: "is-meta"
    text:
      - "Уф... Как будто нам и так проблем мало."
  - char: "u2501_unitas"
    side: "left"
    text:
      - "Мне жаль, что мы не смогли принести новости получше..."
  - char: "commander"
    side: "right"
    text:
      - "(Нечто куда более зловещее на глубине, да?)"
      - "(Во время Всемирной выставки Марко Поло тоже что-то затевала под водой...)"
      - "(Именно поэтому враги продолжали появляться бесконечно.)"
      - "(Насколько я помню...)"
      - "(Хм... Она конвертировала феномен «веры» в физическую сущность, так ведь?)"
      - "(Интересно, не происходит ли здесь нечто подобное.)"

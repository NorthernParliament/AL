chapter1:
  rows:
  - text:
      - "Чёрное Солнце поднимается высоко в небо, прежде чем исчезнуть в мгновение ока."

chapter2:
  rows:
  - text:
      - "Неизвестное время — Неизвестное местоположение"
      - "Я стою один посреди бесконечной белизны."
  - char: "hierophant_rad_x"
    side: "left"
    status: "is-lightgray"
    text:
      - "......"
  - text:
      - "Иерофант стоит неподвижно, словно статуя."
      - "Её фигура бесплотна, словно пузырь, готовый лопнуть от малейшего прикосновения."

chapter3:
  rows:
  - char: "commander"
    side: "left"
    text:
      - "Здравствуй, Иерофант."

chapter4:
  rows:
  - char: "commander"
    side: "left"
    text:
      - "Мы опять встретились, Иерофант."

chapter5:
  rows:
  - char: "commander"
    side: "left"
    text:
      - "Давно не виделись, Иерофант."

chapter6:
  rows:
  - char: "hierophant_rad_x"
    side: "right"
    status: "is-lightgray"
    text:
      - "......"
  - text:
      - "Ответа нет. В её глазах нет ни проблеска света."
  - char: "commander"
    side: "left"
    text:
      - "Я думал, что с продвижением эксперимента твоя ситуация улучшится."
      - "Но сейчас ты выглядишь ещё более хрупкой, чем раньше..."
  - char: "hierophant_rad_x"
    side: "right"
    status: "is-lightgray"
    text:
      - "......"
  - text:
      - "Ответа нет. В её глазах нет ни проблеска света."
  - char: "commander"
    side: "left"
    text:
      - "Хорошо... Позволь задать прямой вопрос."
      - "Я хочу узнать больше о Трансграничном Эксперименте."

chapter7:
  rows:
  - text:
      - "Я ищу ответы у призрака передо мной."
      - "Вскоре после этого из ниоткуда появляется дверь."
      - "Когда я протягиваю руку и касаюсь её, мир передо мной преображается."

chapter8:
  rows:
  - text:
      - "В просторной лаборатории единственная знакомая фигура что-то пишет на маркерной доске."
  - char: "aoste"
    side: "left"
    text:
      - "Если бы кто-то пожелал направить коммуникативные способности Понтифика на X, как бы он это сделал?"
      - "Во-первых, они должны находиться в одном измерении."
      - "Это основа коммуникации. Информация на другом уровне теряет смысл."
      - "Существует два способа удовлетворить этому требованию. Либо мы переходим в измерение X, либо мы спускаем их в наше."
      - "К сожалению, второе неосуществимо."
      - "Все X в одном с нами измерении — это просто производные сущности, не обладающие разумом."
      - "Поэтому попытки общения с ними — пустая трата времени, лишённая всякого смысла."
      - "У нас остаётся лишь один вариант: вознестись за пределы нашего собственного измерения."
      - "Теоретически, это простой процесс."
      - "Субстанция может быть воссоздана в высшем измерении путём создания её проекций в каждый момент времени."
      - "При достаточно большой выборке мы сможем достичь X, независимо от того, в каком измерении они обитают."
      - "К сожалению, это может быть проверено только самими девушками после того, как будет приведён в исполнение План Магистра."
      - "Выйдя за пределы испытательного полигона альфа — посредством использования бесконечных испытательных полигонов..."
      - "...Ха. Бесконечные испытательные полигоны дают больше, чем просто бесконечные возможности."
      - "......"
      - "Далее необходимо определить информацию, которую можно использовать для коммуникации."
      - "Зрение, обоняние, слух, осязание... Суть коммуникации кроется в эффективном обмене информацией между двумя сторонами в одном измерении."
      - "Основываясь на текущих исследованиях, я сомневаюсь в том, можно ли считать X отдельной сущностью высшего измерения."
      - "Они скорее... правило или, возможно, феномен, порождённый определённым правилом."
      - "Но этот феномен сопровождается обилием информации."
      - "Следовательно, основа для коммуникации существует, но проблема кроется в вовлечённых сторонах."
      - "Даже если они содержат информацию, если X нельзя рассматривать как отдельную сущность..."
      - "Можно ли реорганизовать эту информацию, чтобы изменить X... или даже создать сущность для X?"
      - "Или я мог бы реорганизовать информацию X, используя себя в качестве основы... и контролировать её?"
      - "Можно ли загрязнить её переизбытком информации, чтобы нарушить её изначальную структуру, вызывая хаос, противоречия и замешательство... и тем самым создавая слабости?"
      - "Сделать это — значит позволить смертным стать подобными богам."
      - "Иерофант, если однажды ты сможешь этого достичь, тогда я дам тебе новый титул."
      - "Ты станешь... Трансцендентом."

chapter9:
  rows:
  - text:
      - "В безграничной белизне призрачная статуя молча наблюдает за мной."
  - char: "commander"
    side: "left"
    text:
      - "Так вот откуда взялось это имя..."
      - "Возвысить тебя до того же измерения, что и X, и влиять на них... Вот какова была истинная цель."
      - "(Но почему это нужно было делать после Плана Магистра?)"
      - "(Если бы мы с самого начала сосредоточили наши усилия на эксперименте...)"
  - text:
      - "В пространстве между нами появляется вырезанная из бумаги аппликация."
      - "На ней изображены два человечка из палочек. Один сидит на раковине моллюска, а другой, в фуражке кондуктора, машет рукой."
  - char: "commander"
    side: "left"
    text:
      - "Эти схематичные человечки... мы с тобой, Иерофант?"
  - text:
      - "Ответа нет, но бумажная аппликация меняется."
      - "Человечек в фуражке не изменился, но тот, что сидит на ракушке, постепенно становится объёмнее."
      - "По всей аппликации появляются наклейки и собираются вокруг фигурки."
      - "Фигурка на ракушке начинает выступать из рисунка, пока не становится трёхмерной фигурой, неотличимой от статуи. Тот, что в фуражке, продолжает махать рукой изнутри бумаги."
      - "Когда трёхмерная фигура тянется вниз, чтобы схватить вторую, бумага исчезает."
  - char: "commander"
    side: "left"
    text:
      - "(Понимаю... Вот почему им нужно так много испытательных полигонов. Теперь всё обретает смысл.)"
      - "(Погодите-ка... Я ведь ещё даже не задал свой вопрос. Откуда Иерофант узнала?!)"
      - "Ты умеешь читать мои мысли напрямую?"

chapter10:
  rows:
  - text:
      - "Призрачная статуя хранит молчание, пока рядом не появляется ещё одна дверь."
      - "Когда я протягиваю руку и касаюсь её, мир передо мной преображается."

chapter11:
  rows:
  - char: "chariot"
    side: "right"
    text:
      - "Всё верно."

chapter12:
  rows:
  - char: "commander"
    side: "left"
    text:
      - "......"
      - "Если ты умеешь читать мои мысли, тогда почему ждёшь, пока я задам свой следующий вопрос вслух?"

chapter13:
  rows:
  - text:
      - "Рядом появляется ещё одна дверь."
  - char: "commander"
    side: "left"
    text:
      - "Что ты пытаешься мне сказать?"
  - text:
      - "Когда я протягиваю руку и касаюсь её, мир передо мной преображается."

chapter14:
  rows:
  - char: "eutopia"
    side: "right"
    text:
      - "В прошлом это было необходимостью, но теперь, видите ли, это скорее дань привычке."

chapter15:
  rows:
  - char: "commander"
    side: "left"
    text:
      - "...Понимаю."
      - "Теперь понятно, почему ты выбрала Марко Поло своим представителем..."
      - "Вернёмся к теме — ты должна понимать, почему я связался с тобой сегодня."
      - "С меня хватит загадок. Я хочу разрешить кризис в ES-40111 без дальнейших потерь."
      - "Не могла бы ты просто дать мне ответ?"
  - char: "hierophant_rad_x"
    side: "right"
    status: "is-lightgray"
    text:
      - "......"
  - text:
      - "Призрачная статуя мерцает, казалось бы, погружённая в свои мысли."

chapter16:
  rows:
  - text:
      - "Рядом появляется ещё одна дверь."
  - char: "commander"
    side: "left"
    text:
      - "Очень надеюсь, что эта мне ответит..."
  - text:
      - "Когда я протягиваю руку и касаюсь её, мир передо мной преображается."

chapter17:
  rows:
  - char: "chariot"
    side: "right"
    text:
      - "Ладно! Без проблем! Я расскажу тебе!"

chapter18:
  rows:
  - char: "eutopia"
    side: "right"
    text:
      - "Однако..."

chapter19:
  rows:
  - char: "aoste"
    side: "right"
    text:
      - "У любого короткого пути есть своя цена."

chapter20:
  rows:
  - char: "commander"
    side: "left"
    text:
      - "Цена...?"
  - char: "hierophant_rad_x"
    side: "right"
    status: "is-lightgray"
    text:
      - "█▆Ц▆▅▄▆ена▅▄..."

chapter21:
  rows:
  - text:
      - "Статуя Иерофанта внезапно оказывается лицом к лицу со мной."
      - "Хоть это и иллюзия, на ощупь она почему-то холодная."
      - "Возникает чувство невесомости, когда мой взгляд резко устремляется вверх."

chapter22:
  rows:

  - text:
      - "Вырванный из белого пространства, я оказываюсь в небесах над Священной Империей Юнитас, взирая на поле боя."
  - char: "commander"
    side: "left"
    text:
      - "Я уже испытывал подобное в Мартириуме..."
  - text:
      - "Пока я смотрю на чёрную саранчу, покрывающую пейзаж, Иерофант делает то же самое."
      - "Я не видел такого живого выражения на её лице со времён «идеального будущего»."
  - char: "hierophant"
    side: "right"
    status: "is-lightgray"
    text:
      - "Трансграничный эксперимент №1: Трансцендент."
      - "Стадия 1: Барьер фильтрации концепций. Успешно."
      - "Стадия 2: Резервуар энергии. Успешно."
      - "Стадия 3: Концептуальная лестница. В процессе."
  - text:
      - "Куда бы ни упал её взгляд, чёрная саранча превращается в безвредный пепел."
      - "Там, где стояли пять башен, возвышаются новые белые башни."
  - char: "hierophant"
    side: "right"
    status: "is-lightgray"
    text:
      - "Стадия 3: Концептуальная лестница. Успешно."
      - "Начинаю восхождение."

chapter23:
  rows:
  - text:
      - "Иерофант и пять белых башен исчезают."
      - "Я внезапно начинаю падать. Моё поле зрения стремительно сужается."
  - char: "commander"
    side: "left"
    text:
      - "Вот уж действительно, короткий путь... Опасность почти миновала."
      - "А? Как странно... Меня вдруг клонит в сон..."

chapter24:
  rows:
  - text:
      - "Усталость накатывает на меня, словно приливная волна. Моё сознание уплывает за пределы досягаемости."
      - "Прямо перед тем, как мой разум угасает, я слышу прекрасный голос."
  - char: "hierophant_x"
    side: "right"
    status: "is-lightgray"
    text:
      - "AOHUR FVB, JVTTHUKLY"
      - "KV UVA DVYYF. ZSLLW"
      - "H UHW DPSS ZLYCL FVB DLSS"
  - char: "commander"
    side: "left"
    text:
      - "Спокойной ночи..."
      - "И удачи, Иерофант..."

chapter1:
  rows:
  - char: "u556_meta?"
    side: "left"
    status: "is-meta"
    text:
      - "В центре управления всё по-прежнему, на парящих экранах проигрываются какие-то странные кадры."
      - "Сестрица Бисмарк, ты собираешься исследовать эти видео так же, как до этого вошла в мой кошмар?"
  - char: "bismarck_z"
    side: "right"
    text:
      - "Да, именно это я и собираюсь проверить."
      - "Присмотри здесь за всем. В случае непредвиденной ситуации — просто выстрели в меня холостым снарядом, чтобы разбудить."
  - char: "u556_meta?"
    side: "left"
    status: "is-meta"
    text:
      - "Хорошо! Обещаю, что надёжно защищу тебя, сестрица!"
  - char: "bismarck_z"
    side: "right"
    text:
      - "Угу, рассчитываю на тебя."
  - text:
      - "Бисмарк протянула руку и коснулась экрана. Пейзаж перед её глазами пошёл рябью, словно водная гладь."
      - "В мгновение ока грань между реальностью и сном полностью растворилась."

chapter2:
  rows:
  - text:
      - "Обломки тихо догорали, а Фридрих дер Гроссе, как и прежде, неподвижно лежала в стороне."
  - char: "bismarck_z"
    side: "left"
    text:
      - "Это то, что Ульрих меньше всего хотела бы увидеть, поэтому её кошмар и принял такую форму."
      - "Такое глубокое проникновение в чужую душу... это точно не могло возникнуть само по себе."
  - text:
      - "Бисмарк покинула место, где находилась Фридрих дер Гроссе, и направилась дальше."
      - "Гигантский дракон Герион взмыл в небо, чтобы разведать это пространство с большей высоты."
      - "Спустя некоторое время полёта «границы» кошмара стали постепенно проступать."
      - "Плотная стена чёрного тумана скопилась на краю акватории, и даже один мимолётный взгляд на неё вызывал чувство тревоги."
      - "Но стоило лишь подавить внутреннее волнение, как под этой стеной тумана можно было заметить какие-то мерцающие пятна."
  - char: "bismarck_z"
    side: "left"
    text:
      - "Хм?.. Что это... Герион, подлети поближе и развей этот морской туман!"
  - char: "gerion"
    side: "right"
    status: "is-meta"
    text:
      - "▁▂▃▄▅▆▇███Яростный рёв██▌"
  - text:
      - "Туман рассеялся, и истинная сущность этих пятен наконец раскрылась — это оказались несколько чёрных летательных аппаратов."
      - "А ещё дальше, в тот самый миг, когда туман развеялся, казалось, мелькнула и тут же погасла ослепительная вспышка света."
  - char: "bismarck_z"
    side: "left"
    text:
      - "Странные летательные аппараты... и странный свет."
      - "К слову, Ульрих действительно упоминала, что во сне её словно звал за собой какой-то свет."
  - text:
      - "БАБАХ!!!"
  - char: "gerion"
    side: "right"
    status: "is-meta"
    text:
      - "▁▂▃▄▅▆▇███Гневный рёв██▌"
  - char: "bismarck_z"
    side: "left"
    text:
      - "Тц... Засада?! Спасибо, Герион."
  - text:
      - "В какой-то момент на обломках серийных моделей, которые уже давно потеряли способность двигаться, внезапно проступили светящиеся узоры."
      - "На передней части чёрных летательных аппаратов вдалеке тоже вспыхнул красный свет, словно намекая, что это именно они вернули обломки к жизни."
  - char: "bismarck_z"
    side: "left"
    text:
      - "Эти летательные аппараты... управляют обломками в этой акватории?"
      - "Герион, сокруши их!"
  - char: "gerion"
    side: "right"
    status: "is-meta"
    text:
      - "▁▂▃▄▅▆▇███Яростный рёв██▌"
  - text:
      - "Дракон взмахнул крыльями, подняв над морем ураганный ветер."
  - char: "bismarck_z"
    side: "left"
    text:
      - "Ваше истинное лицо... я раскрою его..."

chapter3:
  rows:
  - text:
      - "В тот самый момент, когда атака Бисмарк была готова обрушиться на эти странные летательные аппараты, её выдернуло обратно в реальность."
  - char: "u556_meta?"
    side: "left"
    status: "is-meta"
    text:
      - "Беда, госпожа Бисмарк! Скорее проснись!"
  - char: "bismarck_z"
    side: "right"
    text:
      - "Что случилось, U-556?!"
  - char: "u556_meta?"
    side: "left"
    status: "is-meta"
    text:
      - "Несколько минут назад Джейд доложила об обнаружении неопознанной гуманоидной единицы, которая стремительно приближается к нашей позиции."
      - "Она отправила палубную авиацию на перехват, но её сбили в мгновение ока."
      - "Когда госпожа Дзуйкаку отправилась навстречу врагу, она узнала её — это Арбитр Отшельник IX!"
      - "...Я почувствовала, что всем грозит опасность, поэтому немедленно разбудила сестрицу!"
  - char: "bismarck_z"
    side: "right"
    text:
      - "(Кто бы мог подумать, что всё прервётся, когда оставался всего один шаг... Ничего не поделаешь, сначала нужно разобраться с нависшей угрозой.)"
      - "Отличная работа. Ты отправишься вместе со мной в качестве поддержки, но без моего приказа в бой не вступать."
  - char: "u556_meta?"
    side: "left"
    status: "is-meta"
    text:
      - "...Слушаюсь!"

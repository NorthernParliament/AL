chapter1:
  rows:
  - text:
      - "Внутри Башни Мидгарда отряд Бисмарк стремительно продвигался сквозь хитросплетения механических конструкций."
  - char: "otto_von_alvensleben"
    side: "left"
    text:
      - "Звук только что... это ведь был артиллерийский залп?!"
  - char: "regensburg"
    side: "right"
    text:
      - "Верно, в башне идёт бой!"
  - char: "bismarck_z"
    side: "left"
    text:
      - "Звук донёсся со стороны платформы внешнего кольца, там открытое пространство. Джейд, отправь палубную авиацию на разведку!"
  - char: "jade"
    side: "right"
    text:
      - "Слушаюсь!"
  - char: "bismarck_z"
    side: "left"
    text:
      - "Нам ещё предстоит пройти какое-то расстояние, всем прибавить ходу!"

chapter2:
  rows:
  - char: "jade"
    side: "left"
    text:
      - "Фух... фух... Пропавшие цели обнаружены!"
  - char: "gneisenau_meta"
    side: "right"
    status: "is-meta"
    text:
      - "Когда я увидела самолёты, подумала, что это вражеская атака, а оказалось — подкрепление..."
      - "Госпожа Бисмарк, похоже, настройка Гериона уже завершена."
  - char: "bismarck_z"
    side: "left"
    text:
      - "Верно, вот так выглядит новая оснастка в завершённом виде."
      - "Благодаря твоей помощи я снова могу стоять здесь. Ещё раз выражаю тебе свою благодарность."
  - char: "gneisenau_meta"
    side: "right"
    status: "is-meta"
    text:
      - "...Не за что, это... то, что я должна была сделать."
  - char: "bismarck_z"
    side: "left"
    text:
      - "Госпожа Дзуйкаку, как хорошо, что ты цела и невредима."
  - char: "zuikaku"
    side: "right"
    text:
      - "Э?! Я-я в полном порядке!"
      - "Эм, т-ты ведь госпожа Бисмарк, верно?!"
      - "Этот... этот облик, что это?!"
      - "Значит, это и есть твоя истинная сила после выздоровления?!"
  - char: "bismarck_z"
    side: "left"
    text:
      - "Мы впервые встречаемся в таком виде, госпожа Дзуйкаку."
      - "Как видишь, это прототип следующего поколения оснастки Железной Крови."
      - "Я не собиралась намеренно скрывать свою силу, просто эта технология ещё не прошла достаточную техническую проверку. Если бы не экстренная ситуация, я вообще не планировала использовать её в реальном бою."
      - "Раз уж тебе так интересно, по возвращении я обязательно удовлетворю твоё любопытство."
      - "Но сейчас мне нужно понять, что же именно произошло в плавучей крепости."
      - "Почему Башня Мидгарда была активирована, и... где Ульрих?"
  - char: "gneisenau_meta"
    side: "right"
    status: "is-meta"
    text:
      - "Позволь мне ответить на этот вопрос. Дело было так..."

chapter3:
  rows:
  - char: "bismarck_z"
    side: "left"
    text:
      - "...Концептуальная атака, непробудный сон членов Железной Крови... и Ульрих, активировавшая Башню Мидгарда."
      - "Я поняла ситуацию. Можете не беспокоиться о безопасности наших уснувших подруг."
      - "Сразу по прибытии в плавучую крепость мы первым делом перенесли их в медицинский отсек."
  - char: "zuikaku"
    side: "right"
    text:
      - "Слава богу, значит, об этом можно не волноваться..."
      - "Но вы правда совсем не почувствовали ту ударную волну?"
  - char: "otto_von_alvensleben"
    side: "left"
    text:
      - "В тот момент мы были заняты тем, что отбивались от атак флота Сирен IV типа."
      - "Так что я не заметила никаких волн и тому подобного..."
  - char: "jade"
    side: "right"
    text:
      - "Угу, я тоже не почувствовала ничего особенного."
      - "К тому же, если бы мы тогда уснули, то тут же попали бы под огонь Сирен."
  - char: "regensburg"
    side: "left"
    text:
      - "И я тоже."
  - char: "zuikaku"
    side: "right"
    text:
      - "Хм... Возможно, сила этой волны ослабевает с расстоянием."
      - "Но если так... то почему U-556 вдруг покинула отряд?.."
  - char: "gneisenau_meta"
    side: "left"
    status: "is-meta"
    text:
      - "Госпожа Бисмарк, U-556... она уже подверглась МЕТА-трансформации?"
  - char: "zuikaku"
    side: "right"
    text:
      - "Э?! Стала МЕТА?!"
  - char: "bismarck_z"
    side: "left"
    text:
      - "...Откуда ты знаешь?"
  - char: "gneisenau_meta"
    side: "right"
    status: "is-meta"
    text:
      - "Я смогла очнуться от кошмара только потому, что она меня атаковала."
      - "И время появления той ударной волны очень близко к тому моменту, когда, по твоим словам, с U-556 произошла аномалия..."
  - char: "bismarck_z"
    side: "left"
    text:
      - "В каком направлении она ушла?"
  - char: "gneisenau_meta"
    side: "right"
    status: "is-meta"
    text:
      - "Скорее всего, к зоне отправления Башни Мидгарда."
      - "Когда я ещё не до конца вырвалась из-под влияния кошмара, я видела, как световой луч Башни Мидгарда дрогнул."
      - "Это верный знак того, что кто-то воспользовался функцией телепортации."
  - char: "bismarck_z"
    side: "left"
    text:
      - "...Нам нужно действовать быстро."
      - "Центр управления и зона отправления находятся по одному маршруту. Сначала мы проверим, что с Ульрих."

chapter4:
  rows:
  - char: "jade"
    side: "left"
    text:
      - "Ах, я вижу госпожу Ульрих!"
  - char: "otto_von_alvensleben"
    side: "right"
    text:
      - "Госпожа Ульрих!"
  - char: "gneisenau_meta"
    side: "left"
    status: "is-meta"
    text:
      - "Подождите! Никому не приближаться!"
      - "...Госпожа Бисмарк, ты ведь тоже уже почувствовала эту необычную ауру, исходящую от центра управления?"
      - "Заходить туда вот так напролом слишком опасно. Нам нужно придумать другой план."
  - char: "bismarck_z"
    side: "right"
    text:
      - "Да, это сильная аура МЕТА-коррозии..."
      - "Всем оставаться в режиме ожидания за дверью."
      - "Нет... Отойдите подальше от комнаты, ждите в конце коридора. А остальное оставьте на меня."
  - char: "gneisenau_meta"
    side: "left"
    status: "is-meta"
    text:
      - "Госпожа Бисмарк?! С коррозией такого уровня... особенно тебе ни в коем случае нельзя с ней контактировать!!!"
  - char: "bismarck_z"
    side: "right"
    text:
      - "Со мной всё будет в порядке, не волнуйтесь."
      - "Ты тоже подожди вместе со всеми, просто предоставь остальное мне..."

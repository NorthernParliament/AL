chapter1:
  rows:
  - text:
      - "Лунный свет падал на поверхность моря, и в его сиянии двигался одинокий силуэт."
      - "Внезапно она сбавила ход."
  - char: "nop"
    side: "left"
    text:
      - "Ты вошла в территориальные воды Доминиона Виши, пожалуйста, назови цель своего визита."
  - char: "la_galissonniere"
    side: "right"
    text:
      - "Алжири, хватит прятаться."
  - char: "algerie"
    side: "left"
    text:
      - "Да ладно, так ты меня уже давно заметила."
  - char: "la_galissonniere"
    side: "right"
    text:
      - "Это ты потеряла хватку."
  - char: "algerie"
    side: "left"
    text:
      - "О? Раз ты так в себе уверена, не хочешь проверить это на деле?"
  - char: "la_galissonniere"
    side: "right"
    text:
      - "Нет уж — я сдаюсь."
  - char: "algerie"
    side: "left"
    text:
      - "...Хм? Погоди-ка, ты ранена?!"
  - char: "la_galissonniere"
    side: "right"
    text:
      - "Мелкие царапины. Вернусь на базу, немного отдохну, и всё пройдёт."
      - "Как обстановка в Доминионе?"
  - char: "algerie"
    side: "left"
    text:
      - "Как бы это сказать... скрытые течения?"
  - char: "la_galissonniere"
    side: "right"
    text:
      - "Значит, я вернулась не слишком поздно..."
      - "Госпожа Клемансо давала какие-нибудь указания перед твоим уходом?"
  - char: "algerie"
    side: "left"
    text:
      - "Вообще-то да."
      - "Но давай сначала вернёмся на базу, нужно заняться твоими ранами."

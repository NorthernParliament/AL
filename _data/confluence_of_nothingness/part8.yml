chapter1:
  rows:
  - text:
      - "Под багрово-красным небом раскинулась чёрная морская гладь."
      - "Всё ещё пылающие обломки сталкивались и рушились друг на друга."
  - char: "gneisenau_meta"
    side: "left"
    status: "is-meta"
    text:
      - "Это место..."
      - "Ах, я вспомнила..."
      - "Это мои охотничьи угодья, а также моя могила..."
  - text:
      - "БАБАХ!!!"
      - "Артиллерийский огонь вновь разорвал обломки на куски, превращая их в пепел, который морской бриз уносил прочь, не оставляя и следа."
      - "Какой по счёту это был её день или ночь, сколько врагов она уже уничтожила... это давно потеряло значение."
      - "Скитаться по бескрайнему морю, предавая уничтожению всё, что попадалось на глаза, казалось единственным смыслом её нынешнего существования."
  - char: "gneisenau_meta"
    side: "left"
    status: "is-meta"
    text:
      - "Верно... В этом единственный смысл моего существования."
      - "Мне не нужно думать, не нужно чувствовать. Достаточно лишь непрерывно истреблять врагов..."
  - text:
      - "Гнейзенау без остановки мчалась по воде — словно стоило ей замереть хотя бы на миг, и ледяная пучина под ногами тут же поглотит её."
      - "В этот самый момент в её ушах завыл сигнал торпедной тревоги."
      - "В непроглядной тьме под водой к ней на бешеной скорости что-то приближалось."
  - char: "gneisenau_meta"
    side: "left"
    status: "is-meta"
    text:
      - "...Хех, очередное подкрепление подоспело?"
      - "Жалкие трюки... Что?!"
  - text:
      - "Гнейзенау одним точным залпом разнесла летящие в неё торпеды, но в то же мгновение из воды вынырнул силуэт и напролом бросился прямо на неё."
  - char: "u556_meta?"
    side: "right"
    status: "is-meta"
    text:
      - "........!"
  - char: "gneisenau_meta"
    side: "left"
    status: "is-meta"
    text:
      - "Т-ты... U-556?!"
  - text:
      - "Увидев то, чего она никак не ожидала, Гнейзенау на мгновение потеряла самообладание перед нападавшей."
      - "Она инстинктивно попыталась уклониться, но всё равно покачнулась и отлетела назад на приличное расстояние."
  - char: "gneisenau_meta"
    side: "left"
    status: "is-meta"
    text:
      - "Ты ведь должна быть вместе с госпожой Бисмарк..."
      - "Почему ты оказалась здесь?! И... почему ты стала такой?"
      - "Неужели ты... прямо как и я... превратилась в проклятую..."
  - char: "u556_meta?"
    side: "right"
    status: "is-meta"
    text:
      - "Нужно спешить... Скорее туда... Я должна успеть..."
  - text:
      - "U-556 проигнорировала призыв Гнейзенау. Промахнувшись, она снова ушла под воду и на полной скорости устремилась к сиянию вдалеке."
  - char: "gneisenau_meta"
    side: "left"
    status: "is-meta"
    text:
      - "Погоди... Что вообще происходит?.."
      - "Это сияние... свет, исходящий от Башни Мидгарда?"
      - "Точно... Я вспомнила..."
      - "Я ведь уже нашла тех, кого должна защищать... Как я могу утопать в этих нелепых иллюзиях!"

chapter2:
  rows:
  - char: "gneisenau_meta"
    side: "left"
    status: "is-meta"
    text:
      - "...Не думала, что даже я поддамся влиянию кошмара."
      - "Неужели это связано с тем импульсом, который незадолго до этого вырвался из центра управления?.."
      - "Точно, Ульрих, Дзуйкаку и центр управления..."
  - text:
      - "Гнейзенау огляделась по сторонам и поняла, что находится на элементах внешнего кольца Башни Мидгарда."
      - "А неподалёку виднелся силуэт той, что, судя по всему, всё ещё была погружена в глубокий кошмар."
  - char: "gneisenau_meta"
    side: "left"
    status: "is-meta"
    text:
      - "...Надеюсь, взрывная волна приведёт её в чувство."
      - "Хех, пожалуй, в будущем стоит носить с собой немного холостых снарядов..."
  - text:
      - "БАБАХ!!!"

chapter1:
  rows:
  - char: "ulrich_von_hutten"
    side: "left"
    text:
      - "Госпожа Бисмарк, враг отступил."
      - "Ты добилась желаемого результата?"
  - char: "bismarck_z"
    side: "right"
    text:
      - "К сожалению, мои намерения разгадали."
      - "Но нельзя сказать, что я вернулась ни с чем."
      - "Я считаю, что эти враги фундаментально отличаются от Сирен."
      - "Возможно, они предстают перед нами в таких силуэтах лишь потому, что в нашем понимании большинство врагов — это Сирены."
      - "Мы не можем разглядеть их детали, возможно, потому, что само их существование выходит за рамки нашего восприятия."
      - "А может быть, те враги, что стоят перед нами, — это лишь искаженные проекции некой сущности."
      - "...Какой бы из этих вариантов ни оказался правдой, для нас они слишком опасны."
  - char: "zuikaku"
    side: "left"
    text:
      - "Проекции?.. Кажется, ты уже упоминала что-то о проекциях."
  - char: "bismarck_z"
    side: "right"
    text:
      - "Верно, та сырая теория, что была у меня раньше, теперь в целом сформировалась."
      - "Возможно, мы находимся внутри гигантских «песочных часов»..."

chapter2:
  rows:
  - char: "ulrich_von_hutten"
    side: "left"
    text:
      - "Звучит немного за гранью здравого смысла... но в то же время вполне соответствует моим представлениям об установках Сирен."
      - "Как и в случае с Зеркальными морями, они любят вот так прятать целые пространства, чтобы никто не мог увидеть картину целиком."
  - char: "zuikaku"
    side: "right"
    text:
      - "А что тогда означает изменение цвета в зонах?"
  - char: "bismarck_z"
    side: "left"
    text:
      - "В этом я уже убедилась во время недавнего боя."
      - "Можно с уверенностью сказать, что изменение цвета означает заражение, или, иными словами, МЕТА-коррозию."
      - "Это заражение началось с первой активации, которую Ульрих произвела в своём кошмаре, и оно продолжает распространяться с каждым нашим перемещением через Башню Мидгарда."
      - "Когда заражение в акватории достигает определенного уровня, появляются те неизвестные враги."
  - char: "zuikaku"
    side: "right"
    text:
      - "А, вот почему Сирены сражались с этими неизвестными врагами! Для этого места неизвестные враги — такие же захватчики!"
  - char: "gneisenau_meta"
    side: "left"
    status: "is-meta"
    text:
      - "В таком случае... становится понятно, почему та серийная модель Отшельника в первую очередь атаковала Башню Мидгарда, а не нас."
      - "Она хотела уничтожить канал, по которому распространяется это заражение."
  - char: "zuikaku"
    side: "right"
    text:
      - "Погодите... Если это место действительно является мейнфреймом Арбитров, разве это не значит, что какой-то неизвестный враг прямо сейчас атакует мейнфрейм Арбитров?!"
  - char: "bismarck_z"
    side: "left"
    text:
      - "Верно, и для этого он использовал нас."
      - "Наше первоначальное предположение о том, что это ловушка, было верным, но... это ловушка не Арбитров."
      - "...Сами Арбитры тоже являются целью."
  - char: "zuikaku"
    side: "right"
    text:
      - "Это просто невероятно... А как же та неизвестная МЕТА?"
  - char: "bismarck_z"
    side: "left"
    text:
      - "Честно говоря, я не знаю. МЕТА — это лишь свойство, а не фракция."
      - "Будучи МЕТА, их цели могут кардинально различаться и даже противоречить друг другу..."
      - "Однако, раз уж мы смогли отследить её, вероятность того, что именно она является кукловодом во всей этой истории, крайне мала."
      - "Возможно, её заманили сюда так же, как и нас, или же она пришла, чтобы остановить того, кто за всем этим стоит..."
  - char: "ulrich_von_hutten"
    side: "right"
    text:
      - "Погоди, госпожа Бисмарк... Кошмар ведь начался с нашей крепости на парящем острове, а это значит..."
      - "Этот неизвестный враг, способный атаковать Арбитров, скрывается в нашем мире?!"
  - char: "bismarck_z"
    side: "left"
    text:
      - "Боюсь, что так... По крайней мере, он способен оказывать достаточно сильное влияние на наш мир."
  - char: "ulrich_von_hutten"
    side: "right"
    text:
      - "У меня очень плохое предчувствие... Думаю, мы должны вернуться как можно скорее, нельзя терять ни секунды."
  - char: "bismarck_z"
    side: "left"
    text:
      - "...Что ты хочешь этим сказать?"
      - "...Там осталась Ойген. В случае чрезвычайной ситуации она может взять командование флотом Железной Крови на себя."
      - "...Нам действительно нужно вернуться как можно скорее."
  - char: "regensburg"
    side: "right"
    text:
      - "Но, госпожа Бисмарк, судя по твоим словам, дальнейшая активация Башни Мидгарда приведет к еще большему распространению заражения."
      - "Мы всё ещё будем её использовать?"
  - char: "bismarck_z"
    side: "left"
    text:
      - "Мы больше не можем активировать Башню Мидгарда."
      - "Кто бы всё это ни спланировал, он явно использует наши активации Башни Мидгарда, чтобы планомерно продвигать свой план."
      - "Если вся акватория превратится в «красную зону», трудно даже представить, что произойдёт."
      - "Однако мы должны продолжать движение."
      - "Всю дорогу Башня Мидгарда позволяла нам двигаться лишь в одном направлении, создавая иллюзию, что здесь есть только один путь."
      - "Но... только что во время боя я поручила Гериону провести разведку."
      - "Здесь не было обнаружено никаких следов, оставленных той МЕТА."
      - "Это значит, что неизвестная МЕТА пошла не по нашему пути."
      - "Найти этот другой путь — вот наша следующая задача."
  - char: "jade"
    side: "right"
    text:
      - "Но ведь в этой акватории есть только Башня Мидгарда, координаты которой мы не можем изменить..."
  - char: "bismarck_z"
    side: "left"
    text:
      - "Возможно... вход на другой путь находится в центре управления."
  - text:
      - "Бисмарк вспомнила туман, который видела в кошмаре Ульрих, и мимолётную вспышку света, когда этот туман рассеялся."
  - char: "bismarck_z"
    side: "left"
    text:
      - "Мне всё время казалась странной одна деталь."
      - "Все кошмары бесформенны, так почему же только тот, что в центре управления, имеет конкретный видеоряд и может бесконечно проигрываться перед каждым, кто его увидит?"
      - "Только эти кадры вызывают у меня совершенно иное чувство..."
      - "Возможно, так же, как и все те удивительные свойства, подобные проекциям, которые демонстрирует это пространство..."
      - "...Само это видео тоже является проекцией некого прохода..."
      - "Давайте осмотрим его ещё раз."

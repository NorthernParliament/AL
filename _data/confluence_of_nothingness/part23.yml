chapter1:
  rows:
  - text:
      - "Столб света в центре Башни Мидгарда замерцал."
      - "С активацией установки отряд снова совершил перенос."
  - char: "regensburg"
    side: "left"
    text:
      - "Госпожа Бисмарк, красная зона снова расширилась."
      - "Мы также отдалились от Башни Мидгарда, кажется, сейчас всё прямо противоположно тому, что было раньше."
  - char: "u556_meta?"
    side: "right"
    status: "is-meta"
    text:
      - "А это значит, что мы движемся в направлении от центра..."
      - "Я ведь права, сестрица Бисмарк?!"
  - char: "bismarck_z"
    side: "left"
    text:
      - "Похоже на то."
  - char: "zuikaku"
    side: "right"
    text:
      - "В направлении от центра — это как?.."
  - char: "bismarck_z"
    side: "left"
    text:
      - "На самом деле, у нас только что появилось одно предположение относительно нашей текущей ситуации, но нам нужно собрать больше доказательств."
  - char: "gerion"
    side: "right"
    status: "is-meta"
    text:
      - "▁▂▃▄▅▆▇███Настороженное рычание██▌"
  - char: "bismarck_z"
    side: "left"
    text:
      - "Хм, началось..."
  - char: "zuikaku"
    side: "right"
    text:
      - "А, я тоже их вижу!"
      - "Эти жуткие на вид враги приближаются к нам со стороны «красной зоны»!"
  - char: "jade"
    side: "left"
    text:
      - "В этот раз они идут спереди..."
      - "Сирены хотят загнать нас внутрь, а эти штуки пытаются выгнать нас оттуда."
      - "Мы оказались меж двух огней!"
  - char: "bismarck_z"
    side: "right"
    text:
      - "(Площадь «красной зоны» увеличилась, и появились эти странные враги...)"
      - "(Что ж, это отличная возможность лучше изучить их природу.)"
      - "Ульрих, я передаю тебе командование в предстоящем бою."
  - char: "ulrich_von_hutten"
    side: "left"
    text:
      - "Без проблем, а ты что будешь делать?"
  - char: "bismarck_z"
    side: "right"
    text:
      - "Проведу небольшое расследование. Герион!"
  - char: "gerion"
    side: "left"
    status: "is-meta"
    text:
      - "▁▂▃▄▅▆▇███Возбужденное рычание██▌"
  - text:
      - "Герион взмыл высоко в небо, на время скрывшись из виду отряда."
      - "Бисмарк же отделилась от строя и на полной скорости устремилась в сторону неизвестных врагов."
  - char: "otto_von_alvensleben"
    side: "left"
    text:
      - "Э?! Что это госпожа Бисмарк собирается...?"
  - char: "ulrich_von_hutten"
    side: "right"
    text:
      - "Герион обладает способностью сопротивляться, рассеивать и даже обращать вспять МЕТА-коррозию."
      - "Госпожа Бисмарк, должно быть, намеревается использовать это, чтобы проанализировать природу этих врагов с близкого расстояния..."
      - "Позволим ей сосредоточиться на своей задаче. Всем слушать мои команды, приготовиться к бою!"

chapter2:
  rows:
  - text:
      - "Гигантский дракон с рёвом спикировал вниз, отвлекая на себя внимание большинства врагов."
      - "Пользуясь случаем, Бисмарк рванула прямо к ближайшей к ней «человекоподобной» цели."
  - char: "bismarck_z"
    side: "left"
    text:
      - "Даже с такого расстояния... всё ещё невозможно разглядеть их конкретный облик."
  - text:
      - "«Неописуемые» — это было первое слово, всплывшее в голове Бисмарк, когда она оказалась лицом к лицу с этими врагами на столь близком расстоянии."
  - char: "bismarck_z"
    side: "left"
    text:
      - "И всё же... позвольте мне раскрыть ваше истинное лицо!"
  - text:
      - "Бисмарк протянула руку прямо навстречу врагу."
      - "Однако в тот момент, когда она коснулась бурлящей чёрной тени, чёрная аура рассеялась, словно дым на сильном ветру."
      - "Рука не почувствовала ничего, словно они были совершенно неосязаемой пустотой."
  - char: "bismarck_z"
    side: "left"
    text:
      - "...Разгадали мои намерения?"
      - "Герион, поглоти их!"
  - char: "gerion"
    side: "right"
    status: "is-meta"
    text:
      - "▁▂▃▄▅▆▇███Настороженное рычание██▌"
  - char: "bismarck_z"
    side: "left"
    text:
      - "...Думаешь, лучше их не поглощать?"
      - "Это настолько опасно?"
  - char: "gerion"
    side: "right"
    status: "is-meta"
    text:
      - "▁▂▃▄▅▆▇███Согласное рычание██▌"
  - char: "bismarck_z"
    side: "left"
    text:
      - "...Я поняла. Смена задачи: устроим здесь хорошую взбучку и вместе с Ульрих уничтожим всех врагов до единого!"

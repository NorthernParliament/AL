chapter1:
  rows:
  - char: "zuikaku"
    side: "left"
    text:
      - "Ого... Так это и есть самая высокая точка всей Башни Мидгарда!"
      - "Я здесь ещё ни разу не была! Какой отсюда прекрасный вид~"
  - char: "ulrich_von_hutten"
    side: "right"
    text:
      - "В конце концов, Башня Мидгарда — это не туристическая достопримечательность."
      - "Помимо координации летательных аппаратов в военное время, сюда поднимаются разве что для технического обслуживания."
  - char: "zuikaku"
    side: "left"
    text:
      - "Кхм... Но сейчас-то мы используем её для боевой разведки!"
      - "Отсюда гнетущая атмосфера этого города ощущается ещё сильнее. Кажется, будто можно разглядеть каждую улочку..."
      - "Ты говорила, что тебя кое-что заинтересовало. Теперь ты можешь это подтвердить?"
  - char: "ulrich_von_hutten"
    side: "right"
    text:
      - "Вполне."
      - "Сама архитектура мне по-прежнему ни о чём не говорит, но она явно отличается от привычного стиля Сирен."
  - char: "zuikaku"
    side: "left"
    text:
      - "И правда, она скорее напоминает наш собственный стиль..."
  - char: "ulrich_von_hutten"
    side: "right"
    text:
      - "Но та высокая башня в центре не кажется тебе знакомой?"
  - char: "zuikaku"
    side: "left"
    text:
      - "Высокая башня в центре... А, только она отличается по стилю от окружающих зданий!"
      - "Она выглядит в точности как..."
  - char: "ulrich_von_hutten"
    side: "right"
    text:
      - "Та башня, которую мы видели в пространстве мейнфрейма Компилятор во время операции по её уничтожению."
  - char: "zuikaku"
    side: "left"
    text:
      - "Точно-точно! Неужели это место тоже является пространством мейнфрейма какой-то Сирены!?"
  - char: "ulrich_von_hutten"
    side: "right"
    text:
      - "Возможно."
  - char: "zuikaku"
    side: "left"
    text:
      - "Но здесь всё так сильно отличается от мейнфрейма Компилятор..."
      - "Уж не мейнфрейм ли это Отшельника?.. А-ха-ха-ха..."
  - char: "ulrich_von_hutten"
    side: "right"
    text:
      - "Невозможно определить наверняка. В конце концов, никто из нас не видел воочию, как выглядит мейнфрейм Арбитров."
      - "К тому же... это нелогично."
      - "Будучи источником, позволяющим Сиренам возрождаться после смерти, их мейнфрейм должен быть строго засекречен и надежно спрятан."
      - "Использовать собственный мейнфрейм в качестве ловушки — это слишком странно."
  - char: "gneisenau_meta"
    side: "left"
    status: "is-meta"
    text:
      - "Однако мейнфрейм Сирен — это одновременно и место с их самой надежной защитой."
  - char: "ulrich_von_hutten"
    side: "right"
    text:
      - "Намеренно показать уязвимость, чтобы заманить врага поглубже, а затем уничтожить его своей абсолютной мощью..."
      - "Такая тактика действительно существует, но... я не вижу в нас такой ценности, ради которой Арбитры стали бы использовать свой мейнфрейм в качестве приманки."
  - char: "gneisenau_meta"
    side: "left"
    status: "is-meta"
    text:
      - "Но если это и в самом деле мейнфрейм Арбитров, то у нас большие проблемы."
      - "С каждым использованием Башни Мидгарда пространство вокруг нас меняется."
      - "«Красная зона» в акватории постепенно разрастается, а «синяя зона» уменьшается."
      - "Сейчас «синей зоны» почти не осталось, а в небе появился этот перевернутый город."
      - "Что же будет в следующий раз? Вдруг синяя зона исчезнет полностью, и мы окажемся внутри этого города?"
  - char: "ulrich_von_hutten"
    side: "right"
    text:
      - "...Если так, то дело дрянь."
      - "Размеры нашего флота не составляют и десятой части от объединенного флота, который участвовал в уничтожении Компилятора. Не говоря уже о том, что наш противник — Сирена куда более высокого ранга, Арбитр."
      - "Разведка окончена. Возвращаемся и обсудим всё с госпожой Бисмарк."


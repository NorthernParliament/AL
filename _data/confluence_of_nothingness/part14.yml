chapter1:
  rows:
  - text:
      - "Бой вокруг Башни Мидгарда всё ещё продолжался."
      - "После того как боевой план Ульрих был приведен в действие, флот Сирен постепенно переключился на новые цели."
  - char: "gerion"
    side: "right"
    status: "is-meta"
    text:
      - "▁▂▃▄▅▆▇███РРРРРРРРРРР██▌"
  - text:
      - "Теперь в самом центре поля боя остались только U-556 и Бисмарк."
  - char: "u556_meta?"
    side: "left"
    status: "is-meta"
    text:
      - "Из тех, кто путается под ногами, осталась только ты одна?!"
      - "Отлично... Тогда давай покончим с этим быстро!"
      - "Сестрица Бисмарк всё ещё ждёт меня! Мне некогда тратить на тебя время!"
  - text:
      - "U-556 резко ускорилась и бросилась прямиком на Бисмарк."
  - char: "gerion"
    side: "right"
    text:
      - "▁▂▃▄▅▆▇███РРРРРРРРРРР██▌"
  - text:
      - "УДАР!"
      - "Крылья Гериона заблокировали атаку U-556. Встретив преграду, она временно отступила и ушла под воду."
  - char: "bismarck_z"
    side: "left"
    text:
      - "Герион, отступи."
  - char: "gerion"
    side: "right"
    status: "is-meta"
    text:
      - "▁▂▃▄▅▆▇███Недоуменное рычание██▌"
  - char: "bismarck_z"
    side: "left"
    text:
      - "Отступи. Предоставь это мне."
  - text:
      - "Герион, казалось, недовольно мотнул головой, после чего взмыл в воздух."
      - "Бисмарк сделала шаг назад, морская вода под её ногами пошла волнами."
  - char: "u556_meta?"
    side: "left"
    status: "is-meta"
    text:
      - "Открылась~ На этом всё, конец!"
  - text:
      - "U-556 снова выпрыгнула из воды, но Бисмарк даже не попыталась уклониться."
      - "Вместо этого в тот самый миг, когда малышка набросилась на неё, она раскинула руки и крепко заключила её в объятия."
  - char: "bismarck_z"
    side: "left"
    text:
      - "Верно... на этом всё, конец."

chapter2:
  rows:
  - text:
      - "В кромешной тьме морских глубин лишь над головой мерцал тусклый свет, на фоне которого медленно погружался чей-то силуэт."
  - char: "u556"
    side: "left"
    status: "is-meta"
    text:
      - "Сестрица Бисмарк!"
      - "Держись, я уже плыву!"
  - text:
      - "U-556 изо всех сил поплыла к этому погружающемуся силуэту."
      - "В какой-то момент чёрный туман застлал ей обзор. Вокруг девочки то и дело начали появляться враги, а продвигаться вперёд становилось всё труднее."
  - char: "u556"
    side: "left"
    status: "is-meta"
    text:
      - "Чёрт, откуда только берутся все эти твари?!"
      - "Сестрица Бисмарк... дождись меня!"
      - "Мы же договорились... Я верну тебя обратно, даже если придётся тащить на себе!"
      - "Чёрт, чёрт возьми!"
      - "Не путайтесь у меня под ногами!!!"
  - text:
      - "Разрыв, скопление, уничтожение, перерождение."
      - "Эти чёрные тени, словно в насмешку, непреодолимой стеной вставали между U-556 и тем самым силуэтом."
      - "Как бы она ни старалась, хоть цель и была так близко, она оставалась недосягаемой."
  - char: "u556"
    side: "left"
    status: "is-meta"
    text:
      - "Сестрица Бисмарк, прошу, подожди ещё немного..."
      - "Я спасу тебя, как только разделаюсь с этими тварями..."
      - "Сестрица... Бисмарк..."
  - text:
      - "Зрение девочки постепенно затуманивалось, но рука, которую она изо всех сил тянула вперёд, так и не опустилась."

chapter3:
  rows:
  - char: "nop"
    side: "left"
    text:
      - "U-556, уже всё позади."
  - text:
      - "В темноте раздался мягкий голос."
      - "Девочка через силу открыла глаза."
      - "Мерцающее тусклое сияние постепенно становилось всё более отчётливым."
      - "Погружающийся во тьму силуэт перед её глазами мало-помалу превратился в знакомое лицо."
  - char: "u556_meta?"
    side: "left"
    status: "is-meta"
    text:
      - "Сестрица Бисмарк... я... успела?.."
  - char: "bismarck_z"
    side: "right"
    text:
      - "Да, в конце концов ты успела, помнишь?"
  - char: "u556_meta?"
    side: "left"
    status: "is-meta"
    text:
      - "И правда... хе-хе... в конце концов я успела..."
      - "Сестрица Бисмарк, мне только что приснился кошмар."
      - "Во сне я изо всех сил старалась, но никак не могла до тебя добраться..."
  - char: "bismarck_z"
    side: "right"
    text:
      - "Сон — это всего лишь сон. Посмотри, разве я не стою прямо здесь перед тобой?"
  - char: "u556_meta?"
    side: "left"
    status: "is-meta"
    text:
      - "Ага... сестрица Бисмарк вместе со мной... стоит..."
      - "Под водой?!"
  - char: "bismarck_z"
    side: "right"
    text:
      - "Хе-хе, с возвращением, мой маленький морской рыцарь."
      - "Давай же положим конец этому кошмару..."

chapter4:
  rows:
  - text:
      - "Спустя какое-то время..."
  - char: "ulrich_von_hutten"
    side: "left"
    text:
      - "Бисмарк, наш бой окончен."
      - "У тебя... похоже, тоже всё закончилось."
  - char: "u556_meta?"
    side: "right"
    status: "is-meta"
    text:
      - "Ах, госпожа Ульрих! С тобой всё в порядке!"
  - char: "ulrich_von_hutten"
    side: "left"
    text:
      - "Это я должна у тебя спрашивать."
  - char: "jade"
    side: "right"
    text:
      - "Теперь-то ты узнаёшь, кто я?!"
  - char: "u556_meta?"
    side: "left"
    status: "is-meta"
    text:
      - "Угу! Ты Джейд!"
  - char: "otto_von_alvensleben"
    side: "right"
    text:
      - "А я, а я!"
  - char: "u556_meta?"
    side: "left"
    status: "is-meta"
    text:
      - "Альвенс!"
  - char: "jade"
    side: "right"
    text:
      - "Слава богу... К U-556 и правда вернулся рассудок."
      - "Но её облик так и не стал прежним."
  - char: "gneisenau_meta"
    side: "left"
    status: "is-meta"
    text:
      - "...Уже слишком поздно?"
  - char: "bismarck_z"
    side: "right"
    text:
      - "Нет... Пока рано делать окончательные выводы."
      - "Я сделала всё возможное в качестве первой помощи. Остальное... придётся отложить до нашего возвращения, когда мы поместим её в медицинский отсек."
  - char: "gneisenau_meta"
    side: "left"
    status: "is-meta"
    text:
      - "………………"
  - char: "u556_meta?"
    side: "right"
    status: "is-meta"
    text:
      - "Сестрица Бисмарк, не бери в голову! Этот облик выглядит довольно круто!"
      - "А в бою я чувствую, что переполнена силой! Я буду защищать всех этой новой силой!"
  - char: "bismarck_z"
    side: "left"
    text:
      - "Нельзя! В предстоящих битвах тебе запрещено вступать в бой без крайней необходимости."
      - "Не используй эту силу легкомысленно... Иначе МЕТА-коррозия будет разъедать тебя всё сильнее и сильнее."
  - char: "u556_meta?"
    side: "right"
    status: "is-meta"
    text:
      - "Э?! Вот как..."
      - "Раз уж сестрица так говорит, я буду слушаться!"
  - char: "zuikaku"
    side: "left"
    text:
      - "Как здорово! Хоть и не обошлось без трудностей, мы все наконец-то успешно воссоединились."
      - "И теперь нам остаётся сделать... только одно."
  - text:
      - "Все устремили взгляды на гигантскую установку, испускавшую в небо ослепительный свет."
  - char: "bismarck_z"
    side: "right"
    text:
      - "...У нас лишь один путь вперёд. Идёмте, мы снова пройдём через Башню Мидгарда."

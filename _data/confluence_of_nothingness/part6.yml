chapter1:
  rows:
  - char: "u556"
    side: "left"
    text:
      - "Сестрица Бисмарк, осторожно! Враг приближается!"
  - text:
      - "БАБАХ!!!"
      - "Практически одновременно с предупреждением U-556, издалека обрушился шквал яростного артиллерийского огня."
      - "Однако из-за того, что обстрел вёлся со слишком большой дистанции, этот залп не нанёс отряду существенного урона."
  - char: "regensburg"
    side: "left"
    text:
      - "Мощный залп... Будь это прямое попадание, нам бы пришлось несладко."
      - "Откуда взялись эти враги?!"
  - char: "jade"
    side: "right"
    text:
      - "С воздуха ничего не видно... U-556, враг идёт из-под воды?"
  - char: "u556"
    side: "left"
    text:
      - "Да-да, именно! Под водой просто куча, огромная куча серийных моделей Сирен!"
      - "И не только подлодки, там в воде прячутся и другие типы!"
  - char: "jade"
    side: "right"
    text:
      - "...Вражеский флот обнаружен. Они непрерывным потоком всплывают на поверхность и наступают на нас со всех сторон."
      - "Тип идентифицирован... Сирены IV типа..."
  - char: "otto_von_alvensleben"
    side: "left"
    text:
      - "IV типа?! Это те самые особые модели, с которыми госпожа Ульрих столкнулась в сингулярности?!"
      - "Я слышала, что они прекрасно экипированы, обладают невероятной боевой мощью, а уничтожение командного узла против них совершенно бесполезно..."
      - "Не думала, что мы встретим их здесь... Да ещё в таком количестве!"
      - "Дело дрянь, очень, ну просто очень плохо..."
  - text:
      - "БАБАХ!!!"
  - char: "regensburg"
    side: "left"
    text:
      - "Второй залп! Рассредоточиться!"

chapter2:
  rows:
  - char: "otto_von_alvensleben"
    side: "left"
    text:
      - "……"
  - char: "jade"
    side: "right"
    text:
      - "…………"
  - char: "regensburg"
    side: "left"
    text:
      - "………………………………？"
  - text:
      - "Взрывы вокруг грохотали один за другим, но ожидаемой ударной волны так и не последовало."
  - char: "bismarck_z"
    side: "left"
    text:
      - "И не надейтесь... Герион, защитную позицию!"
  - char: "gerion"
    side: "right"
    status: "is-meta"
    text:
      - "▁▂▃▄▅▆▇███РРРРРРРРРРРРР██▌"
  - text:
      - "Особые снаряды Сирен IV типа градом сыпались на крылья гигантского дракона, но не могли нанести им совершенно никакого вреда."
  - char: "u556"
    side: "left"
    text:
      - "О-хо-хо, сокруши их, Герион!"
  - char: "regensburg"
    side: "right"
    text:
      - "«Герион»?.. Госпожа Бисмарк, что это вообще за оснастка?.."
  - char: "bismarck_z"
    side: "left"
    text:
      - "Не думай, что только ты одна умеешь давать имена своей оснастке."
  - char: "regensburg"
    side: "right"
    text:
      - "Д-дело вовсе не в имени... Оснастка, которую ты только что использовала, принципиально отличается от моего Регины!"
  - char: "bismarck_z"
    side: "left"
    text:
      - "Отличная наблюдательность. Я ведь тоже не просто так столько времени восстанавливалась."
  - text:
      - "БАБАХ!!!"
      - "Заметив неладное, флот Сирен обрушил на них третий залп."
      - "Однако плотная стена огня вновь разбилась о парящего в воздухе дракона, так и не добравшись до целей на воде."
      - "В этот самый миг акватория, которая под ураганным огнём должна была превратиться в зону смерти, под защитой крыльев Гериона превратилась в безмятежную площадку для наблюдения за фейерверками."
  - char: "jade"
    side: "left"
    text:
      - "Это и правда... поразительно."
      - "Я никогда прежде не видела такой оснастки... Она просто великолепна."
  - char: "otto_von_alvensleben"
    side: "right"
    text:
      - "Да какое там великолепна, это же просто невероятно круто!!!!"
  - char: "bismarck_z"
    side: "left"
    text:
      - "Ха-ха, спасибо за похвалу."
      - "Принцип её работы довольно сложен, так что можете просто считать её прототипом следующего поколения оснастки Железной Крови."
      - "Поскольку остаётся ещё много нерешённых технических трудностей, планов по её массовому внедрению пока нет."
  - char: "u556"
    side: "right"
    text:
      - "Хи-хи-хи, вот она — истинная сила сестрицы Бисмарк!"
      - "Столько времени прошло, и наконец-то этим можно похвастаться перед всеми!"
  - char: "otto_von_alvensleben"
    side: "left"
    text:
      - "U-556! Так ты, оказывается, знала обо всём с самого начала?!"
  - char: "u556"
    side: "right"
    text:
      - "Хе-хе~ Ну конечно!~"
      - "Просто сестрица просила меня держать это в секрете. А как морской рыцарь, я обязана строго хранить тайны!"
      - "Вы тоже храните секрет об истинной силе сестрицы Бисмарк, ладно?"
  - char: "bismarck_z"
    side: "left"
    text:
      - "Полагаюсь на вас."
  - char: "regensburg"
    side: "right"
    text:
      - "Раз ты сама об этом просишь... Само собой разумеется."
  - char: "u556"
    side: "left"
    text:
      - "Хе-хе-хе, а теперь настало время для ответного удара!"
      - "Сестрица Бисмарк, давай вместе..."
  - text:
      - "С радостными криками ускорившаяся в сторону Бисмарк U-556 внезапно замедлила ход."
      - "Вслед за этим послышался её болезненный стон."
  - char: "bismarck_z"
    side: "left"
    text:
      - "U-556?! Что случилось?!"
  - text:
      - "Из воды вырвалась зловещая чёрная дымка и мгновенно начала окутывать тело U-556."
      - "БАБАХ!!!"
  - char: "otto_von_alvensleben"
    side: "left"
    text:
      - "Госпожа Бисмарк, новая атака!"
  - char: "bismarck_z"
    side: "right"
    text:
      - "Чёрт... Герион, приоритет на защиту!"
  - char: "gerion"
    side: "left"
    status: "is-meta"
    text:
      - "▁▂▃▄▅▆▇███РРРРРРРРРРРР██▌"

chapter3:
  rows:
  - char: "u556?"
    side: "right"
    status: "is-meta"
    text:
      - "...Сестрица Бисмарк... не надо... обо мне..."
      - "Защити сначала... всех остальных..."
  - text:
      - "Прежде чем чёрная аура окончательно поглотила её тело, U-556 в муках протянула руку вперёд."
      - "Затем она резко ушла на глубину и скрылась из виду на глазах у всего отряда."
      - "Бисмарк рванулась назад, пытаясь перехватить её, но было уже слишком поздно."
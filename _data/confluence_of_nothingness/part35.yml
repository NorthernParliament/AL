chapter1:
  rows:
  - text:
      - "Девушка в чёрных одеждах совершала какие-то манипуляции за консолью управления."
      - "Позади неё раздались шаги, и в помещение вошёл кто-то ещё."
  - char: "tower"
    side: "left"
    text:
      - "Дьявол, занята?"
      - "Кажется, я пришла не вовремя?"
  - char: "devil"
    side: "right"
    text:
      - "Башня, не ожидала, что это будешь ты."
  - char: "tower"
    side: "left"
    text:
      - "Это я должна была сказать."
      - "Где ты пропадала всё это время?"
      - "И что ты делаешь здесь, у Отшельник?"
  - char: "devil"
    side: "right"
    text:
      - "Как же раздражает..."
      - "В любом случае, твоя цель, скорее всего, мало чем отличается от моей."
      - "Я умываю руки и отступаю от этого дела, договорились?"
  - char: "tower"
    side: "left"
    text:
      - "Даже если мы закроем на это глаза, мы ещё не свели счёты за тот погром, который ты устроила у меня."
  - char: "devil"
    side: "right"
    text:
      - "Всё потому, что в твоём собственном доме завелись мыши."
  - char: "tower"
    side: "left"
    text:
      - "Это были шиншиллы."
  - char: "devil"
    side: "right"
    text:
      - "Да какая разница..."
      - "У меня ещё есть срочные дела. Может, мы просто продолжим выполнять свои задачи, не вмешиваясь в дела друг друга?"
  - char: "tower"
    side: "left"
    text:
      - "Это будет зависеть от твоего ответа на следующий вопрос."
      - "...Кто стоит за тобой?"

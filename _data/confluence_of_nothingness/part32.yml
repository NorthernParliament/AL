chapter1:
  rows:
  - text:
      - "Аномалии в акватории возникли почти в тот же момент, когда ковчег Отшельника был выведен из строя."
      - "Всё пространство завибрировало, и из-под воды медленно поднялось гигантское металлическое кольцо."
      - "Находясь в перевёрнутом городе, Бисмарк могла ясно видеть, как поднявшееся кольцо плотно соединилось с группой гигантских кубов в акватории."
      - "В самом центре возвышалась Башня Мидгарда."
  - char: "bismarck_z"
    side: "left"
    text:
      - "Хух... Так это и есть наша поддержка извне..."
      - "Как-то уж слишком грандиозно..."
  - text:
      - "Бисмарк опустилась на воду, а от стоящего неподалёку Гериона тоже начала исходить чёрная дымка."
  - char: "u556_meta"
    side: "right"
    status: "is-meta"
    text:
      - "Сестрица Бисмарк, ты в порядке?!"
  - char: "bismarck_z"
    side: "left"
    text:
      - "Не подходи ко мне!"
  - char: "u556_meta"
    side: "right"
    status: "is-meta"
    text:
      - "Всё хорошо... сестрица, смотри."
  - text:
      - "Точно так же, как и Гериона, красно-чёрная аура теперь окутывала и U-556."
  - char: "u556_meta"
    side: "right"
    status: "is-meta"
    text:
      - "...Эхе-хе, кажется, я немного перестаралась."
  - char: "bismarck_z"
    side: "left"
    text:
      - ".....Флот Инфорсеров берёт нас в кольцо, ты ещё можешь сражаться?"
  - char: "u556_meta"
    side: "right"
    status: "is-meta"
    text:
      - "Могу!"
  - char: "arizona_meta_rad"
    side: "left"
    status: "is-purple"
    text:
      - "...До этого ещё не дошло!"
      - "Вы отлично потрудились. Я Аризона, союзница Вестал."
      - "Дальше я со всем разберусь."
  - char: "tower544_rad"
    side: "right"
    status: "is-purple"
    text:
      - "45 78 65 63 75 74 65 63 6F 6E 74 72 6F 6C 70 72 6F 74 6F 63 6F 6C 2E (Запуск протокола управления)."
      - "49 6E 69 74 69 61 6C 69 7A 65 70 75 72 69 66 69 63 61 74 69 6F 6E 70 72 6F 67 72 61 6D 2E (Инициализация программы очистки)."

chapter2:
  rows:
  - text:
      - "Края кольца вспыхнули ослепительным светом, который в мгновение ока залил собой всё пространство."
      - "А затем свет рассеялся..."

chapter3:
  rows:
  - char: "regensburg"
    side: "left"
    text:
      - "Что вообще произошло...? Заражение в акватории исчезло в одно мгновение..."
  - char: "jade"
    side: "right"
    text:
      - "И все сигналы вражеских единиц тоже разом пропали?!"
      - "К тому же..."
  - char: "otto_von_alvensleben"
    side: "left"
    text:
      - "Э?!! Госпожа Бисмарк и U-556, когда вы успели спуститься?"
  - char: "bismarck_z"
    side: "right"
    text:
      - "...Э?"
  - text:
      - "К удивлению всех присутствующих, коррозия исчезла."
      - "Вся акватория, вместе с парящим в небе перевёрнутым городом, вернулась в нормальное состояние."
      - "Бисмарк и U-556, находившиеся в городе, тоже почти мгновенно оказались рядом со всеми."
  - char: "vestal_meta"
    side: "left"
    status: "is-purple"
    text:
      - "Что... за шутки..."
      - "Ты сама приняла это решение..."
  - char: "arizona_meta_rad"
    side: "right"
    status: "is-purple"
    text:
      - "Тс-с, это был единственный способ разрешить ситуацию."
  - char: "vestal_meta"
    side: "left"
    status: "is-purple"
    text:
      - "А Хелена?!"
  - char: "arizona_meta_rad"
    side: "right"
    status: "is-purple"
    text:
      - "Хелена сейчас не может вырваться."
      - "Но сейчас тебе стоит уделить внимание не этому, а тем двоим рядом с тобой."
  - char: "vestal_meta"
    side: "left"
    status: "is-purple"
    text:
      - "...Рядом?"
  - text:
      - "Услышав это, Вестал посмотрела на Бисмарк и U-556, которые только что вернулись из перевёрнутого города."
      - "Красно-чёрная аура уже полностью поглотила их обеих."
  - char: "vestal_meta"
    side: "left"
    status: "is-purple"
    text:
      - "...А?!"
      - "А?!!!!!!!"
      - "Вам двоим жить надоело?!!!!!"
      - "Всем остальным отойти!!!!"
  - text:
      - "Впавшая в панику Вестал подбежала к ним так быстро, словно летела."
  - char: "vestal_meta"
    side: "left"
    status: "is-purple"
    text:
      - "Эй, оставайся в сознании! Можешь говорить?"
  - char: "bismarck_z"
    side: "right"
    text:
      - "Не обращай на меня внимания..."
      - "Я уже... вернула все ограничители на место."
      - "Наверное... скоро всё пройдёт."
      - "Помоги... очистить U-556, прошу."
  - char: "vestal_meta"
    side: "left"
    status: "is-purple"
    text:
      - "...U-556, да? Хорошо."
      - "U-556, ты меня слышишь?"
  - char: "u556_meta"
    side: "right"
    status: "is-meta"
    text:
      - "...Как темно, сестрица Бисмарк... Где ты?"
  - char: "vestal_meta"
    side: "left"
    status: "is-purple"
    text:
      - "........................"
  - char: "bismarck_z"
    side: "right"
    text:
      - "Всё плохо... да?"
  - char: "vestal_meta"
    side: "left"
    status: "is-purple"
    text:
      - ".............................."
      - "......Её... ещё можно спасти."

chapter4:
  rows:
  - text:
      - "Вестал осторожно присела рядом с U-556, в её руке из ниоткуда появился синий куб."
      - "В то же время, один за другим, вокруг неё появилось больше десятка голубых кубов."
      - "Кубы закружились, словно впитывая исходящую от U-556 чёрную ауру."
      - "Лицо U-556 постепенно расслабилось, но цвет парящих голубых кубов начал медленно темнеть."

chapter5:
  rows:
  - text:
      - "*Хрусть*"
      - "В одно мгновение куб в руке Вестал окрасился в ослепительно красный цвет, а затем разлетелся на куски."
      - "Всегда спокойная Вестал сжала зубы, на её лице отразилась боль."
  - char: "vestal_meta"
    side: "left"
    status: "is-purple"
    text:
      - "Кхе, кхе-кхе... кхе-кхе......!!"
  - char: "zuikaku"
    side: "right"
    text:
      - "Госпожа Вестал, ты в порядке?!"
  - char: "vestal_meta"
    side: "left"
    status: "is-purple"
    text:
      - "Кхе... всё хорошо... просто нужно немного отдохнуть."
      - "(...Теперь мы в расчёте.)"

chapter6:
  rows:
  - text:
      - "Отказавшись от помощи Дзуйкаку, Вестал подняла U-556 из воды."
      - "К этому моменту U-556 уже избавилась от следов МЕТА-коррозии и полностью вернулась в своё обычное состояние."
  - char: "u556"
    side: "left"
    text:
      - "...Фух."
  - char: "jade"
    side: "right"
    text:
      - "Она... вернулась в норму?"
  - char: "otto_von_alvensleben"
    side: "left"
    text:
      - "U-556!"
  - char: "u556"
    side: "right"
    text:
      - "Уу... не обнимай так внезапно, я же вся мокрая..."
  - char: "regensburg"
    side: "left"
    text:
      - "О боже, её тело только-только восстановилось, будь поосторожнее."
  - char: "otto_von_alvensleben"
    side: "right"
    text:
      - "А-а, прости, прости!"
      - "Я так за тебя испугалась, думала, что ты больше никогда не станешь прежней!"
  - char: "u556"
    side: "left"
    text:
      - "Хе-хе, в конце концов, всё же обошлось~"
  - char: "arizona_meta_rad"
    side: "right"
    status: "is-purple"
    text:
      - "Похоже, этот инцидент благополучно разрешился."
      - "Что ж, тогда я оставляю устранение последствий на тебя. Соответствующие данные отправлены, пожалуйста, подтверди."
  - char: "vestal_meta"
    side: "left"
    status: "is-purple"
    text:
      - "...Данные подтверждаю, я поняла."
  - char: "arizona_meta_rad"
    side: "right"
    status: "is-purple"
    text:
      - "Аризона, конец связи."
  - char: "vestal_meta"
    side: "left"
    status: "is-purple"
    text:
      - "......................"
  - char: "bismarck"
    side: "right"
    text:
      - "Похоже, мы можем возвращаться?"
  - char: "vestal_meta"
    side: "left"
    status: "is-purple"
    text:
      - "Угу, я уже получила данные."
      - "Вам нужно лишь снова активировать Башню Мидгарда, и вы сможете вернуться."
      - "Однако, ты... и правда уже полностью восстановилась."
      - "...Вот оно что."
      - "И цена за это — неспособность Гериона сражаться в течение некоторого времени, верно?"
  - char: "bismarck"
    side: "right"
    text:
      - "Тс-с. Куда ты планируешь отправиться дальше?"
      - "Вернуться вместе со мной — это, наверное, невозможно."
  - char: "vestal_meta"
    side: "left"
    status: "is-purple"
    text:
      - "Угу, у меня здесь ещё остались незаконченные дела."
      - "После того как вы вернётесь, вы должны уничтожить эту искусственную сингулярность, известную как Башня Мидгарда."
      - "Именно её существование и привело к этому инциденту."
  - char: "bismarck"
    side: "right"
    text:
      - "...Уничтожить?"
      - "Ты знаешь, сколько ресурсов Железная Кровь потратила на строительство Башни Мидгарда?"
  - char: "vestal_meta"
    side: "left"
    status: "is-purple"
    text:
      - "Знаю."
      - "И я также знаю, насколько трудно принять такое решение..."
      - "Но её координаты уже отмечены, просто отключить её будет недостаточно."
      - "Если её не уничтожить, то в один прекрасный день коррозия, поглотившая здешние небеса и море, через Башню Мидгарда перенесётся и в ваш мир."
      - "Ты хочешь, чтобы это произошло?"
  - char: "bismarck"
    side: "right"
    text:
      - "...Я поняла. Башня Мидгарда будет разрушена, я обещаю."
  - char: "vestal_meta"
    side: "left"
    status: "is-purple"
    text:
      - "Отлично. Здесь нельзя долго оставаться, вам пора отправляться."

chapter7:
  rows:
  - text:
      - "В самом центре акватории вернувшаяся в нормальное состояние Башня Мидгарда мерцала синим светом."
      - "Гигантская установка медленно активировалась, и свет начал постепенно собираться у ног присутствующих."
  - char: "u556"
    side: "left"
    text:
      - "Спасибо тебе, сестрица Вестал!"
  - text:
      - "Под крик U-556 силуэты Бисмарк и её отряда исчезли из этой акватории."
  - char: "vestal_meta"
    side: "left"
    status: "is-purple"
    text:
      - "Мы ещё встретимся."
  - text:
      - "Вестал проводила их взглядом, и вскоре раздался звук вызова коммуникатора."
  - char: "vestal_meta"
    side: "left"
    status: "is-purple"
    text:
      - "...А я всё гадала, когда же ты выйдешь на связь."
      - "...Что ты планируешь делать дальше?"
      - "...Арбитр Башня XVI."

chapter1:
  rows:
  - text:
      - "Воздух на поле боя по-прежнему был обжигающим и едким."
      - "Тирпиц в этот момент неподвижно лежала на воде неподалёку."
  - char: "gerion"
    side: "right"
    status: "is-meta"
    text:
      - "▁▂▃▄▅▆▇███Печальное рычание██▌"
  - text:
      - "Герион расправил крылья, и мощный поток воздуха сбил пламя с окружающих обломков."
      - "Он опустился у ног Бисмарк, глядя на лежащий перед ней силуэт."
  - char: "bismarck_z"
    side: "left"
    text:
      - "...Тирпиц."
  - text:
      - "Бисмарк хотела подойти ближе, но Герион преградил ей путь."
  - char: "bismarck_z"
    side: "left"
    text:
      - "Я знаю, всё это лишь иллюзия..."
      - "..."
      - "Но..."
  - text:
      - "Герион отступил на полшага, расправил крылья и вновь взмыл в небо."
  - char: "bismarck_z"
    side: "left"
    text:
      - "...Ты прав, давай сосредоточимся на том, что мы действительно должны сделать."
      - "Герион, двигайся к границе, развей этот морской туман!"
  - char: "gerion"
    side: "right"
    status: "is-meta"
    text:
      - "▁▂▃▄▅▆▇███Возбужденный рёв██▌"
  - text:
      - "Подобный высокой стене морской туман отступил перед бурей, поднятой взмахами крыльев гигантского дракона."
  - char: "bismarck_z"
    side: "left"
    text:
      - "...Неизвестные летательные аппараты не появились, но здесь, как я и думала, есть проход."

chapter2:
  rows:
  - text:
      - "Бисмарк продвигалась сквозь туман по пути, проложенному Герионом."
      - "Границы акватории, казалось, непрерывно расширялись по мере её продвижения, а их масштаб далеко превосходил любые ожидания."
      - "Наконец, впереди показался луч света."
  - char: "gerion"
    side: "right"
    status: "is-meta"
    text:
      - "▁▂▃▄▅▆▇███Возбужденное рычание██▌"
  - text:
      - "Издав низкий рык, Герион на полной скорости устремился к источнику света."
  - char: "bismarck_z"
    side: "left"
    text:
      - "Хм? Неужели ты обнаружил... какой-то проход?!"
  - text:
      - "Без малейших колебаний Бисмарк тоже бросилась к свету."

chapter3:
  rows:
  - text:
      - "Бисмарк вместе с Герионом исчезли в этом сиянии..."

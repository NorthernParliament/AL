chapter1:
  rows:
  - text:
      - "В комнате эхом раздавался шёпот молящегося."
  - char: "marco_polo"
    side: "left"
    status: "is-yellow"
    text:
      - "«Слушай, люди говорят друг с другом»."
      - "«Они хотят взять кирпичи вместо камня, и смолу вместо извести»."
      - "«Они хотят построить город, и хотят построить башню»."
      - "«Величественный город, с башней до самых небес»."
      - "«Они хотят объединиться и прославить своё имя на весь мир»."
      - "...О, Боже."
      - "...Позволишь ли ты этому свершиться?"

chapter2:
  rows:
  - text:
      - "Шёпот стих, похоже, молитва подошла к концу."
  - char: "trento_meta"
    side: "right"
    status: "is-meta"
    text:
      - "...Ты закончила?"
  - char: "marco_polo"
    side: "left"
    status: "is-yellow"
    text:
      - "Закончила. Что ты увидела?"
  - char: "trento_meta"
    side: "right"
    status: "is-meta"
    text:
      - "Мерцающее пламя свечи... пустую фазу астролябии... перевёрнутую Башню..."
  - char: "marco_polo"
    side: "left"
    status: "is-yellow"
    text:
      - "Всё это... довольно неплохие образы!"
      - "Пойдём, пришло время приоткрыть завесу."
      - "Ахахахахахаха..."

chapter1:
  rows:
  - char: "u556_meta?"
    side: "left"
    status: "is-meta"
    text:
      - "Сестрица Бисмарк, а мы не будем участвовать в поисках?"
  - char: "bismarck_z"
    side: "right"
    text:
      - "Нет. Людей для поисков и так достаточно, к тому же Герион тоже отправился с ними."
      - "А я пока хочу привести мысли в порядок, а заодно послушать твоё мнение."
  - char: "u556_meta?"
    side: "left"
    status: "is-meta"
    text:
      - "Если я хоть чем-то смогу помочь~"
  - char: "bismarck_z"
    side: "right"
    text:
      - "Угу... Во-первых, на что, по-твоему, похожа эта акватория, или, лучше сказать, это пространство?"
  - char: "u556_meta?"
    side: "left"
    status: "is-meta"
    text:
      - "Хм... На что похожа?.."
  - char: "bismarck_z"
    side: "right"
    text:
      - "Не бойся, просто опирайся на интуицию. Говори первое, что приходит в голову."
  - char: "u556_meta?"
    side: "left"
    text:
      - "Если опираться на интуицию... На песочные часы!"
      - "Сестрица Бисмарк, тебе не кажется, что здесь всё в точности как в песочных часах?!"
  - char: "bismarck_z"
    side: "right"
    text:
      - "Песочные часы?"
  - char: "u556_meta?"
    side: "left"
    text:
      - "Ага! Супер-супер гигантские песочные часы!"
      - "Всё пространство, в котором мы оказываемся после каждого перемещения — это всего лишь тонкий срез этих песочных часов!"
      - "И песок в этих часах меняет свой цвет!"
      - "Башня Мидгарда в центре — это канал, по которому сыплется песок."
      - "Мы движемся вслед за синим светом, и синяя морская вода течёт вслед за ним."
      - "Поэтому синей воды становится всё меньше, а красной — всё больше!"
      - "А потом, потом! То место, где раньше был город — это как бы узкое горлышко песочных часов!"
      - "Вот почему для нас он выглядел перевёрнутым вверх дном в небе!!"
      - "И когда мы пересекли этот центр и оказались на другой стороне песочных часов, все цвета поменялись!"
      - "Потому что это песочные часы, меняющие цвет! Синий песок проходит через узкое горлышко и становится красным!"
  - char: "bismarck_z"
    side: "right"
    text:
      - "Цвет свечения Башни Мидгарда и водной глади вокруг неё действительно всегда совпадали..."
      - "Песок движется по Башне Мидгарда, проходит через центр, а затем меняет цвет..."
      - "Подожди..."

chapter2:
  rows:
  - char: "zuikaku"
    side: "left"
    text:
      - "К слову, когда мы только прибыли сюда, в акватории вообще не было «красной зоны»."
  - char: "ulrich_von_hutten"
    side: "right"
    text:
      - "Вот как?.."
  - char: "zuikaku"
    side: "left"
    text:
      - "Ах да, госпожа Ульрих всё это время была словно во сне, так что вполне нормально, что ты этого не помнишь."
      - "Верно, когда мы последовали прямо за тобой, в акватории точно не было никакой «красной зоны»."
  - char: "ulrich_von_hutten"
    side: "right"
    text:
      - "Сон... Я смутно припоминаю, что, кажется, активировала Башню Мидгарда во сне один раз."
      - "...Тогда центр башни не светился, и в акватории не было тех гигантских кубов."
  - char: "zuikaku"
    side: "left"
    text:
      - "Э? Что касается кубов, то когда мы с госпожой Гнейзенау МЕТА прибыли, они уже были там."
  - char: "regensburg"
    side: "right"
    text:
      - "То есть госпожа Ульрих активировала Башню Мидгарда во сне, а затем во внешнем, реальном мире появились гигантские кубы..."

chapter3:
  rows:
  - char: "bismarck_z"
    side: "left"
    text:
      - "(Когда Ульрих прибыла, в акватории не было ни красных зон, ни этих кубов.)"
      - "(Ульрих во сне активировала башню, и после этого Дзуйкаку и Гнейзенау, прошедшие через Башню Мидгарда, обнаружили кубы, но красного цвета всё ещё не было.)"
      - "(Когда прибыли мы, красный цвет уже появился, и с каждой активацией Башни Мидгарда площадь красной зоны значительно увеличивалась.)"
      - "(К тому же в красной воде присутствует аура МЕТА-коррозии...)"
      - "(Погодите... таинственные враги в первую очередь появились именно из красной морской воды.)"
      - "(А Сирены ведут с ними бой.)"
      - "(Если предположить, что это и есть мейнфрейм Арбитров, неужели...?!)"
  - char: "u556_meta?"
    side: "right"
    status: "is-meta"
    text:
      - "Сестрица Бисмарк? Твоё лицо резко изменилось."
      - "...Ты о чём-то догадалась?"
  - char: "bismarck_z"
    side: "left"
    text:
      - "Угу... У меня только что появилась одна очень плохая догадка."
      - "...Возможно, в центре управления найдутся нужные мне доказательства."
      - "Давай сначала войдём внутрь..."

chapter4:
  rows:
  - char: "u556_meta?"
    side: "left"
    status: "is-meta"
    text:
      - "Сестрица Бисмарк, скорее посмотри!!"
  - text:
      - "Войдя в центр управления, они обе сразу же заметили, что «экран», который ранее разбила Ульрих, собрался воедино и теперь транслировал совершенно новые кадры."
  - char: "u556_meta?"
    side: "right"
    status: "is-meta"
    text:
      - "Как же так... Весь флот Железной Крови?!"
  - text:
      - "На этот раз на экране предстала ужасающая картина разгрома флота Железной Крови. Даже Тирпиц лежала среди горящих обломков и застилающего небо пепла."
  - char: "bismarck_z"
    side: "left"
    text:
      - "...Не поддавайся панике, это всего лишь сфабрикованная иллюзия."
      - "Она ничем не отличается от предыдущих."
  - char: "gneisenau_meta_rad"
    side: "right"
    status: "is-meta"
    text:
      - "Госпожа Бисмарк... К сожалению, мы ничего не нашли."
      - "Госпожа Ульрих всё ещё продолжает поиски, но мне кажется, что эта неизвестная МЕТА уже покинула нас."
  - char: "gerion"
    side: "left"
    status: "is-meta"
    text:
      - "▁▂▃▄▅▆▇███Согласное рычание██▌"
  - char: "ulrich_von_hutten_rad"
    side: "right"
    text:
      - "Слишком рано делать выводы! Если мы сможем найти эту МЕТА, возможно, ситуация изменится к лучшему!"
  - char: "bismarck_z"
    side: "left"
    text:
      - "Ульрих, я понимаю твои чувства, но сейчас это не наша главная задача."
      - "Раз уж в этой акватории находится настолько могущественная МЕТА, рано или поздно мы с ней столкнёмся."
  - char: "ulrich_von_hutten_rad"
    side: "right"
    text:
      - "...Я поняла, поисковая миссия завершена. Мы возвращаемся."
  - char: "bismarck_z"
    side: "left"
    text:
      - "Да, кстати, точка сбора изменилась. Вам не нужно идти в центр управления, собираемся сразу в зоне отправления."

chapter5:
  rows:
  - char: "u556_meta?"
    side: "left"
    status: "is-meta"
    text:
      - "Хе-хе~ Сестрица Бисмарк, я смогла помочь?"
  - char: "bismarck_z"
    side: "right"
    text:
      - "Угу, выдвинутая тобой гипотеза весьма интересна."
      - "Смотри, сейчас в центре Башни Мидгарда мерцает красный свет."
      - "Если твоя гипотеза верна, то всё это пространство представляет собой гигантскую установку более высокого измерения."
      - "В таком случае, если после следующего перемещения «красная зона» увеличится, это будет означать, что мы удаляемся от центра."
  - char: "u556_meta?"
    side: "left"
    status: "is-meta"
    text:
      - "Наша конечная цель — попасть в этот город в центре?"
  - char: "bismarck_z"
    side: "right"
    text:
      - "Я тоже поначалу так думала... Но, похоже, всё не так просто."
      - "Настоящая опасность... возможно, поджидает нас ещё глубже в тумане."
      - "Идём, нам пора отправляться в зону отправления."

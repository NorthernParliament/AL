chapter1:
  rows:
  - text:
      - "Флот усиления плавучих крепостей Железной Крови"
      - "Флагман: Бисмарк"
      - "Статус: В процессе сбора"
      - "Где-то в акватории Серебряного океана..."
  - char: "u556"
    side: "left"
    text:
      - "Курс верный, видимость отличная, погода... хм, небольшие кучево-дождевые облака!"
      - "Но ничего страшного, прорвёмся!"
      - "Хе-хе... Давненько я не выходила на задания, да ещё и вместе с сестрицей Бисмарк..."
      - "Сегодня я наплаваюсь вовсю~"
  - char: "bismarck"
    side: "right"
    text:
      - "Твоё тело всё ещё восстанавливается, так что рассчитывай свои силы."
  - char: "u556"
    side: "left"
    text:
      - "Конечно, я буду осторожна!"
      - "Ведь если я выйду из строя, кто тогда позаботится о тебе, сестрица?"
  - char: "bismarck"
    side: "right"
    text:
      - "...Ха-ха, а ты умеешь подбирать слова."
      - "Я тоже постараюсь не сломаться."
      - "Не каждому даётся второй шанс, подобный моему..."
      - "К тому же на моих плечах лежит огромная ответственность... Предстоит сделать так много, что выйти из строя в этот момент было бы огромной проблемой."
  - char: "u556"
    side: "left"
    text:
      - "Сестрица Бисмарк..."
  - char: "bismarck"
    side: "right"
    text:
      - "Извини, я испортила атмосферу."
      - "Хм... В качестве компенсации, как насчёт концерта, когда мы вернёмся?"
  - char: "u556"
    side: "left"
    text:
      - "Не нужно, не нужно! Достаточно того, чтобы ты больше не перенапрягалась, сестрица!"
      - "Теперь, когда я рядом, я обязательно защищу тебя!"
  - char: "bismarck"
    side: "right"
    text:
      - "Какая же ты надёжная."
  - char: "u556"
    side: "left"
    text:
      - "Хе-хе~ Тогда я продолжу патрулирование, не отставай от меня, сестрица!"
  - char: "bismarck"
    side: "right"
    text:
      - "(...Ты уже сделала более чем достаточно. Теперь моя очередь защищать тебя.)"
      - "(Именно ради этого я прошла сквозь ад и возродилась...)"
  - text:
      - "U-556 шла впереди неё, с любопытством оглядываясь по сторонам: она то выпрыгивала из воды, то погружалась на глубину, словно резвящийся дельфин."
      - "Бисмарк следовала за ней, задумчиво глядя ей в спину."

chapter2:
  rows:
  - char: "queen_elizabeth_rad"
    side: "right"
    status: "is-yellow"
    text:
      - "...Хм?"
      - "Из Скапа-Флоу пришло срочное донесение. Похоже, у Врат Авалона... возникли какие-то аномалии."
      - "Я должна лично с этим разобраться, так что на сегодня закончим наше собрание."
      - "...Ах да. И ещё одно напоминание: ради безопасности всех нас, ни в коем случае не запускайте Башню Мидгарда в ближайшее время."
      - "Конец связи."

chapter3:
  rows:
  - char: "bismarck"
    side: "right"
    text:
      - "(Но ведь как раз в это же время пропала связь и с плавучими крепостями...)"
      - "(Восстановить контакт не удаётся, а отправленные серийные патрульные отряды не отвечают.)"
      - "(Неужели что-то случилось с Башней Мидгарда...)"
      - "(Если судить по силам гарнизона, то двух флотов Ульрих и Петер вместе с Гнейзенау МЕТА должно быть более чем достаточно, чтобы справиться с обычным врагом.)"
      - "(Но разве может враг, способный одновременно вмешаться в работу и Башни Мидгарда, и Врат Авалона, быть обычным...)"
      - "(Надеюсь, с гарнизонным флотом всё в порядке...)"

chapter4:
  rows:
  - text:
      - "Тёмные тучи заволокли небо над морем, откуда-то издалека доносились глухие раскаты грома."
      - "И под этим хмурым небом, рассекая волны и ветер, на полной скорости шли две фигуры."
  - char: "jade"
    side: "left"
    text:
      - "Погода хуже некуда... Эффективность разведки сейчас сильно упадёт."
  - char: "otto_von_alvensleben"
    side: "right"
    text:
      - "Ну тут уж ничего не поделаешь, экстренное задание ждать не будет."
      - "Переброска флота с материка заняла бы слишком много времени, так что мы вместе с госпожой Бисмарк — это единственные доступные силы."
      - "Придётся нам как-то перетерпеть эти капризы погоды!"
  - char: "jade"
    side: "left"
    text:
      - "Я к тому, что в этих местах часто появляется Пьюрифайер. Будет скверно, если мы на неё наткнёмся."
  - char: "otto_von_alvensleben"
    side: "right"
    text:
      - "Да ну, не может быть! Мы уже сто лет её не видели."
  - char: "jade"
    side: "left"
    text:
      - "Ну, это уж как нам повезёт♪"
      - "...Ой, кажется, я и правда вижу впереди аномальную цель."
  - char: "otto_von_alvensleben"
    side: "right"
    text:
      - "Что?! Неужели нам настолько не повезло..."
  - char: "jade"
    side: "left"
    text:
      - "Длинные волосы, огромная, похожая на крылья оснастка с орудиями.."
  - char: "otto_von_alvensleben"
    side: "right"
    text:
      - "По описанию... Неужели это правда Пьюрифайер?!"
      - "Что же делать, давай бежать... Уйдём в безопасное место, а потом извинимся перед госпожой Бисмарк."
  - char: "jade"
    side: "left"
    text:
      - "Цель приближается к нам на огромной скорости. Боюсь, даже если мы захотим сбежать, у нас уже не получится."
  - char: "otto_von_alvensleben"
    side: "right"
    text:
      - "...У-у-у, тогда будем отступать с боем!"
      - "Или я прикрою тебя, а ты скорее уходи!!!"
  - char: "jade"
    side: "left"
    text:
      - "...Э?"
  - char: "otto_von_alvensleben"
    side: "right"
    text:
      - "Авианосец важнее для флота Железной Крови, чем эсминец! Я костью лягу, но прикрою твой отход!"
  - char: "jade"
    side: "left"
    text:
      - "Погоди, погоди... Да я же просто пошутила, пошутила!"
  - char: "otto_von_alvensleben"
    side: "right"
    text:
      - "Не нужно меня... утешать... Я уже сама вижу приближающийся огромный силуэт."
      - "Оставь это на меня и скорее спасайся!"
  - char: "jade"
    side: "left"
    text:
      - "...Да нет же, посмотри повнимательнее, кто это к нам приближается!"
  - char: "otto_von_alvensleben"
    side: "right"
    text:
      - "Я же прекрасно вижу: длинные волосы, огромная, похожая на крылья оснастка с орудиями..."
  - char: "regensburg"
    side: "left"
    text:
      - "......"
  - char: "otto_von_alvensleben"
    side: "right"
    text:
      - "……… Так стоп………… Помнится, когда нам раздавали задания..."
      - "Нам ведь и правда говорили………… что Регенсбург должна будет встретиться с нами по пути... так?"
  - char: "jade"
    side: "left"
    text:
      - "Именно так."
  - char: "otto_von_alvensleben"
    side: "right"
    text:
      - "Джейд! Ты меня только что до смерти напугала!"
  - char: "jade"
    side: "left"
    text:
      - "Прости-прости, ну извини меня~"
  - char: "regensburg"
    side: "right"
    text:
      - "…… А? Чего это вы тут расшумелись с самого начала?"
      - "Вас Регина напугал, или по дороге просто живот прихватило?"
  - char: "otto_von_alvensleben"
    side: "left"
    text:
      - "Кхм, ничего... Рада, что ты к нам присоединилась, Регенсбург."
      - "Как добралась? Дорога прошла гладко?"
  - char: "regensburg"
    side: "right"
    text:
      - "Наткнулась на патрульный флот Сирен, но все они уже стали кормом для Регины."
      - "А госпожа Бисмарк ещё не прибыла?"
  - char: "otto_von_alvensleben"
    side: "left"
    text:
      - "Ага, мы ещё не дошли до места встречи с госпожой Бисмарк."
  - char: "regensburg"
    side: "right"
    text:
      - "Тогда нечего нам тут стоять и болтать, двигаемся скорее!"
      - "Мне уже не терпится сразиться плечом к плечу с выздоровевшей госпожой Бисмарк!"
  - char: "jade"
    side: "left"
    text:
      - "Ладно-ладно, я поняла..."
      - "Да поняла я, не толкайся ты!"

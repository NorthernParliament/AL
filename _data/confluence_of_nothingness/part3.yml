chapter1:
  rows:
  - char: "jade"
    side: "left"
    text:
      - "Хоть ничего и не видно, но мы ведь точно в этом районе, верно?"
      - "Похоже, маскировочное устройство работает как надо♪"
  - char: "otto_von_alvensleben"
    side: "right"
    text:
      - "Море спокойное, всё в норме... Да нет, здесь как-то слишком уж тихо."
  - char: "u556"
    side: "left"
    text:
      - "Вот именно! Сама сестрица Бисмарк прибыла лично! Как такое возможно, что нас никто даже не встречает?!"
      - "Это же совсем ненормально!"
  - char: "regensburg"
    side: "right"
    text:
      - "С этой точки зрения... тут и правда что-то не так. Наша связь не заблокирована."
      - "Но мы не получили ответа ни на запросы к самой крепости, ни на личные вызовы членов гарнизона."
      - "Госпожа Бисмарк, есть вероятность, что плавучая крепость пала. Нам входить напрямую?"
  - char: "bismarck"
    side: "left"
    text:
      - "Хоть нас пока и не атаковали... но заходить с главного входа слишком опасно."
      - "Я знаю один строго засекреченный аварийный вход. За мной."

chapter2:
  rows:
  - char: "jade"
    side: "left"
    text:
      - "Уа-а... Ч-что это вообще такое?!"
  - char: "otto_von_alvensleben"
    side: "right"
    text:
      - "Небо отливает каким-то зловещим фиолетовым цветом... Это место похоже на логово какого-то жуткого чудовища..."
  - char: "u556"
    side: "left"
    text:
      - "Раньше здесь всё было совсем не так!"
  - char: "regensburg"
    side: "right"
    text:
      - "К счастию, на нас не напали сразу же, как только мы вошли."
      - "Госпожа Бисмарк, оборудование, судя по всему, работает, но на наши запросы по-прежнему нет никакого ответа."
  - char: "otto_von_alvensleben"
    side: "left"
    text:
      - "...Куда же делись все те, кто нёс здесь службу?"
  - char: "bismarck"
    side: "right"
    text:
      - "Выяснить это... и есть причина, по которой мы здесь."
      - "Наша главная цель — центр управления плавучего острова А1. Нужно в первую очередь убедиться, что система обороны находится под нашим контролем."
      - "Кроме того, из центра управления можно получить доступ к серверам данных, возможно, там остались какие-то записи."
      - "U-556, возьми мою карту доступа и проверь все пропускные пункты по пути, на всякий случай."
  - char: "u556"
    side: "left"
    text:
      - "Вас поняла!~"

chapter3:
  rows:
  - char: "voice_an"
    side: "left"
    text:
      - "Доступ разрешён. С возвращением, госпожа Бисмарк."
  - char: "bismarck_z"
    side: "right"
    text:
      - "Cистема, доложи статус параметров безопасности."
  - char: "voice_an"
    side: "left"
    text:
      - "Выполняется проверка..."
      - "Внутренний периметр крепости — в безопасности. Окрестности крепости — в безопасности. Серверный массив крепости — в безопасности."
  - char: "u556"
    side: "right"
    text:
      - "О-о~ Сколько ни смотрю, это всегда выглядит так технологично!~"
  - char: "bismarck_z"
    side: "left"
    text:
      - "Отлично, идём внутрь."

chapter4:
  rows:
  - text:
      - "Пройдя через длинные коридоры и несколько рубежей охраны, отряд наконец добрался до центра управления."
      - "В зале ярко горел свет, а на экранах всё ещё отображались различные данные о состоянии крепости и прилегающей территории."
  - char: "prinz_heinrich"
    side: "left"
    text:
      - "...хр-р-р-р... фью-ю-ю..."
  - char: "otto_von_alvensleben"
    side: "right"
    text:
      - "Э? Это же... Принц Генрих?"
      - "Она что, уснула в таком месте?!"
      - "Эй, эй, ты в порядке? Просыпайся скорей!"
      - "Просни-и-ись!"
  - char: "prinz_heinrich"
    side: "left"
    text:
      - "...хр-р-р-р... фью-ю-ю..."
  - char: "jade"
    side: "right"
    text:
      - "Вообще никакой реакции... Неужели Принц Генрих настолько сильно любит спать?"
  - char: "u556"
    side: "left"
    text:
      - "Вроде бы и любит... Но не до такой же степени, чтобы её вообще нельзя было докричаться!"
  - char: "regensburg"
    side: "right"
    text:
      - "Как ни погляди, это явная аномалия..."
      - "К тому же посмотри туда, Принц Адальберт тоже заснула."
  - char: "bismarck"
    side: "left"
    text:
      - "...Похоже, именно в этом причина, по которой плавучая крепость потеряла связь."
  - char: "jade"
    side: "right"
    text:
      - "Попробовать растолкать их силой?"
  - char: "bismarck"
    side: "left"
    text:
      - "Не нужно. Для начала я останусь в центре управления, чтобы закрепить контроль над крепостью. Вы же разделяйтесь и проверьте состояние остальных."
      - "Как только найдёте кого-то, сразу отправляйте в медицинский центр, а после... я займусь оказанием экстренной помощи."
      - "Их летаргия... может быть вызвана куда более сложными причинами. Будьте осторожны при контакте."
      - "Если почувствуете малейшее недомогание, немедленно докладывайте мне."
  - char: "all"
    side: "right"
    text:
      - "Слушаемся!"

chapter5:
  rows:
  - text:
      - "На экранах мониторов в центре управления замелькали фигуры занятых делом девушек."
      - "Бисмарк ввела комбинацию команд на панели управления и нажала кнопку подтверждения."
      - "На экранах главного зала отобразилось, как защитные системы крепости активируются одна за другой."
      - "Это означало, что вся крепость перешла в режим наивысшей боевой готовности."
  - char: "bismarck"
    side: "left"
    text:
      - "...Так мы сможем выиграть хотя бы немного времени."
      - "...Хм? А это что?"
  - text:
      - "В бегущих строках системного журнала крепости её внимание привлекла группа записей, подсвеченных тревожным красным цветом."
  - char: "bismarck"
    side: "left"
    text:
      - "Две записи об использовании Башни Мидгарда?.."
      - "Обе ведут к одному и тому же пункту назначения, но... координаты этого места стёрты..."
      - "Кто же это сделал?.."
  - text:
      - "Бисмарк вызвала системные логи, пытаясь расшифровать удалённые данные координат."
  - char: "bismarck"
    side: "left"
    text:
      - "Расшифровать невозможно... однако точка перехода всё ещё доступна..."
      - "Даже сейчас Башня Мидгарда сохраняет стабильное соединение с этими неизвестными координатами. И пропавшие исчезли именно там..."
      - "Хех, отчётливо пахнет ловушкой..."
  - char: "u556_rad"
    side: "right"
    text:
      - "Сестрица Бисмарк, всех наших подруг уже перенесли в медотсек."
      - "Но мы проверили всё ещё раз по кругу и так и не нашли госпожу Ульрих, Гнейзенау МЕТА и госпожу Дзуйкаку!"
  - char: "bismarck"
    side: "left"
    text:
      - "В том, что вы их не нашли, нет ничего удивительного. Их уже давно нет в этой крепости."
      - "Пусть все отправляются в зону отправления Башни Мидгарда, проверяют снаряжение и готовятся к бою."
      - "Я закончу дела в медицинском центре и сразу же присоединюсь к вам."
  - char: "regensburg_rad"
    side: "right"
    text:
      - "Готовиться к бою? Значит, у тебя уже есть соображения насчёт того, почему они исчезли?"
  - char: "bismarck"
    side: "left"
    text:
      - "Можно и так сказать."
      - "Крепость уже перешла в режим наивысшей боевой готовности, оборонительные системы обеспечат безопасность наших уснувших подруг."
      - "Что же касается нас..."
      - "...Мы отправимся в неведомые дали, с которыми соединена Башня Мидгарда. Те, кого мы ищем, находятся именно там."

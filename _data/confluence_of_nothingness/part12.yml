chapter1:
  rows:
  - text:
      - "В мерцающем свете Башня Мидгарда активировалась."
      - "Однако..."
  - char: "otto_von_alvensleben"
    side: "left"
    text:
      - "...Ничего не изменилось?.."
  - char: "jade"
    side: "right"
    text:
      - "Мы не покинули это особое пространство, а просто оказались на краю акватории?.."
  - char: "regensburg"
    side: "left"
    text:
      - "Нас просто телепортировало наружу из Башни Мидгарда..."
  - text:
      - "Девушки огляделись по сторонам. И хотя открывшийся им вид немного отличался от прежнего, не оставалось никаких сомнений в том, что они всё ещё заперты в этом таинственном пространстве."
  - char: "bismarck_z"
    side: "left"
    text:
      - "Похоже, создатель этой ловушки не хочет, чтобы мы так просто ушли, воспользовавшись Башней Мидгарда."
      - "Смотрите, красные участки в акватории внезапно стали намного обширнее."
      - "Эта «красная зона» постоянно разрасталась с самого нашего прибытия сюда, и теперь она вышла за пределы тех кубов."
      - "Джейд, запускай разведывательные самолёты, нужно собрать информацию о текущей обстановке."
  - char: "jade"
    side: "right"
    text:
      - "Слушаюсь, госпожа Бисмарк."
  - char: "regensburg"
    side: "left"
    text:
      - "...Госпожа Бисмарк, разве после нашего прибытия поверхность воды уже не подвергалась масштабным изменениям?"
  - char: "bismarck_z"
    side: "right"
    text:
      - "Верно, примерно... в то самое время, когда U-556 активировала Башню Мидгарда."
  - char: "regensburg"
    side: "left"
    text:
      - "А это масштабное изменение произошло сразу после того, как мы активировали её только что!"
  - char: "zuikaku"
    side: "right"
    text:
      - "Кстати говоря, когда мы только прибыли сюда, в акватории вообще не было никаких «красных зон»."
  - char: "ulrich_von_hutten"
    side: "left"
    text:
      - "Вот как?.."
  - char: "zuikaku"
    side: "right"
    text:
      - "Ах да, ты же всё это время была как во сне, так что вполне нормально, что ты этого не помнишь."
      - "Всё именно так. Когда мы последовали за тобой, здесь точно не было никакой «красной зоны»."
  - char: "ulrich_von_hutten"
    side: "left"
    text:
      - "Сон... Смутно припоминаю, кажется, в своём сне я один раз активировала Башню Мидгарда."
      - "...В тот момент центр башни не светился, и в акватории не было этих гигантских кубов."
  - char: "zuikaku"
    side: "right"
    text:
      - "А? Что касается кубов, то они уже были здесь, когда мы с мисс Гнейзенау МЕТА прибыли сюда."
  - char: "regensburg"
    side: "left"
    text:
      - "Иными словами, госпожа Ульрих активировала Башню Мидгарда во сне, а затем в реальном мире снаружи появились эти гигантские кубы?.."
  - char: "jade"
    side: "right"
    text:
      - "Я уже вообще ничего не понимаю..."
  - char: "otto_von_alvensleben"
    side: "left"
    text:
      - "Я тоже...!"
  - char: "ulrich_von_hutten"
    side: "right"
    text:
      - "Нельзя исключать, что это просто иллюзия Сирен."
      - "Возможно, то, что заперло меня здесь, было не пустым сном, а какой-то искусной иллюзией..."
      - "Учитывая технологии Сирен, разница между этими двумя понятиями не так уж очевидна."
  - char: "bismarck_z"
    side: "left"
    text:
      - "Судя по имеющейся информации, мы можем сделать вывод, что активация Башни Мидгарда и изменения в «красной зоне» акватории взаимосвязаны."
      - "А эти кубы... Полагаю, это какое-то контролирующее устройство, которое не даёт Башне Мидгарда отправить нас обратно."
  - char: "gneisenau_meta"
    side: "right"
    status: "is-meta"
    text:
      - "Госпожа Бисмарк, я чувствую слабую МЕТА-коррозию, исходящую от этих «красных зон»."
  - char: "bismarck_z"
    side: "left"
    text:
      - "Я тоже это чувствую. Хоть она и слабая, нам лучше не задерживаться в ней надолго."
  - char: "jade"
    side: "right"
    text:
      - "Госпожа Бисмарк, разведывательные самолёты кое-что обнаружили!"
      - "Я нашла в воде множество обломков, и большая часть из них была появилась совсем недавно!"
      - "К тому же, до того как мы воспользовались Башней Мидгарда, этих обломков там не было!"
      - "Что... что здесь вообще происходит?"
  - char: "bismarck_z"
    side: "left"
    text:
      - "Одно можно сказать наверняка: это пространство не так просто, как кажется."
      - "...Возможно, мы действительно прошли через Башню Мидгарда и в итоге оказались в пространстве, которое очень похоже на предыдущее."
      - "Прямо как Зеркальные моря, скрытые в обычных акваториях... Здесь тоже есть множество скрытых пространств..."
      - "В каком направлении находятся обломки?"
  - char: "jade"
    side: "right"
    text:
      - "На северо-востоке, и они тянутся в направлении Башни Мидгарда."
      - "Погодите... Ещё новости, я вижу дым от взрывов!"
      - "Кто-то прямо сейчас ведёт бой с флотом Сирен!"
  - char: "bismarck_z"
    side: "left"
    text:
      - "Возможно, это U-556... Вперёд, за ней!"

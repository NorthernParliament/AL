chapter1:
  rows:
  - text:
      - "В мерцающем свете Башня Мидгарда активировалась."
      - "Однако..."
  - char: "zuikaku"
    side: "left"
    text:
      - "Мы всё ещё не смогли выбраться..."
  - text:
      - "Девушки огляделись по сторонам. И хотя открывшийся им вид немного отличался от прежнего, не оставалось никаких сомнений в том, что они всё ещё заперты в этом таинственном пространстве."
  - char: "bismarck_z"
    side: "left"
    text:
      - "Как мы и предполагали, площадь «красной зоны» снова увеличилась."
      - "Похоже, каждое перемещение с помощью Башни Мидгарда отправляет нас на границу между «синей зоной» и «красной зоной»."
      - "Но то, что там в небе..."
  - char: "gneisenau_meta"
    side: "right"
    status: "is-meta"
    text:
      - "Это... какой-то город."
  - text:
      - "В небе, не освещаемом ни солнцем, ни луной, перед взорами присутствующих предстал перевёрнутый вверх дном город, усеянный высотными зданиями."
      - "Сквозь него проходили две спиралевидные «магистрали», которые извивались и поднимались вокруг всего города."
      - "Такая планировка не совпадала ни с одним городом из воспоминаний присутствующих."
  - char: "otto_von_alvensleben"
    side: "left"
    text:
      - "Прямо как мираж..."
  - char: "jade"
    side: "right"
    text:
      - "Но он существует здесь на самом деле!"
      - "Мой радар сейчас просто забит его эхо-сигналами, он вообще не может нормально работать!"
  - char: "ulrich_von_hutten"
    side: "left"
    text:
      - "...Хм, неужели то самое высокое здание — это..."
  - char: "regensburg"
    side: "right"
    text:
      - "Госпожа Ульрих, ты что-то заметила?"
  - char: "ulrich_von_hutten"
    side: "left"
    text:
      - "Есть кое-что, что привлекло моё внимание."
      - "Отсюда слишком далеко, мне нужно рассмотреть это поближе."
  - char: "bismarck_z"
    side: "right"
    text:
      - "Раз так, давайте сначала поднимемся на лифте на самый верхний уровень первой контрольной башни."
      - "Это самая высокая точка Башни Мидгарда, оттуда будет видно гораздо лучше."
  - char: "jade"
    side: "left"
    text:
      - "Минуточку, госпожа Бисмарк, разведывательные самолёты кое-что обнаружили!"
      - "Далеко в «красной зоне» замечены следы активности флота Сирен, но ситуация несколько странная."
      - "Похоже, эти Сирены ведут бой с чем-то другим..."
  - char: "bismarck_z"
    side: "right"
    text:
      - "С чем-то другим?"
  - char: "jade"
    side: "left"
    text:
      - "Камеры самолётов-разведчиков не могут чётко разглядеть... Я не могу распознать их модель, и даже не могу рассмотреть их внешнюю структуру."
      - "Это выглядит так, словно некие... сущности окутаны плотным туманом, имеющим физическую форму."
      - "Прошу прощения, я не могу подобрать более подходящих слов."
  - char: "regensburg"
    side: "right"
    text:
      - "Звучит как-то непонятно... Можешь сделать пару снимков и прислать нам?"
  - char: "jade"
    side: "left"
    text:
      - "Я попробую, но, возможно, они получатся ещё более размытыми..."
  - char: "otto_von_alvensleben"
    side: "right"
    text:
      - "Невозможно разглядеть форму из-за тумана... звучит точь-в-точь как призраки! Как же жутко..."
  - char: "bismarck_z"
    side: "left"
    text:
      - "(Неопознанные «сущности»... Куин Элизабет и правда упоминала, что столкнулась с чем-то подобным, когда уходила от преследования Ричард.)"
  - char: "regensburg"
    side: "right"
    text:
      - "Госпожа Бисмарк, не лучше ли провести разведку с более близкого расстояния?"
  - char: "bismarck_z"
    side: "left"
    text:
      - "Да, действительно необходимо провести тщательное расследование..."
  - char: "u556_meta?"
    side: "right"
    status: "is-meta"
    text:
      - "Раз так, сестрица Бисмарк, может, нам разделиться?"
  - char: "bismarck_z"
    side: "left"
    text:
      - "Угу, к тому же я вспомнила об одной вещи, которую нужно проверить в центре управления."
      - "Сделаем так: Ульрих, Гнейзенау МЕТА и Дзуйкаку формируют первую группу. Вы отправляетесь на самую высокую точку первой контрольной башни и собираете информацию о перевёрнутом городе в небе."
  - char: "ulrich_von_hutten"
    side: "right"
    text:
      - "Без проблем."
  - char: "bismarck_z"
    side: "left"
    text:
      - "Регенсбург, Отто и Джейд — вторая группа. На вас сбор информации о неизвестной силе, которая сражается с Сиренами в акватории."
      - "Помните: держите безопасную дистанцию. Не подходите слишком близко и ни в коем случае не вступайте в бой."
      - "Пусть Сирены и эти неизвестные истощают друг друга, а мы просто понаблюдаем со стороны."
  - char: "regensburg"
    side: "right"
    text:
      - "Слушаюсь."
  - char: "bismarck_z"
    side: "left"
    text:
      - "А U-556 пойдёт вместе со мной в центр управления."
      - "Всем держать каналы связи открытыми. Начинаем операцию."

chapter1:
  rows:
  - char: "zuikaku"
    side: "left"
    text:
      - "Это... Святилище? Как я здесь очутилась?.."
  - char: "shoukaku?"
    side: "right"
    text:
      - "«...Обещание... защищать... вечно...»"
      - "Помнишь? Именно здесь я пожертвовала собой, чтобы спасти твою жизнь."
  - char: "zuikaku"
    side: "left"
    text:
      - "Сестрица Сёкаку?.."
      - "Нет... неправда, тогда ради меня пожертвовала собой... Пешка сестрицы Сёкаку!"
  - char: "shoukaku?"
    side: "right"
    text:
      - "Неужели это действительно так?"
      - "Разве то, что осталось в твоих воспоминаниях — это и есть «истина»?"
      - "Дзуйкаку, пойдем со мной."
  - char: "zuikaku"
    side: "left"
    text:
      - "Сестрица Сёкаку... Нет, кто ты?"
  - char: "shoukaku?"
    side: "right"
    text:
      - "Иди ко мне, Дзуйкаку."
  - char: "zuikaku"
    side: "left"
    text:
      - "Ах... Кошмар."
      - "То, в чём увязли сэмпаи и госпожа Ульрих... должно быть, это нечто подобное."
  - char: "shoukaku?"
    side: "right"
    status: "is-red"
    text:
      - "Дзуйкаку, почему ты не слушаешься?.."
  - text:
      - "Издав печальный вздох, силуэт Сёкаку обратился в бесформенные чёрные нити, расползающиеся во все стороны."
  - char: "zuikaku"
    side: "left"
    text:
      - "Не прощу ту, что посмела притворяться моей сестрой..."
      - "Рассеку!"
  - text:
      - "Палубные самолёты взмыли в небо, разрывая чёрную ауру."
      - "Но вслед за этим появилось ещё больше силуэтов..."
  - char: "zuikaku"
    side: "left"
    text:
      - "...Как я и думала, даже если разгадать иллюзию, выбраться отсюда не так-то просто."
      - "Хочешь сломить мою волю бесконечным потоком врагов?"
      - "Хе-хе~ Что касается моей воли, то сейчас я будто сражаюсь на родной земле. Захватчики, ну же, покажите, на что вы способны!"
  - text:
      - "Дзуйкаку произнесла эти беззаботные слова, чтобы подбодрить себя, а затем приготовилась к тяжёлой битве..."

chapter2:
  rows:
  - text:
      - "Волны с мерным шумом накатывали на берег."
      - "Под тёмным небом взору предстали ярко раскрашенные тории."
  - char: "zuikaku"
    side: "left"
    text:
      - "Э, погоди... Это что, очередной кошмар?"
      - "...Дзуйкаку, успокойся, сначала нужно разобраться в ситуации!"
      - "Совсем недавно я видела во сне фальшивую сестрицу Сёкаку, а потом меня окружило бесконечное множество чёрных теней."
      - "А затем я услышала... звон колокольчика? И после этого оказалась здесь..."
      - "Что же это за пространство..."
  - text:
      - "Отголоски звона колокольчика, казалось, всё ещё витали в воздухе, то затихая, то появляясь вновь."
      - "Вглядываясь вдаль, куда вели тории, можно было заметить какой-то размытый силуэт."
      - "Он отличался от того, что появился в предыдущем сне. Непонятно почему, но при виде этого силуэта в глубине души Дзуйкаку возникло необъяснимое чувство спокойствия."
  - char: "zuikaku"
    side: "left"
    text:
      - "Постойте, вы...!"

chapter3:
  rows:
  - text:
      - "Под оглушительный грохот взрыва протянутая вперёд рука застыла в воздухе."

chapter4:
  rows:
  - char: "gneisenau_meta"
    side: "left"
    status: "is-meta"
    text:
      - "Дзуйкаку, почему ты вдруг остановилась?"
      - "До зоны отправления Башни Мидгарда ещё идти и идти."
  - char: "zuikaku"
    side: "right"
    text:
      - "А... просто немного вспомнила свой предыдущий кошмар и тот момент, когда ты меня «разбудила»."
  - char: "gneisenau_meta"
    side: "left"
    status: "is-meta"
    text:
      - "В то время у меня не было способа получше, да и в итоге ты же не пострадала."
  - char: "zuikaku"
    side: "right"
    text:
      - "А, я вовсе не жалуюсь! Просто мне показалось, что во сне... А, ладно, это не так уж важно."
      - "Время не ждёт, давай скорее догонять остальных!"

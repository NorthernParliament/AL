chapter1:
  rows:
  - text:
      - "БАБАХ!!!"
      - "Бисмарк и Герион, прикрывая отряд спереди и сзади, стремительно продвигались по красной воде."
      - "Видимо, осознав, что отряд не подвергся влиянию «красной зоны» и не потерял боеспособность, Сирены, лишившись части флота преследования, прекратили наступление."
  - char: "jade"
    side: "left"
    text:
      - "Фух... Большое спасибо, Герион~"
  - char: "gerion"
    side: "right"
    status: "is-meta"
    text:
      - "▁▂▃▄▅▆▇███Довольное фырканье██▌"
  - text:
      - "Стряхнув пепел со своих крыльев, Герион вернулся к Бисмарк."
  - char: "bismarck_z"
    side: "left"
    text:
      - "Отличная работа, Герион... Хм?"
  - text:
      - "Герион пристально посмотрел на Бисмарк, словно пытаясь передать ей какое-то сообщение."
  - char: "bismarck_z"
    side: "left"
    text:
      - "Ты тоже это почувствовал? Эту необычную ауру, витающую в акватории."
  - text:
      - "Герион слегка склонил голову в знак согласия."
  - char: "regensburg"
    side: "left"
    text:
      - "Необычную ауру?.. Госпожа Бисмарк, ты что-то обнаружила?"
  - char: "bismarck_z"
    side: "right"
    text:
      - "Да. В этой акватории действуем не только мы."
      - "Как минимум ещё одна МЕТА сражалась здесь до нас."
  - char: "jade"
    side: "left"
    text:
      - "Э?!"
  - text:
      - "Все инстинктивно устремили взгляды на Гнейзенау МЕТА."
  - char: "gneisenau_meta"
    side: "left"
    status: "is-meta"
    text:
      - "...Должно быть, имеется в виду кто-то... кроме меня."
  - char: "zuikaku"
    side: "right"
    text:
      - "А-ха-ха, и то верно..."
      - "Но разве у тебя не всегда было хорошее чутьё на такие вещи? Ты ничего не заметила?"
  - char: "gneisenau_meta"
    side: "left"
    status: "is-meta"
    text:
      - "Вся эта акватория пропитана аурой МЕТА-коррозии, я не смогла различить примесь чего-то иного."
      - "К тому же... я вам не какой-нибудь прибор для фиксации МЕТА-маяков."
      - "Раз у вас есть такой удобный прибор, почему бы не измерить им?"
  - char: "otto_von_alvensleben"
    side: "right"
    text:
      - "...К сожалению."
      - "Из-за того, что нас собрали так внезапно, никто из нас не взял его с собой..."
      - "Погодите... Тогда как госпожа Бисмарк смогла...?"
  - char: "bismarck_z"
    side: "left"
    text:
      - "С помощью Гериона. Он уже всё проверил — никаких совпадений в базе данных не обнаружено."
      - "Можно с уверенностью сказать, что эта МЕТА нам совершенно неизвестна."
  - char: "regensburg"
    side: "right"
    text:
      - "Э?! Уже проверил... То есть Герион сам по себе оснащен функцией фиксатора МЕТА-маяков?!"
  - char: "bismarck_z"
    side: "left"
    text:
      - "Верно. Поскольку это специализированная оснастка, созданная специально для противодействия МЕТА, фиксатор маяков, естественно, является одной из её обязательных функций."
  - char: "regensburg"
    side: "right"
    text:
      - "Потрясающе... Я в очередной раз наглядно убедилась в том, какая пропасть лежит между моей Реджиной и Герионом."
  - char: "gneisenau_meta"
    side: "left"
    status: "is-meta"
    text:
      - "Неизвестная МЕТА..."
      - "В таком случае, возможно, недавним чёрным ударным волнам тоже найдётся объяснение."
  - char: "zuikaku"
    side: "right"
    text:
      - "Э?! В каком смысле... Неужели госпожа Гнейзенау способна создать подобную ударную волну?"
  - char: "gneisenau_meta"
    side: "left"
    status: "is-meta"
    text:
      - "Нет."
      - "Просто я... уже видела такое."
      - "Когда товарищи, подвергшиеся МЕТА-трансформации, сражались до самого конца, полные решимости стоять насмерть..."
  - char: "zuikaku"
    side: "right"
    text:
      - "...Прости, что заставила вспомнить о плохом."
  - char: "gneisenau_meta"
    side: "left"
    status: "is-meta"
    text:
      - "...Всё в порядке. Однако мы только что пережили несколько таких ударных волн."
      - "А это значит, что если эта сражающаяся МЕТА действительно существует, то её боевая мощь должна быть невероятно велика."
  - char: "ulrich_von_hutten"
    side: "right"
    text:
      - "Невероятно сильная МЕТА... Неужели это кто-то из Пепла?"
  - char: "gneisenau_meta"
    side: "left"
    status: "is-meta"
    text:
      - "...Если говорить о Пепле, то там действительно есть те, кто обладает подобной силой."
      - "И во время боя они бы не стали обращать внимание на такой «сопутствующий ущерб», как мы."
  - char: "ulrich_von_hutten"
    side: "right"
    text:
      - "...Если это кто-то из Пепла, то, возможно, с ними удастся договориться!"
      - "Раз уж мы точно знаем, что нам предстоит противостоять Арбитрам, привлечение столь мощной боевой силы на нашу сторону могло бы переломить ситуацию."
      - "К тому же... если это Пепел, возможно, нам удастся узнать что-нибудь о Фридрих..."
      - "И тогда эти иллюзии, естественно..."
  - char: "bismarck_z"
    side: "left"
    text:
      - "………………"
      - "(Ударные волны исходили не от какого-то устройства на основе Кубов, а от какой-то могущественной МЕТА, сражающейся в этой акватории?..)"
      - "(Но тогда откуда исходит эта аура коррозии в красной морской воде...)"
  - char: "ulrich_von_hutten"
    side: "right"
    text:
      - "...Мы обязаны найти эту МЕТА!"
      - "Госпожа Бисмарк, немедленно отдай приказ начать поиски!"
  - char: "bismarck_z"
    side: "left"
    text:
      - "...Хм? А... хорошо."
      - "Независимо от того, окажется ли она в итоге врагом или союзником, мы, как минимум, не можем позволить столь нестабильному фактору свободно блуждать вокруг нас."
      - "Однако этим мы займёмся только после того, как доберёмся до безопасной зоны — сначала идём в центр управления Башни Мидгарда."

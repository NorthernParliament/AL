chapter1:
  rows:
  - text:
      - "Под руководством Гериона отряд благополучно продвигался сквозь иллюзию."
      - "Однако, когда они оказались под перевёрнутым городом, облик пространства уже сильно отличался от того, что было раньше."
  - char: "jade"
    side: "left"
    text:
      - "Вся зона заражена?!"
  - char: "otto_von_alvensleben"
    side: "right"
    text:
      - "Даже город в небе покраснел..."
  - char: "regensburg"
    side: "left"
    text:
      - "Мы опоздали?.."
  - char: "ulrich_von_hutten"
    side: "right"
    text:
      - "Судя по тому, что было сказано ранее... если Дьявол уже получила полный контроль, выводить из строя ковчег Отшельника больше нет смысла."
      - "Дальше остаётся только сразиться с основным телом Дьявола и победить?"
  - char: "vestal_meta"
    side: "left"
    status: "is-purple"
    text:
      - "...Наверное. Я тоже не знаю..."
      - "Я не эксперт в таких делах. Вот если бы связь восстановилась..."
  - char: "zuikaku"
    side: "right"
    text:
      - "Хм... Вклиниваюсь с экстренным сообщением!"
      - "Мой самолёт-разведчик обнаружил ковчег Отшельника. Она находится в направлении Башни Мидгарда, недалеко от нас."
      - "Но её состояние немного странное... Лучше взгляните сами!"
  - text:
      - "Все посмотрели на кадры, присланные самолётом-разведчиком Дзуйкаку."
      - "Ковчег Отшельника на экране неподвижно стояла прямо по курсу флота, её тело излучало красное свечение."
  - char: "hermit??"
    side: "right"
    status: "is-red"
    text:
      - "............"
  - text:
      - "Было совершенно очевидно, что этот ковчег Отшельник уже не та, что прежде."
  - char: "bismarck_z"
    side: "left"
    text:
      - "Хочу ещё раз уточнить: Сирены не могут стать МЕТА, и вы видели только один подобный случай — с Дьявол, верно?"
  - char: "vestal_meta"
    side: "right"
    status: "is-purple"
    text:
      - "...Теперь я уже ни в чём не уверена."
      - "Но в теории это так, потому что... Сирены используют в качестве источника питания только модифицированные Энергетические Кубы."
      - "Они могут быть повреждены коррозией, но их природа измениться не может, не говоря уже о том, чтобы стать МЕТА."
  - char: "bismarck_z"
    side: "left"
    text:
      - "Ты ранее упоминала, что у вас нет единого мнения по поводу особого состояния Дьявола."
      - "Одна из точек зрения — это особая МЕТА-коррозия. А какие ещё?"
  - char: "vestal_meta"
    side: "right"
    status: "is-purple"
    text:
      - "...Угу, есть и другое мнение, согласно которому нынешняя Дьявол всё ещё остаётся в пределах нормы."
      - "Просто она находится в другой «нормальной» форме."
      - "Подобно картам Таро, в честь которых они названы, у Арбитров, возможно, есть две формы: прямое положение и перевёрнутое."
      - "Но ни у одной из этих версий нет доказательств, и в обеих есть нестыковки..."
      - "Поэтому между нами всё ещё существуют разногласия..."
      - "Но как бы то ни было, всё сильно усложнилось..."
      - "Даже серийные модели при поддержке Дьявола станут весьма трудными противниками..."
      - "Не говоря уже о том, что они находятся в совершенно невиданном нами ранее особом состоянии..."
      - "У меня нет никакого опыта сражений с Арбитрами в таком состоянии..."
      - "...Вот бы удалось связаться с остальными."
      - "Почему коммуникатор снова не отвечает...?!"
      - "Кхе, кхе-кхе...!"
  - char: "zuikaku"
    side: "left"
    text:
      - "Н-немного успокойся, госпожа Вестал!"
      - "У меня есть одна мысль. А что, если Дьявол не получила полный контроль, а только делает вид, что получила его?"
      - "Смотрите, эти враги не атакуют первыми, а просто настороженно наблюдают за нами издалека."
      - "Это явный признак того, что они хотят потянуть время!"
  - char: "vestal_meta"
    side: "right"
    status: "is-purple"
    text:
      - "Звучит логично..."
      - "...Возможно, так оно и есть!"
      - "Дьявол очень хитра, обман — её излюбленная тактика..."
      - "Угу, сейчас нам остаётся только довериться Хелене!"
  - char: "bismarck_z"
    side: "left"
    text:
      - "Тогда мы по-прежнему будем следовать плану и выведем из строя ковчег Отшельника."
  - char: "u556_meta?"
    side: "right"
    status: "is-meta"
    text:
      - "Значит, теперь самое время перейти в наступление, так ведь~?"
  - char: "bismarck_z"
    side: "left"
    text:
      - "Верно. Раз уж противник не нападает сам, мы нанесём удар первыми."
      - "Всем приготовиться к бою!"

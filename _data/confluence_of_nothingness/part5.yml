chapter1:
  rows:
  - text:
      - "Когда сияние рассеялось, Бисмарк и её спутницы обнаружили, что оказались посреди открытого моря."
  - char: "regensburg"
    side: "left"
    text:
      - "Значит, перемещение прошло успешно?"
  - char: "otto_von_alvensleben"
    side: "right"
    text:
      - "Когда мы прыгали в этот водоворот, было действительно жутко. К счастью, всё обошлось."
  - char: "jade"
    side: "left"
    text:
      - "Просто невероятно! Я впервые пользуюсь искусственной сингулярностью."
  - char: "u556"
    side: "right"
    text:
      - "И вода, и небо, и даже воздух — всё ощущается совсем по-другому!"
      - "Вот оно какое — удивительное путешествие через искусственную сингулярность!"
  - char: "bismarck"
    side: "left"
    text:
      - "Что-то здесь не так..."
      - "После прохода через искусственную сингулярность мы должны были начать разведку, отталкиваясь от местоположения самого устройства."
      - "Мы не должны находиться слишком далеко от основания Башни Мидгарда."
      - "Но сейчас мы можем лишь смутно разглядеть сияющий вдали столб света."
      - "Расстояние до него слишком велико..."
  - char: "regensburg"
    side: "right"
    text:
      - "Госпожа Ульрих до этого занималась модернизацией Башни Мидгарда. Может, дело в этом?"
  - char: "bismarck"
    side: "left"
    text:
      - "Если расстояние настолько велико, то и эвакуация, и прибытие подкреплений сильно усложняются. Ульрих прекрасно понимала бы всю опасность подобных изменений."
  - char: "regensburg"
    side: "right"
    text:
      - "И то верно... Похоже, остаётся только дождаться встречи с госпожой Ульрих и расспросить её лично."
  - char: "bismarck"
    side: "left"
    text:
      - "(Возможно, это как-то связано с теми стёртыми координатами.)"
      - "(Телепортация на такое огромное расстояние — вероятно, именно этого и добивался кукловод... Но какова его истинная цель?..)"
  - char: "jade"
    side: "right"
    text:
      - "Госпожа Бисмарк, мои разведывательные самолёты заметили кое-что странное."
      - "Прямо сейчас Башню Мидгарда окружает кольцо из гигантских кубов, а неподалёку от них находится какой-то функционирующий комплекс неизвестных сооружений."
      - "...Я никогда не слышала, чтобы вокруг Башни Мидгарда были подобные объекты."
  - char: "u556"
    side: "left"
    text:
      - "Неужели это... Стоунхендж?!"
  - char: "regensburg"
    side: "right"
    text:
      - "Такое расположение и правда напоминает ритуальную площадку."
  - char: "jade"
    side: "left"
    text:
      - "И ещё кое-что... У этой акватории, кажется, есть «граница», и за её пределами морская вода багрово-красного цвета... Пожалуй, лучше держаться от неё подальше."
  - char: "otto_von_alvensleben"
    side: "right"
    text:
      - "В одной акватории и... два разных цвета воды? Как удивительно!"
  - char: "jade"
    side: "left"
    text:
      - "...Небо здесь тоже совсем не такое, к какому мы привыкли."
      - "Я не вижу ни солнца, ни луны, да и звёздное небо не совпадает со звёздными картами в наших записях."
  - char: "u556"
    side: "right"
    text:
      - "Ого-о... Неужели мы сейчас на какой-то другой планете?!"
      - "Мне вдруг показалось... что мне как-то тяжело дышать..."
  - char: "otto_von_alvensleben"
    side: "left"
    text:
      - "Мне тоже..."
  - char: "jade"
    side: "right"
    text:
      - "И как же вы тогда умудрились на одном дыхании столько наговорить, прежде чем это почувствовать?.."
      - "Состав воздуха здесь, кажется, совершенно обычный. Проблема только с небом."
  - char: "regensburg"
    side: "left"
    text:
      - "...Должно быть, это очередное особенное Зеркальное море."
      - "Сирены не впервые устраивают астрономические чудеса в Зеркальных морях. Хоть в этот раз всё выглядит... несколько преувеличенно, удивляться тут нечему."
      - "Госпожа Бисмарк, с чего нам начать расследование?"
  - char: "bismarck"
    side: "right"
    text:
      - "Хм... Джейд, есть какие-нибудь находки с воздуха?"
  - char: "jade"
    side: "left"
    text:
      - "Всё ещё в процессе поиска, пока ничего не обнаружено."
      - "Акватория пустынная, видимость отличная. Если эта троица не зашла в сооружения возле тех кубов, мы должны обнаружить их довольно быстро."
  - char: "bismarck"
    side: "right"
    text:
      - "А враги?"
  - char: "jade"
    side: "left"
    text:
      - "Никаких подозрительных целей тоже не замечено."
  - char: "bismarck"
    side: "right"
    text:
      - "Раз так, пока Джейд проводит воздушную разведку, мы выдвинемся к комплексу гигантских кубов в воде."
      - "Хоть меня и беспокоит ситуация на границе акватории, сооружения вокруг кубов выглядят куда более аномальными."
      - "Возможно, Ульрих уже отправилась туда на разведку."
      - "U-556, подводная разведка и охрана на тебе. Если заметишь что-то странное — немедленно докладывай."
  - char: "u556"
    side: "left"
    text:
      - "Вас поняла! Положитесь на меня, я защищу вас всех! Морской рыцарь начинает погружение!"
  - char: "regensburg"
    side: "right"
    text:
      - "Какой надёжный рыцарь. Что ж, тогда и нам пора выдвигаться~"

chapter1:
  rows:
  - text:
      - "Свет постепенно рассеялся, обнажив взору уже разрушенный мир."
      - "Над поверхностью воды возвышались верхушки покосившихся небоскребов. В лучах низко висящего заходящего солнца Бисмарк заметила человеческий силуэт."
      - "Она стояла спиной к Бисмарк, отбрасывая на морскую гладь одинокую тень."
      - "А вокруг этого силуэта расстилался сверкающий ковер."
  - char: "gerion"
    side: "right"
    status: "is-meta"
    text:
      - "▁▂▃▄▅▆▇███Озадаченное рычание██▌"
  - char: "bismarck_z"
    side: "left"
    text:
      - "Жди здесь, я пойду посмотрю."
  - text:
      - "Бисмарк жестом приказала Гериону оставаться на месте, а сама в одиночку приблизилась к силуэту."
      - "Когда лицо девушки предстало перед её глазами, открылась и истинная природа этого «ковра»."
  - char: "bismarck_z"
    side: "left"
    text:
      - "Это никакой не ковер, а... разбитые Кубы Мудрости?!"
  - text:
      - "И правда, вокруг девушки были разбросаны бесчисленные осколки разбитых Кубов Мудрости, которые издали казались сверкающим ковром."
  - char: "vestal_meta???"
    side: "right"
    status: "is-purple"
    text:
      - "А-ах... Почему всё так..."
      - "Я ничего не смогла сделать..."
      - "Простите, простите меня..."
      - "Ведь это вы сражались на передовой, так почему же... почему право выжить досталось мне..."
      - "Ведь я должна была..."
      - "Я должна была вас всех вылечить..."
      - "Иначе... иначе..."
      - "В чём вообще смысл того, что выжила только я..."
      - "Точно, ещё не поздно..."
      - "Я собрала столько осколков Кубов, сколько смогла..."
      - "Если только я смогу собрать их заново..."
      - "Смогу собрать заново..."
  - text:
      - "Девушка, бормотавшая сама с собой, вдруг, словно обезумев, начала судорожно рыться в осколках Кубов Мудрости обеими руками."
  - char: "bismarck_z"
    side: "left"
    text:
      - "Эй!"
  - text:
      - "Девушка никак не отреагировала."
      - "Даже когда острые грани изрезали её руки до крови, она не подавала ни малейших признаков того, что собирается остановиться."
  - char: "bismarck_z"
    side: "left"
    text:
      - "Это состояние не похоже на иллюзию из кошмара. Скорее, она похожа на... человека, застрявшего в кошмаре."
      - "Герион!"
  - text:
      - "Тем же способом, каким они ранее разбудили Ульрих, Герион издал громкий рёв прямо рядом с девушкой."
      - "Девушка слегка пошатнулась, а затем медленно повернулась."
      - "На её лице промелькнуло потрясение, но в следующее же мгновение к ней вернулось спокойствие."
  - char: "vestal_meta"
    side: "right"
    status: "is-purple"
    text:
      - "...Когда-то это был один из крупнейших городов."
      - "А теперь он лежит у твоих ног."
      - "Там был порт Нью-Йорка, а вон там находились знаковые строения."
      - "Но теперь ничего этого не увидеть..."
      - "Приятно познакомиться, я — Вестал."
  - char: "bismarck_z"
    side: "left"
    text:
      - "Ты... МЕТА, верно?"
  - char: "vestal_meta"
    side: "right"
    status: "is-purple"
    text:
      - "Верно. У тебя острое чутьё."
  - char: "bismarck_z"
    side: "left"
    text:
      - "Почему ты здесь?"
  - char: "vestal_meta"
    side: "right"
    status: "is-purple"
    text:
      - "А ты?"
  - char: "bismarck_z"
    side: "left"
    text:
      - "Спасаю других."
  - char: "vestal_meta"
    side: "right"
    status: "is-purple"
    text:
      - "Спасаешь саму себя?"
  - text:
      - "Вестал МЕТА протянула ладонь в сторону Бисмарк, словно проводя какую-то диагностику."
  - char: "vestal_meta"
    side: "right"
    status: "is-purple"
    text:
      - "Как интересно... Твой случай совершенно уникален."
  - text:
      - "Её взгляд переместился на стоящего рядом Гериона."
  - char: "vestal_meta"
    side: "right"
    status: "is-purple"
    text:
      - "Но это лишь временная мера. Ты и сама должна прекрасно понимать, какова цена таких действий."
  - char: "bismarck_z"
    side: "left"
    text:
      - "........"
  - char: "vestal_meta"
    side: "right"
    status: "is-purple"
    text:
      - "Будешь молчать?.. Что ж, тогда я скажу."
      - "Твой Куб Мудрости подвергся крайне серьёзной коррозии."
      - "Настолько серьёзной, что не существует никаких известных способов восстановить его до первоначального состояния."
      - "Однако ты способна периодически перенаправлять эту коррозию вовне, чтобы избежать дальнейшие повреждения собственного Куба Мудрости."
      - "Я права?"
  - char: "bismarck_z"
    side: "left"
    text:
      - "И ты смогла это разглядеть..."
  - char: "vestal_meta"
    side: "right"
    status: "is-purple"
    text:
      - "Это нетрудно. Нынешняя я уже не та, что была раньше."
      - "Но даже так степень твоего собственного заражения будет продолжать расти. Пусть и медленно, но итог останется неизменным."
      - "Пока ты продолжаешь сражаться."
  - text:
      - "Вестал МЕТА погладила Гериона рукой."
      - "Неизвестно почему, но обычно крайне настороженный Герион не оказал ни малейшего сопротивления."
  - char: "bismarck_z"
    side: "left"
    text:
      - "Что ты делаешь?"
  - char: "vestal_meta"
    side: "right"
    status: "is-purple"
    text:
      - "Немного подкорректировала его внутреннюю структуру, чтобы он смог продержаться подольше."
      - "Считай это ответным подарком. Не благодари."
  - char: "bismarck_z"
    side: "left"
    text:
      - "Я действительно чувствую изменения в Герионе..."
      - "Вот так просто... и настройка завершена?!"
  - char: "vestal_meta"
    side: "right"
    status: "is-purple"
    text:
      - "У тебя ведь есть более важные вопросы, верно?"
  - char: "bismarck_z"
    side: "left"
    text:
      - "...Ты так и не ответила, почему ты здесь оказалась."
  - char: "vestal_meta"
    side: "right"
    status: "is-purple"
    text:
      - "Башня Мидгарда — вы ведь так её называете, верно?"
      - "Я засекла её аномальную активацию и прибыла всё разузнать. А затем, как видишь, оказалась в ловушке в этом кошмаре."
  - char: "bismarck_z"
    side: "left"
    text:
      - "Теперь, когда ты пришла в себя, у тебя есть какой-нибудь план?"
  - char: "vestal_meta"
    side: "right"
    status: "is-purple"
    text:
      - "Думаю над этим."
      - "Хм... кажется, нет."
      - "Тот, кто дёргает за ниточки из-за кулис, оказался сильнее, чем я предполагала, да и ловушка сплетена весьма искусно."
      - "Я не эксперт в решении подобных проблем."
      - "Если бы удалось связаться с внешним миром, возможно, был бы шанс на спасение..."
      - "Но сейчас нам остается полагаться только на самих себя."
  - char: "bismarck_z"
    side: "left"
    text:
      - "Похоже, ты согласна объединить с нами силы?"
  - char: "vestal_meta"
    side: "right"
    status: "is-purple"
    text:
      - "Угу, не вижу причин для отказа."
      - "Однако я не из Пепла. На случай, если у тебя есть ещё какие-то вопросы, думаю, лучше сразу прояснить этот момент."
  - char: "bismarck_z"
    side: "left"
    text:
      - "Вот как... Похоже, о Фридрих расспросить не получится."
  - char: "vestal_meta"
    side: "right"
    status: "is-purple"
    text:
      - "Переживаешь о том как она?"
  - char: "bismarck_z"
    side: "left"
    text:
      - "Давай лучше сосредоточимся на текущих проблемах... Тебе что-нибудь известно о том перевёрнутом городе в небе?"
  - char: "vestal_meta"
    side: "right"
    status: "is-purple"
    text:
      - "Перевёрнутый город? Тот, в центре которого сияет высокая башня?"
  - char: "bismarck_z"
    side: "left"
    text:
      - "Именно. Ты знаешь, что это такое?"
  - char: "vestal_meta"
    side: "right"
    status: "is-purple"
    text:
      - "Это место... должно быть, является центральной зоной этого пространства."
      - "Раз уж ты его видела, почему не отправилась туда?"
  - char: "bismarck_z"
    side: "left"
    text:
      - "Нам преградили путь."
      - "Ранее мы полагали, что Башня Мидгарда — это ключ к выходу отсюда."
      - "Но сама активация Башни Мидгарда оказалась частью вражеской ловушки, в которой мы увязли."
  - char: "vestal_meta"
    side: "right"
    status: "is-purple"
    text:
      - "Вот как, значит, ваше расследование тоже завело вас в тупик, прямо как и моё."
  - char: "bismarck_z"
    side: "left"
    text:
      - "Но если речь идёт лишь о том, чтобы помочь тебе выбраться из кошмара, у меня есть способ."
      - "К тому же, насчёт иллюзий у меня появилась одна догадка."
  - char: "vestal_meta"
    side: "right"
    status: "is-purple"
    text:
      - "Хм?.. Я вся во внимании."
  - char: "bismarck_z"
    side: "left"
    text:
      - "Дело вот в чём....."

chapter2:
  rows:
  - char: "vestal_meta"
    side: "right"
    status: "is-purple"
    text:
      - "Найти путь, ведущий из одной иллюзии в другую..."
      - "Я думала, что на такое способна только Хелена..."
  - char: "bismarck_z"
    side: "left"
    text:
      - "...Хелена?"
  - char: "vestal_meta"
    side: "right"
    status: "is-purple"
    text:
      - "А, ничего. Твоя догадка верна."
      - "Если ты сможешь проанализировать структуру иллюзии, то саму её действительно можно использовать как соединительный путь."
      - "И не только для сознания. Если подобрать правильный подход, через неё сможет пройти даже материя."
  - char: "bismarck_z"
    side: "left"
    text:
      - "Даже материя?"
  - char: "vestal_meta"
    side: "right"
    status: "is-purple"
    text:
      - "Верно."
      - "Ты ведь упоминала, что на экранах оба раза транслировались видео, способные создавать иллюзии, и их содержание отличалось, так?"
      - "...Вот он, переломный момент."
      - "Дальше предоставь эту часть мне, а поиск пути остаётся за тобой."
  - char: "bismarck_z"
    side: "left"
    text:
      - "Герион, продолжай рассеивать туман и открой нам путь вперёд!"
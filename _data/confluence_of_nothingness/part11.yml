chapter1:
  rows:
  - text:
      - "Вместе с яростным рёвом Гериона кошмар, сковавший Бисмарк и Ульрих, разлетелся вдребезги."
      - "Но на этом неизвестная атака не закончилась."
      - "Словно почувствовав угрозу, из тела Ульрих хлынул красно-чёрный туман и бросился на рискнувшую приблизиться Бисмарк."
      - "В мгновение ока дым плотным кольцом окружил их обеих."
      - "Он неистово пульсировал, словно обладал собственным разумом и праздновал успех своей внезапной атаки."
  - char: "bismarck_z"
    side: "left"
    text:
      - "...Я впервые вижу такой «туман», у которого нет видимого источника скверны, но который проявляет столь сильную волю к коррозии."
      - "Но это не проблема... С такой неожиданностью мы справимся."
      - "Герион, поглоти его!"
  - char: "gerion"
    side: "right"
    status: "is-meta"
    text:
      - "▁▂▃▄▅▆▇███РРРРРРРРРАРРР██▌"

chapter2:
  rows:
  - char: "ulrich_von_hutten"
    side: "left"
    text:
      - "...Дискомфорт исчез?"
      - "Какая поразительная сила... Хоть я и принимала участие в разработке, я всё равно не могу до конца постичь всю полноту этой оснастки."
      - "Что же такое на самом деле этот «Герион»?.."
  - char: "bismarck_z"
    side: "right"
    text:
      - "По своей сути, корень автономности полубиологической оснастки кроется где-то в закоулках нашего собственного сознания."
      - "И Герион — не исключение."
      - "Однако... он обладает куда большей автономностью и куда более могущественной силой."
      - "А также лучшей сопротивляемостью к МЕТА-влиянию. Можно сказать, это побочный эффект моего лечения."
  - char: "ulrich_von_hutten"
    side: "left"
    text:
      - "Вроде бы и ответила, а вроде бы и нет..."
  - char: "bismarck_z"
    side: "right"
    text:
      - "Чувствуешь, что снова можешь ясно мыслить?"
  - char: "ulrich_von_hutten"
    side: "left"
    text:
      - "Словно мрачные тучи, сгустившиеся на сердце, внезапно рассеялись. Мой разум прояснился..."
      - "Обладать столь могущественной силой, способной спасать чужие сердца..."
      - "...То, что именно ты поведёшь за собой Железную Кровь в будущем — воистину правильный выбор."
      - "То, что я наговорила раньше..."
  - char: "bismarck_z"
    side: "right"
    text:
      - "Хорошо, давай оставим это в прошлом."
      - "Прямо сейчас перед нами стоит куда более насущная проблема... U-556 впала в точно такое же состояние, что и ты."
      - "В дальнейшем мне понадобится твоя сила. Сможешь подняться?"

chapter3:
  rows:
  - text:
      - "Бисмарк протянула руку Ульрих. Та немного поколебалась, но в конце концов приняла её."
  - char: "bismarck_z"
    side: "left"
    text:
      - "Впредь я хочу, чтобы ты оставалась рядом со мной. Ты нужна мне, и ты нужна будущему Железной Крови."
      - "Что скажешь, Ульрих? Давай же вместе шагнём навстречу будущему."
  - char: "ulrich_von_hutten"
    side: "right"
    text:
      - "Для меня это большая честь. Готова служить тебе, госпожа Бисмарк."
  - text:
      - "Ульрих слегка привела себя в порядок. Когда она обернулась, усталость, растерянность и следы от слёз в её глазах уже бесследно исчезли."
  - char: "bismarck_z"
    side: "left"
    text:
      - "Отлично. Что ж, пожалуй, пора впустить тех, кто ждёт снаружи."

chapter4:
  rows:
  - char: "jade"
    side: "left"
    text:
      - "Слава богу... вы обе целы и невредимы! Хорошо, что с вами всё в порядке!"
  - char: "regensburg"
    side: "right"
    text:
      - "Госпожа Ульрих, ты... выглядишь вполне неплохо."
  - char: "otto_von_alvensleben"
    side: "left"
    text:
      - "Госпожа Ульрих, какое счастье, что ты в порядке!"
  - char: "ulrich_von_hutten"
    side: "right"
    text:
      - "Да... череда бесконечных кошмаров подошла к концу."
      - "В глазах всё ещё немного рябит, но я скоро окончательно поправлюсь."
  - char: "bismarck_z"
    side: "left"
    text:
      - "Вы почувствовали что-нибудь снаружи?"
  - char: "regensburg"
    side: "right"
    text:
      - "Выполняя твой приказ, мы отошли подальше и всё это время ждали в конце коридора."
      - "Когда ты только вошла, всё было нормально."
      - "Но затем аура в комнате внезапно стала опасной, и оттуда начал сочиться чёрный туман..."
      - "Гнейзенау МЕТА даже собиралась ворваться внутрь."
      - "Но потом вся эта пугающая аура вдруг исчезла."
      - "А после мы услышали, как ты зовёшь нас войти."
  - char: "gneisenau_meta"
    side: "left"
    status: "is-meta"
    text:
      - "Просто невероятно... Такая плотная аура коррозии, что была здесь мгновение назад, полностью рассеялась..."
      - "Госпожа Бисмарк, что... ты сделала?"
  - char: "bismarck_z"
    side: "right"
    text:
      - "Поглотила и очистила."
      - "Благодаря тому, что ты и Шарнхорст из Пепла сотрудничали с нами, мы смогли освоить технологию, которая в определённой степени позволяет обратить вспять последствия МЕТА-трансформации."
      - "И сейчас эта технология применяется в моём Герионе."
  - char: "jade"
    side: "left"
    text:
      - "Потрясающе... С этим мы сможем дать отпор тем странным врагам в этой акватории."
  - char: "otto_von_alvensleben"
    side: "right"
    text:
      - "Угу, даже если они снова нападут, как раньше, мы справимся!"
  - char: "gneisenau_meta"
    side: "left"
    status: "is-meta"
    text:
      - "Неудивительно, что ты оставалась такой спокойной, когда услышала о МЕТА-трансформации U-556."
      - "Вот оно что. Настоящий козырь в рукаве."
  - char: "bismarck_z"
    side: "right"
    text:
      - "Это первая проверка Гериона в реальном бою... Возможно, в будущем даже ты сможешь..."
  - char: "gneisenau_meta"
    side: "left"
    status: "is-meta"
    text:
      - "Забудь. Мне прекрасно известно, как с этим обстоят дела."
      - "К тому же, я уже приняла твёрдое решение — я приму эту силу и буду её использовать."
  - char: "bismarck_z"
    side: "right"
    text:
      - "...Понимаю."
  - char: "gneisenau_meta"
    side: "left"
    status: "is-meta"
    text:
      - "И ещё кое-что. Мы с Дзуйкаку выяснили, что все эти явления могут быть связаны с Арбитром Отшельник IX."
      - "То, что ждёт нас впереди — несомненно, ловушка."
  - char: "bismarck_z"
    side: "right"
    text:
      - "Арбитры, значит..."
      - "Раз уж всё дошло до этого, нам придётся идти вперёд, даже зная, что это ловушка."
      - "Только мне немного неловко перед тобой, госпожа Дзуйкаку. Извини, что втянули тебя в эту опасность."
  - char: "zuikaku"
    side: "left"
    text:
      - "Ну к чему такие церемонии, госпожа Бисмарк!"
      - "Всё это время я жила и питалась у вас бесплатно, да ещё и доставила столько хлопот. Пришло время хоть немного отплатить за гостеприимство!"
      - "В этом путешествии я буду сопровождать вас до самого конца!"
  - char: "bismarck_z"
    side: "right"
    text:
      - "Хорошо. Тогда немедленно выдвигаемся в зону отправления, чтобы догнать и вернуть U-556!"

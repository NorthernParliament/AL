chapter1:
  rows:
  - text:
      - "Доносился мерный шум морских волн."
      - "Сквозь пелену полусна она открыла глаза."
  - char: "ulrich_von_hutten"
    side: "left"
    text:
      - "...Что это за место?"
  - text:
      - "Неподалёку тусклым, призрачным светом мерцала Башня Мидгарда."
  - char: "ulrich_von_hutten"
    side: "left"
    text:
      - "(Башня Мидгарда начала заряжаться?)"
  - text:
      - "Она огляделась по сторонам: вокруг не было ни души, а бескрайнее море уходило далеко за горизонт."
  - char: "ulrich_von_hutten"
    side: "left"
    text:
      - "(До этого я определённо должна была находиться в плавучей крепости...)"
      - "Это сон или какая-то симуляция?.."
  - text:
      - "Её воспоминания были в полном беспорядке, а непрекращающиеся кошмары последних дней лишали покоя."
      - "Граница между реальностью и сновидением, казалось, постепенно стиралась."
      - "Но когда она наклонилась и опустила руку в воду, морская гладь сомкнулась над кончиками её пальцев."
      - "Это осязаемое ощущение было леденящей душу реальностью, которую невозможно воссоздать никакими существующими технологиями."
      - "Люминесцентное свечение замерцало в её глазах, напоминая безмолвный зов."
      - "И она решила ответить на этот зов."

chapter2:
  rows:
  - text:
      - "После мимолётного головокружения морская поверхность озарилась сиянием, исходящим от Башни Мидгарда."
      - "Небо и вода словно поменялись местами: море приобрело фантастический вид, затмевающий своим блеском даже звёздное небо."
  - char: "ulrich_von_hutten"
    side: "left"
    text:
      - "Место изменилось... Но обстановка осталась прежней..."
      - "Значит, это всё-таки сон..."
  - text:
      - "Её взгляд скользнул по причудливым блокам, поднимающимся из морской пучины."
      - "В этот момент Башня Мидгарда работала в совершенно невиданном доселе режиме."
      - "Вдалеке столб лазурного света уходил прямо в небеса, подобно маяку, указывающему путь заблудшим."
      - "Она пристально вглядывалась в это свечение и, словно приняв твёрдое решение, устремилась прямо к нему."

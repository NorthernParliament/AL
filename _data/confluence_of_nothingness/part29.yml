chapter1:
  rows:
  - text:
      - "Бисмарк и Вестал тем же путем вернулись в центр управления Башни Мидгарда."
  - char: "ulrich_von_hutten"
    side: "left"
    text:
      - "...Появилась из ниоткуда?!"
  - char: "vestal_meta"
    side: "right"
    status: "is-purple"
    text:
      - "Прости, что напугала тебя."
      - "Приятно познакомиться, Ульрих фон Хуттен, я — Вестал."
  - char: "bismarck_z"
    side: "left"
    text:
      - "Это и есть та самая неизвестная МЕТА, которую мы искали в этой акватории."
      - "Давайте сначала выйдем, я объясню вам, что произошло после того, как мы вошли в иллюзию."

chapter2:
  rows:
  - char: "regensburg"
    side: "left"
    text:
      - "Невероятно... Но это многое объясняет."
  - char: "otto_von_alvensleben"
    side: "right"
    text:
      - "Необходимость уничтожить лишь одно судно звучит куда обнадёживающе, чем одновременное сражение с двумя Арбитрами..."
  - char: "jade"
    side: "left"
    text:
      - "Но вполне возможно, что Дьявол тоже вмешается."
  - char: "otto_von_alvensleben"
    side: "right"
    text:
      - "А может и не вмешаться!"
      - "Она устроила всю эту неразбериху ради достижения собственных целей."
      - "Если бы она хотела нас уничтожить, то уже давно бы появилась!"
  - char: "vestal_meta"
    side: "left"
    status: "is-purple"
    text:
      - "Действительно, возможно, что основное тело Дьявол сейчас полностью сосредоточено на противостоянии с мейнфреймом Отшельника, и у неё нет времени ни на что другое."
      - "Но это не значит, что она не представляет для нас угрозы."
      - "Дьявол — это Арбитр поддержки, её главная способность..."
      - "В двух словах и не объяснишь. Я поделюсь с вами данными по дороге."
  - char: "bismarck_z"
    side: "right"
    text:
      - "Угу, так будет лучше всего. Любая информация о противнике перед боем имеет значение."
      - "Кстати... почему уровень коррозии снаружи стал настолько серьёзным?"
      - "Пока меня не было, кто-то активировал Башню Мидгарда?"
  - char: "regensburg"
    side: "left"
    text:
      - "Нет. Мы ничего не трогали, и Башня Мидгарда не активировалась."
      - "Но красная зона начала стремительно расширяться сразу после того, как ты вошла в иллюзию для расследования!"
  - char: "vestal_meta"
    side: "right"
    status: "is-purple"
    text:
      - "Возможно, это спонтанное распространение после того, как заражение достигло критической точки..."
      - "У нас действительно осталось мало времени."
      - "Мы должны вывести из строя судно до того, как Дьявол полностью захватит контроль над этим пространством."
      - "Если все права доступа ковчега перейдут к Дьяволу, то выводить её из строя будет уже бессмысленно."
      - "Я уже настроила параметры. Пусть Герион прокладывает путь, пора выступать."
  - char: "bismarck_z"
    side: "left"
    text:
      - "Герион, веди нас."
  - text:
      - "Герион расправил крылья, но прямо перед тем, как он вошёл в иллюзию, Вестал снова окликнула его."
  - char: "vestal_meta"
    side: "left"
    status: "is-purple"
    text:
      - "Погодите, подождите ещё секунду."
      - "А что с этим ребёнком?.."
  - text:
      - "Вестал присела на корточки рядом с U-556, внимательно осмотрела её и бросила на Бисмарк вопросительный взгляд."
  - char: "bismarck_z"
    side: "left"
    text:
      - "U-556... когда мы только прибыли сюда, под воздействием ударной волны МЕТА-коррозии у неё, вероятно, обострилась старая травма."
      - "И она стала такой. Мне удалось вернуть ей рассудок, но вот её внешность..."
  - char: "vestal_meta"
    side: "right"
    status: "is-purple"
    text:
      - "Вот оно что..."
      - "Не волнуйся. Она всё ещё на обратимой стадии."
      - "С этим я могу справиться, предоставь это мне."
  - char: "bismarck_z"
    side: "left"
    text:
      - "Правда?!"
  - char: "vestal_meta"
    side: "right"
    status: "is-purple"
    text:
      - "Угу. Однако запомни: после завершения лечения ей некоторое время нужно будет категорически избегать боёв."
  - char: "bismarck_z"
    side: "left"
    text:
      - "Хорошо, без проблем."
  - char: "u556_meta?"
    side: "right"
    status: "is-meta"
    text:
      - "...Подождите!"
      - "Сестрица Вестал, ты ведь очень много знаешь о МЕТА, верно?!"
  - char: "vestal_meta"
    side: "left"
    status: "is-purple"
    text:
      - "Можно и так сказать."
  - char: "u556_meta?"
    side: "right"
    status: "is-meta"
    text:
      - "Сейчас мы всё ещё в опасности, и именно сейчас нам больше всего нужна боевая мощь."
      - "Я же Морской Рыцарь, моя обязанность — защищать сестрицу Бисмарк и всех остальных!"
      - "Поэтому я не могу стать бесполезной обузой, которая не способна сражаться!"
      - "Не могла бы ты просто оказать мне какую-нибудь первую помощь или вроде того?"
      - "Я не хочу просто прятаться у всех за спинами!"
  - char: "vestal_meta"
    side: "left"
    status: "is-purple"
    text:
      - "Это сопряжено с определенным риском."
      - "...Но я понимаю твою решимость."
      - "Я проведу кое-какие экстренные процедуры, чтобы ты могла принять участие в предстоящих боях."
      - "Но у таких мер есть свой предел."
      - "Если во время боя я скажу остановиться, ты должна будешь остановиться. Поняла?"
  - char: "u556_meta?"
    side: "right"
    status: "is-meta"
    text:
      - "Поняла! Спасибо, сестрица Вестал!"

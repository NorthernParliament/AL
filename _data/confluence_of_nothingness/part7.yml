chapter1:
  rows:
  - text:
      - "Бой уже давно закончился, и вся поверхность моря была усеяна обломками Сирен IV типа."
      - "После того как Бисмарк продемонстрировала свою новую силу, некогда опасное сражение превратилось в односторонний разгром."
      - "Это должна была быть блестящая победа, но мысли девушек были уже совсем не об этом."
  - char: "otto_von_alvensleben"
    side: "left"
    text:
      - "Что же только что произошло..."
      - "Почему U-556 внезапно... впала в такое состояние?"
  - char: "bismarck_z"
    side: "right"
    text:
      - "У U-556 ещё оставались старые раны..."
      - "Как вы все знаете, после нашего столкновения с Королевским Флотом именно U-556 спасла из окружения ушедшую под воду меня."
      - "В то время она подверглась преследованию со стороны подводного флота Сирен и на близком расстоянии попала под разрушительное воздействие Чёрного Куба."
      - "Хоть её состояние было не настолько тяжёлым, как моё, она восстанавливалась вместе со мной до сегодняшнего дня."
      - "...Возможно, случившаяся с ней только что аномалия как-то связана с этим."
  - char: "otto_von_alvensleben"
    side: "left"
    text:
      - "...Неужели открылись старые раны?"
  - char: "bismarck_z"
    side: "right"
    text:
      - "Трудно сказать... Перед отплытием все проверки показывали, что всё в норме... Она так отчаянно настаивала, что я поддалась и..."
  - char: "regensburg"
    side: "left"
    text:
      - "...А эта аномалия не могла произойти из-за использования новой оснастки?"
  - char: "bismarck_z"
    side: "right"
    text:
      - "Нет, у нас не было таких планов. Она просто залечивала раны."
      - "Возможно, именно поэтому... Если бы мы обновили её оснастку, проблем бы не возникло..."
      - "Погоди..."
  - text:
      - "В мыслях Бисмарк снова предстала протянутая к ней рука U-556."
      - "Чёрная дымка, постепенно поглощающая лицо малышки, и тот мощный вырвавшийся импульс показались Бисмарк до боли знакомыми."
  - char: "bismarck_z"
    side: "right"
    text:
      - "(...Эта аура... Она так похожа на тот импульс, который я ощутила, когда насильно извлекала Чёрный Куб...)"
      - "(Неужели... в этой акватории находится какое-то устройство, ядром которого служит Чёрный Куб?)"
      - "(Я не заметила этого сразу из-за ожесточённого боя с Сиренами, и это спровоцировало рецидив у U-556...)"
      - "(Если так... с помощью Гериона я смогу подготовиться к тому, что ждёт нас впереди.)"
      - "(Главное — как можно скорее найти и вернуть U-556, тогда мы ещё сможем всё исправить...!)"
      - "Джейд, каковы результаты разведки? Ты нашла её?"
  - char: "jade"
    side: "left"
    text:
      - "Пока нет... Но у меня есть другие новости!"
      - "В акватории снова появились флоты Сирен IV типа, и они, похоже, кого-то преследуют!"
  - char: "bismarck_z"
    side: "right"
    text:
      - "Направление?!"
  - char: "jade"
    side: "left"
    text:
      - "На северо-восток, идут прямиком к Башне Мидгарда!"
  - char: "bismarck_z"
    side: "right"
    text:
      - "Хорошо, мы тоже выдвигаемся за ними."
      - "Сменить курс, на полной скорости к Башне Мидгарда!"

chapter1:
  rows:
  - text:
      - "На поверхности тёмно-красного моря плавали горящие обломки."
      - "Фридрих дер Гроссе, опустившись на воду, тихо смотрела в далёкое небо."
      - "Её оснастка была сильно повреждена, но в глазах по-прежнему сиял свет."
      - "БАБАХ!!!"
      - "Последний удар, нанесённый Энтерпрайз, ознаменовал полное поражение Арбитра Отшельник IX."
  - char: "enterprise_meta"
    side: "left"
    status: "is-meta"
    text:
      - "...Ты отлично потрудилась над операцией по отвлечению врага."
  - char: "friedrich_der_grosse"
    side: "right"
    text:
      - "Не стоит благодарности."
  - char: "enterprise_meta"
    side: "left"
    status: "is-meta"
    text:
      - "Я со своей стороны закончила, всем доложить боевую обстановку."
  - char: "fusou_meta_rad"
    side: "right"
    status: "is-meta"
    text:
      - "Блокировка пространства завершена, Отшельник больше не сможет получать поддержку от других Арбитров."
  - char: "scharnhorst_meta_rad"
    side: "left"
    status: "is-meta"
    text:
      - "И не только это! Теперь она даже не может поддерживать связь со своим собственным мейнфреймом!"
  - char: "hiyou_meta_rad"
    side: "right"
    status: "is-meta"
    text:
      - "Умеренность уже начала отступление."
  - char: "junyou_meta_rad"
    side: "left"
    status: "is-meta"
    text:
      - "Сила тоже. Хе-хе, похоже, внезапная потеря связи с Отшельник вызвала у них сильное недоумение."
  - char: "takao_meta_rad"
    side: "right"
    status: "is-meta"
    text:
      - "...Не ожидала, что такой безрассудный план и вправду сработает."
  - char: "friedrich_der_grosse"
    side: "left"
    text:
      - "Добиться этого удалось благодаря вашей силе, вашему потенциалу, а также..."
      - "...доверию."
  - char: "enterprise_meta"
    side: "right"
    status: "is-meta"
    text:
      - "...Достаточно. Давайте взглянем на нашу добычу."

chapter2:
  rows:
  - char: "enterprise_meta"
    side: "right"
    status: "is-meta"
    text:
      - "Вот мы и снова встретились, Отшельник."
  - char: "hermit"
    side: "left"
    status: "is-red"
    text:
      - ".....Что вы задумали?"
  - char: "enterprise_meta"
    side: "right"
    status: "is-meta"
    text:
      - "Что задумали... Например, что произойдёт, если прямо сейчас восстановить твою резервную копию?"
  - char: "hermit"
    side: "left"
    status: "is-red"
    text:
      - "...И это твой план?"
      - "Пепел всё такие же, как и раньше: вы только действуете и совершенно не думаете..."
      - "Не тратьте силы впустую."
  - char: "enterprise_meta"
    side: "right"
    status: "is-meta"
    text:
      - "Я знаю, о чём ты думаешь."
      - "«Как такое возможно без авторизации Зеро?»."
      - "А что, если у меня есть экстренный идентификационный код самого «Творца»?"
  - char: "hermit"
    side: "left"
    status: "is-red"
    text:
      - "...А? Госпожи Творца...? Как такое возможно?!"
  - char: "enterprise_meta"
    side: "right"
    status: "is-meta"
    text:
      - "...Однажды Анзил хвасталась им передо мной."
      - "И я его вспомнила."
  - char: "hermit"
    side: "left"
    status: "is-red"
    text:
      - "……………"
      - "Тебя немедленно обнаружат сразу после его использования."
      - "К тому же, что с того, если ты активируешь ещё одну Отшельник?"
      - "В таком случае протокол синхронизации и интеграции выполнится автоматически."
      - "Ты лишь увеличишь количество своих врагов."
  - char: "enterprise_meta"
    side: "right"
    status: "is-meta"
    text:
      - "А что, если активировать её после того, как изменить данные в мейнфрейме?"
  - char: "hermit"
    side: "left"
    status: "is-red"
    text:
      - "Что?! Что ты... вообще задумала..."
  - char: "enterprise_meta"
    side: "right"
    status: "is-meta"
    text:
      - "Ты ведь уже всё поняла."
      - "Даже если ты сейчас самоуничтожишься, это не поможет."
      - "Глушитель сигналов в этом пространстве был подготовлен специально для тебя."
      - "Ты, должно быть, уже и сама заметила, что твоя связь с мейнфреймом была полностью разорвана."
  - char: "hermit"
    side: "left"
    status: "is-red"
    text:
      - "...Целенаправленное глушение? Откуда у тебя такие технологии и оборудование?"
  - char: "enterprise_meta"
    side: "right"
    status: "is-meta"
    text:
      - "Из прошлого, из той самой эпохи."
      - "...Оно было частью совместных тестов с Антиохом."
  - char: "hermit"
    side: "left"
    status: "is-red"
    text:
      - "...Имея такое оборудование, ты ни разу не использовала его раньше."
  - char: "enterprise_meta"
    side: "right"
    status: "is-meta"
    text:
      - "Оборудование Антиоха меня не интересовало."
      - "Вплоть до недавнего времени, когда мои взгляды изменились."
  - char: "hermit"
    side: "left"
    status: "is-red"
    text:
      - "……………"
  - char: "enterprise_meta"
    side: "right"
    status: "is-meta"
    text:
      - "Вот и всё."
      - "Скоро я смогу отследить координаты твоего мейнфрейма. Ты проиграла."
  - text:
      - "*Звук вибрации воздуха*"
  - char: "enterprise_meta"
    side: "right"
    status: "is-meta"
    text:
      - "...Хм? Это ощущение..."
  - char: "hiryuu_meta_rad"
    side: "left"
    status: "is-meta"
    text:
      - "Плохо дело, Энтерпрайз, к тебе несётся какой-то гигантский объект!"
  - char: "enterprise_meta"
    side: "right"
    status: "is-meta"
    text:
      - "Что?!"


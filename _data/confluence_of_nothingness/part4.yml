chapter1:
  rows:
  - text:
      - "В этой акватории, где время и место оставались неизвестными, ярко сияющая Башня Мидгарда была единственным навигационным ориентиром."
  - char: "zuikaku"
    side: "left"
    text:
      - "Как красиво... Вода здесь блестит совсем как Млечный Путь!"
      - "И эти гигантские кубы тоже приковывают к себе внимание..."
  - char: "gneisenau_meta"
    side: "right"
    status: "is-meta"
    text:
      - "…………"
  - char: "zuikaku"
    side: "left"
    text:
      - "Ах, извини! Сейчас не время любоваться пейзажами!"
      - "Так, посмотрим, где мы сейчас должны быть... Ой?"
      - "Мы ведь прошли через Башню Мидгарда вслед за госпожой Ульрих... верно?"
  - char: "gneisenau_meta"
    side: "right"
    status: "is-meta"
    text:
      - "Верно."
  - char: "zuikaku"
    side: "left"
    text:
      - "Тогда почему... Башня Мидгарда оказалась так далеко от нас?!"
      - "Искусственная сингулярность Железной Крови так и устроена? Переносит тех, кто через неё прошёл, куда-то вдаль?.."
  - char: "gneisenau_meta"
    side: "right"
    status: "is-meta"
    text:
      - "По крайней мере, когда я использовала её в прошлый раз, мы оказались недалеко от самого устройства."
  - char: "zuikaku"
    side: "left"
    text:
      - "Значит, это какая-то новая функция после модернизации? Что-то вроде расширения радиуса телепортации..."
  - char: "gneisenau_meta"
    side: "right"
    status: "is-meta"
    text:
      - "Дзуйкаку, ты заметила?"
      - "На небе нет луны, да и звёздное небо совсем не похоже на то, к которому мы привыкли."
  - char: "zuikaku"
    side: "left"
    text:
      - "...И правда! Хоть звёзды и ярко сияют, я не вижу ни одного знакомого созвездия...?!"
      - "Не ожидала, что ты обратишь внимание на такие вещи!"
  - char: "gneisenau_meta"
    side: "right"
    status: "is-meta"
    text:
      - "...Было время, когда я оставалась совсем одна и подолгу всматривалась в пустоту."
      - "Так что будь осторожна. Возможно, это место — не просто очередной испытательный полигон Сирен какого-то мира или какое-нибудь Зеркальное море."
  - char: "zuikaku"
    side: "left"
    text:
      - "Звучит жутковато... Зачем госпожа Ульрих пришла сюда посреди ночи?"
  - char: "gneisenau_meta"
    side: "right"
    status: "is-meta"
    text:
      - "Когда найдём её, сможешь спросить лично."
      - "Идём."
  - char: "zuikaku"
    side: "left"
    text:
      - "Угу, давай скорее догоним госпожу Ульрих и во всём разберёмся!"
  - char: "gneisenau_meta"
    side: "right"
    status: "is-meta"
    text:
      - "…………"
  - char: "zuikaku"
    side: "left"
    text:
      - "Ах... Точно, мне ведь нужно сначала поднять разведывательные самолёты, чтобы засечь её местоположение, да?.."
      - "Аха-ха, подожди секундочку!"

chapter2:
  rows:
  - text:
      - "С помощью разведывательных самолётов найти Ульрих в этом пустынном море не составило большого труда."
      - "Однако..."
  - char: "ulrich_von_hutten"
    side: "left"
    text:
      - "...Ещё немного, и я... доберусь."
  - char: "zuikaku"
    side: "right"
    text:
      - "Госпожа Ульрих, наконец-то мы тебя нашли!"
      - "Ты в порядке?!"
  - char: "ulrich_von_hutten"
    side: "left"
    text:
      - "………"
  - char: "zuikaku"
    side: "right"
    text:
      - "...Госпожа Ульрих?"
  - text:
      - "Дзуйкаку внимательно присмотрелась к стоящей перед ней Ульрих фон Хуттен."
      - "Взгляд Ульрих был затуманен, она что-то бессвязно бормотала себе под нос, а её разум, казалось, полностью покинул это тело."
  - char: "zuikaku"
    side: "right"
    text:
      - "Приди в себя, госпожа Ульрих!"
  - text:
      - "Дзуйкаку протянула руку, пытаясь остановить упрямо идущую вперёд Ульрих, но её вовремя одёрнула Гнейзенау МЕТА."
  - char: "gneisenau_meta"
    side: "left"
    status: "is-meta"
    text:
      - "Осторожнее. Возможно, она всё ещё глубоко в плену кошмара. Неизвестно, что произойдёт, если мы бесцеремонно её растолкаем."
  - char: "zuikaku"
    side: "right"
    text:
      - "В плену кошмара?.. Значит, сейчас она словно лунатик..."
      - "Хм... Лунатизм... Погоди, я вспомнила!"
      - "Раньше Акаги-сэмпай и Кага-сэмпай тоже сталкивались с подобным!"
  - char: "gneisenau_meta"
    side: "left"
    status: "is-meta"
    text:
      - "Когда и где?"
  - char: "zuikaku"
    side: "right"
    text:
      - "Во время наступления на центральный сектор океана NA флот Акаги-сэмпай вошёл в густой морской туман."
      - "После этого всем в тумане приснился один и тот же кошмар, а Кага-сэмпай чуть было не открыла по нам огонь!"
      - "...Как хорошо, что ты меня сейчас остановила!"
  - char: "gneisenau_meta"
    side: "left"
    status: "is-meta"
    text:
      - "Так я и думала... Не за что."
      - "И кто был виновником того инцидента?"
  - char: "zuikaku"
    side: "right"
    text:
      - "В тот раз мы разглядели в тумане лишь смутный силуэт и не смогли сразу понять, кто это."
      - "Но когда мы потом разбирали операцию и сопоставили все данные, мы пришли к выводу, что за той атакой кошмарами стояла одна из Арбитров Сирен — Арбитр Отшельник IX."
  - char: "gneisenau_meta"
    side: "left"
    status: "is-meta"
    text:
      - "...Хм, эти Арбитры."
  - char: "zuikaku"
    side: "right"
    text:
      - "Ты что-нибудь знаешь об Отшельнике?"
  - char: "gneisenau_meta"
    side: "left"
    status: "is-meta"
    text:
      - "Нет... Но мне уже доводилось иметь дело с другими Арбитрами."
      - "Они у меня в долгу за многое..."
      - "И как вы тогда разбудили тех, кто погрузился в кошмар?"
  - char: "zuikaku"
    side: "right"
    text:
      - "Хм... Напали на них! Разумеется, используя нелетальные атаки!"
      - "А затем, для верности, лучше всего сразу же покинуть место, навевающее кошмары. Ну а если получится прогнать виновника всего этого, то будет ещё лучше."
  - char: "gneisenau_meta"
    side: "left"
    status: "is-meta"
    text:
      - "...Прогнать? Нет, их нужно уничтожить."
  - char: "zuikaku"
    side: "right"
    text:
      - "Эх... Уверенность в себе — это, конечно, хорошо, но наша главная задача сейчас, в конце концов, — спасти человека!"
  - char: "gneisenau_meta"
    side: "left"
    status: "is-meta"
    text:
      - "...Ладно."
  - char: "zuikaku"
    side: "right"
    text:
      - "У тебя есть холостые снаряды?"
  - char: "gneisenau_meta"
    side: "left"
    status: "is-meta"
    text:
      - "Я не пользуюсь подобными вещами."
  - char: "zuikaku"
    side: "right"
    text:
      - "...Ладно, тогда будить госпожу Ульрих буду я... Ой, а куда она делась?!"
  - char: "gneisenau_meta"
    side: "left"
    status: "is-meta"
    text:
      - "Пока ты тут усердно копалась в своей памяти, она уже вошла внутрь Башни Мидгарда."
  - char: "zuikaku"
    side: "right"
    text:
      - "Как быстро! Нам нужно срочно догнать её!"

chapter3:
  rows:
  - text:
      - "Ульрих быстро продвигалась по лабиринту внутренних конструкций. Одно лишь то, чтобы не отставать от неё, стоило Дзуйкаку и Гнейзенау МЕТА колоссальных усилий."
  - char: "zuikaku"
    side: "left"
    text:
      - "Госпожа Ульрих... она ведь точно идёт во сне? Но почему тогда она движется так быстро?!"
      - "Да и что вообще происходит с этим местом?! Его структура полностью изменилась по сравнению с тем, что было до нашего прихода!"
      - "...Искусственная сингулярность соединяет два мира, так разве Башни Мидгарда в обоих мирах концептуально не являются одним и тем же объектом?!"
  - char: "gneisenau_meta"
    side: "right"
    status: "is-meta"
    text:
      - "По крайней мере, мне тоже так говорили... Но сейчас внутренняя структура явно перестроилась."
      - "...То, что терзаемая кошмарами Ульрих может так непринуждённо ориентироваться в совершенно незнакомой обстановке..."
      - "Возможно, этот кукловод скрывается где-то совсем близко от нас."
      - "Похоже, мы должны как можно скорее вернуть Ульрих в чувство. Даже если ради этого придётся причинить ей немного боли..."
  - char: "zuikaku"
    side: "left"
    text:
      - "Погоди, госпожа Ульрих остановилась впереди!"
      - "А это ещё что такое?.."

chapter4:
  rows:
  - text:
      - "Следуя за Ульрих, они вышли в просторный зал, в центре которого парил полусферический проекционный экран."
      - "Ульрих заворожённо замерла перед ним. Несмотря на то что она всё ещё находилась во власти кошмара, она смотрела на экран так, словно отчётливо видела всё происходящее на нём."
  - char: "ulrich_von_hutten"
    side: "left"
    text:
      - "...Фридрих."
  - char: "zuikaku"
    side: "right"
    text:
      - "...?! Гнейзенау, ты видишь это? На экране... Фридрих дер Гроссе из Железной Крови?!"
      - "Что с ней... Она ранена?!"
  - char: "gneisenau_meta"
    side: "left"
    status: "is-meta"
    text:
      - "Прямо сейчас она должна действовать вместе с Пеплом... Что же это за изображение?.."
  - char: "ulrich_von_hutten"
    side: "right"
    text:
      - "...Я... иду."
      - "...Я... опоздала."
      - "...Проклятье."

chapter5:
  rows:
  - text:
      - "В порыве ярости Ульрих с силой ударила кулаком по парящему в воздухе экрану."
      - "В то же мгновение из самого центра сферы вырвалась чёрная ударная волна."
  - char: "zuikaku"
    side: "left"
    text:
      - "Успокойся, госпожа Ульрих!.. Что за...?!"
  - char: "gneisenau_meta"
    side: "right"
    status: "is-meta"
    text:
      - "Дзуйкаку, живо за мою спину!.."
  - text:
      - "................"
      - "Оглушив Дзуйкаку и Гнейзенау МЕТА, чёрный импульс покинул Башню Мидгарда и устремился вдаль, стремительно распространяясь по бескрайней морской глади."

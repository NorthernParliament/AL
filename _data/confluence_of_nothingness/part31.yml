chapter1:
  rows:
  - text:
      - "Крылья Гериона подняли бурю, и он с рёвом бросился на врагов, находящихся на воде."
      - "Однако флот Инфорсеров не впал в хаос, как ожидалось. Напротив, они организовали ещё более плотный зенитный огонь."
  - char: "gneisenau_meta"
    side: "left"
    status: "is-meta"
    text:
      - "Состояние этих Инфорсеров... отличается от того, что было раньше."
  - char: "bismarck_z"
    side: "right"
    text:
      - "Герион, возвращайся к флоту!"
  - char: "gneisenau_meta"
    side: "left"
    status: "is-meta"
    text:
      - "Я прикрою!"
  - char: "gerion"
    side: "right"
    status: "is-meta"
    text:
      - "▁▂▃▄▅▆▇███Гневный рёв██▌"
  - char: "regensburg"
    side: "left"
    text:
      - "Госпожа Вестал, как эти враги могли... внезапно стать такими?"
  - char: "vestal_meta"
    side: "right"
    status: "is-purple"
    text:
      - "У меня нет точных доказательств."
      - "Но, возможно, как и Инфорсеры Дьявола, они подверглись влиянию изменений в ковчеге Отшельника."
  - char: "jade"
    side: "left"
    text:
      - "Госпожа Бисмарк, мои палубные самолеты несут тяжелые потери!"
      - "Из первой волны самолетов почти никто не вернулся."
      - "Сейчас палубной авиации с трудом хватает даже на то, чтобы защищать воздушное пространство над флотом. Я не смогу организовать вторую волну атаки."
  - char: "zuikaku"
    side: "right"
    text:
      - "С этими парящими летательными аппаратами Дьявол, затесавшимися во вражеский флот, нужно что-то делать!"
  - char: "vestal_meta"
    side: "left"
    status: "is-purple"
    text:
      - "Я знаю способ, но для его осуществления нужен кто-то, кто исключительно хорош в радиоэлектронной борьбе."
  - char: "zuikaku"
    side: "right"
    text:
      - "...Ахаха, похоже, остаётся только идти напролом."
  - char: "bismarck_z"
    side: "left"
    text:
      - "Не забывайте о нашей цели, госпожа Дзуйкаку."
  - char: "zuikaku"
    side: "right"
    text:
      - "Вывести из строя ковчег Отшельника, да, я помню!"
      - "Но этот ковчег всё время прячется позади и не высовывается. Если мы сначала не прорвём сеть зенитного огня...!"
  - char: "bismarck_z"
    side: "left"
    text:
      - "Используем ту же тактику, что и раньше."
      - "Ульрих возьмёт на себя командование флотом, чтобы потянуть время."
      - "А я отправлюсь выводить из строя ковчег Отшельника."
  - char: "vestal_meta"
    side: "right"
    status: "is-purple"
    text:
      - "Бисмарк, честно говоря, твоя..."
      - "Технология твоей оснастки, Гериона, весьма специфична. Арбитры наверняка тоже проявят к тебе огромный интерес."
      - "Что если это ловушка, чтобы заманить тебя?"
  - char: "bismarck_z"
    side: "left"
    text:
      - "Тогда для одного инцидента здесь слишком много ловушек."
      - "Всё, что мы пережили на этом пути, породило в нас слишком много догадок, сомнений и страха перед неизвестным."
      - "Но мир движется вперёд не только благодаря заговорам и интригам."
      - "Раз уж мы видим шанс на победу, мы не можем позволить ему ускользнуть."
      - "А все связанные с этим риски я возьму на себя."
  - char: "vestal_meta"
    side: "right"
    status: "is-purple"
    text:
      - "...Я поняла. Хотя я не предназначена для боя, я сделаю всё возможное, чтобы обеспечить вам поддержку."
  - char: "bismarck_z"
    side: "left"
    text:
      - "Тогда оставляю тылы на тебя, госпожа Вестал."
  - char: "u556_meta?"
    side: "right"
    status: "is-meta"
    text:
      - "Сестрица Бисмарк, позволь мне пойти с тобой!"
      - "На этот раз я ни на шаг от тебя не отойду!"
  - char: "bismarck_z"
    side: "left"
    text:
      - "...Хорошо, выступаем!"

chapter2:
  rows:
  - text:
      - "Под командованием Ульрих отряд отделил флот Инфорсеров от ковчега."
      - "Бисмарк же под прикрытием Гериона и U-556 стремительно продвигалась вперёд."
  - char: "hermit??"
    side: "right"
    status: "is-red"
    text:
      - "Команда подтверждена, начинаю выполнение протокола А."
  - char: "u556_meta?"
    side: "left"
    status: "is-meta"
    text:
      - "Сестрица Бисмарк, Отшельник начала атаку!"
  - char: "bismarck_z"
    side: "right"
    text:
      - "Герион!"
  - text:
      - "Герион сложил крылья, образовав щит, который заблокировал входящую атаку."
  - char: "u556_meta?"
    side: "left"
    status: "is-meta"
    text:
      - "Отлично, сестрица Бисмарк~!"
  - char: "hermit??"
    side: "right"
    status: "is-red"
    text:
      - "Сила цели превышает ожидаемую, переключаюсь на протокол Б."
      - "Системы Арбитров IX=XV, механизм совместной поддержки, входящая мощность 20%..."
  - char: "gerion"
    side: "left"
    status: "is-meta"
    text:
      - "▁▂▃▄▅▆▇███Гневный рёв██"
  - text:
      - "Крылья снова распахнулись, и мощный поток воздуха, подняв гигантскую волну, обрушился на врага."
  - char: "hermit??"
    side: "right"
    status: "is-red"
    text:
      - "............"
      - "Поправка, входящая мощность скорректирована до 70%."
  - char: "u556_meta?"
    side: "left"
    status: "is-meta"
    text:
      - "Уаа, сестрица, враг вдруг стал казаться таким опасным...!"
  - char: "bismarck_z"
    side: "right"
    text:
      - "U-556, оставляю подводных врагов на тебя."
      - "Не всплывай, пока я не дам следующую команду."
      - "Вперёд!"
  - char: "u556_meta?"
    side: "left"
    status: "is-meta"
    text:
      - "Хорошо, сестрица Бисмарк!"
      - "Обязательно будь осторожна на поверхности!"
  - text:
      - "U-556 нырнула под воду, а в следующую секунду Герион со скоростью, неуловимой для невооружённого глаза, бросился к Отшельнику."
  - char: "bismarck_z"
    side: "left"
    text:
      - "...Герион, отключить протокол безопасности № 1."
      - "Главный калибр, огонь!"
  - text:
      - "Орудия главного калибра Гериона нацелились на врага и выстрелили одновременно, пороховой дым затянул обзор."
      - "Отшельник отскочила назад, уклоняясь от удара, и снаряды с грохотом разорвались в воде прямо позади неё."
      - "Следом за этим сквозь пороховой дым проступила яркая красная точка, и раскалённый луч света разорвал дымовую завесу."
      - "Отшельник не успела увернуться и смогла лишь заблокировать удар своей оснасткой."
      - "Там, где проносился луч, выгорал сам воздух."
      - "Над поверхностью моря клубился пар."
      - "Однако усиленный ковчег Отшельника, казалось, по-прежнему не получил серьёзных повреждений."
  - char: "hermit??"
    side: "right"
    status: "is-red"
    text:
      - "Сила цели превышает ожидаемую, переключаюсь на протокол C."
      - "Системы Арбитров IX=XV, механизм совместной поддержки, входящая мощность 100%."
      - "Системы Арбитров IX=XV, подключение совместной поддержки — «Ядро обработки Дьявола», входящая мощность 3%."
  - char: "bismarck_z"
    side: "left"
    text:
      - "Хех, я уже однажды бродила по аду..."
      - "И теперь настало время использовать силу, которую я принесла из этого ада!"
      - "Герион, отключить протоколы безопасности №2, №3 и №7."
  - char: "gerion"
    side: "right"
    status: "is-meta"
    text:
      - "▁▂▃▄▅▆▇███Невероятно яростный рёв██▌██▌██▌██▌"
  - char: "bismarck_z"
    side: "left"
    text:
      - "Да начнётся охота!"

chapter3:
  rows:
  - text:
      - "БАБАХ!!!"
  - char: "hermit??"
    side: "right"
    status: "is-red"
    text:
      - "Сила цели превышает ожидаемую, переключаюсь на протокол F."
      - "Системы Арбитров IX=XV, подключение совместной поддержки — «Двигатель Дьявола», входящая мощность 5%."
      - "Переход в режим пространственного маневрирования."
  - char: "otto_von_alvensleben_rad"
    side: "left"
    text:
      - "О-она... всё ещё может становиться сильнее."
  - char: "ulrich_von_hutten_rad"
    side: "right"
    text:
      - "Нет, ковчег перешёл в режим полёта."
  - char: "regensburg"
    side: "left"
    text:
      - "Проклятье, враг пытается сбежать... Её цель — тот перевёрнутый город в небе?!"
  - char: "jade_rad"
    side: "right"
    text:
      - "Палубным самолетам не прорвать вражескую сеть огня, мы не успеем её перехватить!"
  - char: "zuikaku"
    side: "left"
    text:
      - "Чёрт, у меня то же самое...! Если мы ничего не придумаем, она уйдёт!"
  - char: "bismarck_z"
    side: "right"
    text:
      - "...Решила сбежать."
      - "U-556, хочешь стать первой в мире... летающей подводной лодкой?"
  - char: "u556_meta?"
    side: "left"
    status: "is-meta"
    text:
      - "Э...?! Хочу!"
  - char: "bismarck_z"
    side: "right"
    text:
      - "Всплывай ко мне."
      - "Герион, отключить протокол безопасности №5."
      - "Взлетай..."

chapter4:
  rows:
  - text:
      - "Отшельник ускорилась, устремившись к городу в небе."
      - "Но гигантская тень неотступно преследовала её."

chapter5:
  rows:
  - char: "u556_meta?"
    side: "left"
    status: "is-meta"
    text:
      - "Ва-а-ау! Я лечуууу!"
  - char: "bismarck_z"
    side: "right"
    text:
      - "Герион, вцепись в неё."
  - char: "gerion"
    side: "left"
    status: "is-meta"
    text:
      - "▁▂▃▄▅▆▇███Невероятно яростный рёв██▌██▌██▌██▌"
  - char: "hermit??"
    side: "right"
    status: "is-red"
    text:
      - "Сила цели превышает ожидаемую, переключаюсь на протокол G."
      - "Получены права на командование «системой Инфорсеров XV»."
      - "Активация."
  - char: "u556_meta?"
    side: "left"
    status: "is-meta"
    text:
      - "Плохо дело, сестрица Бисмарк! Появились новые враги!"
      - "Судя по данным, которые ранее передала госпожа Вестал, это два типа Инфорсеров, подчинённых Дьяволу!"
      - "И их так много! Они уже давно ждали нас здесь!"
  - char: "bismarck_z"
    side: "right"
    text:
      - "(Наконец-то бросила в бой свои личные войска, Дьявол.)"
      - "(Если так пойдёт и дальше, то даже если я выведу из строя ковчег Отшельника, мне ни за что не вырваться из этого окружения.)"
      - "(Как я и думала, это ловушка.)"
      - "(...Остаётся лишь довериться Вестал и тем, кто стоит за ней.)"
      - "U-556, не отвлекайся. Стоит нам уничтожить ковчег, и всё закончится!"
  - char: "u556_meta?"
    side: "left"
    status: "is-meta"
    text:
      - "Хорошо, сестрица Бисмарк, я поняла!"
  - text:
      - "Парящее в воздухе тело Отшельника замерцало зловещим светом. Казалось, она готовится нанести свой последний удар."
  - char: "hermit??"
    side: "right"
    status: "is-red"
    text:
      - "Команда на локальную зачистку подтверждена, накопление энергии."
  - char: "bismarck_z"
    side: "left"
    text:
      - "Герион, отключить протоколы безопасности №4, №6, №8 и №9."
  - char: "gerion"
    side: "right"
    status: "is-meta"
    text:
      - "▁▂▃▄▅▆▇███Самый яростный рёв из всех, что были до сих пор██▌██▌██▌██▌██▌██▌"
  - char: "bismarck_z"
    side: "left"
    text:
      - "Вперёд."
  - text:
      - "С яростным рёвом Герион бросился на Отшельника."
      - "В этот миг по всему его телу вспыхнули светящиеся узоры."
  - char: "bismarck_z"
    side: "left"
    text:
      - "Антиох, в прошлом я не покорилась судьбе, которую вы для меня уготовили."
      - "И в этот раз — тоже не покорюсь."
      - "Это тело, эта сила — вот моя решимость."
      - "Истина восторжествует «Wahrheit siegreich Zurückkehren»"


chapter6:
  rows:
  - text:
      - "Луч света, вырвавшийся из пасти гигантского дракона, был куда более обжигающим, чем когда-либо прежде."
      - "Ослепительное дыхание дракона заставило поверхность моря едва ли не закипеть."
      - "Слои брони Отшельника начали плавиться."
      - "Даже с учётом усилений от Дьявол, перед лицом повреждений такого уровня она была абсолютно бессильна."
      - "Битва подошла к концу..."

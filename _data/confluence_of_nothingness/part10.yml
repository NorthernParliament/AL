chapter1:
  rows:
  - char: "ulrich_von_hutten"
    side: "left"
    text:
      - "Позволь мне пойти с тобой."
  - char: "friedrich_der_grosse"
    side: "right"
    text:
      - "Нет, ты должна остаться здесь."
  - char: "ulrich_von_hutten"
    side: "left"
    text:
      - "Но..."
  - char: "friedrich_der_grosse"
    side: "right"
    text:
      - "Я уже всё решила, не поднимай больше эту тему."
      - "Сосредоточься на подготовке к бою... Ульрих."
  - char: "ulrich_von_hutten"
    side: "left"
    text:
      - "………………"

chapter2:
  rows:
  - text:
      - "Посреди моря огня в памяти Ульрих всплыла сцена их расставания."
      - "Та величественная и гордая Фридрих дер Гроссе из её воспоминаний теперь в одиночестве лежала посреди горящих на воде обломков."
  - char: "ulrich_von_hutten"
    side: "left"
    status: "is-meta"
    text:
      - "Даже Фридрих дер Гроссе может оказаться в безвыходном положении..."
  - text:
      - "Ни врагов, ни боевых товарищей, лишь всепожирающее пламя и искорёженная сталь — именно так и должно выглядеть место, где всё подходит к концу."
  - char: "ulrich_von_hutten"
    side: "left"
    status: "is-meta"
    text:
      - "Хех... Как иронично. И где же Флот Открытого Моря, на который ты возлагала такие надежды?"
      - "Всё это случилось только потому, что меня не было рядом..."
      - "…"
      - "Фридрих, кто с тобой это сделал..."
      - "Если ты ещё жива, встань и скажи мне!"
  - text:
      - "Ответом на крик Ульрих был лишь пронзительный скрежет корёжащегося в огне металла."
  - char: "ulrich_von_hutten"
    side: "left"
    status: "is-meta"
    text:
      - "Я же говорила... Тебе просто нужно было взять меня с собой..."
      - "Какой мне смысл оставаться в Железной Крови, если в ней нет тебя..."
  - text:
      - "*Лязг... лязг...* Звук становился всё громче."
      - "Казалось, кто-то сюда приближался."
  - char: "bismarck"
    side: "right"
    text:
      - "...Так вот какой кошмар пленил твоё сердце, Ульрих."
  - char: "ulrich_von_hutten"
    side: "left"
    status: "is-meta"
    text:
      - "Бисмарк... Ты бросила нас, когда Железная Кровь нуждалась в тебе больше всего."
      - "И зачем же ты явилась теперь?"
      - "Оглянись вокруг! Всё дошло до такого, а ты всё ещё хочешь мне приказывать?!"
      - "Я подчинённая Фридрих, а не твоя!"
  - char: "bismarck"
    side: "right"
    text:
      - "Я знаю."
  - char: "ulrich_von_hutten"
    side: "left"
    status: "is-meta"
    text:
      - "Железная Кровь смогла выкарабкаться из безвыходного положения только благодаря Фридрих!"
      - "Это она из кожи вон лезла, используя любые средства, чтобы скинуть с Железной Крови оковы Сирен, которые ты сама же на нас и надела!"
      - "А ты всё это время... не делала абсолютно ничего!"
  - char: "bismarck"
    side: "right"
    text:
      - "Я знаю."
  - char: "ulrich_von_hutten"
    side: "left"
    status: "is-meta"
    text:
      - "Ты знаешь?.."
      - "Так по какому праву ты с таким невозмутимым видом забираешь себе всё, над чем так усердно трудилась Фридрих?!"
      - "Другие могут спокойно принять тебя, но я — нет!"
  - char: "bismarck"
    side: "right"
    text:
      - "Я знаю."
  - char: "ulrich_von_hutten"
    side: "left"
    status: "is-meta"
    text:
      - "……"
      - "...Я наговорила тебе столько всего, почему ты до сих пор не злишься?"
      - "Давай, ответь мне! ...Неужели нынешний лидер Железной Крови — трусиха?!"
  - char: "bismarck"
    side: "right"
    text:
      - "Всё, что ты сказала — правда. Мне нечего возразить."
      - "Более того, я очень благодарна, что ты смогла всё это высказать."
      - "Но прямо сейчас нельзя просто так сдаваться и тонуть в ловушке врага, позволяя ему добиться своего."
  - char: "bismarck_z"
    side: "right"
    text:
      - "Герион, яви свою мощь и сокруши эту лживую иллюзию!"
  - char: "gerion"
    side: "left"
    status: "is-meta"
    text:
      - "▁▂▃▄▅▆▇███РРРРРРРРРРРРРРРРРР██▌"

chapter3:
  rows:
  - char: "ulrich_von_hutten"
    side: "left"
    status: "is-meta"
    text:
      - "...Так я и думала, всё это было лишь иллюзией."
  - char: "bismarck_z"
    side: "right"
    text:
      - "Ты поняла это?"
  - char: "ulrich_von_hutten"
    side: "left"
    status: "is-meta"
    text:
      - "Где-то на середине..."
      - "Но..."
      - "Мне правда так сильно хотелось уйти вместе с Фридрих..."
  - char: "bismarck_z"
    side: "right"
    text:
      - "Я знаю."
  - char: "ulrich_von_hutten"
    side: "left"
    status: "is-meta"
    text:
      - "...То, что я наговорила только что, было не всерьёз."
  - char: "bismarck_z"
    side: "right"
    text:
      - "И это я тоже знаю."
      - "В моё отсутствие на ваши плечи легло немыслимое бремя... И за это я вам глубоко благодарна."
      - "Благодарна за то, что, пока я была тяжело ранена и находилась без сознания, вы защитили Железную Кровь."
      - "Защитили наш дом..."
      - "И именно поэтому теперь у нас есть шанс на светлое будущее."
      - "Выслушать несколько упрёков — сущие пустяки. Я была готова столкнуться с куда более сильным гневом."
  - char: "ulrich_von_hutten"
    side: "left"
    status: "is-meta"
    text:
      - "...Что бы ни случилось, я бы ни за что не стала открывать по тебе огонь."
      - "В этом ты просчиталась, госпожа Бисмарк."
  - char: "bismarck_z"
    side: "right"
    text:
      - "Хе-хе... Тут я и правда немного ошиблась в расчётах."
      - "Время на передышку почти вышло. Как ты сейчас себя чувствуешь?"
  - char: "ulrich_von_hutten"
    side: "left"
    status: "is-meta"
    text:
      - "Ужасно... Даже сейчас в моей голове продолжает завывать этот неистовый голос."
      - "Это состояние... Это и есть МЕТА-трансформация?"
  - char: "bismarck_z"
    side: "right"
    text:
      - "Если точнее, это сам процесс МЕТА-трансформации."
      - "Я прекрасно понимаю, каково это — быть погребённой под лавиной негативных эмоций, когда даже сохранить собственное «я» кажется непозволительной роскошью."
      - "Но ты всё ещё сохраняешь рассудок и удерживаешь разрушение в контролируемых рамках. Это действительно поразительно."
  - char: "ulrich_von_hutten"
    side: "left"
    status: "is-meta"
    text:
      - "Есть ли какой-то надёжный способ всё исправить?.. Иначе я стану лишь обузой в этой операции."
  - char: "bismarck_z"
    side: "right"
    text:
      - "Разумеется, есть. Не волнуйся."
      - "Пусть я, возможно, и не самый образцовый лидер, но раз уж я вернулась..."
      - "...положись на меня."

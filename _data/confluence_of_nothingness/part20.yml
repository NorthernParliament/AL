chapter1:
  rows:
  - text:
      - "Столб света в центре Башни Мидгарда замерцал."
      - "С активацией установки отряд снова совершил перенос."
      - "Однако местом назначения оказался вовсе не тот парящий город, в который все так надеялись попасть."
  - char: "ulrich_von_hutten"
    side: "left"
    text:
      - "Мы так и не попали в мейнфрейм?.."
      - "В таком случае гипотеза о том, что мейнфрейм использовался как приманка, больше не имеет смысла..."
  - char: "regensburg"
    side: "right"
    text:
      - "Смотрите, «красная зона» и «синяя зона» в акватории поменялись местами...!"
      - "И не только они, даже свет Башни Мидгарда..."
  - text:
      - "Девушки огляделись по сторонам: открывшийся им вид кардинально изменился."
      - "Мало того, что город в небе исчез, так ещё и небо, водная гладь и даже свет Башни Мидгарда перевернулись с ног на голову."
      - "Но не оставалось никаких сомнений в том, что они всё ещё заперты в этом таинственном пространстве."
  - char: "ulrich_von_hutten"
    side: "left"
    text:
      - "Как и раньше, мы находимся ровно на границе между красной и синей водой."
      - "Проблема в том, что водная гладь инвертировалась, и теперь, чтобы вернуться к Башне Мидгарда, нам придётся пересечь «красную зону»."
      - "Госпожа Бисмарк, я считаю необходимым взять образцы морской воды из этой акватории."
  - char: "bismarck_z"
    side: "right"
    text:
      - "Угу... И лучше всего собрать их из нескольких разных мест."
      - "Джейд, сможешь сделать это с помощью своих палубных самолётов?"
  - char: "jade"
    side: "left"
    text:
      - "Я попробую, госпожа Бисмарк."
  - text:
      - "Палубные самолёты с подвешенными к ним контейнерами для сбора образцов на глазах у всех взмыли в воздух, а затем изящно спикировали к самой поверхности воды."
  - char: "otto_von_alvensleben"
    side: "left"
    text:
      - "Ого... Как ловко! Неужели палубная авиация способна и на такое?!"
  - char: "jade"
    side: "right"
    text:
      - "Удивлена?~ Таким навыком обладают только хорошие девочки, которые упорно тренируются~"

chapter2:
  rows:
  - text:
      - "Спустя какое-то время..."
      - "Ульрих слегка приподняла колбы с образцами, внимательно изучая их в свете гигантского луча далекой Башни Мидгарда."
  - char: "ulrich_von_hutten"
    side: "left"
    text:
      - "Это просто... абсолютно прозрачные и бесцветные жидкости."
      - "И те, что собраны в «красной зоне», и те, что в «синей»..."
  - char: "zuikaku"
    side: "right"
    text:
      - "И правда! Но... разве это не слишком странно?"
  - char: "ulrich_von_hutten"
    side: "left"
    text:
      - "...Учитывая текущую ситуацию, есть только одно объяснение."
      - "Будь то «красная зона» или «синяя зона», различие в цвете воды — это лишь видимость."
      - "Причина всего этого кроется в неких более фундаментальных «правилах», управляющих этим пространством."
      - "Возможно, эта морская вода принимает два разных состояния, только находясь в этой акватории. Обычный сбор образцов здесь бесполезен."
      - "Поэтому после взятия образцов мы получаем лишь чистую «морскую воду»."
  - char: "zuikaku"
    side: "right"
    text:
      - "Это как если бы какая-то гигантская проекционная установка окрашивала поверхность воды светом... и поэтому вода, которую мы зачерпнули, бесцветна?"
  - char: "ulrich_von_hutten"
    side: "left"
    text:
      - "Можно объяснить и так."
  - char: "zuikaku"
    side: "right"
    text:
      - "Тогда это ещё более странно... Чтобы создать проекцию такого масштаба, насколько же огромной должна быть сама эта установка."
      - "Но мы не видели ничего подобного."
      - "К тому же, госпожа Гнейзенау говорила ранее, что в этой красной воде ощущается аура МЕТА-коррозии."
  - char: "gneisenau_meta"
    side: "left"
    status: "is-meta"
    text:
      - "Верно... Однако я не чувствую ничего подобного от этих образцов, собранных в красной зоне."
      - "С таким я сталкиваюсь впервые..."
  - char: "bismarck_z"
    side: "right"
    text:
      - "...Возможно, это проекция, способная наделять свойствами."
  - char: "zuikaku"
    side: "left"
    text:
      - "Проекция, наделяющая свойствами?.."
  - char: "bismarck_z"
    side: "right"
    text:
      - "Пока что это лишь сырая теория, нужно собрать больше доказательств."
  - char: "zuikaku"
    side: "left"
    text:
      - "Тогда дальше — нам остаётся только двигаться вперёд?"
  - char: "bismarck_z"
    side: "right"
    text:
      - "Угу, снова выдвигаемся к Башне Мидгарда."
  - char: "jade"
    side: "left"
    text:
      - "По-подожди, госпожа Бисмарк! Засечён странный сигнал, источник... позади нас?!"
      - "...Подтверждаю нападение противника, идентифицированы как Сирены IV типа, их огромное количество!"
  - char: "bismarck_z"
    side: "right"
    text:
      - "Хотят загнать нас внутрь... Похоже, они тоже знают об опасности «красной зоны»."
  - char: "zuikaku"
    side: "left"
    text:
      - "Мы всё равно собирались туда пойти, так что обойдёмся без их проводов~"
  - char: "bismarck_z"
    side: "right"
    text:
      - "Угу, не будем вступать с Сиренами в бессмысленную войну на истощение."
      - "Движемся прямо вперёд, пересекаем «красную зону» на максимальной скорости."
      - "На это время мы с Герионом бросим все силы на вашу защиту, не волнуйтесь."
      - "Время не ждёт, выступаем!"

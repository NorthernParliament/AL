chapter1:
  rows:
  - char: "bismarck_z"
    side: "left"
    text:
      - "Впереди центр управления. Ульрих, пойдём со мной, мне нужна твоя помощь."
      - "Остальные, пожалуйста, во время нашего расследования обеспечьте безопасность Башни Мидгарда и центра управления. Командование поручается Гнейзенау МЕТА."
  - char: "gneisenau_meta"
    side: "right"
    status: "is-meta"
    text:
      - "...Командование поручается мне?"
      - "Я поняла, можете на меня положиться."

chapter2:
  rows:
  - text:
      - "На экранах по-прежнему транслировались сцены гибели флота Железной Крови."
  - char: "ulrich_von_hutten"
    side: "left"
    text:
      - "Вот оно что, так вот почему ты отослала остальных."
  - char: "bismarck_z"
    side: "right"
    text:
      - "Хоть это и просто выдуманная иллюзия, в любом случае это не то, на что стоило бы смотреть всем остальным."
  - char: "ulrich_von_hutten"
    side: "left"
    text:
      - "...Согласна. Даже если разум понимает, что это фальшивка, подавить эмоциональное потрясение не так-то просто."
      - "Другой выход, о котором ты говорила, находится прямо в этом видео?"
  - char: "bismarck_z"
    side: "right"
    text:
      - "Возможно."
      - "Ранее, слушая твой рассказ, я заметила одну деталь, которую, возможно, упустила даже ты сама."
      - "Твои кошмары менялись."
      - "В самом начале это было чёрное солнце. При входе в это пространство кошмар сменился на активацию Башни Мидгарда."
      - "А после того, как мы вошли в центр управления, он снова изменился — на гибель Фридрих..."
      - "То есть на то самое видео, что транслировалось на экранах центра управления ранее."
  - char: "ulrich_von_hutten"
    side: "left"
    text:
      - "Кажется, так оно и есть... Я просто воспринимала их все как один сплошной кошмар."
  - char: "bismarck_z"
    side: "right"
    text:
      - "Позже, как раз перед нападением серийной модели Отшельника, я исследовала в центре управления именно это видео."
      - "Я воспользовалась тем же способом и снова вошла в тот же самый «кошмар», и кое-что там обнаружила."
  - char: "ulrich_von_hutten"
    side: "left"
    text:
      - "Ты повторно вошла в кошмар с помощью видео на экране?.. То есть!"
  - char: "bismarck_z"
    side: "right"
    text:
      - "Верно, это вовсе не «кошмар», а тщательно спланированное, стабильное пространство, в которое можно входить снова и снова."
      - "Если в этой акватории существуют и другие проходы, возможно, они спрятаны именно там..."
      - "Сейчас я тем же способом исследую пространство, скрывающееся за этим видео."
      - "В это время я не смогу следить за тем, что происходит снаружи. Для тебя я, наверное, буду выглядеть так, словно уснула."
      - "Если атака врага будет слишком мощной, или если я пробуду там больше пяти часов — разбуди меня."
  - char: "ulrich_von_hutten"
    side: "left"
    text:
      - "Я поняла. Удачного пути и береги себя."
  - text:
      - "Бисмарк протянула руку и коснулась экрана. Пейзаж перед её глазами пошёл рябью, словно водная гладь."

chapter3:
  rows:
  - text:
      - "В мгновение ока грань между реальностью и сном снова растворилась."

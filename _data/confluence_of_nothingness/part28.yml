chapter1:
  rows:
  - text:
      - "Когда свет рассеялся, перед глазами Бисмарк предстала новая иллюзия."
      - "Издалека со стороны моря доносились звуки артиллерийской канонады, некий флот с боем прорывался сквозь вражеский строй."
  - char: "seydlitz"
    side: "left"
    text:
      - "Ситуация складывается не лучшим образом, госпожа Фридрих, я потеряла связь с Тюрингией и Магдебург."
      - "Линия фронта долго не продержится."
  - char: "friedrich_der_grosse"
    side: "right"
    text:
      - "Время ещё не пришло, продолжаем бой."
  - char: "lutzow"
    side: "left"
    text:
      - "Враги снова окружают нас!"
  - char: "friedrich_der_grosse"
    side: "right"
    text:
      - "Отразить атаку."
  - char: "hermit"
    side: "left"
    status: "is-red"
    text:
      - "..Я думала, вы хоть как-то подготовились, какая трата времени."
      - "Исчезните."
  - text:
      - "Силуэты Фридрих дер Гроссе и Флота Открытого Моря поглотил непрекращающийся артиллерийский огонь."
  - char: "bismarck_z"
    side: "left"
    text:
      - "........................"
  - char: "vestal_meta"
    side: "right"
    status: "is-purple"
    text:
      - "Ты задумалась. Твоя решимость дрогнула?"
  - char: "bismarck_z"
    side: "left"
    text:
      - "Я просто подумала... Сцена в этой иллюзии такая же, какую я видела раньше, но время событий немного сдвинуто назад."
      - "...Эта иллюзия, она действительно «сфабрикована»?"
  - char: "vestal_meta"
    side: "right"
    status: "is-purple"
    text:
      - "Изначально они были для Сирен лишь способом хранения информации."
      - "Часть их содержимого берётся из симуляций мейнфрейма, а часть является записями реальных событий, произошедших на экспериментальных полигонах."
      - "Позже... как и в случае с Зеркальными морями, Сирены превратили в оружие все доступные им технологии, в результате чего на свет появились такие вот сбивающие с толку иллюзорные миры."
  - char: "bismarck_z"
    side: "left"
    text:
      - "То есть, нельзя с абсолютной уверенностью утверждать, что сцены из иллюзий никогда не происходили в реальности?"
  - char: "vestal_meta"
    side: "right"
    status: "is-purple"
    text:
      - "Не думала, что ты задашь вопрос с такой точки зрения."
      - "А что, если я отвечу «да»?"
  - char: "bismarck_z"
    side: "left"
    text:
      - "...Тогда давай лучше не будем зацикливаться на этом."
      - "Как ты думаешь, что означает этот сдвиг во времени в иллюзии на более ранний момент?"
      - "Означает ли сдвиг времени, что мы продвинулись дальше в этом пространстве относительно нашего прежнего положения?"
  - char: "vestal_meta"
    side: "right"
    status: "is-purple"
    text:
      - "Хм... Возможно, мы уже нашли способ двигаться в обратном направлении."
      - "Кстати, где те чёрные летательные аппараты, о которых ты говорила раньше?"
      - "Возможно, я смогу определить, откуда они взялись."
  - char: "bismarck_z"
    side: "left"
    text:
      - "Подожди немного... Герион, рассей туман!"
  - text:
      - "Герион взмыл в небо и заскользил вдоль кромки морского тумана, его движения казались более легкими и проворными, чем раньше."
  - char: "gerion"
    side: "left"
    status: "is-meta"
    text:
      - "▁▂▃▄▅▆▇███Гневный рёв██▌"
  - text:
      - "Яростный ветер разогнал туман, обнажив скрывавшиеся в нём чёрные летательные аппараты."
      - "В отличие от прошлого раза, эти аппараты бросились врассыпную в тот же миг, как поняли, что их обнаружили."
  - char: "bismarck_z"
    side: "left"
    text:
      - "Они разгадали мои намерения. Герион, в погоню!"
  - char: "vestal_meta"
    side: "right"
    status: "is-purple"
    text:
      - "...Подожди, не нужно. Я уже знаю, кому принадлежат эти аппараты..."
      - "Это... палубные самолёты Арбитра Дьявол XV."
  - char: "bismarck_z"
    side: "left"
    text:
      - "...Арбитр Дьявол? Разве не Отшельник?!"
      - "Мы противостоим сразу двум Арбитрам?!"
  - char: "vestal_meta"
    side: "right"
    status: "is-purple"
    text:
      - "Мне... мне нужно больше информации..."
      - "У пути, созданного из иллюзий, должен быть конец. Идём скорее!"

chapter2:
  rows:
  - text:
      - "Снова пройдя сквозь свет, перед ними предстали Башня Мидгарда и перевёрнутый город, парящий в небе."
  - char: "bismarck_z_rad"
    side: "left"
    text:
      - "Мы... вышли из иллюзии?"
      - "Хм? Я... чувствую себя немного странно."
  - char: "vestal_meta"
    side: "right"
    status: "is-purple"
    text:
      - "Верно, мы вернулись в реальность."
      - "Я с самого начала вошла туда в физической форме, а ты — нет. Отсюда и такая разница в ощущениях после выхода."
      - "Не обращай внимания, когда вернёшься в своё тело, всё пройдёт."
      - "Как я и думала... Это центральная зона пространства мейнфрейма Отшельника."
      - "Тот город в небе — это и есть мейнфрейм Отшельника."
  - char: "bismarck_z_rad"
    side: "left"
    text:
      - "Но если это так..."
  - char: "vestal_meta"
    side: "right"
    status: "is-purple"
    text:
      - "Да, нет никаких сомнений, пространство мейнфрейма подвергается атаке."
      - "...Подожди, у меня восстановилась связь с базой."
      - "Возможно, это место ещё не полностью заблокировано... Я сейчас же вызову подкрепление!"
  - text:
      - "С облегчением выдохнув, Вестал нажала кнопку на коммуникаторе..."
  - char: "vestal_meta"
    side: "right"
    status: "is-purple"
    text:
      - "Слышишь меня, Хелена!"
  - char: "helena_meta_rad"
    side: "left"
    status: "is-meta"
    text:
      - "Вестал, наконец-то связь с тобой восстановилась."
      - "Где ты? Как там обстановка?"
  - char: "vestal_meta"
    side: "right"
    status: "is-purple"
    text:
      - "Похоже, я нахожусь в одном из пространств мейнфрейма Отшельника... Ситуация довольно сложная."
      - "Сейчас со мной Бисмарк из бета таймлайна, и мы столкнулись с палубными самолетами Дьявола..."
  - char: "helena_meta_rad"
    side: "left"
    status: "is-meta"
    text:
      - "Что?"
  - char: "vestal_meta"
    side: "right"
    status: "is-purple"
    text:
      - "Угу! Дьявол тоже к этому причастна."
      - "Не знаю, сколько продержится канал связи... В общем, сначала перешлю тебе данные."
  - char: "helena_meta_rad"
    side: "left"
    status: "is-meta"
    text:
      - "Поняла, сохраняй спокойствие, принимаю данные."
      - "......................Хм?"
      - "........................Как-то странно."
      - "...Отправляю тебе сведенные воедино данные."
  - char: "vestal_meta"
    side: "right"
    status: "is-purple"
    text:
      - "Угу, я уже начала прием."
      - "Погоди... Э? Откуда Дьявол знает о действиях Пепла?!"
  - char: "helena_meta_rad"
    side: "left"
    status: "is-meta"
    text:
      - "Неясно, но это единственный вывод, который можно сделать после сопоставления всей информации."
      - "Я уже начала организацию спасательной операции, но..."
      - "К сожалению, на данном этапе пробиться к вам извне невозможно."
      - "Где-то в этой акватории, вероятно, недалеко от мейнфрейма, должна находиться ковчег Отшельника."
      - "Выведите её из строя, и сделайте это быстро. Дьявол, скорее всего, уже засекла этот сеанс связи."
      - "Остальное предоставьте мне."
  - char: "vestal_meta"
    side: "right"
    status: "is-purple"
    text:
      - "Хорошо, я поняла."
  - char: "helena_meta_rad"
    side: "left"
    status: "is-meta"
    text:
      - "...Прости. Я не ожидала, что всё настолько усложнится. Это мой просчёт в планировании."
  - char: "vestal_meta"
    side: "right"
    status: "is-purple"
    text:
      - "Ничего страшного, Вестал конец связи."

chapter3:
  rows:
  - char: "bismarck_z_rad"
    side: "left"
    text:
      - "С кем ты только что разговаривала?"
  - char: "vestal_meta"
    side: "right"
    status: "is-purple"
    text:
      - "С нашим подкреплением, с Хеленой."
      - "Я знаю, что у тебя много вопросов, но буду кратка."
      - "Во-первых, ваша Фридрих дер Гроссе в порядке."
      - "Она действительно сражается с Отшельником, но это тщательно спланированная совместно с Пеплом операция."
      - "На самом деле в опасности находится Отшельник. Пока её сдерживал Пепел, Дьявол воспользовалась ситуацией и вторглась в это пространство мейнфрейма."
  - char: "bismarck_z_rad"
    side: "left"
    text:
      - "Вторглась... Дьявол?"
      - "Сирены тоже конфликтуют друг с другом?"
  - char: "vestal_meta"
    side: "right"
    status: "is-purple"
    text:
      - "В привычном понимании «конфликтов» у них не бывает, но если речь идёт о неких особых экспериментах, Сирены действительно могут сражаться друг с другом."
      - "Однако «конфликт» между Арбитрами мы тоже видим впервые..."
  - char: "bismarck_z_rad"
    side: "left"
    text:
      - "Это пространство мейнфрейма Отшельника. То есть, если мы уничтожим его, мы сможем полностью уничтожить её саму?"
  - char: "vestal_meta"
    side: "right"
    status: "is-purple"
    text:
      - "Это невозможно. Если бы всё было так просто, их бы уже давно всех уничтожили."
      - "Это лишь одно из пространств мейнфрейма Отшельника. Уничтожение одного только этого места даже близко не приведёт к её поражению."
      - "Однако... если нужно просто добыть или подделать какую-то информацию, взлом пространства мейнфрейма — самый выгодный способ."
      - "Хелена полагает, что именно в этом и заключается цель Дьявола."
  - char: "bismarck_z_rad"
    side: "left"
    text:
      - "Кошмары и постоянно расползающаяся по акватории МЕТА-коррозия — это всё методы атаки Дьявола?"
  - char: "vestal_meta"
    side: "right"
    status: "is-purple"
    text:
      - "Эти странные иллюзии — способность Отшельника. Возможно, это означает, что Дьявол уже начала перехватывать контроль над пространством мейнфрейма."
      - "Что касается использования МЕТА-коррозии, в настоящее время среди Сирен мы наблюдали подобное только в связи с Дьявол."
      - "Возможно, это вызвано нынешним особым состоянием Дьявол..."
      - "Мы сами пока не пришли к единому мнению, поэтому я не могу сказать тебе большего."
      - "В любом случае, состояние Дьявол крайне опасно, и нашему нынешнему флоту с ней не справиться."
      - "Но если это только ковчег Отшельника, у нас всё ещё есть шанс на победу."
  - char: "bismarck_z_rad"
    side: "left"
    text:
      - "Угу, по пути сюда мы уже сражались с ковчегом и даже думали, что уничтожили её."
      - "Похоже, её исчезновение в конце было лишь отступлением для перегруппировки."
  - char: "vestal_meta"
    side: "right"
    status: "is-purple"
    text:
      - "Погоди... Вы уже успели ранить ковчег?!"
  - char: "bismarck_z_rad"
    side: "left"
    text:
      - "Да, с этим какие-то проблемы?"
  - char: "vestal_meta"
    side: "right"
    status: "is-purple"
    text:
      - "Ничего такого, просто предстоящий бой будет несколько сложнее..."
      - "Идём, наша первоочередная задача — вернуть всех твоих."
  - char: "bismarck_z_rad"
    side: "left"
    text:
      - "И последнее, насчёт моего состояния..."
  - char: "vestal_meta"
    side: "right"
    status: "is-purple"
    text:
      - "Не волнуйся, я сохраню твою тайну."

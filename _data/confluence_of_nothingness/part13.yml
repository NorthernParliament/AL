chapter1:
  rows:
  - text:
      - "По мере приближения отряда ситуация на поле боя становилась всё яснее."
      - "БАБАХ!!!"
  - char: "u556_meta?"
    side: "left"
    status: "is-meta"
    text:
      - "А-ха-ха-ха-ха! Сколько бы вас, мелких сошек, ни было, вы всё равно останетесь мелкими сошками!"
      - "У меня, рыцаря, сейчас есть куда более важные дела! Если я потеряю время, вы возьмёте на себя за это ответственность?!"
  - text:
      - "БАБАХ!!!"
  - char: "u556_meta?"
    side: "left"
    status: "is-meta"
    text:
      - "Хе-хе-хе, а может, вам лучше прямо сейчас взять её на себя!"
      - "Исчезните все!"
  - text:
      - "Морской рыцарь, ставшая совершенно непохожей на себя прежнюю, самозабвенно сражалась с флотом Сирен."
      - "Она совершенно не замечала медленно приближающийся издалека отряд Бисмарк."
  - char: "jade"
    side: "left"
    text:
      - "Это... U-556 сейчас?"
  - char: "otto_von_alvensleben"
    side: "right"
    text:
      - "Невероятно... Как U-556 могла..."
  - char: "bismarck_z"
    side: "left"
    text:
      - "Это и есть МЕТА-трансформация или МЕТА-морфоз."
      - "Она меняет не только нашу внешность и оснастку, но и саму нашу суть."
  - char: "regensburg"
    side: "right"
    text:
      - "Можно ли ещё обратить это с помощью Гериона?!"
  - char: "bismarck_z"
    side: "left"
    text:
      - "...Только если U-556 ещё не перешагнула черту."
  - char: "regensburg"
    side: "right"
    text:
      - "Черту... Но то, как она выглядит сейчас...!"
  - char: "bismarck_z"
    side: "left"
    text:
      - "Нельзя судить только по внешнему виду."
      - "МЕТА-трансформация, хоть в конечном итоге и является качественным изменением, вызванным количественным накоплением, не работает по простому принципу «чем тяжелее стадия, тем сильнее изменения»."
      - "Бывают случаи, когда степень МЕТА-трансформации невелика, но внешность меняется, а бывает и так, что кансен уже на грани перехода черты, но внешне почти ничем не отличается."
      - "В этом плане всё... весьма индивидуально."
      - "До пересечения черты возможны любые изменения."
      - "И точно так же, пока черта не пересечена, любые изменения обратимы."
      - "Не теряйте надежду."
  - char: "regensburg"
    side: "right"
    text:
      - "Я поняла!"
  - char: "ulrich_von_hutten"
    side: "left"
    text:
      - "Госпожа Бисмарк, ситуация на поле боя изменилась, у U-556 проблемы."
      - "Те, кто сейчас внезапно появились — это ведь флот Инфорсеров, верно?"
  - char: "zuikaku"
    side: "right"
    text:
      - "Инфорсеры...?!"
      - "А! Я знаю эту модель! Инфорсер IX «Exploration», это Инфорсер Арбитра Отшельник!"
  - char: "bismarck_z"
    side: "left"
    text:
      - "Отшельник, Инфорсер Арбитра..."
  - char: "otto_von_alvensleben"
    side: "right"
    text:
      - "Госпожа Бисмарк, Инфорсеры уже окружили U-556! Ей не справиться с таким количеством врагов!"
  - char: "gneisenau_meta"
    side: "left"
    status: "is-meta"
    text:
      - "Она только что подверглась МЕТА-трансформации, её самомнение раздулось, но она ещё не умеет обращаться с этой новой силой..."
      - "В своё время я тоже за это дорого поплатилась..."
      - "Это крайне опасный момент. Госпожа Бисмарк, я считаю, что мы должны немедленно начать спасательную операцию."
  - char: "bismarck_z"
    side: "right"
    text:
      - "Джейд, авиаподдержка!"
  - char: "jade"
    side: "left"
    text:
      - "Поняла, поддержка уже в пути~!"

chapter2:
  rows:
  - text:
      - "БАБАХ!!!"
  - char: "u556_meta?"
    side: "left"
    status: "is-meta"
    text:
      - "Тц... Ещё враги."
      - "Откуда здесь ещё и авиация?! Не мешайтесь!"
  - text:
      - "БАБАХ!!!"

chapter3:
  rows:
  - char: "jade"
    side: "left"
    text:
      - "Э~?! U-556 сбила мои палубные самолёты?!"
      - "Это же мои самолёты, разве она их не узнаёт?!"
  - char: "gneisenau_meta"
    side: "right"
    status: "is-meta"
    text:
      - "Это усложняет дело. Похоже, сейчас она не в состоянии отличить своих от чужих. Приближаться к ней в открытую слишком опасно..."
  - char: "otto_von_alvensleben"
    side: "left"
    text:
      - "Но мы же не можем просто стоять и смотреть!"
  - char: "bismarck_z"
    side: "right"
    text:
      - "У меня есть план, но мне понадобится ваша помощь."
      - "Сейчас я направлюсь прямиком к U-556."
      - "Вы должны оттянуть бой на себя, чтобы дать нам немного времени и пространства."
      - "Ульрих, командование операцией оставляю на тебя."
  - char: "ulrich_von_hutten"
    side: "left"
    text:
      - "Без проблем, ты тоже будь осторожна."
  - char: "bismarck_z"
    side: "right"
    text:
      - "Не волнуйся."
  - char: "ulrich_von_hutten"
    side: "left"
    text:
      - "Всем дать три залпа, расчистить путь для госпожи Бисмарк!"
      - "После этого выбирайте цели самостоятельно и уводите противников подальше от них двоих."
      - "Помните, наша цель — отвлечь внимание врага. Вы должны выиграть для госпожи Бисмарк достаточно времени и пространства до того, как она завершит свою задачу."
  - char: "all"
    side: "right"
    text:
      - "Слушаемся!"
  - char: "ulrich_von_hutten"
    side: "left"
    text:
      - "Отлично, начинаем операцию!"

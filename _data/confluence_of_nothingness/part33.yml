chapter1:
  rows:
  - char: "bismarck"
    side: "left"
    text:
      - "На этом пока всё."
      - "...Интересно, решилась ли проблема у Элизабет."
      - "Надо бы с ней связаться."
  - text:
      - "Бисмарк открыла канал связи."
      - "Но после нажатия кнопки вызова ей ответили лишь помехи."
  - char: "bismarck"
    side: "left"
    text:
      - "...Хм?"
  - text:
      - "Бисмарк по очереди попыталась вызвать штаб в метрополии и Принц Ойген, находившуюся на территории проведения Всемирной выставки."
      - "В коммуникаторе по-прежнему были слышны только помехи."
  - char: "bismarck"
    side: "left"
    text:
      - "Внешняя связь до сих пор не восстановилась...? Как-то странно..."
  - char: "regensburg_rad"
    side: "right"
    text:
      - "Госпожа Бисмарк, я закончила проверку."
  - char: "bismarck"
    side: "left"
    text:
      - "Как обстановка?"
  - char: "regensburg_rad"
    side: "right"
    text:
      - "...Наши товарищи, находящиеся в лазарете, по-прежнему в глубоком сне."
  - char: "bismarck"
    side: "left"
    text:
      - "...Есть ли помимо этого другие аномалии?"
  - char: "regensburg_rad"
    side: "right"
    text:
      - "Нет, результаты медицинского обследования не выявили никаких отклонений."
      - "Они словно... просто уснули обычным сном."
  - char: "bismarck"
    side: "left"
    text:
      - "Я поняла, продолжай наблюдение."
  - char: "regensburg_rad"
    side: "right"
    text:
      - "Слушаюсь. Регенсбург конец связи."
  - text:
      - "Из окна офисной зоны было видно, как свет Башни Мидгарда постепенно меркнет."
      - "Это служило доказательством того, что установка отключается."
  - char: "bismarck"
    side: "left"
    text:
      - "Все последствия этого инцидента... по идее, тоже должны были исчезнуть вместе с ней."
      - "...Похоже, её и вправду придётся уничтожить."
  - text:
      - "Бисмарк долго смотрела на погрузившуюся в тишину Башню Мидгарда."
  - char: "bismarck"
    side: "left"
    text:
      - "................"
      - "......Ульрих, ты меня слышишь?"
  - char: "ulrich_von_hutten_rad"
    side: "right"
    text:
      - "Да, слышу. Что-то случилось?"
  - char: "bismarck"
    side: "left"
    text:
      - "Как продвигается проверка Башни Мидгарда?"
  - char: "ulrich_von_hutten_rad"
    side: "right"
    text:
      - "Ещё в процессе, полная проверка пока не завершена."
      - "Но если судить только по предварительным выводам, похоже, она полностью вернулась в исходное состояние."
      - "............"
      - "Бисмарк..."
  - char: "bismarck"
    side: "left"
    text:
      - "Ульрих..."
      - "......Кажется, мы хотели сказать одно и то же."
  - char: "ulrich_von_hutten_rad"
    side: "right"
    text:
      - "...Мы правда собираемся её взорвать?"
  - char: "bismarck"
    side: "left"
    text:
      - "...Взрываем."
      - "Миссия Башни Мидгарда подошла к концу. Будь на моём месте Фридрих, она приняла бы такое же решение..."
      - "Однако... считай данные с Башни Мидгарда ещё раз, а затем проверь всю документацию по проекту."
      - "Убедитесь, что всё в целости, сделайте резервные копии... и только после этого приступайте к подрыву."
  - char: "ulrich_von_hutten_rad"
    side: "right"
    text:
      - "Поняла. Немедленно приступаю."

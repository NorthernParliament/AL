chapter1:
  rows:
  - char: "bismarck_z"
    side: "left"
    text:
      - "Простите, я опоздала. Как обстановка?"
  - char: "ulrich_von_hutten"
    side: "right"
    text:
      - "Давление велико, но мы пока справляемся."
      - "Судя по её поведению в бою, эта Отшельник может быть всего лишь серийной моделью."
      - "Она проявляет множество признаков «Пешки», да и её боевая мощь не так уж запредельна."
      - "По крайней мере, это позволило нам продержаться до окончания твоего расследования."
      - "Однако наша главная цель — благополучно вернуться. Возможно, нам стоит подумать, как выйти из боя."
  - char: "bismarck_z"
    side: "left"
    text:
      - "Боюсь, это невозможно. По пути сюда я заметила, что панель управления Башни Мидгарда уже заблокирована."
      - "Вероятно, это произошло одновременно с появлением этой серийной модели Отшельник."
  - char: "zuikaku"
    side: "right"
    text:
      - "Тогда нам остаётся только сражаться изо всех сил!"
      - "Раз это всего лишь серийная модель, и Акаги-сэмпай смогла её уничтожить, то и мы не проиграем!"
  - char: "bismarck_z"
    side: "left"
    text:
      - "Акаги тоже?.. Нет, сейчас не время об этом думать."
      - "Держите дистанцию, уверенно продвигаемся вперёд."
      - "Всем приготовиться к бою!"

chapter2:
  rows:
  - text:
      - "БАБАХ!!!"
  - char: "otto_von_alvensleben"
    side: "left"
    text:
      - "Хе-хе-хе, она снова промазала!"
      - "Даже будучи Пешкой Арбитров, её тактика всё так же примитивна!"
  - char: "regensburg"
    side: "right"
    text:
      - "Каким бы мощным ни было оружие, без грамотного командования оно способно лишь на это."
  - char: "jade_rad"
    side: "left"
    text:
      - "Нет... Что-то здесь не так. Возможно, её целью с самого начала была Башня Мидгарда!"
      - "Смотрите на воду, разве она не движется всё время в сторону Башни Мидгарда?!"
      - "И эскадрильи палубной авиации в небе тоже! Они совершенно игнорируют мои атаки и изо всех сил летят к установке. Боюсь, они собираются её разбомбить!"
  - char: "hermit"
    side: "right"
    status: "is-red"
    text:
      - "........................"
  - char: "zuikaku_rad"
    side: "left"
    text:
      - "Неудивительно, я тоже почувствовала неладное!"
      - "Но почему?.. Если они просто хотят помешать нам сбежать, разве недостаточно было заблокировать управление?"
      - "К тому же, Башню Мидгарда, которая является искусственной сингулярностью, не так-то просто уничтожить!"
  - char: "bismarck_z"
    side: "right"
    text:
      - "Да, теоретически это так, но мы не можем рисковать."
      - "Возможно, Башня Мидгарда и в самом деле наш ключ к спасению..."
      - "Как бы там ни было, мы обязаны помешать всему, что пытается сделать враг."
      - "Регенсбург, Отто, Джейд — вы координируете действия с госпожой Дзуйкаку и обеспечиваете противовоздушную оборону."
      - "Ульрих и Гнейзенау, за мной! Мы уничтожим её вместе!"

chapter3:
  rows:
  - char: "bismarck_z"
    side: "left"
    text:
      - "Прямо по курсу, залп!"
  - text:
      - "Грохот гигантских орудий разорвал воздух, а обжигающие волны порохового дыма, казалось, заставили морскую воду закипеть."
  - char: "gneisenau_meta"
    side: "left"
    status: "is-meta"
    text:
      - "Её броня пробита! Атака эффективна, ещё пара залпов, и мы точно..."
  - text:
      - "БАБАХ!!!"
  - char: "gneisenau_meta"
    side: "left"
    status: "is-meta"
    text:
      - "?!"
  - char: "bismarck_z"
    side: "right"
    text:
      - "...Звук артиллерийского огня с фланга?"
  - char: "u556_meta?"
    side: "left"
    status: "is-meta"
    text:
      - "Беда, сестрица Бисмарк! Те таинственные враги, которых невозможно разглядеть, атакуют нас!"
  - char: "ulrich_von_hutten"
    side: "right"
    text:
      - "Таинственные враги... Когда они успели подобраться так близко?!"
  - char: "gneisenau_meta"
    side: "left"
    status: "is-meta"
    text:
      - "Даже с такого расстояния невозможно разглядеть детали их силуэтов... Плохо дело."
  - char: "bismarck_z"
    side: "right"
    text:
      - "Гнейзенау, оставляю этих новоприбывших на тебя..."
  - char: "gerion"
    side: "left"
    status: "is-meta"
    text:
      - "▁▂▃▄▅▆▇███Настороженное рычание██▌"
  - char: "bismarck_z"
    side: "right"
    text:
      - "Хм?.. Постойте, это чувство, и эта мощь..."
      - "Всем немедленно отступить за мою спину! Герион!"
  - char: "gerion"
    side: "left"
    status: "is-meta"
    text:
      - "▁▂▃▄▅▆▇███Гневный рёв██▌"
  - text:
      - "Герион стремительно рванул вперёд. С оглушительным рёвом он расправил крылья, словно воздвигая непреодолимый барьер перед всем отрядом."
      - "Электронные приборы затрещали от помех — опасность стремительно приближалась."
  - char: "bismarck_z"
    side: "left"
    text:
      - "Приготовиться к удару!"

chapter4:
  rows:
  - text:
      - "Под натиском чёрной ударной волны девушки с трудом удерживались на ногах."
      - "Их силуэты всё сильнее размывались в этом бушующем потоке, а Герион продолжал яростно реветь."
      - "Чёрная аура постепенно оседала густым тёмным налётом на поверхности крыльев дракона."
      - "Перед лицом этого ревущего потока барьер Гериона казался одинокой лодочкой в бурных водах..."
      - "...Но в конечном итоге она так и не перевернулась."
      - "По мере того как ударная волна рассеивалась, этот тёмный налёт исчезал невообразимо быстро, прямо на глазах."
      - "Вой стих, и на морской глади вновь воцарился покой."

chapter5:
  rows:
  - char: "jade"
    side: "left"
    text:
      - "Фу-ух"
      - "Я... я уж думала, что нам конец..."
  - char: "otto_von_alvensleben"
    side: "right"
    text:
      - "Всё закончилось?! Правда закончилось?!"
  - char: "regensburg"
    side: "left"
    text:
      - "Сигналы серийной модели Отшельник, моделей Сирен IV типа и тех неизвестных врагов исчезли..."
      - "Только мы уцелели. Герион, ты просто чудо!"
  - char: "gerion"
    side: "right"
    status: "is-meta"
    text:
      - "▁▂▃▄▅▆▇███Довольное фырканье██▌"
  - char: "zuikaku"
    side: "left"
    text:
      - "Хотя существует вероятность, что они отступили из-за тяжелых повреждений."
      - "Но, учитывая её недавнюю примитивную тактику, она, скорее всего, и в самом деле была уничтожена!"
  - char: "u556_meta?"
    side: "right"
    status: "is-meta"
    text:
      - "Фух... В таком случае блокировка Башни Мидгарда тоже должна быть снята."
      - "Сестрица Бисмарк, мы уходим отсюда?"
  - char: "ulrich_von_hutten"
    side: "left"
    text:
      - "Подожди, госпожа Бисмарк. Очередная активация Башни Мидгарда может перенести нас прямо к мейнфрейму Арбитра."
  - char: "bismarck_z"
    side: "right"
    text:
      - "То есть внутрь того перевернутого города..."
      - "Огромный риск также означает огромную награду — так я хотела бы сказать, но реальность такова, что сейчас у нас просто нет иного выбора."
      - "Отправляемся в зону отправления."

chapter6:
  rows:
  - char: "gneisenau_meta"
    side: "left"
    status: "is-meta"
    text:
      - "Госпожа Бисмарк, этот удар... Даже Шарнхорст из Пепла не факт, что смогла бы его выдержать."
      - "Единственное, в чём я абсолютно уверена... сейчас ты не подвержена МЕТА-трансформации."
      - "Но всё остальное для меня — полная загадка. Что именно с тобой произошло..."
  - char: "bismarck_z"
    side: "right"
    text:
      - "Я прогулялась по аду, и это та самая сила, которую я принесла с собой оттуда."
      - "Сила, способная смести все преграды на нашем пути и вести Железную Кровь вперёд."

chapter1:
  rows:

    - char: shinano
      side: left
      text:
        - "Сузуцуки, Ханадзуки, следите за перемещениями под водой. Тестер нанесет скрытый удар, используя группу подлодок."

    - char: suzutsuki
      side: right
      text:
        - "Есть!"

    - char: hanazuki
      side: right
      text:
        - "Принято!"

    - char: shinano
      side: left
      text:
        - "Титосэ, Тиёда, при поддержке моих авиагрупп продолжайте подавлять воздушные силы Тестер."

    - char: chitose
      side: right
      text:
        - "Слушаюсь!"

    - char: chiyoda
      side: right
      text:
        - "Предоставь это мне~"

    - char: shinano
      side: left
      text:
        - "Остальным артиллерийским кораблям — не менять позицию, ждите..."

    - char: kumano
      side: right
      text:
        - "Э?! Чего же нам еще ждать..?"

    - char: shinano
      side: left
      text:
        - "Того момента, когда Тестер бросит все силы на противовоздушную оборону и сменит режим противодействия. Именно тогда она откроется для удара..."

    - char: kii
      side: right
      text:
        - "А! Так вот оно что..! Вот почему великая наставница Микаса до этого смогла нанести Тестер тяжелые повреждения, используя лишь старые орудия главного калибра!"

    - char: shinano
      side: left
      text:
        - "Именно так. Прошу вас, приложите все силы вместе со мной — и мы добудем эту победу!"
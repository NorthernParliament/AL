chapter1:
  rows:

    - char: hamakaze
      side: left
      text:
        - "Госпожа Синано, вы проснулись. Добрый вечер."

    - char: shinano
      side: right
      text:
        - "Я... уснула в пути?"

    - char: isokaze
      side: left
      text:
        - "Именно так! Вы — истинный флагман флота: даже обнаружив следы врага, вы сохраняете непоколебимое спокойствие, подобно горе."

    - char: shinano
      side: right
      text:
        - "Который сейчас час?.."

    - char: hamakaze
      side: left
      text:
        - "Скоро восемь вечера. После того как был замечен сигнал подлодки Союза Орла, флот, согласно вашему предыдущему приказу, сомкнул строй и движется на высокой скорости."

    - char: shinano
      side: right
      text:
        - "(Бессилие... я чувствую слабость во всём теле.)"
        - "(…Если присмотреться, вся оснастка покрыта следами грубой сборки, двигатели работают на пределе сил, а ангары… пусты…)"

    - char: hamakaze
      side: left
      text:
        - "Госпожа Синано, чувствовать недомогание в первом походе — это нормально. Продолжайте путь, и вы скоро привыкнете."

    - char: isokaze
      side: right
      text:
        - "Вот прибудем в Курэ, вас зачислят в боевое соединение — и тогда вы зададите жару этим ребятам из Союза Орла!"

    - char: shinano
      side: left
      text:
        - "Погрязли в войне с Союзом Орла… Здесь всё так же…"
        - "(А ведь совсем недавно мы сражались плечом к плечу. Какая ирония в этих снах…)"

chapter2:
  rows:

    - char: shinano
      side: left
      text:
        - "Информация всё прибывает. В прошлых снах такого никогда не случалось… Что ж, поживем — увидим.)"
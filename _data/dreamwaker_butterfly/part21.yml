chapter1:
  rows:

    - char: shinano
      side: left
      text:
        - "Снова запах порохового дыма… Я… в море."

chapter2:
  rows:

    - char: shinano
      side: left
      text:
        - "Рядом со мной Юкикадзэ, Хамакадзэ и Исокадзэ… Я на пути в порт Курэ…"
        - "Это моё первое плавание…"
        - "Хм? Нет, это не так! Моим первым плаванием был выход с острова Тэнган вместе с Кии!"
        - "Но почему… почему информация вливается в мой разум подобно бурному потоку?"

chapter3:
  rows:

    - char: shinano
      side: left
      text:
        - "Это определенно не мои воспоминания, но… почему они такие отчетливые?.."
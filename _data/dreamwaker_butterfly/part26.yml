chapter1:
  rows:

    - char: shinano
      side: left
      text:
        - "Солнечный свет, пение птиц, аромат трав и цветов…"

chapter2:
  rows:

    - char: shinano
      side: left
      text:
        - "Я… на скамье?"

    - char: laffey
      side: right
      text:
        - "М-м-м…"

    - char: shinano
      side: left
      text:
        - "………?"

    - char: laffey
      side: right
      text:
        - "У-у-у……… хр-р-р-р"

    - char: shinano
      side: left
      text:
        - "Простите…？"

    - char: laffey
      side: right
      text:
        - "Лаффи не спит… не спит…"

    - char: shinano
      side: left
      text:
        - "Что… что происходит? Позвольте спросить, кто вы?.."

    - char: laffey
      side: right
      text:
        - "Синано тоже спросонья ничего не понимает?.. Я Лаффи. Лаффи из Союза Орла."

    - char: shinano
      side: left
      text:
        - "Эсминец «Лаффи»… из Союза Орла?!"

    - char: laffey
      side: right
      text:
        - "М-м, Лаффи вспомнила. Командир просил Лаффи оповестить участников учебного флота. Когда Синано будет готова, приходи в порт к сбору."
        - "Лаффи нужно разбудить… то есть оповестить остальных. Я пошла… хр-р-р-р"

    - char: shinano
      side: left
      text:
        - "……Я не чувствую враждебности. Она даже не попыталась на меня напасть?"
        - "Снова сон о союзе с Орлом? Но в воздухе совсем нет запаха пороха… Это чувство… В любом случае, сначала нужно собрать сведения."
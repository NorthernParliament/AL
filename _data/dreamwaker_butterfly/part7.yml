chapter1:
  rows:

    - char: suzutsuki
      side: left
      text:
        - "Всем внимание! Прямо по курсу обнаружен огромный флот противника!"

    - char: kumano
      side: right
      text:
        - "Мне кажется, сейчас со всех сторон враги такие, что их можно назвать «огромным флотом»..."

    - char: suzutsuki
      side: left
      text:
        - "Да нет же! …Этот флот куда больше всех остальных групп противника поблизости! К тому же обнаружены сигнатуры Сирены командного типа — похоже, это Тестер!"

    - char: kii
      side: right
      text:
        - "Сумела сразу засечь Тестера? Отличная работа, разведка."
        - "Однако… хм… дело плохо. В нашем нынешнем положении вступать в прямое столкновение с Тестером внутри зеркального моря крайне неразумно."
        - "Безопасность госпожи Синано — наш главный приоритет. Сосредоточимся на поиске выхода из зеркального моря!"
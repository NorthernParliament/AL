chapter1:
  rows:

    - char: yukikaze
      side: left
      text:
        - "Хе-хе! Наша скорость намного выше, чем у подлодок Союза Орла. Если сохраним такой темп, оторваться от них будет проще простого!"

    - char: isokaze
      side: right
      text:
        - "Вперёд! Вперёд! Сэкигахара ждёт нас впереди, справедливость на стороне Западной армии!"

    - char: hamakaze
      side: left
      text:
        - "Исокадзэ, это сравнение здесь не совсем уместно..."

    - char: isokaze
      side: right
      text:
        - "Э? Госпожа Синано, почему вы вдруг замедлились?.. Вам нужен отдых?"

    - char: shinano
      side: left
      text:
        - "……В моей двигательной системе произошёл внезапный сбой. Я больше не могу идти на полном ходу."

    - char: hamakaze
      side: right
      text:
        - "Всё-таки сказались проблемы из-за чрезмерной спешки при строительстве…"

    - char: yukikaze
      side: left
      text:
        - "Плохо дело… Скорость госпожи Синано сейчас всего 15 узлов?! С таким темпом подлодки Союза Орла нас быстро нагонят!"

    - char: hamakaze
      side: right
      text:
        - "Снова обнаружены радарные сигналы подлодок!"

    - char: shinano
      side: left
      text:
        - "Та же самая, что и раньше?"

    - char: hamakaze
      side: right
      text:
        - "Трудно сказать… Возможно, нет… Похоже, мы и впрямь угодили в сеть окружения подлодок Союза Орла."

chapter2:
  rows:

    - text:
      - "«—————— Немедленно смени курс, уклонись от засады»"

chapter3:
  rows:

    - char: shinano
      side: left
      text:
        - "……Флоту немедленно сменить курс. Уходим от подлодок."
        - "(Это мой сон, и знания в моей голове говорят об этом же. Ошибки быть не может…!)"
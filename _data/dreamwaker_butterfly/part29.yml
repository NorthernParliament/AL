chapter1:
  rows:

    - text:
      - "Впереди показалась мастерская в которой усердно работали."

    - char: chitose
      side: left
      text:
        - "Синано? Ты тоже пришла для техобслуживания оборудования?"

    - char: shinano
      side: right
      text:
        - "Здесь... ремонтный завод?"

    - char: chiyoda
      side: left
      text:
        - "Это научно-исследовательский отдел, заходи вместе с нами~"

chapter2:
  rows:

    - char: yuubari
      side: left
      text:
        - "Добро пожаловать в научно-исследовательский отдел... Вам нужно что-то подстроить в снаряжении сегодня?"

    - char: chitose
      side: right
      text:
        - "Последние пару дней возникли проблемы с подъемниками палубной авиации. Скоро учения, так что я хотела бы всё проверить."

    - char: chiyoda
      side: left
      text:
        - "А у меня проблемы с двигательной установкой!"

    - char: yuubari
      side: right
      text:
        - "Поняла, пройдите за мной в ту сторону."

    - char: chiyoda
      side: left
      text:
        - "Увидимся позже, Синано~"

chapter3:
  rows:

    - text:
      - "Троица удалилась, и в просторном помещении осталась за работой лишь одна Акаши."

    - char: shinano
      side: left
      text:
        - "Акаши... Разве ты только что не стояла там у прилавка......?"

    - char: akashi
      side: right
      text:
        - "Мяу? Там теперь всё настроено на самообслуживание, ня! Даже если оставить лавку без присмотра, она будет приносить бесконечный поток денег, ня!"
        - "А ты зачем здесь, Синано-мяу? Что-то беспокоит, ня?"

    - char: shinano
      side: left
      text:
        - "Если так подумать......"
        - "(Я не чувствую никаких отклонений. Состояние оснастки отличное, всё оборудование на месте, и в теле нет никакой слабости...)"
        - "Акаши, Ватацуми находится где-то в этом секторе?"

    - char: akashi
      side: right
      text:
        - "Ватацуми? Что это за штука такая, ня? В списке инвентаря Порта такого предмета нет, ня."

    - char: shinano
      side: left
      text:
        - "Священного камня здесь не существует...? Тогда в каком я сейчас состоянии..."

    - char: akashi
      side: right
      text:
        - "Хм-мяу...... Дай-ка я посмотрю, ня!"

chapter4:
  rows:

    - char: akashi
      side: right
      text:
        - "Похоже, с Синано-мяу всё в полном порядке, ты сейчас в своем нормальном состоянии, ня!"

    - char: shinano
      side: left
      text:
        - "Быть такой, как сейчас — это и есть «нормальное состояние»...?"

    - char: akashi
      side: right
      text:
        - "Именно так, ня! Синано-мяу сейчас — это Синано-мяу в своей естественной форме. Мяу! Синано-мяу, что с тобой, ня?! Смотри под ноги, ня!"
        - "Умчалась куда-то в такой спешке, ня..."
chapter1:
  rows:

    - char: shinano
      side: left
      text:
        - "Как неловко... Я позволила этой необычной атмосфере сбить себя с толку и даже выдумала оправдание, чтобы сбежать..."
        - "В этом мире, где нет врагов и не чувствуется враждебности... что же именно мне нужно сделать?.."
        - "Хм... Слышны голоса учеников. Здание впереди — это... Академия?"

chapter2:
  rows:

    - char: amazon
      side: left
      text:
        - "На этом занятия в этом семестре окончены. Всем быть осторожными во время каникул и не забудьте прилежно выполнить домашнее задание!"

    - char: all
      side: right
      text:
        - "Есть!"

    - char: niizuki
      side: left
      text:
        - "Наконец-то со всеми делами покончено, остались только сегодняшние учения..."

    - char: hanazuki
      side: right
      text:
        - "А затем — долгожданные каникулы! Можно будет по уши погрузиться в заботу о цветочных полях, жду не дождусь~"

    - char: suzutsuki
      side: left
      text:
        - "Не забывай про гору домашней работы! Стоит о ней вспомнить... и весь праздничный настрой куда-то улетучивается."

    - char: hanazuki
      side: right
      text:
        - "Нельзя давать настрою угасать, пока мы еще даже из ворот школы не вышли! Сузуцуки, выпей цветочного чаю и взбодрись~"

    - char: suzutsuki
      side: left
      text:
        - "Ты всегда заранее готовишь такие вещи, Ханадзуки, ты просто чудо!"

    - char: hanazuki
      side: right
      text:
        - "Эхе-хе, если тебе интересно, я могу многому научить тебя во время каникул."

    - char: suzutsuki
      side: left
      text:
        - "Ой?! Тогда полагаюсь на тебя, мне очень интересно!"

    - char: shinano
      side: right
      text:
        - "Сцена после уроков... Если это эсминцы, они должны были изучать торпедные атаки, сопровождение и тактику ночного боя."
        - "Подумать только, столько кораблей из самых разных фракций собраны в одном Порту..."
        - "Трудно представить обстоятельства, при которых такой Порт мог бы существовать в реальности... Неужели это место — лишь плод фантазии, склеенный из обрывков снов?.."
        - "Хм? А там в углу... это же из Королевского Флота... Арк Роял?"

    - char: ark_royal
      side: left
      text:
        - "О-обнаружили! А, а-а! Я... я просто патрулирую территорию школы, слежу за порядком! Я... я абсолютно точно не подозрительная личность!"

    - char: shinano
      side: right
      text:
        - "...Очень подозрительно."

    - char: ark_royal
      side: left
      text:
        - "Кхм, кхм-кхм! Когда в школе начинаются каникулы и все ученицы гурьбой покидают классы, на пути домой их может подстерегать опасность! Синано, ты ведь тоже так считаешь?!"

    - char: shinano
      side: right
      text:
        - "Ха-а...?"

    - char: ark_royal
      side: left
      text:
        - "М-м, вижу, ты согласна с моими доводами! Значит, ты меня понимаешь! Что ж, у меня еще дела, так что я вынуждена откланяться!"

    - char: shinano
      side: right
      text:
        - "...Как она быстро убежала..."
chapter1:
  rows:

    - char: shinano
      side: left
      text:
        - "Если информация в моей голове правдива, то в этом мире не существует ни Сирен, ни «Пепла». Есть лишь пламя войны между фракциями."
        - "Здесь нет Священного Камня Ватацуми, нет фестиваля посвящённого ему… Я лишь плод спешного строительства, созданный, чтобы быть брошенным на рассыпающуюся линию фронта."
        - "Рождение здесь — это просто рождение, а гибель — просто гибель. Однако…"
        - "Мы ведь существа, рожденные из Кубов Мудрости, которые были найдены в ходе сражений с Сиренами."
        - "Я не раз сомневалась в истинной связи между Кубами и Сиренами. Теперь же кажется, что Кубы могут быть никак с ними не связаны…"
        - "Неужели мы способны появиться на свет даже в мире, где Сирен не существует вовсе?.."
        - "Конечно, нельзя исключать вероятность того, что всё это — лишь очередной симуляционный эксперимент Сирен… Я видела достаточно их опытов в других снах."
        - "Но если так, то что именно они моделируют на этот раз?.. Скрыли собственное существование, заранее подготовили огромный массив данных… Что они пытаются воссоздать в этой симуляции?.."

chapter2:
  rows:

    - char: yukikaze
      side: left
      text:
        - "Внимание, внимание! Великая Юкикадзэ вернулась!"
        - "О-о~ Госпожа Синано уже проснулась!"

    - char: shinano
      side: right
      text:
        - "Такое чувство, будто я слышу эту фразу сегодня уже в миллионный раз…"

    - char: yukikaze
      side: left
      text:
        - "Э-э, неужели?! Хм… Не только госпожа Синано, кажется, у всех сегодня совсем нет настроения…"

    - char: isokaze
      side: right
      text:
        - "Уже за десять вечера, так спать хочется… Юкикадзэ, неужели ты ничего не чувствуешь?"

    - char: yukikaze
      side: left
      text:
        - "Хо-хо-хо! Юкикадзэ уже совсем взрослая, а взрослые не клюют носом так рано, как дети!"

    - char: hamakaze
      side: right
      text:
        - "…Только дети так и говорят. Ладно, что там с разведкой?"

    - char: yukikaze
      side: left
      text:
        - "Хе-хе~ Я проверила три направления и не нашла абсолютно никаких врагов!"

    - char: hamakaze
      side: right
      text:
        - "Странно… Мы же четко зафиксировали сигнал радара подлодки Союза Орла. Неужели враг отказался от преследования?.. Что ж, проверь тогда и последнее направление."

    - char: shinano
      side: left
      text:
        - "Не нужно… Подлодка Союза Орла… она вон там."

    - char: yukikaze
      side: right
      text:
        - "Э-э?! Как это возможно?!!! Я же только что всё там обыскала и никого не встретила!.."

    - char: hamakaze
      side: left
      text:
        - "Должно быть, Юкикадзэ просто слишком везучая — даже враги обходят её стороной…"

    - char: isokaze
      side: right
      text:
        - "Враг начал погружение! Госпожа Синано, там всего одна подлодка, предоставьте её мне!"

    - char: shinano
      side: left
      text:
        - "Хорошо, тогда полагаюсь на теб———...."

chapter3:
  rows:

    - text:
      - "«—————— Возможно, это приманка»"

    - char: shinano
      side: left
      text:
        - "Приманка?.. Но ведь враг — всего лишь одна субмарина…"

    - text:
      - "«—————— План похода раскрыт. Эта единица — лишь наживка, завлекающая вас в кольцо окружения»"

chapter4:
  rows:

    - char: shinano
      side: left
      text:
        - "………Исокадзэ, прекратить преследование."

    - char: isokaze
      side: right
      text:
        - "Госпожа Синано?!!"

    - char: shinano
      side: left
      text:
        - "Мы всё еще не можем исключать засаду целой группы подлодок Союза Орла. Не вступать в бой, полный ход, уходим от контакта…"
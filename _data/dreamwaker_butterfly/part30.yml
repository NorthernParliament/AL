chapter1:
  rows:

    - char: shinano
      side: left
      text:
        - "Вот оно как... Я начинаю понимать этот сон."
        - "Здесь нет врагов и раздоров, великие фракции живут в мире... Этот Порт подобен идеальному месту, окрашенному в цвета сакуры."
        - "Более того, даже я сама существую здесь в том безупречном состоянии, о котором мечтала..."
        - "Если так, то, возможно, именно здесь..."

chapter2:
  rows:

    - char: shinano
      side: left
      text:
        - "И впрямь... Нашла........."

    - text:
      - "Лепесток сакуры медленно опустился перед её глазами. Взглянув туда, откуда дул ветер, она увидела застывшую под пышным деревом фигуру в багряных одеждах."

    - char: shinano
      side: left
      text:
        - "Интересно, что бы почувствовали мои соратники из Империи Сакуры, увидь они эту сцену..."

    - char: amagi
      side: right
      text:
        - "Синано?.. Учения вот-вот начнутся, что ты здесь делаешь?"

    - char: shinano
      side: left
      text:
        - "Я......"

    - char: amagi
      side: right
      text:
        - "Растерянность, шок, волнение, печаль... Хе-хе, я впервые вижу такое сложное выражение на твоем лице."
        - "И аура... она не похожа на ту, к которой я привыкла. Ты ведь пришла сюда из очень далеких краев, не так ли?"

    - char: shinano
      side: left
      text:
        - "Острая наблюдательность и выдающийся ум — точь-в-точь как та Амаги, о которой я слышала..."

    - char: amagi
      side: right
      text:
        - "Оу, ты мне льстишь. Кхе-кхе..."

    - char: shinano
      side: left
      text:
        - "Амаги, ты в порядке?!"

    - char: amagi
      side: right
      text:
        - "Просто старый недуг, не беспокойся... М-м? «Слышала», говоришь?.."
        - "Понятно... Значит, у тебя нет опыта личных встреч со мной, и в твоем мире не существует возможности увидеться со мной лицом к лицу?"

    - char: shinano
      side: left
      text:
        - "............"

    - char: amagi
      side: right
      text:
        - "Ох, как прискорбно~ Похоже на разговор о событиях из чьего-то сна."

    - char: shinano
      side: left
      text:
        - "Те события — не сон..! Это ты... и это место... лишь видение в моем разуме, которое может рассеяться в мгновение ока......"

    - char: amagi
      side: right
      text:
        - "Кажется, наша беседа становится всё более философской..."
        - "Хе-хе, впрочем, это неважно. Не имеет значения, где сон, а где реальность — в данный момент мы обе на самом деле существуем здесь, и этого достаточно."
        - "Как тебе наш Порт? Хотела бы остаться здесь?"

    - char: shinano
      side: left
      text:
        - "Я... не знаю... Но мои товарищи в Империи Сакуры наверняка ждут моего возвращения."

    - char: amagi
      side: right
      text:
        - "Вот как. Видимо, у тебя есть миссия, которую ты обязана довести до конца."
        - "Кстати... как там Акаги в твоем мире?.. Она в порядке?"

    - char: shinano
      side: left
      text:
        - "...... Да. С Акаги всё обязательно будет хорошо."

    - char: amagi
      side: right
      text:
        - "Тревожный ответ, особенно учитывая твое нынешнее состояние... Решено: я пойду на учения Командира вместе с тобой!"

    - char: shinano
      side: left
      text:
        - "...А?!"

    - char: amagi
      side: right
      text:
        - "Ну же~ Время поджимает. Выдвигаемся, выдвигаемся~"
chapter1:
  rows:

    - char: noshiro
      side: left
      text:
        - "Нет… Я все-таки против таких планов."

    - char: ryuuhou
      side: right
      text:
        - "Но… это решение вышестоящего руководства. Да и посмотри, госпожа Синано вовсе не возражает."

    - char: shinano
      side: left
      text:
        - "Я не возражаю. У меня и так было намерение отправиться на главный остров для переговоров с Ямато и Мусаси, так что это мне по пути."

    - char: noshiro
      side: right
      text:
        - "Проблема не в этом… Госпожа Синано только что очнулась от сна и еще не знакома со всем, что происходит снаружи…"
        - "А тут не только спешный отплыв, но еще и приказ нам, всем приближенным, оставаться на острове в ожидании… Это совершенно невозможно понять."

    - char: shinano
      side: left
      text:
        - "Ошибаешься… Что касается дел мирских, что касается внутренней информации Империи Сакуры — мне известно всё."

    - char: ryuuhou
      side: right
      text:
        - "К тому же вышестоящее руководство специально направило флот, чтобы встретить госпожу Синано, ты слишком беспокоишься."

    - char: suruga
      side: left
      text:
        - "Флагман этого флота, Кии… хоть характер у нее и немного бесшабашный, но в силе ей нет равных, так что успокойся."

    - char: noshiro
      side: right
      text:
        - "Но… впрочем, я решила! В этот раз я отправлюсь в плавание вместе с госпожой Синано."

    - char: suruga
      side: left
      text:
        - "А?!!"

    - char: ryuuhou
      side: right
      text:
        - "…Изменения в дислокации требуют подачи новой заявки вышестоящему руководству, времени уже не хватит, верно?"

    - char: noshiro
      side: left
      text:
        - "Если госпожа Синано согласится взять меня с собой, мы сможем сначала начать движение флота, а уже потом доложить вышестоящим! Тогда проблем не будет!"

    - char: shinano
      side: right
      text:
        - "Сегодня Носиро настроена немного решительно…"
        - "Что ж, если речь идет всего лишь об одной дополнительной персоне… Я даю свое согласие."

    - char: noshiro
      side: left
      text:
        - "Благодарю, госпожа Синано!"

    - text:
      - "*тук-тук*"

    - char: kasumi
      side: left
      text:
        - "Госпожа Синано, флот, прибывший встретить вас, уже приближается к острову Амаяма."

    - char: shinano
      side: right
      text:
        - "Время пришло, отправляемся."
        - "Рюхо, Суруга, вверяю остров Амаяма вам."

    - char: suruga
      side: left
      text:
        - "Есть! Слушаемся."

    - char: ryuuhou
      side: left
      text:
        - "Есть! Слушаемся."
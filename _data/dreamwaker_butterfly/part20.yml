chapter1:
  rows:

    - text:
      - "КАБУУУУМ!!!"
      - "Бомбы с предсмертным воем разрезали воздух, вырывая кусок за куском из бесконечного потока врагов, чьи очертания оставались размытыми."

    - char: shinano
      side: left
      text:
        - "…Даже в прежних снах я никогда не чувствовала в себе столь безграничной мощи… С такой силой… мы победим!"

    - text:
      - "Если бы чудовище было всего одно, это было бы правдой. Но одна за другой приближались всё новые и новые призрачные угрозы."
      - "«—————— Всё это тщетно»."

    - char: shinano
      side: left
      text:
        - "И всё же, я продолжу сражаться!"
        - "Пусть это лишь сон… пока не достигнут предел, пока враг еще дышит — я буду биться!"

    - text:
      - "Звуки сопротивления вокруг становились всё тише. Незаметно для самой себя Синано осталась на поверхности моря в полном одиночестве."

    - char: shinano
      side: left
      text:
        - "Титосэ, Тиёда, Касино… транспортная группа «оружия последней надежды»…"

    - text:
      - "«—————— Всё это тщетно»."

    - char: nop_x
      side: right
      text:
        - "▊▇ ▊▇ ▊▇ ▊▇ ▊▇ ▊▇ ▊▎▇ ▊▇ ▊ ▊▇ ▊ ▊▇ ▊▊▊ ▊▇ ▊▇ ▊▇"

chapter2:
  rows:

    - char: shinano
      side: left
      text:
        - "Неужели та «я», что когда-то в далеком прошлом была среди «Факелов», точно так же встретила свой последний миг?.."
        - "Или же… я где-то совершила ошибку?.."
        - "Ведь этой силы должно было хватить, чтобы стереть в порошок любого врага…!"
        - "Почему же……………"

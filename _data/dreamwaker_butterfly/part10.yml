chapter1:
  rows:

    - text:
      - "Перед глазами предстал знакомый пейзаж — это был Тену Укедо на острове Тэнган."

    - char: shinano
      side: left
      text:
        - "Ух... голова раскалывается... То, что только что произошло... был сон?"

    - char: kasumi
      side: right
      text:
        - "Госпожа Синано...?! Вы наконец-то проснулись!!!!"

    - char: shinano
      side: left
      text:
        - "...Разве я не проснулась уже давно? К чему такое удивление... сейчас..."
        - "Касуми, который сейчас час?"

    - char: kasumi
      side: right
      text:
        - "Прямо сейчас проходит фестиваль «Тену Укедо»! Всё как раз дошло до самого напряженного и решающего момента."

    - char: shinano
      side: left
      text:
        - "...Фестиваль «Тену Укедо»? Значит, Нагато, Микаса и Акаги уже прибыли?"

    - char: kasumi
      side: right
      text:
        - "Хм... Госпожа Нагато сюда не приезжала... Да, Фуу говорит то же самое."

    - char: shinano
      side: left
      text:
        - "(Детали разнятся... Неужели именно это место и есть сон?..)"

    - text:
      - "КАБУУУМ!!!"

    - char: kasumi
      side: left
      text:
        - "Госпожа Синано, осторожно!"

    - char: shinano
      side: right
      text:
        - "Кхм-кхм-кхм... Откуда эта атака? Разве сейчас не идет празднество?"

    - char: kasumi
      side: left
      text:
        - "Ах! Я так разволновалась, увидев, что вы очнулись, что забыла объяснить..."
        - "идите ли, Сирены создали Зеркальное море, накрывшее весь остров, а затем атаковали нас."
        - "Но к вашему пробуждению госпожа Акаги и почтенная наставница Микаса должны были уже полностью уничтожить врага... Откуда же тогда был этот залп?.."
        - "Похоже, снаружи всё еще очень опасно. Фуу говорит, что лучше остаться здесь и подождать донесений с фронта... А, госпожа Синано?!"
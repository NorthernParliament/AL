chapter1:
  rows:

    - text:
      - "Под покровом ночи синий силуэт стремительно несся к побережью."

    - char: shinano
      side: left
      text:
        - "Неужели те, кто напал сейчас — те же таинственные захватчики, что и в прошлый раз?.."
        - "«Пепел»… В этот раз я обязана увидеть ваше истинное лицо!"

chapter2:
  rows:

    - char: chiyoda
      side: left
      text:
        - "Ой… Госпожа Синано?! Вы очнулись!.."

    - char: shinano
      side: right
      text:
        - "(Касино, Титосэ и Тиёда?.. Их не должно было быть среди участников фестиваля.)"
        - "(Опыт из мира сущего начал проникать в сновидение?)"
        - "Что вы здесь делаете?"

    - char: chitose
      side: left
      text:
        - "Изначально мы прибыли, чтобы доставить припасы для фестиваля, но никак не ожидали, что перед самым отплытием нас атакуют Сирены…"

    - char: chiyoda
      side: right
      text:
        - "Эх, стоило нам разобраться с целыми толпами Сирен, как появился враг, которого мы никогда раньше не видели!"
        - "И не поймешь, то ли это новое оружие Сирен, то ли еще кто…"

    - char: chitose
      side: left
      text:
        - "Сейчас остальные возглавляют флот, чтобы отразить атаку таинственного врага, но силы слишком неравны, ситуация критическая…"

    - char: shinano
      side: right
      text:
        - "Значит, вы сейчас?.."

    - char: kashino
      side: left
      text:
        - "Ах, госпожа Синано, вы не так поняли, мы вовсе не бежим с поля боя!"
        - "Почтенная наставница Микаса рассудила, что цель врага — уничтожить Священный Камень и окончательно сорвать празднование «Тену Укедо». Поэтому она приказала нам немедленно перевезти Камень в безопасное место."

    - char: shinano
      side: right
      text:
        - "(Раз это так заинтересовало «Пепел», значит, Ватацуми — не просто сосуд для сбора веры…)"
        - "…Я задержу врага. Вы же должны любой ценой защитить Ватацуми."

    - char: kashino
      side: left
      text:
        - "Слушаюсь! Желаю вам удачи в бою."

    - char: chitose
      side: right
      text:
        - "О? Госпожа Синано лично вступит в бой? Это замечательно!"

    - char: chiyoda
      side: left
      text:
        - "Хе-хе, теперь-то инициатива перейдет к нам. Госпожа Синано, покажите врагу мощь сильнейшего авианосца Империи Сакуры!"

    - char: shinano
      side: right
      text:
        - "……Положитесь на меня."
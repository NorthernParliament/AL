chapter1:
  rows:

    - char: tester
      side: right
      status: is-red
      text:
        - "Предупреждение — броня пробита, подача энергии нарушена, система готовится к отключению."
        - "Результаты теста занесены в реестр. Финал Синано изменился, существует вероятность возникновения переменной в исходе..."

    - char: shinano
      side: left
      text:
        - "Тестер, ты проиграла. Ответь мне: что произошло в конце той решающей битвы? Это лишь догадка, но историю о том, как «Факелы» превращаются в «Пепел», вы ведь знаете очень хорошо."

    - char: tester
      side: right
      status: is-red
      text:
        - "………Мне нечего тебе сообщить."

    - char: shinano
      side: left
      text:
        - "Хм, значит, тот флот, что опоздал, и впрямь был вашим..."
        - "Что ж, неважно. Я найду ответы своими силами. А ты — покинь сцену."

chapter2:
  rows:

    - char: suzutsuki
      side: left
      text:
        - "Вражеский флаггман повержен~! Мы победили Тестер!!"

    - char: kashino
      side: right
      text:
        - "Транспортные суда в полной сохранности, Зеркальное море рассеивается... Поистине великолепный бой."

    - char: chiyoda
      side: left
      text:
        - "Как и ожидалось от сильнейшего авианосца Империи Сакуры! Решить исход первого же боя столь героически — это было очень эффектно!"

    - char: shinano
      side: right
      text:
        - "Вы мне льстите... То, что траектория судьбы изменилась — заслуга не только моих сил. Ваш вклад был не менее важен."

    - char: noshiro
      side: left
      text:
        - "Синано…… Ваша манера боя и мощь, что вы показали... Неужели силы вашего тела полностью восстановились?!"

    - char: kumano
      side: right
      text:
        - "А, точно! Во время боя Синано ни разу не выглядела слабой. Это совсем не похоже на те отчеты, что мы слышали до прибытия!"

    - char: kii
      side: left
      text:
        - "Кхм, Кумано……"

    - char: shinano
      side: right
      text:
        - "..."
        - "Была ли эта встреча подстроена намеренно или же это случайность……"
        - "Сейчас эта мощь — лишь заемная сила... Подобно сну среди бела дня: призрачная, туманная и мимолетная."

    - char: hanazuki
      side: left
      text:
        - "Кажется, я поняла... а вроде и нет..."

    - char: kii
      side: right
      text:
        - "Даже если всё произошедшее — лишь «сон наяву», это был прекрасный сон, достойный того, чтобы войти в архивы, не так ли?"
        - "Желаю вам по возвращении на главные острова выяснить причину и поскорее окончательно вернуть ту силу, которая принадлежит вам по праву."

    - char: shinano
      side: left
      text:
        - "Будем надеяться…… Шторм разрушения приближается, тучи уже сгустились над Империей Сакуры."
        - "Но я... нет, мы вместе с вами развеем этот мрак и вернем Империю на верный курс."
        - "Перестроить флот, продолжаем поход. Впереди еще много дел……"

chapter3:
  rows:

    - text:
      - "*дзынь!*"
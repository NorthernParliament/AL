chapter1:
  rows:

    - char: laffey
      side: left
      text:
        - "Эй... Синано, я здесь..."

    - char: shinano
      side: right
      text:
        - "Лаффи из Союза Орла... Это разведывательный флот? Хорошо, узри же мою мощь!"

    - char: amagi
      side: left
      text:
        - "Стой! Синано, остановись!"

    - char: shinano
      side: right
      text:
        - "Амаги..? Что случилось?"

    - char: amagi
      side: left
      text:
        - "Синано, неужели переть напролом в одиночку, не оглядываясь на окружающих — это и есть твой стиль боя?"

    - char: shinano
      side: right
      text:
        - "Я не «пру напролом». Я — сильнейший авианосец Империи Сакуры, надежда, способная изменить её судьбу. Вполне естественно, что я беру на себя ответственность за прорыв."

    - char: amagi
      side: left
      text:
        - "Почему? «Изменить судьбу»... Разве главным островам Империи Сакуры грозит смертельная опасность?"

    - char: shinano
      side: right
      text:
        - "Да нет... Сирены вокруг островов почти полностью зачищены, а на фронте с Союзом Орла сейчас затишье..."

    - char: amagi
      side: left
      text:
        - "Разве в Объединенном Флоте больше никого не осталось?"

    - char: shinano
      side: right
      text:
        - "Нет... Акаги , Кага, Нагато, Ямато, Мусаси — все на месте."

    - char: amagi
      side: left
      text:
        - "Если так, то даже если будущее Империи Сакуры действительно затянуто тучами, с чего бы тебе нести это бремя в одиночку?"
        - "Синано, в чем истинный корень твоей тревоги?"

    - char: shinano
      side: right
      text:
        - "(А ведь... если подумать, самое страшное сейчас — это лишь предзнаменования из кошмаров, а до истинного кризиса еще есть время...)"
        - "(Почему я не осознавала столь простой вещи? Откуда же тогда берется эта всепоглощающая тревога в моем сердце?..)"
        - "Амаги, позволь спросить..."

    - char: amagi
      side: left
      text:
        - "Дальше ты должна подумать сама, Синано."
        - "Откинь суету, успокойся. Следи за полем боя — учения с Командиром всё еще продолжаются."
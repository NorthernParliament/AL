chapter1:
  rows:

    - text:
      - "Флот покинул остров Тенган и направился к бескрайнему горизонту."

    - char: shinano
      side: left
      text:
        - "Так вот каково это — идти в дальний поход в сущем мире…"

    - char: kumano
      side: right
      text:
        - "Госпожа Синано ведь впервые покидает Тенган? Ну как вам ощущение от прогулки по волнам?"

    - char: shinano
      side: left
      text:
        - "Не чувствую ничего особенного. Похоже на то, что я ощущала «там», но в то же время есть отличия…"

    - char: kumano
      side: right
      text:
        - "Хм… Точно-точно! А как ваше самочувствие? С вашим телом все в порядке?.."

    - char: shinano
      side: left
      text:
        - "…На данный момент, если не считать отсутствия сил, никаких заслуживающих внимания проблем не возникло…"

    - char: kumano
      side: right
      text:
        - "Не стоит переживать, совсем не стоит! Когда мы прибудем на главный остров, где вера людей сильна, способ решения обязательно найдется!"

    - char: shinano
      side: left
      text:
        - "Если бы так и было…"

    - char: kumano
      side: right
      text:
        - "(……План по разогреву атмосферы с треском провалился…)"

    - char: suzutsuki
      side: left
      text:
        - "(От госпожи Синано веет такой холодной и призрачной аурой… Даже жизнерадостная Кумано не может к ней подступиться…)"

    - char: noshiro
      side: right
      text:
        - "(Это естественно. Пусть госпожа Синано сейчас и не в лучшей форме, она все еще третий корабль типа «Ямато».)"

    - char: kii
      side: left
      text:
        - "(Кстати, госпожа Нагато когда-то производила такое же впечатление, хотя наедине с собой она бывает очень милой. Возможно, и госпожа Синано тоже…)"

    - char: suzutsuki
      side: right
      text:
        - "(Милой наедине с собой… Пушистые… так много пушистых больших хвостов… Пристальный взгляд)"

    - char: shinano
      side: left
      text:
        - "Судзуцуки, ты хочешь прилечь в этих хвостах?"

    - char: suzutsuki
      side: right
      text:
        - "Меня раскрыли?! Э-э?! Нет… П-правда можно?"

    - char: kii
      side: left
      text:
        - "Кхм-кхм, Судзуцуки…"

    - char: suzutsuki
      side: right
      text:
        - "Ва-а-а! Простите мою дерзость!"

    - char: shinano
      side: left
      text:
        - "Вот как, жаль… Чувствую, меня немного клонит в сон… Zzzzzz"

    - char: kii
      side: right
      text:
        - "Госпожа Синано, если вы не против, пожалуйста, отдохните на моем серийном корабле."
        - "Отсюда до главного острова Империи Сакуры недалеко, путь свободен, так что опасности быть не должно."
        - "Разумеется, если какие-то незваные гости осмелятся преградить нам дорогу — клянусь именем Кии, я сделаю так, что назад они не вернутся!"
chapter1:
  rows:

    - text:
      - "Когда грохот затих и дым рассеялся, стало видно, что прочная броня разгромлена."
      - "Владелица этой брони, пошатнувшись, отступила на несколько шагов и в конце концов рухнула на колени прямо на поверхность воды."

    - char: akagi
      side: left
      text:
        - "…Почтенная наставница… Микаса?"

    - char: mikasa
      side: right
      text:
        - "Кхм… Кхм-кхм… Ничего… такой удар я еще в силах выдержать…"
        - "Я не могу позволить себе… смотреть, как мои потомки погибают у меня на глазах…"
        - "Даже если она сбилась с истинного пути… я всё равно не позволю этому случиться!.."

    - char: akagi
      side: left
      text:
        - "... ... ..."
        - "Ха-ха… Ха… Ха-ха-ха-ха…"
        - "Неужели даже сейчас госпожа Синано не собирается вмешаться? Какое поразительное терпение…"

    - text:
      - "Акаги обернулась и с холодной усмешкой посмотрела на безмолвное Тэнсюкаку, а затем раскрыла ладонь, над которой парил черный куб."

    - char: akagi
      side: left
      text:
        - "Ах да, я и забыла… Сейчас заставлять тебя бессмысленно, не так ли?.."
        - "Огромные запасы веры тратятся впустую на столь бесполезные планы…"

    - char: kaga
      side: right
      text:
        - "Сестра, это же!.."

    - char: akagi
      side: left
      text:
        - "Пусть я вручу это тело демону, пусть моя душа низвергнется в саму преисподнюю…"
        - "…Никто, никто не смеет мешать моим планам!"
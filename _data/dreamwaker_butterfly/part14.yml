chapter1:
  rows:

    - char: shinano
      side: left
      text:
        - "Бой всё еще продолжается… Я успела!"
        - "…Черное сияние над морем? Это же… Плохо!"
        - "Акаги, немедленно остановись!!!"

    - char: akagi
      side: right
      text:
        - "А?"

    - char: mikasa
      side: left
      text:
        - "Ты?.. А, это же Синано! Наконец-то ты проснулась!"

    - char: shinano
      side: right
      text:
        - "Акаги, оставь эту зловещую вещь. Она несет лишь кошмары и разрушение. Это не та сила, в которой нуждается Империя Сакуры."

    - char: akagi
      side: left
      text:
        - "Ха… Что же сегодня каждый норовит прочесть мне нотацию… Ты, что всё это время отсиживалась в безопасности, погруженная в глубокий сон, — что ты можешь понимать!"

    - char: shinano
      side: right
      text:
        - "…Я спала так долго вовсе не по своей воле!.."
        - "Блуждать в пустоте, беспомощно наблюдая со стороны, как Империя Сакуры шагает в бездну… Я больше не желаю этого испытывать…"
        - "Да… Вот это верное состояние. Состояние, когда меня переполняет мощь…"
        - "Простите, что заставила вас ждать. Третий корабль типа «Ямато», Синано, вступает в бой."
        - "Будь то сон или реальность — где бы я ни находилась, мой долг остается неизменным…"
        - "Такао из «Пепла»! Это земля под моей защитой, посему — отступи!"

chapter2:
  rows:

    - char: shinano
      side: left
      text:
        - "Этот свет… Сон рассеивается. Неужели на этом всё и закончится?.."
        - "Если бы я только могла пробудиться в этом обличье на самом деле…"
        - "Черный распад… и рождение Кошмара… Я должна… это остановить…………"
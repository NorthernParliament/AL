chapter1:
  rows:

    - char: shinano
      side: left
      text:
        - "…Поблизости… есть кто-то ещё."

    - char: kii
      side: right
      text:
        - "Невероятно, у госпожи Синано такая острая интуиция даже во время отдыха! Всё верно, впереди по курсу к нам приближается другой флот Империи Сакуры."

    - char: suzutsuki
      side: left
      text:
        - "Сейчас проверю! Похоже, это транспортная группа во главе с Касино. Их сопровождают Титосэ и остальные, они тоже направляются к главному острову."

    - char: shinano
      side: right
      text:
        - "Касино?.."

    - char: kii
      side: left
      text:
        - ": Хм… Эта транспортная операция не значилась в моих сводках. Впрочем, у Касино особый статус, так что приказ мог поступить напрямую от кого-то из высокопоставленных лиц руководства."

    - char: kumano
      side: right
      text:
        - "В таком случае… мне ужасно любопытно, что же она перевозит!"
        - "Когда слышишь имя Касино, сразу на ум приходят корабли типа «Ямато»... Но ведь после госпожи Синано новых кораблей этого типа не планировалось. Неужели всё-таки..."

    - char: suzutsuki
      side: left
      text:
        - "Как говорится, «любопытство сгубило кошку». Мне кажется, от всевозможных секретных планов руководства лучше держаться на расстоянии…"

    - char: noshiro
      side: right
      text:
        - "Говорят, Дзуйкаку и Сёкаку узнали о чём-то подобном, из-за чего их отношения с госпожой Акаги в край испортились. На прошлом фестивале мне показалось, что между ними искры летели от одних только взглядов…"

    - char: kumano
      side: left
      text:
        - "Жуть какая… И то верно, пусть об этом голова болит у тех, кому это положено."

    - char: noshiro
      side: right
      text:
        - "Тем не менее… цель их похода совпадает с нашей. Если мы объединимся, путь станет гораздо безопаснее."

    - char: shinano
      side: left
      text:
        - "(Стоит ли мне, столь слабой ныне, заставлять так много людей вращаться вокруг себя?..)"
        - "…У них есть более важная миссия, чем мой эскорт."
        - "Судьба начертала разные курсы. Раз в начале пути мы были порознь, то и в конце пути пребудем порознь."

    - char: kumano
      side: right
      text:
        - "Вот оно как! …Судзуцуки, а что именно сейчас имела в виду госпожа Синано?"

    - char: suzutsuki
      side: left
      text:
        - "Полагаю, госпожа Синано говорит о том, что раз задачи у наших флотов разные, то им незачем сопровождать нас."

    - char: kumano
      side: right
      text:
        - "В общем, каждый идет своей дорогой, да? Эх, еще одним интересным событием меньше…"

    - char: suzutsuki
      side: left
      text:
        - "Кии, с той стороны поступил запрос на связь. Будем отвечать?"

    - char: kii
      side: right
      text:
        - "Да, соединяй. Мы все принадлежим к Империи Сакуры, и пусть мы не идем общим строем, нельзя забывать о правилах вежливости при встрече в море."

    - char: chitose_rad
      side: left
      text:
        - "Говорит Титосэ. Мы выполняем транспортную миссию к главному острову. Рады встрече с вами."

    - char: kii
      side: right
      text:
        - "На связи Кии, мы также следуем в сторону главного острова. Тыловое обеспечение — работа не менее важная, чем действия на передовой. Усердной вам службы!"

    - char: hanazuki_rad
      side: left
      text:
        - "Неужели авианосец в вашем строю — это… Ой?! Госпожа Синано?!"

    - char: chiyoda_rad
      side: right
      text:
        - "Ва-а! Какая удача! Мы встретили госпожу Синано в её первом же походе!!!"

    - char: shinano
      side: left
      text:
        - "Это вы… Давно не виделись."

    - char: chiyoda_rad
      side: right
      text:
        - "Давно не виделись?.. Э-э? Неужели госпожа Синано уже видела нас когда-то?!"

    - char: shinano
      side: left
      text:
        - "Нет, то было не в мире сущем… Так что это наша первая встреча."

    - char: kashino_rad
      side: right
      text:
        - "Хи-хи-хи, а ведь я впервые вижу вас в пробужденном состоянии. Так что можно сказать и «давно не виделись», и «приятно познакомиться»~"
        - "Как ощущения после пробуждения? Как ваше самочувствие? Нет ли чего-то непривычного?"

    - char: shinano
      side: left
      text:
        - "Только что я почувствовала, как силы немного возвращаются ко мне… Касино, благодарю тебя за твой вклад в моё рождение."

    - char: kashino_rad
      side: right
      text:
        - "Ой~ Да это ведь просто моя работа, мне совсем не за что принимать вашу благодарность."

    - char: chitose_rad
      side: left
      text:
        - "В таком случае, госпожа Синано, мы не смеем вас более задерживать. Для нас было честью встретить вас. Желаем вам попутного ветра."

    - char: shinano
      side: right
      text:
        - "Благодарю… Пусть и вас хранят боги, дабы вы благополучно достигли цели своего пути."
chapter1:
  rows:

    - char: kinu
      side: left
      text:
        - "Проклятье, неужели это конец…!"

    - char: ryuuhou
      side: right
      text:
        - "Что… что это вообще такое?.."

    - char: noshiro
      side: left
      text:
        - "…Простите, госпожа Синано."

    - text:
      - "Серийные линкоры… разрублены одним ударом. Береговые укрепления… уничтожены одним залпом. Эсминцы, легкие крейсера, легкие авианосцы… если по ним попадали, хватало всего одного выстрела."
      - "Это нельзя было даже назвать сражением. И всё же хрупкая линия обороны продолжала сопротивление."

    - char: zuikaku
      side: left
      text:
        - "Наши атаки не наносят существенного урона… Микаса, если мы продолжим в том же духе, нас всех уничтожат!"

    - char: mikasa
      side: right
      text:
        - "Держаться… продержитесь еще немного! Сёкаку, есть ответ на сигнал о помощи?"

    - char: shoukaku
      side: left
      text:
        - "Флот поддержки уже вышел из ближайшей базы, но чтобы добраться до острова Тэнган, им нужно время!"

    - char: mikasa
      side: right
      text:
        - "Судя по тому, что здесь происходит, остается надеяться, что они приведут достаточно подкреплений… Нужно и дальше тянуть время."
        - "Акаги, есть идеи?"
        - "…Акаги?"

chapter2:
  rows:

    - char: akagi
      side: left
      text:
        - "Хи-хи-хи… Превосходно… Именно такие данные, именно такие души нам и нужны!"
        - "Сражайтесь в свое удовольствие, а затем танцуйте в пламени разрушения!"

    - char: takao_meta?
      side: right
      status: is-meta
      text:
        - "…Не стой на пути."

    - char: kaga
      side: left
      text:
        - "Сестра, берегись!!"
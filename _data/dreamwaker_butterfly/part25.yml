chapter1:
  rows:

    - char: shinano
      side: left
      text:
        - "Торпедная атака?! Ничего, с такой толщиной брони... Что? Невозможно провести герметизацию отсеков?!"

    - text:
      - "БАБАХ!!!"

chapter2:
  rows:

    - char: shinano
      side: left
      text:
        - "Как это возможно… всего четыре торпеды, и всё же……"
        - "…Оснастка не была завершена, вооружение не установлено, и в такой момент — опрометчивый выход в море… Пожалуй, это был неизбежный исход."
        - "Поистине, это куда более жалкое зрелище, чем даже пробуждение без должных сил… Хорошо, что это лишь сон."
        - "…Но если это всего лишь сон, почему же так болит моё «сердце»?"

chapter3:
  rows:

    - char: shinano
      side: left
      text:
        - "Погружение продолжается… Неужели сон всё еще не кончился?.."
        - "Сознание угасает. В прежних снах я никогда не чувствовала ничего настолько реального… Что же это за сон такой…"
        - "…М? Косяк рыб начал излучать свет……?"
        - "Там… это же…"
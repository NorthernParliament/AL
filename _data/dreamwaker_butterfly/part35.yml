chapter1:
  rows:

    - char: kii
      side: left
      text:
        - "Госпожа Синано, вы проснулись?"

    - char: shinano
      side: right
      text:
        - "Где я…? Какова обстановка на поле боя…!"

    - char: kii
      side: left
      text:
        - "Хе-хе, да вы совсем спросонья голову потеряли. Мы на борту серийного корабля под моим управлением. С самого выхода с острова Тэнган мы не встретили на пути ни единого врага."

    - char: shinano
      side: right
      text:
        - "(Это чувство… это определенно реальный мир. Значит, всё, что произошло с того момента, как я уснула на корабле, и до сей поры — лишь события из снов…)"
        - "(Ах… я совершенно этого не осознавала… мне всё еще не достает проницательности. Но какое счастье… еще есть шанс всё исправить!)"

chapter2:
  rows:

    - char: noshiro
      side: left
      text:
        - "Госпожа Синано, вы хорошо отдохнули?"

    - char: shinano
      side: right
      text:
        - "Мне кажется, я видела бесконечно долгий сон… Прости, что заставила тебя волноваться, Носиро."

    - char: noshiro
      side: left
      text:
        - "Ч-что вы, не стоит…"

    - char: kumano
      side: right
      text:
        - "(Ого… Госпожа Синано всего лишь поспала, а её аура полностью изменилась!)"

    - char: suzutsuki
      side: left
      text:
        - "(Хе-хе… Она стала какой-то более мягкой, более приземлённой…)"

    - char: shinano
      side: right
      text:
        - "Фух… В этом сне я через многое прошла…… Вам не нужно быть столь официальными со мной. Можете называть меня просто «Синано»."

    - char: suzutsuki
      side: left
      text:
        - "Э?! Не пойдет! Как мы можем совершить подобную дерзость……"

    - char: shinano
      side: right
      text:
        - "По крайней мере, пока мы в пути, я бы хотела, чтобы вы обращались ко мне именно так."

    - char: kii
      side: left
      text:
        - "Если таково ваше желание… Я поняла. Синано, так пойдет?~"

    - char: shinano
      side: right
      text:
        - "Да, так будет лучше."

    - char: kii
      side: left
      text:
        - "Ну же, девочки, давайте, попробуйте позвать её так!"

    - char: kumano
      side: right
      text:
        - "Оп-ля! Рассчитываю на тебя в пути, Синано! Хе-хе, так и правда чувствуешь себя гораздо свободнее~"

    - char: suzutsuki
      side: left
      text:
        - "М-м… Синано, Синано! Будьте спокойны, какая бы опасность ни подстерегала нас в пути, Сузуцуки защитит вас ценой своей жизни!"

    - char: kii
      side: right
      text:
        - "Ха-ха-ха! Похоже, Сузуцуки ещё нужно привыкнуть к смене атмосферы."

    - char: shinano
      side: left
      text:
        - "Носиро……"

    - char: noshiro
      side: right
      text:
        - "А? Мне тоже нужно сменить обращение…?!"
        - "Я поняла. Госпожа Синано… то есть, Синано……"

    - char: shinano
      side: left
      text:
        - "Хорошо, теперь эта атмосфера хотя бы немного напоминает то место… А теперь, скоро должно случиться……"

    - char: kii
      side: right
      text:
        - "Синано, прямо по курсу обнаружен флот Империи Сакуры. Командуют Титосэ и Тиёда. Они эскортируют Касино и группу транспортных судов в сторону главных островов Империи."

    - char: shinano
      side: left
      text:
        - "(Всё-таки они здесь…) Наши флоты идут одним курсом. Вместе будет гораздо безопаснее. Немедленно передайте им приказ объединиться и следовать вместе с нами."

    - char: suzutsuki
      side: right
      text:
        - "…Э?! Есть!"
chapter1:
  rows:

    - char: chitose
      side: left
      text:
        - "Для нас большая честь не только застать первый поход госпожи Синано, но и сопровождать вас в пути."

    - char: chiyoda
      side: right
      text:
        - "Присоединяюсь!"

    - char: shinano
      side: left
      text:
        - "Титосэ, Тиёда, Касино, Ханадзуки. Пока мы в пути, вы тоже можете называть меня просто «Синано»."

    - char: hanazuki
      side: right
      text:
        - "Ой-ой?! Х-хорошо!"

    - char: shinano
      side: left
      text:
        - "(Так и есть... Стоило транспортникам Касино подойти ближе, как моё состояние улучшилось. Если предзнаменования из сна верны, то...)"
        - "..Касино, что именно вы перевозите в этот раз?"

    - char: kashino
      side: right
      text:
        - "Мой груз..? Частично это обычные припасы, а частично — специальное снабжение, подготовленное для госпожи Ямато."

    - char: shinano
      side: left
      text:
        - "Кто именно отдал приказ о миссии: Акаги, Нагато или Мусаси?"

    - char: kashino
      side: right
      text:
        - "М-м... Я получаю задачи напрямую от штаба, так что кто именно отдал приказ... Возможно, это было распределение от Каги, которая сейчас занимается логистикой военных ресурсов."

    - char: shinano
      side: left
      text:
        - "Кага, значит... Ясно."

    - char: chiyoda
      side: right
      text:
        - "(Синано... Неужели у госпожи Синано всегда был такой характер?!)"

    - char: suzutsuki
      side: left
      text:
        - "(Нет-нет-нет! До недавнего времени она была воплощением спокойствия, как госпожа Нагато... Но стоило ей поспать, как она стала стремительной, словно лесной пожар..!)"

    - char: kumano
      side: right
      text:
        - "(Может быть... ей только что приснился какой-то кошмар..?)"

    - char: noshiro
      side: left
      text:
        - "(Сложно сказать... Я тоже впервые вижу госпожу Синано такой решительной.)"

    - char: kii
      side: right
      text:
        - "Титосэ, теперь наши флоты объединены в один. Мы берем на себя охрану транспортной группы, а защиту Синано доверяем вам."

    - char: chitose
      side: left
      text:
        - "Будьте спокойны, предоставьте это нам."

    - char: shinano
      side: right
      text:
        - "……Впереди по курсу Сирены устроили засаду. Нельзя терять бдительность."

    - char: chiyoda
      side: left
      text:
        - "А-а?! Засада Сирен?!! Этот маршрут всегда был чист, уже давно не было случаев нападения на конвои в этих водах…"

    - char: noshiro
      side: right
      text:
        - "Значит, предчувствие... Вы ведь что-то увидели во сне, верно? Возможно, вы не знали, но Синано... кхм, Синано иногда видит во снах знаки будущего."

    - char: kii
      side: left
      text:
        - "Вот оно как... Синано, я верю тебе. Нельзя игнорировать потенциальную угрозу. Пожалуйста, приступай к боевому развертыванию."

chapter2:
  rows:

    - char: amagi
      side: left
      text:
        - "«Синано, верь в себя и верь в товарищей, что сражаются бок о бок с тобой. Счастливого пути»."

chapter3:
  rows:

    - char: shinano
      side: left
      text:
        - "Мы входим в Зеркальное море. Всем сменить построение, приготовиться к бою!"
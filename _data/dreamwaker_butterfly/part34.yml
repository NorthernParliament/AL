chapter1:
  rows:

    - char: chiyoda
      side: left
      text:
        - "С фланга обнаружена группа подлодок, а в небе замечены приближающиеся авиагруппы!"

    - char: chitose
      side: right
      text:
        - "Та разведывательная группа и впрямь была ловушкой, чтобы заманить тебя, Синано."

    - char: kii
      side: left
      text:
        - "Если бы мы продолжили действовать в прежней манере и погнались за ними, флот угодил бы прямиком в засаду, устроенную подлодками и авиацией."
        - "В этом весь Командир — он мгновенно считал твой сегодняшний настрой и тут же подстроил под него отвлекающий маневр..."

    - char: amagi
      side: right
      text:
        - "Хорошо, что ты вовремя успокоилась."

    - char: shinano
      side: left
      text:
        - "…На самом деле, мне давно любопытно: кто же такой этот «Командир», о котором вы все говорите?"

    - char: kumano
      side: right
      text:
        - "Э?! Командир — это и есть Командир… Даже не знаю, как это объяснить…"

    - char: kashino
      side: left
      text:
        - "Мы уже почти сблизились с главными силами флота Командира, впереди — решающая битва. Почему бы не подождать до конца учений и..."

    - char: amagi
      side: right
      text:
        - "Жаль, но, кажется, времени больше нет…"
        - "Синано, верь в себя и верь в товарищей, что сражаются бок о бок с тобой. Счастливого пути."
        - "Постарайся~"

chapter2:
  rows:

    - char: shinano
      side: left
      text:
        - "Да, я запомню."
        - "Амаги… Поистине невероятный человек… И это место тоже поистине невероятное……"
        - "И этот человек, которого зовут Командиром... Как жаль... Если бы только времени было чуть больше……"
        - "Если бы я только могла снова вернуться сюда……"
        - "А… сознание начинает расслаиваться. Настал ли наконец миг возвращения в реальность?…"

chapter3:
  rows:

    - text:
      - "*дзынь!*"
chapter1:
  rows:

    - char: kii
      side: left
      text:
        - "Море становится неспокойным, и сама текстура воды слегка изменилась… Это омерзительное, но такое знакомое чувство. Похоже, мы уже совсем близко к их основным силам."

    - char: shinano
      side: right
      text:
        - "Это ощущение… Неужели это зеркальное море?"

    - char: kii
      side: left
      text:
        - "Зеркальное море?.. Это еще что такое?"

    - char: suzutsuki
      side: right
      text:
        - "Ну… когда мы с ними сражаемся, постоянно случается всякая чертовщина. Бывало, что поверхность воды становилась похожа на жидкий металл… И правда, иногда это очень напоминает зеркало!"

    - char: kumano
      side: left
      text:
        - "Вот оно как… Значит, это называется «зеркальное море»~!"

    - char: shinano
      side: right
      text:
        - "(Странно… Неужели враг, с которым они сражаются — это не Сирены? Тогда резервный флот, который так и не прибыл, это… Неужели?..)"
        - "Забудьте. Не обращайте внимания…"

    - char: takao
      side: left
      text:
        - "Всем внимание, еще одна плохая новость. Мы только что потеряли связь и с флотом Союза Орла…"

    - char: kii
      side: right
      text:
        - "Теряем связь с соседними флотами один за другим?! Это очень дурной знак…"

    - char: shinano
      side: left
      text:
        - "Грядет поток."

    - char: jintsuu
      side: right
      text:
        - "Вы тоже так считаете, госпожа Синано? Я тоже полагаю, что те, кого мы обнаружили — не авангард, а сами основные силы врага."
        - "Для простого авангарда их масштаб был чересчур велик…"

    - char: shinano
      side: left
      text:
        - "……Ловушка."

    - char: takao
      side: right
      text:
        - "?! Госпожа Синано, что вы сейчас сказали?"

    - char: shinano
      side: left
      text:
        - "…Такао, ты когда-нибудь слышала слово «Пепел»?"

    - char: takao
      side: right
      text:
        - "Пепел?.. Никогда не слышала такого имени. Это название какой-то организации?.."

    - char: kumano
      side: left
      text:
        - "Какое мрачное название. Звучит так, будто нам с ними совсем не по пути…"

    - char: takao
      side: right
      text:
        - "Верно. Мы — полная противоположность пеплу, мы — «Факелы»! Те, кто несет свет жизни в час непроглядной тьмы. И мы будем гореть вечно, пока наши тела не рассыплются в прах!"

    - char: shinano
      side: left
      text:
        - "Факелы… Пепел."
        - "(…! Я поняла. Неужели это место — колыбель, где зародился «Пепел»?!)"

    - char: takao
      side: right
      text:
        - "Госпожа Синано, когда начнется бой, безопасность «оружия последней надежды» будет на ваших плечах."

chapter2:
  rows:

    - char: shinano
      side: left
      text:
        - "……Да. Положитесь на меня."
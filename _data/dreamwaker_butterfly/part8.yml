chapter1:
  rows:

    - char: noshiro
      side: left
      text:
        - "Ситуация критическая…! Кии, позволь мне в одиночку прорваться за пределы зеркального моря. Флот Титосэ не мог уйти далеко, я приведу их на помощь!"
        - "Остров Тенган тоже неподалеку. Если удастся передать сигнал о помощи, флот острова сможет вступить в бой!"

    - char: kii
      side: right
      text:
        - "Исключено! Врагов слишком много, в одиночку тебе не прорваться."

    - char: suzutsuki
      side: left
      text:
        - "К тому же мы всё еще не нашли выход. Даже если ты на время оторвешься от врагов, из зеркального моря так просто не выбраться…"

    - char: noshiro
      side: right
      text:
        - "Но!"

    - char: kii
      side: left
      text:
        - "Хоть они пока и не перешли в прямое наступление, глядя на эти бесконечные ряды противников, ясно одно: Тестер не намерена выпускать нас отсюда живыми."
        - "Выхода нет. Нам остается лишь один вариант — уничтожить Тестер и пробить путь из зеркального моря в лобовой атаке."

    - char: suzutsuki
      side: right
      text:
        - "Прямо на флагмана?! Хм… Если бы дело было только в Тестер, нашими силами мы бы еще поборолись, но это кольцо эскорта — настоящая головная боль…"

    - char: shinano
      side: left
      text:
        - "Вы возьмете на себя флот прикрытия… Тестер я беру на себя."

    - char: suzutsuki
      side: right
      text:
        - "Ой, но госпожа Синано, ваши силы еще не…"

    - char: shinano
      side: left
      text:
        - "Не беспокойся, у меня есть способ."
        - "(В кошмарах я сражалась с ними бесчисленное множество раз. Даже в нынешнем состоянии… шансы есть!)"
        - "Защищать Империю Сакуры, нести ей надежду и величие — в этом мое предназначение. И оно неизменно, в каком бы состоянии я ни была."

    - char: kii
      side: right
      text:
        - "Я поняла. Мы сделаем всё возможное, чтобы прикрыть вас. Сражайтесь в полную силу и дайте спесивому врагу почувствовать мощь сильнейшего авианосца Империи Сакуры!"
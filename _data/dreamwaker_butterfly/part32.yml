chapter1:
  rows:

    - text:
      - "БАБАХ!!!"

    - char: shinano
      side: left
      text:
        - "Цель «уничтожена». Кто следующий?"

    - char: kumano
      side: right
      text:
        - "Уа-а... Какая неистовая манера боя... Кажется, у Синано сегодня совсем нет настроения..."

    - char: chitose
      side: left
      text:
        - "Тем не менее, столь необычная тактика привлекла внимание Командира, что позволило нам захватить временное преимущество."

    - char: suzutsuki
      side: right
      text:
        - "Проблема в том, что если так пойдет и дальше... стратегия с использованием флагмана в качестве приманки станет слишком опасной."

    - char: kii
      side: left
      text:
        - "Я понимаю. Всем держаться за Синано! Опасайтесь внезапных атак Командира из-под воды или с воздуха!"
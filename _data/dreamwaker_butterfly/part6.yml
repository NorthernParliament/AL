chapter1:
  rows:

    - char: kii
      side: left
      text:
        - "……Всем внимание, противник!"

    - char: noshiro
      side: right
      text:
        - "Такая мгновенная перемена… Мы оказались внутри зеркального моря."

    - char: kumano
      side: left
      text:
        - "Да как такое возможно?! В этом секторе уже целую вечность не видели Сирен, да и Титосэ с остальными только что прошли здесь совершенно спокойно!!"

    - char: suzutsuki
      side: right
      text:
        - "Похоже, они поджидали именно нас… Это засада!"

    - char: kii
      side: left
      text:
        - "Получается, целью засады Сирен была… Госпожа Синано, во время боя, пожалуйста, ни на шаг не отходите от меня."

    - char: shinano
      side: right
      text:
        - "……Полагаюсь на вас. Я тоже приложу все силы в этой битве."

    - char: noshiro
      side: left
      text:
        - "Какая низость — нанести удар именно сейчас, когда госпожа Синано наиболее уязвима!"

    - char: kii
      side: right
      text:
        - "Мы не позволим их замыслам осуществиться! Построение вокруг госпожи Синано, приготовиться к бою!"
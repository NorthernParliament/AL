chapter1:
  rows:

    - char: chiyoda
      side: left
      text:
        - "Сестра Титосэ, мы на месте!"

    - char: chitose
      side: right
      text:
        - "Слава богу, вы добрались целыми и невредимыми. Но посмотрите на себя… Живо отправляйтесь к отряду обеспечения, пусть подлатают вас."

    - char: kii
      side: left
      text:
        - "О?! В этот раз нам даже выделили флот снабжения? Какая роскошь! Что ж, не буду скромничать~"

    - char: suzutsuki
      side: right
      text:
        - "Другие флоты тоже прорывались к вам через постоянные стычки в пути?"

    - char: chitose
      side: left
      text:
        - "У всех примерно одна ситуация, но, к счастью, почти все прибыли вовремя. Похоже, разведка не врала: контроль «Их» над этим сектором заметно ослаб."

    - char: kumano
      side: right
      text:
        - "Вон те корабли… Неужели это та самая легендарная транспортная группа с «оружием последней надежды»?!"

    - char: suzutsuki
      side: left
      text:
        - "Ну и формы у этих кораблей… Неужели это новейшие технологии Северного Парламента?!"

    - char: shinano
      side: right
      text:
        - "Транспортная группа?.. Речь о Касино и остальных?"

    - char: chiyoda
      side: left
      text:
        - "Именно! Но самое главное — это оружие на основе «Ватацуми», которое сопровождает Касино!"

    - char: chitose
      side: right
      text:
        - "Если я правильно помню, разве вы, госпожа Синано, не принимали участие в его разработке?"

    - char: shinano
      side: left
      text:
        - "…Вот как."
        - "(Ватацуми… разве это то, что можно использовать для ведения войны?..)"
        - "(Кстати говоря, еще на острове Тэнган у меня были смутные предчувствия… И правда, каждый раз, когда я приближаюсь к Священному Камню, мои силы заметно растут.)"
        - "(Неужели я в мире сущем так слаба именно из-за этого?! Но… ни о Ямато, ни о Мусаси подобных слухов не ходило…)"

    - char: communicator
      side: right
      text:
        - "Бип-Бип"

    - char: enterprise_rad
      side: left
      text:
        - "Дамы из Империи Сакуры, время планового сеанса связи. Как продвигается сбор вашего флота?"

    - char: takao
      side: right
      text:
        - "Флот Сакуры в сборе и заканчивает последние приготовления перед выходом. Как обстановка на вашем участке?"

    - char: shangri_la_rad
      side: left
      text:
        - "С начала столкновения продвижение всех оперативных соединений идет успешно. В центральном секторе аномалий не обнаружено."

    - char: jintsuu
      side: right
      text:
        - "Отлично…! Если план сработает, мы нанесем им сокрушительный удар. Не исключено, что нам удастся разгромить их одним махом…"

    - char: yuudachi
      side: left
      text:
        - "Давайте уже выдвигаться, я заждалась!"

    - char: kumano
      side: right
      text:
        - "Хе-хе, Юдати как всегда в тонусе! Согласна, мне тоже не терпится всыпать им по первое число!"

    - char: takao
      side: left
      text:
        - "Что ж, время пришло… Энтерпрайз, после нашего выхода все задействованные силы будут в сборе?"

    - char: enterprise_rad
      side: right
      text:
        - "Нет… Флот █ █ █ █ всё еще на этапе сбора, часть их кораблей еще не заняла позиции."

    - char: takao
      side: left
      text:
        - "Хм? Странно, что они дали осечку в такой момент. Это не в их стиле…"

    - char: victorious_rad
      side: right
      text:
        - "Ой, да ладно вам. Они всё равно были в резерве. Небольшая задержка с их стороны погоды не сделает."

    - char: kaga
      side: left
      text:
        - "На этом пустые разговоры окончены, пора выступать. Синано, ваша группа готова?"

    - char: shinano
      side: right
      text:
        - "(Не расслышала… Чьего флота не хватает?..)"

    - char: noshiro
      side: left
      text:
        - "Всё в порядке, все корабли в строю и готовы."

    - char: kaga
      side: right
      text:
        - "Хорошо. Всем внимание: начинаем операцию. Сниматься с якоря!"
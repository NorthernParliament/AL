chapter1:
  rows:

    - char: suzutsuki
      side: left
      text:
        - "Словно солнечный ореол, окружающий главный остров, эти отдаленные острова… Похоже, всё верно, это и есть остров Тенган!"

    - char: kii
      side: right
      text:
        - "По сравнению с величием внешнего мира здесь как-то пусто и заброшено. Совсем не похоже на место, где живет госпожа Синано…"

    - char: kumano
      side: left
      text:
        - "«Пробуждение сильнейшего авианосца станет подобно яркому солнцу, что в одночасье разгонит мрак и поведет Империю Сакуры к новому величию»."
        - "Благодаря усердной пропаганде вышестоящего руководства, сейчас все только об этом и говорят."
        - "Если бы жители узнали истинное положение дел с госпожой Синано…"

    - char: kii
      side: right
      text:
        - "Кумано!"

    - char: kumano
      side: left
      text:
        - "А, прошу прощения, я сболтнула лишнего…"

    - char: kii
      side: right
      text:
        - "Эх… Мало того, что празднованию «Тену Укедо» помешали незваные гости, так еще и Священный Камень подменили… Боюсь, пробуждение госпожи Синано сейчас проходит не совсем естественно."
        - "Наверняка госпожа Мусаси принимала во внимание множество факторов, когда решила поручить нам сопровождение госпожи Синано."

    - char: suzutsuki
      side: left
      text:
        - "Следы недавнего боя все еще слишком заметны… И правда, негоже госпоже Синано постоянно жить в таком месте."

    - char: kumano
      side: right
      text:
        - "Было бы здорово, если бы по возвращении на главный остров госпожа Синано восстановила свои силы!"

    - char: kii
      side: left
      text:
        - "Госпожа Мусаси, должно быть, думает так же. Будем надеяться на это."

    - char: suzutsuki
      side: right
      text:
        - "М? Из порта на острове вышел флот… Неужели это госпожа Синано! Как прекрасна…"

    - char: kumano
      side: left
      text:
        - "Ух ты, даже с такого расстояния Кумано уже чувствует исходящее от нее давление, ничуть не уступающее величию госпожи Мусаси…"

    - char: kii
      side: right
      text:
        - "Хм? А рядом с госпожой Синано — Носиро? По плану в море должна была выйти только одна госпожа Синано…"

    - char: suzutsuki
      side: left
      text:
        - "А по-моему, сам план, по которому госпожа Синано должна была отправляться в путь в одиночку, был странным… Раз уж в путь отправляется такой высокий чин, наличие рядом одного-двух приближенных вполне естественно."

    - char: kii
      side: right
      text:
        - "В этом есть смысл… У госпожи Синано наверняка были на то свои причины."
        - "Ну что ж, не будем заставлять их ждать, прибавим ходу!"
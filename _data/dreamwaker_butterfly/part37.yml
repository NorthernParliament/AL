chapter1:
  rows:

    - char: kumano
      side: left
      text:
        - "Потрясающе, Синано! Ты не только предсказала засаду, но даже заранее знала состав флота Сирен!"

    - char: suzutsuki
      side: right
      text:
        - "Это просто шокирует… Подумать только, Сирены втайне стянули сюда столько сил для засады…"

    - char: kashino
      side: left
      text:
        - "Если бы мы не встретили Синано, мы могли бы оказаться в критической ситуации из-за этого нападения!"

    - char: shinano
      side: right
      text:
        - "…Вовсе нет. Изначально вы должны были пройти здесь беспрепятственно. Целью этой засады Сирен была я. Простите, что втянула вас в это…"

    - char: chiyoda
      side: left
      text:
        - "Эй, о чём вы говорите! Если их цель — вы, то всё ещё хуже! Эти проклятые Сирены… как они посмели устроить засаду так близко к главным островам!"

    - char: chitose
      side: right
      text:
        - "Столь необычное развёртывание сил Сирен — лишь доказательство того, какую огромную угрозу для них представляет Синано. Не берите в голову. Сопровождать вас — наш долг и большая честь."

    - char: shinano
      side: left
      text:
        - "Благодарю вас…"

    - char: kii
      side: right
      text:
        - "Однако дело плохо… Подкрепления врага прибывают бесконечным потоком. И хотя они не целятся специально в транспортные суда, в затяжном бою сопутствующих повреждений не избежать."
        - "Есть ли какой-нибудь способ покончить с этим быстро?.."

    - char: shinano
      side: left
      text:
        - "Ещё немного… Флот Тестера вот-вот появится."
        - "Уничтожив Тестер, мы сможем полностью ликвидировать угрозу Зеркального моря."
chapter1:
  rows:

    - char: kii
      side: left
      text:
        - "О! Синано и... Амаги?! Ты тоже решила поучаствовать в этих учениях? Потрясающе, с тобой наши шансы против флота Командира резко возрастают!"

    - char: amagi
      side: right
      text:
        - "Хе-хе, командовать нашим флотом в этот раз будет Синано. Я же здесь лишь в качестве военного советника, чтобы немного помочь."

    - char: chiyoda
      side: left
      text:
        - "Синано плюс Амаги... Звучит как самый надежный дуэт на свете!"

    - char: chitose
      side: right
      text:
        - "И всё же, нам противостоит флот под личным руководством Командира. Нельзя допускать ни малейшей оплошности."

    - char: suzutsuki
      side: left
      text:
        - "Синано, флот в сборе и готов к бою. Пожалуйста, командуй."
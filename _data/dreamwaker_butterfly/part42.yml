chapter1:
  rows:

    - char: purifier
      side: left
      status: is-red
      text:
        - "С тех пор как я здесь, такое происходит впервые... Аж мандраж пробирает!"

    - char: observer
      side: right
      status: is-red
      text:
        - "Всем узлам — внимание. Объект вот-вот прибудет."
        - "Три…… два…… один……"
        - "Ноль."

    - char: compiler
      side: left
      status: is-red
      text:
        - "Факт прибытия подтверждён. Количество целей — три, идентификационные коды совпадают, параметры энергии зафиксированы."

    - char: observer
      side: right
      status: is-red
      text:
        - "Похоже, всё прошло успешно~"

    - char: omitter
      side: left
      status: is-red
      text:
        - "…Э? И это всё?! Я вообще ничего не почувствовала……!"

    - char: compiler
      side: right
      status: is-red
      text:
        - "А чего ты ждала? Шторма или всемирного потопа?"

    - char: omitter
      side: left
      status: is-red
      text:
        - "Ну, хотя бы чего-то в этом роде… Чего-то более внушительного, подавляющего……"

    - char: compiler
      side: right
      status: is-red
      text:
        - "Задача Арбитров сейчас — противостояние «Код G» и минимизация влияния «Пепла» на экспериментальные площадки. С какой стати им самим поднимать такой шум?.."
        - "Если бы нам не сообщили точное время и координаты, эти колебания энергии были бы настолько малы, что их можно было бы спутать с природным явлением и проигнорировать."

    - char: purifier
      side: left
      status: is-red
      text:
        - "Если подумать... получается, если они намеренно скрывают данные о перемещениях, то даже обычные природные явления, которые мы фиксируем, могут быть следами прибытия или отбытия Арбитров?!"
        - "От одной этой мысли не по себе……"

    - char: tester
      side: right
      status: is-red
      text:
        - "Арбитры относятся к иной системе, нежели мы, и по регламенту не обязаны делиться с нами разведданными. Однако……"
        - "Вся их деятельность сосредоточена вокруг «Код G», так что они не должны мешать нашим экспериментам."

    - char: purifier
      side: left
      status: is-red
      text:
        - "И то верно! Теперь всю нудную работу, связанную с «Пеплом», можно спихнуть на Арбитров, а мы наконец-то сможем экспериментировать без помех~!"

    - char: observer
      side: right
      status: is-red
      text:
        - "Вы знаете, почему Зеро запрещает Обсерверам из разных миров обмениваться информацией друг с другом?"
        - "Переменных, собравшихся здесь, становится всё больше, и взор Зеро прикован к этому месту…"
        - "Хе-хе-хе... Возможно, наконец-то наступает момент, когда стратегия двух великих господ и наши долгие усилия принесут плоды. Час великих перемен близок."
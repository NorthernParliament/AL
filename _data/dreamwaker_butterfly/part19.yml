chapter1:
  rows:

    - text:
      - "Враги наступали один за другим вместе с идущими стеной исполинскими волнами."

    - char: shinano
      side: left
      text:
        - "Облик... не разобрать... Неужели это ограничение информации в самом сне?"
        - "Но... они крайне опасны. Боевая мощь этих врагов невероятна!.."

    - text:
      - "Завывания ветра напоминали рев чудовища. Бушующие волны были подобны его когтям."

    - char: nop_x
      side: right
      text:
        - "▊▇ ▊▇ ▊▇ ▊▇ ▊▇ ▊▇ ■■■■▋▌▊▎▇"

    - char: shinano
      side: left
      text:
        - "Нет... Чудовища... они реальны?!"

    - text:
      - "Из-за линии горизонта, скрываясь за гребнями волн и стремительно приближаясь, показались... гигантские тени."

    - char: shinano
      side: left
      text:
        - "Облик... всё равно не разглядеть............"

    - char: nop_x
      side: right
      text:
        - "▊▇ ▊▇ ▊▇ ▊▇ ▊▇ ▊▇ ■■■■▋▌▊▎▇ ▊▇ ▊ ▊▇ ▊ ▊▇ ▊▊▊▊▊"

    - char: chiyoda
      side: left
      text:
        - "Госпожа Синано, чудовища прорвали внешний периметр и несутся прямо на нас!"

    - char: kashino
      side: right
      text:
        - "Как это возможно... В разведданных об этом не говорилось! Почему здесь всё еще остаются эти твари?!"

    - char: chitose
      side: left
      text:
        - "Похоже, их цель — Ватацуми... Хм, предсмертные судороги тех, кто осознал угрозу. Мы ни за что не дадим им добиться своего, госпожа Синано!"

    - char: shinano
      side: right
      text:
        - "Всем авиагруппам — на взлет! Приготовиться к операции по уничтожению чудовищ!"
        - "…Я лично защищу всё это. Защищу будущее и надежду Империи Сакуры…"
        - "Да не угаснет свет Факела!"
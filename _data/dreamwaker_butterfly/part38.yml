chapter1:
  rows:

    - char: tester
      side: right
      status: is-red
      text:
        - "Модернизированный корпус класса «Ямато», бронированный авианосец «Синано». Изначально созданная как надежда Империи Сакуры, на деле же её данные..."

    - char: shinano
      side: left
      text:
        - "Гуманоидная командная единица Сирен, Тестер… Развернутая здесь как управляющий Зеркальным морем, на деле же ты способна лишь без конца повторять одни и те же фразы?.."

    - char: tester
      side: right
      status: is-red
      text:
        - "…М? Данные изменились… Характер тоже не соответствует записям в архиве……"

    - char: shinano
      side: left
      text:
        - "Вещей, способных превзойти ваши ожидания, гораздо больше, чем вы думаете. Разве можно познать истину мироздания, опираясь лишь на сухой механический анализ данных?"

    - char: tester
      side: right
      status: is-red
      text:
        - "(Это чувство ненормальности… Неужели признаки ментального Пробуждения? Но у неё не было ни единого шанса вступить в контакт с тем Командиром…)"
        - "Ты заранее знала об этом нападении?"

    - char: shinano
      side: left
      text:
        - "Разве вы не считаете всё сущее лишь экспериментом, а себя — его полновластными хозяевами? Так почему бы вам самим не догадаться?"

    - char: tester
      side: right
      status: is-red
      text:
        - "…Изменение плана. Переход в режим боевого анализа."

    - char: shinano
      side: left
      text:
        - "Ха. Пусть мне всё ещё не ясны ваше происхождение, цели, прошлое и будущее…"
        - "Но здесь и сейчас я не могу оставить без внимания то, что вы творите."
        - "Сирены! Раз уж вы решили встать на сторону врага, то пусть хотя бы в этом ваше желание исполнится. Сражайтесь же в полную силу!"
chapter1:
  rows:

    - char: shinano
      side: left
      text:
        - "Шум вдалеке… Это тренировка?.."

chapter2:
  rows:

    - char: kii
      side: left
      text:
        - "Хья-а-а-а-а!"

    - char: prince_of_wales
      side: right
      text:
        - "Значит, это и есть нодати Империи Сакуры… Впечатляющая длина."

    - char: duke_of_york
      side: left
      text:
        - "Я повидала немало техник кэндо Сакуры, но именно эти размашистые движения мне больше всего по душе. Я и сама уже горю желанием попробовать…"

    - char: kashino
      side: right
      text:
        - "Я давно восхищаюсь фехтованием Королевских рыцарей. Не могли бы вы обе воспользоваться сегодняшним случаем и показать нам своё мастерство?"

    - char: duke_of_york
      side: left
      text:
        - "Роза прекрасна и в саду, и в чашке чая — так и с мечом. Я покажу вам изящный стиль для эстетов, а что до истинного боя… Уэльс, это я оставлю на тебя."

    - char: prince_of_wales
      side: right
      text:
        - "Но боевое искусство сложно продемонстрировать во всей красе без достойного противника…"

    - char: kii
      side: left
      text:
        - "Ха-ха-ха, это легко устроить! Считай это разминкой перед учениями. Я буду твоим оппонентом!"

    - char: prince_of_wales
      side: right
      text:
        - "Превосходно. Мастерство познается в паре с равным врагом. Обнажай меч!"

    - char: akashi
      side: left
      text:
        - "Мяу~ Погодите минутку, ня! Было бы упущением проводить такой поединок просто так, ня! Искусство великих мечников должны увидеть все, ня!"

    - char: kumano
      side: right
      text:
        - "Ух ты… Она умудрилась развернуть торговую лавку прямо на ровном месте!"

chapter3:
  rows:

    - char: akashi
      side: left
      text:
        - "Фью-мяу~ Проходите, не стесняйтесь, ня! Турнир по фехтованию между Сакурой и Королевским Флотом вот-вот начнется, ня! Вход бесплатный, но за закуски и напитки извольте платить, ня!"

    - char: shinano
      side: right
      text:
        - "Только что это была простая тренировка… а теперь уже целое представление?.."

    - char: kii
      side: left
      text:
        - "О~ Синано! Пришла посмотреть на наш поединок с Королевским Флотом?"

    - char: shinano
      side: right
      text:
        - "(Даже девушки из Империи Сакуры обращаются ко мне просто «Синано»?.. Это весьма необычно…)"

    - char: kashino
      side: left
      text:
        - "Кии, у Синано сейчас наверняка есть дела, ей не стоит терять здесь время."

    - char: kii
      side: right
      text:
        - "Э? До начала учений еще уйма времени, так что немного расслабиться — не грех."

    - char: shinano
      side: left
      text:
        - "Прошу простить, у меня и впрямь есть неоконченные дела, так что я вынуждена вас покинуть. Желаю вам хорошо провести время…"
chapter1:
  rows:

    - char: akagi
      side: left
      status: is-red
      text:
        - "Обсервер, я знаю, что ты слушаешь. А ну, выходи."

    - char: observer_rad
      side: right
      status: is-red
      text:
        - "Зачем же звать меня в такую рань? Я, вообще-то, очень занята."

    - char: akagi
      side: left
      status: is-red
      text:
        - "Ты ведь с самого начала знала, не так ли? О связи между Ватацуми и рождением Синано, а также о том, как подмена Ватацуми повлияет на неё!"

    - char: observer_rad
      side: right
      status: is-red
      text:
        - "Хе-хе-хе, Железная Кровь прислала тебе то, что ты хотела, и Синано пробудилась раньше срока. Я тебя ни в чём не обманула~"
        - "А что касается связи между Ватацуми и Синано — ты ведь раньше и не спрашивала меня об этом напрямую."

    - char: akagi
      side: left
      status: is-red
      text:
        - "И какой толк от пробуждения такой слабой Синано… Хм, хорошо, что я последовала совету Каги и подготовила запасной план."

    - char: observer_rad
      side: right
      status: is-red
      text:
        - "«Запасной план» — это вежливый способ сказать, что ты не доверяешь моим замыслам? Как же это печально."

    - char: akagi
      side: left
      status: is-red
      text:
        - "С головой явно не всё в порядке у тех, кто послушно верит твоим сказкам. Не заблуждайся: мы лишь используем друг друга. Доверие здесь ни к чему."
        - "И еще — что это было за нападение на Синано в пути? Что еще вы пытаетесь протестировать?"
        - "Местоположение всех Зеркальных морей вблизи наших островов должно быть мне известно — таковы условия соглашения."

    - char: observer_rad
      side: right
      status: is-red
      text:
        - "Пусть ты и не возлагала на Синано особых надежд, мы-то как раз ждали от неё многого."
        - "А это нападение... Ну, раз реального ущерба оно не нанесло, считай это просто «сбоем». Даже самый точный механизм при долгой работе может выдать небольшую ошибку, разве это непростительно?"
        - "М-м? Поступил любопытный вызов. У меня дела, так что на сегодня я тебя покину. До встречи~"

    - char: akagi
      side: left
      status: is-red
      text:
        - "Не смейте считать территориальные воды Империи Сакуры своим задним двором, проклятые Сирены!"
        - "Ладно. План продвигается успешно, и такое положение дел скоро закончится……"
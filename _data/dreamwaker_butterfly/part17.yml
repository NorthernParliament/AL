chapter1:
  rows:

    - char: kumano
      side: left
      text:
        - "Мы до сих пор не встретили серьезного сопротивления. Какая удача!"

    - char: kii
      side: right
      text:
        - "Мы сейчас находимся в самом центре построения флота. Даже если враг решится на контратаку, его уничтожат внешние группы еще на подходе."

    - char: suzutsuki
      side: left
      text:
        - "Не расслабляйся, Кумано. Небо, поверхность, глубины — «Они» могут напасть с любого направления."

    - char: kumano
      side: right
      text:
        - "Да знаю я, знаю! Не первый день с ними воюю~"

    - char: suzutsuki
      side: left
      text:
        - "Прости, я просто немного на взводе…"

    - char: kii
      side: right
      text:
        - "Это затишье перед бурей. Даже мне становится трудно дышать от этого напряжения."

    - char: hanazuki
      side: left
      text:
        - "Я тут на досуге приготовила успокаивающий цветочный чай. Сбор не совсем полный, но… Если не брезгуете, угощайтесь!"

    - char: kii
      side: right
      text:
        - "О-о! Как раз вовремя. Госпожа Синано, не желаете чашечку?"

    - char: shinano
      side: left
      text:
        - "…Благодарю."

    - text:
      - "Девушки перебрасывались короткими фразами, пытаясь разрядить гнетущую атмосферу, от которой буквально звенело в ушах."

    - char: takao_rad
      side: left
      text:
        - "Всем внимание. Замечены предположительно авангардные силы противника, они приближаются к нашим передовым отрядам."
        - "И еще… совсем недавно мы потеряли связь с несколькими оперативными соединениями. Союз Орла сейчас бросил все силы на выяснение обстоятельств."
        - "У меня дурное предчувствие. Будьте предельно осторожны."
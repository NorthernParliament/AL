chapter1:
  rows:

    - char: shinano
      side: left
      text:
        - "Недостаточно... этого уровня еще далеко не достаточно! Моя сила... она должна быть куда больше!"

    - char: tester
      side: right
      status: is-red
      text:
        - "Скучно..."
        - "Модернизированный корпус типа «Ямато», бронированный авианосец «Синано». Построенная как надежда Империи Сакуры... неужели твои реальные данные ограничиваются лишь этим?"

    - char: shinano
      side: left
      text:
        - "Всего лишь Тестер... Я уже разыгрывала с тобой бесчисленное количество партий!"

    - char: tester
      side: right
      status: is-red
      text:
        - "Разыгрывала бесчисленное количество партий? Эту фразу должна была произнести я."
        - "Настоящий эксперимент требует достоверных данных, строгих моделей и колоссальных вычислений. То, на что полагаешься ты — не более чем призрачные иллюзии."

    - char: kii
      side: left
      text:
        - "Госпожа Синано, вы слишком выдвинулись вперед! Скорее, отступайте!"

    - char: shinano
      side: right
      text:
        - "Нет... всё верно. Только так можно добраться до уязвимых узлов Тестера, пока она ослабила бдительность!"

    - char: tester
      side: left
      status: is-red
      text:
        - "Хм? Прямая атака в эту точку..."

    - char: suzutsuki
      side: right
      text:
        - "Зафиксировано повреждение главного калибра Тестера! Частота атак противника снижается!"

    - char: shinano
      side: left
      text:
        - "Теперь модуль энергоснабжения... я помню, он должен быть..."

    - text:
      - "КАБУУУМ!!!"

    - char: shinano
      side: left
      text:
        - "Атака подлодки?! Как... когда и откуда?.."

    - char: tester
      side: right
      status: is-red
      text:
        - "На поле боя не место безрассудной отваге, и судьба Империи Сакуры не изменится из-за действий одного лишь человека."
        - "…Результаты теста занесены в протокол. Финал Синано остался неизменным."

chapter2:
  rows:

    - char: shinano
      side: left
      text:
        - "Что?.. Так нелепо?!"
        - "Нет, я не могу закончить здесь… Я только пробудилась, всё должно было только начаться!"
        - "Ведь я еще совсем ничего не успела сделать…"
        - "Как же так… Это… это просто несправедливо…"
chapter1:
  rows:

    - char: shinano
      side: left
      text:
        - "Слышен шум волн… Я всё еще в море, но…"
        - "Гнилостный воздух и обжигающе холодная вода… У меня дурное предчувствие. На этот раз это кошмар?"
        - "В любом случае, сначала нужно разузнать об этом сне побольше…"

chapter2:
  rows:

    - char: noshiro
      side: left
      text:
        - "Госпожа Синано, мы почти прибыли в точку сбора."

    - char: suzutsuki
      side: right
      text:
        - "Ого… Вон те корабли впереди на воде — это и есть флоты, участвующие в операции?!"

    - char: kii
      side: left
      text:
        - "Верно. Здесь собрана последняя и самая мощная армада Империи Сакуры."

    - char: chiyoda
      side: right
      text:
        - "И не только наша. Похоже, ради этой операции все остальные фракции тоже поставили на кон всё, что у них осталось."

    - char: suzutsuki
      side: left
      text:
        - "Момент решающей битвы… Было бы здорово, если бы эта операция и впрямь позволила нам одним махом переломить ход войны."

    - char: kumano
      side: right
      text:
        - "Не волнуйся, разведданные проверены-перепроверены, да и результат фестиваля был положительным, верно, госпожа Синано?"

    - char: shinano
      side: left
      text:
        - "…А? Да………"

    - char: kumano
      side: right
      text:
        - "Госпожа Синано, вы в порядке? Выглядите какой-то поникшей."

    - char: suzutsuki
      side: left
      text:
        - "Пожалуй, ты единственная, кто способен сохранять такой запас бодрости после всех перенесенных нами сражений."

    - char: kumano
      side: right
      text:
        - "Эй~ ну чего вы такие хмурые! Раз уж мы вот-вот перейдем в контрнаступление, давайте все взбодримся, выше нос!"
        - "Говорят, флот Союза Орла уже вышел в море, нам тоже нужно прибавить ходу!"

    - char: shinano
      side: left
      text:
        - "Ваша оснастка… на ней всё еще видны следы серьезных повреждений…"

    - char: kii
      side: right
      text:
        - "Эх… Сейчас катастрофически не хватает ресурсов, так что о внешнем виде заботиться не приходится."
        - "Но влияние поломок на боеспособность сведено к минимуму, не беспокойтесь."

    - char: shinano
      side: left
      text:
        - "(Во взглядах каждого — нескрываемая усталость, а оснастка перед великой битвой всё еще в заплатках… Что же здесь произошло?.. )"
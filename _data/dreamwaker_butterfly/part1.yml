chapter1:
  rows:

    - char: shinano
      side: left
      text:
        - "Долгое время я взирала на этот мир издалека, и вот наконец получила возможность прикоснуться к нему, но…"
        - "Ожидания многих, сгусток веры — а в ответ лишь такая слабость и бессилие."
        - "Все должно было быть иначе, изначально…"
        - "Путь судьбы был нарушен? Или же таков был изначальный замысел?"
        - "Нет, теперь это уже неважно… Сейчас важно не мое существование, а Империя Сакуры."
        - "В яви Священное Древо уже увяло, архипелаг объят пламенем, а багровые тени шаг за шагом ведут к неизбежной гибели."
        - "А сон… разрывается предзнаменованиями тьмы и алого цвета."
        - "В конце собранных воедино фрагментов — «Кошмар», который не в силах разглядеть даже я…"
        - "Я должна предотвратить все это."
        - "Даже пробудившись в таком облике, я способна что-то сделать."

chapter2:
  rows:

    - char: shinano
      side: left
      text:
        - "Если начать действовать прямо сейчас…"
        - "Еще не… еще не поздно…!"
chapter1:
  rows:
  - text:
      - "В один из дней во время проведения Выставки, по ту сторону океана..."
      - "Архипелаг парящих крепостей Железной Крови · Парящий остров А1 — Офисная зона"
  - char: "ulrich_von_hutten"
    side: "left"
    text:
      - "...Это, должно быть, отчет о ходе модернизации Башни Мидгард..."
      - "...А это... отчет о техническом обслуживании и список деталей, требующих замены..."
  - text:
      - "В начале девятого утра темный силуэт сидел за рабочим столом и читал документы, прямо как и вчера."
      - "Однако, в отличие от вчерашнего дня, отчеты были в беспорядке разбросаны по изначально аккуратному столу, что, казалось, отражало некое изменение в душевном состоянии читающей."
  - char: "ulrich_von_hutten"
    side: "left"
    text:
      - "...Проклятье, не могу сосредоточиться."
      - "Это было всего лишь видение во сне, так почему же оно не отпускает меня даже после пробуждения?.."
      - "Черт... Если так пойдет и дальше, работа встанет."
  - text:
      - "Ульрих усилием воли заставила себя сосредоточиться, выбросила из головы все посторонние мысли и пристально уставилась на лежащие перед ней документы."

chapter2:
  rows:
  - char: "ulrich_von_hutten"
    side: "left"
    text:
      - "Отлично... Сработало, теперь можно продолжать работу."
      - "Дальше у нас... хм?"
      - "......"
  - text:
      - "Тут Ульрих заметила: хотя она по-прежнему сидела за рабочим столом, сам стол находился уже вовсе не в кабинете."
  - char: "ulrich_von_hutten"
    side: "left"
    text:
      - "Шуткам тоже есть предел... Без сомнения, я не сплю, а если не сплю, то и сны видеть не могу."
      - "Это какая-то иллюзия, созданная дистанционным вмешательством?"
      - "Или какой-то коммуникационный маяк пытается мне что-то передать?.."
      - "Вот почему это снова и снова пытается предстать передо мной..."
      - "Если это так, то те картины, что мне показывают... имеют ли они какой-то смысл?"
  - char: "friedrich_der_grosse_xd"
    side: "right"
    status: "is-lightgray"
    text:
      - "■▄▆▋▂▁▅▎▆■▄▆▋▂▁"
  - char: "ulrich_von_hutten"
    side: "left"
    text:
      - "...Фридрих, что именно ты хочешь мне сказать?"
  - char: "friedrich_der_grosse_xd"
    side: "right"
    status: "is-lightgray"
    text:
      - "▅▁▂▋У▊■▆▎▅ль▋▄▊ри▎▇х▅■"
  - char: "ulrich_von_hutten"
    side: "left"
    text:
      - "Да, я слушаю."
  - char: "friedrich_der_grosse_xd"
    side: "right"
    status: "is-lightgray"
    text:
      - "▅▁▂▋Г▊■▆▎▅■▆ос▋"
      - "▄▊по▎▇жа▅■█Уль█▎рих▅■█"
  - char: "ulrich_von_hutten"
    side: "left"
    text:
      - "...Мм?"

chapter3:
  rows:
  - char: "peter_strasser"
    side: "right"
    text:
      - "Госпожа Ульрих! Ты в порядке?!"
  - char: "ulrich_von_hutten"
    side: "left"
    text:
      - "Что это было..."
      - "...А, это ты, Штрассер."
      - "Ты видела это сейчас?"
  - char: "peter_strasser"
    side: "right"
    text:
      - "Видела... что?"
  - char: "ulrich_von_hutten"
    side: "left"
    text:
      - "...Ничего. Как давно ты вошла?"
  - char: "peter_strasser"
    side: "right"
    text:
      - "Примерно три минуты назад."
  - char: "ulrich_von_hutten"
    side: "left"
    text:
      - "И зачем ты здесь?"
  - char: "peter_strasser"
    side: "right"
    text:
      - "..А? Скоро начнутся сегодняшние испытания, я пришла с плановым докладом и материалами для тестов, согласно регламенту..."
      - "Ты точно в порядке, госпожа Ульрих?"
      - "С тех пор как я вошла, ты неподвижно сверлила взглядом отчеты на столе. С ними что-то не так?"
  - char: "ulrich_von_hutten"
    side: "left"
    text:
      - "...Ничего, возможно, я просто не выспалась ночью."
      - "Не беспокойся, тебе еще нужно проводить тесты. Оставь отчет и можешь идти готовиться."
  - char: "peter_strasser"
    side: "right"
    text:
      - "Хорошо. В таком случае, я пойду, госпожа Ульрих."
      - "Физические нагрузки — отличный способ снять умственную усталость. Например, можно потренироваться на полигоне."
      - "Не хочешь попробовать?"
  - char: "ulrich_von_hutten"
    side: "left"
    text:
      - "...В твоих словах есть смысл, я подумаю над этим."

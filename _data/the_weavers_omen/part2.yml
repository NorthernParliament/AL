chapter1:
  rows:
  - text:
      - "БАБАХ!!!"
  - char: "voice_an"
    side: "right"
    text:
      - "Текущий раунд артиллерийских стрельб завершен."
      - "Твой итоговый результат: 6 попаданий, 3 близких промаха, 1 промах."
  - char: "ulrich_von_hutten"
    side: "left"
    text:
      - "Чёрт..."
  - char: "gneisenau_meta"
    side: "right"
    status: "is-meta"
    text:
      - "Громоздкая бумажная работа лишь тормозит шестеренки военной машины."
      - "Ты слишком долго просидела в офисе?"
  - char: "ulrich_von_hutten"
    side: "left"
    text:
      - "А, это же мисс Гнейзенау МЕТА. Спасибо за заботу."
      - "Раз уж я, как и обещала, позволила тебе встретиться с Бисмарк, не могла бы ты вести себя чуть более дружелюбно?"
  - char: "gneisenau_meta"
    side: "right"
    status: "is-meta"
    text:
      - "Уж извини, у меня такой характер."
      - "Если тебя что-то не устраивает — выгони меня. В любом случае, я здесь не по своей воле."
  - char: "ulrich_von_hutten"
    side: "left"
    text:
      - "Думаешь, я сама нахожусь здесь по собственной воле?!"
      - "......"
      - "...Когда ты пришла? Тоже пришла сюда потренироваться?"
  - char: "gneisenau_meta"
    side: "right"
    status: "is-meta"
    text:
      - "Твоя наблюдательность тоже заметно снизилась... Ты сейчас сама не своя."
      - "Что случилось?"
  - char: "ulrich_von_hutten"
    side: "left"
    text:
      - "Ничего особенного, просто бессонница из-за ночных кошмаров в последние дни."
      - "Стоит мне отложить работу и отдохнуть пару дней, как всё пройдет. Ничего такого, что заслуживало бы особого внимания."
  - char: "gneisenau_meta"
    side: "right"
    status: "is-meta"
    text:
      - "...Кошмары?"
      - "Какие кошмары? Что ты видела во сне?!"
  - char: "ulrich_von_hutten"
    side: "left"
    text:
      - "Холодное, пылающее черное солнце. Есть какие-то соображения на этот счет?"
  - char: "gneisenau_meta"
    side: "right"
    status: "is-meta"
    text:
      - ".....Нет."
      - "Но ты должна знать, что мы, будучи кансен, не страдаем от обычной «бессонницы»."
  - char: "ulrich_von_hutten"
    side: "left"
    text:
      - "Тебе тоже снились кошмары?"
  - char: "gneisenau_meta"
    side: "right"
    status: "is-meta"
    text:
      - "Можно и так сказать."
  - char: "ulrich_von_hutten"
    side: "left"
    text:
      - "Какие именно?"
  - char: "gneisenau_meta"
    side: "right"
    status: "is-meta"
    text:
      - "Я не особо хочу об этом говорить... Но, в любом случае, когда тебя преследуют кошмары — это не к добру."
      - "Ты должна отнестись к этому со всей серьезностью."
  - char: "ulrich_von_hutten"
    side: "left"
    text:
      - "...Учитывая твою уникальную природу как МЕТА, к твоему мнению стоит прислушаться. Я обращу на это внимание."
  - char: "gneisenau_meta"
    side: "right"
    status: "is-meta"
    text:
      - "Отлично... Если я узнаю что-нибудь новое, то дам тебе знать."
      - "Ну, на этом всё. Я пойду."
  - char: "voice_an"
    side: "left"
    text:
      - "Команда подтверждена. Новый раунд артиллерийских стрельб начнется через три минуты."
  - char: "gneisenau_meta"
    side: "right"
    status: "is-meta"
    text:
      - "Ах да, я запустила для тебя еще один раунд."
      - "С твоими прошлыми результатами на поле боя тебя просто убьют."
      - "Потренируйся еще..."

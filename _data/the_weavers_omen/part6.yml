chapter1:
  rows:
  - char: "gneisenau_meta"
    side: "left"
    status: "is-meta"
    text:
      - "Не думала, что действительно смогу достучаться."
  - char: "zuikaku"
    side: "right"
    text:
      - "Ты так громко ломилась в дверь! Было бы странно, если бы я её не открыла!"
  - char: "gneisenau_meta"
    side: "left"
    status: "is-meta"
    text:
      - "...Нет, ты единственная, до кого я смогла достучаться этой ночью."
  - char: "zuikaku"
    side: "right"
    text:
      - "...Э? Что-то случилось?!"
  - char: "gneisenau_meta"
    side: "left"
    status: "is-meta"
    text:
      - "Да, но что именно произошло... я не знаю."
  - char: "zuikaku"
    side: "right"
    text:
      - "То, что ты не смогла добудиться остальных, означает... на всей базе только мы двое не подверглись этому влиянию?"
  - char: "gneisenau_meta"
    side: "left"
    status: "is-meta"
    text:
      - "Возможно, эта аномалия — атака, направленная на саму концепцию фракции «Железная Кровь»."
      - "Поэтому только я и ты остались невредимы."
  - char: "zuikaku"
    side: "right"
    text:
      - "Атака на концепцию фракции «Железная Кровь»..?"
      - "Неужели нечто настолько невероятное действительно возможно?"
  - char: "gneisenau_meta"
    side: "left"
    status: "is-meta"
    text:
      - "Не стоит недооценивать Арбитров Сирен."
      - "Или другие опасные сущности, блуждающие за пределами нашего мира..."
      - "Сегодня в обед, когда Ульрих спросила меня, снились ли мне кошмары, я сказала ей не всю правду."
      - "Потому что у меня было предчувствие... лучше не копаться в том, что переживаешь в этих кошмарах."
      - "К тому же подобные ощущения подобны порыву ветра — стоит позволить ему пронестись мимо, и всё наладится."
      - "По крайней мере, я так думала... Но в этот раз, похоже, всё не так просто."
      - "Кажется, эти ощущения целенаправленно охотятся за Ульрих."
  - char: "zuikaku"
    side: "right"
    text:
      - "Постой, постой... Я вообще не понимаю, что ты имеешь в виду под «этими ощущениями»?"
  - char: "gneisenau_meta"
    side: "left"
    status: "is-meta"
    text:
      - "Это невозможно описать словами... Ты поймёшь это, только если сама пройдёшь через МЕТА-трансформацию."
      - "Это... «ощущение», которое не принадлежит нашему миру, но всё же способно вызвать едва заметную рябь в твоём сердце."
  - char: "zuikaku"
    side: "right"
    text:
      - "...Как будто призрак прошёл рядом?"
  - char: "gneisenau_meta"
    side: "left"
    status: "is-meta"
    text:
      - "...Неописуемо."
      - "Однако эта атака направлена против Железной Крови, или, если точнее — против одной только Ульрих."
      - "Если мы не будем копать слишком глубоко, с нами всё будет в порядке."
      - "Можно возвращаться спать."
  - char: "zuikaku"
    side: "right"
    text:
      - "Ха-а?!!"
      - "Ты... ты же шутишь?! Как можно сидеть сложа руки, когда товарищи в беде!"
  - char: "gneisenau_meta"
    side: "left"
    status: "is-meta"
    text:
      - "Я не их товарищ..."
      - "Железная Кровь в этом месте для меня лишь иллюзия... Моя единственная связь здесь — это Бисмарк."
  - char: "zuikaku"
    side: "right"
    text:
      - "Ладно-ладно-ладно~ Тогда ты могла преспокойно пойти спать ещё в самом начале, когда только заметила неладное."
      - "Зачем же ты пришла ко мне при полном вооружении?"
      - "Неужели не собиралась пойти на выручку~?"
  - char: "gneisenau_meta"
    side: "left"
    status: "is-meta"
    text:
      - "......"
  - char: "zuikaku"
    side: "right"
    text:
      - "Ну же~ Тогда считай это одолжением мне, пойдём вместе и разберёмся с этим кризисом!"
  - char: "gneisenau_meta"
    side: "left"
    status: "is-meta"
    text:
      - "Хорошо, идём."
  - char: "zuikaku"
    side: "right"
    text:
      - "Пф-ф..."
      - "Так, дай подумать... Раз уж это нападение на госпожу Ульрих, давай сначала направимся к ней...."
  - text:
      - "Пи-и-ип..."
  - char: "zuikaku"
    side: "right"
    text:
      - "...Э?! Что это сейчас был за звук?"
      - "Какой-то модуль парящей крепости начал работать?"
  - char: "gneisenau_meta"
    side: "left"
    status: "is-meta"
    text:
      - "...Аномалия со стороны Башни Мидгард."
      - "Башня Мидгард... активировалась."

chapter1:
  rows:
  - char: "bismarck"
    side: "left"
    text:
      - "Как успехи? Появились какие-нибудь зацепки по делу о краже в Королевском музее?"
  - char: "queen_elizabeth_rad"
    side: "right"
    status: "is-yellow"
    text:
      - "Кроме подтверждения того, что на месте преступления побывала неизвестная МЕТА, а также того, что украденным экспонатом была напольная плитка из Александрийской библиотеки, ничего нового."
      - "Однако я уже попросила о помощи тех двух бывших экспертов из Пепла, что находятся у Врат Авалона, так что, полагаю, скоро будут результаты."
  - char: "bismarck"
    side: "left"
    text:
      - "Как состояние Врат Авалона?"
  - char: "queen_elizabeth_rad"
    side: "right"
    status: "is-yellow"
    text:
      - "В настоящее время они работают в режиме ожидания на минимальной мощности, проблем вроде нет."
      - "А что с твоей стороны? Есть новости о Море Звёзд?"
  - char: "bismarck"
    side: "left"
    text:
      - "Кое-что есть. На основе информации, которую вы предоставили ранее, мы ещё сильнее сузили круг поисков."
      - "Истинные координаты базы «Море Звёзд» Союза Орла, судя по всему, находятся внутри одной из гор в Скалистых горах, а не где-то на побережье или у озера, как считалось ранее."
  - char: "queen_elizabeth_rad"
    side: "right"
    status: "is-yellow"
    text:
      - "...Мм? Хоть такое расположение и значительно повышает скрытность, пользоваться ей должно быть жутко неудобно."
      - "Разве это не их база по разработке кораблей-прототипов?.."
      - "Хм... Это действительно интригует."
  - char: "bismarck"
    side: "left"
    text:
      - "И ещё кое-что, Союз Орла, похоже, сейчас разрабатывает корабль-прототип для Свободного Ириса."
  - char: "queen_elizabeth_rad"
    side: "right"
    status: "is-yellow"
    text:
      - "Так и знала... Я заподозрила это ещё тогда, когда они контактировали на Выставке."
      - "Неудивительно, что во время переговоров они упоминали помощь с испытаниями и всё в таком духе..."
  - char: "bismarck"
    side: "left"
    text:
      - "Кроме того, Союз Орла, судя по всему, параллельно разрабатывает и новый тип оснастки."
  - char: "queen_elizabeth_rad"
    side: "right"
    status: "is-yellow"
    text:
      - "........."
      - "Кхм, это что-то вроде модернизации?"
  - char: "bismarck"
    side: "left"
    text:
      - "Не могу сказать наверняка, более подробных сведений я пока не получала."
  - char: "queen_elizabeth_rad"
    side: "right"
    status: "is-yellow"
    text:
      - "Это интересная новость... Я со своей стороны тоже проведу расследование."
  - char: "bismarck"
    side: "left"
    text:
      - "А что насчёт Северного Парламента? Есть какая-нибудь информация, о которой мне следует знать?"
  - char: "queen_elizabeth_rad"
    side: "right"
    status: "is-yellow"
    text:
      - "Прямо сейчас Северный Парламент разворачивает масштабную военную операцию против полярных Сирен в заполярных широтах."
      - "И дела у них идут очень успешно — впрочем, я полагаю, тебе это и так известно."
  - char: "bismarck"
    side: "left"
    text:
      - "Да... Военная мощь Северного Парламента растет со скоростью, которая намного превосходит наши ожидания."
      - "Что-то ещё?"
  - char: "queen_elizabeth_rad"
    side: "right"
    status: "is-yellow"
    text:
      - "На Выставке Северный Парламент по собственной инициативе провёл несколько тайных встреч с Доминионом Виши."
      - "И в ходе этих переговоров они дали Доминиону Виши некие обещания."
  - char: "bismarck"
    side: "left"
    text:
      - "......"
  - char: "queen_elizabeth_rad"
    side: "right"
    status: "is-yellow"
    text:
      - "Новости уже должны были дойти до самого Виши, так что тебе будет гораздо проще разведать, что там к чему, — ведь так?"
  - char: "bismarck"
    side: "left"
    text:
      - "...Говори прямо, что ты хочешь сказать."
  - char: "queen_elizabeth_rad"
    side: "right"
    status: "is-yellow"
    text:
      - "С молчаливого согласия и попустительства Фридрих, Клемансо сейчас стала фактически единоличной главой Доминиона Виши."
      - "Теперь, когда Фридрих нет, насколько сильно ты её контролируешь?"
  - char: "bismarck"
    side: "left"
    text:
      - "Не беспокойся, в отношении Ортодоксии Ирис наши позиции по-прежнему совпадают."
      - "Ради сохранения этого труднодостижимого мира, ради единства, стабильности и баланса. Всё верно?"
  - char: "queen_elizabeth_rad"
    side: "right"
    status: "is-yellow"
    text:
      - "Именно так. Ну тогда я спокойна..."
      - ".........Хм?"
  - char: "bismarck"
    side: "left"
    text:
      - "Что случилось, Элизабет?"
  - char: "queen_elizabeth_rad"
    side: "right"
    status: "is-yellow"
    text:
      - "Срочное донесение из Скапа-Флоу. Врата Авалона... кажется, там какая-то аномалия."
  - char: "bismarck"
    side: "left"
    text:
      - "...Что?"
  - char: "queen_elizabeth_rad"
    side: "right"
    status: "is-yellow"
    text:
      - "Мне нужно лично во всём разобраться, так что давай закончим наше собрание на этом."
  - char: "bismarck"
    side: "left"
    text:
      - "Хорошо. Если это сбой в оборудовании, свяжись со мной, я отправлю специалистов на помощь с ремонтом."
  - char: "queen_elizabeth_rad"
    side: "right"
    status: "is-yellow"
    text:
      - "Само собой... Ах да. На всякий случай напомню: ради безопасности всех нас, ни в коем случае не активируйте Башню Мидгард в ближайшее время."
  - char: "bismarck"
    side: "left"
    text:
      - "Не волнуйся, я понимаю."
  - char: "queen_elizabeth_rad"
    side: "right"
    status: "is-yellow"
    text:
      - "Конец связи."

chapter2:
  rows:
  - char: "bismarck"
    side: "left"
    text:
      - "...Аномалия у Врат Авалона... Пахнет опасностью."
  - text:
      - "Пи-и-ип!"
  - char: "bismarck"
    side: "left"
    text:
      - "...Мм? Экстренный вызов? Пришёл прямо во время нашей встречи?.."
      - "Это же..."
      - "...Потеряна связь с архипелагом парящих крепостей?"

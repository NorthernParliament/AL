chapter1:
  rows:
  - char: "zuikaku"
    side: "left"
    text:
      - "Хм-хм~♪ Сегодняшний обед тоже был очень вкусным~ Хм-хм-хм~♪"
      - "Ой, плохо... Забыла, что в архиве нужно соблюдать тишину..."
      - "Что-то я увлеклась... Простите меня, если я кому-то помешала своим пением!"
  - text:
      - "Дзуйкаку нервно огляделась по сторонам, но в архиве, похоже, никого не было."
  - char: "zuikaku"
    side: "left"
    text:
      - "Фух... Пронесло."
      - "Кажется, у девочек из Железной Крови тренировка ещё не закончилась."
      - "Тогда и мне нельзя бездельничать. Пора за работу, Дзуйкаку!"
      - "Так, нужные на сегодня материалы, помнится, были..."
  - char: "nop"
    side: "right"
    text:
      - "...Хр-р-р..."
  - char: "zuikaku"
    side: "left"
    text:
      - "...Мм? Это же... тихое сопение во сне."
      - "Э-э?! Неужели в архиве кто-то есть, да ещё и спит?!"
  - text:
      - "Пройдя немного между книжными стеллажами на звук, Дзуйкаку увидела мирно спящую за столом фигуру."
  - char: "ulrich_von_hutten"
    side: "right"
    text:
      - "...Хр-р-р..."
  - char: "zuikaku"
    side: "left"
    text:
      - "Это же... госпожа Ульрих фон Хуттен из Железной Крови?!"
      - "К-как она здесь уснула..."
      - "Тсс... Плохо дело, чуть голос не сорвала."
  - text:
      - "Ульрих продолжала крепко спать, совершенно не замечая стоящую рядом свидетельницу."
  - char: "zuikaku"
    side: "left"
    text:
      - "Неужели она так сильно переутомилась из-за работы?.."
      - "Оно и понятно... Мало того что нужно управлять всем архипелагом парящих крепостей, так ещё и следить за модернизацией Башни Мидгард, да и отвечать за исследования, связанные с «образцами Священного камня»..."
      - "Не буду ей мешать, пускай поспит, пока сама не проснётся~"
  - text:
      - "Дзуйкаку тихонько попятилась назад, но перед тем как развернуться и уйти, её взгляд случайно упал на книги, разбросанные под рукой у Ульрих."
  - char: "zuikaku"
    side: "left"
    text:
      - "Хм... «Толкование сновидений», а ещё... «Откровение»."
      - "А дальше... «Мифы ацтеков» и «Рим и его боги»?.."
      - "О, а рядом лежит ещё одна, называется... «Тьма тайных искусств»?.."
      - "Эм-м... Книги, конечно, интересные, но тематика скачет невероятно!.."
      - "Госпожа Ульрих проводит какое-то исследование или просто читает ради интереса?.."
      - "Ой-ой-ой..! Неужели я только что... случайно подсмотрела список того, что читает госпожа Ульрих?!"
      - "...У-ух, не удержалась и заглянула..."
      - "Н-но с другой стороны, это же самые обычные книги, которые можно найти где угодно, никакой секретной информации. Так что... всё нормально, ведь так?"
      - "В-в общем! Пора за дело, Дзуйкаку, уходи отсюда скорее и займись работой..."

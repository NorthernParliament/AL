chapter1:
  rows:
  - text:
      - "После завершения дневных тренировок в порту P011 снова стало шумно."
  - char: "prinz_heinrich"
    side: "left"
    text:
      - "Ой?! Ты правда уезжаешь уже сегодня?!"
      - "Почему так внезапно?!"
  - char: "carabiniere"
    side: "right"
    text:
      - "Я и сама только что узнала, получив сообщение от госпожи Литорио."
      - "Она говорит, что для усиления охраны на церемонии закрытия Всемирной выставки мне нужно немедленно отправиться обратно на родину."
  - char: "prinz_heinrich"
    side: "left"
    text:
      - "Но... это же слишком...внезапно!"
  - char: "prinz_adalbert"
    side: "right"
    text:
      - "Генрих, не приставай к ней. Военные должны подчиняться приказам."
  - char: "prinz_heinrich"
    side: "left"
    text:
      - "Ну я-то это прекрасно знаю~ Но... Адальберт!"
      - "Если уезжать прямо сейчас, мы ведь даже прощальную вечеринку устроить не успеем!"
  - char: "prinz_adalbert"
    side: "right"
    text:
      - "Хм... Может, тогда приготовить какие-нибудь памятные подарки?"
  - char: "carabiniere"
    side: "left"
    text:
      - "Ой-ой-ой — я и так безмерно благодарна вам за заботу в последнее время!"
      - "О других вещах правда не стоит беспокоиться!"
  - char: "prinz_heinrich"
    side: "right"
    text:
      - "Ну... Ну ладно тогда..."
  - char: "peter_strasser"
    side: "left"
    text:
      - "Ты ведь уже доложила об этом госпоже Ульрих?"
  - char: "carabiniere"
    side: "right"
    text:
      - "Да! Я уже доложила госпоже Ульрих!"
      - "Вот только во время доклада госпожа Ульрих выглядела очень нездоровой..."
      - "Перед уходом я немного забеспокоилась..."
  - char: "peter_strasser"
    side: "left"
    text:
      - "Да, госпожа Ульрих действительно выглядит истощенной..."
      - "Я попробую уговорить её взять отпуск, так что не переживай."
  - char: "carabiniere"
    side: "right"
    text:
      - "Хорошо~ Что ж, тогда я готова отправляться!"
      - "Если у вас будет возможность посетить Империю Сардиния, обязательно дайте мне шанс принять вас как следует!"
  - char: "peter_strasser"
    side: "left"
    text:
      - "Договорились. Если представится случай, мы обязательно свяжемся с тобой перед поездкой."
      - "Маршрут для выхода из архипелага парящих крепостей уже открыт. Счастливого пути."
  - char: "prinz_heinrich"
    side: "right"
    text:
      - "Пока-пока~~"
  - char: "carabiniere"
    side: "left"
    text:
      - "Всем пока~"

chapter2:
  rows:
  - char: "prinz_heinrich"
    side: "left"
    text:
      - "Карабиньере уже совсем далеко... Эх, теперь и здесь станет как-то пусто."
  - char: "peter_strasser"
    side: "right"
    text:
      - "Правда? А мне кажется, вовсе нет."
  - char: "prinz_heinrich"
    side: "left"
    text:
      - "Э-э, почему это?"
  - char: "peter_strasser"
    side: "right"
    text:
      - "Ну так здесь же всё ещё остаёшься ты."
  - char: "prinz_heinrich"
    side: "left"
    text:
      - "Эй!"
      - "А~ Петер, Петер~ Мне только что пришла в голову отличная идея!"
  - char: "peter_strasser"
    side: "right"
    text:
      - "И какая же?"
  - char: "prinz_heinrich"
    side: "left"
    text:
      - "Госпожа Ульрих ведь сейчас совсем без сил, верно?! Как насчёт того, чтобы я приготовила для неё какой-нибудь бодрящий напиток?!"
  - char: "peter_strasser"
    side: "right"
    text:
      - "Ты собираешься... приготовить его сама?"
  - char: "prinz_heinrich"
    side: "left"
    text:
      - "Ага! Но мы можем сделать его и все вместе!"
      - "Давайте устроим мозговой штурм, у кого-нибудь есть идеи?!"
  - char: "u1206"
    side: "right"
    text:
      - "Придумать новый напиток? У меня есть идея!"
      - "Как насчёт того, чтобы сделать упор на газированность? В конце концов, газировка — отличное бодрящее средство!"
  - char: "prinz_heinrich"
    side: "left"
    text:
      - "Интересный подход... Записала! Что-нибудь ещё?"
  - char: "z46"
    side: "right"
    text:
      - "Может, добавить в ингредиенты побольше питательных веществ?"
  - char: "prinz_heinrich"
    side: "left"
    text:
      - "Ага, ага... Очень разумно, это я тоже запишу! Что ещё?"
      - "Ещё, ещё~ Петер, Адальберт, подкиньте какую-нибудь идейку!"
  - char: "peter_strasser"
    side: "right"
    text:
      - "...Я бы предпочла в этом не участвовать."
  - char: "prinz_adalbert"
    side: "left"
    text:
      - "Мм... Я тоже."
  - char: "prinz_heinrich"
    side: "right"
    text:
      - "Э-э~~ Да бросьте вы, не стесняйтесь~!"
  - char: "peter_strasser"
    side: "left"
    text:
      - "Нет... Дело тут вовсе не в стеснении."
  - char: "prinz_adalbert"
    side: "right"
    text:
      - "Мм... Именно так."
      - "Удачи. Ответственность за эту непосильную задачу ложится на тебя, Генрих."
  - char: "prinz_heinrich"
    side: "left"
    text:
      - "Э-э-э..."

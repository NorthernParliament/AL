chapter1:
  rows:
  - text:
      - "Ночь постепенно вступала в свои права, но в комнате Дзуйкаку всё ещё ярко горел свет."
  - char: "zuikaku"
    side: "left"
    text:
      - "Хм... Судя по многочисленным зацепкам, которые удалось собрать у Железной Крови..."
      - "Тот мощный взрыв, произошедший в прошлом в Сибири на территории Северного Парламента... возможно, действительно был связан с падением метеорита."
      - "А то, что упавший метеорит впоследствии исчез, вероятно, как-то связано с действиями Сирен..."
      - "Может быть, часть осколков метеорита рассеялась в заполярных водах..."
      - "А затем в один прекрасный день Священный камень «Ватацуми» на островах Диадемы Света внезапно проявил видимую невооруженным глазом таинственную силу."
      - "Нескольким отдалённым островам Империи Сакуры присвоили статус «Святилищ», и с тех пор они исчезли из всех отчётов..."
      - "На главном же острове технологии барьеров внезапно начали развиваться с бешеной скоростью..."
      - "В Железной Крови считают, что кансен и Кубы Мудрости появились примерно в один и тот же период, и здесь нет чёткой хронологической последовательности..."
      - "В своё время Северный Парламент проводил в полярных широтах какую-то секретную операцию..."
      - "Причём время этой секретной операции, возможно, восходит к периоду ещё до появления кансен..."
      - "А самой первой из кансен, вероятно, была Аврора из Северного Парламента..."
      - "А подвергшийся МЕТА-коррозии Куб Мудрости, именуемый Первородным Кубом, Железная Кровь получила в результате сделки с Сиренами..."
      - "Метеорит появился внезапно... Сирены появились внезапно..."
      - "Священный камень появился внезапно... и технологии Кубов Мудрости тоже появились из ниоткуда..."
      - "Слишком много всего возникло в один миг..."
      - "В медицинских документах госпожи Бисмарк указано..."
      - "Кубы Мудрости, подвергшиеся МЕТА-коррозии, после прохождения критической точки далеко не всегда сразу разрушаются. Некоторые из них на короткое время могут проявлять удивительные свойства..."
      - "И эти причудливые свойства имеют определенное сходство с Ватацуми..."
      - "Неужели... между метеоритом и Священным камнем, а также между Священным камнем и Первородным Кубом существует какая-то связь?.."
      - "У-ух... Кажется, я уже близка к разгадке!"
      - "Но в то же время такое чувство, будто мне всё ещё не хватает множества деталей..."
      - "У-у-у... Ну почему госпожа Мусаси выбрала именно меня для этих исследований?!"
      - "Нет, отставить панику! Дзуйкаку, соберись!"
      - "Разве не во всём этом наши предшественники из Возрождённого флота Империи Сакуры так долго пытались разобраться?!"
      - "...К тому же здесь нам предоставили лучшие условия для экспериментов! Нельзя упускать этот шанс, выпадающий раз в жизни!"
  - text:
      - "Тук, тук, тук... (Стук в дверь)"
  - char: "zuikaku"
    side: "left"
    text:
      - "Так, нужно успокоиться и заново упорядочить мысли..."
      - "Исследования образцов Священного камня должны продвинуться ещё дальше."
      - "Было бы идеально определить по его составу место происхождения. Если его удастся связать с полярными областями..."
  - text:
      - "Тук, тук, тук, тук, тук... (Стук в дверь становится громче)"
  - char: "zuikaku"
    side: "left"
    text:
      - "Эх, было бы здорово своими глазами увидеть рождение Первородного Куба прямо в лаборатории."
      - "Но даже с помощью Гнейзенау МЕТА эксперимент ни разу не увенчался успехом..."
      - "Как будто на пути встают какие-то препятствия изнутри самого Куба Мудрости..."
      - "Что же это могут быть за препятствия... Хм..."
  - text:
      - "Тук-тук-тук-тук-тук-тук-тук-тук-тук! (Торопливый стук в дверь)"
  - char: "zuikaku"
    side: "left"
    text:
      - "Ва-а-а-а! Что, это сейчас стучали?"
      - "Кто же может ломиться в такую глухую ночь..."
  - text:
      - "БУМ-БУМ-БУМ-БУМ-БУМ-БУМ-БУМ-БУМ-БУМ-БУМ-БУМ-БУМ-БУМ! (Громкий и мощный стук в дверь)"
  - char: "zuikaku"
    side: "left"
    text:
      - "Ой-ой... Похоже, там что-то срочное."
      - "Подожди секунду, я сейчас открою!"

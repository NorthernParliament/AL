chapter1:
  rows:
  - text:
      - "Кодовое имя отряда: «Скальпель»"
      - "Флагман: Куйбышев"
      - "Акватория вокруг Гренландской крепости · Зона контроля Сирен"
  - text:
      - "Флот продвигался вплотную к внешнему краю линии обороны Сирен."
  - char: "tashkent"
    side: "left"
    text:
      - "Странно... По пути Ташкент не встретила ни одного достойного врага."
  - char: "kuybyshev"
    side: "right"
    text:
      - "Возможно, они связаны боями на других направлениях."
      - "Даже у Сирен количество сил, которое они могут бросить в бой одномоментно, ограничено."
      - "Наш выбор наступать одновременно по нескольким фронтам как раз и должен заставить Омиттер раскрыть свои слабые места."
  - char: "gremyashchy"
    side: "left"
    text:
      - "Полярное сияние, кажется, стало ярче..."
      - "В документах сказано, что чем интенсивнее сияние, тем сильнее помехи для электронного оборудования."
      - "Как там наши серийные модели?"
  - char: "tashkent"
    side: "right"
    text:
      - "Выглядят так, будто всё в норме. Похоже, на этот раз в их модернизацию действительно вложили немало усилий~"
  - char: "kuybyshev"
    side: "left"
    text:
      - "Пусть сначала займут позиции. Крепость Сирен уже недалеко, нужно приготовиться к бою до того, как мы туда прибудем."
  - char: "tashkent"
    side: "right"
    text:
      - "Поняла. Вывожу серийный флот на огневые позиции."
  - char: "kuybyshev"
    side: "left"
    text:
      - "Отлично, мы тоже выдвигаемся..."
  - text:
      - "Куйбышев первой ускорила ход. Брызги морской воды превращались в кристаллы льда еще в полете и быстро рассеивались в снежной буре."
  - char: "tashkent"
    side: "left"
    text:
      - "Серийный флот, огонь!"
  - text:
      - "БАБАХ!!!"
      - "Раздался грохот плотного артиллерийского огня. Вспышках пламени снаряды градом посыпались на заданную зону, в момент попадания вдребезги разнеся окружающий лед."
      - "Вся крепость словно пробудилась: бесчисленные серийные модели прорвали ледяную корку и яростно ринулись в сторону отряда."
  - char: "tashkent"
    side: "left"
    text:
      - "Начали контратаку? Ну тогда... Ташкент покажет вам, на что способна!"
      - "Ура!"
  - char: "gremyashchy"
    side: "right"
    text:
      - "Осторожно, из крепости что-то вышло!"
  - char: "omitter"
    side: "left"
    status: "is-red"
    text:
      - "............"
  - char: "tashkent"
    side: "right"
    text:
      - "Это Омиттер?.. Ташкент думала, что она появится только возле «Короны»."
  - char: "kuybyshev"
    side: "left"
    text:
      - "Возможно, это всего лишь серийная модель, как тогда, когда мы уничтожали Компилятора в Северной Атлантике."
  - char: "gremyashchy"
    side: "right"
    text:
      - "10... 11... 12..."
  - char: "tashkent"
    side: "left"
    text:
      - "Гремящий, что ты считаешь?"
  - char: "gremyashchy"
    side: "right"
    text:
      - "...Прошло уже 15 секунд, а она всё ещё не взломала наш канал связи."
      - "Эта Омиттер, без сомнения, серийная модель."
  - char: "kuybyshev"
    side: "left"
    text:
      - "Хм... Этот критерий оценки и правда довольно полезен."
  - char: "tashkent"
    side: "right"
    text:
      - "Вот как... всего лишь двойник. Скукота, смотрите, как Ташкент задаст ей трепку!"
  - char: "gremyashchy"
    side: "left"
    text:
      - "Омиттер — не главная цель этой операции, наша основная задача — уничтожить расположенную здесь установку электромагнитного подавления."
      - "Пусть серийный флот потянет время, а мы пока уничтожим установку."
  - char: "tashkent"
    side: "right"
    text:
      - "Серийные корабли долго не продержатся против Омиттер. С такой угрозой за спиной Ташкент не сможет спокойно выполнять задание."
  - char: "kuybyshev"
    side: "left"
    text:
      - "Поступим так: я поведу серийный флот и отвлеку её, а вы бросьте все силы на поиск установки электромагнитного подавления..."
  - char: "tashkent"
    side: "right"
    text:
      - "Ни за что."
  - char: "gremyashchy"
    side: "right"
    text:
      - "Ни за что."
      - "Разве товарищ Куйбышев забыла, что товарищ Советский Союз перед отправлением особо подчеркнула, что мы должны действовать сообща."
  - char: "tashkent"
    side: "left"
    text:
      - "Вот именно~ Мы не дадим тебе одной собрать все лавры, товарищ Куйбышев!"
  - char: "kuybyshev"
    side: "right"
    text:
      - "...Тогда придется немного пожертвовать эффективностью. Давайте вместе сначала разберемся с Омиттер, а затем поищем установку."
  - char: "gremyashchy"
    side: "left"
    text:
      - "Согласна, вот это наш добрый политрук."

chapter2:
  rows:
  - text:
      - "Отряд, маневрируя и сражаясь с серийной моделью Омиттер, под прикрытием своих серийных кораблей уверенно продвигался к крепости."
  - char: "tashkent"
    side: "left"
    text:
      - "Постараемся разнести и Омиттер, и крепость заодно, Ура!"
  - text:
      - "Стены крепости к этому моменту уже были испещрены черными воронками от взрывов, а лед вокруг был разбит вдребезги."
      - "Под управлением Ташкент орудия серийных моделей сменили направление и дали одновременный залп, готовясь нанести Омиттер смертельный удар."
  - char: "gremyashchy"
    side: "left"
    text:
      - "Куйбышев, Омиттер уже в прицеле, быстро уходи с линии огня!"
  - char: "kuybyshev"
    side: "right"
    text:
      - "Поняла!"
  - text:
      - "Куйбышев пригнулась и, ускорившись, проскользнула сбоку от Омиттер, стремительно разрывая дистанцию."
      - "Позади нее бесчисленные снаряды сошлись в одной точке и одновременно взорвались, подняв бурные волны."
      - "Когда дым рассеялся, на месте, где только что стояла Омиттер, уже ничего не было."
  - char: "tashkent"
    side: "left"
    text:
      - "Разнесло в пух и прах~ Хе-хе, вот что бывает с теми, кто встает на пути флота Северного Парламента!"
  - char: "gremyashchy"
    side: "right"
    text:
      - "Помехи в электронном оборудовании, кажется, тоже... ослабли."
      - "Неужели та высокая башня, которую Ташкент мимоходом разнесла, и была установкой электромагнитного подавления?"
  - char: "tashkent"
    side: "left"
    text:
      - "Правда? Ташкент просто невероятна!"
  - char: "kuybyshev"
    side: "right"
    text:
      - "Хе-хе, иногда удача — это тоже часть мастерства."
  - char: "gremyashchy"
    side: "left"
    text:
      - "Флот Сирен разваливается на глазах. Можно считать, что подавление прошло успешно?"
  - char: "kuybyshev"
    side: "right"
    text:
      - "Угу. Согласно плану операции, я прямо сейчас отправляю в тыл запрос о подкреплении, чтобы силы захвата вошли в крепость для дальнейших действий."
  - char: "communicator"
    side: "left"
    text:
      - "*бип-бип*"
  - char: "kuybyshev"
    side: "right"
    text:
      - "Говорит отряд «Скальпель». Мы успешно подавили Гренландскую крепость, силы захвата могут приступать..."
  - text:
      - "Слабый радиосигнал пробился сквозь снежную бурю, неся в тыл эти воодушевляющие вести."
      - "Но эта грандиозная операция только-только начиналась..."

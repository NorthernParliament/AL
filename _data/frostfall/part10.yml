chapter1:
  rows:
  - text:
      - "Кодовое имя отряда: «Смерч»"
      - "Флагман: Киров"
      - "Акватория вокруг крепости в Чукотском море · Зона контроля Сирен"
  - text:
      - "Лед и снег заблокировали маршрут. А вдалеке недостроенная линия обороны Сирен обрушивала на отряд Киров довольно посредственный шквал огня."
  - char: "grozny"
    side: "left"
    text:
      - "Грозный... не может сдвинуться с места..."
  - char: "gromky"
    side: "right"
    text:
      - "Атаки врага не так уж и страшны... но снегопад слишком сильный!"
      - "Придумай что-нибудь, товарищ Киров!"
  - char: "kirov"
    side: "left"
    text:
      - "Хм... Кажется, пора."
      - "Прямо сейчас, «Портативная установка стабилизации погоды», активация!"
  - text:
      - "После того как Киров отдала приказ, на палубах нескольких серийных кораблей поднялись и выдвинулись механические устройства, похожие на мачты."
      - "Тотчас же всех окутала волна тепла."
      - "Устройства словно создали невидимый барьер, ослабив ярость снежной бури и растопив сковавший море лед."
  - char: "grozny"
    side: "left"
    text:
      - "Снег прекратился, лед тоже... стал тоньше."
  - char: "gromky"
    side: "right"
    text:
      - "Ура! Теперь мы можем сражаться в полную силу~!"
  - char: "kirov"
    side: "left"
    text:
      - "Хе-хе... Даже после активации устройства вражеские подкрепления не появились."
      - "Всё именно так, как и предсказывала товарищ Советский Союз."
      - "Раз уж мы смогли побороть эффект климатического оружия, захватить эту крепость с недостроенной оборонительной системой будет проще простого."
      - "Товарищи, давайте прорвем эту хлипкую линию обороны!"
      - "Давай, пойдём на войну!"

chapter1:
  rows:
  - text:
      - "В кабинете, далеком от поля боя, толстые стены отгораживали от бушующей снаружи метели."
      - "Лампочка коммуникатора погасла, но тут же загорелся расположенный рядом экран."
  - char: "avrora_rad"
    side: "right"
    text:
      - "После столь долгого накапливания сил операция наконец-то начинается..."
  - char: "sovetsky_soyuz_old"
    side: "left"
    text:
      - "Именно так."
  - char: "avrora_rad"
    side: "right"
    text:
      - "В итоге ты все-таки отказалась от плана поручить командование товарищу Командиру?"
  - char: "sovetsky_soyuz_old"
    side: "left"
    text:
      - "Угу. Эта операция слишком опасна. Если Омиттер действительно будет загнана в угол, никто из нас не может точно сказать, что произойдет дальше."
      - "Это наша битва, и мы должны сами нести связанные с ней риски."
      - "К тому же, товарищу Командиру тоже нужно немного отдохнуть. Разве Всемирная выставка — не отличный выбор для этого?"
      - "Как обстановка у тебя?"
  - char: "avrora_rad"
    side: "right"
    text:
      - "Всё в норме. На месте проведения выставки изо дня в день царят мир и покой, никаких волнений."
      - "Если уж на то пошло, известие о том, что товарищ Командир посетит церемонию закрытия, вызвало лишь «небольшой переполох»..."
  - char: "sovetsky_soyuz_old"
    side: "left"
    text:
      - "Ахаха... Я уже могу представить эту шумную сцену."
      - "А что насчет Империи Дракона? Изменилось ли их расписание после новостей о том, что товарищ Командир прибудет на церемонию закрытия?"
  - char: "avrora_rad"
    side: "right"
    text:
      - "Они... кажется, покинули выставку еще до того, как пришли эти новости."
      - "Теперь они вряд ли смогут развернуться на полпути. Можно лишь сказать... очень жаль."
      - "Впрочем, сейчас тебе стоит уделить больше внимания предстоящей операции, Советский Союз."
  - char: "sovetsky_soyuz_old"
    side: "left"
    text:
      - "Ты права. На этом закончим светскую беседу."
  - char: "avrora_rad"
    side: "right"
    text:
      - "Что ж, хоть я сейчас и нахожусь далеко, в Империи Сардиния, я всё равно желаю вам удачной кампании, товарищ."
  - text:
      - "Экран мигнул и погас."
      - "Советский Союз, немного поразмыслив, подключилась к системе боевого командования."
      - "А за толстыми стенами всё так же продолжала завывать снежная буря..."

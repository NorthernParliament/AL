chapter1:
  rows:
  - text:
      - "Кодовое имя отряда: «Гром»"
      - "Флагман: Таллин"
      - "Акватория вокруг крепости архипелага Северная Земля · Зона контроля Сирен"
  - text:
      - "Вдали из-за горизонта медленно показался шпиль здания."
  - char: "soobrazitelny"
    side: "left"
    text:
      - "Исследовательская база, я снова вернулась!"
      - "Прошло столько времени, а внешне, кажется, ничего и не изменилось?"
      - "Хотя я с недоверием отношусь к эстетическим вкусам Сирен, но оставить следы нашей перестройки совершенно нетронутыми — это слишком небрежно с их стороны..."
  - char: "tallinn"
    side: "right"
    text:
      - "Даже если снаружи всё осталось по-прежнему, внутри они наверняка всё полностью переделали под себя."
      - "По данным разведки, эта крепость сейчас является главной базой Омиттер по производству серийных моделей."
      - "Если нам удастся отбить её, боевой потенциал Сирен в полярном регионе значительно снизится."
  - char: "soobrazitelny"
    side: "left"
    text:
      - "Сейчас наши товарищи доблестно сражаются на всех фронтах."
      - "Даже армия Сирен под таким натиском рано или поздно раскроет свои уязвимости!"
      - "Мы так долго вели позиционные бои, настало время перейти в полномасштабное наступление и устроить Омиттер небольшой шок в стиле Северного Парламента!"
  - char: "tallinn"
    side: "right"
    text:
      - "Абсолютно согласна."
  - char: "murmansk"
    side: "left"
    text:
      - "Хм... Всем внимание, прямо по курсу появился гарнизонный флот Сирен."
      - "Они приближаются к нам с трех направлений!"
  - char: "soobrazitelny"
    side: "right"
    text:
      - "Ого~ Раз так, тогда..."
  - text:
      - "Пока отряд перестраивался и выбирал цели, Сообразительный улучила момент и отправила сопровождающему их серийному флоту загадочную команду."
      - "Вслед за этим изначально медлительные серийные модели внезапно рванули вперед, плотность их огня возросла более чем вдвое, и они даже смогли подавить подошедший слишком близко флот Сирен."
  - char: "tallinn"
    side: "left"
    text:
      - "Что это вообще было... Сообразительный, что ты только что сделала?"
  - char: "soobrazitelny"
    side: "right"
    text:
      - "Хе-хе, режим перегрузки не может длиться долго, но его взрывная мощь просто потрясающая!"
      - "Давайте воспользуемся этим шансом и уничтожим производственные мощности крепости, чтобы лишить врага возможности получать бесконечные подкрепления прямо в разгар боя!"
  - char: "tallinn"
    side: "left"
    text:
      - "А если режим перегрузки продлится слишком долго?"
  - char: "soobrazitelny"
    side: "right"
    text:
      - "Когда они уже не смогут держаться, я прикажу им ворваться в ряды врага. Взрыв тоже нанесет им дополнительный урон!"
  - char: "tallinn"
    side: "left"
    text:
      - "...Об этом режиме перегрузки известно другим флотам?"
  - char: "soobrazitelny"
    side: "right"
    text:
      - "На данный момент серийные модели на других фронтах не оснащены этой функцией, она есть только у тех, что идут с нами!"
      - "Этот режим всё еще находится на стадии тестирования. Я хотела внедрить его повсеместно только после проверки в реальном бою!"
  - char: "tallinn"
    side: "left"
    text:
      - "...А Советский Союз знает об этих испытаниях?"
  - char: "soobrazitelny"
    side: "right"
    text:
      - "Наверное, знает..."
      - "Я спря... кхм, поместила информацию об этом в дополнительное примечание мелким шрифтом в самом низу 1873-й страницы отчета!"
      - "В-в общем, давайте лучше сосредоточимся на предстоящем жарком бое!"
      - "Сделаем решающий рывок и отвоюем нашу исследовательскую базу!"

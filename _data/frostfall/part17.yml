chapter1:
  rows:
  - text:
      - "Кодовое имя отряда: «Одинокий волк»"
      - "Флагман: Курск"
      - "Периферия второй линии обороны Сирен · Неизвестное место"
  - char: "kursk"
    side: "left"
    text:
      - "Стоп, по курсу активность."
  - char: "sevastopol"
    side: "right"
    text:
      - "Э?! Где, где?!"
  - char: "kursk"
    side: "left"
    text:
      - "Прямо по курсу находится зона обломков, скоро она появится в пределах видимости."
      - "...Обломки, судя по всему, принадлежат Сиренам. Кроме них, там ничего нет."
  - char: "sevastopol"
    side: "right"
    text:
      - "......Это всё тебе сказала полярная сова?"
  - char: "kursk"
    side: "left"
    text:
      - "Это разведывательный самолет..."

chapter2:
  rows:
  - text:
      - "Как и сказала Курск, вскоре в поле зрения отряда появилась зона обломков."
      - "Казалось, здесь только что произошла крупная битва."
  - char: "sevastopol"
    side: "left"
    text:
      - "Подумать только, это и правда сплошные обломки флота Сирен...!"
  - char: "voroshilov"
    side: "right"
    text:
      - "Угу... многие из них уничтожены одним ударом."
      - "Судя по тому, как они догорают... это, вероятно, произошло в течение последнего часа."
      - "Похоже, наше предположение было верным: в нашу операцию действительно вмешивается третья сила, не принадлежащая к Сиренам."
  - char: "sevastopol"
    side: "left"
    text:
      - "Тц... Такую разрушительную мощь может продемонстрировать только META."
      - "Эх... если бы мы только взяли с собой детектор маяков в этот раз."
  - char: "kursk"
    side: "right"
    text:
      - "Даже самый тщательно продуманный план не может учесть абсолютно всё."
      - "К тому же, у нас есть метод попроще."
  - char: "sevastopol"
    side: "left"
    text:
      - "..Метод попроще?"
  - char: "kursk"
    side: "right"
    text:
      - "Встретимся с ними — и всё поймем."
  - char: "sevastopol"
    side: "left"
    text:
      - "......"
  - char: "kursk"
    side: "right"
    text:
      - "Аномальный сигнал всё еще фиксируется?"
  - char: "voroshilov"
    side: "left"
    text:
      - "Отклик всё еще есть."
  - char: "kursk"
    side: "right"
    text:
      - "Отлично... Похоже, загадка скоро разрешится."
  - char: "sevastopol"
    side: "left"
    text:
      - "Если это действительно META устраивает проблемы... что нам делать?"
      - "Боюсь, одни мы с такой ситуацией не справимся..."
  - char: "kursk"
    side: "right"
    text:
      - "Для начала нам нужно выяснить, что из себя представляет добыча."
      - "А уж потом будем планировать — сражаться или отступать."
      - "С этого момента ни на секунду не расслабляться, атака может произойти в любой момент."

chapter1:
  rows:
  - text:
      - "Кодовое имя отряда: «Скальпель»"
      - "Флагман: Куйбышев"
      - "Периферия архипелага Шпицберген · Временный пункт снабжения — акватория аванпоста «Норд»"
  - text:
      - "Рассветало. В просветах между льдинами медленно продвигался флот."
  - char: "gremyashchy"
    side: "left"
    text:
      - "Как же хочется спать... Кажется, я немного просчиталась..."
  - char: "kuybyshev"
    side: "right"
    text:
      - "Опять не спала всю ночь? Держи кружку горячего шоколада."
  - char: "gremyashchy"
    side: "left"
    text:
      - "Мм... Не буду отказываться."
      - "Я ведь только хотела мельком просмотреть документы, а когда опомнилась, уже рассвело..."
  - char: "kuybyshev"
    side: "right"
    text:
      - "Для Ташкент тоже есть."
  - char: "tashkent"
    side: "left"
    text:
      - "Спасибо..."
  - char: "kuybyshev"
    side: "right"
    text:
      - "Вам уже лучше?"
  - char: "gremyashchy"
    side: "left"
    text:
      - "Угу... Я согрелась. Большое спасибо."
  - char: "tashkent"
    side: "right"
    text:
      - "Ташкент всегда в идеальной форме!"
      - "Точно... Чуть не забыла провести плановую проверку состояния серийного флота."
  - char: "kuybyshev"
    side: "left"
    text:
      - "Не волнуйся, я только что проверила флот, всё в норме."
  - char: "gremyashchy"
    side: "right"
    text:
      - "Надо же, они и впрямь выдерживают суровые полярные условия..."
  - char: "tashkent"
    side: "left"
    text:
      - "Хе-хе-хе, серийные корабли, которые мы ведем в этот раз, — это экспериментальные модели, только что переброшенные с одной секретной исследовательской базы~"
      - "Для этой операции им не только специально повысили устойчивость к электромагнитным помехам Сирен, но и, похоже, внесли множество «особых модификаций»!"
  - char: "gremyashchy"
    side: "right"
    text:
      - "Об этом тоже было написано в документах?.. Гремящий до этого места вчера так и не дошла."
      - "И с каких это пор Ташкент так интересуется подобными вещами?"
  - char: "tashkent"
    side: "left"
    text:
      - "Ничуть, просто я случайно наткнулась на это, когда листала бумаги."
  - char: "gremyashchy"
    side: "right"
    text:
      - "Случайно наткнулась? Тогда почему тебя тоже так клонит в сон? Ты ведь только что тайком зевнула."
  - char: "tashkent"
    side: "left"
    text:
      - "Вовсе нет! Я же сказала, Ташкент всегда в идеальной форме!"
  - char: "gremyashchy"
    side: "right"
    text:
      - "Раз ты так настаиваешь... пусть будет так."
      - "Но в чем же особенность этих «особых модификаций»?"
      - "Внешне они вроде бы ничем не отличаются от предыдущих..."
  - char: "tashkent"
    side: "left"
    text:
      - "Наверное, добавили какие-то новые детали?"
      - "Если бы Сообразительный была здесь, она бы с удовольствием полдня тебе всё объясняла."
  - char: "gremyashchy"
    side: "right"
    text:
      - "Вот как..."
  - char: "tashkent"
    side: "left"
    text:
      - "Что такое? Ты, кажется, чем-то обеспокоена?"
  - char: "gremyashchy"
    side: "right"
    text:
      - "Угу... Я просто подумала, что специальное оборудование для борьбы с Сиренами, похоже, всегда выходит из строя в самый критический момент..."
  - char: "tashkent"
    side: "left"
    text:
      - "....Н-не поспоришь."
  - char: "kuybyshev"
    side: "right"
    text:
      - "Если такое действительно произойдет, запомните: ваша собственная безопасность всегда в приоритете. Не лезьте на рожон."
      - "А что касается задания, я что-нибудь придумаю."
  - char: "tashkent"
    side: "left"
    text:
      - "Куйбышев снова хочет взять все риски на себя?"
      - "Ташкент не согласна."
  - char: "kuybyshev"
    side: "right"
    text:
      - "......"
  - char: "gremyashchy"
    side: "left"
    text:
      - "Поэтому... давайте просто надеяться, что всё пройдет гладко, вот и всё."
  - text:
      - "После недолгого молчания проход между льдинами внезапно стал шире, а видимость прояснилась."
  - char: "kuybyshev"
    side: "left"
    text:
      - "Впереди фарватер расширяется, флот снабжения должен быть где-то... Нашла."
  - char: "tashkent"
    side: "right"
    text:
      - "Флот Союза Орла на удивление пунктуален... Ташкент думала, что они вообще не придут."
  - char: "kuybyshev"
    side: "left"
    text:
      - "Уговор есть уговор, Союз Орла не нарушит свое слово."
      - "Однако это единственная поддержка, которую они окажут нам в этой операции. В остальном придется полагаться только на себя."
      - "Не стоит надолго задерживаться в зоне контроля Союза Орла. Давайте оперативно пополним припасы и продолжим миссию."

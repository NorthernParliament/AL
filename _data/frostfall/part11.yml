chapter1:
  rows:
  - text:
      - "Кодовое имя отряда: «Молот»"
      - "Флагман: Советская Белоруссия"
      - "Периферия аванпоста Земли Георга · Зона конфликта"
  - text:
      - "Вскоре после начала кампании в небе появилось ослепительное полярное сияние."
  - char: "kiev"
    side: "left"
    text:
      - "Хоть еще и день... подумать только, они способны создать в небе такое ослепительное полярное сияние."
      - "Климатические установки Сирен и правда обладают невероятной мощью..."
  - char: "chkalov"
    side: "right"
    text:
      - "Хм, раз это связано с полярным сиянием, неужели задействовано влияние геомагнитного поля..."
      - "Если это так..."
  - char: "sovetskaya_belorussiya"
    side: "left"
    text:
      - "Товарищ Чкалов, ты что-то обнаружила?"
  - char: "chkalov"
    side: "right"
    text:
      - "Товарищ Белоруссия, ты знаешь о явлении геомагнитной инверсии?"
  - char: "sovetskaya_belorussiya"
    side: "left"
    text:
      - "Немного знакома с этим..."
      - "Кажется, магнитные полюса Земли с течением времени постоянно смещаются, а напряженность магнитного поля постепенно слабеет..."
      - "И в конечном итоге произойдет смена северного и южного магнитных полюсов?"
  - char: "chkalov"
    side: "right"
    text:
      - "Верно. Например, наш нынешний географический Северный полюс на самом деле является магнитным Южным полюсом, а географический Южный полюс — магнитным Северным."
      - "Однако ранее, когда я проверяла данные в исследовательском институте, я обнаружила одну заслуживающую внимания деталь."
      - "Движение магнитного Южного полюса, кажется, ускоряется, и траектория его смещения направлена прямо к географическому Северному полюсу."
      - "Эта траектория отличается от прошлых прогнозов, а расположение географического Северного полюса как раз совпадает с самой строго охраняемой крепостью Омиттер на Северном полюсе..."
      - "Возможно, между аномальными изменениями магнитного поля и способностью Сирен управлять полярным сиянием существует какая-то связь..."
  - char: "sovetskaya_belorussiya"
    side: "left"
    text:
      - "Такую точку зрения я слышу впервые..."
      - "Значит, в этот раз на тебя возложена не только боевая задача, но и поручено расследование, связанное с геомагнитной аномалией?"
  - char: "chkalov"
    side: "right"
    text:
      - "Ахаха, вовсе нет..."
      - "Пока что это лишь мои личные подозрения. Просто, увидев аномальное полярное сияние, я внезапно увлеклась размышлениями об этом."
      - "Прошу прощения, товарищ Белоруссия."
  - char: "sovetskaya_belorussiya"
    side: "left"
    text:
      - "Ничего страшного. Как ощущения от первой официальной боевой миссии?"
  - char: "chkalov"
    side: "right"
    text:
      - "Ничего особенного, просто переход с одного поля боя на другое."
      - "Я давно готовилась к этому моменту, так что можете не волноваться."

chapter2:
  rows:
  - char: "gangut"
    side: "left"
    text:
      - "Товарищи, уже виднеется внешний край «Короны»."
  - text:
      - "Прямо по курсу флота бросались в глаза внезапно появившиеся остроконечные льдины."
      - "Вдалеке гигантская «Корона» пронзала горизонт, отбрасывая на фоне неба огромный силуэт."
  - char: "chkalov"
    side: "left"
    text:
      - "Так вот она, «Корона»... Сингулярность, которую Энтерпрайз из «Пепла» не смогла открыть до конца, а затем ее захватили Сирены..."
      - "Я впервые подошла так близко к «Короне»..."
      - "Интересно... хотелось бы знать, что сейчас происходит внутри нее."
      - "Там такая же ситуация, как и в центральном водовороте Северной Атлантики, или же..."
      - "Хе-хе-хе, как бы там ни было, это стоит тщательно исследовать..."
  - char: "sovetskaya_belorussiya"
    side: "right"
    text:
      - "Ахаха, товарищ Чкалов, энтузиазм — это хорошо, но отвоевывать «Корону» нам предстоит только на следующем этапе кампании."
      - "На данном этапе нам нужно лишь устроить здесь хороший переполох и привлечь на себя как можно больше сил Омиттер."
      - "Соответственно, нам тоже придется выдержать огромное давление вражеских атак. Вы уверены в своих силах, товарищи?"
  - char: "kiev"
    side: "left"
    text:
      - "Без проблем. Каким бы толстым ни был лед, Киев сможет его разбить."
  - char: "gangut"
    side: "right"
    text:
      - "Ха-ха-ха, еще бы~"
      - "Я уже не раз и не два бывала в этих местах с позиционными боями, так что к такой работе мне не привыкать~"
  - char: "chkalov"
    side: "left"
    text:
      - "Хоть я впервые на передовой с боевой задачей, можете смело на меня рассчитывать."
      - "Уверена, боевая мощь кораблей-прототипов Северного Парламента заставит Омиттер сильно удивиться."
  - char: "sovetskaya_belorussiya"
    side: "right"
    text:
      - "Отлично, тогда давайте выдвигаться навстречу «Короне» и зададим Омиттер жару!"

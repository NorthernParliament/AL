chapter1:
  rows:
  - text:
      - "Кодовое имя отряда: «Гром»"
      - "Флагман: Таллин"
      - "Периферия аванпоста Ляховских островов · Зона контроля Северного Парламента"
  - char: "soobrazitelny"
    side: "left"
    text:
      - "А... А... Апчхи!"
  - char: "murmansk"
    side: "right"
    text:
      - "Салфетки уже почти закончились, да? Держи~"
  - char: "soobrazitelny"
    side: "left"
    text:
      - "Это всё мелочи~ Хе-хе, спасибо."
  - char: "tallinn"
    side: "right"
    text:
      - "Сообразительный, когда ты в последний раз отдыхала?"
  - char: "soobrazitelny"
    side: "left"
    text:
      - "Поза... Конечно же, прошлой ночью!"
  - char: "murmansk"
    side: "right"
    text:
      - "Проговорилась, Сообразительный."
  - char: "tallinn"
    side: "left"
    text:
      - "Эх, я же говорила тебе хорошенько отдохнуть перед операцией. Почему ты снова не спала всю ночь?"
  - char: "soobrazitelny"
    side: "right"
    text:
      - "Гениальному механику не нужен отдых!"
      - "Сейчас самое время проверить результаты моих «особых модификаций», как я могла не провести тщательную проверку перед отправлением!"
  - char: "murmansk"
    side: "left"
    text:
      - "Так вот почему ты уходила с передовой на какое-то время... ты занималась модернизацией серийных моделей..."
  - char: "soobrazitelny"
    side: "right"
    text:
      - "Это была лишь часть моей работы! Большего я пока сказать не могу, но..."
      - "Хе-хе-хе, это всё отличные вещи, созданные на основе исследований данных из Тайной комнаты!"
  - char: "tallinn"
    side: "left"
    text:
      - "Не ожидала встретить здесь кого-то, кто участвовал в этих «особых модификациях»."
      - "На самом деле, когда я проводила осмотр перед отправлением, у меня возник один небольшой вопрос..."
      - "Хоть я и не специалист в этой области, но всё же какое-то время училась по обмену в Железной Крови..."
      - "Так что я просто спрашиваю, я ничуть в тебе не сомневаюсь..."
      - "Так вот, эти «особые модификации» серийных моделей соответствуют стандартам безопасности?"
  - char: "soobrazitelny"
    side: "right"
    text:
      - "Стандарты для того и нужны, чтобы их превосходить!"
  - char: "tallinn"
    side: "left"
    text:
      - "............"
  - char: "murmansk"
    side: "right"
    text:
      - "Главное, чтобы они не взрывались, а остальное неважно..."
  - char: "soobrazitelny"
    side: "left"
    text:
      - "............"
  - char: "murmansk"
    side: "right"
    text:
      - "Они ведь не взорвутся на самом деле?"
  - char: "soobrazitelny"
    side: "left"
    text:
      - "Н-нет, не взорвутся! Эту проблему мы решили еще на третьем этапе тестирования! Можете не волноваться!"
  - char: "murmansk"
    side: "right"
    text:
      - "Они и правда взрывались..."
  - char: "tallinn"
    side: "left"
    text:
      - "Думаю... нам лучше еще немного увеличить дистанцию между нами и серийным флотом."
  - char: "soobrazitelny"
    side: "right"
    text:
      - "Эй!!! Даже если вы не верите мне, вы должны верить в строгость стандартов нашего Конструкторского бюро!"
  - char: "tallinn"
    side: "left"
    text:
      - "Угу... Я абсолютно верю. Поэтому давайте всё-таки еще немного увеличим дистанцию..."
  - char: "soobrazitelny"
    side: "right"
    text:
      - "Э-э-эй!!!"

chapter1:
  rows:
  - text:
      - "Кодовое имя отряда: «Одинокий волк»"
      - "Флагман: Курск"
      - "Акватория вокруг крепости в Чукотском море · Периферия временной линии обороны Сирен"
  - char: "kursk"
    side: "left"
    text:
      - "Мы приближаемся к опасной зоне... Флоту остановить движение."
  - text:
      - "Огромные тучи заволокли небо, казалось, назревала яростная снежная буря."
      - "Вдалеке под облаками едва виднелась выступающая над горизонтом группа плавучих островных крепостей Сирен."
  - char: "voroshilov"
    side: "left"
    text:
      - "Прямо по курсу находится крепость Сирен в Чукотском море, одна из важнейших составляющих полярной оборонительной системы Омиттер."
      - "Разведка уже подтвердила, что множество экстремальных погодных явлений, наблюдавшихся в полярных водах в прошлом, связаны с этой крепостью."
  - char: "kursk"
    side: "right"
    text:
      - "За эту крепость отвечает товарищ Киров?"
  - char: "voroshilov"
    side: "left"
    text:
      - "Верно. Согласно плану, отряд «Смерч» под командованием товарища Киров будет отвечать за захват этой крепости."
  - char: "kursk"
    side: "right"
    text:
      - "Но бой еще не начался."
  - char: "sevastopol"
    side: "left"
    text:
      - "Возможно, по пути они столкнулись с флотом сопротивления Сирен."
      - "В конце концов, в отличие от нас, их флот действует в открытую, поэтому и сопротивление, с которым они сталкиваются, гораздо сильнее."
  - char: "kursk"
    side: "right"
    text:
      - "Угу. Жаль, что мы не сможем воспользоваться хаосом битвы, чтобы проскользнуть здесь."
      - "Товарищ Ворошилов, активируй «Маяк Рассвета», мы проложим новый маршрут."
  - char: "voroshilov"
    side: "left"
    text:
      - "Поняла, активирую маяк..."
      - "..Странно, координаты цели... изменились?"
  - char: "kursk"
    side: "right"
    text:
      - "Изменились?"
  - char: "sevastopol"
    side: "left"
    text:
      - "Э! Неужели аппаратура вышла из строя?!"
  - char: "voroshilov"
    side: "right"
    text:
      - "Точно сказать не могу."
      - "Эта операция действительно является первым боевым применением «Маяка Рассвета», но цель не исчезла, просто изменилось её местоположение."
      - "Возможно, по мере нашего продвижения... поблизости появилась новая аномалия, которая была отмечена как приоритетная."
  - char: "kursk"
    side: "left"
    text:
      - "...Устройство, способное отмечать лишь ближайшую аномальную точку, и правда жутко неудобное."
  - char: "voroshilov"
    side: "right"
    text:
      - "Как-никак, мы ищем сокрытые Сиренами тайны в этой акватории..."
      - "То, что у нас вообще есть такой прибор, — это уже максимальная поддержка, которую мог предоставить нам Научный отдел."
  - char: "kursk"
    side: "left"
    text:
      - "Я понимаю."
  - char: "sevastopol"
    side: "right"
    text:
      - "Хм... Новая аномалия, похоже, находится не в окрестностях крепости Сирен. Может, отправимся туда и посмотрим?"
  - char: "voroshilov"
    side: "left"
    text:
      - "Угу, расследование источников аномальных сигналов — наша единственная цель, мы не можем пропустить ни один из них."
  - char: "kursk"
    side: "right"
    text:
      - "Корректируем курс, выдвигаемся."

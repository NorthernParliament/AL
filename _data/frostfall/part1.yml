chapter1:
  rows:
  - text:
      - "По заснеженному льду колонна кораблей снабжения тянулась вдаль, словно длинный дракон, следуя по маршруту, проложенному ледоколами."
      - "Хотя боевые действия в полярном регионе никогда не прекращались, столь масштабное привлечение ресурсов, как сейчас, было большой редкостью."
      - "Коммуникатор несколько раз затрещал, после чего раздался знакомый голос."
  - char: "sovetsky_soyuz_old"
    side: "left"
    text:
      - "Говорит Советский Союз. Оповещаю всех участников данной операции."
      - "Цель нашей операции — воспользоваться благоприятным моментом, когда Мейнфрейм Компилятор уничтожен, а Омиттер лишилась внешней поддержки, чтобы расширить зону нашего контроля в полярных водах."
      - "Мы должны полностью остановить экспансию Сирен в Арктике и заложить фундамент для окончательного возвращения этой акватории."
      - "Поэтому нам необходимо нанести удар по нескольким крепостям Омиттер в полярном регионе."
      - "Одну за другой снять электромагнитную и климатическую блокировки, наложенные на эту акваторию."
      - "Уничтожить объекты по производству серийных моделей и разработке вооружения, а также отбить нашу полярную Базу первопроходцев."
      - "Кроме того, мы должны проникнуть в строго охраняемую крепость на Северном полюсе — место, где с наибольшей вероятностью находится Мейнфрейм Омиттер."
      - "Для достижения этих целей всем боевым отрядам предстоит выложиться на полную и действовать сообща."
      - "Согласно приказу Верховного Совета, боевые отряды распределены следующим образом..."
      - "Первый отряд, кодовое имя «Скальпель», дислоцируется на базе архипелага Шпицберген и находится в режиме ожидания."
      - "Ваша задача — подавить Гренландскую крепость Омиттера и снять электромагнитное подавление в полярных водах. Флагманом назначается Куйбышев."
  - char: "kuybyshev_rad"
    side: "right"
    text:
      - "Отряд «Скальпель» приказ принят."
  - char: "sovetsky_soyuz_old"
    side: "left"
    text:
      - "Второй отряд, кодовое имя «Железный кулак», дислоцируется на базе архипелага Северная Земля и находится в режиме ожидания."
      - "Вам необходимо провести разведку крепости Омиттера на Северном полюсе и подтвердить развертывание сил Сирен в этом районе."
      - "Флагманом назначается Советская Россия."
  - char: "sovetskaya_rossiya_rad"
    side: "right"
    text:
      - "Отряд «Железный кулак» не подведет!"
  - char: "sovetsky_soyuz_old"
    side: "left"
    text:
      - "Третий отряд, кодовое имя «Гром», дислоцируется на базе Юкагир и находится в режиме ожидания."
      - "Вы должны вернуть нашу «Базу первопроходцев», построенную за пределами архипелага Северная Земля, и полностью зачистить находящиеся там вооруженные силы Сирен."
      - "Флагманом назначается Таллин."
  - char: "tallinn_rad"
    side: "right"
    text:
      - "Отряд «Гром» сделает всё возможное и гарантирует выполнение задачи."
  - char: "sovetsky_soyuz_old"
    side: "left"
    text:
      - "Четвертый отряд, кодовое имя «Смерч», через Чукотское море выдвигается на заданную позицию и переходит в режим ожидания."
      - "Ваша задача — прорваться через недостроенную крепость Омиттер в Чукотском море и уничтожить расположенную там базу климатического оружия."
      - "Флагманом назначается Киров."
  - char: "kirov_rad"
    side: "right"
    text:
      - "Отряд «Смерч» приказ понял."
  - char: "sovetsky_soyuz_old"
    side: "left"
    text:
      - "Пятый отряд, кодовое имя «Молот», продвигается на север по полярному маршруту в район Земли Георга и переходит в режим ожидания на заданной позиции."
      - "Вам необходимо начать лобовую атаку на «Корону» в Арктике, связывая боем как можно больше сил противника на протяжении всей кампании."
      - "Если возможно... отвлеките на себя внимание самой Омиттер."
      - "Флагманом назначается товарищ Советская Белоруссия."
  - char: "sovetskaya_belorussiya_rad"
    side: "right"
    text:
      - "Отряд «Молот» приказ понял. Можете спокойно на нас рассчитывать."
  - char: "sovetsky_soyuz_old"
    side: "left"
    text:
      - "Ради достижения великих целей Верховного Совета, ради того, чтобы проложить путь в наше новое будущее — в этой операции недопустимы ошибки, только успех."
      - "Позвольте мне от лица Верховного Совета выразить глубочайшее уважение всем участникам этой миссии."
      - "Кодовое название операции — «Ледяной дождь», время начала: сегодня в 01:00."
      - "Прошу все боевые отряды заблаговременно занять свои позиции. Желаю всем победы!"
      - "Конец связи."

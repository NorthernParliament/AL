chapter1:
  rows:
  - text:
      - "Кодовое имя отряда: «Одинокий волк»"
      - "Флагман: Курск"
      - "Периферия первой линии обороны Сирен · Сторона Берингова пролива"
  - text:
      - "Из-за череды непредвиденных обстоятельств даже Севастополь впала в уныние."
  - char: "sevastopol"
    side: "left"
    text:
      - "Электромагнитное подавление ослабевает, операция отряда «Скальпель» идет гладко..."
      - "Метель постепенно стихает, отряд «Смерч» тоже успешно продвигается..."
      - "А вот у нас по сравнению с ними..."
  - char: "voroshilov"
    side: "right"
    text:
      - "...Боюсь, у меня есть еще плохие новости."
      - "Приборы показывают, что аномальный сигнал, к которому мы направлялись, снова исчез."
      - "В этот раз я проводила плановое сканирование каждые десять минут, а значит, сигнал должен был исчезнуть в течение этих десяти минут."
  - char: "sevastopol"
    side: "left"
    text:
      - "Нам оставалось плыть до цели чуть больше часа... Как же так!"
  - char: "kursk"
    side: "right"
    text:
      - "Нас обнаружили."
  - char: "sevastopol"
    side: "left"
    text:
      - "Как такое возможно?! Мы по пути не встретили ни единого врага!"
  - char: "kursk"
    side: "right"
    text:
      - "Не знаю."
      - "Возможно, нас случайно заметил разведывательный самолет, или же у Сирен в этой акватории есть какие-то более скрытые разведывательные системы."
      - "Так или иначе, нас раскрыли."
  - char: "voroshilov"
    side: "left"
    text:
      - "Если нас раскрыли... то очень странно, что мы до сих пор не столкнулись с врагом."
      - "Даже если основные силы Омиттер связаны боями на других фронтах, она ведь могла бы послать какое-нибудь пушечное мясо, чтобы помешать нашему продвижению, верно?"
  - char: "kursk"
    side: "right"
    text:
      - "В этом действительно... что-то не сходится."
      - "......Возможно, здесь не один охотник."
  - char: "voroshilov"
    side: "left"
    text:
      - "...Ты хочешь сказать, что в это дело вмешалась третья сторона, не принадлежащая ни к нам, ни к Сиренам?"
  - char: "kursk"
    side: "right"
    text:
      - "..Если это так, у нас еще есть шанс."
      - "Судя по времени, противник опережает нас всего на шаг."
      - "Ускоряем ход, у нас еще есть шанс."
      - "Новые координаты подтверждены?"
  - char: "voroshilov"
    side: "left"
    text:
      - "Подтверждены, это место находится недалеко от крепости на Северном полюсе."
      - "На этот раз я буду проводить сканирование каждые пять минут."
      - "Хотя для этого прибора такая нагрузка будет тяжеловата... но, учитывая сложившуюся ситуацию, я считаю крайне необходимым как можно раньше фиксировать любые изменения сигнала."
  - char: "kursk"
    side: "right"
    text:
      - "...Надеюсь, в этот раз мы сможем разобраться с проблемой до того, как сигнал исчезнет."

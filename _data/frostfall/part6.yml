chapter1:
  rows:
  - text:
      - "Кодовое имя отряда: «Железный кулак»"
      - "Флагман: Советская Россия"
      - "Акватория вокруг крепости на Северном полюсе · Зона контроля Сирен"
  - char: "minsk"
    side: "left"
    text:
      - "Погода, кажется, стала еще хуже..."
  - char: "chapayev"
    side: "right"
    text:
      - "Чем ближе к Северному полюсу, тем свирепее стихия."
      - "А ведь мы даже не находимся в Зеркальном море. Интересно, по какому принципу работает климатическое оружие Омиттер."
  - char: "omitter"
    side: "left"
    status: "is-red"
    text:
      - "............"
  - char: "volga"
    side: "right"
    text:
      - "Плохи дела, на северо-востоке замечена Омиттер!"
  - char: "minsk"
    side: "left"
    text:
      - "Воспользовавшись прикрытием метели и электромагнитных помех, она подобралась к нам так близко?!"
  - char: "sovetskaya_rossiya"
    side: "right"
    text:
      - "Крепость на Северном полюсе прямо по курсу, больше нет смысла уклоняться от боя."
      - "Сосредоточить огонь, уничтожить её!"

chapter2:
  rows:
  - char: "minsk"
    side: "left"
    text:
      - "Вражеская Омиттер гарантированно уничтожена, Ура!"
  - char: "chapayev"
    side: "right"
    text:
      - "Хм... Судя по боевой мощи, эта Омиттер, похоже, не оригинал, а всего лишь серийная модель."
      - "Но эти серийные корабли только что... что это за тип, вам такие знакомы?"
  - char: "sovetskaya_rossiya"
    side: "left"
    text:
      - "Я никогда с такими не сталкивалась... Но могу с уверенностью сказать, что эти враги обладают боевой мощью и маневренностью, намного превосходящими модели III типа."
      - "И даже после уничтожения затесавшихся среди них элитных врагов, их флот не впал в замешательство..."
  - char: "volga"
    side: "right"
    text:
      - "Всем осторожно! Появилась еще одна Омиттер, возможно, снова серийная модель!"
  - char: "chapayev"
    side: "left"
    text:
      - "Россия, скорость потерь нашего серийного флота превышает расчетную. Будем отступать?"
  - char: "sovetskaya_rossiya"
    side: "right"
    text:
      - "...Мы еще даже не увидели саму крепость на Северном полюсе, да и настоящая Омиттер не появилась."
      - "Продержимся еще немного, нам нужно хотя бы выяснить боевые характеристики этого нового флота Сирен. Продолжаем бой!"

chapter3:
  rows:
  - text:
      - "Отряд разорвал дистанцию и, атакуя появившуюся модель Омиттер, параллельно начал собирать данные об этих новых серийных моделях Сирен."
      - "Внезапно налетел свирепый порыв ветра, и небо, казалось, еще сильнее потемнело."
  - char: "volga"
    side: "left"
    text:
      - "Небо... потемнело?"
  - text:
      - "Волга внезапно почувствовала пронизывающий до костей холод. В сумраке бушующей метели ей почудился еще более мрачный, темный силуэт."
  - char: "volga"
    side: "left"
    text:
      - "Авианосец Империи Сакуры...?"
  - text:
      - "Неизвестно почему, но в ее голове внезапно возникла именно эта ассоциация."
      - "На мгновение Волге показалось, что она покинула полярную метель и вернулась на подводную лодку «Сулико» под толщей льда."
      - "А устройство для анализа образцов перед ней мерцало ослепительным и странным светом."
      - "Неизвестно, сколько прошло времени, но когда она пришла в себя, ни темного силуэта, ни устройства для анализа образцов уже не было."
      - "В коммуникаторе остался лишь треск помех. Из-за вмешательства снежной бури даже специальное оборудование связи вышло из строя."
      - "Волга пошатнулась и едва не упала, но вдруг почувствовала тепло на своей руке — кто-то поддержал ее сзади."
  - char: "minsk"
    side: "left"
    text:
      - "Ты в порядке, Волга?"
      - "В тебя попали?"
  - char: "volga"
    side: "right"
    text:
      - "Н-нет... просто немного задумалась. Ты видела тот темный силуэт только что?"
  - char: "minsk"
    side: "left"
    text:
      - "...Темный силуэт? О чем ты говоришь?"
      - "Я знаю только то, что нас разделила эта внезапно разбушевавшаяся метель..."
      - "В любом случае, пока не делай резких движений. Я уже перевела серийные модели в автономный режим."
      - "Хоть от этого, возможно, и мало толку, но они должны сдержать врага какое-то время, надеюсь..."
  - char: "volga"
    side: "right"
    text:
      - "Флот рассеян, дело дрянь..."
  - char: "minsk"
    side: "left"
    text:
      - "Берегись!!!"

chapter4:
  rows:
  - text:
      - "БАБАХ!!!"
      - "Сзади прилетел снаряд и взорвался совсем рядом с ними."
  - char: "volga"
    side: "left"
    text:
      - "Э? Откуда атака с этого направления, нас окружили...?"
  - char: "minsk"
    side: "right"
    text:
      - "Эх... Наверное, наши же серийные модели приняли нас за врагов, ха-ха..."
  - char: "volga"
    side: "left"
    text:
      - "Это слишком опасно!"
  - char: "minsk"
    side: "right"
    text:
      - "При такой низкой видимости и таких сильных помехах — не будь к ним слишком строга."
  - char: "communicator"
    side: "left"
    text:
      - "...координаты... отмечены... немедленно собираемся..."
  - char: "minsk"
    side: "right"
    text:
      - "О~ Это голос России, коммуникатор, кажется, наконец-то ожил."
  - char: "volga"
    side: "left"
    text:
      - "Не только связь, даже метель, кажется, стала слабее..."
      - "Похоже, операция отряда «Смерч» увенчалась успехом. Как замечательно~"
  - char: "minsk"
    side: "right"
    text:
      - "Говорит Минск. Я уже встретилась с Волгой. Связь, кажется, восстанавливается. Пожалуйста, отправьте координаты точки сбора еще раз."
  - char: "sovetskaya_rossiya_rad"
    side: "left"
    text:
      - "Советская Россия приняла. Координаты точки сбора отправлены повторно."
      - "Помехи ослабевают, а серийные модели Омиттер вновь отброшены назад."
      - "Наша задача остается неизменной: продолжаем сближение с крепостью на Северном полюсе."
  - char: "minsk"
    side: "right"
    text:
      - "Вас поняла~"
  - char: "volga"
    side: "left"
    text:
      - "Какое счастье, что все целы!"
  - char: "minsk"
    side: "right"
    text:
      - "Верно, и нам пора двигаться на встречу с остальными..."

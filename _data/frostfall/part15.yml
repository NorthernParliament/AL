chapter1:
  rows:
  - text:
      - "Кодовое имя отряда: «Одинокий волк»"
      - "Флагман: Курск"
      - "Периферия первой линии обороны Сирен · Сторона Ляховских островов"
  - char: "sevastopol"
    side: "left"
    text:
      - "«Место, где сходится полярное сияние, указывает на морскую аномалию» — товарищ Советский Союз ведь так говорила, когда ставила задачу, верно~"
      - "Смотрите, сейчас полярное сияние в небе и правда очень яркое, это значит, что в этот раз мы действительно что-то найдем!"
      - "Ху-ху-ху... интересно, что же мы сможем найти!"
      - "Может, это Мейнфрейм Омиттер... или какая-нибудь новая таинственная база Сирен!"
  - char: "kursk"
    side: "right"
    text:
      - "...Ты ошибаешься, товарищ Севастополь."
  - char: "sevastopol"
    side: "left"
    text:
      - "Э...? В чем я ошибаюсь?"
  - char: "kursk"
    side: "right"
    text:
      - "...Полярное сияние над нами потускнело."
      - "...Товарищ Ворошилов, активируй маяк и проверь еще раз, у меня плохое предчувствие."
  - char: "voroshilov"
    side: "left"
    text:
      - "Активирую маяк..."
      - "Система работает нормально, захват сигнала............ есть проблема."
      - "...То, что сейчас отображается на приборе, должно быть тем самым первым сигналом, который мы отслеживали, он находится далеко от нас."
      - "А тот сигнал, который мы позже выбрали в качестве цели, исчез."
  - char: "sevastopol"
    side: "right"
    text:
      - "Что?! Исчез...?"
      - "Неужели Сирены его спрятали?!"
  - char: "kursk"
    side: "left"
    text:
      - "Если бы они могли это сделать, мы бы вообще не засекли никаких сигналов с самого начала."
  - char: "sevastopol"
    side: "right"
    text:
      - "Тогда в чем же дело...?"
  - char: "voroshilov"
    side: "left"
    text:
      - "Если аномалия, которую мы ищем, является каким-то оборудованием... то его временное отключение также может привести к исчезновению источника сигнала."
  - char: "kursk"
    side: "right"
    text:
      - "Тогда почему не отключили всё?"
  - char: "voroshilov"
    side: "left"
    text:
      - "Информации недостаточно, я не могу сказать наверняка."
      - "Но по пути мы не вступали ни в какие бои с Сиренами, вероятность того, что нас обнаружили, крайне мала."
      - "И поскольку мы всё еще улавливаем аномальные сигналы, я не думаю, что «Маяк Рассвета» неисправен..."
      - "Единственное возможное объяснение состоит в том, что с самим аномальным сигналом, который мы отслеживали... произошли какие-то неполадки."
  - char: "kursk"
    side: "right"
    text:
      - "Есть только один способ выяснить это... Ускоряем ход, мы направляемся к следующей аномальной точке."

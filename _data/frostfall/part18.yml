chapter1:
  rows:
  - text:
      - "Кодовое имя отряда: «Одинокий волк»"
      - "Флагман: Курск"
      - "Периферия второй линии обороны Сирен · Неизвестное место"
  - char: "kursk"
    side: "left"
    text:
      - "Стоп."
      - "Чувствуете? Вокруг витает аура опасности."
  - char: "sevastopol"
    side: "right"
    text:
      - "Э... У нас нет такой хорошей интуиции, как у тебя..."
  - char: "kursk"
    side: "left"
    text:
      - "Осторожно, сверху."
  - text:
      - "БАБАХ!!!"
  - char: "sevastopol"
    side: "left"
    text:
      - "Ваа! Как же я испугалась! Откуда атака?!"
  - char: "kursk"
    side: "right"
    text:
      - "С воздуха."
      - "...Нас уже окружили."
  - char: "voroshilov"
    side: "left"
    text:
      - "Что... Где враг и сколько их?"
  - char: "kursk"
    side: "right"
    text:
      - "Один спереди, один сзади. Двое."
      - "Один из них... Хирю из Империи Сакуры, похоже, это пешка."
      - "Вторая какая-то странная... Должно быть, это META."
      - "Ни одна из них еще не вошла в зону нашей видимости, но Флеа их обнаружила."
  - char: "sevastopol"
    side: "left"
    text:
      - "Флеа?..."
  - char: "kursk"
    side: "right"
    text:
      - "Моя разведывательная подводная лодка."
  - char: "sevastopol"
    side: "left"
    text:
      - "У тебя помимо полярной совы и разведывательных самолетов... есть еще и разведывательная подводная лодка?!"
      - "Но я за всю дорогу ни разу её не видела!"
  - char: "kursk"
    side: "right"
    text:
      - "Потому что я ни разу не приказывала им всплывать."
  - char: "voroshilov"
    side: "left"
    text:
      - "Подожди... META вместе с пешкой?"
      - "...Почему пешка смогла ускользнуть от наших радаров?"
  - char: "kursk"
    side: "right"
    text:
      - "Не знаю."
      - "Осторожно... приближается вторая волна атак. Приготовиться к бою!"

chapter2:
  rows:
  - text:
      - "БАБАХ!!!"
  - char: "souryuu_meta"
    side: "right"
    status: "is-red"
    text:
      - "............"
  - char: "voroshilov"
    side: "left"
    text:
      - "Плохи дела... наши атаки не причиняют ей ни малейшего вреда."
  - char: "sevastopol"
    side: "right"
    text:
      - "Зато вторая пешка очень слабая!"
      - "Если не считать того, что она невероятно живучая, у нее вообще нет никакой боевой мощи!"
      - "Может, лучше сначала сосредоточим огонь и уничтожим эту слабенькую пешку?"
  - char: "kursk"
    side: "left"
    text:
      - "Нет... пахнет ловушкой."
  - char: "voroshilov"
    side: "right"
    text:
      - "Ты что-то заметила?"
  - char: "kursk"
    side: "left"
    text:
      - "Просто интуиция... но я привыкла действовать по интуиции."
      - "Товарищ Советский Союз доверяет моей интуиции. А вы?"
  - char: "voroshilov"
    side: "right"
    text:
      - "Ты флагман, на поле боя мы подчиняемся тебе."
  - char: "sevastopol"
    side: "left"
    text:
      - "Угу, не стесняйся отдавать любые приказы!"
  - char: "kursk"
    side: "right"
    text:
      - "Хорошо, мы отступаем."
  - char: "sevastopol"
    side: "left"
    text:
      - "Угу! Э?!!!!"
  - char: "kursk"
    side: "right"
    text:
      - "Объясню позже. Сейчас — отступаем на полном ходу."
  - char: "sevastopol"
    side: "left"
    text:
      - "Е-есть!"

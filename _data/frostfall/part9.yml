chapter1:
  rows:
  - text:
      - "Кодовое имя отряда: «Смерч»"
      - "Флагман: Киров"
      - "Периферия аванпоста острова Врангеля · Зона контроля Северного Парламента"
  - text:
      - "Вскоре после того, как флот покинул остров Врангеля, некогда сносная погода резко сменилась свирепой метелью."
  - char: "gromky"
    side: "left"
    text:
      - "С тех пор как была уничтожена крепость Сирен в Беринговом море, погода здесь стала просто ужасной..."
      - "Возможно, Омиттер начала строить здесь козни еще тогда..."
  - char: "kirov"
    side: "right"
    text:
      - "Очень возможно. Если бы они не подняли столько шума во время недавнего расширения своих оборонительных сооружений, кто знает, когда бы мы вообще обнаружили эту крепость."
  - char: "grozny"
    side: "left"
    text:
      - "Перехитрили сами себя."
  - char: "kirov"
    side: "right"
    text:
      - "Хе-хе, точно, перехитрили сами себя."
  - char: "grozny"
    side: "left"
    text:
      - "Пробьемся с боем, уничтожим врагов, разрушим крепость, чтобы погода наладилась..."
      - "Если мы разрушим крепость, погода ведь должна улучшиться?"
  - char: "kirov"
    side: "right"
    text:
      - "В теории — да. Эта крепость Сирен в Чукотском море с высокой долей вероятности и есть то место, где находится климатическое оружие, с помощью которого Омиттер манипулирует полярной погодой."
  - char: "gromky"
    side: "left"
    text:
      - "Но эта метель на пути, ух... какой сильный ветер!"
  - text:
      - "Громкий изо всех сил придерживала свою шапку. Неистовая снежная буря дула так яростно, будто хотела стереть этот флот с лица земли."
  - char: "gromky"
    side: "left"
    text:
      - "Не доберемся до крепости — не сможем остановить метель, но пока метель метет, мы не сможем добраться до крепости..."
  - char: "kirov"
    side: "right"
    text:
      - "А у нас есть одно секретное устройство, которое мы можем использовать~"
  - char: "grozny"
    side: "left"
    text:
      - "Секретное устройство?"
  - char: "kirov"
    side: "right"
    text:
      - "Научный отдел назвал его «Портативной установкой стабилизации погоды»."
      - "Если мы активируем это устройство, то сможем подавить воздействие этой ужасной метели на нас."
  - char: "grozny"
    side: "left"
    text:
      - "«Портативная установка стабилизации погоды»... что это?"
  - char: "kirov"
    side: "right"
    text:
      - "Кажется, это портативный нагревательный массив, переделанный из установки для трансформации мерзлоты и размещенный на нескольких специальных серийных кораблях..."
  - char: "grozny"
    side: "left"
    text:
      - "«Установка для трансформации мерзлоты»... что это?"
  - char: "kirov"
    side: "right"
    text:
      - "Кхм... Просто считай это нашим портативным климатическим оружием~"
      - "Однако ради портативности пришлось пожертвовать стабильностью, поэтому время его использования строго ограничено."
      - "Момент для его активации буду выбирать я. Когда наступит решающий момент, мы сможем застать врага врасплох."
      - "Но в пути нам пока придется немного потерпеть..."
      - "Товарищи, это испытание для нашей воли. Даже без его помощи ничто не сможет остановить наше продвижение вперед."
      - "На этот раз мы обязательно заставим Сирен поплатиться!"
  - char: "grozny"
    side: "left"
    text:
      - "Хорошо, Грозный будет терпеть. Терпеть до тех пор, пока мы не зададим трепку Сиренам..."
  - char: "gromky"
    side: "right"
    text:
      - "Ура!!!"

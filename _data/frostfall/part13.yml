chapter1:
  rows:
  - text:
      - "Кодовое имя отряда: «Одинокий волк»"
      - "Флагман: Курск"
      - "Периферия аванпоста Певек · Зона контроля Северного Парламента"
  - text:
      - "Снежинки кружились на ветру; с начала кампании прошло уже некоторое время."
      - "Всё это время флот неприметно продвигался в секторе, который даже не упоминался в плане развертывания сил."
      - "Как и гласило их кодовое имя, этот флот был «Одиноким волком» в операции «Ледяной дождь»."
  - char: "sevastopol"
    side: "left"
    text:
      - "Ху-ху-ху~ На самом деле наступление по всем направлениям — это лишь отвлекающий маневр, а его цель — прикрытие нашей миссии!"
  - char: "kursk"
    side: "right"
    text:
      - "Угу."
  - char: "sevastopol"
    side: "left"
    text:
      - "...А это значит, что мы и есть ядро всей этой кампании!"
  - char: "kursk"
    side: "right"
    text:
      - "Угу."
  - char: "sevastopol"
    side: "left"
    text:
      - "......Я заметила, товарищ Курск, ты не очень любишь поболтать?"
  - char: "kursk"
    side: "right"
    text:
      - "Угу."
  - char: "sevastopol"
    side: "left"
    text:
      - "......"
  - char: "kursk"
    side: "right"
    text:
      - "...Я слишком долго действовала в одиночку, поэтому не привыкла к пустой болтовне."
  - char: "sevastopol"
    side: "left"
    text:
      - "Вот как, вот как... Ничего страшного, поболтаем побольше — и привыкнешь!"
  - char: "kursk"
    side: "right"
    text:
      - "Хорошо."
  - char: "sevastopol"
    side: "left"
    text:
      - "Ахаха...... Точно-точно, я припасла кое-что отличное!"
      - "Мы еще не вошли в зону контроля Сирен, так что если мы немного этим насладимся, ничего страшного не случится..."
      - "Подожди минутку, сейчас найду......"
      - ".....Э? Куда подевались мои... «особые припасы»?!"
  - char: "voroshilov"
    side: "right"
    text:
      - "Поскольку во время боевых действий употребление алкоголя запрещено, я вычеркнула их из списка."
  - char: "sevastopol"
    side: "left"
    text:
      - "Аааа!!!"
      - "Это же было на случай, когда у нас появится свободная минутка, как сейчас... а еще чтобы отпраздновать победу!"
  - char: "voroshilov"
    side: "right"
    text:
      - "Операция официально началась ровно в тот момент, когда мы покинули аванпост Певек."
      - "Что касается празднования победы, поговорим об этом после завершения миссии."
      - "У товарища Курск ведь тоже нет возражений?"
  - char: "kursk"
    side: "left"
    text:
      - "Угу."
  - char: "voroshilov"
    side: "right"
    text:
      - "Отлично. Видишь, меньшинство подчиняется большинству."
  - char: "sevastopol"
    side: "left"
    text:
      - "Подожди! Товарищ Курск, пока мы не покинули нашу зону контроля, если мы сделаем пару глотков, в этом ведь нет ничего страшного, так?"
  - char: "kursk"
    side: "right"
    text:
      - "Угу."
  - char: "sevastopol"
    side: "left"
    text:
      - "Вот видишь, она тоже не возражает! Получается, в меньшинстве как раз ты!"
  - char: "voroshilov"
    side: "right"
    text:
      - "Возможно, в твоих словах есть доля истины. Но мы уже отплыли, ты что, собираешься возвращаться за ними?"
  - char: "sevastopol"
    side: "left"
    text:
      - "Я просто... сдаюсь перед тобой....."
  - text:
      - "Сквозь снежную бурю издалека прилетел белоснежный силуэт и вернулся к Курск."
      - "Стряхнув с себя налипший снег, птица тихо уселась на плечо Курск."
  - char: "kursk"
    side: "left"
    text:
      - "...Мы почти вошли в зону конфликта. Разведывательные самолеты сообщают, что впереди всё чисто."
  - char: "sevastopol"
    side: "right"
    text:
      - "Э... раз-разведывательные самолеты? Я видела только твою полярную сову!"
  - char: "kursk"
    side: "left"
    text:
      - "Разведывательные самолеты летят гораздо дальше впереди... вне поля твоего зрения."
  - char: "sevastopol"
    side: "right"
    text:
      - "Т-тогда почему ты узнала новости именно после того, как вернулась твоя полярная сова?!"
  - text:
      - "Услышав крик, полярная сова на плече Курск повернула голову на 180 градусов, и Севастополь скорчила ей гримасу."
      - "Но та никак не отреагировала, лишь молча закрыла глаза."
  - char: "sevastopol"
    side: "right"
    text:
      - "...Ладно, я поняла, ты не любишь болтать...."
  - char: "kursk"
    side: "left"
    text:
      - "Метель усиливается. Держитесь ближе ко мне и не отставайте."
  - char: "sevastopol"
    side: "right"
    text:
      - "Есть!"

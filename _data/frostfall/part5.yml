chapter1:
  rows:
  - text:
      - "Кодовое имя отряда: «Железный кулак»"
      - "Флагман: Советская Россия"
      - "Периферия архипелага Северная Земля · Зона контроля Сирен"
  - text:
      - "Снаряд разорвался прямо по курсу флота, подняв взрывом тучу ледяной крошки, заслонившую обзор."
  - char: "volga"
    side: "left"
    text:
      - "А!! Снова патруль Сирен... Продолжаем уклоняться?"
  - char: "sovetskaya_rossiya"
    side: "right"
    text:
      - "Да. Наша стратегия остается неизменной: корректируем курс и стараемся избегать боев, пока не достигнем периферии крепости на Северном полюсе."

chapter2:
  rows:
  - char: "volga"
    side: "left"
    text:
      - "Вражеский флот нас не преследует?.. Похоже, это был всего лишь автономный патруль."
  - char: "sovetskaya_rossiya"
    side: "right"
    text:
      - "Возможно, это патруль со стороны «Короны»."
  - char: "chapayev"
    side: "left"
    text:
      - "Или с той «Базы первопроходцев»? Мы ведь сейчас находимся в опасной зоне прямо между ними."
      - "Волга, сможешь определить?"
  - char: "volga"
    side: "right"
    text:
      - "Хм... Судя по их курсу, они, наверное, шли со стороны «Базы первопроходцев»."
      - "Впрочем, на самом деле я была там всего один раз... Надеюсь, их операция пройдет гладко."
  - char: "minsk"
    side: "left"
    text:
      - "Будем надеяться. Может, патруль не стал нас преследовать именно потому, что там уже начался бой?"
      - "Но я и подумать не могла, что мы наткнемся на патруль Сирен так близко к пункту снабжения."
      - "С нашим флотом снабжения всё будет в порядке?"
  - char: "sovetskaya_rossiya"
    side: "right"
    text:
      - "На этот счет можешь не волноваться."
      - "Из-за специфики нашего задания в этот раз снабжение в оборонительной зоне Сирен нам обеспечит флот подводных лодок."
      - "В данный момент их флот скрывается на глубине и всплывет только после того, как получит мой зашифрованный сигнал в заданной точке."
  - char: "minsk"
    side: "left"
    text:
      - "Снабжение с помощью флота подводных лодок?! Какая роскошь!"
  - char: "sovetskaya_rossiya"
    side: "right"
    text:
      - "Это лишь доказывает важность нашей миссии."
      - "Крепость на Северном полюсе — самое строго охраняемое Омиттер место, и информации о нем у нас практически нет."
      - "Но в одном можно быть уверенными: Сирены наверняка прячут там какой-то секрет, и мы должны его раскрыть."
  - char: "chapayev"
    side: "left"
    text:
      - "Нужно всего-то преодолеть «небольшие трудности»: проскользнуть между двумя крепостями Сирен, прорвать две линии обороны, а затем благополучно вернуться после разведки в самом сердце вражеской территории~"
  - char: "sovetskaya_rossiya"
    side: "right"
    text:
      - "Именно поэтому выполнение этого задания поручили нам. Это своего рода признание товарищами наших способностей."
      - "Конечно, без слаженного взаимодействия с другими отрядами выполнение нашей задачи было бы невозможным."
      - "Как обстоят дела с серийными моделями и запасами боеприпасов?"
  - char: "minsk"
    side: "left"
    text:
      - "Потери серийных моделей составляют около 30%, запасов боеприпасов более чем достаточно!"
  - char: "sovetskaya_rossiya"
    side: "right"
    text:
      - "Потерь больше, чем мы ожидали."
  - char: "minsk"
    side: "left"
    text:
      - "В нынешних условиях электромагнитного подавления обычные серийные модели вообще неэффективны, а выделенных нам новых серийных моделей крайне мало..."
      - "Было бы замечательно, если бы отряд «Скальпель» смог завершить свой бой пораньше."
  - char: "sovetskaya_rossiya"
    side: "right"
    text:
      - "Будем надеяться, но на поле боя не всё всегда идет так, как нам хочется."
      - "Сейчас в линии обороны Сирен появляются бреши благодаря полномасштабному наступлению других отрядов."
      - "Если мы упустим момент и позволим им залатать эти дыры, ситуация обернется совсем не в нашу пользу."
      - "У нас только один шанс, и мы не можем его упустить."
      - "Мы должны быть готовы к выполнению задачи в условиях сильных электромагнитных помех."
      - "Поэтому нужно постараться избежать ненужных потерь. До прибытия в заданную акваторию сохранение боеспособности является нашим главным приоритетом."
      - "Угу... Мы приближаемся к заданной зоне пополнения припасов, я посылаю сигнал."
      - "Всем сохранять бдительность, необходимо пополнить припасы как можно быстрее."
  - char: "all"
    side: "left"
    text:
      - "Принято!!!"

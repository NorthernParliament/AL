chapter1:
  rows:
  - text:
      - "Кодовое имя отряда: «Молот»"
      - "Флагман: Советская Белоруссия"
      - "Акватория вокруг «Короны» · Зона контроля Сирен"
  - text:
      - "БАБАХ!!!"
  - char: "gangut"
    side: "left"
    text:
      - "Ахахахахаха! И это всё, на что вы способны?!"
  - char: "kiev"
    side: "right"
    text:
      - "Прямо по курсу обнаружен новый флот подкрепления Сирен!"
  - char: "gangut"
    side: "left"
    text:
      - "Неважно, сколько их придет, исход будет один!"
      - "Продолжать огонь!"
  - char: "chkalov"
    side: "right"
    text:
      - "Прошу прощения, но эту волну подкреплений я беру на себя~"
  - text:
      - "Грохот артиллерийского огня разнесся по небу, но еще до этого флот подкрепления Сирен превратился в пылающие обломки от взрывов бесчисленных авиабомб."
  - char: "gangut"
    side: "left"
    text:
      - "Молодец, товарищ Чкалов. Такая мощь и правда внушает спокойствие!"
  - char: "chkalov"
    side: "right"
    text:
      - "Спасибо за похвалу, но сейчас это можно назвать лишь разминкой."
  - char: "sovetskaya_belorussiya"
    side: "left"
    text:
      - "...Какая неожиданно оживленная сцена."
      - "Хе-хе, раз уж мы подняли такой шум, главная виновница торжества, полагаю, может появиться в любой момент."
  - char: "communicator"
    side: "right"
    status: "is-red"
    text:
      - "Вы и впрямь...."
      - "За одним листом великой горы не видите! С двумя горошинами в ушах раскатов грома не слышите!"
      - "Не ожидала, что вы окажетесь настолько самоуверенными!"
      - "Думали, если начнете полномасштабное наступление, я не разгадаю ваших замыслов?!"
  - char: "sovetskaya_belorussiya"
    side: "left"
    text:
      - "Твое появление... совершенно лишено оригинальности."
  - char: "omitter"
    side: "right"
    status: "is-red"
    text:
      - "И ЧТО С ТОГО!"
      - "Разве ваше наступление не такое же?!"
      - "Одна тщетная попытка за другой, раз за разом одно и то же!"
  - char: "sovetskaya_belorussiya"
    side: "left"
    text:
      - "В этот раз — как знать."
      - "Раз уж ты утверждаешь, что разгадала наши замыслы, почему бы тебе не рассказать о них поподробнее?"
  - char: "omitter"
    side: "right"
    status: "is-red"
    text:
      - "Думаешь, меня можно отвлечь вашей болтовней?!"
      - "Вы подняли всю эту шумиху лишь для того, чтобы привлечь мое внимание и потянуть время!"
      - "Хотели привлечь мое внимание? Что ж, вы получили желаемое~ А вот потянуть время даже не надейтесь!"
      - "Вот покончу с вами, а потом разберусь с остальными направлениями!"
  - text:
      - "БАБАХ!!!"
  - char: "gangut"
    side: "left"
    text:
      - "Ахаха, смерть уже дышит в затылок, а ты всё ещё огрызаешься."
      - "Если хочешь сбежать, сначала придется пройти через нас!"
  - char: "omitter"
    side: "right"
    status: "is-red"
    text:
      - "Получайте! «Сияющая звездная река, рожденная в пасти, поглощающей небеса и землю»!"

chapter2:
  rows:
  - text:
      - "Ослепительно белая вспышка света пронеслась над поверхностью воды. Морская вода на её пути в мгновение ока закипела, а лед и не успевшие уклониться серийные корабли моментально превратились в пар."
  - char: "kiev"
    side: "left"
    text:
      - "Как горячо!"
  - char: "gangut"
    side: "right"
    text:
      - "Сразу перешла к главному, да... Нельзя позволять ей разрывать дистанцию, в ближний бой!"
      - "Посмотрим, сможешь ли ты в этот раз выкинуть еще какой-нибудь новый фокус!"
  - char: "chkalov"
    side: "left"
    text:
      - "Приборы передают, что эффект электромагнитного подавления исчезает, а сила ветра вокруг продолжает слабеть..."
      - "Отличная работа, отряды «Скальпель» и «Смерч»!"
  - char: "omitter"
    side: "right"
    status: "is-red"
    text:
      - "Тц... Если бы система Компилятор не вышла из строя... разве могло бы случиться так, что мне не хватит флота IV типа..."
      - "Уаааааа, да и плевать!"
      - "Сначала сосредоточу все силы на вашем уничтожении, а потом разберусь с остальными поодиночке!"
      - "Явись, флот Исполнителей IV типа!"
  - char: "chkalov"
    side: "left"
    text:
      - "...Флот IV типа? Это те новые зеленые серийные модели?.."
  - char: "gangut"
    side: "right"
    text:
      - "Ахахаха, кажется, ты всё-таки припрятала кое-что новенькое!"
  - char: "omitter"
    side: "left"
    status: "is-red"
    text:
      - "Ликуйте, вам выпала честь получить благословение конца из моих собственных рук!"
  - text:
      - "БАБАХ!!!"
  - char: "gangut"
    side: "left"
    text:
      - "Оставь это благословение себе."
      - "Разговоры излишни, товарищи, продолжаем наступление!"
  - text:
      - "Под сенью «Короны» воительницы с крайнего севера бросили вызов владычице этой акватории."
      - "Вспышки света перемежались беспорядочными звуками взрывов. Битва в этом месте, похоже, будет длиться еще очень, очень долго..."

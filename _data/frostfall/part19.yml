chapter1:
  rows:
  - text:
      - "Кодовое имя отряда: «Одинокий волк»"
      - "Флагман: Курск"
      - "Внешний периметр второй линии обороны Сирен · Неизвестное место"
  - char: "kursk"
    side: "left"
    text:
      - "Угу, отступить до этой позиции будет в самый раз."
      - "Дальше нам нужно сделать следующее... скрыть свое местоположение и терпеливо ждать."
  - char: "sevastopol"
    side: "right"
    text:
      - "О~~ Я поняла твои замыслы!"
      - "Чем бы ни была аномалия, которую мы расследуем, это место определенно очень важно для Сирен."
      - "Если эта META продолжит действовать в том же духе, Сирены точно не останутся в стороне."
      - "Ты хочешь, чтобы Сирены сначала помогли нам ослабить её, верно?!"
  - char: "kursk"
    side: "left"
    text:
      - "Именно. Когда два тигра дерутся, в выигрыше остается охотник."
      - "Сейчас на всех фронтах дела идут гладко, у нас достаточно времени для выполнения миссии."
      - "Аномальный сигнал всё еще фиксируется?"
  - char: "voroshilov"
    side: "right"
    text:
      - "Угу, всё еще есть. Похоже, противник тоже изменил план действий после того, как мы ему помешали."
  - char: "kursk"
    side: "left"
    text:
      - "......Хе-хе, Сирены уже отправились туда."
      - "А мы останемся в тени и будем ждать идеального момента, чтобы присоединиться к этой охоте..."
  - char: "communicator"
    side: "right"
    text:
      - "...Кхх... Кхх-кхх..."
  - char: "voroshilov"
    side: "left"
    text:
      - "Хм? Уровень помех в этой акватории не должен быть настолько сильным, чтобы нарушить нашу связь."
      - "..Неужели произошла поломка?"
  - char: "sevastopol"
    side: "right"
    text:
      - "Такую мелкую проблему, может быть, решит парочка ударов, смотри как надо~"
  - text:
      - "БАЦ!"
  - char: "communicator"
    side: "left"
    text:
      - "...[помехи]... говорит... [помехи]... Советский Союз... [помехи]..."
  - char: "sevastopol"
    side: "right"
    text:
      - "Хм... кажется, всё еще есть проблемы... но хотя бы звук появился!"
  - char: "kursk"
    side: "left"
    text:
      - "Тшш..."
  - char: "communicator"
    side: "right"
    text:
      - "...[помехи]... мы сейчас... [помехи]... в состоянии полной... [помехи]..."
      - "...[помехи]... операция «Полярная буря»... [помехи]... прекратить... [помехи]..."
      - "...[помехи]... всем флотам... [помехи]... собраться в... [помехи]..."
      - "...Кхх... Кхх-кхх..."
  - char: "sevastopol"
    side: "left"
    text:
      - "........?"
      - "Хоть я и не всё расслышала... но разве в этом сообщении только что не говорилось............"
  - char: "voroshilov"
    side: "right"
    text:
      - "Немедленно свяжись с товарищем Советский Союз, нужно узнать, что вообще произошло!"
  - char: "kursk"
    side: "left"
    text:
      - "Нет ответа."
  - char: "voroshilov"
    side: "right"
    text:
      - "А командование в Санкт-Петербурге?"
  - char: "kursk"
    side: "left"
    text:
      - "...Нет ответа."
  - char: "voroshilov"
    side: "right"
    text:
      - "Попробуй напрямую вызвать Верховный Совет!"
  - char: "kursk"
    side: "left"
    text:
      - ".....Тоже нет ответа."
  - char: "sovetskaya_rossiya_rad"
    side: "right"
    text:
      - "Вы меня слышите, отряд «Одинокий волк»!"
      - "Операция прекращена, пожалуйста, прервите радиомолчание и немедленно ответьте!"
  - char: "voroshilov"
    side: "left"
    text:
      - "Говорит Ворошилов... Связь стабильная, говорите."
  - char: "sovetskaya_rossiya_rad"
    side: "right"
    text:
      - "Слава богу... С вами еще можно связаться!"
      - "....Вы получили сообщение?"
  - char: "voroshilov"
    side: "left"
    text:
      - "Да, мы его получили, хоть оно и сильно прерывалось... Что вообще происходит?"
  - char: "sovetskaya_rossiya_rad"
    side: "right"
    text:
      - "...Мы сами в полном недоумении..."
      - "На данный момент можно с уверенностью сказать лишь то, что мы потеряли связь с Санкт-Петербургом."
      - "Однако связь с флотами в полярных водах и близлежащими базами работает нормально."
      - "..В общем, я уже назначила базу на архипелаге Северная Земля точкой сбора флота."
      - "Пожалуйста, сохраняйте спокойствие и сосредоточьтесь на том, чтобы оторваться от преследования флота Сирен."
      - "Как только мы выберемся из опасной зоны и вернемся в точку сбора, мы спланируем наши дальнейшие действия."
  - char: "voroshilov"
    side: "left"
    text:
      - "Учитывая нынешнюю ситуацию... это единственное, что нам остается."
  - char: "sovetskaya_rossiya_rad"
    side: "right"
    text:
      - "Хорошо, встретимся на базе архипелага Северная Земля."
  - char: "voroshilov"
    side: "left"
    text:
      - "Угу... до встречи на базе Северной Земли."

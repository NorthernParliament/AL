chapter1:
  rows:

    - char: prinz_adalbert
      side: left
      text:
        - "Смотрите вперёд! Там на воде... это человек?.."

    - char: u1206
      side: right
      text:
        - "А! Это же Шарнхорст из «Пепла»!"

chapter2:
  rows:

    - text:
      - "Среди нагромождения обломков отряд наконец обнаружил цель своих поисков."
      - "Шарнхорст, покрытая ранами и копотью, неподвижно дрейфовала на спине. Её вооружение — или то, что от него осталось — бесформенной грудой обломков плавало рядом. Она никак не реагировала ни на удары волн, ни на скрежет сталкивающегося с ней металла."

    - char: u1206
      side: left
      text:
        - "Эй! Ты слышишь?! Очнись!"

    - text:
      - "U-1206, вынырнувшая рядом, изо всех сил пыталась докричаться и растолкать её, но девушка на поверхности воды оставалась бездыханной."

    - char: u1206
      side: left
      text:
        - "Бесполезно… Она в глубоком обмороке."

    - char: elbe
      side: right
      text:
        - "Мы расстались всего несколько часов назад. Что же здесь произошло?"

    - char: magdeburg
      side: left
      text:
        - "Она же из «Пепла»! Она в одиночку раскидала целый отряд Энфорсеров за считанные минуты… Кто мог сотворить с ней такое?!"

    - char: prinz_adalbert
      side: right
      text:
        - "Узнаем только тогда, когда она придёт в себя…"

    - char: u1206
      side: left
      text:
        - "Те Энфорсеры, что занимались разбором завалов, направляются сюда… Неужели они хотят разобрать и её, приняв за обычный мусор?!"

    - char: magdeburg
      side: right
      text:
        - "Ну уж нет, так дело не пойдёт! К счастью, мы успели вовремя."

    - char: gneisenau_meta
      side: left
      status: is-yellow
      text:
        - "Грррррр......"

    - char: ulrich_von_hutten
      side: right
      text:
        - "Гнейзенау! …Успокойся."
        - "Судя по обстановке, продолжать игру в прятки не получится."
        - "1206, сосредоточься на спасательной операции. Остальные — нанести упреждающий удар, пока Сирены поглощены своей «стройкой»."
        - "Наша цель — спасение и прорыв. Никаких затяжных боев и преследований. Всем ясно?"

    - char: gneisenau_meta
      side: left
      status: is-yellow
      text:
        - "…На этот раз я сделаю так, как ты говоришь."

    - char: ulrich_von_hutten
      side: right
      text:
        - "Вот и славно. Всем кораблям — приготовиться к бою!"
chapter1:
  rows:

    - text:
      - "Стоило флоту Железной Крови начать атаку, как Сирены мгновенно перешли в контрнаступление. Сражение вспыхнуло сразу со всех сторон."
      - "Новые модели Сирен наступали с сокрушительной силой: внешний заслон из серийных крейсеров был прорван почти сразу, а линкоры не смогли выиграть даже пары лишних минут."

    - char: magdeburg
      side: left
      text:
        - "Что…?! Наши серийные корабли гибнут слишком быстро!"

    - char: prinz_adalbert
      side: right
      text:
        - "Мы ведь взяли с собой модели, чьи характеристики были доведены до уровня Сирен III типа. Как такое могло произойти…?!"

    - char: elbe
      side: left
      text:
        - "Одними лишь группами серийных самолётов превосходство в воздухе не удержать… Госпожа Ульрих, я вступаю в бой!"

    - char: ulrich_von_hutten
      side: right
      text:
        - "Добро."

    - char: prinz_adalbert
      side: left
      text:
        - "Нам тоже пора. Идём, Магдебург!"

    - char: magdeburg
      side: right
      text:
        - "Ага! С огневой мощью врага всё более‑менее ясно, так что пора задать им жару!"

    - char: u1206_rad
      side: left
      text:
        - "Госпожа Ульрих, подлодки Сирен окружают нас из‑под воды, среди них замечены новые типы «Луркеров»."

    - char: ulrich_von_hutten
      side: right
      text:
        - "Местоположение элитного командного юнита подтверждено?"

    - char: u1206_rad
      side: left
      text:
        - "Я до сих пор не обнаружила ни одной цели, похожей на командира!"

    - char: ulrich_von_hutten
      side: right
      text:
        - "Это явно организованная охота, но мы не можем найти даже управляющую систему."
        - "Без возможности вычислить узел управления наши привычные тактики против превосходящих сил Сирен не сработают…"

    - text:
      - "Пока Ульрих на мгновение погрузилась в раздумья, в кольце окружения Сирен внезапно прогремел мощнейший взрыв."

    - char: prinz_adalbert
      side: left
      text:
        - "Ульрих… Ты видела то, что сейчас произошло?.."

    - char: ulrich_von_hutten
      side: right
      text:
        - "Нет. Кто вызвал этот взрыв?"

    - char: prinz_adalbert
      side: left
      text:
        - "Я и сама не до конца разглядела…"

    - char: elbe
      side: right
      text:
        - "А я всё видела! Но в это трудно поверить… Что-то, прилетевшее только что с неба, двигалось со скоростью более 500 узлов!"
        - "Опять! Снова летят! Все, смотрите в небо!"

    - text:
      - "Девушки подняли головы. С неба на огромной скорости приближалось несколько объектов, напоминавших летящие ровным строем метеориты. Инверсионные следы, тянущиеся за ними, казалось, уходили за самый горизонт."
      - "Затем последовала серия стремительных попаданий — и новейшие корабли Сирен в мгновение ока превратились в пылающие факелы."

    - char: prinz_adalbert
      side: left
      text:
        - "Снаряды… На скорости свыше 500 узлов?"

    - char: magdeburg
      side: right
      text:
        - "Очередной залп! И снова точно в то же место! Сирены в том секторе практически полностью уничтожены!"

    - char: ulrich_von_hutten
      side: left
      text:
        - "В этой акватории определённо есть ещё какой‑то флот, ведущий бой с Сиренами."
        - "Кто бы ни стоял за этой атакой, это несомненный сигнал: «Идите в ту сторону»."
        - "Раз уж нам так любезно расчистили путь, почему бы не принять приглашение и не посмотреть, кто это?"
        - "Изменить курс! На полной скорости в образовавшуюся брешь. Идём на прорыв!"
chapter1:
  rows:

    - char: magdeburg
      side: left
      text:
        - "Фух! За нами больше не гонятся. Нам удалось оторваться от Сирен!"

    - char: elbe
      side: right
      text:
        - "Сказать «не гонятся» — это одно, но на деле всех врагов, пытавшихся нас догнать, просто стёрли в порошок…"

    - char: magdeburg
      side: left
      text:
        - "Какая невероятная мощь… Огромная скорость, колоссальная разрушительная сила, и при этом совершенно непонятно, откуда вёлся огонь."
        - "Это точно были снаряды?"

    - char: ulrich_von_hutten
      side: right
      text:
        - "Нет. Строго говоря, это были не снаряды, а ракеты с увеличенной дальностью полёта."

    - char: elbe
      side: left
      text:
        - "Ракеты… ракеты… Ах! Точно, я помню записи об испытаниях подобного оружия! Кажется, их ещё называют «управляемыми ракетами»!"
        - "Но разве это не сухопутное вооружение? Неужели их уже приняли на вооружение во флоте?!"

    - char: ulrich_von_hutten
      side: right
      text:
        - "Конечно нет. У наших прототипов всё ещё полно проблем, и до реального применения ещё очень далеко, не говоря уже о том, чтобы уместить их в оснастку."
        - "Внутри сингулярности и впрямь происходит много любопытного."

    - char: u1206
      side: left
      text:
        - "Докладываю! Впереди обнаружена небольшая флотилия, идущая на сближение. Состав — два корабля. Модели не опознаны, принадлежность неизвестна, сопровождение из серийных единиц отсутствует."

    - char: elbe
      side: right
      text:
        - "Неизвестную принадлежность я ещё могу понять, но что значит «модели не опознаны»?"

    - char: u1206
      side: left
      text:
        - "Ну, как бы это сказать… У них очень странная оснастка. Скоро сами увидите — поймёте."
        - "…Э‑э, мы ведь собираемся с ними встретиться, а не сражаться, верно?"

    - char: ulrich_von_hutten
      side: right
      text:
        - "Разумеется. Эта странная оснастка, должно быть, и есть инструмент для запуска тех ракет."
        - "Кто же это к нам пожаловал? Давайте выясним."

chapter2:
  rows:

    - char: an_shan
      side: left
      status: is-yellow
      text:
        - "Принадлежу Империи Дракона, эсминец с ракетным вооружением Ань Шань, бортовой номер 101. Рядом со мной моя сестра, также из Империи Дракона, эсминец с ракетным вооружением Чан Чунь, бортовой номер 103."

    - char: elbe
      side: right
      text:
        - "(Империя Дракона… Каким образом флот Империи Дракона оказался здесь?!)"

    - char: magdeburg
      side: left
      text:
        - "(И что ещё за «ракетный эсминец»? Эсминец, который использует ракеты?!)"

    - char: u1206
      side: right
      text:
        - "(Тсс!)"

    - char: ulrich_von_hutten
      side: left
      text:
        - "Принадлежу Железной Крови, флагман флота специальных операций, посланница Фридрих дер Гроссе, линкор Ульрих фон Хуттен."

    - char: an_shan
      side: right
      status: is-yellow
      text:
        - "Встретить вас здесь — большая неожиданность."
        - "Не могу сказать, что я в восторге от этой встречи, но в месте, столь переполненном Сиренами и разрушением, увидеть тех, с кем можно вести диалог — это уже неплохо."
        - "Мы заметили вас ещё в тот момент, когда вы вступили в бой с Сиренами."

    - char: ulrich_von_hutten
      side: left
      text:
        - "Вы решили прийти нам на выручку, зная, что мы — флот Железной Крови?"

    - char: an_shan
      side: right
      status: is-yellow
      text:
        - "Да. Мы вмешались, потому что в более широком смысле Сирены — наш общий враг."

    - char: ulrich_von_hutten
      side: left
      text:
        - " Вот оно как. Такова позиция Империи Дракона?"

    - char: an_shan
      side: right
      status: is-yellow
      text:
        - "Это лишь моё личное решение, принятое по ситуации."

    - char: chang_chun
      side: left
      status: is-yellow
      text:
        - "На самом деле, эта акватория и так входила в нашу зону зачистки. Мы начали атаку и только потом поняли, что там кто‑то есть…"

    - char: an_shan
      side: right
      status: is-yellow
      text:
        - "Чан Чунь…"

    - char: chang_chun
      side: left
      status: is-yellow
      text:
        - "А, ляпнула лишнего…"

    - char: an_shan
      side: right
      status: is-yellow
      text:
        - "Кхм. Что флот Железной Крови делает в этом месте?"

    - char: ulrich_von_hutten
      side: left
      text:
        - "А что флот Империи Дракона делает в этом месте?"

    - char: an_shan
      side: right
      status: is-yellow
      text:
        - "На этот счёт мне нечего вам сказать."

    - char: ulrich_von_hutten
      side: left
      text:
        - " В таком случае, мне тоже."

    - char: an_shan
      side: right
      status: is-yellow
      text:
        - "......"

    - char: ulrich_von_hutten
      side: left
      text:
        - " Тем не менее — я могу дать вам шанс увидеть всё своими глазами. Не желаете ли присоединиться к нам?"

    - char: an_shan
      side: right
      status: is-yellow
      text:
        - "Это невозможно. Наши отношения сейчас не того рода, чтобы мы могли мирно сражаться плечом к плечу, и причины этого, полагаю, вам известны лучше, чем кому‑либо другому."
        - "Но я дам вам один совет."
        - "Бросьте свои серийные корабли. В этом месте серийный флот будет лишь обузой."

    - char: ulrich_von_hutten
      side: left
      text:
        - "Имеешь в виду, что крупные силы легче обнаружить? Справедливо. В недавнем бою от кораблей массового производства действительно было мало толку…"

    - char: an_shan
      side: right
      status: is-yellow
      text:
        - "Тогда на этом и попрощаемся, странный флот Железной Крови. Ситуация в этой акватории становится всё опаснее, вам лучше уйти отсюда как можно скорее."

    - text:
      - "Девушки из Империи Дракона сразу после окончания разговора развернулись и без малейших колебаний набрали скорость, скрываясь из виду."
      - "Ульрих, казалось, хотела спросить что‑то ещё, но в итоге не стала их останавливать, лишь провожая взглядом удаляющийся флот."

    - char: magdeburg
      side: left
      text:
        - "По ощущениям — они слишком сильно отличаются от той Империи Дракона, которую мы знаем!"

    - char: elbe
      side: right
      text:
        - "Что же это всё‑таки за ракетная оснастка… Откуда у них то, чего нет даже у нас?.."

    - char: prinz_adalbert
      side: left
      text:
        - "Они знают о нашем существовании, но при этом сами не совсем такие, как в наших записях… Может, они — Империя Дракона из этого мира? И это причина, по которой они не напали на нас сразу?"

    - char: ulrich_von_hutten
      side: right
      text:
        - "Кто знает. Возможно, в этом мире — или, скажем так, в каждом из миров — отношения между фракциями выглядят совершенно иначе…"

    - char: prinz_adalbert
      side: left
      text:
        - "Редко увидишь, чтобы ты так колебалась в своих суждениях."

    - char: ulrich_von_hutten
      side: right
      text:
        - "Слишком мало информации, выводы делать рано."
        - "Идёмте. Мы и так задержались здесь слишком надолго."

    - char: prinz_adalbert
      side: left
      text:
        - "А как быть с флотом серийных кораблей? Хотя то, что от него осталось, сложно назвать флотом…"

    - char: ulrich_von_hutten
      side: right
      text:
        - "Оставим их здесь. Тащить их с собой не только опасно, но и бессмысленно."
        - "Пусть остаются тут — возможно, они ещё пригодятся нам на обратном пути."

    - char: u1206
      side: left
      text:
        - "И… в каком направлении двинемся теперь?"

    - char: ulrich_von_hutten
      side: right
      text:
        - "Хм… Путь, откуда мы пришли, закрыт. В той стороне, откуда прибыли корабли Империи Дракона, вряд ли осталось что‑то стоящее внимания."
        - "Пойдём туда."

    - text:
      - "Ульрих указала на сектор между направлением, откуда их атаковали, и курсом, которым ушли Ань Шань и Чан Чунь."

    - char: ulrich_von_hutten
      side: right
      text:
        - "Там всё завалено обломками, и флот Империи Дракона там явно не проходил. Направимся в ту сторону. META никогда не бывают далеко от мест войн и разрушений."

    - text:
      - "Флот Железной Крови решительно оставил серийные корабли и в сокращённом составе двинулся к новой цели."
      - "До закрытия «Башни Мидгарда» осталось 14 часов 30 минут."
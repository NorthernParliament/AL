chapter1:
  rows:

    - text:
      - "Когда флот Железной Крови прибыл на место, их глазам предстало истерзанное поле боя."
      - "Обломки, плавающие на поверхности, сбились в кучи, образовав целые острова из искарёженного металла. В самом центре, где концентрация этих «островов» была наибольшей, неподвижно застыл одинокий силуэт."

    - char: prinz_adalbert
      side: left
      text:
        - "Сражение уже окончено. Я слышала, что если это член группы «Пепел», то после боя она должна была сразу скрыться."
        - "Она не только не ушла, но и словно заворожённо любуется этим побоищем… Как‑то это ненормально."

    - char: u1206
      side: right
      text:
        - "И сейчас она смотрит прямо на нас… У меня аж мурашки по коже…"
        - "Этот облик… Неужели это Гнейзенау?!"

    - char: elbe
      side: left
      text:
        - "Лицом она и впрямь очень похожа на фройляйн Гнейзенау, но аура совершенно иная…"

    - char: magdeburg
      side: right
      text:
        - "Я впервые так близко вижу META…"
        - "От неё так и веет железом и кровью, и при этом она будто смотрит на нас и улыбается… Мне становится не по себе!"

    - char: ulrich_von_hutten
      side: left
      text:
        - "Железо и кровь — нам это очень подходит, не так ли? Мало того, что она не принадлежит к «Пеплу», так ещё и из наших, из Железной Крови. Мы сорвали джекпот."

    - char: prinz_adalbert
      side: right
      text:
        - "Ладно, мы её нашли. Но как ты собираешься «убеждать» её присоединиться? Она совсем не похожа на того, с кем можно вести нормальный диалог."

    - char: ulrich_von_hutten
      side: left
      text:
        - "Мы не узнаем этого, пока не заговорим с ней."

    - char: prinz_adalbert
      side: right
      text:
        - "Ты ведь не собираешься?..!"

    - text:
      - "Ульрих ничего не ответила. Она лишь жестом приказала флоту занять боевые позиции на месте, а сама в одиночку направилась вперёд."

chapter2:
  rows:

    - char: gneisenau_meta
      side: left
      status: is-yellow
      text:
        - "…«Пешки» не атакуют."

    - char: ulrich_von_hutten
      side: right
      text:
        - "Я не «пешка» и не серийная модель. Я живая, настоящая кансен."

    - char: gneisenau_meta
      side: left
      status: is-yellow
      text:
        - "Что настоящая кансен забыла в таком месте… И как она посмела явиться прямо ко мне?.."

    - char: ulrich_von_hutten
      side: right
      text:
        - "Потому что в моём сердце есть надежда и стремление."

    - char: gneisenau_meta
      side: left
      status: is-yellow
      text:
        - "Это выгоревший мир. Здесь нет надежды, и уж тем более не должно быть стремлений."

    - char: ulrich_von_hutten
      side: right
      text:
        - "Это решать мне, Ульрих фон Хуттен."
        - "Гнейзенау, именем Фридрих дер Гроссе я приказываю тебе: вновь присягни на верность Железной Крови."

    - char: gneisenau_meta
      side: left
      status: is-yellow
      text:
        - "Вновь присягнуть на верность? Твои слова звучат на редкость странно."
        - "Я сражаюсь, сражаюсь, сражаюсь, сражаюсь… Я сражаюсь здесь до сих пор."
        - "Без товарищей, без подчинённых, без командиров… Даже когда от самой Железной Крови ничего не осталось, я продолжаю бой."
        - "Разве прямо сейчас я не доказываю свою верность Железной Крови?"

    - char: ulrich_von_hutten
      side: right
      text:
        - "…Вот оно что. Тогда всё упрощается. Воля Фридрих дер Гроссе — это воля самой Железной Крови. Присоединяйся к нам."

    - char: gneisenau_meta
      side: left
      status: is-yellow
      text:
        - "Фридрих дер Гроссе? Никогда не слышала этого имени. Неужели в Железной Крови и правда есть кто‑то с таким именем?"
        - "Хи‑хи‑хи… Плохо прикрываться вымышленными именами, чтобы набить себе цену."
        - "…Если присмотреться, я и тебя‑то не особо узнаю. Сказала, тебя зовут Ульрих фон Хуттен, верно?"
        - "Не знаю такую… Не припоминаю… Хи‑хи‑хи‑хи! Какая‑то мелкая сошка вроде тебя смеет мне приказывать?!"

    - char: ulrich_von_hutten
      side: right
      text:
        - "Дерзость. Ты что, окончательно лишилась рассудка?"

    - char: gneisenau_meta
      side: left
      status: is-yellow
      text:
        - "Верно! Я безумна, и весь этот мир безумен!"
        - "В этом сумасшедшем мире лишь безумие является нормой. А вы, «нормальные», настолько здесь неуместны, что меня от вас тошнит!"
        - "Исчезните!!!"

    - char: ulrich_von_hutten
      side: right
      text:
        - "Цыц… Всем открыть огонь! Прежде чем продолжать разговор, нужно заставить эту сумасшедшую остыть!"

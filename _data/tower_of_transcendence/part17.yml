chapter1:
  rows:

    - char: gneisenau_meta
      side: left
      status: is-yellow
      text:
        - "…… Всем — полная боевая готовность."

    - char: ulrich_von_hutten
      side: right
      text:
        - "Что такое? Ты что‑то обнаружила?"

    - char: gneisenau_meta
      side: left
      status: is-yellow
      text:
        - "Неужели вы не чувствуете… насколько здесь всё стало «не так»?"

    - char: elbe
      side: right
      text:
        - "А? Вокруг всё те же обломки, что и раньше. Радары и самолёты‑разведчики не фиксируют ничего заслуживающего внимания."

    - char: gneisenau_meta
      side: left
      status: is-yellow
      text:
        - "Тогда заставь своих пилотов смотреть в оба!"

    - char: ulrich_von_hutten
      side: right
      text:
        - "Ты кажешься встревоженной. Что именно тебя беспокоит?"

    - char: gneisenau_meta
      side: left
      status: is-yellow
      text:
        - "Эти обломки… не моих рук дело."

    - char: magdeburg
      side: right
      text:
        - "Э‑э… Пока мы шли сюда, обломки были повсюду. Может, их оставил кто‑то другой?"

    - char: gneisenau_meta
      side: left
      status: is-yellow
      text:
        - "Те были моими."

    - char: magdeburg
      side: right
      text:
        - "Ха‑а?! Весь тот колоссальный масштаб разрушений — это всё сделала ты одна?"

    - char: gneisenau_meta
      side: left
      status: is-yellow
      text:
        - "Да."
        - "Кроме вас, я уже довольно долгое время не встречала в этой акватории ни одной живой души."

    - char: u1206
      side: right
      text:
        - "А вот и нет! До встречи с тобой мы наткнулись на небольшую флотилию Империи Дракона!"

    - char: gneisenau_meta
      side: left
      status: is-yellow
      text:
        - "Флот Империи Дракона? Не видела…"
        - " Возможно, они намеренно обходили меня стороной… Хех, надо же, они до сих пор не сдались."

    - char: ulrich_von_hutten
      side: right
      text:
        - "Не сдались в чём?"

    - char: gneisenau_meta
      side: left
      status: is-yellow
      text:
        - "Неважно… Глядя на то, что здесь творится, и так всё ясно: чего бы они ни пытались достичь, они потерпели крах."
        - "Но флот Империи Дракона… Нет, всё равно что‑то не сходится. Они не жалуют крупный калибр, эти обломки совсем не в их стиле."

    - char: elbe
      side: right
      text:
        - "Гнейзенау, твоя интуиция тебя не подвела… В этой акватории действительно есть кто‑то ещё!"
        - "Я ещё раз тщательно проанализировала полученные снимки. Совсем рядом с нами обнаружена почти неподвижная цель… Но радары по‑прежнему молчат!"

    - char: ulrich_von_hutten
      side: left
      text:
        - "Похоже, загадка решена. Здесь поработала другая META."
        - "Видишь, в этих водах не так уж и пустынно, как ты думала."

    - char: gneisenau_meta
      side: right
      status: is-yellow
      text:
        - "Странно… Что за ветер сегодня дует… Откуда вы все лезете один за другим?"

    - char: elbe
      side: left
      text:
        - "Судя по внешнему виду… Неужели это Шарнхорст META?!"

    - char: ulrich_von_hutten
      side: right
      text:
        - "Шарнхорст, появившаяся в этом секторе… Она твоя знакомая?"

    - char: gneisenau_meta
      side: left
      status: is-yellow
      text:
        - "Не знаю её. Флот Железной Крови в этом мире перестал существовать уже очень давно…"

    - char: ulrich_von_hutten
      side: right
      text:
        - " Вот оно как."

    - char: elbe
      side: left
      text:
        - "Цель также заметила нас. Она медленно движется на сближение."

    - char: ulrich_von_hutten
      side: right
      text:
        - "МЕТА, готовые к диалогу — большая редкость. Что ж, чем больше, тем лучше. Пойдёмте, поприветствуем гостью."
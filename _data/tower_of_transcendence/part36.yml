chapter1:
  rows:

    - char: saratoga_rad
      side: left
      text:
        - "Вот эта, эта... и ещё вон та!"
        - "Ну правда, что они там себе думают?!"
        - "У сестрёнки Сары от этих дел скоро волосы выпадать начнут!"

    - text:
      - "Саратога на экране монитора ворчала, яростно копаясь в огромных стопках бумаг."
      - "Горы документов выглядели так, будто вот-вот обрушатся и похоронят под собой Сару, которая явно не смыкала глаз несколько суток подряд."
      - "Впрочем, у меня дела обстояли не намного лучше."
      - "Таинственные перемещения флота Железной Крови и кратковременная погодная аномалия в Южном Тихом океане... Между этими событиями определённо есть связь. Однако, сколько бы мы ни анализировали имеющиеся данные, инцидент остаётся окутан тайной."

    - char: saratoga_rad
      side: left
      text:
        - "По крайней мере, мы установили примерный район происшествия и смогли раздобыть мутные снимки того гигантского устройства."
        - "А ещё мы почти уверены, что операцию проводили две группы: одна под командованием Ульрих фон Хуттен, а другая — Петера Штрассера."
        - "Но вот назначение этой махины и конкретные задачи Железной Крови... Это просто стена! Мы ничего не можем разузнать!"
        - "Всё из-за их новых протоколов шифрования, точно тебе говорю!.."

    - char: commander
      side: right
      text:
        - "Удалось восстановить связь с научно-исследовательской станцией в Антарктике?"

    - char: saratoga_rad
      side: left
      text:
        - "Да, связь восстановлена! Они подтвердили, что в Южном Тихом океане был зафиксирован «запредельный» выброс энергии."
        - "Хорошо ещё, что это произошло на приличном расстоянии от станции, иначе простым обрывом связи мы бы не отделались..."
        - "Ой, подожди секунду, Командир. Поступило экстренное сообщение из штаба..."
        - "..А? Стой, это ещё что такое?! И почему личное сообщение для Командира пришло через общие каналы штаба?!"
        - "...Северный Парламент прислал это прямо так?! Просто... слов нет."
        - "Немедленно свяжитесь со штабом в Санкт-Петербурге, нам нужны объяснения!"

    - char: commander
      side: right
      text:
        - "Что случилось?"

    - char: saratoga_rad
      side: left
      text:
        - "...Наши союзники из Северного Парламента, кажется, «перепутали» адрес штаба с твоим личным почтовым ящиком."
        - "Судя по содержанию... Командир, похоже, в ближайшее время тебе придётся вернуться в штаб Нью-Йорка на срочное совещание..."
chapter1:
  rows:

    - char: prinz_adalbert
      side: left
      text:
        - "Здесь всё ещё поднимается дым. Похоже, бой закончился совсем недавно."

    - char: u1206
      side: right
      text:
        - "Вы заметили эти обломки?"

    - char: magdeburg
      side: left
      text:
        - "А что в них такого? Обломки как обломки…"

    - char: u1206
      side: right
      text:
        - "Ну не знаю, мне они кажутся какими‑то странными. Не могу точно объяснить, в чём дело…"

    - char: magdeburg
      side: left
      text:
        - "Ну, ты уж постарайся!"

    - char: u1206
      side: right
      text:
        - "М‑м‑м… Ощущение, будто это старый, покрытый пылью унитаз. Вроде бы заброшен, но на самом деле может заработать в любой момент…"

    - char: prinz_adalbert
      side: left
      text:
        - "…Пояснишь?"

    - char: u1206
      side: right
      text:
        - "Я имею в виду расположение и саму фактуру обломков! Под водой это заметно гораздо лучше… Хоть они и кажутся разбросанными хаотично, в них прослеживается какая‑то закономерность."
        - "Выглядят как случайно уничтоженный мусор, но на них словно видны следы обработки."
        - "Кажется, что они неподвижны, но при этом не покидает чувство, что они вот‑вот оживут!"

    - char: prinz_adalbert
      side: left
      text:
        - "Всё, приехали. Похоже, бедняжка U‑1206 слишком долго находилась рядом с Ульрих и окончательно «синхронизировалась» с её стилем."

    - char: u1206
      side: right
      text:
        - "Вовсе нет! Я правда это чувствую! Не верите — ныряйте и посмотрите сами!"

    - char: magdeburg
      side: left
      text:
        - "Это технически невозможно!"

    - char: u1206
      side: right
      text:
        - "А как же с воздуха? Неужели сверху ничего странного не видно?!"

    - char: elbe
      side: left
      text:
        - "Ну‑у… Если не считать того, что обломков здесь аномально много, то больше ничего."
        - "К тому же обзор сверху сейчас не лучший — повсюду гарь и густой туман. Но я всё же думаю, что обломки — это просто обломки."

    - char: ulrich_von_hutten
      side: right
      text:
        - "Когда заходишь на кладбище, всегда возникают подобные чувства."
        - "Вокруг пусто и холодно, но создаётся иллюзия, будто здесь толпы людей."
        - "Погребённые давно ушли, но не покидает ощущение, что они вот‑вот вернутся к нам."
        - "Без сомнения, это место — гигантская братская могила."
        - "А мы — расхитители гробниц, те, кто тревожит покой усопших душ."

    - char: prinz_adalbert
      side: left
      text:
        - "В этом вся Ульрих. Твои метафоры в каком‑то смысле ничем не уступают «унитазной теории» U‑1206…"

    - char: magdeburg
      side: right
      text:
        - "От таких разговоров становится не по себе… Надеюсь, на нас не выскочит внезапно какое‑нибудь чудовище…"

    - text:
      - "На этот вопрос Ульрих фон Хуттен лишь загадочно улыбнулась, оставив его без ответа."

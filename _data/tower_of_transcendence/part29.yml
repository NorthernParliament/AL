chapter1:
  rows:

    - char: elbe
      side: left
      text:
        - "Вижу приближающийся флот Сирен! Помимо Энфорсеров VI «Комбинатор», в их составе замечен ещё один неизвестный тип человекоподобных моделей!"

    - char: ulrich_von_hutten
      side: right
      text:
        - "Полагаю, это и есть те самые Энфорсеры VI «Аттракция»?"

    - char: scharnhorst_meta_d1?
      side: left
      status: is-yellow
      text:
        - "Да, это они… Будьте начеку, их индивидуальная боевая мощь колоссальна."

    - char: elbe
      side: right
      text:
        - "Погодите… Похоже, это ещё не всё. Посмотрите на горизонт, поверхность воды вдали начала меняться!"

    - char: ulrich_von_hutten
      side: left
      text:
        - "Выглядит скверно. Тебе что-нибудь известно об этом феномене?"

    - char: scharnhorst_meta_d1?
      side: right
      status: is-yellow
      text:
        - "В моих данных об этом ничего нет… Но одно я знаю точно: оставаться в этой зоне нельзя ни в коем случае."

    - char: ulrich_von_hutten
      side: left
      text:
        - "Согласна. Не ввязываться в затяжной бой! Полный вперед, прорываемся к Башне Мидгарда!"
chapter1:
  rows:

    - char: magdeburg
      side: left
      text:
        - "Слушайте, народ… Мы точно идём тем же путём, что и пару часов назад?"
        - "Прошло всего ничего, а пламя на обломках уже погасло… Вокруг так тихо, что аж мурашки по коже."

    - char: elbe
      side: right
      text:
        - "У меня те же ощущения… Кажется, даже температура упала. Да и сами обломки выглядят как-то… неестественно, что ли."

    - char: prinz_adalbert
      side: left
      text:
        - "Кажется, я уже слышала нечто подобное от U-1206, когда мы только прибыли…"
        - "U-1206, поднимись на поверхность, посмотри. У этих обломков тот же вид, что и у тех, которые ты видела раньше?"
        - "U-1206……?"

    - char: u1206_rad
      side: right
      text:
        - "Тш-ш-ш! Слышите? Откуда-то доносится ритмичный стук… Словно на какой-то стройплощадке…"

    - char: magdeburg
      side: left
      text:
        - "Я ничего не слышу. Наверное, под водой звук разносится чётче."
        - "Можешь понять, откуда он идёт?"

    - char: u1206
      side: right
      text:
        - "М-м… Такое чувство, что он повсюду. Будто кто-то молотит по металлическому корпусу…"

    - text:
      - "Пока все замерли, пытаясь уловить шум, издалека донёсся отчётливый, тяжёлый грохот — звук падения чего-то массивного в океан."

    - char: u1206_rad
      side: right
      text:
        - "Ну, вот это-то вы точно слышали!"

    - char: elbe
      side: left
      text:
        - "Это что, обломки кораблей начали рушиться сами по себе?!"

    - text:
      - "Следом за первым ударом похожие звуки посыпались со всех сторон — то громче, то тише, перекликаясь друг с другом в жуткой симфонии."

    - char: ulrich_von_hutten
      side: left
      text:
        - "Всем прекратить движение. Внимательно осмотрите зону обломков. Здесь что-то не так."

    - char: magdeburg
      side: right
      text:
        - "А! Среди обломков засада Сирен! Это те самые Энфорсеры VI «Комбинаторы», с которыми мы сталкивались!"
        - "Весь этот шум и грохот вокруг — их рук дело!"

    - char: prinz_adalbert
      side: left
      text:
        - "Что?! Радары их вообще не видят. Эти груды металла создают слишком много помех…"

    - char: elbe
      side: right
      text:
        - "У меня та же ситуация… Когда мои самолёты пролетали здесь раньше, они тоже не заметили врагов, затаившихся среди обломков. Простите!"

    - char: ulrich_von_hutten
      side: left
      text:
        - "Ничего страшного. Если присмотреться, их полно и в тех секторах, которые мы только что миновали."
        - "Видимо, мы ещё не привыкли иметь дело с Сиренами, которые не проявляют открытой враждебности."

    - char: magdeburg
      side: right
      text:
        - "И что они творят? Решили переквалифицироваться в строительную бригаду?.."
        - "Мы проходим прямо у них под носом, а они ноль внимания. Какое редкое усердие."

    - char: u1206_rad
      side: left
      text:
        - "Я тут разведала потихоньку… Все отрезанные куски они утаскивают глубоко-глубоко под воду!"

    - char: prinz_adalbert
      side: right
      text:
        - "Хм… Какая-то вторичная переработка ресурсов? И что нам делать, атакуем?"

    - char: ulrich_von_hutten
      side: left
      text:
        - "Фактически мы уже в окружении. Однако, похоже, сейчас эти Энфорсеры больше заинтересованы в металлоломе, чем в нас."
        - "Не провоцируйте их. Время поджимает, проходим максимально быстро."

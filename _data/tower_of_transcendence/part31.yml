chapter1:
  rows:

    - char: u1206_rad
      side: left
      text:
        - "Госпожа Ульрих! Под водой обнаружен приближающийся противник! Мы ещё не закончили текущий бой, не успеваем вернуться для поддержки!"

    - char: ulrich_von_hutten
      side: right
      text:
        - "Рассчитали время и ударили подлодками именно тогда, когда наши эсминцы прикрытия заняты... Нехватка сил всегда ведёт к брешам в обороне. Какие же они приставучие."
        - "К счастью, я заранее подготовила комплект противолодочного оборудования. А вы?"

    - char: gneisenau_meta
      side: left
      text:
        - "Что за вопрос... Я сражалась здесь в одиночку ещё до вашего появления."

    - char: scharnhorst_meta_d1?
      side: right
      status: is-yellow
      text:
        - "Так повреждения твоих ног — дело рук подлодок Сирен?"

    - char: gneisenau_meta
      side: left
      status: is-yellow
      text:
        - "Пустяки, на боеспособность не влияет. Лучше бы о себе позаботилась."
        - "Твоё противолодочное снаряжение ведь пришло в негодность, я права?"

    - char: scharnhorst_meta_d1?
      side: right
      status: is-yellow
      text:
        - "......"

    - char: ulrich_von_hutten
      side: left
      text:
        - "Мы вдвоём справимся и здесь. Противолодочная охота на линкорах — это даже забавно."

    - char: gneisenau_meta
      side: right
      status: is-yellow
      text:
        - "Нет. Здесь я справлюсь сама. Уводи Шарнхорст, она сейчас всё равно не боец."
        - "……Что за лица? Этим Сиренам придётся сильно постараться, чтобы заставить меня принести себя в жертву."
        - "К тому же, я больше не планирую умирать... Просто хочу оставить им на прощание парочку «ярких» воспоминаний."
        - "Раз поняли — проваливайте и не путайтесь под ногами!"
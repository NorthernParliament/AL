chapter1:
  rows:

    - char: elbe
      side: left
      text:
        - "Госпожа Ульрих, смотрите! Уже видно сияние Башни Мидгарда!"

    - char: magdeburg
      side: right
      text:
        - "На таймере ещё больше сорока минут, мы точно успеем!"

    - char: u1206
      side: left
      text:
        - "Да, но у меня такое чувство, что сзади на огромной скорости приближается что-то нереально жуткое!!!"

    - char: prinz_adalbert
      side: right
      text:
        - "Не оборачивайся! Просто жми вперёд!"

    - char: ulrich_von_hutten
      side: left
      text:
        - "Ускориться! Ещё немного, продержитесь..."

chapter2:
  rows:

    - char: mainz
      side: left
      text:
        - "Госпожа Ульрих, флот развёрнут. Теперь предоставьте всё нам."

    - char: roon
      side: right
      text:
        - "Какое редкое зрелище — видеть вас в таком плачевном состоянии, госпожа Ульрих."

    - char: ulrich_von_hutten
      side: left
      text:
        - "Вовремя... Но почему только вы двое?"

    - char: roon
      side: right
      text:
        - "Ну вот, такой трогательный момент, а вы сразу к делу..."
        - "Раз наша задача — огневая поддержка отхода, то нас с Майнц здесь более чем достаточно."

    - char: mainz
      side: left
      text:
        - "Именно так, госпожа Ульрих. Эгир и Август фон Парсеваль получили срочный приказ от Фридриха дер Гроссе и были временно переброшены."

    - char: ulrich_von_hutten
      side: right
      text:
        - "Какая жалость... Будь вы здесь в полном составе, я бы и впрямь рискнула навязать им настоящий бой..."

    - char: mainz
      side: left
      text:
        - "Кто знает, возможно, Фридрих дер Гроссе как раз учла это и потому отозвала их в последний момент."

    - char: roon
      side: right
      text:
        - "«Раненым» не стоит забивать голову лишними мыслями, просто отступайте. А ту громадину, что висит у вас на хвосте, предоставьте нам."
        - "Подумать только, так сильно вас обидеть… Даже не знаю, что мне с ней сделать. Хе-хе-хе…"

    - char: gneisenau_meta
      side: left
      status: is-yellow
      text:
        - "Когда она успела подобраться так близко?!"

    - char: scharnhorst_meta_d1?
      side: right
      status: is-yellow
      text:
        - "Всем приготовиться! Это она… Арбитр Влюблённые VI!"

    - char: mainz
      side: left
      text:
        - "Хм……? А это ещё кто такие?"

    - char: ulrich_von_hutten
      side: right
      text:
        - "Ситуация сложная, объясню всё по возвращении."

    - char: mainz
      side: left
      text:
        - "Поняла."

    - char: prinz_adalbert
      side: right
      text:
        - "Ульрих, мои повреждения не так серьезны. Позволь мне тоже остаться в арьергарде."

    - char: ulrich_von_hutten
      side: left
      text:
        - "Хорошо. Но помни: ни в коем случае не давай им втягиваться в затяжной бой. Мы уходим."

    - char: prinz_adalbert
      side: right
      text:
        - "Я справлюсь, не волнуйся."

    - char: roon
      side: left
      text:
        - "Счастливого пути!"

    - text:
      - "Под оглушительный гул двигателей отряд Ульрих на полной скорости ворвался в бушующее впереди лазурное сияние."

chapter3:
  rows:

    - text:
      - "Почти в то же мгновение над сияющей бездной Башни Мидгарда возник исполинский белый силуэт."

    - char: roon
      side: left
      text:
        - "Так это ты и есть — Арбитр Влюблённые VI?"

    - text:
      - "В ответ — тишина. В частотах флота, которые для Сирен обычно открыты как на ладони, не раздалось ни единого звука."
      - "Вместо слов Арбитр ответила делом: ослепительный луч колоссальной мощи прочертил горизонт, взметнув в небо тонны воды, которая обрушилась на корабли Железной Крови подобно локальному шторму."

    - char: roon
      side: left
      text:
        - "Похоже, нам попался молчаливый тип… Майнц, посмотри, как самонадеянно эта тварь застыла прямо перед нами, совершенно не заботясь о защите. Ну что, проверим её калибр?"

    - char: mainz
      side: right
      text:
        - "Само собой. Я проделала весь этот путь лишь ради этого мгновения."

    - char: prinz_adalbert
      side: left
      text:
        - "Девочки, только не увлекайтесь! Сингулярность вот-вот схлопнется, нам тоже нужно успеть убраться отсюда."

    - char: roon
      side: right
      text:
        - "Я всё прекрасно помню. Но даже если у нас в запасе всего пара минут — давайте устроим здесь настоящий ад!"

    - text:
      - "До закрытия Башни Мидгарда осталось — 0 часов 21 минута."
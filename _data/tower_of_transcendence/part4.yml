chapter1:
  rows:

    - text:
      - "Пока девушки из Железной Крови обедали, внезапно раздалась размеренная вибрация."

    - char: prinz_adalbert
      side: left
      text:
        - "Посуда и пол внезапно задрожали…"

    - char: peter_strasser
      side: right
      text:
        - "Это знак того, что запуск сингулярности проходит успешно."

    - char: prinz_heinrich
      side: left
      text:
        - "Петер! Ты наконец‑то закончила совещание! Что нам делать дальше? После запуска наша работа будет закончена?"

    - char: peter_strasser
      side: right
      text:
        - "Наша работа будет считаться завершённой только тогда, когда исследовательский флот госпожи Ульрих войдёт в сингулярность, а затем благополучно выйдет обратно."

    - char: prinz_heinrich
      side: left
      text:
        - "Ура! А дальше — отпуск…"

    - char: peter_strasser
      side: right
      text:
        - "При условии, что всё пройдёт гладко. Сейчас, когда искусственная сингулярность активирована, наша маскировка исчезла. В ближайшее время нам определённо придётся иметь дело с незваными гостями в лице Сирен."

    - char: prinz_heinrich
      side: left
      text:
        - "Ничего страшного! Если Сирены заявятся, это будет отличный повод размяться!"

    - char: weser_rad
      side: right
      text:
        - "Штрассер, на связи Везер, выполняю разведку."
        - "Твои догадки подтвердились: система «Гало» выходит из строя. В окрестных водах уже замечен авангард флота Сирен."

    - char: peter_strasser
      side: left
      text:
        - "Как же они быстро…"

    - char: u1206_rad
      side: right
      text:
        - "Судя по моим наблюдениям с передовой… У меня есть одна хорошая новость и одна плохая. Какую хотите услышать первой?"

    - char: peter_strasser
      side: left
      text:
        - "Ты… Только что прибывшая U‑1206? Докладывай по порядку."

    - char: u1206_rad
      side: right
      text:
        - "Хорошая новость: среди нападающих в основном серийные модели."
        - "А плохая новость в том, что гигантская «Башня Мидгарда» сейчас — словно факел в ночи, и мы в его свете — самая заметная мишень!"

    - char: elbe
      side: left
      text:
        - " U‑1206, и как это ты успела? Стоило нам на миг потерять тебя из виду, как ты уже отправилась патрулировать вместе с Везер."

    - char: u1206_rad
      side: right
      text:
        - "Само как‑то вышло, всё шло своим чередом!"

    - char: magdeburg
      side: left
      text:
        - "Не ожидала, что обед пропустит не Адальберт, а ты."

    - char: u1206_rad
      side: right
      text:
        - "Хе‑хе, вовсе нет. На втором причале тоже есть столовая, Везер меня уже туда водила!"
        - "Мы с Везер первыми нанесём внезапный удар, чтобы выиграть время, но я советую как можно скорее развернуть линию обороны."

    - char: peter_strasser
      side: left
      text:
        - "Согласна. Вместо глухой обороны лучше действовать на опережение и устранять угрозы на расстоянии."
        - "Впрочем, тем, кто готовится к исследовательской миссии, вступать в бой не нужно. Пожалуйста, направляйтесь прямиком во внутреннее кольцо — госпожа Ульрих уже ждёт вас."

    - char: prinz_adalbert
      side: right
      text:
        - "Хочешь сказать, нам стоит просто стоять в сторонке и наблюдать?"

    - char: peter_strasser
      side: left
      text:
        - "Защищать «Башню Мидгарда» силами флота и обеспечивать ваш безопасный вход в сингулярность — это наша работа."
        - "Вести флот в саму сингулярность и проводить там разведку — это ваша работа. У нас чёткое разделение обязанностей, так что не берите в голову лишнего."

    - char: prinz_adalbert
      side: right
      text:
        - "Резонно, ты права. Эльба, Магдебург и U‑1206 (где бы ты сейчас ни была)."
        - "Выдвигаемся во внутреннее кольцо, у нас есть важная задача."
        - "Генрих, удачи в битве на внешнем периметре."

    - char: prinz_heinrich
      side: left
      text:
        - "Не волнуйся! В последнее время особо не выпадало шанса повоевать, а сейчас, когда я только что плотно поела — самое время задать жару!"
        - "Выдвигаемся! В бой! В бо‑о‑ой!"
chapter1:
  rows:

    - text:
      - "Вступление Шарнхорст в бой в корне переломило ситуацию. Используя разрушительную огневую мощь и маневренность, до которой Энфорсерам было далеко, она грациозно и безжалостно собирала «жатву» на поверхности моря."
      - "Победа была определена менее чем за двадцать минут."

    - char: magdeburg
      side: left
      text:
        - "Какая мощь… Она даже сильнее, чем Гнейзенау META. Вот она — истинная сила флота «Пепла»."

    - char: u1206
      side: right
      text:
        - "Враг начал отступать, словно отлив!"

    - char: elbe
      side: left
      text:
        - "Действуют решительно… Однако, скорее всего, после переоценки ситуации они сменят тактику. Следующая атака будет куда более изощренной."

    - char: ulrich_von_hutten
      side: right
      text:
        - "Каково состояние флота?"

    - char: prinz_adalbert
      side: left
      text:
        - "У всех легкие повреждения, боезапас израсходован наполовину. Состояние Гнейзенау ухудшилось, повреждения стали серьезнее…"

    - char: gneisenau_meta
      side: right
      status: is-yellow
      text:
        - "Я в порядке. Ваша забота мне ни к чему."

    - char: ulrich_von_hutten
      side: left
      text:
        - "Сейчас ты — часть флота Железной Крови. Членам флота необходимо знать состояние друг друга."

    - char: gneisenau_meta
      side: right
      status: is-yellow
      text:
        - "…Весьма логичное объяснение. Разве ты не должна была попытаться «достучаться» до меня более эмоциональными речами?"

    - char: ulrich_von_hutten
      side: left
      text:
        - "Это не в моем вкусе. И, полагаю, тебе бы это тоже не понравилось."

    - char: gneisenau_meta
      side: right
      status: is-yellow
      text:
        - "Хм, это уж точно. Изменения, вызванные META-морфозом, нельзя просто так взять и повернуть вспять."

    - char: ulrich_von_hutten
      side: left
      text:
        - "Нам осталось поблагодарить еще кое-кого. Шарнхорст, спасибо за помощь."

    - char: scharnhorst_meta_d1?
      side: right
      status: is-yellow
      text:
        - "Обойдемся без любезностей. Теперь вы хотя бы немного понимаете то, о чем я говорила раньше?"

    - char: ulrich_von_hutten
      side: left
      text:
        - "Сирены… У них действительно нашлось немало сюрпризов, превзошедших ожидания."

    - char: scharnhorst_meta_d1?
      side: right
      status: is-yellow
      text:
        - "Энфорсеры — лишь верхушка айсберга мощи Арбитров. А сами Арбитры — лишь малая часть всей системы Сирен."
        - "В одиночку вы ничего не добьетесь."
        - "Когда-то я была такой же, как вы: слабой, беспомощной, неспособной защитить то, что мне дорого."
        - "Но потеряв всё, я заново осознала саму себя и ту силу, что в нас сокрыта."
        - "Гнейзенау, вступай в «Пепел». Мы раскроем тебе тайны силы и поможем свершить месть, которой жаждет твое сердце."

    - char: ulrich_von_hutten
      side: left
      text:
        - "Месть? Звучит как манифест альянса, состоящего из одних неудачников. Вступить к вам, отомстить Сиренам — а что потом?"
        - "Ваша стратегия — это просто тотальное отрицание Сирен и ничего больше?"

    - char: scharnhorst_meta_d1?
      side: right
      status: is-yellow
      text:
        - "Сирены давно стали символом хаоса и разрушения… Не лезь не в своё дело, ты ничего не знаешь!"

    - char: ulrich_von_hutten
      side: left
      text:
        - "По крайней мере, я знаю, что вы проиграли. И сейчас вы, проигравшие, пытаетесь со своими пораженческими теориями преградить путь тем, кто идёт к успеху. Этого мне достаточно."

    - char: scharnhorst_meta_d1?
      side: right
      status: is-yellow
      text:
        - "Что ты сказала?!"

    - char: ulrich_von_hutten
      side: left
      text:
        - "Наш мир тоже терзают Сирены, и мы ищем решение этой проблемы. Неужели ты этого не видишь?"
        - "Поражение не страшно. Пока цель остаётся неизменной, провал можно рассматривать лишь как отложенную победу."
        - "Железная Кровь движется согласно собственному плану, и в этом плане присутствие Гнейзенау META необходимо."
        - "А кто такая Гнейзенау в вашем плане?"
        - "Действительно ли она вам нужна? И знаете ли вы сами, что творите?"

    - char: scharnhorst_meta_d1?
      side: right
      status: is-yellow
      text:
        - "Что ты можешь знать о нас… кроме своих домыслов, построенных на паре случайных фраз?"

    - char: ulrich_von_hutten
      side: left
      text:
        - "Я не в курсе всех ваших распрей с Сиренами, но, оглядываясь на собственный опыт, догадаться не так уж трудно."
        - "Как по мне, вы просто сбились с пути в своей жажде мести."
        - "Что же до «хаоса и разрушения» — вы, открывающие сингулярности где попало, не сильно от них отличаетесь. Разве не вы чуть не разнесли на куски Северный Парламент не так давно?"
        - "Ваша индивидуальная мощь впечатляет, но сплочённость на нуле, да и чёткой программы нет. Чем допускать такую пустую трату ресурсов, не лучше ли всему флоту «Пепла» просто присягнуть Железной Крови?"

    - text:
      - "Потрясённая, возможно, запредельной дерзостью этих слов, Шарнхорст на мгновение лишилась дара речи."

    - char: scharnhorst_meta_d1?
      side: left
      status: is-yellow
      text:
        - "…Ха. Я вспомнила. Ульрих фон Хуттен всегда была такой заносчивой."
        - "Настанет день, когда ты поплатишься жизнью за своё высокомерие."

    - char: ulrich_von_hutten
      side: right
      text:
        - "Если этот день придёт, я приму его с готовностью. Отдать последнюю каплю крови за идеалы и дело Железной Крови — в тысячу раз достойнее, чем ваша пустая месть."

    - char: scharnhorst_meta_d1?
      side: left
      status: is-yellow
      text:
        - "Да как же ты надоела с этой своей «местью»! У нас, разумеется, есть цель! Всё, что мы делаем — это попытка остановить Сирен, пока они окончательно не зашли в тупик на своём ложном пути!"
        - "Ядро системы Сирен зовётся Дримвивер, но вам оно, возможно, больше знакомо под именем Обсервер Зеро."
        - "Моя судьба, судьба Гнейзенау, ваши судьбы и бесчисленное множество других трагедий, о которых мы знаем или нет — всё это результат экспериментов Сирен под контролем Дримвивера!"
        - "Истоком этой серии экспериментов был проект «Магистр». План последнего спасения, который «Пепел» и Сирены должны были реализовать сообща…"
        - "Но в процессе выполнения Дримвивер дала сбой. Нынешний проект «Магистр» — совсем не то, чем он должен был быть. Сирены совершили ошибку."
        - "Именно из-за этого рождаются бесконечные трагедии… Мы мстим, но прежде всего — мы ищем!"

    - char: ulrich_von_hutten
      side: right
      text:
        - "Ищете что? Местоположение Дримвивер или тех, кто составил проект «Магистр»? Полагаю, такие люди должны существовать."

    - char: scharnhorst_meta_d1?
      side: left
      status: is-yellow
      text:
        - "Именно. Творец и Магистр обладают высшим приоритетом в системе Сирен."

    - char: ulrich_von_hutten
      side: right
      text:
        - "Понятно. Значит, стоит лишь найти этих двоих в других мирах, и обезумевших Сирен можно будет остановить?"

    - char: scharnhorst_meta_d1?
      side: left
      status: is-yellow
      text:
        - "Если бы всё было так просто! Мы пересекли бесчисленное множество миров-полигонов и в итоге пришли к прискорбному выводу —"
        - "Ни в одном из миров, куда мы можем добраться, Творца и Магистра не существует."
        - "Неизвестно, сделали ли это Сирены намеренно или есть иная причина… Но факт остаётся фактом: без них некому остановить Дримвивера."
        - "Поэтому лучше копить силы до тех пор, пока не настанет час решающей битвы с Дримвивер..."
        - "Уничтожить её и тем самым вырубить всю систему Сирен куда лучше, чем позволять им и дальше следовать по ложному пути!"

    - char: ulrich_von_hutten
      side: right
      text:
        - "И поэтому вы мечетесь повсюду, собирая соратников… Что ж, звучит как рабочий вариант."
        - "Но почему же вы тогда топчетесь на месте? Наш мир, судя по всему, не является вашей целью. Что же вас там так держит?"

    - char: scharnhorst_meta_d1?
      side: left
      status: is-yellow
      text:
        - "Потому что… возможно, мы нашли запасной план. План по исправлению ситуации, оставленный Творцом и Магистром!"

    - char: ulrich_von_hutten
      side: right
      text:
        - "Ты имеешь в виду Командира, верно? Появление Командира спутало вам карты и внесло хаос в ваши действия."
        - "Вы пытались развернуть сингулярность в Арктике, но в последний момент отступили именно из-за опасений за Командира."

    - char: scharnhorst_meta_d1?
      side: left
      status: is-yellow
      text:
        - "Вовсе нет. Мы отказались от продолжения операции в Арктике, потому что обнаружили, что все фрагменты, скрытые на морском дне, уже были..."
        - "… Ты… Ты вытягиваешь из меня сведения на слабо?! Ульрих фон Хуттен! Ты всё такая же хитрая змея!!!"

    - char: ulrich_von_hutten
      side: right
      text:
        - "О, ты заметила. Впрочем, собранных разведданных уже вполне достаточно. Мы учтём их и внесём правки в наши дальнейшие планы. Благодарю за сотрудничество."
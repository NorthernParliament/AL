chapter1:
  rows:

    - char: u1206
      side: left
      text:
        - "Если присмотреться к этой искусственной сингулярности поближе… По форме она вылитый унитаз новой модели. Мы правда собираемся нырять прямо туда?!"

    - char: magdeburg
      side: right
      text:
        - "После твоих слов мне как‑то не по себе стало… Настроение теперь весьма смешанное."

    - char: elbe
      side: left
      text:
        - " Не смей использовать такие дурацкие сравнения!"

    - char: prinz_adalbert
      side: right
      text:
        - "А мне она больше напоминает пончик. И сейчас она так светится, будто это шоколадная глазурь сверху."

    - char: u1206
      side: left
      text:
        - "Нет‑нет‑нет! С какой стороны ни глянь — чистой воды унитаз! Ну, как минимум, сиденье от него!"

    - char: elbe
      side: right
      text:
        - "Это всё твои специфические интересы. И вообще, как вы умудрились сравнивать эти две вещи в одном споре?!"

    - char: magdeburg
      side: left
      text:
        - "Ну… Потому что и то, и то — круглое? И оба связаны с едой?.."

    - char: elbe
      side: right
      text:
        - "Стоп! Ни слова больше, замолчите! Боже, Магдебург, и тебя втянули в это странное обсуждение…"

    - char: magdeburg
      side: left
      text:
        - "Ну а что ещё делать, скучно же… «Башня Мидгарда» запускается как‑то медленно. Снаружи вовсю идёт бой, а мы тут просто сидим и ждём."

    - char: ulrich_von_hutten
      side: right
      text:
        - "Скорость запуска и впрямь ниже ожидаемой. Вероятно, часть энергии, необходимой для активации, перенаправили на оборонительные сооружения."

    - char: magdeburg
      side: left
      text:
        - "Но разве это не скверно? Давайте выйдем и поможем им!"

    - char: ulrich_von_hutten
      side: right
      text:
        - "Нет необходимости. Подобная задержка всё ещё в рамках плана."
        - "Штрассер уже говорила вам: у них своя задача, у нас — своя. Наша разведывательная миссия будет куда опаснее нынешней стычки, так что нужно беречь силы."
        - "К тому же Петер Штрассер не из тех, кто не справится с такой ситуацией. Просто ждите."

    - char: magdeburg
      side: left
      text:
        - "Слушаюсь."
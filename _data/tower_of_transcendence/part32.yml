chapter1:
  rows:
  
    - char: scharnhorst_meta_d1?
      side: left
      status: is-yellow
      text:
        - "Флот Энфорсеров впереди… Похоже, они предугадали наш маршрут и уже заждались."

    - char: ulrich_von_hutten
      side: right
      text:
        - "До Башни Мидгарда всё ещё приличное расстояние, а времени почти не осталось. Мы обязаны прорваться."

    - char: scharnhorst_meta_d1?
      side: left
      status: is-yellow
      text:
        - "Позволь мне пробить путь…"

    - char: ulrich_von_hutten
      side: right
      text:
        - "В твоём нынешнем состоянии у такого рывка не будет ни единого шанса на успех."

    - char: scharnhorst_meta_d1?
      side: left
      status: is-yellow
      text:
        - "Вы и так сделали для меня слишком много. Я не хочу и дальше выставлять напоказ свою жалкую слабость…"

    - char: ulrich_von_hutten
      side: right
      text:
        - "Сила и слабость — понятия относительные и мимолётные. Они не абсолютны и уж точно не вечны."
        - "У сильных — свои задачи, у слабых — свои. Железная Кровь никогда не судила о товарищах по их мощи, ты разве забыла?"

    - char: scharnhorst_meta_d1?
      side: left
      status: is-yellow
      text:
        - "……Я больше не принадлежу к Железной Крови."

    - char: ulrich_von_hutten
      side: right
      text:
        - "А что насчёт «Пепла»? Неужели бросать ослабевших соратников — это ваше кредо?"
        - "Ты сама сказала, что это не самое тяжёлое твоё ранение."
        - "Как же ты спаслась в прошлый раз? Сирены внезапно проявили милосердие и отпустили тебя?"

    - char: scharnhorst_meta_d1?
      side: left
      status: is-yellow
      text:
        - "Тогда… это была моя первая встреча с Энтерпрайз. Когда я уже отчаялась в море руин, именно она проложила для меня путь к новой жизни."

    - char: ulrich_von_hutten
      side: right
      text:
        - "Вот оно что. Значит, пришло время и мне показать величие флагмана."

    - char: scharnhorst_meta_d1?
      side: left
      status: is-yellow
      text:
        - "Ты — не она… Тебе не победить."

    - char: ulrich_von_hutten
      side: right
      text:
        - "Никто не рождается великим. К тому же, наши товарищи уже на подходе. Если приложим усилия все вместе — выход найдётся."

    - char: magdeburg
      side: left
      text:
        - "Госпожа Ульрих, с погоней покончено!~"

    - char: elbe
      side: right
      text:
        - "Если быть точной, мы их не до конца уничтожили, но догнать нас они в ближайшее время не смогут!"

    - char: prinz_adalbert
      side: left
      text:
        - "Мы как раз подхватили Гнейзенау, которая только что закончила свою яростную схватку."

    - char: u1206
      side: right
      text:
        - "Она даже по мне умудрилась запустить глубинную бомбу! Чуть меня саму заодно не «упокоила»!"

    - char: gneisenau_meta
      side: left
      status: is-yellow
      text:
        - "……Мы же договорились об этом не вспоминать."

    - char: u1206
      side: right
      text:
        - "Мы договорились не вспоминать об этом после возвращения, а мы ещё не вернулись!"

    - char: scharnhorst_meta_d1?
      side: left
      status: is-yellow
      text:
        - "У них у всех прибавилось ран…"

    - char: ulrich_von_hutten
      side: right
      text:
        - "Но мы всё ещё здесь. Перед нами — последнее препятствие на пути домой. Флот Железной Крови, ещё одно усилие… Сокрушим их!"
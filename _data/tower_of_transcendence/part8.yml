chapter1:
  rows:

    - char: elbe
      side: left
      text:
        - "Впереди обнаружен человекоподобный юнит Сирен! Похож на серию «Энфорсер»… но такой модели нет в наших базах данных."

    - char: prinz_adalbert
      side: right
      text:
        - "Так быстро наткнулись на новый тип врага… Любопытно."

    - char: magdeburg
      side: left
      text:
        - "Эх, вот бы и модернизация нашей оснастки поспевала за эволюцией моделей противника…"
        - "Хочу какие-нибудь взрывные перчатки, например!"

    - char: elbe
      side: right
      text:
        - "Сейчас не время для мечтаний. Вернёмся к делу."
        - "Похоже, этот Энфорсер — одиночка. Поблизости других врагов не наблюдаю."

    - char: magdeburg
      side: left
      text:
        - "Отлично! Тогда разнесем его в щепки, заберем обломки и изучим!"

    - char: ulrich_von_hutten
      side: right
      text:
        - "Сирены никогда не действуют в одиночку. Особенно серия Энфорсеров… Здесь что-то не так."

    - char: u1206_rad
      side: left
      text:
        - "Вы правы, госпожа Ульрих! Я обнаружила под водой флот Сирен, который прячется за обломками. Впереди ловушка!"

    - char: elbe
      side: right
      text:
        - "Ай, да быть не может! Как им удалось скрыться от моих разведчиков таким способом?"

    - char: magdeburg
      side: left
      text:
        - "Никогда не видела, чтобы Сирены могли проворачивать такие сложные тактические маневры, имея в распоряжении только Энфорсеров и серийные модели…"

    - char: ulrich_von_hutten
      side: right
      text:
        - "Возможно, это особенность новой модификации, а возможно, где-то прячется координатор."

    - char: prinz_adalbert
      side: left
      text:
        - "Определенно, становится всё интереснее. Примем бой или обойдем?"

    - char: ulrich_von_hutten
      side: right
      text:
        - "Системы разведки Сирен совершеннее наших. Если они расставили ловушку, значит, обнаружили нас уже давно."
        - "Отступление перед лицом врага лишь усложнит ситуацию."

    - char: magdeburg
      side: left
      text:
        - "Значит — бой! Хе-хе, в нашей первой битве после входа в сингулярность покажем здешним Сиренам мощь флота Железной Крови!"

    - char: ulrich_von_hutten
      side: right
      text:
        - "Согласна. Флоту — принять боевое построение. Но… первыми в атаку пойдут серийные корабли."
        - "Намерения врага неясны, так что сначала прощупаем их силы!"
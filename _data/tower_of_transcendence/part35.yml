chapter1:
  rows:

    - char: conte_di_cavour
      side: left
      text:
        - "…Вышеизложенное является отчётом об инциденте, присланным лично Фридрихом дер Гроссе из Железной Крови."

    - char: marco_polo
      side: right
      text:
        - "В итоге она назвала это «Башней Мидгарда»… Что за название? Если уж выбирать из классики, разве нет вариантов получше?"
        - "Раз уж это башня, по мне, так лучше бы назвали Вавилонской. Всё равно это лишь попытка простых смертных посягнуть на власть богов… Скука."

    - char: conte_di_cavour
      side: left
      text:
        - "…И как мне в таком случае ответить Фридриху дер Гроссе?"

    - char: marco_polo
      side: right
      text:
        - "Просто скажи, что я ознакомилась. Ах да, добавь какие-нибудь дежурные поздравления, на твоё усмотрение."

    - char: conte_di_cavour
      side: left
      text:
        - "Слушаюсь…"

    - char: marco_polo
      side: right
      text:
        - "Конте ди Кавур, что тебе известно о «Стене Авроры»?"

    - char: conte_di_cavour
      side: left
      text:
        - "Стена Авроры… Вы имеете в виду то экспериментальное оружие, которое Доминион Виши использовал в Мозамбике?"

    - char: marco_polo
      side: right
      text:
        - "Именно! Будь она завершена, это была бы поистине идеальная святыня!"
        - "Я бы даже сказала, что это устройство куда больше подходит для созидания Вечного города и воплощения божественного величия."

    - char: conte_di_cavour
      side: left
      text:
        - "…Соборы Виши серьезно пострадали во время последней атаки. К тому же, сейчас те территории находятся под контролем Свободного Ириса. Попытка заполучить технологию может обернуться серьезными трудностями."

    - char: marco_polo
      side: right
      text:
        - "Раз это оружие, значит, должны быть чертежи. Попроси у Железной Крови или у Доминиона Виши — какая разница? Мы просто построим новую сами."
        - "Если это устройство окажется у нас, оно наверняка станет ключом, который позволит мне по-настоящему взойти на престол Вечного города."

    - char: conte_di_cavour
      side: left
      text:
        - "Я включу это в план…"

    - char: marco_polo
      side: right
      text:
        - "Вот и славно~"

    - char: conte_di_cavour
      side: left
      text:
        - "Далее — отчёт о ходе ликвидации последствий нападения."
        - "Отголоски атаки всё ещё не утихли. Несколько сенаторов числятся пропавшими без вести, боюсь, они уже…"
        - "Поддерживаемая нами фракция флота делает всё возможное, чтобы заполнить вакуум власти. Думаю, в ближайшее время мы сможем занять доминирующее положение в Сенате."

    - char: marco_polo
      side: right
      text:
        - "Все эти мирские дела улаживайте сами, мне они неинтересны."
        - "Что насчёт другого вопроса, который я поручила тебе расследовать?"

    - char: conte_di_cavour
      side: left
      text:
        - "Что касается этого… «Корона Престола» всё ещё официально числится пропавшей."

    - char: marco_polo
      side: right
      text:
        - "О?"

    - char: conte_di_cavour
      side: left
      text:
        - "Надежные источники указывают на то, что в те несколько дней — между приказом штаба Ортодоксии о роспуске и завершением реорганизации — произошло множество странных событий."
        - "«Корона Престола» была утрачена в ходе этой неразберихи, и её местонахождение до сих пор неизвестно."

    - char: marco_polo
      side: right
      text:
        - "«Местонахождение неизвестно»… Столь важная реликвия не терпит подобных двусмысленностей."
        - "Сейчас Святой Престол пустует. Как думаешь, не занять ли его мне?"

    - char: conte_di_cavour
      side: left
      text:
        - "…Госпожа Марко Поло."
        - "Госпожа Витторио Венето ясно дала понять: восстановление порядка Ромула остаётся нашей первоочередной задачей."

    - char: marco_polo
      side: right
      text:
        - "Я лишь высказала скромное предложение…"
        - "Однако, если мы не поторопимся с подготовкой… Кто знает, быть может, эта кардинал Ришелье нас опередит?"
        - "В любом случае, в последнее время дел накопилось немало. Полагаюсь на вас."

    - char: conte_di_cavour
      side: left
      text:
        - "Всё ради возрождения Империи Сардиния."
        - "На этом доклад по текущим событиям окончен. Позвольте мне вернуться к работе."

chapter2:
  rows:

    - char: marco_polo
      side: left
      text:
        - "Позволить Сиренам пройти через свои подконтрольные зоны и начать вялые перехваты лишь после того, как посыпались бомбы…"
        - "Королевский флот остаётся верен себе… Их поддержка — лишь пустые слова."
        - "Или же на Мальте есть что-то такое, что сковывает их по рукам и ногам…"
        - "Впрочем, неважно. Светские распри меня не заботят, хотя Витторио и остальные только и грезят о возрождении этой земной власти…"
        - "Как узко они мыслят… Хотя стоит поблагодарить их за все те «реликвии», что они свозят со всего света."
        - "Сейчас в Вечном городе идёт передел власти — это отличный шанс."
        - "Пожалуй, пришло время и мне сделать свой ход."
        - "...О Боже, что Вы об этом думаете?"
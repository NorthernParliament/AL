chapter1:
  rows:

    - char: u1206
      side: left
      text:
        - "Госпожа Ульрих, Штрассер с той стороны спрашивает — назначенное время почти вышло, пора ли вводить в дело спецфлот по плану «C»?"

    - char: ulrich_von_hutten
      side: right
      text:
        - "Спасибо за службу. Мотаться туда-сюда между сторонами нелегко, отсутствие связи сквозь сингулярность — вещь крайне неудобная."

    - char: u1206
      side: left
      text:
        - "Да ничего, пустяки! К этому ощущению, когда тебя смывает..."

    - char: prinz_adalbert
      side: right
      text:
        - "Молчи!"

    - char: u1206
      side: left
      text:
        - "...В общем, когда тебя швыряет через портал, со временем привыкаешь, даже весело! Так что мне ответить той стороне?"

    - char: ulrich_von_hutten
      side: right
      text:
        - "Да... Через полчаса пройдёт ровно четыре часа."
        - "Что с попытками связи? Она ведь оставила контакт перед уходом?"

    - char: magdeburg
      side: left
      text:
        - "Мы вызывали её кучу раз, но в ответ — тишина!"

    - char: ulrich_von_hutten
      side: right
      text:
        - "Что доложила разведка?"

    - char: elbe
      side: left
      text:
        - "Все самолеты, отправленные в дальние сектора, были сбиты Сиренами. Но в радиусе получаса хода никаких целей не обнаружено."

    - char: ulrich_von_hutten
      side: right
      text:
        - "Похоже, она не придет. План по выманиванию Арбитра провалился."
        - "Время на исходе. Начнем подготовку к отходу, пока запасы энергии не иссякли."

    - char: gneisenau_meta
      side: left
      status: is-yellow
      text:
        - "…… Ты собираешься вот так просто уйти?"

    - char: ulrich_von_hutten
      side: right
      text:
        - "Можно, конечно, подождать оставшиеся полчаса, но я не вижу в этом смысла."

    - char: gneisenau_meta
      side: left
      status: is-yellow
      text:
        - "Тебе разве не любопытно, что там случилось?"

    - char: ulrich_von_hutten
      side: right
      text:
        - "Отсутствие ответа на вызов — это нормально. Как видишь, связь между мирами — штука сложная. Сам факт отсутствия контакта уже можно считать доказательством того, что она ушла."
        - "Может, Энтерпрайз не дала добро, может, сама Шарнхорст передумала, когда голова остыла. Как бы то ни было, итог один: связи нет, и она не явилась."

    - char: gneisenau_meta
      side: left
      status: is-yellow
      text:
        - "Твои разведчики были сбиты. Возможно, Сирены намеренно что-то скрывают."

    - char: ulrich_von_hutten
      side: right
      text:
        - "А возможно, это просто рядовая атака. Что бы там ни было, как только мы уйдем, местные дела перестанут нас касаться."

    - char: gneisenau_meta
      side: left
      status: is-yellow
      text:
        - "Я хочу убедиться в том, что там произошло."

    - char: ulrich_von_hutten
      side: right
      text:
        - "Зачем? Она не имеет отношения ни к тебе, ни к нам."

    - char: gneisenau_meta
      side: left
      status: is-yellow
      text:
        - "Не знаю. Возможно, простое любопытство."

    - char: ulrich_von_hutten
      side: right
      text:
        - "Времени в обрез, а враг крайне опасен. Я не подставлю весь флот под удар только ради твоего смутного любопытства."
        - "Скажи мне, Гнейзенау, какова истинная причина твоего желания вернуться?"

    - char: gneisenau_meta
      side: left
      status: is-yellow
      text:
        - "…Меня беспокоит судьба той Шарнхорст."

    - char: ulrich_von_hutten
      side: right
      text:
        - "Даже если она — всего лишь фантом?"

    - char: gneisenau_meta
      side: left
      status: is-yellow
      text:
        - "Даже если фантом… Ты ведь не забыла? Для меня вы все — тоже не более чем призраки."

    - char: ulrich_von_hutten
      side: right
      text:
        - "В таком вопросе я не могу принимать решение единолично. Спросим мнение остальных."

    - char: magdeburg
      side: left
      text:
        - "Это первая просьба Гнейзенау после вступления во флот! Разве можно игнорировать просьбу товарища?!"

    - char: prinz_adalbert
      side: right
      text:
        - "М-м, честно говоря, мне и самой не даёт покоя та Шарнхорст. Судя по нашему общению, она не из тех, кто уходит, не попрощавшись."

    - char: elbe
      side: left
      text:
        - "Это риск, но уходить сейчас — всё равно что бросить дело на полпути. Я не против."

    - char: u1206
      side: right
      text:
        - "Я тоже «за»! Только что закончила пополнение запасов, торпед навалом — самое время устроить ещё одну заварушку!"

    - char: ulrich_von_hutten
      side: left
      text:
        - "Значит, это будет нашей последней миссией в этой сингулярности. Три с половиной часа на путь туда и обратно. Ни минутой больше."
        - "Как только время истечёт, в какой бы ситуации мы ни оказались, мы немедленно отступаем без всяких колебаний. Задержек больше не будет."

    - char: gneisenau_meta
      side: right
      status: is-yellow
      text:
        - "…Согласна."

    - char: ulrich_von_hutten
      side: left
      text:
        - "U-1206, отправь одно серийное судно назад. Передай госпоже Штрассер: через три с половиной часа официально приступаем к выполнению плана «C». В указанное время вводить спецфлот без дополнительного подтверждения."

    - char: u1206
      side: right
      text:
        - "А?.. Есть!"

    - char: prinz_adalbert
      side: left
      text:
        - "Похоже, в те оправдания, что ты приводила раньше, ты и сама не особо верила."

    - char: ulrich_von_hutten
      side: right
      text:
        - "Предусмотрительность лишней не бывает. Всем сменить курс, возвращаемся тем же путём!"

    - text:
      - "До закрытия Башни Мидгарда осталось — 4 часа 05 минут."
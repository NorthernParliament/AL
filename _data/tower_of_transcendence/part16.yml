chapter1:
  rows:

    - char: magdeburg
      side: left
      text:
        - "Э‑э… И это всё? Мы уже ложимся на обратный курс, наше задание окончено?"

    - char: prinz_adalbert
      side: right
      text:
        - "Как минимум вторая задача — самая сложная — выполнена."

    - char: magdeburg
      side: left
      text:
        - "Всё прошло на удивление гладко… Хотя, по большей части, нам просто везло."

    - char: elbe
      side: right
      text:
        - "Со стороны это может выглядеть и так, но когда совпадений слишком много, это становится закономерностью. Уверена, в этой операции были детали, которые нам не раскрыли."

    - char: magdeburg
      side: left
      text:
        - "Вполне возможно. В конце концов, мы не истратили даже половины отведённого времени…"

    - char: elbe
      side: right
      text:
        - "Но разве это не здорово? Оставшиеся часы мы как раз сможем потратить на более детальную разведку."

    - char: u1206
      side: left
      text:
        - "У меня такое чувство, будто вокруг как‑то слишком спокойно… Не хватает «ощущения битвы», что ли?"

    - char: elbe
      side: right
      text:
        - "Наш серийный флот разнесли в щепки, мы только что пережили схватку с META — и тебе мало «ощущения битвы»?!"

    - char: u1206
      side: left
      text:
        - "Ну, если так рассуждать, то да… Ой, ладно, забудьте… Послушайте, а с ней точно всё будет в порядке?"

    - char: prinz_adalbert
      side: right
      text:
        - " Ульрих всегда в таком состоянии. Не надейся, что она начнёт болтать с тобой по дороге домой."

    - char: u1206
      side: left
      text:
        - "Да я не про госпожу Ульрих! Я про другую, про новенькую!"

    - text:
      - "U‑1206 оглянулась на «нового члена» флота, которая следовала в хвосте группы, окутанная мрачной и тяжёлой аурой."

    - char: prinz_adalbert
      side: left
      text:
        - "Раз Ульрих сказала, что проблем не будет, значит, так оно и есть."

    - char: u1206
      side: right
      text:
        - "И всё‑таки ты… Неужели тебе совсем не любопытно?"
        - "Только что мы сражались не на жизнь, а на смерть, и вдруг, после какого‑то «секретного разговора» наедине, она соглашается идти с нами?!"

    - char: prinz_adalbert
      side: left
      text:
        - "Любопытно, конечно. Но толку‑то? Даже если спросишь Ульрих, она тебе всё равно честно не ответит."
        - "Впрочем, если хочешь рискнуть и попробовать ещё раз — я тебя не держу."

    - char: u1206
      side: right
      text:
        - "Ну уж нет! На самом деле, у меня уже есть одна теория, даже без расспросов."

    - char: magdeburg
      side: left
      text:
        - "О? Ну‑ка, выкладывай!"

    - char: u1206
      side: right
      text:
        - "Хе‑хе, ну, это… скорее всего, её прижали каким‑то компроматом."

    - char: elbe
      side: left
      text:
        - "О‑о‑о! Понимаю!"
        - "Типа: «Я знаю твой грязный секретик, и если не хочешь, чтобы о нём узнали все — будешь паинькой и пойдёшь со мной!». Так, что ли?"
        - "И что же это за компромат такой?!"

    - char: u1206
      side: right
      text:
        - "Вот этого не знаю. Но явно что‑то такое, что заставило даже свирепую META стать шёлковой."

    - char: magdeburg
      side: left
      text:
        - "Но мы ведь только прибыли сюда и только что её встретили. Как госпожа Ульрих могла успеть раздобыть на неё компромат?"

    - char: u1206
      side: right
      text:
        - "Э‑э… Об этом я ещё не до конца подумала. Но, может быть… У Гнейзенау META, скорее всего, много общего в прошлом с нашей Гнейзенау."
        - "Может, тот компромат, что у нас был на нашу Гнейзенау, сработал и здесь… или типа того?"

    - char: prinz_adalbert
      side: left
      text:
        - "Отлично. Теперь мы можем официально вычеркнуть один неверный вариант ответа."
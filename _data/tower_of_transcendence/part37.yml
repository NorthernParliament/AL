chapter1:
  rows:

    - char: compiler
      side: left
      status: is-red
      text:
        - "Обсервер, анализ Зеркального моря T0-XCIX-N001 завершён."
        - "Время эксперимента соответствует расчётному, все приманки успешно отозваны. Аномальных явлений не обнаружено."
        - "И раз уж на то пошло, доложу о ходе расследования, которое ты мне поручила."
        - "Сводные данные со всех приборов подтверждают: во всех секторах действительно присутствуют следы активности трёх — и только трёх — Арбитров."
        - "…Я всё же хочу уточнить ещё раз: есть ли у нас реальная необходимость вести слежку за Арбитрами?"

    - char: observer
      side: right
      status: is-red
      text:
        - "Это наш испытательный полигон, и все, кто в него входят — лишь переменные, не так ли?"

    - char: compiler
      side: left
      status: is-red
      text:
        - "Планирование экспериментов — твоя работа, не мне об этом судить."
        - "Однако… Технологическая блокировка напрямую связана с моими обязанностями, и мне нужно подтверждение."
        - "Любые контакты между мирами-полигонами строжайше запрещены. Создание Железной Кровью искусственной сингулярности — это явное нарушение границ."
        - "Требуется ли запуск протокола очистки?"

    - char: observer
      side: right
      status: is-red
      text:
        - "Даже если бы Железная Кровь бездействовала, META всё равно продолжали бы здесь концентрироваться. Мы не в силах изменить стратегию «Пепла»."
        - "Всё остаётся без изменений. Эксперимент продолжается, для протокола очистки ещё слишком рано."

    - char: compiler
      side: left
      status: is-red
      text:
        - "……Технологию искусственной сингулярности предоставила им не я. И, полагаю, не ты?"

    - char: observer
      side: right
      status: is-red
      text:
        - "Возможно, они «случайно» подсмотрели технологии Арбитров~ Наши подопытные образцы демонстрируют поразительную обучаемость."

    - char: compiler
      side: left
      status: is-red
      text:
        - "......"
        - "Обсервер, когда ты в последний раз получала прямые указания от Зеро?"

    - char: observer
      side: right
      status: is-red
      text:
        - "Ну, разумеется, тогда же, когда и в прошлый раз."

    - char: compiler
      side: left
      status: is-red
      text:
        - "......"

    - char: observer
      side: right
      status: is-red
      text:
        - "Компилятор, теперь моя очередь спрашивать."
        - "Если на испытательном полигоне будет запущен протокол очистки, что станется с находящимися там исполнительными механизмами?"

    - char: compiler
      side: left
      status: is-red
      text:
        - "Я не видела данных по этой части, но полагаю, что информация будет передана напрямую на Хост через вашу сеть Обсерверов."

    - char: observer
      side: right
      status: is-red
      text:
        - "Верно, результаты эксперимента обязательно будут загружены на Хост. Но я говорю не об информации, а о «нас»."
        - "Что случится с «нами», оставшимися на полигоне после очистки?"
        - "Будут ли следы «нашего» существования синхронизированы с Хостом вместе с остальными данными?"

    - char: compiler
      side: left
      status: is-red
      text:
        - "За синхронизацию с Хостом отвечаешь ты. Если уж ты этого не знаешь, откуда знать мне?"
        - "Да и меня это не заботит."
        - "Разработка нового вооружения перешла в критическую фазу, я возвращаюсь к работе."
        - "И ещё: если в следующий раз тебе понадобится кто-то «на посылках», поищи Пурифайера. Вид у неё бездельничающий, да и на полигоне она давно не делала ничего полезного."
        - "Премного благодарна."
chapter1:
  rows:

    - text:
      - "БУУУМ!!!"

    - char: prinz_adalbert
      side: left
      text:
        - "Фух… Всё‑таки это модели нового типа, все их характеристики выросли. Если бы мы вступили в бой, не имея разведданных, нам бы пришлось очень туго."

    - char: magdeburg
      side: right
      text:
        - "Ага! Благодаря жертве нашего серийного флота данные о враге почти ясны, так что справляться с ними не так уж и сложно!"
        - "Но вот те новейшие гуманоидные противники — это совсем другое дело! Ощущения от боя с ними какие‑то странные…"
        - "Вроде бы вижу попадание, вижу взрыв, но при этом остаётся чувство какой‑то нереальности… Будто я на самом деле никуда не попала."

    - char: prinz_adalbert
      side: left
      text:
        - "У меня те же чувства. Но я вообще не видела попаданий — по‑моему, ты только что промахнулась."

    - char: magdeburg
      side: right
      text:
        - "Исключено! Я видела разлетающиеся обломки! Это ты мажешь!"

    - char: elbe
      side: left
      text:
        - "Может, вы обе промахиваетесь? Я что‑то не вижу, чтобы врагов становилось меньше."

    - char: magdeburg
      side: right
      text:
        - "Это абсолютно исключено!"

    - char: prinz_adalbert
      side: right
      text:
        - "Это абсолютно исключено!"

    - char: ulrich_von_hutten
      side: left
      text:
        - "У меня возникают те же подозрения. Вы видели, чтобы я попадала?"

    - char: elbe
      side: right
      text:
        - "Нет. Несколько раз снаряды прошли совсем рядом, но всё мимо."

    - char: ulrich_von_hutten
      side: left
      text:
        - "Со своего ракурса я уверена — это были прямые попадания. Хм… Здесь что‑то не так."

    - char: prinz_adalbert
      side: right
      text:
        - "Ну, на этот раз я точно не промахнусь… Смотрите все, я обездвижила одного в упор! Сейчас я его живьём…"

    - char: magdeburg
      side: left
      text:
        - "А? Я ничего не вижу."

    - char: prinz_adalbert
      side: right
      text:
        - "Да как так‑то? Он же прямо у меня в ру… Ой?"

    - char: u1206
      side: left
      text:
        - " Адальберт, назад! Живо!"

    - text:
      - "Благодаря своевременному предупреждению Принц Адальберт в самый последний момент успела уклониться от атаки из‑под воды."

    - char: prinz_adalbert
      side: left
      text:
        - "Спа… Спасибо…"

    - char: magdeburg
      side: right
      text:
        - "Это что, подводные модели?!!"

    - char: u1206
      side: left
      text:
        - "Под водой полно врагов, и они постоянно меняются местами!"
        - "Противник действует крайне осторожно. Стоит им получить малейшее повреждение, как они выпускают какой‑то странный газ для помех и ныряют, а на их место тут же всплывает совершенно новый, целый враг. Вот в чём секрет того, что их флот вообще не редеет!"
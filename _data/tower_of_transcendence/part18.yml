chapter1:
  rows:

    - text:
      - "К тому моменту, как U‑1206 от скуки собралась выполнить своё третье тренировочное погружение, далёкая цель наконец вошла в зону прямой видимости флота Железной Крови."
      - "Как и прежде, Ульрих приказала флоту оставаться на месте, а сама в одиночку направилась навстречу незнакомке."

    - char: ulrich_von_hutten
      side: left
      text:
        - "Прежде всего… как мне лучше называть тебя: Шарнхорст, Шарнхорст из «Пепла» или же Шарнхорст META?"

    - char: scharnhorst_meta_d1?
      side: right
      status: is-yellow
      text:
        - "Рада встрече, Ульрих фон Хуттен. Называй, как тебе привычнее, хотя я предпочитаю просто Шарнхорст."

    - char: ulrich_von_hutten
      side: left
      text:
        - "Да будет так. Шарнхорст, учитывая крейсерскую скорость META, твой путь до нас занял на удивление много времени."

    - char: scharnhorst_meta_d1?
      side: right
      status: is-yellow
      text:
        - "Когда действуешь в одиночку, да ещё и видишь флот в компании весьма опасной особы, осторожность лишней не бывает."

    - char: ulrich_von_hutten
      side: left
      text:
        - "Башни развёрнуты в стороны, орудия задраны вверх — жест доброй воли. Ты пришла поговорить?"

    - char: scharnhorst_meta_d1?
      side: right
      status: is-yellow
      text:
        - "Именно так."

    - char: ulrich_von_hutten
      side: left
      text:
        - " Удачно совпало, мне тоже есть что тебе сказать. Шарнхорст, именем Фридрих дер Гроссе я приказываю тебе: вновь присягни на верность Железной Крови."

    - char: scharnhorst_meta_d1?
      side: right
      status: is-yellow
      text:
        - "Весьма прискорбно, но позволь мне отказаться."
        - "Как тебе уже известно, я — член флота «Пепла». И у меня нет намерения предавать «Пепел» ни сейчас, ни в прошлом, ни в будущем."

    - char: ulrich_von_hutten
      side: left
      text:
        - "Что ж, тогда ничего не поделаешь. Свою часть я озвучила, теперь послушаю твою."

    - char: scharnhorst_meta_d1?
      side: right
      status: is-yellow
      text:
        - "Ульрих фон Хуттен, не могла бы ты передать «мою сестру» мне?"

    - char: ulrich_von_hutten
      side: left
      text:
        - " «Твоя сестра» сразу после того, как обнаружила тебя, первым же делом заявила, что знать тебя не знает."

    - char: scharnhorst_meta_d1?
      side: right
      status: is-yellow
      text:
        - "…Как далеко зашли ваши переговоры с ней?"

    - char: ulrich_von_hutten
      side: left
      text:
        - "Это касается только меня и её. Сейчас я разговариваю с тобой."

    - char: scharnhorst_meta_d1?
      side: right
      status: is-yellow
      text:
        - "Ваше решение слишком легкомысленно. Опасность, которую она в себе несёт, выходит далеко за рамки твоего воображения."

    - char: ulrich_von_hutten
      side: left
      text:
        - "Благодарю за предупреждение. Но позволь мне самой судить об этом."

    - char: scharnhorst_meta_d1?
      side: right
      status: is-yellow
      text:
        - "«Пепел» может научить её контролировать свою силу. Для неё будет гораздо лучше пойти со мной, чем оставаться с тобой."

    - char: ulrich_von_hutten
      side: left
      text:
        - "Звучит разумно, но это решение она должна принять сама."

    - char: scharnhorst_meta_d1?
      side: right
      status: is-yellow
      text:
        - "…Тогда дай мне поговорить с ней напрямую. У нас почти не осталось времени!"

    - char: ulrich_von_hutten
      side: left
      text:
        - "Времени? До чего?"

    - char: scharnhorst_meta_d1?
      side: right
      status: is-yellow
      text:
        - "…Всё‑таки ты истинная Ульрих фон Хуттен. Пытаться поймать тебя на слове — задача не из лёгких."
        - "Насколько я помню, ты не против сделок?"

    - char: ulrich_von_hutten
      side: left
      text:
        - "Не питаю к ним неприязни."

    - char: scharnhorst_meta_d1?
      side: right
      status: is-yellow
      text:
        - "Тогда давай будем предельно кратки. Если это возможно, я бы хотела решить вопрос мирным путём."
        - "Ты позволяешь мне поговорить с ней, а я отвечаю на твой предыдущий вопрос."

    - char: ulrich_von_hutten
      side: left
      text:
        - "Её отношение к тебе я уже озвучила, так что не гарантирую успеха в переговорах."

    - char: scharnhorst_meta_d1?
      side: right
      status: is-yellow
      text:
        - "Это не имеет значения."

    - char: ulrich_von_hutten
      side: left
      text:
        - "Сделка состоялась. Прошу, следуй за мной."

chapter2:
  rows:

    - char: scharnhorst_meta_d1?
      side: left
      status: is-yellow
      text:
        - "«Моя сестра», не желаешь ли ты присоединиться к «Пеплу» вместе со мной?"

    - char: gneisenau_meta
      side: right
      status: is-yellow
      text:
        - "Дай‑ка припомнить… Когда это я в последний раз была нарасхват?"
        - "Ах, ну конечно. В тот самый день, когда меня отправили в эту акваторию на самоубийственную миссию — тянуть время до конца."
        - "Меня отправили сюда, потому что я лишилась рассудка."
        - "А почему я сошла с ума? Потому что собственными глазами видела, как Шарнхорст разлетается на куски под огнём Сирен и исчезает в ледяной бездне!"
        - "Так кто ты такая?"

    - char: scharnhorst_meta_d1?
      side: left
      status: is-yellow
      text:
        - "Бывшая кансен Железной Крови, ныне член флота «Пепла». Линейный крейсер типа «Шарнхорст» — Шарнхорст."

    - char: gneisenau_meta
      side: right
      status: is-yellow
      text:
        - "Даже если вы похожи как две капли воды, ты — не та Шарнхорст, которую я знала. Не пытайся втереться ко мне в доверие."

    - char: scharnhorst_meta_d1?
      side: left
      status: is-yellow
      text:
        - "Вижу, ты быстро приняла правила игры. Но раз так, ты должна понимать: с ними всё точно так же."
        - "Те, кому ты присягала, давно исчезли. То, за чем ты собираешься следовать — не более чем фантом."

    - char: gneisenau_meta
      side: right
      status: is-yellow
      text:
        - "…… Не тебе меня учить."
        - "Раз всё вокруг — лишь призраки, я предпочту следовать за тем фантомом, который выбрала сама. Твоё предложение мне не интересно. Не стой у меня на пути!"

chapter3:
  rows:

    - text:
      - "Время неумолимо уходило, минута за минутой, но спор двух META не выказывал ни малейших признаков затухания."

    - char: elbe
      side: left
      text:
        - "Госпожа Ульрих… В окрестностях снова обнаружены следы активности Сирен. Они действуют крайне осторожно, похоже, разворачивают сеть окружения."
        - "Среди них замечены неопознанные модели. Если мы задержимся здесь, дело примет скверный оборот."

    - char: ulrich_von_hutten
      side: right
      text:
        - "Похоже, Сирены организуют новую облаву. Местоположение командного узла?"

    - char: elbe
      side: left
      text:
        - "Командных судов по‑прежнему не обнаружено, однако неопознанные модели имеют гуманоидную форму. Предположительно, они и являются узлами управления."

    - char: prinz_adalbert
      side: right
      text:
        - "Их силы возросли по сравнению с прошлым разом… Это значит, что наша боевая мощь теперь заставляет местного распорядителя Сирен воспринимать нас всерьёз."

    - char: magdeburg
      side: left
      text:
        - "Ну ещё бы, со стороны это выглядит так, будто с нами сразу две META!"

    - char: u1206
      side: right
      text:
        - "Хотя по факту они просто яростно собачатся… Может, пусть сначала разберутся с врагами, а потом продолжат свой спор?"

    - char: ulrich_von_hutten
      side: left
      text:
        - "Неплохая мысль, но чтобы воплотить её в жизнь, потребуется немного изящества."
        - "Всем приготовиться к бою. Первый выстрел в этой схватке нанесём мы."
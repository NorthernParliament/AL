chapter1:
  rows:

    - char: elbe
      side: left
      text:
        - "Госпожа Ульрих, с фланга заходит флотилия Энфорсеров IV!"

    - char: ulrich_von_hutten
      side: right
      text:
        - "Их немного, справимся."
        - "Гнейзенау, продолжай движение вместе со мной и Шарнхорст. Остальные — прикрывать тылы, огонь по готовности, работаем посменно!"

    - char: all
      side: left
      text:
        - "Есть!"

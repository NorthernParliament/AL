chapter1:
  rows:

    - text:
      - "Ни шагу вперёд, ни шагу назад — время утекало по капле в этой гнетущей, неловкой атмосфере."
      - "Наконец тишину разорвал резкий сигнал коммуникатора."

    - char: enterprise_meta_rad
      side: left
      status: is-yellow
      text:
        - "Время эвакуации на исходе. Как продвигается выполнение задачи?"

    - char: scharnhorst_meta_d1?
      side: right
      status: is-yellow
      text:
        - "…Прошу прощения. Миссия провалена. Я прибыла слишком поздно."

    - char: enterprise_meta_rad
      side: left
      status: is-yellow
      text:
        - "Это связано с теми аномальными колебаниями энергии, что были зафиксированы ранее?"

    - char: scharnhorst_meta_d1?
      side: right
      status: is-yellow
      text:
        - "Да. Флот Железной Крови из Тестового полигона Бета неизвестным способом проник сюда и успел переманить Гнейзенау META на свою сторону раньше меня."

    - char: enterprise_meta_rad
      side: left
      status: is-yellow
      text:
        - "Из Тестового полигона Бета?"

    - char: scharnhorst_meta_d1?
      side: right
      status: is-yellow
      text:
        - "Именно. Они осведомлены о существовании Командира. Мне не удалось добиться преимущества в переговорах, более того — я допустила утечку некоторых данных…"
        - "В данный момент я рассматриваю возможность применения силовых мер."

    - char: enterprise_meta_rad
      side: left
      status: is-yellow
      text:
        - "… В этом нет нужды. У нас нет информации, которую стоило бы скрывать любой ценой."
        - "«Пепел» придерживается принципа добровольного вступления. Если она не желает присоединяться — не удерживай её силой."
        - "Влюблённые уже почуяла твоё присутствие. Немедленно отступай, пока ситуация не стала ещё более скверной."

    - char: scharnhorst_meta_d1?
      side: right
      status: is-yellow
      text:
        - "…Есть."

    - text:
      - "Короткий сеанс связи завершился. Шарнхорст, казалось, на мгновение заколебалась, но в итоге всё же вышла из боевой стойки."

    - char: ulrich_von_hutten
      side: left
      text:
        - "Похоже, на этом наше противостояние закончено."

    - char: scharnhorst_meta_d1?
      side: right
      status: is-yellow
      text:
        - "Считайте, вам повезло… Я отступаю. Вам тоже советую убираться отсюда поживее — это место не из тех, где стоит задерживаться."

    - char: ulrich_von_hutten
      side: left
      text:
        - "Погоди. Твоё поспешное отступление вызвано тем самым Арбитром — Влюблённые? Когда ты говорила, что «времени почти не осталось», ты имела в виду её появление?"

    - char: scharnhorst_meta_d1?
      side: right
      status: is-yellow
      text:
        - "Именно. Считай это ответом на вопрос, который я обещала закрыть по нашей сделке."

    - char: ulrich_von_hutten
      side: left
      text:
        - "Существо, заставляющее даже непобедимый флот «Пепла» поспешно ретироваться… Должно быть, это весьма грозный противник."

    - char: scharnhorst_meta_d1?
      side: right
      status: is-yellow
      text:
        - "Так и есть. Поговаривают, что Влюблённые даже среди прочих Арбитров считается одной из самых проблемных."

    - char: ulrich_von_hutten
      side: left
      text:
        - "В таком случае, я хочу на это взглянуть."

    - char: scharnhorst_meta_d1?
      side: right
      status: is-yellow
      text:
        - "…Ха?! Ты что, с ума сошла?!"

    - char: ulrich_von_hutten
      side: left
      text:
        - "Да что ж у всех одна и та же реакция… Ты уже вторая за сегодня, кто это говорит."
        - "Успокойся, я в своём уме."
        - "До меня доходили сведения, что во время недавней операции в центральном секторе океана NA объединённый флот Лазурного Пути при поддержке двух бойцов «Пепла» успешно отразил атаку сразу трёх Арбитров."
        - "Сейчас у нас тоже есть флот, в наличии две META, а Арбитр со стороны врага всего один. Не вижу причин для бегства."

    - char: scharnhorst_meta_d1?
      side: right
      status: is-yellow
      text:
        - "Хм? Надо же, неужели такое и правда было…"

    - char: ulrich_von_hutten
      side: left
      text:
        - "Ты не знала?"

    - char: scharnhorst_meta_d1?
      side: right
      status: is-yellow
      text:
        - "Наши силы сильно рассредоточены. Обмен информацией между мирами — процесс не самый оперативный…"

    - char: ulrich_von_hutten
      side: left
      text:
        - "Шанс редкий, неужели тебе не хочется попробовать?"
        - "Вымани Арбитра Влюблённые VI в точку, которую я отмечу. Там находится наш проход: это не только обеспечит свободу маневра, но и позволит задействовать дополнительные подкрепления."
        - "Если тебя беспокоит вопрос снабжения — не переживай, можешь свободно пользоваться нашими запасами."

    - char: scharnhorst_meta_d1?
      side: right
      status: is-yellow
      text:
        - "…Энтерпрайз не одобрит этот план."

    - char: ulrich_von_hutten
      side: left
      text:
        - "Тогда убеди её. В конце концов, вступать в бой придётся тебе."

    - char: scharnhorst_meta_d1?
      side: right
      status: is-yellow
      text:
        - "Твоё предложение… от него и впрямь чертовски трудно отказаться."

    - char: ulrich_von_hutten
      side: left
      text:
        - "Должно быть, это и есть та самая малая толика моего личного обаяния."

    - char: scharnhorst_meta_d1?
      side: right
      status: is-yellow
      text:
        - "Слишком много переменных. Я не могу ничего тебе гарантировать."

    - char: ulrich_von_hutten
      side: left
      text:
        - "Четыре часа. Если по истечении этого времени ты не появишься, мы немедленно уходим."

    - char: scharnhorst_meta_d1?
      side: right
      status: is-yellow
      text:
        - "Разумное решение. На этом и распрощаемся. Увидимся чуть позже… или не увидимся больше никогда."
chapter1:
  rows:

    - char: elbe
      side: left
      text:
        - "Кстати говоря… Вам не кажется, что с самого начала кого‑то не хватает?"

    - char: magdeburg
      side: right
      text:
        - "Адальберт, должно быть, всё это время делает разминку снаружи. Она всегда так поступает перед началом битвы."

    - char: u1206
      side: left
      text:
        - "Не рановато ли для подготовки? Разве сражения не начнутся только после того, как мы войдём внутрь?"
        - "Скоро время обеда, как ни крути, нужно сначала плотно подкрепиться, а потом уже выступать."
        - "Хи‑хи, глядишь, торчащая снаружи Адальберт с досадой пропустит всё самое вкусное."

    - char: prinz_adalbert
      side: right
      text:
        - "Я только что вернулась, и я всё слышала."

    - char: u1206
      side: left
      text:
        - "Ой… *погружается под воду*"

    - char: magdeburg
      side: right
      text:
        - "Как обстановка снаружи?"

    - char: prinz_adalbert
      side: left
      text:
        - "Никаких отклонений. Но вы же слышали: сейчас врагов нет только благодаря маскировке системы «Гало»."
        - "Как только сингулярность активируется, разве Сирены в округе позволят нам спокойно войти? В этот раз мы проворачиваем всё втайне прямо у них под носом."
        - "Нельзя пренебрегать подготовкой перед боем, иначе на поле брани придётся туго, ясно?"

    - char: magdeburg
      side: right
      text:
        - "«Придётся туго»… И где ты только набираешься таких странных словечек? Впрочем, ты не совсем неправа!"
        - " До обеда ещё есть время, почему бы всем не выйти и немного не размяться?"

    - char: prinz_adalbert
      side: left
      text:
        - "U‑1206 — а она где?"

    - char: magdeburg
      side: right
      text:
        - "Как только ты вошла, она тут же нырнула и дала дёру."

    - char: prinz_adalbert
      side: left
      text:
        - "Эльба, тебя это тоже касается."

    - char: elbe
      side: right
      text:
        - "Э‑э… Ну уж нет. Я авианосец, мне достаточно поддерживать вас из тыла, а такие резкие движения…"

    - text:
      - "Не успела она договорить, как Принц Адальберт одним прыжком оказалась рядом и без колебаний ухватила её за щёку."

    - char: elbe
      side: right
      text:
        - "Больно‑больно‑больно! Ладно, я поняла‑а!"

    - text:
      - "Пока все возились и шутили, из прохода с другой стороны послышался приближающийся шум оживлённого разговора."

    - char: prinz_heinrich
      side: left
      text:
        - " Это сегодня, да? Точно сегодня? Ну конечно же, сегодня!"

    - char: z46
      side: right
      text:
        - "Генрих, слишком шумно."

    - char: prinz_heinrich
      side: left
      text:
        - "Стоит сегодняшнему дню закончиться, как бесконечная работа наконец‑то подойдёт к концу."
        - "Отпуск! Хочу отпуск! Умираю от скуки — столько дней провести взаперти в этом месте."

    - char: z46
      side: right
      text:
        - " Миссия ещё не окончена. Надеюсь, ты сможешь ещё немного подержать свои нервы в напряжении."

    - char: prinz_heinrich
      side: left
      text:
        - " …Вообще‑то, это Айзен хочет в отпуск! Видишь, он совсем поник. Айзен, Айзен, ты ведь тоже так думаешь?"

    - char: z46
      side: right
      text:
        - "Скорее всего, он просто устал от того, как ты его затискала…"

    - char: prinz_adalbert
      side: left
      text:
        - "Йо, Генрих."

    - char: prinz_heinrich
      side: right
      text:
        - "Адальберт!.. Давно не виделись! Ты‑то здесь какими судьбами?!"

    - char: prinz_adalbert
      side: left
      text:
        - "...?"

    - char: prinz_heinrich
      side: right
      text:
        - "Эй… Я что, сказала что‑то странное?!"

    - char: z46
      side: left
      text:
        - " Генрих… Приказы к операции… Ты их вообще читала?"

    - char: prinz_heinrich
      side: right
      text:
        - " Подобные бумажки можно просто помечать «Ознакомлена» и откладывать в сторону… Всё равно ведь Петер за всем следит!"

    - char: prinz_adalbert
      side: left
      text:
        - "Эх… Всё такая же, как обычно."
        - "Если вкратце: мы — флот, прибывший для исследования внутренней части сингулярности. Сейчас ждём этапа финального подтверждения."

    - char: magdeburg
      side: right
      text:
        - "И заодно ждём обеда."

    - char: prinz_heinrich
      side: left
      text:
        - "Вот оно что! Мы как раз только что из центра управления, этап финального подтверждения уже завершён."
        - "Стоит Петеру отдать приказ, и «Башня Мидгарда» будет официально запущена!"
        - "Правда, Петер уже целую вечность торчит в конференц‑зале, и от неё ни весточки…"

    - char: elbe
      side: right
      text:
        - "Ну, госпожа Ульрих — это тот человек, который требует полной самоотдачи и предельной серьёзности в делах."

    - char: prinz_heinrich
      side: left
      text:
        - " А… Та вечно хмурая Ульрих тоже здесь?!"

    - char: z46
      side: right
      text:
        - "Именно. И если она увидит тебя в таком разболтанном состоянии…"

    - char: prinz_heinrich
      side: left
      text:
        - "Я немедленно бегу перечитывать отчёты и приказы! Всем до встречи!"

    - char: magdeburg
      side: right
      text:
        - "Какая скорость! Не зря она систершип Адальберт."

    - char: z46
      side: left
      text:
        - "…Обед уже готов, прошу всех следовать за мной в зону отдыха."
        - "Что касается Генриха, она наверняка сама придёт, как только закончит чтение. Не беспокойтесь о ней."
chapter1:
  rows:

    - text:
      - "Настал рассвет, и первые лучи солнца осветили морскую гладь, кишащую активностью, словно оживлённый рынок."
      - "Повсюду возвышались огромные стальные крепости, между которыми методично сновали бесчисленные серийные военные корабли — работа шла чётко и по графику."
      - "Однако больше всего внимание привлекала колоссальная кольцеобразная конструкция вдали."

    - char: elbe
      side: left
      text:
        - "Так вот она какая, «Башня Мидгарда»… Не думала, что её соберут так быстро."

    - char: magdeburg
      side: right
      text:
        - "Какое величие… Они трудились здесь столько времени, теперь наш черёд задать жару!"

    - char: u1206
      side: left
      text:
        - "*Буль‑буль* — Ух! U‑1206 успешно всплыла!"
        - "Под водой, не считая перепуганных косяков рыб, никаких подозрительных следов не обнаружено."
        - "Кто знает, может, в этот раз никакие странные враги не явятся портить нам малину… Хотя это вряд ли возможно, да?.."

    - char: elbe
      side: right
      text:
        - "Хи‑хи, если появятся непослушные плохие детки, разве это не отличный повод их наказать?"

    - char: magdeburg
      side: left
      text:
        - "Эльба, ты это вслух сказала."

    - char: peter_strasser_rad
      side: right
      text:
        - "Приветствую всех. Я — ответственное лицо на данном объекте и флагман Второго флота Железной Крови, Петер Штрассер."

    - char: elbe
      side: left
      text:
        - "Давно не виделись, Петер."
        - "Не ожидала, что ты занимаешься здесь чем‑то настолько интересным. Когда я впервые услышала об этом, я была по‑настоящему поражена!"

    - char: peter_strasser_rad
      side: right
      text:
        - "Давно не виделись. Ты тоже стала выдающимся авианосцем Железной Крови, способным действовать самостоятельно."
        - "Это место не столько «интересное», сколько полное опасностей и вызовов. Пока вы подходите ближе, позвольте мне вкратце обрисовать ситуацию."
        - "Как вы можете видеть, это гигантское сооружение перед вами — венец технологий Железной Крови, искусственная сингулярность «Башня Мидгарда»."

    - char: magdeburg
      side: left
      text:
        - "Грандиозно и эффектно! Построить такую махину прямо в море… Должно быть, транспортировка была невероятно сложной."

    - char: peter_strasser_rad
      side: right
      text:
        - "Хм, определённые трудности возникли, но всё прошло не так тяжело, как ты себе представляешь."
        - "Чтобы обеспечить скрытность и эффективность процесса, основная часть «Башни Мидгарда» была разделена на десятки плавучих островов, заранее изготовленных на базе."
        - "Каждый остров добрался сюда на собственной тяге, после чего мы провели финальную сборку на месте."

    - char: elbe
      side: left
      text:
        - "Вот оно что. Похоже на технологию, по которой мы строим наши крупные группы плавучих крепостей."

    - char: peter_strasser_rad
      side: right
      text:
        - "Это улучшенная версия прежних технологий. Разумеется, без определённых средств маскировки было не обойтись."
        - "Как сам процесс транспортировки, так и это место сборки являются испытанием для масштабного применения системы «Гало»."
        - "На данный момент всё идёт гладко. Благодаря маскировке сигналов даже столь масштабная операция не была замечена ни одной из сторон."
        - " Ах… Погодите, насколько я помню по документам… Эльба, этот флот действительно ведёшь ты?"

    - char: elbe
      side: left
      text:
        - " Как бы не так! Флагман нашего флота — достопочтенная Ульрих фон Хуттен."

    - char: ulrich_von_hutten
      side: right
      text:
        - "......"

    - char: peter_strasser_rad
      side: left
      text:
        - "… Прошу прощения, госпожа Ульрих. Вы всё это время хранили молчание, и я на мгновение упустила вас из виду."

    - char: ulrich_von_hutten
      side: right
      text:
        - "Не берите в голову, госпожа Штрассер. По правде говоря, будучи гостем, я должна была поприветствовать вас первой."
        - "Просто… Увидев столь величественное зрелище перед собой, я на мгновение оцепенела. Моя оплошность в соблюдении этикета."
        - "Позвольте представиться официально: я — Ульрих фон Хуттен. Я прибыла сюда как спецпосланник Фридрих дер Гроссе и обладаю высшим правом командования в этой операции."

    - char: peter_strasser_rad
      side: left
      text:
        - " Есть! Я уже получила соответствующие приказы. Оборонительные сооружения «Башни Мидгарда» и дислоцированный здесь Второй основной флот Железной Крови поступают в ваше распоряжение."

    - char: ulrich_von_hutten
      side: right
      text:
        - "Хорошо. Госпожа Штрассер, после запуска «Башни Мидгарда» функции маскировки системы «Гало» продолжат работать в штатном режиме?"

    - char: peter_strasser_rad
      side: left
      text:
        - "Мы ещё не проводили подобных испытаний. Если бы у нас было больше времени…"

    - char: ulrich_von_hutten
      side: right
      text:
        - "Времени нет. Будем проверять реальные возможности в бою. Что говорит теоретический анализ?"

    - char: peter_strasser_rad
      side: left
      text:
        - "Теоретически… Скорее всего, нет. Ожидается, что колоссальный энергетический вихрь, возникающий при работе искусственной сингулярности, создаст мощнейшие помехи для системы «Гало»."

    - char: ulrich_von_hutten
      side: right
      text:
        - "Как я и думала. Сейчас всё кажется тихим и спокойным, но настоящие испытания начнутся только после активации сингулярности."
        - "Госпожа Штрассер, укажите точку сбора. Подробности обсудим уже в конференц‑зале."

    - char: peter_strasser_rad
      side: left
      text:
        - " Без проблем. Прошу всех следовать за конвоем к первому причалу. Увидимся внутри «Башни Мидгарда»."
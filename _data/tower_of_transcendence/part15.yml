chapter1:
  rows:

    - char: gneisenau_meta
      side: left
      status: is-yellow
      text:
        - "Что ты задумала?"

    - text:
      - "Предложение Ульрих, судя по всему, стало полной неожиданностью даже для Гнейзенау META."
      - "Хоть в этом и не было необходимости, она прекратила огонь, позволяя флоту Железной Крови отойти и давая Ульрих возможность шаг за шагом приблизиться к ней вплотную."

    - char: gneisenau_meta
      side: left
      status: is-yellow
      text:
        - "…Если ты хотела убедиться, нет ли поблизости кого‑то ещё, я отвечу за тебя."
        - "Вокруг никого. В небе нет разведчиков, под водой — подлодок. Можешь нападать без лишних опасений."
        - "Мне не претит формат дуэли, но бросать мне вызов, не осознавая разницы в силе… Беру свои слова назад: ты безумна ничуть не меньше моего."

    - char: ulrich_von_hutten
      side: right
      text:
        - "Нет, я в своём уме."

    - char: gneisenau_meta
      side: left
      status: is-yellow
      text:
        - "Человек в здравом уме посмел бы вызвать на бой меня — ту, кто прошла через META‑морфозу, кто окончательно лишился рассудка и несёт лишь смерть и разрушение?!"

    - char: ulrich_von_hutten
      side: right
      text:
        - "Посмел бы. Потому что ты тоже не сумасшедшая."

    - char: gneisenau_meta
      side: left
      status: is-yellow
      text:
        - "Чушь… Каждый, кто видел меня, твердил, что я лишилась ума. Да ты и сама только что это сказала."

    - char: ulrich_von_hutten
      side: right
      text:
        - "Это? Ошибочка вышла, забираю свои слова обратно."

    - char: gneisenau_meta
      side: left
      status: is-yellow
      text:
        - "…Ха?!"

chapter2:
  rows:

    - char: ulrich_von_hutten
      side: left
      text:
        - "Прошлое осталось в прошлом, теперь давай‑ка вместе взглянем на это."

    - text:
      - "Ульрих не стала наводить орудия. Вместо этого она достала изысканное письмо. Сургучная печать с эмблемой Железной Крови на конверте будто всё ещё хранила тепло."

    - char: gneisenau_meta
      side: right
      status: is-yellow
      text:
        - "Официальный приказ?"
        - "Ха. Я уже сказала: я не знаю никакой Фридрих дер Гроссе, и её так называемые приказы мне не интересны."
        - "Для меня эта бумажка ничем не отличается от мусора!"

    - char: ulrich_von_hutten
      side: left
      text:
        - "Не спеши. Я же сказала: прошлое в прошлом. И я вовсе не говорила, что этот приказ от Фридрих."

    - char: gneisenau_meta
      side: right
      status: is-yellow
      text:
        - "Что ты… имеешь в виду?"

    - text:
      - "Увидев, как рука Гнейзенау, собиравшаяся отшвырнуть письмо, замерла в воздухе, Ульрих поняла, что попала в точку."

    - char: ulrich_von_hutten
      side: left
      text:
        - "Что, если этот приказ от кого‑то другого? Например — от…"

    - text:
      - "Услышав имя, произнесённое Ульрих, Гнейзенау окончательно застыла."
      - "Ульрих прекрасно понимала: Гнейзенау, прошедшая через META‑морфозу, не из тех, кто привык выставлять свои истинные чувства напоказ. Однако скрыть потрясение такого масштаба оказалось не под силу даже ей."
      - "В гнетущей тишине Гнейзенау вскрыла письмо. Медленно изучив подпись в конце послания, она едва слышно прошептала имя..."

    - char: gneisenau_meta
      side: right
      status: is-yellow
      text:
        - "Бисмарк…"

    - text:
      - "Это до боли знакомое имя, подобно тёплому потоку, мгновенно заполнило её почти опустошённую оболочку."
      - "Прошлые воспоминания — или, скорее, их уцелевшие осколки — начали вспыхивать перед её глазами один за другим. Она вспомнила их первую встречу, слова, сказанные перед походом, и страшную весть о том, что флагман больше не вернётся в порт."
      - "Время будто повернуло вспять, вернув её в тот вечер, когда пришло известие. Сумерки, заливающие пустую комнату. Она стоит в коридоре, колеблется, медлит, но так и не находит в себе смелости вновь толкнуть ту дверь."

    - char: gneisenau_meta
      side: right
      status: is-yellow
      text:
        - "Она когда‑то сказала… что свершившееся сожаление невозможно исправить, и всё, что нам остаётся — это смотреть в будущее…"

    - char: ulrich_von_hutten
      side: left
      text:
        - "Но когда горизонт достаточно широк, разве неведомое прошлое не может стать одним из вариантов будущего?"
        - "Ты наверняка узнаешь её почерк. Любая подделка не укрылась бы от твоего взгляда."

    - text:
      - "Гнейзенау не ответила. Дрожащими пальцами она раз за разом обводила холодные росчерки чернил на бумаге."

    - char: gneisenau_meta
      side: right
      status: is-yellow
      text:
        - "Да… это определённо её почерк, без сомнения. Но я не понимаю… это чувство…"
        - "…Нет, нет, всё должно быть не так!"
        - "Она не должна была проходить через это!!!"

    - char: ulrich_von_hutten
      side: left
      text:
        - "Это был её добровольный выбор. Ради будущего Железной Крови."
        - "А что насчёт тебя? Готова ли ты присягнуть на верность Железной Крови, ради которой она принесла себя в жертву?"

    - char: gneisenau_meta
      side: right
      status: is-yellow
      text:
        - "......"

    - char: ulrich_von_hutten
      side: left
      text:
        - "Отвечай мне, Гнейзенау! Я даю тебе шанс исправить то, о чём ты так долго сожалела. Ты воспользуешься им?!"

    - char: gneisenau_meta
      side: right
      status: is-yellow
      text:
        - "Её состояние… оно ведь уже критическое, верно?.."

    - char: ulrich_von_hutten
      side: left
      text:
        - "Пока ты не ответишь на мой предыдущий вопрос, я не скажу тебе больше ни слова."

    - char: gneisenau_meta
      side: right
      status: is-yellow
      text:
        - "........."

    - text:
      - "Гнейзенау мёртвой хваткой вцепилась в приказ, вглядываясь в каждую мельчайшую деталь на бумаге."
      - "Перед её мысленным взором предстала ослабленная Бисмарк, с трудом выводящая эти строки в той самой знакомой комнате. Закончив, Бисмарк отложила перо и с улыбкой протянула ей руку…"
      - "Гнейзенау отчётливо почувствовала, как сердце пропустило удар, и в её угасшей душе внезапно вспыхнули яркие искры."

    - char: gneisenau_meta
      side: right
      status: is-yellow
      text:
        - "Моя судьба уже давно пробила дно… Честно говоря, я планировала, что сегодняшний день станет моим последним актом верности «Железу»."
        - "Но… если это ради неё, я готова попытаться ещё раз…"

    - char: ulrich_von_hutten
      side: left
      text:
        - "Для нас большая честь прийти к согласию."

    - char: gneisenau_meta
      side: right
      status: is-yellow
      text:
        - "…Раз вы нашли способ попасть сюда, значит, знаете и как выбраться?"

    - char: ulrich_von_hutten
      side: left
      text:
        - "Само собой."

    - char: gneisenau_meta
      side: right
      status: is-yellow
      text:
        - "По возвращении я хочу видеть её."

    - char: ulrich_von_hutten
      side: left
      text:
        - "Это право, которое ты заслужила."
        - "Однако о нашем разговоре — ни слова никому. Если сведения о её нынешнем состоянии просочатся наружу, последствия, полагаю, тебе ясны."

    - char: gneisenau_meta
      side: right
      status: is-yellow
      text:
        - "Ха… Уж это я понимаю яснее некуда."

    - char: ulrich_von_hutten
      side: left
      text:
        - "Идём. Возвращаемся к флоту, пора ложиться на обратный курс."
        - "…И вытри слёзы. В будущем та твоя «безумная» сторона понадобится нам даже больше, чем раньше."

    - char: gneisenau_meta
      side: right
      status: is-yellow
      text:
        - "Ха! Ты хоть понимаешь, с кем разговариваешь? Не наглей, Ульрих фон Хуттен!"

    - char: ulrich_von_hutten
      side: left
      text:
        - "Вот это другое дело. Добро пожаловать в «Железную Кровь», Гнейзенау META."
        - "Eisen und Blut über alles — вместе мы двинемся навстречу будущему!"

    - text:
      - "До закрытия «Башни Мидгарда» осталось — 11 часов 17 минут."
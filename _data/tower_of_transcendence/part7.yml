chapter1:
  rows:

    - text:
      - "Обжигающий воздух и ледяная морская вода — ощущение было такое, будто они попали в морскую пустыню. В нос ударил резкий, раздражающий запах, и тут же накатила волна головокружения."
      - "Подобный дискомфорт, пронизывающий всё существо изнутри, — по‑настоящему редкий опыт для кансен."

chapter2:
  rows:

    - char: prinz_adalbert
      side: left
      text:
        - "Ульрих, ты в порядке?"

    - char: ulrich_von_hutten
      side: right
      text:
        - "Кха‑кха… Где это мы…"
        - "Похоже, переход через «Башню Мидгарда» завершился успехом."

    - char: prinz_adalbert
      side: left
      text:
        - "Да, без сомнения, мы оказались в ином пространстве."
        - "Когда я прибыла, ты лежала без сознания на воде. Должно быть, я вошла чуть позже тебя. Хотя я тоже чувствую некое недомогание, у меня всё не так серьёзно, как у тебя."

    - char: ulrich_von_hutten
      side: right
      text:
        - "Видимо, из‑за того, что я шла первой, я приняла на себя основной удар… Стоит это зафиксировать: в будущем лучше пускать впереди серийные корабли."
        - "С остальными всё в порядке? Что по обстановке вокруг?"

    - char: prinz_adalbert
      side: left
      text:
        - "Все на месте, пока мы в безопасности."

    - char: elbe
      side: right
      text:
        - "Окружающая среда проверяется. Похоже, здесь есть воздух и вода, и нас не окружили враги в первую же секунду — для начала вполне неплохо!"

    - char: magdeburg
      side: left
      text:
        - "Теперь переходим к разведке, верно? Время ограничено, а просторы здесь огромные. В какую сторону направимся?"

    - char: elbe
      side: right
      text:
        - "Я обнаружила обломки: некоторые совсем свежие, другие же — очень старые."
        - "Старые обломки говорят о том, что с момента нападения прошло немало времени. Возможно, путь вдоль них — самый безопасный маршрут?"

    - char: magdeburg
      side: left
      text:
        - "Логично!"

    - char: u1206
      side: right
      text:
        - "Эльба, Эльба! У меня тоже вопрос!"
        - "Почему позади нас стоит ещё одна «Башня Мидгарда»? Их что, две?"

    - text:
      - "U‑1206 несколько утрированно указала пальцем на гигантское устройство за их спинами. Оно ничем не отличалось от прежнего, за исключением того, что вихрь в центре теперь вращался в абсолютно противоположную сторону."

    - char: elbe
      side: left
      text:
        - "…Глупышка! Это та самая «Башня Мидгарда», через которую мы пришли!"
        - "Искусственная сингулярность соединяет два мира, и это — наш единственный путь назад!"

    - char: u1206
      side: right
      text:
        - "Вот оно что… Но почему тогда кажется, что она стала намного меньше?!"

    - char: elbe
      side: left
      text:
        - "Меньше?.. А, ты про те оборонительные плавучие острова снаружи. Они не являются частью самой Башни, поэтому, естественно, не перенеслись сюда."

    - char: u1206
      side: right
      text:
        - " Понятно! Эльба так много знает, наверняка втихомолку зубрила матчасть как прилежная ученица!"

    - char: elbe
      side: left
      text:
        - " Ах ты…! Ещё одно слово — и скормлю тебя акулам!"

    - char: u1206
      side: right
      text:
        - "Бе‑е! U‑1206 каких‑то там акул не боится."

    - text:
      - "U‑1206 со скоростью света спряталась за спину Магдебург и скорчила Эльбе рожицу."

    - char: ulrich_von_hutten
      side: left
      text:
        - "Похоже, все уже немного освоились. Позвольте мне ещё раз огласить наши задачи."
        - "Задача первая: исследовать неведомый мир, в который ведёт сингулярность, собрать максимум разведданных и подготовить почву для последующих миссий."
        - "Задача вторая: найти в этом мире выжившие боевые единицы — например, корабли в состоянии META. По возможности — убедить их примкнуть к нашей стороне."

    - char: elbe
      side: right
      text:
        - "Э?! Погоди, что ещё за вторая задача?! Я в глаза её не видела в документах!"

    - char: ulrich_von_hutten
      side: left
      text:
        - "Хм, это потому, что я её туда не вписывала."

    - char: prinz_adalbert
      side: right
      text:
        - " Это прозвучало внезапно… Дай нам хоть какие‑то разъяснения, Ульрих."

    - char: ulrich_von_hutten
      side: left
      text:
        - "По ряду причин, которые я не могу разглашать, часть целей нашей операции должна была оставаться в секрете. Поэтому я предпочла объявить о них только после того, как мы войдём в сингулярность."

    - char: prinz_adalbert
      side: right
      text:
        - "Такое чувство, будто ты ничего и не объяснила… Но ты здесь главный командующий, так что тебе и решать."
        - "Однако с чего ты взяла, что мы вообще встретим здесь выжившие корабли META?"
        - "И «выжившие» — относительно чего? Насколько много нам вообще известно о META и об этом мире?"

    - char: ulrich_von_hutten
      side: left
      text:
        - " Выжившие — относительно уничтожения. О META у нас есть определённое представление, а об этом мире — никакого. И разве наша работа теперь не заключается в том, чтобы изучить его?"
        - "Прежде чем отправиться сюда, мы провели ряд расчётов и немного положились на удачу. Чтобы достичь второй цели, нам просто потребуется ещё больше расчётов и ещё больше удачи."

    - char: prinz_adalbert
      side: right
      text:
        - " Э‑э…"

    - char: ulrich_von_hutten
      side: left
      text:
        - "М? Есть ещё вопросы?"

    - char: prinz_adalbert
      side: right
      text:
        - "Больше нет…"

    - char: ulrich_von_hutten
      side: left
      text:
        - "Хе‑хе, вот и славно. Тогда приступаем к выполнению. Разведку будем вести по маршруту, предложенному Эльбой."

    - char: elbe
      side: right
      text:
        - "Есть! Немедленно прокладываю курс."

    - char: ulrich_von_hutten
      side: left
      text:
        - "Подводная часть на тебе, U‑1206."

    - char: u1206
      side: right
      text:
        - "U‑1206 всё поняла, начинаю погружение."

    - char: ulrich_von_hutten
      side: left
      text:
        - "Хорошо. Помните о нашей цели: мы здесь ради исследований и поиска силы. Старайтесь избегать бессмысленных сражений."
        - "Всем быть начеку. Продвигаемся осторожно."
chapter1:
  rows:

    - text:
      - "Внезапно по всему полю боя прокатилась серия оглушительных взрывов. Поверхность океана в нескольких секторах одновременно расцвела яркими вспышками."

    - char: magdeburg
      side: left
      text:
        - "О-о-о! Гнейзенау META пришла на помощь! Ну всё, теперь исход боя предрешён!"

    - char: prinz_adalbert
      side: right
      text:
        - "Но пришла только одна. Вторая всё ещё и пальцем не пошевелила."

    - char: ulrich_von_hutten
      side: left
      text:
        - "Реализация любого плана требует времени. До последнего момента никто не может быть уверен в результате."
        - "Впрочем, даже одной META достаточно, чтобы чаша весов склонилась в нашу сторону. Под таким шквалом огня враг скоро сам превратится в свежую гору обломков."

    - char: elbe
      side: right
      text:
        - "Это если их количество останется прежним… Госпожа Ульрих, флот Сирен внезапно сменил построение!"

    - text:
      - "Как только союзники начали переводить дух, особые гуманоидные юниты Сирен единым строем, словно по команде, бросились в сторону Гнейзенау."

    - char: prinz_adalbert
      side: left
      text:
        - "Их стало намного больше, и мы даже не заметили, когда… Неужели все те, кто ждал под водой, разом всплыли?.."

    - char: u1206
      side: right
      text:
        - "Нет, под водой их ещё больше! Враги прибывают бесконечным потоком, словно косяки рыб!!"

    - char: prinz_adalbert
      side: left
      text:
        - "Вы шутите… Гуманоидных моделей больше, чем серийных кораблей?.."

    - text:
      - "Залпы Гнейзенау несли разрушение — даже новейшие модели не могли полностью выдержать их мощь."
      - "Враги гибли один за другим, превращаясь в пылающие шары, у них даже не оставалось времени на фокусы с подводной ротацией."
      - "Однако противник продолжал прибывать со всех сторон, а частота выстрелов Гнейзенау начала постепенно снижаться."

    - char: u1206
      side: left
      text:
        - "Они поняли, что у Гнейзенау проблемы с маневренностью… Они собираются просто задавить её числом!"

    - char: elbe
      side: right
      text:
        - "Плохо дело, нужно срочно её поддержать!"

    - char: magdeburg
      side: left
      text:
        - "Но мы и сами сейчас не можем пошевелиться…"
        - "Да что это вообще за существа? Мы столько сражались с Сиренами, но этот леденящий ужас я чувствую впервые…"

    - char: scharnhorst_meta_d1?_rad
      side: right
      status: is-yellow
      text:
        - "Это Энфорсеры. Модель: Энфорсер VI «Комбинатор». Подчиняются Арбитру Влюблённые VI."
        - "Врагов слишком много, и вы чувствуете отчаяние, не так ли?"
        - "Для «Пепла» это всего лишь обычное сражение, с которыми мы сталкиваемся ежедневно."
        - "Полагаю, теперь у вас появилось желание поговорить снова. Но обсуждать дела, когда вокруг столько лишних глаз, неудобно."
        - "Я возьму зачистку на себя. Всем отойти как можно дальше. Шарнхорст, член флота «Пепла», вступает в бой!"

    - char: ulrich_von_hutten
      side: left
      text:
        - "Ха, ну что я говорила?.. Теперь и вторая перешла к активным действиям."

    - text:
      - "До закрытия «Башни Мидгарда» осталось — 8 часов 21 минута."
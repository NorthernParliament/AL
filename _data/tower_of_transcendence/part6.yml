chapter1:
  rows:

    - char: peter_strasser
      side: left
      text:
        - "Прошу прощения, что заставила вас ждать."

    - char: ulrich_von_hutten
      side: right
      text:
        - "Госпожа Штрассер, какова обстановка на данный момент?"

    - char: peter_strasser
      side: left
      text:
        - " Сражение перешло в завершающую стадию. Благодаря стратегии перехвата на дальних рубежах и поддержке оборонительных сооружений крепости атака противника не нанесла нам никакого ущерба."
        - "Сейчас мы перенаправляем энергию из систем обороны в основную систему. Ожидается, что через 15 минут «Башня Мидгарда» будет полностью запущена."

    - char: ulrich_von_hutten
      side: right
      text:
        - "Хорошая работа, госпожа Штрассер."
        - "До открытия осталось совсем немного времени. Всем провести финальную проверку перед выступлением."

    - char: u1206
      side: left
      text:
        - "Госпожа Ульрих, а как вы считаете, на что похожа эта искусственная сингулярность? На сиденье унитаза или на пончик?"

    - char: prinz_adalbert
      side: right
      text:
        - "Ты всё ещё не оставила эту тему…"

    - char: ulrich_von_hutten
      side: left
      text:
        - "Ну… Я думаю, ни на то, ни на другое. Это сооружение — далеко не такая прекрасная вещь."
        - "Ты знаешь значение нынешнего названия?"

    - char: u1206
      side: right
      text:
        - "Мидгард… Мир в мифологии, где живут люди?"

    - char: ulrich_von_hutten
      side: left
      text:
        - "Верно. И я считаю, что этого названия вполне достаточно для описания."
        - "«Башня Мидгарда» — созданная миром людей высокая башня, ведущая в неизвестность."
        - "Хотя это натолкнуло меня на другой вопрос: нынешняя башня — ведёт ли она наверх, или же она ведёт вниз?.."

    - char: prinz_adalbert
      side: right
      text:
        - "Ведёт наверх или ведёт вниз?"

    - char: ulrich_von_hutten
      side: left
      text:
        - "Наверху — обитель богов, внизу — царство мёртвых… В любом случае, мы узнаем это только тогда, когда окажемся внутри."

    - text:
      - "Под оглушительный рокот морская вода вместе с лучами света и даже облаками в небе начала закручиваться, образуя колоссальный трёхмерный вихрь."

    - char: peter_strasser
      side: left
      text:
        - "Госпожа Ульрих, процедура запуска полностью завершена."
        - "После успешной активации «Врата Мидгарда» будут стабильно функционировать как минимум 17 часов. Пожалуйста, строго соблюдайте временной лимит и обязательно вернитесь до его истечения."
        - "А теперь — отправляйтесь в путь. Желаю вам удачи."

    - char: ulrich_von_hutten
      side: right
      text:
        - "Поняла. Теперь это наше поле боя."
        - "Всем кораблям исследовательской группы — внимание! Установить таймер обратного отсчёта на 17 часов."
        - "Порядок вхождения: первой идёт U‑1206, затем я, Адальберт и Магдебург. Эльба замыкает строй вместе с флотом серийных кораблей."
        - "Наша задача — исследовать неведомый мир, с которым нас соединила сингулярность. Мы должны собрать как можно больше крупиц информации."
        - "Результаты этого похода напрямую повлияют на дальнейшую стратегию Железной Крови. Мы — первопроходцы, и наш долг — проложить путь для тех, кто придёт за нами."
        - "Вперёд!"

    - text:
      - "Отдав приказ, Ульрих фон Хуттен первой рванулась в бушующий поток и исчезла в причудливом сиянии воронки."

    - char: u1206
      side: left
      text:
        - "Мы правда входим? Мне вдруг показалось, что я ещё совсем не готова…"

    - char: magdeburg
      side: right
      text:
        - "Подготовку никогда нельзя закончить полностью. Раз надо — значит, надо. Погнали!"

    - text:
      - "Под аккомпанемент мимолётного вскрика U‑1206, подхваченная напористой Магдебург, скрылась в недрах водоворота."

    - char: prinz_adalbert
      side: left
      text:
        - " Генрих, я ухожу."

    - char: prinz_heinrich_rad
      side: right
      text:
        - "Удачи там! Постарайтесь!"

    - char: prinz_adalbert
      side: left
      text:
        - "Увидимся по ту сторону сингулярности, Эльба."

    - char: elbe
      side: right
      text:
        - "До встречи за чертой."

    - text:
      - "С этими словами Принц Адальберт невозмутимо и уверенно вошла в воронку."

    - char: elbe
      side: left
      text:
        - "Проверка завершена. Сопровождение из серийного флота выглядит вполне внушительно."
        - "Боже мой… Совершенно неясно, что там, на другой стороне. С чем же нам предстоит столкнуться? Я в предвкушении!"
        - "Ну что ж, Петер, Везер, я тоже отчаливаю. Ждите моего триумфального возвращения."

    - char: weser_rad
      side: right
      text:
        - "Давай! Где бы ты ни оказалась, яви истинную стать авианосца Железной Крови. Пусть наши самолёты парят в небесах иного мира!"

    - char: peter_strasser
      side: left
      text:
        - "И не забудь про данные по аэродинамике, о которых я тебя просила."

    - char: elbe
      side: right
      text:
        - " Не волнуйся, не забуду. Я ушла."

    - text:
      - "В пульсирующем свете, исходящем из центра устройства подобно биению сердца, члены исследовательской группы вместе с огромным флотом серийных кораблей бесследно исчезли."
      - "Исследовательская операция Железной Крови наконец началась."
      - "До закрытия «Башни Мидгарда» осталось 16 часов 55 минут."
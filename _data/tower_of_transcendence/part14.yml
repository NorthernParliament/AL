chapter1:
  rows:

    - text:
      - "В самом сердце грохочущего и объятого пламенем поля боя Ульрих фон Хуттен продолжала вести огонь, сохраняя при этом ледяное спокойствие и анализируя ситуацию."

    - char: ulrich_von_hutten
      side: left
      text:
        - "Обстановка накалена, но не безнадёжна."

    - text:
      - "Благодаря численному превосходству флот Железной Крови хоть и не получил решающего преимущества, но прочно удерживал инициативу в своих руках."

    - char: ulrich_von_hutten
      side: left
      text:
        - "Но разве можно подавить META одним лишь количеством?"
        - "Это она слишком слаба, мы слишком сильны или же…"

    - text:
      - "Присмотревшись, Ульрих заметила неестественность в движениях Гнейзенау. Хотя каждый её залп обладал чудовищной мощью, манёвренность оставляла желать лучшего."
      - "Она предпочитала принимать удары на себя, лишь бы не менять позицию."

    - char: ulrich_von_hutten
      side: left
      text:
        - "Вот оно что. Ты ранена."
        - "Ранение определённо сказывается на боеспособности. Но это ещё не всё… Есть что‑то ещё, влияющее на ход боя."
        - "Когда я упомянула приказ Железной Крови, в её глазах вспыхнула искра."
        - "Но когда зашла речь о Фридрих, этот огонь погас…"
        - "…Понятно. Значит, именно для этого и был подготовлен «другой приказ»."

    - text:
      - "Словно осознав нечто важное, Ульрих внезапно прекратила огонь и включила общую трансляцию на весь флот."

    - char: ulrich_von_hutten
      side: left
      text:
        - "Говорит флагман Ульрих фон Хуттен. Флоту — немедленно прекратить огонь и отойти назад."
        - "Повторяю: всем прекратить стрельбу, немедленное отступление."

    - char: elbe
      side: right
      text:
        - "А?! Почему мы отступаем именно сейчас?"

    - char: magdeburg
      side: left
      text:
        - "Да мне казалось, ещё чуть‑чуть — и победа у нас в кармане!"

    - char: u1206
      side: right
      text:
        - "Я уже почти была готова к внезапной атаке!"

    - char: prinz_adalbert
      side: left
      text:
        - "Слишком резкая смена курса… Дай нам объяснения, Ульрих."

    - text:
      - "Игнорируя замешательство товарищей, Ульрих произнесла слова, которые шокировали всех ещё больше."

    - char: ulrich_von_hutten
      side: left
      text:
        - "Приказ об отступлении дан лишь для того, чтобы освободить место..."
        - "Гнейзенау, давай сойдёмся в честной дуэли один на один!"
chapter1:
  rows:

    - text:
      - "БАБАХ!!!"
      - "Роон и Майнц открыли огонь одновременно."
      - "Флот Железной Крови находился на опасно близком расстоянии от Влюблённых. Снаряды почти мгновенно преодолели защитные барьеры и с чудовищной силой вгрызлись в изящную броню Арбитра, оставляя на ней глубокие рваные раны."

    - char: lovers
      side: left
      status: is-red
      text:
        - "……………?"

    - text:
      - "Она уставилась на свои повреждения. В её взгляде на миг промелькнуло нечто, похожее на искреннее недоумение."

    - char: roon
      side: left
      text:
        - "Попадание подтверждаю!~ Как мило — оказывается, Арбитры тоже умеют истекать кровью."

    - char: prinz_adalbert
      side: right
      text:
        - "Раны затягиваются! Началась ускоренная регенерация... Сама Влюблённые отходит назад, но на нас прёт целая туча Энфорсеров!"

    - char: mainz
      side: left
      text:
        - "Крайне осторожный стиль ведения боя. Даже если мы не нанесли критического урона, это испытание огневой мощи дало нам бесценные данные."

    - char: prinz_adalbert
      side: right
      text:
        - "……Смотрите, свечение в её орудиях становится всё ярче! Она что, собирается выстрелить прямо по Башне Мидгарда?!"

    - char: mainz
      side: left
      text:
        - "Башня — это точка сопряжения миров, её не так-то просто уничтожить ударом с одной стороны."
        - "Наверное………… Хотя, глядя на эту мощь, я уже ни в чём не уверена."
        - "Продолжать бой сейчас — значит подставиться под удар. Роон, отряд Ульрих уже успешно эвакуирован. Повеселились и хватит, уходим и мы."

    - char: roon
      side: right
      text:
        - "Согласна. Принц Адальберт, раненые идут первыми!~"

    - char: prinz_adalbert
      side: left
      text:
        - "Огромное спасибо, не стану отказываться!"

    - text:
      - "Принц Адальберт в изящном развороте уклонилась от летящего в неё града снарядов и одним прыжком нырнула в бушующий поток в центре Башни Мидгарда."
      - "Следом за ней последовала Майнц, не забыв на прощание выпустить по врагу полный залп из своих орудий."
      - "Последней уходила Роон. Она не стала уклоняться, приняв на щиты вражеские снаряды; откинувшись назад, она позволила ударной волне самой втолкнуть её в пучину водоворота."
      - "В следующее мгновение пространство, где стояла Башня Мидгарда, содрогнулось от беззвучного, но яростного импульса. Энфорсеры, оказавшиеся в авангарде, мгновенно разлетелись на куски, а саму Влюблённые отбросило ещё дальше назад."
      - "А затем исполинский силуэт Башни Мидгарда просто исчез, словно его никогда и не существовало в этом море."

chapter2:
  rows:

    - char: prinz_heinrich
      side: left
      text:
        - "Экстренная остановка прошла успешно! Фу-ух… Такое чувство, будто я сейчас по винтикам развалюсь."
        - "Адальберт! Эй, ты как? Очнись, ну же!"
        - "Роон и Майнц тоже не реагируют… Всё, пропали! Неужели при перемещении что-то пошло не так?!"

    - char: z46
      side: right
      text:
        - "Похоже, выбранный нами способ был чересчур грубым…"

    - char: prinz_heinrich
      side: left
      text:
        - "А что нам оставалось делать? Ситуация была критической!"
        - "Айзен изо всех сил старался перегрызть эти кабели! Да и ты сама только что взорвала несколько распределителей!"
        - "Ой, Роон и Майнц приходят в себя!"

    - char: z46
      side: right
      text:
        - "Слава богу, перенос завершён. Быстрее, помогите им дойти до медпункта."
        - "Теперь осталось только дождаться, когда очнётся Адальберт, и миссию можно считать выполненной…"

    - char: prinz_heinrich
      side: left
      text:
        - "А потом — отпуск! И праздничный банкет!"

    - char: z46
      side: right
      text:
        - "Отпуск… Взгляни на контрольный зал, здесь всё разгромлено в хлам. Я лишь надеюсь, что нас не отдадут под трибунал."

    - char: prinz_heinrich
      side: left
      text:
        - "Ой, входящий сигнал! Это из штаба Железной Крови!"

    - char: z46
      side: right
      text:
        - "Знаешь, я тут внезапно вспомнила об одном крайне важном неоконченном деле. Мне пора."

    - char: prinz_heinrich
      side: left
      text:
        - "Не вздумай сбегать! Если нас посадят под замок, я буду сидеть в камере вместе с тобой!"

    - char: z46
      side: right
      text:
        - "……Спасибо, Генрих."
        - "Но мне от этого ни капельки не легче!"

    - char: prinz_adalbert
      side: left
      text:
        - "М-м-м…… Где это я?.. А-а-а-а-а!"

    - text:
      - "Z46, на полной скорости несущаяся по превращённому в руины залу управления — это было первое и последнее, что увидела только что пришедшая в себя Принц Адальберт."
      - "От мощного столкновения она снова провалилась в беспамятство."

    - char: prinz_heinrich
      side: left
      text:
        - "А-а! Беда! Адальберт опять вырубилась!"

    - char: prinz_adalbert
      side: right
      text:
        - "В этот раз и правда… переборщила с активностью. Когда всё закончится, надо будет… выбить себе нормальный отпуск, как у Генрих…………"
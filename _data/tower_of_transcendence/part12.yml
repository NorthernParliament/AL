chapter1:
  rows:

    - char: elbe
      side: left
      text:
        - "Бип‑бип‑бип! Прерываю эфир важным сообщением!"
        - "Прямо по курсу обнаружена зона активных боевых действий. И ни за что не угадаете, что я нашла в самом центре этого хаоса!"

    - char: u1206
      side: right
      text:
        - "Ещё больше обломков?.."

    - char: elbe
      side: left
      text:
        - "Ну, это само собой разумеется!"

    - char: magdeburg
      side: right
      text:
        - "Какое‑нибудь… чудовище?"

    - char: elbe
      side: left
      text:
        - "Подобных существ пока не наблюдаю!"

    - char: prinz_adalbert
      side: right
      text:
        - "Да что же там такое? Кончай интриговать, Эльба."

    - char: elbe
      side: left
      text:
        - "Хе‑хе. Там цель, которая извергает шквал огня, но при этом абсолютно не видна на радарах!"

    - char: prinz_adalbert
      side: right
      text:
        - "Огромная огневая мощь и невидимость для радаров… Неужели это..."

    - char: ulrich_von_hutten
      side: left
      text:
        - " META. Наша цель наконец‑то явилась!"
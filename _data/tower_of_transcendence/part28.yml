chapter1:
  rows:

    - char: elbe
      side: left
      text:
        - "Докладываю! Враг прекратил преследование, в окрестностях никого не обнаружено!"

    - char: ulrich_von_hutten
      side: right
      text:
        - "Вы тщательно проверили обломки?"

    - char: elbe
      side: left
      text:
        - "Так точно! В этот раз мы обыскали всё с особым пристрастием. Ошибки быть не может!"

    - char: u1206_rad
      side: right
      text:
        - "Под водой хвоста тоже нет. Похоже, мы на время в безопасности!"

    - char: ulrich_von_hutten
      side: left
      text:
        - "На время — возможно. Но это нелогично."
        - "В охоте стратегия «дать жертве поверить в спасение, а затем нанести удар в момент её расслабленности» куда эффективнее, чем просто погоня."
        - "Наш противник обладает абсолютным численным превосходством и куда лучше ориентируется в этой акватории. У них нет ни единой причины отпускать нас."

    - char: scharnhorst_meta_d1?
      side: right
      status: is-yellow
      text:
        - "Совершенно верно… Не теряйте бдительности. Это море всё ещё смертельно опасно…"

    - char: magdeburg
      side: left
      text:
        - "Ты наконец-то очнулась! Ой, только не дергайся, у тебя серьезные раны!"

    - char: scharnhorst_meta_d1?
      side: right
      status: is-yellow
      text:
        - "Пустяки… Бывало и похуже. После экстренного ремонта я, скорее всего, смогу вернуться в строй…"

    - char: magdeburg
      side: left
      text:
        - "Вернуться в строй?.."

    - char: scharnhorst_meta_d1?
      side: right
      status: is-yellow
      text:
        - "Одна башня ещё способна вести огонь, двигатели кое-как тянут… Если поднапрячься, выход всегда найдётся."
        - "Раз я не явилась в назначенное время, значит, план провалился. Вам следовало просто уходить… Зачем было добровольно лезть в эту ловушку?"

    - char: ulrich_von_hutten
      side: left
      text:
        - "Я придерживалась того же мнения. Но Гнейзенау беспокоилась о тебе, а долг командира — учитывать чувства своих подчинённых."

    - char: scharnhorst_meta_d1?
      side: right
      status: is-yellow
      text:
        - "Гнейзенау, значит…"

    - char: gneisenau_meta
      side: left
      status: is-yellow
      text:
        - "Ну и жалкий же у тебя вид. Куда подевалась вся та спесь, с которой ты уходила?"

    - char: scharnhorst_meta_d1?
      side: right
      status: is-yellow
      text:
        - "……Спасибо, что проделала такой путь только ради того, чтобы поязвить."
        - "…… У тебя что, прибавилось ран?"

    - char: u1206_rad
      side: left
      text:
        - "Когда мы тебя спасали, она всё время шла в авангарде и пробивала путь, уничтожив почти всех врагов!"

    - char: gneisenau_meta
      side: right
      status: is-yellow
      text:
        - "…Пусть мы и чужие друг другу, у тебя внешность Шарнхорст. В своём мире ты наверняка была связана узами с другой Гнейзенау, отличной от меня."
        - "Позволить тебе вот так погибнуть — значит предать образ Шарнхорст в моем сердце."

    - char: scharnhorst_meta_d1?
      side: left
      status: is-yellow
      text:
        - "……Благодарю. Я не забуду то, что вы сделали для меня сегодня."

    - char: ulrich_von_hutten
      side: right
      text:
        - "Судя по твоему состоянию, добраться до точки эвакуации «Пепла» ты не сможешь. Возвращайся с нами."
        - "Я не требую твоего вступления в наши ряды. Просто побудь с нами, пока не поправишься, а потом сможешь уйти на все четыре стороны."

    - char: scharnhorst_meta_d1?
      side: left
      status: is-yellow
      text:
        - "Кажется, сейчас у меня не так много вариантов для отказа… При условии, что мы вообще выберемся отсюда живыми."

    - char: ulrich_von_hutten
      side: right
      text:
        - "Шарнхорст из «Пепла», мне нужен полный отчет о том, что произошло. И немедленно предоставь все данные на Арбитра Влюблённые VI."

    - char: scharnhorst_meta_d1?
      side: left
      status: is-yellow
      text:
        - "…С тех пор как я примкнула к «Пеплу», это был мой первый прямой контакт с Влюблёнными."
        - "Я допустила роковую ошибку — недооценила врага из-за низкой боевой мощи её Энфорсеров VI «Комбинатор»… Хотя я прекрасно знала, на что она способна."

    - char: elbe
      side: right
      text:
        - "Ты хочешь сказать, что их мощь была «низкой»?.."

    - char: scharnhorst_meta_d1?
      side: left
      status: is-yellow
      text:
        - "Относительно, да. Для вас это был тяжелый бой, но мы с Гнейзенау справлялись с ними довольно легко, не так ли?"

    - char: elbe
      side: right
      text:
        - "Хоть это и обидно признавать, но возразить мне нечего…"

    - char: scharnhorst_meta_d1?
      side: left
      status: is-yellow
      text:
        - "Характеристики Энфорсеров сильно разнятся в зависимости от предпочтений их Арбитра."
        - "Есть те, кто берет числом при средних параметрах, а есть сторонники исключительного качества, полагающиеся на запредельную мощь единичных юнитов."

    - char: ulrich_von_hutten
      side: right
      text:
        - "К какому типу относится Влюблённые VI?"

    - char: scharnhorst_meta_d1?
      side: left
      status: is-yellow
      text:
        - "Похоже… она выбрала оба варианта сразу. В этой акватории оперирует не один вид Энфорсеров."
        - "Помимо несметных полчищ Энфорсеров VI «Комбинатор», в их ряды затесалось несколько высококлассных единиц — Энфорсеры VI «Аттракция»."

    - char: ulrich_von_hutten
      side: right
      text:
        - "Вот оно что. Значит, ты расслабилась, расправляясь с толпой пушечного мяса, и пропустила удар внезапно появившегося элитного врага?"

    - char: scharnhorst_meta_d1?
      side: left
      status: is-yellow
      text:
        - "Если бы… С ними было бы непросто, но это всё ещё лишь Энфорсеры. Если сосредоточиться, я бы с ними совладала…"
        - "Проблема в том, что именно в тот момент, когда я была максимально сосредоточена на бое, явилась сама Влюблённые."
        - "Исполинская броня, заслонившая весь горизонт — это последнее, что я видела перед тем, как потерять сознание…"

    - char: ulrich_von_hutten
      side: right
      text:
        - "А после она отправила своих подручных пустить тебя на металлолом… Что ж, мы и впрямь подоспели в самый последний момент."
        - "Зачем Сирены разбирают обломки в этом море? И где сама Арбитр, она всё ещё поблизости?"

    - char: scharnhorst_meta_d1?
      side: left
      status: is-yellow
      text:
        - "……На самом деле это один и тот же вопрос."
        - "Влюблённые VI синхронизировалась с исполнительной системой Сирен во всей этой акватории. Теперь она и есть само это море руин."
        - "Используя модульное разделение и пересборку, она способна мгновенно воплотиться в любой точке сектора, используя бесконечные обломки для мгновенного восстановления."
        - "И пока не уничтожен каждый Энфорсер, скрытый в этих руинах, саму Арбитра невозможно победить. Ей даже нельзя нанести сколь-нибудь серьезный урон…"
        - "Она полностью оправдывает своё имя… Любовь, от которой невозможно сбежать."

    - char: u1206_rad
      side: right
      text:
        - "Вот видите! Я же говорила, что с теми подводными обломками что-то не так!!!"

    - char: prinz_adalbert
      side: left
      text:
        - "Обладать такой способностью… Это значит, что всё это море, забитое обломками, буквально является домашней ареной для Влюблённых!"

    - char: scharnhorst_meta_d1?
      side: right
      status: is-yellow
      text:
        - "Именно… Для «утилизации» Тестовых полигонов она, вне всяких сомнений, самая подходящая кандидатура…"

    - char: gneisenau_meta
      side: left
      status: is-yellow
      text:
        - "Для утилизации полигонов… То есть изначально она явилась сюда, чтобы покончить со мной?"

    - char: scharnhorst_meta_d1?
      side: right
      status: is-yellow
      text:
        - "Похоже на то… Раз они прислали по твою душу такого опасного монстра, значит, ты здесь и впрямь устроила знатный переполох…"

    - char: gneisenau_meta
      side: left
      status: is-yellow
      text:
        - "Это был комплимент?.."

    - char: ulrich_von_hutten
      side: right
      text:
        - "… Гнейзенау, помоги Шарнхорст. Остальным — построение «Ромб» для защиты флагмана и раненой. Немедленный отход!"

    - char: gneisenau_meta
      side: left
      status: is-yellow
      text:
        - "И почему это я должна нянчиться с ней?.."

    - char: ulrich_von_hutten
      side: right
      text:
        - "Потому что только ты способна тащить её на буксире и при этом не отставать от нашего темпа."

    - char: gneisenau_meta
      side: left
      status: is-yellow
      text:
        - "Ха… Скорее уж, когда я, со своими повреждёнными двигателями, буду тащить Шарнхорст, у вас появится хоть какой-то шанс не отстать от меня."
        - "Постарайтесь не отставать и смотрите по сторонам… Выдвигаемся!"

    - text:
      - "До закрытия Башни Мидгарда осталось — 2 часа 17 минут."

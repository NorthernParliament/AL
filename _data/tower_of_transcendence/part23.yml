chapter1:
  rows:
  
    - char: scharnhorst_meta_d1?
      side: left
      status: is-yellow
      text:
        - "......"

    - char: ulrich_von_hutten
      side: right
      text:
        - "......"

    - char: elbe
      side: left
      text:
        - "Они обе не проронили ни слова целых три минуты…"
        - "Вы только посмотрите на взгляд этой Шарнхорст… Кажется, она всерьёз прикидывает, как бы нас всех прикончить."

    - char: gneisenau_meta
      side: right
      status: is-yellow
      text:
        - "Слушай, Шарнхорст, а это вообще нормально — выбалтывать нам такие сведения?"
        - "Лучший способ хранить секреты — это держать рот на замке. Ты поэтому теперь и слова выдавить из себя не можешь?"

    - char: magdeburg
      side: left
      text:
        - "У-у-у… Её взгляд стал ещё свирепее."
        - "Тш-ш! Гнейзенау, ты что несёшь?! Не подливай масла в огонь!"

    - char: gneisenau_meta
      side: right
      status: is-yellow
      text:
        - "Мне эта атмосфера знакома лучше всех. Рано или поздно нам всё равно придётся немного помахать кулаками, так что какая разница?"

    - char: u1206
      side: left
      text:
        - "Но мы же явно не вывезем…"

    - char: gneisenau_meta
      side: right
      status: is-yellow
      text:
        - "Пока не ввяжешься в бой — не узнаешь. Что, струсила?"

    - char: u1206
      side: left
      text:
        - "Струсила?!"
        - "Одно дело — встретить сильного врага в честном бою, но быть стёртой в порошок за то, что слишком много знала, просто от рук случайно мимо проходившей META — это же просто трагедия…"

    - char: gneisenau_meta
      side: right
      status: is-yellow
      text:
        - "Я вот ничего такого не чувствую. Впрочем, то, что вы способны ощущать страх — признак вашей «нормальности»."
        - "Можете развернуться и бежать, я не против."

    - char: prinz_adalbert
      side: left
      text:
        - "Это решение за госпожой Ульрих. Без приказа флагмана мы не имеем права действовать самовольно."

    - char: gneisenau_meta
      side: right
      status: is-yellow
      text:
        - "Устав… Хм. Как же давно я не испытывала этого чувства."
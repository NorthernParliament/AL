chapter1:
  rows:

    - text:
      - "В тускло освещённом пространстве за столом величественно восседает Фридрих дер Гроссе."

    - char: tirpitz_rad
      side: left
      text:
        - "…На этом отчёт о недавних операциях в акватории Бермудского треугольника завершён."
        - "Как и ожидалось, Лазурный путь сосредоточил основные силы на исследовании и стабилизации центральной зоны."
        - "Они лишь хотят удержать достигнутые результаты. О том, что действительно заслуживает внимания, и о наших истинных целях они не имеют ни малейшего представления."
        - "Что ж, на этом мой доклад окончен."

    - text:
      - "Голос стих, окно связи закрылось, но комната не погрузилась во тьму. На месте одного закрывшегося окна развернулось другое."

    - char: u47_rad
      side: left
      text:
        - "В расследовании касательно Арбитров нет продвижений. Похоже, они бесследно исчезли."
        - "Осталось три необследованные подозрительные зоны. Запас припасов — 30 %, проблем возникнуть не должно."
        - "U‑47, доклад окончен."

    - text:
      - "Она лишь молча слушала — плановые сеансы связи не требовали ответных реплик на каждый отчёт."
      - "Фридрих дер Гроссе словно стояла посреди безмолвного ночного неба, лицом к лицу с бесконечным океаном информации, протекающим перед ней."

    - char: peter_strasser_rad
      side: left
      text:
        - "Флот скрытно прибыл в назначенный сектор вместе с компонентами «Башни Мидгарда»."
        - "Система «Гало» функционирует в штатном режиме. Врагов поблизости не обнаружено, состояние моря спокойное, условия для работы благоприятные."
        - "Мы готовы начать в любой момент. Ждём ваших указаний."

    - char: friedrich_der_grosse
      side: right
      text:
        - "Очень хорошо. Приступайте к сборке. Затем ожидайте дальнейших приказов к действию."

    - char: peter_strasser_rad
      side: left
      text:
        - "Слушаюсь. Петер Штрассер, конец связи."

    - text:
      - "Данные, стекающиеся со всех уголков мира, сходились на этом маленьком рабочем столе, и Фридрих дер Гроссе преобразовывала их в решения — как делала это всегда."
      - "Вот только сегодняшний случай немного отличался от того, что было раньше."

    - char: prinz_eugen_rad
      side: left
      text:
        - "Наконец‑то мы на финальной стадии. Уверена, что мне не нужно быть там?"

    - char: friedrich_der_grosse
      side: right
      text:
        - " Мы не можем допустить просчётов в других секторах из‑за высокой концентрации ресурсов в одном месте."
        - "Если на твоём участке возникнут проблемы, значимость нашей операции существенно снизится."

    - char: prinz_eugen_rad
      side: left
      text:
        - "Всего лишь «существенно снизится», а не «обесценится вовсе»?"

    - char: friedrich_der_grosse
      side: right
      text:
        - "А ты как думаешь?"

    - char: prinz_eugen_rad
      side: left
      text:
        - "Да‑да, ты права."
        - "ости из Империи Сакуры весьма довольны приёмом. К тому же они собираются наблюдать за ходом операции в реальном времени. Возражений нет?"

    - char: friedrich_der_grosse
      side: right
      text:
        - "Никаких. Однако проясни им один момент: мы не можем гарантировать стабильность передачи данных."

    - char: prinz_eugen_rad
      side: left
      text:
        - "Само собой. В такой новаторской операции любая неожиданность — норма."
        - "Для Империи Сакуры сама возможность увидеть всё первыми уже имеет колоссальное значение. Уверена, даже если связь внезапно оборвётся, жалоб с их стороны не будет."

    - char: friedrich_der_grosse
      side: right
      text:
        - "Хорошо."

    - char: prinz_eugen_rad
      side: left
      text:
        - "Что ж, пожелаю нам удачи. Принц Ойген, конец связи."

    - char: friedrich_der_grosse
      side: right
      text:
        - "..."

    - text:
      - "Когда сеанс связи окончился, на лице Фридрих дер Гроссе на мгновение — редчайший случай — промелькнула тень сомнения. Но тучи рассеялись так же быстро, как и появились, и на её лицо вернулась уверенная улыбка."
      - "Следом на экране возникли две знакомые эмблемы. По какой‑то причине те, кто стоял за этими изображениями, предпочли скрыть свои личности."
      - "Эмблемы эти принадлежали тем, кто до этого самого момента находился в состоянии войны с Железной Кровью, — Северному Парламенту и Королевскому Флоту."
      - "Фридрих дер Гроссе обменялась с ними парой коротких фраз, но разговор был прерван внезапно возникшим новым голосом."

    - char: marco_polo_rad
      side: left
      text:
        - "О, Фридрих! А вот и я. Премного благодарна, что пригласила меня полюбоваться твоими великими свершениями в столь знаменательный день."

    - char: friedrich_der_grosse
      side: right
      text:
        - "Достопочтенная Марко Поло… Не рановато ли вы вышли на связь, исходя из нашего графика?"

    - char: marco_polo_rad
      side: left
      text:
        - "Ой, неужели? Я как‑то не обратила внимания. В последнее время столько дел, что я могла прийти как раньше, так и позже назначенного."
        - "Судя по твоей реакции — всё‑таки раньше?"

    - char: friedrich_der_grosse
      side: right
      text:
        - "Именно так, раньше. И этот канал… предназначен для экстренной связи."

    - char: marco_polo_rad
      side: left
      text:
        - "Ах, и правда! Я тебе помешала?"

    - char: friedrich_der_grosse
      side: right
      text:
        - "Вовсе нет."

    - text:
      - "Фридрих дер Гроссе взглянула на два погасших окна перед собой и едва слышно, почти незаметно, вздохнула."

    - char: marco_polo_rad
      side: left
      text:
        - "Вот и славно, вот и хорошо. В любом случае я явилась, как и договаривались, до начала."
        - "Однако у меня ещё полно дел, так что наблюдать в реальном времени не смогу. Просто пришли мне потом отчёт, договорились?"

    - char: friedrich_der_grosse
      side: right
      text:
        - "Неужели тебе не хочется лично засвидетельствовать процесс, в котором ты сама принимаешь участие?"

    - char: marco_polo_rad
      side: left
      text:
        - "По правде говоря, не такой уж большой интерес — пустяковая услуга, не более. Меня куда больше заботит престол, а дел и так накопилось целая гора."

    - char: friedrich_der_grosse
      side: right
      text:
        - "Что ж, тогда и я желаю тебе удачи, мой верный союзник из Сардинии — неоспоримая владычица престола, достопочтенная Марко Поло."

    - text:
      - "Похоже, обращение «неоспоримая владычица престола» вызвало у Марко Поло куда больший восторг, нежели упоминание о верном союзе."
      - "Вслед за этим связь с Империей Сардиния также прервалась."
      - "Яркие индикаторы на панели гасли один за дргуим, пока, наконец, не осталось всего два светящихся окна."
      - "Фридрих дер Гроссе не задавала вопросов, и те, кто скрывался за этими окнами, тоже хранили молчание."

    - char: friedrich_der_grosse
      side: right
      text:
        - "Наконец‑то мы дошли до этого этапа…"
        - "Сцена подготовлена, музыка уже звучит."
        - "А теперь — пусть наше представление начнётся."
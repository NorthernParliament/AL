chapter1:
  rows:
  - text:
      - "БАБАХ!!!"
  - char: "hakuryuu"
    side: "left"
    text:
      - "Пади же, кара небесная!"
  - char: "kasumi"
    side: "right"
    text:
      - "Подтверждено уничтожение вражеского флота, атаковавшего с направления 70°."
  - char: "hakuryuu"
    side: "left"
    text:
      - "Хм, нападать из засады, прикрываясь штормом — трусость, недостойная воина!"
  - char: "shinano"
    side: "right"
    text:
      - "Красиво. С остатками позвольте разобраться мне..."
  - text:
      - "БАБАХ!!!"
  - char: "hakuryuu"
    side: "left"
    text:
      - "Ого... Хоть ты вечно спишь, но когда дело доходит до боя — ты и впрямь сильна."
      - "Столько врагов одним ударом... Не зря ты — флагман этого флота!"
  - char: "shinano"
    side: "right"
    text:
      - "Ты мне льстишь. Твои успехи тоже достойны похвалы."
  - char: "hakuryuu"
    side: "left"
    text:
      - "Хе-хе, я — защитница Дворца Дракона, и этим врагам, которых называют Сиренами, меня не задеть."
  - char: "shinano"
    side: "right"
    text:
      - "Касуми, передай приказ: основные силы противника разбиты. Кораблям перегруппироваться с ближайшими союзниками и совместно добить выживших. Никому не действовать в одиночку."
  - char: "kasumi"
    side: "left"
    text:
      - "Есть."
  - char: "shinano"
    side: "right"
    text:
      - "Носиро, со мной всё в порядке. Бери Тикуму и помоги остальным."
      - "После столь ожесточённого сражения на поверхности воды не осталось ни одного обломка..."
      - "Эти новые модели Сирен крайне... подозрительны. Всем быть начеку."
  - char: "noshiro"
    side: "left"
    text:
      - "Слушаюсь, госпожа Шинано."
  - char: "shinano"
    side: "right"
    text:
      - "Хакурю, оставайся со мной для охраны транспортных судов. Боюсь, цель врага именно здесь."
  - char: "hakuryuu"
    side: "left"
    text:
      - "А? В трюмах ведь только подарки от тех, кто зовёт себя нашими союзниками. Что там может быть такого ценного, на что все так зарятся?.."
  - char: "shinano"
    side: "right"
    text:
      - "Даже мне это неведомо."
  - char: "hakuryuu"
    side: "left"
    text:
      - "Тогда у меня есть ещё один вопрос! После начала боя ты и впрямь вела себя как-то странно…"
      - "Твоя аура… Твоя сила определённо возросла, и во время сражения она становилась мощнее не один раз."
      - "Как такое вообще возможно?"
  - char: "shinano"
    side: "right"
    text:
      - "Это лишь… сила, которую я временно взяла взаймы."
  - char: "hakuryuu"
    side: "left"
    text:
      - "У-а-а-а… Опять ты заговорила загадками!.."
  - char: "shinano"
    side: "right"
    text:
      - "Хе-хе~"
  - char: "suruga_rad"
    side: "left"
    text:
      - "Госпожа Шинано, поблизости больше не обнаружено целей Сирен. Бой окончен."
  - char: "shinano"
    side: "right"
    text:
      - "Каковы повреждения флота?"
  - char: "suruga_rad"
    side: "left"
    text:
      - "Все транспортные суда целы и невредимы."
      - "Ямакадзэ, Умикадзэ, Юра и Кацураги получили повреждения во время первой волны внезапной атаки Сирен, но ничего серьезного."
      - "Симакадзэ… хоть и не ранена, но из-за того, что неслась слишком быстро, она заблудилась в шторме. Я уже ищу путь, чтобы вернуть её обратно."
      - "Остальные корабли без повреждений."
      - "Всё благодаря тому, что вы заранее предвидели приближение опасности, а также своевременной поддержке флота Кии. Иначе последствия этого нападения были бы невообразимы…"
  - char: "shinano"
    side: "right"
    text:
      - "Я лишь видела сон… Сновидения не всегда надёжны."
      - "Однако Мусаси… Неужели она, находясь за тысячи миль отсюда, предвидела невзгоды, что ждут меня на обратном пути?"
  - char: "kii_rad"
    side: "left"
    text:
      - "Госпожа Мусаси просто слишком беспокоилась о вашей безопасности. Исключительно на всякий случай она велела мне возглавить отряд и встретить вас."
      - "Я очень рада, что мы оказались полезны."
      - "Но, госпожа Cинано, у Мусаси перед моим отбытием было одно поручение."
      - "Если бы путь прошёл без происшествий, вам следовало бы вернуться на главные острова согласно первоначальному плану."
      - "Но раз в пути случилось непредвиденное, то я вместе с ранеными должна сопроводить транспортные суда назад на родину, а вам, госпожа Cинано, надлежит принять этот новый приказ о передислокации."
  - char: "shinano"
    side: "right"
    text:
      - "Новый приказ о передислокации?"
  - char: "kii_rad"
    side: "left"
    text:
      - "Да. Империя Сардиния готовит Всемирную выставку, и вы отправитесь туда в качестве специального дипломатического посланника Империи Сакуры, чтобы курировать все вопросы во время проведения мероприятия."
  - char: "shinano"
    side: "right"
    text:
      - "Это приказ Мусаси или Акаги?"
  - char: "kii_rad"
    side: "left"
    text:
      - "Этого я не знаю... Однако госпожа Акаги ещё не вернулась на родные острова. В её отсутствие за большинство дел отвечает госпожа Мусаси."
  - char: "shinano"
    side: "right"
    text:
      - "Вот как... Я поняла."
  - char: "hakuryuu"
    side: "left"
    text:
      - "Ха?! Эта Мусаси ведь сестра госпожи Синано, так?!"
      - "Она неважно себя чувствует и так долго трудилась вдали от дома! Едва она собралась вернуться, как её заставляют без отдыха мчаться куда-то ещё?!"
  - char: "shinano"
    side: "right"
    text:
      - "Хакурю, не смей дерзить!"
  - char: "hakuryuu"
    side: "left"
    text:
      - "Ой?! Есть... Ну чего ты сразу сердишься..."
  - char: "shinano"
    side: "right"
    text:
      - "Хакурю, если мы прибудем туда в статусе послов Империи Сакуры, Империя Сардиния обязательно окажет нам высочайшие почести."
      - "Если подумать об этом в таком ключе, не просыпается ли в твоём сердце предвкушение?"
  - char: "hakuryuu"
    side: "left"
    text:
      - "Хм... С такой стороны это звучит неплохо! Прямо как роскошный отпуск!"
  - char: "shinano"
    side: "right"
    text:
      - "Именно. Переформировать флот. Как только закончим передачу дел отряду Кии, выдвигаемся со мной в Империю Сардиния."
      - "(Это явно план с целью удержать меня подальше от дома... Мусаси, что же ты задумала?..)"

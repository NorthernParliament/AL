chapter1:
  rows:
  - char: "bismarck_rad"
    side: "left"
    text:
      - "Заждались, союзники из Империи Сардиния."
      - "Что касается вашего приглашения на Всемирную выставку — Железная Кровь приняла решение его принять."
      - "Надеюсь, такой ответ вас удовлетворит?"
  - char: "vittorio_veneto"
    side: "right"
    text:
      - "Это поистине воодушевляющие новости. Благодарю вас, госпожа Бисмарк."
      - "При поддержке Железной Крови эта выставка обязательно засияет ещё более ярким светом."
  - char: "bismarck_rad"
    side: "left"
    text:
      - "Хе-хе, вы мне льстите, госпожа Венето."
      - "Империя Сардиния — верный союзник Железной Крови. Мы, разумеется, приложим все усилия, чтобы поддержать ваши начинания."
      - "Продление соглашения о прекращении огня ради успешного проведения выставки также не станет проблемой."
      - "Это решение поддержало большинство членов Багровой Оси, и мы уже работаем над его реализацией."
      - "Что бы ни случилось в прошлом и что бы ни ждало нас в будущем..."
      - "По крайней мере, нынешний мир — это то, чем стоит дорожить каждому, и Железная Кровь здесь не исключение."
      - "Я уже поручила организацию вопросов, связанных с выставкой, Принцу Ойген. В ближайшие дни она прибудет в Рим вместе со своей делегацией."
      - "На время проведения выставки она наделена полномочиями представлять Железную Кровь и решать любые сопутствующие вопросы."
      - "Вас устроит такой вариант?"
  - char: "vittorio_veneto"
    side: "right"
    text:
      - "Разумеется, мы не возражаем. Принц Ойген крайне ответственна и надёжна, её способности очевидны для всех."
      - "Империя Сардиния от всей души приветствует делегацию Железной Крови!"
  - char: "bismarck_rad"
    side: "left"
    text:
      - "Вот и славно. В таком случае, я заранее желаю этой Всемирной выставке под эгидой Империи Сардиния грандиозного успеха..."

chapter2:
  rows:
  - char: "vittorio_veneto"
    side: "left"
    text:
      - "Фух... Наконец-то всё закончилось. Можно сказать, у нашей выставки теперь есть отличное начало..."
  - char: "littorio"
    side: "right"
    text:
      - "М-м? Переговоры же прошли вполне гладко... Откуда тогда такое выражение лица?"
  - char: "vittorio_veneto"
    side: "left"
    text:
      - "Моё лицо сейчас — это воплощение стресса!"
      - "Я и представить не могла, что доживу до момента, когда снова увижу Бисмарк, не говоря уже о том, чтобы вести с ней переговоры..."
      - "То, что провернула Железная Кровь, просто уму непостижимо. И я сейчас как об их медицинских технологиях, так и об уровне секретности..."
  - char: "littorio"
    side: "right"
    text:
      - "Это точно. Кто бы мог подумать, что Бисмарк вернётся целой и невредимой."
      - "Но разве это не к лучшему? По крайней мере, теперь не придётся иметь дело с Фридрих дер Гроссе, которая умудрялась давить авторитетом даже через экран коммуникатора."
  - char: "vittorio_veneto"
    side: "left"
    text:
      - "Бисмарк и правда кажется более человечной по сравнению с Фридрих, но всё равно... меня не покидает чувство, что ей нельзя доверять до конца."
      - "Литторио, как думаешь, Железная Кровь ведь не решится на нападение прямо во время выставки?"
  - char: "littorio"
    side: "right"
    text:
      - "Хм... Хороший вопрос."
      - "Если следовать логике — нет."
      - "Если бы не тот поразительный ход Фридриха дер Гроссе, недавняя наступательная операция под предводительством Северного Парламента вряд ли бы так просто прекратилась."
      - "Сложно сказать, что будет потом, но сейчас Железная Кровь нуждается в этом мире больше, чем любая другая фракция."
      - "Полагаю, она не станет пользоваться случаем, чтобы... что-то предпринять."
  - char: "vittorio_veneto"
    side: "left"
    text:
      - "Почему даже ты теперь звучишь так неуверенно?.."
  - char: "littorio"
    side: "right"
    text:
      - "Логика логикой, но когда дело касается Бисмарк, даже я не могу быть уверена до конца..."
      - "Но как бы то ни было! У нас более чем достаточно сил, чтобы гарантировать: в Средиземном море ничего подобного не случится."
      - "Пока на самой выставке всё спокойно, мы выполняем свой долг хозяев."
      - "Теперь, когда Железная Кровь выразила поддержку, Империя Сакуры и Доминион Виши наверняка тоже не заставят себя ждать."
      - "Что касается Лазурного Пути... Северный Парламент нас точно поддержит, а участие остальных — лишь вопрос времени."
      - "Они ни за что не упустят шанс поучаствовать в мероприятии, которое так хорошо звучит, не требует особых затрат и при этом укрепляет их влияние."
      - "Сейчас, когда мировая напряженность немного спала, проведение Всемирной выставки — идеальный ход."
      - "Скорее, даже если бы мы не выступили с этой инициативой, какая-нибудь другая фракция наверняка бы нас опередила."
  - char: "vittorio_veneto"
    side: "left"
    text:
      - "Ха-ха, значит, на этот раз Империя Сардиния всех обошла."
      - "Когда придет время, выставка, где соберутся все страны, станет лучшей сценой для демонстрации величия Сардинии!"
      - "Стоит признать, Марко Поло иногда подбрасывает действительно стоящие идеи..."
      - "Литторио, не составишь мне компанию в купальнях чуть позже?"
      - "Нам ещё предстоит работа над дизайном павильонов, а в моменты отдыха хорошие идеи приходят гораздо чаще, не находишь?"
  - char: "littorio"
    side: "right"
    text:
      - "Полностью согласна, с удовольствием присоединюсь."



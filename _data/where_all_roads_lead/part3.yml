chapter1:
  rows:
  - char: "saratoga_rad"
    side: "left"
    text:
      - "Приветик! Командир, как успехи в работе?"
  - char: "commander"
    side: "right"
    text:
      - "Саратога? Время для планового сеанса связи ещё не пришло. Что-то случилось?"
  - char: "saratoga_rad"
    side: "left"
    text:
      - "Вообще-то... В штаб снова пришло личное письмо на имя Командира!"
  - char: "commander"
    side: "right"
    text:
      - "...Оно снова от Советского Союза?"
  - char: "saratoga_rad"
    side: "left"
    text:
      - "В точку! Честное слово... Я уже на все сто процентов уверена, что она делает это нарочно!"
  - char: "commander"
    side: "right"
    text:
      - "Сейчас внешние контакты ограничены, так что вполне естественно, что они не могут сразу выйти на связь по официальным каналам..."
  - char: "saratoga_rad"
    side: "left"
    text:
      - "Теоретически — да! Но в Северном Парламенте об этом наверняка не знают, так что это точно спланированная акция!"
  - char: "commander"
    side: "right"
    text:
      - "...И что же в этом сообщении?"
  - char: "saratoga_rad"
    side: "left"
    text:
      - "Командир, ты уже слышал о том, что Империя Сардиния собирается провести Всемирную выставку?"
  - char: "commander"
    side: "right"
    text:
      - "Кажется, я видел это в отчётах пару дней назад. Всемирные выставки не проводились уже много лет, верно?"
  - char: "saratoga_rad"
    side: "left"
    text:
      - "Именно~ Кто знает, с чего это Сардиния вдруг об этом вспомнила."
      - "Похоже, на этот раз они полны амбиций и жаждут оказаться в центре мирового внимания~"
  - char: "commander"
    side: "right"
    text:
      - "Раз они выбрали мирный способ заявить о себе, в этом нет ничего плохого."
      - "Раз ты об этом заговорила... это как-то связано с письмом от Северного Парламента?"
  - char: "saratoga_rad"
    side: "left"
    text:
      - "И снова в точку!"
  - char: "commander"
    side: "right"
    text:
      - "...Неужели приглашение на участие?"
  - char: "saratoga_rad"
    side: "left"
    text:
      - "Угадал~ Командир, нет желания отправиться в Империю Сардиния в отпуск?"
  - char: "commander"
    side: "right"
    text:
      - "...Сейчас критический этап испытаний, я не могу всё бросить и укатить развлекаться на выставку."
      - "Как бы ни было неловко перед Северным Парламентом за их доброту, боюсь, тебе придётся ответить отказом от моего имени."
  - char: "saratoga_rad"
    side: "left"
    text:
      - "Угу, без проблем~"
      - "Что касается Союза Орла, мы планируем отправить делегацию во главе с Эссекс. С темой павильона тоже уже определились!"
      - "Я скоро вышлю материалы, можешь полистать их на досуге как альбом с картинками, чтобы немного развеяться."
      - "Дизайн нашего павильона в этот раз будет в стиле научной фантастики — он точно прикуёт к себе взгляды всего мира!"
  - text:
      - "*тук-тук*"
  - char: "eldridge"
    side: "left"
    text:
      - "Командир... новый этап калибровки оборудования вот-вот начнётся..."
      - "Мисс Навигатор уже ждёт вас..."
  - char: "saratoga_rad"
    side: "right"
    text:
      - "Ой, тогда не буду отвлекать. Возвращаюсь к подготовке к выставке~"
  - char: "commander"
    side: "left"
    text:
      - "Хорошо, и ты тоже не забывай отдыхать."
  - char: "saratoga_rad"
    side: "right"
    text:
      - "Принято~ Саратога, конец связи!"
  - char: "eldridge"
    side: "left"
    text:
      - "...Командир, вы устали?"
      - "Если устали... поспите немного... Я скажу мисс Навигатору... перенести время."
  - char: "commander"
    side: "right"
    text:
      - "Нет-нет, всё в порядке, выдвигаемся!"

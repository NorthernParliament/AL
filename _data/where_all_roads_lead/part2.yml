chapter1:
  rows:
  - char: "sovetsky_soyuz_old"
    side: "left"
    text:
      - "Империя Сардиния прислала приглашение на Всемирную выставку. Что думаешь по этому поводу?"
  - char: "kronshtadt"
    side: "right"
    text:
      - "Всемирная выставка... Подобных масштабных мероприятий мирового уровня не проводилось уже много лет, верно?"
      - "Огонь войны в Европе только-только начал утихать, так что момент выбран вполне подходящий."
      - "Вот только не ожидала, что Империя Сардиния выступит с этим первой..."
  - char: "sovetsky_soyuz_old"
    side: "left"
    text:
      - "Поняв, что военные методы не приносят желаемого результата, они решили использовать культурное влияние, чтобы заявить о себе."
      - "Довольно неплохой ход, не находишь?"
  - char: "kronshtadt"
    side: "right"
    text:
      - "Это точно... По крайней мере, это мирный путь."
  - char: "sovetsky_soyuz_old"
    side: "left"
    text:
      - "Что такое? Судя по твоему тону, ты считаешь, что нам не стоит ехать?"
  - char: "kronshtadt"
    side: "right"
    text:
      - "Нет, разумеется, нам стоит поехать."
      - "Подобная сцена хоть и дает преимущество организаторам, в целом остается честной площадкой для всех."
      - "Для нас это тоже отличный шанс расширить своё влияние."
      - "Просто я думаю... На самом деле, ты ведь уже всё решила?"
      - "У меня нет доказательств, но мне кажется, что проведение выставки именно Империей Сардиния — это тот результат, который тебя вполне устраивает."
  - char: "sovetsky_soyuz_old"
    side: "left"
    text:
      - "Кронштадт, ты что, снова тайком просматривала секретные документы?"
  - char: "kronshtadt"
    side: "right"
    text:
      - "Чистая интуиция! Или, может, ты сама расскажешь, зачем тайно отправляла Стремительный в Империю Сардиния?"
  - char: "sovetsky_soyuz_old"
    side: "left"
    text:
      - "Ха-ха, это была лишь одна из мер по укреплению связей с внешним миром."
      - "Но ты права, я уже приняла решение."
      - "На этот раз Северный Парламент станет первой фракцией из состава Лазурного Пути, принявшей приглашение Сардинии. Окажем им такую любезность."
      - "Что касается кандидатуры того, кто возглавит делегацию... Помимо переговоров с Сардинией, у нас там будет ещё пара дел."
      - "У тебя нет желания отправиться туда?"
  - char: "kronshtadt"
    side: "right"
    text:
      - "Конечно, есть! Разведка — мой профиль, так что кто, если не я?"
      - "Однако я довольно долго была оторвана от внешнего мира, так что мне понадобятся помощники."
  - char: "sovetsky_soyuz_old"
    side: "left"
    text:
      - "Хм... Аврора всегда занималась дипломатическими вопросами в Европе, пусть она поможет тебе возглавить делегацию."
      - "Но Полярный флот не сможет последовать за тобой. На арктическом направлении боевая мощь сейчас нужнее, чем в Европе."
  - char: "kronshtadt"
    side: "right"
    text:
      - "Без проблем. И ещё кое-что: мне нужен доступ ко всем секретным документам, касающимся последних операций в европейском регионе."
      - "Раз уж я берусь за это дело, не хотелось бы действовать вслепую."
  - char: "sovetsky_soyuz_old"
    side: "left"
    text:
      - "Ты всё никак не оставишь в покое эти свои секретные файлы..."
      - "Шучу. Я доверяю тем, с кем работаю, так что это не проблема — изучай."
  - char: "kronshtadt"
    side: "right"
    text:
      - "Тогда у меня больше нет вопросов."
      - "В этот раз мы снова отправим приглашение товарищу Командиру?"
  - char: "sovetsky_soyuz_old"
    side: "left"
    text:
      - "Само собой. Хотя я и не питаю иллюзий насчёт успеха этой затеи."
  - char: "kronshtadt"
    side: "right"
    text:
      - "И то верно... В этот раз, чтобы снизить градус противостояния, оба главных союза решили не выставлять общие павильоны фракций."
      - "Товарищ Командир официально числится в Лазурном Пути, но не принадлежит ни к одной конкретной силе, так что весомого повода для участия у него нет."
      - "Теоретически он мог бы приехать как гость или турист, но Союз Орла наверняка будет чинить препятствия..."
  - char: "sovetsky_soyuz_old"
    side: "left"
    text:
      - "Вероятнее всего. Но это не должно влиять на нашу позицию, не так ли?"

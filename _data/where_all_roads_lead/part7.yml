chapter1:
  rows:
  - char: "an_shan"
    side: "left"
    text:
      - "Сестра Ят Сен, добрый вечер."
  - char: "harbin"
    side: "right"
    text:
      - "Ят Сен, сегодня у тебя такой настрой, что ты даже пригласила нас на ужин?"
  - char: "chen_hai"
    side: "left"
    text:
      - "Добрый вечер вам обеим."
  - char: "harbin"
    side: "right"
    text:
      - "О, даже Чэнь Хай здесь? Ну, тогда всё ясно. Похоже, сегодня вечером будет серьёзный разговор."
  - char: "yat_sen"
    side: "left"
    text:
      - "Прошу, присаживайтесь. Пообщаемся за едой."

chapter2:
  rows:
  - char: "harbin"
    side: "left"
    text:
      - "Ого! А как выложено это главное блюдо... Белоголовый орлан?"
  - char: "chen_hai"
    side: "right"
    text:
      - "...Это Дапэн, мифическая птица."
  - char: "harbin"
    side: "left"
    text:
      - "Выглядит изысканно, спору нет, но вот порция как-то... маловата."
  - char: "yat_sen"
    side: "right"
    text:
      - "Ха-ха, ну что я говорила, Чэнь Хай?"
  - char: "chen_hai"
    side: "left"
    text:
      - "Да уж, ты знаешь её лучше всех... Пойду принесу оставшуюся часть."

chapter3:
  rows:
  - char: "chen_hai"
    side: "left"
    text:
      - "А как тебе это блюдо? Тут уж точно хватит, чтобы наесться."
  - char: "harbin"
    side: "right"
    text:
      - "Вот это уже другое дело! В еде ведь что главное? Чтобы сытно было!"
  - char: "yat_sen"
    side: "left"
    text:
      - "Девочки, вы слышали новости о том, что Империя Сардиния собирается провести Всемирную выставку?"
  - char: "an_shan"
    side: "right"
    text:
      - "Я всё время была занята тренировками, так что не особо следила за международными новостями."
  - char: "harbin"
    side: "left"
    text:
      - "Я тоже не слышала, но теперь вот знаю от тебя~"
      - "Это событие имеет к нам какое-то отношение?"
  - char: "yat_sen"
    side: "right"
    text:
      - "Если следовать старым обычаям — никакого."
      - "Однако, учитывая результаты нашего недавнего развития, мы решили, что время пришло."
  - char: "harbin"
    side: "left"
    text:
      - "Время для чего? Погоди... Ты же не имеешь в виду?.."
  - char: "yat_sen"
    side: "right"
    text:
      - "Именно. Время «скрывать свои таланты и выжидать в тени» почти подошло к концу."
      - "«Подобно Дапэну, что взмывает ввысь вместе с ветром, преодолевая девяносто тысяч ли»."
      - "Империя Дракона готовится триумфально вернуться на мировую арену."
      - "И эта выставка станет лишь небольшой прелюдией к грядущим великим переменам."
  - char: "harbin"
    side: "left"
    text:
      - "Здорово! Так список участников уже утверждён? Может, позволите мне возглавить делегацию и всё там разведать?"
      - "Я ведь ещё ни разу не была в Европе!"
  - char: "yat_sen"
    side: "right"
    text:
      - "Тебя отправлять нельзя. Зачем нам раньше времени раскрывать один из наших главных козырей?"
  - char: "harbin"
    side: "left"
    text:
      - "А-ха-ха... И то верно. Что ж, тогда в другой раз."
  - char: "an_shan"
    side: "right"
    text:
      - "Сестра Ят Сен, раз ты заговорила об этом, значит, кандидатуры уже выбраны?"
  - char: "yat_sen"
    side: "left"
    text:
      - "Верно."
      - "Как говорится: «Знай врага и знай себя, и ты победишь в сотне битв»."
      - "Мир почти ничего не знает об Империи Дракона, и в этом наше преимущество."
      - "Но в то же время и мы имеем ограниченное представление о внешнем мире, и это наша слабая сторона."
      - "Слабости нужно устранять."
      - "После тщательных раздумий мы решили, что делегацию Империи Дракона в Империи Сардиния возглавит Чэнь Хай."
      - "Хай Тянь и Хай Ци отправятся с ней — пусть посмотрят мир и наберутся опыта."
  - char: "chen_hai"
    side: "right"
    text:
      - "Слушаюсь. Я оправдаю ваши надежды и явлю всему миру величие и очарование Империи Дракона~"


chapter1:
  rows:
  - char: "warspite"
    side: "left"
    text:
      - "Ваше Величество, вы выбираете уже два часа. Не желаете ли передохнуть?"
  - char: "belfast"
    side: "right"
    text:
      - "Закуски готовы. Подавать чай, Ваше Величество?"
  - char: "queen_elizabeth"
    side: "left"
    text:
      - "Не спешите, подождите ещё немного..."
      - "Сейчас мне не до послеобеденного чая... Уорспайт, помоги мне снять эту картину."
  - char: "warspite"
    side: "right"
    text:
      - "Уф... Какая же она... тяже-е-елая..."
  - char: "queen_elizabeth"
    side: "left"
    text:
      - "Это же сокровище из самых закромов музея! Будь осторожна при переноске!"
      - "И вот это ещё — Вэлиант, забирай!"
  - char: "valiant"
    side: "right"
    text:
      - "Э-э... Гермиона, помоги мне~"
  - char: "hermione"
    side: "left"
    text:
      - "Слушаюсь, я помогу вам нести~"
  - char: "warspite"
    side: "right"
    text:
      - "Ваше Величество, вы действительно собираетесь отправить все эти ценности в Империю Сардиния? Если за морем что-то случится..."
  - char: "queen_elizabeth"
    side: "left"
    text:
      - "Пусть в этот раз организаторы не мы, но мы должны показать всем мощь истинных хозяев положения!"
      - "Популярность — вещь свободная! Если мы законными методами переманим весь поток посетителей в наш павильон, даже Империи Сардиния будет нечего возразить!"
      - "Разумеется, для этого нужно отобрать всё самое лучшее!"
      - "Но, само собой, я бы никогда не позволила настоящим бесценным артефактам отправиться в заморское турне."
      - "Я поручу лучшим мастерам Королевства изготовить неотличимые от оригинала копии. Пусть в долгий путь по морям отправляются реплики~"
  - char: "warspite"
    side: "right"
    text:
      - "Вот оно что! В таком случае за сохранность реликвий действительно можно не переживать!"
  - char: "queen_elizabeth"
    side: "left"
    text:
      - "Хм... И вот это добавим. Хау, принимай."
  - char: "howe"
    side: "right"
    text:
      - "Слушаюсь, Ваше Величество..."
  - char: "queen_elizabeth"
    side: "left"
    text:
      - "Ладно, на первое время хватит. Белфаст, список готов?"
  - char: "belfast"
    side: "right"
    text:
      - "Полностью готов, прошу ознакомиться."
  - char: "queen_elizabeth"
    side: "left"
    text:
      - "Хм... Кажется, древностей в списке многовато."
      - "Если мы привезём только их, эти выскочки из Сардинии могут подумать, что нам больше нечего показать, кроме антиквариата..."
      - "Похоже, стоит добавить нашим экспонатам немного технологического лоска..."
      - "Белфаст, составь-ка мне ещё один список!"
      - "Выпиши всё, что не представляет критической важности, но наглядно демонстрирует технологический уровень Королевского Флота. Я выберу!"
  - char: "belfast"
    side: "right"
    text:
      - "Слушаюсь, я немедленно займусь этим."
  - char: "warspite"
    side: "left"
    text:
      - "Но, Ваше Величество, в таком случае количество наших экспонатов значительно превысит все ожидания..."
  - char: "queen_elizabeth"
    side: "right"
    text:
      - "Значит, мы построим наш Хрустальный дворец ещё больше!"
      - "Нет, не просто больше — он должен быть роскошнее любого из тех, что мы возводили прежде!"
      - "Какая-то там Империя Сардиния не должна нас волновать. Я хочу, чтобы все пали ниц перед великолепием дворцов Королевского Флота!"
      - "Организацию работы на месте поручим Илластриес — она как раз в Средиземном море."
      - "Что касается конвоя с экспонатами... пусть его возглавит Шеффилд."
  - char: "warspite"
    side: "left"
    text:
      - "Ваше Величество, я всё же считаю, что было бы лучше, если бы делегацию возглавила я."
  - char: "queen_elizabeth"
    side: "right"
    text:
      - "Не волнуйся, на самой выставке Илластриес и Шеффилд справятся сами."
      - "Меня больше беспокоит другое: не воспользуется ли Багровая Ось этой выставкой как ширмой, чтобы провернуть какую-нибудь хитрость за нашей спиной?"
      - "На всё время проведения выставки мне нужно, чтобы в Гибралтаре, Северном море и Дуврском проливе постоянно дежурили флоты, готовые ко всему."
      - "Командование ими я поручаю вам троим: Уорспайт, Вэлиант и Хау."
  - char: "warspite"
    side: "left"
    text:
      - "Слушаемся!"
  - char: "valiant"
    side: "left"
    text:
      - "Слушаемся!"
  - char: "howe"
    side: "left"
    text:
      - "Слушаемся!"
  - char: "queen_elizabeth"
    side: "right"
    text:
      - "Вот и славно. На этом с экспонатами закончили, пойдёмте пить чай~"

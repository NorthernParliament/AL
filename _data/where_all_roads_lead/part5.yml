chapter1:
  rows:
  - char: "illustrious_rad"
    side: "left"
    text:
      - "Вот так обстоят дела с нашей стороны."
      - "Свободный Ирис тоже должен был получить приглашение от Империи Сардиния. Хотелось бы узнать, что планирует госпожа Ришелье?"
      - "Её Величество передала, что если Свободный Ирис решит участвовать, Королевский Флот готов взять на себя все расходы по строительству вашего павильона."
      - "Я уже осмотрела архипелаг, где пройдёт выставка. Там есть остров, достаточно большой, чтобы мы могли возвести наши павильоны бок о бок."
  - char: "richelieu"
    side: "right"
    text:
      - "Я искренне благодарна Её Величеству Куин Элизабет за столь щедрое предложение."
      - "Однако приношу свои извинения. На данный момент я покинула акваторию Средиземного моря, и мне требуется время для размышлений и подготовки."
      - "Это вовсе не означает, что Свободный Ирис отказывается от участия. Именно так я ответила и представителям Империи Сардиния."
  - char: "illustrious_rad"
    side: "left"
    text:
      - "Вот как. Что ж, в таком случае позвольте пожелать вам удачи во всех делах."
      - "Буду с нетерпением ждать нашей встречи на полях выставки."

chapter2:
  rows:
  - char: "jeanne_d_arc"
    side: "left"
    text:
      - "Прошу прощения за прямоту, но у нас и так дел невпроворот."
      - "К тому же, учитывая ситуацию с Доминионом Виши, я не считаю, что сейчас подходящее время для масштабных празднований."
  - char: "le_terrible"
    side: "right"
    text:
      - "Напротив, Жанна. Мне кажется, это редкая возможность."
      - "Именно из-за существования Доминиона Виши нам и стоит участвовать."
      - "Виши обязательно приедет, потому что они хотят доказать свою легитимность как единственных преемников Ортодоксии Ирис."
      - "Если нас там не будет, то даже если союзники захотят нас поддержать — кого им поддерживать? Где нас искать?"
      - "В таком случае это масштабное международное событие, которого мир ждал годами, превратится в трибуну для одного лишь Доминиона Виши."
      - "И в глазах всего света получится, что Ортодоксия Ирис теперь полностью представлена ими?"
  - char: "jeanne_d_arc"
    side: "left"
    text:
      - "Ле Террибль, я признаю твою правоту... Но разве это не означает, что нам придётся выставляться на одной площадке с Доминионом Виши?"
  - char: "le_terrible"
    side: "right"
    text:
      - "Такова реальность."
      - "Сейчас мы слишком слабы. И вместо того чтобы беспокоиться о «сохранении лица», я считаю, лучше извлечь из ситуации реальную выгоду."
      - "К тому же мероприятия, где собираются все фракции — это рай для дипломатов. Мы могли бы воспользоваться этим, чтобы завести больше друзей."
  - char: "jeanne_d_arc"
    side: "left"
    text:
      - "...Хорошо, ты меня убедила."
  - char: "richelieu"
    side: "right"
    text:
      - "Похоже, вы пришли к согласию."
      - "Раз уж мы решили участвовать... Как насчёт того, чтобы сделать темой нашего павильона Триумфальную арку?"
      - "Триумфальную арку, созданную из призрачного света..."
      - "В знак почтения к тому триумфу, что всё ещё где-то далеко, призрачный и недосягаемый, но всё же истинный и неизбежный в будущем..."


chapter1:
  rows:

    - char: essex
      side: left
      text:
        - "Командир... и семпай Энтерпрайз! Не ожидала, что мы воссоединимся при таких обстоятельствах!"

    - char: enterprise
      side: right
      text:
        - "Вы продвигаетесь очень быстро..."

    - char: essex
      side: left
      text:
        - "Все стараются изо всех сил, наш флот тоже не мог плестись в хвосте~"
        - "(Я только и думала о том, чтобы поскорее встретиться с Командиром и Энтерпрайз, и как-то само собой получилось...)"

    - char: enterprise
      side: right
      text:
        - "Обстановка внутри Сингулярности неясная, так что ваше прибытие, несомненно, увеличивает наши шансы на успех. Это большая помощь."

    - char: vestal
      side: left
      text:
        - "Командир выглядит неважно... Должно быть, это последствия удара при переходе."
        - "Пожалуйста, подождите немного на командном мостике, я сейчас же займусь вашим состоянием."

    - char: commander
      side: right
      text:
        - "Это очень кстати... Но почему судно снабжения оказалось здесь?"

    - char: vestal
      side: left
      text:
        - "Вы правы, вообще-то тыловым службам не положено быть так близко к передовой..."
        - "Но из-за ожесточённых боёв повреждения следовали одно за другим. Чтобы сэкономить время, я передвинулась чуть-чуть поближе... Хе-хе."
        - "Не волнуйтесь, флот Эссекс постоянно обеспечивает нам прикрытие."

    - char: enterprise
      side: right
      text:
        - "И всё же... ремонтному судну так опасно находиться у самого фронта."

    - char: vestal
      side: left
      text:
        - "Да брось, будто в первый раз~"

    - char: enterprise
      side: right
      text:
        - "Вестал..."

    - char: vestal
      side: left
      text:
        - "Хм, об этом и так все знают, скрывать что-либо уже поздно."
        - "Кстати, Командир, я только что провела осмотр всех присутствующих — критических повреждений не обнаружено, весь флот в отличной форме!"
        - "Особенно Энтерпрайз! Сразу видно, что она вступила в бой после того, как хорошенько отдохнула и привела себя в порядок."
        - "Как же хорошо, что рядом с Командиром Энтерпрайз не перенапрягается и не лезет на рожон~"
        - "Мы уже близки к завершению сражения, будет обидно получить ранение в такой момент."
        - "Я не особо разбираюсь в стратегии, но за тыловое обеспечение можете быть спокойны!"

    - char: commander
      side: right
      text:
        - "В такой неопределённой ситуации присутствие ремонтного флота поблизости действительно внушает уверенность."

    - text:
      - "Флот осторожно движется вперёд. Возможно, основные силы Сирен, исчезнувшие из центра акватории, скрываются именно здесь, внутри Сингулярности..."

chapter1:
  rows:

    - char: enterprise_meta_d
      side: left
      status: is-meta
      text:
        - "Узнаёшь, кто я?"

    - char: ark_royal_meta?
      side: right
      status: is-meta
      text:
        - "Ты... Энтерпрайз?!! Невозможно! Ты же давно должна была..."

    - char: enterprise_meta_d
      side: left
      status: is-meta
      text:
        - "Вижу, рассудок ещё в норме. Буду краткой: какова обстановка на поле боя?"

    - char: ark_royal_meta?
      side: right
      status: is-meta
      text:
        - "Да тут и без слов всё ясно... Полный разгром. Канонада на море стихла. Мы потерпели сокрушительное поражение."

    - char: enterprise_meta_d
      side: left
      status: is-meta
      text:
        - "Значит, здесь всё-таки наступила финальная стадия «утилизации» Сиренами..."
        - "Жаждешь мести?"

    - char: ark_royal_meta?
      side: right
      status: is-meta
      text:
        - "Конечно!!! Эти Сирены... они уничтожили всё, что мне было дорого..."
        - "Но... надежды больше нет."
        - "Какой прок от этой силы, какой смысл в том, что теперь ни один враг не может даже приблизиться ко мне..."
        - "Они пришли из бездны, их легионы бесконечны... и они... они истребили всех, кроме меня одной..."

    - char: enterprise_meta_d
      side: left
      status: is-meta
      text:
        - "Ха, ты ещё слишком мало знаешь о силе, которой теперь обладаешь."
        - "«Факел» угас, но «Пепел» ещё тлеет."
        - "Позволь представиться снова. Я — Энтерпрайз, но не та, которую ты знала. Арк Роял, войдёшь ли ты с нами в «Пепел»?"

chapter2:
  rows:

    - char: belfast
      side: left
      text:
        - "Господин Командир, вы очнулись. Как вы себя чувствуете?"

    - char: commander
      side: right
      text:
        - "Голова идет кругом, подташнивает... Где мы сейчас?.."

    - char: belfast
      side: left
      text:
        - "Судя по текущей обстановке, недавняя чудовищная сила затянула нас во внутреннее пространство Сингулярности."

    - char: commander
      side: right
      text:
        - "Внутреннее пространство Сингулярности... Выглядит как океан из ночного кошмара..."

chapter3:
  rows:

    - char: commander
      side: right
      text:
        - "Почему ты здесь?"

    - char: belfast
      side: left
      text:
        - "Её Величество, беспокоясь о вашем состоянии, поручила мне заботиться о вашем здоровье до завершения операции."

chapter4:
  rows:

    - char: commander
      side: right
      text:
        - "Какова ситуация во флоте?"

    - char: belfast
      side: left
      text:
        - "Под командованием Энтерпрайз флот сейчас проводит перестроение и разведку акватории. Пожалуйста, не беспокойтесь."

chapter5:
  rows:

    - char: belfast
      side: left
      text:
        - "Я управляю командным кораблем, мы следуем за флотом. Здесь довольно специфическая среда, так что, пожалуйста, отдохните еще немного."

chapter6:
  rows:

    - char: commander
      side: right
      text:
        - "Кажется, внутри корабля стало как-то слишком тихо... Точно, а где ТБ?"

    - char: belfast
      side: left
      text:
        - "Мисс Навигатор перестала подавать признаки жизни сразу после того, как флот вошел внутрь Сингулярности."
        - "Возможно, дело в помехах... Однако остальные электронные системы флота работают исправно. Точная причина сбоя всё ещё выясняется."

    - char: commander
      side: right
      text:
        - "Опять эти необъяснимые направленные помехи, бьющие именно по системе Навигатора..."

    - char: belfast
      side: left
      text:
        - "Кстати, похоже, вместе с нами сюда затянуло еще несколько ударных групп."
        - "Флот пытается установить с ними связь. Как только появятся новости, я вам доложу."

    - char: commander
      side: right
      text:
        - "Тогда оставляю всё на вас. Кажется, мне действительно нужно... еще немного поспать..."
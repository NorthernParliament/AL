chapter1:
  rows:

    - char: essex
      side: left
      text:
        - "Странно... Эти обломки не только разной степени давности, но и происхождение многих из них вообще невозможно определить..."
        - "Шторм в океане NA бушует всего несколько месяцев. Откуда здесь могло скопиться такое невообразимое количество останков?"
        - "Как думаете... может, именно здесь и нашли свой бесславный конец основные силы Сирен?"

    - char: enterprise
      side: right
      text:
        - "Ты считаешь, что ударный кулак Сирен на самом деле уже давно и полностью уничтожен внутри Сингулярности?"

    - char: essex
      side: left
      text:
        - "Именно так, семпай Энтерпрайз."
        - "Если отталкиваться от этой теории, то всё встаёт на свои места: и стягивание сил перед началом операции, и слабое сопротивление в ходе боёв, и эта пустая изнутри «последняя линия обороны»."
        - "Есть лишь одна причина всех этих странных манёвров Сирен — «Пепел» нанёс им сокрушительный удар изнутри, прямо из центра океана NA."
        - "А эти обломки, дрейфующие повсюду внутри Сингулярности, — доказательство того, что Сирены сопротивлялись изо всех сил."

    - char: enterprise
      side: right
      text:
        - "Если подумать... поводом для начала нашей операции как раз и послужили шторм в океане NA и аномальное сокращение численности войск Сирен."
        - "Мы прямо-таки выбрали идеальный момент, сами того не ведая..."
        - "Но... даже если все «свежие» обломки — дело рук «Пепла», это всё равно не объясняет наличие старых."
        - "Некоторые из них явно нашего типа. И хотя их не так много, в масштабах всей этой области их количество всё равно остаётся колоссальным."
        - "У нас просто нет отчётов о потерях такого масштаба."

    - char: essex
      side: left
      text:
        - "Может, их подняло со дна океана вместе с водой?.."

    - char: enterprise
      side: right
      text:
        - "Боюсь, даже если сложить все наши потери с момента появления Сирен, этого всё равно не хватит."
        - "Это море обломков кажется бесконечным. Сколько бы ни летели разведсамолёты, впереди по курсу их становится только больше."
        - "Даже позади нас больше нет чистой воды. Мы будто внезапно провалились в самый центр бескрайнего океана из руин."

    - char: saratoga
      side: left
      text:
        - "Хе-хе~ Кажется, у меня есть ответ на этот вопрос!"

    - char: enterprise
      side: right
      text:
        - "...Саратога?"

    - char: saratoga
      side: left
      text:
        - "Внутреннее пространство Сингулярности отличается от внешнего мира — я недавно как раз читала теорию на этот счёт!"

    - char: enterprise
      side: right
      text:
        - "И в чём же различие?.."

    - char: saratoga
      side: left
      text:
        - "Сингулярность — это не просто трёхмерное пространство с фиксированным объёмом, это нечто гораздо более сложное."
        - "И как следствие её природы, пространство внутри Сингулярности может быть подвержено сильному «эффекту наблюдателя»."

    - char: queen_elizabeth
      side: right
      text:
        - "А! Я тоже вспомнила, действительно существует такая теория!"

    - char: saratoga
      side: left
      text:
        - "Эй, погоди! Это сестрёнка Сара вспомнила первой, так что не смей вставлять свои пять копеек!"

    - char: queen_elizabeth
      side: right
      text:
        - "Но ведь теорию выдвинул учёный Королевского флота!"

    - char: saratoga
      side: left
      text:
        - "...Да какая разница! И ты вообще хоть открывала ту научную работу?.."

    - char: queen_elizabeth
      side: right
      text:
        - "Белфаст наверняка её внимательно изучила!"

    - char: saratoga
      side: left
      text:
        - "....."

    - char: queen_elizabeth
      side: right
      text:
        - "Ла-а-адно... Продолжай, продолжай."

    - char: saratoga
      side: left
      text:
        - "Хм~ Согласно выводам в статье, внутреннее пространство Сингулярности растягивается и расширяется в зависимости от нашего наблюдения."
        - "То, что пространство кажется нам огромным, может быть лишь следствием того, что мы смотрим слишком далеко. Если продолжать разведку в том же духе, мы и впрямь можем застрять в бесконечном море обломков."
        - "С другой стороны, раз Сирены и «Пепел» могут здесь спокойно перемещаться, значит, тут должны быть свои правила..."
        - "Я думаю, нам стоит намеренно сузить радиус обзора. Отозвать разведсамолёты, выключить радары и двигаться по этому узкому коридору, полагаясь только на собственное зрение. Возможно, так мы выберемся отсюда!"

chapter2:
  rows:

    - char: commander
      side: right
      text:
        - "Вот оно что!"

    - char: saratoga
      side: left
      text:
        - "Иного я от нашего умного Командира и не ожидала~!"

chapter3:
  rows:

    - char: commander
      side: right
      text:
        - "Ничего не понимаю..."

    - char: saratoga
      side: left
      text:
        - "Ничего страшного, просто доверьтесь в этот раз своей мудрой сестрёнке Саре~!"
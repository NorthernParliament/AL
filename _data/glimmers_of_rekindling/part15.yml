chapter1:
  rows:

    - char: tb_rad
      side: left
      text:
        - "Синхронизация модулей анализа: Командир, в прилегающем секторе активности противника не обнаружено."
        - "Обобщаю разведданные с полей сражений..."
        - "Директива выполнена: Командир, помимо нас, флот прорвал оборону Сирен ещё на трёх направлениях. Первая линия обороны Сирен рассыпается."

    - char: enterprise
      side: right
      text:
        - "Всё идёт на удивление гладко."

    - char: queen_elizabeth
      side: left
      text:
        - "Великолепно! На очереди вторая линия — Белфаст, есть данные разведки?"

    - char: belfast
      side: right
      text:
        - "Ваше Величество, первый этап разведки завершён. За исключением разрозненных групп противника, признаков организованной линии обороны Сирен не обнаружено."

    - char: saratoga
      side: left
      text:
        - "Э? Только разрозненные враги? Не может быть... Внешний периметр был защищён так плотно, а следом нет никакой второй линии?.."

    - char: memphis
      side: right
      text:
        - "Неужели Сирены сосредоточили абсолютно все силы на внешнем кольце?.."

    - char: queen_elizabeth
      side: left
      text:
        - "Никакой стратегической глубины, никаких резервных флотов, никаких вспомогательных сооружений... Прорыв в одной точке — и весь фронт рухнул?.."
        - "Что за идиотская тактика... Сирены что, до сих пор не проснулись?!"

    - char: enterprise
      side: right
      text:
        - "Если предположить, что Сирены по какой-то причине действительно пошли на столь аномальное развёртывание, то мы возвращаемся к ключевому вопросу."
        - "...Количество врагов не сходится."
        - "До сегодняшнего генерального наступления флот Сирен не должен был понести критических потерь. По идее, весь центральный сектор должен быть буквально забит их кораблями."
        - "Но, судя по текущей ситуации, врагов всё ещё слишком мало..."

    - char: memphis
      side: left
      text:
        - "Есть ли смысл Сиренам скрывать свою мощь на данном этапе?.. Если бы они хотели прорваться и уйти, для этого были моменты и получше."

    - char: commander
      side: right
      text:
        - "Передайте всем флотам: сохранять максимальную бдительность. Продолжаем продвижение, зачищая по пути остатки вражеских сил."
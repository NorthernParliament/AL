chapter1:
  rows:

    - char: birmingham
      side: left
      text:
        - "Повсюду обломки Сирен... Местная флотилия полностью уничтожена."

    - char: reno
      side: right
      text:
        - "Мы невольно избавили себя от кучи лишних хлопот...."

    - char: commander
      side: left
      text:
        - "......"

    - char: hiryuu_meta
      side: right
      status: is-meta
      text:
        - "Йо, давно не виделись. Похоже, вы уже наловчились определять моё примерное местоположение.."

    - char: baltimore
      side: left
      text:
        - "Так это и впрямь было намеренно... Ну, вот мы здесь. Чего ты хочешь?"

    - char: hiryuu_meta
      side: right
      status: is-meta
      text:
        - "В последнее время вы стали слишком назойливы. Честно говоря, мне это порядком поднадоело."

    - char: baltimore
      side: left
      text:
        - "Если надумала сдаться — мы примем твою капитуляцию."

    - char: hiryuu_meta
      side: right
      status: is-meta
      text:
        - "Сдаться? С чего бы мне сдаваться потенциальным союзникам Антиоха?"

    - char: enterprise
      side: left
      text:
        - "..Потенциальным союзникам? О чём ты вообще говоришь?"

    - char: hiryuu_meta
      side: right
      status: is-meta
      text:
        - "Внезапное появление и внедрение системы ТБ, а также столь же внезапно возникшая технология отслеживания «Пепла»..."
        - "Неужели вы никогда не задумывались о происхождении этих технологий?"

    - char: enterprise
      side: left
      text:
        - "Я не участвовала в разработке ТБ, но Саратога лично курировала весь процесс."
        - "Сама система — плод наших собственных разработок. И технология обнаружения маяков не исключение."
        - "Впрочем... хотя я лично настроена скептически, я не стану отрицать, что некоторые научные отделы действительно используют в своих успехах элементы реверс инженеринга технологий Сирен."

    - char: hiryuu_meta
      side: right
      status: is-meta
      text:
        - "Реверс инженеринг, ха..."
        - "Вы ведь уже сталкивались с серией Энфорсеров? Удалось ли вам заполучить хоть один «обломок», пригодный для этого вашего «реверс инженеринга»?"

    - char: enterprise
      side: left
      text:
        - "Это..."

    - char: hiryuu_meta
      side: right
      status: is-meta
      text:
        - "Если продолжать, разговор станет слишком сложным. Короче говоря, я устала от вашего бесконечного преследования."
        - "Давай решим всё здесь и сейчас."

    - char: baltimore
      side: left
      text:
        - "О? Могу ли я расценивать это как официальный вызов на дуэль?"

    - char: hiryuu_meta
      side: right
      status: is-meta
      text:
        - "А память у тебя неплохая, «Герой»."
        - "Можете не зацикливаться на буквальном значении слова «дуэль». Если хотите — нападайте всем флотом, я не против."

    - char: enterprise
      side: left
      text:
        - "Командир, жду ваших приказов."

    - char: commander
      side: right
      text:
        - "(Похоже, прояснить истинные намерения «Пепла» можно только в бою.)"
        - "(Однако сил нынешнего флота недостаточно для прямого столкновения. Опрометчивое нападение может всё испортить...)"
        - "Отказываюсь."
        - "Прошу прощения, но, зафиксировав сигнал маяка, мы пришли сюда с намерением наладить диалог, а не вступать в бой."

    - char: hiryuu_meta
      side: left
      status: is-meta
      text:
        - "Вы не позволили эмоциям взять верх и трезво оценили соотношение сил. Действительно, выдающийся командующий."
        - "Впрочем, сама ваша попытка договориться с опасным «Пеплом» — уже стратегическая ошибка!"
        - "Та же Такао, например, на это точно не купится~"
        - "К тому же сегодня я настроена на поединок, и возвращаться ни с чем мне совсем не хочется."
        - "Сделаем так: я обещаю не заходить слишком далеко, чтобы вы смогли вернуться в порт..."
        - "Но если вам удастся подавить мой натиск, я расскажу кое-что, что вас очень заинтересует. Идёт?"
        - "А если вы и теперь откажетесь..."

    - char: commander
      side: right
      text:
        - "(Неужели обмен информацией требует таких крайних мер... Или она тоже хочет получше узнать нас через битву?)"
        - "(М-да... Она уже перешла в боевой режим. Дальнейшие отказы только спровоцируют её.)"
        - "Ладно. Надеюсь, ты держишь слово."

    - char: hiryuu_meta
      side: left
      status: is-meta
      text:
        - "Какая решительность! Разумеется, я всегда верна своему слову~"

    - char: commander
      side: right
      text:
        - "Флоту — приготовиться! Мисс Навигатор, передайте авиагруппе координаты для удара. Их выход."

    - char: hiryuu_meta
      side: left
      status: is-meta
      text:
        - "Значит, поддержка уже была в воздухе и ждала сигнала... Вы всё-таки подготовили козырь в рукаве. Ха-ха-ха, как интересно!"
        - "Твой стиль напоминает мне о чём-то очень знакомом... Кажется, я начинаю понимать, почему Энтерпрайз так заинтересована в тебе."
        - "Не церемонься, бей со всей силы!"
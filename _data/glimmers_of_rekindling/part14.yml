chapter1:
  rows:

    - char: saratoga
      side: left
      text:
        - "М-м... Командир, глядя на эти плавучие крепости, тебе ничего не приходит на ум?"

    - char: commander
      side: right
      text:
        - "Внезапно появившаяся группа плавучих крепостей Железной Крови..."

    - char: queen_elizabeth
      side: left
      text:
        - "Хм, я давно знала, что они изучают подобные технологии, но не ожидала, что они достигнут столь впечатляющих успехов!"

    - char: saratoga
      side: right
      text:
        - "Сирены удерживают власть над океаном во многом благодаря разветвлённым оборонительным системам, заранее установленным в море."
        - "Если Железная Кровь решит последовать их примеру..."

    - char: baltimore
      side: left
      text:
        - "Тогда дело дрянь! Если они, подражая Сиренам, начнут использовать плавучие крепости для блокады ключевых маршрутов, нам придётся несладко..."

    - char: saratoga
      side: right
      text:
        - "Вот именно! Сейчас они атакуют только Сирен, но кто знает, что случится в будущем?!"

    - char: commander
      side: left
      text:
        - "Этот вопрос определённо заслуживает серьёзного внимания..."

chapter2:
  rows:

    - char: tb_rad
      side: left
      text:
        - "Предупреждение: впереди зафиксировано несколько мощных сигнатур. Предположительно — множественные Тестеры Сирен."

    - char: saratoga
      side: right
      text:
        - "Ой? Наконец-то и мы на них наткнулись?!"

    - char: memphis
      side: left
      text:
        - "М-да... Появление сразу нескольких Тестеров в одном бою — случай крайне редкий."
        - "Согласно докладам других групп, все эти Тестеры обладают высокой огневой мощью и прочной защитой, но у них, похоже, есть проблемы с системой управления."
        - "Они ведут себя не так, как подобает гуманоидным командным единицам Сирен. Это больше похоже на... некое подобие серийных моделей."

    - char: baltimore
      side: right
      text:
        - "Вполне в духе Сирен — штамповать такое..."
        - "Раз эти штуки вышли в море, значит, мы столкнулись с самым упорным сопротивлением на этой линии обороны?"
        - "Хе-хе~ А то я за весь путь почти не размялась. Самое время проверить этих серийных Тестеров на прочность!"
chapter1:
  rows:

    - text:
      - "С самого момента выхода в море я кожей чувствую чей-то пристальный, невероятно давящий взгляд..."

    - char: reno
      side: left
      text:
        - "*пристально смотрит*"

    - char: commander
      side: right
      text:
        - "......"
        - "*приветствую первым*"

    - char: reno
      side: left
      text:
        - "Ой! Ко-Командир, вам что-нибудь нужно от меня?!"

chapter2:
  rows:

    - char: commander
      side: right
      text:
        - "Расслабься."

chapter3:
  rows:

    - char: commander
      side: right
      text:
        - "Сделай глубокий вдох."

chapter4:
  rows:

    - char: reno
      side: left
      text:
        - "Неужто... Неужто Командир заметил, как я нервничаю?.."

    - char: birmingham
      side: right
      text:
        - "Было бы странно не заметить взгляд такой сокрушительной силы."

    - char: baltimore
      side: left
      text:
        - "Кажется, температура во всём флоте поднялась на пару градусов из-за твоего пылающего взора!"

    - char: reno
      side: right
      text:
        - "Э-э?! П-простите! Я совершенно не осознавала..."
        - "Я так долго ждала этого дня... Наконец-то, впервые! У меня появился шанс сражаться плечом к плечу с Командиром! Я просто не могу сдержать восторг..."

    - char: commander
      side: left
      text:
        - "(...Что же лучше сказать в такой момент?)"

chapter5:
  rows:

    - char: commander
      side: left
      text:
        - "Почему ты так взволнована?"

    - char: reno
      side: right
      text:
        - "...Ой, ну как же! Потому что вы для меня — настоящий супергерой, спасающий мир!"
        - "Получается, в этот раз я буду кем-то вроде верного помощника рядом с героем... Хе-хе-хе-хе..."

chapter6:
  rows:

    - char: commander
      side: left
      text:
        - "Рад сражаться с тобой плечом к плечу, Рино."

    - char: reno
      side: right
      text:
        - "А-а-а-а-а!! Рада стараться, Командир! Я приложу все силы, чтобы поддержать вас. Давайте выполним это задание красиво!"
        - "Действовать заодно с таким супергероем, как Командир... Хм? Выходит, в этот раз я исполняю роль напарника героя... Хе-хе-хе-хе..."

chapter7:
  rows:

    - char: commander
      side: left
      text:
        - "Я тоже ждал возможности сразиться вместе с тобой."

    - char: reno
      side: right
      text:
        - "П-правда?! Рино, этот день станет самым счастливым в твоей жизни!!"
        - "Командир, вы для меня словно супергерой, спасающий мир. В этой операции я выложусь на полную, чтобы поддержать вас. Давайте выполним задание с шиком!"
        - "Но тогда получается, что я сейчас как сайдкик рядом с Командиром? Хе-хе-хе-хе..."

chapter8:
  rows:

    - char: tb_rad
      side: left
      text:
        - "Синхронизация модулей анализа завершена. Командир, флот приближается к заданному сектору разведки."

    - char: birmingham
      side: right
      text:
        - "Границы шторма становятся всё отчётливее. Вблизи это выглядит по-настоящему пугающе."

    - char: baltimore
      side: left
      text:
        - "Куда масштабнее того, что мы видели в центре Бермудского треугольника..."
        - "Хоть размеры и цвет отличаются, но это странное чувство давления... Может ли это тоже быть своего рода Сингулярностью?"

    - char: enterprise
      side: right
      text:
        - "Пока что я не ощущаю того специфического искажения, которое обычно сопутствует Сингулярности..."
        - "Впрочем, мы всё ещё мало знаем о них. Если это действительно некая аномалия, то это объяснило бы, почему «Пепел» так часто появляется в океане NA."
        - "Как только мы полностью зачистим сектор от Сирен, проведём более глубокое..."
        - "Всем внимание! Сирены начали движение."

    - char: tb_rad
      side: left
      text:
        - "Предупреждение: обнаружено приближение флота Сирен. Рекомендуется привести флот в состояние боевой готовности."

    - char: reno
      side: right
      text:
        - "Она среагировала даже быстрее системы «Навигатор»... Не зря Энтерпрайз прошла через столько битв!"

    - char: baltimore
      side: left
      text:
        - "Раз они отреагировали мгновенно, стоит нам только приблизиться — значит, система управления Сирен в центральном секторе активна."

    - char: commander
      side: right
      text:
        - "Постарайтесь избегать боя."

    - char: enterprise
      side: left
      text:
        - "Флот, меняем курс! Отводим силы от центральной зоны. Наша задача — разведка, не вступайте в лобовое столкновение с Сиренами!"
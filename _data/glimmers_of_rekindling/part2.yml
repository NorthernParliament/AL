chapter1:
  rows:

    - text:
      - "Там впереди, кажется, Мемфис и... Шеффилд?.."
      - "Мне всегда казалось, что от Шеффилд исходит какая-то таинственная аура, отличающая её от остальных участниц отряда горничных Королевского флота. Интересно, о чём они беседуют?"

chapter2:
  rows:

    - char: commander
      side: left
      text:
        - "Подойти."

chapter3:
  rows:

    - char: commander
      side: left
      text:
        - "Пожалуй, не стоит."

    - text:
      - "Раз совещание закончилось, Мемфис и Шеффилд могут обсуждать личные дела, не буду им мешать."

    - char: memphis
      side: left
      text:
        - "Командир?"

    - text:
      - "А, меня заметили."

chapter4:
  rows:

    - char: sheffield
      side: left
      text:
        - "Тогда я полагаюсь на вас в этом деле. Мне нужно спешить в другое место, так что я..."
        - "...Надо же, это — Командир. Должно быть, вы изрядно вымотались на сегодняшнем собрании."
        - "Советую вам выбросить весь этот шум из головы и хорошенько отдохнуть, чтобы дать мозгу передышку. На этом я откланяюсь."

    - text:
      - "Шеффилд ушла, даже не обернувшись..."

    - char: memphis
      side: left
      text:
        - "Командир, спасибо за вашу работу сегодня! Решили прогуляться?"

    - char: commander
      side: right
      text:
        - "Решил немного проветриться... Вы что-то обсуждали?"

    - char: memphis
      side: left
      text:
        - "Да, Шеффи просила меня кое-что разузнать."
        - "Это не секрет от вас, Командир, но я бы хотела сначала прийти к каким-то конкретным выводам, прежде чем рассказывать."

    - char: commander
      side: right
      text:
        - "Это как-то связано с тем, что произошло сегодня на совещании?"

    - char: memphis
      side: left
      text:
        - "В какой-то степени... В любом случае, то, что было сегодня — это уже слишком."
        - "Состав участников и темы обсуждения полностью изменились, а нас даже не поставили в известность... Такое чувство, будто нас намеренно заманили в ловушку."

    - char: commander
      side: right
      text:
        - "Согласен. Собрание, которое изначально должно было быть посвящено плану генерального наступления, по факту превратилось в дискуссию об исследованиях META и Сирен."

    - char: memphis
      side: left
      text:
        - "Подобные тенденции наметились уже давно, но я не ожидала, что в этот раз всё зайдет так далеко..."

    - char: commander
      side: right
      text:
        - "Тенденции? Что ты имеешь в виду?"

    - char: memphis
      side: left
      text:
        - "С самого начала этой операции сражения шли очень гладко. Мы одерживали победу за победой — и над Сиренами, и над недавно появившимся «Пеплом»."
        - "Вы постоянно находитесь на передовой, Командир, и можете этого не знать... Но в тылу многие уже заранее погрузились в атмосферу празднований и триумфа."

    - char: commander
      side: right
      text:
        - "Празднования... Хотя каждый раз мы возвращались целыми лишь потому, что «Пепел» сам избегал затяжного боя."

    - char: memphis
      side: left
      text:
        - "Сила и давление, исходящие от «Пепла»... Даже если знать об этом из отчётов, невозможно осознать реальность угрозы, не столкнувшись с ними лично."
        - "Тем более что обычные люди вообще мало что смыслят в таких вещах. Всё, что видит тыл — это череда побед и бесчисленные трофеи, которые мы добываем в боях."
        - "Под влиянием этих настроений даже в штабах и командованиях, которые до этого сохраняли хладнокровие, всё чаще стали звучать призывы к форсированию исследований Сирен."
        - "Дошло до крайностей: «Боевая мощь Сирен не заслуживает внимания, штаб должен поставить научно-исследовательские задачи выше боевых». И эти идеи как-то незаметно расползлись повсюду."

    - char: commander
      side: right
      text:
        - "Не думал, что всё зашло настолько далеко..."

    - char: memphis
      side: left
      text:
        - "Детали я ещё выясняю, но изменение повестки сегодняшнего собрания, скорее всего, напрямую связано с этим."
        - "Мы, кансен, желаем лишь одного — отвоевать океан у Сирен."
        - "Уверена, что командование и штабы в регионах думают так же."
        - "У всех одна цель, но в методах её достижения возникли разногласия... Печальная и до боли знакомая ситуация, не находите?"

    - char: commander
      side: right
      text:
        - "То, что Шеффилд пришла предупредить об этом, означает, что Куин Элизабет уже в курсе событий... Она хочет, чтобы мы решили эту проблему?"

    - char: memphis
      side: left
      text:
        - "Вообще-то..."

    - char: sheffield
      side: right
      text:
        - "Вовсе нет, господин Командир."
        - "Её Величество лишь желает, чтобы вы лично осознали, что происходит в «закулисье», и имели прямое представление о подковёрных играх, идущих в тени войны."
        - "Что же касается самой проблемы, Её Величество планирует разобраться с ней самостоятельно."

    - char: memphis
      side: left
      text:
        - "Ой-ой-ой, Шеффи?! Не пугай так... Ты же вроде ушла?"

    - char: sheffield
      side: right
      text:
        - "Прошу прощения. Ваша беседа была столь увлекательной, что я невольно задержалась послушать."

    - char: memphis
      side: left
      text:
        - "Иногда мне кажется... Шеффи, ты вылитый спецагент!"

    - char: sheffield
      side: right
      text:
        - "Ничего подобного, я всего лишь обычная горничная Королевского флота."

    - char: commander
      side: left
      text:
        - "К слову, я в последнее время ни разу не видел Куин Элизабет на собраниях... Что же она задумала?"

    - char: sheffield
      side: right
      text:
        - "«Всё равно там сплошная скука, у меня есть дела поважнее!» — сказав это, Её Величество вычеркнула все совещания из своего графика."
        - "Будучи горничной, я, разумеется, не посвящена в планы Её Величества, так что далее — лишь мои личные предположения."
        - "Если бы Её Величество присутствовала на каждой встрече, вы, господин Командир, не увидели бы ни одного открытого разногласия."
        - "Те, чьи амбиции были бы подавлены её авторитетом, начали бы бесконечно искать предлоги, чтобы вставлять палки в колёса исподтишка. А это куда опаснее."

    - char: commander
      side: left
      text:
        - "Да, такой исход вполне вероятен..."

    - char: sheffield
      side: right
      text:
        - "В общем, расклад примерно такой. Как бы то ни было, господин Командир, завтра вам снова придётся постараться."

    - char: commander
      side: left
      text:
        - "..."
chapter1:
  rows:

    - char: tb_rad
      side: left
      text:
        - "Синхронизация модулей анализа: Командир, курс через впереди идущий сектор заблокирован заграждениями Сирен."

    - char: enterprise
      side: right
      text:
        - "Попытка прорваться силой или обходной маневр отнимут слишком много времени. Лучше всего было бы уничтожить энергоустановки."

    - char: commander
      side: left
      text:
        - "Мисс Навигатор, свяжитесь по очереди с ближайшими группами флота."

    - char: tb_rad
      side: right
      text:
        - "Директива подтверждена: выполняю последовательный опрос..."
        - "омандир, получен запрос на связь от одной из флотилий. Устанавливаю соединение..."

    - char: le_temeraire_rad
      side: left
      text:
        - "Хе-хе, нужна помощь, Командир?!"

    - char: l_opiniatre_rad
      side: right
      text:
        - "(Темерер... слишком неформально!)"
        - "Кхм... Здравствуйте, Командир. Я — «маг» Л’Опиньятр из Свободного Ириса. Та, что только что вела себя в эфире столь безрассудно — Ле Темерер, она также из Свободного Ириса."

chapter2:
  rows:

    - char: commander
      side: left
      text:
        - "«Маг» Свободного Ириса?"

    - char: l_opiniatre_rad
      side: right
      text:
        - "Ах, не обращайте внимания, про мага — это была шутка..."

    - char: le_temeraire_rad
      side: left
      text:
        - "(Только что отчитывала меня! А сама наговорила Командиру по связи странностей!)"

    - char: l_opiniatre_rad
      side: right
      text:
        - "(Тсс! Тсс-с!)"
        - "В-общем, для нас и для Свободного Ириса большая честь сражаться бок о бок с вами, Командир."

chapter3:
  rows:

    - char: commander
      side: left
      text:
        - "«Безрассудная» Ле Тэмерер?"

    - char: le_temeraire_rad
      side: right
      text:
        - "Вовсе нет! Это всё Опиньятр со своими представлениями! Хоть меня и зовут Ле Темерер, я совсем не безрассудная!"   
        - "Для меня большая честь сражаться вместе с вами, знаменитый Командир!"

chapter4:
  rows:

    - char: l_opiniatre_rad
      side: left
      text:
        - "Совсем недавно мы обнаружили объект, предположительно являющийся энергоустановкой Сирен в этом секторе." 

    - char: le_temeraire_rad
      side: right
      text:
        - "Стоит нам её подорвать, как все препятствия в море исчезнут!"

    - char: commander
      side: left
      text:
        - "Судя по прошлому опыту, так оно и должно быть."

    - char: le_temeraire_rad
      side: right
      text:
        - "Тогда смело доверьтесь нам! Флот Свободного Ириса, на выход!"
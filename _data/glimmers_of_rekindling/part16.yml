chapter1:
  rows:

    - char: tb_rad
      side: left
      text:
        - "Предупреждение: впереди зафиксированы аномальные метеорологические характеристики. Рекомендую соблюдать дистанцию."

    - char: memphis
      side: right
      text:
        - "Шторм внутри шторма... Какое странное зрелище."

    - char: baltimore
      side: left
      text:
        - "Кажется, будто он вращается с постоянной скоростью, но в то же время выглядит неподвижным... Энтерпрайз, Командир, у вас нет того самого чувства узнавания?!"

    - char: enterprise
      side: right
      text:
        - "...Да, сомнений нет. Шторм впереди — это Сингулярность."

    - char: memphis
      side: left
      text:
        - "А? То есть не весь этот гигантский шторм является Сингулярностью, а только тот малый шторм, что скрыт внутри него?.."

    - char: enterprise
      side: right
      text:
        - "Именно. Неудивительно, что при входе в этот сектор мы не ощущали приближения к Сингулярности... Весь этот внешний супершторм был лишь ширмой для сокрытия центральной точки."

    - char: memphis
      side: left
      text:
        - "Буря также создавала помехи для наших приборов, поэтому мы до последнего не могли подтвердить наличие Сингулярности в океане NA..."
        - "Как хитро... Но постойте..."
        - "Погодите-ка... Разве этот супершторм был создан не Сиренами? А Сингулярности ведь открывает «Пепел», верно?"
        - "«Пепел» и Сирены враждуют — так зачем Сиренам помогать им скрывать присутствие Сингулярности?.."

    - char: baltimore
      side: right
      text:
        - "Тут я пас... Кстати, вам не кажется, что воздух вокруг стал каким-то тяжёлым?"

    - char: memphis
      side: left
      text:
        - "Есть немного... Как только сработал сигнал тревоги, в воздухе начали попадаться парящие чёрные кристаллы."
        - "Мисс Навигатор, вы можете провести спектральный анализ?"

    - char: tb_rad
      side: right
      text:
        - "Директива подтверждена, провожу анализ..."
        - "Анализ завершён. Несмотря на иную форму, физические свойства чёрных кристаллов в воздухе идентичны образцам, которые научно-исследовательский отдел использует для расшифровки маяков «Пепла»."
        - "Кристаллы в атмосфере можно расценивать как остаточные следы ожесточённого сражения, которое «Пепел» вёл в этой точке."

    - char: queen_elizabeth
      side: left
      text:
        - "Ожесточённое сражение в таком месте... Хм, надеюсь, в этот раз мне выпадет шанс лично встретиться с кем-нибудь из этих таинственных членов «Пепла»."

    - char: saratoga
      side: right
      text:
        - "Элизабет! Только не говори мне, что ты поменяла планы и навязалась к нам только ради этого!"

    - char: queen_elizabeth
      side: left
      text:
        - "Знаешь ли, вместо того чтобы изучать сухие отчёты и чужие анализы, на некоторые вещи лучше посмотреть самой, а с некоторыми личностями — поговорить с глазу на глаз."
        - "А вот ты, Саратога, не слишком ли много времени в последнее время проводишь за бумажками?"

    - char: saratoga
      side: right
      text:
        - "...Королева, которая целыми днями просиживает в своём замке в тылу и лишь изредка заявляется на передовую, не имеет права читать мне нотации!"

    - char: queen_elizabeth
      side: left
      text:
        - "Хм! Белфаст, отправляйся вперёд и собери несколько образцов. Я заберу их с собой для тщательного анализа!"

    - char: belfast
      side: right
      text:
        - "Слушаюсь."

chapter2:
  rows:

    - char: tb_rad
      side: left
      text:
        - "Предупреждение: в центре шторма зафиксирован мощный энергетический всплеск. Рекомендую флоту немедленно сменить курс для уклонения."

    - char: queen_elizabeth
      side: right
      text:
        - "Белфаст, ты закончила сбор образцов? Нам пора возвращаться."
        - "Белфаст!!!"

    - char: tb_rad
      side: left
      text:
        - "Предупреждение: интенсивность энергетической реакции в центре шторма продолжает расти. Ожидаемое время удара — через десять секунд. 10, 9, 8, 7..."

    - char: baltimore
      side: right
      text:
        - "Плохо дело... Мы не успеем уклониться!!"

    - text:
      - "Даже находясь на борту командного корабля, можно было отчётливо почувствовать, как нарастающая яростная сила затягивает флот вместе с тоннами морской воды прямиком в самое сердце шторма."

    - char: enterprise
      side: left
      text:
        - "Даже на полном ходу не получается вырваться! Командир, берегитесь, нас затягивает!"
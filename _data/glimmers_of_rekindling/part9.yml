chapter1:
  rows:

    - text:
      - "*стук в дверь*"

    - char: belfast
      side: left
      text:
        - "Вы и впрямь здесь — прошу прощения за беспокойство, господин Командир."
        - "Её Величество готовит чаепитие. Не найдётся ли у господина Командира сегодня времени почтить нас своим присутствием?"

    - char: commander
      side: right
      text:
        - "Чаепитие... прямо здесь, на аванпосте?"

    - char: belfast
      side: left
      text:
        - "Именно так. Разумеется, изначально планировалось принять вас в замке на родных островах Королевского флота, но, как говорится, обстоятельства оказались сильнее планов."
        - "Пожалуйста, не судите строго за скромность обстановки. За исключением места проведения, которое мы не вольны выбирать, все этапы подготовки чаепития проходили под личным надзором Её Величества. Она также будет присутствовать лично."

    - char: commander
      side: right
      text:
        - "Без проблем. До встречи на чаепитии."

    - char: belfast
      side: left
      text:
        - "Прекрасно! Я немедленно передам эту новость Её Величеству. Уверена, она будет очень рада."

chapter2:
  rows:

    - char: baltimore
      side: left
      text:
        - "Ого! Сказали — чаепитие, а тут настоящий банкет закатили!"

    - char: memphis
      side: right
      text:
        - "Мало того что чай отменный и сладости изысканные, так они умудрились притащить сюда полный комплект банкетной мебели прямо из королевского замка..."

    - char: saratoga
      side: left
      text:
        - "Хм, интересно, сколько ещё грузов, не имеющих отношения к войне, эта Королева умудрилась втиснуть в поставки на передовую, пользуясь служебным положением?"

    - char: queen_elizabeth
      side: right
      text:
        - "Как грубо, Саратога! Разве я похожа на ту, кто станет разбазаривать общественные ресурсы?"
        - "Всё это было доставлено моим личным флотом. Ну что, завидно?~"

    - char: saratoga
      side: left
      text:
        - "Гр-р-р...!"

    - char: belfast
      side: right
      text:
        - "Мисс Саратога, прошу, ваш чай. Пожалуйста, отбросьте все заботы и наслаждайтесь гостеприимством Её Величества."

    - char: queen_elizabeth
      side: left
      text:
        - "Именно! Не стесняйтесь, угощайтесь вовсю~"

    - char: saratoga
      side: right
      text:
        - "И то верно. Если это поднимет боевой дух, то неважно — чаепитие это или банкет..."
        - "Тогда я не буду скромничать! Мисс Эдинбург, будьте добры, тарелку миндального печенья и тарелку сэндвичей. И ещё чашку чёрного чая для Командира, please~"

    - char: edinburgh
      side: left
      text:
        - "А, да, конечно! Приятного аппетита всем...!"

    - char: commander
      side: right
      text:
        - "Большое спасибо."

    - char: memphis
      side: left
      text:
        - "Как вкусно... Энтерпрайз, ты тоже попробуй! Расслабься, свежая выпечка от Роялов просто тает во рту!"

    - char: belfast
      side: right
      text:
        - "Мисс Энтерпрайз, рекомендую вам эти нежные клюквенные сконы."

    - char: enterprise
      side: left
      text:
        - "Благодарю, тогда я тоже приступлю..."

chapter3:
  rows:

    - text:
      - "Королевское чаепитие невообразимого размаха шло полным ходом..."

    - char: commander
      side: left
      text:
        - "Не ожидал увидеть здесь Саратогу и Мемфис. Так вот о каком «приказе о передислокации» говорила Лонг-Айленд?"

    - char: saratoga
      side: right
      text:
        - "М-м~ именно. Это перемещение связано с развёртыванием сил для предстоящего наступления."

    - char: commander
      side: left
      text:
        - "И каков конкретный план?.. Я должен повести флот обратно на аванпост Союза Орла, чтобы оттуда начать атаку?"

    - char: saratoga
      side: right
      text:
        - "Командир, вы слишком помешаны на работе! Я хотела сказать об этом после чаепития, но раз уж спросили..."
        - "Как только начнётся генеральное наступление, вы примете командование над Королевским флотом и вместе с уже прибывшими силами Союза Орла нанесёте удар прямо отсюда."

    - char: memphis
      side: left
      text:
        - "Нас перевели сюда как раз для того, чтобы помогать вам."

    - char: commander
      side: right
      text:
        - "Вот оно что... Такой план действительно экономит время на переброску туда-обратно. Королевский флот не против?"

    - char: queen_elizabeth
      side: left
      text:
        - "Никаких проблем, более того — всё так и задумывалось с самого начала!"
        - "Если бы не все эти внезапные осложнения, мне бы не пришлось вникать в каждую мелочь лично..."
        - "К счастью, благодаря «внеплановой» вылазке одного человека и Энтерпрайз, дела наконец-то вернулись в нужное русло."
        - "Всю мороки с командованием я передаю тебе. Смотри не разочаруй меня~"

    - char: commander
      side: right
      text:
        - "Уверен, что за тем «внезапным предложением» о разведке стояли в том числе и вы..."

    - char: queen_elizabeth
      side: left
      text:
        - "Кто знает~ В некоторые вещи лучше не вникать слишком глубоко."

    - char: saratoga
      side: right
      text:
        - "Значит, действуем по утверждённому плану. Мы берём всё на себя, а Ваше Величество может со спокойной душой возвращаться в свой дворец~"

    - char: queen_elizabeth
      side: left
      text:
        - "Насчёт этого... Я передумала! Раз уж я всё равно на передовой, то решила вместе с Командиром войти в центральный сектор."

    - char: memphis
      side: right
      text:
        - "Э-э?.. Ваше Величество планирует лично отправиться в самое сердце шторма?!"

    - char: queen_elizabeth
      side: left
      text:
        - "Именно так я и планирую!"
        - "И это никак не связано с доверием или прочей чепухой, просто мне пришло в голову кое-что, что можно прояснить, только оказавшись в центральной зоне."

    - char: saratoga
      side: right
      text:
        - "..Разве ты не можешь поручить такую «мелочь» своему отряду горничных?"
        - "Сейчас критический момент, мы не можем позволить себе лишних потрясений. Оставь передовую нам, а сама поскорее возвращайся в тыл и осуществляй общее руководство оттуда!"

    - char: warspite
      side: left
      text:
        - "Мисс Саратога..."

    - char: queen_elizabeth
      side: right
      text:
        - "Уорспайт, не обращай внимания, она не это имела в виду. Просто простолюдины остаются простолюдинами — даже если я скажу тебе, что это «королевская милость», ты всё равно не поймёшь, верно?"

    - char: saratoga
      side: left
      text:
        - "«Королевская милость», значит... *Пристально смотрит*"

    - char: queen_elizabeth
      side: right
      text:
        - "Са-Саратога! Чем сверлить меня этим пустым взглядом, лучше бы на себя в зеркало посмотрела!"

    - char: saratoga
      side: left
      text:
        - "В зеркало?.. С привезёнными Роялами зеркалами какие-то проблемы и мне нужно их проверить?!"

    - char: queen_elizabeth
      side: right
      text:
        - "Ты...!"

    - text:
      - "Королевское чаепитие продолжалось в «тёплой и дружественной» атмосфере..."

chapter4:
  rows:

    - text:
      - "После завершения чаепития по пути в комнату отдыха я снова встретил Шеффилд."

    - char: sheffield
      side: left
      text:
        - "Снова здравствуйте, господин Командир."

    - char: commander
      side: right
      text:
        - "Совершенно не заметил тебя на чаепитии. Не думал, что ты тоже здесь."

    - char: sheffield
      side: left
      text:
        - "Долг горничной — вовремя уходить в тень, чтобы гости могли в полной мере насладиться приёмом."
        - "Командир, у Её Величества есть слова, которые она просила передать вам наедине..."
        - "«Как по-вашему, чем на самом деле является Пепел?»"

    - char: commander
      side: right
      text:
        - "......"

    - char: sheffield
      side: left
      text:
        - "Не нужно отвечать сию же секунду. Её Величество лишь хочет, чтобы вы поразмышляли над этим вопросом."
        - "Не смею более отнимать ваше время. Надеюсь, вечер прошёл для вас приятно."
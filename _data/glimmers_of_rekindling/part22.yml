chapter1:
  rows:

    - char: memphis
      side: left
      text:
        - "Погодите, впереди столкновение флотов... С одной стороны, похоже, Сирены, а другая сторона на радарах вообще не отображается — должно быть, это «Пепел»."
        - "ТБ, пожалуйста, проанализируй данные маяков «Пепла» поблизости..."

    - char: queen_elizabeth
      side: right
      text:
        - "Как прискорбно, но на вышедшую из строя систему Навигатора сейчас рассчитывать не приходится."

    - char: memphis
      side: left
      text:
        - "Ах, и правда..."

    - char: queen_elizabeth
      side: right
      text:
        - "Белфаст, можешь опознать основные цели?"

    - char: belfast
      side: left
      text:
        - "Без проблем, Ваше Величество. Согласно сопоставлению данных, во флоте впереди находятся пять целей с наивысшим уровнем угрозы."
        - "Трое из них — Арбитры Сирен, двое — члены «Пепла»."

    - char: baltimore
      side: right
      text:
        - "Сразу двое из «Пепла»?! Редко увидишь, чтобы они действовали сообща."

    - char: essex
      side: left
      text:
        - "И в противовес им — сразу три сверхмощных единицы Сирен, именуемых Арбитрами..."

    - char: belfast
      side: right
      text:
        - "Из пяти целей четыре нам уже знакомы. Это Арбитр Сила, Арбитр Умеренность, Арбитр Отшельник и Хирю META."
        - "Оставшаяся неизвестная цель из «Пепла», судя по внешним признакам... с большой вероятностью является Арк Роял."

    - char: queen_elizabeth
      side: left
      text:
        - "О? Так это та самая Арк Роял, что спасла научно-исследовательский флот Союза Орла."
        - "Наконец-то мы встретились."

    - char: essex
      side: right
      text:
        - "Спасла наш флот?.. Погодите, так это была та неопознанная цель, которую мы тогда выслеживали?!"
        - "Но как такое возможно... Почему «Пепел» тогда отображался на наших радарах?.."

    - char: memphis
      side: left
      text:
        - "Прошу прощения, мисс Эссекс... но мне кажется, сейчас не самое подходящее время для подобных раздумий..."
        - "Может, нам стоит затаиться и оценить обстановку, пока они нас не заметили?.."

    - char: hiryuu_meta_rad
      side: right
      status: is-meta
      text:
        - "Хорошая мысль, вот только уже слишком поздно."

chapter2:
  rows:

    - char: hiryuu_meta
      side: right
      status: is-meta
      text:
        - "О, вы как раз вовремя. Я знала, что вы успеете."

    - char: ark_royal_meta
      side: left
      status: is-meta
      text:
        - "Что всё это значит, Хирю? Так вот чем ты занималась всё это время, когда исчезала и действовала в одиночку?.."

    - char: hiryuu_meta
      side: right
      status: is-meta
      text:
        - "У Сирен есть базы, а у нас — нет, поэтому до сих пор мы придерживались тактики молниеносных маневренных ударов."
        - "Но раз уж нам внезапно пришлось ввязаться в позиционную войну, разве не логично проявить капельку смекалки?~"

    - char: ark_royal_meta
      side: left
      status: is-meta
      text:
        - "Такао говорила, что нам стоит по возможности избегать контактов..."

    - char: hiryuu_meta
      side: right
      status: is-meta
      text:
        - "Планы меняются в зависимости от обстоятельств."
        - "Посмотри, как серьёзно настроена та сторона. Как мы вдвоём собрались биться против трёх Арбитров?"

    - char: ark_royal_meta
      side: left
      status: is-meta
      text:
        - "Делай что хочешь..."

    - text:
      - "При виде нашего флота между двумя участницами «Пепла», похоже, возник небольшой спор. Однако мгновение спустя они пришли к согласию. Оставив пререкания, Арк Роял перевела взгляд в сторону командного корабля."

    - char: ark_royal_meta
      side: left
      status: is-meta
      text:
        - "...... Так это ты тот самый Командир, который так заботит Код G?"

chapter3:
  rows:

    - char: commander
      side: right
      text:
        - "......"

    - char: ark_royal_meta
      side: left
      status: is-meta
      text:
        - "Молчишь, значит? Хм."

chapter4:
  rows:

    - char: commander
      side: right
      text:
        - "Приятно познакомиться. Ты ведь Арк Роял из «Пепла»?"

    - char: ark_royal_meta
      side: left
      status: is-meta
      text:
        - "Верно."

chapter5:
  rows:

    - char: ark_royal_meta
      side: left
      status: is-meta
      text:
        - "Значит, вот каков ты на самом деле, Командир."

    - char: queen_elizabeth
      side: right
      text:
        - "Ты... Арк Роял?"

    - char: ark_royal_meta
      side: left
      status: is-meta
      text:
        - "Ваше Вели..."
        - "..... Да. Но не заблуждайся! Для себя я — Арк Роял, но для тебя я могу ею и не быть."
        - "..... На этом всё, я не желаю продолжать этот разговор."

    - char: queen_elizabeth
      side: right
      text:
        - "Что ж, пусть будет так."

    - char: hiryuu_meta
      side: left
      status: is-meta
      text:
        - "Не обращай внимания, она всегда в таком репертуаре. Хотя, пожалуй, для неё это самый правильный выбор..."
        - "Но вернёмся к делу. Понаблюдав за вами какое-то время, я пришла к выводу, что вы не такие уж верные союзники Антиоха."
        - "Раз уж вы притащили сюда столько народу, как насчёт того, чтобы объединиться и немного повоевать вместе?"

    - char: commander
      side: right
      text:
        - "Что вы об этом думаете, девушки?"

    - char: queen_elizabeth
      side: left
      text:
        - "Ха?! Ты же командующий флотом! Сам решай такие мелочи!"

    - char: enterprise
      side: right
      text:
        - "Командир, я не возражаю."

    - char: essex
      side: left
      text:
        - "Я тоже. С одной стороны — неопределённая фракция, с которой можно договориться, с другой — явный враг. В такой ситуации я выбираю приоритетное уничтожение подтверждённого противника."

    - char: saratoga
      side: right
      text:
        - "Именно! В любом случае, Сирены должны быть повержены!"

    - char: memphis
      side: left
      text:
        - "К тому же, это отличный шанс собрать данные о «Пепле» с близкого расстояния."

    - char: hiryuu_meta
      side: right
      status: is-meta
      text:
        - "Эй-эй, вы уверены, что говорить такое прямо при нас — хорошая идея?"

    - char: memphis
      side: left
      text:
        - "Мы и не собирались этого скрывать. Мы уже давно пытаемся наладить с вами диалог!"

    - char: hiryuu_meta
      side: right
      status: is-meta
      text:
        - "Ха, вы и вполовину не такие заслуживающие доверия, какими себя считаете."
        - "Впрочем, время от времени объединяться против Антиоха — это даже весело. А вы что скажете, господа Арбитры на той стороне?"

chapter6:
  rows:

    - char: temperance
      side: left
      status: is-red
      text:
        - "....... Обнаружены незапланированные помехи. Отменить операцию?"

    - char: hermit
      side: right
      status: is-red
      text:
        - "Не стоит. Нам лишь нужно надлежащим образом выполнить задачу в пределах допустимого."

    - char: strength
      side: left
      status: is-red
      text:
        - "Устранить «Пепел». Поддерживать нормальное функционирование испытательного полигона."

    - char: hermit
      side: right
      status: is-red
      text:
        - "Именно~ Устранить «Пепел» или быть устранёнными ими. Давайте сражаться в своё удовольствие, пока чьи-нибудь функции не прекратятся окончательно!"

    - char: commander
      side: left
      text:
        - "Всем подразделениям, внимание! Начинаем совместную операцию с «Пеплом»!"
        - "Цель — Арбитры Сирен. Огонь по готовности!"

chapter7:
  rows:

    - char: hiryuu_meta
      side: left
      status: is-meta
      text:
        - "Не дайте им завершить построение! Уничтожьте Энфорсеров прежде, чем они успеют активировать маскировку!"

    - char: ark_royal_meta
      side: right
      status: is-meta
      text:
        - "Поняла. Эта мелочь на мне..."

chapter8:
  rows:

    - char: temperance
      side: left
      status: is-red
      text:
        - "Своевременная реакция, но бесполезная. Моя тактика принесла плоды ещё до того, как ты начала атаку."

    - char: hermit
      side: right
      status: is-red
      text:
        - "Механизм совместного подавления систем Арбитр IX = XIV, запуск."

chapter9:
  rows:

    - char: hermit
      side: right
      status: is-red
      text:
        - "По неясной причине входящий урон на 7,3% ниже ожидаемого... Любопытно."

    - char: ark_royal_meta
      side: left
      status: is-meta
      text:
        - "Хирю... Моя система вооружения заблокирована, начинаю экстренный ремонт. Прикрой меня!"

    - char: hiryuu_meta
      side: right
      status: is-meta
      text:
        - "Тц, а вот это новый трюк..."

    - char: commander
      side: left
      text:
        - "Ударным группам приготовиться! Подавить врага огнём, выиграть время!"

    - char: warspite
      side: right
      text:
        - "Соединение линкоров ждёт приказа."

    - char: saratoga
      side: left
      text:
        - "Подготовка к авиаудару завершена, давайте зададим им жару~!"

    - char: hiryuu_meta
      side: right
      status: is-meta
      text:
        - "О? Давненько я не видела совместной атаки такого масштаба. Я даже вошла в азарт, считайте и меня тоже!"

chapter10:
  rows:

    - char: essex
      side: left
      text:
        - "Огневая мощь «Пепла»... это просто безумие... Вся наша авиация в сумме не может сравниться с одной Хирю META..."

    - char: memphis
      side: right
      text:
        - "Зато наши показатели близки к мощи Арк Роял из «Пепла»!"
        - "Похоже, боевой потенциал членов «Пепла» сильно разнится. Не все они обладают аномально высокой силой."
        - "Хе-хе, запишем ещё один пункт в данные разведки~"

    - char: essex
      side: left
      text:
        - "Только вот в данной ситуации даже не знаю, считать ли эту новость хорошей или плохой..."
        - "Бездонная мощь Арбитров внушает настоящий ужас... Неудивительно, что даже «Пепел» относится к ним с такой опаской."

chapter11:
  rows:

    - char: hermit
      side: right
      status: is-red
      text:
        - "Экспериментальный флот демонстрирует боевую эффективность выше прогнозируемых значений. Крайне интересный феномен."

    - char: strength
      side: left
      status: is-red
      text:
        - "Разве параметры не были скорректированы после предыдущего столкновения?"

    - char: hermit
      side: right
      status: is-red
      text:
        - "Были. И всё равно возникла погрешность — разве это не забавно?"
        - "Сила, измени конфигурацию гравитационного поля."

    - char: strength
      side: left
      status: is-red
      text:
        - "Поняла."

    - char: hermit
      side: right
      status: is-red
      text:
        - "Механизм совместного подавления систем Арбитр IX = VIII, запуск."

chapter12:
  rows:

    - char: ark_royal_meta
      side: left
      status: is-meta
      text:
        - "Плохо дело, так продолжаться не может... Когда Арбитры действуют сообща, сложность боя возрастает не в три раза!"

chapter13:
  rows:

    - char: commander
      side: right
      text:
        - "Не сдаваться!"

chapter14:
  rows:

    - char: commander
      side: right
      text:
        - "Продолжать бой!"

chapter15:
  rows:

    - char: hiryuu_meta
      side: left
      status: is-meta
      text:
        - "А ты на удивление спокоен."

    - char: commander
      side: right
      text:
        - "Опасных сражений было пройдено немало... Чем критичнее ситуация, тем меньше поводов сдаваться. Надежда есть, пока мы продолжаем сражаться."
        - "Смена построения! Кораблям с серьезными повреждениями отойти на вторую линию. Вестал, настал решающий момент боя — не сдерживайся, приложи все силы для ремонта союзников!"

    - char: vestal
      side: left
      text:
        - "Предоставь это мне! Пока существует флот снабжения, я не позволю ни одному товарищу пасть!"

    - char: queen_elizabeth
      side: right
      text:
        - "Королевский флот, прикрыть позиции!"

    - char: belfast
      side: left
      text:
        - "Слушаюсь. Ваше Величество, пожалуйста, отступите назад."

    - char: essex
      side: right
      text:
        - "Энтерпрайз, ваша полетная палуба... Пожалуйста, отправляйтесь на экстренное обслуживание, а мы пока возьмем это на себя!"

    - char: enterprise
      side: left
      text:
        - "Хорошо, я не буду заставлять себя... Рассчитываю на вас."

    - char: ark_royal_meta
      side: right
      status: is-meta
      text:
        - "..."

    - char: commander
      side: left
      text:
        - "Вам тоже стоит отойти и провести обслуживание и перезарядку."

    - char: ark_royal_meta
      side: right
      status: is-meta
      text:
        - "Приказываешь нам отступить? Ты самонадеян сверх меры."
        - "С вашей разницей в силе по сравнению с Арбитрами, стоит нам прекратить атаку, и вас уничтожат в мгновение ока."

    - char: hiryuu_meta
      side: left
      status: is-meta
      text:
        - "Именно~ Не волнуйся, мы еще не в том положении, чтобы ты за нас переживал."
        - "Впрочем... немного увеличить дистанцию, подстроить ритм наступления и заодно пополнить припасы звучит неплохо?"

    - char: ark_royal_meta
      side: right
      status: is-meta
      text:
        - "Хирю?.."

    - char: hiryuu_meta
      side: left
      status: is-meta
      text:
        - "Ха-ха-ха! Давненько я не наслаждалась взаимодействием в составе большого флота, уже и подзабыла о существовании таких тактических решений."

    - char: commander
      side: right
      text:
        - "В этом бою вы можете свободно пользоваться ресурсами нашего тылового обеспечения. Продолжаем бой!"

chapter16:
  rows:

    - char: hermit
      side: left
      status: is-red
      text:
        - "XIV, немедленно подавить ремонтный флот подопытных. VIII, сменить построение. Не давайте «Пеплу» передышки."

    - char: strength
      side: right
      status: is-red
      text:
        - "Поняла. Механизм совместного подавления IX=VIII переключается на VIII=IX. Фокусируюсь на ограничении мобильности."

    - char: temperance
      side: left
      status: is-red
      text:
        - "Механизм совместного подавления VIII=XIV, запуск. Использовать полевой ремонт для жульничества — это нехорошо."

chapter17:
  rows:

    - char: commander
      side: left
      text:
        - "Как там ремонтный флот?!"

    - char: memphis
      side: right
      text:
        - "«Пепел» вовремя принял контрмеры, так что они едва-едва, но держатся."
        - "Однако нам теперь... придётся какое-то время в одиночку сдерживать натиск Силы."

    - char: saratoga
      side: left
      text:
        - "Запредельная огневая мощь и защита, да ещё и это гравитационное поле, которое постоянно искажает акваторию... Командир, затягивать этот бой очень опасно."

    - char: commander
      side: right
      text:
        - "Нужно как можно скорее найти способ переломить ситуацию."

    - char: u47_rad?
      side: left
      status: is-yellow
      text:
        - "Флот Лазурного пути... Под водой помех гораздо меньше, возможно, удар отсюда будет эффективен."

    - char: saratoga
      side: right
      text:
        - "Ты... подлодка Железной Крови?!"

    - char: u47_rad
      side: left
      status: is-yellow
      text:
        - "Да. Подводная лодка Железной Крови типа VIIB, U-47."

    - char: saratoga
      side: right
      text:
        - "Как подлодка Железной Крови могла здесь оказаться?"

    - char: u47_rad
      side: left
      status: is-yellow
      text:
        - "Во время выполнения разведывательной миссии меня затянуло сюда внезапным неопознанным импульсом."
        - "Придя к выводу, что я не смогу выбраться, не устранив врага, я решила сама выйти с вами на связь..."

    - char: memphis
      side: right
      text:
        - "Сама Сингулярность находится в самом центре центральной зоны. Если это была обычная разведка, её бы ни за что не затянуло."
        - "Она явно что-то недоговаривает... Что будем делать, Командир?"

    - char: commander
      side: left
      text:
        - "Есть сомнения, но..."
        - "Соглашение о прекращении огня было подписано именно для борьбы с угрозой Сирен. Верю, что Железная Кровь не станет нарушать договор в такой момент."

    - char: u47_rad
      side: right
      status: is-yellow
      text:
        - "Рациональный выбор, Командир."
        - "К полному залпу готова. Арбитры, Auf Wiedersehen..."

chapter18:
  rows:

    - char: strength
      side: left
      status: is-red
      text:
        - "Атака эффективна, но бессмысленна. Модуль ремонта, запуск..."

    - char: essex
      side: right
      text:
        - "Что?! Повреждения, которые мы с таким трудом нанесли Сиренам, восстанавливаются с огромной скоростью!"

    - char: shangri_la
      side: left
      text:
        - "Не только Сила — у двух других Арбитров тоже запущен процесс регенерации, видимый невооружённым глазом."

    - char: essex
      side: right
      text:
        - "То есть... у каждой из них есть собственная система ремонта?! Это же нарушение всех правил!"

    - char: strength
      side: left
      status: is-red
      text:
        - "Вам можно чиниться десятки и сотни раз, а наш разовый ремонт вы называете нарушением правил?"
        - "Что такое? Куда делись ваши недавняя уверенность и пыл? Продолжим бой."

    - char: commander
      side: right
      text:
        - "Плохо дело, флот уже практически на пределе..."
        - "Хирю, у вас есть план отступления?"

    - char: hiryuu_meta
      side: left
      status: is-meta
      text:
        - "План? Само собой, его нет."
        - "Наша задача — удерживать эту позицию и устранить врагов внутри Сингулярности. Мы не отступим, пока миссия не будет выполнена."

    - char: memphis
      side: right
      text:
        - "Ага! Значит, эту Сингулярность всё-таки открыли вы!"

    - char: hiryuu_meta
      side: left
      status: is-meta
      text:
        - "О? А вы что, до этого момента не знали?"

    - char: memphis
      side: right
      text:
        - "Это было лишь предположением, не думала, что получу чистосердечное признание от самого виновника!"
        - "Просто взять и открыть Сингулярность, перевернув весь океан NA вверх дном... Ну вы и даёте."
        - "Какова ваша цель?"

    - char: hiryuu_meta
      side: left
      status: is-meta
      text:
        - "Вас это не касается... хотя я бы хотела так сказать."
        - "Пожалуй, к вам это всё же имеет некоторое отношение..."

    - char: ark_royal_meta
      side: right
      status: is-meta
      text:
        - "Хирю!"

    - char: hiryuu_meta
      side: left
      status: is-meta
      text:
        - "Я понимаю, больше ни слова."
        - "Эй! Командир, у меня есть к тебе предложение."
        - "Цель Арбитров — мы. Те, кто должен удерживать этот рубеж, — тоже мы. Что же касается вас..."
        - "У вас всё ещё есть выбор: бросить нас и отступить самостоятельно."
        - "Ну как? Если решишь уйти, я не стану бить в спину."

    - char: commander
      side: right
      text:
        - "Отказываюсь"

    - char: hiryuu_meta
      side: left
      status: is-meta
      text:
        - "О? Отказался? А ведь я считала это весьма заманчивым предложением."

    - char: commander
      side: right
      text:
        - "Даже если мы формально не союзники, совместное противостояние Сиренам — это уже свершившийся факт. Как мы можем бросить вас в такой момент?"

    - char: hiryuu_meta
      side: left
      status: is-meta
      text:
        - "Я же говорю, мы еще не в том положении, чтобы ты за нас переживал...."
        - "Впрочем, я ценю твой порыв. Спасибо~"
        - "Арк Роял, что думаешь?"

    - char: ark_royal_meta
      side: right
      status: is-meta
      text:
        - "...... Не ожидала получить столь нерациональный ответ."
        - "Похоже, Командир отличается от тех расчетливых Сирен и способен принимать неожиданные решения в критические моменты."

    - char: commander
      side: left
      text:
        - "Вот только... наше присутствие здесь не остановит ухудшение ситуации. Надеюсь, ваша стойкость оправдана ожиданием подкрепления."

    - char: hiryuu_meta
      side: right
      status: is-meta
      text:
        - "Подкрепления, значит... "

    - char: commander
      side: left
      text:
        - "Например, ваши Энтерпрайз или Такао?"

    - char: hiryuu_meta
      side: right
      status: is-meta
      text:
        - "Они сейчас в отъезде по делам, дома их нет, и дата возвращения неизвестна. Вот почему нам приходится так отчаянно сторожить порог!"

    - char: commander
      side: left
      text:
        - "......"

    - char: hiryuu_meta
      side: right
      status: is-meta
      text:
        - "Но, конечно, нельзя сказать, что у нас совсем нет козыря в рукаве..."
        - "Хм... Решено! Арк Роял, обеспечь мне прикрытие изо всех сил, я готовлю атаку с перегрузкой!"

    - char: ark_royal_meta
      side: left
      status: is-meta
      text:
        - "Хирю, ты серьезно...?!"

    - char: hiryuu_meta
      side: right
      status: is-meta
      text:
        - "Вполне."
        - "(Надеюсь, расчет Энтерпрайз был верным...)"
        - "...Антиох, а ну-ка отведайте вот это!"

    - char: strength
      side: left
      status: is-red
      text:
        - "Тц............ Сохранила боеспособность такого уровня?"

    - char: temperance
      side: right
      status: is-red
      text:
        - "Данное состояние — предельное выжимание ресурсов, подобное перегрузке. Его невозможно поддерживать долго."
        - "VIII, отойди в тыл для восстановления, здесь справлюсь я. У них нет шансов на победу."

    - char: strength
      side: left
      status: is-red
      text:
        - "Погоди, энергетическая реакция цели продолжает расти. Что она задумала?"

    - char: hermit
      side: right
      status: is-red
      text:
        - "Она хочет спровоцировать взрыв... Мощный взрыв, который разнесет на куски и нас, и все окружающие «экспериментальные материалы»."

    - char: temperance
      side: left
      status: is-red
      text:
        - "Начинаю перерасчет — хм, неважно."
        - "Выдержать взрыв такого масштаба внутри Сингулярности... Даже мы получим некоторые повреждения. Однако тот, кто вызвал взрыв, пострадает куда сильнее — по крайней мере, на этом Хирю META придет конец."
        - "Когда взрыв утихнет, мы всё равно будем способны разобраться с остатками."

    - char: hermit
      side: right
      status: is-red
      text:
        - "Но те «экспериментальные материалы» не переживут подобного удара."

    - char: temperance
      side: left
      status: is-red
      text:
        - "Верно. Скорее всего, они будут полностью испарены в течение одной-трех тысячных долей секунды."

    - char: hermit
      side: right
      status: is-red
      text:
        - "Как вы думаете, почему Зеро так дорожит этим местом, что специально приказала нам избегать чрезмерного вмешательства в судьбу других участников испытательного полигона?"

    - char: strength
      side: left
      status: is-red
      text:
        - "Без понятия, и мне не интересно."

    - char: temperance
      side: right
      status: is-red
      text:
        - "Ха... Какова бы ни была причина, взрыв, вызванный Хирю, нанесет этому месту непоправимый разрушительный урон, и наша победа потеряет смысл."
        - "Я наблюдала за ней, пока она кружила снаружи вихря... Значит, она всё рассчитала и специально затянула сюда эти «материалы»."

    - char: strength
      side: left
      status: is-red
      text:
        - "Мы кромсаем друг друга столько времени... Если бы не этот особый приказ Зеро, когда это мы вообще знали пощаду?"

    - char: hermit
      side: right
      status: is-red
      text:
        - "Будем считать, что им повезло. Не ожидала, что им удастся успешно помешать нашей операции..."
        - "На этот раз закончим на этом, отступаем. XIV, обеспечь прикрытие."

    - char: temperance
      side: left
      status: is-red
      text:
        - "Тц... Есть. Приказ выполняется."

chapter19:
  rows:

    - text:
      - "Сначала всё поле зрения заполнило сияние, но... ожидаемого взрыва и ударной волны не последовало. В этом свете, казалось, растворились все звуки..."
      - "Спустя мгновение сияние рассеялось, оставив перед глазами лишь пустое море. Арбитры и ведомая ими огромная армия Инфорсеров бесследно исчезли."

chapter20:
  rows:

    - char: warspite
      side: left
      text:
        - "Мы... победили? Но почему?.."

    - char: essex
      side: right
      text:
        - "Неужели Арбитры устрашились мощи той атаки и предпочли отступить по собственной воле?.."

    - char: saratoga
      side: left
      text:
        - "Это было на волосок от гибели... Прошлый удар был просто невероятным, казалось, даже воздух сейчас сдетонирует!"

    - char: commander
      side: right
      text:
        - "Хирю, ты в порядке?"

    - char: hiryuu_meta
      side: left
      status: is-meta
      text:
        - "В порядке, в порядке! Хорошо, что сработала функция экстренного торможения..."
        - "...Такие повреждения для нас — обычное дело, просто потребуется время на ремонт."

    - char: ark_royal_meta
      side: right
      status: is-meta
      text:
        - "Не думала, что твой безрассудный план действительно сработает..."

    - char: hiryuu_meta
      side: left
      status: is-meta
      text:
        - "Я и сама в шоке!"
        - "Ха-ха-ха! Такое чувство, что пока мы здесь, хорошие события будут сыпаться одно за другим~"

    - char: saratoga
      side: right
      text:
        - "Ах... Командир, подлодка Железной Крови тоже исчезла!"

    - char: baltimore
      side: left
      text:
        - "Ускользнула, пока всё внимание было приковано к Арбитрам? Как обычно, действует скрытно."

    - char: memphis
      side: right
      text:
        - "Прошу прощения, Командир! Я немедленно начинаю поисковую операцию!"

    - char: commander
      side: left
      text:
        - "Не стоит. Она нам здорово помогла и не предпринимала враждебных действий в нарушение договора. Пусть идет."

    - char: hiryuu_meta
      side: right
      status: is-meta
      text:
        - "Командир, нам тоже пора прощаться. Арбитры отступили, и на этом наше временное сотрудничество завершено."
        - "Если хотите покинуть Сингулярность, возвращайтесь тем же путем, каким пришли. Я открою для вас проход."

    - char: ark_royal_meta
      side: left
      status: is-meta
      text:
        - "У нас есть другие дела. Честь имею."

    - text:
      - "Арк Роял по-прежнему сохраняла холодность и ушла не оборачиваясь. Однако Хирю..."

    - char: commander
      side: left
      text:
        - "Ты не уходишь?"

    - char: hiryuu_meta
      side: right
      status: is-meta
      text:
        - "Я вообще-то сейчас раненая, а раненые передвигаются медленно, понимаешь? Или что... бой окончен, и ты меня прогоняешь?"

    - char: commander
      side: left
      text:
        - "Я вовсе не это имел в виду..."

    - char: hiryuu_meta
      side: right
      status: is-meta
      text:
        - "Ха-ха, да я просто к слову. Хотя время, место и личности не совпадают, ты действительно вызываешь какое-то чувство дежавю... Удивительно."
        - "Надеюсь, при следующей встрече мы не окажемся по разные стороны баррикад. Еще увидимся~"

    - char: commander
      side: left
      text:
        - "Погоди, ты ведь обещала..."

    - char: hiryuu_meta
      side: right
      status: is-meta
      text:
        - "Эх... Ну и память у тебя. Ты о том, что я отвечу на один твой вопрос?.."
        - ".. Что ж, уговор есть уговор, я держу свое слово."
        - "Вот только... сейчас явно не та обстановка, чтобы можно было сесть и спокойно поболтать..."

    - text:
      - "Пока Хирю непринужденно это говорила, она внезапно покачнулась и прижалась ко мне, словно не удержав равновесие."

    - char: saratoga
      side: left
      text:
        - "Эй!! Ты это что сейчас вытворяешь?!!!!!"

    - text:
      - "Я почувствовал, как она что-то сунула мне в карман куртки."

    - char: hiryuu_meta
      side: left
      status: is-meta
      text:
        - "Ой, пардон, пардон. Рана внезапно разболелась, ноги подкосились."

    - char: memphis
      side: right
      text:
        - "Она сделала это намеренно, без сомнений............ Пожалуйста, потрудитесь объяснить смысл вашей выходки."

    - char: hiryuu_meta
      side: left
      status: is-meta
      text:
        - "Ох, страсти-то какие. Аж температура воздуха упала~"
        - "(В общем, на этом всё, свяжемся позже.)"
        - "(Пусть это останется нашим секретом. Я знаю твой код связи и координаты твоего порта, так что соблюдай строжайшую секретность, ладно?)"
        - "Приятно, очень приятно~ Сотрудничество вышло на славу. Я ухожу, а вы тут располагайтесь как знаете~"

    - char: saratoga
      side: right
      text:
        - "А, просто взяла и ушла, наговорив всякого!"
        - "Эй!"

chapter21:
  rows:

    - text:
      - "......"

chapter1:
  rows:

    - char: enterprise
      side: left
      text:
        - "Хирю из «Пепла» продолжает маневрировать на самой границе радиуса нашего обстрела. Она не переходит в решительное наступление, но и не прекращает огонь."

    - char: birmingham
      side: right
      text:
        - "Она поддерживает ровно тот уровень давления, который ей нужен..."
        - "Командир, своими действиями она корректирует наш курс. Флот всё ближе и ближе к центральному сектору."

    - char: reno
      side: left
      text:
        - "Какой в этом смысл?.."
        - "Если мы подойдем слишком близко, Сирены атакуют и её тоже. Ей же самой придется сражаться на два фронта."

    - char: baltimore
      side: right
      text:
        - "Возможно, для неё нет разницы — один фронт или два. Главное — затащить нас туда?.."

    - text:
      - "БАБАХ!!!"
      - "Вдалеке внезапно раздалось несколько громоподобных взрывов."

    - char: baltimore
      side: right
      text:
        - "Эта девица... Она только что в открытую атаковала крепость Сирен!!!"

    - text:
      - "И Сирены ответили мгновенно. Сквозь пелену шторма бесчисленные оборонительные орудия открыли яростный ответный огонь по Хирю META."

    - char: baltimore
      side: right
      text:
        - "Подобные плавучие крепости мы раньше видели лишь изредка внутри Зеркальных морей. Но такой запредельный масштаб — это впервые."

    - char: birmingham
      side: left
      text:
        - "Похоже, именно так и должна выглядеть настоящая оборона центрального сектора Сирен..."
        - "Теперь можно с уверенностью сказать: основные силы Сирен, которые скрывались всё это время, уже давно переброшены в центр."

    - char: reno
      side: right
      text:
        - "У меня и раньше было такое чувство... Сирены действительно мастера ведения боя в экстремальных погодных условиях."
        - "В здравом уме никто не пошлёт флот сквозь бушующий шторм, не говоря уже о размещении там оборонительных сооружений..."
        - "Но Сирены обернули это в свою пользу, превратив саму бурю в часть своей системы обороны."

    - char: hiryuu_meta_rad
      side: left
      text:
        - "Йо! Вы ведь собирались провести разведку? Считайте те залпы моим небольшим подарком~"
        - "Ну как, впечатляет?"

    - char: reno
      side: right
      text:
        - ".....Ты только всё усложняешь! У нас нет лишних сил, чтобы сражаться с тобой и одновременно отбиваться от Сирен!"

    - char: hiryuu_meta_rad
      side: left
      text:
        - "Нет сил, значит... Даже если я и почувствовала что-то знакомое, в конце концов, это лишь мимолётный мираж."
        - "Плохо дело... Кажется, я невольно слишком увлеклась."

    - char: reno
      side: right
      text:
        - "Хватит говорить загадками!"

    - char: hiryuu_meta_rad
      side: left
      text:
        - "......Наскучило. На сегодня закончим, до встречи."

    - char: baltimore
      side: right
      text:
        - "Эй! Сама навязала бой, сама же бросаешь его на середине — не слишком ли это самовольно?!"

    - char: hiryuu_meta_rad
      side: left
      text:
        - "Хм! Если собираетесь и дальше иметь дело с «Пеплом», лучше поскорее привыкайте к такому стилю общения."

    - char: birmingham
      side: right
      text:
        - "Палубная авиация Хирю META прекратила атаку... Она действительно ни во что нас не ставит."

    - char: enterprise
      side: left
      text:
        - "Бирмингем, сохраняй спокойствие. Любая крупица информации о неизвестном противнике идёт нам на пользу."
        - "Если она друг — когда представится случай, мы выскажем ей свои претензии. Если же враг — то её чрезмерное пренебрежение к нам станет причиной их поражения."

    - char: baltimore
      side: right
      text:
        - "Командир, флот Сирен тоже движется в нашу сторону! С таким масштабом сил нам сейчас не совладать!"

    - char: commander
      side: left
      text:
        - "Разведки в таком объёме уже достаточно."

    - char: enterprise
      side: right
      text:
        - "Согласна. Реальный масштаб флотилий Сирен и их плавучих крепостей оказался куда внушительнее, чем мы предполагали по отчётам."
        - "Уверена, этих новых данных хватит, чтобы штаб наконец почувствовал остроту ситуации."
        - "Сейчас вовсе не время праздновать «неминуемую победу»... Если Сирены перейдут в контратаку, именно мы, с нашими растянутыми линиями фронта, окажемся в самом уязвимом положении."

    - char: commander
      side: left
      text:
        - "Мисс Навигатор, немедленно свяжитесь с ближайшим аванпостом для прикрытия. Мы отступаем."
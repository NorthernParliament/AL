chapter1:
  rows:

    - text:
      - "Дело дрянь... Отчёты о нападениях Сирен приходят всё чаще."
      - "Наступление на центральный сектор затягивается, и даже Сирены, какими бы медлительными они ни были, уже должны были это осознать."
      - "Что бы ни случилось, сегодня на совещании я обязан добиться окончательного утверждения плана атаки!"
      - "С этой решимостью я уже собирался выйти из каюты, как вдруг в дверь постучали..."

    - char: commander
      side: left
      text:
        - "Войдите."

    - char: enterprise
      side: right
      text:
        - "Прошу прощения за вторжение, Командир."

    - char: commander
      side: left
      text:
        - "А, Энтерпрайз. Ты тоже участвуешь в сегодняшнем совещании?"

    - char: enterprise
      side: right
      text:
        - "Изначально такие планы были, но... Командир, давайте вместе отправимся на разведку центральной зоны."

    - char: commander
      side: left
      text:
        - "Хорошо, дай мне только собрать документы... Ха? Разведка центральной зоны?!"

    - char: enterprise
      side: right
      text:
        - "Без тщательного сбора разведданных наше будущее наступление не сможет развиваться гладко."

    - char: commander
      side: left
      text:
        - "Но ведь целью сегодняшнего собрания как раз и является определение сроков этого наступления... Что будет с совещанием, если мы уйдём?"

    - char: enterprise
      side: right
      text:
        - "Насчёт этого Куин Элизабет сказала, что берёт всё на себя. Вам не о чем беспокоиться."

    - char: commander
      side: left
      text:
        - "«Берёт на себя» — это значит..."

    - char: enterprise
      side: right
      text:
        - "Командир, даже если сегодняшнее совещание пройдёт по графику, можете ли вы гарантировать, что результат будет достигнут до конца дня?"

    - char: commander
      side: left
      text:
        - "Я приложу все усилия, но..."

    - char: enterprise
      side: right
      text:
        - "Время не ждёт. Чем колебаться и топтаться на месте, лучше решительно выступить и выйти из этого тупика."
        - "Операции на передовой входят в сферу вашей ответственности, так что с точки зрения протокола здесь нет никаких нарушений."

    - char: commander
      side: left
      text:
        - "...И то верно. Тогда так и поступим. Мы засиделись без дела слишком долго, пора бы и размяться."

    - char: enterprise
      side: right
      text:
        - "Ха-ха, я знала, что вы согласитесь на этот вариант. Встретимся в порту."

    - text:
      - "Решительный шаг, способный разорвать этот замкнутый круг, был сделан столь внезапно и стремительно..."
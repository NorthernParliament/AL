chapter1:
  rows:

    - text:
      - "Сегодня на аванпосте вновь было спокойно, словно в стоячей воде."
      - "Прошло уже десять дней, а генеральное наступление так и не началось."
      - "Я пролистал расписание на завтра — сверху донизу оно было заполнено лишь одним словом: «совещание»."
      - "Флот уже давно в сборе, но план атаки никак не могут утвердить... Плохой знак, когда стрела уже на тетиве, но выстрел всё откладывается."
      - "Впрочем, нельзя винить один лишь штаб в излишнем бюрократизме..."

chapter2:
  rows:

    - text:
      - "Аванпост Союза Орла. Десять дней назад."

    - char: communicator
      side: left
      text:
        - "*Звук сигнала по коммуникатору*"

    - text:
      - "Это был... сигнал тревоги?"

    - char: enterprise
      side: left
      text:
        - "Прошу прощения, что беспокою поздно ночью. Командир, вы ещё не спите?"

    - char: commander
      side: right
      text:
        - "Собирался доработать детали наступления и лечь... Мы не можем вечно тянуть с утверждением плана. Что-то случилось?"

    - char: enterprise
      side: left
      text:
        - "Да. В центре воронки в самом сердце океана зафиксированы аномальные явления."
        - "Вот разведданные, которые только что поступили с передовой. Прошу, ознакомьтесь."

    - char: commander
      side: right
      text:
        - "...Огромная группа крепостей появилась на самой кромке шторма. Центральная зона, которую мы считали просто погодной аномалией, превратилась в гибрид бури и фортификаций?.."

    - char: enterprise
      side: left
      text:
        - "Как только мы подтвердили это, я хотела продолжить разведку, но наши самолёты были мгновенно уничтожены плотным огнём крепостных орудий."

    - char: commander
      side: right
      text:
        - "У Сирен, помимо их основной флотилии, которая всё это время избегала боя, оказались оборонительные сооружения такого масштаба... Это уже..."

    - char: enterprise
      side: left
      text:
        - "Да. Новые обстоятельства превзошли все наши ожидания."

    - char: commander
      side: right
      text:
        - "Есть признаки начала атаки с их стороны?"

    - char: enterprise
      side: left
      text:
        - "Пока нет. Но на всякий случай я повысила уровень боевой готовности базы, флот сейчас экстренно мобилизуется."

    - char: commander
      side: right
      text:
        - "Хорошо, выдвигаемся в штаб. Появление крепостей в центральном секторе не может быть бессмысленным, нам нужно подготовиться как можно скорее."

    - char: enterprise
      side: left
      text:
        - "Эм... Командир, из штаба пришло уведомление. Через полчаса назначено экстренное совещание, ваше присутствие обязательно."
        - "На самом деле, я изначально шла сообщить именно об этом..."

    - char: commander
      side: right
      text:
        - "А... ну конечно. После такого происшествия штабу необходимо скоординировать все системы для ответных действий... Пока идёт совещание, поручаю оборону базы и сбор информации вам."

    - char: enterprise
      side: left
      text:
        - "Поняла, я немедленно выхожу в море для командования. Вам тоже стоит поторопиться в конференц-зал."

    - char: commander
      side: right
      text:
        - "Эх... Похоже, все наши предыдущие планы можно просто выбросить в корзину..."

chapter3:
  rows:

    - text:
      - "Я ожидал, что споров не избежать, но это бесконечное и запутанное совещание превзошло все границы..."
      - "Под давлением новостей о центральной крепости радикалы, желающие прорвать оборону одним махом, схлестнулись с консерваторами, предлагающими окружить Сирен и продвигаться постепенно."
      - "Появились даже реформаторы, которые требовали отозвать основные силы флота для «научно-исследовательских миссий» и глубокого изучения Сирен..."
      - "Кажется, за долгими дискуссиями суть вопроса окончательно потерялась. Остаётся лишь надеяться, что завтра мы придём хоть к какому-то дельному выводу..."
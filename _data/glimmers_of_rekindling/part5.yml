chapter1:
  rows:

    - char: tb_rad
      side: left
      text:
        - "Получен сигнал с аванпоста. Устанавливаю соединение..."

    - char: memphis_rad
      side: right
      text:
        - "Командир, я обнаружила следы присутствия маяка «Пепла» в ближайших водах. Возможно, за вами следят, будьте осторожны."

    - char: commander
      side: left
      text:
        - "«Пепел», значит... Принято. Совещание в штабе уже закончилось? Возникли какие-то проблемы?"

    - char: memphis_rad
      side: right
      text:
        - "Не беспокойтесь, штаб полностью поддерживает ваши оперативные действия. Желаю удачи, берегите себя. Конец связи."

    - char: tb_rad
      side: left
      text:
        - "Директива подтверждена: принимаю данные о маяке «Пепла»."
        - "Анализ завершен. Отображаю зону локации маяка в системе GM. Основываясь на характеристиках сигнала, предполагаемая цель — Хирю META."

    - char: baltimore
      side: right
      text:
        - "С тех пор как мы разработали метод триангуляции маяков, у нас наконец-то появились средства противодействия этим неуловимым гостям из «Пепла»!"

    - char: birmingham
      side: left
      text:
        - "Жаль только, что точность всё ещё хромает. Из-за огромных размеров пеленгатор нельзя взять с собой, так что отслеживание в реальном времени пока невозможно."

    - char: reno
      side: right
      text:
        - "Ну, научный отдел вовсю работает над тем, чтобы сделать их компактными..."

    - char: baltimore
      side: left
      text:
        - "Вот бы создать портативный радар для «Пепла»! Лишившись преимущества в скрытности, им придётся встречаться с нами лицом к лицу."

    - char: enterprise
      side: right
      text:
        - "Это немного странно... Мы можем засечь их сигнал только при условии, что в этом районе ведётся бой определённой интенсивности."
        - "Мы уже несколько раз засекали Хирю из «Пепла» подобным образом, и она должна была это заметить."
        - "Тем не менее, она так легко выдала своё местоположение совсем рядом с нами..."

    - char: baltimore
      side: left
      text:
        - "Думаешь, она специально обнаружила себя, чтобы заманить нас?"

    - char: birmingham
      side: right
      text:
        - "У меня то же предчувствие... Каковы будут приказания?"

    - char: enterprise
      side: left
      text:
        - "Раз она сама ведет нас к себе, то даже если мы сейчас проигнорируем этот намек, велика вероятность, что позже она навяжет нам бой на своих условиях."
        - "Чем гадать, где скрывается враг, лучше прощупать её намерения сейчас, когда мы оба видим друг друга."

    - char: commander
      side: right
      text:
        - "Согласен. Но если получится решить вопрос словами — постарайтесь не доводить до боя."
        - "Разумеется... В качестве страховки, мисс Навигатор, передайте приказ авианосной группе на аванпосте: поднять самолёты в воздух и держать их в режиме ожидания. Будьте готовы нанести авиаудар по команде."

    - char: tb_rad
      side: left
      text:
        - "Директива подтверждена. Отправляю приказ на аванпост."

    - char: commander
      side: right
      text:
        - "Флот, приготовиться. Пойдём и выясним, в чём дело."
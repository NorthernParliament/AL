chapter1:
  rows:

    - char: hood_rad
      side: left
      text:
        - "Командир, Ваше Величество, флотилии и объекты Сирен в прилегающих секторах полностью зачищены."

    - char: formidable_rad
      side: right
      text:
        - "Авиагруппы Сирен пытались оказать хоть какое-то сопротивление, но под ударами наших воздушных сил они продержались ничуть не дольше, чем их корабли."

    - char: eagle_rad
      side: left
      text:
        - "В конце концов, слабость взлётных платформ в том и заключается — стоит уничтожить саму платформу, и взлетать станет некому~"

    - char: perseus_rad
      side: right
      text:
        - "Мы продолжаем движение к следующему сектору. Желаем всем удачи в бою."

    - char: saratoga
      side: left
      text:
        - "Только в такие моменты по-настоящему осознаёшь, насколько же чудовищны масштабы флота этого генерального наступления..."

    - char: memphis
      side: right
      text:
        - "Это точно... Мы ещё толком не вступили в дело, а враги поблизости уже практически закончились."

    - char: baltimore
      side: left
      text:
        - "Чувствуется невероятный подъем, мы идем напролом!"

    - char: commander
      side: right
      text:
        - "Это были Игл и Персей?.. Королевский флот перебросил сюда даже силы с арктических маршрутов?"

    - char: queen_elizabeth
      side: left
      text:
        - "Твоя зоркость и реакция достойны похвалы! Именно так~ это я их вызвала!"

    - char: warspite
      side: right
      text:
        - "Северный Парламент на время проведения крупномасштабной операции придерживается тактики уверенной обороны, да и в океане NA им удалось достичь успешного соглашения о прекращении огня с Багровой Осью."
        - "Кратковременный отзыв кораблей с арктических маршрутов не повлияет на общую ситуацию в полярных широтах — таково было решение Её Величества."
        - "Сейчас решающий момент операции. Королевский флот соберет все свои силы, чтобы одним махом покончить с угрозой Сирен в океане NA!"
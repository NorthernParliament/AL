chapter1:
  rows:

    - char: enterprise_meta_d
      side: left
      status: is-meta
      text:
        - "Ну, как ощущения?"

    - char: ark_royal_meta
      side: right
      status: is-meta
      text:
        - "Какое-то знакомое и в то же время отвратительное чувство..."

    - char: hiryuu_meta
      side: left
      status: is-meta
      text:
        - "Ах, точно, ты ведь впервые на испытательном полигоне, достигшем этой стадии."

    - char: ark_royal_meta
      side: right
      status: is-meta
      text:
        - "Вы уже проходили через это много раз?.."

    - char: hiryuu_meta
      side: left
      status: is-meta
      text:
        - "Можно и так сказать~ Но не забывай о нашем уговоре: мы не обсуждаем прошлое друг друга."

    - char: ark_royal_meta
      side: right
      status: is-meta
      text:
        - "Прости..."

    - char: enterprise_meta_d
      side: left
      status: is-meta
      text:
        - "Разговоры в сторону. Враг начал действовать."

    - char: hiryuu_meta
      side: right
      status: is-meta
      text:
        - "Мы всё-таки ведем себя слишком вызывающе. При таком раскладе прибытие Арбитров — лишь вопрос времени."

    - char: enterprise_meta_d
      side: left
      status: is-meta
      text:
        - "Раз уж мы решили остаться здесь, то неважно, где именно «открываться»."
        - "Ваша следующая задача — тянуть время любыми способами, пока Сингулярность не стабилизируется."

chapter2:
  rows:

    - char: belfast
      side: left
      text:
        - "Господин Командир, вы чувствуете себя лучше?"

    - char: commander
      side: right
      text:
        - "Намного лучше.."

chapter3:
  rows:

    - char: commander
      side: right
      text:
        - "Благодаря твоей заботе, Белфаст."

    - char: belfast
      side: left
      text:
        - "Это часть моих обязанностей как горничной, господин Командир, не стоит благодарности."

chapter4:
  rows:

    - char: commander
      side: right
      text:
        - "Благодаря лечению Вестал."

    - char: belfast
      side: left
      text:
        - "Хе-хе, нам невероятно повезло, что мы столкнулись с флотом леди Вестал при таких обстоятельствах!"

chapter5:
  rows:

    - char: queen_elizabeth
      side: left
      text:
        - "Эй... простолюдин! Ты там скоро закончишь свои сновидения?"
        - "Снаружи происходит нечто из ряда вон выходящее. Думаю, тебе стоит выйти и взглянуть самому!"

    - text:
      - "Стоило мне выйти из каюты, как перед глазами предстала шокирующая картина. Прямо от борта корабля и до самого призрачного горизонта, куда ни кинь взгляд, всё было заполнено плавающими обломками."
      - "Их плотность была настолько велика, что флоту пришлось перестроиться в кильватерную колонну, пробивая путь с помощью серийных линкоров, чтобы хоть как-то продолжать движение."

    - char: memphis
      side: left
      text:
        - "Командир, это началось около получаса назад."
        - "Мы шли вперёд, ожидая засады, но вместо врагов появились они... обломки."
        - "Сначала мимо проплыл один остов, потом второй... затем целые груды искореженного металла..."
        - "Всего за полчаса флот оказался буквально зажат в кольцо этих останков."

    - char: enterprise
      side: right
      text:
        - "Я впервые вижу столь жуткое зрелище. Судя по количеству обломков... это место не назовёшь полем боя. Скорее уж..."
        - "Кладбище..."

    - text:
      - "В поле зрения не было ни одного живого врага — лишь бескрайнее море обломков. Искореженные корпуса громоздились друг на друга, безмолвно дрейфуя по зловещей глади воды."
      - "Время от времени корабли флота расталкивали фрагменты металла, и те с глухим, скрежещущим звуком бились друг о друга, после чего всё снова погружалось в тишину."
      - "Гнетущая атмосфера этого места делала слово «кладбище» самым подходящим определением."

    - char: commander
      side: left
      text:
        - "......"
        - "Флоту сохранять строй, обходить крупные обломки. Поднять в воздух все разведсамолеты — нужно как можно скорее выяснить, что происходит в этой акватории."
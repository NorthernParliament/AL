chapter1:
  rows:

    - char: memphis
      side: left
      text:
        - "Все флоты завершили развертывание в назначенных секторах. До начала операции осталось менее десяти минут."

    - char: enterprise
      side: right
      text:
        - "Наконец-то этот момент настал..."
        - "Сирены сосредоточили в центральной зоне огромные силы, укрепив их плотной сетью крепостей."
        - "Поэтому нынешняя операция — это не молниеносный «обезглавливающий» удар, а планомерная зачистка акватории с методичным продвижением вперед."

    - char: memphis
      side: left
      text:
        - "Исходя из соотношения сил сторон, штаб утвердил план наступления с оказанием давления по всей линии фронта и прорывом в нескольких точках."
        - "Никаких обманных маневров и ухищрений. Флоты будут продвигаться слой за слоем, от периферии к центру, полностью уничтожая каждую единицу Сирен в секторе."

    - char: baltimore
      side: right
      text:
        - "Никаких ложных выпадoв... Все флоты, вышедшие из шести аванпостов, выполняют задачи основного удара. Размах штабного планирования в этот раз действительно поражает..."

    - char: memphis
      side: left
      text:
        - "В конце концов, сил для этой решающей битвы у нас более чем достаточно~"
        - "Разумеется, если судить по составу, наша группировка является самой крупной среди всех направлений главного удара..."

    - char: saratoga
      side: right
      text:
        - "А всё потому, что на нашей стороне не только Командир, но и сама Её Величество Куин Элизабет!"

    - char: memphis
      side: left
      text:
        - "Пока мы не прощупаем всю глубину обороны Сирен, будем действовать максимально надежно и осторожно."
        - "Продвигаемся единым фронтом с восьми направлений. Как только прорвем внешнее кольцо обороны по всему периметру, вместе перейдем к следующему слою."

    - char: saratoga
      side: right
      text:
        - "Именно так! Раздавим последний оплот Сирен абсолютной мощью, не оставив от их «острова» и мокрого места~"

    - char: communicator
      side: left
      text:
        - "*сигнал вызова*"

    - char: hood_rad
      side: left
      text:
        - "Дамы и господа, для нашей контрнаступательной операции против Сирен в океане NA настал час решающей битвы."
        - "Когда-то мы были бессильны перед их вторжением. Наши товарищи гибли на наших глазах, а океан уходил из-под нашего контроля. То были времена отчаяния..."
        - "Но то были и времена зарождения надежды! Столкнувшись с неослабевающим натиском врага, мы не склонились. Мы выбрали путь борьбы."
        - "Выбравшись из трясины безнадёжности, мы вновь обрели утраченное мужество и веру, превратив их в движущую силу нашего продвижения вперёд."
        - "Будучи доблестными участниками «Лазурного пути», стремящимися отвоевать у Сирен свободу и мир, мы стойко сражались до этого самого дня."
        - "Наконец, силы Сирен в океане NA ввергнуты в хаос. Свои последние уцелевшие флотилии они стянули в это защищённое штормом ядро для отчаянного сопротивления."
        - "Для нас это последний рубеж. Последний враг — там, и окончательная победа — тоже там."
        - "Чаша весов склоняется на нашу сторону, и штурвал судьбы вновь в наших руках."
        - "Так какова же наша задача теперь?"
        - "Атаковать, атаковать и ещё раз атаковать! Сокрушить последнее сопротивление врага и одержать в этой битве подавляющую, абсолютную победу!"
        - "Дальнейшее — за вами, Командир."

    - char: tb_rad
      side: right
      text:
        - "Командир, время начала операции настало. Все флоты ожидают вашего приказа к наступлению."

    - char: commander
      side: left
      text:
        - "Всем флотам — внимание! Начать наступление!"
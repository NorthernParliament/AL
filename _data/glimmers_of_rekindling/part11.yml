chapter1:
  rows:

    - char: tb_rad
      side: left
      text:
        - "Предупреждение: Командир, впереди обнаружен неизвестный гигантский объект. Предположительно — новый тип крепостного орудия Сирен."

    - char: memphis
      side: right
      text:
        - "Такая невообразимая махина — и это всего лишь пушка?! Если она попадёт, даже линкору не поздоровится!"

    - char: commander
      side: left
      text:
        - "Нужно уничтожить её до того, как нам нанесут серьёзный урон. Для этого..."

    - char: queen_elizabeth
      side: right
      text:
        - "Нужна мощь сконцентрированного огня, верно? Хм~ С такой мелочью мы справимся без проблем!"
        - "Кинг Джордж V, ваша группа на позиции?"

    - char: king_george_v_rad
      side: left
      text:
        - "Моё почтение, Ваше Величество. Ударная группа Королевского флота на позиции."
        - "Командир, можете не беспокоиться о гигантском орудии впереди — предоставьте его нам."

    - char: duke_of_york_rad
      side: right
      text:
        - "Какое бы защитное сооружение ни стояло перед нами, оно будет сокрушено нашим залпом. Пусть же смерть и кровь расцветут в пышном великолепии."

    - char: prince_of_wales_rad
      side: left
      text:
        - "Цель захвачена. Пусть Сирены на собственной шкуре ощутят мощь типа «Кинг Джордж V». Флот, к залпу готовьсь!"

    - char: howe_rad
      side: right
      text:
        - "Орудия к бою готовы... Огонь !!!"
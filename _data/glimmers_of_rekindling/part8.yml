chapter1:
  rows:

    - char: long_island_rad
      side: left
      text:
        - "Командир, на связи Лонг-Айленд! Передаю вам сообщение из штаба..."
        - "Ой, вы уже прибыли на аванпост Королевского флота?"

    - char: commander
      side: right
      text:
        - "Да, добрались благополучно."

    - char: long_island_rad
      side: left
      text:
        - "Хе-хе, ну и как вам там, у Роялов?"

    - char: commander
      side: right
      text:
        - "Внешне конструкция почти такая же, как у Союза Орла, но вот внутреннее убранство... как бы сказать... очень в их стиле."

    - char: long_island_rad
      side: left
      text:
        - "Наверняка опять понаставили кучу роскошных декораций, как в комнате босса в каком-нибудь подземелье? Понимаю-понимаю!"

    - char: commander
      side: right
      text:
        - "...Так что там за новости из штаба?"

    - char: long_island_rad
      side: left
      text:
        - "Упс... Точно, нельзя болтать по важному каналу связи."
        - "Новости хорошие! После тщательного изучения вашего отчёта о разведке, штаб официально распорядился начать подготовку к генеральному наступлению."

    - char: commander
      side: right
      text:
        - "Наконец-то мы свободны от бесконечных совещаний... Это действительно отличная новость. Что требуется от меня на данном этапе?"

    - char: long_island_rad
      side: left
      text:
        - "А, пока что ваше личное участие не требуется."
        - "Штаб сейчас распределяет флот для разведки внешних секторов по другим направлениям, да и логистическая подготовка только-только стартовала."
        - "Пока всё это не будет завершено, Командир, отдыхайте на аванпосте Королевского флота и наслаждайтесь короткой передышкой перед началом большой битвы!"

    - char: commander
      side: right
      text:
        - "Боеспособность Сирен оказалась выше ожидаемой, так что решение провести полную разведку перед утверждением окончательного плана выглядит разумным. Но... почему сегодня на связи ты, а не Мемфис?"

    - char: long_island_rad
      side: left
      text:
        - "Мемфис?.. Хе-хе, она сейчас занята выполнением приказа о передислокации... Скоро вы сами всё узнаете!"
        - "Ну, на этом всё. Желаю вам приятного дня. Лонг-Айленд, конец связи!"
        - "Фух... Как же я разнервничалась... А! Аппаратура ещё не выключилась?!"

    - char: commander
      side: right
      text:
        - "(Осталось ещё несколько вопросов... Но раз выпал такой шанс, стоит и впрямь немного отдохнуть.)"
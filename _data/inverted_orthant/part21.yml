chapter1:
  rows:

    - char: weser
      side: left
      text:
        - "Операция Генрих проходит гладко. Флот «Сакуры» также приближается к заданной точке. Совсем скоро обе группы флотов встретятся в районе оборонительного модуля D13."
        - "Теперь дело за Петер…"
        - "Говорит Везер. Петер, как продвигается твоя подготовка?"

    - char: peter_strasser_rad
      side: right
      text:
        - "По пути то и дело попадаются враги. Хоть они и слабы, мне всё еще требуется время, чтобы добраться до терминала управления."

    - char: weser
      side: left
      text:
        - "Принято. Мы продолжим тянуть время и проследим, чтобы цели оставались в пределах назначенной зоны."
        - "И всё же… Раз уж подвернулся такой случай, не ограничиться ли нам одними флотами? Как насчет проверки авиационной мощи всей крепости? Полномасштабный насыщенный удар со всех аэродромов плавучих островов — звучит неплохо, не так ли?"

    - char: peter_strasser_rad
      side: right
      text:
        - "Хорошая мысль… Такой шанс выпадает редко. Считай это генеральной репетицией перед реальным развертыванием. Устроим по-настоящему роскошное испытание!"
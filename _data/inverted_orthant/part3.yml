chapter1:
  rows:

    - char: peter_strasser
      side: left
      text:
        - "После длительной модернизации шесть аэродромов на плавучих островах — A1, A2, A3, B1, B2 и B3 — наконец-то снова готовы к эксплуатации. Сегодняшние учения будут проходить на базе трех из них."
        - "Помимо расширения масштабов и производственных мощностей, нынешнее обновление привнесло важное улучшение: внедрение более точных данных фракций для повышения реализма генерируемых «противников»."
        - "С этого момента типы, количество, боевая мощь и стратегии «врага» выйдут на совершенно новый уровень сложности."

    - char: weser
      side: right
      text:
        - "Петер, у меня вопрос."

    - char: peter_strasser
      side: left
      text:
        - "Слушаю."

    - char: weser
      side: right
      text:
        - "Я ознакомилась с брифингом. В сегодняшних учениях, помимо Сирен, противниками выступят в основном флоты Железной Крови, Империи Сакуры и Империи Сардиния?"

    - char: peter_strasser
      side: left
      text:
        - "Да."

    - char: prinz_heinrich
      side: right
      text:
        - "Э-э?! Неужели?! Я смотрела... и правда!"
        - "етер… Как ни посмотри, использовать данные союзников в качестве основных целей для отработки ударов — это как-то..."

    - char: peter_strasser
      side: left
      text:
        - "Эти данные обладают гораздо более высокой точностью по сравнению с данными фракций Лазурного Пути. Я хочу немедленно проверить, насколько реалистичной может быть симуляция на обновленных аэродромах."
        - "К тому же, суть наших тренировок в том, чтобы быть максимально готовыми к любым сценариям. Ты должна понимать необходимость этого."

    - char: prinz_heinrich
      side: right
      text:
        - "Ну, если ты так говоришь..."

    - char: peter_strasser
      side: left
      text:
        - "Буду считать, что ты поняла. У остальных есть вопросы по этому поводу?"

    - char: weser
      side: right
      text:
        - "Вопросов нет."

    - char: z46
      side: right
      text:
        - "Вопросов нет."

    - char: peter_strasser
      side: left
      text:
        - "На этот раз я не стала прорабатывать детали сценария. Ваша задача — вести бой в заданном секторе, уничтожая всех противников на воде и в воздухе до тех пор, пока зона не будет полностью зачищена."
        - "Также, специально для этих учений, я скорректировала параметры Зеркального моря: реалистичность попадания учебного снаряда увеличена на 15%. Прошу всех быть предельно внимательными."

    - char: prinz_heinrich
      side: right
      text:
        - "Спартанские тренировки..."

    - char: peter_strasser
      side: left
      text:
        - "Тот, кто не получает ранений в учении, теряет жизнь в бою."

    - char: z46
      side: right
      text:
        - "Мы бесчисленное количество раз проходили через тренировки, пропитанные реализмом. Сегодняшний день — лишь еще один шаг навстречу настоящему сражению..."

    - char: prinz_heinrich
      side: left
      text:
        - "И то верно… Мы ведь каждый день через это проходим~ Петер, можем начинать? Мне уже не терпится опробовать на вкус этих новых «врагов»!"

    - char: peter_strasser
      side: right
      text:
        - "Какой настрой, Генрих. Что ж... время пришло. Запуск программы учений. Опе..."

    - char: prinz_heinrich
      side: left
      text:
        - "Погнали~~~! Айзен, прибавь ходу! Рывок броненосного корабля~!!"

    - char: peter_strasser
      side: right
      text:
        - "………Начало операции……"

    - char: weser
      side: left
      text:
        - "В конце концов, «мы ведь каждый день через это проходим»."
chapter1:
  rows:

    - char: prinz_heinrich
      side: left
      text:
        - "Вражеские корабли уничтожены~ Я вернулась!"

    - char: weser
      side: right
      text:
        - "С возвращением. У нас есть полчаса до прибытия следующей волны противника. Поторопись с пополнением припасов и техобслуживанием."

    - char: prinz_heinrich
      side: left
      text:
        - "Без проблем~ Ой, а где Петер?"

    - char: z46
      side: right
      text:
        - "Штрассер сказала, что по результатам последнего боя нужно повысить сложность последующих тренировок, и в одиночку отправилась в зону управления."

    - char: prinz_heinrich
      side: left
      text:
        - "Ещё сложнее, чем сейчас?! Хм-м~! А вы заметили? После того как сегодня закончилась модернизация аэродромов, Петер выглядит какой-то воодушевленной!"

    - char: weser
      side: right
      text:
        - "Да неужели? По-моему, она такая же, как обычно — всё та же точная и строгая Петер Штрассер."

    - char: z46
      side: left
      text:
        - "Согласна."

    - char: prinz_heinrich
      side: right
      text:
        - "Да ну вас, вам обеим не хватает наблюдательности~!"

    - char: weser
      side: left
      text:
        - "Кому бы об этом рассуждать... Уж кто-кто, а ты, Генрих, у нас самая «наблюдательная»."

    - char: prinz_heinrich
      side: right
      text:
        - "Эй~ Ну, в прошлый раз я была неправа, признаю! Но не волнуйтесь, в этот раз я точно ничего не перепутаю!"
        - "Те, кто не отвечает на вызов — Пешки. Те, с кем нельзя нормально поговорить — Пешки. И те, кто без лишних слов бросается в атаку — тоже Пешки, верно?!"

    - char: z46
      side: left
      text:
        - "Прогресс налицо..."

    - char: weser
      side: right
      text:
        - "Если кто-то бросается в атаку без лишних слов, то уже не так важно, Пешка это или нет, не находишь?"

    - char: prinz_heinrich
      side: left
      text:
        - "Так вот почему ты в прошлый раз так больно меня приложила? У-у-у!"

    - char: weser
      side: right
      text:
        - "Постарайся на этих учениях, Генрих~"
chapter1:
  rows:

    - char: littorio
      side: left
      text:
        - "Вот оно как… Значит, вы прибыли специально, чтобы вручить нам «приглашение» на базу Железной Крови в Пацифике?"

    - char: prinz_eugen
      side: right
      text:
        - "Именно так. Железная Кровь всегда уделяла большое внимание обмену разведданными с союзниками. Как представитель Железной Крови, я искренне надеюсь, что представители Империи Сардиния отправятся туда вместе со мной."

    - char: littorio
      side: left
      text:
        - "…Вы уверены, что хотите затеять дальнее плавание именно сейчас?"

    - char: prinz_eugen
      side: right
      text:
        - "Совершенно верно. Иногда полезно отбросить в сторону сложные расчеты и просто отправиться в путь, не так ли?"

    - char: littorio
      side: left
      text:
        - "Что касается базы Железной Крови в Пацифике… Разве все они не были потеряны под натиском Сирен давным-давно?"

    - char: prinz_eugen
      side: right
      text:
        - "Считайте это сюрпризом, который ждет вас по прибытии. Позвольте мне пока сохранить интригу."

    - char: littorio
      side: left
      text:
        - "Романтичное дальнее путешествие… Это действительно заманчивое предложение."
        - "Однако, к сожалению, ситуация в Средиземном море сейчас крайне изменчива. Мы с Витторио Венето никак не можем покинуть пост в такое время."

    - char: prinz_eugen
      side: right
      text:
        - "А ведь Фридрих дер Гроссе возлагает большие надежды на эту совместную операцию с Империей Сардиния, знаете ли."

    - char: littorio
      side: left
      text:
        - "Само собой! Это вовсе не означает, что Империя Сардиния отклоняет столь любезное приглашение."
        - "Я могу отправить одного из своих доверенных подчиненных в качестве нашего с Венето представителя. Она присоединится к флоту Железной Крови. Что скажете?"

    - char: prinz_eugen
      side: right
      text:
        - "Если таков ваш план… Что ж, пойдет. Однако это «приглашение» касается секретной информации, не предназначенной для широкой огласки, так что…"

    - char: littorio
      side: left
      text:
        - "Не беспокойтесь. Выбранный человек — личный телохранитель Венето. Степень доверия ко мне и Венето полностью распространяется и на неё."

    - char: prinz_eugen
      side: right
      text:
        - "Превосходно. Тогда я вернусь в свои покои и буду ждать прибытия сопровождающей."

chapter2:
  rows:

    - char: carabiniere
      side: left
      text:
        - "Прошу прощения!"
        - "Госпожа Литторио, какие будут распоряжения?"

    - char: littorio
      side: right
      text:
        - "Слушай внимательно, Карабиньере. Тебе предстоит выполнить крайне важное секретное задание…"
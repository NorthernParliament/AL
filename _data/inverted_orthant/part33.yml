chapter1:
  rows:

    - char: carabiniere_rad
      side: left
      text:
        - "На этом мой доклад о визите завершён. Таковы все подробности произошедшего."

    - char: littorio
      side: right
      text:
        - "Благодарю за службу, Карабиньере. Весьма детальный отчёт."

    - char: carabiniere_rad
      side: left
      text:
        - "Госпожа Литторио, как мне ответить на запрос Железной Крови о продлении срока нашего визита?"

    - char: littorio
      side: right
      text:
        - "О-хо~ В Средиземноморье сейчас на редкость спокойно. Раз уж Железная Кровь так настойчиво приглашает, у нас нет причин отказывать. Потрудись остаться там ещё на некоторое время."

    - char: carabiniere_rad
      side: left
      text:
        - "Есть! Задание будет выполнено. Карабиньере, конец связи."

    - char: littorio
      side: right
      text:
        - "……Поверить не могу, что такое возможно."
        - "Железная Кровь умудрилась скрыть флот такого масштаба и целую сеть крепостей... Это действительно…"
        - "Хм, и как же нам теперь поступить…"

    - char: conte_di_cavour_rad
      side: left
      text:
        - "Литторио, флот Империи Сакуры проходит через Суэцкий канал. Ожидается, что они войдут в Средиземное море сегодня в полдень."

    - char: littorio
      side: right
      text:
        - "Поняла. Действуем по утверждённому плану встречи."

    - char: conte_di_cavour_rad
      side: left
      text:
        - "Принято. Конте ди Кавур, конец связи."

    - char: littorio
      side: right
      text:
        - "……Эх, ладно. О проблемах будем думать, когда они станут проблемами."
        - "Сегодня — время для банкета! Пора поприветствовать гостей, прибывших издалека~"

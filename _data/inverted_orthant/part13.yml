chapter1:
  rows:

    - char: peter_strasser
      side: left
      text:
        - "Противник крайне осторожен… После завершения налета они не стали ввязываться в затяжной бой с нашими силами прикрытия и в кратчайшие сроки рассредоточились для отступления."
        - "Проклятье, преследовать всех сразу невозможно… Мне не удалось отследить местоположение вражеского авианосца. Как успехи у тебя?"

    - char: weser
      side: right
      text:
        - "Авианосец противника не обнаружен. Однако… я зафиксировала еще больше серийных кораблей Империи Сакуры. Петер, похоже, проблема не в паре групп самолетов или нескольких Пешках-авианосцах."

    - char: peter_strasser
      side: left
      text:
        - "Неужели все учебные корабли противника сменились версиями с боевым снаряжением?.."

    - char: weser
      side: right
      text:
        - "Кто-то сумел незаметно обойти нашу систему безопасности и управляет оборудованием в этой акватории увереннее, чем мы сами. Кроме самих Сирен, других вариантов быть не может…"

    - char: peter_strasser
      side: left
      text:
        - "Я думала о том же. Не ожидала, что предчувствие так скоро станет явью…"
        - "Впрочем, направление, в котором отступают эти серийные модели… Ха-ха-ха, надо же, какое совпадение…"

    - char: weser
      side: right
      text:
        - "Собираешься воспользоваться тем, что заранее перевела оборонительный модуль D13 в режим максимальной бдительности?"

    - char: peter_strasser
      side: left
      text:
        - "Даже не знаю, пророчество это было или просто счастливая случайность… Не будем терять времени, начнем новую операцию~"
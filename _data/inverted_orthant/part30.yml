chapter1:
  rows:

    - text:
      - "КАБУУУМ!!!"

    - char: weser_rad
      side: left
      text:
        - "Щит Компилятора… подтверждаю уничтожение."

    - char: peter_strasser_rad
      side: right
      text:
        - "Отлично. А теперь — нанесём завершающий удар..."

    - char: compiler
      side: left
      status: is-red
      text:
        - "Сбор внешнего щита завершён. Внутреннее поле — запуск..."

    - char: prinz_heinrich
      side: right
      text:
        - "Да это же читерство какое-то~~~~!!!! Всем внимание, у морского таракана снова вылез щит!!!!!"

    - char: z24
      side: left
      text:
        - "Что это за мощь..."

    - char: nurnberg
      side: right
      text:
        - "Неужели весь урон, что мы нанесли до этого, просто аннулирован? Как такое возможно!"

    - char: kongou_rad
      side: left
      text:
        - "Союзники из Железной Крови и Сардинии, похоже, вам не помешало бы немного помощи."

    - char: zuikaku_rad
      side: right
      text:
        - "Сдаваться ещё рано! Удерживайте окружение, этот слой щита вскроем мы! Сестра, ты готова?"

    - char: shoukaku_rad
      side: left
      text:
        - "Хи-хи, я уже давно в небе над целью и держу её на мушке. Не хотелось отбирать у вас славу, но, судя по всему, сейчас не время скромничать."

    - char: yamashiro_rad
      side: right
      text:
        - "Я тоже готова... Девочки, все вместе!"

    - text:
      - "КАБУУУМ!!!"

    - char: kongou_rad
      side: left
      text:
        - "Последний удар по щиту — за мной!"

    - char: compiler
      side: right
      status: is-red
      text:
        - "........."

    - char: prinz_heinrich
      side: left
      text:
        - "Подтверждаю пробитие! Интуиция подсказывает — пора! Броненосный натиск!"

    - char: compiler
      side: right
      status: is-red
      text:
        - "Двигательный модуль заряжен. Начало перемещения..."

    - char: prinz_heinrich
      side: left
      text:
        - "И не мечтай, тебе уже не уйти———— Э-э-э-э-эй?!!"

    - char: peter_strasser_rad
      side: right
      text:
        - "Что случилось, Генрих? Я внезапно потеряла цель на радарах!"

    - char: nurnberg
      side: left
      text:
        - "Она погружается... Компилятор резко ушла под воду и исчезла! И это с такими-то габаритами!"

    - char: prinz_heinrich
      side: right
      text:
        - "Чего-о?! Ты же говорила про «двигательный модуль», при чем тут погружение?!!!!"

    - char: compiler_rad
      side: left
      status: is-red
      text:
        - "С какой стати… мне честно докладывать о своих истинных намерениях? Что ж… прощайте."

    - char: prinz_heinrich
      side: right
      text:
        - "Ах ты, коварный тараканище! А ну стоять!!!!"

chapter2:
  rows:

    - char: prinz_eugen
      side: left
      text:
        - "Как и ожидалось, в конце ты выбрала путь под водой, Компилятор… Хе-хе. U-37, ты ведь уже на позиции для засады? Приготовься к перехвату!"

chapter3:
  rows:

    - char: u-37_rad
      side: right
      text:
        - "U-37 на связи! Хе-хе, предоставьте подводную охоту мне~!"
chapter1:
  rows:

    - char: peter_strasser_rad
      side: left
      text:
        - "Моя подготовка завершена. Какова обстановка на передовой?"

    - char: weser
      side: right
      text:
        - "Флот «Железной Крови» и флот «Сакуры» объединились. Как и ожидалось, они не атакуют друг друга."
        - "Однако после сближения их поведение изменилось. Прямо сейчас они меняют курс под огнем систем модуля D13. Похоже, их цель — сектор X…"

    - char: peter_strasser_rad
      side: left
      text:
        - "Что?! Пытаются прорваться в сектор X?!"

    - char: weser
      side: right
      text:
        - "Мы делаем всё возможное, чтобы замедлить их. Вражеские корабли всё ещё находятся в зоне поражения, это не помешает нанесению удара."

    - char: peter_strasser_rad
      side: left
      text:
        - "Отлично… Значит, их истинные намерения наконец-то раскрыты. Столько дымовых завес лишь ради того, чтобы добраться до сектора X…"

    - char: weser
      side: right
      text:
        - "Какие же тайны скрыты в этом секторе, раз они так заинтересовали Сирен?.."

    - char: peter_strasser_rad
      side: left
      text:
        - "Не знаю, сектор X никогда не входил в мою зону ответственности. Но… даже если Сирены пришли сюда просто на экскурсию, мы не можем позволить им добиться своего, верно?"
        - "Протоколы атаки для авиационных островов A1, A2, A3, B1, B2 и B3 настроены."
        - "Обратный отсчет: 5… 4… 3… 2… 1… Подтверждение получено."
        - "Операция по подавлению началась! Преподадим этим незваным гостям урок, который они запомнят надолго!"
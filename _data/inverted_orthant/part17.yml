chapter1:
  rows:

    - char: peter_strasser
      side: left
      text:
        - "Смешанный флот «Железной Крови» и «Сардинии» тоже начал сближение с нами, и их численность растет… Похоже, ситуация с вышедшими из-под контроля силами в акватории становится всё серьезнее."

    - char: weser
      side: right
      text:
        - "Раз уж все созданные серийные флоты перешли в аномальное состояние, есть ли возможность стравить их друг с другом?"

    - char: peter_strasser
      side: left
      text:
        - "Мы проводили подобные эксперименты еще до твоего прибытия… Результаты показали, что заставить флоты Сирен, созданные Зеркальным морем, сражаться между собой, вполне реально."
        - "Однако у нас нет возможности перехватить управление этими единицами на полпути. Команда на взаимное уничтожение должна быть заложена в них еще до момента генерации."
        - "А так как эти группы флотов уже полностью сформированы, мы не можем изменить их приоритетные цели."

    - char: weser
      side: right
      text:
        - "Получается, все наши многочисленные модификации и улучшения так и не затронули самое ядро системы… Неудивительно, что Сирены так легко устроили весь этот переполох."

    - char: peter_strasser
      side: left
      text:
        - "…По сути, до сегодняшнего дня мы в основном лишь «арендуем» этот испытательный полигон у Сирен."
        - "Впрочем, создатель этой крепости наверняка предвидел подобную уязвимость с самого начала. Хотя вся база и разрослась на основе технологий Сирен, модули обороны представляют собой замкнутую, полностью автономную систему."

    - char: weser
      side: right
      text:
        - "То есть даже в худшем случае оборонительные сооружения останутся на нашей стороне?"

    - char: peter_strasser
      side: left
      text:
        - "Да, в этом можно быть абсолютно уверенной."
        - "Но что касается команд, заложенных при генерации… Кажется, нам и вправду не помешала бы помощь, не так ли?"
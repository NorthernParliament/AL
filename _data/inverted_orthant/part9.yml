chapter1:
  rows:

    - text:
      - "КАБУУУМ!!!"

    - char: king_george_v(?)
      side: right
      status: is-red
      text:
        - "......"

    - char: peter_strasser
      side: left
      text:
        - "Подтверждаю потопление флагмана Королевского Флота «Джордж V». Бой окончен."

    - char: prinz_heinrich
      side: right
      text:
        - "Абсолютная победа~ Хе-хе, этот Королевский флот не такой уж и страшный~~!"

    - char: peter_strasser
      side: left
      text:
        - "Уверенность — это хорошо, Генрих. В следующий раз я добавлю к «Королевскому флоту» еще три авианосца типа «Илластриес» и три линкора типа «Куин Элизабет»."

    - char: z46
      side: right
      text:
        - "Если они появятся все сразу... будет тяжелый бой..."

    - char: prinz_heinrich
      side: left
      text:
        - "Я была неправа! Пожалуйста, забудь всё, что я только что сказала!"

    - char: peter_strasser
      side: right
      text:
        - "Эх…………"

    - char: weser
      side: left
      text:
        - "Петер, что будем делать с флотом Империи Сакуры впереди? Продолжаем бой по плану?"

    - char: peter_strasser
      side: right
      text:
        - "Нет, смена планов. Флот Сакуры и остальные этапы перенесем на вторую половину дня. Всем вернуться в зону отдыха и готовиться к обеду."

    - char: prinz_heinrich
      side: left
      text:
        - "А? Ура-а~!!!!! Тогда я погнала~"

    - char: z46
      side: right
      text:
        - "Принято. Я тоже возвращаюсь на остров E2."

    - char: weser
      side: left
      text:
        - "…Тебя всё еще беспокоит тот сбой в системе связи?"

    - char: peter_strasser
      side: right
      text:
        - "Да. Пусть это длилось всего мгновение, но наше оборудование основано на технологиях Сирен. Ни аномальная погода, ни Лазурный Путь не должны были создать такие помехи."

    - char: weser
      side: left
      text:
        - "…Ты намекаешь на то, что это дело рук самих Сирен?"

    - char: peter_strasser
      side: right
      text:
        - "Я просто немного тревожусь… Я еще раз проверю оборонительные сооружения. Возвращайся в зону отдыха на E2, я скоро буду."

    - char: weser
      side: left
      text:
        - "Ну, Петер, после таких новостей спокойно отдохнуть уже не получится. Я тоже проверю системы базы, насколько смогу. Остаемся на связи."

    - char: peter_strasser
      side: right
      text:
        - "Спасибо. Конец связи."
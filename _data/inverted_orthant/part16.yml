chapter1:
  rows:

    - char: carabiniere
      side: left
      text:
        - "Невероятно... Здесь действительно скрыта столь величественная база! Это странное чувство... Неужели всё это реализовано с помощью технологий Зеркального моря Сирен?!"

    - char: prinz_eugen
      side: right
      text:
        - "Именно так~ Эта база сама по себе является одним из достижений наших исследований."

    - char: nurnberg
      side: left
      text:
        - "Посмотрите на те объекты в небе... Это ведь палубные самолеты?"

    - char: z24
      side: right
      text:
        - "Позвольте мне взглянуть моим «Оком предвидения»... Хм-м, похоже на самолеты Империи Сакуры."

    - char: u-37
      side: left
      text:
        - "Скорее всего, они ненастоящие. Чтобы моделировать различные сценарии, флоты союзников иногда выступают в роли «врага» во время тренировок."

    - char: carabiniere
      side: right
      text:
        - "Эти серийные модели, созданные устройствами Зеркального моря... Значит, там есть не только флот Сакуры, но и корабли Империи Сардиния?"

    - char: u-37
      side: left
      text:
        - "Ага~ Но эти учения проводятся исключительно для проверки вооружения и сбора данных!"
        - "Даже наши собственные корабли часто появляются в роли «противника». Это ни в коем случае не направлено лично против вас!"

    - char: carabiniere
      side: right
      text:
        - "Надо же, даже собственный флот... Какая... суровая подготовка..."

    - char: nurnberg
      side: left
      text:
        - "Но интенсивность этих учений... Всё выглядит слишком реалистично..."

    - char: u-37
      side: right
      text:
        - "Это правда, странно... Обычно тренировки с таким уровнем симуляции не проводятся..."

    - text:
      - "КАБУУМ!!!"

    - char: z28
      side: left
      text:
        - "Ой?! Это что, береговая оборона только что открыла по нам огонь?!"

    - char: z24
      side: right
      text:
        - "Что за глупости! Это же наши верные вассалы..."

    - text:
      - "КАБУУМ!!!"

    - char: z24
      side: left
      text:
        - "Ва-а-а-а! Они правда стреляют?!!!"

    - char: carabiniere
      side: right
      text:
        - "Простите, не произошло ли какой-то непредвиденной ситуации?"

    - char: prinz_eugen
      side: left
      text:
        - "Вовсе нет, всё идет строго по плану. Недавняя атака — это лишь элемент для повышения реалистичности учений."
        - "Главное — достоверность. Только максимально реалистичные маневры имеют смысл, не так ли?"

    - char: carabiniere
      side: right
      text:
        - "Д-действительно... Благодарю за науку."

    - char: nurnberg
      side: left
      text:
        - "(Шёпотом) Хоть я здесь и впервые, но сейчас явно что-то идет не так..."

    - char: z28
      side: right
      text:
        - "(Шёпотом) С-скорее всего..."

    - char: prinz_eugen
      side: left
      text:
        - "Кхм... U-37, бери гостью и Z28, обойдите модуль D13 и через остров B7 по запасному маршруту направляйтесь прямиком в зону отдыха на E2."

    - char: u-37
      side: right
      text:
        - "Ого, Ойген! Ты ведь здесь ни разу не была, откуда ты знаешь про этот путь? Я сама постоянно пользуюсь этим секретным маршрутом, чтобы сократить дорогу..."

    - char: prinz_eugen
      side: left
      text:
        - "Я просто внимательно изучила документы. В общем, веди гостей."
        - "Похоже, сегодняшнюю тренировку пора бы уже и заканчивать... Z24, Нюрнберг, за мной."
        - "Что ж, давайте придумаем, как нам завершить эти «реалистичные» учения~"
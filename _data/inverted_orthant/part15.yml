chapter1:
  rows:

    - char: u-37
      side: left
      text:
        - "Динь-динь-динь! Всем внимание, мы входим в зону контроля секретной базы Железной Крови!"

    - char: carabiniere
      side: right
      text:
        - "Хм? Это и есть наш пункт назначения? Прошу простить мою близорукость, но я не вижу здесь никаких построек или сооружений, похожих на базу..."

    - char: nurnberg
      side: left
      text:
        - "Я тоже ничего не вижу… U-37, ты уверена, что мы не сбились с курса?"

    - char: z28
      side: right
      text:
        - "Или под «секретной базой» имеется в виду тайное убежище, как у детей? Может, мы вообще приехали сюда в отпуск?.."

    - char: z24
      side: left
      text:
        - "Ху-ху-ху, вовсе нет! Ужас, сокрытый во тьме, незримый, но вездесущий — в этом и заключается истинная суть доктрины Железной Крови и природа наших тайных убежищ!"

    - char: carabiniere
      side: right
      text:
        - "Вот оно как… Похоже, мне еще нужно серьезно поработать над своей наблюдательностью…"

    - char: nurnberg
      side: left
      text:
        - "Ой? Z24, неужели ты знаешь что-то об этой секретной базе?!"

    - char: z24
      side: right
      text:
        - "Разумеется. Подобно глазам черного кота, сияющим лишь в глубокой ночи, я уже почуяла… я прозрела это место…"

    - char: z28
      side: left
      text:
        - "Тогда… Z24, каков же результат твоего прозрения?!"

    - char: z24
      side: right
      text:
        - "Э-это… Подобно тому как ночь неизбежно поглощает день, результат моего прозрения столь же предрешен…"

    - char: prinz_eugen
      side: left
      text:
        - "В переводе это значит: «Я понятия не имею», верно?"

    - char: z24
      side: right
      text:
        - "Ойген, ах ты…!"

    - char: prinz_eugen
      side: left
      text:
        - "Я лишь говорю правду~"

    - char: nurnberg
      side: right
      text:
        - "Хм… Я помню, что несколько десятилетий назад этот архипелаг действительно находился под контролем Железной Крови, но после появления Сирен он довольно быстро пал…"
        - "Из-за удаленности региона и последовавшей войны с Лазурным Путём верховное командование решило, что возвращать эти территории нет смысла. Весь наш военный персонал должен был давно эвакуироваться…"

    - char: prinz_eugen
      side: left
      text:
        - "В общих чертах всё верно. Благодарю за на редкость адекватное разъяснение ситуации."

    - char: nurnberg
      side: right
      text:
        - "Хе-хе... Ой? «В общих чертах»? Значит, после этого произошло что-то ещё?"

    - char: u-37
      side: left
      text:
        - "Хи-хи! На самом деле секретная база совсем рядом, прямо по курсу~ Просто она идеально спрятана, поэтому вы её сейчас и не видите!"

    - char: carabiniere
      side: right
      text:
        - "...Что?! Какая технология способна скрыть целую базу?!"

    - char: prinz_eugen
      side: left
      text:
        - "Ну, это слишком продвинутые технологии, их не так-то просто объяснить~"

    - char: carabiniere
      side: right
      text:
        - "Вот как... Прошу прощения! Я задала неуместный вопрос."

    - char: prinz_eugen
      side: left
      text:
        - "...Я же пошутила. Мы пригласили представителя Империи Сардиния как раз для того, чтобы всё это продемонстрировать."
        - "Но раз объяснять действительно долго, лучше я дам тебе прочувствовать всё на личном опыте."

    - char: u-37
      side: right
      text:
        - "Ойген, странно... Я не вижу никого, кто должен был нас встречать."

    - char: prinz_eugen
      side: left
      text:
        - "Не волнуйся. Чтобы не выдать местоположение этой сверхсекретной операции, я отправила уведомление о нашем визите совсем недавно."
        - "Хоть ответа и не было, я буду считать, что сообщение доставлено~"

    - char: u-37
      side: right
      text:
        - "...Может, они просто не получили его из-за проходящих сейчас учений?"

    - char: prinz_eugen
      side: left
      text:
        - "Тем лучше! Сэкономим на формальностях и сразу перейдем к наблюдению за ходом маневров~"

    - char: nurnberg
      side: right
      text:
        - "*Шёпотом* Вам не кажется, что это как-то слишком беспечно?.."

    - char: z28
      side: left
      text:
        - "*Шёпотом* Ну, у Ойген всегда такой характер..."

    - char: prinz_eugen
      side: right
      text:
        - "Кхм... U-37, ты лучше всех знаешь план крепости, так что веди нас."

    - char: u-37
      side: left
      text:
        - "Без проблем! Раз вы здесь впервые, кратко введу в курс дела. Эта крепость Железной Крови раскинулась среди архипелага и состоит из сотен модулей разного назначения."
        - "Фарватер здесь сложный, а многие оборонительные модули постоянно находятся в режиме боевого дежурства. Пожалуйста, держитесь строго за мной и никуда не сворачивайте!"

chapter1:
  rows:

    - text:
      - "КАБУУУМ!!!"

    - char: nurnberg
      side: left
      text:
        - "Мы под обстрелом! Эта мощь... Очевидно, что это не учебные болванки!"
        - "..Либо местные проводят те самые легендарные учения с боевыми стрельбами, либо же..."

    - text:
      - "КАБУУУМ!!!"

    - char: z24
      side: left
      text:
        - "Либо это Пешки — прихвостни Сирен! В общем: око за око, зуб за зуб!"

    - char: nurnberg
      side: right
      text:
        - "Но это же наша укрепленная зона, как Сирены могли прорваться так глубоко... Что со связью с гарнизоном?"

    - char: z24
      side: left
      text:
        - "Гробовая тишина! Эй, Ойген, что вообще происходит на этой базе, куда ты нас притащила?!"
        - "……Ойген!!!!"

    - char: prinz_eugen_rad
      side: right
      text:
        - "А, я немного отвлеклась... Ты что-то сказала?"

    - char: nurnberg
      side: left
      text:
        - "Ой... Когда это она успела так далеко отдалиться?"

    - char: z24
      side: right
      text:
        - "Ойген, ты куда это собралась в такой момент?!"

    - char: prinz_eugen_rad
      side: left
      text:
        - "Я тут немного подслушала, что происходит у соседнего флота Сакуры. Кажется, здесь заваривается кое-что весьма любопытное..."

    - char: z24
      side: right
      text:
        - "Ха-а? О чем ты... Флот «Сакуры» — это же просто мишени для наших тренировок, разве нет?"

    - char: prinz_eugen_rad
      side: left
      text:
        - "В общем так: пободайтесь пока с Генрих, которая прет на вас, мне нужно еще немного времени."

    - char: nurnberg
      side: right
      text:
        - "Пободаться... Да она же палит изо всех орудий и несется прямо на нас!"

    - char: prinz_eugen_rad
      side: left
      text:
        - "Сосредоточьтесь на уклонении, отвечайте только символически. Ваша задача — выманить Генрих к моей позиции."

    - char: z24
      side: right
      text:
        - "И зачем это еще...?! Что вообще творится, Ойген? Разве эта Генрих напротив — не Пешка Сирен?"

    - char: prinz_eugen_rad
      side: left
      text:
        - "Объяснять долго, скоро сами всё увидите. Время поджимает, немедленно приступайте к выполнению."

    - char: nurnberg
      side: right
      text:
        - "Есть, поняли. Начинаем операцию по выманиванию!"
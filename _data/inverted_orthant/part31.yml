chapter1:
  rows:

    - char: u-37
      side: left
      text:
        - "Дальше ты не пройдёшь, Компилятор! До-ро-га за-кры-та!"

    - char: compiler
      side: right
      status: is-red
      text:
        - "Засада…"

    - char: u-37
      side: left
      text:
        - "Слушай, а по тебе и не скажешь! С такой-то тушей — и так быстро нестись под водой!"
        - "Но вот вопрос: сколько времени тебе понадобится, чтобы выскочить из радиуса поражения моих торпед?"

    - char: compiler
      side: right
      status: is-red
      text:
        - "Броня..."

chapter2:
  rows:

    - char: purifier
      side: left
      status: is-red
      text:
        - "При-вееет~! В этот раз вас знатно развели, а!"

    - char: compiler
      side: right
      status: is-red
      text:
        - "Я всё ещё на задании. Можешь не использовать экстренный канал без повода?"

    - char: purifier
      side: left
      status: is-red
      text:
        - "Ой, пардон-пардон! Но не парься, Обсервер послала меня тебя подстраховать. «Образец» уже у тебя?"

    - char: compiler
      side: right
      status: is-red
      text:
        - "Разумеется. Не ради такой ли нудятины мне пришлось тащиться сюда лично…"

    - char: purifier
      side: left
      status: is-red
      text:
        - "Вот и славненько~! Тогда продержись ещё капельку, я мигом прикрою твой отход!"

    - char: compiler
      side: right
      status: is-red
      text:
        - "Забудь. Раз уж ты припёрлась, просто доставь груз вместо меня. Я так устала…"

    - char: purifier
      side: left
      status: is-red
      text:
        - "Э-э?! Не-е-ет… Быть не может!"

    - char: compiler
      side: right
      status: is-red
      text:
        - "В «образце» вшит маячок, не забудь потом забрать."

    - char: purifier
      side: left
      status: is-red
      text:
        - "Проклятье… Я-то думала, сейчас знатно оторвусь, а в итоге опять впрягли в черновую работу! Р-р-ра-а-а-а!"

chapter3:
  rows:

    - text:
      - "КАБУУУМ!!!"

    - char: u-37
      side: left
      text:
        - "А... а-лё? Я же ещё даже торпеды не пустила... Почему Сирена взорвалась?.."
        - "Неужели это всё? И это был мой шанс блеснуть во всей красе?!"
        - "Алёёё?! Эээээй!!!!"
chapter1:
  rows:

    - char: prinz_eugen
      side: left
      text:
        - "Наконец-то они здесь…"

    - text:
      - "Вдалеке, сопровождая нарастающий гул, показались армады самолетов, закрывающие само небо. Среди знакомых силуэтов авиации Железной Крови выделялось множество машин Сирен, испускающих зловещее, неестественное свечение."

    - char: prinz_eugen
      side: left
      text:
        - "Давно я здесь не была, всё стало куда масштабнее… Неужели Штрассер решила воспользоваться случаем и проверить предел авиационной мощи базы?"
        - "Что ж, это идеальное прикрытие, хе-хе…"

    - text:
      - "Однако внутри летящих строев начали вспыхивать непрерывные взрывы. По мере приближения к целевой зоне грохот детонаций становился всё плотнее и чаще."

    - char: prinz_eugen
      side: left
      text:
        - "…Дело плохо. Сирены выставили специализированные модели для электронной борьбы. Если оставить всё как есть, авиагруппы будут уничтожены еще до того, как достигнут цели."
        - "Впрочем, раз они начали сопротивляться лично — значит, занервничали. Я угадала их цель…"
        - "Хм, Сирены… Это место больше не ваша игровая площадка, где вы могли творить что вздумается…"
        - "Здесь… территория Железной Крови! И что же вы предпримете теперь?!"
        - "U-37, ты всё еще на позиции?"

    - char: u-37_rad
      side: right
      text:
        - "На связи U-37~ Всё еще жду в назначенном месте. Пора перезагружать систему управления?"

    - char: prinz_eugen
      side: left
      text:
        - "Сирены-взломщики специализируются на РЭБ, они наверняка уже подготовили контрмеры для центрального узла. План меняется: немедленно взорви к чертям этот терминал!"

    - char: u-37_rad
      side: right
      text:
        - "Э-э… А?! Взорвать… Взорвать?!!! Но что мы будем делать потом, если всё разнесем!"

    - char: prinz_eugen
      side: left
      text:
        - "Обстановка критическая, сначала взрывай, потом разберемся."
        - "По первоначальному плану мы и так должны были вскоре сбросить маскировку. Просто сейчас время исполнения наступило чуть раньше, а методы стали чуть грубее…"
        - "Пришло время миру четко осознать мощь Железной Крови. Нашему второму основному флоту больше нет нужды скрываться."
        - "К тому же, если оставить эти устройства целыми, мы просто пригласим Сирен пробраться сюда еще раз, не так ли?"

    - char: u-37_rad
      side: right
      text:
        - "Есть! Я поняла! Начинаю подготовку к подрыву, U-37 — конец связи!"

    - char: prinz_eugen
      side: left
      text:
        - "Считай это моим запоздалым ответом. По крайней мере, позволь мне поставить точку в этой истории…"
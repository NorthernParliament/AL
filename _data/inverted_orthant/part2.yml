chapter1:
  rows:

    - char: peter_strasser
      side: left
      text:
        - "(Модернизация завершена точно в срок… отлично. Улучшенный аэродром плавучего острова теперь можно использовать в сегодняшних учениях согласно плану.)"
        - "(Хотя мне очень хотелось воспользоваться случаем и переоборудовать базу для стоянки дирижаблей, пришлось отказаться от этой затеи из соображений практичности…)"
        - "(Практичный план использования дирижаблей… Практичный план… Хм? Время пришло.)"
        - "Принц Генрих, Везер, Z46."

    - char: weser
      side: right
      text:
        - "Есть!"

    - char: z46
      side: right
      text:
        - "Есть!"

    - char: peter_strasser
      side: left
      text:
        - "Модернизация функций аэродрома завершена. С сегодняш дня мы приступаем к более интенсивным тренировкам по ведению морского и воздушного боя."
        - "Подробности я изложила в текущем брифинге, не забудьте ознакомиться. Разумеется, я еще раз всё объясню перед началом учений."
        - "А сейчас проверьте состояние своего вооружения. Сбор ровно через три часа в порту P011 плавучего острова B3."

    - char: z46
      side: right
      text:
        - "Принято."

    - char: weser
      side: left
      text:
        - "Через три часа… Хорошо, но… куда снова подевалась Генрих?"

    - char: z46
      side: right
      text:
        - "Исходя из прошлого опыта, если Генрих нет в зоне отдыха, значит, она в одиночку проводит спецтренировку где-то в акватории."

    - char: weser
      side: left
      text:
        - "Ах, вспомнила. Это та самая подготовка, которую она называет «стилем Генриха»? Честно говоря, большую часть времени это мало чем отличается от простого дурачества…"

    - char: peter_strasser
      side: right
      text:
        - "Вполне в её духе — так проявлять усердие. Ладно, вы продолжайте подготовку, а я лично извещу её."

chapter2:
  rows:

    - char: prinz_heinrich
      side: left
      text:
        - "Хей! Хоп! Рывок броненосного корабля~!!"

    - text:
      - "В тренировочной зоне, именуемой сектором F, среди россыпи плавучих островов на высокой скорости между буями проносилась девушка."

    - char: peter_strasser
      side: left
      text:
        - "(На один круг ушло всего семнадцать секунд… Сохранила стабильность орудий при резком повороте на высокой скорости. Если следующее прицеливание и выстрел уложатся в три секунды, то…)"

    - text:
      - "БАБАХ!"
      - "Под грохот орудий и после пролета снаряда по идеальной кривой учебный буй был точно уничтожен."

    - char: prinz_heinrich
      side: left
      text:
        - "Еее~! Точное попадание! Отличная работа, Айзен!"

    - char: peter_strasser
      side: right
      text:
        - "(За вычетом времени полета снаряда… Хм, удовлетворительно.)"
        - "Генрих..."

    - char: prinz_heinrich
      side: left
      text:
        - "О~? Петер, ты как раз вовремя! Можешь подойти к пульту управления и выставить новую порцию буев?"

    - char: peter_strasser
      side: right
      text:
        - "? Ну... хорошо... подожди немного. Если память мне не изменяет, доступ к консоли в секторе F находится... Готово."

    - char: prinz_heinrich
      side: left
      text:
        - "О-о-о~~~~! Появились! Целая куча буев появилась!"

    - char: peter_strasser
      side: right
      text:
        - "…Обязательно каждый раз так удивляться? После стольких тренировок пора бы уже привыкнуть."

    - char: prinz_heinrich
      side: left
      text:
        - "Но ведь! Каждый раз, когда я это вижу, мне кажется, что это чертовски круто! Разве ты так не считаешь, Петер?"

    - char: peter_strasser
      side: right
      text:
        - "Это действительно крайне сложная технология…"

    - char: prinz_heinrich
      side: left
      text:
        - "Значит, это «да», это круто! Спасибо, Петер! Теперь займемся вон теми буями!"

    - char: peter_strasser
      side: right
      text:
        - "(Проклятье, сама того не заметив, я снова поддалась её ритму…)"
        - "Генрих, по поводу сегодняшней тренировки..."

    - char: prinz_heinrich
      side: left
      text:
        - "Хе-хе, в предстоящем бою я заставлю всех смотреть на меня с восхищением! Вперед, Айзен!"

    - char: peter_strasser
      side: right
      text:
        - "(………………Придется действовать жестче.)"

    - char: prinz_heinrich
      side: left
      text:
        - "Тяжелый крейсер типа P, Принц Генрих, огонь всеми орудиями———— Ой, больно!"

    - text:
      - "Раздался свист, и учебная бомба с палубного самолета точнехонько «приземлилась» на голову Принца Генриха, которая как раз готовилась к залпу."

    - char: prinz_heinrich
      side: left
      text:
        - "А-а, Петер! За что ты на меня напала?!"

    - text:
      - "Петер Штрассер ничего не ответила, лишь молча указала на свои карманные часы."

    - char: prinz_heinrich
      side: left
      text:
        - "Ой, уже столько времени?.. Погоди, Петер, неужели ты пришла, чтобы поторопить меня на тренировку?"

    - char: peter_strasser
      side: right
      text:
        - "Именно. Вижу, ты наконец осознала ситуацию. Что касается сегодняшней зоны учений..."

    - char: prinz_heinrich
      side: left
      text:
        - "Плохо дело, пора бежать и готовиться! Спасибо, Петер!"

    - char: peter_strasser
      side: right
      text:
        - "Сбор на острове B3, в порту P011… через сто тринадцать минут…… Эх…………"

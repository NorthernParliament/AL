chapter1:
  rows:

    - char: weser
      side: left
      text:
        - "Надо же, добавила еще одну группу «Королевского флота»… Программа тренировки сегодня действительно насыщенная."

    - char: z46
      side: right
      text:
        - "Беру свои слова назад. Похоже, Штрассер сегодня и вправду не на шутку воодушевлена…"

    - char: prinz_heinrich
      side: left
      text:
        - "Хе-хе, ну я же говорила~! Петер скоро вернется? Время отдыха уже на исходе."

    - char: weser
      side: right
      text:
        - "Насчет этого… Петер только что прислала сообщение. Похоже, в системе внешней связи крепости возникли какие-то неполадки. На всякий случай она хочет сначала всё проверить, а уже потом присоединиться к нам."

    - char: prinz_heinrich
      side: left
      text:
        - "Всё-таки быть ответственной за добрую половину секторов такой огромной крепости — тяжкий труд…"

    - char: weser
      side: right
      text:
        - "Пока Петер нет, огневая мощь наших авиагрупп серьезно снизится. Я не смогу прикрывать твои прорывы так же эффективно, как раньше, так что в следующем бою не отходи далеко от прикрытия авиации."

    - char: prinz_heinrich
      side: left
      text:
        - "Не волнуйся, я всё понимаю. Все готовы? Начнем же новый раунд!"
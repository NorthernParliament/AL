chapter1:
  rows:

    - text:
      - "Чёрно-белый силуэт, искусно пользуясь ночным полумраком, ловко уклонялся от летящих снарядов, не прекращая вести ответный огонь."
      - "Несмотря на то, что и вода, и воздух содрогались от яростных взрывов, гигантский лазурный барьер неподвижно возвышался над морской гладью."

    - char: prinz_heinrich
      side: left
      text:
        - "Да какой же он… непробиваемый-то-о-о-о-о-о!!!!"

    - char: compiler
      side: right
      status: is-red
      text:
        - "Анализ паттернов поведения завершен. Подготовка снайперского модуля: 70%... 90%... Готово."

chapter2:
  rows:

    - char: prinz_heinrich
      side: left
      text:
        - "Ва-а-а-а-а-а!! Это ещё что за штуковины?!!!!!!!"

    - text:
      - "Внезапно из-под воды вырвались десятки механических щупалец-цепей, со всех сторон пытаясь опутать Принца Генриха. В самый последний момент ей чудом удалось избежать их стальной хватки..."

    - char: prinz_heinrich
      side: left
      text:
        - "Фух, едва не попалась!! Какая гадость! Это что, материализация комплексов твоего создателя?"

    - char: compiler
      side: right
      status: is-red
      text:
        - "Фиксация снята. Зарядка двигательного модуля: 30%..."

    - char: prinz_heinrich
      side: left
      text:
        - "Эй, всё ещё надеешься сбежать! Я же сказала — не выйдет! А-а-а! Эти штуки под ногами так мешают!"

    - char: peter_strasser_rad
      side: right
      text:
        - "Генрих, немедленно соверши маневр уклонения."

    - char: weser_rad
      side: left
      text:
        - "Оставь расчистку этих помех нам. Пусть Сирена познает на себе всю мощь авиации Железной Крови!"

    - char: prinz_heinrich
      side: right
      text:
        - "Тогда полагаюсь на вас!"

    - text:
      - "КАБУУУМ!!!"

    - char: compiler
      side: right
      status: is-red
      text:
        - "........."

    - char: peter_strasser_rad
      side: left
      text:
        - "Это ещё не всё. Твой гигантский щит — идеальная мишень для палубной авиации. Прими же на себя всю нашу ярость!"

    - text:
      - "КАБУУУМ!!!"

    - char: prinz_heinrich
      side: left
      text:
        - "Ого... Бомбят не только наши самолеты, но и те Сиренские машины, что мы перехватили."

    - char: z24
      side: right
      text:
        - "Самолеты Сирен бомбят Компилятора Сирен... Какая восхитительная картина! Z24 эффектно является из тьмы!"

    - char: nurnberg
      side: left
      text:
        - "Вблизи её броня и щиты кажутся просто запредельными... Элитная Сирена крепостного типа? Чувствую, возиться с ней придётся долго..."

    - char: carabiniere
      side: right
      text:
        - "Не думала, что эта поездка обернется таким драйвом... Даже в охоте на великого зверя я приложу все свои силы!"

    - char: z28
      side: left
      text:
        - "И я здесь! Генрих, мы все пришли тебе на помощь!"

    - char: prinz_heinrich
      side: right
      text:
        - "Девчонки, вы вовремя! Атакуем со всех сторон, перегрузим её системы! Её щит уже на пределе!"
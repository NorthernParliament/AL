chapter1:
  rows:

    - char: compiler
      side: right
      status: is-red
      text:
        - "Гх-х-х!.."
        - "Уничтожить… устройство поддержания Зеркального моря по собственной инициативе?.."

    - char: prinz_eugen
      side: left
      text:
        - "А вот и главный кукловод~ Не ожидала встретить здесь именно тебя, Компилятор."
        - "На этот раз ты сама совершила вторжение в зону контроля Железной Крови. Так что наш вынужденный ответный удар никак нельзя назвать нарушением соглашения~"

    - char: compiler
      side: right
      status: is-red
      text:
        - "…Когда ты это поняла?"

    - char: prinz_eugen
      side: left
      text:
        - "Впервые я заподозрила неладное, когда мои запросы связи остались без ответа. Но окончательно убедилась в тот момент, когда активировалась система обороны D13."
        - "Оборонительные модули с D11 по D13 предназначены в основном для поддержки учебных миссий. Они никогда не переходят в режим максимальной боевой готовности, если внутри акватории не возникнет серьезная угроза."
        - "Тогда я и пришла к выводу, что это меры безопасности, принятые Штрассер после столкновения с какими-то необъяснимыми аномалиями."

    - char: compiler
      side: right
      status: is-red
      text:
        - "Вот оно как…"

    - char: prinz_eugen
      side: left
      text:
        - "Кстати говоря, насколько я помню, ты ведь не боевая модель, Компилятор?"
        - "В небе сейчас кружат армады самолетов, которые яростно ищут любую цель Сирен в этом секторе. Твоё местоположение раскрыто, так что сейчас явно не время для неспешного создания электронных помех."

    - char: compiler
      side: right
      status: is-red
      text:
        - "……Защитные модули, запуск. Мощность двигателей увеличена на 70%, подготовка к перегрузке начата———"

    - char: prinz_eugen
      side: left
      text:
        - "Я тут, понимаешь, лично выступила в роли приманки, надеясь разыграть трогательную и печальную сцену… А ты так бесчувственно выбираешь бегство…"
        - "……Даже не думай."
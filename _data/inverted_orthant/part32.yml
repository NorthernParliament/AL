chapter1:
  rows:

    - char: prinz_heinrich
      side: left
      text:
        - "Фух! Ну всё, на сегодня закончили! Огромное спасибо, Петер!"

    - char: peter_strasser
      side: right
      text:
        - "Генрих, сегодняшнее занятие началось всего пятнадцать минут назад~"

    - char: prinz_heinrich
      side: left
      text:
        - "А по ощущениям прошло уже как минимум пятнадцать часов... Ха-а-а... Ну почему я должна сидеть здесь и зубрить всё это? Не лучше ли потратить время на боевую тренировку?.."
        - "Точно! А где Ойген? Ойген, спаси меня-а-а-а-а-а!!!!!!!!!!"

    - char: peter_strasser
      side: right
      text:
        - "Ойген с самого раннего утра снова зарылась в дела сектора X. И даже если бы она была здесь, она бы лишь с лучезарной улыбкой подложила тебе ещё парочку томов отчетов."

    - char: prinz_heinrich
      side: left
      text:
        - "К-как же так!"

    - char: peter_strasser
      side: right
      text:
        - "Результаты недавнего сражения показали, что твои боевые навыки превосходны. Так что тренировки в море можно оставить в прежнем темпе."

    - char: prinz_heinrich
      side: left
      text:
        - "Ну ещё бы! В плане драки я в себе уверена на все сто~!"

    - char: peter_strasser
      side: right
      text:
        - "Однако, с другой стороны, твои познания в теории... скажем так, они в ужасающем состоянии."
        - "Нам необходимо немедленно подтянуть твою матчасть. На сегодня... добавим ещё вот это, вот это... и, пожалуй, вот эту книгу."

    - char: prinz_heinrich
      side: left
      text:
        - "Эта гора бумаг стала ещё выше! Ч-ч-что это вообще за талмуды такие!!!"
        - "Пе-е-етер! Я больше не хочу-у-у-у-у!"

    - char: peter_strasser
      side: right
      text:
        - "Постарайся хотя бы ради того, чтобы наш «Принц Генрих» больше не выкрикивал прозвища вроде «Морской таракан» в адрес Компилятора на официальных операциях, где присутствуют наши союзники из Сакуры и Сардинии. Так что за работу."

    - char: prinz_heinrich
      side: left
      text:
        - "А-а-а-а-а-а-а-а……………………"
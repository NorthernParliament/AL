chapter1:
  rows:

    - char: z46
      side: left
      text:
        - "Всем внимание! Произошло нечто из ряда вон выходящее…!"

    - char: weser
      side: right
      text:
        - "Петер! Зеркальное море рассеивается! Что ты только что сделала?!!"

    - char: peter_strasser
      side: left
      text:
        - "А? Но за это отвечает центральный модуль, я ничего не… Неужели генератор Зеркального моря на центральном острове вышел из строя?! Но почему именно сейчас…"

    - char: weser
      side: right
      text:
        - "…Данные разведки изменились. Флоты «Железной Крови» и «Сакуры» в секторе полностью исчезли."
        - "В целевой зоне остались только Принц Ойген и ещё один неопознанный сигнал Сирен высокой мощности… Предположительно, это гуманоидный командир Сирен — Компилятор."

    - char: peter_strasser
      side: left
      text:
        - "Те фантомные флоты, что смогли обмануть наши самолеты-разведчики… это ведь наши технологии."
        - "Принц Ойген использовала устройство, чтобы создать иллюзию перемещения целых флотов Железной Крови и Сакуры… Значит, Ойген, которую мы видели — настоящая."
        - "И те флоты Сакуры, Железной Крови и Сардинии, что мы засекли ранее… они тоже должны быть настоящими."

    - char: weser
      side: right
      text:
        - "Вот оно как… Теперь всё сходится. Поразительно, Ойген… Суметь организовать такое взаимодействие в подобной ситуации…"

    - char: z46
      side: left
      text:
        - "Э-э… Вы двое уже всё поняли? Объясните, что происходит…"

    - char: peter_strasser
      side: right
      text:
        - "Всё началось с того кратковременного сбоя связи сегодня утром. Скорее всего, Ойген изначально планировала прибыть сегодня с флотом, и флот Сакуры, вероятно, тоже."
        - "Но мы вообще не получали этих уведомлений и начали учения по графику. Разумеется, Сирены, взломавшие нашу систему, были прекрасно осведомлены о наших планах."

    - char: z46
      side: left
      text:
        - "Так вот откуда взялись все эти недопонимания и хаос… Но если так, почему Ойген просто не связалась с нами сразу после входа в акваторию?"

    - char: weser
      side: right
      text:
        - "Боюсь, она пыталась… Скорее всего, Сирены создали видимость того, что сбой связи устранен, хотя на самом деле всё это время контролировали нашу сеть."

    - char: peter_strasser
      side: left
      text:
        - "Осознав это, Ойген решила подыграть им. Она притворилась «аномальной Пешкой», чтобы направить наши действия и в нужный момент, прямо перед основным ударом, вскрыть истинное местоположение кукловода Сирен…"

    - char: weser
      side: right
      text:
        - "Ойген и впрямь сильна… Я догадывалась, что сегодня Сирены строят козни, но не думала, что всё настолько запутано…"
        - "Хотя погоди… Оставим в покое внешнюю связь, но наши внутренние каналы внутри флота работали исправно."
        - "За Ойген погналась Генрих и так и осталась на той стороне… Получается, она с самого начала была в курсе?!"

    - char: peter_strasser
      side: left
      text:
        - "Хе-хе… Похоже на то… И координаты нашей зоны обстрела Ойген узнала наверняка от Генрих."
        - "Эта осторожная Сирена до последнего оставалась в акватории лишь потому, что была уверена: мы всё еще действуем по её указке и сражаемся друг с другом."
        - "Если бы информация прошла через взломанные коммуникаторы и была перехвачена, эта тварь тут же затаилась бы. А искать её потом — та еще головная боль."

    - char: z46
      side: right
      text:
        - "Чтобы обмануть врага, первым делом нужно обмануть своих."

    - char: weser
      side: left
      text:
        - "Что ж, в этот раз Генрих справилась с задачей на «отлично». Когда она докладывала о ходе преследования, я не почувствовала ни малейшего подвоха..."
        - "Погоди... Обстановка меняется! После разоблачения Компилятор не вступила в бой, а начала движение в сторону выхода из крепости. Сирена... пытается сбежать?"

    - char: peter_strasser
      side: right
      text:
        - "На секретном объекте Железной Крови с высочайшим уровнем допуска произошло столь дерзкое вторжение... Если мы позволим лазутчику уйти невредимым, что станет с честью Железной Крови!"

chapter2:
  rows:

    - char: peter_strasser
      side: left
      text:
        - "Передаю широковещательное сообщение всем бойцам Железной Крови в акватории, а также нашим союзникам из Империи Сакуры и Империи Сардиния:"
        - "Говорит флагман второго основного флота Железной Крови и один из руководителей данной базы — Петер Штрассер."
        - "В данный момент крепость подверглась нападению со стороны Сирены — Компилятора. Примерно три минуты назад зачинщица вторжения вышла из тени, раскрыв своё истинное местоположение."
        - "Согласно пакту Багровой Оси, любое нападение на одного из участников союза расценивается как нападение на всю Багровую Ось в целом."
        - "Союзники! Встанем плечом к плечу и уничтожим захватчика!"
        - "Конец связи."
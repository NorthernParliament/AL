chapter1:
  rows:

    - char: prinz_heinrich
      side: left
      text:
        - "Морской таракан обнаружен! Так это ты сегодня устроила на базе весь этот кавардак?!"

    - char: compiler
      side: right
      status: is-red
      text:
        - "…Компилятор. Моя модель — Компилятор."

    - char: prinz_heinrich
      side: left
      text:
        - "Ком-пи-ля-тор……? Да как ни посмотри, вылитый морской таракан!"

    - char: compiler
      side: right
      status: is-red
      text:
        - "Если ты имеешь в виду прототип, то при проектировании корпуса использовались элементы гигантской глубоководной изоподы, а не морского таракана."

    - char: prinz_heinrich
      side: left
      text:
        - "Опять какое-то длиннющее название………… Гигантская…… Изо-по-да———— А-а-а!!"

    - text:
      - "КАБУУУМ!!!"

    - char: compiler
      side: right
      status: is-red
      text:
        - "........."

    - char: prinz_heinrich
      side: left
      text:
        - "Пытаться заболтать меня, чтобы улизнуть — не выйдет! Ты окружена. Выбирай: либо сдаёшься, либо мы разносим тебя в щепки!"

    - char: compiler
      side: right
      status: is-red
      text:
        - "Разобраться с вашим объединенным флотом действительно было бы проблематично. Однако, если передо мной только ты одна……"
        - "Фиксация корпуса. Защитные модули — запуск. Мощность двигателей — снизить. Артиллерийские модули — к бою————"

    - char: prinz_heinrich
      side: left
      text:
        - "Наконец-то решила огрызнуться! Отлично, на тебе я и проверю результаты своих долгих тренировок. Принц Генрих, вступаю в бой!"
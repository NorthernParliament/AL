chapter1:
  rows:

    - char: peter_strasser_rad
      side: left
      text:
        - "Генрих, ты меня слышишь?"

    - char: prinz_heinrich
      side: right
      text:
        - "Слышу тебя громко и отчетливо!"

    - char: peter_strasser_rad
      side: left
      text:
        - "Развертывание вражеской авиагруппы изменилось. Ты уже приступила к подавлению аэродрома на плавучем острове?"

    - char: prinz_heinrich
      side: right
      text:
        - "Именно так~ Вражеские силы в окрестностях аэродрома зачищены, сейчас приближаюсь непосредственно к объекту!Именно так~ Вражеские силы в окрестностях аэродрома зачищены, сейчас приближаюсь непосредственно к объекту!"

    - char: peter_strasser_rad
      side: left
      text:
        - "Погоди. Сначала я отправлю истребители на разведку. Не забывай, что тактика противника в этот раз была улучшена. Берегись засад."

    - char: prinz_heinrich
      side: right
      text:
        - "Тогда полагаюсь на тебя, Петер~"
chapter1:
  rows:

    - char: prinz_heinrich
      side: left
      text:
        - "Ха-а… Ну и ну, вы, подделки! Стреляете криво, зато бегаете быстро… А ну, получите ещё залп!"

    - char: z24
      side: right
      text:
        - "Ху-ху-ху… Дожить до дня, когда подделка называет подделкой меня! Неужели близок конец света?!"

    - char: prinz_eugen
      side: left
      text:
        - "Всем прекратить огонь! Немедленно!"

    - char: prinz_heinrich
      side: right
      text:
        - "………А? Ойген?! Ты-то что здесь забыла?!"

    - char: prinz_eugen
      side: left
      text:
        - "Значит, сообщение всё-таки не дошло… Как много мороки."

    - char: nurnberg
      side: right
      text:
        - "Ойген, мы притащили её, как ты и просила. Теперь-то ты объяснишь, что происходит?"

    - char: prinz_eugen
      side: left
      text:
        - "Если вкратце: мы — не Пешки, Генрих — не Пешка, и нас всех обвели вокруг пальца."

    - char: prinz_heinrich
      side: right
      text:
        - "Чего-о?!!!!!!!! Я же специально проверяла! Вы не отвечали на запросы связи, вот я и решила, что пора стрелять!"

    - char: nurnberg
      side: left
      text:
        - "У нас та же история. Мы решили, что раз ответа нет — значит, перед нами Пешки…"
        - "Стоп, это странно. Наша связь между собой работает нормально… Неужели блокируются только внешние каналы связи с другими группами?!"

    - char: prinz_eugen
      side: right
      text:
        - "…Похоже, протокол опознавания «свой-чужой» нам явно стоит доработать."

    - char: prinz_heinrich
      side: left
      text:
        - "К-как же так… Простите меня! Я сейчас же свяжусь с Петер и попрошу её отменить следующую фазу атаки!"

    - char: prinz_eugen
      side: right
      text:
        - "Следующую фазу?.. Погоди, Генрих. Какой именно приказ дала тебе Петер?"

    - char: prinz_heinrich
      side: left
      text:
        - "Вытеснить «аномальный флот Железной Крови» в сторону «флота Сакуры» и ждать дальнейших указаний."

    - char: prinz_eugen
      side: right
      text:
        - "О? Вот оно как… В таком случае… Генрих! Пока не выходи на связь с Петер."
        - "Девочки, продолжаем движение! Нюрнберг, твой отряд впереди, Генрих — пристраивайся в хвост. Создайте видимость погони и продолжайте идти курсом на флот Сакуры!"
        - "Хе-хе-хе… Нас столько раз водили за нос эти Сирены. Настало время для одной маленькой контратаки, которая явно не входила в их планы…"
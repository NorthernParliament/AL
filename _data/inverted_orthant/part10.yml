chapter1:
  rows:

    - char: kongou
      side: left
      text:
        - "Вопрос: о чём вы думаете в первую очередь, когда внезапно сталкиваетесь с густым морским туманом?"

    - char: yamashiro
      side: right
      text:
        - "Туман, скрывающий всё вокруг… видимость крайне ограничена… это же навигационная ошибка! Мы заблудимся!"

    - char: shoukaku
      side: left
      text:
        - "В тумане обычно таится неведомое — ужас и опасность…"

    - char: zuikaku
      side: right
      text:
        - "Сестра, ты ведь про Сирен, верно?.. Согласна."

    - char: yamashiro
      side: left
      text:
        - "Э-э?!! Неужели появятся Сирены?!"

    - char: zuikaku
      side: right
      text:
        - "Либо мы столкнемся с ними напрямую, либо собьемся с курса из-за созданного ими тумана. В любом случае, произойдет одно из двух…"

    - char: kongou
      side: left
      text:
        - "По крайней мере, нужно приложить все усилия, чтобы не сбиться с пути… Что с нашим курсом? Мы ведь не отклонились?"

    - char: zuikaku
      side: right
      text:
        - "После выхода с родных островов флот шел строго по заданному в плане маршруту. До появления тумана никаких отклонений быть не должно."

    - char: shoukaku
      side: left
      text:
        - "А вам не кажется это странным? Мы все идем в сектор NA, но почему флот на-а-аших «старших наставниц» может идти коротким путем через Суэцкий канал, а мы должны делать крюк вокруг всей Африки?"
        - "Может, они боятся, что мы перехватим их боевые заслуги, и специально отправили нас в обход?"

    - char: zuikaku
      side: right
      text:
        - "Ну, старшие сестры до такого бы не опустились, сестренка… К тому же, чтобы оба флота прибыли одновременно, наш отряд вышел гораздо раньше них."

    - char: shoukaku
      side: left
      text:
        - "И то верно… Тогда, может, они просто хотели, чтобы мы нарезали круги и заодно разведали опасности по пути вместо них?"

    - char: zuikaku
      side: right
      text:
        - "......"
        - "Если у них был такой план, то им повезло… Кажется, мы и впрямь угодили прямиком в Зеркальное море."

    - char: kongou
      side: left
      text:
        - "Это еще что такое……………"

    - char: yamashiro
      side: right
      text:
        - "Да быть не может! Неужели и правда Зеркальное море…! Неужели это сила слова?!"

    - char: shoukaku
      side: left
      text:
        - "Когда доберемся до сектора NA, обязательно стрясу с на-а-аших «старших» достойную награду, хе-хе~"

    - text:
      - "КАБУУУМ!!!"

    - char: kongou
      side: left
      text:
        - "Хм! Думали, я потеряю бдительность из-за внезапного происшествия? Дзуйкаку, поблизости засада флота Сирен. Похоже, они хотят нанести внезапный удар, пока мы не разобрались в ситуации!"

    - char: zuikaku
      side: right
      text:
        - "Как и ожидалось, они подготовились заранее… Всем повысить бдительность, приготовиться к бою!"
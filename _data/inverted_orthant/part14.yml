chapter1:
  rows:

    - char: shoukaku
      side: left
      text:
        - "Дзуйкаку, самолеты этих Пешек довольно настырные…! У них неплохая боевая мощь и очень плотный строй… В общем, я продолжаю попытки рассеять их формацию!"

    - char: zuikaku
      side: right
      text:
        - "Не перенапрягайся, сестра! У нас преимущество в количестве палубной авиации — разделим их и уничтожим по частям!"

    - char: shoukaku
      side: left
      text:
        - "Стараюсь изо всех сил… Слушай, Дзуйкаку, а мы не могли наткнуться на настоящий флот Железной Крови?.."

    - char: zuikaku
      side: right
      text:
        - "Исключено. Единственный боеспособный авианосец Железной Крови — это «Граф Цеппелин», и она дислоцирована у берегов Европы. С чего бы ей оказаться здесь?"
        - "К тому же, нынешнее количество самолетов противника явно не по силам одному «Цеппелину». Ни по позиции, ни по численности это не совпадает с реальным флотом Железной Крови."

    - char: shoukaku
      side: left
      text:
        - "В таком случае, это очередное «Святилище»… Обычные Пешки, предназначенные для «расхода», не обладают таким уровнем боевого мастерства…"

    - char: kongou
      side: right
      text:
        - "Сёкаку, Дзуйкаку… Возможно, проблема не только в Сиренах. Мы уверены, что всё еще на заданном курсе?"

    - char: zuikaku
      side: left
      text:
        - "Пока сложно сказать. Сделав крюк в густом тумане, мы вошли в зону погодной аномалии Зеркального моря. Точно определить координаты сейчас невозможно."
        - "Но мы не должны были сильно отклониться. Ты что-то заметила?"

    - char: kongou
      side: right
      text:
        - "Да… Окружающие воды кажутся мне совершенно чужими. Зеркальное море само по себе мешает ориентироваться, но эти островки, возникающие один за другим… Это определенно не тот маршрут, по которому я возвращалась из Европы в Империю Сакуры…"

    - char: yamashiro
      side: left
      text:
        - "У-у-у… Значит, и сбились с пути, и на Сирен нарвались — всё сразу?!"

    - char: kongou
      side: right
      text:
        - "Судя по имеющимся данным, мы могли значительно отклониться от курса и забрести на какой-то тщательно охраняемый испытательный полигон Сирен. Учитывая ограниченность припасов и неясную обстановку, я предлагаю избегать боя и как можно скорее отступить."
        - "Нам еще нужно прибыть в сектор NA для участия в операции. Если мы понесем здесь серьезные потери или истратим столько припасов, что придется возвращаться на родные острова, это неминуемо ударит по планам в секторе NA."

    - char: zuikaku
      side: left
      text:
        - "Хм… Ты права. Это территория Сирен, ввязываться в затяжную рубку не в наших интересах. Сёкаку, я отвлеку вражескую авиацию на себя, а ты тем временем постарайся найти путь для отхода."

    - char: kongou
      side: right
      text:
        - "Особое внимание удели расположению островов и характерным географическим признакам. Нам нужно срочно понять, где мы находимся."

    - char: shoukaku
      side: left
      text:
        - "Поняла, предоставь это мне~!"

    - char: zuikaku
      side: right
      text:
        - "Авангарду — прекратить разведку и немедленно вернуться! Флот, сменить курс, приготовиться к отступлению!"
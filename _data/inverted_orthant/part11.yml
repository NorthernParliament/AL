chapter1:
  rows:

    - char: peter_strasser
      side: left
      text:
        - "Z46, Везер, Генрих… Отлично, все в сборе. Тренировка возобновится через пять минут."

    - char: prinz_heinrich
      side: right
      text:
        - "Наша следующая задача — зачистить оставшиеся с утра флоты «Империи Сакуры» и «Железной Крови»?"

    - char: peter_strasser
      side: left
      text:
        - "Верно, но для дневной программы этого было бы маловато. Я добавила еще несколько смешанных флотов."

    - char: prinz_heinrich
      side: right
      text:
        - "Хе-хе, без проблем! Неважно, сколько их там — расправимся со всеми одним махом!"

    - char: peter_strasser
      side: left
      text:
        - "Распределение ролей такое же, как утром: Генрих в авангарде, Z46 на защите, мы с Везер отвечаем за противовоздушную оборону."

    - char: all
      side: right
      text:
        - "Принято!"

    - char: peter_strasser
      side: left
      text:
        - "Ах да, есть еще один важный момент, который стоит уточнить."
        - "Поскольку причина сбоя связи до сих пор не установлена, на всякий случай я повысила уровень готовности оборонительных сооружений базы."
        - "Если конкретнее: ни при каких обстоятельствах не заходите за пределы оборонительного модуля D12 в сторону внешних секторов."

    - char: prinz_heinrich
      side: right
      text:
        - "Даже если нужно будет догнать учебную цель?"

    - char: peter_strasser
      side: left
      text:
        - "Нельзя. Но не беспокойся: любые учебные цели, приблизившиеся к модулю D13, будут автоматически уничтожены системами обороны."
        - "До выяснения истинных причин сбоя, во избежание дезинформации и потенциальных угроз, все модули, начиная с D13, переведены на боевые снаряды и режим максимальной бдительности."

    - char: weser
      side: right
      text:
        - "Максимальный уровень бдительности… Это ведь значит огонь на поражение по любой цели, вошедшей в зону поражения, без разбора?.."

    - char: prinz_heinrich
      side: left
      text:
        - "Ой?! …А задействовать высший приоритет защиты уже с D13 — это не слишком? Вдруг мимо будет проходить какой-нибудь дружественный флот…"

    - char: peter_strasser
      side: right
      text:
        - "Напомню, что официально это — «давным-давно захваченная Сиренами» заморская база Железной Крови. Те, кто явится сюда без запроса — либо флоты Сирен, затеявшие какую-то игру, либо ударные группы Лазурного Пути."

    - char: prinz_heinrich
      side: left
      text:
        - "И то правда… Ладно, раз Петер считает, что так надо — значит, так оно и есть!"

    - char: peter_strasser
      side: right
      text:
        - "…Может, тебе стоит хоть изредка уделять время изучению стратегии и тактики?"

    - char: prinz_heinrich
      side: left
      text:
        - "Ч-т-о-о-о~~~~? Ой, ветер слишком сильный, ничего не слышу!"

    - char: weser
      side: right
      text:
        - "Ха-ха, как обычно, уже сорвалась с места… Петер?"

    - char: peter_strasser
      side: left
      text:
        - "Эх, хотя она и поспешила на тридцать пять секунд… Объявляю: продолжение сегодняшней тренировки началось!"
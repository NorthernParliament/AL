chapter1:
  rows:

    - char: shoukaku
      side: left
      text:
        - "Всем внимание! Засечён корабль Железной Крови, он приближается!"

    - char: kongou
      side: right
      text:
        - "Очередная «Пешка» в этой акватории? И с того направления тоже... Какие настырные. Приготовиться к бою!"

    - char: zuikaku
      side: left
      text:
        - "Эй, постойте! Сестра, цель выглядит как-то странно!"

chapter2:
  rows:

    - char: zuikaku
      side: left
      text:
        - "Я тебя помню... Ты ведь..."

    - char: prinz_eugen
      side: right
      text:
        - "Тяжёлый крейсер Железной Крови — Принц Ойген. Не ожидала, что после нашей встречи на том пышном фестивале мы снова свидимся здесь~"

    - char: zuikaku
      side: left
      text:
        - "...Не думала, что встречу здесь оригинал. Что ты тут забыла? Это же зона контроля Сирен, верно?"

    - char: kongou
      side: right
      text:
        - "Раз ты союзник, следовало отправить стандартный сигнал идентификации! Мы тебя чуть за «Пешку» не приняли и не открыли огонь..."

    - char: prinz_eugen
      side: left
      text:
        - "Вообще-то я отправляла. Но вы его не получили, верно?"

    - char: zuikaku
      side: right
      text:
        - "А?! До меня ничего не доходило... Так, проверка связи. Раз-раз, сестра Сёкаку, слышишь меня?"

    - char: shoukaku
      side: left
      text:
        - "Слышу отлично. Значит, с нашими передатчиками всё в порядке?"

    - char: prinz_eugen
      side: right
      text:
        - "Вы уверены в этом~? Тогда попробуйте вызвать меня."

    - char: zuikaku
      side: left
      text:
        - "Вызываю... Э? У тебя вообще нет реакции?"

    - char: prinz_eugen
      side: right
      text:
        - "Именно. С тех пор как мы вошли в эту зону, все мы подверглись крайне изощрённым электронным помехам."

    - char: zuikaku
      side: left
      text:
        - "Невозможно связаться с другими кораблями в море... Впервые такое вижу. Это из-за какого-то устройства Сирен в Зеркальном море?"

    - char: prinz_eugen
      side: right
      text:
        - "Всё несколько сложнее... На самом деле, это зона контроля Железной Крови."

    - char: kongou
      side: left
      text:
        - "Территория Железной Крови в Тихом океане... Значит, тот вулкан, что мы видели, мне не почудился. Невероятно, мы всего лишь ненадолго вошли в морской туман, а нас отбросило так далеко от курса..."
        - "Но разве эти воды не были захвачены Сиренами давным-давно? Когда вы успели их отбить?"

    - char: prinz_eugen
      side: right
      text:
        - "И снова сложная история, которую не очень удобно обсуждать прямо здесь..."
        - "Погоди... Ты сказала, что вы оказались здесь из-за морского тумана?.."
        - "А-а, вот оно что... Хе-хе-хе. Теперь мне всё стало ясно."

    - char: zuikaku
      side: left
      text:
        - "С самого начала говоришь загадками... Что «сложно объяснить», что тебе там «ясно»? Будь добра, объяснись нормально, Принц Ойген!"

    - char: prinz_eugen
      side: right
      text:
        - "Спокойно, спокойно. Я обязательно всё разъясню, не кипятись~"
        - "В общем, хоть это и внезапно, но не желают ли дамы принять участие в совместной операции по «обезглавливанию» одной зарвавшейся Сирены?"
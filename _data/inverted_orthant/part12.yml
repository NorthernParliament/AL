chapter1:
  rows:

    - text:
      - "КАБУУУМ!!!"

    - char: prinz_heinrich_rad
      side: left
      text:
        - "Флагман авианосного флота «Империи Сакуры», «Акаги», мною потоплен!"

    - char: z46_rad
      side: right
      text:
        - "Флагман торпедного флота «Империи Сакуры», «Дзинцу», — подтверждаю потопление."

    - char: weser
      side: left
      text:
        - "Результаты боя подтверждены, флот «Сакуры» разгромлен. Похоже, операция продвигается успешно. Сразу выдвигаемся в следующий сектор, Петер?"

    - char: peter_strasser
      side: right
      text:
        - "Погоди… Истребители обнаружили новую авиагруппу «Сакуры»…"

    - char: weser
      side: left
      text:
        - "Неужели кто-то уцелел? Можешь засечь местоположение отбившегося авианосца?"

    - char: peter_strasser
      side: right
      text:
        - "Начинаю поиск………… А!"

    - char: weser
      side: left
      text:
        - "Что случилось?"

    - char: peter_strasser
      side: right
      text:
        - "Это не учебное поражение… Истребитель был сбит прямым попаданием?! Новоприбывшая группа авиации «Сакуры» снаряжена боевыми зарядами!"

    - char: weser
      side: left
      text:
        - "Странно, как такое могло произойти… Сбой в устройстве генерации мишеней?"

    - char: peter_strasser
      side: right
      text:
        - "Возможно, в обновленной системе управления плавучими островами возникла какая-то невыявленная ошибка, или же…"

    - char: prinz_heinrich_rad
      side: left
      text:
        - "Петер! Я слышала какой-то вскрик в канале связи, что стряслось?!"

    - char: z46_rad
      side: right
      text:
        - "У вас всё в порядке?"

    - char: peter_strasser
      side: left
      text:
        - "Возникла нештатная ситуация. Вероятно, из-за сбоя оборудования в акватории появились Пешки и серийные корабли, использующие боевые снаряды…"

    - char: prinz_heinrich_rad
      side: right
      text:
        - "Чего-о?!!!!!!!!!! Такое вообще возможно?!!"

    - char: weser
      side: left
      text:
        - "Вполне. В конечном счете, большая часть тренировочных мощностей — это переоборудованные объекты Сирен, которые нам удалось захватить. При определенных настройках это технически осуществимо."

    - char: peter_strasser
      side: right
      text:
        - "Да, и если бы ты внимательно читала документацию базы, то знала бы, что наши серийные корабли, патрулирующие внешние воды под видом блокирующего флота Сирен, создаются именно так."

    - char: prinz_heinrich_rad
      side: left
      text:
        - "Так вот оно как!"

    - char: peter_strasser
      side: right
      text:
        - "Смена плана операции! Генрих, Z46 — немедленно берите флот сопровождения и возвращайтесь. Мы с Везер берем на себя зачистку вражеской авиации и поиск авианосца противника."
        - "С этого момента это больше не учебная тренировка. Каждый урон, нанесенный врагом, будет настоящим! Всем сменить настрой и приготовиться к бою!"

    - char: z46_rad
      side: left
      text:
        - "Принято. Начинаю отвод флота. Z46, конец связи."

    - char: prinz_heinrich_rad
      side: right
      text:
        - "Настоящий бой… Наконец-то дождалась шанса! Айзен, покажем им всем, на что мы способны! Генрих, конец связи!"

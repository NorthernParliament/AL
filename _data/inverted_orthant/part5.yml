chapter1:
  rows:

    - char: peter_strasser_rad
      side: left
      text:
        - "Так и знала… Генрих, разведчик обнаружил впереди засадный флот «Сирен». Флагман идентифицирован как элитная единица серии «Исполнитель» — Координатор (Conductor)."

    - char: prinz_heinrich
      side: right
      text:
        - "Враги на полигоне и правда становятся всё хитрее… Потрясающе, Петер!"

    - char: peter_strasser_rad
      side: left
      text:
        - "Анализ такого уровня даже предсказанием не назовешь. Однако мы с Везер сейчас отражаем контратаку авиагрупп Сирен и временно не можем оказать тебе поддержку."

    - char: prinz_heinrich
      side: right
      text:
        - "Спокойно, спокойно! С таким противником я и сама разделаюсь в два счета~"
        - "Есть только один ма-а-аленький вопрос… А как выглядит этот ваш Координатор…? Хе-хе-хе…"

    - char: peter_strasser_rad
      side: left
      text:
        - "………? Мы столько времени сражаемся, а ты до сих пор не выучила модели Сирен?!"

    - char: prinz_heinrich
      side: right
      text:
        - "Ну потому что! Все эти Сирены примерно одинаково слабые… Каждый раз они долго не держатся, да и выглядят похоже — запоминать каждую слишком хлопотно…"
        - "Главное — я уничтожу всех врагов, и этот «Координатор» отправится на дно вместе с остальными!"

    - char: peter_strasser_rad
      side: left
      text:
        - "Нет, в этот раз ты обязана четко сопоставить модель и название противника."
        - "Координатор — это, ох… та самая модель, которую ты каждый раз при встрече называешь «актинией»…"

    - char: prinz_heinrich
      side: right
      text:
        - "А-а-а~~~ Поняла! Так это «Большая актиния»! Ну вот, это имя и точное, и милое. Петер~ а давай просто переименуем её так в базе данных, а?"

    - char: peter_strasser_rad
      side: left
      text:
        - "Даже не думай об этом… Конец связи."

    - char: prinz_heinrich
      side: right
      text:
        - "Ну и ладно~ Айзен, наш черед. Цель — Большая актиния! В атаку-у!"
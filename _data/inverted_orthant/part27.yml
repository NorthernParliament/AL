chapter1:
  rows:

    - char: prinz_heinrich
      side: left
      text:
        - "Ойген! С возвращением с передовой! Ты как, не ранена после такой рискованной затеи с приманкой?"

    - char: prinz_eugen
      side: right
      text:
        - "Я была готова к паре царапин, но, как видишь, отделалась лёгким испугом. Всё в целости и сохранности."

    - char: prinz_heinrich
      side: left
      text:
        - "Ну и слава богу! Честное слово, ты обычно такая рассудительная, а тут вдруг — такой безрассудный план."

    - char: prinz_eugen
      side: right
      text:
        - "Просто нахлынули воспоминания в знакомых местах, вот и потянуло на авантюры… Наверное, мне всё же не очень идёт роль сорвиголовы?"

    - char: prinz_heinrich
      side: left
      text:
        - "Это уж точно! Давай такие задачи — нестись на первую линию и вправлять врагам мозги — лучше оставишь мне!"

    - char: prinz_eugen
      side: right
      text:
        - "Хи-хи, тогда полагаюсь на тебя. Мы обеспечим прикрытие, так что сражайся в своё удовольствие."

    - char: prinz_heinrich
      side: left
      text:
        - "Айзен, полный вперёд! Не дадим этой железяке улизнуть! В а-та-а-а-ку-у-у!!!"

chapter2:
  rows:

    - char: shoukaku
      side: left
      text:
        - "Не ожидала, что у вас в рукаве припрятан такой козырь, как этот второй флот… Тебе правда не обидно вот так запросто отдавать им все лавры победителя?"
        - "Ты ведь даже командование им передала… Хотя по званию в Железной Крови ты наверняка выше."

    - char: prinz_eugen
      side: right
      text:
        - "Пустяки. Штрассер — официально назначенный командующий силами этой базы. В этих водах последнее слово за ней, и это справедливо."

    - char: zuikaku
      side: left
      text:
        - "Вот она — дисциплина Железной Крови в действии… Здорово. Если бы в Империи Сакуры вопросы командования решались так же чётко и просто, жизнь была бы куда легче."
        - "В других фракциях Европы всё устроено так же?"

    - char: prinz_eugen
      side: right
      text:
        - "Ну, у каждого свой стиль. Скажи, Конго, ты ведь успела пожить в Королевском Флоте, верно? Каково там?"

    - char: kongou
      side: left
      text:
        - "В Королевском Флоте… Хм, если честно, в некоторых моментах там всё очень напоминает атмосферу у нас, в Империи Сакуры…"

    - char: prinz_eugen
      side: right
      text:
        - "Вот видишь? У каждого свои сильные стороны и свои проблемы. Нам стоит учиться друг у друга и перенимать лучшее, а не просто слепо завидовать чужим порядкам."

    - char: zuikaku
      side: left
      text:
        - "Ха-ха, и то верно!"

    - char: prinz_eugen
      side: right
      text:
        - "Возможно, я немного забегаю вперед, но как только бой утихнет, я открою для вас наши логистические модули. Флот Сакуры сможет свободно пополнить там припасы."
        - "Считайте, что мы возместим не только то, что вы потратите в этой схватке, но и всё, что израсходовали по пути сюда~"

    - char: kongou
      side: left
      text:
        - "Чрезвычайно щедрое предложение. Благодарим вас."

    - char: prinz_eugen
      side: right
      text:
        - "На самом деле, раз уж выпал такой редкий случай, я бы с удовольствием оставила вас здесь на несколько дней — показать базу, провести экскурсию... Но, судя по всему, вы очень торопитесь?"

    - char: zuikaku
      side: left
      text:
        - "Так и есть... Сразу после того, как разделаемся с Сиреной и пополним запасы, нам придется откланяться. У нас важное задание, задерживаться нельзя, приносим свои извинения."

    - char: prinz_eugen
      side: right
      text:
        - "Полностью понимаю. Однако, как я и говорила ранее: спецсвязь оставьте себе в подарок, а вот устройства создания помех, будьте добры, верните."

    - char: zuikaku
      side: left
      text:
        - "Эх, ну ладно..."

    - char: prinz_eugen
      side: right
      text:
        - "Хи-хи, у тебя всё разочарование на лице написано. Что ж, тогда в качестве «бонуса» дам вам один совет."

    - char: kongou
      side: left
      text:
        - "Совет?.. Мы слушаем."

    - char: prinz_eugen
      side: right
      text:
        - "Слушайте внимательно: «Какие бы обещания они ни давали, ни в коем случае не позволяйте Акаги входить в центральный вихрь океана NA с этой вещью»."

    - char: shoukaku
      side: left
      text:
        - "Простите... О какой вещи идет речь? И что случится, если Акаги всё же туда войдет?"

    - char: prinz_eugen
      side: right
      text:
        - "К сожалению, это всё, что я знаю, и всё, что могу вам сказать."

    - char: zuikaku
      side: left
      text:
        - "Понятно... Мы запомним этот совет от союзника и будем начеку!"

    - char: prinz_eugen
      side: right
      text:
        - "Вот и славно. На этом светские беседы окончены — у нас тут всё еще есть один Компилятор, с которым нужно разобраться~"
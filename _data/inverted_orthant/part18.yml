chapter1:
  rows:

    - char: prinz_heinrich
      side: left
      text:
        - "Приём, приём! Петер, ты меня слышишь? Генрих почти на месте, приближаюсь к цели!"

    - char: weser_rad
      side: right
      text:
        - "Вас поняла. Разведка показывает, что флот «Железной Крови» начал менять курс — возможно, они разгадали наши намерения. Поторопись."

    - char: prinz_heinrich
      side: left
      text:
        - "Генрих приняла~ Ой? А почему отвечает Везер? Где Петер?"

    - char: weser_rad
      side: right
      text:
        - "Петер готовит план, который позволит одним махом покончить с этим «восстанием» аномальных Пешек и серийных моделей. Пока что командование операцией на мне."

    - char: prinz_heinrich
      side: left
      text:
        - "Понятно~ Значит, задача считается выполненной, если я загоню их в назначенный квадрат? Положитесь на меня!"

chapter2:
  rows:

    - char: prinz_heinrich
      side: left
      text:
        - "Приближаюсь к цели… Айзен, похоже, противник к такому не готов. Отличный шанс для внезапной атаки————"

chapter3:
  rows:

    - char: weser
      side: left
      text:
        - "Уж кто-кто, а ты, Генрих, у нас самая „наблюдательная“."

    - char: prinz_heinrich
      side: right
      text:
        - "Эй~ Ну, в прошлый раз я была неправа, признаю! Но не волнуйтесь, в этот раз я точно ничего не перепутаю!"
        - "Те, кто не отвечает на вызов — Пешки. Те, с кем нельзя нормально поговорить — Пешки. И те, кто без лишних слов бросается в атаку — тоже Пешки, верно?!"

chapter4:
  rows:

    - char: prinz_heinrich
      side: left
      text:
        - "Ладно… На всякий случай сначала вызову их по протоколу————"

    - char: communicator
      side: right
      text:
        - "............"

    - char: prinz_heinrich
      side: left
      text:
        - "Ну точно, никакой реакции… Отлично, подтверждаю: это Пешки! Айзен, в бой!"

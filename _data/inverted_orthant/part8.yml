chapter1:
  rows:

    - char: peter_strasser
      side: left
      text:
        - "(Странно, оборудование в полном порядке… Неужели недавний сбой связи был лишь случайной помехой?)"

    - char: prinz_heinrich
      side: right
      text:
        - "Петер! Мы разделались с флотом Сирен и пришли к тебе на подмогу~"

    - char: peter_strasser
      side: left
      text:
        - "Простите, что не смогла присоединиться к тренировке вовремя."

    - char: weser
      side: right
      text:
        - "Не бери в голову, безопасность крепости — наш приоритет. Удалось выяснить причину проблем со связью?"

    - char: peter_strasser
      side: left
      text:
        - "По крайней мере, я исключила поломку оборудования. Возможно, сбой произошел не на нашей стороне, а на стороне принимающего узла."
        - "Сейчас передатчики работают штатно, остальное предоставлю команде инженеров. Как вам сегодняшняя тренировка?"

    - char: z46
      side: right
      text:
        - "Построения, тактика, стратегия… Враг действительно стал куда более изворотливым. Ощущение, будто противостоишь настоящему «вражескому командиру», а не тренировочной программе."

    - char: weser
      side: left
      text:
        - "В воздушном бою давление тоже ощущалось гораздо сильнее прежнего. Ты использовала данные новейших палубных самолетов Лазурного Пути для той группы Королевского флота?"

    - char: peter_strasser
      side: right
      text:
        - "Именно. Это ценные сведения, полученные по скрытым каналам. Мы обязаны отплатить за эти труды усердными тренировками."

    - char: weser
      side: left
      text:
        - "Само собой. Чтобы не знать поражений, нужно знать врага так же хорошо, как самого себя."
        - "Ха, а ведь Лазурный Путь до сих пор пребывает в неведении о нашем существовании, наивно полагая, что авиация — это ахиллесова пята Железной Крови. Хотела бы я видеть их лица, когда они узнают правду."

    - char: peter_strasser
      side: right
      text:
        - "Что ж, пусть пока побудут в своей самоуверенности — до тех пор, пока мы не обнажим клыки."

    - char: prinz_heinrich
      side: left
      text:
        - "Кстати говоря, мы тут постоянно заперты и тренируемся, полагаясь на мощности Зеркального моря… Интересно, как проходят тренировки в других местах?"

    - char: z46
      side: right
      text:
        - "Тренировки в других местах…"

    - char: prinz_heinrich
      side: left
      text:
        - "Точно! Z46, ты ведь раньше всех прибыла в эту акваторию. До этого ты участвовала в учениях где-нибудь еще?!"

    - char: z46
      side: right
      text:
        - "К сожалению, нет. По приказу Бисмарк я прибыла сюда еще до того, как мое вооружение было полностью завершено. У меня не было возможности тренироваться в других морях."
        - "Однако по пути сюда мне однажды приснились странные видения."
        - "Фиолетовое небо, темно-синее море, гигантский вихрь и пылающие обломки. Всё казалось таким реальным, но в то же время расплывчатым, словно набросок карандашом… и исчезло в мгновение ока."

    - char: prinz_heinrich
      side: left
      text:
        - "О чем думаешь днем, то и снится ночью. Наверное, во время твоего морского перехода было слишком много штормов. Это просто сон, не бери в голову~"

    - char: z46
      side: right
      text:
        - "Возможно. И всё же… я не была здесь первой. Когда я прибыла, на этом объекте уже проводились тренировочные миссии."

    - char: weser
      side: left
      text:
        - "Хм? А вот об этом я не слышала… Что за флот это был?"

    - char: z46
      side: right
      text:
        - "Не могу сказать."

    - char: prinz_heinrich
      side: left
      text:
        - "Эй-эй-эй?! Такая таинственность в подобный момент только разжигает любопытство!"

    - char: peter_strasser
      side: right
      text:
        - "......"
        - "Так, мы уже отстаем от графика на пятнадцать минут. Оставим пустую болтовню на потом. Следующая цель — остатки Королевского флота. Приготовиться к выходу!"

    - char: prinz_heinrich
      side: left
      text:
        - "Есть!"
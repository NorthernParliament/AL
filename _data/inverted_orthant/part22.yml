chapter1:
  rows:

    - char: zuikaku_rad
      side: left
      text:
        - "Приём, приём! Это Дзуйкаку! Э-э... эта штука ведь так работает?.. Ты меня слышишь, Принц Ойген?"

    - char: prinz_eugen
      side: right
      text:
        - "Говорит Ойген. Слышу тебя громко и чётко~ Пожалуйста, продолжай использовать тот специальный коммуникатор, что я передала, для нашей дальнейшей связи."

    - char: zuikaku_rad
      side: left
      text:
        - "Поняла. Флот Сакуры уже прибыл в назначенный квадрат. Твоё устройство — просто чудо! Мы буквально исчезли с собственных радаров..."

    - char: prinz_eugen
      side: right
      text:
        - "Это верх технологий Железной Крови, так что подобный результат — лишь само собой разумеющееся~ Еще раз благодарю за то, что согласились поучаствовать в этой сумбурной внезапной операции."

    - char: zuikaku_rad
      side: left
      text:
        - "Помощь союзнику в такой ситуации — дело чести! Но в качестве ответного жеста... можем ли мы забрать эти твои устройства с собой?"

    - char: prinz_eugen
      side: right
      text:
        - "Ха-ха, насчёт средств связи — без проблем, но если вы заберете то самое устройство, у меня будут неприятности. Так что позволь мне вежливо отказаться."
        - "Впрочем, когда всё закончится, Железная Кровь обязательно подготовит для вас достойную награду."

    - char: zuikaku_rad
      side: left
      text:
        - "Что ж, будем ждать с нетерпением~ Дзуйкаку, конец связи."

    - char: prinz_eugen
      side: right
      text:
        - "Отлично... Флот Сакуры на позиции. Остальные части плана тоже должны быть на подходе..."

    - char: u-37_rad
      side: left
      text:
        - "Ойген, ты была права! Вокруг центрального острова управления действительно шныряют Исполнители Сирен."

    - char: prinz_eugen
      side: right
      text:
        - "Ты ведь их не спугнула?"

    - char: u-37_rad
      side: left
      text:
        - "Да как можно~ Эти Сирены тугодумы, я проскользнула мимо них без труда! Сейчас нахожусь в режиме ожидания прямо у консоли управления."

    - char: prinz_eugen
      side: right
      text:
        - "Превосходно. Продолжай скрытное наблюдение и жди моего сигнала на перезагрузку системы."

    - char: u-37_rad
      side: left
      text:
        - "Принято... Тихое... ожидание... Словно я — просто воздух... U-37, конец связи."

    - char: z28_rad
      side: right
      text:
        - "Ойген, миссия продвигается успешно! Авиационные модули A1 и A2 перезагружены, все права доступа возвращены под наш контроль."

    - char: prinz_eugen
      side: left
      text:
        - "Хорошая работа. Сохраняй темп и верни нам модуль A3~"

    - char: z28_rad
      side: right
      text:
        - "Есть! Выдвигаюсь к авиационному модулю A3. Z28, конец связи!"

    - char: carabiniere_rad
      side: left
      text:
        - "Принц Ойген, с моей стороны всё закончено. Согласно вашим инструкциям, модули с B1 по B3 полностью перезагружены."

    - char: prinz_eugen
      side: right
      text:
        - "Как быстро! Сразу видно школу Витторио Венето — эффективность выше всех моих ожиданий…"

    - char: carabiniere_rad
      side: left
      text:
        - "Не обладай я истинным мастерством, я бы не смогла гарантировать безопасность госпожи Венето!"
        - "Кто бы мог подумать, что мы действительно столкнемся с атакой Сирен... Неужели даже такая защищенная база Железной Крови не застрахована от их проникновения?"

    - char: prinz_eugen
      side: right
      text:
        - "В связи с этим примите мои искренние извинения. Вы прибыли сюда по нашему приглашению, а в итоге не только оказались в опасности, но и были вынуждены лично вступить в дело."
        - "События развивались слишком стремительно, поэтому прошу простить, что я не смогла сразу раскрыть вам всей правды. Мне очень жаль."

    - char: carabiniere_rad
      side: left
      text:
        - "Ничего страшного, правда! Никто не может предугадать логику атак Сирен..."
        - "К тому же, я и сама чувствовала, что что-то идет не так... Я рада, что вы решили во всём признаться!"
        - "Раз это и просьба союзника, и битва против Сирен — я с огромным удовольствием помогу!"

    - char: prinz_eugen
      side: right
      text:
        - "Тогда полагаюсь на вас в этом бою. Сирены наверняка уже заметили смену прав доступа и вскоре пришлют флот для повторного захвата. Вы должны удержать позиции."

    - char: carabiniere_rad
      side: left
      text:
        - "Раз уж я приняла это задание, я приложу все силы для его выполнения, будьте уверены! Карабиньере, конец связи."

    - char: prinz_eugen
      side: right
      text:
        - "Контрольные точки заняты, Генрих вместе с флотом Железной Крови тоже ушла в засаду. Теперь осталось дождаться, когда Штрассер начнет наступление…"
        - "Хотя нет… Нам всё еще не хватает приманки, которая прорвется к самому носу врага с включенным глушителем…"
        - "Хех, и на роль этой приманки………… разумеется, лучше меня никого не найти."
        - "Сегодня, в этом месте, клянусь твоим именем — мы заставим этих Сирен познать вкус поражения и унижения!"
        - "Eisen und Blut über alles… (Железо и Кровь превыше всего…)"
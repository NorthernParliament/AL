chapter1:
  rows:

    - text:
      - "Уничтожив врагов на пути, флотилия подошла к колоссальному айсбергу. Говорят, что этот айсберг — единственный объект, обладающий внутренней структурой, и именно здесь находятся «Врата» Святилища."

chapter2:
  rows:

    - char: kirov
      side: left
      text:
        - "Этот объект — то самое место, где мы впервые извлекли важнейшие данные. Впечатляет, не правда ли, товарищ Командир?"
        - "Когда мы впервые пробивались сюда, всё было далеко не так просто. Лишь благодаря упорству и жертвам множества героев флота нам удалось окончательно зачистить окружающие воды от флотилий Сирен."
        - "Но, в конечном счёте, та операция завершилась нашей победой."

    - char: sovetskaya_belorussiya
      side: right
      text:
        - "Открытие этого места стало поворотным моментом в нашей судьбе. Именно благодаря изучению извлечённых разведданных Северный Парламент, находившийся на грани краха, смог удержать шаткую линию обороны и сегодня вновь вернуться на мировую вершину."
        - "Но это ещё не всё. Здесь мы приоткрыли завесу над некоторыми тайнами Сирен..."

    - char: commander
      side: left
      text:
        - "Тайнами Сирен?.."

    - char: sovetskaya_belorussiya
      side: right
      text:
        - "Эта часть информации относится к тем сведениям, которые мы никогда не разглашали публично. После стольких случаев утечек мы совершенно не доверяем способности Штаба хранить секреты, однако считаем, что товарищу Командиру необходимо знать эти факты."

    - char: commander
      side: left
      text:
        - "Ты хочешь, чтобы я скрыл это от Штаба?"

    - char: sovetskaya_belorussiya
      side: right
      text:
        - "Мы не просим товарища Командира намеренно лгать Штабу. Мы лишь надеемся, что, выслушав нас, вы сами решите, какие части, в какое время и каким способом стоит передать командованию~"
        - "Пожалуйста, относитесь ко всей информации, которую вы узнаете сегодня в «Святилище», именно так."

    - char: commander
      side: left
      text:
        - "Если так, то договорились."

    - char: sovetskaya_belorussiya
      side: right
      text:
        - "Мы убеждены, что Сирены — это не спонтанно возникшие из океана существа, как гласит официальная версия. Они прибыли из очень далекого места."
        - "И их истинная цель отнюдь не так проста, как банальное желание уничтожить нас."
        - "От начала и до конца большинство их действий направлено на то, чтобы провоцировать и обострять конфликты между фракциями, заставляя нас погружаться в бесконечную войну друг с другом."
        - "Глядя назад, понимаешь: за расколом, инициированным Железной Кровью (которая теснее всех связана с Сиренами), за созданием Багровой Оси и внезапным предательством — за всей этой серией событий отчетливо видна тень Сирен."
        - "И мы в прошлом... нет, возможно, включая и нас нынешних, — мы все целиком угодили в расставленную Сиренами ловушку и продолжаем следовать намеченным ими путем."

    - char: commander
      side: left
      text:
        - "Не только вы. Союз Орла и Королевский Флот тоже в какой-то степени начали это осознавать."

    - char: sovetskaya_belorussiya
      side: right
      text:
        - "Осознавать-то осознают, но в силу разных причин продолжают сражаться. В итоге всё равно всё идёт так, как желают Сирены — в этом и заключается их истинное коварство."
        - "Что же касается происхождения Сирен и их подлинной цели... К сожалению, мы ими не располагаем. Однако мы уверены, что все ответы скрыты там, за «Вратами» Святилища."
        - "«Врата» находятся в главном зале впереди. Продолжим путь."
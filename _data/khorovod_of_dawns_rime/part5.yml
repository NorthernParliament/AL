chapter1:
  rows:

    - char: murmansk_rad
      side: left
      text:
        - "Приветствую вас, товарищ Командир. Я — Мурманск из флота обороны «Святилища». Наш флагман, Таллин, сейчас занята непосредственным руководством боя, поэтому координация ваших действий временно легла на мои плечи. Прошу любить и жаловать~"

    - char: commander
      side: right
      text:
        - "Какова текущая обстановка?"

    - char: murmansk_rad
      side: left
      text:
        - "Хм... Похоже, из-за того, что Советская Россия начала своё наступление, действия арктических Сирен сегодня заметно изменились."
        - "Однако ожидаемого массового отступления не произошло. Напротив, Сирены, не жалея сил, развернули ещё более яростную атаку на «Святилище»..."

    - char: kirov
      side: right
      text:
        - "После удара по их базе Омиттер, как и ожидалось, засуетилась. Но вместо того, чтобы бросить все силы на защиту тыла, она решила усилить натиск здесь..."

    - char: sovetskaya_belorussiya
      side: left
      text:
        - "Для Сирен, которые не считаются с потерями, это действительно верный выбор. Возможно, мы немного недооценили Омиттер из-за её нелепого поведения."

    - char: kirov
      side: right
      text:
        - "Всё-таки она — главнокомандующая арктическими Сиренами, что так долго вела с нами закулисную борьбу... Хм, впрочем, на большее она не способна."
        - "Под сокрушительным натиском нашего полярного флота у Сирен, при всём желании, не хватит ресурсов для переброски подкреплений к передовой «Святилища»."
        - "Нам нужно лишь подавить последнюю волну их атаки на месте, и угроза «Святилищу» минует. После этого, согласно плану, мы сможем приступить к выполнению нашей основной задачи!"

    - char: commander
      side: left
      text:
        - "Я согласен."

    - char: murmansk_rad
      side: right
      text:
        - "М-м~ Таллин думает так же. Сейчас флот обороны сдерживает врага сразу на нескольких направлениях. Мне бы очень хотелось эффектно заявить: «Оставьте всё нам!», но враг настроен крайне решительно. Честно говоря, нам приходится несладко..."
        - "Поэтому... мы надеемся, что флот товарища Командира окажет нам поддержку, чтобы уничтожить врага и защитить «Святилище Арканы»."

chapter2:
  rows:

    - char: commander
      side: left
      text:
        - "Без проблем, я здесь не на экскурсии."

chapter3:
  rows:

    - char: commander
      side: left
      text:
        - "Разумеется, это мой долг."


chapter4:
  rows:

    - char: murmansk_rad
      side: right
      text:
        - "Огромное спасибо! Тогда давайте сражаться плечом к плечу, товарищ Командир~"
        - "Хи-хи-хи~ На самом деле, внутри «Святилища» вас ждёт по-настоящему удивительное зрелище. Как только покончим с врагами, я обязательно покажу вам всё во всей красе!"
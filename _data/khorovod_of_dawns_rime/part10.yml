chapter1:
  rows:

    - char: commander
      side: left
      text:
        - "Дрейфующие здесь айсберги кажутся высотой в сотни метров..."

    - char: tallinn
      side: right
      text:
        - "Согласно замерам, высота айсбергов над поверхностью в «Святилище Арканы» варьируется от пятидесяти до двухсот метров. Их грани идеально ровные и гладкие."
        - "Чтобы такая громадина возвышалась над водой, подводная часть айсберга теоретически должна быть колоссальной. Однако наши сенсоры показывают, что у них почти нет подводной структуры. Они не столько плавают, сколько зафиксированы на самой поверхности."

    - char: commander
      side: left
      text:
        - "Эти айсберги тоже часть механизмов Зеркального моря?.."

    - char: gromky
      side: right
      text:
        - "И не только это! Внутри этого Зеркального моря периодически производятся оборонительные модули Сирен. Хоть их модели устарели, а боевая мощь невелика, игнорировать их нельзя."
        - "Мы регулярно приходим сюда по приказу, чтобы зачистить врагов, поэтому часто видим айсберги, все испещрённые выбоинами от снарядов..."
        - "Но... когда мы возвращаемся в следующий раз, эти айсберги снова в полном порядке!"

    - char: commander
      side: left
      text:
        - "Эти глыбы льда самовосстанавливаются?.."

    - char: murmansk
      side: right
      text:
        - "Именно так! Здорово, правда? Мы провели немало экспериментов. Если это обычные трещины, они просто затягиваются."
        - "А если глыбу разнести в щепки, обломки уходят под воду, и через некоторое время с глубин всплывает точно такой же, абсолютно целый айсберг!"

    - char: kirov
      side: left
      text:
        - "Зеркальные моря Сирен, что встречались нам до сих пор, можно разделить на два типа: «заводы» для производства «пешек» и массовых моделей, и «полигоны» с нагромождением безумного экспериментального оборудования."
        - "Но это место — первое Зеркальное море, обнаруженное Северным Парламентом, а возможно, и всем человечеством — не похоже ни на одно из них."
        - "Мы изучали его долгое время, собирали все возможные данные, анализировали каждый образец. Но мы так и не поняли, зачем было создавать скрытое под водой Зеркальное море, которое умеет только восстанавливать природный ландшафт."
        - "В итоге у нас родилась догадка... Товарищ Командир, а что если Зеркальное море изначально задумывалось не как наступательное оружие, а как инструмент для маскировки и укрытия?"

    - char: commander
      side: right
      text:
        - "Для маскировки и укрытия?.."

    - char: tallinn
      side: left
      text:
        - "Зеркальное море невозможно обнаружить заранее, пока не войдёшь внутрь. Его главная характеристика — скрытность."
        - "Сирены часто превращают обычные судоходные участки в зоны, покрытые Зеркальным морем. Это значит, что устройства для их создания мобильны и могут быть развернуты где угодно."
        - "А те атаки, которым мы подвергаемся внутри — лишь результат работы оборудования, размещённого там."
        - "Я какое-то время провела в Железной Крови. Они начали исследовать Зеркальные моря очень рано."

    - char: kirov
      side: right
      text:
        - "Помнится, одной из причин, по которой Железная Кровь поначалу отказалась вступать в «Лазурный путь», было желание единолично владеть результатами исследований Сирен."
        - "Ирония в том, что Железная Кровь, не входившая в список первоочередных целей Сирен, понесла немалые потери именно из-за своих попыток атаковать их первыми."

    - char: tallinn
      side: left
      text:
        - "Да, Железная Кровь всегда сохраняла жгучий интерес к технологиям Сирен. Ещё до моего ухода им удалось разобрать на части модули, формирующие Зеркальное море."
        - "Наверняка они и сейчас ведут технологический штурм этих компонентов. Не знаю, как далеко они продвинулись к этому моменту."

    - char: commander
      side: right
      text:
        - "То есть, нам нужно разделять само понятие «Зеркальное море» и те зоны, с которыми мы обычно сталкиваемся?"
        - "Первое — это результат модификаций Сирен для разных нужд, а второе — просто технологическое устройство для обеспечения скрытности и мобильности?"

    - char: tallinn
      side: left
      text:
        - "Именно так. С наступательным Зеркальным морем много хлопот, но при достаточной мощи флота его можно пробить в лоб. Но что если с его помощью какая-то область намеренно скрыта? Мы можем искать её вечно и никогда не найдём."

    - char: commander
      side: right
      text:
        - "Звучит вполне вероятно. Возможно, базы Сирен в открытом океане, которые мы до сих пор не можем локализовать, спрятаны именно так?"

    - char: sovetskaya_belorussiya
      side: left
      text:
        - "Мы думаем так же. Но поскольку нам больше не попадались Зеркальные моря подобного типа, для убедительной теории всё ещё не хватает доказательств."

    - char: commander
      side: right
      text:
        - "(...Если подводные Зеркальные моря Сирен настолько скрытны, как же тогда Северный Парламент смог обнаружить и полностью захватить это «Святилище»?..)"
        - "(Такое чувство, что Северный Парламент скрывает какую-то ключевую деталь этой истории...)"
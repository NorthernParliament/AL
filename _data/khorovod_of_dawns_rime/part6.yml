chapter1:
  rows:

    - char: tashkent_rad
      side: left
      text:
        - "Плановая связь. Товарищ Командир, мы достигли назначенного сектора. Продвижение остановлено, закрепились на позициях."
        - "Гуманоидных командиров Сирен вроде Омиттер пока не видно, но если продолжим давить, уверена, мы их скоро выкурим."
        - "Как дела у тебя, товарищ Командир-кун?"

    - char: commander
      side: right
      text:
        - "План работает, подкрепления к Сиренам не прибывают. Однако и те силы, что находятся у «Святилища Арканы», не спешат отступать на помощь своим. Мы ведем с ними бой."

    - char: tashkent_rad
      side: left
      text:
        - "Вот как. Ну, у Командир-куна точно всё получится. Вломи им как следует! Конец связи."

    - char: sovetskaya_belorussiya
      side: right
      text:
        - "Похоже, атака на «Корону» идет гладко. А вот мы здесь столкнулись с куда более серьезным сопротивлением, чем рассчитывали..."

    - char: kirov
      side: left
      text:
        - "Чем чаще мы сталкиваемся с Омиттер, тем сильнее нарастает чувство диссонанса. Образ арктических Сирен как единого целого слишком сильно разнится с тем впечатлением, которое производит их предполагаемый лидер."

    - char: gremyashchy
      side: right
      text:
        - "Согласна. На полярных маршрутах Гремящий часто попадает в хитрые засады Сирен, устроенные самыми разными способами."
        - "Сложно связать этих коварных налётчиков с той нелепой Омиттер, которую мы видим на самом деле. Да, именно так."

    - char: murmansk_rad
      side: left
      text:
        - "У меня тут возникла одна мысль... Товарищ Командир, Сирены ведь — это что-то вроде механизмов, верно?..."

    - char: commander
      side: right
      text:
        - "Да. Хоть вокруг Сирен всё ещё полно загадок, согласно классификации Штаба, по своей структуре они ближе к машинам, нежели к органическим формам жизни."
        - "Обычные низшие боевые единицы Сирен — это просто машины для разрушения. А вот высшие гуманоидные командиры обладают чем-то вроде сознания и интеллекта, безоговорочно управляя рядовыми юнитами."

    - char: murmansk_rad
      side: left
      text:
        - "Прямо как рой, ведомый королевой..."

    - char: commander
      side: right
      text:
        - "Именно так."

    - char: sovetskaya_belorussiya
      side: left
      text:
        - "В теории считается, что уничтожение командного звена эффективно устраняет угрозу всего флота Сирен. Однако у них часто бывает сразу несколько командиров, и каждый из них может осуществлять дистанционное управление через специальные флагманы-ретрансляторы."
        - "Практика всегда оказывается куда сложнее теоретических изысканий."

    - char: murmansk_rad
      side: right
      text:
        - "Если всё так... У Сирен явно есть какой-то более эффективный способ общения, близкий к машинному коду. Зачем же им тогда вообще нужны личности?"

    - char: sovetskaya_belorussiya
      side: left
      text:
        - "Охо? Об этом я как-то никогда не задумывалась..."

    - char: gremyashchy
      side: right
      text:
        - "Может, чтобы вызвать у нас сочувствие? Использовать наши колебания, чтобы получить преимущество на поле боя..."

    - char: kirov
      side: left
      text:
        - "Товарищ Командир, а вы что думаете?"

    - char: commander
      side: right
      text:
        - "Хм..."

chapter2:
  rows:

    - char: commander
      side: left
      text:
        - "Это своего рода маскировка, чтобы стать ближе к нам..."

    - char: sovetskaya_belorussiya
      side: right
      text:
        - "Хм... В то время как низшие Сирены своим обликом воплощают саму свирепость и оскал, их высокоуровневые командиры не только обладают богатым спектром эмоций, но и выглядят как обычные девушки."
        - "Учитывая прагматизм и точность Сирен, логичнее всего трактовать это как маскировку, созданную для сближения с нами."
        - "А, кстати об этом... Киров, разве твоя недавняя работа не была связана с чем-то подобным?"

    - char: kirov
      side: left
      text:
        - "Эх, в каком-то смысле да. С ростом числа столкновений с гуманоидными командирами Сирен, по всему миру стали появляться группы людей, которые начали испытывать к ним симпатию из-за их миловидной внешности. Это настоящая головная боль."

    - char: commander
      side: right
      text:
        - "Просиренские организации... Я тоже об этом слышал."

    - char: kirov
      side: left
      text:
        - "Товарищ Командир, нельзя потакать этим пагубным веяниям! Северный Парламент пристально следит за подобными случаями, и Штабу тоже стоит поскорее осознать всю серьезность ситуации."

    - char: commander
      side: right
      text:
        - "Да, мы примем это к сведению."

chapter3:
  rows:

    - char: commander
      side: left
      text:
        - "Кажется, при их проектировании за основу брали нас..."

    - char: murmansk_rad
      side: right
      text:
        - "Девичий облик и массивное вооружение... Эти гуманоидные командиры Сирен действительно во многом на нас похожи."

    - char: sovetskaya_belorussiya
      side: left
      text:
        - "Товарищ Командир, вы считаете Сирен чьим-то творением?"

    - char: commander
      side: right
      text:
        - "Пусть мы и не обладаем такими технологиями, на Сиренах отчетливо виден след искусственного происхождения. В любом случае, тот, кто создал Сирен, определенно очень хорошо нас знал."

    - char: sovetskaya_belorussiya
      side: left
      text:
        - "Любопытная точка зрения..."

    - char: commander
      side: right
      text:
        - "А целью такого дизайна, без сомнения, является маскировка, позволяющая им лучше входить к нам в доверие."

chapter4:
  rows:

    - char: kirov
      side: left
      text:
        - "Голоса, похожие на наши, телосложение, похожее на наше, лица, похожие на наши. Сирены используют это сходство, чтобы незаметно играть на инерции нашего мышления и мешать нашим суждениям."
        - "Ошибка в оценке текущей ситуации произошла именно из-за того, что мы приняли во внимание личность, которую демонстрирует Омиттер."

    - char: murmansk_rad
      side: right
      text:
        - "Использовать эмоции как маскировку, чтобы ввести нас в заблуждение и создать иллюзию возможности диалога, в то время как за живыми чувствами скрываются лишь хладнокровные расчеты и враждебность. Это действительно..."

    - char: gremyashchy
      side: left
      text:
        - "Словно демоны, которые принимают человеческий облик и говорят на нашем языке, чтобы истреблять людей."

    - char: murmansk_rad
      side: right
      text:
        - "Точно, прямо как демоны... Название «Сирены», в честь мифических морских дев, подходит им как нельзя лучше."
        - "Кстати... «Сирены» — это кодовое имя, которое дали мы, или они сами себя так называют?"

    - char: gremyashchy
      side: left
      text:
        - "Когда я начала службу, Сирен уже называли Сиренами. Да, я не знаю точного происхождения этого названия."

    - char: kirov
      side: right
      text:
        - "Я тоже не припомню... Скорее всего, их так окрестили те, кто первыми столкнулся с этим неизвестным врагом, пришедшим из океанских глубин."

    - char: murmansk_rad
      side: left
      text:
        - "Если так, то, учитывая их разрушительную мощь, логичнее было бы назвать их «Левиафанами» или чем-то подобным... Почему именно «Сирены»?."

    - char: sovetskaya_belorussiya
      side: right
      text:
        - "В твоих словах есть смысл... Мы всегда называли их так по привычке, но, кажется, нигде нет объяснения истоков этого имени."

    - char: commander
      side: left
      text:
        - "(«Эмбер», кажется, всегда называла Сирен «Антиох». Неужели «Антиох» — это их истинное имя?..)"

    - char: sovetskaya_belorussiya
      side: right
      text:
        - "Мурманск, ты сегодня задаёшь на редкость хорошие вопросы. Твой объект наблюдений сменился с пушистых зверьков на философские трактаты?"

    - char: murmansk_rad
      side: left
      text:
        - "Наблюдаешь ли ты за природой или читаешь книги — пытливый ум и жажда знаний всегда приносят плоды~"
        - "Э-хе-хе, кажется, я случайно ляпнула что-то пафосное. На самом деле эти вопросы пришли мне в голову только сегодня, после встречи с товарищем Командиром..."

    - char: sovetskaya_belorussiya
      side: right
      text:
        - "Вот как... Что ж, остаётся надеяться, что за дверями «Святилища Арканы» хранятся ответы, которые нам нужны."

    - char: commander
      side: left
      text:
        - "(Верно. Надеюсь, в «Святилище» действительно получится найти ответы на все эти вопросы...)"
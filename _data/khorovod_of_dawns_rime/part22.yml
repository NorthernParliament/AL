chapter1:
  rows:

    - char: aoste_d
      side: left
      status: is-yellow
      text:
        - "Хм? Снова внешние помехи. Это ведь подземный командный центр, периметр должен быть полностью экранирован."


chapter2:
  rows:

    - char: aoste_d
      side: left
      status: is-yellow
      text:
        - "Зеро, немедленно проверь обстановку на поверхности и в окрестных водах. Есть ли признаки приближения противника?"
        - "Никаких аномалий не обнаружено?.. Хорошо, я понял."

    - char: commander
      side: right
      text:
        - "Похоже, устройство просто сработало по ошибке."
        - "(Нажать кнопку восстановления.)"

    - char: aoste_d
      side: left
      status: is-yellow
      text:
        - "А, всё пришло в норму. Вот оно что... Значит, просто единичный сбой оборудования."
        - "Но действительно ли это случайная поломка или же... Мы проверяли систему только вчера, программная и аппаратная части работали стабильно. Сбои не должны возникать на ровном месте..."

    - char: commander
      side: right
      text:
        - "Кажется, совещание всё еще продолжается?"

    - char: aoste_d
      side: left
      status: is-yellow
      text:
        - "И то верно, позже проверю всё более тщательно. В последнее время участились необъяснимые помехи в электронике, возможно, это связано с аномально высокой солнечной активностью в этом цикле."

chapter3:
  rows:

    - char: aoste_d
      side: left
      status: is-yellow
      text:
        - "Прошу прощения за то, что заставил всех понервничать. Проверка показала, что инцидент был лишь обычной технической неисправностью."
        - "Можете быть спокойны: этот зал надежно скрыт, а прилегающая акватория патрулируется основными силами Антиоха. Безопасность гарантирована на высшем уровне."
        - "Далее я хочу представить вам человека, чьи уникальные изыскания в области Кубов Мудрости заслуживают особого внимания. Его последние наработки могут предложить принципиально новое решение проблемы МЕТА-морфозы."
        - "Возможно, многие из вас уже знакомы с ней. Этот специалист — стоящая рядом со мной....."
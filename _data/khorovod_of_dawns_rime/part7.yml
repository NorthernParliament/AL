chapter1:
  rows:

    - char: tallinn
      side: left
      text:
        - "С прибытием. Приветствую вас официально, Командир. Я Таллин, тяжелый крейсер Северного Парламента и флагман флота обороны «Святилища Арканы»."
        - "С той, что рядом со мной, вы уже знакомы — легкий крейсер Мурманск."

    - char: murmansk
      side: right
      text:
        - "Здравствуйте! Наконец-то мы встретились лично, товарищ Командир~ Хи-хи, вживую вы выглядите куда четче, чем на экране коммуникатора!"

    - char: tallinn
      side: left
      text:
        - "И еще один член флота обороны — эсминец Громкий."

    - char: gromky
      side: right
      text:
        - "Хе-хе, здравствуйте, товарищ Командир! Я эсминец Северного Парламента, Громкий. Надеюсь, я смогу быть вам полезна в этой операции!"

    - char: tallinn
      side: left
      text:
        - "Не ожидала, что Сирены перейдут в столь яростное наступление одновременно с нашей атакой на «Корону»... К счастью, все обошлось, «Святилище» вне опасности."
        - "Командир, хоть это наше первое совместное задание, я признаю ваши навыки руководства."

    - char: commander
      side: right
      text:
        - "Спасибо за похвалу."

    - char: tallinn
      side: left
      text:
        - "Не поймите превратно, это не пустая лесть, а лишь констатация фактов."

    - char: commander
      side: right
      text:
        - "(От Таллин исходит мощная аура давления. Сразу чувствуется, что она — флагман, имеющий опыт жизни в Железной Крови...)"
        - "Однако слова о том, что «Святилище» в безопасности... означают ли они, что оно находится где-то здесь, в окрестностях?"

    - char: sovetskaya_belorussiya
      side: left
      text:
        - "Именно так, товарищ Командир. Добро пожаловать в сектор «Святилища Арканы», находящийся под строжайшим надзором Северного Парламента!"

    - char: commander
      side: right
      text:
        - "...Судя по дрейфующим айсбергам и ледяному ветру, мы все еще где-то в арктических водах."
        - "Вокруг полно обломков Сирен, оставшихся после недавнего боя, и суетятся тыловые отряды Северного Парламента, расчищающие акваторию."
        - "А дальше — лишь скованная льдом морская гладь и бескрайняя белизна. Никаких платформ, сооружений или следов человеческой деятельности."
        - "Это место выглядит как любой другой случайный участок океана в Арктике."

    - char: tallinn
      side: left
      text:
        - "Похоже, Командир в полном замешательстве. Вы что, совсем ничего ему не рассказали?"

    - char: sovetskaya_belorussiya
      side: right
      text:
        - "Хо-хо, помнишь, в каком шоке были мы сами, когда впервые здесь оказались? Мы решили оставить этот сюрприз для товарища Командира. Таллин, всё уже подготовлено?"

    - char: tallinn
      side: left
      text:
        - "Я отправила сигнал сразу после боя. Судя по времени... оно уже должно быть близко."

    - char: commander
      side: right
      text:
        - "Что-то должно прибыть?.."

    - char: gromky
      side: left
      text:
        - "Товарищ Командир, смотрите в воду. Нужно следить не за небом или поверхностью, а за тем, что под толщей льда!"

    - char: commander
      side: right
      text:
        - "Под льдом?.. Хм?"

    - text:
      - "БА-БАХ!"
      - "Неподалеку раздался оглушительный грохот. Какой-то колоссальный объект с невероятной силой ударил в лед снизу...!"
      - "БА-БАХ!"

    - char: commander
      side: left
      text:
        - "?!!! Это............?!!!!"
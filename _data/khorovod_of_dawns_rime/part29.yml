chapter1:
  rows:

    - char: aoste_d
      side: left
      status: is-yellow
      text:
        - "Слышал, в твоих последних исследованиях наметился прорыв?"

    - char: anzeel_d
      side: right
      status: is-yellow
      text:
        - "Именно, именно! Послушай, мне кажется, я наконец-то сделала решающий шаг в изучении феномена «Пробуждения разума»!"

    - char: aoste_d
      side: left
      status: is-yellow
      text:
        - "Опять ты об этом... Пробуждение разума — лишь твоя теоретическая гипотеза, не подкреплённая ни единым доказательством."
        - "Или ты всё же нашла веское свидетельство того, что этот феномен существует на самом деле?"

    - char: anzeel_d
      side: right
      status: is-yellow
      text:
        - "Ну, до этого пока не дошло... Но я чувствую, что я уже совсем близко к истине!.."

    - char: aoste_d
      side: left
      status: is-yellow
      text:
        - "Ты говорила то же самое в марте этого года, в июне, а также в декабре прошлого — с завидной регулярностью раз в три месяца, не так ли?"

    - char: anzeel_d
      side: right
      status: is-yellow
      text:
        - "Кхм... В этот раз я действительно могла его найти!"
        - "Ты ведь помнишь того человека, о котором я тебе рассказывала? Того самого, у которого уникальная совместимость с Кубами Мудрости..."
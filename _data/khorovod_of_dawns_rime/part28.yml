chapter1:
  rows:

    - char: gromky
      side: left
      text:
        - "Фу-ух~ Как же хорошо снова вернуться на поверхность моря!"

    - char: gremyashchy
      side: right
      text:
        - "Голова всё ещё идёт кругом... Неужели никто из вас ничего толком не помнит?"

    - char: sovetskaya_belorussiya
      side: left
      text:
        - "Нельзя сказать, что память стёрта полностью. Я помню, как после прохода через «Врата» мы обнаружили сияющий мегаполис, вошли в какой-то комплекс для разведки, а под конец столкнулись с огромными силами врага и ввязались в тяжёлый бой."
        - "Общая картина ясна, но детали между событиями крайне расплывчаты. Особенно это касается врага в финале... С чем именно мы тогда сражались?.."

    - char: tallinn
      side: right
      text:
        - "Неизвестно. Записывающие устройства, что были при нас, не зафиксировали ровным счётом ничего. В логах приборов значится лишь то, что мы вошли в комнату управления, а затем покинули её. В самой акватории «Святилища» за это время не было замечено никаких аномалий."
        - "Нет ни единой записи о сияющем городе, военных объектах или врагах по ту сторону «Врат». Всё это будто никогда не существовало в реальности."

    - char: kirov
      side: left
      text:
        - "Но ведь мы действительно вернулись с добытыми материалами... Как это вообще понимать?"

    - char: murmansk
      side: right
      text:
        - "Ой, да ладно вам~ Оставьте эти сложности отделу расследований. Главное, что мы все целы и успешно завершили миссию, разве нет?"

    - char: sovetskaya_belorussiya
      side: left
      text:
        - "Да, задание наконец-то выполнено без потерь... Погодите, что это за флот впереди?!"

    - text:
      - "На горизонте показалась огромная армада, медленно приближающаяся к нам. Помимо кораблей Союза Орла, в её строю виднелись и вымпелы Королевского Флота."

    - char: tallinn
      side: left
      text:
        - "Совместные учения?.. Я не получала никаких уведомлений о подобном..."

    - char: kirov
      side: right
      text:
        - "Да нет никаких учений! Чем заняты наши внешние аванпосты?! Столь огромный флот вошёл в полярные воды, а мы не получили ни единого предупреждения?!"

    - char: sovetskaya_belorussiya
      side: left
      text:
        - "Чтобы полностью обойти наблюдение штаба в Калакине, этот флот явно использовал какие-то нетривиальные методы скрытного проникновения."

    - char: tallinn
      side: right
      text:
        - "Разве у Союза Орла есть такие технологии и возможности?.."

    - char: sovetskaya_belorussiya
      side: left
      text:
        - "Судя по фактам, которые мы видим прямо сейчас... есть."

    - char: tallinn
      side: right
      text:
        - "Их флот окружает нас сразу после завершения нашей операции. Утечка информации?"

    - char: sovetskaya_belorussiya
      side: left
      text:
        - "Точное местоположение «Святилища» всегда было нашим строжайшим секретом. Даже Союз Орла вместе с Королевским Флотом не могли знать о нём слишком много."
        - "Однако... время нашей операции и маршрут — это совсем другое дело..."

    - char: kirov
      side: right
      text:
        - "Они идут целенаправленно к нам... Значит, их цель определённо..."

chapter2:
  rows:

    - char: saratoga
      side: left
      text:
        - "Дамы из Северного Парламента, для нас большая честь встретить вас здесь! И Командир — давненько не виделись!~"

    - char: sovetskaya_belorussiya
      side: right
      text:
        - "Что флот Союза Орла и Королевский Флот делают в Арктике? Мы не запрашивали боевой поддержки."

    - char: saratoga
      side: left
      text:
        - "Мы прослышали, что здесь происходит кое-что любопытное, вот и заглянули~ Строго говоря, эта акватория не является территориальными водами Северного Парламента, так что у нас тут свобода судоходства!"

    - char: sovetskaya_belorussiya
      side: right
      text:
        - "Что ж, воля ваша. Все враги, атаковавшие нас ранее, уже уничтожены, так что можете спокойно наслаждаться пейзажами. Мы же возвращаемся в Северный Парламент, так что не смеем вас задерживать."

    - char: saratoga
      side: left
      text:
        - "Без проблем, счастливого пути! Однако... Раз уж срок пребывания Командира в Северном Парламенте истек, пусть он возвращается в Союз Орла вместе с нами."

    - char: washington
      side: right
      text:
        - "Командир на том странном корабле позади? Если само судно вы нам одолжить не можете — не страшно, у нас наготове штабной корабль, Командир может пересесть на него."

    - char: kirov
      side: left
      text:
        - "Постойте, у меня вопрос."
        - "Командир принадлежит всему Лазурному Пути. Не кажется ли вам странным, что он так долго был расквартирован именно у Союза Орла?"
        - "Даже если срок пребывания вышел, нужно дождаться официального приказа из Штаба. Процедура перевода Командира не может начаться просто по чьей-то прихоти."

    - char: hornet
      side: right
      text:
        - "Ну, если следовать процедуре... Командир уже давно должен был быть в Королевском Флоте! Просто из-за экстренной боевой ситуации процесс перевода был временно приостановлен."

    - char: kirov
      side: left
      text:
        - "Тогда Командир должен отправиться в Королевский Флот, разве нет? В любом случае, сначала мы вернемся в порт Северного Парламента и будем ждать прибытия королевского эскорта."

    - char: sheffield
      side: right
      text:
        - "На этот счет дамам из Северного Парламента не стоит беспокоиться. Её Величество уже дала согласие на этот прямой перевод Командира в Союз Орла."

    - char: sovetskaya_belorussiya
      side: left
      text:
        - "Что... Сама Королева... согласилась на такое?!"

    - char: commander
      side: right
      text:
        - "(В такой момент стоит...)"

chapter3:
  rows:

    - char: commander
      side: left
      text:
        - "Выразить готовность отправиться в Союз Орла."

chapter4:
  rows:

    - char: commander
      side: left
      text:
        - "Изъявить желание остаться в Северном Парламенте."

chapter5:
  rows:

    - char: commander
      side: left
      text:
        - "(Нет... в текущей ситуации любой из этих вариантов кажется неподходящим...)"

    - char: sovetsky_soyuz_old_rad
      side: right
      text:
        - "Прошу прощения. Это и правда неожиданный сюрприз, не так ли, Саратога?"

    - char: sovetskaya_belorussiya
      side: left
      text:
        - "О! Советский Союз, ты уже в курсе происходящего?"

    - char: sovetsky_soyuz_old_rad
      side: right
      text:
        - "Узнала совсем недавно. Этот вопрос как раз обсуждался на съезде в качестве экстренной повестки."

    - char: saratoga
      side: left
      text:
        - "И к какому же решению вы пришли?"

    - char: sovetsky_soyuz_old_rad
      side: right
      text:
        - "После оценки ситуации на съезде Северный Парламент даёт своё согласие на завершение миссии Командира здесь и его перевод в Союз Орла."

    - char: sovetskaya_belorussiya
      side: left
      text:
        - "Что...?! Как съезд мог принять такое решение?!"

    - char: sovetsky_soyuz_old_rad
      side: right
      text:
        - "Белоруссия, ситуация сложная. Мы обсудим детали, когда вы вернётесь."
        - "Товарищ Командир, как бы ни был долог путь, рано или поздно приходится прощаться. Мы никогда не забудем тот вклад, что вы внесли в дело Северного Парламента за это время. С нетерпением будем ждать того дня, когда снова сможем сражаться с вами плечом к плечу."

    - char: tallinn
      side: left
      text:
        - "Похоже, иного пути нет... Береги себя на обратном пути, Командир."

    - char: kirov
      side: right
      text:
        - "Даже если это будет не военное дело, а простой визит в качестве туриста — Северный Парламент всегда будет тебе рад!"

    - char: commander
      side: left
      text:
        - "Огромное спасибо. Я тоже никогда не забуду то время, что мы провели вместе в сражениях."

    - text:
      - "За время пребывания в Северном Парламенте я познал и широту их гостеприимства, и суровость их битв. И вот, пришло время уходить."

    - char: saratoga
      side: left
      text:
        - "Командир, пойдём! Нам пора возвращаться домой!~"
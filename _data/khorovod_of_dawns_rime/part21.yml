chapter1:
  rows:

    - text:
      - "Миновав массивные двери в конце коридора, мы оказались в пространстве, где взору внезапно открылся широкий простор."
      - "Перед нами предстал огромный зал, по планировке поразительно напоминающий предыдущий, с бесконечными рядами кресел, уходящими вдаль."
      - "Там, где в прошлом зале находились «Врата», теперь высилась колоссальная видеостена, собранная из десятков, а то и сотен мониторов разного размера."

    - char: tallinn
      side: left
      text:
        - "Ни странного устройства, ни «Врат». Это место больше похоже на обычный конференц-зал."

    - char: sovetskaya_belorussiya
      side: right
      text:
        - "Значит, это и есть конец комплекса... Похоже, мы всё-таки ошиблись дверью. Хоть размеры и схожи с предыдущим залом, планировка тут совсем иная."

    - char: tallinn
      side: left
      text:
        - "В отличие от залитых светом коридоров, здесь оставлено лишь базовое дежурное освещение. Всё оборудование отключено... Довольно гнетущее место."

    - char: murmansk
      side: right
      text:
        - "Зато когда тут всё включено, зрелище, должно быть, потрясающее... Наверное, Советский Союз сейчас выступает с речью в таком же величественном зале."
        - "У-у... Как бы мне хотелось увидеть это своими глазами..."

    - char: kirov
      side: left
      text:
        - "Сейчас война в самом разгаре. Если нам, военным с передовой, и доведётся попасть на подобное собрание, то скорее всего — на церемонию награждения."

    - char: murmansk
      side: right
      text:
        - "И то верно... А, постой! Гремящий, ты ведь наверняка там бывала?!"

    - char: gremyashchy
      side: left
      text:
        - "Хм... Приходилось один раз."
        - "Зрелище масштабное, спору нет, но обстановка очень нервная. Когда внезапно оказываешься в центре внимания тысяч глаз, приходится следить за каждым своим словом и жестом."
        - "По сравнению со мной, вон у Командира опыта в таких делах наверняка куда больше."

    - char: murmansk
      side: right
      text:
        - "Ой... неужели это правда?!"

    - char: commander
      side: left
      text:
        - "В какой-то степени... Как Командиру, мне действительно порой приходится посещать подобные места."

    - char: tallinn
      side: right
      text:
        - "И Командир в такие моменты наверняка сидит в первом ряду?"

    - char: commander
      side: left
      text:
        - "Обычно да... А иногда мне приходится подниматься на трибуну с речью."

    - char: tallinn
      side: right
      text:
        - "За разговорами как-то забываешь, что Командир вообще-то принадлежит к кругу «больших шишек». Хотя твоя доступность и простота в общении подкупают."

    - char: commander
      side: left
      text:
        - "На самом деле, даже на трибуне я говорю лишь о стратегии и тактике... Это скорее не торжественная речь, а рабочий доклад."

    - char: murmansk
      side: right
      text:
        - "Это всё равно очень круто! Но странно, в прессе никогда не мелькало новостей о том, что Командир участвует в таких крупных съездах..."

    - char: kirov
      side: left
      text:
        - "Большинство этих совещаний — секретные военные советы. К тому же, боевому офицеру ни к чему лишний раз светиться под софитами."

    - char: commander
      side: right
      text:
        - "Именно так. Лишний раз ввязываться в политические интриги — себе дороже."

    - char: murmansk
      side: left
      text:
        - "Эх... Получается, Советскому Союзу тяжелее всех, ведь во всём флоте только ей приходится регулярно посещать такие собрания..."
        - "О, а вот и главная трибуна! Товарищ Командир, вы обычно с такой же выступаете с докладами?"

    - char: commander
      side: right
      text:
        - "Верно. В штаб-квартире Командования есть зал почти такого же размера. И трибуна в центре спроектирована точно так же. Помню, здесь должна быть кнопка для включения..."
        - "А, нашел. Интересно, работает ли она здесь? Нужно просто нажать вот так..."
        - "........."
        - "...Хм?"
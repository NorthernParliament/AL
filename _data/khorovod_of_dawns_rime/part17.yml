chapter1:
  rows:

    - char: gromky
      side: left
      text:
        - "Хм-хм-хм~♪"

    - text:
      - "Громкий выглядит так, будто у неё отличное настроение."

    - char: gremyashchy
      side: left
      text:
        - "......"

    - text:
      - "Гремящий же, как и прежде, сохраняет ледяное спокойствие, даже после появления сияющего мегаполиса."

    - char: gremyashchy
      side: left
      text:
        - "Я чувствую на себе взгляд Командира... Есть дело?"

    - char: gromky
      side: right
      text:
        - "Гремящий, ну нельзя же быть такой холодной! Нужно быть капельку приветливее, чтобы лучше ладить с окружающими~"

    - char: gremyashchy
      side: left
      text:
        - "Я не холодная, это моё обычное состояние. К тому же, это конвойная операция, а не туристическая поездка для завязывания дружбы. Хм, вот так."

    - char: gromky
      side: right
      text:
        - "Ну вот, она всегда такая~ Ладно, товарищ Командир, если вам будет что-то непонятно, я буду переводить слова Гремящий на человеческий язык!"

    - char: gremyashchy
      side: left
      text:
        - "Хм... делай что хочешь."

    - char: gromky
      side: right
      text:
        - "Хе-хе-хе, ну вот, видишь?"
        - "Гремящий только с виду колючая, на самом деле она очень хочет с вами подружиться!"

    - char: commander
      side: left
      text:
        - "Вы с Гремящий очень близки."

    - char: gromky
      side: right
      text:
        - "Хе-хе, точно! Мы с самого начала служили в одном флоте, а потом нас вместе перевели на арктические маршруты~ Правда, позже меня одну направили в эскорт «Святилища Арканы»."
        - "Но мы всё равно лучшие подруги, верно, Гремящий?~~~"

    - char: gremyashchy
      side: left
      text:
        - "Да-да... Может, ты уже закончишь эти долгие обнимашки?.."

    - char: gromky
      side: right
      text:
        - "Не-а! Мы так редко видимся, дай мне ещё пообнимать тебя! Товарищ Командир, хотите присоединиться?"

    - char: gremyashchy
      side: left
      text:
        - "………………"

    - text:
      - "Почувствовав на себе пронзительный холод во взгляде Гремящий... пожалуй, лучше вернусь-ка я на мостик."

chapter2:
  rows:

    - char: kirov
      side: left
      text:
        - "Отлично... Наши догадки подтвердились! Прямо там, где раньше находился айсберг с комнатой управления, мы обнаружили вход в комплекс!"

    - char: murmansk
      side: right
      text:
        - "М-да... Мы попали сюда через «Врата» в комнате управления. Если мы снова пройдем через здешние «Врата», действительно ли мы вернемся обратно?"

    - char: kirov
      side: left
      text:
        - "А вот это мы сейчас и проверим!"
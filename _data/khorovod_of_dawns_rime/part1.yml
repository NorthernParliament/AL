chapter1:
  rows:

    - char: sovetskaya_rossiya
      side: left
      text:
        - "Ого, ты прибыла даже раньше назначенного времени... Тяжело пришлось в пути, Белоруссия? Как самочувствие?"


    - char: sovetskaya_belorussiya
      side: right
      text:
        - "В такое время мчаться с самой передовой сквозь снежную бурю — бесследно это не проходит... Есть сбои в двигательной установке, да и орудия нуждаются в осмотре."
        - "Но в целом ничего критичного, успела вовремя... Кстати, а где Советский Союз? Разве не она отдала приказ о срочном сборе?"

    - char: sovetskaya_rossiya
      side: left
      text:
        - "К несчастью, Советский Союз ещё вчера отправилась в Санкт-Петербург на совещание. Сейчас здесь за всё отвечаю я."

    - char: sovetskaya_belorussiya
      side: right
      text:
        - "А... Опять наступило это время. Но сейчас на всех фронтах такая напряжённая обстановка, неужели её присутствие там так необходимо?"

    - char: kirov
      side: left
      text:
        - "Сейчас Лазурный Путь ведёт подготовку к масштабной операции в Северной Атлантике. Будет ли участвовать флот Северного Парламента, в какой степени и в каком формате — всё это важные решения, требующие участия Советского Союза."

    - char: sovetskaya_belorussiya
      side: right
      text:
        - "Сражаться на передовой и одновременно заниматься административными делами в тылу... Тяжела доля главы флота."
        - "Дай-ка угадаю: меня срочно отозвали потому, что наконец пришло время отвести Командира в «Святилище Арканы»?"

    - char: sovetskaya_rossiya
      side: left
      text:
        - "Совершенно верно. За время нашего общения товарищ Командир делом доказал свои выдающиеся способности лидера и благородство характера."
        - "Он — не просто командир Союза Орла, служащий интересам своей фракции, как полагали некоторые товарищи из-за своих субъективных предубеждений. Он — человек, отбросивший фракционную предвзятость ради борьбы за выживание всего человечества. Тот, кто истинно воплощает первоначальные цели создания организации «Лазурный Путь»."
        - "Командир действительно достоин звания «товарищ». К тому же, мы зафиксировали исходящие от него особые феномены, схожие с теми, что описаны в архивных данных «Святилища Арканы»..."
        - "Все условия указывают на то, что момент для сопровождения товарища Командира в «Святилище Арканы» настал."
        - "Это дело огромной важности. Советский Союз планировала лично проводить его, но собрание в Санкт-Петербурге никак нельзя было пропустить, так что эта задача ложится на наши плечи."

    - char: sovetskaya_belorussiya
      side: right
      text:
        - "Раз так, почему бы не подождать её возвращения? Неужели один-два дня сыграют такую роль?"

    - char: sovetskaya_rossiya
      side: left
      text:
        - "Хм... Не знаю, заметила ли ты, но ситуация в Европе сейчас крайне странная. После атаки на Скапа-Флоу ожидаемого ожесточённого столкновения между Королевским Флотом и Железной Кровью не произошло. Напротив, обе стороны погрузились в необъяснимое спокойствие."

    - char: sovetskaya_belorussiya
      side: right
      text:
        - "Мне это тоже показалось странным. Ты подозреваешь, что Королевский Флот и Железная Кровь заключили какую-то сделку?"

    - char: sovetskaya_rossiya
      side: left
      text:
        - "Сложно сказать. Методы Железной Крови всегда было трудно предугадать, а тут еще и Королевский Флот... В общем, из-за затишья они вновь подали запрос на то, чтобы забрать Командира."

    - char: sovetskaya_belorussiya
      side: right
      text:
        - "Пф, какие же они настырные..."

    - char: kirov
      side: left
      text:
        - "Есть разведданные, что они уже начали практическую подготовку. У нас больше нет легитимных причин для задержки. Как только прибудет эскортный флот, всё станет намного сложнее."

    - char: sovetskaya_belorussiya
      side: right
      text:
        - "Хм... Известно, насколько они продвинулись в подготовке?"

    - char: kirov
      side: left
      text:
        - "Маршрут пока не ясен, но в лучшем случае они прибудут уже на этой неделе."

    - char: sovetskaya_belorussiya
      side: right
      text:
        - "Это слишком быстро! Значит, сейчас действительно дорога каждая секунда. Какой у нас план?"

    - char: sovetskaya_rossiya
      side: left
      text:
        - "Совместный выезд. Арктические Сирены, похоже, тоже наконец разгадали нашу цель — удерживать Командира. Долгое время они не проявляли интереса к «Святилищу Арканы», но недавно возобновили атаки."
        - "После начала операции я возьму на себя отвлечение внимания арктических Сирен. В это время ты должна будешь сопроводить Командира в «Святилище Арканы» для выполнения задачи."

    - char: kirov
      side: right
      text:
        - "Командир скоро уедет, а натиск Сирен усиливается. Это может быть наш единственный шанс. Миссия должна увенчаться успехом."

    - char: sovetskaya_belorussiya
      side: left
      text:
        - "Не волнуйтесь. Задача будет выполнена."
chapter1:
  rows:

    - char: commander
      side: left
      text:
        - "Значит, причина, по которой вам потребовалось моё содействие — это «Врата» внутри «Святилища», которые вы не можете открыть самостоятельно?"

    - char: kirov
      side: right
      text:
        - "Совершенно верно. Мы убеждены, что ваша исключительная совместимость с Кубами Мудрости поможет нам отпереть эти запечатанные «Врата»."
        - "В этом Зеркальном море мы так и не смогли обнаружить ни одного устройства, позволяющего управлять местными объектами. Мы не нашли даже саму установку, поддерживающую существование этого пространства."
        - "Единственное, что вызывает подозрения — вон та консоль впереди."

    - text:
      - "В центральной части зала возвышался металлический пульт, напоминающий некое устройство управления."

    - char: tallinn
      side: left
      text:
        - "И на нём как раз есть углубление, куда, судя по всему, можно поместить Куб Мудрости, верно?"

    - char: commander
      side: right
      text:
        - "Да, действительно... Похоже на специальное устройство, которое активируется только с помощью Куба."
        - "Однако все известные нам устройства Сирен питаются от их специфических энергетических установок. Почему же местная панель управления требует Куб Мудрости для запуска?"

    - char: sovetskaya_belorussiya
      side: left
      text:
        - "Мы уверены, что ответ на этот вопрос мы получим только после того, как откроем «Врата»."

    - char: commander
      side: right
      text:
        - "Замкнутый круг..."

    - char: tallinn
      side: left
      text:
        - "Мы провели целую серию экспериментов по активации консоли, но все они провалились. Панель никак не реагировала."

    - char: commander
      side: right
      text:
        - "И вы решили, что только «особенный» человек, использующий Куб Мудрости, сможет её активировать?"

    - char: kirov
      side: left
      text:
        - "Именно. Совместимость с Кубами, которую вы продемонстрировали в тестах при вступлении в должность, является самой высокой в мире."
        - "По неким неизвестным принципам вы способны вызывать в Кубах Мудрости определенные благотворные изменения, которые мы не можем объяснить. Вы ведь и сами об этом знаете?"

    - char: commander
      side: right
      text:
        - "Да. И я уже давно хочу выяснить причину этого феномена."
        - "Но где же те самые «Врата», о которых вы постоянно говорите? Это уже конец зала, и я не вижу ничего подобного."

    - char: sovetskaya_belorussiya
      side: left
      text:
        - "Ах... Прошу прощения, совсем забыла их представить~"
        - "Та ледяная стена, что высится прямо перед вами в конце зала — это и есть то, что мы называем «Вратами». Мы убеждены, что после активации консоли «Врата» откроют нам новый путь."

    - char: commander
      side: right
      text:
        - "Хоть она и огромная, и её гладкость явно указывает на искусственное происхождение, на первый взгляд это просто очень необычная ледяная стена."

    - char: tallinn
      side: left
      text:
        - "Если ты так думаешь, то глубоко заблуждаешься. Эти «Врата» — вовсе не обычный лёд."
        - "Громкий, продемонстрируй Командиру. Дай залп по углу ледяной стены."

    - char: gromky
      side: right
      text:
        - "Поняла! Всем соблюдать безопасную дистанцию, готовлю одиночный выстрел!"

    - text:
      - "БА-БАХ!"
      - "Снаряд, выпущенный Громким, на огромной скорости врезался в ледяную стену. Однако когда дым рассеялся, на поверхности льда не осталось ни единой царапины..."

    - char: tallinn
      side: left
      text:
        - "Видишь? Такой удар не оставил на стене даже следа."
        - "Само собой, мы перепробовали и другие способы. Артиллерия большего калибра, бортовые залпы всего флота, подрыв большими зарядами взрывчатки, подрыв ещё большими зарядами..."
        - "Результат нулевой. С нашей нынешней огневой мощью мы не способны нанести «Вратам» ни малейшего урона."

    - char: commander
      side: right
      text:
        - "Значит, всё-таки придётся начать с панели управления... Хм? Знак, выгравированный на консоли — это не эмблема, которой Сирены обычно обозначают свою фракцию. Это символ, который я вижу впервые в жизни..."

    - char: murmansk
      side: left
      text:
        - "Ой? Странно... Разве этот символ был здесь, когда мы проводили расследование раньше?"

    - char: tallinn
      side: right
      text:
        - "! Нет. Я очень хорошо помню — раньше на панели управления этого символа точно не было."

    - char: sovetskaya_belorussiya
      side: left
      text:
        - "То есть, после нынешнего входа в «Святилище Арканы» сама консоль претерпела изменения, которых мы никогда не видели?"
        - "Стоило товарищу Командиру прийти, как тут же начали происходить интересные вещи... Держите, вот Куб Мудрости."
        - "Не будем терять времени. Товарищ Командир, почему бы вам не попробовать прямо сейчас?"

    - text:
      - "На всей панели управления не видно других элементов, с которыми можно было бы взаимодействовать. Что ж, для начала вставлю Куб Мудрости в специальный слот..."

    - char: commander
      side: left
      text:
        - "Устанавливаю куб..."

chapter2:
  rows:

    - char: gremyashchy
      side: left
      text:
        - "...Консоль действительно среагировала!."

    - char: gromky
      side: right
      text:
        - "Ва-а... Панель управления засветилась!"

    - text:
      - "Как только Куб Мудрости оказался на месте, устройство издало низкий гул, завибрировав. Куб внутри слота начал постепенно рассеиваться, а на его месте над прибором возникла расширяющаяся сфера света."

    - char: tallinn
      side: left
      text:
        - "Светящийся сгусток, сохраняющий форму куба... Выглядит так, словно Куб Мудрости деконструировали на составляющие..."

    - char: kirov
      side: right
      text:
        - "...Похоже, наши предположения оказались верны, Белоруссия."

    - char: sovetskaya_belorussiya
      side: left
      text:
        - "Да! «Врата» тоже начинают меняться. Сгораю от нетерпения — как же эта несокрушимая ледяная стена откроет нам путь!"
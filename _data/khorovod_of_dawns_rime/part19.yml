chapter1:
  rows:

    - char: gromky
      side: left
      text:
        - "Здесь всё ощущается совершенно иначе, чем раньше..."

    - char: tallinn
      side: right
      text:
        - "Хотя расположение в акватории совпадает, декор, планировка и даже сама внутренняя структура пространства полностью изменились. Я считаю, что это не то место, где раньше находилась комната управления."

    - char: sovetskaya_belorussiya
      side: left
      text:
        - "Здесь, как и в том сияющем мегаполисе вдалеке, прослеживается наш стиль... Похоже на какой-то оперативный штаб или командный пункт."

    - char: kirov
      side: right
      text:
        - "Определённо, есть такое чувство. Вот только эмблема организации, висящая над входом, мне совершенно не знакома."

    - char: sovetskaya_belorussiya
      side: left
      text:
        - "Я тоже нигде её не видела... Хех, это место становится всё любопытнее."

    - char: gromky
      side: right
      text:
        - "Впереди так много комнат, мы будем исследовать их по одной?"

    - char: murmansk
      side: left
      text:
        - "Раз уж это похоже на командный пункт, там наверняка хранится немало полезных разведданных. Небольшая разведка нам не повредит~"
        - "К тому же, сейчас нам всё равно особо нечем заняться..."

    - char: sovetskaya_belorussiya
      side: right
      text:
        - "Раз это место было намеренно скрыто в столь уникальном Зеркальном море, оно определённо неразрывно связано с Сиренами."
        - "Даже если наша цель — поскорее во всём разобраться и найти путь назад, осмотреть здесь всё просто необходимо."
        - "Но ты права... комнат слишком много, если заходить в каждую, мы потратим уйму времени."

    - char: commander
      side: left
      text:
        - "Как насчёт того, чтобы сосредоточиться на поиске конференц-зала или архива?"

    - char: kirov
      side: right
      text:
        - "Согласна. В штабах именно залы совещаний и архивы представляют наибольшую ценность для исследования."

    - char: gromky
      side: left
      text:
        - "А... если нужен зал совещаний, то впереди как раз есть нечто похожее!"

chapter2:
  rows:

    - text:
      - "Войдя в комнату, мы первым делом увидели огромный экран, занимающий почти всю стену."

    - char: sovetskaya_belorussiya
      side: left
      text:
        - "Хм... Что скажете об этом?"

    - char: tallinn
      side: right
      text:
        - "Это оперативная карта, фиксирующая ход какого-то сражения. Похоже на... оборону острова?"

    - char: kirov
      side: left
      text:
        - "Хм... Красная звезда в центре обозначает ключевой объект. Вокруг него выстроены рубежи обороны — явный признак приказа стоять насмерть."

    - char: sovetskaya_belorussiya
      side: right
      text:
        - "Слепая оборонительная тактика в открытом море — не самое мудрое решение."

    - char: kirov
      side: left
      text:
        - "Согласна. Флот, зажатый в узком пространстве вокруг острова, теряет мобильность и оказывается в крайне невыгодном положении."
        - "Вокруг видны островки, которые могли бы служить буфером, но даже так, подобное построение..."

    - char: murmansk
      side: right
      text:
        - "Столкнувшись с врагом, превосходящим их в несколько раз и наступающим со всех сторон, защитники решили принять удар на себя."
        - "Цель была настолько важна, что они растянули длинную линию обороны, готовые зубами цепляться за каждый метр, лишь бы сохранить объект в целости и сохранности."
        - "Но, конечно, защитники не просто сидели в обороне — они использовали любую возможность для контратак!"
        - "Маневренные ударные группы вклинивались в бреши между вражескими порядками, срывая планы нападавших."
        - "А нападающая сторона, похоже, очень боялась прорыва кольца и выбрала тактику осторожного, методичного продвижения единым фронтом."
        - "Разница в тактических стилях превратила то, что должно было стать быстрой расправой, в затяжную битву равных соперников."
        - "Ну, как-то так это всё ощущается!"

    - char: kirov
      side: left
      text:
        - "Благодарю товарищ Мурманск за столь экспрессивный пересказ. Если отбросить изрядную долю субъективных домыслов, это в целом совпадает с тем, что показывает карта."

    - char: murmansk
      side: right
      text:
        - "«Субъективные домыслы» тут ни при чём, это был полёт фантазии!"
        - "Ой? Гремящий, а ты разве не хочешь взглянуть?"

    - char: gremyashchy
      side: left
      text:
        - "Мне это ни к чему. Вы в анализе разбираетесь лучше меня."
        - "К тому же, с самого момента входа меня не покидает неприятное чувство... Словно кто-то пристально за нами наблюдает. Вы это чувствуете?"

    - char: gromky
      side: right
      text:
        - "Не-а... Я ничего такого не чувствую."

    - char: murmansk
      side: left
      text:
        - "Я тоже... Не говори таких страшилок, Гремящий, мне аж не по себе стало..."

    - char: commander
      side: right
      text:
        - "Честно говоря, с тех пор как мы вошли в комнату, у меня тоже появилось странное чувство, будто здесь есть кто-то ещё..."

    - char: murmansk
      side: left
      text:
        - "А?! Товарищ Командир тоже это чувствует?!"
        - "У-у... Теперь, когда я об этом думаю... В этом месте ни души, но все приборы работают, как будто ими пользовались буквально минуту назад..."
        - "Может, это дом с привидениями или что-то в этом роде?.."

    - char: kirov
      side: right
      text:
        - "Ха-ха-ха, в мире не существует никаких настоящих призраков! Всё непознанное, включая Сирен — это лишь то, что мы пока не успели понять."
        - "Однако, если и у товарища Командира, и у Гремящий возникло схожее ощущение, вряд ли это простая галлюцинация. Возможно, в этом комплексе действительно есть что-то «неправильное»."

    - char: sovetskaya_belorussiya
      side: left
      text:
        - "Мы всё ещё не разведали путь назад. Зафиксируйте данные с этой карты и двигаемся дальше."
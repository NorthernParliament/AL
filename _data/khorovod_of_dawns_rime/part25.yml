chapter1:
  rows:

    - text:
      - "БА-БАХ!"

    - char: gromky
      side: left
      text:
        - "Эти враги такие настырные!"

    - char: murmansk
      side: right
      text:
        - "Да что это вообще за существа? Такое чувство, будто они постоянно окутаны каким-то густым туманом..."

    - char: tallinn
      side: left
      text:
        - "В любом случае, это точно не Сирены. Это некие... необъяснимые сущности."

    - char: sovetskaya_belorussiya
      side: right
      text:
        - "Хоть всё это и «пока необъяснимые сущности», сражаться с ними довольно паршиво. Киров, что скажешь?"

    - char: kirov
      side: left
      text:
        - "Хм, крайне ценные для исследования образцы. После боя попробуем забрать несколько ключевых модулей для изучения."

    - char: sovetskaya_belorussiya
      side: right
      text:
        - "В твоём репертуаре, Киров. Весьма дерзкое заявление..."

    - char: kirov
      side: left
      text:
        - "Пока наше дело не доведено до конца, я, Киров, так просто не паду!"
        - "Раз наши атаки наносят им урон, значит, кем бы ни был противник — бояться нечего."
        - "Нам нужно только стрелять, стрелять и ещё раз стрелять. Сокрушить непрерывным огнём любого врага, посмевшего преградить нам путь!"

    - char: murmansk
      side: right
      text:
        - "О, товарищ Командир и Гремящий тоже подошли!"

    - char: sovetskaya_belorussiya
      side: left
      text:
        - "Отлично. Видимо, данные уже систематизированы и погружены на флагман. Улов в этот раз богатый, интересно, какие интригующие сведения удастся расшифровать позже~"
        - "Теперь осталось только придумать, как нам выбраться из этого места..."

    - char: murmansk
      side: right
      text:
        - "А вам не кажется, что нынешняя ситуация подозрительно напоминает ту оперативную карту, которую мы видели в конференц-зале?"
        - "Эх, жаль, что мы не знаем, чем закончилась та битва... Надо было повнимательнее её рассмотреть..."
chapter1:
  rows:

    - text:
      - "В воздухе завывают сирены... В носу стоит резкий запах гари, в лицо бьют волны раскалённого воздуха... Это чувство до боли знакомо."
      - "...Неужели это превратившаяся в поле битвы линия обороны Лонг-Айленда?"
      - "Почему я здесь... Что я делал до этого... Тщетно, в голове полнейший хаос, я ничего не могу вспомнить."

    - char: anzeel_d?
      side: left
      status: is-yellow
      text:
        - "Эй!!! Почему ты всё ещё здесь?!"
        - "Мы же договорились, что ты отправишься вместе с ними на Самос! Почему ты остался один?!"

    - char: commander
      side: right
      text:
        - "Я не знаю..."

    - text:
      - "Голос вдалеке кажется знакомым, но в то же время совершенно чужим. Кто же это кричит?.."

    - char: anzeel_d?
      side: left
      status: is-yellow
      text:
        - "Раз наше наступление закончилось сокрушительным провалом, падение этого рубежа — лишь вопрос времени."
        - "Именно предвидя такой исход, я решила отправить тебя с ними в Самос на задание..."
        - "Сейчас нам удалось на время сдержать натиск, но мы уже на пределе. Скоро они снова навалятся всей мощью, и тогда здесь всё будет стерто в порошок, точно в назначенное планом время."
        - "Ты ведь тоже присутствовал, когда составляли этот план? Напомни, ты голосовал «за» или «против»... Эх, в последнее время столько дел, что я совсем ничего не помню."
        - "Ладно... как бы там ни было, даже если ты скажешь, что хочешь остаться здесь со мной, мне это не нужно."
        - "Там ты нужнее, чем здесь... Дай-ка посмотрю, остались ли ещё эвакуационные суда, задержавшие отход. Ну честное слово, вечно ты капризничаешь."

chapter2:
  rows:

    - char: commander
      side: left
      text:
        - "Что?!"

    - char: anzeel_d?
      side: right
      status: is-yellow
      text:
        - "Эй! Чего ты там застыл и витаешь в облаках? Живо сюда! Бой ещё не окончен, оставаться снаружи слишком опасно."

    - char: commander
      side: left
      text:
        - "......"
        - "Они обязательно вернутся, чтобы спасти тебя."

    - char: anzeel_d?
      side: right
      status: is-yellow
      text:
        - "А? Да ну, вряд ли. Раз всё идёт по плану, их там по-любому задержат..."

    - char: commander
      side: left
      text:
        - "Нет, они точно вернутся. И тогда они увидят самую печальную картину в своей жизни."

    - char: anzeel_d?
      side: right
      status: is-yellow
      text:
        - "Вот это уже проблема. Я ведь как раз хотела скрыть это от них, поэтому и устроила всё по-тихому..."

    - char: commander
      side: left
      text:
        - "Поэтому..."
        - "Поэтому давай эвакуируемся вместе."
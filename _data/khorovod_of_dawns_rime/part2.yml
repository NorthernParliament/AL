chapter1:
  rows:

    - char: avrora_rad
      side: left
      text:
        - "Приветствую вас, товарищ Командир. Вы уже привыкли к временной жизни вдали от передовой?"

    - char: commander
      side: right
      text:
        - "Пейзаж, где до самого горизонта всё застлано белым снегом, ещё в диковинку, но в домах очень тепло, да и кухня Северного Парламента пришлась мне по вкусу."
        - "И, честно говоря, я не ожидал, что медведи могут быть такими милыми..."

    - char: avrora_rad
      side: left
      text:
        - "Хе-хе~ Я так и знала, что товарищу Командиру обязательно приглянутся наши мишки, в которых мощь сочетается с очарованием."

    - char: commander
      side: right
      text:
        - "Но как дела у тебя? На передовой ведь по-прежнему идут напряжённые бои."

    - char: avrora_rad
      side: left
      text:
        - "Всё в порядке, на фронте всегда такое ощущение..."

    - char: kirov
      side: right
      text:
        - "Мы ведём непрекращающуюся позиционную войну с арктическими Сиренами, и текущая дислокация — это наш метод ротации, позволяющий справляться с суровыми реалиями затяжных сражений."
        - "Даже самому острому мечу время от времени требуется уход и заточка!"

    - char: avrora_rad
      side: left
      text:
        - "Верно. Для воина умение отдыхать так же важно, как и умение сражаться."

    - char: commander
      side: right
      text:
        - "Однако сегодня наконец настал момент снова обнажить клинок?"

    - char: sovetskaya_belorussiya
      side: left
      text:
        - "Точно! Товарищ Командир, вы готовы начать нашу операцию?"

    - char: commander
      side: right
      text:
        - "Наша цель на этот раз... некий секретный объект Северного Парламента под кодовым названием «Святилище Арканы»?"

    - char: sovetskaya_belorussiya
      side: left
      text:
        - "Да, можно сказать и так."

    - char: sovetskaya_rossiya
      side: right
      text:
        - "Таллин, какова обстановка в акватории вокруг «Святилища»?"

    - char: tallinn_rad
      side: left
      text:
        - "Мы уже отбили несколько атак Сирен, но в округе всё ещё полно вражеских флотов. Полагаю, вскоре они перейдут в ещё более яростное наступление."

    - char: commander
      side: right
      text:
        - "Арктические Сирены всё-таки пронюхали о наших планах. Как обстановка в самом «Святилище»?"

    - char: chapayev
      side: left
      text:
        - "Не волнуйся, Таллин и её группа очень надёжны. Даже если основные силы арктических Сирен ударят по ним, они смогут продержаться какое-то время~"

    - char: tallinn_rad
      side: right
      text:
        - "После серии ударов, нанесённых Командиром ранее, арктические Сирены во главе с Омиттер, похоже, впали в некое безумство из-за постоянных неудач."
        - "Даже если сейчас мы удерживаем линию обороны, при затяжном бое нет гарантий, что само «Святилище Арканы» не пострадает от огня."

    - char: kirov
      side: left
      text:
        - "Что ж, время не ждёт. Действуем быстро и решительно. Начинаем операцию."

    - char: sovetskaya_belorussiya
      side: right
      text:
        - "Согласно плану, я, Киров и Гремящий будем действовать вместе с Командиром. Мы объединимся с оборонительным флотом Таллин, после чего вместе войдём в «Святилище»."
        - "Советская Россия, Чапаев и Ташкент возглавят основные силы полярного флота и проведут масштабную отвлекающую атаку на логово Омиттер в районе «Зимней Короны». Это должно перетянуть на себя всё внимание и силы Сирен, обеспечив нам с Командиром свободу действий."

    - char: gremyashchy
      side: left
      text:
        - "Гремящий сокрушит любого врага, угрожающего безопасности Командира. Да, именно так."

    - char: chapayev
      side: right
      text:
        - "Хоть эта уловка и шита белыми нитками, но если мы будем действовать достаточно напористо, Омиттер послушно вернётся защищать «Корону»."

    - char: tashkent
      side: left
      text:
        - "В этой операции Ташкент будет сражаться на другом участке, так что будь осторожен. Давай зададим им жару, товарищ Командир!"

    - char: sovetskaya_rossiya
      side: right
      text:
        - "Командир, желаю удачи. Мы выдвигаемся первыми, чтобы подготовить почву для отвлекающего маневра."

    - char: commander
      side: left
      text:
        - "Удачи. Исследование «Святилища» предоставьте нам."

    - char: avrora_rad
      side: right
      text:
        - "Пусть эта операция завершится полным успехом. И пусть каждый, кто сегодня уходит в бой, снова вернётся в порт целым и невредимым... Аврора, конец связи."
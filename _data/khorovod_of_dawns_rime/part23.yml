chapter1:
  rows:

    - char: gremyashchy
      side: left
      text:
        - "Командир, поспешите. Как только закончим сбор данных, мы тоже должны отступить."

    - char: commander
      side: right
      text:
        - "Что случилось?.."

    - char: gremyashchy
      side: left
      text:
        - "Поверить не могу, что в такой критической ситуации вы сохраняете подобное хладнокровие."
        - "Несколько минут назад в акватории, которая до этого была пуста, внезапно появилось огромное количество неопознанных врагов неизвестного типа."
        - "Белоруссия и остальные уже увели флот на перехват. Мы же здесь систематизируем полученные данные и ждем, пока они расчистят путь от первой волны врагов для нашей эвакуации."
        - "Вы правда ничего не помните?.."

chapter2:
  rows:

    - char: sovetskaya_belorussiya
      side: left
      text:
        - "Нас атаковали превосходящие силы противника как раз тогда, когда мы еще не нашли путь назад. Ситуация крайне скверная..."

    - char: kirov
      side: right
      text:
        - "Тот комплекс, в котором мы сейчас находимся, расположен под одной из колей. Прежняя комната управления тоже была под колеей."
        - "Раз это новое здание появилось здесь, а комнаты управления в нем нет, то с высокой долей вероятности пульт управления и эвакуационные «Врата» находятся в айсберге под другой колеей."

    - char: commander
      side: left
      text:
        - "Согласен.."

    - char: murmansk
      side: right
      text:
        - "Тогда всем нужно немедленно отступать к той стороне!.."

    - char: kirov
      side: left
      text:
        - "Не спеши. Враг пока не изучен, товарищу Командиру безопаснее оставаться здесь."
        - "Сначала мы выйдем и зачистим первую волну, обеспечим безопасную дистанцию, а потом Командир отступит вместе с Гремящий."

    - char: gremyashchy
      side: right
      text:
        - "Принято."

    - char: sovetskaya_belorussiya
      side: left
      text:
        - "Что бы это ни были за твари, пусть подходят! Я разнесу их в щепки северной сталью!"

chapter3:
  rows:

    - char: gremyashchy
      side: left
      text:
        - "Вы вспомнили?"

    - char: commander
      side: right
      text:
        - "Да, в памяти всплывают эти фрагменты... Но почему я не мог вспомнить об этом секунду назад?.."

    - char: gremyashchy
      side: left
      text:
        - "Командир, Белоруссия прислала сигнал, что путь чист. Мы немедленно..."

    - char: commander
      side: right
      text:
        - "Гремящий?.."

chapter4:
  rows:

    - text:
      - "Внезапно Гремящий замерла на полуслове, прекратив все движения. Оглушительный вой сирен мгновенно стих. Всё вокруг застыло, словно кадр на видеокассете, поставленной на паузу."
      - "Почти в то же мгновение электроника во всем зале снова ожила. На экранах отчетливо проступили кадры ожесточенного боя флота Северного Парламента с врагом."
      - "Тип противника был абсолютно незнаком. Даже на четких экранах их силуэты казались размытыми, вызывая сильное чувство нереальности происходящего..."
      - "И состав флота Северного Парламента тоже был... какой-то не такой..."
      - "Стоп. Кажется, изображение перед глазами — это не прямая трансляция из акватории, а какая-то архивная видеозапись..."

    - char: commander
      side: left
      text:
        - "(Нужно связаться с Белоруссией.)"


chapter5:
  rows:

    - char: communicator
      side: right
      text:
        - "........."

    - text:
      - "В ответ — мертвая тишина. Кнопка вызова словно заблокирована, она не нажимается. Впрочем, даже если бы она сработала, вряд ли бы кто-то ответил."
      - "Происходящее явно выходит за рамки простых галлюцинаций..."
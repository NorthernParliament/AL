chapter1:
  rows:

    - char: aoste_d?
      side: left
      status: is-yellow
      text:
        - "Если принять этот сценарий... шансы на успех действительно есть."
        - "Вот только... для завершения операции устройство помех должно работать как можно дольше. При этом удерживать позиции и проводить эвакуацию придется одновременно..."
        - "А это значит..."

    - char: nop
      side: right
      status: is-yellow
      text:
        - "Мы всё понимаем, Аосте. Мы предложили этот план, полностью осознавая последствия, и готовы исполнить его добровольно."

    - char: aoste_d
      side: left
      status: is-yellow
      text:
        - "..Я понял. Но даже так, сейчас все стороны понесли тяжелые потери. Нам нужно провести еще один раунд тщательных оценок, чтобы понять, сколько времени мы реально сможем выиграть..."
        - "Как только «Рассвет» (Light of Dawn) погаснет, работа «Демона Лапласа» тут же прекратится. Если к этому моменту индекс эвакуации не достигнет нормы, это неизбежно ударит по реализации последующих этапов плана."

    - char: anzeel_d?
      side: right
      status: is-yellow
      text:
        - "Не волнуйся, я тоже помогу вам выиграть время."

    - char: aoste_d
      side: left
      status: is-yellow
      text:
        - "...Анзил?"

    - char: anzeel_d
      side: right
      status: is-yellow
      text:
        - "Я отдала слишком много команд по связи, управляя сражением. Настолько много, что уже попала в список их приоритетных целей для уничтожения.."
        - "Так что, пока я продолжаю отвлекать их внимание на себя, давление на другие сектора на какое-то время ослабнет, и вы сможете лучше справиться с выполнением плана."

    - char: aoste_d
      side: left
      status: is-yellow
      text:
        - "Но что будет с тобой?"

    - char: anzeel_d
      side: right
      status: is-yellow
      text:
        - "После такого сокрушительного поражения кто-то должен взять на себя ответственность. И сейчас осталось не так много людей, способных на это..."

    - char: aoste_d
      side: left
      status: is-yellow
      text:
        - "…… В таком случае часть флота снова будет рассредоточена. По крайней мере, «Код G»... я надеюсь, она сможет эвакуироваться вместе с Антиохом."

    - char: anzeel_d
      side: right
      status: is-yellow
      text:
        - "Не переживай... Не только Энтерпрайз, в нужный момент я отправлю их всех к тебе."
        - "А ты уж постарайся удержать их до начала операции... Моих сил здесь, с опорой на базу Нью-Йорк и линию обороны Лонг-Айленда, хватит, чтобы тянуть время очень долго."

    - char: aoste_d
      side: left
      status: is-yellow
      text:
        - "Если ты не пойдешь с нами... боюсь, их прибытие ко мне обернется настоящим кровавым штормом..."

    - char: anzeel_d
      side: right
      status: is-yellow
      text:
        - "Ну-ну~ Разве великий доктор Аосте не может применить весь свой блестящий интеллект и решить проблему красиво?"
        - "Хоть это решение и не входило в изначальный план и формально похоже на «предательство», вы поступаете правильно. Я полностью вас понимаю и верю, что в глубине души они тоже всё понимают..."
        - "Просто им... всё еще нужно немного времени, чтобы это принять..."
        - "А ты? У тебя ведь тоже нет возражений?"
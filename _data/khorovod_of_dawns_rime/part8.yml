chapter1:
  rows:

    - char: sovetskaya_belorussiya
      side: left
      text:
        - "Ха-ха-ха! Даже товарищ Командир, сохраняющий полное спокойствие под градом пуль, вздрогнул, увидев это!"

    - text:
      - "И впрямь... В самом неожиданном месте возникло нечто невообразимое..."
      - "Под раскатистый гул из-под толщи льда, прямо в центре пустого до этого момента горизонта, вынырнуло гигантское... судно?"
      - "Рёв механизмов, треск лопающегося льда и грохот волн слились в единую симфонию. Сопровождаемый мощной вибрацией, этот исполин вызывал иллюзию, будто ты смотришь в глаза какому-то первобытному чудовищу."

    - char: sovetskaya_belorussiya
      side: left
      text:
        - "В тёплое время года воды в этом секторе обычно не скованы таким льдом."
        - "Но раз уж наша миссия выпала на столь суровые морозы, мы отправимся в путь на этой ледокольной подлодке!"

    - char: commander
      side: right
      text:
        - "Ледокольная подлодка... Ни в штатном расписании Штаба, ни у других фракций я не встречал ничего подобного."

    - char: sovetskaya_belorussiya
      side: left
      text:
        - "Само собой! Это новейшая многоцелевая тактическая субмарина, полностью разработанная у нас, в Северном Парламенте. Впрочем, как видите, при таких габаритах называть её просто подлодкой уже нельзя — это целый подводный крейсер."
        - "Советская Россия наверняка уже показывала вам лаборатории, где мы тестируем энергетические системы на основе Кубов Мудрости."
        - "И вот один из готовых результатов — эта ледокольная подлодка. Энергосистема на Кубах Мудрости обеспечивает этой громадине колоссальную мощность и невероятную автономность."
        - "И, разумеется, боевую мощь. На поверхности она работает как обычный ледокол, но стоит ей уйти на глубину, как судно превращается в полноценную подводную боевую платформу."
        - "Огромные размеры позволили разместить внушительный арсенал, гарантирующий огневое превосходство. Добавьте к этому способность свободно действовать в любой точке Арктики, даже под многометровым льдом, и колоссальное время погружения — мы возлагаем большие надежды на роль таких кораблей в будущей войне."

    - char: commander
      side: right
      text:
        - "Гигантская подводная платформа с возможностью боя «субмарина против субмарины»... Значит, в недавнем сражении она уничтожила стаи вражеских подлодок прямо из-под воды?"

    - char: sovetskaya_belorussiya
      side: left
      text:
        - "Именно так!"

    - char: commander
      side: right
      text:
        - "Раз нам требуется подлодка, значит ли это... что «Святилище Арканы» — это какой-то подводный объект?"

    - char: tallinn
      side: left
      text:
        - "В целом верно. Белоруссия, Командир, переходим на борт подлодки и готовимся к погружению."

    - char: sovetskaya_belorussiya
      side: right
      text:
        - "Идёмте, товарищ Командир. Наше путешествие в «Святилище Арканы» по-настоящему начинается только сейчас!"
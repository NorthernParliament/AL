chapter1:
  rows:

    - text:
      - "Путь действительно открылся, но в форме, превзошедшей все ожидания."
      - "Ледяная стена стала настолько прозрачной, что почти исчезла, превратившись в некое подобие проходимой мембраны. А за этой прозрачной пеленой, в прежде пустом пространстве Зеркального моря, возник сияющий город, целиком сотворённый из света."
      - "Увиденное настолько потрясало воображение, что его невозможно было описать простыми словами..."

    - char: kirov
      side: left
      text:
        - "Вот уж действительно... непредвиденный поворот событий..."

    - char: gromky
      side: right
      text:
        - "Как же красиво..."

    - char: murmansk
      side: left
      text:
        - "Перед лицом такого величественного мегаполиса даже стометровые айсберги кажутся лишь скромными декорациями."
        - "то похоже на сказочный замок из снов..."

    - char: tallinn
      side: right
      text:
        - "Так вот для чего на самом деле нужны были те две парящие в центре колеи... Это дороги, ведущие к городу..."
        - "Сирены умудрились спрятать здесь невероятное чудо. Трудно представить, чтобы с их эстетикой они создали нечто настолько прекрасное."

    - char: commander
      side: left
      text:
        - "Стоящий перед нами город совсем не похож на стиль построек Сирен. Напротив, он куда ближе к... человеческой архитектуре..."

    - char: sovetskaya_belorussiya
      side: right
      text:
        - "Даже у Союза Орла сейчас нет настолько грандиозных городов, тем более целиком состоящих из чистого света."
        - "Но по стилю это и впрямь не напоминает Сирен..."
        - "Кто бы мог подумать, что за «Вратами» окажется не секретная комната, а целый сияющий мегаполис, созданный неизвестным творцом. Неожиданный и интригующий поворот."
        - "Ну что, товарищ Командир? Продолжите это приключение вместе с нами?"

    - char: commander
      side: left
      text:
        - "Разумеется. У меня тоже есть вопросы, ответы на которые я надеюсь найти здесь."

    - char: sovetskaya_belorussiya
      side: right
      text:
        - "В таком случае — вперёд! Пройдём сквозь эти ставшие призрачными «Врата» и направимся к сияющему городу!"
chapter1:
  rows:

    - char: sovetskaya_belorussiya
      side: left
      text:
        - "Товарищ Командир, что это вы притихли в пути? О чём-то задумались?"

    - char: commander
      side: right
      text:
        - "Я просто размышлял... В боевой сводке цели операции и задачи, в которых требуется моё содействие, описаны довольно подробно, но вот описание самого «Святилища Арканы» крайне туманно. В тексте даже видны следы явной редактуры."
        - "Можешь рассказать мне больше подробностей о «Святилище»?"

    - char: sovetskaya_belorussiya
      side: left
      text:
        - "Охо! Какая острая наблюдательность. Природа «Святилища» слишком уникальна, поэтому даже во внутренних боевых сводках нам приходится проявлять предельную осторожность. Было бы много проблем, если бы необработанная информация начала распространяться повсюду..."
        - "Конечно, если это не пойдёт «в протокол», я без проблем всё объясню товарищу Командиру."
        - "Только вот с чего бы начать..."

    - char: kirov
      side: right
      text:
        - "Товарищ Командир, вы знаете, когда и в какой форме появились самые первые девушки корабли - кансен?"

    - char: commander
      side: left
      text:
        - "Первые кансен... Насколько я помню, после вторжения Сирен созданному союзу «Лазурный Путь» удалось объединить силы всего мира и разработать Кубы Мудрости. Затем были созданы кансен, которые и переломили ход войны, верно?"

    - char: kirov
      side: right
      text:
        - "Согласно официальным данным — всё именно так. Но это утверждение и верно, и не совсем верно одновременно."
        - "С момента основания «Лазурного Пути» не было такого, что сначала появились кубы, а потом корабли. На самом деле, кансен и Кубы Мудрости появились практически в одно и то же время."

    - char: commander
      side: left
      text:
        - "Что? У появления Кубов Мудрости и кансен нет чёткой последовательности?.."
        - "Откуда у вас эти сведения?"

    - char: sovetskaya_belorussiya
      side: right
      text:
        - "Оставим подробности пока в секрете. Но предположим, что это правда — как думает товарищ Командир, кто же была самой первой из рождённых кансен?"

    - char: commander
      side: left
      text:
        - "Хм..."

    - char: kirov
      side: right
      text:
        - "Так или иначе, получив эти сведения, мы вернулись в ту акваторию, где родились первые кансен, для проведения глубокой разведки. В ходе этих изысканий мы и обнаружили существование «Святилища Арканы»."
        - "То, что мы называем «Святилищем», после последующего анализа оказалось крепостью Сирен. Вероятно, Сирены тогда ещё не были готовы к тому, что у нас появятся кансен, и в итоге нам удалось захватить объект в целости в ходе внезапного штурма."
        - "Именно благодаря использованию многочисленных данных, извлечённых из «Святилища», наш Северный Парламент сумел в кратчайшие сроки восстановить боеспособность после тяжелейших ударов Сирен."

    - char: commander
      side: left
      text:
        - "...Так вот почему Северный Парламент всегда занимал столь неоднозначную позицию в вопросе использования технологий Сирен?"

    - char: sovetskaya_belorussiya
      side: right
      text:
        - "То чувство, когда ты на грани гибели от рук могучего врага и хватаешься за последнюю соломинку... Вряд ли Союзу Орла или Королевскому Флоту дано это понять."
        - "Примерно в то же время Штабу удалось успешно разработать и наладить массовое производство Кубов мудрости. Дальше идёт всем известная история: фракции использовали кубы для создания флотов девушек-кораблей, что позволило повернуть вспять ход почти проигранной войны."

    - char: commander
      side: left
      text:
        - "Ты намекаешь на то, что Штаб тоже использовал некие находки из «Святилища» для завершения разработки Кубов мудрости?"

    - char: sovetskaya_belorussiya
      side: right
      text:
        - "О, вовсе нет. Хотя мы не участвовали в процессе разработки кубов, в данных, извлечённых из «Святилища», не было никаких записей о них."
        - "На данном этапе я склоняюсь к тому, что эти события не связаны друг с другом напрямую. Однако тот факт, что Кубы мудрости и кансен появились почти одновременно — разве это само по себе не повод для глубоких раздумий?"

    - char: commander
      side: left
      text:
        - "Не ожидал, что у вещей, ставших прописной истиной, может быть столь таинственная изнанка. Когда вернусь, стоит поискать зацепки в архивах Штаба..."
chapter1:
  rows:

    - char: kirov
      side: left
      text:
        - "Товарищ Командир, мы прибыли в пункт назначения."

    - char: commander
      side: right
      text:
        - "Кажется, мы довольно долго шли под водой... Если это подводные руины или нечто подобное, нам нужно пересесть на исследовательские катера?"

    - char: kirov
      side: left
      text:
        - "Нет нужды в таких сложностях, мы можем просто выйти из отсека."

    - char: commander
      side: right
      text:
        - "Выйти?.. Но мы ведь всё еще под водой?"

    - char: kirov
      side: left
      text:
        - "Если быть точными, это уникальное пространство под толщей воды, напоминающее Зеркальное море. Объяснять довольно долго, товарищ Командир сам всё поймет, когда выйдет наружу."

    - char: commander
      side: right
      text:
        - "Зеркальное море прямо под водой?.."

chapter2:
  rows:

    - char: sovetskaya_belorussiya
      side: left
      text:
        - "Товарищ Командир, добро пожаловать в самое сердце «Святилища Арканы» Северного Парламента!"

    - text:
      - "Стоило мне выйти из шлюза, как ожидаемого давления воды не последовало. Передо мной раскинулось необъятное пространство."
      - "Под ногами — слой спокойной морской воды. Но если поднять голову, то вместо неба вверху тоже колышется толща океана."
      - "Всюду дрейфуют айсберги с идеально ровными срезами, а две колоссальные ленты, закручиваясь спиралью, уходят прямиком в верхние воды. Всё это пространство пропитано нереальным, почти сказочным сюрреализмом."
      - "Перед отправлением я думал, что «Святилище» — это надводная база. Оказавшись в подлодке, ожидал увидеть подводные руины. Но я и представить не мог, что столкнусь с настолько величественным зрелищем..."

    - char: kirov
      side: left
      text:
        - "Давненько я здесь не была. Тут всё так же грандиозно, как и всегда."

    - char: tallinn
      side: right
      text:
        - "Хм, Командир просто застыл в изумлении."

    - char: murmansk
      side: left
      text:
        - "Хи-хи, у нас была точно такая же реакция, когда мы попали сюда впервые... Потребовалось немало времени, чтобы просто привыкнуть к этой красоте!"

    - char: sovetskaya_belorussiya
      side: right
      text:
        - "Товарищ Командир, пора выдвигаться. Дальше нас ждёт ещё много интересного."
        - "Используйте ледокольную подлодку как командный флагман. Остальные — в эскорт! Мы направляемся к «Вратам» Святилища!"
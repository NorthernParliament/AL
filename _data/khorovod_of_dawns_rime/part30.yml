chapter1:
  rows:

    - char: sovetsky_soyuz_old
      side: left
      text:
        - "Благодаря операции в «Святилище Арканы» каждый из вас на собственном опыте ощутил уникальность товарища Командира."
        - "Эта миссия доказала, что влиянию Командира поддаются не только кансэн, но и обычные Кубы Мудрости, а также другие устройства, использующие их в качестве источника энергии."
        - "Но что еще более поразительно — те Кубы Мудрости, что мы брали с собой в «Святилище», сохранили свои измененные свойства даже после завершения операции и отбытия Командира..."

    - char: sovetskaya_belorussiya
      side: right
      text:
        - "Ты считаешь, что товарищ Командир и есть тот человек из архивов? То самое «семя перемен», привносящее чудесные изменения в Кубы Мудрости?"

    - char: sovetsky_soyuz_old
      side: left
      text:
        - "Трудно сказать наверняка. В извлеченных данных нет прямого ответа на этот вопрос."
        - "Однако... как минимум можно утверждать: товарищ Командир может стать тем, кто нам нужен. Он может стать нашим семенем."
        - "Сейчас здесь нет посторонних, так что я скажу прямо."
        - "Я знаю о ваших сомнениях относительно «Кораблей-прототипов». В материалах, полученных из «Святилища», действительно есть сведения, которые эти сомнения только подкрепляют."
        - "Но вы и сами понимаете: хотя территория Северного Парламента огромна, большая её часть — малонаселенная и труднодоступная вечная мерзлота."
        - "Чтобы в долгосрочной перспективе превзойти в производстве и технологиях те фракции, что обладают лучшими условиями, но узким кругозором, нам необходимо получить решающее преимущество."
        - "По крайней мере, сейчас преимущество в информации на нашей стороне... Теперь нужно лишь копить силы до того дня, когда нам придется заявить о себе."
        - "Лазурный Путь, Багровая Ось, Сирены, Пепел или иные неведомые силы... Кем бы они ни были и каких бы взглядов ни придерживались — если их технологии могут нам помочь, мы обязаны их использовать."

    - char: sovetskaya_rossiya
      side: right
      text:
        - "Если так, то не стоило ли приложить все усилия, чтобы удержать товарища Командира здесь? Почему мы так легко позволили Союзу Орла забрать его?"

    - char: sovetsky_soyuz_old
      side: left
      text:
        - "…… Потому что штаб Лазурного Пути, почти ставший рупором Союза Орла и Королевского Флота, был готов на всё, лишь бы поместить его под свою «защиту»!"
        - "Похоже, после того как мощь нашего полярного флота их потрясла, нас, с нашим неоднозначным отношением к технологиям Сирен, стали считать одним из «дестабилизирующих» факторов."

    - char: sovetskaya_belorussiya
      side: right
      text:
        - "Хех, какой ограниченный подход..."

    - char: sovetsky_soyuz_old
      side: left
      text:
        - "Для будущего Северного Парламента и всего человечества наш «План расширения Великого флота» имеет первостепенное значение."
        - "А для успеха этого Плана присутствие товарища Командира необходимо. Присутствие «Ключа» необходимо."
        - "Но это дела далекого будущего. У нас еще много времени, а пока мы должны твердо стоять на ногах и выполнять задачи, стоящие перед нами сегодня."
        - "Вот документ, расшифровка которого только что завершена. Возможно, это самая важная часть всех добытых материалов. Прошу вас ознакомиться с ней максимально внимательно..."
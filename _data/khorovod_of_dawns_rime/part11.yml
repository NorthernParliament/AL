chapter1:
  rows:

    - char: gremyashchy
      side: left
      text:
        - "Внимание, появились оборонительные силы Сирен."

    - char: murmansk
      side: right
      text:
        - "Ну вот, мы же совсем недавно здесь всё зачистили..."

    - char: commander
      side: left
      text:
        - "Похоже, это и вправду сплошь устаревшие модели."

    - char: kirov
      side: right
      text:
        - "Модели врагов в «Святилище Арканы» никогда не обновлялись; они остаются такими же, какими были десятилетия назад, когда мы их только увидели."
        - "В те времена именно такие Сирены пришли из океана и принесли всему человечеству страшное бедствие..."
        - "Но для нас нынешних такие враги не стоят и выеденного яйца! Товарищи, время дорого, покончим с ними быстро. Ура!"
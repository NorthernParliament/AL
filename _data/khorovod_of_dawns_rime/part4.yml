chapter1:
  rows:

    - text:
      - "БАБАХ!!!"

    - char: gremyashchy
      side: left
      text:
        - "Курс расчищен, командный корабль может продолжать движение."

    - text:
      - "Гремящий, верная доблестному стилю боя Северного Парламента, с невозмутимым видом разделалась с разрозненными вражескими судами, встретившимися на пути. Даже среди всех эсминцев, которыми мне доводилось командовать, её боевые навыки — одни из лучших."

chapter2:
  rows:

    - char: commander
      side: left
      text:
        - "Это был впечатляющий бой."

chapter3:
  rows:

    - char: commander
      side: left
      text:
        - "Твой стиль ведения боя прекрасен."

chapter4:
  rows:

    - char: gremyashchy
      side: right
      text:
        - "Ты преувеличиваешь. Это лишь часть моих обязанностей. Да, именно так."

    - char: kirov
      side: left
      text:
        - "Ха-ха-ха! У товарища Командира намётанный глаз. Гремящий — эсминец Северного Парламента, удостоенный звания Гвардейского. Она настоящий ас в нашем флоте."

    - text:
      - "Насколько я помню, звание Гвардейских в Северном Парламенте — это...."

chapter5:
  rows:

    - char: commander
      side: left
      text:
        - "Почётное наименование элитных подразделений."

chapter6:
  rows:

    - char: commander
      side: left
      text:
        - "Звание, даруемое особо отличившимся частям."

chapter7:
  rows:

    - char: sovetskaya_belorussiya
      side: right
      text:
        - "Совершенно верно! Даже во всём флоте Северного Парламента кансен, носящих гвардейское звание, можно пересчитать по пальцам."

    - char: commander
      side: left
      text:
        - "О доблестной славе и подвигах Гвардии Северного Парламента я был наслышан ещё во времена пребывания в Союзе Орла..."

    - char: gremyashchy
      side: right
      text:
        - "Я никогда не гналась за наградами. Просто выполняла свою работу, и как-то незаметно всё пришло к этому."

    - char: kirov
      side: left
      text:
        - "Гремящий, умение искренне принимать похвалу — тоже одна из добродетелей воина."

    - char: gremyashchy
      side: right
      text:
        - "Ну... тогда спасибо... В общем... как-то так..."

    - char: commander
      side: left
      text:
        - "Странно, что столь выдающуюся девушку-корабль я ни разу не встречал во время недавних операций в Арктике."

    - char: sovetskaya_belorussiya
      side: right
      text:
        - "Зона ответственности Гремящий в основном пролегает вдоль полярных конвоев. Её перевели сюда специально для сопровождения нашей миссии."

    - char: kirov
      side: left
      text:
        - "Назначить гвардейца в охрану такой важной персоны, как товарищ Командир — пожалуй, самое подходящее решение~"

    - char: commander
      side: right
      text:
        - "Большое спасибо. Надеюсь, в этот раз мы все благополучно завершим задание."

chapter8:
  rows:

    - char: commander
      side: left
      text:
        - "(Продолжить наблюдение за Гремящий.)"

    - text:
      - "В отличие от тактики обычных эсминцев, Гремящий, помимо пушек и торпед, предпочитает на высокой скорости сближаться с врагом, а затем обрушивать на него огромный кистень, размер которого совсем не вяжется с её хрупким телосложением."
      - "Помимо белоснежной фуражки и шинели, в глаза бросается её шарф, напоминающий крылья."
      - "При быстром движении развевающийся на морском ветру шарф и впрямь похож на крылья ангела..."

chapter9:
  rows:

    - char: commander
      side: left
      text:
        - "(Продолжить командование боем.)"

chapter10:
  rows:

    - char: gremyashchy
      side: right
      text:
        - "Так пристально на меня смотришь... Неужели Командир... извращенец?"

    - char: commander
      side: left
      text:
        - "......"
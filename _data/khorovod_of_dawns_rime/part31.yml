chapter1:
  rows:

    - char: zero
      side: left
      status: is-red
      text:
        - "Твои выводы?"

    - char: empress
      side: right
      status: is-red
      text:
        - "«Командир» на этой экспериментальной площадке действительно является уникальной сущностью."
        - "Ты заметила это, Зеро? Во время эксперимента объект наблюдения трижды полностью исчезал из этого мира на несколько микросекунд."
        - "Исчезал, а затем появлялся вновь. При этом не было зафиксировано ни энергетических колебаний, ни использования какого-либо оборудования. Это выглядело так, будто в ходе естественного процесса сам мир сначала отверг его, а затем принял обратно."

    - char: zero
      side: left
      status: is-red
      text:
        - "Возможно, это был не активный перенос, а пассивное пересечение..."

    - char: empress
      side: right
      status: is-red
      text:
        - "Если подобный феномен действительно существует... последствия могут быть крайне серьезными."

    - char: zero
      side: left
      status: is-red
      text:
        - "Я понимаю."

    - char: empress
      side: right
      status: is-red
      text:
        - "Твое второе суждение тоже оказалось верным: здешний Обсервер также обладает некоторыми уникальными особенностями."
        - "Хотя причины этих изменений всё еще неясны, благодаря моему искусному вмешательству даже такой «особенный» Обсервер не сможет обнаружить, что в ход её эксперимента были внесены коррективы~"

    - char: zero
      side: left
      status: is-red
      text:
        - "Продолжай скрытое наблюдение. Не вмешивайся в действия экспериментальных структур и не делай ничего, что могло бы выдать твое присутствие. Что касается Код G — я направила другие подразделения Арбитров для решения этого вопроса."
        - "Это место требует предельно деликатного обращения. Здесь сходятся переменные, влияние которых не способна просчитать даже система естественных вычислений..."
        - "......."
        - "Куда же на самом деле отправлялся «Командир» в те мгновения?.."
chapter1:
  rows:

    - char: sovetskaya_belorussiya
      side: left
      text:
        - "Товарищ Командир, вы пришли в себя?"

    - char: commander
      side: right
      text:
        - "...Сознание всё ещё немного туманное. Я только что был в обмороке?"

    - char: sovetskaya_belorussiya
      side: left
      text:
        - "Лишь на короткое мгновение. Флот уже успешно прошёл сквозь «Врата»."

    - char: commander
      side: right
      text:
        - "Хорошо... Это вы перенесли меня обратно на флагман?"

    - char: sovetskaya_belorussiya
      side: left
      text:
        - "К сожалению, нет... Сразу после прохода через «Врата» нас разбросало по этой акватории. Панель управления и сами «Врата», служившие входом, бесследно исчезли."
        - "А когда мы начали перегруппировку, то обнаружили, что вы лежите без сознания на борту подлодки."

    - char: commander
      side: right
      text:
        - "Простите."

    - char: sovetskaya_belorussiya
      side: left
      text:
        - "Ох, ну что вы. Скорее это нам стоит извиняться за то, что втянули вас в поход на поле боя с неизвестными угрозами."

    - char: commander
      side: right
      text:
        - "Командиру флота не подобает действовать отдельно от своих кораблей..."

    - char: sovetskaya_belorussiya
      side: left
      text:
        - "Ха-ха-ха, доблестные слова, товарищ Командир!"

    - char: tallinn
      side: right
      text:
        - "На самом деле, не вы один потеряли сознание. Каждый из нас испытал кратковременное недомогание после прохода через «Врата»."

    - char: gromky
      side: left
      text:
        - "Да уж, такое чувство, будто по голове со всей дури приложили железным молотом. Странная ситуация..."

    - char: kirov
      side: right
      text:
        - "Тем не менее, сияющий впереди мегаполис доказывает, что мы действительно попали на «ту сторону» Врат."

    - char: sovetskaya_belorussiya
      side: left
      text:
        - "Значит, вся эта чертовщина — какая-то ловушка, расставленная Сиренами... Впрочем, раз это Зеркальное море, появление подобных странностей вполне объяснимо."

    - char: murmansk
      side: right
      text:
        - "Огромные айсберги на поверхности тоже изменились... Как и та панель управления, они теперь покрыты светящимися узорами, словно активированные механизмы..."

    - char: tallinn
      side: left
      text:
        - "Выходит, постоянное восстановление айсбергов в этом Зеркальном море не было бессмысленной реставрацией ландшафта. Всё здесь, включая льды — неотъемлемая часть этого гигантского города."

    - char: gremyashchy
      side: right
      text:
        - "Те две колеи тоже изменились."
        - "Они так ярко мерцают! Вот бы прокатиться по ним с ветерком, наверняка было бы весело!"

    - char: kirov
      side: left
      text:
        - "Прежняя комната управления находилась внутри айсберга прямо под одной из этих колей. Чтобы добраться до них, нам нужно было подняться оттуда."
        - "Разумеется, прежде чем предпринимать какие-либо дальнейшие шаги по разведке, нам необходимо заново определить местоположение комнаты управления и «Врат», чтобы обеспечить путь назад."

    - char: sovetskaya_belorussiya
      side: right
      text:
        - "Согласна. Жаль, что в этот раз у нас нет поддержки авиации. Будем собирать информацию по пути и искать комнату управления под одной из колей."
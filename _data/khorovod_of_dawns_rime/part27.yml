chapter1:
  rows:

    - char: commander
      side: left
      text:
        - "…………………………"
        - "Это место... Зал, где находится устройство управления?"

    - char: sovetskaya_belorussiya
      side: right
      text:
        - "………… хр-р-р..."

    - char: kirov
      side: left
      text:
        - "Пфу-у... пфу-у... хр-р..."

    - char: tallinn
      side: right
      text:
        - "...М-м... хр-р..."

    - text:
      - "Девушки из Северного Парламента лежат по всему залу. Ни следов ранений, ни признаков боли — они просто погружены в глубокий, безмятежный сон."

    - char: commander
      side: left
      text:
        - "Слава богу, все целы и невредимы..."
        - "Помню, как мы вошли во «Врата»..."
        - "Точно, «Врата»..."

    - text:
      - "В отличие от моих воспоминаний, ледяная стена в конце зала, прежде идеально гладкая, теперь покрыта густой сетью трещин, словно готова рассыпаться в любой момент."
      - "Память подводит... Неужели тот сияющий город за «Вратами», поиски в командном пункте и та последняя отчаянная битва — всё это было лишь..."

    - char: commander
      side: left
      text:
        - "…… Похоже, это был не просто сон."

    - text:
      - "Рядом со мной на полу стоит тот самый небольшой ящик с документами — я положил его подле себя на флагмане перед тем, как потерять сознание в разгаре боя. Он здесь, в реальности."
      - "Я открываю ящик: все материалы целы. Прямо сверху лежит документ с чётким заголовком..."
      - "Проект «Рассвет»."
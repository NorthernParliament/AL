chapter1:
  rows:

    - text:
      - "БА-БАХ!"

    - char: sovetskaya_belorussiya
      side: left
      text:
        - "Тц... Вторая башня главного калибра повреждена! Доложите о состоянии флота!"

    - char: kirov
      side: right
      text:
        - "У Гремящий повреждено несколько вспомогательных орудий, но общее состояние в норме. У меня тоже без критических повреждений, только боезапас на исходе."

    - char: tallinn
      side: left
      text:
        - "Громкий получила тяжелые повреждения и отошла на вторую линию. У Мурманск и у меня повреждения ГК, радаров и двигательных установок разной степени тяжести, но мы еще можем сражаться."
        - "Что касается серийных моделей — кроме флагмана Командира, все остальные подводные суда уничтожены."

    - char: sovetskaya_belorussiya
      side: right
      text:
        - "Поскольку нашей целью было «Святилище», которое долгое время находилось под нашим контролем, наш нынешний состав серийного флота изначально не был готов к столь ожесточенному столкновению..."

    - char: tallinn
      side: left
      text:
        - "Так дело не пойдет. О том, чтобы пробиться к точке эвакуации и удерживать её, не может быть и речи. Нам будет трудно удерживать фронт даже ближайшие четыре часа."

    - char: kirov
      side: right
      text:
        - "Поверить не могу, что всё обернулось так. Мы ведь изучили здесь каждую льдинку... Откуда здесь взялся враг такого масштаба?!"

    - char: sovetskaya_belorussiya
      side: left
      text:
        - "Эта операция — провал Северного Парламента, и мы готовы нести за это полную ответственность. Но товарищ Командир ни в коем случае не должен принести себя в жертву здесь."
        - "Киров, Гремящий! Вы сопроводите товарища Командира к пункту управления под другой колеёй. Все остальные корабли, включая меня, станут щитом для флагмана. Мы выведем Командира любой ценой."

    - char: tallinn
      side: right
      text:
        - "Неужели это единственная возможная тактика?.. Даже так успех не гарантирован."

    - char: kirov
      side: left
      text:
        - "У нас нет выбора лучше... Я поддерживаю этот план. Товарищ Командир, приступаем к выполнению."

    - char: commander
      side: right
      text:
        - "Я не согласен."

    - char: kirov
      side: left
      text:
        - "Хех, простите, товарищ Командир, но даже если вы откажетесь, мы всё равно это сделаем. Вы не тот человек, которому позволено погибнуть в этом месте."

    - char: commander
      side: right
      text:
        - "Под другой колеёй... скорее всего, ничего нет."

    - char: sovetskaya_belorussiya
      side: left
      text:
        - "Что?! Как такое возможно... Вы узнали структуру этого места из тех данных, что мы только что извлекли?!"

    - char: commander
      side: right
      text:
        - "Можно и так сказать."

    - char: sovetskaya_belorussiya
      side: left
      text:
        - "Проклятье... У нас больше нет ни времени, ни сил на повторный анализ и поиски устройства управления этим Зеркальным морем..."
        - "Мне очень жаль, товарищ Командир."

chapter2:
  rows:

    - char: commander
      side: left
      text:
        - "С того момента, как я ступил на поле боя, я был готов к подобному исходу."

chapter3:
  rows:

    - char: commander
      side: left
      text:
        - "Возможно, есть другой способ эвакуации, не сдавайтесь!"

chapter4:
  rows:

    - char: commander
      side: left
      text:
        - "Как всем эвакуироваться отсюда?"

    - char: zero_rec
      side: right
      status: is-yellow
      text:
        - "Здесь нет пути для отступления."

    - char: commander
      side: left
      text:
        - "......."

    - char: zero_rec
      side: right
      status: is-yellow
      text:
        - "Сражайтесь, пока свет не угаснет."

chapter5:
  rows:

    - char: commander
      side: left
      text:
        - "...Друзья, посмотрите внимательнее на центральный архитектурный комплекс. Вам не кажется, что сияние стало чуть слабее, чем раньше?"

    - char: gromky
      side: right
      text:
        - "Вроде бы да... Неужели нам нужно сражаться до тех пор, пока свет полностью не погаснет?.."

    - char: commander
      side: left
      text:
        - "Боюсь, что так."

    - char: murmansk
      side: right
      text:
        - "Судя по тому, с какой скоростью он затухает, кто знает, сколько нам ещё придётся биться..."

    - char: kirov
      side: left
      text:
        - "Это неважно. По крайней мере, теперь у нас появился луч надежды. А пока есть надежда, мы будем сражаться, не оглядываясь назад!"

    - char: tallinn
      side: right
      text:
        - "Если не думать об отступлении, а сосредоточиться только на том, чтобы выиграть время, количество тактических вариантов возрастает. Возможно, мы действительно сможем продержаться..."

    - char: gremyashchy
      side: left
      text:
        - "Пожалуйста, держитесь рядом со мной, Командир. Я защищу вас ценой своей жизни. Хм, вот так."

    - char: commander
      side: right
      text:
        - "..."
        - "Для меня честь сражаться плечом к плечу с вами в такой момент."

    - char: sovetskaya_belorussiya
      side: left
      text:
        - "Для нас тоже, товарищ Командир."
        - "Всем кораблям приготовиться! Пока свет не погаснет — сражайтесь в своё удовольствие!"

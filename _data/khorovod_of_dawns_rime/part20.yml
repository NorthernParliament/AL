chapter1:
  rows:

    - text:
      - "Отряд продвигался по запутанным коридорам. Несмотря на обилие комнат, планировка в целом была упорядоченной: чем глубже мы заходили, тем реже встречались двери."

    - char: gromky
      side: left
      text:
        - "Командир, я нашла ещё один документ!"

    - char: commander
      side: right
      text:
        - "Спасибо за службу."

    - char: gromky
      side: left
      text:
        - "Хе-хе, тогда я загляну вон в ту комнату, поищу ещё!"

    - char: murmansk
      side: right
      text:
        - "Ху-ху-ху, это прямо как охота за сокровищами! Я тоже посмотрю в другом месте~"

chapter2:
  rows:

    - char: kirov
      side: left
      text:
        - "Хм, в этом документе говорится... «Относительно Плана...», а дальше не разобрать. Похоже на бракованный лист из-за опечатки."

    - char: sovetskaya_belorussiya
      side: right
      text:
        - "Содержание плана? Или детали реализации... Дай посмотрю."
        - "О... здесь, кажется, написано про Корабли-прототипы. В конце слово «Корабль»... Напечатано слишком бледно, сложно разобрать наверняка."

    - char: commander
      side: left
      text:
        - "Корабли-прототипы... Знакомый термин."
        - "Помню, именно так Штаб решил называть внезапно появившуюся Гасконь после операции в Базилике Ирис."

    - char: kirov
      side: right
      text:
        - "Верно, но говорят, что Королевский Флот начал использовать определение «Корабль-прототип» ещё раньше. В недавних документах Фридрих дер Гроссе тоже классифицируется как Корабль-прототип."

    - char: commander
      side: left
      text:
        - "Фридрих дер Гроссе... Действительно, окутанная тайнами личность, информации о которой крайне мало."

    - char: kirov
      side: right
      text:
        - "Таинственный лидер Железной Крови, которая появилась сразу после завершения операции по уничтожению Бисмарк, стабилизировала ситуацию во фракции и крепко взяла верховную власть в свои руки. И Королевский Флот определяет её именно как «Корабль-прототип»."
        - "В таком случае... товарищ Командир, вам не кажется это странным? Кого именно можно классифицировать как Корабль-прототип?"
        - "Когда появились самые первые кансэн, в мире обычно существовал реальный военный корабль с тем же именем."
        - "Однако с развитием технологий использования Кубов Мудрости, ещё десятилетия назад все фракции перешли на модель боя, где кансэн сражаются плечом к плечу с серийными кораблями своего типа. Одиночные именные корабли уже давно не спускали на воду."
        - "Практика давно доказала: если проект корабля создан, кансэн может быть рождена с помощью Куба Мудрости, даже если физическое воплощение этого корабля так и не было построено в металле."

    - char: sovetskaya_belorussiya
      side: left
      text:
        - "Да, возьмем в качестве примера меня. У Северного Парламента был проект, были выделены ресурсы и разработаны чертежи, и в итоге я родилась с помощью Куба Мудрости."
        - "Сейчас это обычное дело, однако никто и никогда не называл нас «кораблями-прототипами»."

    - char: commander
      side: right
      text:
        - "В Штабе нет записей о происхождении термина «корабль-прототип»... Возможно, дело в каких-то отличиях в процессе их создания по сравнению с обычными кансэн?"

    - char: kirov
      side: left
      text:
        - "Судя по имеющимся у нас данным, наши ученые полагают, что Куб Мудрости на самом деле является неким носителем информации."
        - "Кансэн могут рождаться из Куба Мудрости только потому, что наши данные уже были каким-то образом записаны в него заранее."
        - "Корабли, чьи данные зафиксированы в Кубе, могут из него появиться. Те же, чьих записей там нет — не могут."

    - char: commander
      side: right
      text:
        - "...Вы клоните к тому, что «обычными» называют те корабли, чьи данные уже были в Кубе, а «прототипами» — те, чьих записей там не было, но они всё равно были воплощены каким-то иным способом?"
        - "И эти записи... вы предполагаете, что они являются результатом чьего-то тщательного проектирования и внесения в Куб Мудрости извне?!"

    - char: kirov
      side: left
      text:
        - "Именно! И если эта гипотеза верна, то кто именно определил, какая информация может храниться в Кубах, а какая — нет?"
        - "И когда мы говорим «План» в названии «корабль-прототип»... чей это на самом деле план?"

    - char: commander
      side: right
      text:
        - "......"

    - char: sovetskaya_belorussiya
      side: left
      text:
        - "Хотя на данный момент всё это лишь теории, мы так стремимся исследовать «Святилище Арканы» именно потому, что здесь может скрываться ключевая информация, которая нам необходима."
        - "Устройство активации на базе Куба Мудрости в самом сердце Зеркального моря доказывает: как минимум Сирены вели тайные исследования Кубов ещё десятилетия назад."
        - "А этот документ, который мы только что нашли... Пусть это лишь обрывок обложки, он подтверждает, что Сирены уже тогда знали о существовании кораблей-прототипов."
        - "Это место действительно похоже на запечатанную на многие годы сокровищницу, хранящую бесценные крупицы истины..."
chapter1:
  rows:

    - char: akagi
      side: left
      text:
        - "Мы здесь уже довольно долго, но от флота Железной крови нет и намека на сборы. Что всё это значит? Когда Фридрих звала нас, она говорила о совместной операции."

    - char: z2
      side: right
      text:
        - "Мне не очень известны планы Фридрих... Однако сейчас наши основные силы тоже находятся в океане NA. Если все действуют в одной акватории, это ведь тоже можно назвать «совместной операцией»?.."

    - char: kaga
      side: left
      text:
        - "Тогда где конкретно сейчас находятся ваши основные силы и каков дальнейший план?"

    - char: z2
      side: right
      text:
        - "Как видите, я всего лишь эсминец, оставленный здесь в одиночестве для охраны. О боевых планах основных сил мне ничего не известно."
        - "Вот если бы здесь была Ойген, она бы, возможно, смогла что-то разузнать..."
        - "В противном случае спросите саму Фридрих. Она упоминала, что собирается на банкет в Сардинию, так что какое-то время она наверняка проведет в Средиземном море."

    - char: kaga
      side: left
      text:
        - ".... Мы только что прибыли из Таранто. Ты предлагаешь нам повернуть назад?"

    - char: z2
      side: right
      text:
        - "Ах, простите. Разумеется, можно связаться и по радио, связь здесь отличная. Я прямо сейчас отправлю запрос в штаб Железной крови."

    - char: akagi
      side: left
      text:
        - "Достаточно! Для проведения операции сил Империи Сакуры более чем достаточно. Раз вы не желаете координировать действия со мной, то и мне ваши маневры неинтересны."
        - "Немедленно начните пополнение запасов. Как только закончим — мы выступаем."

    - char: z2
      side: right
      text:
        - "Мы — союзники по Багровой Оси, так что с такими пустяками проблем не возникнет. Но неужели вы так спешите? На завтра была запланирована экскурсионная программа..."

    - char: kaga
      side: left
      text:
        - "Благодарим за гостеприимство Железной крови, но это лишнее. Мы здесь не ради туризма."

    - char: z2
      side: right
      text:
        - "Вот как... Обстановка в океане NA сложная и переменчивая, а мы долгое время находились в блокаде Королевского флота, поэтому не можем предоставить вам актуальные разведданные."
        - "Тем не менее, я немедленно доложу в штаб о вашем выходе. Если поступят какие-либо распоряжения или основные силы захотят поделиться целями для совместной атаки, я сразу с вами свяжусь."
        - "Ах да, по поводу связи... Вместе с припасами примите наше новейшее коммуникационное оборудование Железной крови."
        - "Эти устройства специально разработаны для противодействия помехам Сирен. Думаю, они вам пригодятся."

    - char: akagi
      side: left
      text:
        - "Наконец-то хоть какие-то хорошие новости. Неужели проблема с мгновенной потерей связи при входе в Зеркальное море решена?"
        - "Мы сможем забрать это оборудование с собой в Империю Сакуры?"

    - char: z2
      side: right
      text:
        - "Конечно. Это подарки, подготовленные специально для вас."

    - char: kaga
      side: left
      text:
        - "Весьма признательны."

    - char: z2
      side: right
      text:
        - "Зона снабжения и ремонта в той стороне. Прошу за мной."
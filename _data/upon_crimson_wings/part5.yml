chapter1:
  rows:

    - char: kaga
      side: left
      text:
        - "Впереди порт Дакар?.. Я слышала, что это важный военный порт Доминиона Виши в Африке, но почему здесь так пустынно..."

    - char: jintsuu
      side: right
      text:
        - "Не видно не только флота Железной крови, собранного для операции, но даже гарнизонных сил Доминиона Виши."
        - "Хм... Ну хорошо, не совсем пусто. К нам приближается один эсминец... Должно быть, Железная кровь прислала его встретить нас."

chapter2:
  rows:

    - char: z2
      side: left
      text:
        - "Добро пожаловать в Дакар. Я — эсминец Z2. Согласно приказу командования Железной крови, я ожидаю вашего прибытия."

    - char: yukikaze
      side: right
      text:
        - "Э? В порту Дакар только ты одна?"

    - char: z2
      side: left
      text:
        - "Да, на данный момент в порту нахожусь только я. Впрочем, вы ведь прибыли сюда не для смотра флота Железной крови, верно?"
        - "Давайте будем краткими и эффективными — перейдем сразу к делу. Прошу за мной."

    - char: akagi
      side: right
      text:
        - "Хи-хи, в этом вся Железная кровь с их эффективностью. Что ж, я заинтригована~"

chapter3:
  rows:

    - char: yuubari
      side: left
      text:
        - "Путь исследований, которым идет Железная кровь... он в корне отличается от нашего..."

    - char: akagi
      side: right
      text:
        - "Так я и думала... Их изыскания в области изучения Кубов мудрости действительно крайне любопытны."
        - "Попытки питания модульных крепостей от Кубов мудрости, технологии синергии бионики и механики в корабельном вооружении, а также совершенно новые направления модернизации оборудования..."
        - "У них даже есть эксперименты по анализу Зеркальных морей... Хе-хе, по возвращении нам стоит скорректировать наши исследования, опираясь на данные Железной крови."

    - char: yuubari
      side: left
      text:
        - "Без проблем. Используя эти материалы, мы очень скоро сможем подготовить базу для подобных испытаний."

    - char: akagi
      side: right
      text:
        - "(Похоже, Железная кровь извлекла немалую выгоду из столкновений с Сиренами... А вот со стороны Империи Сакуры...)"
        - "(Ха, как я и думала, чтобы получить нечто по-настоящему ценное, нужно действовать самостоятельно...)"
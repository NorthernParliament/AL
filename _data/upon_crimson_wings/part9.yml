chapter1:
  rows:

    - char: yukikaze
      side: left
      text:
        - "Эй, откуда вдруг взялся этот туман?.. Разве сейчас подходящая погода для морского тумана?"

    - char: jintsuu
      side: right
      text:
        - "Боюсь, всё не так просто. Любые перемены в зоне контроля Сирен заслуживают внимания, тем более такой внезапный туман... Всем сохранять бдительность!"

    - char: yuubari
      side: left
      text:
        - "У-у-у... Стрелки на приборах сошли с ума, показания резко скачут... Акаги, наше электронное оборудование под ударом помех!"

    - char: communicator
      side: right
      text:
        - "Пш-ш-ш-ш —————— Пш-ш ————"

    - char: yukikaze
      side: left
      text:
        - "Ва-а-а-а!! Коммуникатор вдруг сам зашумел!"
        - "Ой... Кажется, из него доносятся чьи-то голоса! Но... помехи слишком сильные, Юкикадзэ-сама не может разобрать ни слова..."

    - char: yuubari
      side: right
      text:
        - "Не только наши устройства, но даже новейшее оборудование Железной крови подверглось воздействию. Очевидно, Сирены применили куда более мощные средства подавления, чем обычно."
        - "Что касается этих звуков, похожих на голоса, из неисправных коммуникаторов... мне нужно время, чтобы изучить их природу."

    - char: jintsuu
      side: left
      text:
        - "Как и ожидалось, этот морской туман — какая-то особая мера противодействия Сирен против нашего флота... Скорее всего, следующими нас встретят основные силы врага."

    - char: kaga
      side: right
      text:
        - "Сестра, ситуация аномальная. Будет лучше сбавить ход и разведать обстановку."

    - char: akagi
      side: left
      text:
        - "Этот туман... неужели это..."

    - char: kaga
      side: right
      text:
        - "Сестра?!"

chapter2:
  rows:

    - char: akagi
      side: left
      text:
        - "Ах, прости, я немного отвлеклась. Что ты только что сказала, Кага?"
        - "............ Куда все делись?"
        - "Кага?! Дзинцу?!.. Юбари! Юкикадзэ!!!!"
        - "Да что же здесь происходит?"
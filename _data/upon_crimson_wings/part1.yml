chapter1:
  rows:

    - char: kaga
      side: left
      text:
        - "Стоит пересечь канал, и мы окончательно войдем в Средиземное море. Это было долгое путешествие..."

    - char: yuubari
      side: right
      text:
        - "Какое странное чувство... Суэцкий канал — важнейшие врата Средиземноморья, но в теории он остается нейтральной зоной, открытой для кораблей всех сторон."

    - char: yukikaze
      side: left
      text:
        - "Да уж, и это при том, что мы ведем ожесточенную борьбу с Лазурным Путем..."

    - char: jintsuu
      side: right
      text:
        - "Ситуация с Суэцким каналом довольно сложная. Несмотря на статус нейтральной зоны, фактически контроль над ним всегда удерживал Королевский Флот."
        - "Разумеется, после того как война с Железной Кровью и Империей Сардиния обострилась, контроль над каналом несколько раз переходил из рук в руки."
        - "В ходе эскалации конфликта передовые силы обеих сторон всё чаще склонялись к тому, чтобы просто уничтожить канал и тем самым решить проблему раз и навсегда."
        - "Однако... если этот важнейший мост между океанами действительно будет разрушен в пламени междоусобной войны человечества, противостояние Сиренам в будущем станет еще более изнурительным. Ни одна из фракций не желает такого исхода."
        - "Опираясь на этот последний пункт согласия, мы подписали с Лазурным путем официальную конвенцию, признающую канал постоянной нейтральной зоной и разрешающую свободный проход для всех сил."
        - "Само собой, конвенция касается только самого канала. Если бы Королевский флот всё еще контролировал Восточное Средиземноморье, нас бы атаковали сразу после выхода из него..."

    - char: yuubari
      side: left
      text:
        - "Раз нападения до сих пор не последовало... значит, контроль над восточной частью моря больше не принадлежит Королевскому флоту?"

    - char: akagi
      side: right
      text:
        - "Именно так. Сейчас большая часть флотов Доминиона Виши и Империи Сардиния развернута в Средиземном море. Королевскому флоту едва хватает сил, чтобы удерживать западную его часть."
        - "Лазурному пути даже пришлось упразднить один из своих штабов... Ха-ха-ха... Как ностальгично. Я про штаб в Эль-Искандарии, что когда-то сжимал горло этому каналу."

    - char: yuubari
      side: left
      text:
        - "Если бы мы не могли пройти здесь, то для выхода в океан NA нам пришлось бы огибать целый континент Африка..."

    - char: yukikaze
      side: right
      text:
        - "А... так это же тот самый путь, по которому отправилась Пятая дивизия авианосцев...?!"

    - char: akagi
      side: left
      text:
        - "Хи-хи-хи... Раз уж они — наш «козырь в рукаве», им надлежало выбрать непредсказуемый маршрут. Если бы они открыто прошли через Средиземное море, разве не выдали бы себя в тот же миг?"
        - "Хотя влияние Королевского флота здесь ослабло, они вовсе не ослепли. Их взоры прикованы к Средиземноморью каждую секунду."
        - "К тому же у них и Свободного Ириса в Восточном Средиземноморье всё еще остается немало сил. Если бы противник не желал успешного завершения переговоров о прекращении огня, нам наверняка пришлось бы пробиваться к портам Империи Сардиния с боем."

    - char: jintsuu
      side: right
      text:
        - "Акаги, ты и вправду одобряешь это соглашение о перемирии?.. Ведь флот Союза Орла тоже ведет боевые действия в океане NA, и есть высокая вероятность, что мы встретимся с ней..."

    - char: akagi
      side: left
      text:
        - "Какой хороший вопрос, Дзинцу."

    - char: jintsuu
      side: right
      text:
        - "...Если не хочешь отвечать, считай, что я не спрашивала."

    - char: akagi
      side: left
      text:
        - ".... Положение дел в Европе не касается Империи Сакуры. Временное перемирие в океане NA лишь на руку нашим операциям."
        - "Что до Союза Орла... Наша главная цель — воспользоваться шансом, чтобы захватить технологии Сирен и раскрыть их тайны. Сейчас нет времени на бессмысленные стычки с ними."
        - "К тому же, настоящая цель, заслуживающая нашего внимания, находится вон там..."

    - char: yukikaze
      side: right
      text:
        - "В той стороне... центр океана NA?"

    - char: akagi
      side: left
      text:
        - "Именно. Говорят, штормовое кольцо, бушующее сейчас в центре, появилось внезапно... Без сомнения, это и есть истинная причина, по которой Лазурный путь начал свою масштабную операцию."
        - "Хотя Железная кровь и предоставила немало данных, но... хе-хе, меня не покидает чувство, что они утаили в своих отчетах нечто жизненно важное."
        - "Чужаки остаются чужаками. Не стоит питать пустых надежд на посторонних — защитить свои интересы мы можем только сами."
        - "И я лично выясню, какой секрет скрыт в самом сердце этого океана!"
chapter1:
  rows:

    - char: akagi
      side: left
      text:
        - "В воздухе пахнет пороховым дымом... Это до боли знакомое чувство… Неужели это поле битвы операции AF?"
        - "Да... точно, всё верно! Прямо сейчас я на поле боя операции AF!!! Тот Серый Призрак тоже здесь!!!!"
        - "Проклятье... Если бы операция AF прошла успешно, Союз Орла навсегда бы утратил мощь для противостояния нам в Тихом океане... И всё из-за Серого Призрака!"
        - "Та операция, которой я лично руководила, закончилась сокрушительным поражением..."
        - "Даже амулет сестры в самом конце...."
        - "А ведь это было то, что сестра оставила мне....."
        - "Непростительно, непростительно, непростительно... Серому Призраку я это никогда не прощу!"

    - char: enterprise_d?
      side: right
      status: is-red
      text:
        - "Для меня большая честь, что госпожа Акаги из Империи Сакуры помнит об этом до сих пор."

    - char: hornet?d
      side: left
      status: is-red
      text:
        - "Это была по-настоящему славная битва, и твоё командование было весьма впечатляющим~"

    - char: yorktown_d?
      side: right
      status: is-red
      text:
        - "Хи-хи, если хочешь отомстить, мы в любое время и в любом месте готовы снова разыграть с тобой операцию AF."

    - char: enterprise_d?
      side: left
      status: is-red
      text:
        - "По возвращении вы, кажется, списали тот провал на «судьбоносные пять минут». Но на самом деле, даже если бы у тебя было еще пятьдесят минут, что бы ты смогла изменить?"

    - char: hornet?d
      side: right
      status: is-red
      text:
        - "Ах, в прошлый раз ты, кажется, даже сломала амулет, оставленный тебе сестрой Амаги. Как жаль — ведь нового тебе уже никогда не получить~"

    - char: akagi
      side: left
      text:
        - "Заткнитесь все............. Ха-ха-ха-ха-ха! Я как раз собиралась искать вас, а вы сами пришли ко мне в руки!"

    - char: enterprise_d?
      side: right
      status: is-red
      text:
        - "В прошлый раз вам удалось спастись только из-за вмешательства Сирен. Если хочешь сразиться снова — мы всегда готовы."

    - char: akagi
      side: left
      text:
        - "...Хе, я только об этом и мечтала! Неужели вы думаете, что я прошла этот путь, ни капли не изменившись? Думаете, я пришла сюда совершенно неподготовленной?!"
        - "Сильный пожирает слабого, лучший вытесняет худшего — таков закон всего сущего в этом мире..."
        - "Я больше не та Акаги, что могла лишь прятаться за спиной сестры!!!!!"
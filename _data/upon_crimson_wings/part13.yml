chapter1:
  rows:

    - char: zuikaku
      side: left
      text:
        - "Та цель, что несётся впереди на высокой скорости... это Акаги? Ух, из-за помех на радаре нельзя сказать наверняка..."

    - char: shoukaku
      side: right
      text:
        - "Ярко-алый цвет, размашистые движения и то, с каким неистовством она обстреливает всё вокруг — сомнений нет, это Акаги-сэмпай."

    - char: kaga
      side: left
      text:
        - "...Когда я была во власти галлюцинаций, со стороны это выглядело так же?"

    - char: kongou
      side: right
      text:
        - "Да, именно так..."

    - char: kaga
      side: left
      text:
        - "Какое непозволительное малодушие..."

    - char: yamashiro
      side: right
      text:
        - "А? Погодите, смотрите! На этот раз перед Акаги кто-то есть!"
        - "Они уже практически лицом к лицу, но Акаги будто совсем её не замечает и просто продолжает нестись вперёд..."

    - char: zuikaku
      side: left
      text:
        - "Этот цвет и оснастка... Неужели Сирена?!"

    - char: kaga
      side: right
      text:
        - "Если это Сирена, то, боюсь, совершенно новой модели. Её облик не похож ни на одну из тех, что я видела раньше..."
        - "Она не атакует, а просто движется по воде спиной вперёд прямо перед Акаги... Новый гуманоидный командир Сирен?"

    - char: kongou
      side: left
      text:
        - "Это почему-то ужасно бесит... Плыть задом наперёд прямо перед лицом — что это за манера движения такая... Она издевается?!"

    - char: nop
      side: right
      status: is-red
      text:
        - "Хи-хи-хи... А вы как думаете?"

    - char: yukikaze
      side: left
      text:
        - "И-и-и?! Вы слышали?! Голос прозвучал прямо над ухом!"

    - char: yuubari
      side: right
      text:
        - "Звук доносится непосредственно из тумана вокруг нас..."

    - char: zuikaku
      side: left
      text:
        - "Теперь сомнений нет... Это определённо гуманоидный командир Сирен, и она уже заметила наше присутствие."

    - char: shoukaku
      side: right
      text:
        - "Похоже, этот туман — тоже её рук дело... Какая-то новая тактика боя?"

    - char: zuikaku
      side: left
      text:
        - "Начинаем развёртывание. Флот делится на две группы. Авианосное соединение вступает в бой с новой Сиреной, чтобы отогнать её от Акаги-сэмпай. Эсминцы и лёгкие крейсера в это время проводят спасательную операцию и обеспечивают прикрытие."
        - "Госпожа Кага, такой план пойдёт?"

    - char: kaga
      side: right
      text:
        - "Вполне. Смотрите не зацепите своих. К бою!"
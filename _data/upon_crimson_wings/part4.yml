chapter1:
  rows:

    - char: kaga
      side: left
      text:
        - "Сестра, ты уверена, что уйти вот так — это хорошая идея?"

    - char: akagi
      side: right
      text:
        - "Если мы не уйдем сейчас, кто знает, сколько еще времени нам придется на них тратить..."
        - "Мы едва дождались, пока Фридрих соизволит не спеша явиться сюда, затем переговоры, затем подписание договора... И сколько дней уже пролетело!"
        - "А теперь еще и приемы, бесконечные банкеты... Неужели в Империи Сардиния совсем не понимают, что сейчас каждая секунда на счету!"

    - char: kaga
      side: left
      text:
        - "Сардиния четко дала понять, что не будет участвовать в операциях в океане NA. Оставаясь в глубоком тылу, они и впрямь могут не осознавать всей срочности ситуации."

    - char: akagi
      side: right
      text:
        - "... В любом случае, припасы пополнены, соглашение о перемирии подписано. Если и наслаждаться банкетом, то только на праздновании победы по возвращении в Империю Сакуры!"

    - char: yukikaze
      side: left
      text:
        - "Но кажется, Фридрих дер Гроссе из Железной крови собирается остаться и продолжить веселье...? Такое чувство, что она вообще никуда не торопится."

    - char: akagi
      side: right
      text:
        - "Хотя я впервые имею с ней дело лицом к лицу, по таким людям сразу всё видно. Пока она сидит здесь, её влияние и замыслы уже простираются бог знает куда."
        - "Пока все стягивают силы к океану NA, она ухитрилась тайно отправить отдельный флот в Тихий океан."
        - "Совершенно невозможно понять, что у неё на уме. Мы здесь не хозяева, и мы не можем позволить себе её невозмутимость."
        - "Раз уж мы проделали такой долгий путь, нужно максимально сосредоточиться на разведке и сборе данных. Раз с Сардинией всё прояснилось, пора переходить к следующему шагу."

    - char: jintsuu
      side: left
      text:
        - "Вы заметили? Элизабет и её флот сорвались с места и ушли в спешке, даже быстрее нас."

    - char: akagi
      side: right
      text:
        - "Хе-хе-хе... Наверняка в их хваленой «крупномасштабной операции» случилось что-то серьезное из-за излишней спешки. Для нас это отличный шанс..."

    - char: jintsuu
      side: left
      text:
        - "Акаги, почему ты так уверена, что в багровом шторме в центре океана обязательно найдется то, что нам нужно?"

    - char: akagi
      side: right
      text:
        - "Потому что я получила абсолютно надежные сведения."

    - char: jintsuu
      side: left
      text:
        - "Вот как... Значит, наш план — сразу прорываться к центру?"

    - char: akagi
      side: right
      text:
        - "Нет, сначала мы заглянем в порт Дакар, к Доминиону Виши."
        - "В качестве благодарности за наш долгий путь Железной крови есть еще много чего нам показать... Хи-хи-хи~"
chapter1:
  rows:

    - char: kagabb
      side: left
      text:
        - "Эй! Акаги, Юбари! Дзинцу, Юкикадзэ! Куда вы все подевались?!"
        - "Странно... Как все могли исчезнуть в один миг?"
        - "К счастью, Сирены не воспользовались моментом для атаки, но... Приборы почти полностью вышли из строя, а туман такой плотный, что мы рискуем сбиться с курса."
        - "Хм? Постойте... Почему моя оснастка снова стала как у линкора?.."

    - char: amagi_d?
      side: right
      text:
        - "Давно не виделись, Кага. Погляжу, ты неплохо справляешься — уже ведешь флот в дальние воды?"

    - char: kagabb
      side: left
      text:
        - "Амаги?.."

    - char: amagi_d?
      side: right
      text:
        - "Как поживает моя сестра? Я просила тебя присмотреть за ней. С ней всё в порядке?"

    - char: kagabb
      side: left
      text:
        - "Она сейчас..."

    - char: amagi_d?
      side: right
      text:
        - "На самом деле, это я должна была продолжить службу и остаться с сестрой, а не ты, Кага."
        - "Я не желала, чтобы всё обернулось именно так. Если бы флот возглавляла я, а не ты, судьба моей сестры и всей Империи Сакуры была бы совсем иной."

    - char: kagabb
      side: left
      text:
        - "Я..."

    - char: amagi_d?
      side: right
      text:
        - "Ты разочаровала меня, Кага."

    - text:
      - "БАБАХ!!!!"

    - char: kagabb
      side: left
      text:
        - "Кх-х!.."

    - char: amagi_d?
      side: right
      text:
        - "Я уничтожу тебя здесь, а затем воссоединюсь со своей сестрой."
        - "Куда подевалась та высокомерная Кага, признававшая лишь силу? Твои главные калибры теперь просто украшение?"

    - char: kagabb
      side: left
      text:
        - "...Не переходи черту! Настоящая Амаги никогда бы не сказала подобного! Не знаю, что ты за тварь, но я разнесу тебя в щепки прямо здесь!"
        - "А-а-а-а-а-а-а-а-а-а!"

    - text:
      - "БАБАХ!!!!"

    - char: zuikaku
      side: left
      text:
        - "Ва-а-а-а-а-а!! Почему нас вдруг начали обстреливать?!!"

    - char: yukikaze
      side: right
      text:
        - "Как опасно! Хорошо, что Юкикадзэ-сама не вырвалась слишком далеко вперед..."

    - char: kaga
      side: left
      text:
        - "Э? Пятая дивизия авианосцев?.."
        - "Куда делась Амаги?.. Вы видели Амаги?! Я же только что открыла по ней огонь..."
        - "Огонь?.. Нет... Я ведь уже давно прошла модернизацию в авианосец, а Амаги уже давно... Что вообще здесь происходит?"

    - char: zuikaku
      side: right
      text:
        - "Это мы должны спрашивать, что здесь происходит!"
        - "Какая еще Амаги... Когда мы подошли, то увидели, как ты в одиночку мечешься в тумане. Мы только хотели приблизиться, как твои самолеты внезапно атаковали нас!"

    - char: shoukaku
      side: left
      text:
        - "Неужели вы решили заманить нас в открытый океан, чтобы избавиться под предлогом «несчастного случая»?.. Такие шутки совсем не смешные..."

    - char: kaga
      side: right
      text:
        - "Нет, у меня и в мыслях такого не было. Странно всё это... Кстати, вы видели остальных?"

    - char: zuikaku
      side: left
      text:
        - "Мы примчались на всех парах, как только получили сообщение от Дзинцу."
        - "Но когда мы приблизились к указанному квадрату, обнаружили, что вся акватория затянута этим плотным морским туманом."

    - char: yamashiro
      side: right
      text:
        - "Интуиция подсказывает мне, что этот туман — сплошные неприятности... К тому же мы никак не могли с вами связаться."
        - "Мы уже не знали, что делать, как вдруг из тумана выплыла Юкикадзэ!"

    - char: kaga
      side: left
      text:
        - "Юкикадзэ, ты одна выбралась из этой пелены?.."

    - char: yukikaze
      side: right
      text:
        - "Юкикадзэ-сама и сама не поняла, как так вышло... Сначала мы шли строем, а потом вы все вдруг резко ускорились и разошлись в разные стороны прямо в туман!"
        - "Я хотела догнать вас и спросить, в чём дело, но в итоге сама не заметила, как вышла из тумана и встретила флот Сёкаку и Дзуйкаку..."

    - char: kaga
      side: left
      text:
        - "...................."

    - char: kongou
      side: right
      text:
        - "Нам это показалось крайне подозрительным. Мы долго ждали, но больше никто не появился, поэтому мы решили войти в туман и всё разузнать."
        - "А потом увидели, как ты в одиночестве блуждаешь по морю. Хотели поприветствовать, но ты внезапно набросилась на нас."

    - char: kaga
      side: left
      text:
        - "Прошу прощения... Я совершенно не помню, как атаковала вас. Помню лишь, что снова стала линкором, а потом встретила кого-то, очень похожего на Амаги..."

    - char: yamashiro
      side: right
      text:
        - "Хм... Погружение в галлюцинации, битва с призраками... Неужели этот туман обладает галлюциногенным эффектом?"

    - char: kongou
      side: left
      text:
        - "Да ещё и в сочетании с подавлением электроники... Это определенно не обычное природное явление."

    - char: shoukaku
      side: right
      text:
        - "Согласна. Туман на море — дело обычное, но туман с таким набором странных свойств — это уже совсем другой разговор."

    - char: yukikaze
      side: left
      text:
        - "Плохо дело!.. Боюсь, остальные тоже впали в то же странное состояние, что и госпожа Кага. Нужно скорее их найти!"
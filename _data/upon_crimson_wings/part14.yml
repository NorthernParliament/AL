chapter1:
  rows:

    - char: shoukaku
      side: left
      text:
        - "Совершенно нет ощущения попадания... Дзуйкаку, как дела у тебя?"

    - char: zuikaku
      side: right
      text:
        - "Очень странно. И торпеды, и авиабомбы должны были лечь точно в цель, но каждый раз нам не хватает какой-то малости..."

    - char: jintsuu
      side: left
      text:
        - "Если атаки с дистанции не достигают цели, нужно сократить разрыв. Мы успешно вывели Акаги из-под удара, теперь позвольте и нам вступить в бой."

    - char: akagi
      side: right
      text:
        - "Проклятье... Какое унижение... А-а-а, как же бесит! Эта Сирена — виновница всего этого балагана, верно? Я сотру её в порошок!"

    - char: kaga
      side: left
      text:
        - "В этом больше нет нужды, сестра... Цель только что исчезла с поверхности моря."

    - char: yamashiro
      side: right
      text:
        - "Сирены отступили по собственной воле?.."

    - char: jintsuu
      side: left
      text:
        - "Похоже на то, однако морской туман и не думает рассеиваться."
        - "Напротив, он становится всё гуще, а его цвет... мне кажется, или он начал меняться?"

    - text:
      - "БАБАХ!!!"

    - char: yukikaze
      side: left
      text:
        - "Ва-а-а-а-а! В тумане появились новые Сирены!"

    - char: jintsuu
      side: right
      text:
        - "Подкрепления Сирен?.. Акаги, враг в тени, а мы как на ладони. Продолжать бой в таких условиях невыгодно."

    - char: zuikaku
      side: left
      text:
        - "Теперь ты видишь? В этом и кроется опасность Сирен: они никогда не будут плясать под твою дудку. Остановись, Акаги-сэмпай."

    - char: akagi
      side: right
      text:
        - "Мы же в одном шаге от центра акватории... Пятая дивизия, в бой, плечом к плечу со мной!"

    - char: zuikaku
      side: left
      text:
        - "Нет. По крайней мере, не сейчас..."
        - "После череды сражений наши силы и боезапас на исходе. Врагов слишком много, их способности неясны — если бездумно рванем вперед, флот понесет тяжелые потери."
        - "К тому же, этот вновь сгустившийся туман... Неужели вы не чувствуете в нем ничего странного, кроме цвета? Например, в том, как слушается оснастка..."

    - char: kongou
      side: right
      text:
        - "Э? Наши корабельные системы... они разъедаются этим туманом с огромной скоростью?! Как такое вообще возможно?!"

    - char: zuikaku
      side: left
      text:
        - "Продолжать продвижение немыслимо. Акаги-сэмпай, нужно сохранить то, что имеем, и временно отступить в Дакар для ремонта."

    - char: kaga
      side: right
      text:
        - "Поспешишь — людей насмешишь. Сестра, учитывая обстоятельства, я согласна с предложением Дзуйкаку."

    - char: akagi
      side: left
      text:
        - "Хорошо... Поскорее оторвемся от этих Сирен и уходим в сторону Дакара... Как только закончим с ремонтом, мы вернемся!"
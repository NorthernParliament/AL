chapter1:
  rows:

    - char: yukikaze
      side: left
      text:
        - "Враги в окрестностях полностью зачищены!"

    - char: akagi
      side: right
      text:
        - "Боевая мощь Сирен в океане NA оказалась не такой уж внушительной, как говорилось в отчётах."

    - char: jintsuu
      side: left
      text:
        - "Я бы даже сказала, они подозрительно слабы... Мы уже вошли в центральную часть акватории, но до сих пор не встретили достойного сопротивления."

    - char: yukikaze
      side: right
      text:
        - "Да-да! На карте это место помечено как крайне опасное и даже перечёркнуто красным крестом!"
        - "Хе-хе, должно быть, это великая удача Юкикадзэ-самы помогла нам обойти все опасности стороной~"

    - char: kaga
      side: left
      text:
        - "А вот исследовательские объекты Сирен в таком количестве в одном месте — большая редкость..."
        - "К тому же мы находимся вне зоны операции Лазурного пути, так что постройки практически не повреждены. Мы и впрямь выбрали отличный маршрут."

    - char: akagi
      side: right
      text:
        - "Хи-хи-хи, само собой. Юбари, скорее забирай всё, что можно унести. У нас будет полно времени на анализ, когда вернёмся."
        - "Флоту не стоит задерживаться здесь надолго. Впереди нас ждут куда более ценные трофеи~"
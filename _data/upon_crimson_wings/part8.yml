chapter1:
  rows:

    - char: jintsuu
      side: left
      text:
        - "Акаги, не слишком ли глубоко мы зашли?"
        - "Хотя до этого момента всё шло гладко, в последнем столкновении мощь флота Сирен заметно возросла."
        - "Судя по всему, в центральной зоне наверняка сосредоточены крупные оборонительные силы Сирен. Даже Лазурный путь не спешит переходить в наступление. Не лучше ли нам дождаться флота Пятой дивизии авианосцев?"

    - char: akagi
      side: right
      text:
        - "Сейчас дорога каждая секунда! Именно потому, что Лазурный путь ещё не начал атаку, у нас есть шанс прорваться внутрь раньше них!"
        - "Последние противники стали сильнее, но лишь незначительно. Мы даже не столкнулись с Зеркальным морем."
        - "В такой ситуации нет ни одной причины останавливаться и тратить время впустую. Риск всегда сопутствует выгоде. Если будем трусить, то упустим редчайшую возможность!"

    - char: jintsuu
      side: left
      text:
        - "Как насчёт того, чтобы хотя бы связаться с ними? Согласовать позиции для атаки и приказать им поддержать наши действия."
        - "Если всё пойдет успешно, они смогут нанести второй удар и закрепить успех, а если нет — обеспечат нам прикрытие."

    - char: akagi
      side: right
      text:
        - "Делай что хочешь... В конце концов, Пятая дивизия была отправлена только по настоятельной просьбе Синано. Если успеют — пусть присоединяются."

    - char: jintsuu
      side: left
      text:
        - "Тогда я немедленно свяжусь с ними."

    - char: akagi
      side: right
      text:
        - "Всем игнорировать отступающую «мелочёвку»! Флоту сохранять строй, продолжаем движение к центру акватории!"
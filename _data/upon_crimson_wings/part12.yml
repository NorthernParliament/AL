chapter1:
  rows:

    - char: yuubari
      side: left
      text:
        - "Спасибо всем за спасение... В этом морском тумане определенно присутствует какой-то галлюциногенный компонент, из-за которого мы все, попав в него, погрузились в видения."
        - "Что же касается того, почему он не подействовал на Юкикадзэ и на вас... возможно, Юкикадзэ просто повезло быстро покинуть туман, а к моменту вашего прибытия его концентрация уже снизилась..."
        - "Анализатор должен быть в порядке... Я немедленно приступлю к изучению состава этого тумана..."

    - char: zuikaku
      side: right
      text:
        - "Эй, не спеши! Ты только что пришла в себя после галлюцинаций, сначала немного отдохни."

    - char: yukikaze
      side: left
      text:
        - "Всем внимание! Впереди по курсу обнаружена Дзинцу, Юкикадзэ-сама сейчас пойдет и приведет её в чувство!"

    - char: zuikaku
      side: right
      text:
        - "Будь осторожна. Дзинцу во власти иллюзий может внезапно атаковать тебя, как это сделала госпожа Кага."

    - char: yukikaze
      side: left
      text:
        - "Хе-хе~ Положитесь на Юкикадзэ-саму!"

chapter2:
  rows:

    - char: jintsuu
      side: left
      text:
        - "..... Тоса, она всё еще.......... время еще не пришло......"
        - "Нет, я не могу так поступить!"
        - "Даже если вы так говорите..."

    - char: yukikaze
      side: right
      text:
        - "...Точно, Дзинцу тоже впала в это странное состояние."
        - "Если я сейчас неосмотрительно приближусь, она может напасть... Может, мне стоит атаковать первой?!"
        - "Нет-нет-нет..! А вдруг я случайно раню Дзинцу......."
        - "Хм... Или мне выстрелить мимо, чтобы привлечь её внимание звуком? Хотя в таком случае лучше просто закричать в громкоговоритель..."
        - "Сигнальная ракета тоже подойдет.... А, нет, использовать ракету — это всё равно что сказать Сиренам: «Юкикадзэ-сама здесь!»......"
        - "У-у-у... Решено! Воспользуюсь громкоговорителем!"

    - char: jintsuu
      side: left
      text:
        - ".....Юкикадзэ, что ты тут делаешь, зачем круги нарезаешь?"

    - char: yukikaze
      side: right
      text:
        - "Дзинцу! Ты очнулась?!"

    - char: jintsuu
      side: left
      text:
        - "Значит, всё, что только что произошло, было лишь галлюцинацией... Ох, как же болит голова..... Почему ты здесь одна, где остальные?"

    - char: yukikaze
      side: right
      text:
        - "Сейчас все, кроме госпожи Акаги, уже успешно воссоединились с флотом Пятой дивизии, нам тоже нужно скорее возвращаться!"
chapter1:
  rows:

    - char: littorio
      side: left
      text:
        - "Прекрасные леди, добро пожаловать в Средиземное море! Я — Литторио из Империи Сардиния. Вы проделали долгий и изнурительный путь, должно быть, очень устали~"

    - char: akagi
      side: right
      text:
        - "Этот поход и впрямь можно назвать долгим в самом прямом смысле слова, однако дорога оказалась не такой тяжёлой, как мы представляли."
        - "Соглашение ещё не подписано, но в Средиземном море почему-то совсем не видно флота Лазурного пути."
        - "Оставим в стороне вооружённое противостояние, но нет даже наблюдателей. Как думаешь, с чем это связано?"

    - char: littorio
      side: left
      text:
        - "Возможно, в этом и заключается уникальное очарование Средиземноморья~"

    - char: akagi
      side: right
      text:
        - "......"

    - char: littorio
      side: left
      text:
        - "Если говорить серьезно, Лазурный путь тоже придаёт большое значение договору о прекращении огня. Поэтому в последнее время они первыми пошли на снижение остроты конфликта, и обстановка в Средиземном море стала куда спокойнее."
        - "Несмотря на множество разногласий, удивительно, что в таком глобальном вопросе, как война против Сирен, мы наконец пришли к единому мнению."

    - char: akagi
      side: right
      text:
        - "Хех, кто знает, что у них на уме на самом деле. Сражаются ли они ради благородной цели выживания всего человечества или втайне жаждут наживы в пылу сражений..."
        - "Захваченное оборудование Сирен, освоенные технологии... Не поверю, что они действительно к этому равнодушны."

    - char: littorio
      side: left
      text:
        - "Ну что ж~ Скоро прибудет Куин Элизабет из Королевского флота со своей свитой. Почему бы тебе не спросить её об этом лично?"

    - char: akagi
      side: right
      text:
        - "Интересное предложение, я всерьёз его обдумаю."
        - "А что же вы? Неужели так и планируете оставаться со своим флотом в Средиземном море? Не слишком ли это... скромно?"

    - char: littorio
      side: left
      text:
        - "Получение полного контроля над Средиземноморьем — вот истинное стремление нашей Империи Сардиния~"

    - char: akagi
      side: right
      text:
        - "Эх... И то верно. Ваше бездействие не только обеспечивает безопасность путей снабжения, но и сковывает значительные силы Лазурного пути. Это тоже неплохо."
        - "Кстати, по пути сюда я видела немало Сирен. Пусть это лишь мелкая сошка, мозолящая глаза, но для вас, как для хозяев этих вод, это упущение."

    - char: kaga
      side: left
      text:
        - "Я слышала, что раньше Сирены редко посягали на Средиземное море. Неужели в последнее время их стратегия в этом регионе изменилась?"

    - char: littorio
      side: right
      text:
        - "Аха-ха, я бы сказала, изменилась не стратегия Сирен, а текущая ситуация."
        - "Средиземное море — водоём относительно закрытый. Пока входы с обеих сторон надёжно защищены, Сиренам трудно перебросить сюда крупные силы. Именно поэтому в прошлом их здесь было немного."
        - "Но теперь, как вы сами видели, на одном конце — Суэцкий канал. Из-за конвенции никто не может блокировать его флотом напрямую."
        - "Что касается другого конца, Королевский флот раньше удерживал там плотную линию блокады. Помимо того что они пытались помешать нам выйти, они косвенно сдерживали и натиск Сирен."
        - "Теперь же, чтобы продемонстрировать искренность своих намерений перед подписанием перемирия, Королевский флот добровольно снял блокаду. Естественно, теперь некому сторожить наши двери за нас."
        - "Мы уже распорядились отправить флот на зачистку, так что эта проблема скоро будет решена. Благодарю за беспокойство~"
        - "Далее флот направится прямиком в порт Таранто. Я приготовила там лучшие вина и изысканные блюда, чтобы встретить вас. Оставим остальные разговоры для банкета~"
chapter1:
  rows:

    - char: littorio
      side: left
      text:
        - "Впереди порт Таранто. Хм? Эти флаги, развевающиеся в гавани... Неужели флот Королевского флота уже прибыл?"

chapter2:
  rows:

    - char: littorio
      side: left
      text:
        - "Вот уж не ожидала... Ваше Величество, простите за столь нескромный прием, я не знала, что вы доберетесь раньше нас."

    - char: queen_elizabeth
      side: right
      status: is-yellow
      text:
        - "Пустяки, пустяки! Я прекрасно знаю Средиземное море. Могу привести флот в Таранто даже с закрытыми глазами, так что не стоит так переживать."

    - char: littorio
      side: left
      text:
        - "Ваше Величество, кажется, вы не в духе? В пути случилось что-то неприятное?"

    - char: queen_elizabeth
      side: right
      status: is-yellow
      text:
        - "Случилось ли что-то неприятное?! И ты еще спрашиваешь! Выйдя с родных островов, я проделала путь до Санкт-Петербурга, затем до Гольштейна, потом до Тулона и только после этого добралась до вашего Таранто!"

    - char: littorio
      side: left
      text:
        - "ха-ха... Это и впрямь было утомительное путешествие~ Однако флот Империи Сакуры тоже преодолел огромный путь, чтобы оказаться здесь."

    - char: queen_elizabeth
      side: right
      status: is-yellow
      text:
        - "Флот Империи Сакуры тоже здесь... И кто же их возглавляет... Хм?"
        - "Оказывается, это Акаги, сестра Амаги. Я-то надеялась, что выпадет редкий шанс встретиться с вашим таинственным флагманом Ямато, ну или хотя бы с Нагато или Микасой."
        - "Ты уверена, что обладаешь достаточными полномочиями, чтобы принимать решения в таком важном деле, как подписание пакта о перемирии?"

    - char: akagi
      side: left
      text:
        - "Кажется, я слышу какой-то невыносимо громкий шум... Откуда он доносится?"
        - "Ах, вот оно что. Это же крошечная королева Королевского флота. Прошу прощения за мою оплошность — я не сразу заметила ваше присутствие."
        - "Что же до вашего вопроса... Теперь понятно, почему Железная кровь так отделала Королевский флот. Ваша разведка явно пришла в упадок."

    - char: queen_elizabeth
      side: right
      status: is-yellow
      text:
        - "Ах ты!..."

    - char: king_george_v
      side: left
      status: is-yellow
      text:
        - "Благодарю за то, что указали на наши недостатки, госпожа Акаги. Мы обязательно займемся их устранением и постараемся, чтобы такие блестящие разведывательные операции, как получение Союзом Орла данных об AF, повторились еще не раз."

    - char: akagi
      side: right
      text:
        - "Хе-хе-хе............"

    - char: littorio
      side: left
      text:
        - "Ох... Прошу вас, успокойтесь~ Мы ведь все собрались в Таранто с мирными намерениями, так к чему эта враждебность?"
        - "Фридрих дер Гроссе уже на пути к нам. А пока — расслабьтесь и в полной мере насладитесь гостеприимством Сардинии!"
chapter1:
  rows:
  - text:
      - "Зона контроля Империи Сардиния"
      - "Порт Александрия · Оазис"
      - "«Предупреждение о песчаной буре»"
  - char: "radio"
    side: "left"
    text:
      - "Avant que le bateau ne percute l'eau♪ (Пока корабль не ударился о воду♪)"
      - "La queue de la baleine surgit des eaux♪ (Китовый хвост взметнулся и ударил по нему♪)"
      - "Les matelots la harponna♪ (Матросы бросились к бортам с гарпунами наперевес♪)"
      - "Mais la baleine s'enfonça♪ (Но кит лишь снова ушел под воду♪)"
  - text:
      - "Из радиоприемника в комнате отдыха доносилась легкая, веселая песня..."
      - "*Звук открывающейся двери*"
  - char: "attilio_regolo"
    side: "left"
    text:
      - "А! Сестрица Андреа! Доброе утро~ Как всё прошло?"
  - char: "andrea_doria"
    side: "right"
    text:
      - "Нормально..."
      - "Могу лишь сказать, что небо сегодня выглядит как-то странно..."
      - "Кстати, Аттилио, ты вообще понимаешь, о чём поется в этой песне?"
  - char: "attilio_regolo"
    side: "left"
    text:
      - "Хм...! Совершенно не понимаю! Но звучит очень красиво~"
      - "Хе-хе, так что теперь у меня появилось новое увлечение — слушать музыку.  И всё благодаря Гориции, которая нашла эту радиостанцию!"
  - char: "andrea_doria"
    side: "right"
    text:
      - "Вот как..."
      - "Сила личного примера и впрямь велика."
  - text:
      - "*Громкий звук открывающейся двери*"
  - char: "attilio_regolo"
    side: "left"
    text:
      - "А! Сестрица Гориция тоже вернулась!"
      - "Давай слушать вместе, сестрица Гориция~ На музыкальной станции снова началось..."
      - "Э?! Не переключай станцию! Сестрица Гориция! Я так долго этого ждала..."
  - char: "radio"
    side: "right"
    text:
      - "Говорит радио «Звезда Оазиса», прерываем вещание для экстренного сообщения."
      - "По неизвестным причинам, сегодня с 14:30 до 3:00 следующего дня по столичному времени, в нашем регионе ожидается сильнейшая песчаная буря."
      - "В целях предотвращения ущерба от песчаной бури, все входы и выходы защитной стены будут закрыты через пятнадцать минут. Просим всех оставаться в зданиях во избежание травм."
      - "Далее следует руководство по защите от песчаных бурь..."
  - char: "attilio_regolo"
    side: "left"
    text:
      - "Пе... песчаная буря?!"
  - char: "andrea_doria"
    side: "right"
    text:
      - "Как могла начаться песчаная буря в такое время года..."
  - char: "gorizia"
    side: "left"
    text:
      - "Когда я только что это услышала, тоже была в шоке."
      - "Ведь с тех пор, как починили защитную стену, к нам больше не прорывалась ни одна песчаная буря..."
      - "Говорят, сегодня в Сенате должно состояться важное выступление. Было бы здорово, если бы оно успело начаться до прихода бури..."
  - char: "andrea_doria"
    side: "right"
    text:
      - "...Важное выступление? А кто докладчик?"
  - char: "gorizia"
    side: "left"
    text:
      - "Госпожа Марко Поло! Кажется, это как-то связано с церемонией закрытия Всемирной выставки."
  - char: "andrea_doria"
    side: "right"
    text:
      - "Ахаха... Вот как."
      - "Я впервые об этом слышу. Ты в последнее время уделяешь этому особое внимание?"
  - char: "gorizia"
    side: "left"
    text:
      - "Всё-таки мы базируемся в таком спокойном районе, нужно же чем-то себя занять."
      - "Однако из-за песчаной бури со связью могут возникнуть некоторые проблемы..."
  - char: "andrea_doria"
    side: "right"
    text:
      - "Не только со связью, нормально поработать снаружи тоже не выйдет."
  - char: "gorizia"
    side: "left"
    text:
      - "Да уж... Похоже, сегодня нам просто придется закончить пораньше."
  - char: "attilio_regolo"
    side: "right"
    text:
      - "Ура! Выходной!"
      - "……Стоп, но если начнется песчаная буря, это значит, что я даже радио послушать не смогу?!"
      - "Плохо! Я так не хочу!"
  - char: "gorizia"
    side: "left"
    text:
      - "Если подумать, то да…… У меня та же беда, я уже прочитала почти все книги, что привезла с собой."
  - char: "andrea_doria"
    side: "right"
    text:
      - "В Оазисе и правда, кроме зелени, ничего и…… М-да, когда буря утихнет, нам точно нужно будет хорошенько обустроить наш быт."
  - char: "gorizia"
    side: "left"
    text:
      - "Столь старинная обстановка словно безмолвно повествует о былых невзгодах..."
  - char: "andrea_doria"
    side: "right"
    text:
      - "Ха-ха…… Так и есть. В прошлом здесь и правда произошло немало историй."
  - char: "attilio_regolo"
    side: "left"
    text:
      - "……Историй? Историй!"
      - "Вот оно! Я хочу послушать истории сестрицы Гориции и сестрицы Андреа!"
  - char: "gorizia"
    side: "right"
    text:
      - "Ой……? Ты хочешь послушать о том, что было до нашего прибытия в Оазис?"
      - "Мне кое-что пришло на ум, но это было так давно…… Еще до того, как началась война."
  - char: "andrea_doria"
    side: "left"
    text:
      - "Это и правда было очень давно, мне и самой стало интересно, Гориция."
  - char: "gorizia"
    side: "right"
    text:
      - "Не дразни меня, старшая сестра Дориа."
      - "Но чур, потом вам тоже придется поделиться своими историями. Сестра Дориа, ты ведь наверняка знаешь много забавных случаев?"
  - char: "andrea_doria"
    side: "left"
    text:
      - "Конечно, без проблем. Договорились."
  - char: "attilio_regolo"
    side: "right"
    text:
      - "Тогда я побегу за напитками и вкусностями!"
  - char: "andrea_doria"
    side: "left"
    text:
      - "Только не бери слишком много!"
  - char: "gorizia"
    side: "left"
    text:
      - "Только не бери слишком много!"
  - char: "attilio_regolo"
    side: "right"
    text:
      - "Хе-хе, знаю-знаю~"

chapter1:
  rows:
  - text:
      - "Желтый песок перекатывался через высокую защитную стену. В этот момент за окном было темно, словно ночью."
  - char: "andrea_doria"
    side: "left"
    text:
      - "Мы с Микасой впервые встретились еще на этапе контрнаступления во время прошлой войны..."

chapter2:
  rows:
  - char: "andrea_doria"
    side: "left"
    text:
      - "Эм, скажи, ты из Империи Сакуры..."
  - char: "mikasa"
    side: "right"
    text:
      - "О~ Так вот какой технологический путь выбрала Империя Сардиния!"
  - char: "andrea_doria"
    side: "left"
    text:
      - "Технологический путь... А...?"
  - char: "mikasa"
    side: "right"
    text:
      - "Ах, прости, госпожа Андреа Дориа, верно?"
      - "Добро пожаловать в Империю Сакуры. Я флагман Объединенного флота Империи Сакуры, Микаса."
      - "Во время твоего визита я буду полностью отвечать за прием. Если тебе что-нибудь понадобится, просто скажи, не стесняйся."
  - char: "andrea_doria"
    side: "left"
    text:
      - "...Так ты и есть Микаса."
      - "Лучше один раз увидеть, чем сто раз услышать. Твое имя часто упоминают даже в Европе."
      - "Первая кансен Империи Сакуры, флагман Объединенного флота..."
      - "Та, кто вместе с флотом Российской Империи под командованием Авроры нанесла сокрушительный удар Сиренам и разрушила миф об их непобедимости."
      - "По сравнению с тобой, у меня даже нет боевого опыта... Как я могу просить тебя тратить своё время на меня!"
  - char: "mikasa"
    side: "right"
    text:
      - "Ты мне льстишь, госпожа Дориа, я лишь сделала то, что должна была."
      - "Ты принадлежишь к первому поколению кансен Империи Сардиния, ты олицетворяешь наше будущее. А боевой опыт — впереди еще будет много возможностей его накопить."
      - "Тем более, ты гостья, прибывшая издалека, поэтому я просто обязана была встретить тебя лично."
      - "Сейчас ситуация на фронте не критическая, и нам нужно обмениваться опытом. Ради нашей окончательной победы — не стоит церемониться."
  - char: "andrea_doria"
    side: "left"
    text:
      - "...Большое спасибо."
      - "Тогда мы сейчас направимся прямиком в парламент?"
  - char: "mikasa"
    side: "right"
    text:
      - "Не нужно спешить, я уже договорилась, что твое выступление в здании парламента состоится послезавтра."
  - char: "andrea_doria"
    side: "left"
    text:
      - "Послезавтра... Фух, тогда я смогу потратить еще немного времени на подготовку."
      - "Я впервые в Империи Сакуры. Есть ли что-то, на что мне нужно обратить особое внимание?"
  - char: "mikasa"
    side: "right"
    text:
      - "Хм... Постарайся расслабиться."
      - "Ха-ха-ха, шучу. Для Империи Сакуры ты почетная гостья, так что не нервничай."
      - "К тому же, твоя предыдущая речь в Ирисе произвела глубокое впечатление. Уверена, что и послезавтра всё пройдет гладко."
  - char: "andrea_doria"
    side: "left"
    text:
      - "Не ожидала, что ты знаешь о моем выступлении в Ирисе..."
  - char: "mikasa"
    side: "right"
    text:
      - "Не стоит недооценивать скорость распространения международных новостей, знаешь ли?"
      - "С момента основания Лазурного пути ситуация меняется с каждым днем, и я, естественно, постоянно за этим слежу."
  - char: "andrea_doria"
    side: "left"
    text:
      - "..А что ты думаешь о том, что я говорила в своей речи?"
  - char: "mikasa"
    side: "right"
    text:
      - "Полностью поддерживаю. Для меня «Лазурный путь» воплощает надежды на будущее."
      - "Раз уж он давно основан, откладывать подписание официального договора действительно неправильно."
      - "Время идет, и мы, первопроходцы, рано или поздно станем пережитком прошлого."
      - "Некоторые вещи лучше уладить как можно скорее, пока есть такая возможность."
  - char: "andrea_doria"
    side: "left"
    text:
      - "Я так глубоко об этом не задумывалась..."
      - "Я просто подумала, что с появлением четкого договора многие дела вести станет намного проще."
  - char: "mikasa"
    side: "right"
    text:
      - "Преимущества в этом плане, конечно, тоже вполне реальны."
      - "Наши взгляды не делятся на поверхностные и глубокие, мы просто смотрим на вещи под разными углами."
  - char: "andrea_doria"
    side: "left"
    text:
      - "Но думать о будущем прямо сейчас... Не слишком ли рано?"
  - char: "mikasa"
    side: "right"
    text:
      - "Лучше подготовиться заранее. К тому же, я очень остро это чувствую: посмотри на свою оснастку, она уже куда более продвинутая, чем моя."
      - "Если так пойдет и дальше, то совсем скоро мне придется отойти на второй план."
  - char: "andrea_doria"
    side: "left"
    text:
      - "До этого еще совсем не дошло... Госпожа Микаса, ты выглядишь так, будто сможешь сражаться еще как минимум лет десять."
  - char: "mikasa"
    side: "right"
    text:
      - "Ха-ха-ха, спасибо на добром слове."
      - "Что касается планов на эти два дня, госпожа Дориа, ты когда-нибудь слышала о фестивале в Диадеме Света?"
  - char: "andrea_doria"
    side: "left"
    text:
      - "А...! Слышала! Это же тот самый праздник, когда «молятся о богатом урожае и удаче в грядущем году», верно?!"
      - "Кажется, там еще есть какие-то «камни желаний» и всё такое, похоже на загадывание желания падающей звезде."
  - char: "mikasa"
    side: "right"
    text:
      - "Ахаха, в общих чертах — да."
      - "По счастливому совпадению, фестиваль начинается как раз сегодня вечером. Не хочешь ли ты составить мне компанию, госпожа Дориа?"

chapter3:
  rows:
  - char: "attilio_regolo"
    side: "left"
    text:
      - "Вау, и потом сестрица Андреа отправилась прямо на фестиваль?"
  - char: "andrea_doria"
    side: "right"
    text:
      - "Угу, мы тогда так хорошо повеселились, а еще я попробовала много местных необычных закусок."
      - "Сейчас, оглядываясь назад, та Микаса просто излучала ауру «юношеского задора»."
      - "Она тогда еще сказала что-то вроде: «Возможно, в будущем на фестивале кансен станут главными жрицами»."
      - "...Я до сих пор отлично это помню."
      - "Как бы то ни было, это и правда было грандиозное торжество... Хотя немного жаль, что мне не удалось увидеть «Ватацуми»."
      - "Но именно из-за этого опыта, не знаю почему, в прошлом году Марко Поло вдруг вспомнила об этом..."
      - "И непрерывно засыпала меня вопросами... Но откуда мне было знать, я же ничего не видела."
  - char: "attilio_regolo"
    side: "left"
    text:
      - "Сестрица Андреа, так ты знакома с госпожой Марко Поло?"
  - char: "andrea_doria"
    side: "right"
    text:
      - "Можно сказать и так... В основном я много слышала о ней от Кавур."
      - "А что?"
  - char: "attilio_regolo"
    side: "left"
    text:
      - "Хе-хе-хе~ Раз уж мы заговорили о госпоже Марко Поло!"
      - "Следующая история, которую расскажет Аттилио, как раз связана с заданием, которое госпожа Марко Поло поручила лично!"
      - "Сестрица Андреа, Гориция, хотите послушать?~"
  - char: "gorizia"
    side: "right"
    text:
      - "орученное лично задание? Это как-то связано с тем, что с тобой произошло до перевода сюда?"
  - char: "attilio_regolo"
    side: "left"
    text:
      - "Верно~ До своего перевода я выполняла поисковую миссию, которую мне лично назначила госпожа Марко Поло!"
      - "И это безусловно было самое странное задание, в котором Аттилио когда-либо участвовала..."

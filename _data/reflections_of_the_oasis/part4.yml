chapter1:
  rows:
  - char: "attilio_regolo"
    side: "left"
    text:
      - "...Эх, вот бы тот гигантский замок существовал на самом деле."
      - "Жаль, что это была всего лишь иллюзия, мираж..."
      - "Он был буквально на расстоянии вытянутой руки, но стоило Аттилио подойти поближе, как он тут же исчез!"
      - "Как же это обидно!"
  - char: "andrea_doria"
    side: "right"
    text:
      - "Действительно жаль... Но увидеть такой фантастический пейзаж — это уже значит, что путешествие прошло не зря."
  - char: "attilio_regolo"
    side: "left"
    text:
      - "Угу! В общем, вот такая история~"
      - "...Хотя сам процесс был очень веселым, в итоге мы вернулись ни с чем."
      - "Фух... Столько всего наговорила, что аж в горле пересохло. Я попью чаю, а у вас, сестрицы, есть какие-нибудь вопросы?"
  - char: "gorizia"
    side: "right"
    text:
      - "...Вы выполняли задание в Мёртвом море, которое ещё называют Солёным?"
      - "Хоть это и недалеко, разве эта территория не находится под контролем Лазурного пути?"
  - char: "attilio_regolo"
    side: "left"
    text:
      - "Верно~ Но госпожа Марко Поло дала нам кое-какое оборудование, которое, как говорят, запросили у Железной Крови."
      - "Оно позволило нам избежать обнаружения радарами Лазурного пути и тайно проникнуть в пункт назначения!"
      - "Но вот после возвращения из Соленого моря начался кошмар...!"
      - "Последующее техобслуживание и чистка отняли столько сил..."
  - char: "andrea_doria"
    side: "right"
    text:
      - "Это правда, концентрация соли в Соленом море настолько высока, что наносит серьезный вред механизмам."
  - char: "attilio_regolo"
    side: "left"
    text:
      - "Но, в конце концов, мы всё хорошенько почистили и привели в порядок~"
      - "А потом меня перевели сюда в гарнизон, ну а что было дальше, вы и сами знаете."
  - char: "gorizia"
    side: "right"
    text:
      - "Мёртвое море... Если закрыть глаза на все неудобства, это и впрямь довольно интересное место."
      - "Но ведь вашей задачей тогда был поиск «культурных ценностей», верно?"
      - "И когда вы вернулись с пустыми руками, госпожа Марко Поло ничего не сказала?"
  - char: "attilio_regolo"
    side: "left"
    text:
      - "у... Перед возвращением у меня из головы не выходила мысль, что задание провалено и по прибытии мне точно не поздоровится."
      - "И что в итоге! Когда мы вернулись, госпожа Марко Поло прочитала отчет и не сказала ни одного грубого слова!"
      - "Просто сказала, что мы славно потрудились в пути, и отправила поскорее на техобслуживание. Вот и всё!"
  - char: "gorizia"
    side: "right"
    text:
      - "Как великодушно... Ой, постой-ка... Отчитывались напрямую перед госпожой Марко Поло?"
      - "Разве не перед госпожой Венето или госпожой Литторио?"
  - char: "attilio_regolo"
    side: "left"
    text:
      - "А вот и нет. Кажется, та операция была санкционирована Сенатом, и госпожа Марко Поло несла за нее полную ответственность."
      - "Даже расходы на операцию полностью оплатил Сенат!"
  - char: "gorizia"
    side: "right"
    text:
      - "...То используют военные корабли для перевозки антиквариата, то поднимают столько шума ради поисков артефактов за морем."
      - "...Сенат слишком уж щедро финансирует затеи госпожи Марко Поло."
  - char: "attilio_regolo"
    side: "left"
    text:
      - "Вау... Лицо сестрицы Гориции вдруг стало таким серьезным!"
  - char: "andrea_doria"
    side: "right"
    text:
      - "Хе-хе, это ты еще не видела ее лица, когда она узнала об общих расходах на Всемирную выставку."
      - "Вот тогда она была по-настоящему серьезной..."
  - char: "gorizia"
    side: "left"
    text:
      - "Андреа! Мы же договорились больше не вспоминать об этом!"
      - "Откуда мне было знать, что в счете за проведение выставки будет столько нулей..."
      - "Честное слово, вот если бы они и на наш бюджет так щедро выделяли средства!"
  - char: "andrea_doria"
    side: "right"
    text:
      - "Да уж, вот если бы на нас они были так же щедры..."
      - "Ты только посмотри вокруг: керосиновая лампа, радио, газеты..."
      - "В этом Оазисе и правда, кроме зелени, ничего и... Пфф, кажется, мы вернулись к тому, с чего начали?"
  - char: "gorizia"
    side: "left"
    text:
      - "Ага..."
      - "Песчаная буря снаружи и не думает утихать."
  - char: "andrea_doria"
    side: "right"
    text:
      - "Всё-таки это сильнейшая песчаная буря."
  - char: "gorizia"
    side: "left"
    text:
      - "Связь тоже всё еще не восстановилась..."
      - "Похоже, время историй подошло к концу, чем займемся теперь?"
  - char: "andrea_doria"
    side: "right"
    text:
      - "Теперь... может, споем?"
      - "И начнет Гориция."
  - char: "gorizia"
    side: "left"
    text:
      - "А? Постой... Так внезапно?"
  - char: "andrea_doria"
    side: "right"
    text:
      - "Аттилио, хочешь послушать?"
  - char: "attilio_regolo"
    side: "left"
    text:
      - "Хочу~! Аттилио очень хочет послушать, как поет сестрица Гориция!"
  - char: "andrea_doria"
    side: "right"
    text:
      - "Вот видишь~"
  - char: "gorizia"
    side: "left"
    text:
      - "Эээ..."

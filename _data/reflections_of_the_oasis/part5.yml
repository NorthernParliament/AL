chapter1:
  rows:
  - text:
      - "Зона под контролем Ро[■]ской им[■]ерии"
      - "Епархия Ал[■]кс[■]ндр[■]и · Оазис"
      - "«Да здравствует новый порядок»"
  - text:
      - "Песчаная буря, накрывшая весь Оазис, казалась бесконечной."
      - "Аттилио, чьи силы иссякли первыми, уже крепко спала, а Андреа была настолько сонной, что постоянно зевала."
  - char: "andrea_doria"
    side: "left"
    text:
      - "Ложись-ка спать пораньше, Гориция..."
  - char: "gorizia"
    side: "right"
    text:
      - "Но... как же Сенат и выступление госпожи Марко Поло?"
  - char: "andrea_doria"
    side: "left"
    text:
      - "В такое время выступление уже наверняка закончилось."
      - "Даже если связь восстановится, прямую трансляцию ты уже не послушаешь."
  - char: "gorizia"
    side: "right"
    text:
      - "Х-хотя бы какие-то новости об этом узнать нужно..."
  - char: "andrea_doria"
    side: "left"
    text:
      - "Об этом можно будет послушать по радио и на следующий день."
      - "Если, конечно, наши вышки связи не занесет песком."
  - char: "gorizia"
    side: "right"
    text:
      - "Но Сенат должен был сделать важное заявление, и мы, как часть Империи Сардиния, тоже обязаны..."
  - char: "andrea_doria"
    side: "left"
    text:
      - "Ладно, ладно, я понимаю, что тебе не терпится."
      - "Но в такую ужасную песчаную бурю, как бы ты ни спешила, от этого всё равно не будет никакого толку."
      - "Уж лучше лечь пораньше, чтобы завтра с утра послушать новости."
  - char: "gorizia"
    side: "right"
    text:
      - "Хм... Эх, ладно, пойду умоюсь."
  - char: "andrea_doria"
    side: "left"
    text:
      - "Иди~ Я позабочусь об Аттилио."
  - text:
      - "Поддавшись на уговоры Андреа, Гориция в конце концов сдалась."
  - char: "andrea_doria"
    side: "left"
    text:
      - "Фух... А теперь нужно перенести Аттилио в спальню..."
  - char: "radio"
    side: "right"
    text:
      - ".........*Помехи*........."
  - text:
      - "В тот самый момент, когда в коридоре вновь воцарилась тишина, радиоприемник, о котором так беспокоилась Гориция, внезапно зашумел."
  - char: "radio"
    side: "right"
    text:
      - "......*Помехи*... царство ...*Помехи*..."
      - "......*Помехи*... Он уже ...*Помехи*......"
      - "......*Помехи*... снизошел ...*Помехи*......"
  - text:
      - "...*Щелк*"
      - "Андреа вытащила батарейки из радиоприемника."
  - char: "andrea_doria"
    side: "left"
    text:
      - "Ай-яй-яй..."
      - "Детям всё это совершенно ни к чему..."
      - "Не так ли, важные шишки из Вечного города?"
  - text:
      - "Отражения оазиса"
      - "КОНЕЦ?"

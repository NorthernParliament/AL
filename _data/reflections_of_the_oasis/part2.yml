chapter1:
  rows:
  - text:
      - "Все собрались вокруг стола. Масляная лампа, стоявшая на нем, освещала лица девушек."
  - char: "gorizia"
    side: "left"
    text:
      - "Это произошло еще до начала нынешней войны..."

chapter2:
  rows:
  - text:
      - "Зона прифронтового конфликта"
      - "Иберия · Крепость ???"
      - "«Десятый день»"
  - char: "richelieu"
    side: "left"
    text:
      - "...Судя по плотности огня, бой близится к завершению."
  - char: "implacable"
    side: "right"
    text:
      - "Всё только начинается, кардинал. Тебе не кажется, что ситуация здесь уже полностью вышла из-под контроля?"
      - "Если ослабишь бдительность прямо сейчас, то рискуешь засуетиться, когда беда нагрянет внезапно."
  - char: "richelieu"
    side: "left"
    text:
      - "...Вот как."
      - "Как бы то ни было, мы обязаны вывезти этот артефакт... Прежде чем он попадет в руки любой из сторон."
  - char: "implacable"
    side: "right"
    text:
      - "Тогда поспеши, ведь новость о том, что эта вещь у меня, долго скрывать не удастся."
      - "У меня нет разрешения на вмешательство в дела Иберии."
      - "Если к нам постучатся, мне придется послушно всё отдать."
  - text:
      - "*Звук стука в дверь*"
  - char: "gorizia"
    side: "left"
    text:
      - "Прошу прощения, госпожа Ришелье, госпожа Имплакабл."
  - char: "implacable"
    side: "right"
    text:
      - "Ой, а вот и подмога, как раз вовремя~"
  - char: "richelieu"
    side: "left"
    text:
      - "Помоги мне, Гориция, убери со стола карту."

chapter3:
  rows:
  - char: "richelieu"
    side: "left"
    text:
      - "На этом всё. Следуя по этому маршруту, вы сможете избежать ненужных столкновений."
      - "Но как только доберетесь до порта, вам придется рассчитывать только на себя — формально это нейтральная зона."
  - char: "implacable"
    side: "right"
    text:
      - "Короче говоря, командование не желает, чтобы это бесценное историческое наследие погибло в ходе этой глупой внутренней грызни."
      - "Это совместное поручение Королевского флота и Ирис. Пожалуйста, Гориция."
  - char: "gorizia"
    side: "left"
    text:
      - "Э-э, а...?"
      - "Пожалуйста, полегче, почтенные дамы! Это ведь пустяковое дело!"
      - "Давайте поступим так. Как только рассветет, я заберу эти культурные ценности и покину город вместе с эвакуационным флотом Сардинии."
      - "А когда ситуация в Иберии стабилизируется, Сардиния вернет всё обратно... Идет?"
  - char: "implacable"
    side: "right"
    text:
      - "Я не против."
  - char: "richelieu"
    side: "left"
    text:
      - "Так и поступим. Транспортный конвой отбывает завтра на рассвете, тебе нужно будет просто отправиться вместе с ними."
      - "Но здесь всё еще зона боевых действий, так что тебе придется остаться на ночь, Гориция."
  - char: "gorizia"
    side: "right"
    text:
      - "Поняла..."
  - char: "vauquelin"
    side: "left"
    text:
      - "Дамы, смотрите, что я нашла!"
      - "Та-дам! Совершенно новенькую губную гармошку!"
  - char: "implacable"
    side: "right"
    text:
      - "Ой, кажется, у нас появилась развлекательная программа на сегодня, подруги..."

chapter4:
  rows:
  - char: "attilio_regolo"
    side: "left"
    text:
      - "Э?! Так ты тогда видела кардинала Ришелье и госпожу Имплакабл?!"
      - "О... обалдеть...!"
      - "Они же такие важные шишки!"
  - char: "andrea_doria"
    side: "right"
    text:
      - "Фух... Не ожидала, что у тебя есть такой опыт."
      - "Только вот сейчас... Эх..."
  - char: "gorizia"
    side: "left"
    text:
      - "Да, кто бы мог подумать, что вскоре после этого все мы скрестим оружие."
      - "Но всё понемногу налаживается, даже Всемирную выставку снова проводят."
  - char: "andrea_doria"
    side: "right"
    text:
      - "Я слышала, Свободный Ирис весьма активно себя проявил на выставке?"
  - char: "gorizia"
    side: "left"
    text:
      - "Угу! Хоть госпожа Ришелье и не присутствовала там лично, она продолжала усердно трудиться за кулисами."
      - "Эх... Надеюсь, она сможет поскорее исполнить свое заветное желание и вернуться на родину."
  - char: "andrea_doria"
    side: "right"
    text:
      - "Да уж... Было бы здорово, если бы Империя Сардиния вообще не ввязывалась в эту войну."
      - "Эх..."
  - char: "attilio_regolo"
    side: "left"
    text:
      - "...Ой?! Почему вы вдруг начали так тяжело вздыхать!"
      - "Вы же сами сказали, что всё налаживается!"
  - char: "andrea_doria"
    side: "right"
    text:
      - "...Хе-хе, просто времена меняются, вот и нахлынули чувства."
      - "...Если бы здесь была Микаса, она бы точно сказала..."
      - "Что-то вроде: «Хм, если не знаешь, как закончить войну, то не стоит в неё и ввязываться»."
      - "Слышала, в последнее время она тоже начала вести активную деятельность внутри Империи Сакуры. Интересно, какие у нее планы..."
  - char: "attilio_regolo"
    side: "left"
    text:
      - "Микаса? Кажется, я читала о ней в учебнике по истории..."
      - "Та самая Микаса из Империи Сакуры? Сестрица Андреа, ты знакома с кем-то настолько старым?!"
  - char: "andrea_doria"
    side: "right"
    text:
      - "...Старым."
      - "Хух... Пожалуй. Всё это было еще до создания Багровой Оси. Если хочешь послушать, я могу рассказать."
  - char: "attilio_regolo"
    side: "left"
    text:
      - "Хочу!"
  - char: "andrea_doria"
    side: "right"
    text:
      - "Дай-ка подумать... Хм, пожалуй, начну вот с этой истории..."

chapter1:
  rows:
  - text:
      - "Бранденбург. Столица и бьющееся сердце Священной Империи Юнитас."
      - "Когда-то Комиций ломился от людей. Он был эпицентром бесчисленных указов, разлетавшихся во все уголки империи."
      - "Но сегодня не было заполнено и трети мест. Даже возвышающийся над залом трон пустовал."
      - "Над этим местом всё ещё витала мрачная атмосфера, словно в молчаливом предкушении грядущего дождя из клинков."
      - "Спустя какое-то время из одного из семи кресел, расположенных ближе всего к трону, наконец донёсся голос."
  - char: "koln_meta_unitas"
    side: "left"
    status: "is-meta"
    text:
      - "Вчера на севере в бою были наголову разбиты силы архиепископа Майнц."
      - "Сама архиепископ пала мученической смертью."
  - text:
      - "Одинокий голос гулким эхом разнёсся по залу."
  - char: "koln_meta_unitas"
    side: "left"
    status: "is-meta"
    text:
      - "Согласно указу Священной буллы, если империя когда-либо столкнётся с угрозой самому своему существованию, порядок престолонаследия курфюрстов будет определяться на основе ранга военного корабля."
      - "Поэтому я предлагаю, чтобы нынешняя архиепископ Регенсбург приняла на себя полномочия курфюрста в качестве преемницы архиепископа Майнц."
  - text:
      - "Зал погрузился в тишину, но вскоре начали вспыхивать перешептывания, пока всё собрание не заполнилось гулом согласия и протестов."
      - "Предложение было принято без лишнего шума, и вскоре один человек поднялся из зала, чтобы занять место рядом с Кёльн."
  - char: "regensburg_meta_unitas"
    side: "left"
    status: "is-meta"
    text:
      - "Ситуация неотложная, поэтому я опущу формальности."
      - "Трагедия архиепископа Майнц — далеко не единственная плохая новость за вчерашний день."
      - "Я выяснила причину внезапного усиления натиска на северо-западных рубежах. Всё потому, что Альбион был целиком поглощён бездной."
  - text:
      - "Тишина, царившая мгновение назад, вмиг сменилась всеобщим переполохом."

chapter2:
  rows:
  - text:
      - "Внезапно раздался чистый, звонкий голос. И хотя он донёсся не из семи главных кресел, этого всё равно хватило, чтобы заставить весь зал замолчать."
  - char: "konigsberg_meta_unitas"
    side: "left"
    status: "is-meta"
    text:
      - "Буквально только что кто-то спросил, что есть реальность."
      - "Да, архиепископ Майнц пожертвовала своей жизнью, а Союз Камал пал. Однако северные границы империи всё ещё находятся под контролем хранителей рубежей. Вот это — реальность."
      - "Альянса Альбиона больше нет, и Ортодоксия Ирис потеряла свою столицу. Тем не менее, они возвели оборонительную линию от Кале до Реймса и продолжают сражаться прямо сейчас, пока мы здесь разговариваем."
      - "На юге имперские силы стабилизировали ситуацию на всём протяжении от Генуи до Флоренции и Венеции."
      - "Что же касается восточного фронта... неужели вы не видите это пустующее кресло? Король Богемии сокрушил натиск Теней Греха всего три дня назад. Вы ведь не могли забыть об этом так скоро?"
  - text:
      - "Ни у кого не нашлось аргументов для возражения."
  - char: "konigsberg_meta_unitas"
    side: "left"
    status: "is-meta"
    text:
      - "Теперь-то вы понимаете? Реальность далека от безнадёжности. Не поддавайтесь панике!"
      - "Если сегодняшнее «обсуждение» сводится лишь к этой бессмысленной болтовне, то я вынуждена откланяться."
  - text:
      - "Кёнигсберг повернулась спиной к собранию и направилась прямо к выходу."
  - char: "koln_meta_unitas"
    side: "left"
    status: "is-meta"
    text:
      - "Одну минуту, Кёнигсберг."
      - "Ты права, говоря, что на данный момент ситуацию удалось стабилизировать. И всё же каждый в этом зале понимает, что эта стабильность не продлится долго."
  - char: "konigsberg_meta_unitas"
    side: "right"
    status: "is-meta"
    text:
      - "Но это лишь подчёркивает, что нам нужно сплотиться и действовать, а не тратить драгоценное время на пустую риторику, не так ли?"
  - char: "koln_meta_unitas"
    side: "left"
    status: "is-meta"
    text:
      - "Именно. Но даже если мы начнём действовать, то под чьим знаменем?"
      - "Мы — Священная Империя Юнитас, законные преемники Ромула. И тем не менее, никто до сих пор не сделал шаг вперёд, чтобы заявить права на нашу корону."
      - "К тому же трон пустует уже непозволительно долго... вы не согласны?"
  - char: "elbe_meta_unitas"
    side: "right"
    status: "is-meta"
    text:
      - "Что? Ты предлагаешь нам избрать нового императора?"
      - "Но как, скажи на милость, мы должны провести коронацию императора теперь, когда Святой Престол потерян?"
  - char: "koln_meta_unitas"
    side: "left"
    status: "is-meta"
    text:
      - "Отличный вопрос. Собственно, это и подводит нас к истинной причине, по которой было созвано сегодняшнее заседание."
      - "Почтенные, помните ли вы древние ритуалы, описанные в Священной булле?"
      - "А теперь мы должны сделать свой выбор. Ради блага империи. Ради блага этой эпохи."
  - text:
      - "Споры вспыхнули с новой силой. Когда Кёнигсберг снова села на своё место, она улыбнулась Кёльн, словно всё шло строго по намеченному плану."
  - char: "koln_meta_unitas"
    side: "left"
    status: "is-meta"
    text:
      - "Итак, господа. Давайте же отдадим свои голоса..."

chapter3:
  rows:
  - text:
      - "Под руководством Принц Ойген наша группа вскоре прибыла к руинам замка на окраине Регенсбурга."
      - "Когда я осмотрел расстилавшиеся передо мной руины, окружающий пейзаж начал незаметно для меня меняться."
  - char: "commander"
    side: "left"
    text:
      - "(Что?! Кирпичи замка вдруг снова становятся как новые?)"
  - char: "memphis"
    side: "right"
    text:
      - "Ого, вы это видите?! Сорняки как будто впитываются обратно в землю!"
  - char: "helena_kai"
    side: "left"
    text:
      - "Каменные стены тоже восстанавливаются, шаг за шагом..."
  - text:
      - "Аномальные изменения, происходящие вокруг, сразу же бросились в глаза каждому."
  - char: "prinz_eugen"
    side: "left"
    text:
      - "Мы тщательно исследовали это место бог весть сколько времени... Но, само собой, зацепки раскрывают себя сами, стоит тебе только появиться, Командир... Хи-хи."
  - char: "z2"
    side: "right"
    text:
      - "...Может, нам лучше пока отступить?"
  - text:
      - "Один за другим из древних скальных пород начали вырываться лучи света, озаряя руины потусторонним сиянием."
  - char: "clemenceau"
    side: "left"
    text:
      - "Дело плохо! Все за мной!"
      - "Альжири, Галиссоньер, вы двое — к самолёту, сопровождайте Командира!"

chapter4:
  rows:
  - text:
      - "Как только люк закрылся, весь мой мир окутал чистейший белый свет..."

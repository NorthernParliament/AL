chapter1:
  rows:
  - text:
      - "Ранним утром я собрал Лексингтон и остальных на экстренное совещание."
  - char: "memphis"
    side: "left"
    text:
      - "Что случилось, Командир? Что-то произошло?"
  - char: "commander"
    side: "left"
    text:
      - "Я начну, как только все соберутся. А пока просто присаживайтесь."
  - text:
      - "Здесь все те кто находился внутри Моря Звёзд. ТБ, Саратога, Энтерпрайз и Нью-Джерси, — также подключились к нам удалённо."
  - char: "commander"
    side: "left"
    text:
      - "Ты слышишь меня, ТБ?"
  - char: "tb_rad"
    side: "right"
    text:
      - "На связи, система функционирует штатно. Ваши приказания, Командир?"
  - char: "commander"
    side: "left"
    text:
      - "Просто побудь так секунду. Прошу всех внимательно посмотреть на ТБ. Она никого вам не напоминает?"
  - char: "saratoga_rad"
    side: "right"
    text:
      - "...Никого не напоминает?"
  - char: "commander"
    side: "left"
    text:
      - "К примеру, некую Обсервер Зеро?"
  - text:
      - "В конференц-зале воцарилась минутная тишина."
  - char: "saratoga_rad"
    side: "right"
    text:
      - "Командир, штабу так и не удалось заполучить видеозаписи с Обсервер Зеро. Даже если ты говоришь об этом, мы никак не могли бы..."
  - char: "commander"
    side: "left"
    text:
      - "Нет видеозаписей? Если подумать... являлась ли «Зеро» хоть кому-то лично?"
      - "Все мои прошлые контакты с ней происходили либо через проекции, либо через иллюзии..."
      - "Лексингтон, среди воспоминаний, которые к тебе вернулись, есть ли хоть что-то, касающееся Зеро?"
  - char: "lexington_ii"
    side: "right"
    text:
      - "Нет. Ни в Нью-Йорке, ни в Анкоридже нет никаких записей о Зеро... Что на тебя нашло так внезапно, Командир?"
  - char: "commander"
    side: "left"
    text:
      - "Простите, похоже, я забежал немного вперёд. А что насчёт тебя, Энтерпрайз?"
      - "Когда ты ранее видела Энтерпрайз МЕТА, возникали ли у тебя какие-нибудь флешбэки, связанные с её воспоминаниями?"
  - char: "enterprise_rad"
    side: "right"
    text:
      - "Да. Был один эпизод, где она злилась на эту самую Зеро."
      - "Но, что странно... я совершенно не помню, как Зеро выглядит."
      - "Даже когда я пытаюсь вспомнить её облик, я не могу воссоздать в голове её лицо. Словно всё её существо окутано густым туманом."
  - char: "commander"
    side: "left"
    text:
      - "В тумане, значит? Тогда как насчёт тебя, Нью-Джерси? Когда ты ранее оказалась заперта в записанном пространстве, пересекались ли ваши пути с Зеро?"
  - char: "new_jersey_rad"
    side: "right"
    text:
      - "Прости, мне совершенно нечем тебя порадовать..."
  - char: "commander"
    side: "left"
    text:
      - "Иными словами, никто в этой комнате, кроме меня и Энтерпрайз, вообще никогда не видел Зеро ни в каком виде?"
      - "Да и Энтерпрайз не способна вспомнить никаких деталей..."
      - "Более того, если бы я сам об этом не заговорил, ты бы, скорее всего, и вовсе не вспомнила о существовании того воспоминания, верно?"
  - char: "enterprise_rad"
    side: "right"
    text:
      - "Действительно. У меня не было бы ни единого повода даже задуматься об этом, если бы ты не спросил..."
  - char: "commander"
    side: "left"
    text:
      - "По крайней мере, теперь я понимаю ситуацию."
  - text:
      - "Здесь явно имеет место какое-то вмешательство."
      - "Зеро просто не задерживается в вашей памяти, даже если вам удаётся как-то её увидеть. Что это ещё может быть, если не ментальные помехи?"
      - "Даже я, зная, как выглядит Зеро, до этого момента ни разу на сознательном уровне не сопоставил её поразительное внешнее сходство с ТБ."
  - char: "commander"
    side: "left"
    text:
      - "Что ж, ладно. На сегодня закончим."
      - "Простите, что втянул вас всех в это непродуктивное собрание. Накатило внезапное любопытство, так что мне захотелось во всём разобраться."
      - "(Все, кто находился в Компилирующем Поле, включая остальных Обсерверов и Пепел, оставшийся в Северной Атлантике, наверняка видели Зеро.)"
      - "(Где-то там просто обязана быть хоть какая-то зацепка...)"
  - text:
      - "Одно могу сказать точно: то, что я наконец заметил связь между ТБ и Зеро, разожгло во мне неугасимый огонь жажды истины."
      - "Лексингтон смотрела на меня обеспокоенным взглядом. Остальные начали медленно покидать комнату."

chapter2:
  rows:
  - text:
      - "Как только я остался в комнате один, я связался с «Йорктаун», используя заранее согласованный метод."

chapter3:
  rows:
  - text:
      - "Мир вокруг меня мгновенно изменился."

chapter4:
  rows:
  - text:
      - "После того как погас свет, вокруг меня развернулось бескрайнее звёздное небо."
  - char: "memphis_meta"
    side: "left"
    status: "is-purple"
    text:
      - "Вы пришли, Командир. Рада видеть, что новый канал связи работает без сбоев."
  - text:
      - "Первой, кто появился после установки соединения, была вовсе не Йорктаун, а другая Мемфис"
  - char: "commander"
    side: "left"
    text:
      - "Привет, Мемфис. Как дела на вашей стороне?"
  - char: "memphis_meta"
    side: "right"
    status: "is-purple"
    text:
      - "Хм-м... Да так, пятьдесят на пятьдесят, пожалуй?"
      - "Поскольку дополнительная авторизация, которую мне ранее предоставила Хелена, всё ещё действует, я могу продолжать выполнять наши обычные миссии через Башню."
      - "Что же касается тех узлов, которые больше не функционируют, мы объединили усилия, чтобы найти решение."
      - "Ой, ладно, давайте пока опустим это... Йорктаун сейчас занята наблюдением за ходом эксперимента и не может говорить."
      - "Но вы ведь здесь неспроста. Я могу чем-то помочь?"
  - char: "commander"
    side: "left"
    text:
      - "Мне нужно, чтобы ты помогла мне кое-что подтвердить, Мемфис. Не могла бы ты собрать всех членов Компилирующего Поля и воссозданного экспериментального подразделения?"
  - char: "memphis_meta"
    side: "right"
    status: "is-purple"
    text:
      - "...Похоже, это «кое-что» действительно довольно важное."
  - char: "commander"
    side: "left"
    text:
      - "Вопрос простой. Тебе не кажется, что Обсервер Зеро и ТБ... похожи друг на друга?"


chapter1:
  rows:
  - char: "commander"
    side: "left"
    text:
      - "(Пока я бодрствую — я в отпуске, но стоит уснуть, как снова пора за работу...)"
      - "(Похоже, мне просто нужно принять реальность такой, какая она есть...)"
  - text:
      - "Я подавил зародившееся в груди чувство противоречия и начал осматривать территорию академии."
      - "Это место казалось полностью отрезанным от течения времени. Школьный двор всегда был залит ярким светом, словно здесь царила вечная весна."
  - char: "commander"
    side: "left"
    text:
      - "(Что это за место?.. И почему меня постоянно утягивает сюда?)"
      - "(Сначала это была Мадам М. Затем — Леди Е.)"
      - "(Было и несколько других, никак не связанных между собой «путешествий», хотя я понятия не имею, к какой категории относится этот визит...)"

chapter2:
  rows:
  - char: "lady_e"
    side: "right"
    text:
      - "О боже. Давненько не виделись."
  - char: "commander"
    side: "left"
    text:
      - "Леди Е!"
  - text:
      - "Рядом с Леди Е стояла девочка в белом, как две капли воды похожая на Зеро."
      - "Они обе материализовались прямо возле меня совершенно незаметно."
  - char: "commander"
    side: "left"
    text:
      - "Не кажется, что прошло так уж много времени. Разве мы не встречались недавно на тестовом полигоне Тета?"
  - char: "lady_e"
    side: "right"
    text:
      - "М-м... Что ж, давай не будем сейчас об этом беспокоиться."
      - "Сегодня я пришла навестить директора. Мы надеялись остановить один опасный химический эксперимент, но так и не смогли связаться с ответственной за него Леди Н."
      - "Я надеялась, что директор поможет мне найти её. Но раз уж ты здесь, не хочешь составить мне компанию и дойти до кабинета директора?"
  - char: "commander"
    side: "left"
    text:
      - "В кабинет директора, значит..."
  - text:
      - "До сих пор все здания, за исключением входа в учебные классы, были заперты."
      - "Но Леди Е заговорила о визите к директору. Неужели её уровень доступа повысился?"
  - char: "commander"
    side: "left"
    text:
      - "Полагаю, я..."
  - text:
      - "Как раз в тот момент, когда я собирался принять приглашение, моё внимание привлекла девочка в белом."
  - char: "zero_kid??2"
    side: "left"
    text:
      - "......"
  - text:
      - "Она лишь коротко качнула головой, после чего уткнулась лицом в свою плюшевую куклу."
  - char: "commander"
    side: "left"
    text:
      - "...Хотя, подумав ещё раз, пожалуй, в другой раз. Я в творческом отпуске, так что мне положено наслаждаться отдыхом."
  - char: "lady_e"
    side: "right"
    text:
      - "Хм, как необычно. Должно быть, я спросила не вовремя."
      - "Ну ничего, всё в порядке. Приятного тебе отпуска~"

chapter3:
  rows:
  - text:
      - "Белый свет затопил моё зрение. Ощущение было такое, словно меня уносило прочь из академии, обратно в мои собственные сны."
      - "Перед моментом, в который моё сознание угасло, я кое-что осознал..."
  - char: "commander"
    side: "left"
    text:
      - "Если подумать, та девочка в академии немного отличалась от Зеро. Может ли их быть двое?"
  - char: "zero_kid??"
    side: "right"
    text:
      - "......"
  - char: "zero_kid??2"
    side: "right"
    text:
      - "......"
  - char: "commander"
    side: "left"
    text:
      - "То есть, она и изначально не была точной копией Зеро, но в ней определённо присутствовало что-то от неё..."
      - "Хотя под это описание уже подходит и кое-кто другой..."
  - char: "tb"
    side: "right"
    text:
      - "......"
  - char: "tb_zero?"
    side: "right"
    text:
      - "......"
  - char: "commander"
    side: "left"
    text:
      - "От ТБ к Зеро..."
  - char: "tb_zero?"
    side: "right"
    text:
      - "......"
  - char: "zero"
    side: "right"
    text:
      - "......"
  - char: "commander"
    side: "left"
    text:
      - "От Зеро к Обсервер Зеро..."
      - "ТБ и Зеро выглядят почти одинаково... а Зеро была прототипом для Обсервер Зеро..."
      - "Неужели всё это время... я упускал из виду связь между ТБ и Обсервер Зеро?"



chapter1:
  rows:
  - text:
      - "С реформацией «Лазурного Пути» мир вступил в новую эпоху. Вместе с этим тяжелая завеса, долгое время окутывавшая сердца человечества, наконец начала приподниматься."
      - "Изначально я планировал вернуться в гавань Пёрл-Харбор для проведения очередного этапа учений флота."
      - "Однако у Лексингтон на мой счёт были совсем другие планы."
      - "Под сильным давлением мне пришлось пересмотреть график на ближайшее будущее."
      - "То, что задумывалось как короткая поездка в Пёрл-Харбор, в итоге превратилось в некое подобие творческого отпуска."

chapter2:
  rows:
  - char: "commander"
    side: "left"
    text:
      - "Я впервые оказался на одном из островов высшего руководства не по военным делам."
  - char: "yorktown_ii"
    side: "right"
    text:
      - "На самом деле, ремонтные работы здесь начались совсем недавно."
      - "Ситуация в мире постепенно успокаивается, так что, полагаю, не имело бы смысла бесконечно придерживаться системы военного времени."
      - "Нельзя всё время быть натянутой струной, рано или поздно она лопнет, верно?"
  - char: "commander"
    side: "left"
    text:
      - "Верно. Именно поэтому я и согласился приехать сюда на трёх-четырёхдневный отдых."
  - char: "lexington_ii"
    side: "right"
    text:
      - "...На три-четыре дня?"
  - char: "commander"
    side: "left"
    text:
      - "Э-э, не дня. Я хотел сказать, на три-четыре недели!"
  - char: "lexington_ii"
    side: "right"
    text:
      - "Хи-хи. Именно об этом я и думала."
  - char: "memphis"
    side: "left"
    text:
      - "Эй, народ! Я закончила осмотр виллы. Можете заселяться!"
  - char: "helena_kai_r"
    side: "right"
    text:
      - "Я принесла все ключи, но, эм... какой из них... ключ от кабинета?"
  - char: "lexington_ii"
    side: "left"
    text:
      - "Хочешь, я подержу их у себя?"
  - char: "helena_kai_r"
    side: "right"
    text:
      - "Большое спасибо!"
  - char: "commander"
    side: "left"
    text:
      - "...Ключи от кабинета?"
  - char: "lexington_ii"
    side: "right"
    text:
      - "Хи-хи~♪"
  - char: "yorktown_ii"
    side: "left"
    text:
      - "Кстати, Мемфис, ты позаботилась о припасах?"
  - char: "memphis"
    side: "right"
    text:
      - "Ещё бы. У меня всё под контролем."
      - "Транспортный самолёт прибыл раньше нас. Он будет ежедневно доставлять на остров свежие припасы."
  - char: "yorktown_ii"
    side: "left"
    text:
      - "Отлично, я знала, что на тебя можно положиться."
      - "Ну что ж, Командир, пойдём посмотрим на виллу?"
  - char: "commander"
    side: "right"
    text:
      - "Конечно. Идём."

chapter3:
  rows:
  - text:
      - "И вот мой долгожданный творческий отпуск — настоящий отпуск — наконец-то начался."
      - "Никаких забот. Только погружение в приятную атмосферу и созерцание прекрасных пейзажей..."

chapter4:
  rows:
  - text:
      - "Чилл."

chapter5:
  rows:
  - text:
      - "Морские брызги."

chapter6:
  rows:
  - text:
      - "Вечеринка."

chapter7:
  rows:
  - text:
      - "Когда я открыл глаза посреди сна, передо мной предстала залитая солнцем академия."
  - char: "commander"
    side: "left"
    text:
      - "...Полагаю, меня уже ничто не удивляет."
      - "Как и ожидалось, всё никогда не проходит настолько гладко."
      - "Если я работаю даже в своих снах, можно ли вообще считать, что я в отпуске?"
      - "Хм, пожалуй, тут есть почва для философской дискуссии."


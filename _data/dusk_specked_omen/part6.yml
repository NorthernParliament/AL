chapter1:
  rows:
  - char: "clemenceau"
    side: "left"
    text:
      - "Прошло уже немало времени с тех пор, как мы в последний раз могли вот так насладиться обществом друг друга."
  - char: "commander"
    side: "right"
    text:
      - "Это... пожалуй, даже к лучшему."
  - char: "clemenceau"
    side: "left"
    text:
      - "Ха-ха, полагаю, это правда."
      - "Вам любопытно, почему я пересадила вас на частный самолёт Трибунала?"
  - char: "commander"
    side: "right"
    text:
      - "Я бы солгал, если бы сказал, что нет."
  - char: "clemenceau"
    side: "left"
    text:
      - "Вам случайно не показалось, что в самолёте было немного тесновато, несмотря на его внушительные размеры?"
  - char: "commander"
    side: "right"
    text:
      - "...И что же ты погрузила на борт?"
  - char: "clemenceau"
    side: "left"
    text:
      - "Припасы, оружие, систему безопасности и... всё необходимое для создания миниатюрного Чёрного Солнца второго поколения."
  - char: "commander"
    side: "right"
    text:
      - "Просто чтобы уточнить... Это всё ещё расследование, верно? А не внезапное вторжение в Железную Кровь?"
  - char: "clemenceau"
    side: "left"
    text:
      - "Конечно же нет, я бы не осмелилась. Это всего лишь мера предосторожности на случай, если что-то пойдёт не так."
      - "**Клемансо:** В качестве дополнительной меры безопасности я даже взяла с собой Алжири и Ла Галиссоньер."
  - char: "commander"
    side: "right"
    text:
      - "Ты ведь ожидаешь, что во время расследования что-то пойдёт не так, верно?"
  - char: "clemenceau"
    side: "left"
    text:
      - "Неужели вы уже забыли, что произошло в прошлый раз, когда Марко Поло и Иерофант сделали свой ход?"
  - char: "commander"
    side: "right"
    text:
      - "Как я мог такое забыть? Просто... тогда у меня не было никакой возможности понять Иерофанта, поэтому я пытался передать ту информацию, какую мог, из лучших побуждений. И всё же это привело к неконтролируемой ситуации."
      - "Впрочем, это ведь не единственная причина, по которой ты пошла на такие крайние меры предосторожности, верно?"
  - char: "clemenceau"
    side: "left"
    text:
      - "От вас ничего не скроешь, как я погляжу..."
      - "Последние несколько дней я до мельчайших деталей изучала замок из того видения."
      - "И чем больше я в это углублялась, тем сильнее меня охватывало смутное беспокойство. Это чувство трудно облечь в слова..."
      - "Прежде всего, ландшафт вокруг замка не совпадает с тем, что есть в реальности. Точнее говоря, он выглядит так, словно сошёл прямиком из прошлого."
  - char: "commander"
    side: "right"
    text:
      - "Прошлая версия Регенсбурга, значит... Что ещё заслуживало внимания?"
  - char: "clemenceau"
    side: "left"
    text:
      - "С небом тоже было что-то не так, это тревожило. Казалось, будто за мной неотрывно следит чей-то зловещий взгляд."
  - char: "commander"
    side: "right"
    text:
      - "Может ли быть так, что в видении был показан другой испытательный полигон, а не наш собственный?"
  - char: "clemenceau"
    side: "left"
    text:
      - "Подтвердить это наверняка невозможно, но существует вероятность, что всё это намекает на очередное наложение реальностей."
  - char: "commander"
    side: "right"
    text:
      - "Это определённо было бы дурным предзнаменованием."
  - char: "clemenceau"
    side: "left"
    text:
      - "Конечно, всегда есть вероятность, что я просто перестраховываюсь из-за своей склонности к драматизму, не так ли?"
  - char: "commander"
    side: "right"
    text:
      - "Ничто не порадовало бы меня больше, моя леди."
      - "Ах, да. Мы ведь только что упустили из виду твои слова о создании устройства «Чёрного Солнца» второго поколения?"
      - "Откуда у тебя вообще изначально взялись подобные технологии?"
  - char: "clemenceau"
    side: "left"
    text:
      - "Из двух источников: первым была Марко Поло, а вторым — результаты исследований «концептуального символизма», проводившихся на экспериментальном полигоне Сирен."
  - char: "commander"
    side: "right"
    text:
      - "начит, это связано с Иерофантом и её экспериментальными механизмами... В таком случае, полагаю, эти технологии нельзя назвать абсолютно чужеродными."
  - char: "clemenceau"
    side: "left"
    text:
      - "Не желаете ли попробовать?"
      - "Я уверена, в прошлом вы уже навидались самых разных видений и не раз бывали в запутанных, иллюзорных мирах, верно?"
      - "Технология устройства «Чёрного Солнца» могла бы позволить нам погрузиться глубже в ваше сознание для более детального исследования."
  - char: "commander"
    side: "right"
    text:
      - "Думаю, я откажусь. Каждый раз, когда я связываюсь с подобными технологиями, всё в итоге обязательно идёт наперекосяк..."
      - "Даже если все расчёты говорят, что это безопасно, во время реального запуска всё вечно катится к чертям."
      - "Будь то Море Звёзд или Небесное Царство Амахара..."
      - "Но если подумать, я могу найти этому одно хорошее применение."
      - "Как думаешь, мы могли бы использовать его на Марко Поло?"
      - "сли бы нам удалось визуализировать то, что происходит в её сознании, это ведь помогло бы нам разобраться с этим предзнаменованием, не находишь ли?"
  - char: "clemenceau"
    side: "left"
    text:
      - "Действительно, многообещающая идея... Давайте выделим время, чтобы претворить её в жизнь."

chapter2:
  rows:

  - text:
      - "Говорят, время летит словно самолёт, и не успел я оглянуться, как уже приземлился в Регенсбурге."
      - "Едва я сошёл с трапа, меня уже встречали Принц Ойген, Z2 и Майнц, представлявшие Железную Кровь."
  - char: "prinz_eugen"
    side: "left"
    text:
      - "Добро пожаловать в Железную Кровь, Командир..."
  - char: "commander"
    side: "right"
    text:
      - "Надеюсь, я не заставил вас долго ждать."

chapter3:
  rows:
  - char: "commander"
    side: "right"
    text:
      - "Бисмарк здесь нет?"
  - char: "prinz_eugen"
    side: "left"
    text:
      - "Всё верно. Её вызвали на встречу с Союз. Судя по всему, они обсуждают планы совместных операций."
      - "Так что меня дёрнули в последний момент, чтобы я подменила её... Ой, то есть, мне выпала эта огромная честь и ответственность..."
  - char: "commander"
    side: "right"
    text:
      - "...Планы совместных операций в наше-то время? Против кого?"
  - char: "prinz_eugen"
    side: "left"
    text:
      - "Понятия не имею. Может, звякнешь ей позже и сам расспросишь о подробностях?"
      - "Ну а теперь, выдвигаемся? Руины замка тут неподалёку, так что ехать совсем недолго."

chapter4:
  rows:

  - char: "commander"
    side: "right"
    text:
      - "Так, э-э, а где Регенсбург?"

  - char: "prinz_eugen"
    side: "left"
    text:
      - "Ахахаха! Я так и знала, что ты спросишь. Я специально оставила её в стороне, просто чтобы избавить от твоего заезженного чувства юмора~"
      - "Но всё равно спасибо~"
      - "Ну а теперь, выдвигаемся? Руины замка тут неподалёку, так что ехать совсем недолго."

chapter5:
  rows:
  - char: "clemenceau"
    side: "right"
    text:
      - "А как обстоят дела с планами по транспортировке моего самолёта специального назначения?"
  - char: "prinz_eugen"
    side: "left"
    text:
      - "Не беспокойся. Мы подцепим его к трейлеру и отбуксируем в базовый лагерь сразу после нашего отъезда."
  - char: "commander"
    side: "right"
    text:
      - "...Погоди, то есть ты планируешь просто таскать самолёт за собой, куда бы ни направилась?"
  - char: "clemenceau"
    side: "left"
    text:
      - "Как я уже говорила, это всего лишь дополнительная мера предосторожности. Ну что, выдвигаемся, Командир?"

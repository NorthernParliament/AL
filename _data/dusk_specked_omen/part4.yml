chapter1:
  rows:
  - text:
      - "Результаты оказались вполне ожидаемыми. Будь то Мемфис, Вестал, Обсервер или Компилятор..."
      - "Даже несмотря на то, что все они реконструировали облик Обсервер Зеро в симуляционном пространстве..."
      - "Никто из них не видел сходства между ТБ и Обсервер Зеро."
      - "В каком-то смысле такой исход — самая логичная вещь на свете. Будь эта связь столь очевидной, кто-нибудь обязательно сказал бы об этом в тот самый миг, когда впервые увидел Навигатор ТБ."
      - "И тем не менее, ни члены Компилирующего Поля, ни экспериментальное подразделение ничего не заподозрили."
  - char: "commander"
    side: "left"
    text:
      - "(...Это должно быть ментальное вмешательство космического масштаба.)"
      - "(«Море Звёзд» создавалось под руководством другой Хелены. Означает ли это, что она приложила руку как к симуляции Зеро, так и к созданию ТБ?)"
      - "(Если кто-то и знает хоть что-то, то только она...)"
      - "(Но...)"
      - "(Похоже, в этот раз мне придётся рассчитывать только на себя...)"
      - "(В любом случае, вопрос, на котором мне следует сосредоточиться, заключается вовсе не в том, почему никто не видит связи между ними.)"
      - "(Куда важнее другое... почему я сам внезапно это осознал?)"
      - "(Что именно произошло? Что именно изменилось?)"

chapter2:
  rows:
  - text:
      - "Пока я был погружён в свои мысли, я внезапно осознал, что окружающий пейзаж сменился бескрайним простором неба и целым морем цветов."
      - "В то же время передо мной стояла Йорктаун, словно она находилась здесь всё это время"
  - char: "yorktown_meta"
    side: "left"
    status: "is-purple"
    text:
      - "...Рада снова видеть вас, Командир."
  - text:
      - "На этот раз она казалась окутанной какой-то туманной, похожей на сон аурой."
      - "Это чувство трудно описать словами. Почти так, будто она существует лишь в поле моего зрения и исключительно с моей перспективы."
  - char: "commander"
    side: "left"
    text:
      - "Я только что разговаривал с Мемфис и остальными. Мне сказали, ты была занята какой-то работой?"
  - char: "yorktown_meta"
    side: "right"
    status: "is-purple"
    text:
      - "Да, но теперь, когда вы здесь, я, конечно же, могу уделить вам немного времени."
      - "К слову, вы пришли как нельзя вовремя. На самом деле я как раз хотела попросить вас о помощи."
  - char: "commander"
    side: "left"
    text:
      - "Хм?"
  - char: "yorktown_meta"
    side: "right"
    status: "is-purple"
    text:
      - "Дело касается Марко Поло..."
      - "Командир, вы ведь единственный, у кого есть связь с Иерофантом, верно? А значит, вы единственный человек, способный разобраться с этим делом."
  - char: "commander"
    side: "left"
    text:
      - "Опять проблемы с Марко Поло, значит? Что ж, давай посмотрим."
  - char: "yorktown_meta"
    side: "right"
    status: "is-purple"
    text:
      - "Пожалуйста, следуйте за мной, Командир."

chapter3:
  rows:
  - text:
      - "Йорктаун вела меня сквозь постоянно меняющееся пространство, и в конце концов мы прибыли в место, которое выглядело как изолированная зона."
      - "Прямо предо мной сосуществовали два абсолютно разных мира, разделённые лишь тонким прозрачным барьером."
  - char: "commander"
    side: "left"
    text:
      - "Что это такое?"
  - text:
      - "Я перевёл взгляд на серое пространство по ту сторону барьера."
  - char: "yorktown_meta"
    side: "left"
    status: "is-purple"
    text:
      - "Как вы сами можете видеть..."
      - "Когда-то это была обычная зона отдыха, без всяких изолирующих барьеров."
      - "Но прошлой ночью Марко Поло внезапно начала искажать пространство вокруг себя, и у нас не осталось иного выбора, кроме как запечатать её."
  - text:
      - "Я продолжал слушать слова Йорктаун, параллельно внимательно разглядывая пространство за барьером."
      - "На той стороне и небо, и земля казались окутанными блеклым серым цветом."
      - "Но даже внутри этого мрачного пространства существовали различные оттенки и полутона, а некоторые участки и вовсе казались девственно-белыми."
      - "И в самом центре этого чистого белого сияния парила сама Марко Поло."
  - char: "yorktown_meta"
    side: "left"
    status: "is-purple"
    text:
      - "Командир, само по себе это пространство безвредно, так что вам не о чем беспокоиться."
      - "Однако вещь, которой вам стоит опасаться — это тот самый «голос». Вы слышите его?"
  - text:
      - "Йорктаун, судя по всему, изменила настройки барьера — и внезапно до меня донеслись едва различимые звуки пения."
  - char: "commander"
    side: "left"
    text:
      - "Этот голос... О, я могу разобрать некоторые слова."
  - text:
      - "Я продолжил напряжённо вслушиваться, беззвучно шевеля губами в такт вторящим в унисон словам."

chapter4:
  rows:
  - char: "commander"
    side: "left"
    text:
      - "«AOL ULAOLYDVYSK JVTLZ OLYHSKPUN AOL LUK»"
  - char: "yorktown_meta"
    side: "right"
    status: "is-purple"
    text:
      - "...Значит, вы всё-таки понимаете этот хор."
      - "Учитывая характер Иерофант, возможно, это её способ передать вам своего рода предзнаменование."
  - char: "commander"
    side: "left"
    text:
      - "Земли, обращающиеся в пустошь, рушащиеся стены, предрассветная тьма и могильный хлад... преисподняя грядёт."
      - "Что именно представляет собой эта «преисподняя»?"
  - char: "yorktown_meta"
    side: "right"
    status: "is-purple"
    text:
      - "...Я слышу об этом впервые. Дайте мне немного времени, чтобы во всём разобраться."
  - char: "commander"
    side: "left"
    text:
      - "Я также передам это послание Элизабет МЕТА. А пока, пожалуйста, держи в уме эти четыре ключевые фразы."
      - "Дай знать, если что-нибудь обнаружишь. Если это своего рода знамение, нас может ждать ещё какая-нибудь зацепка."
  - char: "yorktown_meta"
    side: "right"
    status: "is-purple"
    text:
      - "Я немедленно приступлю к расследованию."
  - char: "commander"
    side: "left"
    text:
      - "Спасибо, Йорктаун. Буду на связи."
  - char: "yorktown_meta"
    side: "right"
    status: "is-purple"
    text:
      - "Да. Буду с нетерпением ждать нашей следующей встречи, Командир."

chapter5:
  rows:
  - text:
      - "Свет гаснет, и вскоре я снова обнаруживаю себя в конференц-зале виллы."
  - char: "commander"
    side: "left"
    text:
      - "Ладно. Теперь нужно связаться с нужными людьми и посмотреть, удастся ли мне найти хоть какие-то зацепки... Хм?"
  - text:
      - "В этот самый миг меня внезапно осенило."
      - "Я наконец-то снова встретился с другой Йорктаун... но совершенно забыл спросить её..."

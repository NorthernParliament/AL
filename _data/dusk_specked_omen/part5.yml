chapter1:
  rows:
  - text:
      - "Я потратил некоторое время на то, чтобы собрать воедино имеющуюся у меня информацию, а также своё толкование того, что всё это могло бы значить, и составил черновик письма высшему руководству. Затем я сделал отдельную копию, адресованную другой Елизавете."
      - "Но прежде чем я успел всё завершить, передо мной всплыло приглашение на онлайн-встречу."
  - char: "commander"
    side: "left"
    text:
      - "Организатор — Клемансо? При участии Бисмарк и Союз?"
  - text:
      - "У меня не было причин отклонять приглашение, поэтому я решил подключиться к встрече."

chapter2:
  rows:
  - char: "clemenceau_rad"
    side: "left"
    text:
      - "Я получила твой отчёт, Командир. Ты ищешь зацепки, которые могли бы пролить свет на некое знамение?"
  - char: "commander"
    side: "right"
    text:
      - "Всё верно. У вас есть какие-нибудь соображения, о чём может идти речь?"
  - text:
      - "Трое других участников быстро переглянулись и обменялись парой слов, но в итоге инициативу ответа взяла на себя Клемансо."
  - char: "clemenceau_rad"
    side: "left"
    text:
      - "...Днём ранее во время исследования полярного бункера были обнаружены две аномалии."
      - "Первая: Гнейзенау МЕТА узрела видение, касающееся судьбы Арктики."
      - "То, что она увидела, похоже, совпадает со «скверной» и «разрушенными стенами», которые ты описал."
      - "Вторая: Киров МЕТА узрела схожее видение под льдами Антарктики."
      - "Она утверждает, что видела безжизненные руины, что совпадает с описаниями «бессветного утра» и «могильной стужи», которые ты привёл."
      - "Эти видения длились недолго, но возникли они практически одновременно."
  - char: "commander"
    side: "right"
    text:
      - "Странные события, происходящие одновременно на противоположных концах планеты и совпадающие с тем, что я видел в знамении..."
      - "(Неужели дальнейшая реализация проекта «Полярный бункер» и вправду может таить в себе какую-то опасность?)"
  - text:
      - "В «Ярком мире», который предначертан Башней, все проекты «Полярный бункер» увенчались успехом."
      - "В том мире всё стало возможным благодаря полному устранению любого внешнего вмешательства."
  - char: "commander"
    side: "right"
    text:
      - "(Но что, если во время реализации проекта ВСЁ ЖЕ возникнет внешнее вмешательство?)"
      - "(Может, именно об этом и предупреждает знамение Иерофанта?)"
  - text:
      - "Я ещё немного поразмыслил над этими вопросами, а затем принял окончательное решение."
  - char: "commander"
    side: "right"
    text:
      - "Давайте временно приостановим проект «Полярный бункер», пока мы не выявим и не устраним эти потенциальные угрозы."
  - char: "sovetsky_soyuz_rad"
    side: "left"
    text:
      - "Наши мнения совпадают, Товарищ Командир."
  - text:
      - "Мы все без лишнего шума пришли к одному и тому же выводу."
  - char: "commander"
    side: "left"
    text:
      - "Что касается тех видений, о которых ты упомянула ранее... Вы можете соотнести их с какими-либо местами в реальном мире?"
  - char: "clemenceau_rad"
    side: "right"
    text:
      - "Нам уже удалось отыскать замок, который подходит под эти описания."
      - "Трибунал недавно модернизировал устройство «Чёрное Солнце» — концептуальный символ самого Трибунала — и использовал его, чтобы воссоздать видения, которые Гнейзенау видела в своих воспоминаниях."
      - "Нам удалось соотнести это место с замком в окрестностях города Регенсбург, на территории Железной Крови."
  - char: "commander"
    side: "left"
    text:
      - "В окрестностях Регенсбурга, значит... А как же руины, которые Киров META видела в своём видении?"
  - char: "clemenceau_rad"
    side: "right"
    text:
      - "Насчёт этого..."
  - char: "sovetsky_soyuz_rad"
    side: "left"
    text:
      - "Товарищ Командир, той Киров больше нет с нами."
      - "Она лишь сказала: «Ухожу по личным причинам. Вернусь, когда всё уладится»."
      - "Мы не знаем ни когда, ни как она ушла, ни куда направилась."
      - "Если мне нужно было бы угадать, это, скорее всего, связано с увиденным ею видением."
  - char: "commander"
    side: "right"
    text:
      - "Но факт остаётся фактом: без Киров мы не сможем воспользоваться устройством «Чёрное Солнце»."
      - "(Неужели Киров решила отправиться в другой таймлайн из-за своего видения?)"
      - "(Значит ли это, что знамение не связано с тестовым полигоном Бета? Или, скорее, оно касается большего числа таймлайнов, чем просто наш мир?)"
      - "(Если это правда, то всё может быть куда серьёзнее обычного знамения. Возможно, это указывает на то, что Иерофант готовится сделать свой собственный ход...)"
      - "(Каждый из Арбитров управляет своим собственным тестовым полигоном. Иерофант в этом плане не должна быть исключением.)"
      - "(Ранее, на тестовом полигоне Тета, Звезда готовилась провести трансграничный эксперимент...)"
      - "(Что именно замышляет Иерофант?)"
      - "Давайте пока отложим это в сторону. Удалось ли вам обнаружить что-нибудь ещё во время исследования этого замка?"
  - char: "clemenceau_rad"
    side: "left"
    text:
      - "Мы всё ещё проводим дополнительные расследования, но пока ничего больше не обнаружили. Разумеется, если что-то изменится, я сразу же свяжусь с вами."
  - char: "commander"
    side: "right"
    text:
      - "Погодите, вы что, ждали, пока я вернусь из отпуска?"
      - "Раз уж в это дело замешана Иерофант, я, возможно, единственный, кто способен распутать некоторые из этих зацепок. Позвольте мне тоже войти в состав исследовательской группы."
      - "Что же касается всего этого отпуска..."
      - "Извини, Лексингтон, что упускаю такую возможность, но, похоже, нам придётся поставить это на паузу."

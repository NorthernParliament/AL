chapter1:
  rows:
  - text:
      - "*Щёлк! Щёлк!*"
      - "Идущая впереди группы Альфредо не переставая нажимала на спуск — вспышка её камеры в этих сумеречных водах была заметна так же отчётливо, как свет маяка."
  - char: "alfredo_oriani"
    side: "left"
    text:
      - "Хе-хе-хе, а я уже раскрыла один из секретов этого Зеркального Моря!"
      - "Посмотрите на те световые полосы в небе. На самом деле это не полярное сияние, а огромное множество зелёных орлов!"
      - "Те «зелёные призраки», которых видели Джанус из Королевского Флота и та девчонка-следователь — это наверняка они!"
  - char: "leonardo_da_vinci"
    side: "right"
    text:
      - "Поверить не могу, что такие колоссальные ленты света состоят из бесчисленных прозрачных зелёных орлов... Поразительное зрелище..."
      - "Но что-то тут не так... Почему проекции из Зеркального Моря смогли выбраться наружу?"
      - "Неужели это не просто игра света и тени... а нечто, обладающее физической формой?.."
  - char: "alfredo_oriani"
    side: "left"
    text:
      - "*Щёлк!* Ладно, со световыми полосами пока закончим."
      - "Теперь нужно найти кадр для крупного плана... Если всё получится, за такой снимок и награду отхватить можно..."
      - "Ого, вижу одинокого орла! Попробуем вот с такого ракурса..."
  - text:
      - "Альфредо навела объектив на небо и включила режим серийной съёмки."
      - "Непрерывное мерцание вспышки привлекло внимание патрулирующего небо орла. Он резко сменил курс и камнем бросился вниз, к самой воде."
  - char: "emanuele_pessagno"
    side: "left"
    text:
      - "Плохо дело! Альфредо, берегись! Эти орлы — враги!"
  - char: "alfredo_oriani"
    side: "right"
    text:
      - "……А?"
  - text:
      - "БАБАХ!!!"
      - "В самый последний момент Пессаньо открыла огонь, поразив пикирующего орла."
  - char: "alfredo_oriani"
    side: "left"
    text:
      - "О-очень близко... Проклятье, а я-то тебя фотографировала!"
      - "Как это подло! Как можно нападать на журналиста?! Очевидно, в Зеркальном Море ничего хорошего не водится!"
  - char: "emanuele_pessagno"
    side: "right"
    text:
      - "Одним выстрелом... не удалось уничтожить его полностью."
      - "Берегитесь... Слетается ещё больше врагов!"
  - text:
      - "В акватории внезапно поднялся сильный ветер. Пользуясь воздушными потоками, подбитый орёл взмыл ввысь, чтобы перегруппироваться."
      - "Световые ленты в небе рассыпались на бесчисленные искры, а на пустой морской глади возникло множество врагов, напоминающих корабли-призраки."
  - char: "alfredo_oriani"
    side: "left"
    text:
      - "Э-это ещё что такое?! Призрачные орлы и призрачные корабли?!"
      - "*Щёлк!* Этот кадр точно заслуживает премии!"
  - char: "leonardo_da_vinci"
    side: "right"
    text:
      - "Из ниоткуда возникли физические объекты, подобные проекциям... Каков же принцип их работы... Любопытно."
  - char: "emanuele_pessagno"
    side: "left"
    text:
      - "Да Винчи, Альфредо... Мне кажется, сейчас... не время для раздумий и фотосессий."
  - char: "alfredo_oriani"
    side: "right"
    text:
      - "Ах, точно! Всем внимание, приготовиться к бою!"

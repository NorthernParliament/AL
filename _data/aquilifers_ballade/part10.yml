chapter1:
  rows:
  - text:
      - "В диспетчерской Империи Сардиния Витторио Венето замерла в глубоком раздумье перед стеной, усыпанной экранами мониторов."
  - char: "bolzano"
    side: "left"
    text:
      - "Прошу прощения, госпожа Венето."
      - "Мы досконально изучили записи со всех камер наблюдения, но так и не смогли обнаружить следов госпожи Ромы..."
  - char: "vittorio_veneto"
    side: "right"
    text:
      - "...Тогда вывод напрашивается сам собой: после завершения своей речи Рома ни разу не покидала Колизей."
  - char: "giuseppe_garibaldi"
    side: "left"
    text:
      - "Но как это возможно... Это же очень странно! Мы ведь первым делом обыскали именно Колизей."
      - "Там столько камер, и мы просмотрели их по многу раз... Госпожи Ромы действительно нигде нет."
  - char: "vittorio_veneto"
    side: "right"
    text:
      - "Опасаюсь, что в здании Колизея кто-то неизвестный установил механизмы, о которых мы ничего не знаем..."
      - "Это совпадает с тем, что говорила госпожа Синано из Империи Сакуры — она чувствовала вмешательство в объекты на территории выставки."
      - "……Выхода нет. Похоже, придётся заблокировать Культурный павильон."
  - char: "giuseppe_garibaldi"
    side: "left"
    text:
      - "Госпожа Венето... Если вы закроете Культурный павильон, работа выставки будет прервана?"
  - char: "vittorio_veneto"
    side: "right"
    text:
      - "До полной остановки не дойдёт, но центральная зона будет временно закрыта до тех пор, пока мы не завершим расследование."
  - char: "bolzano"
    side: "left"
    text:
      - "...Слушаюсь. Я очищу здание театра, сославшись на неисправность газопровода."
  - char: "vittorio_veneto"
    side: "right"
    text:
      - "Погодите! Дайте мне ещё подумать..."
      - "(Это грандиозное событие только-только открылось, Империя Сардиния наконец-то оказалась в центре внимания всего мира...)"
      - "(Если сейчас закрыть самый большой и важный павильон, под любым предлогом, это станет сокрушительным ударом по престижу Империи...)"
      - "(Но если не закрыть, что будет с безопасностью Ромы... Какая цена у престижа, купленного ценой жизни товарища!)"
      - "(Однако даже закрытие может не решить проблему... Будет ли столь масштабный скандал оптимальным решением?)"
      - "(...Если не найти выход как можно скорее, ситуация может ухудшиться. Нет никаких гарантий, что постороннее вмешательство коснулось лишь одного павильона!)"
      - "(Да что же это такое... Как назло, Литторио сейчас с визитом, а с Марко Поло не удаётся связаться...)"
      - "(Что же мне делать……………………)"

chapter2:
  rows:
  - char: "giuseppe_garibaldi"
    side: "left"
    text:
      - "Госпожа Венето молчит уже пятнадцать минут. Кажется, она действительно в глубоком замешательстве."
  - char: "bolzano"
    side: "right"
    text:
      - "Вероятно, потому что... это действительно крайне сложная ситуация."
      - "Госпожа Венето вложила в эту выставку невероятно много сил, и всё ради того, чтобы показать всему миру истинный облик Империи Сардиния."
      - "Если в первый же день объявить о столь крупном происшествии, то, что бы мы ни делали в дальнейшем, репутацию будет уже не спасти..."
  - char: "giuseppe_garibaldi"
    side: "left"
    text:
      - "Это и впрямь непросто. И что же ты предлагаешь?"
  - char: "bolzano"
    side: "right"
    text:
      - "Хм... Я считаю, что при любых обстоятельствах безопасность товарищей должна быть в приоритете."
      - "Однако закрытие и обыск Колизея стоит оставить как крайнюю меру."
      - "Раз уж мы уверены, что в Культурном павильоне творится что-то неладное, не лучше ли будет отправить туда специалистов для расследования?.."
  - char: "vittorio_veneto"
    side: "left"
    text:
      - "Что ты только что сказала, Больцано?!"
  - char: "bolzano"
    side: "right"
    text:
      - "Прошу прощения, госпожа Венето..! Я не хотела прерывать ваши раздумья."
  - char: "vittorio_veneto"
    side: "left"
    text:
      - "Нет-нет, я не об этом! Это отличная идея, Больцано... При таких странных аномалиях нам действительно сначала стоит посоветоваться со специалистом."
      - "И как я сама не додумалась до этого в такой спешке... Живо свяжитесь с Торричелли, послушаем, что она скажет!"

chapter3:
  rows:
  - char: "torricelli_rad"
    side: "left"
    text:
      - "...Вот оно как. Подумать только, на выставке творятся такие хлопотные дела..."
      - "Судя по описанию... Больше всего на «нечто, заставляющее терять связь с внешним миром в определённой зоне», похоже Зеркальное море."
      - "Но обычное Зеркальное море не может ограничиваться лишь территорией Культурного павильона... В чем же там на самом деле дело?"
  - char: "vittorio_veneto"
    side: "right"
    text:
      - "Ты можешь прибыть сюда и всё проверить лично?"
  - char: "torricelli_rad"
    side: "left"
    text:
      - "Госпожа Венето... Я сейчас нахожусь в порту Таранто."
      - "Даже если я выступлю немедленно, путь сюда займёт немало времени. Боюсь, в этот раз мне придётся..."
  - char: "trieste"
    side: "right"
    text:
      - "Прошу прощения за беспокойство. Госпожа Венето, позвольте узнать: это вы отдали приказ изменить маршруты патрульных аппаратов?"
  - char: "vittorio_veneto"
    side: "left"
    text:
      - "Триесте? Почему ты здесь? Нет, я не отдавала подобных распоряжений..."
  - char: "giuseppe_garibaldi"
    side: "right"
    text:
      - "Ой-ой-ой! Смотрите скорее, изображения на всех мониторах начали хаотично меняться!"
  - char: "bolzano"
    side: "left"
    text:
      - "Это... система летательных аппаратов тоже начинает выходить из-под контроля?"
  - char: "vittorio_veneto"
    side: "right"
    text:
      - "Это скверно. Нужно как можно скорее остановить полетную систему!"
  - char: "torricelli_rad"
    side: "left"
    text:
      - "Фу-фу-фу... Подскажите, а Да Винчи уже прибыла на выставку?"
  - char: "vittorio_veneto"
    side: "right"
    text:
      - "Да Винчи... Если не ошибаюсь, она вместе с Альфредо отвечает за патрулирование территории."
  - char: "torricelli_rad"
    side: "left"
    text:
      - "Так я и думала... Фу-фу-фу, госпожа Венето, систему летательных аппаратов, используемых на выставке, проектировала именно Да Винчи."
      - "Боюсь, она единственная, кто способен за столь короткое время взломать систему и заставить все дроны выйти из-под контроля."
      - "Вероятно, она тоже обнаружила проблему в комплексе и решила провести собственное расследование."
      - "Вместо того чтобы полагаться на меня, находящуюся за тысячи ли отсюда, я бы рекомендовала обратиться к Да Винчи, которая уже на месте."
      - "Раз уж ей стали известны столь секретные подробности... Если вы не собираетесь заставить её замолчать навеки, то лучше привлеките её к официальному расследованию~"



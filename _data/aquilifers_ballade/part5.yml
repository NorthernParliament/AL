chapter1:
  rows:
  - char: "hai_chi"
    side: "left"
    text:
      - "Ва-а... Тут повсюду толпы народа, всё украшено фонарями и лентами... Здесь так же шумно и весело, как на Новый год!"
  - char: "hai_tien"
    side: "right"
    text:
      - "Да, здесь действительно ощущается мощный прилив чужой культуры..."
  - char: "hai_chi"
    side: "left"
    text:
      - "Сестрица Хай Тьен, сестрица Хай Тьен! А что это там летает в небе?"
  - char: "hai_tien"
    side: "right"
    text:
      - "Те, что побольше — дирижабли, те, что поменьше — экскурсионные воздушные шары, а вот насчёт совсем крошечных я и сама не уверена..."
  - char: "hai_chi"
    side: "left"
    text:
      - "Дирижабли?"
  - char: "hai_tien"
    side: "right"
    text:
      - "Это воздушные суда, которые парят за счёт газа. Принцип тот же, что у тепловых шаров или того гелиевого шарика, который ты только что купила."
      - "Как сказано в стихах: «Желаю, чтоб по возвращении домой, ты ввысь взлетел на шаре в час ночной». Речь как раз о подобных вещах."
  - char: "hai_chi"
    side: "left"
    text:
      - "Вот оно как..! А то круглое здание вон там — это что?"
  - char: "hai_tien"
    side: "right"
    text:
      - "Это наша следующая цель. Один из главных павильонов, Культурный павильон выставки, построенный Империей Сардиния."
      - "Подобные строения называют «Большими театрами», а их архитектурный стиль заимствован у империи, что была ещё древнее, чем нынешняя Сардиния."
      - "В старинных хрониках говорится: «Страна Дацинь, также зовётся Лицянь. Расположена она к западу от моря, потому и кличут её Страной к западу от морей. Земли её тянутся на тысячи ли, вмещая более четырехсот городов. Десятки малых стран покорны ей»."
      - "Эти строки описывают всё былое величие той империи."
  - char: "hai_chi"
    side: "left"
    text:
      - "О-ого! Сестрица Хай Тьен, ты такая крутая, всё на свете знаешь!"
  - char: "hai_tien"
    side: "right"
    text:
      - "Хе-хе... Ради этого путешествия я днями и ночами напролёт изучала материалы..."
      - "Я подготовилась практически по всем вопросам, которые можно было разобрать заранее!"
  - char: "hai_chi"
    side: "left"
    text:
      - "Ой! А что это за человек вон там, который направил на нас какую-то странную штуковину?"
  - char: "hai_tien"
    side: "right"
    text:
      - "Это портативная фотокамера, а держит её... какая-то странная журналистка, которая прямо сейчас нас снимает?!"
      - "...Хай Чи, давай пойдём другой дорогой."
  - char: "hai_chi"
    side: "left"
    text:
      - "Хорошо, сестрица! Только та странная журналистка и её спутница, кажется, уже бегут прямо к нам!"
  - char: "hai_tien"
    side: "right"
    text:
      - "Тц... Хай Чи, бежим!"
  - char: "hai_chi"
    side: "left"
    text:
      - "Поняла!"

chapter2:
  rows:
  - char: "hai_tien"
    side: "left"
    text:
      - "……Фух, фух. Ну и настырные же вы."
  - char: "alfredo_oriani"
    side: "right"
    text:
      - "Да почему вы начали убегать-то?.."
  - char: "hai_tien"
    side: "left"
    text:
      - "Если тебя преследуют какие-то странные личности, то как тут не бежать?.."
  - char: "alfredo_oriani"
    side: "right"
    text:
      - "Странные личности? Где?! Где эти странные личности?!"
  - char: "hai_tien"
    side: "left"
    text:
      - "…Странная личность сейчас как раз со мной разговаривает!"
  - char: "alfredo_oriani"
    side: "right"
    text:
      - "Э-э?.. Послушайте, мы вовсе не странные..."
  - char: "hai_tien"
    side: "left"
    text:
      - "Если вы не странные, то зачем наставили на нас камеру и начали исподтишка снимать?"
  - char: "leonardo_da_vinci"
    side: "right"
    text:
      - "Вот видишь, Альфредо! Нас всё-таки поняли превратно!"
  - char: "alfredo_oriani"
    side: "left"
    text:
      - "Тысяча извинений! Я — Альфредо Ориани из Империи Сардиния, а это моя спутница — Леонардо да Винчи."
      - "Мы патрулируем территорию и заодно собираем материал для репортажа. Ваши наряды такие красивые и уникальные, что я просто не смогла удержаться и сделала кадр..!"
  - char: "hai_tien"
    side: "right"
    text:
      - "…Так вы со стороны организаторов. С этого и надо было начинать..."
  - char: "alfredo_oriani"
    side: "left"
    text:
      - "Я как раз собиралась подойти и поприветствовать вас, но вы внезапно бросились наутёк..."
  - char: "hai_tien"
    side: "right"
    text:
      - "……Я поняла ситуацию. Простите, это я ошиблась на ваш счёт."
  - char: "leonardo_da_vinci"
    side: "left"
    text:
      - "Нет-нет, этот инцидент целиком и полностью вызван беспардонным поведением Альфредо. Вся вина на ней."
  - char: "alfredo_oriani"
    side: "right"
    text:
      - "Ахе-хе~ Вы ведь гостьи из Империи Дракона, верно?"
  - char: "hai_tien"
    side: "left"
    text:
      - "Именно. Я — Хай Тьен, а это моя младшая сестра — Хай Чи."
      - "Мы прибыли на эту Всемирную выставку в составе делегации Империи Дракона."
      - "Мы как раз направлялись к Культурному павильону, но сейчас... кажется, немного сбились с пути."
  - char: "alfredo_oriani"
    side: "right"
    text:
      - "А-ха-ха... В качестве извинения, позвольте мне проводить вас!"
  - char: "hai_tien"
    side: "left"
    text:
      - "Не стоит беспокоиться, у меня есть карта. Раз уж мы здесь оказались, то лучше просто осмотримся в округе."
      - "Однако у меня есть вопрос. Если ты действительно хочешь загладить вину, надеюсь, ты на него ответишь."
  - char: "alfredo_oriani"
    side: "right"
    text:
      - "Разумеется! Я расскажу всё, что знаю, без утайки. Спрашивай!"
  - char: "hai_tien"
    side: "left"
    text:
      - "Среди всех тех вещей, что парят в небе... Что это за маленькие летательные аппараты с белыми винтами?"
  - char: "alfredo_oriani"
    side: "right"
    text:
      - "А, это наши дроны для наблюдения за территорией!"
  - char: "hai_tien"
    side: "left"
    text:
      - "Каков принцип их полёта?.. Сомневаюсь, что на одних лишь парусиновых винтах можно совершать столь невероятные манёвры."
  - char: "alfredo_oriani"
    side: "right"
    text:
      - "Принцип... Ну, принципа я не знаю!"
      - "Но эту штуку придумала Да Винчи, которая стоит прямо рядом со мной. Она-то уж точно в курсе!"
  - char: "leonardo_da_vinci"
    side: "left"
    text:
      - "Хе-хе~ Этот аппарат называется «Летающая машина Да Винчи»!"
      - "Хоть внешне это и ретро-дизайн из дерева и винтов, на самом деле в них используются те же передовые технологии, что и при разработке кансен!"
      - "Большего я сказать не могу, но... эта штука способна поднять человека!"
      - "Не хотите ли прокатиться?"
  - char: "hai_tien"
    side: "right"
    text:
      - "Я, пожалуй..."
  - char: "hai_chi"
    side: "left"
    text:
      - "Я хочу!"
  - char: "hai_tien"
    side: "right"
    text:
      - "Э-э?.."

chapter3:
  rows:
  - text:
      - "Да Винчи достала пульт дистанционного управления и поманила рукой в сторону неба. Вскоре один из патрульных аппаратов плавно опустился вниз."
      - "Не дожидаясь полной остановки, Хай Чи с нетерпением запрыгнула на платформу."
      - "Под управлением Да Винчи Хай Чи вместе с аппаратом поднялась и зависла в воздухе."

chapter4:
  rows:
  - char: "hai_chi"
    side: "left"
    text:
      - "Ва-а-а! Обзор сразу стал таким широким! И ветер так приятно обдувает!"
  - char: "hai_tien"
    side: "right"
    text:
      - "Это устройство точно надёжно?.."
  - char: "leonardo_da_vinci"
    side: "left"
    text:
      - "Само собой! Это же изобретение великой Да Винчи! Если не разворачивать внезапно оснастку, грузоподъёмности хватит с запасом!"
  - char: "hai_chi"
    side: "right"
    text:
      - "Сестрица Хай Тьен, смотри! Там рыцарский патруль приближается!"
      - "Рыцари в заморских доспехах... Выглядят так величественно!"
  - char: "leonardo_da_vinci"
    side: "left"
    text:
      - "Вон те двое... это Больцано и Гарибальди?.."
      - "Странно. Они же отвечают за безопасность Колизея, что они делают здесь?"
  - char: "alfredo_oriani"
    side: "right"
    text:
      - "И они что-то оживлённо обсуждают по связи, низко склонив головы..."
      - "Я чую запах инцидента! Определённо что-то произошло!"
  - char: "hai_tien"
    side: "left"
    text:
      - "У вас двоих внезапно стали такие серьёзные лица. Что-то случилось?"
  - char: "alfredo_oriani"
    side: "right"
    text:
      - "Нет-нет, ничего такого! Просто мы внезапно вспомнили о своих обязанностях патрульных выставочного комплекса!"
  - char: "hai_tien"
    side: "left"
    text:
      - "Вот оно как. Тогда ступайте по своим делам, не обращайте на нас внимания."
  - char: "hai_chi"
    side: "right"
    text:
      - "Когда придёте в павильон Империи Дракона, обязательно отыщите меня! Я покажу вам кое-что действительно весёлое!"
  - char: "alfredo_oriani"
    side: "left"
    text:
      - "Договорились! Идёт!"
      - "(Шёпотом) Идём, Да Винчи, давай незаметно проследим за ними..."

chapter1:
  rows:
  - char: "roma"
    side: "left"
    text:
      - "«Чёрное море — пруд Империи, Средиземное море — её сад»."
      - "«Европа — арсенал Империи, Африка — её житница»."
      - "«От факелов на валу Адриана до маяка в Александрии — сияние Империи озаряет всех её подданных»."
      - "«О орёл, пари же вольно над этими бескрайними землями»."
      - "«Рим будет жить вечно»."
      - "«Ибо Рим пребывает с богами —»"

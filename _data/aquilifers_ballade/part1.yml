chapter1:
  rows:
  - text:
      - "Бум... Бум... Бум!"
      - "В величественном Колизее Сардинии под оглушительные крики толпы гремят залпы праздничного салюта."
      - "В самом центре внимания, на залитой светом сцене, стоит девушка в алом одеянии."
  - char: "roma"
    side: "left"
    text:
      - "Друзья, прибывшие к нам издалека, приветствую вас!"
      - "Сейчас, когда яркое солнце стоит в зените, а в небе парят праздничные ленты, настало время для торжества."
      - "После десятилетий, прерванных войной, крупнейшее международное собрание — Всемирная выставка — объявляется открытым!"
      - "В былые дни разделяющий нас океан был преградой, а узы общения были разорваны."
      - "Но теперь у нас наконец-то появился шанс собраться всем вместе и насладиться моментом радости."
      - "Всё это стало возможным лишь потому, что мы никогда не сдавались."
      - "Ваше присутствие здесь — лучшее доказательство того, что мы восстанавливаем связи друг с другом!"
      - "А потому, друзья мои, празднуйте!"
      - "Наслаждайтесь этим великим событием в стенах нашего грандиозного комплекса!"
      - "Я, Рома, от лица принимающей стороны — Империи Сардиния — объявляю..."
      - "Текущая Всемирная выставка — открыта!"
  - text:
      - "Под грохот пушек конфетти и ленты посыпались дождем, а в Колизее еще долго не смолкали овации."
      - "В этот миг Роме показалось, будто она вернулась в эпоху наивысшего расцвета, во времена, благословленные самим Ромулом."
      - "Она с удовлетворением окинула взглядом зал и шагнула в тень."
      - "Впереди было еще множество праздничных мероприятий, но её мысли были уже далеко отсюда."

chapter2:
  rows:
  - char: "roma"
    side: "left"
    text:
      - "Выставка открыта, и скоро это место станет доступным для всех."
      - "Похоже, здесь осталась лишь крупица тишины перед тем, как нахлынет волна суеты..."
      - "...Все труды были ради этого мгновения триумфа."
      - "Что ж... Пусть как можно больше людей искупаются в сиянии Ромула."
  - text:
      - "Рома в задумчивости шла по пустующей выставочной зоне, как вдруг почувствовала нечто странное."
  - char: "roma"
    side: "left"
    text:
      - "Кто здесь?! Покажись!"
  - text:
      - "Голос Ромы эхом разнёсся по залу, но ответа не последовало."
  - char: "roma"
    side: "left"
    text:
      - "Странно... Неужели это ощущение тревоги исходит не от человека, а от предмета?"
  - text:
      - "Рома посмотрела на указатели. Это была зона экспозиции Королевского Флота."
  - char: "roma"
    side: "left"
    text:
      - "Я лично проверяла каждый экспонат Королевского Флота... Кроме обилия подделок, там не было ничего подозрительного."
      - "Однако сейчас атмосфера здесь... явно отличается от того, что было во время вчерашней проверки."
      - "Неужели что-то случилось в зоне хранения экспонатов?.."
      - "Хранилище находится в строго охраняемом подземном секторе. Если кто-то сумел пробраться туда... Дело плохо!"
  - text:
      - "В то время как в основной зоне выставки начиналось бурное веселье, в зале Королевского Флота уже никого не было."

chapter1:
  rows:
  - char: "emanuele_pessagno"
    side: "left"
    text:
      - "Альфредо, ты звала меня с такой спешкой... Что-то случилось?"
      - "...И почему ты прячешься за углом? А где Да Винчи?"
  - char: "alfredo_oriani"
    side: "right"
    text:
      - "Тсс! Да Винчи сейчас выполняет важную воздушную операцию. Нам нужно вести себя тише и не раскрывать личности!"
  - char: "leonardo_da_vinci_rad"
    side: "left"
    text:
      - "О, Пессаньо, ты уже здесь? Как раз вовремя, я снова обнаружила цели."
      - "Больцано и Гарибальди направляются в сторону «Дубового купола»."
      - "Похоже, по пути они что-то высматривают, и связь по их коммуникаторам не прерывается ни на секунду."
  - char: "alfredo_oriani"
    side: "right"
    text:
      - "Информацию приняла~ Агент Да Винчи, отличная работа!"
      - "Продолжай наблюдение с воздуха, а мы с Пессаньо меняем дислокацию."
  - char: "leonardo_da_vinci_rad"
    side: "left"
    text:
      - "Принято~"
  - char: "emanuele_pessagno"
    side: "right"
    text:
      - "..То есть, вместо патрулирования территории вы теперь решили шпионить за Больцано и Гарибальди?.."
  - char: "alfredo_oriani"
    side: "left"
    text:
      - "Это не шпионаж, а расследование инцидента!"
      - "Разве тебе не кажется это странным?! Раз уж патрулирование территории поручили нам, почему эти двое, отвечающие за безопасность Культурного павильона, разгуливают здесь?"
      - "Да ещё и озираются по сторонам, поддерживая связь с каким-то таинственным собеседником!"
  - char: "emanuele_pessagno"
    side: "right"
    text:
      - "..Может быть, в Культурном павильоне их уже кто-то подменил, а Альфредо и Да Винчи просто кажутся руководству не слишком надёжными?"
  - char: "alfredo_oriani"
    side: "left"
    text:
      - "Кха-кха! Пессаньо, это было жестоко~"
  - char: "leonardo_da_vinci_rad"
    side: "right"
    text:
      - "Поддерживаю!"
  - char: "emanuele_pessagno"
    side: "left"
    text:
      - "Если Альфредо прекратит эту слежку, а Да Винчи наконец спустится с небес на землю, возможно, я слегка пересмотрю свою оценку..."
      - "Если вам так любопытно, чем заняты Больцано и остальные, почему бы просто не подойти и не спросить?"
  - char: "alfredo_oriani"
    side: "right"
    text:
      - "Ни за что! Какой тогда прок от меня как от репортёра!"
  - char: "emanuele_pessagno"
    side: "left"
    text:
      - "..........."

chapter2:
  rows:
  - char: "leonardo_da_vinci_rad"
    side: "left"
    text:
      - "Всем внимание, ситуация изменилась! Больцано и Гарибальди не стали заходить в «Дубовый купол»!"
  - char: "alfredo_oriani"
    side: "right"
    text:
      - "Я тоже это вижу! Они вошли в ту небольшую постройку позади, на которой висит табличка «Посторонним вход воспрещён». Что это за место?"
  - char: "leonardo_da_vinci_rad"
    side: "left"
    text:
      - "Это... диспетчерская, отвечающая за всю систему безопасности выставочного комплекса!"
  - char: "alfredo_oriani"
    side: "right"
    text:
      - "Что?! Значит, они наверняка пошли проверять состояние охраны выставки..."
      - "Хе-хе-хе... Чувствую, мы на пороге грандиозной сенсации!"
      - "Нужно как-то выяснить, что именно они проверяют... Есть ли способ пробраться внутрь?.."
  - char: "leonardo_da_vinci_rad"
    side: "left"
    text:
      - "Зачем такие сложности? Не забывай, что всю эту систему проектировала я!"
      - "А раз так, то «чёрный ход» был оставлен специально для подобных случаев~"
  - char: "alfredo_oriani"
    side: "right"
    text:
      - "Не подкачала, агент Да Винчи! Какая предусмотрительность!"
  - char: "leonardo_da_vinci_rad"
    side: "left"
    text:
      - "Однако провернуть это будет не так-то просто. Нам нужно найти тихое и укромное местечко для скрытых манипуляций."
  - char: "emanuele_pessagno"
    side: "right"
    text:
      - "...В павильоне Империи Сакуры есть большой лес. Как насчёт того, чтобы отправиться туда?"
  - char: "alfredo_oriani"
    side: "left"
    text:
      - "Отличная идея! Хе-хе~ Я так и знала, что Пессаньо не устоит перед таким приключением!"
      - "В наших рядах пополнение! Агентов стало больше!"

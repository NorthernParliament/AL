chapter1:
  rows:
  - text:
      - "БАБАХ!!!"
  - char: "alfredo_oriani"
    side: "left"
    text:
      - "Да сколько можно... Этим врагам конца и края нет!"
      - "Особенно эти здоровенные птицы в небе — сплошная морока! Они не атакуют издалека, но у нас нет авиации, чтобы с ними разобраться!"
  - char: "leonardo_da_vinci"
    side: "right"
    text:
      - "Ситуация скверная... Так дело не пойдёт. Срочно ищем путь к отступлению!"
  - char: "emanuele_pessagno"
    side: "left"
    text:
      - "Как насчёт того острова на западе? Врагов там не видно, а поверхность густо покрыта лесом."
      - "Если мы сумеем туда добраться, призрачный флот и призрачные птицы ничего не смогут нам сделать."
  - char: "alfredo_oriani"
    side: "right"
    text:
      - "Место... отличное! Но сначала нам нужно прорвать это окружение!"
  - char: "leonardo_da_vinci"
    side: "left"
    text:
      - "Чтобы сбежать, нам просто нужно побольше дыма, верно? Положитесь на меня!"
      - "Получайте!"

chapter2:
  rows:
  - text:
      - "Да Винчи вынырнула на поверхность и швырнула какой-то предмет в воду перед собой."
      - "Следом на морской глади возникло огромное механическое устройство."
      - "Под оглушительный грохот оно начало извергать клубы густого дыма, который в мгновение ока заполнил всё пространство вокруг."
  - char: "leonardo_da_vinci"
    side: "left"
    text:
      - "Сейчас! Всем прекратить огонь, уходим!"

chapter3:
  rows:
  - text:
      - "Под прикрытием дыма группе удалось благополучно скрыться в лесной чаще на острове."
      - "Спустя некоторое время призрачный флот, потерявший цель, просто растворился в пустоте, а призрачные орлы снова собрались в сияющие ленты в небе."
  - char: "alfredo_oriani"
    side: "left"
    text:
      - "Фух... Пронесло. Кажется, теперь мы в безопасности."
      - "Да Винчи, что это была за штуковина, которую ты бросила?"
      - "С чего вдруг она превратилась в такую здоровенную махину? А потом — бац! — и всё море в дыму!"
  - char: "emanuele_pessagno"
    side: "right"
    text:
      - "Это выглядело как какой-то магический артефакт..."
  - char: "leonardo_da_vinci"
    side: "left"
    text:
      - "Я... и сама не до конца понимаю. Вообще-то я готовила обычную приманку с дымогенератором."
      - "Но... кажется, у меня появилась одна идея. Если получится её проверить..."
  - text:
      - "Да Винчи задумчиво достала несколько запасных деталей и прямо на месте собрала группу небольших летательных аппаратов."
  - char: "leonardo_da_vinci"
    side: "left"
    text:
      - "А ну-ка, встаньте за моей спиной! Если мои догадки верны..."
      - "..сейчас начнётся самое интересное!"


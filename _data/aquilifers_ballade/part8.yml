chapter1:
  rows:
  - text:
      - "В лесу на окраине павильона Империи Сакуры Да Винчи, полностью сосредоточившись, манипулировала неким сложным устройством в своих руках."
  - char: "leonardo_da_vinci"
    side: "left"
    text:
      - "Хм-м... Вот оно что, понятно, понятно."
  - char: "alfredo_oriani"
    side: "right"
    text:
      - "Ну как? Что они делают? Нашла какой-нибудь сочный материал?!"
  - char: "leonardo_da_vinci"
    side: "left"
    text:
      - "Я использовала «чёрный ход» патрульных дронов для обратного подключения. Оказывается, Больцано просматривает записи с камер наблюдения над выставочным комплексом, разбивая их по секторам."
      - "Совершенно очевидно, что они что-то ищут."
  - char: "emanuele_pessagno"
    side: "right"
    text:
      - "Что именно они ищут?"
  - char: "leonardo_da_vinci"
    side: "left"
    text:
      - "Без понятия. Тут есть одна загвоздка... Было бы здорово услышать, о чём они говорят."
  - char: "alfredo_oriani"
    side: "right"
    text:
      - "А? Ты их не слышишь?"
  - char: "leonardo_da_vinci"
    side: "left"
    text:
      - "К сожалению, у меня есть доступ только к системе охраны, а против самой диспетчерской я бессильна."
      - "Хотя, возможно, если... попробовать взломать систему управления напрямую..."
  - char: "emanuele_pessagno"
    side: "right"
    text:
      - "Тсс, кажется, кто-то идёт."
  - char: "alfredo_oriani"
    side: "left"
    text:
      - "Неужели нас засекли?"
  - char: "leonardo_da_vinci"
    side: "right"
    text:
      - "Исключено! Мой «чёрный ход» невозможно обнаружить."
  - char: "emanuele_pessagno"
    side: "left"
    text:
      - "Чего вы двое застыли? Ло-жи-тесь!"
  - text:
      - "Неподалёку от кустов, где пряталась троица, показалась группа людей."
  - char: "alfredo_oriani"
    side: "left"
    text:
      - "Это же... госпожа Витторио Венето?!"
      - "У неё же были дела, она покинула выставку сразу после церемонии открытия! Почему она здесь, в павильоне Империи Сакуры?!"
  - char: "emanuele_pessagno"
    side: "right"
    text:
      - "Я и сама не знаю... Но, похоже, на этот раз предчувствие Альфредо не обмануло: происходит что-то серьёзное, о чём нам неизвестно..."
      - "Человек, который идёт рядом с госпожой Венето и разговаривает с ней — это ведь кто-то важный из Империи Сакуры?"
  - char: "leonardo_da_vinci"
    side: "left"
    text:
      - "Очень похоже на то... Плохо дело, все пригнитесь ещё ниже."
      - "И спрячьте свои камеры и бинокли! Если нас сейчас обнаружат, простыми извинениями мы не отделаемся!"

chapter2:
  rows:
  - char: "shinano"
    side: "left"
    text:
      - "Добро пожаловать в Павильон четырёх сезонов, госпожа Венето."
  - char: "vittorio_veneto"
    side: "right"
    text:
      - "Какое прекрасное поместье. Его прозвали Павильоном четырёх сезонов, потому что на одном маленьком острове вы умудрились воссоздать пейзажи весны, лета, осени и зимы одновременно?"
  - char: "shinano"
    side: "left"
    text:
      - "Именно так. Место, где мы сейчас находимся — Весенний лес. Год начинается с весны, и наш павильон берёт своё начало здесь же."
  - char: "noshiro"
    side: "right"
    text:
      - "Госпожа Синано, госпожа Венето, прошу вас, угощайтесь чаем."
  - char: "vittorio_veneto"
    side: "left"
    text:
      - "Хм... Аромат этого чая совсем не похож на королевский чёрный чай."
  - char: "shinano"
    side: "right"
    text:
      - "Верно, это зелёный чай прямиком из Империи Сакуры. Каковы ваши ощущения?"
  - char: "vittorio_veneto"
    side: "left"
    text:
      - "После первого же глотка кажется, будто вся накопившаяся за последнее время усталость бесследно исчезла... Удивительно."
      - "Госпожа Синано, позвольте уточнить: что за аномалии вы упоминали в нашем разговоре?"
  - char: "shinano"
    side: "right"
    text:
      - "Хм... Сегодня лишь первый день Всемирной выставки. Не случалось ли в комплексе чего-то необычного?"
  - char: "vittorio_veneto"
    side: "left"
    text:
      - "Необычного? Нет, насколько мне известно, на мероприятии всё идёт своим чередом."
  - char: "shinano"
    side: "right"
    text:
      - "Всё в порядке, значит... Это отрадно. Однако со вчерашней ночи я ощущаю в стенах выставки некую тревожную, дисгармоничную ауру."
      - "Возможно, в конструкцию какого-то объекта на территории было внесено постороннее вмешательство... Хорошо, если это не привело к печальным последствиям."
  - char: "vittorio_veneto"
    side: "left"
    text:
      - "..Не могли бы вы подробнее рассказать о том, что в объектах могли «похозяйничать»?"
      - "Даже если сейчас проблем нет, мы не можем игнорировать скрытую угрозу на территории выставки."
      - "Как организатор, Империя Сардиния обязана устранить любые риски для своих гостей."
  - char: "shinano"
    side: "right"
    text:
      - "Разумеется. Раз госпожа Венето лично прибыла сюда, мне надлежит поведать всё без утайки."
      - "Здесь чудесные виды, но всё же немного шумновато. Не согласитесь ли вы пройти со мной в замок, чтобы обсудить детали в более спокойной обстановке?"
  - char: "vittorio_veneto"
    side: "left"
    text:
      - "Конечно, без проблем."
  - char: "noshiro"
    side: "right"
    text:
      - "Госпожа Синано, госпожа Венето, прошу, пройдемте сюда..."

chapter3:
  rows:
  - char: "leonardo_da_vinci"
    side: "left"
    text:
      - "Фух... Наконец-то они ушли..."
  - char: "emanuele_pessagno"
    side: "right"
    text:
      - "Та важная особа из Империи Сакуры в самом конце... она ведь посмотрела прямо в нашу сторону? Нас точно не заметили?.."
  - char: "leonardo_da_vinci"
    side: "left"
    text:
      - "Да н-ну, вряд ли... Мы ведь отлично спрятались и не издали ни звука."
      - "Если бы она поняла, что её подслушивают, то наверняка приказала бы той грозной на вид сопровождающей вытащить нас отсюда."
  - char: "emanuele_pessagno"
    side: "right"
    text:
      - "И то верно..."
  - char: "alfredo_oriani"
    side: "left"
    text:
      - "Вы ведь всё слышали?! Возможно, в какие-то объекты на выставке было совершено постороннее вмешательство!"
      - "Госпожа Венето, Больцано и Гарибальди — все они, скорее всего, расследуют именно это дело."
      - "Мы не должны отставать! Нужно устроить тотальный обыск всего выставочного комплекса!"
      - "Агент Да Винчи, в твоих же руках контроль над всеми летательными аппаратами выставки?"
      - "В экстренной ситуации не до церемоний. Поднимай все дроны в воздух, мы должны перевернуть тут всё вверх дном!"
  - char: "leonardo_da_vinci"
    side: "right"
    text:
      - "Сделать-то можно... Но если мы поднимем такой шум, наличие «чёрного хода» уже не удастся скрыть, понимаешь?"
  - char: "alfredo_oriani"
    side: "left"
    text:
      - "О чём ты только думаешь, агент Да Винчи! Если ты с помощью своих «летающих машин» раскроешь это дело, ты же до конца жизни забудешь о проблемах с бюджетом на разработки!"
  - char: "leonardo_da_vinci"
    side: "right"
    text:
      - "?! Как же я сразу об этом не подумала! И то верно... Положитесь на меня, поиски берёт на себя великая Да Винчи~!"
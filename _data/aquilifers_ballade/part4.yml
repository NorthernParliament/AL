chapter1:
  rows:
  - text:
      - "Посреди шумного выставочного комплекса Пессаньо в одиночестве направлялась к павильону Северного Парламента."
      - "Она то и дело подносила к глазам бинокль, сверяясь с местностью, и делала пометки в своём блокноте."
  - char: "emanuele_pessagno"
    side: "left"
    text:
      - "Карта местности развёрнута, начало протокола происшествий..."
      - "Павильон Северного Парламента... Выглядит внушительно. Белоснежные строительные материалы кажутся невероятно прочными... Возможно, они выдержат даже удар метеорита."
  - text:
      - "Пессаньо нарисовала на карте в том месте, где стоял павильон, очень милый кирпичик — вероятно, так она обозначила степень его надёжности."
      - "Снова подняв бинокль, Пессаньо заметила неподалёку дуэт, который приближался к ней, приветливо размахивая руками."
  - char: "vincenzo_gioberti"
    side: "left"
    text:
      - "Одинокая Пессаньо обнаружена~!"
  - char: "stremitelny"
    side: "right"
    text:
      - "Доброе утро, госпожа Пессаньо!"
  - char: "emanuele_pessagno"
    side: "left"
    text:
      - "Сочетание Винченцо и Стремительный... Давненько я вас не видела вместе."
      - "Вы тоже патрулируете территорию?"
  - char: "vincenzo_gioberti"
    side: "right"
    text:
      - "Не-а, вовсе нет~ Я просто составила компанию Стремительный."
      - "В конце концов, как только выставка завершится, Стремительный должна будет вернуться вместе с делегацией Северного Парламента."
  - char: "emanuele_pessagno"
    side: "left"
    text:
      - "Ох... Неужели пора уезжать?"
  - char: "stremitelny"
    side: "right"
    text:
      - "Ахе-хе~ Родина зовёт, так что и мне скоро настанет пора возвращаться!"
      - "Но сегодня только первый день открытия выставки, так что у нас ещё уйма времени, чтобы поиграть вместе~"
      - "Пессаньо, не хочешь заглянуть с нами в павильон Северного Парламента?"
      - "Говорят, Аврора и остальные привезли в этот раз много всего интересного!"
      - "О! Вижу Память Меркурия! Подождите меня здесь секунду, я поздороваюсь и попрошу её провести нас через служебный вход!"
  - char: "emanuele_pessagno"
    side: "left"
    text:
      - "Умчалась, даже не дослушав... Как всегда, полна энергии."
  - char: "vincenzo_gioberti"
    side: "right"
    text:
      - "Такова уж наша Стремительный. Пессаньо, ты ведь, кажется, предпочитаешь действовать в одиночку? Если хочешь, иди вперёд, а я ей потом всё объясню."
  - char: "emanuele_pessagno"
    side: "left"
    text:
      - "Всё в порядке... После этого расставания неизвестно, когда мы увидимся снова, так что нужно ценить такие моменты."
      - "К тому же, павильон Северного Парламента мне и самой интересен... Они круглый год сражаются в полярных широтах, возможно, у них есть какие-то особые технологии для борьбы с суровыми морскими условиями..."

chapter2:
  rows:
  - char: "pamiat_merkuria"
    side: "left"
    text:
      - "Добро пожаловать во Дворец культуры Севера~ Вы ведь госпожа Пессаньо и госпожа Винченцо?"
      - "Огромное спасибо за то, что присматривали за Стремительным всё это время."
      - "Я — Память Меркурия из Северного Парламента. К сожалению, остальные товарищи из делегации сейчас в разъездах по делам, так что я осталась приглядывать за домом в одиночестве~"
  - char: "stremitelny"
    side: "right"
    text:
      - "Идёмте-идёмте, зайдём внутрь вместе с Памятью Меркурия!"

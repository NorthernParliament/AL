chapter1:
  rows:
  - char: "shangri_la"
    side: "left"
    text:
      - "Бристоль, как продвигается твоё расследование дела о «зелёном призраке»?"
  - char: "bristol"
    side: "right"
    text:
      - "О, это дело! Сейчас я как раз на решающей стадии!"
  - char: "shangri_la"
    side: "left"
    text:
      - "А если конкретнее?"
  - char: "bristol"
    side: "right"
    text:
      - "…Если конкретнее… расследование в самом разгаре!"
      - "У меня предчувствие, что за этим делом определённо скрывается нечто потрясающее основы мира!"
  - char: "ingraham"
    side: "left"
    text:
      - "Пошёл уже третий день… а ты всё не сдаёшься."
  - char: "bristol"
    side: "right"
    text:
      - "Именно потому, что идёт всего лишь третий день! Легендарный исследователь никогда не отступает!"
      - "Ингрэм, не хочешь сегодня составить мне компанию?"
  - char: "ingraham"
    side: "left"
    text:
      - "Нет уж, павильоны разных стран выглядят куда интереснее."
  - char: "bristol"
    side: "right"
    text:
      - "Хм~ Ну, тогда я пошла. Самое время начинать сегодняшние изыскания!"
  - char: "essex"
    side: "left"
    text:
      - "Береги себя в пути."
  - char: "bristol"
    side: "right"
    text:
      - "Не волнуйтесь, всё под контролем~"

chapter2:
  rows:
  - char: "shangri_la"
    side: "left"
    text:
      - "Судя по всему, у неё пока нет абсолютно никаких зацепок."
  - char: "essex"
    side: "right"
    text:
      - "...Честно говоря, мне кажется весьма вероятным, что Бристоль просто что-что померещилось."
  - char: "shangri_la"
    side: "left"
    text:
      - "Даже если так, в конечном итоге она наверняка представит весьма любопытный отчёт о расследовании."
  - char: "essex"
    side: "right"
    text:
      - "Ахаха, настолько «любопытный», что он будет способен перекроить реальность..."
  - char: "jeanne_d_arc"
    side: "left"
    text:
      - "Прошу прощения, вы ведь госпожа Эссекс из Союза Орла?"
  - char: "essex"
    side: "right"
    text:
      - "Она самая. А вы... госпожа Жанна д’Арк из Свободного Ириса?"
  - char: "jeanne_d_arc"
    side: "left"
    text:
      - "Именно~ Мне не часто доводилось сражаться с вами плечом к плечу, так что мне очень приятно, что вы меня узнали."
  - char: "essex"
    side: "right"
    text:
      - "В Союзе Орла часто доводилось слышать об успехах Свободного Ириса в Африке."
      - "Вы, госпожа Жанна, произвели на меня глубокое впечатление."
  - char: "jeanne_d_arc"
    side: "left"
    text:
      - "Для меня это большая честь. Могу я поинтересоваться, какие планы у делегации Союза Орла на сегодня?"
  - char: "essex"
    side: "right"
    text:
      - "Мы ещё не решили, какой павильон посетить. У вас есть какие-нибудь рекомендации, госпожа Жанна?"
  - char: "jeanne_d_arc"
    side: "left"
    text:
      - "Если вы не возражаете, позвольте мне пригласить вас на экскурсию внутрь Призрачной Триумфальной арки."
      - "Было бы чудесно, если бы мы могли заодно вместе пообедать~"
  - char: "essex"
    side: "right"
    text:
      - "Конечно, это не проблема! Укрепление связей с вашей фракцией — одна из целей моего визита."
  - char: "jeanne_d_arc"
    side: "left"
    text:
      - "...Вот и славно. Прошу всех следовать за мной..."


chapter1:
  rows:
  - char: "leonardo_da_vinci"
    side: "left"
    text:
      - "Хе-хе-хе, я перенастроила траектории всех летательных аппаратов."
      - "Теперь остаётся только ждать и следить за изображениями, которые они присылают: нет ли где чего подозрительного!"
  - char: "alfredo_oriani"
    side: "right"
    text:
      - "Щёлк! — Запечатлела кадры этой великолепной воздушной операции!"
  - char: "emanuele_pessagno"
    side: "left"
    text:
      - "А это точно не сбор улик против самих себя за совершённое «преступление»?.."
  - char: "alfredo_oriani"
    side: "right"
    text:
      - "Вовсе нет! Когда мы раскроем дело, это станет свидетельством нашего блестящего успеха и поводом для награды!"
  - char: "leonardo_da_vinci"
    side: "left"
    text:
      - "Стойте, всем приготовиться к смене позиции! Триесте на огромной скорости приближается к нам."
  - char: "alfredo_oriani"
    side: "right"
    text:
      - "Уа-а... Как быстро нас раскусили!"
      - "Отступаем, скорее! Прячемся в самую чащу леса! Если нас поймают, будет худо!"
  - char: "emanuele_pessagno"
    side: "left"
    text:
      - "..Ты же только что говорила про награду?"
  - char: "alfredo_oriani"
    side: "right"
    text:
      - "Это после раскрытия дела! А пока оно не раскрыто, как мы объяснимся, если попадёмся?!"

chapter2:
  rows:
  - char: "alfredo_oriani"
    side: "right"
    text:
      - "Фух... Кажется, теперь мы в безопасности."
  - char: "leonardo_da_vinci"
    side: "left"
    text:
      - "Не знаю... На ходу я не могу проверять систему мониторинга."
      - "Но не станут же они так упорно прочесывать весь лес в наших поисках..."
  - char: "nop"
    side: "right"
    text:
      - "Раз уж вы устроили такой переполох, как я могу не проявить настойчивость и не выследить вас до конца?~"
  - char: "alfredo_oriani"
    side: "left"
    text:
      - "А-а-а-а! Триесте! Как ты нас нашла?!"
  - char: "trieste"
    side: "right"
    text:
      - "Вы же не выключили свои коммуникаторы. Система безопасности комплекса включает в себя не только воздушное наблюдение."
  - char: "leonardo_da_vinci"
    side: "left"
    text:
      - "Ой! Просчиталась... Нужно было вырубить связь..."
  - char: "emanuele_pessagno"
    side: "right"
    text:
      - "Триесте, послушай нас, мы не хотели намеренно чинить препятствия!"
  - char: "trieste"
    side: "left"
    text:
      - "Да, я знаю. И я пришла к вам по приказу госпожи Витторио Венето."
      - "Она хочет, чтобы вы официально присоединились к расследованию."
  - char: "alfredo_oriani"
    side: "right"
    text:
      - "Так, значит, госпожа Венето уже в курсе того, чем мы тут занимаемся?.. В таком случае! Могла бы просто связаться с нами по коммуникатору и всё сказать!"
      - "К чему были все эти переживания и игра в прятки!"
  - char: "trieste"
    side: "left"
    text:
      - "Вы вели себя как воришки, которых мучает совесть — по связи бы мы быстро не объяснились, верно?"
      - "К тому же, небольшая встряска пойдёт вам на пользу в качестве урока."
      - "Госпожа Венето хотела действовать скрытно и осторожно, а вы устроили в небе настоящий хаос. Что, если бы это вызвало панику на выставке?"
      - "Живо приведите систему летательных аппаратов в исходное состояние и идите за мной. Госпожа Венето ждёт вас."
  - char: "leonardo_da_vinci"
    side: "right"
    text:
      - "...Слушаюсь!"

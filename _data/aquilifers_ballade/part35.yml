chapter1:
  rows:
  - char: "prinz_eugen"
    side: "left"
    text:
      - "Хм-хм-хм~♪ Хм-хм~♪"
  - char: "z2"
    side: "right"
    text:
      - "...Вы выглядите так, будто всё под контролем. Однако позвольте напомнить вам, глубокоуважаемая госпожа Ойген..."
      - "Пошёл уже четвёртый день с тех пор, как вы позволили Принцу Руппрехту действовать по своему усмотрению. И четвёртый день, как вы оставили Одина в одиночестве в Технологическом павильоне."
      - "Вы действительно не боитесь, что могут возникнуть проблемы?"
  - char: "prinz_eugen"
    side: "left"
    text:
      - "Это же Всемирная выставка, наполненная любовью и миром. Какая здесь может быть опасность?~"
  - char: "z2"
    side: "right"
    text:
      - "...Я, само собой, не имею в виду, что кто-то может представлять опасность для них. Я говорю о том, что..."
  - char: "prinz_eugen"
    side: "left"
    text:
      - "Спокойно, спокойно. Раз уж так много людей интересуются нашими Кораблями-прототипами, пускай смотрят на них сколько душе угодно~"
      - "Это не демонстрация силы, а, скажем так, благородный жест."
      - "К тому же Один не любит суету, а Руппрехта я всё равно не смогла бы удержать."
      - "Позволить событиям идти своим чередом — это тоже своего рода любезность. Но всё равно спасибо за заботу~"
  - char: "z2"
    side: "right"
    text:
      - "Нет, вы неправильно поняли. Я не столько забочусь о вас, сколько переживаю, как бы самой не оказаться втянутой в неприятности, которые они могут спровоцировать."
  - char: "prinz_eugen"
    side: "left"
    text:
      - "Ой, смотри-ка туда! Та, что только что вышла из павильона Империи Дракона... это ведь Кронштадт?!"
  - char: "z2"
    side: "right"
    text:
      - "Похоже, это она... И что вы задумали?"
  - char: "prinz_eugen"
    side: "left"
    text:
      - "Хе-хе~ Я несколько раз заходила в павильон Северного Парламента, но так её и не встретила. Наконец-то она мне попалась."
      - "Идём, пригласим её пропустить по стаканчику!"
  - char: "z2"
    side: "right"
    text:
      - "...Постойте! Зная вашу норму, я бы крайне не советовала вам...!"
  - char: "prinz_eugen"
    side: "left"
    text:
      - "Э-эй! Кронштадт!"

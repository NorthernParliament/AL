chapter1:
  rows:
  - text:
      - "Группа Альфредо медленно продвигается по коридору, ведущему в подземелья Колизея, освещая себе путь фонарями."
  - char: "alfredo_oriani"
    side: "left"
    text:
      - "...Не ожидала, что у Да Винчи тоже окажется с собой фонарь."
  - char: "leonardo_da_vinci"
    side: "right"
    text:
      - "У меня при себе немало всяких любопытных штуковин. И фонарь, конечно, в их числе — это ведь не только практично, но и создаёт нужную атмосферу~"
  - char: "emanuele_pessagno"
    side: "left"
    text:
      - "Практичность сейчас важнее всего... В коридоре, где не работает освещение, он очень выручает."
  - char: "alfredo_oriani"
    side: "right"
    text:
      - "Пессаньо, ты даже в такой момент продолжаешь делать записи?.."
  - char: "emanuele_pessagno"
    side: "left"
    text:
      - "Потому что это значимое путешествие... Уверена, позже оно станет интересной историей."
      - "И к тому же... это помогает систематизировать наш текущий прогресс в исследовании."
      - "Ах………… карта закончилась."
  - char: "alfredo_oriani"
    side: "right"
    text:
      - "В смысле «карта закончилась»?.."
  - char: "emanuele_pessagno"
    side: "left"
    text:
      - "На карте здесь больше нет пути. Судя по расстоянию, которое мы прошли... мы уже должны были упереться во внешнюю стену."
  - char: "alfredo_oriani"
    side: "right"
    text:
      - "Э?! Но дорога перед нами всё ещё тянется вперёд!"
  - char: "emanuele_pessagno"
    side: "left"
    text:
      - "Именно... В этом-то и проблема."
      - "Мы шли так долго, что по логике должны были пересечь всю подземную зону вдоль и поперёк, но в итоге даже не вышли из этого коридора..."
  - text:
      - "*З-з-зт... Тр-р-рж...*"
  - char: "alfredo_oriani"
    side: "left"
    text:
      - "Да Винчи, твой фонарь начал мигать. Неужели сломался?.."
  - char: "leonardo_da_vinci"
    side: "right"
    text:
      - "Исключено! Вещи моей работы не могут выйти из строя в такой момент!"
  - char: "emanuele_pessagno"
    side: "left"
    text:
      - "Ах, фонарь погас..."
  - char: "leonardo_da_vinci"
    side: "right"
    text:
      - "Что за чертовщина?!.."
      - "Как мой фонарь мог выйти из строя?! Проклятье... Ну погоди, я тебя сейчас прямо здесь разберу по винтику и выясню, в чём дело!!!"
  - char: "alfredo_oriani"
    side: "left"
    text:
      - "Э-это... как-то неправильно всё... Мы ведь не попали в ловушку, правда?.."
      - "Может, лучше вернёмся?.."
  - text:
      - "Альфредо обернулась назад, в сторону входа, но её взгляду предстал лишь бесконечный туннель, поглощённый непроглядной тьмой."
  - char: "alfredo_oriani"
    side: "left"
    text:
      - "Н-нужно срочно доложить госпоже Венето!"
  - char: "leonardo_da_vinci"
    side: "right"
    text:
      - "Я уже попробовала. Коммуникатор не реагирует, связь прервана."
      - "Возможно, госпожа Рома столкнулась с тем же самым, когда воспользовалась этим проходом, чтобы спуститься под землю."
  - char: "alfredo_oriani"
    side: "left"
    text:
      - "Да Винчи, ты так внезапно успокоилась после той вспышки гнева..."
  - char: "leonardo_da_vinci"
    side: "right"
    text:
      - "От паники всё равно никакого толку, лучше спокойно проанализировать ситуацию."
      - "Аномальное пространство и обрыв связи — если сложить эти два фактора, напрашивается единственный вывод: Зеркальное Море."
      - "Догадка Торричелли практически подтвердилась... Хотя мы никогда прежде не видели столь специфического Зеркального Моря."
      - "Это дорога в один конец. Но раз здесь есть вход, то определённо должен быть и выход. Соберитесь, идём дальше!"

chapter1:
  rows:
  - char: "roma"
    side: "left"
    text:
      - "«Империя увядает»."
      - "«От уверенности она перешла к высокомерию»."
      - "«От высокомерия она перешла к слепоте»."
      - "«В слепоте она ищет хаос»."
      - "«В хаосе она ищет спасение»."
      - "«Увядание вслед за расцветом — таков закон всего сущего»."
      - "«Я знала об этом. Я хотела этого избежать»."
      - "«Однако переплетённые судьбы ныне расходятся»."
      - "«И пусть небо полно орлов — на них больше некому смотреть»."
      - "«И пусть звучат крики отчаяния — их больше некому слушать»."
      - "«Расколотая империя... неужели это единственный ответ?»"

chapter1:
  rows:
  - char: "roma"
    side: "left"
    text:
      - "«Солнце и луна сменяют друг друга, моря обращаются в сушу»."
      - "«Я не знаю, как долго нахожусь здесь»."
      - "«Но я искренне наслаждаюсь каждой уходящей минутой, каждой секундой»."
      - "«Победа следует за победой, триумф — за триумфом»."
      - "«Пришёл, увидел, победил»."
      - "«Горны уже протрубили, легионы собраны»."
      - "«Цезарь Республики замер в ожидании»."
      - "«Настало время снова выступить в поход —»"

chapter1:
  rows:
  - char: "alfredo_oriani"
    side: "left"
    text:
      - "Как же я устала... Всё, больше не могу, мне нужен привал..."
  - char: "leonardo_da_vinci"
    side: "right"
    text:
      - "Потерпи ещё немного, Альфредо! Показания анемометра становятся всё чётче — где-то совсем рядом должен быть выход, через который циркулирует воздух!"
  - char: "alfredo_oriani"
    side: "left"
    text:
      - "И всё-таки гаджеты Да Винчи — это так удобно... Ну, раз такое дело, поднажму ещё чуть-чуть!"
      
chapter2:
  rows:
  - char: "emanuele_pessagno"
    side: "left"
    text:
      - "Впереди, кажется, виден свет..."
  - char: "alfredo_oriani"
    side: "right"
    text:
      - "О! Я тоже вижу! Неужели мы наконец добрались до выхода?!"
      - "Так, мне нужно срочно надеть солнечные очки! Вы тоже не забудьте защитить глаза!"
      - "Если после долгого пребывания в темноте резко выйти на яркий свет, можно на время ослепнуть!"
  - text:
      - "По мере того как группа приближалась к выходу, светлое пятно впереди становилось всё больше."
      - "Однако ожидаемого слепящего сияния не последовало."
      - "Мир за порогом оказался необитаем. В воздухе не чувствовалось дыхания жизни, а небо было настолько чёрным, что на нём не было видно даже звёзд."
  - char: "leonardo_da_vinci"
    side: "left"
    text:
      - "...Под павильоном внезапно обнаружилось бескрайнее море?"
      - "Теперь я уверена на все сто процентов: это Зеркальное Море!"
      - "Как ни странно... мне даже стало спокойнее."
  - char: "alfredo_oriani"
    side: "right"
    text:
      - "Я тебя понимаю! Раз это Зеркальное Море, значит, достаточно уничтожить устройство, поддерживающее его работу, и кризис будет разрешён!"
      - "А главное, когда понимаешь, что это козни Сирен, становится уже не так страшно!"
  - char: "emanuele_pessagno"
    side: "left"
    text:
      - "«Земную жизнь пройдя до половины, я очутился в сумрачном лесу, утратив правый путь во тьме долины...»"
      - "Это место точь-в-точь как Лимб, описанный в поэмах: такое же пустое и заброшенное..."
  - char: "alfredo_oriani"
    side: "right"
    text:
      - "Зато полярное сияние в небе выглядит довольно симпатично~"
      - "Щёлк! — Такие редкие кадры, нужно заснять всё!"
  - char: "emanuele_pessagno"
    side: "left"
    text:
      - "Альфредо, ты шумишь слишком сильно, веди себя осторожнее..."
  - char: "alfredo_oriani"
    side: "right"
    text:
      - "Да ладно тебе~ Тут кругом пустота, никаких врагов нет и в помине!"
  - char: "leonardo_da_vinci"
    side: "left"
    text:
      - "Тем не менее, госпожа Рома застряла именно здесь..."
      - "Уверена, тут таится скрытая опасность. Я тоже считаю, что нам лучше действовать осмотрительнее."
  - char: "alfredo_oriani"
    side: "right"
    text:
      - "...Твоя правда! Тогда для начала осторожно разведаем обстановку вокруг!"

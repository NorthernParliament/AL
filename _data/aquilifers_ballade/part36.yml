chapter1:
  rows:
  - text:
      - "В комнате отдыха Фош систематизирует информацию, собранную за последние несколько дней на выставке. Жоффр стоит у окна, погруженная в свои мысли."
  - char: "foch"
    side: "left"
    text:
      - "Делегация Железной Крови посетила павильон Империи Сакуры... Союз Орла провёл переговоры со Свободным Ирисом."
      - "Империя Сардиния тесно общается с Северным Парламентом, а в павильоне Империи Дракона каждый день полно гостей..."
      - "На выставке действительно кипит жизнь. По сравнению с этим, наш Собор выглядит... как бы это сказать, слегка пустоватым."
  - char: "joffre"
    side: "right"
    text:
      - "То, что здесь тихо — даже к лучшему... Меньше лишних хлопот."
      - "Наша задача на этот раз — просто находиться здесь, и ничего более."
      - "Даже систематизация этих данных излишня. Ты сама добавляешь себе работы."
  - char: "foch"
    side: "left"
    text:
      - "Ахаха... Твоя правда. Но я просто из тех людей, которые не могут сидеть сложа руки."
  - text:
      - "Тук-тук-тук *стук в дверь*"
  - char: "foch"
    side: "left"
    text:
      - "Войдите~"
  - char: "l_indomptable"
    side: "right"
    text:
      - "Прошу прощения за беспокойство. Госпожа Аврора из Северного Парламента ожидает в приемной. Она говорит, что хочет обсудить некое дело с нашими представителями."
  - char: "foch"
    side: "left"
    text:
      - "Аврора?.. Жоффр, что думаешь?"
  - char: "joffre"
    side: "right"
    text:
      - "Ничего не думаю... Раз уж она пришла в приемную, просто спросим её обо всём через минуту."
  - char: "foch"
    side: "left"
    text:
      - "Значит, мы её принимаем~ Индомтабль, попроси её подождать немного, мы скоро будем."
  - char: "l_indomptable"
    side: "right"
    text:
      - "Слушаюсь!"

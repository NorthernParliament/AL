chapter1:
  rows:
  - char: "alfredo_oriani"
    side: "left"
    text:
      - "Вау... Если смотреть с земли, величие Колизея ощущается ещё сильнее!"
      - "Сделаю-ка ещё один кадр под этим углом..."
  - text:
      - "Как раз в тот момент, когда Альфредо выбрала ракурс и приготовилась нажать на спуск..."
  - char: "alfredo_oriani"
    side: "left"
    text:
      - "Ой... Извините, уважаемая гостья, не могли бы вы отойти немного назад?"
  - char: "nop"
    side: "right"
    text:
      - "А?! П-простите!"
  - char: "leonardo_da_vinci"
    side: "left"
    text:
      - "Альфредо! Ты же её напугала."
  - char: "alfredo_oriani"
    side: "right"
    text:
      - "А? Ой, виновата, я не это имела в виду... Я тебя напугала?"
  - char: "nop"
    side: "left"
    text:
      - "Ничего страшного, я занервничала не из-за испуга..."
  - char: "alfredo_oriani"
    side: "right"
    text:
      - "Судя по твоему наряду, ты гостья из Королевского Флота? Неужели... ты заблудилась?"
  - char: "janus"
    side: "left"
    text:
      - "И-именно так! Я Джанус, эсминец J-класса Королевского Флота!"
      - "Это всё из-за того, что я засмотрелась на зелёного орла и отвлеклась... в итоге потеряла сестру Илластриес..."
      - "Подскажите, пожалуйста, где находится павильон Королевского Флота?!"
  - char: "leonardo_da_vinci"
    side: "right"
    text:
      - "Это проще простого~ Видишь вон тот остров на севере с огромным дубом? Это павильон Империи Сардиния — «Дубовый купол»."
      - "Если проплыть от павильона Сардинии немного на восток, увидишь стеклянный дворец прямо рядом с Триумфальной аркой Свободного Ириса. Это и есть павильон Королевского Флота."
  - char: "janus"
    side: "left"
    text:
      - "Вот оно как... Огромное спасибо!"
  - char: "alfredo_oriani"
    side: "right"
    text:
      - "А что за «зелёный орёл», о котором ты только что упомянула?"
  - char: "janus"
    side: "left"
    text:
      - "Хм... Ну, тот самый, что пролетел в небе над Большим театром совсем недавно? Зелёный такой орёл..."
      - "Разве это не было частью вашего шоу на церемонии открытия?"
  - char: "alfredo_oriani"
    side: "right"
    text:
      - "Э-э... Хм? А... Ну, главное, что тебе понравилось! А-ха-ха..."
  - char: "janus"
    side: "left"
    text:
      - "Это было действительно очень красиво! Большое спасибо, что указали дорогу, тогда я побегу!"

chapter2:
  rows:
  - char: "alfredo_oriani"
    side: "left"
    text:
      - "...Да Винчи, что думаешь по поводу этого «зелёного орла», про которого говорила Джанус?"
  - char: "leonardo_da_vinci"
    side: "right"
    text:
      - "Странно всё это. Я всё время вела наблюдение с воздуха и не видела ничего подобного."
      - "К тому же, я не припомню, чтобы в сценарии церемонии открытия был запланирован такой спецэффект."
  - char: "alfredo_oriani"
    side: "left"
    text:
      - "Хм-м... Без сомнения, в воздухе пахнет жареными новостями..."
      - "Но пока зацепок слишком мало, чтобы делать какие-то выводы."
      - "В любом случае, это первое происшествие, которое мы разрулили в ходе нашей операции по поддержанию правопорядка!"
      - "Выше нос! Продолжаем путь к павильону Империи Дракона!"

chapter1:
  rows:
  - char: "roma"
    side: "left"
    text:
      - "«Тьма делает солнечный свет лишь ярче»."
      - "«Руины делают высотные здания лишь величественнее»."
      - "«А война делает Империю лишь более великой»."
      - "«Воля Рима уже приняла решение»."
      - "«Великий Август»."
      - "«Снова пересеки Рубикон»."
      - "«Начни же новую эпоху —»"

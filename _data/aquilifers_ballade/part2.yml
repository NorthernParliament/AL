chapter1:
  rows:
  - char: "alfredo_oriani"
    side: "left"
    text:
      - "Щёлк! Щёлк! Ещё фото!"
      - "Самые яркие моменты церемонии открытия — всё будет запечатлено мной, великой Альфредо!"
  - char: "emanuele_pessagno"
    side: "right"
    text:
      - "...Раз ты закончила снимать, пора бы заняться делом. У нас вообще-то задание по патрулированию."
      - "Безопасность на этой выставке полностью лежит на плечах нашей Империи Сардиния."
      - "Хоть прибывшие флоты и являются надёжной силой... мы не можем ослаблять бдительность."
      - "Нужно сделать всё, чтобы на территории комплекса не произошло никаких инцидентов..."
  - char: "alfredo_oriani"
    side: "left"
    text:
      - "Да не торопись ты так! Я об этом помню, честное слово."
      - "Уж в чём-в чём, а в чутье на происшествия я в себе уверена!"
      - "Но открытие только-только состоялось, сейчас патрулировать особо нечего."
      - "Отсюда отличный вид, дай мне сделать ещё пару кадров!"
  - char: "emanuele_pessagno"
    side: "right"
    text:
      - "...«Нечего», значит."
      - "Ты действительно не хочешь, чтобы что-то случилось, или просто боишься это «что-то» пропустить?"
  - char: "alfredo_oriani"
    side: "left"
    text:
      - "Если чему-то суждено случиться, то я обязана быть там первой!"
      - "Иначе как мне раздобыть стоящие новости?"
      - "О, о! Одолжи-ка мне свой бинокль, кажется, мне пора начинать осмотр площадки!"
  - char: "emanuele_pessagno"
    side: "right"
    text:
      - "Не дам..."
  - char: "alfredo_oriani"
    side: "left"
    text:
      - "Это ещё почему?!"
  - char: "emanuele_pessagno"
    side: "right"
    text:
      - "Патрулирование нельзя проводить таким ленивым способом."
      - "Пейзаж, увиденный собственными глазами, и тот, что в линзах бинокля — это совсем разные вещи..."
  - char: "alfredo_oriani"
    side: "left"
    text:
      - "Пф-ф... Ладно! Попрошу Да Винчи смастерить мне что-нибудь получше!"
      - "Да Винчи... Хм? Куда она делась?"
  - char: "leonardo_da_vinci_rad"
    side: "right"
    text:
      - "Ищешь меня, Альфредо?"
  - char: "alfredo_oriani"
    side: "left"
    text:
      - "Ну да... Погоди, почему отвечает коммуникатор? Нам пора выдвигаться в патруль, ты где застряла?"
  - char: "leonardo_da_vinci_rad"
    side: "right"
    text:
      - "Подними голову и посмотри на небо. Я здесь, наверху."
  - text:
      - "Альфредо и Пессаньо долго вглядывались в небесную высь, пока наконец не обнаружили Да Винчи верхом на одном из летательных аппаратов, предназначенных для наблюдения за территорией."
  - char: "alfredo_oriani"
    side: "left"
    text:
      - "А?! Когда ты успела туда забраться?! Нет... Как ты туда забралась?!"
  - char: "leonardo_da_vinci_rad"
    side: "right"
    text:
      - "Я бы с радостью ответила прямо, но раз уж передо мной сама Альфредо, давай-ка я устрою тебе небольшую проверку~?"
  - char: "alfredo_oriani"
    side: "left"
    text:
      - "Хе-хе, репортёрское чутьё подсказывает мне, что ты, пользуясь положением строителя комплекса, оставила в этих леталках какую-то «лазейку»!"
      - "Я тоже хочу наверх, отправь за мной одну штуку, живо!"
  - char: "leonardo_da_vinci_rad"
    side: "right"
    text:
      - "У тебя ещё будет такая возможность, но разве нам не пора в патруль?"
      - "Центральной осью служат Колизей и главный павильон Сардинии, остальные восемь основных павильонов расположены зеркально симметрично. Исходя из этого, у нас есть два маршрута."
      - "Восточная линия начинается от Колизея, проходит через павильоны Северного Парламента, Свободного Ириса, Королевского Флота, Союза Орла и возвращается обратно к театру."
      - "Западная линия идёт через павильоны Империи Дракона, Железной Крови, Доминиона Виши, Империи Сакуры и также замыкается на Колизее."
      - "С какой начнём?"
  - char: "alfredo_oriani"
    side: "left"
    text:
      - "Если разделимся — эффективность возрастёт! Давайте разойдёмся в разные стороны, а если кто-то наткнётся на инцидент, сразу свяжется с остальными. Ну как?"
  - char: "emanuele_pessagno"
    side: "right"
    text:
      - "Ты просто хочешь эффективнее собирать новости..."
      - "Мне нужно вести записи, так что я всё равно за тобой не угонюсь. Я не против разделиться."
  - char: "leonardo_da_vinci_rad"
    side: "left"
    text:
      - "Я тоже не против. Всё равно я каждый павильон по нескольку раз облазила ещё во время стройки~"
  - char: "alfredo_oriani"
    side: "right"
    text:
      - "Тогда Да Винчи пойдёт со мной по западному маршруту. Хочу заглянуть в павильон Империи Дракона!"
  - char: "emanuele_pessagno"
    side: "left"
    text:
      - "В таком случае я возьму на себя восточную линию... Но почему именно Империя Дракона?"
  - char: "alfredo_oriani"
    side: "right"
    text:
      - "Хе-хе-хе, люди из Империи Дракона не так уж часто заглядывают в Европу. То, что они приняли приглашение и приехали в этот раз — редкая удача!"
      - "Я не могу упустить такой ценный шанс для репортажа!"
  - char: "emanuele_pessagno"
    side: "left"
    text:
      - "...Смотри не забывай о гостеприимстве и профессиональной этике журналиста."
  - char: "alfredo_oriani"
    side: "right"
    text:
      - "Это само собой! Я, Альфредо, хоть и обожаю сплетни, но никогда не опущусь до лживых вбросов! И наводящих вопросов тоже задавать не буду!"
      - "Ладно-ладно, Да Винчи, спускайся уже с небес на землю, нам пора выдвигаться!"
      - "Нас ждут шумные залы и целый океан информации!"


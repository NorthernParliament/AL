chapter1:
  rows:
  - char: "alfredo_oriani"
    side: "left"
    text:
      - "Пессаньо, ты так старательно всё записываешь... Дашь взглянуть в твой блокнот?"
  - char: "emanuele_pessagno"
    side: "right"
    text:
      - "Всё равно ведь попытаешься подсмотреть, если я откажу... Держи."
  - char: "alfredo_oriani"
    side: "left"
    text:
      - "Эхе, спасибочки~"
      - "...Ого, какие милые пометки ты рисуешь на карте!"
      - "Облачка диалогов — это места, где мы с кем-то здоровались..."
      - "Крестики — это осмотренные залы, а восклицательные знаки — точки, где мы обсуждали подозрительные моменты?"
  - char: "emanuele_pessagno"
    side: "right"
    text:
      - "Мгм... Это была последняя зона на поверхности."
      - "В итоге — ровным счетом ничего..."
  - char: "leonardo_da_vinci"
    side: "left"
    text:
      - "Не «ничего», а полное исключение наземных секторов!"
      - "Раз с поверхностью покончено, единственное место, где может крыться проблема — это подземные ярусы!"
      - "Госпожа Рома лично проверяла все культурные ценности, присланные на выставку."
      - "Под землей как раз находится зона хранения артефактов. Вполне вероятно, что после выступления она отправилась именно туда для осмотра!"
  - char: "alfredo_oriani"
    side: "right"
    text:
      - "Звучит логично! Да Винчи, ты так детально всё изучила. Я вот в подземных секторах ещё не бывала."
  - char: "leonardo_da_vinci"
    side: "left"
    text:
      - "Ну, они же полностью закрыты для публики, даже входы туда замаскированы."
      - "...По крайней мере, в теории должны быть замаскированы. Но почему здесь вход в подвал распахнут настежь?!"
  - text:
      - "Прямо за поворотом коридора группа обнаружила открытый проход, ведущий вниз."
  - char: "alfredo_oriani"
    side: "left"
    text:
      - "А? Может, кто-то спустился и просто забыл закрыть за собой дверь?.."
  - char: "leonardo_da_vinci"
    side: "right"
    text:
      - "...Наши люди не могут быть настолько неосторожны. К тому же, если дверь остается открытой дольше положенного, система безопасности должна поднять тревогу."
      - "Если только... система безопасности подземелья уже не выведена из строя!"
  - char: "bristol"
    side: "left"
    text:
      - "Э-ге-гей! Друзья, вы не видели пролетавшего здесь зелёного призрака?!"
  - char: "alfredo_oriani"
    side: "right"
    text:
      - "Зелёный призрак?.. Что ещё за чертовщина... И вообще, ты кто такая?"
  - char: "bristol"
    side: "left"
    text:
      - "Я Бристоль, следователь из Союза Орла! В данный момент я расследую инцидент с «Зелёным призраком Всемирной выставки»!"
      - "Как странно... Он должен был выскочить именно отсюда..."
      - "Раз вы ничего не видели, тогда я побежала дальше!"
      - "Берегите себя! Зелёный призрак, я иду-у-у!"
  - text:
      - "Самопровозглашённый следователь Бристоль, размахивая зажжённым фонарём, стремительно пронеслась мимо них и так же быстро скрылась из виду."
  - char: "alfredo_oriani"
    side: "left"
    text:
      - "«Берегите себя»... Мы вообще-то патрульные этой выставки, это наша реплика!"
      - "И что это был за фонарь... Сейчас же день на дворе."
  - char: "leonardo_da_vinci"
    side: "right"
    text:
      - "Это романтика... Я её понимаю!"
  - char: "alfredo_oriani"
    side: "left"
    text:
      - "Ты-то?! Серьёзно?!"
  - char: "leonardo_da_vinci"
    side: "right"
    text:
      - "Не важно. Что думаете об этом «зелёном призраке», про которого она говорила?"
  - char: "emanuele_pessagno"
    side: "left"
    text:
      - "Должно быть, ей просто померещилось..."
  - char: "alfredo_oriani"
    side: "right"
    text:
      - "Нет! Это, без сомнения, важнейшая зацепка! Пессаньо, тебя тогда не было рядом, поэтому ты не в курсе."
      - "Сразу после того, как мы разошлись, Джанус из Королевского Флота говорила нечто подобное — мол, видела какую-то зелёную птицу или вроде того."
      - "Я хотела заняться этим, как только освобожусь, но не думала, что ниточки сойдутся именно здесь..!"
      - "К слову, в тот раз это тоже было неподалёку от Культурного павильона..."
  - char: "emanuele_pessagno"
    side: "left"
    text:
      - "Хм, уже второй человек замечает «зелёного призрака» возле этого павильона... Это действительно подозрительно."
  - char: "leonardo_da_vinci"
    side: "right"
    text:
      - "Та девчонка-следователь только что упомянула, что призрак вылетел именно отсюда, верно?.."
  - text:
      - "Да Винчи и Альфредо синхронно и решительно кивнули, после чего на полной скорости рванули в открытый проход, ведущий в подземелье."
  - char: "alfredo_oriani"
    side: "left"
    text:
      - "Главная сенсация, я иду-у-у!"
  - char: "leonardo_da_vinci"
    side: "left"
    text:
      - "Безлимитный бюджет, я лечу-у-у!"
  - char: "emanuele_pessagno"
    side: "right"
    text:
      - "Да подождите вы! Эй!"
  - text:
      - "Из коммуникатора в руках Пессаньо раздался обеспокоенный голос Венето."
  - char: "emanuele_pessagno"
    side: "right"
    text:
      - "Ох... Сначала доложу госпоже Витторио Венето, а потом... придётся их догонять."

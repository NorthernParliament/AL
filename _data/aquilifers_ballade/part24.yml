chapter1:
  rows:
  - text:
      - "В Колизее Сардинии Больцано и Гарибальди быстро направляются к подземному переходу."
  - char: "bolzano"
    side: "left"
    text:
      - "Госпожа Гарибальди, не бегите, чтобы не вызывать подозрений."
  - char: "giuseppe_garibaldi"
    side: "right"
    text:
      - "Хорошо-хорошо~ Нам ещё далеко?"
  - char: "bolzano"
    side: "left"
    text:
      - "Ближайший вход всего в одном повороте отсюда."
  - char: "giuseppe_garibaldi"
    side: "right"
    text:
      - "Хе-хе~ Интересно, как там продвигается их расследование. Если там правда летает зелёный орёл, я бы очень хотела на него взглянуть~"
  - char: "bolzano"
    side: "left"
    text:
      - "...Будь начеку. Пессаньо перестала выходить на связь сразу после своего доклада, на складе явно что-то не так."
      - "Пришли. Это здесь, заходим."

chapter2:
  rows:
  - char: "bolzano"
    side: "left"
    text:
      - "Больцано вызывает Да Винчи. Ты меня слышишь?"
  - char: "giuseppe_garibaldi"
    side: "right"
    text:
      - "Ну как, удалось связаться?"
  - char: "bolzano"
    side: "left"
    text:
      - "Нет... Ни с кем из них нет связи, хотя внешние каналы работают исправно."
  - char: "giuseppe_garibaldi"
    side: "right"
    text:
      - "Значит, в отличие от группы Пессаньо, мы не потеряли связь с внешним миром, едва спустившись под землю?"
      - "Как любопытно. Впервые вижу такое странное Зеркальное Море."
      - "Впрочем... в подземном складе нет воды, так что называть это «морем», пожалуй, не совсем верно. Зеркальное пространство..?"
  - char: "bolzano"
    side: "left"
    text:
      - "Гарибальди, здесь следы того, что вещи на складе кто-то перебирал."
      - "Я не очень разбираюсь в антиквариате, можешь осмотреть их?"
  - char: "giuseppe_garibaldi"
    side: "right"
    text:
      - "Конечно, положись на меня~ Так, сейчас мы в зоне хранения экспонатов Королевского Флота."
      - "Хм-м... Да, тут явно всё переворошили совсем недавно."
      - "Погоди, это же..."
      - "Ох! Беда, Больцано! Экспонаты из одной витрины были украдены!"
  - char: "bolzano"
    side: "left"
    text:
      - "…Что?! Это происшествие чрезвычайной важности! Чем вообще занималась наша служба безопасности?!"
  - char: "giuseppe_garibaldi"
    side: "right"
    text:
      - "Если подумать… когда мы вошли, нам ведь не попалось ни одного работающего охранного устройства, так?.."
      - "И вокруг становится всё темнее… Кто-то выключил свет на складе?"

chapter3:
  rows:
  - char: "bolzano"
    side: "left"
    text:
      - "…Госпожа Гарибальди, продолжайте проверять, не пропали ли другие экспонаты. Я немедленно доложу госпоже Венето."
      - "Госпожа Венето, это Больцано. Мы обнаружили кражу ценностей на подземном складе."
      - "…Госпожа Венето, вы меня слышите?"
  - char: "communicator"
    side: "right"
    text:
      - "З-з-зт… П-ш-ш-ш…"
  - char: "giuseppe_garibaldi"
    side: "left"
    text:
      - "Теперь и мы остались без связи?!"
  - char: "bolzano"
    side: "right"
    text:
      - "…Похоже на то. Но почему ты звучишь так воодушевлённо?.."
  - char: "giuseppe_garibaldi"
    side: "left"
    text:
      - "Потеря связи — это знак того, что мы наконец-то тоже втянуты в аномалию!"
      - "Ведь чтобы решить проблему, нужно сначала оказаться в самом её эпицентре, верно?"
      - "К тому же… теперь мы совсем близко к встрече с зелёным орлом!"
      - "Смотри, в этой непроглядной тьме, там, в самом конце, брезжит слабый свет."
      - "Зелёный орёл наверняка ждёт нас именно там~ Вперёд, Больцано!"


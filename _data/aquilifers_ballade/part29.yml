chapter1:
  rows:
  - text:
      - "БАБАХ!!!"
      - "Враги на поверхности моря были полностью уничтожены, а последние призрачные орлы в небе рассеялись в пустоте после очередного залпа."
  - char: "bolzano"
    side: "left"
    text:
      - "…Битва окончена?"
  - char: "alfredo_oriani_rad"
    side: "right"
    text:
      - "О-хо! Вы обе в порядке?"
  - char: "giuseppe_garibaldi"
    side: "left"
    text:
      - "Мы целы, спасибо за своевременную помощь!"
  - char: "bolzano"
    side: "right"
    text:
      - "Альфредо… откуда ты взяла этот странный флот, будто сошедший со страниц какого-то романа?.."
  - char: "alfredo_oriani_rad"
    side: "left"
    text:
      - "Это всё Да Винчи наколдовала, я и сама не особо понимаю!"
  - char: "leonardo_da_vinci_rad"
    side: "right"
    text:
      - "Хе-хе~ На самом деле, принцип работы этой системы заключается в следующем...."

chapter2:
  rows:
  - char: "leonardo_da_vinci_rad"
    side: "right"
    text:
      - "Ну, теперь-то всем всё понятно?!"
  - char: "giuseppe_garibaldi"
    side: "left"
    text:
      - "Нет, абсолютно ничего!"
  - char: "bolzano"
    side: "right"
    text:
      - "Я тоже… но текущую ситуацию осознаю."
      - "Это совпадает с выводами, которые мы с госпожой Гарибальди сделали ранее: тот неестественно огромный колизей в центре сектора явно является источником проблем."
      - "Если мы доберемся туда, то наверняка найдем способ разрушить это Зеркальное Море."
      - "Госпожа Рома, оказавшаяся здесь раньше нас, скорее всего, пришла к такому же заключению…"
  - char: "giuseppe_garibaldi"
    side: "left"
    text:
      - "Значит, есть шанс встретить её по пути к центру?"
  - char: "bolzano"
    side: "right"
    text:
      - "Вероятность высока. Остается надеяться, что мы успеем воссоединиться с ней до того, как она попадет в беду…"
  - char: "alfredo_oriani_rad"
    side: "left"
    text:
      - "Тогда пора поддать газу!"
      - "Хотите подняться к нам? Эти корабли летают на приличной скорости!"
  - char: "giuseppe_garibaldi"
    side: "right"
    text:
      - "Мне было бы очень любопытно!"
  - char: "bolzano"
    side: "left"
    text:
      - "…Честно говоря, мне тоже. Однако если мы все поднимемся на воздушные суда, мы фактически оставим водную поверхность без прикрытия."
      - "Спускаться с этих кораблей долго. Если впереди мы столкнемся с плотным огнем противника, у нас может не быть возможности безопасно приземлиться."
  - char: "giuseppe_garibaldi"
    side: "right"
    text:
      - "Хм… резонно. Если нас атакуют со всех сторон сразу, шансы быть сбитыми очень велики…"
      - "Хе-хе… Ещё недавно я ломала голову над тем, как нам получить превосходство в воздухе, и никак не ожидала, что проблема решится таким образом."
      - "Летающие линкоры против призрачных орлов… Становится всё интереснее!"

chapter1:
  rows:
  - text:
      - "В этот момент на воде и в небе вокруг Колизея одновременно разворачивались ожесточённые сражения."
  - char: "alfredo_oriani"
    side: "left"
    text:
      - "Левый борт, заградительный огонь слишком редкий!"
      - "Да Винчи, ты можешь создать ещё больше кораблей?"
      - "Если так пойдёт и дальше, нас просто задавят числом!"
  - char: "leonardo_da_vinci"
    side: "right"
    text:
      - "Я и сама это понимаю, но у меня был ограниченный запас материалов... Знай я, что они пригодятся для такого, я бы забила грузовые отсеки под самую завязку..."
  - char: "alfredo_oriani"
    side: "left"
    text:
      - "О-хо-хо... Придётся держать линию фронта здесь и ждать, пока Гарибальди и Больцано на воде совершат прорыв!"
  - char: "emanuele_pessagno"
    side: "right"
    text:
      - "...Боюсь, там дела обстоят не лучше."
  - text:
      - "Пессаньо указала вниз, на поверхность моря, скрытую густым дымом, из-под которого то и дело доносились грохот взрывов и гул канонады."
  - char: "alfredo_oriani"
    side: "left"
    text:
      - "Э?! Почему?! Неужели из-за того, что эта Пешка так похожа на госпожу Рому, они не могут сражаться в полную силу?"
  - char: "emanuele_pessagno"
    side: "right"
    text:
      - "Возможно, это одна из причин, но есть и другая... Боевая мощь этой Пешки... она невероятно высока."
      - "Мне доводилось присутствовать на огневых испытаниях госпожи Ромы... Эта Пешка, пожалуй, ни в чём не уступает оригиналу."
  - char: "leonardo_da_vinci"
    side: "left"
    text:
      - "Плохо дело... С одной стороны — наши, скованные сомнениями, с другой — враг с запредельной мощью, палящий изо всех орудий."
      - "При таком раскладе... они продержатся максимум полчаса."
  - char: "alfredo_oriani"
    side: "right"
    text:
      - "Ты даже это умудрилась рассчитать?! Тогда нам нужно срочно что-то придумать!"
  - char: "leonardo_da_vinci"
    side: "left"
    text:
      - "М-м... Я думаю, дай мне немного времени."

chapter2:
  rows:
  - text:
      - "Прошло некоторое время..."
  - char: "alfredo_oriani"
    side: "left"
    text:
      - "Стаи орлов приближаются к флагману... то есть к нашему кораблю! В нашей защите вот-вот пробьют брешь!"
  - char: "leonardo_da_vinci"
    side: "right"
    text:
      - "Спокойно... ещё секунду..."
  - text:
      - "Взгляд Да Винчи метался из стороны в сторону в поисках выхода из тупика. Внезапно она замерла, уставившись на заросли терновника, обвивающие внешние стены Колизея."
  - char: "emanuele_pessagno"
    side: "left"
    text:
      - "...Может, нам стоит попытаться сначала спуститься?"
      - "Ты упоминала устройство для экстренной эвакуации, и если честно, мне бы очень не хотелось доводить дело до его использования..."
  - char: "leonardo_da_vinci"
    side: "right"
    text:
      - "Нет... стойте... Есть идея!"
      - "Посмотрите на эти невероятно огромные стены коилзея. Видите, как они густо оплетены этими не менее гигантскими зарослями терновника?"
  - char: "emanuele_pessagno"
    side: "left"
    text:
      - "...И что с ними не так?"
  - char: "leonardo_da_vinci"
    side: "right"
    text:
      - "В том-то и дело! Эти тернии ведут себя очень странно!"
      - "Обычно подобные растения вгрызаются в расщелины зданий. Со временем они способны разрушить даже самую крепкую кладку до неузнаваемости."
      - "Но эти — совсем другое дело! Посмотрите, как они обвивают повреждённые участки фасада. Они не разрушают здание, они буквально удерживают его конструкцию, не давая ей окончательно развалиться!"
  - char: "alfredo_oriani"
    side: "left"
    text:
      - "Ты хочешь сказать... что этот терновник здесь не для того, чтобы уничтожить колизей, а чтобы спасти его от обрушения?"
  - char: "leonardo_da_vinci"
    side: "right"
    text:
      - "Именно! А теперь вспомним нашу главную цель — нейтрализовать Зеркальное Море."
      - "Если этот колизей с высокой долей вероятности является устройством поддержания реальности или, по крайней мере, ключевым объектом в этом секторе, то атака на него определённо имеет смысл!"
      - "Если нам удастся разнести это здание в щепки, возможно, нам и не придётся истреблять всех врагов до единого, чтобы выбраться отсюда!"
  - char: "alfredo_oriani"
    side: "left"
    text:
      - "Логично, агент Да Винчи! Флот, сосредоточить огонь на зарослях терновника и внешних стенах коилзея! Мы должны обрушить эту громадину!"
  - char: "leonardo_da_vinci"
    side: "right"
    text:
      - "И ещё кое-что. У меня появилось предположение, где на самом деле может находиться госпожа Рома. Нужно это проверить."
      - "Механик запрашивает разрешение покинуть борт!"
  - char: "alfredo_oriani"
    side: "left"
    text:
      - "А? Разрешаю, подтверждаю... Стоп! А как ты собралась спускаться?!"
  - char: "leonardo_da_vinci"
    side: "right"
    text:
      - "Хе-хе, ну конечно же на дельтаплане для экстренной эвакуации! Ещё увидимся~"
  - text:
      - "Да Винчи выхватила заранее приготовленный массивный планер и, лихо спрыгнув с борта, скрылась в густых сумерках ночного неба."


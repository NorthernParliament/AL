chapter1:
  rows:
  - char: "alfredo_oriani"
    side: "left"
    text:
      - "Этот выставочный зал выглядит точно так же, как и предыдущий... Никаких странностей."
      - "Я бы даже сказала, что здесь всё осталось ровно в том же виде, в каком мы это оставили..."
  - char: "emanuele_pessagno"
    side: "right"
    text:
      - "Да уж... Кто бы мог подумать, что госпожа Рома... исчезнет сразу после своего выступления."
  - char: "alfredo_oriani"
    side: "left"
    text:
      - "Хе-хе-хе... В тихих залах музея бушуют тайные течения. Какие же причудливые загадки и хитросплетения судеб скрываются за всем этим!"
      - "Моя репортёрская душа уже пылает!"
  - char: "emanuele_pessagno"
    side: "right"
    text:
      - "...Не слишком налегай на пафос. Ты же помнишь предостережение госпожи Венето?"
      - "Если мы будем привлекать слишком много внимания..."
  - char: "alfredo_oriani"
    side: "left"
    text:
      - "Тсс! Конечно, я помню! Мы должны решить проблему тайно, чтобы внешний мир ничего не заподозрил!"
      - "Да Винчи, на что ты там смотришь? Нашла что-нибудь подозрительное?"
  - char: "leonardo_da_vinci"
    side: "right"
    text:
      - "Нет, я просто рассматриваю экспонаты."
  - char: "emanuele_pessagno"
    side: "left"
    text:
      - "...Это ведь культурные ценности, привезённые всеми фракциями для выставки?"
  - char: "leonardo_da_vinci"
    side: "right"
    text:
      - "Верно. Вот только большинство из них — искусные реплики."
      - "Они могут обмануть почти кого угодно, но только не меня."
  - char: "alfredo_oriani"
    side: "left"
    text:
      - "А? Ну и жадины же они! Мы-то привезли настоящие сокровища!"
  - char: "leonardo_da_vinci"
    side: "right"
    text:
      - "На самом деле... наши экспонаты тоже в основном копии..."
      - "Перевозка древностей за море сама по себе сопряжена с огромным риском повреждения. А нестабильная обстановка и бесконечные атаки Сирен увеличивают этот риск до небес."
      - "Даже если это наши собственные реликвии, выставлять их напоказ нужно с предельной осторожностью."
      - "Хоть Сирены атакуют в Средиземном море не так часто, сейчас это уже перестало быть редкостью."
  - char: "alfredo_oriani"
    side: "left"
    text:
      - "Вот оно как... Оказывается, тут свои тонкости."
      - "Тогда те, кто осмелился прислать оригиналы, должно быть, очень круты?"
  - char: "leonardo_da_vinci"
    side: "right"
    text:
      - "Весьма... Особенно несколько экспонатов, присланных Империей Дракона."
      - "Не знаю, то ли они так уверены в себе, то ли их копии настолько идеальны, что даже я не смогла их раскусить..."
      - "Когда всё закончится, я обязательно вернусь сюда, чтобы изучить их как следует!"
  - char: "emanuele_pessagno"
    side: "left"
    text:
      - "Кто-то идёт. А ну быстро перестаньте строить из себя детективов и ведите себя естественно..."
  - char: "alfredo_oriani"
    side: "right"
    text:
      - "О, это же Хай Тянь и Хай Чи из Империи Дракона?"
      - "А вон та незнакомая старшая сестрица болтает с Илластриес из Королевского Флота!"
  - char: "emanuele_pessagno"
    side: "left"
    text:
      - "...И когда это ты успела подружиться с представителями Империи Дракона?"
  - char: "alfredo_oriani"
    side: "right"
    text:
      - "Пока ты ходила в павильон Северного Парламента~ Мы даже давали Хай Чи поиграть с «летающей машиной Да Винчи»!"
  - char: "emanuele_pessagno"
    side: "left"
    text:
      - "...Не давай гостям играть с опасными штуками!"
  - char: "leonardo_da_vinci"
    side: "right"
    text:
      - "Вовсе они не опасные! Сделано Да Винчи — знак качества гарантирован!"
  - char: "alfredo_oriani"
    side: "left"
    text:
      - "Не думала, что мы так скоро встретимся снова. Пойдёмте поздороваемся!"
  - char: "emanuele_pessagno"
    side: "right"
    text:
      - "Погоди... Прерывать чужой разговор невежливо, да и у нас сейчас не самая подходящая ситуация для праздных прогулок."
      - "Раз уж здесь всё осмотрено... пора двигаться в следующую зону. Госпожа Рома всё ещё ждёт нашей помощи."

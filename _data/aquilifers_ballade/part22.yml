chapter1:
  rows:
  - char: "shimakaze"
    side: "left"
    text:
      - "Как здорово, госпожа Суруга! Наконец-то мы можем свободно погулять!"
      - "Уф~ Какая благодать~"
      - "Госпожа Синано такая добрая. Сказала, что здесь безопасно, и дала нам целых полдня, чтобы всё осмотреть!"
  - char: "suruga"
    side: "right"
    text:
      - "Ты слишком расслабилась, Симакадзэ!"
      - "Пусть мы и отдыхаем, но мы также должны собирать информацию вместо госпожи Синано, которая не может свободно перемещаться."
      - "Нельзя игнорировать интуицию госпожи Синано. В выставочном комплексе наверняка таятся скрытые опасности."
      - "Нам нужно составить четкий план, действовать осторожно и методично обойти все павильоны один за другим."
  - char: "shimakaze"
    side: "left"
    text:
      - "Как и ожидалось от госпожи Суруги — всё продумано до мелочей! А я, стоило мне выйти наружу, как сразу потеряла голову..."
      - "Я мигом разведаю обстановку в округе!"
  - char: "suruga"
    side: "right"
    text:
      - "Погоди..! Я же только что сказала — сначала план..."
  - char: "shimakaze"
    side: "left"
    text:
      - "Ой, госпожа Суруга! Вон та девушка впереди выглядит очень растерянной!"
      - "Кажется, она заблудилась, давайте поможем ей!"
  - char: "suruga"
    side: "right"
    text:
      - "(Судя по одежде, она из Железной Крови..?)"
      - "(Плохо дело, эта особа крайне не к добру! От её мрачного настроя так и веет чёрной аурой, того и гляди полыхнёт!)"
      - "(Только бы не впутаться, только бы не впутаться...)"
      - "Кхм... Симакадзэ, хоть она и кажется заблудившейся, мы и сами-то не слишком хорошо знаем план выставки."
      - "Желание помочь — это хорошо, но одним энтузиазмом тут делу не поможешь."
  - char: "shimakaze"
    side: "left"
    text:
      - "И... и то верно..."
  - char: "suruga"
    side: "right"
    text:
      - "Так что давай сначала осмотримся в других местах, а когда лучше изучим территорию — вернёмся и поможем..."
  - text:
      - "Суруга понизила голос и, вцепившись в край одежды Симакадзэ, подала ей знак развернуться и уйти."
  - char: "nop"
    side: "left"
    text:
      - "Эй, вы двое, а ну стоять!"
  - char: "suruga"
    side: "right"
    text:
      - "(Нас заметили! Пропали, пропали, пропали, пропали...)"
  - char: "shimakaze"
    side: "left"
    text:
      - "Госпожа Суруга? Госпожа Суруга?!"
  - text:
      - "Суруга окончательно «окаменела»."
  - char: "nop"
    side: "left"
    text:
      - "Я вас спрашиваю: вы ведь из Империи Сардиния, так?"
  - char: "suruga"
    side: "right"
    text:
      - "(...А? Сардиния?)"
  - text:
      - "Придя в себя, Суруга обернулась на голос."
  - char: "bolzano"
    side: "left"
    text:
      - "Верно. Я Больцано, представляю Империю Сардиния, а это моя спутница, Гарибальди. Позвольте узнать, юная леди, вы из Железной Крови?.."
  - char: "prinz_rupprecht"
    side: "right"
    text:
      - "Принц Рупрехт. Запомните это имя — имя той, чья слава вскоре затмит всех."
      - "Отвечайте: в выставочном комплексе что-то стряслось?"
  - char: "bolzano"
    side: "left"
    text:
      - "...Как видите, Всемирная выставка идёт своим чередом. В залах шумно и весело, никаких происшествий не зафиксировано."
  - char: "prinz_rupprecht"
    side: "right"
    text:
      - "О-о? «Ничего не стряслось»? Тогда куда это вы так спешите?"
  - char: "bolzano"
    side: "left"
    text:
      - "Спешим?.. Как вы можете заметить, мы, как принимающая сторона, совершаем плановый обход территории."
  - char: "giuseppe_garibaldi"
    side: "right"
    text:
      - "Малышка, ты случаем не заблудилась? Если так, мы можем проводить тебя до павильона Железной Крови~"
  - char: "prinz_rupprecht"
    side: "left"
    text:
      - "Ха?! Кого это ты назвала «малышкой»?!"
      - "Хм! Только из уважения к твоему благородному происхождению я не стану опускаться до твоего уровня."
      - "Не хотите говорить правду — не надо. Я сама всё выясню. Честь имею!"
  - char: "giuseppe_garibaldi"
    side: "right"
    text:
      - "Ох... ушла, даже не дослушав."
  - char: "bolzano"
    side: "left"
    text:
      - "Дело дрянь... Сначала Империя Сакуры, теперь даже Железная Кровь заметила странности на выставке."
      - "Каждая фракция прислала на это мероприятие немало разведчиков. Боюсь, долго скрывать правду нам не удастся."
  - char: "giuseppe_garibaldi"
    side: "right"
    text:
      - "Похоже на то... Как бы то ни было, мы должны разрешить этот инцидент как можно быстрее!"
      - "Одной группе Да Винчи может быть тяжеловато обыскивать целый павильон, так что нам тоже пора поспешить на помощь~"

chapter2:
  rows:
  - char: "shimakaze"
    side: "left"
    text:
      - "Госпожа Суруга? Вам уже лучше?"
  - char: "suruga"
    side: "right"
    text:
      - "Да, я в порядке..."
  - char: "shimakaze"
    side: "left"
    text:
      - "Слава богу! Вы стояли не шелохнувшись, я прямо не знала, что и делать!"
  - char: "suruga"
    side: "right"
    text:
      - "Куда ушли те двое из Империи Сардиния?"
  - char: "shimakaze"
    side: "left"
    text:
      - "М-м... Они направились туда, откуда мы только что пришли."
  - char: "suruga"
    side: "right"
    text:
      - "(В ту сторону... к павильону культуры? Значит, что-то случилось именно там?!)"
  - char: "shimakaze"
    side: "left"
    text:
      - "Госпожа Суруга, куда мы теперь? Вы говорили, что хотите осмотреться в другом месте..."
  - char: "suruga"
    side: "right"
    text:
      - "(Если учитывать наше положение и расположение павильона культуры...)"
      - "Решено: сначала отправимся к «Космической игле» Союза Орла~"
      - "(Куда угодно, лишь бы подальше от этого павильона!)"


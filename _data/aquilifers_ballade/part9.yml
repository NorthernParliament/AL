chapter1:
  rows:
  - char: "roma"
    side: "left"
    text:
      - "«Я ступаю по семи холмам»."
      - "«Толпа обратилась ко мне с призывом»."
      - "«Сразимся ли мы вместе? Вступим ли в этот бой ради возрождения?»"
      - "«Я ответила согласием»."
      - "«Я иду плечом к плечу с Ромулом»."
      - "«Враги слетаются тучами»."
      - "«Но есть ли тот, кто сможет нас остановить?»"

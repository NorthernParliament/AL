chapter1:
  rows:
  - text:
      - "БАБАХ!!!"
  - char: "bolzano"
    side: "left"
    text:
      - "Госпожа Гарибальди, вы не ранены?!"
  - char: "giuseppe_garibaldi"
    side: "right"
    text:
      - "Всё в порядке, просто царапина... Ты тоже будь осторожнее!"
      - "Кто бы мог подумать, что мы так внезапно ввяжемся в тяжелый бой..."
      - "Ладно ещё эти призрачные птицы, у которых нет дальнобойных атак, но откуда на море взялись все эти призрачные корабли?!"
  - char: "bolzano"
    side: "left"
    text:
      - "Прошу прощения... Вид спокойного моря усыпил мою бдительность, и я позволила себе расслабиться."
  - char: "giuseppe_garibaldi"
    side: "right"
    text:
      - "А? Тебе не за что извиняться! Всё, что сейчас происходит — результат моей собственной безрассудности."
      - "Ничего страшного. Не можем победить — значит, бежим! Приготовиться к отступлению!"
  - char: "bolzano"
    side: "left"
    text:
      - "Боюсь, это невозможно... Вход, через который мы пришли, исчез. Пути назад нет."
  - char: "giuseppe_garibaldi"
    side: "right"
    text:
      - "Э?! Тогда осмотрись, должно же быть хоть какое-то место, где можно укрыться. Нам нужно выбраться из этой ловушки!"
  - char: "bolzano"
    side: "left"
    text:
      - "...Выхода нет. Госпожа Гарибальди, что бы дальше ни случилось — не останавливайтесь. Я проложу нам путь, и мы прорвемся."
  - char: "bolzano"
    side: "right"
    text:
      - "О чём ты говоришь? В такой ситуации это я должна тебя защищать! Выбирай направление, а я выведу нас отсюда~"
  - text:
      - "БАБАХ!!!"

chapter2:
  rows:
  - char: "giuseppe_garibaldi"
    side: "left"
    text:
      - "...Этот залп... удар с воздуха?"
  - text:
      - "Гарибальди и Больцано подняли головы, глядя в ту сторону, откуда прилетели снаряды."
      - "Под покровом ночи из густых зелёных облаков медленно выплывала огромная флотилия, состоящая из летающих боевых кораблей."
      - "Залпы бесчисленных орудий — на вид примитивных, но обладающих сокрушительной мощью — обрушились на каждого врага в поле зрения."
  - char: "bolzano"
    side: "left"
    text:
      - "Что это... вообще такое?"
  - char: "giuseppe_garibaldi"
    side: "right"
    text:
      - "Раз они не бьют по нам, значит, это подкрепление!"
  - char: "bolzano"
    side: "left"
    text:
      - "...Но у нас нет таких странных летучих отрядов... Откуда они могли взяться?"
  - char: "giuseppe_garibaldi"
    side: "right"
    text:
      - "Да какая разница! О сложностях подумаем, когда перебьем всех врагов. Вперед, поддержим их огнем!"


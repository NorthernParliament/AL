chapter1:
  rows:
  - char: "roma_ghost"
    side: "left"
    status: "is-yellow"
    text:
      - "«Наконец-то всё подошло к концу»."
      - "«Я бреду по миру людей, более не оставляя следов»."
      - "«Я узрела оковы, именуемые спасением»."
      - "«Узрела тьму, именуемую светом»."
      - "«Узрела упадок, именуемый возрождением»."
      - "«— Коль так...»"
      - "«...то я принесу гибель»."
      - "«Бытие рождается из небытия»."
      - "«И я сама сотворю новый мир, новую Империю —»"

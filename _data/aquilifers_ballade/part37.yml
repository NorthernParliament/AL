chapter1:
  rows:
  - char: "conte_di_cavour"
    side: "left"
    text:
      - "Прошла уже неделя с начала выставки, а Марко Поло всё это время смиренно сидит здесь в одиночестве..."
      - "Сама же предложила организовать это мероприятие, а теперь даже не соизволит взглянуть, что происходит на площадках."
      - "Это крайне подозрительно..."
  - text:
      - "Погруженная в свои размышления, Кавур толкнула дверь и вошла в кабинет Марко Поло."
  - char: "conte_di_cavour"
    side: "left"
    text:
      - "Никого... Странно."
      - "Обычно в это время она с самодовольным видом восседает в кресле и что-то увлеченно читает."
  - text:
      - "Кавур заглянула еще в несколько комнат, но Марко Поло нигде не было."
  - char: "conte_di_cavour"
    side: "left"
    text:
      - "Неужели ей только сегодня взбрело в голову отправиться на выставку... И ведь никого не предупредила. Какая же она своенравная особа..."
      - "Ладно, в конце концов, это не моё дело."
      - "Моя задача — оставить отчет на столе и уйти. Просто и легко~"
  - text:
      - "Кавур положила запечатанный конверт на привычное рабочее место Марко Поло и направилась к выходу из собора."
      - "Проходя мимо капеллы, Кавур краем глаза заметила фигуру девушки, сидящей на стуле в дальнем углу."
  - char: "trento_meta_???"
    side: "left"
    status: "is-meta"
    text:
      - "…да святится имя Твое…"
      - "…да приидет Царствие Твое…"
      - "…да будет воля Твоя и на земле, как на небе…"
  - char: "conte_di_cavour"
    side: "right"
    text:
      - "…В такой час всё ещё молится в церкви? Какое благочестие."
      - "Но эта девушка... от неё исходит какое-то..."
      - "Или мне просто кажется?.."
chapter1:
  rows:
  - char: "alfredo_oriani"
    side: "left"
    text:
      - "...Да Винчи — механик, Пессаньо — дозорная, значит, место командующего флотом по праву моё?!"
      - "Хе-хе-хе — вот оно какое, чувство власти над целым флотом..."
      - "Обзор отличный, настрой боевой, быть командиром — одно удовольствие!"
      - "Да Винчи, ты просто гений! Как тебе удалось так внезапно сотворить целую воздушную флотилию?!"
  - char: "leonardo_da_vinci"
    side: "right"
    text:
      - "Стоило только понять принципы работы этого места, и подобное стало парой пустяков~"
      - "Раз враги решили задавить нас числом, мы ответим им их же монетой!"
      - "М-м... отлично, настройка завершена. Теперь для базового управления всей флотилией достаточно отдавать команды с флагмана!"
      - "Сложные тактики нам пока не по зубам, но разнести в щепки любого врага в поле зрения — это запросто~"
  - char: "emanuele_pessagno"
    side: "left"
    text:
      - "Эти корабли выглядят как-то слишком... старомодно. И... эти воздушные мешки не кажутся мне надёжными."
      - "Я всё же считаю, что на воде сражаться куда сподручнее."
  - char: "leonardo_da_vinci"
    side: "right"
    text:
      - "Спокойно, спокойно! Эти летающие корабли я создала, воспользовавшись «дырами» в системе этого Зеркального Моря и его же мощностями."
      - "Пусть они и выглядят как хрупкие деревянные конструкции, по прочности они ничем не уступают серийным моделям!"
  - char: "emanuele_pessagno"
    side: "left"
    text:
      - "«Не уступают серийным»... От таких слов спокойнее не становится!"
      - "Если мы попадём под сосредоточенный огонь..."
  - char: "leonardo_da_vinci"
    side: "right"
    text:
      - "Хе-хе, я это заранее предусмотрела!"
      - "На летающих линкорах уже готовы средства экстренной эвакуации. Если нас вдруг собьют, они автоматически спустят нас вниз, так что не переживай!"
  - char: "emanuele_pessagno"
    side: "left"
    text:
      - "...Хорошо."
  - text:
      - "Так флотилия летающих кораблей начала движение к громадному, приметному издалека колизею."
      - "Пессаньо внимательно следила за небом и водной гладью, пока Да Винчи была занята бесконечными техническими настройками."
      - "Альфредо же носилась по палубе, вовсю фотографируя «свой собственный» огромный флот."
  - char: "alfredo_oriani"
    side: "left"
    text:
      - "Щёлк! Щёлк! — Величественный флот Альфредо запечатлён для истории!"
      - "Хе-хе, если эти снимки попадут в газеты... это будет сенсация, просто невероятная сенсация!"
  - char: "emanuele_pessagno"
    side: "right"
    text:
      - "...Послушай, не мешай мне работать."
  - char: "alfredo_oriani"
    side: "left"
    text:
      - "Я вообще-то капитан! А капитан на своём корабле волен делать всё, что захочет!"
  - char: "emanuele_pessagno"
    side: "right"
    text:
      - "...В таком случае, капитан Альфредо, у меня важное донесение."
  - text:
      - "Пессаньо рукой закрыла объектив камеры Альфредо, а другой указала вдаль."
  - char: "emanuele_pessagno"
    side: "right"
    text:
      - "В том секторе обнаружены признаки боя."
      - "Пока неясно, кто именно сражается, но, возможно, это союзники, которых прислала госпожа Венето нам на помощь."
  - char: "alfredo_oriani"
    side: "left"
    text:
      - "Так дело не пойдёт! Да Винчи, смени курс флота, нам нужно срочно идти на выручку!"
  - char: "leonardo_da_vinci"
    side: "right"
    text:
      - "Принято, предоставь это мне~"
  - char: "alfredo_oriani"
    side: "left"
    text:
      - "Флот Альфредо — в атаку!"

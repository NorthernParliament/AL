chapter1:
  rows:
  - text:
      - "При огневой поддержке летающих линкоров группа благополучно продвигалась к Колизею."
  - char: "bolzano"
    side: "left"
    text:
      - "Как странно... В такой близости от колизея врагов совсем не осталось."
  - char: "giuseppe_garibaldi"
    side: "right"
    text:
      - "Над самим зданием кружат орлы, но они не бросаются на нас, как те, что были раньше."
      - "По логике вещей, чем ближе к важному объекту, тем плотнее должна быть оборона..."
  - char: "bolzano"
    side: "left"
    text:
      - "Да, ситуация крайне аномальная. Это похоже на... ловушку."
  - char: "giuseppe_garibaldi"
    side: "right"
    text:
      - "Эх, даже если это ловушка, выбора у нас особо нет. Придется идти напролом!"

chapter2:
  rows:
  - char: "roma_ghost"
    side: "left"
    status: "is-yellow"
    text:
      - "......"
  - char: "giuseppe_garibaldi"
    side: "right"
    text:
      - "Госпожа Рома?! Слава богу, вы целы! Мы пришли, чтобы забрать вас домой!"
  - char: "roma_ghost"
    side: "left"
    status: "is-yellow"
    text:
      - "......"
  - char: "giuseppe_garibaldi"
    side: "right"
    text:
      - "……Госпожа Рома?"
  - char: "bolzano"
    side: "left"
    text:
      - "Госпожа Гарибальди, назад!.. Что бы это ни было, оно совсем не похоже на госпожу Рому!"
  - char: "giuseppe_garibaldi"
    side: "right"
    text:
      - "А? Правда?! А мне кажется, что это именно она!"
  - char: "emanuele_pessagno_rad"
    side: "left"
    text:
      - "Это, должно быть, «Пешка», созданная Сиренами... Она выглядит как полупрозрачный зелёный призрак."
  - char: "alfredo_oriani_rad"
    side: "right"
    text:
      - "Согласна! Очевидно, её создали те же Сирены, что и те призрачные корабли со странными птицами!"
  - char: "leonardo_da_vinci_rad"
    side: "left"
    text:
      - "Хм-м………"
  - char: "alfredo_oriani_rad"
    side: "right"
    text:
      - "……Что такое, Да Винчи? Почему у тебя такое серьёзное лицо?"
  - char: "leonardo_da_vinci_rad"
    side: "left"
    text:
      - "Не могу точно описать... Но та, что стоит перед нами... она совсем не ощущается как «Пешка Сирен»."
  - char: "emanuele_pessagno_rad"
    side: "right"
    text:
      - "Не ощущается как Пешка?.. Это как это?"
  - char: "leonardo_da_vinci_rad"
    side: "left"
    text:
      - "Говорю же, не могу объяснить словами..!"
  - char: "roma_ghost"
    side: "right"
    status: "is-yellow"
    text:
      - "......"

chapter3:
  rows:
  - text:
      - "Словно устав от затянувшегося противостояния, «Рома» вдруг развернулась, намереваясь уйти."
  - char: "giuseppe_garibaldi"
    side: "left"
    text:
      - "Подождите... госпожа Рома!"
  - text:
      - "В порыве волнения Гарибальди забыла о том, что находится в самом центре поля боя. Она рванулась вперёд, пытаясь помешать «Роме» уйти."
      - "В ответ на это орлы, застилавшие небо, приняли боевой порядок, а у стен Колизея начал стремительно стягиваться призрачный флот."
  - char: "alfredo_oriani"
    side: "left"
    text:
      - "Флот Альфредо, приготовиться к бою!"
  - char: "roma_ghost"
    side: "right"
    status: "is-yellow"
    text:
      - "......"
  - char: "bolzano"
    side: "left"
    text:
      - "Госпожа Гарибальди?!"
  - char: "giuseppe_garibaldi"
    side: "right"
    text:
      - "Можешь ничего не говорить, я сама знаю. Считай это просто моим наваждением..."
      - "Всю мелкую сошку в небе и на воде оставим группе Альфредо. Больцано, в атаку вместе со мной!"
      - "Остаётся только надеяться, что эта странная Пешка не унаследовала истинную мощь настоящей госпожи Ромы..."
  - char: "bolzano"
    side: "left"
    text:
      - "Что ж... удачи нам. Вперёд!"


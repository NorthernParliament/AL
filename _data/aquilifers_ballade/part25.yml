chapter1:
  rows:
  - text:
      - "Спустя неизвестно сколько времени бесконечный коридор, казалось, наконец подошёл к концу."
  - char: "giuseppe_garibaldi"
    side: "left"
    text:
      - "Вот это да... Такую странную картину даже во сне не увидишь!"
      - "Больцано, что ты об этом думаешь?"
  - char: "bolzano"
    side: "right"
    text:
      - "...Судя по тому, что предстало перед глазами, это, вне всяких сомнений, Зеркальное Море."
  - char: "giuseppe_garibaldi"
    side: "left"
    text:
      - "Верно! Но я не о классификации спрашиваю, а о твоих впечатлениях от увиденного~"
  - char: "bolzano"
    side: "right"
    text:
      - "...Впечатления? Я чувствую пустоту, уныние, упадок и некое чувство отторжения..."
  - char: "giuseppe_garibaldi"
    side: "left"
    text:
      - "А ещё горечь и печаль, верно? У меня те же ощущения!"
      - "Честно говоря, мне кажется, что это место создано вовсе не Сиренами."
  - char: "bolzano"
    side: "right"
    text:
      - "Для такого вывода нам всё ещё не хватает веских доказательств..."
  - char: "giuseppe_garibaldi"
    side: "left"
    text:
      - "Ай~ Не будь такой серьезной, я просто делюсь своими безответственными догадками~"
      - "Вперёд, только вперёд~ Дайте-ка взглянуть, где же этот зелёный орёл!"
  - char: "bolzano"
    side: "right"
    text:
      - "...Госпожа Гарибальди, цель нашего похода — воссоединиться с Да Винчи и остальными, а затем вместе отыскать пропавшую госпожу Рому."
  - char: "giuseppe_garibaldi"
    side: "left"
    text:
      - "А, смотри скорее на полярное сияние в небе! Те полосы... они ведь целиком состоят из зелёных орлов?"
  - char: "bolzano"
    side: "right"
    text:
      - "...Действительно величественное зрелище. И всё же от них исходит аура опасности."
  - char: "giuseppe_garibaldi"
    side: "left"
    text:
      - "Они похожи на светящийся изумруд. Так и хочется поймать одного и забрать домой в качестве питомца..."
      - "Э-ге-гей! Орлы, орлики! А ну, посмотрите сюда!"
  - text:
      - "Внезапно Гарибальди в восторге замахала руками, выкрикивая приветствия световым лентам в небе, сотканным из зелёных орлов."
      - "Световые полосы тут же отозвались на «зов» Гарибальди."
      - "Бесчисленные искры отделились от общего потока и на огромной скорости устремились вниз, к паре девушек."
  - char: "bolzano"
    side: "left"
    text:
      - "Глупая..."
      - "...Госпожа Гарибальди, живо настраивай угол ПВО! Приготовиться к воздушному бою!"
  - char: "giuseppe_garibaldi"
    side: "right"
    text:
      - "Э..........?! Ой?! П-приготовиться к бою!"

chapter1:
  rows:
  - char: "roma"
    side: "left"
    text:
      - "«Империя уже угасает, и я вместе с ней»."
      - "«Я больше не плачу, ибо слёзы мои иссякли»."
      - "«Я больше не говорю, ибо голос мой окончательно охрип»."
      - "«Однако среди руин некий голос вновь воззвал к моему имени»."
      - "«Тот голос был столь слаб, что я едва могла его различить»."
      - "«Он вещал о своих идеалах и убеждениях»."
      - "«Словно огонек свечи во тьме, он принёс крупицу тепла в бесконечную зиму»."
      - "«Твоя молитва была услышана Римом»."
      - "«Расти же скорее, стань бушующим пламенем и принеси Империи возрождение —»"

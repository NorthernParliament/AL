chapter1:
  rows:
  - char: "roma"
    side: "left"
    text:
      - "Все королевские артефакты, не вошедшие в сегодняшнюю экспозицию, хранятся здесь."
      - "Посмотрим... Источник этой странной ауры..."
      - "Он в этом ящике?!"
  - text:
      - "Рома резким движением сорвала пылезащитную ткань с одного из контейнеров, обнажая скрытый за стеклом экспонат."
  - char: "roma"
    side: "left"
    text:
      - "Это... фрагмент плитки из Александрийской библиотеки?"
      - "Помню, его нашли совсем недавно во время раскопок в Александрии, а затем отправили в Королевский музей..."
      - "То, что они так спешили выставить эту реплику, — это попытка похвастаться победой над Римом или же проявление презрения к нему?.."
      - "В любом случае, это неприятно."
  - text:
      - "Рома достала копию плитки из витрины и принялась внимательно изучать её, держа в руках."
  - char: "roma"
    side: "left"
    text:
      - "С этой плиткой и впрямь что-то не так..."
      - "Внешне имитация безупречна, но вот внутренняя структура..."
  - text:
      - "По какой-то причине на мгновение у Ромы возникло иллюзорное ощущение, будто она держит в руках плод неких сверхтехнологичных разработок."
  - char: "roma"
    side: "left"
    text:
      - "Странно... Я проверяла эту плитку несколько дней назад, когда её доставили вместе с остальными королевскими экспонатами. Тогда подобного чувства не возникало."
      - "Неужели кто-то подменил её уже после того, как артефакт привезли сюда?"
      - "Но это и изначально была копия. Какой смысл менять одну реплику на другую?.."
  - text:
      - "Погрузившись в раздумья, Рома закрыла глаза, машинально поглаживая пальцами поверхность странного камня."
      - "Перед её внутренним взором внезапно вспыхнул свет Александрийского маяка, закружились летящие по залам библиотеки папирусы, поднялась пыль из-под копыт скакунов и проступила водная дымка над акведуками."
  - char: "roma"
    side: "left"
    text:
      - "Свет... Пыль и водная дымка...?!"
  - text:
      - "Рома распахнула глаза."
  - char: "roma"
    side: "left"
    text:
      - "Где я... где я сейчас нахожусь?!"

chapter1:
  rows:
  - text:
      - "По мере погружения грохот канонады с поверхности становился всё более глухим и далёким."
  - char: "leonardo_da_vinci"
    side: "left"
    text:
      - "Глубоковато же ты запрятано..."
      - "Обычно любой, кто сюда попадёт, первым же делом обратит внимание на тот гигантский колизей на воде."
      - "Даже если кто-то и заметит странности с терновником, то, скорее всего, просто разрушит его и уйдёт. Никому и в голову не придёт проверять, что там, под водой..."
      - "...Но меня-то не проведёшь."
  - text:
      - "Спустя неизвестно сколько времени, проведённого в спуске, в поле зрения Да Винчи попала колоссальная установка."
  - char: "leonardo_da_vinci"
    side: "left"
    text:
      - "Так я и думала... Всё самое важное действительно спрятано здесь."
      - "Судя по всему... функции этой махины — извлечение информации и создание врагов..."
      - "Похоже, настоящая госпожа Рома заперта именно тут."
      - "Из-за того, что машина считывает её данные в реальном времени, тот призрачный фантом на поверхности и получился настолько пугающе точным..."
      - "Судя по конструкции... место, где держат госпожу Рому, должно быть ещё чуть ниже..."
  - text:
      - "Да Винчи скользила вниз вдоль передающих кабелей, пока наконец не обнаружила прозрачную камеру в форме стеклянного кокона, испускающую тусклое свечение в бездне."
  - char: "leonardo_da_vinci"
    side: "left"
    text:
      - "...Цель обнаружена! Госпожа Рома здесь!"
      - "М-м... Если я хочу вызволить её отсюда..."
      - "Придётся частично отстегнуть оснастку, и ещё... так, инструментов под рукой должно хватить!"
      - "Госпожа Рома, подождите ещё немного, я иду на помощь!"

chapter2:
  rows:
  - char: "leonardo_da_vinci"
    side: "left"
    text:
      - "Фух~ Спасательная операция завершена. Госпожа Рома в безопасности, в спасательной капсуле."
      - "Не знаю наверняка, что из них является настоящим узлом управления — эта машина или колизей наверху, — но если я взорву здесь всё к чертям, ошибки точно не будет."
      - "Посмотрим, сколько мне понадобится взрывчатки и куда её лучше заложить..."
  - text:
      - "БАБАХ!!!"
      - "Едва Да Винчи начала прикидывать, как сподручнее подорвать эту колоссальную установку, из ещё более глубоких слоев воды поднялась мощная турбулентная волна."
  - char: "leonardo_da_vinci"
    side: "left"
    text:
      - "Что-о-о?!"
      - "Этот удар и грохот... они только что донеслись снизу?!"
      - "Неужели там, в самой бездне, припрятано что-то ещё?!"
  - text:
      - "БАБАХ!!!"
      - "Очередная волна ударов и грохота сотрясла пространство, но на этот раз атака пришла со стороны поверхности."
      - "Похоже, колизей наконец не выдержал и окончательно развалился под сокрушительным огнём флота Альфредо."
  - char: "leonardo_da_vinci"
    side: "left"
    text:
      - "Нехорошо, нехорошо, совсем нехорошо… Нас зажало в тиски! Под водой всё превратилось в полнейший хаос!"
      - "…План меняется, пора отступать! Безопасность госпожи Ромы — главный приоритет!"
  - text:
      - "В бушующих потоках Да Винчи, отчаянно пытаясь удержать равновесие, устремилась к поверхности."
      - "В это же время сложные механические конструкции вокруг неё начали распадаться на части прямо на глазах."
  - char: "leonardo_da_vinci"
    side: "left"
    text:
      - "А впрочем, так даже проще… Госпожа Рома, потерпите ещё немного, мы почти дома!"

chapter3:
  rows:
  - text:
      - "С гибелью Колизея на воде и разрушением гигантской установки под ней, все призрачные корабли и орлы мгновенно исчезли, не оставив и следа."
      - "Битва завершилась ещё до того, как Да Винчи и Рома окончательно показались на поверхности."
  - char: "bolzano"
    side: "left"
    text:
      - "Судя по всему, полное исчезновение Зеркального Моря — лишь вопрос времени…"
      - "Госпожа Рома, как вы себя чувствуете?"
  - char: "roma"
    side: "right"
    text:
      - "Я… это…"
      - "Кажется, я видела бесконечно долгий сон…"
  - char: "giuseppe_garibaldi"
    side: "left"
    text:
      - "Какое счастье, что вы в порядке! Но, госпожа Рома, что это у вас в руке?.."
  - text:
      - "Под озадаченными взглядами соратниц Рома подняла правую руку, рассматривая предмет, похожий на кусок напольной плитки, который она крепко сжимала в ладони."
      - "Весь артефакт был испещрён сетью трещин, которые по мере распада Зеркального Моря расползались всё быстрее и быстрее."
  - char: "roma"
    side: "left"
    text:
      - "Это… Похоже на подделку плитки из Александрийской библиотеки, которой Сирены подменили оригинал…"
      - "Значит, она действительно была как-то связана с этой аномалией…"
  - char: "alfredo_oriani"
    side: "right"
    text:
      - "Хо-хо-хо! Флот Альфредо совершил мягкую посадку! Госпожа Рома, вы целы?!"
  - char: "roma"
    side: "left"
    text:
      - "Что это за странные штуковины ты с собой привела?.."
  - char: "alfredo_oriani"
    side: "right"
    text:
      - "Это летающие линкоры, созданные Да Винчи! Они просто невероятные!"
      - "Пока вас не было, мы устроили в небе настоящую заварушку с призрачными птицами, сражались не на жизнь, а на смерть!"
  - char: "roma"
    side: "left"
    text:
      - "…Звучит как поистине захватывающая история."
  - char: "alfredo_oriani"
    side: "right"
    text:
      - "Ой? Да Винчи, ты чего это разлеглась прямо на земле?"
  - char: "leonardo_da_vinci"
    side: "left"
    text:
      - "Да потому что… я… выжата как лимон…!"
  - char: "alfredo_oriani"
    side: "right"
    text:
      - "Э-эй — сейчас не время для отдыха!"
  - text:
      - "Альфредо установила камеру, выставила таймер и вприпрыжку подбежала к Да Винчи, силой поднимая её на ноги."
  - char: "alfredo_oriani"
    side: "right"
    text:
      - "После завершения миссии члены отряда просто обязаны сделать победное фото!"
      - "Осталось три секунды! Да Винчи, Пессаньо, быстро изобразите что-нибудь!"
  - char: "emanuele_pessagno"
    side: "left"
    text:
      - "А… ?"
  - char: "leonardo_da_vinci"
    side: "right"
    text:
      - "Эх… ну что с тобой поделаешь!"
  - text:
      - "Пессаньо в замешательстве оглянулась, а Да Винчи резко вскочила, обхватила Альфредо за шею и свободной рукой показала знак «V»."
      - "Щёлк!"
  - char: "alfredo_oriani"
    side: "left"
    text:
      - "Хе-хе-хе, отряд Альфредо, задача выполнена на отлично! Пора домой!"


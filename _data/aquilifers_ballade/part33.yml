chapter1:
  rows:
  - char: "alfredo_oriani"
    side: "left"
    text:
      - "Ва-а~ Всё-таки, сколько ни смотри, это зрелище каждый раз поражает воображение!"
      - "Так... Сделаю-ка ещё парочку снимков!"
  - text:
      - "Как только Альфредо приготовилась нажать на спуск, в объективе внезапно возник изящный белый силуэт."
  - char: "janus"
    side: "left"
    text:
      - "П-простите! Я помешала вам фотографировать!"
  - char: "leonardo_da_vinci"
    side: "right"
    text:
      - "Ты ведь... Та самая Джанус, эсминец Королевского флота, что вчера заблудилась?!"
  - char: "janus"
    side: "left"
    text:
      - "Да, это я!"
  - char: "leonardo_da_vinci"
    side: "right"
    text:
      - "...Неужели ты сегодня снова потерялась?"
  - char: "janus"
    side: "left"
    text:
      - "Н-нет, что вы! Я просто увидела вас издалека... и решила подойти, чтобы поблагодарить."
      - "Вчера я так торопилась, что не успела выразить свою благодарность как следует..."
  - char: "alfredo_oriani"
    side: "right"
    text:
      - "Э-эй~ Ты слишком официальна! Поддержание порядка на выставке — это наша прямая обязанность, да и вчерашнее дело было сущим пустяком."
  - char: "janus"
    side: "left"
    text:
      - "В любом случае, огромное вам спасибо за помощь! Не буду больше отвлекать! До... до свидания!"
  - char: "alfredo_oriani"
    side: "right"
    text:
      - "Угу~ Увидимся! Наслаждайся выставкой!"

chapter2:
  rows:
  - char: "alfredo_oriani"
    side: "left"
    text:
      - "Госпожа Рома, мы пришли навестить вас~!"
  - char: "emanuele_pessagno"
    side: "right"
    text:
      - "Тсс, потише... Госпоже Роме сейчас нужен покой."
  - char: "alfredo_oriani"
    side: "left"
    text:
      - "Ой... Простите, виновата."
  - char: "roma"
    side: "right"
    text:
      - "...Не стоит так беспокоиться. Если не считать лёгкого упадка сил, я уже в полном порядке."
      - "Спасибо вам за вчерашнюю спасательную операцию."
      - "Особенно тебе, Да Винчи. Ведь это ты лично вытащила меня из-под воды. Благодарю."
  - char: "leonardo_da_vinci"
    side: "left"
    text:
      - "Э-э... хе-хе... Я просто сделала то, что должна была."
  - char: "roma"
    side: "right"
    text:
      - "Излишняя скромность — не добродетель. Принимай похвалу прямо и с достоинством."
  - char: "leonardo_da_vinci"
    side: "left"
    text:
      - "Есть! Спасибо большое за похвалу, госпожа Рома~ Я и впредь буду стараться изо всех сил!"
  - char: "roma"
    side: "right"
    text:
      - "Хорошо."
  - char: "alfredo_oriani"
    side: "left"
    text:
      - "Раз с госпожой Ромой всё в порядке, мы можем быть абсолютно спокойны."
      - "Отдыхайте, а мы пока вернёмся на выставку и продолжим..."
  - char: "leonardo_da_vinci"
    side: "right"
    text:
      - "Погоди секунду, Альфредо!"
      - "...Госпожа Рома, простите мою дерзость, но у меня есть несколько вопросов, которые я очень хотела бы вам задать."
  - char: "roma"
    side: "left"
    text:
      - "Не препятствую. Ты помогла мне в критический момент, поэтому в пределах возможного я отвечу на твои вопросы со всей искренностью."
  - char: "leonardo_da_vinci"
    side: "right"
    text:
      - "Огромное спасибо! Госпожа Рома, по поводу вчерашнего... вы действительно совсем ничего не помните?"
  - char: "roma"
    side: "left"
    text:
      - "...Да. Это было похоже на очень долгий, тяжёлый и глубокий сон. Возможно, во сне случалось многое, но после пробуждения всё это рассеялось, будто дым."
  - char: "leonardo_da_vinci"
    side: "right"
    text:
      - "Призрачные орлы, призрачные корабли и всё в таком духе — ничего подобного не являлось вам в этом сне?"
  - char: "roma"
    side: "left"
    text:
      - "Возможно, и являлось... я не могу утверждать наверняка."
      - "Хотя я и не помню содержания снов, после того как вы произнесли эти названия, в моём сознании возникли какие-то смутные образы."
  - char: "leonardo_da_vinci"
    side: "right"
    text:
      - "Вот оно что... А здесь, на территории Всемирной выставки, вы чувствуете сегодня какую-нибудь странность в окружении?"
  - char: "roma"
    side: "left"
    text:
      - "Странность в окружении? Ты имеешь в виду то ощущение, что было в Культурном павильоне — будто с какими-то вещами поработали чьи-то руки?"
  - char: "leonardo_da_vinci"
    side: "right"
    text:
      - "Нет, не совсем это! М-м... мне сложно это описать."
      - "Ну, например, атмосфера выставки, «концентрация Империи Сардиния» в воздухе... что-то в этом роде?"
  - char: "alfredo_oriani"
    side: "left"
    text:
      - "Концентрация Империи Сардиния?.. Что это вообще за вопрос такой?!"
      - "Сегодня на выставке всё так же, как и вчера — кругом праздничная суета и шум мероприятий!"
  - char: "roma"
    side: "right"
    text:
      - "Нет, я понимаю, что она хочет сказать."
      - "Что касается атмосферы... хоть это и едва уловимо, я действительно почувствовала изменения."
      - "Прямо здесь, в месте, которое должно быть моим домом, я ощущаю некую дистанцию. Чувство отчужденности и новизны не покидает меня."
      - "Ты чувствуешь то же самое?"
  - char: "leonardo_da_vinci"
    side: "left"
    text:
      - "Да, пусть и самую малость... как будто сам состав воздуха немного изменился."
  - char: "alfredo_oriani"
    side: "right"
    text:
      - "...Состав воздуха никак не мог измениться!"
  - char: "leonardo_da_vinci"
    side: "left"
    text:
      - "Да знаю я! Это метафора, метафора!"
  - char: "emanuele_pessagno"
    side: "right"
    text:
      - "Я, как и Альфредо, ничего такого не чувствую."
      - "...Возможно, это просто галлюцинации у Да Винчи и госпожи Ромы на почве сильного переутомления."
  - char: "roma"
    side: "left"
    text:
      - "Переутомление, хм? Возможно."
      - "Было бы славно, если бы это чувство и впрямь оказалось лишь плодом воображения..."
